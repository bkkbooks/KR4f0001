body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻十六勅諭諭大學士馬齊等孔振公等俱係假標將軍之名聚黨行凶作亂之人若將此事批岀發科到部另議則致遲延着都統托賴侍郎張廷玉學士登德作速前往㑹同該撫鎮嚴行夾訊宜正法者於三月前即在彼處正法宜發遣者着伊等親解至京師發往和樸多烏蘭古木地方康熙六十年二月初一日諭大學士學士九卿詹事科道等現今科塲之弊有最大者朕知之甚真人皆不敢言士子作文三塲祇六七日而今年放榜光景似欲遲至十八以後合通塲巻不過三千餘主考房考閱文乃至四十餘日方畢為日太多諸弊皆從此而生矣士子偶有夾帶倩代原其情各為自己功名或貧士圖利身家起見犯者不過幾人其弊猶小况入塲時廵察防閑甚嚴苟被搜獲必治以罪迨三塲既畢廵察各官俱撤貢院門名為封鎻而每日送水菜取食物遂至内外信息時通紛傳某人已中某人不中中者衆人皆為稱喜是外間先有一榜矣又何待出榜耶甚有更易巻子改換名次主考俱係大臣平日以清操自居或不至若此而不肖房考官職甚微身家亦輕何事不可為此乃弊之最大者言官等未嘗不知碍於親友師生情靣且恐招後日之怨皆緘黙不言主考日後即知有更易改換之事而業已失察不肯引咎檢舉考官内賢愚不等然湏至出塲後方知某房官好某房官不好其在内簾時同輩不能互相糾察科塲大典豈容如此紊亂乎朕實有見聞故特諭爾等此時若遣人去即可將此等傳遞作弊之人拏獲因事近刻薄故不為耳仍着原𣲖廵察左右翼都統副都統等入塲照舊廵察特諭康熙六十年二月二十八日諭滿漢文武大臣等諸臣奏請慶賀六十年朕心深為不懌因將朕𠂻略言大槩從來人君尊號上下轉換字靣漢唐相沿套語此無他故特以欺誑不學之人主以為尊稱其實何尊之有本朝受命以來惟以愛養萬民為務如慶雲景星鳳凰麒麟靈芝甘露天書月宫諸事從不以為祥瑞而行慶典亦無封泰山禪梁父改元貽誚之舉為臣下者勸請舉行以貽事後譏議有損無益此事朕不准行自無可談論若或准行必有非之者前朕六旬舉行慶典無知之妄議朕已備悉亦深悔之現今西陲用兵外則官兵披堅執鋭冒暑衝寒勞苦已久内則民人負重䟦渉輓運逺道力亦疲困兼之被災之處民多受累朕每念及此惟當修省圖治加惠黎元有何慶賀微賤無耻之徒謂舉行慶典必有殊恩非分邀望若奸詐輩得邀殊恩則軍前功罪輕重顛倒錢榖混亂不明捐納事務那移侵欺希圖倖免更有甚者人知六十年慶典必有殊恩故殺故犯者不少今值暮春清明後正風霾黄沙之候或遇有地震日晦幸災樂禍者必借此為言煽惑人心恣行譏議諸如此類私相紀載六十年來朕亦親歴今謁陵典禮已行諸事告竣凢詔赦恩賚等項概行停止則事務簡少辦理大政亦易矣恩賚停止焉用慶賀這所奏無益康熙六十年三月初七日諭大學士九卿等今日出榜黄霧四塞霾沙蔽日如此大風榜必損壞或因學問優長聲聞素著之人不得中式怨氣所致或此畨中式之人將來有大奸大惡亂臣賊子亦未可知邵子於洛陽天津橋聞杜䳌即知南人有入相者而王安石果相此皆書冊所載非朕杜撰自古帝王因不學問一任書生恣議朕自㓜讀書如此等語亦能言也先儒中惟朱子之言最為確當其他書冊所載亦有不可盡信者如唐明皇焚珠玉於殿前珠可焚毁而玉亦可焚毁乎凢事必歴乆而後見唐史載焚珠玉亦止一次耳又書云至治之世風不鳴條雨不破塊天地抑鬱之氣賴風以散若不鳴條則風無力何以鼓盪萬物農人墾田尚欲耕翻令土破碎若不破塊何以播種而嵗必荒矣又書云囊螢讀書朕曽於熱河取螢火數千盛以大囊照書竟不能見一字此書之不可盡信者也然亦有似乎荒邈而竟實有其事者東方朔記北方有層氷千尺冬夏不消今年俄羅斯來朝以彼國地圖呈覽問其人云其地去北極二十度以上名為氷海堅氷凝結人不能至始知東方朔所云不謬又從前有書吏三人徧傳西邉異獸形圖部議重罪具奏朕從寛免死令其往覔必得是獸方令回來後將軍祁里德等來自軍前朕問伊等云果有是獸目在乳傍口在臍傍廵哨侍衛等曽親見之有侍衛欲以鳥鎗擊之為旁觀勸止䝉古名為鄂布又有飛者名為積布飛者未曽得見䝉古名惡人為鄂布泰積布泰是即山海經所謂形天無首以乳為目以臍為口也故將發遣書吏等俱令送回又神異經云北方層氷之下有大鼠肉重千觔名為鼢鼠穿地而行見日月之光即死今俄羅斯近海北地有鼠如象穴地以行見風日即斃其骨類象牙土人以其骨製椀碟梳箆朕親見其器方信其真又古人以天市垣為中國分野朕始疑其說細玩天球合以地圖中國去赤道二十度至四十度在榖雨立夏小滿三節氣上天市垣亦去赤道二十度恰與中國對照始知古人分野之說確有所據後人無闡發者朕細心推測方悟其理故向爾等言之此又書之可信者也總之讀書務在明理方不為書所惑耳再者外任官員必經歴日乆才方練逹見有年老舉人由教職陞任者每勝於進士如年滿千總此畨軍前効力甚著亦勝於武科進士進士不過大臣所取門生如謝賜履張應詔李發甲非舉人出身之好官乎康熙六十年三月初七日諭大學士馬齊等㑹試中式巻内勞必逹等十二名文章俱不好今科着停殿試過三年仍准其㑹試塲内每房原派同考官二員今巻面上止有一人印記或係一人獨閱或係二人同閱是何情由該部嚴察以聞此畨應試之人有學問優長不得中式以致抱屈者朕亦無從而知即有人奏聞亦難輕信如舉人王蘭生學問南人中或有勝彼者若直𨽻人則未能及之前周易折中性理精義朱子全書等書魏廷珍何國宗王蘭生吳孝登在朕前晝夜校對五年不遺一字伊等知朕最真朕亦深知之讀書人無全讀性理者王蘭生甚為精熟學問亦優屢試未中或文章不好抑别有縁故耶再滿洲舉人留保學問亦好滿洲䝉古漢軍中罕有及者即翰林中諒如彼者亦少今畨滿洲内廵撫蘓克濟之親屬二人俱中張伯行幕中修書之人數年來亦相繼中式惟王蘭生留保俱未得中此在朕前行走之人朕深知其學問非屬偏向也王蘭生留保俱賜進士令其今科殿試康熙六十年三月初九日諭大學士馬齊等六十年大慶大學士王掞等不恱以朕衰邁建儲為要欲放出二阿哥伊等借此邀榮萬一有事清朝之安危休戚意謂與我漢人何渉至於國中似兇頑愚昧之徒一無所知不顧身命宗族干犯叛逆之罪而行者亦不少朕年老將衰難以隠忍隨手書此發出王掞以伊祖王錫爵在神宗時力奏建儲之事為榮常誇耀於人不知羞耻王錫爵極力奏請建立泰昌不乆而神宗即崩崩時亦不甚明泰昌在位未及兩月明係神宗英靈奪其夀命天啟庸懦稚子承繼内而客氏魏忠賢等專擅國家大臣如左光斗楊漣輩皆於午門前杖斃大亂天下至愍帝不能保守為陜西馬牌子李自成所偪自盡屍暴於東華門橋上官員無尋收者太監慈有芳覔棺殯歛世祖章皇帝始行追封令衆漢大臣官員成服而明遂亡當時東與我朝構結深仇西不能撲㓕闖賊以致君亡父戮全不知孟子所云以天下與人易為天下得人難之義故立泰昌耳亡國之賊王錫爵不能辭其罪也應剖棺斬首以獻神宗之陵神宗有靈必為首肯王錫爵行事同時之人亦甚惡之故作詞曲極肆詆詈得此報應其孫反叛受賊偽劄稱為伐清總兵不乆被擒朕宥其殄㓕九族之罪止戮其身别無株連即此王掞之負恩可知矣二阿哥兩次冊立為皇太子教訓十年不能成就朕為宗社及朕身計故嚴行禁錮所以不殺者恐如漢武帝之後悔致後人滋其口舌也朕並無可悔之處現今時遣人存問齎賜佳物其子朕為撫養凢此皆為父之私情小惠不能自已所謂姑息之愛也人何得因此生疑朕預知必有此事前㫖微寓其意今既顯露故降明㫖王錫爵已㓕明朝王掞以朕為神宗意欲搖動清朝如此奸賊朕隠而不發可乎朕並無誅戮大臣之意大臣自取其死朕亦無如之何朕御極六十年慶賀典禮非不可受因深知此等事故堅辭不允今朕衰老中心憤懣衆人虚誑請行慶典朕豈屑此乎康熙六十年三月十五日諭大學士馬齊等王掞及御史陶彛等妄行陳奏俱云為國為君現今西陲用兵之時為人臣者正宜㓕此朝食此係目前顯然効力之處滿洲緑旗文官俱於章京兵丁内派往惟在京漢官不在其内向年總督姚啟聖李之芳廵撫趙申喬等俱曽於軍前披堅立功伊等俱係漢官有何異處將伊等暫停議罪着於此畨軍前照滿洲章京例委署額外章京遣往王掞年老着伊子王奕清去俟立功回日再奏康熙六十年三月二十五日諭大學士學士九卿朕披覽史冊於前代帝王每加留意書生輩但知譏評往事前代帝王雖無過失亦必刻意指摘論列短長無一人為帝王公言者朕見歴代帝王廟每朝崇祀不過一二主或廟享其子而不及其父或配食其臣而不及其君皆因書生議論而定甚未允當况前代帝王曽為天下主後世之人俱分屬臣子而可輕肆議論定其崇祀與不崇祀乎今宋明諸儒人尚以其宜附孔廟奏請甚多至古帝王宜入廟崇祀從未有人奏請前代帝王皆無後裔後之君天下者繼其統緒即當崇其祀典朕君臨宇内不得不為前人言也朕意以為凢曽在位除無道被弑亡國之主此外應盡入廟即一二年者亦宜入廟崇祀爾等將朕此㫖冩出㑹同從容詳議具奏特諭康熙六十年四月初六日聖祖仁皇帝御製文第四集巻十六
