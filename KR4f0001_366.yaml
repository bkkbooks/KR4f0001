body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻三十三目録古今體詩四十九首五月上旬避暑熱河途中喜麥秋盈野雨暘得時賦七言一律夏日山莊二首金蓮盛放二首賦得山林引興長詠夏二首詠新竹熱河産人参雖不及遼左枝葉皆同命翰林蔣廷錫畫圖因戯作七言截句記之蘭菊圖蓮花岩松牡丹嘉禾䨇頴湧翠岩觀瀑賞白蓮梨樹峪道中歩輦口占二首雲巖山居即事覽孝經衍義有感而作用梌木杯噐春行去嵗八九月雨最多民間俗說封地雨故一冬少雪猶可支持自交立春復不見雲所以望雨甚殷昨晚宻雲四起夜深甘霖即霈田間老㓜無不舉手加額歡聲載道朕以民食為天喜均一體故賦七言近體以示羣臣春行栁絮清潭讀朱子全書有感而作暑將退浙閩總督范時崇陛見來京朕毎念祖為開創宰輔父乃忠義名臣所以待之優重今因回任特書御詩餞送古北口提督馬進良以年老辭去朕念當日鷹揚百戰挽强執銳自守紫塞内外恬静皆因宿將老成之所致今回林泉深所惜也故賦五言特記不忘疆場舊事也賦得萬壑泉消夏千峰翠作秋大西門升八旗官閱騎射作江南諸臣靈泉啓文明賦得恩光日邉來五十三年冬至齋戒作五十三年冬旱十二月初二日大雪二十一日又雪途中偶成賦得梅候宫中樹賦得三十六宫都是春日月無私能廣運春日郊行示地方官六首舟中鼓琴和風細雨望湖春色二首
