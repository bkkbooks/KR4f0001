body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四目録敕諭諭三法司衙門諭一統志館總裁勒德洪等諭三法司衙門諭大學士勒德洪明珠吳正治宋德宜學士禪布蔡必漢噶思泰吳興祖徐廷璽韓菼郭棻諭工部右侍郎孫在豐諭刑部諭大學士勒德洪明珠王熙吳正治宋德宜學士禪布蔡必漢吳興祖徐廷璽李光地韓菼郭棻諭荷蘭國王耀漢連氏甘勃氏諭大學士勒德洪明珠王熙吳正治宋德宜學士禪布蔡必漢噶思泰吳喇岱吳興祖徐廷璽李光地韓菼郭棻諭內閣諭戶部諭大學士勒德洪明珠王熙吳正治宋德宜學士禪布蔡必漢噶思泰吳喇岱齊穡吳興祖徐廷璽李光地韓菼郭棻諭大學士勒德洪明珠王熙吳正治宋德宜學士禪布蔡必漢噶思泰吳喇岱齊穡吳興祖徐廷璽李光地韓菼郭棻諭大學士明珠諭禮部諭戶部諭大學士勒德洪明珠學士禪布噶思泰吳喇岱齊穡吳興祖額爾赫圗諭大學士勒德洪明珠學士禪布噶思泰吳喇岱齊穡額爾赫圖諭大學士勒德洪明珠學士禪布噶思泰吳喇岱額爾赫圖吳興祖徐廷璽諭大學士勒德洪明珠學士禪布吳喇岱額爾赫圖吳興祖徐廷璽
