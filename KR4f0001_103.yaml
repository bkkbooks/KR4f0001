body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻六勅諭諭禮部大行太皇太后聖徳母儀昭示萬國昔奉我皇祖太宗文皇帝賛宣内政誕育我皇考世祖章皇帝顧復劬勞受無疆休大一統業暨朕踐祚方在沖齡仰荷我聖祖母訓誨恩勤以至成立晨昏依戀三十餘年方期洊享遐齡茂膺繁祉詎意適遭違豫奄忽上賓朕哀疚之深五中摧絶昊天罔極報徳實難緬惟厚澤深仁信足炳傳簡冊非薦隆號莫展哀誠宜恪遵彞憲恭上尊諡垂示無窮以慰朕尊親之意著内閣翰林院詹事府會同擬奏其應行典禮尔部詳察議奏特諭康熙二十七年正月初七日諭學士舜拜朕心切哀慕不與羣臣接見日久九卿會議有一二重要事朕心甚為不安新授兩巡撫又未啓行來日强出令其領取訓㫖各速之任又此時諸曹重事亦令入奏康熙二十七年正月二十二日諭宗人府自古帝王展親睦族列爵錫封原欲選賢建能旌别淑慝俾咸知勸勉慶流奕世此國家之常經奬勵之至意也朕篤念親親恩禮㒺替年至十五即行授封但誼屬本支必皆飭躬砥行端良醇謹益自刻勵動不踰則始無忝於宗潢今親王以下奉恩將軍以上年至十五不問賢否槩子封爵以致視為故典罔知激勸嗣後親王以下奉恩將軍以上子孫應俟其年至何嵗作何辨其賢否定其品級等第始應授封著議政王貝勒大臣及親王以下奉恩將軍以上會同確議具奏特諭康熙二十七年二月初九日諭内閣朕躬不逮往時自太皇太后聖體違和以來深覺迷憒極切憂勞頃所言者旋即遺忘昨一二要事折票簽付與筆帖式後竟遺忘反覆思之不復記憶為何事輾轉不寧至於中夜忽復憶得乃大驚惕以謂已批發矣急呼筆帖式問之奏云已折票簽尚未批發於是心始稍舒或念所及數欲降㫖令召其人至而所念及之事所思之言乃皆遺忘無如之何此所書勅諭乃朕所自為而昨所更易者今日視之似有遺漏爰加増益更訂雖復更訂仍覺未盡其意似有遺缺者以此之故因念凡諸奏事朕見所未到者亦未可知凡部院事皆於國家關係重要所奏聞之事大臣庶官益當敬慎大學士學士亦宜詳加看閲此㫖宣示九卿此所書不必别謄有所更易即於此増入奏聞康熙二十七年二月初十日諭吏部國家建官分職經理庶政必須矢志精白大法小廉各守職業實心任事庶無負拔擢簡用之意朕親理萬㡬歴有年所於尔部院大小官員行事無不深知為臣子者既儋爵受禄榮及父母庇其子孫家能自給便當知足無致隕越前已屢頒諭㫖嚴行申誡又復諄諄面諭訓誨再三今在廷諸臣自大學士以下有職掌官員以上全不恪勤乃職惟知早出衙署偷安自便三五成羣互相交結同年門生相為援引傾陷商謀私事徇庇同黨圖取貨賂作弊營私種種情狀確知已久九卿詹事科道皆朕委任之員凡遇會議自當各出已見公同商酌乃一二欲行倡率之人持議於前衆遂附和於後雷同草率一意詭随又其甚者雖在會議之班茫無知識随衆畫題希圖完結廷議如此國是何憑又有當集議時緘黙自容及至僨事巧於推卸朕深惡此等推諉苟容之輩亦屢加嚴飭至於用人關係重大羣臣賢否難以周知故遇緊要員缺特令會同推舉原期為國得人實有裨益亦欲令被舉者警心易慮恐致溺職累及舉者因而勉自刻勵九卿諸臣宜體朕心從公選舉方為不負委任乃歴來所舉官員稱職者固有而貪黷匪類往往敗露此皆瞻顧情面植黨納賄所致凡兹情弊朕非不知前者班布爾善阿思哈等身為大臣所行悖亂致干憲典遂行正法至今猶耿於懐是以比來大小官員背公徇私交通貨賄朕雖洞見而不即指發冀其自知罪戾痛加省改庶可終始保全詎意積習深錮漫無悛悔如審擬蔡毓榮一案庇護挽救瞻徇黨類百計營求因朕具悉其奸私謀未遂近差色楞格往審張􅊈所㕘事情朕面諭色楞格張汧居官貪穢尔宜嚴行審出迨差回時詢問色楞格奏稱臣於此案盡心研鞫若有失實甘受誅戮及覽其奏案惟恐累及保舉張汧之人竟為庇護朕知内閣原擬票籤將保舉張汧官員并未議及業行折出又念張汧審結定罪之後自然發露因仍用原籤票發又靳輔下河工程屯田之案朕早已察其情弊特遣佛倫等前往勘議今所議殊屬偏私且凡會議之時科爾坤佛倫等務執已見持論好勝苟非懐挾私情何以力排衆議朕亦曽面加誡諭未見畏悔如此積弊愈久愈深物議沸騰輿情憤激以致言官列欵㕘奏本應發明其事以肅官方因不忍遽行加罪大臣且用兵之時有効勞績者故免其發明勒徳洪明珠著革去大學士交與領侍衛内大臣酌用李之芳著休致回籍余國柱著革職科爾坤著以原品解任佛倫熊一瀟等著解任於河工案内完結嗣後大小臣工各宜洗滌肺腸痛改陋習潔已奉公勉盡職掌以副朕寛大矜全咸與維新之至意尔部即遵諭行特諭康熙二十七年二月十一日諭大學士伊桑阿梁清標學士齊穡舜拜趙山拜里阿喇密石文桂盧琦近見科道官㕘人之疏甚多果有大貪大惡何不早為㕘奏有等人聲言糾㕘妄行嚇詐希圖利己以致各官不能自安此等嚇詐之人許即行首告吏部都察院通行曉諭康熙二十七年二月二十日諭大學士伊桑阿王熙梁清標學士凱音布趙山拜里阿喇密朱都納薩穆哈石文桂王封濚盛京寧古塔沿途驛站往來官員多索車馬鞭撻苦累驛站人役所在多有嗣後如此苦累驛站者管理驛站官即行報部驛站官瞻徇情面不報事發並驛站官治罪其下兵部令定例議奏康熙二十七年三月十五日諭内閣今時略旱矣而欽天監所上章四月朔日食甚應行應革之事當何如耶九卿詹事掌印不掌印科道官集議焉朕面見令奏之康熙二十七年三月二十三日諭大學士伊桑阿王熙梁清標學士凱音布拜里朱都納薩穆哈吳什巴石文桂王封濚夫死而殉日者數禁之矣今見京師及諸省殉死者尚衆人命至重大而死䘮者惻然之事也夫修短壽夭當聽其自然何為自殞其身耶不寧惟是輕生從死反常之事也若更從而旌異之則死亡者益衆矣其何益焉此後夫死而殉者當已其旌表王以下至於細民婦人從死之事當永永嚴禁之若有必欲從死者告於部及該管官具以聞以俟裁定議政王貝勒大臣九卿詹事科道官會同確議奏焉康熙二十七年四月初六日諭大學士伊桑阿等朕荷太皇太后撫育深恩罔極難報追思悲痛不能自已應行慎終典禮務竭誠敬式展哀衷朕今躬送雖已奉安從兹不復再覩梓宫思慕之忱更為靡盡尔等以大禮告成懇請所奏已知之康熙二十七年四月二十日諭都統瓦岱兹以湖廣督標裁兵鼓噪特命尔瓦岱為振武將軍馳驛前往江寧尔到江寧帶領江寧滿兵京口漢軍兵丁京口鎮標水師營兵江南江西督標火器兵丁戰船酌量帶領水陸并進星速前往湖廣與荆州將軍侯巴渾徳江寧將軍博濟副都統烏黒商酌而行務須平定亂兵撫安黎庶毋得遲延致令滋蔓仍宜剿撫並用嚴加偵探毋得疎虞大兵一到抗拒不順者戮之有先被賊脅從即時迎降者俱免誅戮有能擒殺賊渠投誠者分别陞賞須嚴禁兵將申明紀律經過地方毋得騷擾百姓歸順良民加意撫綏以副朕定亂救民之意其行間將領功績及重罪俱察實紀明彚奏各官有犯小過者當即處分至於驍騎校以下無論大小罪過俱商酌徑行處治務期速平鼓噪兵丁安定地方尔受兹重任宜殫竭心力早奏捷功欽哉故諭康熙二十七年六月初十日諭大學士伊桑阿學士薩穆哈石文桂近日科道官無條奏者建言乃科道専職祇在不存私心耳可傳諭科道官有條奏事赴暢春園面奏康熙二十七年六月十一日諭大學士伊桑阿尚書阿蘭泰紀爾塔布侍郎額爾赫圖喀爾喀與厄魯特互相攻戰我邉塞地方宜加防守翁牛特巴林克西克屯四子部落等旗皆當酌量遣兵以防守我蘇牛忒之喀倫地方可令議政王貝勒大臣會議具奏康熙二十七年六月十九日諭大學士伊桑阿學士凱音布薩穆哈吳什巴石文桂襄陽總兵官兵南陽總兵官兵可酌量調遣取道孝感縣向武昌進發又將軍瓦岱兵及荆州兵亦宜兩路夾進王貝勒大臣會議以聞康熙二十七年六月十九日諭湖廣巡撫丁思孔楚省督標裁兵煽亂無知兵民或被迫脅或為招誘一時倉猝入其夥黨官兵一到若不分别加誅朕心深為不忍應速行開示此等亂兵原係食糧營卒各有室家均屬朝廷赤子乃為一二倡亂奸徒煽惑自新無路情屬可憫今特開一面以廣好生如有悔罪投歸即行免罪仍准安插務令得所果能將倡亂賊首擒獻軍前或殺賊來歸者仍與論功敘録毋得心懐疑畏自失事機致罹大法尔奉勅諭即刊刻告示通行曉諭務令翻然悔悟爭先投首蚤平鼓噪夥黨奠安民生副朕寛大矜全至意故勅康熙二十七年七月二十三日諭學士凱音布吳什巴石文桂荆州大兵防戍専備不虞滿兵往已多日矣並未殺賊立功而緑旗兵數經大戰破賊此後提督徐治都所上破賊章疏擬嘉奬温㫖議敘票簽以進滿兵破賊章疏擬照常票簽以進令大學士知之康熙二十七年七月二十四日諭學士凱音布吳什巴石文桂頃驛站筆帖式等所報我兵近抵武昌賊渠以三人遁去武昌城中民羈賊渠妻子獻城降由此觀之城中賊皆已降餘賊略盡地方提督總兵緑旗官兵自可追擒撫輯江寧京口荆州諸路兵仍赴武昌則轉輸供應民力維艱滿洲漢軍及調集緑旗兵皆令各歸本汛又遇難官民之妻子或恐株累可令其地巡撫察明奏聞汝等傳㫖大學士頒諭焉康熙二十七年七月二十四日諭内閣徐治都兵數經大戰其被創者陣亡者必不少矣且皆自諸營鎮調集者若歸本汛則清察必稽時日其速遣户兵二部賢能司官會同提督巡撫察明即武昌賞賚之庶窮乏兵卒得沾實恵不致後有為多為少遲延時日之弊矣康熙二十七年八月初二日諭大學士伊桑阿學士凱音布朱都納薩穆哈邁圖索諾和兵部考武官射合例者方記冊録用或有前在行間顯著勞績若以考校不合例之故遂不得見用事屬可矜已屢有諭㫖且射而中者人材皆優射不中者人材皆劣不可以此一槩論也若執此用人則人材優而有勞者終身不得見用實可憫矣又聞兵部閲射有以中者為不中以不中者為中諸情弊其飭兵部堂官自是以後其嚴之其慎之康熙二十七年十一月初二日諭大學士伊桑阿王熙梁清標學士凱音布朱都納邁圖索納和彭孫遹李振裕郭琇祀事所關重大凡在執事官皆先期習儀昨者祀天壇時光禄寺卿達蘇喀既預行演習乃於進福酒時先期誤跪而復起後於獻酒盃時又復錯誤今日啓奏時詢彼衙門事務所奏甚屬朦昧其人庸劣著解任員缺速擬具奏康熙二十七年十一月三十日聖祖仁皇帝御製文第二集卷六
