body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十六目録古今體詩三十八首千叟宴朕自幼不喜厚味今年登古稀深知粗食軟𬞞足以頤養天和有人進蔞蒿苦麻者因而書懷題新安道上示平藏將士六十一年春齋戒書園中無處無花觸目皆是故作此自嘲端陽久旱無雨夙夜倣徨夏至前方得普霑豐登者朕之獲福歉收者朕之失政出此入彼不能自恕故作近體一律以自遣避雨聞鐘同老侍衛佛桑花京中報到霖雨普霑夏至山莊晚眺登四面雲山夏日山莊百花齊放題山水畫山中自詠山居戲作回文題畫早御稻題畫挽總督趙𢎞燮自笑古稀立秋在六月憶陜西二首月來香膳酒自述樹葉扇惡繁華書懷中元日同僧語喜嶺外水土六十一年秋出哨回鑾
