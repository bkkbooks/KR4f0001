body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十雜著庭訓朕自幼齡學步能言時即奉聖祖母慈訓凡飲食動履言語皆有矩度雖平居獨處亦教以罔敢越軼少不然即加督過頼是以克有成八齡纘承大統聖祖母作書訓誡冲子曰自古稱為君難蒼生至衆天子以一身君臨其上生養撫育無不引領而望必深思得衆則得國之道使四海之内咸登康阜綿厯數於無疆惟休汝尚其寛裕慈仁温良恭敬慎乃威儀謹爾出話夙夜恪勤以祗承乃祖考遺緒俾予亦無疚於厥心朕仰戴斯言大懼弗克遵兹丕訓惟曰庶其自强不息以日新厥徳益思學問者百事根本不能學問則漸即於非幾以故自少讀書深見夫為學之要在乎窮理致知天徳王道本末該貫存心養性非此無以立體齊治均平非此無以達用於是孜孜焉日有程課樂此忘疲雖帝王之學不專事纂組章句顧由博而約往喆遺訓惟能網羅記載搜討藝文斯足増長見聞充益神智朕機務之暇講肄諸經㕘稽易學於太極西銘之義河圖洛書之㫖往往潛心玩味以次歴觀史乘考鏡得失旁及古文詩賦諸子百家説命云念終始典於學周頌言學有緝熙於光明朕所以朝斯夕斯至今弗輟者也書亦六藝之一朕每念心正筆正之説作字自来未敢輕易喜臨摹古法書考其源委又禮記射義稱事之盡禮樂而可數為以立徳立行者莫若射故聖王務焉易大傳言弧矢之利以威天下朕自少習射亦如讀書作字之日有課程久之心手相得輒命中用率虎賁羽林以時試肄念祖宗以來以武功定虣亂文徳致太平豈宜一日不事講習朕凡此既以自勉還用督率汝曹周書曰不學牆面蒞事惟煩孔子曰少成若天性習貫如自然蓋䝉以養正盛年力學如朝日舒光元良國之根本支庶國之藩附朕深惟列后付託之重諭教宜早弗敢辭勞未明而興身親督課東宮及諸子以次上殿背誦經書至於日昃還令習字習射覆講猶至宵分自首春以及嵗晩無有曠日每思進脩之益必提撕警誡斯領受親切汝曹生長深宮未離阿保薫陶涵養正在此時尚其愛日惜陰黽勉勿怠故復諄諄欲令汝曹皆知吾心也木受繩則直金就礪則利窮理格物多識前言往行是惟作聖之功汝曹今日為子弟他日為人父兄取資匪遠當思吾言讀周禮書後周禮一書先儒信者半疑者半其疑者曰周衰諸侯滅去其籍自孔子時已不具至孟子時尤殘缺莫考故曰其詳不可得而聞夫孟子當秦未燔書之前已不見周禮漢世焉得而有之且其大者莫如建官封建井田諸事然東西都為地甚狹何得王畿道里四方各距千里宮府内外官制何得比夏商遂益萬倍五等封地何所幷徙而能斥大九州溝洫井田鄉遂公邑何以利害同而法制異其為後儒偽造之書而非周公之舊也其信者曰周禮寓兵農則以井田定惟正則以什一教萬民則以鄉遂養士秀則以學校治天下則以封建其要有六典八法八則九柄九貢九式之序其次有祭祀朝覲冠昬喪紀師田行役之條無不詳備周密雖其間細𤨏職事或出後人附㑹然大體要所在非聖人創建不能也朕謂二説皆儒者讀書考究之言未可偏廢若夫帝王法古致治總在師其意而不泥其迹孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也夫損益者因時制宜之謂程顥曰有闗睢麟趾之意然後可行周官之法度朱熹曰周禮是聖人姑為一代之法爾到可用處聖人須別有權變之道誠哉斯言夫泥其説而用之王莽王安石遂致流毒天下若師其忠厚之意以措諸紀綱法制之中則何遂不可比隆成周朕故以孔子及程朱之言為讀周禮法書戰國策後此書上繼春秋下至秦漢之間二百四十五年行事皆備載於其中朱熹曰有治世之文有衰世之文有亂世之文六經治世之文也國語衰世之文也國策亂世之文也然有英偉氣非衰世國語之比此專以文論耳若其書之大指皆當時游士挾其詐謀窺其時勢之所必出中其時君之所必從或迎而導之或逆而折之誘之以利怵之以害縱横開闔皆非仁義道徳之言也間或有譎而合於正者十不得二三耳此蘇秦商鞅孫臏吳起李斯之徒所以卒殞其身而禍人家國惜當時諸侯及秦皆溺於若輩之説而迄無有早悟者夫六經四子之書其理甚近其説甚平聽之若迂闊而寡效然考之無偽用之無疵可以定危亂可以躋治平故善理天下者終不肯以此易彼也書性理奥後聖人之道始於明明徳極於位天地育萬物造端於宥密而彌綸於兩間百姓昭明協和萬邦飛潛動植咸若其天者非從外求也盡性而已中庸曰惟天下至誠為能盡其性能盡其性則能盡人物之性能盡人物之性則可以贊天地之化育葢人物之性即天命之同然與天地㕘乃性分之能事故曰民吾同胞物吾與也然則天地萬物豈在性外哉性理一書闡於周程邵張集成於朱子孔孟之㫖昭然若揭日月於中天其逓相發明者百有餘家而後斯道大著為書可謂博矣是編節錄精義由博而約誠能反覆硏極可以見性體之大而識盡性參贊為一理古昔聖賢心傳之妙由諸子之説進求之因流溯源得其意而致力焉修齊治平亦無餘事矣䟦虞世南墨蹟後虞世南仕貞觀朝為太宗所賞稱其五絶一曰徳行二曰忠直三曰博學四曰文詞五曰書翰今考唐史所載世南言論行事果有卓然足多者其書法少師智永專心不懈晩年遂造羲之之室當時與歐陽詢竝以書名議者謂歐虞智均力敵然虞則内含剛柔歐則外露筋骨君子藏器以虞為優誠篤論矣但世南墨蹟稀如麟鳳黄庭堅云孔廟虞書貞觀刻千兩黄金那購得想當時民間鮮有藏蹟故云然也朕萬幾餘暇雅好臨池宮中舊藏虞書時出披覽摹倣其意輒有神㑹爰濡筆而識其後以示珍重云跋顏真卿墨蹟後史稱顏真卿立朝正色剛而有禮非公言直道不萌於心天下不以姓名稱咸曰魯公而獨為權奸盧杞所忌遣諭李希烈竟被賊害觀其赴火罵逆何其烈也生平善正草書宋祁稱其筆力遒婉今披閱遺蹟凝重沉鬱竒正相生如錐畫沙直透紙背覺忠義之氣猶勃勃楮墨間朕重其人益愛其書不啻逾於球璧矣䟦蘇軾墨蹟後論者謂宋四家書皆從顏魯公入然亦以其天分高出一時神明變化於古人耳實不盡拘於成法也觀蘇軾前後論書詩可知矣軾題孫莘老墨妙亭詩云顏公變法出新意細筋入骨如秋鷹題石蒼舒醉墨堂詩云我書意造本無法㸃畫信手煩推求故其平生所書以跌蕩取勢以雄秀取態殆變化於古而不專主於顏者世又謂軾書亦學徐浩今浩書刻帖具在亦不相似也郭畀云東坡晩嵗自海外挾大海風濤之氣作字如古槎怪石如怒龍噴浪今觀其真蹟信然豈區區成法之是拘耶䟦黄庭堅墨蹟後黄庭堅秦觀晁補之張耒輩游於蘇軾之門當時稱蘇門四學士而庭堅為尤著時人至以配軾稱蘇黄其文章學問固卓犖不羣而行草書亦自成一家元祐中嘗作草書於僧舎軾賞歎再四錢勰從傍曰君見自敘真蹟當更有得後謫黔獲見之遂深契藏真之妙嘗自云元祐間筆意癡鈍用筆多不到晚入峡見長年盪槳乃悟筆法此其草書之所以異也至所作行書剽去姿媚獨存風骨直欲與蘇軾分道揚鑣不肯俯循其轍間或雄姿猛氣逸出常度亦無傷其為神駿故朕恒玩之跋米芾墨蹟後米芾書在宋四家中特為雄秀史稱其沉著飛翥得王獻之筆意或云芾始學顏書已而宗李邕又棄而學沈傅師數數改業遂成名家今世沈傅師書絶少其與米之優劣無可考要以得法於獻之為確論也朱熹曰米老理㑹得字故所論皆實是朱子蓋亦心折之其為書豪邁自喜縱横在手肥瘦巧拙變動不拘出神入化莫可端倪洵堪與晉唐諸家爭衡昔人謂右軍如龍北海如象然則芾其在龍象之間歟跋朱子墨蹟後嘗觀朱子論書一則有曰字被蘇黄冩壊近見蔡君謨一帖字字有法度如端人正士方是字考亭固大儒其平日於栁公權心正筆正及程子寫字主敬之説蓋必有取也然觀其墨蹟亦嘗間有蘇黃筆意考亭之論或出於其門人所附㑹未可知爾蘇黄書法原從顏栁得来考亭書沉著古勁當亦本於顏栁故時有不期而合之處耶跋趙孟頫墨蹟後宋濂作趙孟頫傳云篆籀分𨽻真行草書無不冠絶古今鮮于樞云子昂諸書皆為當代第一而小楷又為諸書第一胡長孺云上下五百年縱横一萬里其稱賞之者至矣蓋書自宋四家盡變唐法而蘭亭玉潤諸帖之意寖逺孟頫起而矯之全用二王矩矱心慕手追神契無迹故一時矜為度越前代然相傳其嘗作米書輒自棄去以為不及良由米芾以天勝孟頫以人勝故爾苐天分得之性生不可勉强人功盡則天自見右軍學書池水盡墨如此安得不神朕於古人諸法書無不展玩臨摹而於米趙墨蹟尤珍愛不忍釋手倣成巻軸動至盈千用冀天人交盡得古人微意而自忘其握管濡翰之勞也跋董其昌墨蹟後華亭董其昌書法天姿迥異其高秀圎潤之致流行於楮墨間非諸家所能及也每於若不經意處丰神獨絶如微雲卷舒清風飄拂尤得天然之趣嘗觀其結構字體皆原於晉人蓋其生平多臨摹閣帖於蘭亭聖教序能得其運腕之法而轉筆處古勁藏鋒似拙實巧書家所謂古釵脚殆謂是耶顏真卿蘇軾米芾以雄奇峭拔擅能而根柢則皆出於晉人趙孟頫尤規模二王其昌淵源合一故摹諸子輒得其意而秀潤之氣獨時見本色草書亦縱横排宕有古法朕甚心賞其用墨之妙濃淡相間更為夐絶臨摹最多每謂天姿與功力俱優致此良不易也因臨池之暇遂書此於簡末連珠蓋聞知禮樂之情者能作識禮樂之文者能述疇非聖而克開疇非明而弗失是以黄軒肇則道協陰陽姬旦承謨制㕘忠質蓋聞文治深則武功大徳施博則威制隆是以秦爇詩書再世而致咸京之炬周傳官禮一戎而垂鎬室之裳蓋聞珠囊在御籲俊則興寳鑑移暉棄賢則晦是以阿衡去桀而負鼎夏道終衰尚父遇文以投竿周邦克乂蓋聞造化宰乎自然品類因夫各得靑陽煦物非私亭毒之心白露凋芳豈任䖍劉之徳是以九功歌於九敘戒董兼施五教弼夫五刑明允為則蓋聞泰岱為五岳之宗謂其居高而不亢滄海為百川之長謂其兼容而有餘何則過剛則凌物至察則無徒是以道主敬民若馭朽索之馬心存愛物寜漏吞舟之魚蓋聞方圓互用體有殊規小大兼呈材非一器是故記功忘過所以收逺馭之猷量職授能所以懋允釐之治蓋聞陰陽寓於六位天人備乎九疇終始元貞本太和之保合剛柔正直惟皇極之懋修是故白旄既麾訪河洛而叶契韋編載絶通神明而贊幽蓋聞治道多端農為政本厚生有術食乃民天何則非知稼穡之艱罔臻作所未盡穮蓘之力曷冀逢年是故夏禹經邦首敷土壤姬文卑服專務康田蓋聞虛以集猷弓旌招士樂以取善鞀鐸求言惟棫樸繁則化日盛蕘蒭廣則道日尊是以訪徳崆峒不惜順風之拜咨謀岳牧式宏舉佚之門蓋聞王猷建國爰分職於作屛善政養人聿宣仁於求牧是以布甘棠之教澤著美周詩奬渤海之循聲揚芬漢牘聖祖仁皇帝御製文第二集巻四十
