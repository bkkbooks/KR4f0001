  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻十二目録勅諭諭户部諭户部諭浙江福建總督梁鼐浙江巡撫王然江南江西總督邵穆布安徽巡撫劉光美江蘇巡撫于準山東巡撫趙世顯諭刑部諭扈從大學士馬齊張玉書陳廷敬等諭吏部諭戸部諭兵部諭内閣諭内閣諭内閣諭工部諭大學士馬齊等諭起居注官揆敘等諭大學士馬齊等諭兵部諭大學士馬齊等諭户部
