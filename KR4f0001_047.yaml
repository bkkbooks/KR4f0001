body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷二十一説為學如鍊金説伊尹之告太甲曰德無常師主善為師善無常主協於克一先儒釋之以為學未有得不可執一定之見德無常師泛觀而博取也學既有得不可無一貫之理協於克一反觀而約求也昔人有云聖人之取善如冶人之鍊金或取於沙或取於水初無定在所謂德無常師也逮既鍊焉沙者忘其為沙水者忘其為水但見其為精純之金所謂協於克一也其喻可謂至明切矣而猶惜其旨之未暢也蓋金之在礦也其為沙礫者恆多其為金者恆少此猶繼善成性之後天事漸漓人心危而道心微也及夫金之在冶其質判矣然必汰其非金者而存其是金者此猶人之氣稟不能無殊善不善之數常雜揉而互勝而研辨之功則在乎去不善以存其善也至於就冶之後則所見無非金者然金猶有上下之品必淬之鑠之以務底於精然後為鏐為鐐者出焉此猶衆善會歸之後吾以一心統其全於萬事萬物之理一以貫之是純粹之至一之極也昔揚雄之言因鑄金而得鑄人久矣金之説之通於道也然自非深於學者其孰能知之哉老安少懷説天地者生民之本也教養者王道之原也聖人者功化之極也民非天何以生非地何以養然天地能生養民而不能人督其孝弟户賜以衣食也惟聖人出而節民之性阜民之財然後長幼得遂其宜出入得安其命故曰天地育萬物而聖人經天地然其道要不越於教養古者分疆畫井民授之田家各百畝居有宅宅有桑春而耕秋而穫夫而農婦而織當是時也老者其養於堂幼者其哺於室矣而聖人曰未也是不可以無教於是家立孰黨立庠術立序國立學以五禮防其偽而範之中以六樂防其情而導之和凡遒人木鐸以至樂正大司徒無一非教之官干戈羽籥夏楚之類無一非教之具故其時之民罔弗事長上以孝字幼孤以慈者自王政缺而井田廢民生困而教道衰壯者無以資其生貧者無以賙其恤於是老者不克奉而幼者不克顧此孔子所以慨然於王道而思安與懷之也朕撫御萬國聖人之德恆企焉而不逮而志在仁育元元每講求於老安少懷之道雖三代之井田學校非後世所能猝復而竊師其意則惟有薄稅斂以厚民生興禮教以正民德而已雖然王道必積久而後成是朕志殆終無已時也佛牙説薊州之盤山寺相傳有佛牙闊二寸其長以倍寺之人藏而寶之豈不以其異焉而羣奉以為神乎夫異固非聖人之道之所貴者聖人之道其質日用飲食其事君臣父子兄弟夫婦朋友行而著習而察是天下之大同也惟其同故人皆可以為堯舜而忠孝節義之概無不可以勉焉而至佛則不然離俗以為高矯情以絶物悖先王之教而創為苦空之説舉天下之好異者莫有能尚之者也世之人爭騖其説之異而並及其形質之怪且誕者亦羣然尊奉之是非大惑歟夫堯之睂八彩舜之目重瞳堯舜不自為異也而千古之下思學為堯舜者以其孝弟之道欽明文思溫恭允塞之德不聞其以睂與目也故使佛之牙出於偽耶則其譸張為幻也已甚使其果真耶則古之可怪者多矣又何足貴乎朕嘗巡幸畿東駐蹕此州聞有是事慮其罔世而誣民也因作是説俾州之人祛所惑焉詩説詩者心之聲也原於性而發於情觸於境而宣於言凡山川之流峙天地之顯晦風物之變遷以至君臣父子夫婦兄弟朋友之間古今治亂興亡之迹無不可見之於詩而讀其詩者雖代邈人湮而因聲識心其為常為變皆得於詩遇之故曰感天地而動鬼神莫善乎詩然詩道升降與世遞遷三百篇之經孔子刪定者可觀可興可羣可怨極纒綿悱惻之思皆忠厚和平之意性情之正也敻乎其莫可及已逮詩亡而騷作騷亡而漢之五言作流傳於魏猶存古風降自六朝寖尚綺麗比興義缺唐以詩取士能名家者粲如林立初唐盛唐咸足上追風雅然其間矩矱雖一而心聲各别奇正濃淡品格自成不可強而同也至中晚則菁華盡露而渾厚之象為稍變矣若夫宋人為詩大率宗師杜甫其卓然騷壇者洵能樹幟一代雖後人覽之覺言理之意居多言情之趣居寡然反復涵泳自具舒暢道德之致及乎有明詩家起而規模唐音洋洋渢渢可謂盛矣而明之於唐終有間焉朕稽古之暇怡情吟咏於唐人詩集雖嘗誦習而猶念詩有其原故復上遡乎楚詞以及三百篇尋玩其指趣博徴其義理庶幾得其心之元聲而毋騖乎世之所強同者因為之説以自勉云琴説琴何自而昉也新論曰神農氏王天下而作琴通典曰伏羲作琴以修身理性樂記曰舜作五弦之琴廣雅曰文王武王加二弦以合君臣之恩於是琴制始備及孔子學琴師襄子如見文王今所傳文王操是也間嘗考其義上圓下方法乎天地前廣後狹别乎尊卑大弦為君寬和而溫小弦為臣清廉不亂蓋有明良交濟之道焉又聞之琴者禁也禁入於邪以正厥心則間邪存誠之道更寓於是朕詩書不輟陶泳性情於琴之理頗有會心油油弗釋不啻與神農伏羲數聖人晤語一室夫琴不過樂中之一器耳乃精求其理遂至和天人通神明純君道表臣職正心修身阜財解愠無善不具何其廣大而淵微歟然則朕之崇德淑性以諴和萬邦也殆於琴乎遇之稼説朕嘗讀雅頌諸什其時之公卿大夫士罔不盡力於田畝而其西成東作之景至被諸管弦升歌清廟豈非以其事為國之大務耶間考其義若生民之詩茀厥豐草是去稼之害也甫田之詩或耘或耔是雍稼之本也良耜之詩荼蓼朽而黍稷茂是厚稼之生也其詳且盡若此朕軫念農業每巡省畿甸時而春也則觀其播種之函活時而夏也則觀其良苗之懷新時而秋也則觀其穀穗之頴栗堅好用以親民亦因假以自樂非若周成之於豳風徒得之矇誦而已然竊計其自春而夏而秋寒暑遞遷嗟我農人其間芟矱之功滋培之力藴崇之方棄匪類而殖嘉禾如詩人所云者朝斯夕斯不遑啓處纍閲月而穀乃告登甚矣稼穯之艱習焉而後知之也雖然世顧有耕而得餒者原其初非不庤乃鎛播乃種而始勤終惰汚穢弗治稂莠弗剪苗在草間迄乎秋期十無一穫豈地土之不宜天時之不善哉咎在害稼罔辨而養夫稼者未博其功也噫治稼之道可通於治天下矣操舟説器之利用而致遠者陸行莫如車水行莫如舟舟之為用也逸於車而險或過之若享其逸而不入於險則恃乎操舟者之有其道也當夫水石擊撞波濤怒飛回帆如騖驟合若離此非其巧之為乎至如浮滄溟駕虞淵歷艨艟如衽席泛浩瀚以洄沿此非其習之然乎若或凌萬頃之中流驚颶風之四集檣楫敧傾徒侣失色巧者不及施習者不及試斯時也惴惴然有胥溺之憂自非備之以至豫而持之以至愼殆鮮克濟事焉蓋其所為巧與習者藝也而其所為豫且愼者道也易曰濡有衣袽終日戒詩曰紼纚維之言其豫也言其愼也朕南巡江淮間見操舟者苟備之豫而持之愼矣雖大舟罔弗如其意之所欲為焉苟備之不豫而持之不愼舟雖小亦不能勝任而愈快也夫舟一器操舟一藝耳猶必有道持之以不至於敗况居天下之大器者哉揚子有言乘國者其如乘航乎航安則民安矣此物此志也解信古解學以求古人之是也非以求古人之非也六經之義藴博大精奧有終身探索之而難盡者自後世好異之徒喜立已説以爭衡於世於是離經悖道無所不至而身心之所喪者多矣究之古人之論其理常昭於千古而彼之所非議古人者卒不能行其所獨是也孔子曰我非生而知之者好古敏以求之者也又曰述而不作信而好古夫以孔子之神聖而一則曰好古再則曰好古絶未嘗有一端辨駮古人者惟汲汲皇皇以深窮其理遵循其訓而已此其故何也夫亦曰我之學於古者求其有益於吾身吾心云爾豈以是求異於古人為哉慨自孔子殁而異端邪説紛爭並起互相抵牾大道愈晦於是不知而妄作肩相望也賴有宋濂洛關閩諸儒起而闡明經學聖人之道復著使後之人篤信其説以求古人之所為是者是亦世道之幸矣朕故作此解以導世之惑於異學者八議解嘗讀周禮小司寇以八辟麗邦法曰議親議故議賢議能議功議貴議勤議賔竊歎古聖人之統馭臣下何仁至而義盡也無論堂陛相得之時歌蓼蕭賦湛露藹然其有禮意焉即為之臣者職業或有所忝以罪戾貽羞勢不得不繩之於法而猶必多為之解以君子長者之道待之夫豈聖人之有所私於其間而故以屈天下之法哉特以親故賢能功勤貴賔八者皆素所倚毗而禮貌之者也若一旦有罪竟與疏賤之儔輿𨽻之輩同罰而並辱非所以厲廉恥而彰仁恩也故嚴其防於五刑而通其權於八議語曰禮義節廉以治君子又曰履雖鮮不加於枕冠雖敝不以苴履言乎貴賤之有體也秦用申商之術行督責之令專尚峻法治以大壞漢初猶有餘風至文帝用賈誼之言而大臣遂有廉恥自重者朕禮遇臣下惟期其砥礪於無過即間有微眚亦不忍斥言之也庶幾百爾卿士其爭自勉於道義之途而漸有禮讓之風焉由是而往將八議亦可存而弗論也夫鄉舉里選解取士之塗古今異制得失之數可考而知也古者大司徒以三物教萬民而賔興之德行居其二而藝居其一五禮六樂之文不先於知仁聖義孝友睦姻也春秋衰世齊桓霸主而國語所載正月之朝親問鄉長猶必以慈孝賢仁為選首此古人鄉舉里選之法惇本而崇實得人所以盛也自科舉之法行上之所以求士與士之所以自見相率而趨於記誦之學文辭之末由是古制大變而得人之效衰矣夫十步之間必有茂草十室之邑必有俊士天之生才豈以世為厚薄而後世之人才寖不及古者法使之然也然欲盡廢貢舉而復鄉舉之舊又有所不可蓋古之風俗純茂人心質朴故匹夫有善可得而舉有不善可得而誅選舉一出於至公而無徇名失實之患後世文巧日勝澆競滋多徵賁者或由於勢利之交簡斥者或出於愛憎之口此九品中正之法所以終不可行也雖然貢舉之不可廢者勢也非法之盡善也必也愼簡有司嚴立程品取實學而汰勦説崇雅正而削浮夸矯鑒其前違而課責其後效以無失乎聽言觀行之意則庶乎其可以得人矣以德為衛解城郭之固足恃乎公輸之巧可仰而攻也河山之險足恃乎五丁之勇可啓而乘也兵革之利足恃乎耰鋤棘矜之子可起而抗也蓋天下大器也有天下大業也幅員之廣人民之衆至遼闊而莫可紀極使必畫地而守之家撫而户諭之其勢將不能終日聖人知其然故常有道焉合天下之渙而不至於離為之本仁以育之率義以正之忠信誠慤以行之哀矜惻怛以嘔喻之使夫天下之人親之如父母肫然有不可解之誼如是而我之所以為天下者亦庶乎其可以無患也故曰以力為衛者一夫之雄也以險為衛者一國之守也以德為衛者天下之所以善建而不拔也夫古之善為衛者莫如秦內之尺寸之兵毋得入殿廷外之罷侯置守收天下之兵銷以為鐘鐻卒之盜起於博浪之中禍及於齋宫之內當此之時非無衛也明之時其君皆深居九重狃於燕逸間以郊祀親行所乘輦皆用鐵絲為障以防不測然其究也羣盜並起以至於亡此亦非備之不豫也故尚德則雖無周廬式道而可以為安尚威則雖有金城湯池不可以為固治天下者觀於此亦可以擇術矣聖祖仁皇帝御製文集卷二十一
