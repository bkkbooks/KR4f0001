  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷二目録敕諭諭大學士伊桑阿馬齊王熙吳琠熊賜履張英等諭大學士伊桑阿等諭大學士伊桑阿馬齊王熙吳琠熊賜履張英學士法良辛保傅紳范承烈王九齡曹鑑倫諭大學士伊桑阿等諭大學士伊桑阿等諭工部諭户部諭户部諭大學士伊桑阿馬齊吳琠熊賜履張英學士辛保傅紳范承烈王九齡曹鑑倫諭大學士伊桑阿馬齊吳琠熊賜履學士辛保傅紳來道范承烈曹鑑倫諭大學士伊桑阿馬齊吳琠熊賜履學士辛保傅紳來道常壽來福范承烈曹鑑倫諭大學士馬齊等諭大學士伊桑阿馬齊等諭刑部諭內閣諭户部諭漢大學士九卿翰詹科道諸臣諭刑部諭大學士王熙諭禮部諭吏刑二部諭禮部諭户部
