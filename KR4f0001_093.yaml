body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷一敕諭諭內閣九卿詹事科道朕聞部院小官及筆帖式在差者輒令地方官迎迓以請朕安為名若所遣者近御人員地方官請安理所宜然若小官及筆帖式等輒令地方官以請安迎之殊不當於理宜禁之卿等議以聞康熙二十三年十一月三十日諭內閣穆敦請安所上章其還之山陵守視官員此後欲來請安者毋特具疏告之侍衛轉陳奏守視永陵福陵昭陵官員人等欲來省其親戚及以己私事欲來者各聼其自來但於職事無所曠斯已耳若曠其職事而來者則重罪之其悉示知此意康熙二十三年十二月初六日諭內閣泉林寺泗水之源在焉而吾孔子之所遊息也朕親歷其地其樹之碑令所司議以聞康熙二十三年十二月初六日諭大學士勒德洪明珠山東河南山西三省各遣兵部司官一員前往派出征俄羅斯善用藤牌官兵除八旗察取外著於福建投誠安插墾荒之內願效力官兵詳察揀選善用藤牌者以足五百名之數調發前來并令曉諭此項官兵汝等往征俄羅斯今冬即可回至原住地方所調官兵該省大吏酌量給與養贍妻子之資整備其夲身行裝以善遣之其傳與兵部康熙二十三年十二月初八日諭大學士勒德洪明珠議政王大臣議奏不發京師兵者議良是但直𨽻山東河南山西四省緑旗兵非經歷征戰之人也且黑龍江火器甚多不須更增朕意於山東河南山西安插墾荒福建投誠能用藤牌官兵及𨽻八旗福建投誠官兵內選五百名令臺灣投誠何佑率之前往並諭佑傳示官兵言今年冬即還師也薩布蘇起自卑微每見其陳奏移會事宜皆瞻顧支吾遷延時日觀此即四月進兵亦不過刈其禾而食之已耳所指示之事必不能奏效也此皆謫遣黑龍江狂劣之徒不樂成事私議阻撓而薩布蘇夲自微末重視此輩難於違拂其意以故如此兵事所關甚巨最宜籌畫精詳必期有濟而後從事若所謀輕率又如昔時明安達禮輩以致退師反令俄羅斯有逞心矣今自京師遣一賢能大臣總領軍事俟取雅克薩之城令回京師又於盛京遣兵五百名代黑龍江兵防守城郭勤事耕種俟進剿之兵回時即遣還盛京此耕種事務令戶部堂官一員往董領之俾勤力作觀俄羅斯所云早收榖種即吾土所種之春麥也今我師亦多種春麥大麥油麥於隕霜之前六月皆可收穫如此則不以出師之故致曠一年耕作矣又緑旗藤牌兵增給馬二千匹此馬於京師各佐領以至內府佐領各捐助馬一騎其不敷者發上駟院馬二百匹兵部馬二百匹再不敷者王以下堂官以上捐助以足其數發往盛京盛京各佐領出馬二千匹照曩時嚴加監視飼令肥壯以俟之更替京師所發之馬前往馬喇等所飼養之馬已預偹於齊七哈里地方聞其間止有十八日之程盛京之馬行至齊七哈里沿途若有倒斃者於馬喇處補給發往如此則我軍之馬不致缺乏矣此遣往緑旗兵令各攜炮子或十枚或二十枚以往朕意如此措施似大有禆益議政王貝勒大臣逐一詳議具奏特諭康熙二十三年十二月初八日諭大學士敕德洪明珠遣往黑龍江兵需用藤牌聞閩省製有雙層藤牌甚佳令福建提督施琅取其佳者四百面並揀擇需用大刀從福建由浙江江南山東迅速遞送京師事關軍機勿得遲誤特諭康熙二十三年十二月十四日諭大學士勒德洪明珠爾等可傳諭議政王貝勒大臣征戰本非佳事不得已而後用之嚮者俄羅斯無故侵擾我邊陲後復漸入越我疆界索倫黑真費雅喀竒勒爾等處之人皆被擾害不獲寧居掠其家口納其逋逃搶其村落奪其貂皮因彼頻年肆害曾屢行曉諭曰爾等無故入我邊境恣行搶奪朕何難遣發大兵將爾等撲滅但不忍即行殄戮故屢行曉諭欲令撤還爾衆歸我逋逃各居疆土互相貿易寧靜無事以安生業數次遣人亦於來使處屢有文移俄羅斯總無一次回報反於黑真費雅喀之地仍行搶奪用是發兵於愛渾地方以堵截俄羅斯所行之路乃俄羅斯仍居我邊界不歸我逋逃今雖應行剿滅但念用兵夲非佳事我惟順天而行將大兵前臨雅克薩以朕諭旨遣人宣布俄羅斯諭之曰屢次令爾退回歸我逋逃之人遣使馳書者數矣數年以來未有一次信息回報既不歸我逋逃反入我境內擾害地方搶掠人民妻子肆行不止為此遣發大兵前往堵截爾等所行之路於恆滚等處之俄羅斯許其歸順待以不死而生養之汝等仍不退離雅克薩地方故遣發大兵往行征討我師威力豈難剿撲爾等若即破壞爾城郭殄滅爾噍類自立成灰燼矣豈惟爾等俄羅斯普天之下率土之人朕皆惻然仁愛咸欲令其靜寧無事各遂休飬故不忍將爾等遽行殄滅屢次曉諭爾等欲各安生業共享太平則當即返雅庫地方以雅庫為界於彼處捕取貂皮於彼土收其物産勿入我邊界恣意妄行汝能將已納之逋逃歸還則降我之俄羅斯亦發還於汝如此則邊塞貿易可通咸安樂利而兵革偃息生民無所擾害矣若執迷不悟罔遵諭旨仍行抗拒則大兵進剿摧破雅克薩之城且盡行誅戮矣可遣人前往明白開示俄羅斯果能遵旨即回以雅庫為界而我兵駐劄愛渾則於雅克薩地方安置哨兵令疆界寧謐儻仍行抗拒則大兵相機而行若不如此周詳區畫今雖取雅克薩我兵進則俄羅斯退我兵還則俄羅斯又進用兵無止息之日而生民亦不獲安矣應否如此議政王貝勒大臣會議具奏康熙二十三年十二月十六日諭大學士勒德洪明珠尚書科爾坤侍郎鄂爾多郭丕黑龍江兵食所關最為重要必當謀恆足之道爾等與議政王貝勒大臣會同詳議以聞又遣往黑龍江管轄緑旗兵丁之官甚多兵少而管轄之官多甚無益也可度量派官而兵更宜酌減以四百名為率亦既足用而兵糧不致過費且近冬之際緑旗兵在彼地殊無所事可由蒙古境每百名分為一隊俾遞送之既非久可至而兵糧又不至糜費矣其一併詳議以聞康熙二十四年正月二十七日諭大學士勒德洪明珠尚書科爾坤哈占侍郎鄂爾多郭丕薩布蘇等自壞其田器盡斃其耕牛者若輩以為但於諸務曠誤以致廢事則令其離黑龍江而歸矣是其意也凡諸事務職任之人當各盡其心豫為籌度期無廢曠厥職其皆推諉於君上可乎凡於政務朕存之於心殫竭思慮是以於事不致廢曠若以謂有職司之人而専倚若輩聽其為之則軍機之事其必至於貽誤矣薩布蘇等其令議政諸臣察議之康熙二十四年正月二十七日諭大學士勒德洪尚書科爾坤哈占侍郎鄂爾多科爾沁十旗今嵗進貢牛羊乳酒酥油諸物皆毋貢至京師悉送之黑龍江以給軍士籍其數奏聞仍以進貢例賞賚之如此似於兵丁有益議政王貝勒大臣會議以聞康熙二十四年正月二十七日諭大學士勒德洪明珠馬喇自差遣以來效力良多且深諳雅克薩地方情形其授以副都統品級此兵事令往參謀議特諭康熙二十四年正月二十七日諭大學士勒德洪明珠林興珠乃勤勞效力之人且列侯爵可令參謀議著彭春等恆愛敬而厚視之特諭康熙二十四年正月二十八日諭大學士勒德洪明珠遣往征討雅克薩之緑旗官辨各照其現在職銜兵部新給以印信劄付而遣之特諭康熙二十四年正月二十八日諭大學士勒德洪明珠彭春等至黑龍江時有移會雅克薩城文書用黑龍江將軍印遣發之特諭康熙二十四年正月二十八日諭按察使于成龍兹以海口關係運河下流特命爾督理髙寶等處下河事務管轄所屬附近海口州縣等處地方車路等河并串場河白駒丁溪草堰場等口逐一確勘挑濬深闊使髙郵等州縣減水壩一帶運河水口引流入海仍撫綏黎民勤宣德意約束衙門官吏胥役恪遵法紀勿致作弊生事嚴飭所屬海口有司等官各循職掌勿使糜費錢糧怠弛曠廢一應海口俱宜善加挑濬毋令沙土淤淺以致水勢漲漫淹沒民間廬舍田疇其挑河一切事宜並應設官分任之處均申詳總河具題定奪敕中開載未盡應行事務爾悉申詳總河題請遵行嵗終將所修工程及支用錢糧細數一並造册轉報總河題銷仍聽總河節制爾膺兹委任須持廉秉公精心殫力俾水患永除民復舊業惟爾之功如或執拗乖張因循冒破殃民誤國責有所歸爾其慎之故敕康熙二十四年二月初四日諭吏部國家設立翰林衙門原以儲飬人材嫻習文學以備顧問編纂之用必淹貫經史博極羣書方克諳練體裁洞晰今古敷詞命意典贍宏通悉登著作之林用佐右文之治始為稱職今將翰林各官特行考試朕親加詳閲分别次第以示勸懲徐乾學韓菼孫嶽頒歸允肅喬萊學問優長文章古雅宜加奬勵作何賞賚著議奏彭孫遹等文學亦通著照舊供職益勤研究以底精純周之麟崔如嶽龎塏錢中諧顔光猷李元振費之逵李復泌劉果實劉芳哲文理荒疏未嫻體式難勝厥任除李元振劉芳哲已經降調其餘俱著對品調用爾部即遵諭行特諭康熙二十四年二月初七日諭大學士勒德洪明珠驍騎校伊番等於三月初旬令馳驛由內路直往黑龍江可傳諭兵部康熙二十四年二月十三日聖祖仁皇帝御製文第二集卷一
