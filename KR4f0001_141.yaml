body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷二十五北征敕諭諭領侍衛內大臣國舅佟國維內大臣福善蘇爾達大學士伊桑阿阿蘭泰我國家自用兵以來所向無敵野戰則盡殲攻城則必克惟以弓矢戈矛摧堅破強無有不勝後三逆反叛南方稻田中盜賊皆挾火器抵迎所遇之敵罔有不敗此朕所深知者後有特設火器修整火炮鳥鎗給散八旗從此我朝聲名威武震懾四方更可知矣今噶爾丹出沒無常寇掠喀爾喀疆界務期一舉殄滅用是儲備諸路糧餉整頓六軍器械殫慮籌畫相厥機宜夫此一軍興也非他役之可比爾官辨兵丁以下厮養卒以上其各竭力奮勉不遇敵則已若與敵遇功成凱旋當錫以殊恩用旌勞勩其陳亡者照常給以身價外若護軍與一子七品職若甲兵與八品職食俸若無子者其所食錢糧即給寡婦養之終身所借官庫銀兩亦當豫以寬恤倘違軍法勿冀縱宥必遵太祖太宗世祖皇帝舊制治罪其遍行宣諭使明知之康熙三十四年十一月二十二日諭大學士伊桑阿阿蘭泰學士宋柱陶岱齊穡綏色三寶屆師出時宣化府古北口緑旗兵卒其加恩賫焉康熙三十四年十二月二十一日諭大學士伊桑阿阿蘭泰學士宋柱陶岱齊穡綏色三寶直隸山東河南三省行車兵卒到日訓練之令與運糧官員相習康熙三十四年十二月二十一日諭內閣朕思察哈爾之兵若不善飼馬匹恐不能同大軍前進今宜簡察哈爾兵之健者左四旗可八百人右四旗可八百人左四旗察哈爾八百人令屬之中路每人馬三匹統計馬二千四百匹可屯宣化府以飼養官馬草料分飼之右四旗察哈爾八百人令屬之西路每人馬三匹統計馬二千四百匹可屯大同府亦分給草料飼之如此則六師進發不致逗留大學士等會同兵部理藩院議以聞康熙三十四年十二月二十七日諭勇略將軍趙良棟比年以來噶爾丹怙惡跳梁侵凌喀爾喀諸部落朕視遠邇中外為一體不忍聽其擾害藩服也今聞其竄伏於巴顏烏闌地方去京師二千里去四十八固山邊境七百餘里自秋徂冬馬畜疲瘦形迹狼狽正宜及此時翦滅之以永弭邊患爾久著績行間性秉忠義練達機宜故兹馳諭與爾商略爾體中稍可勉力支持即趨赴闕廷以共悉心籌畫爾宜深體朕意並賜長白山上用人參以資頤養特諭康熙三十五年正月十六日諭領侍衛內大臣伯費揚古今厄魯特噶爾丹毁蔑盟誓傷我使者搶掠喀爾喀人等又阻尼班禪胡圖克圖之來隂蓄狡謀違旨妄行剿滅不容少緩用是遣發各路大兵聲罪致討特命爾為撫遠大將軍統領西路大兵一切事宜爾與都統伊勒慎護軍統領宗室費揚古護軍統領瓦爾達副都統碩代理藩院侍郎滿丕等公同計議而行勿謂自知而不納衆論勿當事會而致失機宜勿恃兵強而輕視逆寇嚴偵遠探罔或疏虞其統領蒙古兵丁前來之王貝勒扎薩克台吉與緑旗總兵官等共相商確酌量行事爾仍總統調遣有能擒斬噶爾丹來歸者分別具奏有情急來歸者務加意撫恤副朕勘亂靖逆之懷官兵或臨陳退縮貽誤軍機爾會同商議官員以下即以軍法從事示衆官兵犯小過者會同商酌徑行處治勿泯沒官兵功績勿寬縱違犯法紀之人賞罪之際務極嚴明如有用運米緑旗官兵與情願效力人員之處爾即酌量調遣爾等將厄魯特殲剿廓清安靖邊圉斯稱委任爾等宜殫竭心力早奏膚功欽哉故諭康熙三十五年正月二十五日諭太子少保振武將軍左都督孫思克今厄魯特噶爾丹毁蔑盟誓傷我使者搶掠喀爾喀人等又阻尼班禪胡圖克圖之來陰蓄狡謀違旨妄行剿滅不容少緩用是遣發各路大兵聲罪致討特命爾統領緑旗官兵一切事宜爾與將軍博濟一等侍衛副都統阿南達副都統西爾哈達巴麟祖良弼馬自德等公同計議而行揚威將軍覺羅恕書亦統領滿洲官兵同爾前進爾二人皆國家大臣膺朕委用重任之人凡關軍機重情俱宜體朕委用之意同心竭力協謀舉行勿分爾我各執已見互爭優劣以致因私害公負朕倚任至意勿謂自知而不納衆論勿當事會而致失機宜勿恃兵強而輕視逆寇嚴偵遠探罔或疏虞與緑旗總兵官等共相商確酌量行事爾仍總統調遣有能擒斬噶爾丹來歸者分別具奏有情急來歸者務加意撫恤副朕戡亂靖逆之懷官兵或臨陳退縮貽誤軍機爾會同商議官員以下即以軍法從事示衆官兵犯小過者會同商酌徑行處治勿泯沒官兵功績勿寬縱違犯法紀之人賞罰之際務極嚴明爾等將厄魯特殲剿廓清安靖邊圉斯稱委任爾等宜殫竭心力早奏膚功欽哉故諭康熙三十五年正月二十五日諭揚威將軍覺羅恕書今厄魯特噶爾丹毁蔑盟誓傷我使者搶掠喀爾喀人等又阻尼班禪胡圖克圖之來陰蓄狡謀違旨妄行剿滅不容少緩用是遣發各路大兵聲罪致討特命爾統領滿洲大兵一切事宜爾與將軍博濟一等侍衛副都統阿南達副都統西爾哈達巴麟祖良弼馬自德等公同計議而行振武將軍孫思克亦統領緑旗官兵同爾前進爾二人皆國家大臣膺朕委用重任之人凡關軍機重情俱宜體朕委用之意同心竭力協謀舉行勿分爾我各執已見互爭優劣以致因私害公負朕倚任至意勿謂自知而不納衆論勿當事會而致失機宜勿恃兵強而輕視逆寇嚴偵遠探罔或疏虞與緑旗總兵官等共相商確酌量行事爾仍總統調遣有能擒斬噶爾丹來歸者分別具奏有情急來歸者務加意撫恤副朕勘亂靖逆之懷官兵或臨陳退縮貽誤軍機爾會同商議官員以下即以軍法從事示衆官兵犯小過者會同商酌徑行處治勿泯沒官兵功績勿寬縱違犯法紀之人賞罰之際務極嚴明爾等將厄魯特殲剿廓清安靖邊圉斯稱委任爾等宜殫竭心力早奏膚功欽哉故諭康熙三十五年正月二十五日諭都察院左都御史于成龍兵部督捕右侍郎李鈵通政使司左通政喀拜今厄魯特噶爾丹毁蔑盟誓傷我使者搶掠喀爾喀人等又阻尼班禪胡圖克圖之來陰蓄狡謀違旨妄行用是遣發各路大兵聲罪致討進剿大兵所需糧米浩繁督運職任重大必須專委大臣統理今特命爾于成龍李鈵喀拜總理運送中路大兵軍米事務爾等督運之米務隨大兵運到勿得遲延有誤軍需駐劄之處必安營壘令兵丁加意尋防所派副都統總兵官部院官員以及爾等題帶文武各官俱酌量派定分委押運其情願效力人員亦量行分派隨押車輛俟到邊外如有用蒙古兵處即將爾等經過相近地方所有蒙古兵丁酌量調用有貽誤修路搭橋者即行指名題參凡關運米事情各部院不得掣肘爾等總理運務亦須熟計征戰事宜將官兵不時操練務使賞罰嚴明其敕中開載未盡事宜爾等即會同商酌而行倘遇有征戰之處與副都統盧崇耀總兵官嶽升龍劉國興等商計而行有於運米事情勤勞供職者即彚題奬勸如有怠玩厥職不效力勤勞者即行參奏懲治或官員或趕車兵役偷盜米糧馬匹及妄作非為者即以軍法從事示衆爾等膺兹重寄務須殫竭心志黽勉效力將米運至軍前以濟軍需斯克副朕委任之職如或因循怠忽措置乖方致誤職任責有攸歸爾等慎之故諭康熙三十五年正月二十六日諭兵部督捕右侍郎王國昌大理寺卿喻成龍光祿寺卿辛保內閣侍讀學士范承烈今厄魯特噶爾丹毁蔑盟誓傷我使者搶掠喀爾喀人等又阻尼班禪胡圖克圖之來陰蓄狡謀違旨妄行用是遣發各路大兵聲罪致討進剿大兵所需糧米浩繁督運責任重大必須專委大臣統理今特命爾王國昌喻成龍辛保范承烈總理運送西路大兵軍米事務爾等督運之米務隨大兵運到勿得遲延有誤軍需駐劄之處必安營壘令兵丁加意巡防所派總兵官部院官員以及爾等題帶文武各官俱酌量派定分委押運其情願效力人員亦量行分派隨押車輛俟到邊外如有用蒙古兵之處即將爾等經過相近地方所有蒙古兵丁酌量調用爾等總理運務亦須熟計征戰事宜將官兵不時操練務使賞罰嚴明其敕中開載未盡事宜爾等即會同商酌而行倘遇有征戰之處與總兵官毛來鳳許靖國等商計而行仍聽撫遠大將軍節制有於運米事情勤勞供職者即彚題奬勸如有怠玩厥職不效力勤勞者即行參奏懲治或官員或趕車兵役偷盜米糧馬匹及妄作非為者即同大將軍會議以軍法從事爾等膺兹重寄務須殫竭心志黽勉效力將米運至軍前以濟軍需斯克副朕委任之職如或因循怠忽措置乖方致誤職任責有攸歸爾等慎之故諭康熙三十五年正月二十六日諭總統督理中路運務左都御史于成龍等大師討寇全資兵力內外滿洲漢軍緑旗諸路從征兵丁俱已各加恩賚其外省調集步兵挽運軍糧載塗况瘁尤可軫念所有每月應支銀米本營照常支給俾贍養家口仍各給與行糧以為道路之資所運米石如悉依期挽至克濟軍需不致虧損遲誤俟大兵凱旋準補入馬兵營伍用彰奬勸有效力勤敏才堪拔擢者爾等可記名彚奏以俟酌用兵丁勞苦飢寒凡督運大臣官員宜時加拊循慰勉庶人爭自效踴躍赴功西路挽運兵丁亦照此例行爾等可移文各該巡撫通行傳諭示朕體恤軍士至意特諭康熙三十五年正月二十七日諭大將軍伯費揚古大兵進剿朕與議政大臣所議者已遣書諭汝外今聞根敦代青貝勒進至洪俄賴之內七斯希布地方汝等二路兵恐將喀爾喀誤以為厄魯特此事至要宜向阿南達切實曉諭之又汝等過翁金後將好鄉導給與商南多爾即從何地相通約定日期遣至朕軍前為善此二事雖無大關係思慮所及因交與阿第令諭知之康熙三十五年二月十六日諭禮兵二部朕統御中外念切撫綏惟務休養民生未嘗遠事征討比年以來海宇升平閭閻樂業四方固已無事獨厄魯特噶爾丹荒裔狡寇肆逞凶頑自烏瀾布通敗遁之後不自悔禍仍行狂逞悖天虐衆違蔑誓言侵掠我臣服之喀爾喀潛入巴顏烏喇之地詭謀叵測逆狀已彰乘其竄伏近邊自應及時撲剿儻目今不行翦滅恐致異日沿邊防戍益纍兵氏聲罪迅討事不容已用是遣發各路大兵分道並進朕特躬蒞邊外相機行事以衆擊寡以正誅逆天意人謀無不允協此寇一殄則邊塵蕩滌疆圉輯寧內安外攘實在兹舉告祭天地宗廟社稷並一切應行事宜著察例詳議具奏爾二部即遵諭行特諭康熙三十五年二月十八日諭大將軍伯費揚古覽總兵官康調元所奏有山西巡撫所助騾匹米石俱未到等語朕觀此或因大兵起程日期改近稍有措辦未及亦未可定糧餉牲畜所關最重前後之間將軍宜審顧萬全汝等所由道遠運送糧餉較中路其難數倍萬一糧餉不能陸續運至汝等兩路之兵恐致匱乏此事朕心深切憂慮特手諭急速馳示康熙三十五年二月二十三日諭大學士伊桑阿阿蘭泰諸皇子雖精嫺騎射然於戎事未曽閲歷即諸王之中未經身親軍務者亦多也部院大臣皆屬供職年久諳練政務故朕特加選擇調旗分置於諸皇子及王等軍中凡嚴肅營伍禁戢士卒諸務皆令其與諸皇子王等商畫從事戰陳之時亦相隨佐理諸皇子及王等如有過失即為面諍毋得瞻徇言若不聽則奏聞於朕儻不仰體朕委任之意凡壁壘不整軍旅無紀皇子及王等或有過失瞻徇顧畏罔克匡正於朕前又不行舉奏則朕必按軍法治罪決不寬宥可傳諭諸臣康熙三十五年二月二十七日諭大將軍伯費揚古副都統阿玉璽等到於大兵駐劄南口之日聞其鑿井易成不勝喜悅汝等領兵至喀倫報聞之時將汝至翁金之日約略定期奏聞又將到土喇日期詢問喀爾喀好鄉導以地名與日期約略議定奏聞朕所統之兵行走駐劄皆因西路兵之故量寬時日為此特諭知之康熙三十五年三月初一日諭大將軍伯費揚古汝至喀倫算至翁金土喇日期奏疏於駐蹕揆宿三月十九日早到汝等奏稱至土喇在四月二十四日朕所統之兵因雨雪稍阻兼以趲候重車雖急速前行於二十四日之先斷不能至土喇汝所領兵於三月十六日之雨或有遲阻將日期另行開除具奏若無所遲阻至翁金奏聞之時亦另行明白具奏汝軍中馬匹何如運米車輛已至何處得寧夏兵消息否此等情形每具疏時必行奏聞正月二十八日奔來喀爾喀之逃人言噶爾丹在土喇河上流為此特諭康熙三十五年三月十九日諭大將軍伯費揚古朕所統之兵近喀倫地方曽遣參領車克楚前鋒侍衛竒薩穆於克魯倫一帶地方踹尋蹤迹偵探消息四月十二日車克楚等至奏云臣等初九日至伊渣爾厄爾幾納地方觀看見其形迹自彼處回行於初十日遇沙津王所遣俄七爾等十五人伊等云噶爾丹於是月初從土喇向克魯倫移營第三日將我等遣回噶爾丹在達爾罕敖喇山等語由是觀之噶爾丹與朕所統之兵相近矣此賊乃狡詐叵測之人潰遁時未必回奔土喇必渡克魯倫河或自俄濃巴爾即奔塞稜格地方或繞巴顏烏闌之後詭遁汝兩路之兵知其順克魯倫而下若隨之而往落空亦未可定朕為此深切憂慮特專遣人汝大將軍費揚古將彼處地方凡賊可以脫逃之路周詳詢問加意堵截勿以其順下流而來遂輕視之為此特諭康熙三十五年四月十三日諭大將軍伯費揚古汝初七日奏疏以二十一日酉時到覽奏五月初三日可至土喇等語汝等原奏稱二十三日至土喇二十七日至巴顏烏闌朕所統之兵水草皆得無誤故擬定二十五日至克魯倫河今遣發前鋒已觀其形迹得其活口噶爾丹有向克魯倫下流情狀距朕五日之程此其間汝宜纍次遣人來奏則朕易於相待因汝等久未奏聞不知已至何處恐等待日期遲誤急速前進遂甚在汝等之先今等待與前進兩端皆屬機要事關重大汝等作何行走宜速報聞兩路之兵有先到數日者必相待而行原有成約朕兹相待而行儻不得已師期所關至大則相機而行為此特諭康熙三十五年四月二十二日聖祖仁皇帝御製文第二集卷二十五
