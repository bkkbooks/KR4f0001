body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集總目四巻第三十二古今體詩二十九首歲除前二日立春嘉平月初雪後晚坐偶有所見書懷詠鳥鎗朕親統六師至寧夏駐蹕二十日遍觀地勢游覧山形城之東南有巽湖水最清偶爾得野鴨一隻羽毛滋潤黄頭紫背胸白翅短與他處所有迥然不同業已忘矣今經十五載忽於畫中又見此禽因而有感故援筆以記詠自鳴鐘賦得禁城春色曉蒼蒼趙北口水淀作賦得時人不識予心樂檣燈檣燈調寄㸃絳唇一名南浦月五十一年春二月二十四日回鑾遇雨故作春雨行閲河長歌并序憶詠蘇州風俗偶觀演劇作三月初十日恭請皇太后雅玩齋進膳看梅花暢春園西新園觀花西苑試士大學士陳廷敬輓詩湯泉應候將軍潘育龍久任封疆故存問賜詩賜將軍吳英冬至讀易黄臘梅賦得冬日可愛詠雪并序賦得月照冰池吏部尚書引年致仕宋犖因朕六旬壽慶祝來京事畢五月内回本鄉朕念舊臣特書七言律一首以紀其事云賜大學士溫達幾暇隨筆書懷巻第三十三古今體詩四十九首五月上旬避暑熱河途中喜麥秋盈野雨暘得時賦七言一律夏日山莊二首金蓮盛放二首賦得山林引興長詠夏二首詠新竹熱河産人參雖不及遼左枝葉皆同命翰林蔣廷錫畫圖因戲作七言截句記之蘭菊圖蓮花巖松牡丹嘉禾雙穎湧翠巖觀瀑賞白蓮梨樹峪道中步輦口占二首雲巖山居即事覽孝經衍義有感而作用梌木杯器春行去歲八九月雨最多民間俗説封地雨故一冬少雪猶可支持自交立春復不見雲所以望雨甚殷昨晚宻雲四起夜深甘霖即霈田間老㓜無不舉手加額歡聲載道朕以民食為天喜均一體故賦七言近體以示羣臣春行柳絮清潭讀朱子全書有感而作暑將退浙閩總督范時崇陛見來京朕每念祖為開創宰輔父乃忠義名臣所以待之優重今因回任特書御詩餞送古北口提督馬進良以年老辭去朕念當日鷹揚百戰挽强埶鋭自守紫塞内外恬靜皆因宿將老成之所致今回林泉深所惜也故賦五言特記不忘疆場舊事也賦得萬壑泉消夏千峯翠作秋大西門升八旗官閲騎射作江南諸臣靈泉啓文明賦得恩光日邊來五十三年冬至齋戒作五十三年冬旱十二月初二日大雪二十一日又雪途中偶成賦得梅候宮中樹賦得三十六宮都是春日月無私能廣運春日郊行示地方官六首舟中鼓琴和風細雨望湖春色二首巻第三十四古今體詩三十五首舟中觀耕種春歸南方青竹叢林不乏觀玩北地氣寒非保䕶得宜即難藝植朕嘗有事河干徃來數次覽竹樹之暢茂暫時停輦即行後於禁苑種植頗蕃今經三十餘年邇來延致數畝之廣其圍至八寸徑二寸五分有零古人以竹比君子因而思及草木無知積小以至於高大人有血氣加之培養豈非國家楨幹之選歟故賦七言一律記之五十四年仲夏避暑途中瑞麥盈野賦五言律以記每見村農野老不識不知天然自得孝弟發於至性樸誠不事文辭故美其實而取先進之意賦七言一律擎蓋荷珠調寄鷓鴣天雨後戲題回文詩佛手柑賦得江城五月落梅花芝徑雲隄細雨歸舟題蘭詠剪秋羅餞大學士李光地暫回閩首秋幸出郊見收成志喜五言律二首賦得帳殿鬱崔嵬二首康熙五十四年十月初三日避暑山莊恭祝皇太后萬壽詩并序冬日可愛冬夜偶成二首餞閩撫陳璸季冬湯泉五十四年除夕偶成康熙五十五年正月元旦書懷上元前三日立春五十五年正月十二癸卯立春是日風從東北而至景雲宻布瑞雪鋪地至十三日未止書云立春與元日同占乃收成之兆故喜民有足食之慶朕慰宵旰之憂賦五言排律以記其事春寒梅遲湯泉道上遇雪口占春風扇微和二首題朱倫瀚手指畫雪梅竹二首兩廣總督趙𢎞燦陛見來京賦得二月春風似剪刀巻第三十五古今體詩三十三首春日即事曉發蘆溝六里橋鐡柱水村春水滿四澤舟中觀獵仲春聞雁閲永定河隄有序絡緯養至暮春五十五年三月下旬園中桃杏玉蘭梅花齊放其中玉蘭茂盛可觀特請皇太后一閲去歲三冬有雪至三月間農忙之際二十七日夜雨竟夕喜而成詠賦得隴麥五十五年冬謁陵作春幸風阻駐蹕白洋湖偶成小滿後偶旱途中祈雨四月二十三日甘霖大霈晚夏偶成憶揚州天寧寺竹七月十六日賜九十一歲老和尚題畫澤卜尊丹巴胡土克圖老喇嘛上壽未開新荷戲題千里眼賜松江提督趙珀緑金蓮花賜老大臣蘇州廵撫吳存禮山莊四季冬至不能全禮病中偶爾問及工部尚書翰林院掌院學士徐元夢乃同學舊翰林康熙十六年以前進士再無一人矣率賦一律以遣悶懷巻第三十六古今體詩三十八首千叟宴朕自㓜不喜厚味今年登古稀深知粗食軟蔬足以頥養天和有人進蔞蒿苦麻者因而書懷題新安道上示平藏將士六十一年春齋戒書園中無處無花觸目皆是故作此自嘲端陽久旱無雨夙夜徬徨夏至前方得普霑豐登者朕之獲福歉收者朕之失政出此入彼不能自恕故作近體一律以自遣避雨聞鐘同老侍衛佛桑花京中報到霖雨普霑夏至山莊晩眺登四面雲山夏日山莊百花齊放題山水畫山中自詠山居戲作回文題畫早御稻題畫輓總督趙𢎞燮自笑古稀立秋在六月憶陜西二首月來香膳酒自述樹葉扇惡繁華書懷中元日同僧語喜嶺外水土六十一年秋出哨回鑾
