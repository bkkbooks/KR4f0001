body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷十八敕諭諭户部建立社倉之事李光地任巡撫時曽經具奏朕諭以言易而行難爾可姑試李光地行之屢年並無成效民多怨言張伯行亦奏稱社倉頗有裨益朕令伊行於永平地方其果有成效禆民之處至今未奏且社倉於民生有益無益朕亦久留心採訪凡建立社倉務須選擇地方殷實之人董率其事其人並非官吏無權無役所借出之米還補之時遣何人催納即豐收之年不肯還補亦無可如何若遇歉收更誰還補耶其初將衆人米榖扣出收貯於無厫之地看守無人及米石空缺之時勢必令司其事者賠償是徒將衆人之米棄於無用而司事者無故為人破産賠償矣社倉之設始於朱子其言載於集內此法僅可行於小邑鄉村若奏為定例屬於官吏施行久之必於民無益前朕巡幸西省親歷山陜地方山川形勢皆悉知之其地本山多水少絶鮮河渠雖有水泉亦不能暢引溉田設果有灌注之水而社倉果能有效甚多裨益前人豈不知乎今朱軾以建立社倉引水入田具奏此事交與他人不得即令伊久住彼處鼓勵試行若如所言有效甚善康熙六十年九月初六日諭議政大臣策妄阿喇布坦於去歲將沿界之人收去土魯畨徊人移往哈喇沙兒處其阿爾泰烏魯木齊等處無一哨汛看其寂然以處則策妄阿喇布坦身死之信似有形像亦不可便以為真也將軍祁里德奏稱策妄阿喇布坦若死則此機不可失已將軍兵預備整齊等語著行文大將軍王富寧安傅爾丹祁里德等其策妄阿喇布坦處可照原議今嵗止將土魯畨之處堅守為要阿爾泰土魯畨一帶汛地宜加動勵冬令雪降草枯之際不可各思立功輕舉深入今嵗宜將兵丁馬匹一應什物整齊備辦以俟來年大舉征剿令議政大臣録寫諭㫖送去康熙六十年九月初十日諭大學士馬齊尚書孫渣齊徐元夢侍郎查弼納學士阿克敦德音額赫納直𨽻總督趙宏燮奏稱河南黃沁堤岸衝決水勢泛溢至長垣等處朕即遣官查視所決地方據司官富爾賽回奏河南武陟縣黃沁堤岸潰決由長垣流入山東張秋鎮又據山東巡撫李樹德奏稱河水泛溢自直𨽻開州習城流入山東張秋鎮等處由鹽河入海以致運河堤決漕船阻滯其衝決堤岸現今修築朕思此衝決之處只可略加修防使漕船無阻如竟行堵塞水無歸泄之地他處必又被衝決斷乎不可開州係古黃河故道今黃沁泛溢由開州至山東地方已成河道現今決處堵塞完日不使沁水入黃直引至山東或有裨益亦未可定俟朕另有諭㫖朕留心河務各處黃河渡口俱曽親歷詳察適遣往看河司官所呈圖樣及李樹德所進河圖朕俱詳覽知之最明爾等繕寫諭㫖發與張鵬翮伊所審事畢著即速㑹同總漕施世綸至張秋鎮等處詳細查勘料理使漕船往返不致遲誤如張鵬翮已回即於接㫖之處速行前往至於修築決河甚屬緊要朕自京中另遣專官著總河趙世顯將熟練河務官員工役派出并修築所用下掃物料多行備辦作速發往河南衝決地方特諭康熙六十年九月十四日諭大學士馬齊尚書孫渣齊徐元夢侍郎查弼納學士阿克敦德音額赫納朕每留心河務各處水源及去來之路朕皆知之直𨽻山東河南地方朕皆親歷詳視洞悉於衷故指示繪畫此圖直𨽻總督趙宏燮奏稱黃沁河岸衝決泛溢漫及長垣等縣召扈從大臣諭以堵築之後不使沁水入黃引入山東漕河於運道民生大有裨益又山東巡撫李樹德奏稱泛溢之水自直𨽻開州流入山東張秋鎮等處衝決運河西堤被衝之處現在堵築朕令張鵬翮施世綸前往山東查勘衝決堤岸略為修防但使漕船往來不致阻滯而已若竟行堵塞水無歸泄之地他處必又被衝決矣此諭㫖內已將引沁入運有益之處一併諭及朕今詢九卿諭㫖內祇及黃河衝決並未言及引沁水入山東運河今覽九卿摺奏堵塞黃河引沁入運所議深合朕心並無異處爾等將此圖看畢發與九卿即令定議具奏將來引沁入運之後遇水大時流至天津恐河身不能容納必令於鹽河泄其水勢方好直𨽻山東河南應賑濟被水之民除該督撫自行查奏外至堵築黃河衝決引沁水入山東運河之處朕另遣大臣康熙六十年九月十八日諭大學士馬齊尚書孫渣齊徐元夢侍郎查弼納學士阿克敦德音額赫納堵築黃河漫溢工程此第一緊要之事著副都御史牛鈕侍講齊蘇勒員外郎馬泰前往監修其堵築時宜先於上流建挑水埧以殺水勢其應大應小不可一樣俟沙淤後再漸次加築則漫溢水勢自平而堵塞不甚費力矣朕於清口建築挑水埧時曽經指示此事齊蘇勒馬泰等悉知至前項工程毋吝惜錢糧河南地方河底不凍今冬宜作速興築其建挑水埧之時應挑引河黃河有曲折之處即成洲渚務詳勘酌量取直挑挖引河俟黃河決口堵塞報竣後引沁濟運時分水龍王廟之中八閘北八閘春時水淺船行有阻將沁河之水於此處引入運河如不能容納由鹽河瀉其水勢自於運道有益分水龍王廟南八閘水多不需水濟此等處朕下㫖與張鵬翮令學士格爾布前往宣諭再徐州下流黃河無虞獨徐州上流黃河多有沙淤不可不防衝決將此宣諭該管各官預先防備康熙六十年九月二十七日諭大學士馬齊等臺灣地方添兵一事九卿議奏時朕再下㫖意現在九卿㑹議必預先知㑹伊等則所議甚易福建總督巡撫提督俱奏請臺灣添兵朕意添兵無用也臺灣地方水師營著副將一員兵二千名陸路營著副將一員兵二千名駐劄水師有事陸路可以照應陸路有事水師亦可照應其臺灣總兵官移於澎湖亦著兵二千名駐劄令其管轄均有裨益至駐劄之兵不可令臺灣人頂補俱將內地人頂補兵之妻子無令帶往三年一換每年自京派出御史一員前往臺灣巡查此御史往來行走彼處一切信息可得速聞凡有應條奏事宜亦可條奏而彼處之人皆知畏懼惟於地方事務不可令管理也將此㫖傳示九卿康熙六十年十月初五日諭大學士馬齊松柱蕭永藻王頊齡學士阿克敦德音額赫納登德蔣廷錫勵廷儀魏廷珍今年秋審情真事件俱已逐一詳閲其可矜緩决者皆係各省督撫詳審具題又九卿再加詳定朕好生之心不忍詳覽蓋矜疑之內或有情罪可惡者朕若深察或致改重也其下㫖刑部諭知九卿康熙六十年十月初五日諭大學士九卿詹事科道福建總督滿保提督施世驃巡撫吕猶龍摺奏臺灣颶風大作官兵商民損傷甚多朕心深為不忍前朱一貴等謀反大兵進剿殺戮頗多今又遭此風災書云大兵之後必有凶年兹言信然總因臺灣地方官平日但知肥已刻剝小民激變人心聚衆叛逆及大兵進剿征戰數次殺戮之氣上干天和颱颶陡發倒塌房屋淹沒船隻傷損人民此皆不肖有司貪殘所致也今宜速行賑恤以慰兆民爾等即㑹同詳議於一二日內面奏康熙六十年十月初九日諭大學士馬齊等原任大學士熊賜履居官清正學問優贍朕每念舊勞不忘於心其長子素有風疾其孫亦故所存幼子二人朕每諭織造李煦曹俯周恤其家今其二子來京觀其氣質尚可讀書熊賜履屢為試官所取門生不下千人身後竟無一顧恤其家者朕於故舊大臣身殁之後不時存問蓋共事日久不忍忘懷待滿漢臣工皆然朕天性如此也當熊賜履居官時政事言論有不當者朕未嘗不加以訓飭即凡大臣皆然及已去位身故則但念其好處如李霨王熙之孫勵杜訥之子俱現為京職身居大位現任大學士王頊齡之子王圖炳亦在內廷行走沈荃之子沈宗敬為人參劾朕念伊父存日勤勞姑留其職杜立德張玉書之家常時問其子孫何如至於讀書學問之事必思及李光地其子姪亦現為職官此皆爾等所知也今熊賜履二子家甚清寒爾等商議作何扶助令其讀書成就具奏併諭漢大人等康熙六十年十月十四日諭兵部施世驃效力年久勞績懋著沿海水師營務極為諳練簡任提督整飭營伍實心盡職當臺灣匪類竊發即調遣官兵親渡海洋屢次大敗賊衆七日內克復臺灣擒獲賊首朱一貴等俾地方寧謐克奏膚功殊屬可嘉海疆要地正資料理忽聞將星殞落臺灣朕心深為悼念著給還所降之級其加宫保賜恤之處著察例具奏伊所借藩庫銀一萬兩著賞給不必償還將伊安葬福建之處俱著照伊所請行此㫖著遍諭督撫提鎮康熙六十年十月二十九日諭兵部據嶽鍾琪奏賊畨伏兵千餘突出對敵被我土兵連敗數陳逃奔過河復攻取下郭羅克之吉宜卡等二十一寨殺使賊畨甚多連夜進兵直抵中郭羅克之納務等寨賊畨猶敢對敵我兵奮不顧身自卯至酉連克一十九寨斬殺三百餘級擒獲賊首酸他兒蚌索布六戈復親督官兵抵上郭羅克之押六等寨正欲攻取該寨頭目旦增等將首惡假磕併為從格羅等二十二名綁縳獻出率領闔寨男婦老幼叩頭求饒將為從賊畨盡行正法首惡酸他兒蚌索布六戈假磕解送等語殊屬可嘉在事官兵著議叙具奏康熙六十年十二月十六日諭議政大臣等朕於此數日將軍務詳細尋繹伊里嶺險峻策妄阿喇布坦之兵被我兵連敗數次死傷頗多策零敦多布等人衆死亡大半棄招逃遁深知力不能敵收衆在伊里地方忍死堅守三嶺我兵至則捨死抵敵如勢不佳再尋藏躲之處我大兵雖云今年進剿倘於三嶺被阻或遲延日月或策妄阿喇布坦戰敗帶領妻子遁走則如之何我將追之否乎軍機事務關係重大不可不詳加定議今策妄阿喇布坦伎倆我已悉知而策妄阿喇布坦亦深知我之可畏斷不肯休必深入而旁掠如我遣使至策妄阿喇布坦處彼必疑我兵不能進取有講和之意故澤卜尊丹巴胡土克圖喇嘛從前曽數次遣使於策妄阿喇布坦處胡土克圖遣人去時此處可將發往策妄阿喇布坦之書信撰寫發與胡土克圖令胡土克圖選擇好喇嘛為使作速差往其去人越阿濟嶺由土魯畨急速前去不久可到彼處信息情形亦可探知如胡土克圖使者善說策妄阿喇布坦而伊心知悔懼將喇藏妻子家屬并我處被擒之人送來請罪實心歸順自後再不敢侵犯邉界如此便可另行商酌矣倘策妄阿喇布坦死亡或彼內變生亂求我罷兵此際則理應進兵一面前發一面再遣使者亦未為遲也我兵或向伊里即進或將土魯畨固守漸進烏魯木齊等處地方駐扎整飭營寨相機而行或各路進擊至於大兵糧餉作何運送務令妥確之處議政大臣并軍前召回將軍大臣等㑹同詳議具奏康熙六十一年正月十四日聖祖仁皇帝御製文第四集卷十八
