body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷二十三記刈麥記塞外地寒最宜禾黍邇來中外一家版圖萬里朕避暑山莊歷年已多今百榖齊成與內地相似不過遲十數日而已故種麥者頗蕃山莊苑內麥榖黍稻皆寓焉從來稼穡之艱不可不知亦不可虛設朕念切民依痌瘝一體年近七旬精力漸衰扶杖而閲耕種臨畦而觀刈穫遇雨暘時若則收割之際蒼顔野老共慶有秋黃口稚子無愁乏食此朕一時之真樂也五十四年夏六月小暑乃苑中刈麥之候薦新觀成如雲表盛晨氣曖風秀􅀢標竒逺聞各省麥秋相同此目前之實景也孔子云吾不如老農老圃孟子云從其大體為大人從其小體為小人農夫足食則樂天下至廣兆民至衆天時之不齊地脉之不一吾之樂民有食也以目前之實景而且不能必其盡同又如此嗚呼豈如田野村夫憂樂止繫於身家而計慮不及於逺大乎故心之勞逸不可同日而語也夫碑記顯應寺碑記都城之西有佛舍一區創自前明中葉雖歷加修葺而歲月寖久復燬於火舊觀既替香界就荒非所以崇象教廣禪恱也朕以古剎勝因宜規整飭爰發帑金鳩材董役經始於康熙五十年十二月落成於五十八年正月不庳不侈棟宇一新答士庶敬信之忱慰緇衲皈依之願用錫嘉名顔為顯應蓋以慧炬祥光無微不顯慈雲法力有感必通澤萬品於真源耀十空於寶智同圓妙果長稔福田云爾􅀢髻山玉皇閣碑記距京師百里有山曰􅀢髻𨽻懷柔縣兩峰髙矗望之如髻故得是名自元眀以來號為近畿福地因上有碧霞元君之祠是以每嵗孟夏四方之民㑹此祈禱者駢肩叠跡不可勝計古稱積髙之區神明所舍况兹山北倚紫塞南拱神京岡巒回合蜿蜒磅礴而鍾秀於是則其神氣之感數有靈應理固然也康熙五十二年值朕六旬誕期諸臣民就兹山瞻禮為朕祝禧因共建玉皇閣以祈延夀經始於癸巳三月十八日落成於甲午三月十八日而請記其事朕御極五十餘年夙夜孜孜惟體上帝仁愛斯民之心以撫綏天下幸四海清晏年榖順成朕與天下臣民得同享太平之福者皆上帝之眷佑也朕之祇承於上帝者惟在天下臣民之永安而天下臣民之祝願於上帝者惟在朕躬之永年然則兹閣之建即上帝之陟降監觀於是乎在矣爰立貞珉載其始末以傳永久云湯山龍尊王佛廟碑記塞外山脉自西北來至熱河岡巒回合形勢欎盤環左右百里間多名泉而山莊之東北有湯山其泉湧出山腰自然而溫浴之蠲煩除疴𨗳和怡性朕始經其地謂水候微凉更得暄暖乃宜於體比再往則加燠矣記稱邱陵川谷能出雲為風雨者皆有神况是山藴金砂之氣蒸為醴液又應候如意豈非有神靈默相者歟爰於泉上繚以周垣構行宫數椽為避暑休沐之所而於其中建龍尊王佛廟以奉香火焉考湯泉著於史傳者驪山天都最為名蹟其他亦散見於山經雜志而此地自古未入版圖故川原之勝蔽翳於荆榛沙磧間幸今中外一家兹泉始得呈其靈異古人謂地脉之興亦有待而然非虛語也夫君子澡身浴德如沃盥以去垢朕於此竊附湯盤之警期與天下日新而所以膏澤吾民以及䝉古諸部落使咸夀考康寧者則不能無望於佛之庇祐焉是為記碑文資福院碑文辛丑春澤卜尊丹巴胡土克圖諸䝉古汗王貝勒貝子公台吉他布囊等赴闕稽首合詞奏言皇帝纂承鴻業六十餘年天地清寧海宇安泰邉塞逺人飯和禔福為日久矣往者噶爾旦恃强侵軼皇帝親總六軍蕩除狡寇安集散亡龍沙瀚海百十部落普䕃大慈安土樂業垂三十載策妄阿喇布坦凶蘖之餘肆其頑悖欲滅法教皇帝討罪救災命帥受算深入曠古絶域斬俘逐北遂恢故宇振法輪青海以南三危以北百蕃之長悉心向化欣睹天日臣等伏思皇帝神功巍煥景祚綿逺亘古未覯凡有知識咸思仰報况臣等沐纍朝祿賜受皇帝髙厚踴躍烏能自己乞於京師鼎建梵剎申頌無疆且以木石磚甓之餘於安定門外立十方院為飯僧所徒衆自逺至者得有棲止朕以建寺煩費詔諭止之而允其立院之請諸汗王等復奏言禁城西之崇國寺故西僧香火也今願新之為皇帝祝釐地朕以其誠懇亦俞允之夏五月十方院建修功先竣諸汗王等請院額朕賜名曰資福蓋嘉諸䝉古平日服事之勤而取釋氏廣資福緣之諦也書曰而康而色曰豫攸好德汝則錫之福傳曰見於外而有安和之色發於中而有好德之言則錫之以福也諸䝉古貞一乃心恪奉藩職協和鄰部輯睦姻親天必迎其善意而降之以吉祥將見户口愈滋畜牧益盛朕樂與共太平有永而勿替也是為記溥仁寺碑文蓋聞遍覆含宏者造化無私之體民胞物與者大君宗子之心古帝王繼天運世保合太和凡日月照臨聲教暨訖必使咸躋夀考各遂生成納八紘於雨露之中載殊方於袵席之上深仁怙冒至化洽周斯大同之極規實無我之洪願也朕誕膺鴻歷五十餘載布信推誠遐邇一體藩臣部長悉我屏翰絶幕荒陬皆吾黎庶故神倉玉粒常給以餱糧天駟月題每貸之牧種休息長育匡翼勞來宵旰彌勤終始無怠朕惟期漸恩敷德俾皆樂我太平諸藩亦嚮化傾心靡不謹爾侯度雨風時若生齒日蕃水草茂滋産畜殷碩邉籬甌脫永息侵陵瀚海龍沙羣資樂利綏安撫輯數十年養之教之膏沐㴠濡至今日庶矣富矣乃者朕六十誕辰衆䝉古王台吉等咸詣闕廷奉行朝賀不謀同辭具疏陳懇願建剎宇為朕祝釐朕鑒其悃誠重違所請念熱河之地為中外之交朕駐蹕清暑嵗以為常而諸藩來覲瞻禮亦便因指行宫之艮隅特許營度為佛寺陶甓於冶取材於山工用無輸挽之勞金錢無踰侈之費經始訖功告成不日琉璃梵殿同白馬之莊嚴瓔珞祥雲􅌂龍華之色相金峰聳翠靈鷲飛來暖溜蒸砂寶池分出林成福德喬木千章界是伽耶香園十頃固天開選佛之場地藴清凉之境也朕歷觀往史遹遡前朝版籍有區幅貟未廣兹熱河之奧壤乃紫塞之神臯名號不掌於職方形勝無聞於地志朕以渺躬撫有四海邉壖之外悉為畿甸諸藩於此建寺介福率先恐後無小無大罔不來同朕用自慰更用自惕焉書不云乎一人有慶兆民賴之釋典亦云若彼大雲䕃注世界博稽旁考鑒於朕𠂻觀我觀民思維此理特賜寺額曰溥仁將欲汪濊之澤均霑於率土升恆之慶廣洽於普天藉諸藩祝上之忠誠為萬方祈純嘏之錫以佛氏施仁之因果共諸藩保鞏固之休爰紀斯文勒諸貞石彚宗寺碑文我國家承天順人統一寰宇薄海內外悉賔悉臣自太祖太宗握樞秉軸駕馭風雲䝉古諸部相繼效順暨於朕躬克受厥成前所未格罔不思服惟喀爾喀分部最多而又强盛朕綏德輯威薰陶漸革二十餘載七家之衆既震且豫咸來受吏乃除其頑梗扶其良弱錫之封爵畀以土疆朕親北巡以鎮撫之於康熙庚午之秋大宴賚於多倫諾羅四十八家名王君長世官貴族靡不畢集拜觴起舞稽首踴躍蓋至是而要荒混同中外一家矣酺賜既畢合詞請曰斯地川原平衍水泉清溢去天間芻牧之場甚近而諸部在瀚海龍堆之東西北者道里至此亦適相中而今日之筵賞敷錫合萬國以事一人又從古所無也願建寺以彰盛典朕為之立廟一區令各部落居一僧以住持朕或間歲一巡諸部長於此㑹同述職焉至於今又二十餘年矣殿宇廊廡鐘臺鼓閣日就新整而居民鱗比屋廬望接儼然一大都㑹也先是寺未有額兹特允寺僧之請賜名曰彚宗蓋四十八家家各一僧佛法無二統之一宗而㑹其有極歸其有極諸䝉古恪守侯度奔走來同猶江漢朝宗於海其亦有宗之義也夫是為之記以垂永久云平定西藏碑文昔者太宗文皇帝之崇德七年班禪額爾德尼逹賴喇嘛固始汗謂東土有聖人出特遣使自人跡不至之區經讎敵之國閲數年始逹盛京至今八十載同行善事俱為施主頗極安寧後逹賴喇嘛之歿第巴隱匿不奏者十有六年任意妄行喇藏滅之復興其法因而允從喇藏青海羣衆公同之請中間策妄阿喇布坦妄生事端動凖噶爾之衆肆行奸詐滅壞逹賴喇嘛并廢第五輩逹賴之塔辱衊班禪毁壞寺廟殺戮喇嘛名為興法而實滅之且欲竊據土伯特國朕以其所為非法爰命皇子為大將軍王又遣朕子孫等調發滿洲䝉古緑旗兵各數萬歷烟瘴之地士馬安然而至賊衆三次乘夜盜營我兵奮勇擊殺賊皆喪膽逺遁一矢不發平定西藏振興法教賜今呼必爾罕冊印封為第六輩逹賴喇嘛安置禪榻撫綏土伯特僧俗人衆各復生業於是文武臣工咸謂王師西討歷瘴癘險逺之區曽未半載輒建殊勳實從古所未有而諸䝉古部落及土伯特酋長亦合詞奏曰皇帝勇略神武超越往代天兵所臨邪魔掃蕩復興䝉古向所尊奉法教坎麻藏衛等部人衆咸得拔離湯火樂土安居如此盛德大業非臣下頌揚所能宣罄請賜御製碑文鐫勒招地以垂永久朕以何功焉而羣衆勤請不已爰紀斯文立石西藏俾中外知逹賴喇嘛等三朝恭順之誠諸部落纍世崇奉法教之意朕之此舉所以除逆撫順綏衆懷逺云爾聖祖仁皇帝御製文第四集卷二十三
