body:
  text: 欽定四庫全書卷聖祖仁皇帝御製文集卷三十一古今體詩五十二首元旦廣廷揚九奏玉帛麗朝光恭已臨四表埀衣馭八荒上元月華連晝色燈火雜星辰彩仗移雙闕瓊筵會大臣覽貞觀政要春陽淑以嘉流雲灑几案及此聽政餘縑緗獲披玩寥寥三古後載籍亦炳煥俯仰千年餘盛治數貞觀修德偃干戈措刑空狴犴海外奉車書臣民登燕衎事往迹尚存流風照觚翰洋洋四十篇可以一辭貫仁義有明效非由事擊斷鄙哉封倫言相去邈河漢慈寧宫問太皇太后安定省深宫曙氣催承恩獻壽捧霞杯晨昏敬覩慈顏豫不盡歡欣踴躍回月影送樓臺照水明金波蕩漾逺含清西山色淨雲初散南苑風和令正行昭仁殿雕梁雙鳳舞畫棟六龍飛崇髙惟在德壯麗豈為威春夜玉爐煙靄盡夜靜百花香曙氣浮丹陛春光拂象牀賜舊時講學几前燭下長談論今日忽為埀老人憐爾林泉安淡薄因思疇昔侍楓宸賜撫逺大將軍圖海二首兩朝密勿重元臣秉鉞登壇西定秦鐘鼎功名懸日月丹青事業畫麒麟其二威名萬里作長城壁壘旌旗壯逺征綏靖邊陲馳露布凱旋立奏泰階平春日佳氣山川浹地行物隨節候變初晴雪消樹底花爭發氷泮池頭草欲生夜半覽書銀蠟短觀象玉衡長夜半無窮意心為念萬方琴嶧陽桐百尺斫為鳳凰琴調絲坐石上宛若松風吟希音合太古貴以鍊豫心晚春遊幸感懷岸花芳且落樹木含春光思賞腸應斷長懷萬古傷河春風野水穠花發一道帆檣帶柳煙影動長橋橫螮蝀岸鋪芳草近南川白洋湖遙看白洋水帆開逺樹叢流平波不動翠色滿湖中船獵萬人齊指處一鳥落晴空攜琴鼓棹返樂與大臣同水村孤村緑塘水曠野起春雲槐栁勝南苑青莎有鷺羣鄚州河道藻密行舟澀灣多轉楫頻帆懸風正處煙火近通津喜雨暮雨霏微過鳳城飄飄灑灑重還輕暗添芳草池塘色逺慰深宫稼穡情賜寧古塔將軍巴海詩並序鎮守寧古塔等處將軍巴海豐沛舊臣疆場重寄宣威布德招徠逺人朕甚嘉焉爰賜篇章以旌乃績夙簡威名將略雄髙牙坐鎮海雲東旌麾到處銷兵氣壁壘開時壯武功盡使版圖歸化日逺教邊徼被皇風酬勳世錫丹書重勉爾長思報國忠橋望郊原浮麥氣池沼漾青蘋夏日臨橋望薰風處處新郊外即事初蟬鳴暑氣雀噪滿林枝蜂蝶花間舞有情人不知郊外偶作乳燕銜泥花影靜鳴鳩喚雨樹林深豫遊不獨題詩意要識熙熙暭暭心馬上口占夏日橋頭望逺山兒童戲水水潺潺煙雲數里方知異野樹汀花白晝間復道口占深深復道逺停輦問宫官內苑薰風起榴花滿御闌夏日登景山同翰林張英髙士竒作日暮登山覽八荒翰林隨輦進辭章君臣同樂松陰下時雨將來入未央夜靜讀書九重夜靜御爐香墳典披觀意味長為念兆民微隱處孜孜不怠撫遐荒內廄閲馬龍種齊嘶御廄旁追風逐日似飛翔踏塵不染凌霄志箇箇真堪號驌驦夏日同大學士明珠暨諸侍衛過黑龍潭途中作駿馬駸駸踏緑蘋羽旗豹尾映龍鱗暑中荷鍤方知苦停輦觀苖問稼人黑龍潭暗通山下草流出澗邊花空潭深靜處灑翰動龍蛇由廣泉寺至臥佛寺巖邊青竹低臨水雲外嵐峰半入天僧舍無人常寂寂山門洄繞是寒泉山寺晚景岸積青苔厚藤抽紫蔓長徘徊風景異玩賞對斜陽詠臥佛寺古樹喬木婆娑陰正肥夕陽相對嶺崔巍薰風拂樹涼雲起暮景蒼然送輦歸駐蹕碧雲寺山寺通幽境鶯啼緑樹枝幡虹迎玉輦剎鳳駐雲旗翠麓三乘闢佳辰萬騎宜松陰輝落景遊豫近臣知碧雲寺臨泉望月碧雲夜望月初圎星斗輝煌照九天滴溜涓涓無止息此心長使若清泉碧雲曉起山中曉起聽蟬鳴遙對峰岑霽色清洞壑有年竒樹老夢回疑是在蓬瀛再賦碧雲曉景夏早日方長南風草木香清涼飄御扇荒剎得恩光洪光寺盤道白雲飛夏日斜徑盡﨑嶇仙阜崇髙異神州覽眺殊來青軒臨眺二首搖拂煙雲動翠旗登臨翰墨每相隨山河景象無窮意俯瞰人情因物知其二來青髙敞眺神京斜倚名山澗水清此日君臣同覽賞村村雞犬靜無聲法海寺瞻皇考御書敬佛二字重來瞻御筆懷感動心神丕烈邁前代鴻休啓後人興文盛禮樂偃武息兵民法則光華逺千年照佛輪坐法海寺偶吟縱目西山宜永日開襟五月似髙秋萬幾偶暇因遊豫期與黎民藥未休賜聖感寺僧海岫翛然老衲淨塵緣臺殿參差起瑞煙馴鴿簷前應受戒遊鱗花下亦參禪駐蹕石景山駐蹕荒亭日欲斜潺湲石溜滴雲霞鸞旗飄動連香草龍騎驂驔映野花巖洞幽深無鳥迹峰崖髙處有人家青山緑水誰能識懷古登臨玩物華石景山東望車書混一業無窮井邑山川今古同地鎮崚嶒標異秀鳳城遙在白雲中登戒壇樓閣髙低樹淺深山光水色日沉沉碧墀靜照寒松影清晝蟬聲響緑隂下戒壇將至潭柘馬上同士竒聯句二首嶺腹層層小徑斜御製穿雲陟盡石㟏岈臣髙士竒澗中草屋流泉繞御製萬匹龍驤擁翠華臣髙士竒其二蟬鳴草木動薰風御製蛺蝶雙來引御驄臣髙士竒時有雙蝶飛導仗前潭柘幽深聊駐輦御製省方不與豫遊同臣髙士竒潭柘寺偶作怡神水樹清襟洽滿目竒峰入夏雲微起涼風響萬籟山中鶯囀奏紛紜詠潭柘寺竹翠葉才抽碧玉枝經旬清影上階墀凌霜抱節無人見終日虛心與鳳期石景山望渾河石景遙連漢渾河似帶流滄波日滚滚浩渺接皇州聖祖仁皇帝御製文集卷三十一
