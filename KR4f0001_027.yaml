body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻十一勅諭諭大學士勒德洪明珠李霨杜立德馮溥朕萬幾餘暇留心經史時取古人墨蹟臨摹雖好慕不衰未窺其堂奥嵗月旣深偶成巻軸卿等佐理勤勞朝夕問對因思古之君臣美惡皆可相勸故以平日所書者賜卿方將勉所未逮非謂書法已工也卿等其知朕意康熙十九年六月二十七日諭翰林院掌院學士庫勒納等卿等日侍講筵夙夜匪懈啓沃之暇每以朕書為請朕萬幾餘閒時取古人墨蹟臨摹雖好慕不衰實未窺其堂奥何可示人卿等既為文學侍從之臣即有成就德業之責故因所請輒以頒賜朕意其悉之康熙十九年六月二十七日諭侍郎宜昌阿尔等所行事宜俱各得當甚為嘉悅朕意所及數事特行宻諭一尚之信雖經犯法伊等妻子不可令卑賤小人凌辱應查明嚴禁遣人䕶送来京一廣東所有大市小市之利經藩下諸人霸占者無算可㑹同廵撫詳察應歸百姓者題明仍歸百姓則廣東人民得霑無窮之惠矣一聞藩下所屬私市私稅每歳所獲銀兩不下數百萬當盡充國賦以濟軍需一各省商販人等欲藉藩下行勢投入者甚多皆須查明應斷出者即行斷出其不應斷出者宜盡行遣發来京勿致逃亡隱漏一尚之信等所有銀兩盡行查明用充軍餉已有諭㫖務須詳行稽查毋致有遺漏侵剋等弊康熙十九年八月三十日諭兵部目今四方悉已蕩平惟滇黔餘孽尚未殄滅前經㑹議各路官兵俱於八月内進剿兹師期已届士馬飽騰正宜分路竝進奮勇長驅埽除殘寇以靖地方尔部作速傳諭湖南四川廣西大將軍將軍督撫提鎮等官整搠兵馬星馳進剿勿得借端推諉躭延時日有逗留不前者即行重處又聞各處綠旗兵丁將帥不恤軍士令其為滿洲大兵蓋房割草餧馬及私行役使恣意虐害以致兵丁苦累如桑格標兵潛逃一千有餘皆由於此不思為將者與士卒甘苦相同加意愛養方可責其用命今罔恤卒伍惟便私圖貽誤軍機深為可惡尔部即通加嚴飭以後有仍蹈前轍者即行察叅從重治罪特諭康熙十九年閏八月初九日諭盛京將軍安褚䕶自古身任封疆節鉞重臣不避小人疑忌惟計有益於國有利於民耳為君者視其事之可否折衷而行之未嘗偏執意見過寛過猛也凡事不一有創始則難行之乆而乃定者有自始至終不可變易者有現行似乎未便而日後稱便者有目前行之雖善乆而弊生者固不可執一而論也據尔奏疏所稱請發嚴㫖將尔原議欲行鹽引乃又不能禁戢兵丁以致搶掠衆怨沸騰未經陳奏等處一併聲明從重處分等語朕㫖昭如日星設無明白實據所係匪輕今若如尔等所請遂有議處之㫖是無實據何以服人又疏稱凡闗鹽法諸犯盡行赦宥領引諸商盡行革除被搶諸物交與盛京刑部酌量令其賠補則遼東諸人咸戴皇恩如天如日等語但差往大臣察審將竣是非當有定論正水落石出黑白分明之時矣無故遽改前㫖恐衆意以為法令更張厭苦煩擾致生疑惑難與遵行將軍所奏雖是此事結案在邇不便更有諭㫖兹因將軍密陳故不逐款批答擇其要者將大意手草密諭康熙十九年九月初六日諭吏部言官職司耳目必學識優長練逹政務乃克勝任近以科臣孫纘條奏行取考𨕖應加考試因將見任科道各官俱行親試觀其才品以昭澄敘姚締虞王曰温李迥條奏詳明可稱言職并張鵬等俱著留任其益加勉勵殫心職業以副任用傅廷俊和鹽鼎孫纘才識庸常不稱言職俱著降三級調用不准以加級紀錄抵銷尔部即遵諭行特諭康熙十九年十月二十日諭三法司帝王以德化民以刑弼教莫不敬慎庶獄刑期無刑故讞決之司所闗最重必聽斷明允擬議持平乃能使民無寃抑可幾刑措之風近覽法司章奏議決重犯甚為繁多愚民無知身陷法網或由敎化未敷或為饑寒所迫以致習俗日偷愍不畏法每念及此深為憫惻在外督撫臬司及問刑各官審理重案有律例未諳定擬失當草率完結者有膠執成見改竄供招深文羅織者有偏私索詐受囑徇情顚倒是非者有一於此民枉何由得伸以後著嚴加申飭内外大小問刑各衙門洗心滌慮持廉秉公凡問理刑名務期原情準法協於至當不得故縱市恩亦不得苛刻失入痛改積習加意祥刑以副朕尚德好生欽恤民命至意特諭康熙二十年正月二十八日諭翰林院日講官敷陳經史日侍顧問贊襄典學職務繁多宜廣其員以彰右文之治見在滿官足用漢官尚宜増添著即開列應用各員職名具奏康熙二十年正月二十八日諭吏部都察院國家設官分職各有專司必勤勵辦事乃克勝任近見各衙門官員有虚糜俸祿懶惰不上衙門者有老疾孱弱不能任事者應分别勤惰以示勸懲堂上官員尔等開列具奏所屬官員㑹同各該堂官分别議奏康熙二十年正月二十八日諭都察院祭祀以承上下神祇理宜敬愼近見陪祭各官跡渉慢易班行不整笑語自如殊失執事有恪之道尔衙門職在察劾未見指名叅奏所司何事其嚴飭之康熙二十年正月二十八日諭大學士明珠太皇太后駕幸湯泉頤養甚宜起居萬安朕體佳善扈從諸臣亦皆安好聞在京新滿洲患病者多朕在内時賜醫調理常奏速愈今者無人照看此後上三旗新滿洲有抱病者尔須不時詢問即傳㫖令在内良醫調治便中時將患病與全愈之人明白奏聞尔身佳否為此特諭康熙二十年四月初五日諭大學士明珠朕聞京城左右亢旱農事堪憂尔可傳諭禮部著行祈雨再傳諭内務府總管噶禄照前祈雨例於西山等處虔行致禱朕體甚佳皇長子亦安尔近佳否為此特諭康熙二十年四月二十二日諭户部比年以来宣府大同疊罹饑饉而邉外蒙古亦復凶荒故發宣大存貯米石盡用賑濟朕思邉境糧儲所闗最要古稱九年六年之蓄蓋合侯甸藩畿通為之計豈僅謂公廩之充盈已也養人足食道貴變通可發京倉米二十萬石前運宣大備用其運送米石用就近地方驛站車夫不致糜費尔部核議具奏康熙二十年五月初十日諭戸部宣府太原大同等處近罹災傷人民困苦所徵房號銀兩應與除免尔部議奏康熙二十年五月十二日諭大學士勒德洪明珠李霨馮溥學士噶爾圖希福格爾古德李光地張玉書聞蘇尼忒人所有米糧止能支至六月應預運米或數千石或萬石送至宣府備用其運送米石著用兵部馬車并大内以下八分公以上酌捐車輛大臣等亦捐車輛速運尔衙門㑹同戸兵二部議奏康熙二十年五月二十五日諭戸部前因大同等處地方自去歳饑荒百姓無食流離失所已經發銀二十萬兩遣官賑濟又將應徵房稅悉與豁除務期小民家室復完不失故業今復差官各處察㸔閭閻尚多逃亡田土仍然荒棄耕種無資衣食奚頼朕心深為憫惻所有本年應徵地丁各項正賦并歴年帯徵拖欠錢糧盡行蠲免但小民困苦已極猶恐無濟目前此外有何應行事宜可以速拯災黎俾得存活者尔部即行詳議具奏以副朕軫恤百姓至意特諭康熙二十年五月二十七日諭禮部奉聖夫人朴氏保育先皇恭勤克著䕶朕沖幼淑惠彌昭提抱之殷靡間於夙夜恩勤之篤乆歴夫歳時朕眷念前勞已錫封典兹聞奄逝軫悼良深應得恩卹宜從優厚尔部即詳察定例具奏特諭康熙二十年六月十五日諭侍講高士竒尔在内以来勤慎盡誠夙夜匪懈近日聞尔偶得暑病朕甚憫之每日問醫方知少痊兹特遣内使往視并賜頤養之資尔當安慰自怡省思慮專精神輔以醫藥可也特諭康熙二十年六月二十七日諭兵部在外武職官員有未經從逆効力行間勤勞日乆者枕戈臥甲躬冒矢石建立功績雖經敘錄加銜加級但不能即補實缺仍留該標投閒置散虚糜嵗月或赴部候補又因無缺守候遲延資斧匱乏俱深可憫此等軍前効力之人應令本身赴部驗明原劄即行推補其作何錄用尔部確議具奏特諭康熙二十年七月十七日諭吏兵二部大同地方連年旱荒百姓困苦以致流離失所就食他方因而田地荒蕪生計不遂今已屢行賑濟蠲免各項錢糧又聞雨澤霑足秋成有望但饑饉之後安養生全必須廉能官吏方克加意招徕留心撫字見任府州縣衞所等官貪劣不職者照常叅處外其才具平常者該撫酌量更調本省簡僻之缺仍扵通省見任官員内選擇清亷愛民者調補大同所屬地方若果撫循有能戸口充實田地開墾著有成效該撫特行舉薦該部從優敘録以副朕奬勵循良愛養百姓至意尔等即遵諭行特諭康熙二十年七月二十二日諭戸部積貯為國家大計嵗運漕米充實京倉最為緊要旗丁人等輓運勤勞宜加存恤朕頃巡行近畿至通惠河一帯見南来漕艘旗甲人丁資用艱難生計窘迫深為可憫若不預為籌畫恐其苦累難支以致沿途遲滯貽悞倉儲所關匪細前以軍需浩繁漕運額設錢糧節經裁減今應作何酌復款項尔部詳議具奏特諭康熙二十年九月二十日諭户部頃者朕巡行近畿至霸州地方見其田畝窪下多遭水患小民生計無資何以供納正賦其該州見在被淹田地應徵本年錢糧著察明酌量蠲免以示朕勤恤民隠至意尔部即遵諭行特諭康熙二十年九月二十日諭大學士勒德洪明珠漕運遲速關京庾盈詘國用之本也今年糧船稽滯逾期勢必守凍明歳漕運恐致後時朕思臨清德州見有倉座欲將後幇米石分貯彼地速令空船南回明年著用山東河南船隻發所貯臨德諸倉之米轉運抵通庶今年漕艘得以早歸而明歳輓輸可無貽悮尔等同戸部及倉塲侍郎㑹議具奏康熙二十年九月二十日諭禮部古帝王敦重倫常推恩勲戚生則被以顯榮沒則必存優䘏歷稽前代舊典昭然今仁孝皇后之父領侍衛内大臣公噶布喇簪纓世裔宣力累朝恭謹持身忠勤奉職忽聞奄逝深軫朕懐應作何恩䘏著察例從優議奏特諭康熙二十年九月二十二日諭户部尚書伊桑阿侍郎額庫禮今嵗漕船必致守凍運船旗丁悉係南人既貧苦可念又北地寒冷非其所習應作何處置不致有饑寒之累尔部議奏康熙二十年十月初七日諭禮部朕恭奉聖祖母太皇太后慈諭自古帝王慎簡淑德備秩宮闈以襄内政歷稽往制典禮攸隆貴妃佟氏温惠端良壼儀茂著今進封為皇貴妃鈕祜盧氏恭和淑慧令範克昭今冊封為貴妃惠嬪納喇氏宜嬪郭羅洛氏徳嬪呉雅氏榮嬪馬佳氏秉質柔嘉恪勤内職今進封惠嬪為惠妃宜嬪為宜妃德嬪為德妃榮嬪為榮妃尔部即選擇吉期開列儀注具奏特諭康熙二十年十月二十五日諭吏兵二部總督哈占蔡毓榮統領官兵進剿逆賊直抵雲貴地方著有勞績其所革原官俱准復還尔部即遵諭行特諭康熙二十年十一月初七日諭禮部逆賊呉三桂背恩反叛煽亂地方罪惡貫盈已服冥殛逆孽世璠敗遁雲南竊據省城今大將軍貝子章泰等遵奉成命統兵進剿世璠窘迫自刎逆黨咸伏厥辜偽官軍民人等革心来歸疆域大定念數年以来大兵征剿士卒勞頓轉運糧餉民生困苦今逋寇既已蕩平兵民得以休息此皆仰荷天地祖宗眷佑已命行告祭禮仍應布告中外與民更始以昭維新之化尔部即擇吉具儀来奏特諭康熙二十年十二月初五日諭奉天將軍安褚䕶今雲南等處俱已底定海㝢清平告祭天地太廟社稷畢即於陵寢行告祭禮盛京者祖宗開創根本重地朕時思念不忘今值天下宴安意欲躬詣山陵告祭前幸盛京時未至永陵致奠迄今尚歉於懐兹若果往當身歴其處仰瞻祖宗發祥舊址尔可密遣副都統穆泰暨賢能官員將所行塗程與駐蹕及應行之處自興京通烏喇徑路詳看繪圖於同往章京内擇通曉者一員来奏恐踏看未周不能詳記道里山川也因無定期未行明示若俟定後商酌恐不及矣故爾密諭將軍身體佳否康熙二十年十二月初八日聖祖仁皇帝御製文集巻十一
