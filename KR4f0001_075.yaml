body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷三十五古今體詩二十一首潞河三首㶑灩春波散碧漪白蘋初葉麥初岐潞河三月桃花水正是乘舟薦鮪時其二畫鷁中流起櫂歌參差荇藻漾晴波澤梁雖設曽無禁斜日魚罾兩岸多其三東風吹雨曉來晴春水髙低五閘聲蘭槳乍移明鏡裏緑楊深處坐聞鶯巡幸出喜峯口過黃土巖紫塞雙崖出丹梯百尺懸草香遮細路樹老卧晴煙地為時巡到山當隘口偏何年留石室駐馬望層巔大石磯逺近峯回合潺湲澗淺深一磯橫大石萬騎出層林蒙密巖花發綿蠻谷鳥音龍堆塵不到慿眺足娛心塞上宴諸藩龍沙張宴塞雲收帳外連營散酒籌萬里車書皆屬國一時劍珮列通侯天髙大漠圍青嶂日午微風動綵斿聲教無私疆域逺省方隨處示懷柔入喜峯口一道鳴鑾度三驅振旅還莓苔天半石松栝雨中山險設關門壯時清堠火閒孝陵佳氣近縹眇翠微間野望嶺外茅茨小林端煙火遲田家耕鑿意一一九重知夏日迎薰亭苑啓時初夏亭隂午未闌雨過池藻碧日綻海榴丹水木含清景禽魚得靜觀薰風能解愠試取玉琴彈午日令序當重午南臺日正中玉階鳴瀑水瑶軫奏薰風菖葉浮杯緑榴花照檻紅臨流看競渡轉憶濟川功夏日潭柘寺微雲綴岡嶺細路揚前旌磴轉松門開漸覺沙界平潭湮石甃露柘古苔紋生一徑得疏豁層軒面峥嶸愛此户外泉俯視涓涓清修篁挺蒼翠其下流交橫斐然淇澳思宛爾渭濵情嶰谷有遺響簫韶鸞鳯聲戒壇卧松蒼松卧如龍蜿蜒鱗鬛古膚寸起山雲用汝作霖雨早秋新霽卷幕過新雨披襟納好風餘霞明逺岫倒景射晴虹稼穡豐年足乾坤爽氣同髙天雲斷處歷歷見初鴻夜坐靄靄燕寢夕遲遲清漏催綈袠盈棐几次第中宵開華月影帷燭凉颸韻宫槐玉杯露方浥金爐麝初煤坐覺秋氣肅斗柄西南回晨光尚未啓已有鸞聲來瀛臺紅闌橋轉白蘋灣疊石參差積翠間畫舸分流簾下水秋花倒影鏡中山風微瑶島歸雲近日落清霄舞鶴還乘興欲成蘭沼詠偶從機務得餘閒天津轉粟排千艦分流納九河潮聲連海壯樹色入京多鼓楫魚龍伏停帆鸛鶴過津門秋望逺明月湧金波通惠河閲運艘千檣爭溯白蘋風飛挽東南澤國同已見靈長資水德也應辛苦念田功滇平洱海昆池道路難捷書夜半到長安未矜干羽三苗格乍喜征輸六詔寬天末逺收金馬隘軍中新解鐡衣寒回思幾載焦勞意此日方同萬國歡宫門聽政示閣部諸臣中書天下本六官庶僚首絲綸委寄隆分職慎所守上相列天階喉舌管北斗乾象方昭垂古來詎虛授軒皇置六相姬文擇四友得人邦乃昌此事諒非偶曰豫既寡昧欿然謝哲后聽政日不遑望道逺何有啓沃藉臣鄰匡贊資左右雖云際升平民物豈康阜圖終貴謹始治安莫豫狃廣業惟克勤勵精期永久作詩一相朂敬哉庶無負升平嘉宴同羣臣賦詩用柏梁體并序朕於宣政聽覽之餘講貫經義歷觀史冊於書見元首股肱賡揚喜起之盛於詩見鹿鳴天保諸篇未嘗不慕古之君臣一德一心相悅若斯之隆也今際海內宴安兵革偃息首春令序九陌燈輝豐穰有徴吾民咸樂思與諸臣欣時式燕爰於乾清宫廣集簪裾肆筵授几斯時也蟾光鼇炬焜耀堂廉綵樹瓊葩離羅樽爼許笑言之勿禁寬儀法之不糾復令次登文陛渥以金罍咸俾有三爵油油之色焉易曰上下交則志同傳曰享以訓恭儉宴以示慈惠則今日之兕觥㫖酒豈徒以飲食燕樂云爾哉顧瞻諸臣或位居諧弼或職任卿尹或典文翰或司獻納宜共成篇什以紹雅頌之音朕發端首倡效柏梁體班聨遞賡用昭升平盛事冀垂不朽云康煕二十一年正月十四日麗日和風被萬方御製卿雲爛熳彌紫閶內閣大學士臣勒德洪一堂喜起歌明良內閣大學士臣明珠止戈化洽民物昌內閣大學士臣李霨蓼蕭燕譽聖恩長內閣大學士臣馮溥天心昭格時雨暘吏部尚書臣黃機豐亨有兆祝千箱户部尚書臣梁清標禮樂文章仰聖皇禮部尚書臣吳正治廟謨指授靖八荒兵部尚書臣宋德宜春回丹詔罷桁楊刑部尚書臣魏象樞河清海晏禹績彰工部尚書臣朱之弼百度胥飭綱紀張都察院左都御史臣徐元文千官濟濟盈巖廊吏部左侍郎臣張士甄天工無曠勤贊襄吏部右侍郎臣楊永寧有年歌協臣所望户部左侍郎臣李天馥共期紅朽答殊常户部右侍郎臣李仙根轉漕億萬充天倉户部倉場侍郎臣馬汝驥邦禮叨贊慙趨蹌禮部左侍郎臣楊正中職司寅清佐垂裳禮部右侍郎臣富鴻基天河洗甲通蠻鄉兵部左侍郎臣焦育瑞皇威四暢咸來王兵部右侍郎臣陳一炳祗承欽恤和氣翔刑部左侍郎臣杜臻刑措不用民夀康刑部右侍郎臣葉方藹八材庀化師殳斨工部左侍郎臣趙璟右平左墄開明堂工部右侍郎臣金鼐仰窺神䇿驅天狼內閣學士臣李光地膏以大澤人胥慶內閣學士臣張玉書帝庸作歌追虞唐翰林院掌院學士臣陳廷敬身依雲漢賡天章翰林院學士臣張英恪秉訓厲敦羔羊都察院左副都御史臣宋文運奉宣仁風之吳疆巡撫江寧右副都御史臣余國柱九閽詄蕩瞻龍光通政使司通政使臣王盛唐斗杓髙掩貫索芒大理寺卿臣張雲翼圖列養正親羮牆詹事府詹事臣沈荃黃鐘大鏞諧禎祥太常寺卿臣崔澄郊衢擊壤歡豐穰順天府府尹臣熊一瀟大官珍膳羅酒漿光祿寺卿臣馬世濟調間六御騰康莊太僕寺卿臣張可前忝預風紀凛清霜都察院僉都御史臣張吉午出入玉珮聲鏘鏘通政使司左通政臣崔官納言惟允尚職詳通政使司右通政臣吳琠褒忠勵節感賜觴通政使司右通政臣陳汝器圜扉闃寂春草芳大理寺少卿臣榮國祚拜手好生頌禹湯大理寺少卿臣徐旭齡前星令望欽顒卭詹事府少詹事臣王澤宏終始念典用斯臧詹事府少詹事臣崔蔚林言模行範輝縹緗翰林院侍讀學士臣蔣宏道猗歟至德日就將翰林院侍讀學士臣胡簡敬叨塵侍從恩莫量翰林院侍讀學士臣朱之佐靖共夙夜無怠遑翰林院侍講學士臣嚴我斯梧桐生矣于髙岡翰林院侍講學士臣孫在豐紬書東觀翰墨香翰林院侍講學士臣盧琦三德六行為士坊國子監祭酒臣王士禎宫官備位滋悚惶右春坊右庶子臣祖文謨六經義叶如笙簧翰林院侍講臣朱典奎文煥若森琳琅翰林院侍讀臣王封濚朝朝橐筆侍御牀翰林院侍講臣董訥紀載聖治金匱藏翰林院侍講臣王鴻緒頻年宣室虗對揚翰林院侍講臣髙士竒宸篇掞藻燭昊蒼翰林院侍講臣郭棻承華育德成圭璋左春坊左諭德臣陳論青宫琪樹棲鸞凰右春坊右諭德臣朱世熙金輿導從驂雲驤司經局洗馬臣田喜􅀢罘罳流影耀璧璫通政使司左參議臣趙士麟仁波溟渤同濊汪通政使司左參議臣趙之鼎鸞旗乘春零露瀼通政使司右參議臣張鵬爰賡天保矢勿忘通政使司右參議臣鄭重八表同軌來梯航大理寺寺丞臣徐誥武雲門磬管聲喤喤右春坊右中允臣吳鳴珂泰交天闕開春陽左春坊左中允臣李録豫惟睿作聖金玉相右春坊右中允臣鄭開極珥筆何幸日月傍左春坊左贊善臣徐乾學瑞逾寶鼎兼芝房左春坊左贊善臣鄭之諶堯樽夜醉星低昂右春坊右贊善臣沈上墉在廷恱豫和宫商右春坊右贊善臣王尹方濫典樂正董上庠國子監司業臣劉芳哲治登三五休聲揚翰林院修撰臣歸允肅睿謨典誥同洋洋翰林院編修臣王頊齡記神聖功臣職當翰林院編修臣曺禾琅函瑶版書焜煌翰林院檢討臣潘耒石渠高議芟秕穅翰林院檢討臣嚴繩孫日侍清禁研鉛黃翰林院編修臣杜訥願言直節謹自防吏科掌印給事中臣王承祖帝心勤民重農桑户科掌印給事中臣王曰溫具舉細目恢宏綱禮科掌印給事中臣李迥誕敷文德四國匡兵科掌印給事中臣劉沛先嘉禾既殖鋤莠稂刑科掌印給事中臣姚締虞屈軼朱草紛兩廂掌河南道御史臣唐朝彝封章問夜檢皂囊掌江南道御史臣任玥擬將徑操堅蒼筤掌浙江道御史臣李見龍朝無闕事聯班行掌山西道御史臣郭維藩千門燎火宵未央掌山東道御史臣孫必振升平髙宴邁柏梁掌陜西道御史臣衛執蒲元夜與諸王宴飲乾清宫今夕丹幃宴聯翩集懿親傳柑宜令節行葦樂芳春香泛紅螺重光搖絳蠟新不須歌湛露明月足留人聖祖仁皇帝御製文集卷三十五
