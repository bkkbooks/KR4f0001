body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十三古今體詩四十一首季夏逰西山憶舊尋芳踏緑野萬紫迷深溪地遠峰頭濶山髙水勢低飛花疑舊夢煙栁促新題沙暖鴛鴦睡萋萋草滿堤詠花奇蕊瓊葩綴碧枝幽香獨占美丰姿薰風初到窗前賞疑是仙花月下移夏日閒坐雲斂風微紫燕飛春光已去夏初歸清襟贏得天然處暗覺花香到玉扉夏日郊行節變春方去清和助麥秋蔚林乘早夏茂草接新流柳絮堤邊起荷錢水上浮風光殊舊日此意未曾休苦熱戲作數年不見歊蒸熱于今熾日最難當披襟氣蹙三庚遠近榻神昏九夏長煩暑時侵髙閣上炎光每到小樓傍微凉須動清風扇勉力勤民閲奏章雨中逺望庭槐開御幄雲氣逼遙岑雨濕鑾鈴重風吹輦路深芭蕉分碧葉䓿萏薦香林極目天邉望斜陽半嶺隂日講畢同翰林張英髙士奇勵杜訥看荷千隊芙蓉太液池迎薰初散講筵時螭頭絶勝金蓮燭自有清香送曉颸初秋大火初收暑氣殘金風吹動芰荷寒鳴蟬送夏聲聲急雨霽遙天萬里看中元日蕉園作中元來太液新爽下林端水檻臨流入風窗捲幔看魚遊迷藻荇鷗戲悅沙灘宇宙無塵翳凉生月一團復逰盤山絶頂絶頂巉巖裏松煙向曉開片雲生衆壑虛籟落空臺寺古人行少林深鳥亂回千峰多秀色遠眺足徘徊春日觀花枝上流鶯早千紅萬紫香氣融催景麗風過遞年芳穠李花猶淺垂楊葉未長澗中春溜發疑是奏笙簧夏日口外寄宮中翠蓋鸞旌出平明刻漏同油雲驅暑氣時雨引清風山脈經年秀泉形此日充遙遙千里外回首憶深宮避暑暢春園雨後新月園亭氣爽雨初晴新月朧朧透樹明漏下微眠思治道未知清夜意何生喜雨詩十六韻并序朕撫御天下每以民生為念夙興夜寐無時少懈也歲在丁卯自春涉夏藴隆少雨日更增甚麥秋期至農事堪憂傳曰龍見而雩謂建巳之月萬物始盛待雨於天今當雨不雨或人事之未修朕躬之有過歟亟命重臣凡國計憂戚刑名錢穀但有關於民者再三講究有言在京臣工鐫級過多皆賜復還可以致雨以及戲館秧歌之細事無不曲盡議論迄於五月憂心如焚減膳撤樂端居省過將以明詔布告天下思所以挽回天意詔下旬有餘日或膚雲方集輒阻燥風或微霂才施旋升杲日昔人遇災而懼側身修行欲銷去之况兹不雨乎朕以凉德臨億兆之上為民之誠天日可監欲躬詣郊壇致祭諸臣亦以為請因命禮官諏吉具儀齊戒肅穆步禱上帝始齊之晚密雨濡潤祭之日雷雨交作自兹間日而雨遍四郊田野霑足朕先憂而飲食俱廢者為民也既雨之後喜而舉手加額者亦為民也今天不遺斯民禱而賜之雨使得不愧三公九卿之請朕之幸矣故賦喜雨詩以抒其懷體國為民事憂勤固在斯驕陽春既盛膏澤夏愆期省刑書每下請雨令頻施雲未油然作風偏颯爾吹芃芃苖欲槁細細草將萎翹首瞻青漢焦心對赤墀圜扉重舉滯旃厦幾疇咨齊祭祈神鑒精誠只已知誰云天最逺於是聽能卑默處敬居日恭䖍步禱時微衷慙上格大化喜濳移雱霈滋南畝飄瀟遍九逵靉靆隂陽協滂沱渥澤垂田家還自樂朝野共吟詩從此煩襟滌由來百志熙願同兹砥礪參贊奉無私南巡再過濟南六御重經厯下城頻將疾苦問蒼生肩摩轂擊風猶在土沃農恬世久平戶户春燈佳節過時上元次日村村社鼓樂郊盈韶年漸布陽和澤淑氣晴光仗外橫觀珍珠泉并序濟南多名泉趵突珍珠二泉為最昔經過趵突曽賦篇什今臨珍珠泉上愛其澄徹題曰作霖一泓清淺漾珠圓細浪瀠洄小荇牽偶與諸臣閒倚檻堪同魚藻入詩篇經泰山之麓并序曩於甲子冬日登泰山之巔覽秦漢以來故蹟俯眺寰區憑臨滄海今兹南巡復稅駕山麓因望岱宗而展禮焉聳巘髙峰記昔攀春回瀑水響潺潺萬層石級雲霄上千里煙村縹眇間暫駐猶然思往事憑陵直欲小人寰朱旗翠葆疏林外已見巍巍俯衆山再過淮南并序嚮者巡省江左道出淮南軫念窮簷憫懷澤國今見居民景象較前稍豐良慰朕懷前來歷兹境斯民似未遂今日再經過風土覺有異紈褐既充體廬舍各完置擁道歡趨迎扶老與擕稚咸云獲休息近免徭役纍水患日就平田疇可耕植一飲與一食莫不歌帝賜素念切民依時為勞寤寐大造本無私湛恩欲廣被聞言聊自寬庶慰省方意淮城曉霜聞雁天際晨光水月連帶霜歸雁向前川盂城曉發寒仍在談笑春風雜紫煙蠲江南逋賦并序江南屢年逋賦二百二十餘萬逐歲帶征聞吏民頗以為纍朕志存約巳𢎞浣衣菲食之風事期裕民師挹彼注兹之義特頒詔令悉與蠲除國家財賦東南重已責蠲租志念殷膏澤何妨頻見渥普天願與樂耕耘過維揚并序南巡以來減撤儀衛所歷郡邑垂髫戴白聽其趨蹌馬首有以管籥迎者輒禁止之頃過維揚商民比屋連艘充盈可喜但結綵張燈闐溢巷陌雖䢴溝為東南孔道歡迎亦兆庶至情猶恐前途相效敕地方長吏諭以省費惜財并賦此詩重過䢴溝地春風細草生帆檣連賈舶笙吹滿江城物力須教惜民情亦見誠繁華當淑景氣象喜充盈金山江天寺獨愛江天寺停橈上碧峰波瀾聲浩浩樓閣勢重重日暖浮雙樹風微送午鐘遙看南北岸春色淡春容焦山焦山何岝崿遙與金山峙草木盡䝉茸幽偏隔城市放舟下中流攀蘿上涯涘隱士不可招鶴銘洵足紀栖鶻驚人飛暮雲千萬里駐蹕金山煙霧空濛水國昏夜移鳳舸泊山門然犀欲照黿鼉窟卧聽濤聲自吐吞雨過錫山輕雲冉冉霧彎環細雨絲絲羃逺山畫舫青簾開曉坐平波漫衍白鷗閒虎丘望山後試劒空存石生公尚有臺愛看山後景錯落野田開鄧尉山鄧尉知名久看梅及早春豈因耽勝賞本是重時巡野靄朝來散山容雨後新繽紛開萬樹相對愜佳辰鄧尉小軒望太湖山軒閒坐倚前楹萬頃澄湖夕照明夜久天心初月上笙簧謖謖奏松聲登靈巖霏微靈雨散春煙按轡逍遙陟翠巔香水通流明若箭琴臺列石勢如拳諸峰盡在青蘿外萬井全依綵仗前聞是吳宮花草地空餘鐘磬梵王筵晚過吳江埀虹蜿蜒跨長波畫㦸牙檣薄暮過燈火千家明似晝好風好雨祝時和入平望并序平望為浙江界長吏以畫舫五百來迎恐勞民力卻之不御錦纜無勞列綵艭輕橈自愛倚船窗勤民不憚周行逺早又觀風向浙江禾中道上兩岸人家半種桑雨中入望盡蒼茫民間本業惟農織愛看山村共水鄉巡幸杭州東南上郡古臨安親採風謡一省觀翠岫巃嵸猶舞鳳羽旗簡約不鳴鑾春暉草木江山麗户滿弦歌雨露寬德化逺敷吾未信如何夾路萬聲歡吳山左控長江右控湖萬家煙火滿康衢偶來絶頂憑虛望似向雲霄展畫圖泛舟西湖一片湖光瀲灩開峰巒三面送青來輕舟櫂去波添影曲岸移時路郤回春色初搖堤上栁惠風正發寺邊梅此行不是探名勝欲使陽和遍九垓西溪十里清溪曲修篁入望深暖催梅信早水落草痕侵俗藉漁為業園饒筍作林民風愛淳朴不厭一登臨題西溪山莊以竹窗二字書賜髙士竒花源路幾重柴桑皆沃土煙翠竹窗幽雪香梅岸古過桃花嶺至玉泉寺度嶺穿雲路始平停鑣聊憩小池清游魚自有悠然意豈識乾坤造物宏湖心亭水上起樓臺湖面平如鏡春風吹栁條逺與山光映渡錢塘江雪後春煙漠漠浮揚舲擊楫向中流江通潮汐分吳地路入溪山隱越州振武戈矛皆駐馬憶用武時大兵屯駐江干省方斿葆此乘舟風帆沙鳥看何限逺近雲霞望裏收山隂灌木叢篁傍水幽淡煙晴日漾芳洲蘭橈搖過山隂道在昔人傳鏡裏逰聖祖仁皇帝御製文第二集卷四十三
