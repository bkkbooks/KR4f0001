body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷三十三雜著古文評論宋武帝與臧燾書武帝以振興人才為心歸重於經師勸誘可謂知夲荆玉幽蘭之喻清越可誦文帝與江夏王義恭書誡弟之文責以親賢下士改過節用詳盡婉曲復以審慎聽斷為訓亦猶康誥所云明德慎罰之義也又誡親切相喻簡而不浮賜南郡王義宣中詔家庭之文朴而雅彌見古致孝武帝審貢賦詔審辨方物非其土者不貢非其時者不貢自是仁言文復簡峭有色始安王休仁皇太子車服議義取謙約辭近古核庶資叅考傅亮為宋公至洛陽謁五陵表寫洛陽舊宫景物有詩人禾黍之慨何尚之陳庾炳之得失叙事磊落有法見古人奏章簡質處出庾炳之為丹陽尹答覆論勁直嫉惡之義甚嚴范曄後漢書皇后紀序引周禮兩漢間事又歴陳監戒之言辭婉而義深有國家者當與尚書牝雞無晨之句叅㸔庶不至椒房近戚之累歟呉葢陳臧列傳論文儷而嚴意以偃兵為重中興二十八將論光武以封爵待功臣而不責以吏事故保全者多文獨扼此發議孔融傳論文有嚴毅之氣肅穆之容周黄徐姜申屠列傳序引數事以成文亦是一格黨錮列傳序論叙黨人始末詳盡從四豪任俠立論其源起於氣矜其弊成於羅織可謂論世之識宦者列傳序東漢之末宦寺流弊已極斯文能痛切言之逸民傳序論叙述潔已之士文亦簡裕齊髙帝賜張融衣手詔數語意致深雋答劉善明古調清音又答謙冲和易見延佇之忱答蕭景先詔命意𢎞長詞亦近雅武帝禁婚𦵏奢靡詔切中風俗之弊勅廬陵王子卿謹侈靡是訓宗藩第一義故言之惓惓勅晉安王子懋以世務為根夲片言居要豫章王嶷上世祖啓大指以敦大易繁𤨏自是篤論竟陵王子良諫遣臺使疏叙臺使擅威福擾吏民之弊曲盡情狀陳時政啓六朝文尚駢麗此獨簡潔峭勁有裨民隠孔顗鑄錢均貨議圜府泉法始於周禮而論列體製於此為詳顧憲之牛埭稅𣙜議析理既明言事亦􅐩孔稚圭上撰定律章表大意與路温舒尚徳緩刑疏相近梁武帝詳立條格令意在去奢返樸興於厥躬史稱武帝豆羔糲食克儉於身於此可見禁祝史祈福詔傚古人責躬之義語亦簡當檢括封事詔念切民事而出以古腴之辭勅外司明加聽採隨事舉奏詔洞盡物情言之懇懇與謝朏勅求賢若渇如讀白駒空谷之詩與何㸃詔敦故舊重隠逸叙述疇昔情緒深婉儼然光武之待子陵徴何𦙍手詔何㸃何𦙍史謂其居貞物表縱心塵外故武帝優詔敦勸之如此又勅勤懇之情形於簡牘又勅遣弟子就東山受學武帝禮賢可謂篤矣輔政上銓序表六朝九品中正法類登世族而抑寒畯故言之獨切簡文帝請賀琛奉述毛詩義表敦崇詩學敷言雅令答徐摛詞語輕雋有致邵陵王綸與湘東王繹書史稱綸聰警有才學忠孝獨存觀此書信矣沈約宋書良吏傳序論宋吏治得失却夲奢儉以立說亦探源之識也孔羊沈列傳論以常平積榖為扶災利農之夲有裨民瘼恩倖傳論言情事皆曲折盡意文亦華實相副任昉天監三年䇿秀才文三首䇿問三事阜民化俗納言皆切㑹治理文亦贍羙而有逸韵為卞彬謝修卞忠貞墓啓叙先世忠孝有棐篤之思上蕭太傅固辭奪禮啓文生於情不湏賁飾自然雅健蕭子顯南齊書倖臣傳論摹寫情况入㣲前代多用宦寺典兵故言之尤切陳文帝脩前代墓詔睠念忠烈加恩丘墓藹然仁厚之音徐陵奉使鄴都上梁元帝表駢偶之文緯以經史故麗而有則宣示諸求官人書意在澄叙官方文亦簡而有韻沈炯請歸養表詞婉而意廹詩曰將母來諗此亦庶㡬風人之言北魏太武帝辟召賢良詔平粹之音不為覈急頒制詔森然尺度之文亦復機神流暢文成帝遣使巡行詔遣使之辭如此詳括殆非具文孝文帝條禁州牧詔意在禁防而辭多沖挹要當使牧守内愧革心不専以法令相廹也決遣民獄詔月令孟夏斷薄刑决小罪出輕繫即此詔之意復靈丘租調詔語樸而摯免租算詔有勤恤之實心故能有丐貸之實政非汎然仁心仁聞也求直言詔刋煩華存簡實兩言已得體要文明太后喪服詔其言惻怛可以興起答有司卜祥日詔卜祥而筮永吉似非禮意此能折𠂻至當孟月廟祀詔斟酌古今可垂禮典文亦有淵穆之氣徴王肅詔情文嫻雅濃至可感可誦與彭城王勰書教先宗族王化之原彭城親賢無慚徳舉任城王澄諫髙祖幸豫州有敦樸之質無枝蔓之辭請修繕國學奏言裨教典情自纒綿北海王詳定律令奏課吏自當以公清為重此奏得之元暉論御史巡行䟽遣使巡行公私煩擾誠不若委任牧守慎選而嚴課之之為得也張普恵與任城王澄奏記稱古昔引經義嚴毅之論典確之文韓麒麟陳時務表此表可以厚生可以維俗古今通義也韓顯宗上時事書切於事理言雖多而不覺其長孫恵蔚請收校典籍表言似緩而實切未可以疎闊目之崔光答宣武帝雞異表明確無浮響故當使人傾耳災異表質實良具至理不以字句見長甄琛請弛鹽禁表弛禁固為善政苐湏有實心實恵及民始為無弊耳邢巒再上伐梁表洞晰利害如聚米如借箸似趙營平屯邊諸䟽髙謙之請復縣令靣陳舊制䟽為畿縣令不可少此風裁足使權貴歛手避之聖祖仁皇帝御製文第三集巻三十三
