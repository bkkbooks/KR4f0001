body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三十論博約一貫論嘗廣稽載籍研極指歸見夫聖人之道散之彌綸於兩間斂之退藏於至密始於民物象數之繁終於窮神逹化之極無非學也無非道也但見其所為散者而不知所以斂則窮大而失其居若夫寂滅之學既已遺棄一切矣則所斂者復何物哉二者之失均也昔仲尼過周問禮老聃晚而返魯刪述六經自堯舜禹湯文武周公之禮樂法度當世賢人君子百家之書衆藝之事列國之內九州之外𢎞纎微著靡不殫記洽聞洞悉其故其時及門弟子多莫識其所由然者故謂子貢曰女以豫為多學而識之者與曰然非與是猶但知夫子之道之大學之博而不知夫子之一以貫之也博約之論始於顔氏而闡於子輿氏顔氏曰博我以文約我以禮孟氏言博學反約言守約施博而其說之最明者曰萬物皆備於我反身而誠樂莫大焉夫惟萬物皆備則非窮極天地之化育人物之蕃變不足以全我之量惟反身求誠則一失容者禮之所以廢也一失言者禮之所以悖也博而至於天下歸仁約而原於視聽言動則夫所謂贊化育而參天地者又豈在反身之外哉洪範叙五行八政五紀皆治天下之大法而其要考祥於視聽言動之間恭從明聰遂以致雨晹寒燠之應由是言之雅頌經曲易象春秋極其博矣約而求之豈有殊㫖哉或以涉獵强記為能非博也或以虛無寂滅為尚非約也大學言明新始於格物齊治歸於修身此則聖賢所為若合符節者皆此義也王道近民論嘗讀史至魯伯禽報政之事而深歎古聖人致治無他道也惟在因民之心而已矣周公之言曰政不簡不易民不有近平易近民民必歸之㫖矣哉非聖人何能語此夫民雖至愚且弱莫不各懷所欲順之則易與為治拂之則日趨於非此必至之勢也聖王知其然故因民之欲遂其生也豫之以田里樹畜之資導之以農桑衣食之術公旬有限而勿奪其時補助頻行而常惜其力然又念民心莫不好善而惡惡於是因其父子兄弟之愛發其孝友姻睦之良習之於黨孰申之於庠序俾愚者安其身於襏襫而婦饁夫耘晝茅宵索終嵗勤動而不以為勞其秀者則釋耒耜而敦詩書被服儒雅日莘莘於俎豆鐘鼓之間而不覺或有不率者設為法制以整齊之立為刑辟以董戒之要皆示之以不得不然而非專恃此以為遷善去惡之具也唐虞之世敬敷五教而外服就流宅之刑大率有其名而不用者爾故皋陶之稱帝德曰臨下以簡御衆以寬又曰好生之德洽於民心兹用不犯於有司夫民至不犯其治蔑以加矣而實感格於好生之主德斯豈非用簡與寬之效哉降自三代漢之文帝唐之太宗咸遵斯道故一時幾於刑措其他英察者或流為束濕綜核者或入于煩苛法令滋章馴致衰亂此皆未明於易簡近民之道者也易曰易則易知簡則易從易知則有親易從則有功而大學之言潔矩本之以所好所惡孟子之原得民心亦歸之於與聚勿施合聖賢諸說推之總不外因民之心以為準然則易簡者近民之實而近民者王道之㫖歟業廣惟勤論蓋聞天運於上則四時不忒而嵗功成故自開闢以來陽變隂合屈伸往來無一息之或停而後氣化周流亭毒萬物髙下散殊俾之各得其所行健故也代天工以理萬物者亦若是而已矣周官之戒卿士曰業廣惟勤即虞帝之廷賡歌交贊亦曰率作興事屢省乃成書又曰弗謀胡獲弗為胡成聖賢之言固先後同揆也國家稽古建官雖職有繁簡秩有崇卑而設一官則必有一官之事規條待其整理吏胥式其言動百姓視其董率要未有不以黽勉奮迅而成惰窳偷安而敗者也古之官針曰卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安豈不在於能勤哉惟勤則能豫豫則臨事有寬裕之體而不困於煩劇惟勤則能審審則事機有坐照之明而不至於暗汶惟勤則志氣日新而可以振闒冗之習惟勤則心思日用而可以生智勇之才以之治事則官無廢事以之臨民則民無失職業之廣也斷在乎是此固庶司百職所同然而况卿士為振綱挈領之人尤所當自勵者哉推而廣之凡士農工賈皆各有當勤之業士而不勤則學殖落而日即於荒陋矣農而不勤則耕穫失其時八口不能飽矣工賈而不勤則居肆之業荒懋遷之功弛無以牽車牛而致洗腆矣尚何以望其業之成哉朕嘗覽古人之言曰自朝至於日中昃不遑暇食又曰不寶尺璧而寶寸隂實惟勤之一言通貴賤上下而一之者也故因而論列之亷靜論嘗讀漢詔有曰吏不亷平則治道衰又曰俗吏矯􅎖外貌似是而非安靜之吏悃愊無華日計不足嵗計有餘善哉亷靜之言立身行已之大端制事理物之要道凡為學者皆宜然也况人臣之策名委質任職臨民者乎蓋禮義亷耻管子所謂國之四維夫亷者四維之一而已矣然未有秉禮守義知耻而不亷者也自為吏者有貪私之實而後重亷潔之名故尤以亷為貴何則亷則有所不取有所不取則有所不為凡無禮無義無耻者皆所不為者也吏苟亷矣則奉法以利民不枉法以侵民守官以勤民不敗官以殘民民安而吏稱其職矣吏稱其職而天下治矣故吏尤以亷為貴也夫有所不取之謂亷有所不為之謂靜惟亷故靜未有不亷而能靜者也既能亷而靜矣則有所不為也而後可以有為舉凡利於民者行之必力病於民者除之亦必力事治而民安無非靜也夫豈優游自私保利祿而不恤民事之謂靜乎故凡博安靜之名不可謂之真能安靜猶之博亷平之名者不可謂之真能亷平者也昔人有言曰古之清勤為國修政今之清勤為身修名夫為國修政者忠於君為身修名者私於已臣之事君與君之待臣貴其忠於君乎貴其私於已乎故願天下為真亷吏斯能為真安靜之吏蓋久矣厪於懷也因讀漢詔故遂論之如此論兵兵者不得已而用之也孫子曰知己知彼則百戰百勝夫知己難知彼益難矧當塞外荒邈之區偵探之所不及何以知其道里之逺近人衆之多寡山川之厄塞乎漢世開邉史稱最逺但盡數十年之兵力得地無幾究未能滅其族類而中國之財賦亦絀何則窮兵黷武之故也我國家闢基廣大諸䝉古莫不臣屬風土疆域可按籍而稽也頃噶爾丹掠擾邉陲興師討罪其道里之逺近人衆之多寡山川之厄塞豫固知之熟矣去年春將親統六師而出召勇略將軍趙良棟問以方略良棟曰老臣無他能平日用師惟精神貫注於事先耳豫三臨沙漠事無巨細躬親籌畫往往以一已之精神包括乎萬事動合機先克滅渠寇每思良棟之言之當也頃者滅噶爾丹之道有三國家當隆盛之際宇內熙恬外藩傾服獨一噶爾丹妄逞凶頑豈非自取覆亡是我之得天時也朔幕地雖遼濶川原險要可以何地進兵何地犄角瞭然指掌是我之得地利也師行雷動之頃甲仗頒自禁中糧餉出之公府未嘗輕勞民力而禁旅飬之有素踴躍思奮是我之得人和也以知己知彼而上合天時中獲地利下遂人和又焉往而不克哉昔人有云兵所以戡亂戢暴也今暴亂既除兵甲偃息默坐行幄追維已往姑叙述其事以示安不忘危之心然勵精萃神豈獨用兵之道如是歟論息兵安民一勞而天下永逸一勤而兵革永寧者非大有志與斷不能也凡人狃於常習卒然臨之以事必苟且圖目前之安不為長治久安之策雖暫取逸於一時終因循蔓延而不可收拾往往悔諸事後誠何益哉豫自臨御以來留心機務每遇大政則謀之以深沈斷之以果决其始未嘗不慎重三思而其要則惟以安民為念自昔平定三逆之後培滋元氣欲措斯民於衽席未嘗輕言兵事比者厄魯特噶爾丹妄逞凶頑背棄誓約侵陵我藩封潜入我北漠開諭再三罔知悛改不得不加之以兵議者咸曰蠻夷荒服治以不治古惟有驅逐之而已防守之而已逺勞師旅未必遂能滅除也豫思我朝規模與往代異我朝䝉古四十九部列居塞下久奉臣貢若任其蹂躪而不加芘覆不特失外藩之心將恐事成飬癰滋蔓邉境不若早為圖之爰整戎衣躬臨絶幕既大破之冬復再蒞遐荒相機剿撫噶爾丹困蹙餘生遣人乞命其意欲緩我兵為兔脫計豫心知之而未忍逆詐姑與之定期以待之來方春豫復親涉關塞逺出朔方既俘其孽子彼尚依栖榛莽未悔厥心知其不可以化誨也乃命禁旅分道追搜噶爾丹勢窮自盡其下悉平漠北萬里咸歸疆域從此海宇乂安兵革不用可以布化施澤與民休養矣方噶爾丹之盤踞土刺河也諸䝉古為之心動非毅然親統六師直窮巢穴迫而與之一戰必不能喪其魄而殱其衆及其敗遁也非嚴冬再出久駐塞外絶其所往或奔匿他所更費經營春和之期非跋履山川分道進討示豫不憚寒暑勤勞必欲滅此而後已則彼尚或支吾嵗月妄希苟延三舉一有不决則機左師老必致疲我蒼赤然豫何敢自以為志之斷也仰荷宗社之靈成此一勞永逸一勤永寧之事韜戢干戈安靜教育使天下之民士農工賈各業其業樂其樂豈不大為愈快哉故豫之用兵實所以安民今兵息而民安將益講求其安之之法使後人知豫息兵安民之意云說太極圖說易道隂陽中庸言性道形而上之道形而下之器兼備矣易之理具於一畫之前中庸之理原於天命之始若周子太極圖可謂精於易而通於中庸者矣易繫辭曰易有太極是生兩儀兩儀生四象四象生八卦兩儀既立之後生生無窮太極未判以前此理具在則所謂無極而太極者洵善言太極者也中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和夫必皆中節而後謂之和則或中或不中者可知矣蓋天下之中節者常少而不中節者常多也不中節則不和矣不和則失其所以為中而非太極本然之體矣若夫未發則無不中也人能常存未發之中則無論未發者謂之中即已發猶然中也猶然太極之本體也若是則中庸所謂未發之中豈非即周子所謂無極而太極者乎夫未發之中即天命之性也究而言之中庸大指不過欲人克全天命之性而已以至位天地育萬物猶之周子所言兩儀立而五氣布四時行萬物生生而不窮也而其本則原於無極而太極猶之中庸言位育而其本則原於天命之性也是故易之理得中庸發之而益明中庸與易之理得周子發之而益著故曰太極圖可謂精於易而通於中庸者矣至其為說之切實悉符合於聖賢性道之指其曰無極之真二五之精妙合而凝則孔子之所謂性相近孟子之所謂性善也其曰五性感動而善惡生則孔子之所謂習相逺惟上知與下愚不移也而天命之性氣質之性已别白言之矣其曰聖人定之以中正仁義而主靜立人極則大學止善定靜之義也其曰君子修之吉小人悖之凶則書所謂惠迪吉從逆凶之義也自世之言性者紛紛曰性惡曰性有善有不善曰善惡混而性命之理不大白於天下得周子之說而正之以見夫道之原於天而修於人者如此其昭然可指而確然可循也則真可謂有功於斯道者哉小學課士說古者有大學小學尚書大傳謂十五入小學十八入大學班氏謂八歲入小學十五入大學朱子作大學序取班氏之說書大傳之作先儒以為出於漢儒之附㑹理或然也今以童稚之年遽責以大學之事其於古人為學之方立教之序亦大不侔矣夫古者教學教耕之異其人左右春秋之異其地灑掃應對進退之詳其節禮樂射御書數之詳其文雖其制猶可考或有行於古難行於今者亦貴得其意而已故小學之法求其參酌至當者莫如朱子所輯一書蓋取古昔聖賢教人為學之言而參之以曲禮少儀內則之文與前言往行合以成編其內篇則所以培其根也其外篇則所以逹其支也而其大義之所存則主於教敬蓋敬者為學之要領所以該本末貫精粗徹上徹下之道也朕自沖齡即已披覽服習嘗以為學者苟能身體而力行之則誠下學上逹之功實與大學相為表裏不僅為初學占畢課讀之書而已近代以來有司不以之校士士子不以之誦習簡帙雖存束之髙閣朕每切於懷於是特頒諭㫖著為令甲俾天下士子於經書制舉業之外兼習是書有司臨試兼以命題課藝庶幾天下學者誦其言習其行敦其事於日用居處極其理於修己治人近之盡乎人倫精之通乎性命靜以淑其身動以措之世人才盛而風俗淳端在是矣樂府說樂府之名昉於漢武帝然不自漢始也蓋古者樂即詩也虞書命后䕫典樂而曰詩言志歌永言聲依永律和聲周禮春官宗伯教六詩曰風雅頌曰賦比興而以六德為之本六律為之音班固謂周詩既備而其器用張陳具在周官故國子學歌九德誦六詩習六舞八音之和皆是物也古詩三千孔子刪之為三百著以為經而記謂歌詩三百弦詩三百舞詩三百由是觀之詩三百篇孔子皆嘗弦而歌之以求韶武雅頌之音故曰古者樂即詩也漢髙帝過沛賦三侯之章其時唐山夫人又作安世房中之歌樂府已權輿於此逮乎武帝崇尚文學於是作為十九章設協律都尉之官而樂府之名始立魏晋以來歷代踵之綜其大凡漢郊祀已下皆頌之類也漢鐃歌已下皆雅之類也漢橫吹以及六朝清啇楚調諸曲皆十五國風之類也其詞雖古今不同正變不一要皆有三經三緯之遺意焉他如京洛行出塞曲雁門太守行飲馬長城窟之類其名甚夥或因事以屬詞或比託以寄意主於古雅頓挫深婉動人漢魏而後六朝以及唐人多仿其音節而為之至白居易則自製數十篇為新樂府以諷諭當時韓愈製琴操十章杜甫亦以時事為樂府體此則其源流之大槩也後之人由流以遡源師漢魏淳古簡淡之義以求合乎詩人溫柔敦厚之㫖庶於古義有當歟作樂府說捕蝗說嘗讀詩至大田之什曰去其螟螣及其蟊賊無害我田稚田祖有神秉畀炎火則知古人之惡害苖也甚矣注曰食心曰螟食葉曰螣食根曰蟊食節曰賊昔人又云此四蟲皆蝗也而實不同故分别釋之且蝗之種類最易蕃衍故其為災在旬日之間夫水旱固所以害稼或遇其年禾稼被隴可冀有秋乃蝗且出而為災飛則蔽天散則遍野所至食禾黍苖盡復移㷀㷀小民何以堪此古人欲弭其災爰有捕蝗之法朕軫念民食宵旰不忘每於嵗冬即布令民間令於隴畝之際先掘蝗種蓋是物也除之於遺種之時則易除之於生息之後則難除之於稚弱之時則易除之於長壯之後則難除之於跳躍之時則易除之於飛揚之後則難當冬而預掘蝗種所謂去惡務絶其本也至不能盡除而出土其初未能逺飛厥名曰蝻是當掘坑舉火以聚而驅之殱之昔姚崇遣使捕蝗以詩人秉畀炎火之說為證夜中設火火邉掘坑且焚且瘞蓋祖詩人遺意也又晨興日未出時露氣沾濡翅濕而不能飛掘坑以驅之尤易為力漢平帝時詔捕蝗者詣吏以斗石受錢朕區畫於衷務弭其害每嵗命地方官吏督率農夫於冬則掘蝗蝻之種毋俾遺育於土中或時而為災則參用古法多方以撲滅之計其所捕多寡給錢以示勸賞古人有言曰螟蝗農夫得而殺之為其害稼也以是觀之捕蝗之事由來舊矣但自古有治人無治法惟視力行何如耳苟奉行不力雖小災亦大為民患朕故詳指其義為說以示之製硯說盛京之東砥石山麓有石礧礧質堅而溫色緑而瑩文理燦然握之則潤液欲滴有取作礪具者朕見之以為此良硯材也命工度其小大方圓悉凖古式製硯若干方磨隃糜試之逺勝緑端即舊坑諸名産亦弗能出其右爰裝以錦匣臚之棐几俾日親文墨寒山磊石洵厚幸矣顧天地之生材甚夥未必盡見收於世若此石終埋沒於荒煙蔓草而不一遇豈不大可惜哉朕御極以來恆念山林藪澤必有隱伏沉淪之士屢詔徵求多方甄録用期野無遺佚庶愜愛育人材之意於製硯成而適有㑹也故濡筆為之說解四維解管子曰國有四維一曰禮二曰義三曰亷四曰耻又申言之曰禮不踰節義不自進亷不蔽惡恥不從枉栁宗元著四維論以為彼所謂亷者不蔽惡也世之所謂亷者不苟得也彼所謂耻者不從枉也世之所謂耻者羞為非也不蔽惡者豈不以蔽惡為不義而去之乎不苟得者豈不以苟得為不義而不為乎至於不從枉與羞為非皆然則亷與耻義之小節不得與義抗而為維嘗求其說而為之解曰論其統體人苟能以禮義自守未有不能以亷耻自防者則是亷耻即在禮義之中也而論其節目人若視亷耻為小節則已踰禮義之大間是言禮義不得不竝舉亷耻也今有人焉責人曰是無禮義者則其人之賢者不能不以動其心而不肖者亦或不以介其意矣動其心者則將勉而益進於善不以介其意者則將以為固然而安於不肖之為又或責人曰是無亷恥者則其人之強者必拂然怒於其色而弱者亦必戄然懼於其中矣怒於色與懼於中者皆動其心而勉為善者之機也是何也亷耻之名視禮義之名為尤切無亷耻之名視無禮義之名為尤不可居也故言禮義而竝言亷耻可以警動天下而興起其為善去惡之心是管子之意也聖祖仁皇帝御製文第二集卷三十
