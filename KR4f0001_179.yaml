body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十四古今體詩四十八首謁大禹廟古廟青山下登臨曉靄中梅梁存舊跡金簡紀神功九載隨刊力千年統緒崇兹來薦蘩藻瞻對率羣工登臥龍山越望亭周覽山川歷井疆越峯突兀見青蒼爭流萬壑通城郭一一看來在下方雲栖竹樹甚茂幽蘭滿山山徑紆徐合溪聲到處聞竹深陰戛日木古勢干雲倚檻聽啼鳥攀崖採異芬韶華春已半萬物各欣欣虎跑泉并序西湖自昔畫舫笙歌之地朕兹行志本省方止一覽其山川風土未曽片刻停驂尚食但飲虎跑泉水一勺耳松林帶餘雪空山啼百舌石溜響涓涓寒泉自清潔靈隱寺靈山結幽秀鷲嶺起嵯峨梵宇盤空出香雲繞地多開襟對層碧下馬撫煙蘿羽衛閒來往非同問法過飛來峰巖岫崚增洞壑竒懸藤古木半迷離冷泉亭子清溪上誰識源頭混混時諭浙省將吏軍民并序朕自武林回鑾百姓擁道固請暫留慰諭遣之因詔諸將吏務在調劑兵民共相輯睦息訟弭爭務本崇儉毋専末業以滋游惰并賦斯篇省方浙西東山川極遐矚兹晨當回鑾諄諄一相朂軍民貴安和文武須聨屬息忿可無爭守分在忍辱日使訟庭閒愚民免械梏奢侈尤當懲繁華莫恣欲儉乃保其富素履各敦篤惟令教化興益見閭閻足諸吏宜勉之期歸淳朴俗舟中書懷淡淡春山暮靄清和風拂栁入簾輕留情遠寄懸千里撫景興懷歷幾程寒盡梅中初霽雨詩成洲上忽聞鶯船窗睡起疑宮闕月滿江湖聽櫂聲將逰華山以欲雨未往欲向青山澗壑行春雲又變曉隂輕勾陳不遣驚禪定恐礙林間碧草生雨中幸錫山園林淡冶青山色幽探傍曉來煙籠巖下竹雨洗石邊苔斷續聽啼鳥飄搖惜落梅胸襟原浩蕩隨意坐亭臺惠泉寒雲覆樹昔年經甲子觀惠泉在十月再品山泉到此亭春水一犂農事足喜看膏雨遍郊坰無錫小民以羔羊惠酒爭獻御舟笑而遣之自昔君門隔九閽如何草野得攀援多因愛此元元切忘分公然學負暄句容雨望山行逐髙低四望多松樹雨裏萬人家遙看隔雲霧巡幸江寧南省封疆惟此區江流環繞壯規模華旗芝蓋重臨幸二水三山半畫圖吏事莫先田野治民情但願閭閻孚不知比歲恩波洽止聽黃童白叟呼賜江寧文武將士宴於教場瑞雲捧日曉初晴麗景天開羽仗明扈蹕赳桓多絳灌分行俊譽盡璁珩三漿滿浥沾須遍五載南巡澤再傾自甲子南巡今已五載文穆武恬慙化理萬方無事宴升平再過明故宮樓臺金粉已沈銷不獨詩人說六朝月落宮垣春寂寂經過惟歎草蕭蕭江寧駐蹕并序江寧士民羣詣行在爭獻米榖兼羅果蔬涕泣請留屢諭不止俯徇億兆之願勉遲信宿之行心勤民隱獨咨諏不為江山作勝逰白下回鑾期已近黔黎擁道欲何求多憐野老堆盤獻勉就輿情兩日留二十八年宵旰意豈圖遠邇慕懷柔後湖渺渺長湖水春來發緑波飛鳴下鳬雁朝暮集漁蓑詠幽蘭婀娜花姿碧葉長風來難隱谷中香不因紉取堪為佩縱使無人亦自芳登報恩寺浮圖湧地千尋起摩霄九級懸琉璃埀法相翡翠結香煙締造人功巧流傳世代遷曠然彌遠望萬象拱諸天上巳日再登金山晴和逢上巳况在大江濱正是回鑾日揮毫記此辰長江夜月萬頃淪漣映平沙一望收天光起水色雲影共波流隔岸姑蘇逺臨軒夜月浮民情咸自得何必泛龍舟曉發維揚順風揚帆午餘已過秦郵傍曉發蕪城風帆疾如駛晚照半平湖舟行百餘里自宿遷解纜一日夜達山東境千里南程幾日回輕舟直下泝瀠洄天風更假帆檣便一夕山東境上來春晴舟中作野水漫漫野岸長幾行嫩柳帶斜陽不知春色來多少但覺飛花處處香途次書懷長樂慈顔兩月違白雲迢遞戀春暉輕舟不繫兼程進應話民風坐漏稀清明已日才從江岸行舟中還復度清明上林聞道花遲發留與歸時聽早鶯憂旱憶民事作仲夏炎曛盛德凉時未和驕陽因六事亢旱最三河三河為天下之中民以食為重天將風更多憂勤難暇顧惟誦憫農歌榴花丹誠映白日豔色喜清幽嫩緑疏櫺外開時傍翠樓盆景榴花髙有數寸開花一朵小樹枝頭一㸃紅嫣然六月雜荷風攢青葉裏珊瑚朵疑是移根金碧叢挽大行皇后詩四首并序大行皇后秀鍾華閥德備壼儀溯懿親於渭陽定嘉祥於媯汭宮闈翊贊克孝克慈頃者正位翟褕甫承冊命遽嬰篤疾莫挽徽音時屬新秋候當闌暑驚璇霄之月墜傷碧落之星沈物在人亡覩遺袿而雪涕庭虛晝永經垂幕以愴懷悲從中來不能自已握管言情聊抒痛悼月掩椒宮歎別離傷懷始覺夜蟲悲淚添雨㸃千行下此日微雨情割秋光百慮隨雁斷衡陽聲已絶魚沈滄海信難期繁憂莫解衷腸夢惆悵銷魂憶昔時又交頤淚灑夕陽紅徒把愁睂向鏡中露冷瑶階增寂寞煙寒碧樹恨西東舊詩詠盡難回首新月生來枉照空鸞影天涯無信息斷弦聲在未央宮又音容悲漸逺涕淚為誰流女德光千祀坤貞應九州凉風銷夜燭人影散瓊樓歎此平生苦頻經無限愁又淅瀝動秋聲中心鬱不平離愁逢葉落别恨怨蛩鳴寂寂瑶齊隔沈沈碧海橫玉琴哀響輟宵殿痛殘更中秋書懷多病多悲感百端暫來此地駐瓊鑾巖間雨歇衣還濕嶺外雲開露未乾風激清潭三汲浪秋催􅑁葉五更寒驚看圓月峰頭出似照愁腸勸夕餐守陵太監崔邦琪侍慈寧宮年久詩以賜之返照寒松影心懸泣露霜一生常感悼數載幾悲凉恨接雲峰近思連滄海長問安勞夢想絶矣九回腸康熙二十八年歲旱冬又無雪朕焦心勞思寢食俱廢二月初間謁陵路遇大雨田野歡聲方少抒朕懷故賦五言律以記之念愆思雲漢望歲意真純稼穡三時重祈豐六事頻風恬咸自樂雨灑易為春髙下皆霑足方知天至仁暢春園衆花盛開最為可觀惟緑牡丹清雅迥常世所罕有賦七言絶以記之碧蕊青霞壓衆芳檀心逐朵韞真香花殘又是一年事莫遣春光放日長詠花瓶擷取羣芳置案頭天香一段貯清幽人生常有悲歡事惟爾閒情不曉愁櫻桃初夏含桃味早全西山結實弱枝連赤瑛充薦休言過丹色濃濃衆果先雨後初晴戲作二首山腹重雲鎖晚煙水光逐浪共天連長橋疑作虹霓似落照扁舟湖上眠其二新晴雨後映斜陽草茂花繁處處香石色蒼苔隨岸緑橋邊垂柳挂絲長命裕親王福全皇長子允禔帥師征厄魯特錫之以詩萬國勤懷保三階願治平寰中皆赤子域外盡蒼生小蠢忘帡冒天心解鬬爭執迷思梗化伐罪事専征武略期無敵王師出有名親藩分鈇鉞長子擁麾旌貙虎資郎將貔貅壯禁營玉戈凝曉色金甲耀秋晴獲醜寧遺類籌邊重此行據鞍軍令肅橫槊凱書成煙火疆隅堠牛羊塞上耕遐荒安一體歸奏慰豫情養病塞北寒蟬鳴野樹旅雁過秋蓬嶺外皆紅葉城邊有緑桐身虛苦夏熱多病愛清風山色猶然在人顔漸不同幸無烽火事喜有智神功古北塞上望月桂樹清光挂碧天雲開萬里塞無煙逺人向背由敷政惟在籌邊與任賢康熙三十二年六月賜總督佛倫東表聞風化西秦作雨霖揚清知疾苦激濁勉官針曠世孤芳節超倫千古心封疆資大吏撫育代憂深夏燕新蓮紫燕雙雙到案前天教霖雨足禾田臨窗斜掠蓮花影雲與波光皆渺然其二丹橋緑柳囀黃鸝碧澗深林對小池睡起閒情題畫箑薰風動處樂雍熙聖祖仁皇帝御製文第二集卷四十四
