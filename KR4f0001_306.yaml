  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三目録敕諭諭吏部諭刑部諭大學士溫達松柱李光地蕭永藻王掞諭內閣諭大學士溫達松柱李光地蕭永藻王掞諭大學士溫達松柱李光地蕭永藻王掞諭大學士溫達松柱等諭大學士溫達松柱學士舒蘭馬良綽奇常泰諭大學士松柱李光地蕭永藻王掞等諭大學士溫達松柱李光地蕭永藻王掞學士舒蘭馬良傅爾呼納綽奇常泰彭始摶鄒士璁沈涵兼管翰林院事左都御史揆敘侍郎湯右曾等諭户部諭大學士溫達松柱李光地蕭永藻王掞學士綽奇常泰沈涵等諭大學士溫達等諭大學士溫達等諭禮部
