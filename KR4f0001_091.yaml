body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集總目六巻四十七古今體詩二十八首暮秋重出居庸關登鷄鳴山遥祝皇太后千秋蒙古老穉来迎咸勞遣之閲馬牛羊羣山行厄魯特之衆相繼来歸咸詢其父母兄弟妻子為陣前所獲者覔令完聚塞外初冬駐蹕歸化城古寺賜宴諸蒙古歸化城夜月昭君墓并序塞外寒夜書懐黄河并序十一月三日泛舟黄河流凌始下舟行之頃河水瑩潔波浪忽平脱脱城氷渡鄂爾多斯行圍雉兔甚多曉寒念将士河套西望噶爾丹遣人乞降示議政諸臣途中長至示大将軍伯費揚古入沙虎口右衛駐蹕經大同府并序汗血馬巻四十八古今體詩四十首再度居庸關雪霽駐蹕大同府過馬邑望雁門關途間紀事并序保徳州渡黄河出塞并序横城堡渡黄河抵寧夏望賀蘭山自寧夏出塞濵河行至白塔乘舟順流而下抵湖灘河朔作黄河舟行即事噶爾丹平後示諸臣晚眺凱旋言懐懐来示皇太子入居庸關清河覲皇太后慈顔近郊曉望二首諸皇子来迎示之見迎駕者過密雲作出古北口口外設屯耕植聚落漸成經喀爾沁口外中秋行圍敖漢禁滿查魯忒諸部落塞外偶述至廓爾沁部落與衆蒙古宴秋暮入烏喇境松花江網魚最多頒賜從臣泛松花江閲烏稽并序駐蹕烏喇之船厰憶壬戌春夏廵行此地每五日一奏請聖祖母太皇太后安今不可得矣書志慨慕烏喇山㠗間古木灌莽澤潦遍野即黄龍府之地也今人未暇詳攷賦詩二首行圍所經灰發葉赫哈逹諸地皆我祖宗之所開幷遺跡存焉賦詩二首巻四十九古今體詩四十一首興京駐蹕奉天府渡遼河所過松山杏山大凌河皆聖祖用武之地有述入山海關廣寧道中永平駐蹕豐潤即事望海敲蒸暑氣賦得漠漠水田飛白鷺賜髙士竒示諸皇子賦得雨去花光濕風歸葉影疎出畿東觀秋成萬樹叢中月一輪詠林檎用皇三子秋日郊行應制詩韻八哥兒潞河發舟天津徳州東昌道中舟過濟寧入江南境經邳徐界上雨閲河渡揚子江金山寺月夜廵歴江南示意虎邱閲河之便奉皇太后臨幸武林是日喜晴雲栖寺西湖湖心亭閒覽宋臣蘇軾開湖溉田築隄瀦水杭民利之為政者不當如是乎鷲峰雲林寺菜畦行宫雨中望吳山閲浙江駐防将士射巻五十古今體詩五十首示江南浙江守土諸臣再過鷲峰登吳山望錢塘江虎跑泉由淨慈寺經南屏諸山孤山放鶴亭玉泉有五色魚賜名清漣寺西湖再作浙省道上書懐桑林乍緑蠶事方興詩以嘉之曉發嘉興花山支硎山回鑾復過惠山舟行野望駐蹕江寧偶述修報㤙寺塔初畢登之過明太祖陵有感月夜登燕子磯江行憶暢春園牡丹金山雨望山中晚霽中泠泉望焦山念己巳曽登其上念淮揚居民特留漕糧二十萬以濟之回鑾之日復諄諭所司使布實恵泛洪澤湖偶詠漁舟夜泊渡河北歸宿遷過八牐仲子廟途次端午山左道中望岱憶舊闕里重修思欲一徃以天氣日暑急奉慈輿北歸未得瞻視紀詩八韻見途中夏麥将熟志喜北境候兄裕親王江南風雨阻回程二十天近京又是㣲旱五月二十五日霖雨如注喜雨賜峨嵋老僧察永定河廵子牙河建壩盛夏晚偶成七夕觀千葉蓮暢春園觀稻時七月十一日也詠桐老圗賜裕親王為考試歎禁園秋霽
