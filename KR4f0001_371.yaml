body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十五古今體詩三十三首春日即事最盛芳春育物多仲陽孳茂野煙和豈辭宵旰求民隱益守平成免賦苛望杏敦耕迎淑氣瞻蒲勸稼播嘉禾中疇社鼓聲相應敷惠元元載路歌曉發蘆溝有閏春深淑景遲長橋氷泮未流澌徘徊風景思疇昔千里金隄保舊規六里橋鐡柱鎔罏鑄冶鎮橋西往返行人舊迹迷世逺傳殊誰識得天南銅柱想應齊水村曾記江淮泊萬艘便旋水淀暫春逰雖無浩渺長波壯亦有清漪錦浪浮日暮帆檣排逺岸風輕簑笠聚芳洲鄉村不識居官况漫笑朝堂身世憂春水滿四澤條風拂春水碧漲繞煙岑梅蕚先知暖林梢漸覆隂栁舒鳴好鳥渚靜習時禽韶景融和處潛窺造化心舟中觀獵習戰昆明漢武穿於今江海靖鯨煙常思逺涉堅筋骨每令平流演獵船雁陳驚鎗離復合鷗羣畏弩𣪚還連衰年雖乏挽強力黽勉春搜以德先仲春聞雁漸喜春和踏草行郊原遙聼曙雞鳴賔鴻欲向銀灣渚社燕方栖靜舍楹已覺隂消餘雪𣪚爭看陽長早潮生省耕畿輔先羣吏留憩田間夜不驚閲永定河隄有序康熙四十年永定河告成至今十六載隄岸堅固並無泛濫去嵗山水陡長幾不能保所以春幸回鑾便道察閲方知昔年修築有益於民生永保安瀾矣故賦七言近體以記其事豫定安瀾在事前每逢雨潦自心牽帑金不惜籌耕種膏土惟思廣陌阡隄老失防愁剝蝕岸堅常護幸安全肩輿頻視桃花水滚滚渾波通碧漣絡緯飬至暮春秋深厭聒耳今得錦囊盛經臘鳴香閣逢春接玉笙物微宜護惜事渺亦均平造化雖流轉安然比飬生五十五年三月下旬園中桃杏玉蘭梅花齊放其中玉蘭茂盛可觀特請皇太后一閲玉花萬朵祝慈顔藉奉歡心半日間閏月春遲添嵗永香枝風送待時還膝前五代承王母陛下千齡獻夀山乍曉銅龍迎鳳輦霜容天上覩仙鬟去嵗三冬有雪至三月間農忙之際二十七日夜雨竟夕喜而成詠滋麥如酥雨空濛入土膏心同黎庶苦目盼紫壇髙任器已知重安人寧避勞春愁暫且釋點點付揮毫賦得隴麥節遲穀雨後田麥始分畦已送花開盡難將春事稽純陽時序近餘閏化成齊未卜隂晴適先期輯庶黎五十五年冬謁陵作拜奉山陵泪兩垂提携鞠育賴仁慈松林轉盛青如許鬢髮勞傷白所宜屈指多年思慕永深慚暮景逺來遲珠邱玉殿依然覲悲想音容寸晷移春幸載陽節候愛春和賔日中衡社後過東作勤耕勞衆力西成有穫廣農科官針先戒關河固節鉞曾經嵗月多正已清心倡庶吏宣恩莫使政煩苛風阻駐蹕白洋湖偶成平波數頃似江聲風阻湖邉一日程可笑當年巡幸逺依稀吳越列行營小滿後偶旱塗中祈雨四月二十三日甘霖大霈夙夜愁懷春夏間天時難信未怡顔平原晚麥纎莖稿四野新禾旱色殷乍起雲光連嶺岫先垂雨腳遍人寰共沾甘澍敷膏澤民食方知稼穡艱晚夏偶成青榛方作粒郁李漸微紅草藥迷香徑荷花待晚風莫愁秋雨近且望嵗時豐倚檻頻觀稼銀鬚一老翁憶揚州天寧寺竹久别金焦十一年依稀寒暑遞推遷此君有意虛心待歎我徒勞幽思牽雁逐西風何處問雲回北地竟誰傳翠筠晚節饒蒼籜逺寄宸章梵宇前七月十六日賜九十一嵗老和尚暑退全消陌上塵盂蘭大喜見姚秦臨風洗鉢龍池雨凝露舒蓮鷲嶺春送節雙輪同夢幻持心半偈見深淳循環已識盈虛理不向山僧更問津題畫杖藜端不染輕塵野趣天然景物新春水風帆一目盡孰知逝者太華津澤卜尊丹巴胡土克圖老喇嘛上夀想像當年論轉輪龍沙遙隔十餘春相知惟有菩提行得解嘗聞祕密真花雨頻施鋪佛帳貝經每祝上楓宸睂橫鼻豎長松夀導引衆生善後因未開新荷清和將盡未端陽時雨催擎珠點涼不染淤泥看淨植雖無花氣葉先香戲題千里眼欲窮視逺目曠渺有無中體認全慿凖遐觀約略同雖依雙鏡力獨用一瞳功不重西來巧清明本在躬賜松江提督趙珀憶昔雲間山水邦波流清潤抵松江春秋久未臨鑾輅時刻嘗懷擁節幢訓練多方􅈺步伐撫循成俗重敦龎建牙好慰軍民望服衆投醪士氣降緑金蓮花牡丹有緑誠仙品幻色生香野草中數朵乍開凝碧玉黃花應遜碧花叢賜老大臣舊日講筵剩幾人徒傷老朽並君臣平生壯志衰如許諸事灰心懶逼真求簡逡巡多恍惚遇煩留滯纍精神年來詞賦荒疏久覔句深慚筆有塵蘇州巡撫吳存禮曾記臨吳十二年文風人傑並堪傳豫懷常念窮黎困勉爾勤針官吏賢山莊四季節屆三春勝發生萬彚齊諸花候御輦百穀待村犂九夏愁暘雨千林葉正肥秪因思避暑端拱計頻違金風多􅐩颯清露滴煙浮目睹倉箱滿方知嵗有秋嵗暮添霜鬢殷勤宵旰勞地寒盈尺雪還慮北風髙冬至不能全禮老殘多阻詣圜丘一念精誠或解憂愆過常思天每鑒衰頺恆覺自難由無心成化無私覆不息流行不顯求瞻拜洪鈞斬禮缺書雲顒望太平秋病中偶爾問及工部尚書翰林院掌院學士徐元夢乃同學舊翰林康熙十六年以前進士再無一人矣率賦一律以遣悶懷七旬彼此對堪憐病裏回思一慨然少小精神皆𣪚盡老年嵗月任推遷常懷舊學窮經史更想餘間力簡編詩興不知何處至拈毫又覺韻難全聖祖仁皇帝御製文第四集卷三十五
