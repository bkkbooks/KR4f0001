body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷三敕諭諭大學士伊桑阿馬齊張玉書吳琠熊賜履總河請開邵家莊引河掘徐家莊河嘴等事若下部議必致遲延著即照所題行朕觀永定河修築之法甚善河身直河底深所以淤沙盡皆衝刷今治黃河亦用此法方為有益此工多費不過十萬兩試照永定河法修治之康熙四十一年九月十六日諭大學士伊桑阿馬齊張玉書吳琠熊賜履今所開陶莊引河甚善朕前巡視南河時曽令原任員外黑碩色將引河之樁加意深築其疏濬人字芒稻二河亦佳得此二河運河甚為有益朕觀明朝治河俱自徐州以上在河南地方修築我朝自康煕元年以來俱在徐州以下修築然治下流須預防上流若上流潰決下流必至壅滯嗣後徐州以上地方河臣亦當留意再黃河之水遷徙無定朕前在寧夏時見黃河大溜每年更移今年行溜在此來年又移他處其性如此况九河故道原在河間地方後漸移向南歷代以來果能每年防禦相機修理則河道何至如此大壞皆因時當多事或十年或五年不修築不開濬所以漸難治矣明朝三百年間嘗講求河工治法彼時措置亦得其宜如山東微山湖將水蓄聚山中潦則蓄之旱則泄之皆深有益於治河者也康煕四十一年九月十九日諭山東省官員爾等皆各有字頒賜不須求也爾等做官以清亷為第一做清官甚樂不但一時百姓感仰即離任之後百姓追思建祠尸祝豈非盛事從來百姓最愚而實難欺官員是非賢不肖人人有口不能強之使加毁譽爾等各宜自勉康熙四十一年十月十四日諭扈從大學士張玉書直隸巡撫李光地用儀器測量遠近此一定之理斷無差舛萬一有舛乃用法之差非數之不準以此算地理算田畞皆可頃刻立辨但須細用工夫方能準驗大抵不離三角形耳三角形從前雖無此名而歷來算法必有所本如勾股法亦不離三角形是此法必自古流傳特未見於書故不知所始也康熙四十一年十月二十四日諭户部今歲山東河南地方秋成俱報豐稔惟被災州縣民多匱乏頃朕巡幸至德州見有一二災民流移載塗者詢問疾苦深為軫念雖據山東巡撫稱被災州縣已行令地方官發粟散賑但自冬徂夏青黃不接之際頒賑不繼無以資生應行山東河南兩省巡撫凡屬被災地方令有司加意賑濟至明歲麥收時方止其災傷田糧雖已照分數蠲免猶恐被災之後民力艱難宜更沛特恩用加休養山東萊蕪新泰東平沂州蒙隂沂水河南永城虞城夏邑被災州縣康熙四十二年地丁錢糧除漕項外著察明通行蠲免該地方官務悉心奉行俾閭巷窮黎均霑實惠以無負朕宵旰勤民殷殷軫恤至意爾部即遵諭行特諭康熙四十一年十一月初九日諭户部從來致治之道裕民為先故必蠲免田租時加濊澤而後閭閻充足永享樂利之休朕臨馭以來咨求民瘼蠲賑頻施誠恐小民疾苦未蘇生業未遂用是宵旰靡寧江北田土瘠薄生計尤艱朕心彌切軫念著將安徽巡撫所屬府州縣衛等處康熙四十二年分地丁錢糧除漕項外通行蠲免地方有司務要切實奉行俾小民得均霑實惠以副朕愛養黎元之意儻不肖官吏陽奉隂違或借端苛取澤不下究事發定從重治罪不宥爾部即遵諭行特諭康煕四十一年十一月初九日諭户部朕撫御寰區四十餘年無一刻不以民生為念天下至大兆民至衆惟恐窮鄉僻壤百姓疾苦不能上達所以孜孜勤求未嘗少懈從來水旱自古有之備荒之法全賴督撫得人儻以諱災為事虧空塞責一有歉薄莫知所措視民命如草芥何以為民父母况秦省不通水運若不謹於蓋藏儉歲難於賑恤河西一帶地方素稱貧瘠雖免四十一年錢糧民生未裕再將四十二年地丁錢糧通行蠲免該督撫遍示所屬地方務使閭閻均霑實惠以副朕惠愛元元之至意如有不肖有司違旨私徵希圖侵蝕者督撫察參從重治罪或被旁人告發或被科道糾劾該督撫一併嚴議特諭康熙四十一年十一月初九日諭內閣近見各部院衙門或所辦事件有錯誤者惟恐事情覺露專務隱匿不行檢舉朕一日二日總理萬幾亦止詳識緊要事務安能逐事一一記之各部院檔案繁多勢不能無舛錯遺漏或有舛錯遺漏而即自行檢舉則其過猶為可恕若懼罪隱匿不行檢舉則事必終於舛錯所貽誤甚大爾等將此旨傳諭各部院滿漢大臣知之康熙四十一年十一月初十日諭工部禹陵殿宇應即行修葺著交與杭州織造敖佛和令確估工價動支織造節省銀兩會同地方官盡心料理稱朕尊崇前代聖王之意康熙四十一年十一月二十六日諭大學士馬齊西哈納原任侍郎額星格前因罣誤革職非有大過今年已衰老朕比來巡歷所至凡此等罣誤罷間年老官員在籍者皆給與原官職銜以示優遇老臣之意額星格著以原銜給之康熙四十一年十二月初六日諭都察院都御史六科給事中各道御史等朕即位四十餘年未嘗少刻不以民生休戚為念遠邇安靜為本雖或慶雲景星嘉禾瑞草天書麟鳳之竒總無關於黔黎亦無關於朕心反為史書之譏朕以實心為民天視天聽故有其道難免後人公論若耀功德取一時之虛名朕之不悅甚矣毋煩數陳康熙四十一年十二月十六日諭扈從大學士馬齊張玉書學士色德里劉光美司業降調劉芳哲請安來朝朕見其年邁心甚憫之彼係舊翰林可傳諭吏部復其所降原級康熙四十二年正月十七日諭户部朕甲子己巳兩次南巡路經東省見民生豐裕士庶共慶近來淮黃告成朕不辭遠涉減從輕行待旦而興夜分乃寐再經齊魯存問民生休戚似不及甲子己巳朕深憯怛痌瘝之在抱也若閭閻蓄積有餘即遇有水旱亦不致困苦今特加恩蠲恤用宏愛養朕所經過地方德州平原禹城齊河歷城長清恩縣夏津武城館陶臨清清平博平堂邑聊城東阿陽榖壽張滕嶧二十州縣康熙四十一年未完地丁錢糧著通行蠲免濟南府屬之海豐利津霑化兖州府屬之寧陽滋陽泗水金鄉單曹鄆城曲阜費十二州縣去歲農收歉薄四十一年未完錢糧亦通行免徵其去歲曽被水災者東平新泰蒙隂沂州沂水萊蕪六州縣康煕四十二年地丁錢糧已經全免外四十一年未完錢糧亦俱著全免其泰安郯城魚臺汶上嘉祥巨野濟寧七州縣雖未成災四十一年未完錢糧俱著蠲免四十二年地丁錢糧著分三年帶徵爾部即移文該撫董率各州縣有司詳愼奉行務令人霑實惠户有餘藏以稱朕重期黎元殷阜之至意有不肖官吏侵蝕私徵者察出定從重治罪爾部即遵諭行特諭康熙四十二年正月二十六日諭山東巡撫王國昌朕自泰安州見新泰蒙隂沂州郯城等處城郭鄉村黎民被災甚苦雖將正賦蠲免而方在乏食尚屬無益徒有賑濟之名而倉粟諒已盡竭又觀黎民顔面衣服深為可慮朕懷不勝憫惻更為盡心籌畫欲救民急固屬甚難如以養濟蒙古例施於山左庶幾青黃不接之際猶可度日命在京滿漢大學士九卿會議無論官民有情願效力者作速遣往山東不拘銀米同地方官分界賑濟以及降級革職人等有情願贖罪者亦準其贖罪俟秋成後視其果有禆益酌量議敘已有諭旨該撫同爾屬員善為撫綏勿致流離失所務期副朕視民如子之至意即將告示刋刻遍行曉喻特諭康熙四十二年二月初一日諭户部朕經過泰安州新泰縣蒙隂縣沂州郯城縣等處見民有飢色應急行振救所過地方雖經賑濟蠲免錢糧但州縣倉穀年久朽爛無禆於散賑今著將總漕桑格漕米內二萬石交與總河張鵬翮揀選賢能官員運至濟寧州兖州府等處州縣減價平糶有應賑之處即行賑濟亦交米二萬石與桑格於泰安州一路散給又將收稅有力之官七員並發在京旗民贖罪人一百名令伊等俱照養蒙古例以所用之多寡分别議敘康熙四十二年二月初二日諭河道總督張鵬翮仲莊閘清水出口逼溜使南恐運口有礙應從陶家莊以下楊家莊處開挑引河令中河之水由此出口方於運口有益楊家莊雖地勢低窪然即使倒灌亦不過一二里清水仍然頂出可即相度形勢估計奏聞仲莊石閘工著暫停康熙四十二年二月初四日諭河道總督張鵬翮煙墩甚險雖有越堤必須保守縷堤此處挑水壩應行建築桃源煙墩至龍窩一帶堤工卑矮俱應加高康熙四十二年二月初四日諭永定河分司齊蘇勒朕觀黃河險要地方應下挑水掃壩現今永定河朕親指示挑水等工俱有禆益爾遵照朕指示式樣前往煙墩九里岡龍窩三處築挑水壩數座試看有無禆益雖被衝壞無妨工完之日令該地方官盡心防守如有墊陷不時修葺可將此旨傳與總河張鵬翮速派賢員令其多備物料夫匠於朕回鑾之前完工需用錢糧與爾無涉不可經手工完將用過錢糧記明具奏如遇桃汛水發即行停止康熙四十二年二月初五日諭河道總督張鵬翮歸仁堤引河用以分泄洪澤湖水勢若黃水加長則恐清口水弱著將祥符閘下板堵閉草壩將五堡閘應酌量開放以助清水之勢又禹王臺沭水由沭陽入海沭河淤墊之處應勘明即行疏濬康熙四十二年二月初五日聖祖仁皇帝御製文第三集卷三
