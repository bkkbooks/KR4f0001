body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十八古今體詩四十首再度居庸關草木未甲坼年光屬早春三番勞遠馭一舉本勤民峽暖泉聲動風和鳥噪新會看歌凱入景物盡還淳雪霽駐蹕大同府驟飄春雪灑驚沙重向雲中過翠華轉盼遐區征調息期將習俗尚桑麻過馬邑望鴈門關南指重山望鴈門蒼然嵐氣結朝昏當春田土皆耕耨阡陌綿綿古塞原途間紀事并序先是前驅之人言明日駐李家溝僅一井未足扈從人騎之需豫貯水三百甕尚虞有缺是日朕行至中途見有一水自三岔堡流來一水自韓家樓流出橫築一隄以壅之召詢土人云此河久涸三日前河水忽至有司恐漫衍官道故築此堰朕登髙覽觀揆度地勢若決此堰河水可至李家溝因命侍衛率人疏濬不兩時河水洋溢流至營外深三四尺人騎汲飲有餘莫不欣悅向貯之水皆不用昔聞有行師山谷間靈泉湧出心未之信頃萬人目覩咸以為異朕之涼德何當天祐耶因紀其事昔聞靈貺説今見異河來瀠曲經山谷汪洋歷澗隈安營流漸下決堰勢初回馬飲無須窟人嘗止用杯村荒咸得潤夜靜響同雷詎但霑行帳還能沃土垓仰邀天顧重頓使地形開七校多欣悅何勞渴指梅保德州渡黃河入塞河聲壯朝宗勢拱環劃疆分晉野隔岸是秦山城郭巔崖裏旌旄浩渺間橫流渡舟楫前路指蕭關出塞并序沿邊山行岡嶺崎嶇黃沙彌望因自榆林鎮取道塞外沙淺途平水草咸便且十二日之程減半得達安邊堡書以記之森森萬騎歷駝城榆林鎮一名駝城沙塞風清磧路平冰泮長河堪飲馬月來大野照移營郵籤紀地旬餘驛羽轡行邊六日程天下一家無內外烽銷堠罷不論兵橫城堡渡黃河歷盡邊山再渡河沙平岸闊水無波湯湯南去勞疏築惟此分渠利賴多黃河至處多足為患惟寧夏開渠種田資以為利抵寧夏面水依山古朔方巡行葆羽下巖疆戍樓雖設無傳警甲士皆精力挽強實政安人遵道德霸圖拓宇説金湯當年統萬真誇誕寧夏城相傳為勃勃赫連所築取統一天下而臨萬方之意可謂妄矣何似於今控制長望賀蘭山嶻嶪排霄聳處雄馬頭蒼駮望難窮遙遮洮隴綿秦塞迅掃埃氛薄漢功氣雜雲煙疑結陳勢回龍虎狀盤空金戈夜火長征地盡屬西陲界域中自寧夏出塞濱河行至白塔乘舟順流而下抵湖灘河朔作黃河之源難可窮滔滔來自遐荒中既入洮蘭復西出飛濤浩瀚聲淙淙來從邊山遠跋涉遣師挽餉兼採風回鑾欲假順流便特乘艇艦浮奔洪瀠洄大野勢幾曲沙岸頽突還巃嵸亂柳排生枝幹密中有巨鹿藏榛叢遙山轉轉行莫盡忽前俄後迷西東有時塞雲催急雨晚天霽色橫長虹旌門月上夜皎潔水光直與銀漢通放棹百里只瞬息迅於走坂馳駿驄中宵望見旄頭落幕北已奏煙塵空四月十四日夜奏報噶爾丹窮蹙自盡其下悉平兹行永得息兵革豈惜曉暮勞豫躬長河綿延古鮮歷巡閲乃與區域同自此寰海樂清晏熙恬萬國咸亨豐黃河舟行即事五月山巔雪四時不見花臨流皆險浪步岸是叢葭心為萬年計身離百日家郅支函首至從此靖龍沙噶爾丹平後示諸臣蒞宇心無倦寧人慮每周一從沙漠擾時厪深宮憂日旰食始進未明衣先求或云小醜徒廟堂何須籌或云自往代兹類難鋤耰念我祖宗基不與古昔侔沿邊諸外藩奉職如列侯一一效驅策非徒貢賮修顧此豺狼種狂逞匿林丘侵欺我屬國濳入我遐陬設竟置罔聞何以示綏柔因之違羣議秉鉞麾貔貅扼塞伏偏師兼程裹糧餱事無巨與細皆為先綢繆五月入不毛破賊瀚海頭遁免僅及身資帳咸躪蹂秋冬再臨邊寒風透重裘方春更遠陟秦晉歷邑州乞降多詭詞其意本夷猶孽子已成俘族黨紛奔投未能悔厥心尚思延蜉蝣分道命禁旅夏肅氣如秋頓爾膺天誅無庸施戈矛幕南與幕北圖輿萬里收華山可歸馬桃林宜放牛息兵培元氣黎庶永安休于野樂稼穡于朝獻訏謀交泰賴臣工長與蒙天庥晚眺軍門延夕眺雲氣淡遙天古塞千峰月平沙萬幕煙旌旗寒色壯刁斗晚風傳釁甲從今始功成靖朔邊凱旋言懷黃輿奠四極海外皆來臣眷言漠北地煢煢皆吾人六載不遑息三度勤征輪邊柝自此靜亭堠無煙塵兵革方既偃風教期還淳興廉遵昔軌崇文育羣倫所用惟才俊非僅榮簪紳爾俸與爾祿脂膏出細民永念固邦本不愧王國賓懷來示皇太子春初夙駕回當暑探盡黃流岸曲紆只為敉寧籌逺馭不辭煩苦歷征途入居庸關始和羽騎出重關風動南薰整斾還凱奏捷書傳朔塞歡聲喜氣滿人寰懸崖壁立垣墉固古峽泉流晝夜間須識成城惟衆志稱雄不獨峙羣山清河覲皇太后慈顔遐方異域絶纖塵奉贄來朝悉我臣今日承歡尤色喜慈闈悅豫為生民近郊鑾輿還斾近郊坰自此邊方賀永寧匝嵗歸程當夏月又逢禾黍雨中青曉望喜看西北靜煙氛飲至歸來息我軍向曉馬頭遙指處日光擁出萬重雲又郊圻漸近快時晴四望關山曉氣清邊徼往來非得已驅除總為計生成諸皇子來迎示之行盡龍荒到鳳城三回寒暑事長征只須勤儉思無逸説與艱難遠道情見迎駕者疊鼓鳴鐃列斾旌鵷行鷺序續編氓依依馬首嵩呼處念此歡迎赤子情過密雲作秋氣驅殘暑青林墮葉稀馬嘶涼籟動蟬噪夕陽微河繞遙通塞山回盡拱畿黍苖膏雨足歲事念民依出古北口年年秋獮此經過峭石天成險隘多沙漠名王皆屬國但留形勝壯山河口外設屯耕植聚落漸成沿邊曠地多棄置良非策年來設屯聚教以分阡陌春夏耕耨勤秋冬有畜積霜濃早收黍暄遲晚刈麥土固有肥磽人力變荒瘠山下出流泉屋後樹豚柵行之無倦弛定能增户籍古來王者治恐亦無以易經喀爾沁古木蒼山路不窮霜林颯沓響秋風臨流駐蹕歸營晚坐看旌門落照紅口外中秋荒塞天低夜有霜一輪明月照蒼涼不貪玉宇瓊樓看獨在遐陬理外疆行圍敖漢奈曼查魯忒諸部落農暇巡侯甸揚旌歷遠途軍容陳七萃武事講三驅永罷防秋戍咸為首路趨晚來圍獵罷羽衛集平蕪塞外偶述曉霧迷前嶺蒙茸露未晞林中呼鹿罷山下射熊歸水繞周廬曲原髙衆幕圍時平疆域遠萬里盡庭扉至廓爾沁部落與諸蒙古宴大野支黃幄長筵藉軟莎恩膏宣塞下部落列山阿法酒沾人醉椎牛饗衆多提攜偕婦稚千帳動歡歌秋暮落葉催寒早山山草遍枯雪晴麋得食風急雁銜蘆松古紛披出林深髙下殊漫云沙塞地别自足饒腴入烏喇境蒼山岌嶪路綿延野燎荒原起夕煙幾點寒鴉宿枯樹半灣流水傍行旃松花江網魚最多頒賜從臣松花江水深千尺棙柂移舟網親擲溜洄水急浪花翻一手提綱任所適須臾收處激頽波兩岸奔趨人絡繹小魚沈網大魚躍紫鬛銀鱗萬千百更有巨尾壓船頭載以牛車輪欲折水寒冰結味益佳遠笑江南誇魴鯽遍令頒賜扈從臣幕下然薪遞烹炙天下才俊散四方網羅咸使登巖廊爾等觸物思比託捕魚勿謂情之常泛松花江源分長白波流迅支合烏江水勢雄木落霜空天氣肅旌麾過處映飛虹閲窩集并序古松林數十里蔭翳無際非亭午夜分不見日月松林黯黯百十里罕境偏為麋鹿遊雨雪飄蕭難到地啼烏野草自春秋駐蹕烏喇之船厰憶壬戌春夏巡行此地每五日一奏請聖祖母太皇太后安今不可得矣書志慨慕曽問慈寧草奏箋夜張銀燭大江邊重來往事俄追憶轉眼光隂十七年烏喇山嶴間古木灌莽澤潦遍野即黃龍府之地也今人未暇詳考層岡翳薈亂髙低駿馬迎風不住嘶磧裏草深行潦闊遲回應惜錦障泥二路轉山環雜古柯覆茅苫舍傍坡陀疆隅湮沒遼金界虎穴鷹巢處處多行圍所經灰發葉赫哈達諸地皆我祖宗之所開并遺迹存焉鐵馬金戈百戰時戎衣辛苦首開基榻邊鼾睡聲先定始布中原一著棋二垣墉遺址尚山坳略地平城闢土茅蕩滌塵沙真不易仰思遺烈駐雲旓聖祖仁皇帝御製文第二集卷四十八
