body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻四十八古今體詩四十首再度居庸闗草木未甲坼年光屬早春三番勞遠馭一舉本勤民峽暖泉聲動風和鳥噪新㑹看歌凱入景物盡還淳雪霽駐蹕大同府驟飄春雪灑驚沙重向雲中過翠華轉盼遐區征調息期將習俗尚桑麻過馬邑望鴈門闗南指重山望鴈門蒼然嵐氣結朝昏當春田土皆耕耨阡陌緜緜古塞原途間紀事并序先是前驅之人言明日駐李家溝僅一井未足扈從人騎之需豫貯水三百甕尚虞有缺是日朕行至中途見有一水自三岔堡流来一水自韓家樓流出横築一隄以壅之召詢土人云此河久涸三日前河水忽至有司恐漫衍官道故築此堰朕登髙覽觀揆度地勢若决此堰河水可至李家溝因命侍衞率人疏濬不兩時河水洋溢流至營外深三四尺人騎汲飲有餘莫不欣悅向貯之水皆不用昔聞有行師山谷間靈泉湧出心未之信頃萬人目覩咸以為異朕之凉徳何當天祐耶因紀其事昔聞靈貺說今見異河来瀠曲經山谷汪洋歴澗隈安營流漸下决堰勢初廻馬飲無須窟人嘗止用杯邨荒咸得潤夜靜響同雷詎但霑行帳還能沃土垓仰邀天顧重頓使地形開七校多欣悅何勞渴指梅保徳州渡黄河入塞河聲壯朝宗勢拱環劃疆分晉野隔岸是秦山城郭巔崖裏旌旄浩渺間横流渡舟楫前路指蕭闗出塞并序沿邊山行岡嶺崎嶇黄沙彌望因自榆林鎮取道塞外沙淺途平水草咸便且十二日之程減半得達安邊堡書以記之森森萬騎歴駝城榆林鎮一名駝城沙塞風清磧路平冰泮長河堪飲馬月来大野照移營郵籤紀地旬餘驛羽轡行邊六日程天下一家無内外烽銷堠罷不論兵横城堡渡黄河歴盡邊山再渡河沙平岸闊水無波湯湯南去勞疏築惟此分渠利賴多黄河至處多足為患惟寧夏開渠種田資以為利抵寧夏面水依山古朔方巡行葆羽下巖疆戍樓雖設無傳警甲士皆精力挽强實政安人遵道徳霸圖拓宇說金湯當年統萬真誇誕寧夏城相傳為勃勃赫連所築取統一天下而臨萬方之意可謂妄矣何似於今控制長望賀蘭山嶻嶪排霄聳處雄馬頭蒼駮望難窮遥遮洮隴緜秦塞迅埽埃氛薄漢功氣雜雲煙疑結陣勢廻龍虎狀盤空金戈夜火長征地盡屬西陲界域中自寧夏出塞濱河行至白塔乘舟順流而下抵湖灘河朔作黄河之源難可窮滔滔来自遐荒中既入洮蘭復西出飛濤浩瀚聲淙淙来從邊山遠跋渉遣師輓餉兼採風廻鑾欲假順流便特乘艇艦浮奔洪瀠洄大野勢幾曲沙岸頽突還巃嵸亂柳排生枝榦宻中有巨鹿蔵榛叢遥山轉轉行莫盡忽前俄後迷西東有時塞雲催急雨晚天霽色横長虹旌門月上夜皎潔水光直與銀漢通放櫂百里只瞬息迅於走坂馳駿驄中宵望見旄頭落幕北已奏煙塵空四月十四日夜奏報噶爾丹窮蹙自盡其下悉平兹行永得息兵革豈惜曉暮勞予躬長河緜延古鮮歴巡閱乃與區域同自此寰海樂清晏熙恬萬國咸亨豐黄河舟行即事五月山巔雪四時不見花臨流皆險浪歩岸是叢葭心為萬年計身離百日家郅支圅首至從此靖龍沙噶爾丹平後示諸臣莅㝢心無倦寧人慮每周一從沙漠擾時厪深宮憂日旰食始進未明衣先求或云小醜徒廟堂何須籌或云自往代兹類難鋤耰念我祖宗基不與古昔侔沿邊諸外藩奉職如列侯一一効驅策非徒貢賮修顧此豺狼種狂逞匿林丘侵欺我屬國濳入我遐陬設竟置罔聞何以示綏柔因之違羣議秉鉞麾貔貅扼塞伏偏師兼程裹糧餱事無巨與細皆為先綢繆五月入不毛破賊瀚海頭遁免僅及身資帳咸躪蹂秋冬再臨邊寒風透重裘方春更遠陟秦晉歴邑州乞降多詭詞其意本夷猶孽子已成俘族黨紛奔投未能悔厥心尚思延蜉蝣分道命禁旅夏肅氣如秋頓爾膺天誅無庸施戈矛幕南與幕北圖輿萬里收華山可歸馬桃林宜放牛息兵培元氣黎庶永安休于野樂稼穡于朝獻訏謀交泰賴臣工長與䝉天庥晩眺軍門延夕眺雲氣澹遥天古塞千峰月平沙萬幕煙旌旗寒色壯刁斗晩風傳衅甲從今始功成靖朔邊凱旋言懷黄輿奠四極海外皆来臣眷言漠北地㷀㷀皆吾人六載不遑息三度勤征輪邊柝自此靜亭堠無煙塵兵革方既偃風教期還淳興㢘遵昔軌崇文育羣倫所用惟才俊非僅榮簪紳爾俸與爾禄脂膏出細民永念固邦本不愧王國賓懷来示皇太子春初夙駕回當暑探盡黄流岸曲紆只為敉寧籌逺馭不辭煩苦歴征途入居庸闗始和羽騎出重闗風動南薰整斾還凱奏㨗書傳朔塞歡聲喜氣滿人寰懸崖壁立垣墉固古峽泉流晝夜閒須識成城惟衆志稱雄不獨峙羣山清河覲皇太后慈顔遐方異域絶纖塵奉贄来朝悉我臣今日承歡尤色喜慈闈悅豫為生民近郊鑾輿還斾近郊坰自此邊方賀永寧匝嵗歸程當夏月又逢禾黍雨中青曉望喜看西北靜煙氛飲至歸来息我軍向曉馬頭遥指處日光擁出萬重雲又郊圻漸近快時晴四望闗山曉氣清邊徼往来非得已驅除總為計生成諸皇子来迎示之行盡龍荒到鳳城三廻寒暑事長征只須勤儉思無逸說與艱難遠道情見迎駕者疊鼔鳴鐃列斾旌鵷行鷺序續編氓依依馬首嵩呼處念此歡迎赤子情過密雲作秋氣驅殘暑青林堕葉稀馬嘶凉籟動蟬噪夕陽微河繞遥通塞山廻盡拱畿黍苖膏雨足歲事念民依出古北口年年秋獮此經過峭石天成險隘多沙漠名王皆屬國但留形勝壯山河口外設屯耕植聚落漸成沿邊曠地多棄置良非策年来設屯聚教以分阡陌春夏耕耨勤秋冬有畜積霜濃早收黍暄遲晚刈麥土固有肥磽人力變荒瘠山下出流泉屋後樹豚柵行之無倦弛定能増户籍古来王者治恐亦無以易經喀爾沁古木蒼山路不窮霜林颯沓響秋風臨流駐蹕歸營晩坐看旌門落照紅口外中秋荒塞天低夜有霜一輪明月照蒼凉不貪玉宇瓊樓看獨在遐陬理外疆行圍敖漢柰曼查魯忒諸部落農暇巡侯甸揚旌歴遠途軍容陳七萃武事講三驅永罷防秋戍咸為首路趨晚来圍獵罷羽衞集平蕪塞外偶述曉霧迷前嶺䝉茸露未晞林中呼鹿罷山下射熊歸水繞周廬曲原髙衆幕圍時平疆域遠萬里盡庭扉至廓爾沁部落與諸䝉古宴大野支黄幄長筵藉軟莎恩膏宣塞下部落列山阿法酒沾人醉椎牛饗衆多提攜偕婦穉千帳動歡歌秋暮落葉催寒早山山草徧枯雪晴麋得食風急雁銜蘆松古紛披出林深髙下殊漫云沙塞地别自足饒腴入烏喇境蒼山岌嶪路緜延野燎荒原起夕煙幾㸃寒鴉宿枯樹半灣流水傍行旃松花江網魚最多頒賜從臣松花江水深千尺棙柂移舟網親擲溜洄水急浪花翻一手提綱任所適須臾收處激頹波兩岸奔趨人絡繹小魚沈網大魚躍紫鬛銀鱗萬千百更有巨尾壓船頭載以牛車輪欲折水寒冰結味益佳遠笑江南誇魴鯽徧令頒賜扈從臣幕下然薪遞烹炙天下才俊散四方網羅咸使登巖廊爾等觸物思比託捕魚勿謂情之常泛松花江源分長白波流迅支合烏江水勢雄木落霜空天氣肅旌麾過處映飛虹閱窩集并序古松林數十里䕃翳無際非亭午夜分不見日月松林黯黯百十里罕境偏為麋鹿遊雨雪飄蕭難到地啼烏野草自春秋駐蹕烏喇之船厰憶壬戌春夏巡行此地每五日一奏請聖祖母太皇太后安今不可得矣書志慨慕曽問慈寧草奏箋夜張銀燭大江邊重来往事俄追憶轉眼光隂十七年烏喇山㠗間古木灌莽澤潦徧野即黄龍府之地也今人未暇詳攷層岡翳薈亂髙低駿馬迎風不住嘶磧裏草深行潦闊遲回應惜錦障泥二路轉山環雜古柯覆茅苫舍傍坡陀疆隅湮没遼金界虎穴鷹巢處處多行圍所經灰發葉赫哈達諸地皆我祖宗之所開并遺跡存焉鐵馬金戈百戰時戎衣辛苦首開基榻邊鼾睡聲先定始布中原一著棋二垣墉遺址尚山坳略地平城闢土茅盪滌塵沙真不易仰思遺烈駐雲旓聖祖仁皇帝御製文第二集巻四十八
