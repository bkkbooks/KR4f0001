body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷十三目錄勅諭諭將軍巴海副都統薩布蘇瓦里虎等諭大學士勒徳洪明珠李霨王熙學士噶爾圖石柱張玉書諭部院諸臣諭户部諭刑部諭吏部諭户部尚書梁清標侍郎李天馥諭兵部諭議政王貝勒大臣内閣九卿詹事科道諭禮部諭兵部諭禮部諭部院大臣諭朝覲各官諭刑部諭户部諭大學士勒徳洪明珠李霨王熙黄機呉正治學士薩海阿蘭泰石柱王守才金汝祥胡簡敬孫在豊諭刑部
