body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷十三敕諭諭大學士九卿等京城通州倉內貯米甚多各省漕糧起運亦無缺誤與其在此倉內堆積以致耗散杭州蘇州鎮江江寧淮安安慶等處俱有倉厫與水路相近江南浙江漕船想此時已過朕意欲將湖廣江西等未過漕糧截留存貯此等地方倉內遇米價湧貴之年將此存貯米石或減價糶賣或行散賑則民人得沾實惠大有裨益如地丁錢糧雖經蠲免不過於田多富户有益其無地窮民有何益處則米榖甚屬緊要不可不預為備也年來雖遇豐收米糧價賤但嵗嵗豐收豈能期必乎應將久逺裨益之處預行籌畫著內閣九卿將漕糧作何截留之處會同議奏康熙五十八年正月二十九日諭大學士九卿等各省虧空錢糧甚多總督楊琳因查出歷年積欠錢糧將伊應得銀兩照數補完鹽課事務俱已清楚并將督撫趙𢎞燦滿丕等從前所得銀兩行文伊等解送甘肅以為軍需之用此銀兩解到甘肅作何項錢糧使用令繕本題明由此觀之各省虧空錢糧督撫等果能盡心竭力補完則虧空可以完結其作何將虧空錢糧完結之處內閣九卿等會同詳確議奏康熙五十八年正月二十九日諭大學士馬齊等户部現今採買器皿舊銅兹工部又行採買京城焉有如許舊器皿銅斤乎採買至不得之時不肖之徒乘機射利必致將制錢轉買銷燬燬錢則錢價必長甚於生民無益且伊等局內每月鑄錢即將伊匠役工錢作為採買銅斤所鑄之錢交部亦未可定此事不無情弊著問九卿并趙申喬徐元夢具奏康熙五十八年三月十九日諭大學士九卿詹事科道朕臨御以來一切機務事必躬親從不敢稍自暇逸但少壯時精力有餘不覺其勞今氣血漸衰精神漸減辦事殊覺疲憊寫字手亦漸顫仍欲如當年事事精詳則力有不能若草率辦理又此心所未安從來書生論歷代帝王多指摘過失謂其安享富貴耽於逸樂朕披閲史書歷觀古來帝王因深知為君之難即朕六十年宵旰勤勞雖金石為質亦應消耗况氣血之身乎又如詩文一事皆出朕心裁從無假手於人內書房翰林輩不過令其校對謄寫耳現今在位大臣年老者大約與朕年相倣衙門辦事不過一二時辰即可歸寓安息有疾亦可告假且有托病偷安者同列與司屬豈能強之入署乎如舊年考試武進士趙申喬在朕前睡去侍衛屢次喚醒朕前尚且如此在衙門辦事時可知矣今天下大小事務皆朕一身親理無可旁貸若將要務分任於人則斷斷不可所以無問巨細朕必躬自裁斷早夜焦勞而心血因之日耗也但年力雖衰而志意始終如一仍未敢稍懈自朝至於日昃坐卧起居曽無片晷餘間勉強支持心勞力竭爾諸臣曽無一人為朕黽勉抒誠者或恐有不肖之徒見朕精神氣血漸不如前因以為姦亦未可定此諸臣俱應留心者也朕前冬曽有諭旨爾諸臣未必記憶理應不時省閲今部中之事錯誤亦有如恩詔援赦刑部逐件具題殊非舊例部院衙門如此類頗多朕不欲悉心詳閲得乎又如總督鄂海題請蠲免甘肅米石草束章奏甚長朕字字細覽所擬票籖錯誤朕曽改正批出總之諸臣徒事虛文見朕躬煩勞不過云皇上理宜靜養似此皆如畫餅有何實濟耶又凡有論説諸臣不過敷陳頌聖套語如勵精圖治健行不息聖不自聖安愈求安之類若與不讀書者言之甚覺可聽朕讀書明理凡事皆身體力行此等粉飾浮詞六十年中盈溢於耳久已厭聞爾等務須實心任事盡去虛文方有裨益也康熙五十八年四月初九日諭户部朕幸熱河一路麥苗盈野收成頗佳但麥熟之嵗往往雨水早而且多朕留心稼穡歷年最久所見如此爾部即速傳直𨽻河南山左山右口外地方速將已收之麥晾乾入屯收貯以免潮濕壞爛則今年所收足用二年矣康熙五十八年五月初六日諭議政大臣九卿等九卿議在京城開捐一案斷不可準行此次以軍需在甘肅大同等處開捐運兵糧及捐駝之事例迄今尚未清楚亦甚繁雜今若再開此例終無完日矣從前二十一年開捐延至四十七年未能清楚且張鵬翮具奏將捐納人員停其選用朕曽諭於錢糧有益已經準行之事安可停其選用令衆人失望耶因不準所奏今户部庫內貯銀有幾千萬兩此畨軍需事務儘可支用何必議開捐納夫捐納事例不但於政事無益且頭緒繁多亦難辦理捐收米石則地方米價騰踴捐收馬駝則馬駝價值驟貴開捐於外省又須將執照轉行送部開捐於京城大臣等誰無親戚不無彼此倩托掣肘其互相營求等弊何以杜絶或再有貧人那借銀兩捐納赴任安能得為好官耶聞運糧捐駝人員亦有交駝一二隻而包攬之人將米以官駝馱運本身並未親去即將伊捐駝運米敘用者捐納事例種種弊端朕深知之斷不可準行也且軍前辦理糧餉大臣等將所用錢糧從鄰近省分解送該督撫布政司俱多為預備其給運送夫役并收領大臣等項所費愈多近日朕遣官雇騾送銀十萬兩與大將軍王處並無費用甚屬簡便嗣後將户部庫銀計彼足用專差解送則軍前料理糧餉大人等知之亦必不敢妄行多用矣如此不但運送簡便而於事亦有裨益如果至應開捐時再行開捐亦未為遲誤也康熙五十八年六月十五日諭大學士馬齊等據巡撫李樹德奏山東闔省雨暘時若二麥十分豐收代逹小民貢獻新麥製麵此端一開各省必致互相效法貢獻各色物件不惟事體煩瑣抑或不肖有司借端多派苦纍民間這所進麥麵著發還康熙五十八年七月十四日諭大學士馬齊等每年口外禾苗發往京中看視因將髙大穗多者擕去並非以之誇耀兾諸臣歡忭頌揚也今嵗永定河水漫越隄岸田禾被淹安徽所屬地方霪雨起蛟田廬俱沒浙江五月暘旱聞湖南湖北江西則早稻豐登河南山左禾苗甚佳其收穫分數尚未確聞著傳諭九卿康熙五十八年七月二十二日諭學士常夀朕覽邵子聲音圖於各國聲音有不能該括處朕於聲音之學究心二十餘年朕雖未親至鄉里而鄉里人之聲音無不悉知即如清字之音有漢字所無者漢字之音亦有清字所未備者朕將此聲音圖討論多日欲該括各國聲音斷乎不能朕以為性理精義內邵子聲音圖宜仍漢字其清字圖可以不用蒙養齋修書舉人王蘭生諳曉音韻之學爾與之商酌看他意見如何並將此旨令漢大臣同閲康熙五十八年十月十三日諭議政大臣爾等皆係議政大臣凡議政諸事並不留心俱草率議覆聞自備效力捐駝運米人員並未親身前往將官駝所運米石以為本身運到竟邀議敘自備種地人員並未種地交糧而管理種地之人希圖利益向彼需索即報稱交糧入倉亦得邀議敘現今倉內米石已致缺乏所以侍郎敦拜等奏明嵗運米請作速運到米糧以補倉內缺乏也爾議政大臣於諸事不甚留心草率議覆之處朕屢有諭旨爾等須加意恪遵康熙五十八年十月二十七日諭大學士馬齊松柱蕭永藻王掞王頊齡學士張廷玉蔣廷錫髙其倬勵廷儀阿克敦額赫納格爾布等敬天尊祖所關至重至大朕自御極以來凡壇廟祭祀朕俱親詣行禮年來因多病足痛不能親往每遣大臣恭代孔子云吾不與祭如不祭朕自不能親詣五內甚切思慕欲得瞻仰郊壇而非祭祀之日則典儀未備又非盡誠盡敬之理今朕躬少好如南苑湯泉乘肩輿俱可行走今冬至齋戒之時朕足雖不得力潔誠之念有餘擬於祭日朕躬親詣照常禮節於祭祀之前升壇瞻仰省視爼豆若可跪拜朕拜後退處更衣幄次俟恭代親王行禮畢然後回鑾朕心始安已將此旨諭諸皇子大臣會同議奏此係創禮如漢大臣以從無此典引據書史為言朕年已老憊在位六十年矣豈易得此例乎目今朕身安好可以前往倘此數日內朕躬少覺不能親往即可停止已派有親王恭代矣特諭康熙五十八年十一月初七日諭户部朕惟治天下之要首以乂安民生為急故自御極以來於閭閻疾苦無不博咨廣詢渙敷庥澤其有動用民力之處尤孜孜厪念刻不能忘蓋六十年如一日也比年來因策妄阿喇布坦狂逞跳梁興兵征討逺歷邉陲其沿邉數處師旅屯駐一切雖皆支用正項錢糧而協辦轉輸行齎居送之事民力勞瘁朕心時切軫念曽將陜西甘肅巡撫所屬康熙五十八年額徴地丁銀一百八十八萬兩零歷年舊欠銀四萬兩零特沛恩綸悉行蠲免而沿邉各州縣衛所軍行既多飛挽之勞辦賦復滋催科之擾若非格外加恩黎民恐致失業所有沿邉一帶陜西延安府屬府谷神木安塞綏德米脂安定吳堡保安榆林保寧常樂雙山魚河歸德嚮水波羅懷逺威武清平葭州龍州鎮靖鎮羅寧塞靖邉柳樹澗安邉磚井定邉饒陽水堡髙家堡甘肅屬山丹髙臺古浪莊浪西寧肅鎮寧夏左屯中屯平羅中衛靈州寧州平涼衛固原州鎮戎西安阜城甜水河州歸德蘭州洮州寧夏前衛平涼縣固原衛固原廳河州衛蘭州衛蘭州廳慶陽涼州衛永昌衛鎮畨衛甘州左衛甘州右衛肅州衛鎮彛所等六十八州縣衛所堡康熙五十九年錢糧米豆草束俱宜蠲免但目今係有軍務之時除米豆草東外將康熙五十九年額征銀九萬八千一百兩零盡行蠲免爾部移文該督撫通行曉諭實心奉行務俾均沾德惠以副朕曲軫邉民之至意倘或借端征派澤不下究該督撫嚴察指參從重治罪爾部即遵諭行特諭康熙五十八年十二月二十三日聖祖仁皇帝御製文第四集卷十三
