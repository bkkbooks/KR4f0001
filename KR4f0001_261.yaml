body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷三十二雜著古文評論魏文帝禁母后干政詔垂戒深切足以立萬世之防鵜鶘集靈芝池詔古雅峭潔然似是有意為之者畢竟與西京詔令有別輕刑詔能得欽恤之意眀帝正嗣統詔正統緒以重大宗可以息後世紛紛之論論封禪詔退浮華崇道夲深得治體之言郎吏分受四經三禮詔經學吏治兩有禆益陳王植求存問親戚疏情辭懇惻之中時見鋒頴天才秀拔八斗非虛陳審舉疏視自試一表語加激切然不免於懟矣方之於詩其小辨之怨乎魯孔子廟之碑鴻文足與巨典相配董昭陳末流之弊疏指切弊俗有關風教王朗節省奏辭甚典質而功效瞭然籌兵食一假尤見逺略劉廙論治道表論非創獲自確不可易衛覬諫眀帝疏謇正之氣爽朗之筆楊阜諫眀帝營作宫室疏典據之言而出之以朴慤髙堂隆諫興役疏據理切事反復詳暢蔣濟中書専任疏情事曲盡使人動聽杜恕諫考課疏信賞必罰則考課不為具文恕言得之諫用廉昭疏亢激之言難於詳悉此獨得之程曉白罷校事疏雅詞健筆絶無冗蔓夏侯太初官才議其意欲使中正臺閣各不相涉內外參校以得其真亦通達時務之言除重官議省官省事甚扼治要改服制議國奢示儉甚得損益之宜蜀漢昭烈帝為漢中王上言獻帝事夲權宜而辭義明正不必以矯制為嫌諸葛亮出師表將欲外攘先修內治大臣之誼純臣之心後出師表篇首云坐而待亡孰與伐之乃武侯之夲計也篇末云鞠躬盡瘁乃武侯之夲心也光明磊落真可揭諸天下萬世自表後主只此數言可以質天地而泣鬼神豈不堪與伊周相伯仲正議大義聳然文辭亦極典美使華歆輩讀之能無赧汗與羣下教意在集思廣益以勤攻已闕大臣心事如此與李豐教讀此足見武侯之用心公而恕吳大帝責諸葛瑾等詔懇惻之辭可謂深悉羣情者讓孫皎書權文筆古雅乃爾其所見者亦卓然不羣景帝答張布詔英明語能令寵臣心懾又答張布語意甚為嚴峻然卒之恐布疑懼遂廢講業可惜也駱統理張溫表權僻處江隅身當強敵正宜布公推誠納讜言而徠雋乂忌溫稱美蜀政氣量可知矣諸葛恪與丞相陸遜書論甚平恕國家用人之方士類交友之道均宜斟酌斯言上孫奮箋直截明暢文情亦自欵曲晉武帝定祀典詔嚴整中具有精深見道之言答司馬孚等詔晉武篤於天性故所言惋怛開言路詔深刻非事理之平斯詔真得治體答傅玄詔曠然大公之論出以婉到覺情詞相發藹乎近人下郡國巡行詔於時巡之外遣節使周行詔令肫摯文實兼備可謂有志於民者籍田詔溫潤古雅有漢代遺風聽鄭沖致仕詔優禮老臣其意甚殷文亦疏暢可誦元帝遺賀循書循行為俗表學稱儒宗宜元帝禮之周顗辭職詔其致雋永語不在多明帝定東宮儀制詔雅贍舂容綽有體裁康帝答有司請改服御膳詔矜貴典藻上逼左氏穆帝下王洽詔追述舊好穆帝待臣下之誼甚厚洽退然克讓尚有古風簡文帝百官詔簡文雅量清才斯詔亦備極斐亹答殷浩書謙沖婉約殷然有求賢之思羊祜讓開府表辭非次之榮廣進賢之義自是大臣美德上平吳疏王猛之不勸伐晉羊祜之急請平吳皆洞灼時勢事異而識同也杜預考課略課績為用人之要即優劣以為黜陟自是簡核一法春秋左氏傳序左氏之學得預而愈顯表章之功大矣荀朂省吏議省事不如清心為政至論然清心非去私存理有㴠養之功者不能也庾峻論宜敦禮讓表晉時凌競成風斯表可謂特挽頺波劉實崇讓論爭則必損人自見讓則必屈己求賢委曲敷論切中情弊劉頌刑法疏法者天下之公若牽文就義則吏緣為姦疏中用意深微堪與尚德緩刑書並傳劉毅陳九品八損疏劉毅秉公剛直在武帝諸臣中最有風節兹疏可謂救時之論傅咸陳世俗奢侈書移易奢風在有位者之節儉探夲之論也上論劾王戎事歷辨侵官之謬引據詳明而徑挺之氣屹乎其不可奪李密陳情表悱惻出於至性自是不朽之文陳夀定諸葛亮故事表夀因父被髠作亮傳短其將略時論少之觀此表前後尚極稱美可見亮之賢雖怨者不能掩也虞溥奬訓諸生誥為學之道淡而不厭久而彌新勉之以立志要之以積漸所以䇿諸生者至矣張悛為吳令謝詢求為諸孫置守冡人表存恤江東園寢道歸忠厚盛德之事也文亦典藻可則閻纘陳保傅太孫疏忠欵可動鬼神與黃臺瓜辭同其警惻陸機辨亡論上晉書載機少有異才文章冠世今觀其遺篇竒偉雄麗張華而下罕其儔匹辨亡論下二篇機局全學過秦論但加之以詞藻耳此漢晉風氣之分五等論封建之事今古不同未可執一而論也文特𢎞博妍贍英鋭髙逸洵是詞場賁育劉琨勸進表琨素著雄豪之名勸進一表辭意慷慨志氣縱橫猶想見其翼戴晉室之心干寶晉紀總論推晉之所以興亡幾無遺義然寶晉臣也於尊親之際其尚有隱乎庾亮讓中書監表亮以元舅懿親負時重望而勤修退讓之節其文亦真摯愷切足挽頽風荀嵩請置博士疏公榖義例間合聖人夲旨而儀禮為經何可廢也范寧罪王何論晉世清談原於莊老而實始於王何寧深切言之斯誠快論蔡謨止庾亮北伐議權衡強弱持重老成深於謀國視殷浩何啻霄壤王羲之止殷浩再舉北伐書羲之在東晉諸名士中具有經濟之才非徒以文雅見長與會稽王箋國家安危所關愷切陳導可謂忠告遺謝安書羲之觴詠風流雅興逸致乃能留心實政不祖尚清虛真中流砥柱矣孫綽諫移都洛陽疏揣摩時勢條悉利害瑋辭快辨實足折伏桓溫之虛憍徐邈與范寧書邈儒雅博贍持躬謹密不獨以文采為時所稱也篇中多是名言戴逵放達非道論能以禮度自處深以放達為非不可徒以隱淪目之韓延之報宋公書臨難不為強勢所誘真賢參軍矣裕當為之汗赭聖祖仁皇帝御製文第三集卷三十二
