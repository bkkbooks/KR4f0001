  text: 欽定四庫全書聖祖仁皇帝御製文集卷九目錄勅諭諭内閣九卿詹事科道滿漢各官諭大學士明珠李霨尚書宋德宜左都御史魏象樞學士佛倫諭大學士明珠諭大學士明珠諭吏部等衙門諭大學士索額圖明珠戸部尚書伊桑阿諭吏部等衙門諭戸部侍郎薩木哈諭九卿詹事科道諭大學士索額圖明珠李霨杜立徳馮溥學士噶爾圖佛倫希福項景襄李天馥諭九卿科道諭䕶軍統領呉丹諭大學士索額圖明珠李霨馮溥學士噶爾圖佛倫項景襄諭禮部諭刑部諭大學士索額圖明珠李霨杜立德馮溥學士噶爾圖佛倫項景襄李天馥諭康親王傑淑
