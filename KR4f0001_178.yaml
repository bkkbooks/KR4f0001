body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻四十四目録古今體詩四十八首謁大禹廟登卧龍山越望亭雲栖竹樹甚茂幽蘭滿山虎跑泉幷序靈隠寺飛来峰諭浙省將吏軍民并序舟中書懷將逰華山以欲雨未往雨中幸錫山園林恵泉無錫小民以羔羊恵酒爭獻御舟笑而遣之句容雨望廵幸江寧賜江寧文武將士宴於教場再過明故宮江寧駐蹕并序後湖詠幽蘭登報恩寺浮圖上巳日再登金山長江夜月曉發維揚順風揚帆午餘已過秦郵自宿遷解纜一日夜達山東境春晴舟中作途次書懷清明憂旱憶民事作榴花盆景榴花髙有數寸開花一朶輓大行皇后詩四首并序中秋書懷守陵太監崔邦琪侍慈寧宮年久詩以賜之康熙二十八年歲旱冬又無雪朕焦心勞思寢食俱廢二月初間謁陵路遇大雨田野歡聲方少攄朕懷故賦五言律以記之暢春園衆花盛開最為可觀惟綠牡丹清雅迥常世所罕有賦七言絶以記之詠花缾櫻桃雨後初晴戲作二首命裕親王福全皇長子允禔帥師征厄魯特錫之以詩養病塞北古北塞上望月康熙三十二年六月賜總督佛倫夏燕新蓮二首
