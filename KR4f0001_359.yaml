body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻二十九雜著康熙幾暇格物編黄河九曲始誾圖曰黄河自崑崙來凡九曲入於渤海每曲千里河圖以黄河九曲配上天權勢距樓等九星謂二曲在荒外七曲在中國又自積石以下分為四大折此特舉其大者言之耳朕自寜夏横城登小舟順流而下至湖灘河所二十一日其險不可勝言河勢之洶湧與内地相同其性遷徙無定攝東則西岸漲攝西則東岸漲沙灘洲渚隨水變更互出錯列又兩涯或有髙山大谷紆餘盤折以挾束之河豈能直行千里乎如山西之蒲坂古謂之河曲春秋秦人晉人戰於河曲是也而太原府又有河曲縣輿地志云以河曲得名即潼闗之河亦正當其曲處唐人張祜潼闗詩云地勢遙尊岳河流側譲關可證也而皆非千里一曲之處是知河之曲處多矣水經注曰黄河千里一大曲百里一小曲庶幾近之史記曰黄河如帶則當時河形正自折旋環抱也况自南徙以後自孟津而下久已非九曲之舊矣其隨地廻屈又何可勝數哉老人星偶閱遼史穆宗紀應厯十二年春二月蕭思溫奏老人星見乞行赦宥夫星辰雖隨天運行而其隠見却有方隅老人星在今揚州地方於二三月時每每見之若北方則不能見惟於天球上可指而知耳故名南極老人言是星之屬乎南也史記天官書張守節注云老人一星在弧南常以秋分之曙見於丙春分之夕見於丁丙丁皆南方此明證也遼都臨潢府地處最東北安有老人星見之理乎趙孟頫命名趙孟頫取名孟頫之義考之諸書皆無據證按說文長箋云頫從兆從頁􅀈氏言得兆必敬頫低頭聼也有敬意又按宋史宗室世系表凢太祖十一世孫皆名孟某是孟字乃其世系排次而孟頫同産十人其名上字從孟下字皆從頁旁如孟頫孟籲其著者也或取頫字之義或取敬字之義耳又孟頫一輩皆字子某如孟頫字子昂孟籲字子俊孟堅字子固似上一字取孟子二字相連下一字取頫昂籲俊堅固二字相連之義亦未可知九河故道九河故道漢唐宋諸家之說不一或謂在濟南境内或謂逺界永平而酈道元謂九河苞淪於海以朕揆之其九河入海之處在今天津之直沽而九河故道不出滄景二三百里間也葢水性就下今南北之水以天津為尾閭地最窪下雖數千百年中或陵谷變遷而其髙卑大勢南北定位有必不可易者即以禹貢之文考之可以斷矣禹貢曰至於大伾北過洚水至於大陸又牝播為九河䟽云大伾屬魏郡黎陽洚水在信都大陸澤名夫黎陽今之濬縣信都今之深州大陸澤在今之束鹿界而河間在濬縣深州束鹿之北故曰又北也又九河既道䟽云平原以北平原今徳州境言徳州以上也漢書溝洫志許商云九河之名有徒駭胡蘓鬲津在成平東光鬲界中此三地今皆屬河間杜氏通典云鈎盤在景馬頰覆釡在趙郡景即景州趙郡今涿易南古所謂燕南趙北也輿地記云簡河在臨津金史地理志云南皮縣有潔河太史河傳志所載九河故道之在河間境也又豈不彰明備著乎則天津為同為逆河入海之道無疑矣河自周定王時已南徙九河故跡亦漸湮廢後人不能深究地勢多穿鑿傳㑹其指在濟南者既失之過南其指在永平者又失之過北而鄭康成據緯書謂齊桓公填塞八河以拓疆界其說益滋譌謬耳凢人讀書能正據經文考以古今形勢則諸家之說自有折𠂻夫河間古郡稱名已久其所以謂之河間者以其在九河之間也顧名思義又可知矣楊柳古今物䟽於草木之名皆不能區别如楊栁本二木二木之内柳又有十種餘楊亦有數種注釋家徃徃合稱之即有分之者於楊則曰似栁於栁則曰似楊不知二木迥然不相似也楊之葉厚而濶色深而光其枝粗硬而白枝頭結蕊纍纍如懸鈴春盡時則四拆中落白花如氊柳之葉狹而長色淺而黯其枝柔細而緑葉間著花如葚花後則成絮而飛二木之不同如此易曰枯楊生稊詩曰東門之楊又曰折栁樊圃經傳所載原未嘗合一也即小雅所稱楊栁依依是言春時楊與栁俱依依然也周禮膏物注曰謂楊栁之屬之屬云者猶言某某類耳自毛傳注楊栁為蒲栁而後人遂合為一不知蒲柳生水澤中可為箭笴别是一種詩人騷客承襲詞章不能精求物類然其於楊花則祗曰花於栁花則曰綿曰絮是亦不能掩其異矣至李時珍注本草謂楊枝硬而揚起故曰楊柳枝弱而垂流故曰柳是又以直柳垂柳指為楊與栁之分其謬益甚多識之學不亦難乎風隨地殊諺云千里不同風百里不同雨昔人謂雨有咫尺之殊何必百里不知風亦不可以千里論也嘗記驗風候如畿内是日為西北風山東去京為近而其日風乃東南葢風隨地起隨地而殊抱朴子謂鳴條之風百里折枝之風五百里是言風之有無初不論方向也朱子曰風與天相似旋轉未嘗息此處無風或旋在他處或旋在上面都未可知兹論最善又上下之間亦有不同者如起火初迸裂時其烟南向及升雲際烟又北向此其驗也風無正方吕氏春秋以八風配方隅而繫以四時春秋運斗樞以四方配四時而分主客其說亦有未盡然者朕留心觀察凢風自西南起者為主風餘俱属客風易之先天巽卦在西南可見聖人取義之精為萬古不可易也又淮南子云風者天之偏氣偏字義㫖微妙葢風之所起不自東西南北正向皆從四隅而發及其旋轉則有時而偶值正方曽以此諭海西人彼初未深信令至觀星臺驗相風烏乃歎服焉此皆切近之事却未有人道出水底有風風者氣也氣無處不流風亦無處不到故水上行風水下亦行風東風觧凍先從下坼知水底風力更猛迅也元人雜說載有人浴於河者卒中寒風拘攣謂風來水底其利如箭理實有之人依土生五行皆為民用而土為之主人之始終皆依於土不可湏臾離也五榖果蓏之屬飛走潜動之類總為土産故書大義云土者萬物之所資生是為人用禮外傳注云人皆食土之物養成形體嘗聞泛洋之人水居日久一至陸地覺土香異常至欲俯首就而食之是可見人之不能離土矣莊子曰百昌生於土而反於土信然定南針定南針所指必微有偏向不能確指正南且其偏向各處不同而其偏之多少亦不一定如京師二十年前測得偏三度至今偏二度半各省或偏西或偏東皆不一惟盛京地方得正南今不知改易否也宋沈括夢溪筆談謂磁石磨針必微偏東向而元周達觀真臘風土記謂定南多丁未針大觀本草注謂丙丁皆火位庚辛受其制物理相感耳而推求真南之道昔人未嘗言之朕曾測量日影見日至正南影必下垂以此定是正南真向也今人營造居室如因地勢曲折者面向所不必言若適有平正之地其所卜建屋基向東南者針亦東南向西南者針亦西南初非有意為之乃自然而然無所容其智巧者也又赤道之下針定向上此土針鋒亦畧斜向上今羅鏡中制之平耳海西人云磁石乃地中心之性一尖指地一尖指赤道今將上指者令重使平以取南與物性志謂磁石受太陽之精其氣直上下之說相合兩尺脉屬兩腎人身藏府皆表裡相配於五行各有專屬肺與大腸為表裡屬金心與小腸為表裡屬火肝與膽為表裡屬木脾與胃為表裡屬土腎與膀胱為表裡屬水惟命門為虛寄或云屬火或云屬水總無確說西北醫家謂左右尺脉分屬左右腎皆水也細思其言頗為近理朱子曰屬北方者便著用兩字兀亨利貞貞配智北方水地文言以貞固二字釋之方神朱雀青龍白虎皆一北方𤣥武便有龜蛇二者矣又左傳蔡墨對魏獻子五官金木火土之正皆用一人為之至水正則曰修及熙為𤣥㝠以二人治之即此義也聖祖仁皇帝御製文第四集巻二十九
