body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三十一序日講詩經解義序昔者虞廷命后夔為典樂之官以教胄子首詔之曰詩言志則詩之為教所從來逺矣蓋人性情之發不能無所寄託而詩則兼備六藝諷誦吟咏之間足以觀感而興起者莫善於此故曰溫柔敦厚詩教也自夫子刪定而後三百篇之旨粲然其採之里巷者則為風陳之朝廷者則為雅薦之郊廟者則為頌觀其美刺而善惡之鑒昭矣觀其正變而隆替之治判矣觀其升歌於廟朱絃象管之所唱歎而祖功宗德之具在矣千載而下猶得見江漢之遺風豳岐之故俗關睢麟趾之化矇瞍七月之針天保鹿鳴堂陛賡揚之盛清廟閟宫歌雍舞勺之章皆賴此三百篇之存安可不沉酣優渥於其間哉朕嘗思古人立訓之意既有政教典禮紀綱法度以維持之矣而感通乎上下之間鼓舞於隱微之地使人從善逺惡而不知優遊順適而自得則必賴乎詩如天之生萬物也日以暄之雨以潤之露以濡之雷霆以肅之而又必宣暢八風以疏通而條逹之然後萬類咸遂其生飬而無促迫矯強之弊故教至於詩而微矣治至於詩而極盛矣朕志慕隆古淳穆之理崇奬詩教爰命儒臣輯成詩經講義日進於坐隅朝夕觀覽凡立説一準於考亭而旁搜義藴兼及注疏博綜名物亦參爾雅又思夫子平日雅言之教稱引誦説惟詩最多如大學中庸孝經篇末必引詩以詠歎之亦以見古人之斯須不離乎此也朕亦欲四海臣民謹思貞度以揚風扢雅之學偕進於溫厚和平之教故序而頒之此則朕之所深望也夫日講春秋解義序朕惟春秋者帝王經世之大法史外傳心之要典也大義炳若日星而褒貶筆削微顯婉章非後世所能窺至其立法謹嚴宅心一本忠恕因善惡是非而施豫奪焉有正例有變例有事同而辭異有事異而辭同一人之身前後不相掩一人之事功過不妨殊如化工之肖物隨類付形未嘗有所容心於其間後之説經者或穿鑿深文或附會失實固難悉當聖人之心左氏親見聖人公羊穀梁及門子夏猶彼此抵牾𩥫駮互見何况去聖人日逺紛紜探索如漢唐以下董仲舒趙匡啖助諸家乎惟宋康侯胡氏潛心二十年事本左氏義取公穀萃諸家之長勒成一家之書雖持論過激抉隱太嚴未必當日聖心皆然要其本三綱奉九法明王道正人心於春秋大旨十常得其六七較之漢唐以後諸家優矣朕萬幾之暇研精六經竊有慨於春秋經聖人手定其衮鉞本乎王章刑賞原於忠厚義例雖繁而其明白正大之旨必不如後之説經者委折碎細若此爰命儒臣撰集進講大約以胡氏為宗而去其論之太甚者無傳經文則博採諸儒論注以補之朕亦時有所折衷期歸於一編輯成書朝夕省覽亦欲俾學者有所遵守其於經世大法傳心要典未必無少助云爾日講禮記解義序朕聞六經之道同歸而禮樂之用為急孔子曰安上治民莫善於禮又曰上好禮則民莫敢不敬誠以禮者範身之具而興行起化之原也天之生人品類紛綸莫可紀極聖人起而整齊之法於天則於地順於人逹於時協於鬼神斟酌損益以定其品節限制俾天下化其好逸惡勞之心而豫以從善棄惡之道蒸蒸焉日蹈履於中正而不敢越蓋非有以強之也率乎其理之所安而已其綱有三百其目有三千大者在冠昏喪祭朝聘射宴之規小者在揖讓進退飲食起居之節循之則君臣上下賴以序夫婦內外賴以辨父子兄弟婚媾姻婭賴以順而成反是則尊卑易位等殺無章家未有能齊而國未有能治者故曰動容中禮而天德備矣治定制禮而王道成矣嘗遐觀三代禹湯文武惇敘彛典以倡導天下而其時之諸侯秉禮以守其國大夫士遵禮以保其家下至工賈庶人畏法循紀以世其業嗚呼何風之隆哉朕企慕至治深惟天下歸仁原於復禮故法宫之中日陳禮經講習紬繹蓋不敢斯須去也慨自嬴秦焚燒典籍禮乃滅亡漢興崇尚儒學禮經始顯傳之者十三家而戴德戴聖為尤著聖所傳四十九篇即所謂禮記者是已逮程子朱子出表章學庸遂開千古道學之統其餘四十七篇雖雜出於漢儒亦皆傳述聖門格言有切身心要旨朕孰之復之靡間寒暑積有講義裒成全部辨以敘言用以無忘斯勤然豈徒效儒生占畢云爾哉務佩服其訓詞而實體諸躬修措之邦國使百爾懷恭敬遜讓之誠兆庶凛撙節防間之則德化翔洽上嫓隆古庶乃愜朕敦崇禮教之意也夫孝經衍義序朕緬維自昔聖王以孝治天下之義而知其推之有本操之有要也夫孝者百行之原萬善之極書言奉先思孝詩言孝思維則明乎為天之經地之義人性所同然振古而不易故以之為已則順而祥以之教人則樂而易從以之化民成俗則德施溥而不匱帝王奉此以宰世御物躬行為天下先其事始於寢門視膳之節而推之於配帝饗親覲光掦烈諴萬民而光四海皆斯義也孔子教孝之言散見于册籍而統會於孝經曽子以純孝親承斯訓其辭約其指逺條貫終始綜括羣論言孝之義於斯為備自顔芝藏本出於漢初考注箋釋代有其人如孔安國鄭康成皇侃邢昺輩無慮百餘家大約皆訓詁章句辨論古今文同異而求其推擴義藴逹之於萬事萬物而皆莫出其範圍者則尚未之備也世祖章皇帝𢎞敷孝治懋昭人紀特命纂修孝經衍義未及成書朕纘承先志詔儒臣搜討編輯倣宋儒真德秀大學衍義體例徵引經史諸書以旁通其説竊以仲尼稱至德要道以順天下又曰教之所由生而後詳列天子諸侯卿大夫士庶人之五孝此則一經之大旨亦猶大學之言明德新民格致誠正修齊治平也是故衍至德之義則仁義禮智信之説備矣衍要道之義則父子君臣夫婦昆弟朋友之倫備矣衍教所由生之義則禮樂刑政之屬備矣衍五孝而皆以愛敬為本明貴賤之所同也由天子之敬親推之則郊丘宗廟典禮之義備矣由天子之愛親推之則仁民育物撫綏愛飬之義備矣無非敬也無非愛也即無非孝也遞而至於諸侯之不驕不溢卿大夫之法服法言法行士庶人之忠順事上謹身節用何一非愛敬之義推而極之通於神明貫乎天地夫寧有涯際乎哉書成凡一百卷􅍢板頒行並製敘言冠於簡端庶幾嘉與海內共遵斯路家修子弟之職人奉親長之訓協氣旁流休風四逹以成一代敦厚鴻龎之治斯則朕繼述先烈尊經崇本之志也夫經筵講章序朕嘗讀尚書説命之篇其勸髙宗以好學也曰惟學遜志務時敏又曰學於古訓乃有獲夫人君為學必稽古考憲人臣勸學於其君必援古昔稱先王凡以百家紛紜折衷於聖衆言淆亂是正於經其所孜孜汲汲者將精其義以致用於天下也豈占畢口耳之為勤徒資聽説而娛覩聽乎今夫師儒訓詁授受之學託諸空言以明其道而猶必守其一先生之説而况人主為學將精其義以致用於天下者哉朕自沖齡性絶嬉玩顧獨喜書自經史之餘苟其不謬於聖人之道自成一家之言未嘗不博求而縱覽焉至於經筵進講則專主於四子五經蓋書契既興載籍浩繁雖開卷有益而有禆治道必以四子五經為歸極矣上自天人性命下及民情物理以至二帝三王以來所經營措施於政教者其道甚明而其事易行神而明之存乎其人而已朕自臨御迄今日講靡輟經書解義節次彚刋其遇春秋二仲則涓日經筵未嘗有間閲時既久篇帙漸多因命儒臣彚為一集付之剞劂昔大禹好善昌言則拜武王訪道丹書是陳至如昔聖前賢之所誥誡廣厦細旃之所敷論其可忽諸且令頒之四方俾臣僚士庶誦其辭而服習其義咸知遵道遵法助登上理豈僅謂小補者與日講通鑑解義序史之有傳其體有二紀事編辭發凡起例而褒貶之意寓於言外俟觀者深思而自得此左氏之傳也涑水之資治通鑑宗之據事以斷是非原心以定功罪豫奪之不可假如折獄然此公穀之傳也崇安之春秋傳宗之二者缺其一則史學不備朱子作通鑑綱目綱倣春秋日倣丘明羅十七代紀載之文治以二百四十年褒貶之法論者謂接統春秋不虛也朕勤求治道涵泳六經之餘樂觀前代興衰得失之迹故通鑑一書披覽未嘗去手顧其間論斷者人各置喙間亦有當於作者之意而未能折衷於中而斷於一乃命儒臣倣胡安國之體法春秋之義撰次為文依日進講寒暑無間積嵗月而成編朕惟東周以前無史而有史蓋古史之精意已大備於尚書故春秋紀十二公之事猶然二帝三王之心法也威烈以下無春秋而有春秋蓋綱目之作上接夫麟經故雖班范諸史之文實魯史筆削之遺意也而世道之升降政治之隆汙於是乎在夫危微治忽之介判於毫芒而相懸遂至於遼絶當時或未及見而後之觀者瞭然此不可不審其幾而深究其所以然也是以論古人之行事既貴其所見之至明尤貴其居心之至公蓋善論古者如水然人毋鑑於流水而鑑於止水水無成形於中故妍蚩畢見於外無成形者何公而已矣水之無成形猶人之無成心也無成心者何公而已矣夫公者三代大道之行而萬世法戒之權衡也朕讀史嘗著緒論一編實本至公之意期於至當之歸而於日講一書又以此諄諄申命儒臣既卒業將以刋於祕府頒之羣工大經大法或勸或懲燦然畢具其有禆於經世豈淺鮮也與聖祖仁皇帝御製文第二集卷三十一
