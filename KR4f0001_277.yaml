body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十雜著古文評論劉敞前秀州崇德縣尉左惟溫可漣水軍録事參軍不遺一善太常少卿張鑄可光祿卿致仕敦尚風節無為軍録事參軍馬易簡可太子中舍致仕意在興廉讓之誼龍圖閣直學士兵部郎中涇原路經略使王素可諫議大夫茂奬武勳中却寓有平定安輯之意措語特妙前邠州觀察推官李育可著作佐郎前趙州軍事推官許林宗可大理寺丞簡貴不靡西京左藏庫使忠州刺史髙陽關路駐泊兵馬鈐轄時明可文思使語有鋒稜宰相富弼奏試國子四門助教王淵宰相韓琦奏鄉貢進士李常竝可試將作監主簿辭㫖溫厚定武軍節度推官衛觀可大理寺丞常州團練推官沈披可衛尉寺丞勸勵具備翰林學士給事中知制誥歐陽修可禮部侍郎端明殿學士吏部侍郎宋祁可尚書左丞禮部郎中知制誥范鎮可吏部郎中刑部郎中知制誥王疇可右司郎中三司度支判官太常博士集賢校理宋敏求可祠部員外郎竝依舊職任著作一時勸懲千載褒辭亦無溢美禮部侍郎參知政事曽公亮可加正奉大夫進封開國公食邑五百户賜推忠佐理功臣意特崇重言極和摯將作監林洙可司農卿氣體古茂權邠州軍事判官楊永可右贊善大夫致仕前嶽州平江縣張正已可大理寺丞致仕義厚詞溫都官員外郎邢夢臣可侍御史殿中丞沈起可監察御史裏行簡切無枝辭屯田員外郎胡揆除都官員外郎得綏邊之道度支郎中李碩可三司户部判官語簡而盡藹然愛民之意陜西路都轉運使兵部郎中天章閣待制傅求可右諫議大夫河北都轉運使工部郎中天章閣待制周沆可兵部郎中依舊但作褒辭勉勵意在言外司門員外郎張鞏可開封府推官急吏緩民亦一張一弛之意而造語特為新創論邪正語本質實意復忠讜為兄後議引據博辨析詳以此稽求典禮不為無助奔喪議教孝勸忠粹然正議士相見義一以聖人之道相為折衷豈徒以古雅見長公食大夫義典實之文知其深於經學致仕義學識淵博發為閎辭固宜佳暢乃爾君臨臣喪辨經義湛深而出以鴻肆豈非文人之雄與吳九論武學書通逹治務之言劉攽七門廟記信治績不見於史得此可補載筆之闕與王介甫書析辨處精頴不可當令安石何處置辭呂誨論選部綜名實以立言足資經濟奏乞致仕表殆以醫進說者宇文之邵應詔上疏剴正亦明決沈括上歐陽括精於樂律此但先陳其槩而筆墨疏秀朗豁孫覺諫行青苖法疏辭理簡括鄭俠論新法進流民圖事既流傳文亦佳勝蘇軾賜尚書刑部侍郎范百祿乞外任不允詔藉經語發義疏秀入妙賜阿里骨詔恩義兼至得詔諭之體太常少卿趙瞻可户部侍郎屏功利而用老成王言甚大楊繪可知徐州簡淨朴直立意自厚揚王子孝騫等二人荆王子孝治等七人竝諸州團練使言極斐亹恩誼深篤李承之知青州意寬裕而言典切韓維父億贈冀國公辭製入古最饒風韻賜韓絳上第二表乞致仕不允詔藹如春溫賜新除落致仕依前光祿大夫范鎮赴闕詔淵重之體式如金玉賜太師文彥博乞致仕不許批答敦厚語可以覘盛時氣象賜文武百寮太師文彥博以下上第一表請舉樂不允批答情文悱惻動人又天懷發中自成至文賜宰相呂公著乞罷相位除一外任不許批答溫文爾雅又莊重典嚴而能曲折以盡事理惟陸贄有之賜太師文彥博乞致仕不許詔約舉而意已周賜資政殿學士大中大夫新知成都府王安禮乞知陳頴等一郡不允詔雅音健筆賜宰相呂公著上第一表乞致仕不許批答體裁修整而引喻更有風致賜宰相呂公著上第二表乞致仕不允斷來章批答詞頗簡重益復婉至太皇太后賜門下手詔撝謙之語彌覺其真上神宗皇帝書一書萬言意甚貫串而不失之復詞甚矯厲而不過於激不獨經濟之裕抑亦文章之雄擬進士對御試䇿一道指陳時事逐節條對透徹了當不冗不支代張方平諫用兵書識解既超則措語自然警動行文自然髙卓至其疏宕俊邁之氣磅礴筆端真奇才也䇿略一理精辭決絶無悠泛之言䇿略三勢若馳騖可以逸塵絶迹䇿略四難其英偉之氣而又兼雋快之筆䇿略五雄辭博辨而有超逸之風縈紆飄發此是東坡獨絶䇿别七任法任人之論義正而語盡䇿别八言博而指約䇿别九疏暢之文亦復警透䇿别十一文意屹然山立其涉筆不羈有變化錯綜之妙䇿别十二局勢開闔而嚴緊最為挺特䇿别十三以勸親睦為厚風俗之本以立小宗為勸親睦之本文特絲絲入扣䇿别十七用意最精細搆辭矯厲不羣䇿别十八節用廉取二意互相紬繹而逐段發論極其警䇿䇿别十九疏兵制得失灼然明確而大義歸重訓練土兵亦自有見非徒託之空言者䇿别二十二鑿空立論精悍動人論治道辨論飇起而一軌於正縱橫變動中極有斷制正統論詞省而該意堅而暢與歐陽論可以參觀孔子從先進論暢朗之文不詭於道秦始皇帝論禮之為國久矣一經拈出便成佳論荀卿論謂人性惡誠荀卿學術之偏此又推極言之理據精詳非苛論也韓非論道德刑名之利害所見朗徹而辭筆亦沉鷙絶倫伊尹論推極根柢妙有發揮留侯論以忍字作骨而出以快筆豈子瞻胸中先有此一段議論乃因留侯而發之耶張釋之論達於論治若就日而辨物六一居士集敘從韓愈說到歐陽語有確據文亦矜重不凡潮州韓文公廟碑氣概雄深光芒萬丈文之有關於世教者固振古如新也志林録三首非屬深文確有至理中間併入史遷處尤見卓識雄辨而正簡帙之中具有光焰立論洞中秦事識解最髙聖祖仁皇帝御製文第三集卷四十
