body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷十二敕諭諭大學士馬齊等河南總兵官髙成標下兵丁因查拿賭錢人等至知府署內爭閙將知府沈淵帶至教場看守三日巡撫業已奏聞御史楊汝穀一聞即行題參甚是聞此等之人俱非食糧兵丁謊稱營兵夥同二三百人詐擾平民不獨河南一省他省俱有之其行文各省督撫提鎮伊等地方有無不食糧謊稱營兵合夥妄行不法之人查明據實奏聞如此嚴行稽察此等謊稱之匪類自不能歸入兵丁之內其作何嚴查令督撫提鎮保奏並作何禁約治罪之處交九卿議奏康熙五十七年七月二十七日諭大學士馬齊聞今年安徽所屬地方出蛟發水甚是傷民前日曹俯家人來奏晴雨録問說是實總督巡撫雖未曽啓奏朕既聞知心切軫恤京中有安徽地方官員著交與九卿速行問明回奏康熙五十七年八月二十四日諭户部朕臨御五十七年凡師行轉餉及災祲偶見即厪懷殷切蠲免賑濟之恩靡不下逮蓋治安天下惟期民生得所而欲民生得所必以敷恩寬賦為急也三年以來因策妄阿喇布坦狂逞跳梁遣發大兵屯駐西邉一切軍興征繕皆動支正供錢糧不使纍及閭閻而轉輸挽運陜西百姓雖勉力急公勞苦實堪憫恤又莊浪等處地震隨經特遣部院堂官星馳前往察賑而用兵之後宜格外加恩用綏黎庶應將陜西巡撫甘肅巡撫所屬通省各府州縣衛所錢糧米豆草束俱行蠲免目今係有軍務之時除米豆草束外其康熙五十八年應徴地丁銀一百八十八萬三千五百三十六兩有竒併歷年積缺銀四萬七百五十七兩有竒著一槩蠲免爾部速行文該督撫通行曉諭實心奉行務俾均霑德意以副朕篤念民勞拯恤災傷至意如有不肖官吏朦混私徴澤不下究者該督撫嚴察指參從重治罪爾部即遵諭行特諭康熙五十七年閏八月二十三日諭吏部尚書張鵬翮侍郎李旭升傅紳湯右曽考試月官令做八股時文大都鈔録舊文苟且塞責而已嗣後不必作八股時文止令寫履歷以三百字為限觀其字之妍醜文之工拙則人之優劣自可立見矣康熙五十七年十月初十日諭內大臣巴渾岱等四川巡撫年羹堯自軍興以來一切辦事熟練明敏又能度量西去進剿之兵㑹同青海公丹仲之人運食物米糧接濟殊屬可嘉竭力急公而漢仗亦好從前四川地方亦有總督年羹堯係巡撫止理民事無督兵責任現今軍機緊要將年羮堯授為四川省總督如明年大兵前進則由松潘一路進發而在成都之二千滿洲兵甚少將荆州之滿洲兵再派一千令在成都預備駐劄此滿洲兵俱令都統法拉管轄所派一千兵之空缺挑選餘丁一千名令其披甲充補著議政大臣速議具奏康熙五十七年十月二十日諭吏部尚書張鵬翮侍郎李旭升傅紳湯右曽部院衙門滿洲官員及在侍衛班行走漢官每遇奏事派六員引見科員及御史無論巡城與不巡城奏事日令滿洲三員漢人三員侍班翰林亦派出五員侍班此侍班人員內如有不得來者其數不必補足即聽其缺少如此伊等可得認識矣康熙五十七年十月二十日諭議政大臣內大臣等每旗都統副都統或有起家微賤專意狥庇一應補放官員併佐領等事恆有遲至數年或十年不奏者或一官病故已久數年尚仍給俸者一切事件漫不稽查甚是曠廢近聞都統石文英不出門户亦不見人有事來奏每不俟事畢祇圖早歸亦不瞻仰朕容甚屬不堪正藍旗滿洲都統顔信前往出兵其滿洲䝉古漢軍三旗之事著七阿哥辦理正黃旗都統巴賽署理將軍事務其滿洲䝉古漢軍三旗之事著十阿哥辦理正白旗滿洲都統何禮差往雲南其滿洲䝉古漢軍三旗之事著十二阿哥辦理如此辦理别旗各相效法自必發憤勤事也康熙五十七年十月三十日諭大學士馬齊松柱蕭永藻王掞王頊齡學士勒什布常夀穆爾泰阿克敦德音額赫納張廷玉蔣廷錫陳璸居官甚優操守亷潔清官朕亦見之如伊者朕實未見恐古人中亦不多得也前在臺灣道任內其所應得銀三萬兩並未入已俱於修理炮臺等公事動用署總督印務時應得銀兩亦未分毫沾染前來京陛見時曽奏稱貪官不在取之多寡取一錢即與取百千萬金等必一文不取乃可謂之清亷人所以貪取錢財者皆因艱於用度臣曾任縣令看來一行作吏即可不至窮苦即不取一文衣食亦能充足等語今觀其居官實能踐所奏之言誠清亷中之卓絶者似此不加表揚賜恤朕殊不忍著追授禮部尚書凡祭葬立碑與諡之處皆照尚書銜給與并䕃一子入監讀書以示朕優禮清亷大臣之意康熙五十七年十一月初十日諭大學士九卿大臣科道朕從前屢諭諸臣及科道官員各省有應行奏聞事件隨聞隨即繕摺具奏者非令其糾參不過欲知之早耳朕即聞之亦不肯聲明或未詳確亦不肯治罪也即如去年河南凶犯亢珽等擾害地方妄行不法朕他有所聞即特頒諭㫖差遣大臣拿獲審結今歲聞江南地方起蛟即傳諭詢問陜西地震即差大臣散賑彼處人民咸謂皇上注念小民加意軫恤少有災眚有聞即便施恩不令失所近日湖廣所屬兩州縣地方有奸宄之徒揑造妖言煽惑愚民放火劫掠曽經總督滿丕奏聞朕即諭令審結此皆因朕聞知方遣人傳㫖如無所聞何由降㫖料理耶且各省地方兵丁空糧甚多五十二年大賞天下兵丁時曽諭散賞諸臣逐一按名散給其遣往諸臣因不認識兵丁不能稽查頂冒以致所有空糧數目未能清楚不獨逺隔京師地方之兵丁即直𨽻近處空糧亦不勝數豢養兵丁特為備用而設平時將空乏之兵不行補足不行訓練臨時欲用縱有募補之兵纍萬亦何濟乎即如漢文臣遇敵明義理者亦不過捐軀報國而已此事朕甚慮之前歲朕以往赴呂宋噶囉吧之人甚多恐其生事曽諭查明作何設法召回內地自從議奏之後聞於來船附回者頗衆此係外洋於內地毫無關涉而朕留心訪詢者並無他故不過欲知地方情形人數多寡以便防備耳朕料理諸務皆藉爾等諸臣如不將爾等信任混行詢問微末之人斷然不可蓋詢及微末人等必至紛擾生事也且各省文官私派加耗武官空糧等事朕頻得聞知則人皆知畏懼可以悛改於事大有禆益此等有關地方事務及官員賢否諸臣何嘗不知即鄰省大吏亦未嘗不知或係師生親友或係同年或因子弟親戚在伊省居官故爾彼此掣肘不肯具奏彼此相隱不以上聞何以防微杜漸殊不知朕聞之苟未詳確必不即行治罪也亦防患於未萌之意耳嗣後衆九卿大臣科道官員凡有關地方事務及官員賢否有聞即繕摺具奏若所聞未確不妨即以所聞未確之處一併聲明爾等㑹同九卿議奏康熙五十七年十一月二十四日諭大學士馬齊松柱蕭永藻王掞王頊齡等各省監禁緩决及秋後處决人犯甚多已經緩决斷不至死遲至年久仍然得釋若久行監禁不但患病死亡且使獄中人犯亦漸增多爾等㑹同九卿將直𨽻各省緩决及秋後處决人犯情罪作何分别完結之處詳加確議具奏再被毆受傷至保辜限外身死部內奏明緣由兩行請㫖者無庸議外有當時不曽殞命逾數日或因傷風或因他病而死仍將毆打之人議抵情有可矜此等並未有定例亦㑹同九卿確議定例具奏康熙五十七年十一月二十四日諭大學士馬齊等參將員缺部內將小銜參將大銜遊擊開列具奏此定例不可更變但參將補授參將該提督總兵官等每每奏請留任故雖補授亦不能赴任甚屬無用嗣後參將員缺著將就近地方應升小銜參將大銜遊擊并應升官員等察明職銜大小及補授參遊或越銜不越銜越銜者越幾等之處詳細開列具奏如此朕亦易於揀選補授矣凡題補武職官員俱照此甚善爾等可明白交部康熙五十七年十二月初四日諭大學士九卿等今嵗元旦日食日食雖係一定而交限可以推算且被隂雲微雪未曽得見但别省無雲之處必有見者况日值三始人事不可不謹現今封印諸臣無事時事或有闕失之處應商酌確議朕意謂隂氣似覺稍盛京師地方從來每多地震已經隔有年嵗今嵗至春秋時或稍地震亦未可定也康熙五十八年正月初六日聖祖仁皇帝御製文第四集卷十二
