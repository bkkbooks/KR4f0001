  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻二目録勅諭諭禮部諭直𨽻廵撫趙宏燮諭大學士溫達松柱李光地王掞學士馬良傅爾呼納綽竒彭始摶鄒士璁沈涵諭大學士溫達松柱李光地王掞學士馬良傅爾呼納綽竒彭始摶鄒士璁沈涵諭大學士溫達等諭大學士溫達松柱李光地蕭永藻王掞諭大學士溫達松柱李光地蕭永藻王掞諭大學士溫達等諭吏部尚書管倉塲事務富寧安户部侍郎塔進泰噶敏圖諭王貝勒大臣九卿詹事科道諭南書房翰林諭南書房翰林諭大學士溫逹等諭大學士九卿等諭大學士溫達等諭各直省老人
