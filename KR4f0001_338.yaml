body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷十九目録敕諭諭侍郎張廷玉學士勵廷儀諭大學士九卿詹事科道諭大學士九卿等諭户部諭大學士馬齊松柱蕭永藻王掞王頊齡學士阿克敦額赫納格爾布登德吳爾泰蔣廷錫勵廷儀諭朝鮮國王李昀諭大學士馬齊等諭刑部諭大學士馬齊尚書孫渣齊徐元夢侍郎查弼納六相學士格爾布吳爾泰蔡珽諭大學士馬齊尚書孫渣齊徐元夢侍郎查弼納六相學士格爾布吳爾泰蔡珽諭兵部諭刑部諭大學士馬齊等諭大學士馬齊尚書孫渣齊侍郎勒什布張廷玉查弼納六相特古忒學士阿克敦額赫納格爾布吳爾泰蔣廷錫諭大學士馬齊尚書孫渣齊侍郎勒什布張廷玉查弼納六相特古忒學士阿克敦額赫納格爾布吳爾泰蔣廷錫諭大學士馬齊等
