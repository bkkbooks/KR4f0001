body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷二十九雜著古文評論賈山至言文氣排蕩思致遙深既脫戰國䇿士捭闔之習已開西京賈董渾茂之風賈誼陳政事疏誼之大計在遏亂萌而厚風俗上下古今目光如炬負此異才惜乎厄於絳灌而不能用也請積貯奏王道之大不外教養兩端賈生惓惓於當時者如此所謂王佐之才非朝錯之䇿可比封建子弟疏亞夫所以能平七國者恃梁為之扞蔽也誼言已先執左劵矣顧不謂之天下才耶諫封淮南四子疏前疏請以淮南地益淮陽意蓋不欲文帝之分王淮南諸子也恐帝不悟故訟言之諫民私鑄錢此奏與唐臣劉秩之議前後同指七福與四美亦略相似古今異宜方資博採耳過秦論文勢一步緊一步如回風激水蹙蹙生漪末乃其歸墟處也薄昭豫淮南厲王書四甚厚八危亡暗暗相對射言帝之待王如此而王之負帝乃如彼也古人文字針線細密而不露痕迹如此鼂錯上言兵事書錯學刑名而精於兵事如此可知古人兵家法家同原異趣班固作刑法志首言兵制特詳得其指矣請募民實塞奏首一節舉秦事以為鑒中一節言逺戍之不便後一節言徙民塞下之利末仍收歸前二節意矩矱森然請立邊民什伍法奏是時帝已從錯言徙民塞下矣故錯因前奏而更詳言之重農貴粟奏重農貴粟之道在於抑末作禁遊惰敦儉朴斥奢靡若以粟為賞罰農人之粟有限適所以便利商賈而究無勸於夲業也請入粟郡縣奏郡縣入粟以備用遂可勿收民租誠根夲至計可謂名言碩畫賢良對以帝王霸配合䇿問似亦偏駮視賈董邈然河漢矣然文甚古徑枚乘諫吳王書是時吳之逆謀迹尚未露故諫辭隱躍如此董仲舒賢良對一致知力行學之要也不強勉則功無由入仁義禮樂治之具也不更化則治無由成篇中立意如此深得綱領賢良對二設誠於內而致行之聖功王道不外乎此賢良對三諸不在六藝之科孔子之術皆絶其道勿使並進非學有夲原見得真切者安能遽為是言限民名田奏名田之弊宋臣葉適蘇洵馬端臨論之詳矣斟古酌今事未易言也淮南王安諫誅閩越書明暢雅健辭能達指嚴安上言世務書此書特為窮兵而發前言禁奢侈是引端後言郡守權重是餘波文家賓主之法也徐樂上言世務書與嚴安意指略同而造語竒鑿司馬相如諫獵疏相如文類春華此則秋實矣主父偃諫伐胸奴書文有紀律亦極嚴整東方朔諫起上林苑書論上林宜與民公利即文王芻蕘雉兔之意化民有道對朔此文與諫起上林苑書及拒董偃事可稱謇諤豈得以滑稽目之吾􅉌夀王禁民挾弓弩對説得事理透徹安得不令平津心服司馬遷五帝夲紀贊好學深思心知其意是讀書法亦是論世法十二諸侯年表序諸家所著書見藝文志鐸氏虞氏春秋家呂氏雜家公孫固儒家秦楚之際月表序受命之亟是疑辭一統之難是斷語兩意相反又互相發方透得出受命正意文之有開闔者漢興以來諸侯年表序周以形勢弱而衰漢則形勢強矣立意特微婉高祖功臣侯年表序末一段蓋因漢法少密坐罪者多頗致慨惜之意却能以深婉之筆出之禮書先王制作之旨雖未能盡得其精微而文采斐然可資論討樂書古樂之亡久矣漢去古未逺宜尚有可論次者豈泯滅於燔書之後耶讀此令人有遐想焉律書六律之學史遷論之頗詳平準書漢興民物凋敝至於武帝初年人給家足網踈而民富則文景以來休養生息之實從可知矣孔子世家贊只至聖二字千古贊孔子者何以復加伯夷列傳表章伯夷實始孔子故此傳専以孔子為據怨字即從孔子語中拈出又從怨字生出天之報施意從天道生出一假議論逐節相生錯綜變化孟子列傳漢人推崇孟子者多與荀卿並稱此傳如仲尼菜色陳蔡孟軻困於齊梁等語直以孔孟並舉不為無見儒林列傳序詮次井然詳雅文勢逸宕是史遷夲色太史公自序觀史遷以述往事思來者自任處殊感慨淋漓王吉諌昌邑王疏王式以三百五篇諫豈若此書愷切上言得失疏以禮字為骨自是經術讜言路溫舒上尚德緩刑書凡為法吏者皆宜朝夕省覽庶可上宣德意下安黎氓魏相諫伐胸奴書案今年以下真宰相語也丙吉問牛喘視此不太迂闊耶條便宜奏二十三事及相傳中所云漢興以來國家便宜行事即賈誼董仲舒所言也惜未臚悉隂陽月令奏漢儒説易每流於術數觀相此奏可以類見趙充國陳兵利害書充國堅持不撓其公忠之節則然亦由此書明白曉暢切於事情故當時委心以聽耳上屯田奏一罷兵留屯為經久之規老臣謀國忠智即此可見屯田奏二屯田之利粲若列眉可以折盈廷之議宜乎宣帝之聽從也屯田奏三計慮深逺字字擘肌分理鄭昌請定律令疏任法不若任人才難不若平法二義兼舉方為無弊之論張敞上霍氏封事末後一假已知霍氏之必為逆特以千里騰書不敢宣露故微啓其端張敞真能臣也劾黃霸奏霸相業夲無足觀所劾二事亦甚苛自請治盜賊書敞能治盜而不純用刑罰所以可取賈捐之請棄珠崖對逺稱三五良規近述祖宗已事援古證今深識體要匡衡政治得失疏辭理醇正而字字警動治性正家疏治性則強其所不足正家則防之於未然自是不刋之論戒妃匹勸經學疏乾坤肇易理之原關雎開王化之始疏中暢發此義洵經術名言修齊要道也貢禹循古節儉奏因事進言達意而止若無意於文而一種矯拔處自不可及言錢幣書以布帛及穀為幣法雖近古恐於民俗未便何言風俗書痛斥風俗之弊千載下讀之慨然蕭望之入穀贖罪議守經持正之言王褒聖主得賢臣頌語既絢爛氣復深渾自是斧藻潤色之文諸葛豐謝上書豐有仗節死義之志故言自伉直劉向條災異封事辨而裁雅而贍淵然經術之氣不徒以侃正見長請封甘延夀陳湯疏延夀湯雖有矯制之罪而其功自不可泯中間比較功罪處明爽動人諫起昌陵疏既博稱賢聖又指切亡秦益見始皇之昏暴厚葬之非宜可為後世園陵奢侈之大戒矣極諫外家封事雖雜引古事而言理則晰毫解縷故爾卓犖不磨定禮樂疏當成帝時所急誠不在此然論自不可易聖祖仁皇帝御製文第三集卷二十九
