body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻一勅諭諭滿漢大學士九卿等朕自冲齡篤好讀書諸書無不覽誦每見歴代文士著述即一句一字於義理稍有未安者輙為後人指摘惟宋儒朱子注釋羣經闡發道理凡所著作及編纂之書皆明白精確歸於大中至正經今五百餘年知學之人無敢疵議朕以為孔孟之後有裨斯文者朱子之功最為𢎞鉅應作何崇禮表彰著内閣九卿詹事科道㑹同詳議具奏康熙五十一年二月初四日諭大學士九卿朕覽各省督撫奏編審人丁數目並未將加增之數盡行開報今海宇承平已久户口日繁若按現在人丁加徵錢糧實有不可人丁雖增地畝並未加廣應令直省督撫將現今錢糧冊内有名丁數勿增勿減永為定額其自後所生人丁不必徵收錢糧編審時止將增出實數察明另造清冊題報朕凡廵幸地方所至詢問一户或有五六丁止一人交納錢糧或有九丁十丁亦止二三人交納錢糧詰以餘丁何事咸云䝉皇上𢎞恩並無差徭共享安樂優游閒居而已此朕之訪聞甚晰者前雲南貴州廣西四川等省遭叛逆之變地方殘壞田畝抛荒不堪見聞自平定以來人民漸增開墾無遺或沙石堆積難於耕種者亦間有之而山谷崎嶇之地已無棄土盡皆耕種矣由此觀之民之生齒實繁朕故欲知人丁之實數不在加徵錢糧也今國帑充裕屢歲蠲免輙至千萬而國用所需並無遺悞不足之虞故將直省現今徵收錢糧冊内有名人丁永為定數嗣後所生人丁免其加增錢糧但將實數另造清冊具報豈特有益於民亦一盛事也直省督撫及有司官編審人丁時不將所生實數開報者特恐加徴錢糧是以隱匿不據實奏聞豈知朕並不為加賦止欲知其實數耳嗣後督撫等倘不奏明實數朕於就近直𨽻地方遣人逐户挨查即可得實此時伊等亦復何詞耶此事毋庸速議俟典試諸臣出闈後爾等㑹同詳加確議具奏康熙五十一年二月二十九日諭大學士溫達等今歲考取進士額數無多止一百六十一人揀㧞庻吉士者不過四五十人其餘俱挨次選授知縣縣令與民切近有刑名錢穀之責未登仕以前如不知事宜典禮則登仕之後於地方民生事務無有裨益今歲考中進士除揀選庻吉士外其餘勿使回籍俱交與禮部選翰林内學優品端者數人𣲖令教習文藝從事典禮如有修書處率同修書又考中武進士皆以叅將遊擊守備等項員缺補用此等有約束兵丁整飭營伍之責未補官以前不可不先令其學習嗣後考取武進士亦着勿回原籍現在年滿千總皆分撥八旗武進士等分撥八旗隨圍學習行走康熙五十一年三月二十三日諭吏部原任大學士熊賜履夙學老臣歴任多年朕初立講官伊即早夜惟謹未嘗不以内聖外王之道正心修身之本直言講論務得至理而後已况品行清正學問優長身殁以後朕屢加賜卹至今猶軫於懷原任大學士張英張玉書朕因眷念舊勞伊等之子俱已擢用優陞熊賜履之子雖未中式但伊只有一子長成應照張英張玉書之子一例推恩著調取來京酌量録用以示朕不忘耆舊至意爾部即遵諭行特諭康熙五十一年四月二十日諭大學士溫達等湖廣民徃四川墾地者甚多伊去時將原籍房産地畝悉行變賣徃四川墾地至滿五年起徵之時復回湖廣將原賣房産地畝争告者甚多廵撫潘宗洛以此情由曾繕摺啟奏嗣後湖廣民人有徃四川種地者該撫將徃種地民人年貌名姓籍貫查明造冊移送四川廵撫令其查明其自四川復回湖廣者四川廵撫亦照此造冊移送湖廣廵撫兩相照應查騐則民人不得任意徃返而事亦得清釐争訟可以止息俟潘宗洛具題到時大學士等㑹同九卿確議具奏特諭康熙五十一年五月二十日諭大學士九卿張鵬翮等審噶禮叅張伯行並未審出一欵張伯行原叅噶禮内有干係國家之語亦未訊明審出似為兩邊掩飾和解瞻徇定議大臣互相叅劾豈可不徹底審明乃兩面調停草率完結况督撫等凢遇事故初叅之時率張大其事以極重之辭叅奏及至審時務必開脱銷釋者甚多此亦陋習斷不可行此案發回著大學士九卿等詳看㑹議具奏康熙五十一年六月初五日諭大學士九卿考試舉人進士所以為國家遴選人才關係甚大世祖皇帝時諭㫖炳明即朕為此事屢有諭㫖亦甚嚴切從前科塲有此等弊發俱議軍法從事今趙晉干犯國憲於考試時私受賄賂暗通關節張鵬翮等並未將伊拿問嚴審且趙晉行止不端舉國無不知者左必蕃昬愚已甚被趙晉欺弄今但照革去舉人三四名之例坐以革職軍流草率完結可乎此案亦發回著大學士九卿等詳㸔㑹議繕摺具奏康熙五十一年六月初五日諭兵部據鄂海奏毛都塘等處五十二寨紅苗吳老化等三千一十二人實心改過薙髪至武昌省城投順等語紅苖等皆盤踞深山秉性兇惡自古以來並未歸誠總督鄂海等為地方民生殫心効力身入苖穴設法招撫殊為可嘉著將在事官兵議叙具奏特諭康熙五十一年六月初九日諭大學士溫達等郝氏將伊夫砍死律難寛宥但孫强平素甚是不孝兇惡已極不顧母妻受餓酗酒蕩産郝氏以規諫輙被毆詈伊母忿恨不孝死後與伊媳扶同將事情隱匿不報郝氏應改絞將本發回著九卿詹事科道㑹議具奏康熙五十一年六月二十六日諭内閣江寧廵撫員缺甚屬𦂳要王度昭自補授廵撫以來浙省一應錢糧俱清理完結兩省事務難以兼顧江寧廵撫員缺著將現任廵撫及部院漢堂官有能理繁治劇操守好者著大學士㑹同九卿詹事科道選擇具奏滿洲漢軍不必選擇康熙五十一年六月二十九日諭禮部朝鮮國王李焞奏前徃伊國境内海洋捕魚船隻請再行巖禁現今内地海洋小㓂雖飭地方官巖行查拿但海面遼濶時或有之邇來浙省海洋賊㓂潛行刧奪官兵追捕遊擊一員被傷身亡曩者附近朝鮮海洋潛行捕魚船隻曽經申飭盛京將軍及沿海地方官員嚴加廵察緝拿而今尚有八九船隻違禁潛出外洋竟至朝鮮邊界捕魚是即賊㓂也嗣後如有此等捕魚船隻潛至朝鮮海面者許本國即行查緝解送母因内地之人致有遲疑康熙五十一年八月二十七日諭湖廣總督鄂海等覽鄂海奏鎮筸盤塘窩等八十三寨生苗俱各實心前赴武昌投順等語紅苖等居深山之中自古以來並未向化鄂海等宣示朝廷德澤布揚聲威盡行招撫殊屬可嘉今紅苖等已去邪輸誠削髮投順地方文武官員務仰體朕無分内外咸俾盡享昇平宇内無不樂業之意將紅苗等安挿得所從容化導教之禮義倘有不肖官員將紅苗視為度外侵蝕擾害者該督撫即行指名題叅康熙五十一年九月二十日諭户部朕宵旰孜孜勤求民瘼永惟惠下實政無如除賦蠲租除毎歲直省報聞偶有水旱災傷照輕重分數豁免正供仍加賑䘏外將天下地丁錢糧自康熙五十年為始三年之内全免一週使率土黎庻普被恩膏除將直𨽻奉天浙江福建廣東廣西四川雲南貴州及山西河南陜西甘肅湖北湖南各直省康熙五十年五十一年地丁錢糧一概蠲免歴年舊欠錢糧一併免徵外所有江寧安徽山東江西四省除漕項外康熙五十二年應徵地畝銀共八百八十二萬九千六百四十四兩有奇人丁銀共一百三萬五千三百二十五兩有奇俱著察明全免其歴年舊欠銀二百四十八萬三千八百二十八兩有奇亦併著免徵計三年之内總免過天下地畝人丁新徵舊欠共銀三千二百六萬四千六百九十七兩有奇各該督撫務湏實心奉行體朕軫念民生至意如有侵欺隠匿使惠不及民借端科派者督撫嚴行察叅督撫失察事發之日亦嚴加究治諭㫖到日立即徧示城郭鄉村咸使知悉爾部即遵諭行特諭康熙五十一年十月初三日諭吏部殷泰自為兵丁時朕灼知其義勇甚優歴加簡用陞授總督以來不負委任潔清自持約束屬下恩威並用陜省軍民莫不感戴朕深愛惜之今聞病勢已減著在任調理特諭康熙五十一年十月初四日諭大學士溫達李光地王掞等今年浙江等處海賊沿途刧奪客啇船隻殺傷官兵直至盛京殊屬可惡現今正當北風之時海賊俱焚燬船隻各回本籍應趂此時嚴加查拿著派兵部刑部賢能滿漢司官各一員差徃浙江福建廣東㑹同該督撫逐户嚴行搜查如查拏鄭盡心務期必獲方好這逐户搜緝民雖畧受辛苦賊盗一靖於民大有裨益康熙五十一年十月初六日諭九卿張伯行居官清正自天下婦孺無不盡知允稱亷吏但才不如守果係無能噶禮雖才具有餘辦事敏練而性喜生事並未聞有清正之名伊等互叅之案皆起於私隙聴信人言所致誠為可恥朕臨蒞天下五十餘年頗諳政事於滿洲䝉古漢軍漢人毫無異視惟一以公正處之且噶禮屢次具摺欲叅張伯行朕以張伯行操守為天下第一斷不可叅手批不准其親筆現在噶禮處這所議是非顛倒著九卿詹事科道㑹同矢公據實再議具奏康熙五十一年十月初六日聖祖仁皇帝御製文第四集巻一
