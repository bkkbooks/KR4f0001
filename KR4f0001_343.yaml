body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷二十一論理學論夫理語大乾坤莫能載語小乾坤莫能破散之萬物歸於一中無過不及日用平常見於事物者謂之理天命而有性率性而有道此性命之自然也聖人修之明之推之教之不齊者齊之太過者抑之皆循乎天道而盡已之性非格物致知窮其理之至當者即理在前而不識也自宋儒起而有理學之名至於朱子能擴而充之方為理眀道偹後人雖雜出議論總不能破萬古之正理所以學者當於致知格物中循序漸進不可躐等有一事必有一事之理有一物必有一物之理從此推去自有所得求之而失於過不得其理也求之而失於不及亦不得其理也惟一中即是無私無私而後得其理之正也乎先天後天論說卦云天地定位山澤通氣雷風相薄水火不相射此伏羲之卦也萬物出乎震震東方也以下乃文王之卦也未分先天後天之㫖至宋邵子方有其說亦不能盡傳自漢至眀解易者不止數百家持論紛紜各以已見為是邵子惟精於數故數有本程子明於理故理有據獨朱子挺然違衆斷邵氏為是兼占兼數兼理所以六百年行之無弊亦未嘗分剖先後天之卦後儒各立門户彼此批駁尋毛求疵終無確見夫易者經天緯地無所不包大而性命小而隱微變化無窮神妙莫測宋儒有云老子得易之體孟子得易之用吾思得易之體者私其已也得易之用者公其理也所傳不同所授亦異且論先後天理法象自然之妙先天乾南而後天西北先天坤北而後天西南先天離東坎西而後天離南坎北或取諸卦體或取諸卦畫或取爻象或取方位後人精於數者往往以數配卦河洛總數乃天地之自然凡有數者無不吻合所以至小至微皆可假借於天地之自然有所不及也專論理者以理配卦凡剛柔公私皆歸卦爻而不問數象之淵源後之學者亦隨其所好而習之所以不明未畫卦之前大意繫辭云君子所居而安者易之序也所樂而玩者爻之辭也居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利朱子云自伏羲以上皆無文字只有圖畫最宜深玩聖賢深意必求卦畫求之卦畫必有由來又見宋儒云眀於易者不言易其中又一層深意不能解也朕素讀書留心經史實為治道非比書生議論是非尋章摘句之用也故有此論勉强而作愧不文焉同聲相應論易文云同聲相應同氣相求雖釋乾卦九五而實無所不包也分而論之則雲之從龍風之從虎就燥流濕各以類推之極之於出言至善千里應之出言不善千里違之此九五九二之當位聖人以此知同音之由也至於五音六律互相為生古人考其中聲之實有彼此和同其聲相應自有天然至易且明處而近世不能得而詳也吾論同聲則曰自黃鐘之宫損益至盡陽律隂吕各得其生反而還之隔八應之此為同聲也以甲乙之和則又謂黃鐘之和於五倍之下也擴而充之聲之相應非人力之所能也若有意於同則理之不能同者如孟子所言物不能齊至於理之同者則有天地隂陽剛柔消長之道存焉故不待同而音自同不待人之作為而自有應故曰同聲相應若非至理之必應則作巧日拙之誚不能免也序性理精義序朕自冲齡至今六十年來未嘗少輟經書唐虞三代以來聖賢相傳授受言性而已宋儒始有性理之名使人知盡性之學不外循理也故敦好典籍於理道之言尤所加意臨蒞日久玩味愈深體之身心驗之政事而確然知其不可易前眀纂修性理大全一書頗謂廣偹矣但取者太繁相類者居多凡性理諸書之行世者不下數百朕實病其矛盾也爰命大學士李光地詮釋進覽授以意指省其品目撮其體要既使諸儒之闡發不雜於支蕪復使學者之披尋不苦於繁重至於圖象律歷性命理氣之源前人所未暢發者朕亦時以已意折中其間名曰性理精義頒示天下讀是書者自有所知也已朱子全書序唐虞夏商周聖賢迭作未嘗不以文字為重文字之重莫過五經四書每覽古今凡傳於世者代不乏人秦漢以下文章議論無非因時制宜諷諫陳事繩愆糾謬補偏救弊之計耳若夫文辭之雄摛藻之麗古人已有定論豫何敢言但不偏於刑名則偏於好尚不偏於楊墨則偏於釋道不偏於詞章則偏於怪誕皆不近於王道之純豫少時頗好讀書只以廣博華贍為事剛勇武偹為用自康熙三十五年天山告警朕親擐甲胄統數萬子弟深入不毛沙磧乏水瀚海指揮如意破敵無存未十旬而凱旋可謂勝矣後有所悟而自問兵可窮乎武可黷乎秦皇漢武英君也因必欲勝而無令聞或至不保者豈非好大喜功與亂同道之故耶所以宵旰孜孜思逺者何以柔近者何以懷非先王之法不可用非先王之道不可為反之身心求之經史手不釋卷數十年來方得宋儒之實據雖漢之董子唐之韓子亦得天人之理未及孔孟之淵源至邵子而玩索河洛之理性命之微衍先天後天之數定先甲後甲之考雖書不盡傳理亦顯然矣周子闡無極而太極復著通書其所授受有自來矣如星辰繫乎天而各有其位不能掩也光風霽月之量又不知其何似二程之充養有道經天緯地之德聚百順以事君親前儒已誦之矣至於朱夫子集大成而繼千百年絶傳之學開愚䝉而立億萬世一定之規窮理以致其知反躬以踐其實釋大學則有次第由致知而平天下自眀德而止於至善無不開發後人而教來者也五章補之於斷簡殘篇之中而一旦豁然貫通之為要雖聖人復起必不能逾此問中庸名篇之義則不偏不倚無過不及之名未發已發之中本之於時中之中皆先賢所不能及也若語孟則逐篇討論皆內聖外王之心傳於世道人心之所關匪細如五經則因經取義理正言順和平寬宏非後世淺見而輕議者同日而語也至於忠君愛國之誠動靜語默之敬文章言談之中全是天地之正氣宇宙之大道朕讀其書察其理非此不能知天人相與之奧非此不能治萬邦於袵席非此不能仁心仁政施於天下非此不能外內為一家讀書五十載只認得朱子一生居心行事故不揣粗鄙無文而集各書中凡屬朱子之一句一字命大學士熊賜履李光地素日留心於理學者彚而成書名之朱子全書以偹乙夜勤學雖未能幾於寡過亦自勉君親之責者朕又思朱子之道五百年未有辨論是非凡有血氣皆受其益朕一生所學者為治天下非書生坐觀立論之易朕集朱子之書恐後世謂借朱子之書自為名者所以朕敬述而不作未敢自有議論往往見元眀至於我朝著作講解萬不及朱子而各出已見每有駁雜反為有玷宋儒之本意况天下至大兆民至衆輿圖甚逺開地太廣諸國外蕃風俗不同好尚各異防此失彼之患不可不思若以智謀要結人心如挾泰山而超北海也以中正仁義老成寬信似乎近之凡讀是書者諒吾志不在虛辭而在至理不在責人而在責己求之天道而盡人事存吾之順歿吾之寧未知何如也歷代年表序古者紀事之書其體有二専紀一事而具其始末者尚書之體也編年而通紀一時之事者春秋之體也自漢司馬遷作史記盡變尚書春秋之體而後世為史者皆師之然其法實不外乎尚書春秋其本紀世家即春秋通紀時事之體八書與列傳即尚書專紀一事之體而所謂年表者又編年之變例也歷代之史具矣而表多缺焉康熙四十四年春朕南巡吳㑹有儒生龔士炯進其所編歷代年表若干卷起陶唐而終於隋朕惜其用心之勤而業未竟也乃命侍郎周清原內閣學士王之樞續之訖於元至正之末凡一百卷其體依倣諸史而微有别者諸史之表各分一類而是編則王侯宰輔以及外蕃層次附列於帝紀之下諸史之表獨載廢置朝㑹征伐之大者而是編則每事皆系焉是其所以異也代逺文繁親加裁定復考正三元甲子編年一卷列諸簡端昔宋袁樞為紀事本末朱子以為與資治通鑑相表裏亦猶左氏之於春秋既依經以作傳而復别為國語以相錯綜也以是知紀事之書不厭其類之廣蓋以歷世久遠事物紛賾觀者易於遺忘故别為一體以提其要而使致詳焉是編之作亦所以偹史之一類云爾聖祖仁皇帝御製文第四集卷二十一
