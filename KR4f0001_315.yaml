body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷七敕諭諭大學士松柱蕭永藻王掞學士查弼納敦拜渣克旦勒什布星俄特常壽蔡升元王之樞彭始摶鄒士璁等凡事滿漢大臣應公同一心辦理兩議殊非善習世祖皇帝時兩議之事甚少即間有兩議者亦滿漢大臣公同署名具奏此制甚善至今遵行近見兩議之事滿漢大臣各自署名此風漸不可長著吏部都察院察議具奏康熙五十四年十月三十日諭大學士松柱蕭永藻王掞學士查弼納敦拜渣克旦勒什布星俄特常壽蔡升元王之樞彭始摶鄒士璁江南地方遼濶關係緊要江寧巡撫員缺未經補授安徽巡撫梁世勳已令調來引見今總督赫壽又丁母艱通省無一大吏印務交與藩臬署理關係甚大赫壽著照常在彼辦事速行文左都御史范時崇星馳來署理江南總督印務俟范時崇至江南接受時赫壽再行來京總漕施世綸駐劄之處去蘇州甚近江寧巡撫印務著施世綸星速署理其總漕事務施世綸照常辦理毋致遲誤以此傳諭九卿康熙五十四年十一月初九日諭偏沅巡撫陳璸朕御極五十餘年於誠偽公私之介詳加審辨萬幾之暇勤求古帝王先聖治理無不專務誠敬屏棄虛浮先行其言而後從之垂訓甚明是以朕孜孜圖治亦皆崇尚實政不貴空言督撫係地方大吏凡關係民生興利除弊有禆風化鼓舞士子果有真知灼見者即應竭慮殫心見諸躬行以利地方若徒托拾浮辭沽名要譽不但無禆政治且恐有纍民生即如張伯行初授巡撫時即稱移風易俗家給人足報效朝廷逮後絀於才力張弛失宜反致漸生事端擾纍民生地方盈寧之狀迥不如前此非不能身體力行言過其實之故乎今覽陳璸條奏數欵皆伊職分內應行事宜當於力見施行後再行具奏乃將空言妄陳殊屬無謂且督撫身任地方最重者年榖順成民生樂業陳璸甫授湖南巡撫衆災紛紛此必撫綏安輯未盡其道上干天和之所致也疏稱湖南徴收錢糧每兩加至一錢二三錢不等並不指明加徴起自何年趙申喬昔任偏沅巡撫時居官甚清知其於加耗一事禁止甚嚴今覽陳璸所奏豈是趙申喬亦未曽禁止耶陳璸身係撫臣一切事務不圖躬行實踐將久經定例禁止之事故張大其言沽名條奏殊玷官針加耗起自何年何撫著陳璸即行指參康熙五十四年十一月十一日諭大學士松柱等前曽屢次議將張伯行拿問朕念伊居官清亷不受餽送故雖經革職而伊缺亦未經補授今調來引見甚糊塗無知實非堪任巡撫之人但能杜苞苴操守甚好於錢糧無多之處令其管守於商人錢糧俱有禆益其傳諭九卿康熙五十四年十一月二十三日諭議政大臣現在議政所議之事既現在等候信息乘此時將八旗漢軍及漢人內有家道殷實情願自備軍前效力者并候缺人員作速傳集著吏戶兵三部查明具題引見先期發往俟遣往大臣到日將地方官內有不堪劣員即行革退將伊等補授於事有益不致有誤矣康熙五十四年十二月初九日諭大學士松柱等武官不論大小朕俱親驗補授各於營伍事務黽勉效力部院滿洲司官今入侍衛班次行走漢官亦時常引見所以俱各勤謹惟外省州縣官員雖調來引見仍未能周知九卿大臣俱有言責伊等亦當留心可傳諭之康熙五十四年十二月十二日諭戶部朕統一寰宇宵旰孜孜惟以年榖順成民生康阜為念故凡地方水旱情形必時加咨詢其有歲偶不登即詔所司亟行蠲賑五十餘年來未嘗稍懈前因甘肅靖逺衛等處年歲歉收既已多方籌畫蠲賑頻施復將甘肅被災二十八州縣衛所康熙五十四年額徴銀糧草束通行蠲免但被災之餘民鮮蓋藏若非再沛宏施恐來歲辦賦猶艱除寧州隴西渭源狄道臨洮五州縣衛五十五年額徴銀糧草束已經蠲免外其靖逺等二十八州縣衛所五十五年額徴銀九萬七千八百七十兩零糧二十三萬九千四十石零草二百五十三萬七千八十束零亦盡與蠲免諭旨到日該督撫即遍行曉示俾遐陬僻壤莫不周知務期均霑實惠以副朕軫恤邉民至意爾部即遵諭行特諭康熙五十四年十二月二十三日諭議政大臣大兵行動運送糧餉安設臺站牧飬馬匹等事俱係領兵將軍責任今米糧不能運至皆由砂磧地方水草用竭之故昔朕曽親領大兵在無水草砂磧地方走過所以深知耳中路出兵時沿途留下一邉水草處行走以牧放牲口爾等大臣所親知者身為領兵將軍而此等事務全不知曉閉目直前致沿途水草如火燒赤地後隊兵馬及運米牲口有不至窮窘者乎朕曽屢向衆大臣云領兵大人甚難凡事用心不可不周到今歲停止進兵候種地及一應物件預備完畢審看兩下軍情再行定奪之説即為此故也且去年哈密二百兵丁殺敗䇿妄阿喇布坦時衆大臣俱欲進兵如果彼時即行進兵路途遙逺糧米焉能接濟現在駐劄食用糧米尚不能接續以致如此遲誤若即進剿不知作何景况矣如喀爾喀一路將軍穆塞祁里德等所統之兵俱係滿洲蒙古行走經練之人並無糧餉不足等事席柱等雖係精兵因不曽行走經練所以如此現在兵馬倘致飢餒糧若不到關係甚大行令將軍席柱提督師懿德總兵官等著仍駐彼處於兵丁內酌量汛守調遣足用之數留用其庸懦不堪者著會議撤回此兵回來時器械斷不可沿途遺棄若有行走處將此經練之兵發往此事議政大臣等所議周詳著照議速行康熙五十五年二月初一日諭議政大臣差往䇿妄阿喇布坦之克什圖保柱並澤卜尊丹巴胡土克圖之使人及䇿妄阿喇布坦到澤卜尊丹巴胡土克圖之使人潘提忠內等俱已來到朕俱詢問其䇿妄阿喇布坦情形皆已悉知䇿妄阿喇布坦乃係巨猾姦詭之徒甚屬無耻抵死賴説朕之使臣非係使臣旨意非係旨意是部文等語今爾諸大臣等向克什圖保柱等詳詢䇿妄阿喇布坦情形將目今差去之使臣克什圖保柱并胡土克圖之使人初陽托音及䇿妄阿喇布坦之使人潘提忠內等一同遣往此事乃係大事將作何遣往等處著諸議政大臣會同副都統以上並九卿大臣等各陳所見詳議再傳諭與漢大臣等從前但以兵馬糧米牲口路逺難到為念今兩路兵馬糧米諸凡齊備悉已現成祁里德等之兵米剩有二千餘石在彼收貯而西路之米亦皆陸續運到兩處之米委屬充裕無容計慮今將運米之事稍緩為善於牲口亦屬有益去年隆冬嚴寒之際尚且將兵米俱已運到况今夏月正草發之時更有何慮乎朕從前中路出兵時曽於沿途按站留米令煮粥以贍營中困乏飢餒之步行跟役并貿易人等大有禆益今亦令兩路進兵之站每站留米二石如此則運米之牲口駝載亦可輕便且每站若皆有米則人斷不致死於飢餒䇿妄阿喇布坦鄙猥之徒何足為慮我惟以人之性命為緊要耳至將軍席柱原係做過護軍參領及侍衛之人朕所稔知亦曽臨陳對敵第漢伏好而人無主見一應軍務糧餉俱將軍責也伊云我統領兵馬運米之事與我無涉糧到我行等語可見席柱無將軍之材將此處著諸議政大臣確議再總兵官路振聲一聞侵犯哈密即行圖效領兵往救且聞伊愛惜標下兵士甚屬出力著路振聲入議政賞與翎子據䇿妄阿喇布坦奏懇遣使一賢能大員等語伊並不認罪不遣人來若我令大員前去殊不相稱其克什圖保柱出使䇿妄阿喇布坦處所已經數次今若加大銜與克什圖保柱差往前去即係大員矣再凡為使臣者果能一體同心於事方克有濟若內有不睦互相掣肘彼此言語矛盾一有差失則無益於事伊等有不合處即當明言為是再派出在京一人偕克什圖保柱前去此處亦著大臣會議朕寫旨意時令克什圖保柱等面看繕寫伊等謂有未宜處朕即改之其再明示諸大臣我兩路兵馬牲口糧米一應俱已齊備兩處軍中業已種地秋季可收此番使臣到䇿妄阿喇布坦處伊或認罪俟得其究竟如何之時將我大兵逐漸進至伊地止説會講遣往伊既可以遣兵二千到哈密會講則我護送使臣前往之兵並非進剿之大兵亦無不可也康熙五十五年三月初十日聖祖仁皇帝御製文第四集卷七
