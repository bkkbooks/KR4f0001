body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷十四敕諭諭户部頃緣山西巡撫噶爾圖同太原總兵周復興奏報平陽府地震房屋倒塌人民損傷隨經特遣司官星馳前往察勘情形比復傳問往來經過及本籍人員具述屋宇盡皆傾毁人口多被傷斃受災甚重朕心深切軫恤應作何恩恤著速詳議具奏爾部即遵諭行特諭康熙三十四年四月二十五日諭大學士伊桑阿阿蘭泰爾等傳諭八旗滿洲蒙古都統官員子弟及諸有房舍者與家僕披甲者勿察若實無房舍之前鋒護軍披甲兵都統身自確察於此月初十日保奏康熙三十四年五月初五日諭大學士伊桑阿阿蘭泰覽八旗都統所察無房舍者七千有餘人未為甚多京師內城之地大臣庶官富家每造房舍輒兼數十貧人之産是以地漸狹隘若復斂取房舍以給無者所謂剜肉補瘡其何益之有貧乏兵丁僦屋以居損所食錢糧以償房租度日必至艱難於城之外按各旗方位河濵城下每旗各造屋二千間以給無屋兵丁每名給以二間於生計良有所益屋之外築以周牆沿河之牆各留炮眼如此既可美觀且足永固此屋令毋得擅鬻兵丁亡退者則收之官大略計之約費三十餘萬金譬之國家建一大宫室耳敕下欽天監相視汝等及八旗都統身往驗看城下宜建造之處奏聞康熙三十四年五月初十日諭大學士伊桑阿阿蘭泰平陽府城垣樓堞衙署倉庫頃因地震悉皆傾圮異日所必修者今西安所貯銀兩多可發二十萬兩速令修葺及時營造城堞既可即完灾黎糊口亦資其益其下工部具議以聞康熙三十四年五月二十八日諭大學士伊桑阿侍郎朱都納學士宋柱户部郎中鄂竒副都統齊蘭布等自盛京還奏言今歲盛京亢旱麥禾不成米價翔貴雖市有鬻粟而窮兵力不能糴遂致重困夫盛京者根本之地令朱都納宋柱鄂竒等馳驛迅往㑹同盛京將軍副都統諸臣詳察果窮乏者於去歲海運米二萬石中動支一萬石計會散給令可食至秋成此一萬石散給而有餘者平價糶之若此則兵民均有利益又諸地有告糧乏者遣城守尉部員之賢能者並散給以賑之如一萬石不足散給發糶速具聞請㫖康熙三十四年五月二十九日諭大學士伊桑阿阿蘭泰城垣之下而外各旗空隙之地有可營建房屋者察看奏聞八旗都統可速看本旗之地再會同驗看其令工部遍傳八旗悉此康熙三十四年五月二十九日諭大學士伊桑阿阿蘭泰右衛將軍職任最為緊要須慎簡其人可暫命歸化城將軍費揚古兼攝之待右衛將軍既得其人則可勿攝其下兵部速行之康熙三十四年六月初四日諭內閣時值久雨連綿乍止復雨將不利於田稼朕甚憫焉亟冝祈晴其傳諭禮部速議以聞康熙三十四年六月十三日諭大學士伊桑阿阿蘭泰張玊書學士戴通勒德額赫里齊穡顧藻徐嘉炎陸葇江北糧艘狹小而所載糧數與他處之船相同船之所載既重不惟不能載貨而儻有令兼載他物其重困矣增置一二船可不勞而致也興永朝所條上十事亦曽言及於此爾等議以聞康熙三十四年六月十五日諭大學士伊桑阿阿蘭泰張玊書學士戴通勒德額赫里齊穡顧藻徐嘉炎陸葇近要兒渡決口及天津以南此二處其相視河之故道可開河或逹之海或逹之大河者其識之於十月間奏聞當遣人往視康熙三十四年六月十五日諭大學士伊桑阿阿蘭泰張玊書學士戴通勒德額赫里齊穡顧藻徐嘉炎陸葇沙河鞏化城盧溝橋拱極城壩上諸地馬坊城垣敕工部察看於某地有可營建兵房若干間者同前造房事並議以聞康熙三十四年六月十五日諭大學士伊桑阿阿蘭泰張玊書學士戴通阿爾稗顧藻徐嘉炎張榕端兹後世職若以罪革斥其子勿准承襲令同父昆弟襲之無同父昆弟者則冝削其職其下吏部定例具聞康熙三十四年六月三十日諭內閣由天津再運米於盛京皆迅速而逹大克濟夫厥事在事官員人等悉議叙具奏來歲亦冝運米並議以聞康熙三十四年七月十七日諭吏兵二部各省督撫提鎮官員間令來京陛見原欲以地方情形及兵民生計面加咨詢具有深意近見來京各官輒以進川馬等物為辭多所置辦雖經却還但恐其在任購買致貽地方官員兵民之纍朕本欲詢兵民生計召令前來若反致纍兵民殊失朕之初意且川馬如果需用朕自頒特㫖令出産地方辦解何須進獻著通行嚴飭嗣後一切禁止爾部即遵諭行特諭康熙三十四年七月二十二日諭大學士伊桑阿阿蘭泰馬之所係甚重宜於四十九旗諸地購買歸化城可千匹俄爾多斯可二千匹科爾沁可二千匹其餘諸旗定額購買爾等議以聞此買焉事遣部院中曽出差有生計者副以八旗蒙古護軍參領及參領侍衛各一人㑹同該王台吉等使傳諭朕㫖購買之康熙三十四年七月二十五日諭大學士伊桑阿阿蘭泰學士戴通宋柱陶岱齊穡博濟領侍衛內大臣皆令與㑹議都統席特庫杜斯喀爾阿什坦胡巴齊什噶爾馬蘇弩亦令與㑹議侍郎舊不與可已之康熙三十四年七月二十五日諭大學士伊桑阿阿蘭泰王熙張玊書學士戴通宋柱陶岱齊穡博濟韓菼顧藻徐嘉炎張榕端于成龍向以每事好勝倡議捐納革職今在河工殫極勤勞居官素優總督原銜其復還之康熙三十四年八月初二日諭大學士伊桑阿阿蘭泰學士戴通宋柱陶岱齊穡博濟陜西永固城副將員缺令提督孫思克李林隆選擇奏聞其選擇之員向經引見者則弗令其陛見若未經引見者並人員咨送令其陛見如無可選擇者速牒該部以應授之人奏聞康熙三十四年八月初二日諭户部盛京地方比歲荒歉粒食艱難朕心深切軫念原欲躬親巡省詢問疾苦情形遍敷恩澤今雖停止東行而所在貧窶兵丁尚冀朕之臨幸是宜仍加賑恤用俾資生應作何加恩爾部議奏又盛京兵丁錢糧兩季支領兵丁於未支領之際每致有稱貸逋負嗣後著按月支給至今嵗秋禾聞亦不甚豐茂恐生計漸艱困乏滋甚自今冬以至來秋應作何賑給不致失所共計需糧若干著盛京將軍副都統會同盛京户部侍郎查明詳加籌畫具奏爾部即遵諭行特諭康熙三十四年八月初三日諭大學士阿蘭泰朕巡幸後蒙古事情爾須看過馳奏事皆共知之始克有濟雖諸奏章亦必開看然後奏聞其當聞於皇太子者爾即啓知康熙三十四年八月初四日諭户部直𨽻順天保定河間永平四府所屬地方今嵗水潦傷稼三農歉收朕巡幸所至遍加咨訪聞高阜之産尚有秋成而卑下之田被潦者多計所收穫不能相敵雖經勘災頒賑不致仳􅍣失所而須辦錢糧若仍行徵取則民力匱乏難以輸將朕心深切不忍著將四府康熙三十五年地丁銀米全與蠲免用示寬恤其霸州雄縣香河寶坻四處皆有水道可以轉輸每處著發米一萬石各差司官一員齎往照彼地時價減值發糶以資民食著行文該撫通行曉諭俾均霑實惠副朕軫念災黎至意爾部即遵諭行特諭康熙三十四年九月二十四日諭大學士伊桑阿阿蘭泰王熙張玊書學士戴通齊穡博濟傅繼祖韓菼顧藻徐嘉炎張榕端各省操守清亷愛養百姓練逹吏事之官不可謂無其人其敕各省督撫以守亷愛民有幹濟之官自知縣以上擇其可者各以一二人咨送到日奏聞引見康熙三十四年九月三十日諭議政大臣伊拉固克三之徒衆有名目者諭令來京行後其屬役及牲騎令兵丁陸續押赴徙於盛京令得飼養牲畜從容以行其有流移者勿徙其家私付之該管札薩克喇嘛又傳諭善木巴王墨爾根濟農王值雨雪時噶爾丹侵掠其疆界亦未可定宜簡發其兵並附近喀爾喀諸台吉之兵於諸處防守遠置塘哨偵探消息儻有噶爾丹之警來侵者敵勢寡弱量力可擊則以其兵擊之若敵勢衆多則設殿後之兵向歸化城內地移營雖退入內地亦不譴責也凡有動靜一面速報歸化城將軍一面奏聞康熙三十四年十月初八日諭大學士伊桑阿阿蘭泰八旗兵丁外大臣庶官及俊秀間散人等現在京飼養之馬若干肥健者若干羸瘦者若干令各旗都統於各佐領內府佐領悉為察驗奏聞康熙三十四年十月十五日諭大學士伊桑阿阿蘭泰各省向者欺隱之地畝曽限三年清出今限已將滿可再展限二年令其一一清出康熙三十四年十月十五日諭大學士伊桑阿阿蘭泰朕見各部院官冗事少其筆帖式有應裁者爾等㑹同各部院堂官稱事備員酌議裁減奏聞康熙三十四年十月二十日諭大學士伊桑阿阿蘭泰八旗兵士以從軍被創而致殘疾者有能書寫及年力尚壯堪以筆帖式用者察奏以聞康熙三十四年十月二十日諭大學士伊桑阿阿蘭泰侍讀學士伊道車陳汗納木渣爾王等以兵追逐罕兜公此舉殊可嘉兹後遇事須殫力展效朕自厚與矜恤其傳諭朕意車陳汗等勿以厄魯特為懼京師大兵及各路兵馬整備已就若噶爾丹今冬蠢動定當咸劉無遺若噶爾丹過此冬月苟延至於來春其殄滅可引領而待也可宣諭使悉知之又喀爾喀巴爾瑚數百為羣肆行劫掠伊道至日其以此信移檄科爾沁圖謝圖王逹爾哈王等善為防備車陳汗納木渣爾王車布登貝勒阿南逹濟濃此四旗之兵已經追逐罕兜公內大臣明珠等有用兵之處此四旗其免調發又明珠等所往之地與爾等所往之地相去非遙可互為通信其巴林之那木逹克王台吉阿拉布潭吳爾衮額附等今在烏朱木親之地諭令毋擅移居再探都統杜思哈爾及滿洲前鋒兵信息馳報伊道此行冝善自防護惟以偵探信息奏聞為要若遣多人往探徒爾勞疲人馬聞雪甚大雪所届遠近及某地可行某地不可行蒙古必知可問之蒙古遣人往至哨瞭之所探取信息又爾於途次儻别得信亦即報聞又喇席行止之地亦當互以音息相通康熙三十四年十月二十三日諭大學士伊桑阿阿蘭泰張家口沿途驛遞俱已疲敝其遣兵部賢能司官前往經理竝察其廢壞之由奏聞康熙三十四年十月二十四日諭大學士伊桑阿阿蘭泰尚書庫勒納佛倫薩穆哈軍行以馬為重今諸佐領所養官馬既皆給以錢糧飼牧該管人員當不時嚴督務令肥澤若馬羸瘦無濟軍需佐領驍騎校護軍校撥什庫及飬馬人員一並以軍法從事康熙三十四年十一月初一日諭內閣各部院滿漢大臣庶官以下筆帖式以上所養馬匹皆務肥澤儻令助馬以濟軍需則各以所助數目雖筆帖式亦身自上奏蓋為國家公事助以已馬即與其身赴行間效力者無異康熙三十四年十一月十一日諭大學士伊桑阿阿蘭泰朕見官兵戰箭皆以舊式製造短而且重皆與其所執之弓不稱弓之徑軟各異引弓之深淺不同科此後箭之長短重輕皆令度其弓力務製造合冝康熙三十四年十一月十二日諭內閣南路捕盜同知趙𢎞燮居官既優其父趙良棟向在行間著有勞勩趙𢎞燮其超擢為天津道康熙三十四年十一月十八日聖祖仁皇帝御製文第二集卷十四
