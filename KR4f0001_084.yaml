body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷四十目録古今體詩三十四首途次網得鮮魚馳進兩宫兼志思慕之誠晚經淮陰平山堂天寧寺由儀真乘巨艦至京口金山並序試中泠泉妙髙臺鐵甕城竹林禪院在潤州城南竹徑數里夜過丹陽途中覽皇太子倣書以示之錫山吳閶虎邱句容道上雨花臺幸報恩寺駐蹕金陵以方物寄獻兩宫金陵舊紫禁城懷古江寧駐蹕皇太子啓至請安兼報讀完四書示江南大小諸吏燕子磯夜泊髙郵湖見居民田廬多在水中因詢其故惻然念之閲河堤作泉林寺即子在川上處途中長至過闕里闕里古檜晚到河間太皇太后使人送乳餅食物巡幸回宫內殿進講毛詩原任總督于成龍居官清廉自古罕有特命諸臣議恤以勵官方薊城遇雪讀左氏春秋作
