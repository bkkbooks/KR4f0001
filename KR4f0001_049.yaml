body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻二十二碑聖感寺碑夫以北極神京西山勝地峰巒迴互草木蘢蔥晴嵐霽雪掩映皇居秋水春華邀迎翠輦非徒百工職事瞻仰於斯實亦九州風土形勢所在其間招提梵宇極雕梁巨麗之竒精舍珠林盡繡桷紆迴之巧然松雲燈火不聞禪誦之聲泉石荒苔難覓經行之蹟故雖危甍聳漢上接雲霄而紺殿凝塵空頽歲月朕毎遊歴其處輒為致慨於衷平坡寺者僻處西南遥臨宫闕刻盤螭於玉砌丹碧流金塑寳像於琳宫煇煌映藻罘罳網户饑鴿時馴鈴鐸鳴檐野狐知肅迨時移物換雨圮風侵華榱作㸑已無往日之𢎞觀畫壁成泥誰識當年之璀璨寺僧海岫篤實持躬勤勞砥行簞瓢布衲林中不演三車瓦鉢芒鞵胷次時䖍五戒十載經營重新殿廡六時功課繼廣門庭遂使清宵梵唄蕭疎盡入寒空向曉鐘聲颯沓仍隨秋雨浮屠之傳於斯無媿朕萬幾有暇七校偶過省耕省歛時駐蹕於兹山一豫一遊再撫臨於其地詢知本末感佛慧之重光鑒彼勤劬啓聖功於匪懈更名聖感特賜宸書欲使遐邇具瞻臣民共識豈若崇祀作佞開愚甿奔走之端惟曰致敬而遠法往聖格思之道勒諸貞珉垂感㑹於千秋記注瑶編志心期於一日臣工上下咸悉朕懷賜一等公遏必隆家廟碑孝昭皇后壼德攸宣倫情肫篤念父母鞠育之勤思祠宇春秋之祀朕嘉其意遣官督理後二月皇后已崩十七年十二月工作告成因諭内閣詳考明代實錄允符典例特賜碑文勒諸貞石粤稽往代臨御萬邦必敦九族宫闈化洽内輔惟賢眷祐之隆宜崇曠典以篤椒親道至備也孝昭皇后仁孝性成溫恭德著久存屺岵之思每深霜露之感尔一等公遏必隆同妻縣主敬慎齊家洽謙沖之令望肅雍秉訓誕淑慎之坤儀是當錫以丹堊享以蘋蘩爰命冬官董其興作事方行乎二月哀忽動於六宫未遂之志朕甚悼焉念尔勲戚大臣兼核歴朝典制落成之日用賜豐碑昭國家不遺故舊之恩示皇后永懷顧復之念光流泉壤堪為戚屬之羽儀名列丹青不愧綸言之奬賚凡尔子孫克保無斁欽哉黒龍潭重建龍王廟碑傳曰神有功德於民則祀之能捍大患禦大災則祀之非此族也不載祀典朕自御極以來夙興夜寐惟思稼穯為小民之依所期時和歲豐嘉生樂育然年穀順成雨澤是資詩曰琴瑟擊鼔以祈甘雨信乎天心仁愛亭毒萬物而協靈効順優渥霑足之應皆有神焉以司之亦如分猷布澤之無敢曠厥職焉距京師西三十餘里金山之麓有潭泓然以深不泛不涸前代時以亢旱禱望其地輒能興致靈雨因名黒龍潭焉潭之側倚山瞰壑舊有祠宇以祀其神朕數以祈雨駐蹕於兹爰謀式廓其廟貌以昭靈貺而敬民事今者四郊之内雨暘時若歲登大稔工適告成惟神之功德實能膏澤田疇以福庇生民揆諸捍患禦災之義莫大於此用是勒諸貞石垂示無窮寧不偉歟賜廣西廵撫馬雄鎭墓碑朕惟臣子之誼大節為重然平居無事之時人人侈談忠義一旦臨事而為國捐軀確乎不奪者蓋寡則所稱成仁取義之士國家得之宜何如褒崇焉尔馬雄鎭洊歴禁近簡授節旄恪共之譽有聞綏輯之功斯著豈意叛藩逆命怙惡弄兵急變起蕭牆之中孤城介桂嶺之外聲阻援絶形絀勢危尔則以死自持抗詞罵賊遂觸兇怒横致幽囚然猶志切輸忠力圖滅宼間關遣子萬里來歸慷慨上書一心罔貳丹誠旣通於王室闔門咸殉於巖疆節挺氷霜歴四年而益厲操堅金石經百折而不撓可云烈矣嗚呼惟見危乃知授命之不易疾風勁草繄尔一身實荷綱常之鉅朝廷養士數十年有臣如此庶無負焉朕用旣憫且嘉特考彞憲賜諡文毅躋以崇階爰勒貞珉昭示來世凡屬臣僚聞風興起咸思自勵尔之為功世道豈淺歟康熙二十一年正月二十六日賜福建總督范承謨墓碑朕惟朝廷簡畀重臣授以封疆之任平時則竭誠殫力以靖厥職猝逄事變則有凛乎不可犯確然不可奪之節舍生取義流光天壤古所謂不二心之臣如此而已尔范承謨名臣之子奮迹甲科入侍禁林出典節鉞咸有聲績著於當官洎閩疆蒞鎭之年值狂豎盜兵之日宼起門庭禍生肘腋智未及施勇不暇展而尔志恥倖生義無苟免奮身罵賊誓不共天遂致闔室幽囚三年拘繫阻敓其衣食廹脅以甲兵兇燄彌張貞操愈勁卒蹈白刃以作完人慷慨從容兼有其美兹者底定疆陲申明命討罪人斯得臣節益昭倍深軫悼之情特厚飾終之禮寵以隆秩諡曰忠貞嗚呼褒忠顯善帝王治世之大權恩命疊頒朕曷有私於尔以培正氣以植人倫庶使選愞之士覩盛典而知興慕義之夫聞休風而加勸勒諸貞石其永有譽於無窮哉康熙二十一年四月二十六日中臺演教寺碑五臺之山高出雲代然不與岳鎭之列山經禹貢以及道書所稱洞天福地均莫之載蓋自昔為釋子所棲故與峨嵋普陀號三靈山之三山者或在海上或當巴蜀險遠之區惟兹山峙神京之右千里而近宜登陟者較多焉朕嘗覽觀載記謂兹山東有離岳火珠西有麗農瑶室南有洞光珠樹北有玉澗瓊枝中峰則有自明之金環光之璧是靈秀所鍾中臺為尤異矣臺高三十有九里游者至是必思憩息之地此自唐以來演教寺之所由建也山峻多風寺久傾圮朕爰命工拓而新之譬諸於物澤雉十步一啄百步一飲鵬之飛九萬里而扶摇六月而息其遠邇高下雖殊方其息自適之情則一也朕之命新兹寺亦欲登是山者咸有自適之樂焉爾東臺望海寺碑周官職方氏掌天下之圖辨九州之國州表一山以為鎭躋其巓可以望海者則揚之㑹稽兗之岱青之沂幽之醫無閭凡四山焉惟岱距海較遠登日觀望扶桑其岧嶤峻極尤非他山可比也五臺隷幷州州境無海而臺之東峰以望海名蓋雲中上黨晉地踞天下之脊山之麓旣高而臺之高復三十餘里龍泉以東岡巒陵阜皆處其下遠瞰滄瀛諸州景光惝恍儼若紫瀾浩淼與青顥之氣混涵相接記稱旭日方升望大海若陂澤信有以哉臺有寺榱棟桯桷不蔽風雨朕省方登此命加修葺復其初制蓮臺法相固極莊嚴已四方之人得於焉信宿縱睇溟渤之朝暾以視夫岱宗日觀又何多讓耶遂礱片石文以紀之聖祖仁皇帝御製文集巻二十二
