body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷二十三碑南臺普濟寺碑南臺世傳文殊示現之處也臺當山之陽地稍暄暖金蕖日菊佛鉢之花生遍崖谷若錦繡之相錯故其峰曰錦繡之峰峰有寺曰普濟蓋宋所建云佛氏之教息心淨業以獨善其身而文殊所願在饒益衆生布施以廣仁義持戒以守信忍辱以為謙精進以施敬禪定以守靜智慧以通理其慈惠之心有獨𢎞者自漢以來清凉之山代有精舍至宋之十寺為國祝釐恆賜詔褒答載籍傳之所從來久矣山之僧棲巖飲澗以自甘惟守其師之說以獨善其身寺有圮者力不能興葺也朕登南臺乃命復新普濟寺以居僧徒之息心淨業者俾祝釐於是登臨者覩象教之精嚴慈惠之心可以油然而生矣西臺法雷寺碑朕聞鷲嶺蜂臺不少水晶之域鵠林鹿苑恆開金粟之園莫不獻露裛之千花蔭春浮之雙樹乃有龍湫抱鉢偕猿鶴以高栖燕子成龕捫藤蘿而直上况夫竺法蘭之初地舊是花宫勾龍爽之畫圖羣推紫府緗蓮照野智炬長然青豆開房精廬用結西臺絶頂有法雷寺焉方廣化城文殊密宇琉璃布地霄鄰挂月之峰栲栳名山磴轉千雲之石仙人五百青髻曾遊沙界三千玉毫盡撤指修蛇之負壑恆嶽匪遙數歸雁之銜蘆并門在下朕對清凉之勝景招閶闔之長風北瞻則畢月昴車西顧則參旗井鉞憫此伽藍久廢飭其瓴甋重新紺馬銖衣長轉相輪於雲表桐魚茶版仍流清響於山椒庶使龍象行時金閣逺符大厯狻猊坐處神光復現元和云爾北臺靈應寺碑清凉山左鄰恆嶽右接天池環基五百餘里五峰竦峙而北臺為最高歲癸亥二月朕鑾輅西巡登其層巘雲氣生舄履之下開合萬變時春雪方霽青霄敻絶天風颯然所謂身歷清靜之域目睇澄鮮之境心遊太古之地盈縮造化吐納皓氣冷然善也臺名叶斗峰舊有靈應寺丹青虧剝杗廇欹傾朕念衣緇之流不外仁義以為教故熙隆之代亦所不廢矧曼殊化宇恆著感通逺邇之人蘄嚮久矣爰命崇其陛戺飾其題楶土木瓦石丹堊金碧之需財自內出不涉經費工以傭給役弗違農是以工敏於事而民若不知秋八月告落成焉董事之臣請製文勒石以志之用以上昭景福於慈闈下廣嘉惠於兆庶埀示於億萬斯年爾賜江南江西總督于成龍墓碑朕讀周官六計斃吏曰廉善亷能廉敬廉正廉法廉辨吏道厥惟廉重哉朕用是審觀臣僚有真能廉者則委以重寄錫以殊恩所以示人臣之標準也爾于成龍秉心朴直蒞事忠勤而考其生平廉為尤著以故纍加特擢皆朕親裁蓋拔自庶官之中洊授節鉞之任爾能堅守夙操無間初終古人脫粟布被或者嫌於矯僞爾所謂廉本於至誠聞爾之風可以興起乃不憖遺忽焉奄逝日者省方察吏南及江表采風謡於草野見道路之謳思清德在人於今不泯惟爾之廉天下所知朕俯合輿情載褒徑節既考名副實諡曰清端葬祭以禮又晉之崇秩賜豫有加恩恤爾子嗚呼人臣行已服官事主之道爾可謂有始有卒者矣顧不可以風世也歟至聖先師孔子廟碑朕惟道原於天𢎞之者聖自庖犧氏觀圖畫象闡乾坤之祕堯舜理析危微厥中允執禹親受其傳湯與文武周公遞承其統靡不奉若天道建極綏猷敻乎尚矣孔子生周之季韋布以老非若伏羲堯舜之聖焉而帝禹湯文武之聖焉而王周公之聖焉而相也巋然以師道作則與及門賢哲紹明絶業教思所及陶成萬世伏羲堯舜禹湯文武周公之統惟孔子繼續而光大之矣間嘗誦習詩書之所刪述大易之所演繫春秋之所筆削禮樂之所修明本末一貫根柢萬有殆與覆載合其德日月竝其明四時寒暑協其序焉故曰仲尼之道一天道也朕敬法至聖景仰宫牆嚮往之誠弗釋寤寐歲甲子十有一月時邁東魯躬詣曲阜展修祀事復謁聖墓循撫松栝儀型在望僾乎至德之親人也朕忝作君啓牖下民深惟夫子師道所建百王治理備焉舍是而圖郅隆曷所依據哉因勒文於石彰朕尊崇聖教以承天治民之意系以辭曰遐哉三五維辟之式於皇尼山師道允植天畀木鐸覺彼羣生百行以正六籍以明賢邁唐虞聖則河洛綏和動來文博禮約性天峻極倫教孔彰學昌洙泗統歸素王炎漢崇儒少牢用饗厥後賢君高山是仰豫懷至聖蒞彼東方音徽云邈道德彌光鬱鬱塋林峨峨祠殿企慕安窮羮牆如見泰岱匪高東海匪深敬揚懿軌終古式欽孟子廟碑自王迹熄於春秋聖人之道或幾於泯滅卒之晦而復明歷千百世而不敝者恃有孔子也孔子沒百有餘年寖假及於戰國楊墨塞路禍尤烈於曩時子輿氏起而闢之於是天下之人始知誦法孔子率由仁義斯道之有傳至於今賴之是以後世學者如韓愈蘇軾之徒咸推其功以配大禹而閩洛之儒咸尊為正學之宗傳烏呼盛已夫洪水之禍止於人身已爾楊墨之禍隱然直中於人心不有孟子使楊墨濫觴於前釋老推波於後後之人雖欲從千載之下探尼山之遺緒其孰從而求之因推述厥義刻文於石俾揭於鄒之廟其文曰尼聖既往敻矣音徽後百餘歲聖緒寖微尚異實繁楊墨競煽陷溺之禍酷於昏墊惟子輿氏距跛放淫以承先聖以正人心述舜稱堯私淑孔子正學修明百世以俟不有是者斯道孰傳宇宙晦霿萬物狂傎我讀其書曰仁曰義遺澤未湮聞風可企嶽嶽亞聖巖巖泰山功邁禹稷德參孔顏刻石兹文於祠之下誦烈揚休用告來者聖祖仁皇帝御製文集卷二十三
