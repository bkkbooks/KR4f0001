body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十一目録古今體詩五十二首元旦上元覽貞觀政要慈寜宫問太皇太后安月昭仁殿春夜賜舊時講學賜撫逺大將軍圖海二首春日夜半琴晩春遊幸感懷河白洋湖船獵水村鄚州河道喜雨賜寜古塔將軍巴海詩幷序橋望郊外即事郊外偶作馬上口占複道口占夏日登景山同翰林張英髙士竒作夜靜讀書内廐閲馬夏日同大學士明珠暨諸侍衛過黒龍潭途中作黒龍潭由廣泉寺至臥佛寺山寺晩景詠臥佛寺古樹駐蹕碧雲寺碧雲寺臨泉望月碧雲曉起再賦碧雲曉景洪光寺盤道来青軒臨眺二首法海寺瞻皇考御書敬佛二字坐法海寺偶吟賜聖感寺僧海岫駐蹕石景山石景山東望登戒壇下戒壇將至潭柘馬上同髙士竒聯句二首潭柘寺偶作詠潭柘寺竹石景山望渾河
