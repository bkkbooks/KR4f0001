body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三敕諭諭户部朕惟自古帝王統一寰區懋先德化必子惠黎元勤求民瘼俾幹止寧成家給人足而後世躋雍熙治登上理朕御極以來宵旰圖治未敢即安念切民依思培邦本雖編氓漸得遂生而閭閻正資惠養欲使羣生樂利比户豐盈惟頻行減賦蠲租庶萬姓得沾實惠前此用兵以來河南湖北兩省民人轉輸供億勞費繁多特沛仁恩以昭軫恤所有康熙二十五年應徴地丁各項錢糧著與蠲免一半其康熙二十四年未完地丁錢糧亦著盡與豁除又直𨽻獻縣河間縣河間衛江南宿遷縣興化縣邳州髙郵州鹽城縣山東郯城縣魚臺縣地方今年重罹水災小民艱苦亦應加恩軫恤所有康熙二十四年下半年二十五年上半年地丁各項錢糧俱與豁免爾部速行該地方官通行曉諭務使人人均被恩膏以副朕愛育蒼生至意如有不肖有司官役借端朦混反私行重征者該督撫指名題參從重治罪如該督撫徇隱不行糾舉或經參奏或被告發定行一併從重治罪爾部即遵諭行特諭康熙二十四年十一月初四日諭大學士明珠王等皆用紫韁乘騎或以紫韁濫給微賤之人乘用又其甚者遂至給與外省官員商賈等輩不待敝壞而更新騎用者至多大悖儀典良由未經定例以至於是王等既束用金黃帶若騎用金黃韁則不得妄給微賤而等威辨矣其下宗人府禮部會同定例議奏康熙二十四年十一月十八日諭內閣觀所賞琉球等外國恩賚之物甚菲於厚往薄來之道尚未允協爾衙門會同禮部察頒錫外國之例酌量增益所賞儀物確議以聞康熙二十四年十一月二十日諭大學士勒德洪明珠王熙吳正治宋德宜學士麻爾圖牛鈕禪布吳興祖王起元徐乾學韓菼嗣後凡擬上傳諭旨如遐方底定海宇升平等誇大言詞毋得撰寫康熙二十四年十一月二十九日諭大學士勒德洪明珠王熙吳正治宋德宜學士麻爾圖牛鈕禪布吳興祖王起元徐乾學韓菼今月朔日食十六日月食且比日積隂無雪朕思天象稍有愆違即當警戒修省或施行政事有未當歟或下有寃抑未得伸歟爾等傳諭九卿詹事科道詳議以聞康熙二十四年十一月二十九日諭大學士勒德洪學士麻爾圖日者大兵往征俄羅斯破雅克薩城釋俄羅斯不誅赦之使生還其時不並取泥卜楚地者蓋以泥卜楚地畫為疆索使俄羅斯不得越泥卜楚界界外聼其捕牲也今薩布蘇等奏言俄羅斯復來城雅克薩地今當即往征而滅之耶抑或緩之以待黑龍江墨爾根地將士移家定然後進兵為宜耶令議政王貝勒大臣及與俄羅斯之役彭春佟保班逹彌善郎談同爾等會議以聞康熙二十五年正月十九日諭户部國家設關𣙜稅原以阜財利用恤商裕民必征輸無弊出入有經庶百物流通民生饒給近來各關差官不恪遵定例任意徴收官役通同恣行苛虐托言辧銅價值浮多四季解册需費將商人親填部册改換塗飾既已充肥私橐更圖溢額議敘重困商民無裨國計種種情弊莫可究詰朕思商民皆吾赤子何忍使之苦纍今欲除害去弊正須易轍改絃所有現行例收稅溢額即升加級紀録應行停止其採辦銅斤定價既已不敷作何酌議增加其四季達部册籍應俟差滿一次彚報嗣後務令各差潔己奉公實心釐剔以副朕體下恤商至意如或仍前濫征侵隱藐玩不悛作何加等治罪至銅價既議加給稅額應否量增俱著九卿詹事科道詳議具奏特諭康熙二十五年二月十四日諭政治典訓總裁大學士勒德洪明珠王熙吳正治宋德宜户部尚書余國柱左都御史陳廷敬朕纘承丕基孜孜圖治宵旰兢業二十五年於兹賴天之靈宗廟之福蠢爾小醜以次削平眷念吾民雖甫休息而閭井未盡安樂風俗未臻淳古永惟治忽所繫實在朕躬日不遑寧勤求至道行一政惟恐或戾舊章發一言惟恐未孚衆志朕心乾惕常用歉然乃臣僚援古時政日歷及前朝寶訓體例請將歷年政令編輯成書朕未之許在廷諸臣合詞奏懇至再因思古之帝王建極陳常言期可法行期可則裒其政事著為一編用以式訓臣民昭兹來許厥有故事方䇿具存兹特允所請定名曰政治典訓命卿為總裁官其董率在館諸臣恪勤乃事以時綴録惟質毋飾惟核毋浮豈徒云徵諸庶民質諸百世朕夙寢晨興思艱圖易萬幾在御日慎一日藉用自考以比古者省嵗之意庶幾茂登上理久道化成卿其勉之欽哉康熙二十五年二月二十二日諭吏兵二部我國家掃除逆孽平定遐荒即負山阻箐之苖民咸輸誠而供賦封疆大吏自宜宣布德義動其畏懷俾習俗漸馴無相侵害庶治化孚於逺邇近雲貴廣西四川湖廣等處地方督撫提鎮各官不惟不善加撫綏更爾恣行苛虐利其土産珍竒資藏饒裕輒圖入已悉索未遂因之啓釁職為厲階蠢爾有苖激成抗拒即擅殺一二謊稱纍百盈千始黷貨以生端既邀功而逞志藐玩因循殊負委任朕思土司苖蠻授官輸賦悉歸王化有何􅑾杌互相格鬬無有寧居嗣後作何立法務令該地方督撫提鎮等官洗心易慮痛改前轍推示誠信化導安輯各循土俗樂業遂生亦令苖民恪遵約束不致侵擾內地居民以副朕撫馭遐方至意著九卿詹事科道會同逐一詳議具奏特諭康熙二十五年二月二十三日諭禮部自古帝王懋建元良務先豫教所以漸摩性習陶淑中和正大本而貞萬邦所關甚重朕於宫中諭教皇太子諄諄以典學時敏勤加提命日習經書朕務令背誦復親為講解夙興宵寐未嘗間輟今皇太子於四書尚書略能成誦亦粗覆講但思大法大經古訓甚備制心制事義藴無窮必益加以研究討論就將罔懈庶幾德業馴至大成今文華殿工已經告竣所有出閣應行典禮爾部會同詹事府詳察確議擇吉具儀來奏特諭康熙二十五年二月二十七日諭大學士勒德洪明珠王熙吳正治宋德宜學士吳興祖王起元徐乾學韓菼各省晴雨不必繕寫黃册特本具奏乘奏事之便寫細字摺子附於疏內以聞其下禮部康熙二十五年三月初三日諭刑部等衙門刑法者專以禁戢凶暴若豪強姦慝固難姑宥其貧賤愚昧者略施寬貸亦未嘗不可耳康熙二十五年三月十六日諭吏部自古帝王諭教太子必簡和平謹恪之臣統領宫僚專資贊導江寧巡撫湯斌在講筵時素行勤慎朕所稔知及簡任巡撫以來潔已率屬實心任事允宜拔擢大用風示有位特授為禮部尚書管詹事府事現任詹事郭棻少詹盧琦歸允肅著照舊留任詹事朱瑪泰著對品調用少詹喇巴色度著解任照伊原品隨旗上朝爾部即遵諭行特諭康熙二十五年三月二十日諭吏兵二部封疆文武大吏當用兵征剿時固在智勇兼優亦重清廉律己原任鑾儀衛鑾儀使趙良棟前值逆賊盤踞漢中首先倡率入川於漢中成都等處效力剿賊勞績昭著復領兵直抵雲南攻克省城之後獨能恪守法紀廉潔自持深為可嘉今以衰老解任著復其勇略將軍兵部尚書兼都察院右副都御史總督原銜以示眷注之意爾二部即遵諭行特諭康熙二十五年四月初六日諭禮部翰林院自古帝王致治隆文典籍具備猶必博採遺書用充袐府蓋以廣見聞而資掌故甚盛事也朕留心藝文晨夕披覽雖內府書籍篇目粗陳而裒集未備因思通都大邑應有藏編野乘名山豈無善本今宜廣為訪輯凡經史子集除尋常刻本其有藏書袐録作何給值採集及借本抄寫事宜爾部院會同詳議具奏務令搜羅罔佚以副朕稽古崇文之至意特諭康熙二十五年四月初十日諭吏部殫心效職者臣子之常經晉爵酬庸者朝廷之大典兹太祖髙皇帝實録告成克昭一代之典章永垂萬世之模範其監修總裁等官著有勤勞宜加寵錫監修總裁官禮部尚書武英殿大學士覺羅勒德洪著加太子太傅總裁官太子太傅禮部尚書武英殿大學士加一級明珠著加太子太師禮部尚書保和殿大學士加三級王熙禮部尚書武英殿大學士加一級吳正治吏部尚書文華殿大學士加一級宋德宜俱著加太子太傅爾部即遵諭行特諭康熙二十五年四月十八日諭吏部國家選用臣工必得才學通敏之人畀以職任斯能庶官無曠實得用人之益朕見漢軍官員起家多由捐納從事學問者少年未成材便涉仕版並無素抱何以蒞事臨民去年特行考試分别去留又將交白卷人員從寬姑免處分令其學習俟通曉文義該部題明考試録用朕因從前考較情弊多端今特行親試荒陋不堪者甚衆朕不加搜察私藏懷挾自行發露者已交刑部拿問外其考列一等髙璜等及二三四等人員現任者仍舊供職候補者照常補用王撫民等文理不通及書寫履歷投交白卷者俱著以原品隨旗行走其去年著令學習之人今仍交白卷及考置五等者顯圖僥幸著察議具奏王梁居官有聲仍準候補難蔭生馬世永王琨王鎬胡枚念伊父盡節可憫馬世永等著令學習俟通曉文義之日該部題請録用胡枚交與該管衙門另行請旨程萬坦曾效力行間著以旗內武職補用爾部即遵諭行特諭康熙二十五年四月二十三日諭內閣人君豫教太子令出閣讀書原期於朝夕無間洞徹書史實有益於身心實有禆於治道本不在繁文縟節也儻徒事虛文日習威儀奚暇究心實學况情之最親者莫如父子父子主恩出自天性禮節繁多則父子之間反或疏逺歷觀前代往往有之至若明季東宫出閣每另設官屬旅進旅退無非具文並未篤志黽勉以求實學遂令太子不能通貫經史以致庸暗諸臣且因便乘間欺隱蒙蔽肆其詭譎離間父子止圖自利身家此皆專騖虛文不求實學之故積弊多端不可勝言朕思東宫官屬總屬朝廷臣子寧有異耶即如嵗時令節百官另進太子箋文等禮亦皆沿襲舊例以進箋及諸王大臣行禮為要務而於研究經史修治身心之道致有曠誤曾何裨益我朝令太子出閣讀書乃初次舉行當垂示永久遵循勿替關係最為巨要且皇太子宫殿尚未營建諸王大臣於何處行禮禮部所奏之疏爾等其詳議以聞康熙二十五年閏四月初六日諭刑部獄訟重情關係民命當讞鞫時雖經詳慎始定爰書今值天氣炎熱其中恐有情可末減者久繫囹圄或致瘐斃朕心不忍兹特遣科爾坤阿蘭泰董訥馬世濟等會同三法司將已結重案逐一詳加審鞫如有情可矜疑者即與察明事由開列具奏務期情法允協不致淹滯斃獄以副朕順時好生至意特諭康熙二十五年閏四月十八日諭大學士勒德洪明珠王熙吳正治宋德宜學士麻爾圖牛鈕禪布蔡必漢噶思泰朕聞鳯陽徐州等處地方亢旱人民困苦學士麻爾圖率户部賢能司官一人馳驛速往詳明據實踏看果民食維艱窘於生計速發鳳陽倉銀米一面賑濟一面奏聞其賑給事宜麻爾圖會同户部議以聞康熙二十五年閏四月二十二日聖祖仁皇帝御製文第二集卷三
