body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷十敕諭諭各路將軍策妄阿喇布坦甚是姦詐之人知我兵在巴爾庫爾阿爾泰處看守嚴密周詳伊算計從噶斯大張聲勢前來掃除青海欲取西邉亦未可料著西安將軍總督額倫特郎中常壽率領西安滿漢大兵並西寧之兵在西寧預備并率領四川松潘大兵凖備若策妄阿喇布坦從噶斯路來欲掃青海以取西邉著將西寧所備大兵與青海之左翼台吉等一同行事提督康泰率領四川大兵與右翼台吉等一同行事至布龍格爾地方既俱通噶斯巴爾庫爾路徑著尚書富寧安將就近大兵酌量派出發往布龍格爾預備杭靄地方領兵之祁里德並巴爾庫爾之將軍雅木布等著在哨塘處小心嚴謹看守再派精細人逺逺眺望追蹤前去若策妄阿喇布坦潛來即行領兵征剿康熙五十五年十一月十三日諭大學士九卿蘇州船厰每年造船多至千餘出洋貿易回來者不過十之五六其餘皆賣在海外賫銀而歸海船桅木龍骨皆中國所産海外無此大木故啇人射利偷賣若行查訊彼但揑稱遭風打壞而已海外如吕宋噶囉吧等口岸多聚集漢人此即海賊之根也如張伯行啓奏江浙間米俱出海口去賣等語貿易人等米糧酌量足敷口食不應擕帶太多海中東洋可使貿易南洋商船不可令往如紅毛等國之船惟聽其自來耳若出南洋必從南澳海壇鎮經過此處如截住不放豈能即過耶又沿海炮臺足資防守明代即已有之應令各地方設立往年差往福建運米廣東所雇民船三四百隻合計便數千人此數千人聚集海上須為長久之䇿即臺灣人時與吕宋等處相通皆須預為措置凡福建廣東及江南浙江等沿海地方有人在京師者爾等可加詳詢今國家承平日久須要安不忘危也康熙五十五年十一月二十一日諭戶部朕御極以來念切民生時勤宵旰凡巡歷所至必以編氓疾苦備悉咨詢蓋欲比戶之蓋藏恆裕三時之水旱無虞斯民氣和樂聿成豐亨豫大之休也頃者朕巡行口外經過三河等州縣暨永平府交界地方見今歲秋成豐稔米價稱平惟是去年雨水過溢田畝間被淹沒朕深加軫惜蠲賦平糶轉漕分賑貧民使不致失所今者雖復有秋然僅足支一歲之用恐來年之輸將尚多難繼是必再沛恩膏始可大培民力著將順天永平兩府所屬大興宛平通州三河密雲薊州遵化順義懷柔昌平寶坻平谷豐潤玉田良鄉涿州武清永清香河霸州大城文安固安東安房山保定延慶梁城盧龍遷安樂亭灤州撫寧昌黎山海等州縣衛所康熙五十六年地丁銀二十六萬四千三百三十六兩零米豆髙糧二萬一千六百四十六石零草九萬四千九百五十束零俱通行蠲免所有歷年積欠銀九萬三百九十六兩零米豆髙糧一萬六千二百七十五石零草八萬四千四百七十束零亦并與豁除爾部行文該督嚴飭所屬實心奉行俾遐村窮谷均霑德意倘有不肖有司借端朦混私行征收者察出定行從重治罪爾部即遵諭行特諭康熙五十五年十二月二十六日諭學士星俄特常鼐郎中三寶吳碩色鄂啓卿齊布員外郎吳黑逹賴爾等俱出過江南海差海船一年造多少應令報明監督於出洋時將從前報過造船人名與船隻字號逐一查對方不致隱匿船數一明於錢糧及地方均有禆益第如此查驗商船或致稀少然船少於貿易亦更有利也凡大船指稱貿易領票出洋每另泊一處用小船於各處偷買米石載入大船不知運往何所乍浦地方有堤一應貨物必於此遞運其餘各口皆小大船不能出入惟上海崇明等口甚屬緊要現今九卿為防海事宜會議爾等將此諭傳示九卿康熙五十六年正月初十日諭戶部陳璸奏稱將巡撫衙門公用銀兩撥充餉銀曽諭以督撫等將此項銀兩充餉具奏者朕俱批知道了並未準其撥充緣此項係伊等應用之銀並非正項錢糧若撥充餉嗣後不肖之徒必將此項銀兩充餉為正項此外又行侵蝕索取諭旨甚明且此項銀兩滿保亦曽在朕前陳奏凡係動用正項錢糧例應奏銷此並非正項陳璸將伊等所用銀兩數目瑣屑具題殊屬不合其嚴飭之康熙五十六年三月十一日諭大學士學士九卿詹事科道等記注官陳璋於今年三月內查閲檔案抄朕去年十二月所諭江南錢糧之旨與趙熊詔伊等皆屬有心特以朕於去年曽諭江南舊欠錢糧應行蠲免今年未行蠲免意欲將朕前後互異之處指出書寫耳去年赫壽請頒特恩蠲免前項錢糧摺奏朕批令繕本具題及繕本具題後朕知赫壽受人囑託又彼此私同商定具題欺朕且以西邉正值軍需之時故舊欠未準蠲免照依部議分年帶徵朕御極以來蠲免天下錢糧數千萬兩豈有惜此些微舊欠之理江南官員衆多赫壽惟欲沽取善譽於官而民殊不感戴聲名甚劣朕於事無不經歷人亦焉能欺朕朕豈肯以大權授人乎若不將此故曉諭諸臣爾等必謂朕前後諭旨不符所係非輕且漢人著作文集內有將未題之稿云欲行具奏以事已完結未獲具奏等語似此並未入告者尚且書寫况其他乎起居注衙門記注諭旨原為敬慎起見然自古未有久逺設立者亦有旋立旋止者皆由所記不實故耳記注官所記諭旨朕從不檢閲交與大學士等校看大學士等事務繁多亦無暇細校又或以師生同年瞻顧情面恐致讐怨即有錯謬之處亦不指出殊不知記注諭旨雖一字皆有關係朕聼政之日記注官入侍伊等局蹐無措豈能備記諭旨詳悉紀載耶侍班漢官歸寓後將朕諭旨纂寫數日方擕至署與滿官校看又每爭競是非由此觀之將朕諭旨多遺漏舛訛可知惟朕硃書諭旨及批本發科之旨始為真確耳其起居注所記難於憑信也再或有大臣所辦之事功則歸已過則諉之年老糊塗為人臣者在官一日當盡一日之心安可以年老糊塗推諉耶今國家大臣俱係年髙髮白之人朕亦與爾諸臣相等孟子云責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊書云一日二日萬幾天工人其代之今爾等以年老糊塗推諉教朕朕果若爾等亦以為年老糊塗或致料理失宜諸臣其能堪此乎康熙五十六年三月十六日諭吏部趙申喬從前奏稱鉛斤壞爛今又云鉛斤壞爛之處原非確有實見諉稱年老衰邁所致鉛斤之不壞天下通知趙申喬自幼讀書身登進士歷升尚書今年逾七旬無書不覽鉛斤壞爛之處見於何書趙申喬於所辦之事功則歸已過則諉之年老衰邁為人臣者在官一日當盡一日之心若盡諉之衰老可以糊塗了事國家事務作何處置耶且於緊要事情並不留心稽核錢糧出入漫無覺察惟於一二兩之細務膠執已見刻意苛求以鉛斤壞爛等語率意瀆奏殊屬不合該部察議具奏康熙五十六年三月二十七日諭大學士九卿倉內米石甚多著分運直𨽻各府州縣存貯預備於民甚有禆益每府或貯萬石每州縣或貯數千石附近通州河道者交與倉場總督等運送其餘府州縣所運米石速行文直𨽻總督派地方官乘未雨之先挽運值此青黃不接之時於各府州縣平糶亦大有益於百姓其江南浙江如有應行截留漕糧將截留若干之處爾等一併速議具奏康熙五十六年四月十一日諭大學士馬齊理藩院尚書赫壽等本朝從各處捕獵帶來皮抄並販賣皮抄等物甚多如今市上所有因出賣不完還被蟲傷鄂羅斯如何勒令我貿易人等置買本朝最大不似爾等鄂羅斯國視為罕物無處可賣亦無官買之處今若照伊所請賖給彼時若不得銀爾等又向部院監督嘵嘵即使貿易人等賖去亦必將物販賣始能償還似此有不致曠日遲久者乎且此處皮抄之物既多自後必隔數年再來貿易方有置買之人若不時頻來此貿易人等之貨物尚且不能賣完豈能買爾等之物耶爾等乘此時在邉境地方貿易甚善應即定奪方是將此情由告之并行文噶噶林處俾令知道伊有何言問明議奏康熙五十六年四月十二日諭九卿倉厫陳米甚多若年久不發徒致浥爛著於八旗三季放米之時除應領正數外將此四百三十餘萬石之陳米酌量格外賞給官兵兩年間可以全完如此不但陳米可清倉厫得空而官兵亦有禆益矣爾等會議具奏康熙五十六年四月十六日諭大學士馬齊松柱蕭永藻王掞等今日覽刑部所奏遵旨審問孟光祖口供摺內有架鷹牽犬往各省去的侍衛太監等語由此觀之各省肆行詐騙之人甚多若論放鷹應在口外豈有差往南省之理前差李秉中等畫輿圖俱給有慿據又行文督撫令其知悉况徐元夢見在前曽賞賜書籍俱有憑據朕差遣官員如此嚴密而于來鳯一案刑部尚且疑為朕所差遣之人審理時兩相瞻顧此皆督撫猶豫不奏餽送盤纒但圖苟且令其出境故至如此之極光天化日之下容此魑魅魍魎任意橫行如果王子阿哥差人賞賜外省大臣官員衣服等物理應將差人留住叩稟王子阿哥等如果採買物件亦應將差去之人留住一面將情由聲明各該管王等併將所賞物件呈送則真偽立辨矣不應令差人逰蕩各省以壞各該管王之聲名且如朕凡有恩賜即將送去之人所賞之人俱登記檔案公來喜向太監鄒海要求取御用紅京米鄒海因不能得在街市採買誆哄來喜送去此事發覺已將鄒海正法朕稽察之嚴如此見今拏獲孟光祖在各省指稱阿哥名色誆騙行走殊屬可惡雖凌遲處死不足以蔽其辜將審出之處理宜行文各省通行曉諭巡撫年羹堯曽餽送過騾匹銀兩佟國勷亦餽送過銀兩縀匹將此等俱隱匿未奏著明白回奏此逃人在各處誆騙數年並無一人奏聞若趙宏燮不奏朕尚不得洞悉此事若不發覺外省漢人即認作實事編書注記誣枉之事尚有甚於此者耶爾等會同九卿議奏康熙五十六年四月十九日聖祖仁皇帝御製文第四集卷十
