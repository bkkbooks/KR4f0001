body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷二十二序詠物詩選序昔者子夏序詩謂正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗若是乎詩之道大矣哉而周公纘述唐虞宗翼文武制禮以導天下著爾雅一篇後之序之者謂爾雅所以通詁訓之指歸敘詩人之興詠疏之者曰爾雅所釋遍解六經而獨云敘詩人之興詠者以爾雅之作多為釋詩是則一物多名片言殊訓凡以蟲魚草木之微發揮天地萬物之理而六義四始之道由是以明焉故夫詩者極其至足以通天地類萬物而不越乎蟲魚草木之微詩之詠物自三百篇而已然矣孔子曰邇之事父逺之事君多識於鳥獸草木之名夫事父事君忠孝大節也鳥獸草木至微也吾夫子並舉而極言之然則詩之道其稱名也小其取類也大即一物之情而關乎忠孝之旨繼自騷賦以來未之有易也此昔人詠物之詩所由作也歟朕自經帷進御覃精六籍至於燕暇未嘗廢書於詩之道時盡心焉爰自古昔逸詩漢魏六朝洎夫有唐訖於宋元明之作博觀耽味搴其蕭稂掇其菁英命大學士陳廷敬尚書王鴻緒校理之翰林蔡升元楊瑄陳元龍查升陳壯履勵廷儀張廷玉錢名世汪灝查慎行蔣廷錫編録之名曰佩文齋詠物詩選蓋搜采既多義類咸備又不僅如向者所云蟲魚鳥獸草木之屬而已也若天經地志人事之可以物名者罔弗列焉於是鏤版行世與天下學文之士共之將使之由名物度數之中求合乎溫柔敦厚之指充詩之量如卜商氏之所言而不負古聖諄復詁訓之心其於詩教有裨益也夫康熙四十五年六月二十一日歷代題畫詩類序粵考有虞氏施采作繪而繪事以起周禮冬官爰有設色之工典畫繢之職傳所稱火龍黼黻昭其文三辰旗旗昭其明者是也至漢世圖寫功臣用示褒異則又人物之肖象粲然著見於史册者矣嗣是工繪事者日衆自天文地輿鳥獸草木以及宫室器用與一切登臨逰覽之勝皆假圖畫以傳於世晉宋而後莫盛於唐五代迄宋作者輩出金元明間亦代有聞人方其詣精入理足以體隂陽含飛動為稽古博物者之所取證不僅以丹青擅長而已而能摉抉其義藴發攄其旨趣者則尤藉有題畫之詩歷代各體題詠以萬計散置諸集無所統紀翰林陳邦彥裒輯彚鈔得八千九百餘首分為三十類編次一百有二十卷繕夲呈覽朕嘉其用意之勤命授工鋟梓兹刋成裝潢來上萬幾餘暇時一披閲凡兩間之名象庶類之棼錯無不該載於中且不踰几席而得流觀山川險易之形近在目前而可考鏡往代留遺之迹以至農耕蠶織纖悉具陳雞犬桑麻宛然如覩庶幾於昔人豳風無逸之圖有互相發明者焉夫圖繪藝事也而近於道題畫詩之一類也而通於治杜甫詩謂繪事功殊絶幽襟興激昂讀是編者可以觸類而知所務矣爰製序題於卷端以識始末云康熙四十六年四月十六日歷代詩餘選序詩餘之作蓋自昔樂府之遺音而後人之審聲選調所由以緣起也而要皆昉於詩則其夲末源流之故有可言者古帝舜之命夔典樂曰詩言志歌永言聲依永律和聲可見唐虞時即有詩而詩必諧於聲是近代倚聲之詞其理固已寓焉降而殷周孔子刪而為三百五篇樂正而雅頌得所考其時郊廟明堂升歌宴饗以及鄉飲報賽莫不有詩以叶於笙簫琴瑟之間自詩變為騷騷衍為賦雖旨兼出乎六義而聲弗拘於八音至漢而郊祀房中鐃歌鼓吹琴曲雜詩皆領於樂官于是始有樂府名迄於六代操觚之家按調屬題徴辭赴節日趨婉麗以導宫商唐興古詩而外創為近體而五七言絶句或傳於伶人顧他詩不盡協於樂部其間如李白之清平調憶秦娥菩薩鬘劉禹錫之浪淘沙竹枝詞洎溫庭筠韋莊之徒相繼有作而新聲迭出時皆被諸管弦是詩之流而為詞已權輿於唐矣宋初其風漸廣至周邦彥領大晟樂府比切聲調篇目頗繁栁永復增置之詞遂有専家一時綺製可謂極盛雖體殊樂府而句櫛字比廉肉節奏不爽寸黍其於古者依永和聲之道洵有合也然則詞亦何可廢歟朕萬幾清暇博綜典籍於經史諸書有關政教而裨益身心者良已纂輯無遺因流覽風雅廣識名物欲極賦學之全而有賦彚欲萃詩學之富而有全唐詩刋夲宋金元明四代詩選更以詞者繼響夫詩者也乃命詞臣輯其風華典麗悉歸於正者為若干卷而朕親裁定焉夫詩之揚厲功德鋪陳政事固無論矣至於桑中蔓草諸什而孔子以一言蔽之曰思無邪蓋蕙茝可以比賢者嚶鳴可以喻友生苟讀其詞而引伸之觸類之範其軼志砥厥貞心則是編之含英咀華敲金戞玉者何在不可以思無邪之一言該之也若夫一唱三歎譜入絲竹清濁高下無相奪倫殆宇宙之元音具是推此而沿流討源由詞以溯之詩由詩以溯之樂即簫韶九成其亦不外於夲人心以求自然之聲也夫康熙四十六年七月十二日書畫譜序書者六藝之一昔栁公權言心正則筆正程子謂作字須敬即此是學蓋以紀事載言行之天下垂之久逺書誠重矣夫書以傳其意而畫以肖其形事若不相侔其義有可連類而並論者焉蒼頡史皇以來歷代載籍多能道之而時數相推材智間出繁重者變而之簡易朴拙者漸而之巧麗亦天地自然之理也其初古文繼為篆隸而今之所謂真書行草三者實權輿於斯矣然三者皆肇興於漢逮夫魏晉去古未逺多見古人篆隸故鍾繇書有其遺法而王羲之踵美垂徽祧前啓後士林所稱以為歸極已若圖畫之事始自秦漢盛於六朝其間作者輩出曹衛顧陸擅能於前董展孫楊流聲於後隋有何鄭唐則閻吳大抵皆畫佛像人物下筆輒依故事逮氣韻之超極於潑墨寫生之精窮於沒骨而畫之變盡焉朕萬幾燕間披覽典册間臨書家名迹每觀前代紀録書畫諸書種類錯互漫無統紀遂即佩文齋所有者編葺之使各以類相從為一百卷凡書畫之源流古今工於此者之姓氏以至聞人之題跋歷代之鑒藏悉備考而慎其擇亦可謂詳且盡矣昔唐太宗好書親序王羲之傳自以為心慕手追而當時內府之圖籍亦號最盛迄於今日流傳者日逺日少晉唐已為隆古而况前此者乎然溯流者必窮其源習今日之書而不推夲於篆隸亦猶齊末之觀也故上自蒼頡史皇下暨近代皆列焉朕於書畫偶有題跋檢出數十則以為一卷從諸臣之請也要之尚稽曩昔用以攄適性情泳陶清暇附於古聖人遊藝之意並為世之嗜古者樹毫楮之標準𢎞考索之旨趣則牙籖萬卷之中是編其亦可以永傳也夫康熙四十七年二月廣羣芳譜序粵自神農氏嘗草辨榖民始知樹藝醫藥伊耆氏命羲和推步定厯以授時民始知耕穫之不愆而百工績熙偉哉開物成務啓牖來兹聖帝之功與天地並矣朕聽政之暇披閲典籍留意農桑繪耕織之圖製永言之什時巡所至親歷田間其稼穡之艱難作勞之辛苦既周知而洞悉矣每思究百昌生殖之理極萬變消長之情著為成編以佑吾民嘗謂爾雅具其名物而郭璞陸佃孫炎之流疏注埤翼又加詳焉其明備者莫如夲草自夲經以迄陶𢎞景蘇頌而下數十種凡採治之法無不該核他如齊民要術月令廣義諸書其蒔植之宜為更晰矣遐稽往牘擷其英華歸於簡括良匪易也比見近人所纂羣芳譜搜輯衆長義類可取但惜尚多踈漏因命儒臣即袐府藏帙攟托薈萃刪其支冗補其闕遺上原六經旁據子史洎夫稗官野乘之言才士之所歌吟田夫之所傳述皆著於篇而竒花瑞草之産於名山貢自逺徼絶塞為前代所未見聞者亦咸列焉復允廷臣之請益以朕所賦詠依類分載總一百卷命名曰佩文齋廣羣芳譜冠以天時尊嵗令也次榖次桑麻崇民事也次蔬茶果木花卉資厚生溥利用也終以藥物重民命也其諸天時蚤晚之候人事種溉之方地力彼此之殊物性良楛之異罔弗條舉縷析燦然可觀焉是書也攬品彚之蕃滋想羣生之率育一展卷間化機洋溢於兹畢呈固不惟矜淹洽侈藻麗也以是刋布天下垂之久逺使吾民優遊於農圃之中家室盈寧樂其業而不憚其勤而大夫士以及民之秀者因以區别物宜審其淑慝凛嗜好之常慎節宣之度於以躋仁夀而享泰平亦不為無所裨助也哉康熙四十七年五月初十日記水性記朕察各處水性之根原或根於土或根於沙或根於鹽或根於鹹或根於火焇或根於硫磺人之五臟六腑雖有六沴之所侵人且知之者多却不防因水性而成其患者愈難明也南北地殊川源藪澤輕清混濁之不同偶耳霧露雪霜山水暴漲即非水之夲性人所難略也所以朕南北各處最防水之輕重關於飲食故試之水二斤盛於銀器中坐於滚水之上將水耗乾或土或沙或鹽或鹹歷歷無不分眀終無奈何惟取氣酒之法用甑取其氣成水而後用之治水之法莫過於此不分南北不論藪澤即海水臭泥皆可以成甘露養生之要最為所關故援筆以記之黃船記黃船者並無別名似戰艦之尾故有將臺不施彩畫以朴是夲外堅內寬以便為足朕每視民瘼巡方水陸非舟即馬所以損益厥中並宜南北而後成之故屢臨淮黃問俗江浙偶遇波濤萬頃人心可駭之際凝然不動聲色者豈非舟之備於全乎古人有言家有千金坐不垂堂每覽書史輒感興歎擴而充之不止舟也治天下之道蓋亦如是先曽作操舟之説矣今復論及若非深識江淮河漢之經地則南北東西水性茫然矣不分山川朔漠之形勢則好尚土俗人情不明矣槩不可同語也舟乃細物非篙工楫師之良雖桂棹蘭槳不過虛設之物豈自為我用乎所以隨才器使人地相宜而不求全責備者正為此也故人能施技物皆應手預防備患乎先安然無虞於後雖狂風巨浪有何懼哉凡事豫則立不豫則廢者即聖人亦不外乎是况不及聖人乎朕每有動莫論巨細心得實見咨之於衆信之於已方敢行也一事一物未嘗草草疏忽亦不少違於理故船窗幾暇不揣無文援筆以作記避暑山莊記金山發脈暖溜分泉雲壑渟泓石潭青靄川廣草肥無傷田廬之害風清夏爽宜人調養之功自天地之生成歸造化之品彚朕數巡江干深知南方之秀麗兩幸秦隴益明西土之殫陳北過龍沙東逰長白山川之壯人物之朴亦不能盡述皆吾之所不取惟兹熱河道近神京往來無過兩日地闢荒野存心豈誤萬幾因而度髙平逺近之差開自然峰嵐之勢依松為齋則竅崖潤色引水在亭則榛煙出谷皆非人力之所能借芳甸而為助無刻桷丹楹之費喜泉林抱素之懷靜觀萬物俯察庶類文禽戲緑水而不避麀鹿映夕陽而成羣鳶飛魚躍從天性之髙下逺色紫氛開韶景之低昂一逰一豫罔非稼穡之休戚或旰或宵不忘經史之安危勸耕南畝望豐稔筐筥之盈茂止西成樂時若雨暘之慶此居避暑山莊之概也至於玩芝蘭則愛德行覩松竹則思貞操臨清流則貴廉潔覽蔓草則賤貪穢此亦古人因物而比興不可不知人君之奉取之於民不愛者即惑也故書之於記朝夕不改敬誠之在兹也聖祖仁皇帝御製文第三集卷二十二
