body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷二十四目録銘雕畫盤中果銘題跋題沈宗敬畫文欽若昊天厯象日月星辰敬授人時於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信事父母能竭其力事君能致其身溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之由文王至於孔子五百有餘嵗若太公望散冝生則見而知之若孔子則聞而知之烏鬚文頌景福宫頌寧夀宫頌
