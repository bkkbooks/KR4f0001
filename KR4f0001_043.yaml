body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷十九序性理大全序朕惟古昔聖王所以繼天立極而君師萬民者不徒在乎治法之明備而在乎心法道法之精微也執中之訓肇自唐虞帝王之學莫不由之言心則曰人心惟危道心惟微言性則曰若有恆性克綏厥猷惟后蓋天性同然之理人心固有之良萬善所從出焉本之以建皇極則為天德王道之純以牖下民則為一道同風之治欲修身而登上理舍斯道何由哉朕荷太祖太宗積纍之休纘承世祖章皇帝鴻業夙夜祇懼嘉與海內期登隆平每思二帝三王之治本於道二帝三王之道本於心辨析心性之理而羽翼六經發揮聖道者莫詳於有宋諸儒逮明永樂間命儒臣纂集性理大全一書朕常加翻閲見其窮天地陰陽之蘊明性命仁義之㫖揭主敬存誠之要微而律數之精意顯而道統之源流以至君德聖學政教紀綱靡不大小兼該而表裏咸貫洵道學之淵藪致治之凖繩也歲月既久版籍殘缺特命禮臣重加補訂以備觀覽爰製序於卷端朕方精思格言探討緒論以遐稽乎古帝王心法道法之微亦欲天下臣民究心兹編思降衷之理安物則之恆庶幾咸盡其性以復臻乎唐虞三代熙皥之治云爾文獻通考序朕惟治天下之道莫詳於經治天下之事莫備於史人主總攬萬幾考證得失則經以明道史以徵事二者相為表裏而後郅隆可期經史而外編纂之書不啻百家其溯委窮源足資化理而部分類别便於覽觀者莫善於宋儒馬端臨所輯文獻通考一書以古為鑒則取諸文以人為鑒則取諸獻一展卷間而上下千餘年貢賦之贏絀人才之進退規制之沿革禮樂之廢興輿圖之險易災祥之感召是非隆替瞭如指掌可以為考鏡之林稽古之助矣間嘗披覽史冊漢唐以降代有誼辟以彼更絃易轍鮮不各有張弛然而法立弊滋罕臻盡善豈非博綜往事曲協時宜之為難歟語曰有治人無治法又曰師古者師其意不師其跡今歷代之已事具在自唐虞以迄宋季中間因時適變義例棼如詳考事理之源流參以諸儒之論說雖神而明之存乎其人然率循舊章斟酌損益端於是書有藉焉流傳歲久版籍殘缺特命禮臣重加補訂俾成完書朕聽政之餘時勤乙覽爰製序於卷端以昭示海內凡我庶府諸司尚其共討舊聞與治同道庶稱朕表章之意也夫日講四書解義序朕惟天生聖賢作君作師萬世道統之傳即萬世治統之所繫也自堯舜禹湯文武之後而有孔子曾子子思孟子自易書詩禮春秋而外而有論語大學中庸孟子之書如日月之光昭於天嶽瀆之流峙於地猗歟盛哉蓋有四子而後二帝三王之道傳有四子之書而後五經之道備四子之書得五經之精意而為言者也孔子以生民未有之聖與列國君大夫及門弟子論政與學天德王道之全修己治人之要具在論語一書學庸皆孔子之傳而曾子子思獨得其宗明新止至善家國天下之所以齊治平也性教中和天地萬物之所以位育九經達道之所以行也至於孟子繼往聖而開來學闢邪說以正人心性善仁義之㫖著明於天下此聖賢訓辭詔後皆為萬世生民而作也道統在是治統亦在是矣歷代賢哲之君創業守成莫不尊崇表章講明斯道朕紹祖宗丕基孳孳求治留心問學命儒臣撰為講義務使闡發義理裨益政治同諸經史進講經歷寒暑罔敢間輟兹已告竣思與海內臣民共臻至治特命校刋用埀永久爰製序言辨之簡首每念厚風俗必先正人心正人心必先明學術誠因此編之大義究先聖之微言則以此為化民成俗之方用期夫一道同風之治庶幾進於唐虞三代文明之盛也夫日講書經解義序天生民而立之君非特豫以崇高富貴之具而已固將副教飬之責使四海九州無一夫不獲其所也是故古之帝王奉若天道建都樹屏以立其綱設官置吏以張其紀經天緯地以盡其才親親尊賢以𢎞其業黎民阻饑而為之教稼五品不遜而為之明倫為禮樂以導其中和為兵刑以息其爭訟事未然而預為之備患已至而亟為之驅蓋治天下之法見於虞夏商周之書其詳且密如此宜其克享天心而致時雍太和之效也所以然者蓋有心法以為治法之本焉所謂敬也誠也中也敬則神明有主而物欲不能搖誠則孚信在中而僞巧不能間中則公正無偏而邪說不能移凡書中曰欽明曰寅恭曰祇懼曰迪畏皆敬之屬也曰允塞曰至諴曰一德曰惇信皆誠之屬也曰義制事禮制心曰沉潛剛克高明柔克曰寬而有制從容以和皆中之屬也性之者為堯舜禹文身之者為湯武高宗困而學之者為太甲成王悖而去之者為太康桀紂嗚呼心法之存亡治道之升降分焉天命之去留繫焉曷其奈何弗鑒朕萬幾餘暇讀四代之書惕若恐懼爰命儒臣取漢宋以來諸家之說薈萃折衷著為講義一十三卷逐日進講兹特加鋟梓頒示臣民俾知朕仰法前代聖王志勤道遠然夙夜兢兢思體諸身心措諸政治以毋負上天立君之意夫豈敢一日忘哉是為序日講易經解義序朕惟帝王道法載在六經而極天人窮性命開物前民通變盡利則其理莫詳於易易之為書合四聖人立象設卦繫辭焉而廣大悉備自昔包犧神農黃帝堯舜王天下之道咸取諸此蓋詩書之文禮樂之具春秋之行事罔不於易㑹通焉漢班固有言六藝具五常之道而易為之原詎不信歟朕夙興夜寐惟日孜孜勤求治理思古帝王立政之要必本經學嘗博綜簡編玩索精蘊至於大易尤極研求特命儒臣參考諸儒注疏傳義撰為解義一十八卷日以進講反復卦爻之辭深探作易之㫖大抵造化功用不外陰陽而配諸人事則有貞邪淑慝之别運數所由盛衰風俗所由治亂君子小人所由進退消長鮮不於奇偶二畫屈伸變易之間見之若乃體諸躬行措諸事業有觀民設教之方有通德類情之用恐懼修省以治身思患豫防以維世引而伸之觸類而長之而治理備矣於是刋刻成書頒示天下朕惟體乾四德以容保兆民且期庶司百執事矢于野渙羣之公成拔茅允升之美則泰交嫓於明良而太和溢於宇宙庶稱朕以經學為治法之意也夫重刻番藏經序朕聞羲爻既衍逺開經籍之源禹範旋披𢎞啓文章之籥溯淳風於太古恢景運於中天大義微言較日星而竝燦靈篇寶籙偕嶽瀆以爭奇即至祐國庇民有祝史受釐之冊和風甘雨有陰陽占候之家總皆以崇有為歸遂各著闡幽之論若夫十方四諦之門三明六通之業夢金人於漢帝白馬䭾來序聖教於唐宗青蓮湧出琅函東度登黃珉碧玉之壇金疊南翻建獅子龍王之㑹竺蘭授記宗風振四十二章元奘載歸勝果揚六百餘部用度閻浮之域長留震旦之區原其流衍𢎞綱意在挽回末俗依然忠孝言言袪妄存真亦曰仁慈念念勝殘去殺心燈夜炳則照徹昏衢意蕊晨飄則凉生火宅雖殊途而一致實異派而同源兼以諷誦仙輪仰祝靈長之祚敷宣教鐸俯埀濟渡之航固所瞻依寧無裨補是知乾綱在握無俟藉響於法螺而當泰宇方隆竝可徵休於香象矣朕探索古今研窮謨典皇風帝緒之䇿時掣牙籖名山祕笈之藏更披玉軸雞籌報曉資啓沃於經幃鳳炬分宵備詢謀於冊府憲章所係討搜文獻之遺儒術攸崇紹明理性之學際兹車書一統庶幾軌物咸遵至於意樹心蓮未展貝多之葉鶴林鹿苑偶臨般若之臺究玉鏡之圓光覽金繩之妙諦伏惟太皇太后遐齡永錫齊心舍衛之城皇太后純嘏殷流報禮祗洹之役曩者林衡授矩無非桂棟海梁于焉竹素成編盡是雕談奧辨供億靡勞於蔀屋不涉民財經營悉出於芝宫非關內帑念真乘之慧業宜宣而梵唄之潮音未廣乃稽歷古傳燈之録更輯千山印鉢之篇番藏舊文爰加鐫刻緑縹裝就八解高超黃錦開時七花逺邁誠以導璸暉於紫幄分璇彩於黃圖助啓芳詮廣崇大藏頌兩宫之景福延萬姓之鴻庥式辨簡端用資褒讚云爾古文淵鑑序夫經緯天地之謂文文者載道之器所以彌綸宇宙統括古今化裁民物者也是以乾苞坤絡非文不宣聖作賢述非文不著其為用也大矣書契以後作者代興載籍充盈體製不一約而論之靡不根柢於羣經權輿於六籍如論說之類以疏解為主始於易者也奏啓之類以宣述為義始於書者也賦頌之類以諷喻為指始於詩者也傳叙之類以紀載為事始於春秋者也引而伸之觸類而通之雖流別各殊而鎔裁有體於是能言之士抒寫性情賁飾辭理同工異曲以求合乎先程皆足以立名當時埀聲來葉彬彬郁郁稱極盛焉然而代不乏人人不一製著作既富篇什遂繁不有所裒輯慮無以觀其備也不有所詮擇慮無以得其精也古來采獲之家載在四部名目滋多類皆散佚其流布人區者自蕭統文選而外唐有姚鉉之文粹宋有吕祖謙之文鑑皆限斷年代各為一編夫典章法度粲然一王之制前不必相師後不必相襲此可限以年代者也至於文章之事則源流深長今古錯綜盛衰或通於千載損益無關於一朝此不可限以年代者也諸家之選雖足鳴一代之盛豈所以窮文章之正變乎朕留心典籍因取古今之文自春秋以迄於宋擇其辭義精純可以鼓吹六經者彚為正集即間有瑰麗之篇要皆歸於古雅其綺章秀製弗能盡載者則列之別集旁採諸子録其要論以為外集煌煌乎洵秉文之玉律抽牘之金科矣夫帝王之道質文互用而大化以成聖賢之業博約竝施而性功以備是書也雖未足以盡文章之勝於聖人游藝之㫖亦庶乎其有當也夫聖祖仁皇帝御製文集卷十九
