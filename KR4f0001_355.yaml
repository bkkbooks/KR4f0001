body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷二十七雜著康熙幾暇格物編雷楔霹靂砧形質各殊隨地而異今各蒙古瀚海沙漠等處嘗拾得銅鐡或如鎗頭或如箭鏃錐刀之類者蓋雷斧也雷書云雷斧銅鐡為之盛京烏喇諸地則皆石色微青黑而通明映之瑩如玻璃其在西洋者石色沉緑明徹無異此雷楔也博物志云人間往往得石形如斧刀名曰霹靂楔者是矣又有雷墨雷鑽雷鎚不過以狀異名要皆金石質也唐人小説謂玉門西有雷廟國人年年出鑽以給雷用是誠謬言夫雷火所至萬物俱化斧楔乃雷氣之所化耳其或金或石者隨地氣而使然也土魯畨西瓜土魯畨在哈密之西其地産西瓜種最佳每熟時人入瓜田必相戒勿語悄然摘之恣其所取瓜皆完美若一聞人聲則盡坼裂無全者亦異聞也地球自古論厯法未嘗不善總未言及地球北極之髙度所以萬變而不得其著落自西洋人至中國方有此説而合厯根可見朱子論地則比之卵黃皆因格物窮理中得之後人想不到至理也理氣宋儒論理氣最好宋以前諸儒及後之學者每好為注解注則離解則畔倒不如本文中細看或得其旨一二若立自作之意須讀到極處然亦未必能也潮汐潮汐之説古人議論最多總未得其詳惟朱子之説得其理朕到海邉如山海天津大江錢塘等處每察來去之時與本土人詢問大約皆不同所以將各處令人記時刻而亦不同後知泉井皆有微潮亦不凖時候問及西洋人與海中行船者皆不同所以難明依朱子之言屬月之盈昃其理甚確沙蓬米沙蓬米凡沙地皆有之鄂爾多斯所産尤多枝葉藂生如蓬米似胡麻而小性暖益脾胃易於消化好吐者食之多有益作為粥滑膩可食或為末可充餅餌茶湯之需向來食之者少自朕試用之知其宜人今取之者衆矣鮓答鮓答之名見於陶九成輟耕録及李時珍本草第云産走獸腹中不知出蛇頭及魚腹者為貴其形色亦不等相傳蒙古禱雨時投鮓答於泉源或持咒或以手撥㺯輒能致雨朕細推其理蓋泉源本靈異之地不受汙穢以不潔之物攪之是以致雨舊有燒蜥蜴即雲虎祈雨之説亦即此意今人遇泉源未有敢輕褻者無論南北皆然觀此可以知致雨之故矣瀚海螺蚌甲瀚海一望斥鹵無溪澗山谷而沙中往往見螺蚌甲蒙古相傳云當上世洪水時此皆澤國也水退而為壅沙耳因思八卦之位坎居於北故天下水源大抵從北來孟子云洪水泛濫於中國言泛濫者指其委如此知其源必有所自矣大凡水性就下以東南為虛壑故古來西北澤區水匯見之史册者今考據地志已半為平陸且以幾千里枯㵼而仍名曰瀚海意其本來必非即沙磧也洪水之説近似有理録之以補前人所未發瀚海石子瀚海沙中生瑪瑙石子五色燦然質清而潤或如榴房乍裂紅粒鮮明或如荔殼半開白膚精潔如螺如蛤如蝶如蟬胎厴分顯眉目畢舉三年刻楮之巧未能過也又有白質黑章若畫寒林秋月霧嶺煙溪以至拽杖山橋放牛夕照之景宛然化筆朕親征厄魯特時撿得數百枚賦形肖象奇竒怪怪莫可敷陳造化生物之巧一至此乎青馬相傳青馬之種從海中來其性最良杜甫詩所謂安西都護胡青驄是也説文曰馬青白色曰驄按史記天官書房星在東天駟近之故青色者多良馬又白色屬金金性堅久故馬白色者主夀此昔人貴青馬所由來也櫻額櫻額果屬也産於盛京烏喇等處古北口外亦有之其樹藂生果形如野黑葡萄而稍小味甘澀性溫暖補脾止泄鮮食固美以之晒乾為末可以致逺食品中適用處多洵佳果也今山莊之千林島遍植此種每當夏日則纍纍綴枝遊觀其下殊堪娛目不獨秋實之可採也查盛京志云櫻額一名稠梨子實黑而澀土人珍之間以作麵暑月調水服之可止㵼又查本草有楮李木髙者一二丈低者八九尺葉如李但狹而不澤子於條上四邉生生時青熟則紫黑色若五味子至秋葉落子尚在枝治水腫腹脹滿除疝瘕積冷今關陜間時有之稠梨或即㨋李聲訛也硭硝前代禁止硭硝不令出口立法甚嚴不知口外頗多産硝之地喀爾喀厄魯特地方有白色土熬之即為硝比中土所産更佳始知天下有用之物隨地皆有初不以中外異也木化石黑龍江烏喇等處水極涼河中嘗有木化為石形質與石無異而木之紋理及蟲蠧之迹仍宛然未泯或有化石未全猶存木之半者以之磨礪刀箭比他石為佳又鹿角人骨亦能變石造物之巧種種化機非意想所能及也泰山山脈自長白山來古今論九州山脈但言華山為虎泰山為龍地理家亦僅云泰山特起東方張左右翼為障總未根究泰山之龍於何處發脈朕細考形勢深究地絡遣人航海測量知泰山實發龍於長白山也長白綿亘烏喇之南山之四圍百泉奔注為松花鴨緑土門三大江之源其南麓分為二幹一幹西南指者東至鴨緑西至通加大抵髙麗諸山皆其支裔也其一幹自西而北至納祿窩集復分二支北支至盛京為天柱隆業山折西為醫巫閭山西支入興京門為開運山蜿蜒而南磅礴起頓巒嶺重疊至金州旅順口之鐡山而龍脊時伏時現海中皇成鼉磯諸島皆其發露處也接而為山東登州之福山丹崖山海中伏龍於是乎陸起西南行八百餘里結而為泰山穹崇盤屈為五嶽首此論雖古人所未及而形理有確然可據者或以界海為疑夫山勢聫屬而喻之曰龍以其形氣無不到也班固曰形與氣為首尾今風水家有過峽有界水渤海者泰山之大過峽耳宋魏校地理説曰傅乎江放乎海則長白山之龍放海而為泰山也固宜且以泰山體位證之面西北而背東南若云自函谷而盡泰山豈有龍從西來而面反西向乎是又理之明白易曉者也黑龍江麥黑龍江所産之麥最佳色潔白性復宜人相傳中國麥種之佳者係西域携來鄂羅斯地在西陲萬里有餘黑龍江上流原係鄂羅斯所居其種亦自西來所以麥之佳較他處尤勝也本草藥名藥料之名有中外聲音相似者如本草之訶黎勒土伯特呼為阿魯拉大抵此種原産自外蕃傳入中土故因仍舊名但聲音微有不同耳如本草中有莨菪子莨菪音浪蕩其名即蕃名似亦從外蕃傳來不察來由多為解説勉強附會者不止於此皆可無庸也查克查克木名也瀚海一帶多有之其樹無皮當枝幹青翠時著火即燃不必待其枯稿燒時有焰而無煙與炭相似且耐久不熄亦木中罕見者葡萄葡萄來自西域中土所有之種無多近得哈密回子等地方各種植於苑籞中結實有白者緑者紫者長如馬乳者又一種大葡萄中間有小者名公領孫又一種小者名瑣瑣葡萄種類雖殊食皆甘美移植南方便失本味大約其性於北方沙石水土相宜堪逹罕索約爾濟等地方有獸名堪逹罕鹿類也色蒼黑項下有肉囊如繁纓大者至千餘斤其角寬扁以之為決詩經決拾既佽注決以象骨為之著於右手大指所以鉤弦開體勝於象骨世人貴之其四蹄能驅風凡轉筋等症佩於患處為效甚速汶上縣分水口朕屢南巡經過汶上縣分水口觀遏汶分流處深服白英相度開濬之妙考河渠通漕諸書初元人遏汶水北出陽穀以通衛水南出濟寧以通泗水其分水之處為會源閘即今濟寧之天井閘也然按其地勢南自沽頭以逹河淮洵為便利而北由安居至南旺南旺地髙於天井安能激水逆流而使之分乎故當時雖多設閘壩而嘗患漏竭即水盈滿亦僅可勝小舟而已至明永樂時總督河道宋禮用老人白英之策築戴村壩以遏汶導之出鵝河口入南旺湖然後分流南北以分水口為水脊因勢均導南得四分北得六分增修水閘以時啓閉漕運遂通今南北流惟吾所用如淺於南則閉南旺北閘淺於北則閉南旺南閘湖泉並注南北合流雖有旱暵靡不有濟每嵗東南漕艘無或滯留此皆白英遏汶分水之功也相傳英當日每徘徊汶濟之間積數十年精思一旦確有所見決為此議三百餘年行之無弊所謂因地之宜順水之性也詩文以命意為上詩文之道以命意為上意在筆先然後發為文詞形諸歌詠自能超出衆人之表令讀者尋味無窮所以古來名人著作皆言近而旨逺千載而下猶如見其心思聆其謦咳此皆以敬誠意勝不徒以華麗文勝也若胸無卓見於理祗以鋪敘辭藻為工雖豐彩可觀而實意已鮮欲以傳世而行逺不亦難乎落葉松五臺及口外興安髙寒之地有樹名落葉松枝幹與杉無異而針亦青蔥如蓋惟經霜雪後則葉盡脫其木質甚堅有微毒斫伐時誤入肌膚驟難平復根株歷久不朽沉埋水土中則變為石可供磨礪之需亦松杉之别種也土魯畨地極熱土魯畨地方去雪山不過百里之內天氣極熱其人皆入夜始出耕種若日出以後則暑不可耐且其地多磧石赤日中石熱如火觸之有焦爛之患古稱西域流沙多熱風人物當之皆迷仆或疑其言之太過由今觀之實有符於古所傳者聖祖仁皇帝御製文第四集卷二十七
