body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷二十九雜著書通鑑綱目後史之作也不惟其備紀載而已將以昭勸懲於萬世自孔子作春秋以明天德以彰王事善善惡惡之間褒貶見焉故其文則史也其抑揚豫奪之法即經也自是而降一代之興必有一代之史皆易編年為紀傳本末具於篇中是非備於論贊至司馬光綜括古今為通鑑一書采獲詳博考据精嚴為諸史之大成然據事臚列褒貶之義或闕此朱子綱目所以繼春秋而作也然考厯朝正史之外有金履祥通鑑前編以及馬總之通厯宋庠之通譜靡不網羅舊聞多所引證然終不若朱子之綱目為切要而純正信乎其有功於世道人心非淺鮮也觀其自序之言曰大書以提要分注以備言使詳略同異通貫曉析如指諸掌蓋隱然不敢當筆削之意焉然其邪正是非之辨賢姦忠佞之分寓大義於微詞紹素王之心法麟經以後惟有此書朕披讀尋繹弗釋於懷治天下者其視此為龜鑑也夫閲皇明祖訓偶書朕遐稽載籍近考前朝凡禆治理之書必殫精深之藴豈徒以其文焉而愛悅之已哉皇明祖訓一書萃列后之謨兼衆智之美至於去邪納諫之規勤政慎刑之誡內而宫闈之禮教外而朝堂之政令胥盡於斯焉逮其後世子孫漸至於陵替者豈其貽謀之未臧歟由不能善守之故也朕披覽之際心焉景慕常以為鑒因書以記之紀苖事王師之平蜀也大破逆賊王平藩於保寧獲苖人三千皆釋而歸之及進兵滇中吳世璠窮蹙遣苖人濟師以拒我苗不肯行曰天朝活我恩德至厚我安忍以兵刃相加遺耶夫苖之獷悍不可以禮義馴束宜若天性然者一旦感恩懷德不忍輕倍其上有中土人士所未易能者而苖顧能之是可異也雖然其又何異之有昔有虞舞羽三苖格姬文因壘崇墉降叔弓禮俘南蒯走荀吳却叛䳒鞮拘仲皓遣質莎車來諸葛攻心南人服皆不事斬艾以恩信相約結而敵人自歸已事具在苖奚異焉且夫苖其種蠻也其居荒外也而其性則猶然秉彞好德之人也子輿氏不云乎以力服人者非心服也力不足也以德服人中心悅而誠服也獨謂苖而異乎人而不可以德服也耶書蘭亭帖後唐文皇嗜蘭亭帖至竭萬乘之力多方以購之又時橅善本賜其臣僚可謂勤矣而卒無妨於治國理民之政蓋其納諫受言力行仁義所圖者大舉凡游藝之事不足以纍之况寄心翰墨於幾務之餘豈非前王之令軌哉推考其時貞觀之風幾與三代比隆其仁心善政可施於後世者多矣髙山在望景行行止寧獨於蘭亭一事哉讀楚辭朕讀屈原書往復不厭豈直以其文辭哉蓋其浩然之氣畜積鬱勃磅礴激越故其發於咏歌嗟歎之間不能自己自非實有其忠君愛國繾綣惻怛之誠亦烏能若此耶是以往復讀之尋其指意之所出而於是乎有取焉耳昔子輿氏論浩然之氣謂直養無害則塞乎天地之間若屈原者實有是氣可知矣司馬遷謂可與目月爭光者豈謬語哉夫其所養如此故其言曰誰能以身之察察受物之汶汶者乎又安能以皓皓之白而蒙世之溫蠖乎卒自沉於汨羅信乎其忠也或者乃臆測天問九章謂其實無沉淵之事士生於千載之下欲懸斷千載以上之是非蓋已難矣矧並其所行之事以有無變易其說其好竒失實為已甚朕所以惡夫輕議古人者也至如屈子之行昭昭在天壤間者而可沒其實耶喻馬伯樂嘗薦九方臯於秦穆公公使行求馬三月而反報之曰已得之矣在沙邱牝而黃使人往取之則牡而驪公以讓伯樂伯樂曰是所相者天機也有貴乎馬者也得其精而忘其粗在其內而忘其外及馬至果天下之馬也是說也吾嘗疑之夫馬之行於地也猶士之用於世也君子之觀人也聽其言然後察其行故曰視其所以觀其所由察其所安其不略乎外而遺其粗也如是世有色物牝牡之不知而可以得善馬者乎是不必納言試功而可以盡天下之士也非通人之論也且夫千里之馬世不恆有而馬之用不可一日而或缺其上焉者以之備輿衛充十二間次則供戎事下者亦可以服轅而代步天下固無不可用之馬也使必待逺筋駿才而後用之則利用致逺之道或幾乎絶矣故善相馬者天下無棄馬善相士者天下無棄材嗚呼此器使之方也歟連珠有序朕嘗觀揚雄博綜藝文叙述短章名曰連珠班固賈逵傅毅諸人相繼有作昔人所謂辭麗言約合於古詩諷興之義良不虛也效其體作數首以示侍臣雖亦假物陳義至於託寄髙逺殊讓古人爾蓋聞動靜互宅所以乘陰陽之機張弛咸宜所以體剛柔之撰是以春溫秋肅四時之玉燭常調山結川融八柱之金樞永奠蓋聞海水納其所出故浩大而無涯車輪復其所過故廣逺而不滯是以善由虛受而萬物歸懷德本健行而上天合契蓋聞篤時之士以之應變則乖蹈故之儒以之經方則拙是以夏蟲不可以語氷而秋蟬不足以知雪蓋聞上之御下不貴挈瓶之智下之比上必由盈缶之孚是以教戰以忠非察慧之用救饑以信無匱乏之虞蓋聞興善察亷朝廷之典安上庇下臣子之忠是以叔向賀貧在建德以為本子文逃富不勤民以自封蓋聞錫爵酬庸必首進賢之典疏勳命秩宜先勸善之褒是以潞子見拘士伯分田於瓜衍箕師告捷胥臣受縣於先茅蓋聞仁義之性不因地而遷移貞白之姿不隨時為豐嗇是以蘭蕙生於幽谷不以居僻而損其芳松柏産於茂林不以嵗寒而凋其色蓋聞律吕迭宣而音以蕭條為主采章代變而形以寂寞為君是以樂主人和非緣鐘鼓之節禮由天秩不傳玉帛之文蓋聞舞羽之朝不廢刑章之設畫衣之制實輔禮教之窮是以嚴父之威期於式榖慈母之愛寓於折葼蓋聞德之所届靡逺弗周化之所孚無幽不被是以祝網中之飛翮而六合戴其恩蔭樾下之暍人而九州懷其惠蓋聞吳歈越吟異轉而皆樂荆豔楚舞殊姿而並妍是以五方墳壚咸興謡於堯壤八方燥濕同被化於虞絃祭文祭明太祖文自古歷代帝王繼天立極功德並隆治統道統昭埀奕世朕君臨海㝢運㑹升平軫念民生省方問俗途經白下慿眺鍾山緬憶前徽興言往烈園陵入望瞻封樹之依然史册可徴企芳規之儼在儀章式舉殷禮聿稱敬遣專官代陳牲帛爰申禋祀之誠用著景行之志冀神爽其不昧降雲車以格歆祭至聖先師孔子文仰惟先師德侔元化聖集大成開萬世之文明樹百王之儀範永言光烈罔不欽崇朕丕御鴻圖緬懷至道憲章往哲矩矱前模夕惕朝乾覃精思於六籍居今稽古期雅化於萬方繄惟典訓之功實覩乂安之效兹者巡省方國至於岱宗瞻望魯邦爰來闕里空堂至止恍聞絲竹之聲舊寢徘徊喜動宫墻之色車服禮器宛然三代遺風几杖册書敻矣千秋盛蹟愾明靈之儼在文治遐昌肅禋祀以惟䖍精忱庶格祭元聖周公文惟公丕承聖緒懋叙人倫光烈覲揚成一家之繼述官禮制作埀萬世之經常道闡圖書探六爻而易貢心傳精一兼三代以訏謨啓東魯之典型猶存故澤入尼山之夢寐未墜斯文朕稽古省方瞻言至止郊原縱目遙深松桷之思廟貌崇觀爰切羮墻之慕特申祗薦代以親藩惟冀神靈尚克歆饗諭祭江南江西總督于成龍文朕惟國家敷治簡賢道先保障人臣奉公奏最節重清勤苟四知之克嚴歷終身而弗替寵褒宜賁恩恤用昭爾于成龍志篤醇誠誼敦貞介甫膺民社聿著循聲既懋旬宣彌彰令績是用畀以節鉞綏乃邦畿爾克撫字維勤苞苴盡絶逮兩江遷鎮一節罔渝馭下則大革貪風勵已則寒同儒素雖古廉吏曷以加兹乃倚任方殷遂溘焉淪逝軫懷良惻異數頻頒嗚呼蕭然官舍竟擔石之無存煥矣綸章庶泉臺之克慰苾芬在御尚其歆承諭祭江南江西總督于成龍第二道文惟爾苦節克貞鞠躬匪懈真一介之弗取越數官而彌堅奄忽云亡能無憫䀌嗚呼清風未逺長存表德之思寵恤重頒丕著旌賢之典爾靈不昧其克欽承聖祖仁皇帝御製文集卷二十九
