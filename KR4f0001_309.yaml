body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷四敕諭諭大學士等光祿寺先前每年需用錢糧六七十萬陸續節省核减一年止用四五萬兩且工部先前每年需用錢糧百萬有餘亦經陸續節省核减止用十五萬餘兩以致琉璃窑石灰監督鋪戶等各所司之事不能承辦此雖云節省核减戶部錢糧反多致缺缺著九卿詹事科道將庫帑作何設法填補鋪戶如何能辦伊等差使之處一併詳議具奏康熙五十二年十二月十八日諭大學士溫逹松柱李光地蕭永藻王掞等此前往臺灣換班人等乘坐船隻遭風擊碎部議照例著落武官賠補海面風勢險阻倉卒之間豈人力所能馭若與賊對敵失陷被其焚劫應令照例賠補似此遭風損壞者並令賠補殊屬寃抑自後除遇賊不能剿捕損失船隻或因船被賊搶揑報遭風者議罪外仍照例令其賠補如果不幸遭風沉溺賠補應從寬免其船上溺死兵丁皆係因公殞命即有沒水幸得登岸者九死一生亦可憐憫地方大吏宜酌量恩恤以示鼓勵著九卿㑹議具奏康熙五十二年十二月二十日諭大學士松柱左都御史兼翰林院掌院學士揆叙近見翰林等官告假者甚多庶吉士給假三年考時復來如此去來任意所學安有進益此後除丁憂終飬外凡翰林庶吉士告假者應與致仕知縣一例現今教習進士內有告假者亦應照此例再科道官員職任甚重亦有任意告假回籍者爾等㑹同九卿一併議奏康熙五十三年二月十四日諭戶部甘肅一帶地方去年春麥失收秋田亦歉經該督撫奏報甚明其地俱係山田稍遇旱暵易致災荒是以舊嵗特沛恩澤蠲免租賦現在雖據該督撫設法賑濟借糶資給牛種此外更應作何籌畫使小民得所永有禆益著遣工部右侍郎常泰大理寺少卿陳汝咸到彼㑹同該督撫詳察地方百姓情形確議具奏康熙五十三年三月初四日諭禮部朕惟治天下以人心風俗為本而欲正人心厚風俗必崇尚經學而嚴絶非聖之書此不易之理也近見坊間多賣小說淫詞荒唐俚鄙瀆亂正理不但誘惑愚民即縉紳士子未免遊目而蠱心焉敗俗傷風所繫非細應即通行嚴禁其書作何銷毁市賣者作何問罪著九卿詹事科道㑹議具奏特諭康熙五十三年四月初四日諭大學士松柱等兩淮鹽課先缺一百八十餘萬兩自將李陳常補授運使所缺銀兩俱各賠完李陳常做官甚好實能效力鹽務將李陳常授為御史巡視兩淮一年鹽課江寧蘇州織造二處應解銀兩仍照曹寅李煦解送餘剩者將曹寅李煦啇人缺有銀兩俱令清補李陳常原係九卿舉出之員此運使員缺著九卿必如李陳常之人揀選保舉具奏康熙五十三年五月初八日諭領侍衛內大臣等朕想喇藏汗一子前往䇿妄阿喇布坦處娶親一子現在青海地方駐扎在䇿妄阿喇布坦處娶親之子䇿妄阿喇布坦若託詞愛壻留住數年不令之歸再如駐扎青海之子朕復憐愛留住伊處總無人矣豈不孤危况且喇藏汗年已近六十自當為其身計才是伊之人少土伯特人甚多又兼秉性凶惡可保得常無事否喇藏將凶惡第巴殺死朕加褒奬封為扶教恭順汗伊真傾心內嚮不但朕知之即各處人亦皆知之但伊等厄魯特秉性猜疑又甚怠惰倘或事出不測朕雖憐伊伊雖倚朕此間地方甚逺相隔萬里救之不及事後徒貽悔耳即朕亦無法也朕此想甚屬逺大伊亦係曉事之人身後事若不深謀防範斷乎不可朕為喇藏汗時常留意特諭康熙五十三年六月初五日諭刑部朕避暑口外駐蹕山莊素稱清凉之地還覺煩熱想京師自然更甚朕時以民生疾苦為念今天下承平農商樂業惟有罪人拘繫囹圄身被枷鎖當兹盛暑恐致疾疫軫念及此不勝惻然應將在京監禁罪囚少加寬恤獄中多置氷湯以解鬱暑其九門鎖禁人犯無論奉㫖亦著减其鎖條至枷號人犯限期未滿者暫行釋放候過暑時照限補滿爾部即遵諭速行以副朕法外施仁至意康熙五十三年六月十五日諭大學士九卿詹事科道朕聼政年久深悉民生利病凡國家要務無時不預為籌畫有奏摺人來朕皆詢問咸稱江南暵旱江浙米價亦不甚賤今春山東河南田麥歉收交冬米必騰貴彼時即亟為料理亦不能及徒空勞爾朕詳悉思維將漕糧撥三十萬石江寧府十萬石蘇州府八萬石淮安府揚州府共五萬石杭州府五萬石河南開封府二萬石著漕運總督親身閲兊速行運至令其加謹照數收貯有此米石軍民心安而米價自不驟貴且與通倉無甚關係較之一年所缺之數亦屬無多至豫省漕糧該部亦應預行詳議今若雨澤及時田禾豐收則此項米石由水路撥給他處亦可也康熙五十三年七月初十日諭刑部朕聼政多年勤求民瘼刑獄之事尤所留心詳閲直𨽻及各省題奏命盜各案自審結以至題請或踰時或經嵗部議又間有覆駁再令詳審者案內牽連之人雖笞杖輕罪不免羈禁以需完結淹歷嵗時離家失業至於饑寒病斃者往住有之朕軫懷民命深用憫惻嗣後直省刑名除重犯案內軍流徒罪仍應候㫖完結外所有杖罪以下輕罪著各該督撫於審結日即行發落不必羈候部覆只於疏內逐一聲明務使無知罣誤之民早得脫身寧家以副朕哀矜體恤至意其不關題請各督撫應自行審結發落者仍著照依舊例爾部即遵諭行康熙五十三年十月十九日諭南書房翰林向來升殿所奏中和樂章皆仍明朝所撰句有長短體製類詞後因文理不雅命大學士陳廷敬等改撰其章法皆以四字為句而奏樂人未易聲調仍以長短句法上下凑合歌之是雖文法易而聲調未易也今考察舊調已得其宫商節奏甚為和平必得歌章字句亦隨詞調則章法明而宫調諧此事所關最要著南書房翰林同大學士等詳考定議務使章法與聲奏協和方為允當再察明朝諸樂是何人創立規模法度一並詳明具奏康熙五十三年十月二十一日諭大學士松柱李光地蕭永藻王掞朕無時不以民生為念巡撫係地方專責大吏理應實心籌畫禆益民生年來浙江各府屬地方或有歉收之處小民頗苦每覽巡撫王度昭所奏事宜未見盡心於民生真有禆益河南巡撫鹿祐所奏事宜亦未明當爾等傳問九卿康熙五十三年十月二十四日諭戶部朕撫御寰區勤求民瘼凡地方水旱災傷必詳加咨詢先事預籌其有荒歉上聞蠲賑頻施務令得所五十餘年來夙夜孜孜如一日也前因甘肅靖逺衛等處年嵗不登民艱粒食已多方賑濟本年錢糧或蠲或停而山地嶢瘠民鮮蓋藏若不大沛恩施目前已自艱難來嵗更何倚恃這被災二十八州縣衛所康熙五十四年額征銀九萬七千八百七十兩零糧二十三萬九千四十石零草二百五十三萬七千八十束零俱著通行蠲免行文甘肅巡撫實心奉行務使比屋均沾實惠用副朕撫恤災黎至意爾部即遵諭行康熙五十三年十一月十二日諭戶部朕臨蒞多年無時不軫念民瘼每嵗於直𨽻及各省凡民間暘雨期候豐歉情形莫不留心訪察雖在僻逺必務周知偶值一二處災傷蠲免賑救不惜重費倉帑以蘇我民困也近思賑濟災歉以速為貴必待督撫奏報往返候命使小民嗷嗷待哺何如豫備積貯於平時則所在有可恃之資糧而臨事免轉移之勞費今漕挽通行太倉充裕江浙地方年來頗有歉收州縣應酌量截留糧米分貯各處江寧原留五萬石今再截留十萬石蘇州原留八萬石今再截留二萬石安慶截留十萬石杭州原留十萬石今再截留十萬石皆於本年起兊內就近截留令地方官加謹收貯至應動用之時著該督撫題請爾部即遵諭行康熙五十三年十一月十七日諭大學士松柱等直𨽻各省州縣等官或革職或被參解任或身故者妻子尚能回籍其縣丞主簿典史驛丞等微員革職解任身故者無力回籍羈留異鄉不免凍餒甚至有全家死亡者即使犯罪致死亦與妻子無涉甚屬可憫且如各地方鰥寡孤獨不能度日尚設立飬濟院以育飬之此等微員理應撫恤自後將伊等作何令回原籍爾等與九卿㑹議以聞康熙五十三年十二月二十日諭大學士溫逹松柱李光地蕭永藻王掞朕觀宋儒周程張朱之學與四書相表裏為六經之階梯平易精實有禆學者嗣後鄉㑹首場題宜减去經義兩道改為性理兩道並用八股體式俾人士知所誦習遵守以崇實學爾等㑹同九卿詳議康熙五十三年十二月二十二日諭理藩院今年䝉古地方雪大先曽聽見下雪不知近日如何著理藩院派善於馳驛好司官三員令其馳驛出張家口古北口喜峯口三處直至哨地盡頭處回來牲畜被雪倒斃傷損勿得隱諱因雪大特差看伊等牲畜即以此意告之凡經過旗分俱著問明回來康煕五十四年正月十七日諭大學士九卿詹事科道科場出題關係緊要鄉㑹經書題目已有㫖不拘忌諱斷不可出熟習常擬之題朕常講易及修定天文律吕算法諸書人人皆知必以此等書擬題爾等皆係應㸃考試之官雖未派定何人然斷不可以此諸書出題表題亦不可出修書賜書等類不然則人皆可以擬題幸進真才何由而得張鵬翮為主考所出經書䇿論題皆主理學意義相同彼雖無情弊而所取之人甚多僥幸人殊怨之趙申喬所取解元係倩人代作畏罪逃竄以致人皆不服趙申喬亦無言可以自解然彼不過觀其文章耳其中情弊何由得知故知出題乃大有關係之事再房官亦屬緊要如房官有弊主考亦無如之何今每一房卷可令不同省房官二人同閲如一人有情弊發覺二人並坐則各知畏懼互相糾察矣部院衙門司官凡進士舉人出身者皆係例應分房之人若學問不堪不識文字何以衡文取士伊等亦宜考試或有非進士舉人出身情願考試者亦令考試再五經中式甚屬無益十七八嵗之幼稚皆能之不過手敏多寫字耳殊無實學至於表判諸士子皆是平日讀就現成文字進場惟有抄寫並未搆思或可易之以詩頭場文字七篇亦太多或用六篇爾等公同議之康熙五十四年正月二十七日聖祖仁皇帝御製文第四集卷四
