body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷十四敕諭諭九卿詹事科道昨侍郎穆旦等審問盜賊事情擬罪具奏內賊犯王昭駿以受僞兵備道銜問凌遲處死其叔伯兄弟皆照律坐罪朕念太倉王姓昔在明時亦曽為大臣素稱顯族本朝七十年以來為大臣官員者甚多竝未聞有他故今因一不肖亡賴玷辱宗族之匪類依律坐罪朕心深為不忍且為凡為大臣官員者痛之爾等會議時但將王昭駿本身及妻子定罪其伯叔兄弟俱不必議本內將朕此㫖明白載入為此手書特諭康熙四十七年五月二十五日諭兵部臺灣總兵官員缺甚屬緊要著行福建浙江將軍總督提督令於兩省總兵官內不拘人地遴選材勇堪用者一員速發赴任康熙四十七年六月初八日諭工部去嵗杭州等處田畝被災民生疲敝這支河港蕩淤淺之處若勸諭百姓開濬恐地方官員藉此私派害民亦未可定况需費無多著動用正項錢糧速行疏濬康熙四十七年七月十五日諭內閣從前巡捕三營屬督捕管轄時營官侵蝕兵糧雖兵數具存而京城大臣官員家丁皆充兵冒餉全無實濟積弊沿流極其懈弛以致漢官所居地方盜賊疊告外城官民不能聊生因而漢官具疏陳奏朕下九卿等㑹議歸併前任步軍統領等令其清釐營伍選擇營辨盡力摉稽嚴緝攘劫然後盜賊漸減官民獲安此衆所共知著有明效者也竝非至陶和氣任內方令統轄陶和氣一人之用舍有何關繫但其人一經恭劾則該部自據定例具議絶不在於扶同附和相繼續參此風亦斷不可長且巡捕三營官員或於各省營辨或於旗下武職皆經朕親選壯健人才補用若果有一二驕悍不法之人言官即當指名題參乃將百餘員之營辨三千餘名之兵丁一概溷指以為驕悍不法可乎著仍指名具奏况武職兵丁兵部皆可稽察步軍統領巡捕三營亦隸於兵部誠欲建言則將兵部題參未為不可髙遐昌乃謂巡捕三營應歸併兵部所言大謬又街道事務司坊等官管理時畏懼顯要職官朘削里巷小民止知勒索鋪户銀錢而街道事務毫不置念因敝壞已極故亦歸併步軍統領管理今既稱啇民受街道之纍即著髙遐昌兼管一年務令啇民不致苦纍街道大加肅清若果能綽然辦理誠為能言即能行之人矣下所司知之康熙四十七年七月二十五日諭吏部趙國祚年老致仕以後復請往出兵效力行間多有勞績恩詔所得官秩准與存留仍以二等阿達哈哈番令其孫世昂承襲康熙四十七年八月二十日諭户部據寧夏民黃品竒等叩閽之詞言都司何卜昌在任時疏通河口連年大穫自何卜昌告退以後水澤淤塞因而米穀薄收從前何卜昌如何疏通河渠有益於民今應如何措置俾得永逺裨益地方著行該督撫詳察具議以聞康熙四十七年八月二十日諭刑部以弟殺兄情罪重大於律斷不可恕但據稱楊榮之母無贍養之人楊榮著暫留養母俟伊母故後該部奏聞仍照原擬正法康熙四十七年八月二十日諭內閣今年秋汛黃運湖河修防平穩覽河臣奏報已悉張鵬翮自任總河以來克遵朕指示修築工程身歷河干殫心盡力一切動用錢糧謹嚴明晰絶無糜費比年兩河安晏堤岸無虞深可嘉尚所帶削秩著與開復應償帑項俱著免追下所司知之康熙四十七年十月初一日諭户部朕屢次南巡見閭閻殷阜之象逺不逮於舊時故於民生風俗無不一一咨訪雖不時蠲免額賦停徵積逋僅可支吾卒歲絶無餘蓄且今承平既久生齒日蕃食漸不充用多不給亦理勢之所必致朕每念及此未嘗不為惻然去年江南浙江二省俱被旱荒多方軫恤始蘇民困逮今嵗復報潦傷旋經照例蠲賑竝下詔書留漕資濟但嵗再不登生計益匱欲令辦賦力必難供朕於國家一切經費纍年撙節帑藏充裕以此渙敷膏澤藏富於民俾得盡力農桑衣食滋殖百姓既足國用何憂康熙四十八年除漕糧外江南通省地丁銀四百七十五萬四百兩有竒浙江通省地丁銀二百五十七萬七千兩有竒著全行蠲免所有舊缺帶徵銀米仍暫停追取此朕因江浙二省為東南重地特於格外施仁用𢎞休養之至意該督撫各飭有司張示遍諭務令窮鄉蔀屋咸共知悉儻或别借事端侵冒徵派事發定從重治罪爾部即遵諭行特諭康熙四十七年十月十六日諭刑部楊義曾為大臣竝無罪過因其無嗣即將家産入官屢次駁察竟與查罪人家産相等殊非待大臣之道此等事關係大體若將無嗣大臣家産槩行入官日後即成定例著交與九卿將從前有無似此入官定例察明議奏康熙四十七年十一月二十日諭浙江巡撫黃秉中凡為督撫者但能清以持已實心辦事不交通近侍不夤緣部院則無往而不可矣朕涖政四十八年如爾陳奏素無夤緣者所見不可勝數此皆浮詞耳未足為據日後真僞當自明也至地方遇有凶荒除蠲免錢糧發倉給米煮粥分賑别無竒䇿止在地方官實心奉行斯有濟耳朕嘗南巡灼知江浙風俗如湖州地方乃係水鄉雨水既多則魚蝦菱芡之利俱可資以度日但北方人日止再食南方人雖遇荒歉亦必三餐州縣官平時竝不留心聼民間耗費直至窘迫始具文請題命下之後上司又不過虛張告示而止小民無知但能現成就食豈有長計謀生且農民愚而讀書人巧往往受其愚弄至於困乏饑餓而死而終不悟所以致死之由以此思之良可矜憫爾到地方宜令州縣官時時為百姓豫加區畫庶幾可以有備而無患也其調補保舉之事皆有情弊寧波府介在海濵地方緊要知府陳一夔不必與湖州更調康熙四十八年正月二十三日諭兵部李芳述自簡任提督以來居官甚優訓練軍伍整肅嚴明邊鎮地方賴以安輯歷年身經行陳宣力最久頃征紅苖之役建樹功績更為顯著允稱一時名將應與恤典已有明㫖本內所請事情著詳議奏聞康熙四十八年二月初四日諭宗人府自去年九月不幸事出多端朕深懷愧憤惟日增鬱結以致心神耗損形容憔悴勢難必愈於是概觀衆人不過為尋常虛語襲用空文此外别無良法惟貝勒允祉特至朕前奏稱皇父聖容如此清減不令醫人診視進用藥餌徒自勉强耽延萬國何所倚賴臣等雖不知醫理願冒死擇醫令其日加調治因痛哭陳請爰於十一月十八日始用醫藥時皇太子已經開釋遂亦同竭力趨侍晝夜不懈今朕之劇疾業已全愈從前朕之諸子所以不封以王爵者良恐幼年貴顯必至驕泰恣意而行故封爵不踰貝勒此亦朕豫之以進勉之路也今見承襲諸王貝勒貝子日耽宴樂不事文學不善騎射一切不及朕之諸子又招致種種匪類於朕諸子間肆行其讒譛交搆機謀百出凡事端之生皆由五旗而起朕天性不嗜用刑威不加窮究即此輩之幸矣兹值復立皇太子大慶之日允祉允祺俱著封為親王允祐允䄉俱著封為郡王允禟允祹允禎俱著封為貝子爾衙門即傳諭㫖察例議奏特諭康熙四十八年三月初十日諭兵部方凱簡任總兵綏輯地方整飭軍伍居官甚優前於中路出師時偕前鋒兵二百人奮力進擊衆皆稱其驍勇目前諸將罕有能及之者兹以抱病力衰懇切請罷朕深惜之著加左都督致仕仍給一拖沙喇哈番以示朕優眷勞臣至意康熙四十八年四月初三日諭刑部應結之事即當議結不必數駁致增事端從前屢下嚴㫖甚明這案內擒獲盜賊人等應賞之處部議應行文該撫察明照例給賞今又稱察覆到日再議殊屬不合部院大臣竝不詳察事情止據司官所言即行議駁因而事務每致增多凡不當駁而駁者皆有情弊此等事情即當議結該督撫完結之處自然題報著再議具奏康熙四十八年五月十一日諭兵部據張雲翼奏盜犯趙五糾聚羣凶於江浙海洋劫掠十有餘年今趙五及其黨羽十七人先後就擒並獲有船隻軍器該提督可會同兩江總督江蘇巡撫嚴審定擬具奏仍窮究餘黨協力緝捕務靖根株康熙四十八年五月二十日諭內閣九卿等偏沅巡撫趙申喬湖北巡撫陳詵頃有奏摺至詳問來人稱湖廣通省早稻豐收又江西巡撫郎廷極奏摺至亦稱江西稻田甚茂及問米價却不甚賤從上江運下之米極多而江浙米價反愈貴朕為小民生計無時不軫念籌畫所以不禁上江販米令其發下者正欲江南浙江米價稍減耳今富豪人等將湖廣江西糧米大加收買各於有名馬頭房屋堆貯江楚糧米雖有發下之名而糶賣之米益少此於貧民所關甚大爾大學士九卿大臣等皆係國家倚托之人其念切民生者必與朕同今應作何措處方於民有益可一體同心詳加講求速議具奏此處所有大臣亦著議奏康熙四十八年七月初七日聖祖仁皇帝御製文第三集卷十四
