body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷八敕諭諭兵部䇿妄阿喇布坦無知蠢動侵擾我哈密應遣發大兵即行殄滅但朕好生為念不忍驟加剿除因備兵邊地遣使宣諭冀悔罪自新為中外生靈計其萬全措置之際必籌其前後慮及久逺由小識大防微杜漸朕之意即此也至怒乃細事耳以之為辭甚屬鄙俚自䇿妄阿喇布坦侵擾哈密以來朕惟出之以雍容未嘗形諸聲色與在朝大小臣工公同商酌辦理並未欲逞一已之怒親自統兵征剿劉䕃樞聽信訛傳邸抄妄行具奏且前奏摺內有欲分界之意䇿妄阿喇布坦乃朕及衆所深知者豈可如此置議乎劉䕃樞尚未衰邁著乘驛前赴我軍駐劄諸處盡心周閲矢公詳議具奏康熙五十五年三月二十七日諭工部趙世顯奏稱江溜北徙花園港地方被冲坍塌一百二文瓜洲息浪菴前石馬頭亦被汕刷坍塌等語倘江流日漸北徙冲刷瓜洲城垣必致危險事關民生非預為籌畫修堤保護斷乎不可著江南督撫總河總漕速行親往詳加察勘作何修堤保護城垣勿致危險之處作速詳議一面動帑修築一面奏聞康熙五十五年閏三月二十一日諭户部朕惟民為邦本必年穀順成家給人足乃愜朕撫育元元之意自御極五十餘年宵旰孜孜無論遐方近地編民疾苦必備悉咨詢設有水旱蠲賑頻頒務講求實惠霑被羣生蓋不徒事軫恤之虛文也直屬順永保河宣五府去歲雨水過溢穀耗不登因全蠲額賦發米減糶今巡撫趙𢎞燮以目下正當青黃不接之時順永二府米價騰貴疏請借道庫銀六萬兩委員赴乏米州縣貴買賤賣朕思閭閻蓋藏未裕本地出米無幾以銀易米恐米價反致翔涌現今京通二倉積米甚多不如將舊米分發二十萬石於各州縣賑濟乏食窮黎官無轉售之勞民獲現在之米於地方大有裨益且畿輔地近京師挽運亦易著大學士等㑹同九卿速行詳議具奏特諭康熙五十五年閏三月二十二日諭大學士松柱詢問外省來奏摺人等僉云麥子甚好但路上未曾遇雨據此暵旱似覺稍逺現今麥穗秀齊甚屬可惜穀則尚無妨也朕望雨心切甚覺不安爾將此㫖録出發往京師令大學士九卿㑹同再行祈雨至於政事若有可議之處各抒所見公同㑹議以聞特諭康熙五十五年四月十九日諭大學士松柱二十六日到熱河夜大雨二十七日夜間又大雨因雨大河水長至七寸內流之水甚濁是以閉塞閘口此處雨水儘多無煩祈禱問京師來人云並未下雨朕心甚是憂慮大學士松柱寫此㫖問在京大臣京畿左近麥子光景及暵旱情形并問從外來人其暵旱逺近何如有陸續得雨之處否著速繕摺具奏康熙五十五年四月二十八日諭大學士松柱密雲縣至邊北雖雨水霑足無煩再祈然京城左右仍屬亢旱朕甚不安不知爾衆大臣如何目前五月端午恐互相㑹飲應行嚴禁並令各官竭誠祈禱爾將此㫖速發京城傳諭九卿康熙五十五年五月初一日諭大學士松柱近觀部院諸臣並不以朝廷事務緊要民生關係重大為念惟圗恩威由已多方設法以結黨為事現今部院諸臣越次超升者多而侍君禮儀尚且不諳况其他乎今值暵旱之際朕心甚憂慮不安兩發諭㫖始見臣等不勝歡忭之語朕心深為失望由此觀之九卿並未㑹集或止聽一人之言耳為臣如此不謂之欺君難矣總之伊等結黨甚衆苟非悉係伊等援引之人科道言官緣何不行糾參恐將來更加滋蔓故將原任大學士馬齊仍行補授松柱將此㫖繕寫發往切責諸臣特諭康熙五十五年五月初二日諭大學士九卿京畿左近至此時雨水未足朕心甚為躊躇密雲縣至口外等處俱已不需雨澤現今田禾顔色甚佳及確問外來之人雨水不足處頗有念京師地方非他省可比各處就食者甚多太平已久滋生人口多至數倍所以平素間諄諄以此處面諭衆大臣㑹議今值亢旱之際若不預籌為君為臣者所理何事乎閲此次報內糧價又長定例八月內放米去年敕諭年內支放今若候至八月糧價必益至騰貴著於五月初十日起即行支放至京城米石若仍行減糶甚屬有益著稍添糶賣朕此㫖不能周備若有應議處各抒所見議奏特諭康熙五十五年五月初五日諭議政大臣等喀爾喀之兵現在㑹議撤回更換班次者原欲明春備兵前去今滿洲緑旗兵扎薩克等之兵總計無不足用之處喀爾喀備兵前往著令停止內揀選二三千精兵凖備其餘停止俟進兵時從此㑹議行文酌量調遣進發若喀爾喀之兵多行派出在伊等無看守牲畜之人且亦無用處也康熙五十五年五月十二日諭大學士馬齊等閲今歲督撫奏摺陜西山西河南山東麥俱大收直𨽻地方分數尚未奏聞京師麥價未見甚減去歲此幾省亦曾大收乃麥價騰貴至今京師左近所賴者山東河南之麥亦兩省俱通水路不知一年販來者幾何據此看來富商大賈預行收買以至麥不得均糶從前江南糴買湖廣米榖自湖廣買去數目俱具摺奏聞知㑹督撫大有裨益陳詵趙申喬等俱知之今山東河南除陸路販賣者無庸稽察外自水路買來麥穀數目若干可否照湖廣例具摺奏聞之處著大學士九卿㑹同確議具奏康熙五十五年五月十三日諭總督滿保覽奏生畨四千一百餘口傾心向化願同熟畨內附等語生畨逺居界外從未投順今慕義輸誠請入版籍著該地方官加意撫恤倘有侵派擾害者該督撫即行指名題參從重治罪康熙五十五年五月十七日諭大學士馬齊等每年修理橋道所用錢糧甚多止不過萬兩足用且墊道工部侍郎每次必有一員隨行應著隨行侍郎酌量帶領錢糧與嚮導官員等公同監看搭橋墊道不但錢糧不致糜費而夫役亦得均霑實惠將本發回著户工二部㑹議具奏康熙五十五年六月十四日諭户部鼓鑄一事關係國用最為緊要故商人所缺銀兩已撥內帑補完毫無虧缺甚覺清楚今因八處督撫銅斤不能依限解到爐座久停又議交商人採買器皿舊銅殊屬不合若將銅斤又交伊等採買必仍至虧空斷然不可趙申喬等係管理錢法大臣伊等屬下不無官員商人可以採買採買亦無不得之處今現有代商補還銀兩即動支此項交與錢局官員採買未為不可因降諭㫖詢問令其具奏趙申喬敦拜㑹議動支代商人補還銀兩除節省銀三萬兩外每銅一斤合銀一錢二分七釐交與錢局官員採買器皿舊銅一百三十三萬斤以資鼓鑄若尚可節省處仍行節省俟八處銅斤解到另行請㫖等因著照所奏行康熙五十五年六月二十一日諭九卿浙省數州縣地方雨水頗大朕先聞知即著預為酌議傳諭九卿業已議覆專俟該撫具題今巡撫徐元夢奏稱各府屬田畝積水漸消民間俱已種稻仁和等九縣湖州一所俱未成災惟金華府屬蘭溪衢州府屬龍游嚴州府屬建德等五縣嚴州一所成災是實等語除未成災地方不議外其成災七縣一所酌量撥米運到散賑平糶使窮民均沾實惠勿致失所察勘分數照例蠲免之處著九卿速行詳加確議具奏康熙五十五年七月十九日諭大學士馬齊等原任將軍席柱本係小人朕加恩用至將軍伊在西安地方保題官員揀選兵丁俱貪賄賂今議政大臣悉經審出又聞席柱為副都統護軍統領都統時凡放官挑披甲護軍時亦混行取利左翼人無不知聞貪婪無耻甚屬不堪殊負朕委用之恩似此並無一人題參科道係朝廷耳目之官俱有糾參之任滿漢內有此等者或滿科道或漢科道俱可題參爾等進京時傳齊科道以此㫖諭之康熙五十五年九月十七日諭大學士馬齊等倭票不過一貿易之印記並非行我地方官之文即如現今在京賣紬縀布匹之人與江南浙江買賣人各執互結印記彼此交易無異各關差官員給洋裏買賣人印票亦不過便於稽查而已並非部文又非㫖意如此置議未免太過巡撫既不明白部中亦不明白照此則商人如何貿易以此諭知九卿康熙五十五年九月十八日諭大學士馬齊等朕聞蘇松兵丁習氣甚不好自胡駿到任因其約束嚴峻兵丁幾起釁端總督巡撫提督等恐張大其事未行奏聞潛行消滅至於給餉俱係知縣等微員所以兵丁甚不寧靜此事漢大臣皆知之胡駿先在海島征剿效力漢仗亦好特為兵丁惡習所迫故爾奏請改調部臣未悉此情議將胡駿居官能否之處行查該督甚是但若將此事行查以胡駿改調别鎮則兵丁惡習愈長况崇明處在海島民稠地廣不可無一稍大文官應將江南所屬地方事簡道員一員移駐於此其問九卿具奏康熙五十五年九月十九日聖祖仁皇帝御製文第四集卷八
