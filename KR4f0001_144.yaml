body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷二十七目録北征敕諭諭議政大臣等及大學士伊桑阿阿蘭泰諭大學士伊桑阿阿蘭泰諭議政大臣班第等大學士伊桑阿阿蘭泰諭大學士伊桑阿阿蘭泰諭大將軍伯費揚古諭領侍衛內大臣公福善等諭領侍衛內大臣諭理藩院諭大學士伊桑阿諭大將軍伯費揚古諭副都御史努赫諭大學士伊桑阿諭大學士伊桑阿諭領侍衛內大臣索額圖大學士伊桑阿諭戶部諭理藩院諭領侍衛內大臣索額圖等諭領侍衛內大臣索額圖大學士伊桑阿諭右衛將軍偏俄山西巡撫倭倫諭侍郎安布祿諭大將軍伯費揚古諭山西巡撫倭倫陜西巡撫黨愛甘肅巡撫郭洪諭領侍衛內大臣索額圖諭領侍衛內大臣及嚮導官諭領侍衛內大臣諭山西巡撫倭倫諭兵部諭侍郎安布祿諭員外郎薩哈連諭議政諸臣諭大學士伊桑阿諭大學士伊桑阿等諭大學士伊桑阿諭兵部諭議政諸臣諭大學士伊桑阿諭護軍統領托倫等諭領侍衛內大臣諭大學士伊桑阿諭大學士伊桑阿
