body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻二十八雜著康熙幾暇格物編文章體道親切惟有朱子朕自冲齡留心載籍嗜讀古人之文選秦漢以及唐宋諸名作彚為一書逐篇親加評論名曰古文淵鑒旋授梓頒賜以廣其傳於天下邇年來常置案頭以備溫習茲於避暑山莊萬幾之暇繙閱經史性理諸書復取古文披覽一過其中氣韻古雅辭藻典贍各擅所長固極文章之能事至於體道親切說理詳眀闡發聖賢之精微可施諸政事騐諸日用實裨益於身心性命者惟有朱子之書駕乎諸家之上令人尋味無窮久而彌覺其㫖此朕讀書嗜古閱歴數十年之後有得於心特為拈出善讀書者當必能知之回子地産絲西北回子地方産絲綿以之製甲其堅固勝於中土大約四十層可敵浙江之絲八十層向來不知外國出絲也䝉古居處有定塞外情形不可臆度必親履其境然後能知之古稱蒙古遷徙無常但逐水草而居似乎無一定之所可以任意栖止矣不知塞外地雖空曠亦有水草不能相兼者若有草無水雖欲駐牧於此其勢斷有所不能是知氊廬毳幕常有不定之形而其實則不越乎平日所居之故址也又古人嘗謂春月䝉古馬瘦朕北征時正值春月未見䝉古不能移動倘遇寒風雨雪内地所騎馬騾之類在京中毛已換盡故有倒壞口外地寒其馬冬毛猶在所傷者皆内地之馬䝉古之馬依然無恙此亦古人未親履其地而論之也白龍堆白龍堆古沙磧也漢時為樓蘭姑師地今䝉古部落敖漢奈曼等居其東阿霸垓阿霸哈納爾鄂爾多斯等居其西巴林等居其北四十九家半界於龍堆考邉衛志云龍堆沙形如土龍身髙者二三丈卑者丈餘東倚三危北望蒲昌為西極要路朕時北廵親履其地見所謂龍堆者長者十數丈短者亦三四丈形蜿蜒如龍非可以髙卑論也土人云龍形皆頭向東南尾朝西北騐之信然又其形無定處今日隆然而起者明日已為平沙而或左或右之間又隠隠聚成龍形矣是非僅風力所能𣪚聚葢其靈氣凝結變化無方真似龍耳史志所記未能詳也水多伏流尚書疏言濟水三伏三見水經注言黄河三伏三見桑乾黒水亦伏而再見以為水之脉逺性厚者乃然不知天下之水伏流者甚多不足異也朕每見口外諸小川流而忽隠隠而復流者在處有之故杜甫詩云塞水不成河言其斷續不成通川耳今京師暢春園之萬泉莊平地湧泉匯於丹稜沜循沜而西至西勾注為小溪又南為陂者五六至東雉村東雉村今名慈家務水入地中伏行至六里河重源濬發合聖水龍泉東注拒馬此可按地脉而求者也世人不能隨地考騐故少見多怪眀王嘉謨海淀記但云丹稜沜水忽顯忽隠而未究其隠歸何處魏土地記述當時諺云髙梁無上源清泉無下尾夫有本之水放乎四海寜有一發即竭有源而無委乎是知凡渟而為淵瀦而為澤必有經流潜通暗注故能久而不涸也以類推之海西所謂地下有海亦理之所有者同聲相應審音之道理極平易而闇者不識皆由習焉弗察耳即以人聲論之喜怒動於中聲音達於外當其情動聲發聼者不必觀氣採色可以知其情之為喜為怒也又兩人對語其發聲髙者則應之者亦髙其發聲卑者則應之者亦卑反是則不和矣此即同聲相應自然之至理也惟樂亦然發於何音止於何音為某調為某宫為某字是猶聞人聲而辨其情之何屬也取琴瑟之類置二噐均調一律鼓此器一絃則彼噐虚絃必應推之八音之屬皆然莊子所謂以陽召陽以隂召隂鼓宫宫動鼓角角動音律和矣是猶人聲相感髙卑相應也夫天地精微之理皆在現前而人不能格物窮理朱子所謂愚者不及智者過之也至若清池之方響應蕤賓而躍光宅之塔鈴應姑洗而鳴志籍所載或驚為怪異或疑其虛無此雖皆耳食者然亦因前人之說過於髙逺也朕故以人聲之感應明之亦近取諸身之一端耳回子多元子孫西北回子種類甚多當日元太祖征服回子諸國悉有其地因命諸子分統之是為部落之主嵗月既久語言行事及服食噐用遂習回子風俗無復䝉古之舊而其實皆元之苖裔也阿霸垓鹽鹽之種類不一南方所用海鹽井鹽皆湏煎熬烹煉山西觧州鹽池如耕者之䟽為畦隴引水灌其中俟夏秋南風一起即結成鹽印故昔人以為海鹽井鹽資於人觧鹽資於天也獨阿覇垓部落及張家口外牧圉之地有鹽一種出水澤中不待煎熬而自成亦不待南風而後結土人就近取之其塊大小不等色青黒味甚佳不减於中土所産者始知天生百物以備民用隨在各足禮記所謂天時有生地利有宜也絫黍絫黍之說羣儒辨論紛紜而終無定凖李照以縱黍絫尺而太長胡瑗以横黍絫尺而太短房庶以實千二百黍為黄鐘之長而馬端臨譏其非通論是皆止言黄鐘為九寸而不知此九寸為何代之尺也朕親絫黍測騐今營造尺適符縱黍一百之數而横黍一百止當縱黍八十一而以千二百黍實之黄鐘亦無不合特古者二十四銖為一兩今二十四銖僅半兩耳此猶古之一石乃今之五斗也是知所謂黄鐘九寸者乃周尺之九寸若以今尺九寸求之則失矣而後人各以時尺論之不亦謬乎又古者論黍以上黨羊頭山産者為貴而猶疑嵗有豐歉則黍有大小必求一稃二米者是大不然朕今隨地取黍檢擇大者絫尺為縱為横為銖為兩不爽毫釐葢得其根本則自無差忒因知昔人之定分寸度空徑獨有取於黍者五穀惟黍粒均齊餘則不能無大小之故也溫泉溫泉可以療疾蠲疴人盡知之而不知尤宜於年長之人若四十以内者初浴湯池時反覺氣弱必久而後復葢人至四十以外筋骨少衰氣多收歛得溫和之助自然情神怡暢若少年血脉方剛更以純陽之氣蒸逼之汗液越泄精氣外𣪚不無少損李時珍曰入浴後當大虛憊此未分老少之論也又浴湯池必以七日為期湯之功力始到再静養七日調攝心志導和引元則一身之氣脉充足諸疾自愈張說溫泉箴云若入溫泉居食失節動出輕躁莫之或益傷之者至矣故君子慎微此至言也熬水泉水所發其源流清逺及色味少異者下必有金石之物而溫泉尤顯而易見者也然古人徃徃不能辨如泉志所載云新安黄山是硃砂泉春時水即微紅故也或云硃砂雖紅而不熱當是雄黄臨潼驪山是礜石泉或云礜石不香應是硃砂本草云溫泉下有硫黄氣味雖惡而可愈疾然有一種砒石者與硫黄相似浴之有毒不可不慎夫以一二有名之溫湯千百年來尚不能確指為何泉若遇荒山窮谷之中又何以辨乎是盖未得熬水徴騐之法也朕每遇溫泉即以銀椀盛水隔湯用文火収煉俟椀水乾觀水脚所積或為礜石或為鹻鹵或為硫黄等皆判然分曉且視所積之輕重而水性之清濁及浴人之損益皆可知矣較之昔人懸虛擬議辨之於色香味而究無捉摸者不實可據而足憑乎朝鮮紙世傳朝鮮國紙為蠶繭所作不知即楮皮也陸璣詩疏謂之楮桑又曰江南人𢷬以為紙光澤甚好葢以其形似桑也朕詢之使臣知彼國人取楮樹去外皮之麤者用其中白皮𢷬煮造為紙乃綿宻滑膩有似蠶繭而世人遂誤傳耶飛狐飛狐産於口外宻樹林中形似狐肉翅連四足及尾能飛但能下而不能上續博物志云飛狐亦名飛生今山陜有飛狐嶺飛狐口當時必以物産得名而名勝志曰有狐食五粒松子遂成飛仙其說荒誕皆因未知天下有所謂飛狐也口外又有飛䑕與飛狐相類特頭尾似䑕形體小於狐荀子所謂鼯䑕五技而窮也此種荆楚間亦多有之惟飛狐獨西北乃有耳馬口柴眀時宫中用馬口柴俱取給於山西蔚州廣昌直𨽻昌平諸州縣其柴長四尺許整齊白净兩端刻兩口以繩縛之故謂之馬口柴康熙初年炊㸑還用此今惟天壇焚燎用之故近世人見之者甚少且有不知其名者聖祖仁皇帝御製文第四集巻二十八
