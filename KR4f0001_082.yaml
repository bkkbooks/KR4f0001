body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十九目録古今體詩四十二首玉河春水後苑漫興倣二王墨蹟紫光閣玉泉春曉夜玉蘭觀苖無意到潭柘詠時景櫻桃流杯亭晚眺有懷曉起再賦夏日水雲榭聞梵聲偶成瀛臺塞外省覽風俗再至紅川避暑紅川秋興曉發虚谷回鑾至鰭鬛口秋雨初霽對月詠史四首仇英青緑畫東巡出都作晾鷹臺集蒙古諸部落慰勞遣之河間即古瀛州地景州觀開福寺塔次徳州即事九河故道平原渡濟水巡幸東省黎庶擁馬瞻拜命訶警者弗禁得以察其疾苦趵突泉登濟南城望華不注登岱百丈崖觀瀑岱頂望月汶水吟蒙隂曉雪沂水渡黄河
