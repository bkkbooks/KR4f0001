body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻十四勅諭諭戸兵二部海洋險逺風濤不測自有明以來賊寇盤踞島嶼出沒靡常為害已久本朝平定閩省逆賊鄭成功竄伏海島侵擾沿海一帶地方雖屢經剿殺未盡根株逆孽遁踞臺灣蠢爾㳺魂尚恣窺伺自滇黔底定賊寇殄除獨兹海外鯨鯢猶梗王化必須用兵撲滅埽蕩逆氛庶海隅安全民生樂業特命施琅為水師提督統領舟師并飭該督調度㑹商相機征剿今克取澎湖已扼險要臺灣逆穴指日殲滅立見廓清凡進剿軍前所需兵餉米折應用器械及修理船隻預備物料各項錢糧所關甚為緊要應差部院堂官一員前往㑹同督撫速為料理不拘何項錢糧儘現在者准其動用毋致貽悮其同施琅進剿官員兵丁著照進剿雲貴事例俱著從優加級賞賚以示朕鼓勵将士優恤兵丁至意應差堂官職名開列具奏尔二部即遵諭行特諭康熙二十二年七月十四日諭吏兵二部向來海寇竄踞臺灣出沒島嶼窺伺内地擾害生民雖屢經剿撫餘孽猶存沿海地方烽烟時警邇者滇黔底定逆賊削平惟海外一隅尚梗王化爰以進剿方略咨詢廷議咸謂海洋險逺風濤莫測長驅制勝難計萬全朕念海氛不靖則沿海兵民弗獲休息特簡施琅為福建水師提督前往相度機宜整兵征進該提督忠勇性成韜鈐夙裕兼能洞悉海外形勢力任尅期可奏蕩平遂訓練水師整頓戰艦揚帆冒險直抵澎湖鏖戰力攻大敗賊衆克取要地立奏膚功餘衆潰遁臺灣懾服兵威乞降請命已經納土登岸聼候安插自明朝以來逋誅積寇始克殄除瀕海逺疆自兹寧謐此皆該提督矢心報國大展壮猷籌畫周詳布置允當建兹偉伐宜霈殊恩施琅著加授靖海将軍封為靖海侯世襲罔替以示酬庸前進剿雲南官員曽各加一級兵丁賞賚一次頃因該提督所統官兵出海進剿勤勞堪念已經照雲南例加級賞賚復思官兵逺抵海疆冒險剿寇非滇黔陸地用兵可比在事官員著再各加一級兵丁再賞一次以示特加優渥至意尔二部即遵諭行特諭康熙二十二年九月初十日諭吏部朕夙夜孜孜勤求治理務期紀綱整肅吏治澄清庶績咸熙民生樂業以㡬郅隆之化部院衙門事務屢加申飭近皆修舉職業勉力清釐惟在外直𨽻各省督撫等衙門積習相沿未盡整飭一切事務不能恪㳟勤勵實心辦理督撫為地方大臣果能潔已率屬公正無私則大法小㢘交相儆惕吏治自當振興閭閻克臻康阜且糾劾官員關係激勸必莅任既久賢否洞知方可據實指叅貪劣知儆向來督撫有入境即行糾叅者既未夙悉官評止據下屬掲報即行題叅則所劾未盡得實徒為具文塞責果係真知灼見自當不時指叅何必拘定遲速又廣西四川地處邊疆選補官員赴任每多遲悮懸缺久待料理乏人著九卿詹事科道㑹同詳議具奏特諭康熙二十二年十月二十六日諭刑部明罰勅法民命攸關必讞決精詳案無畱滯而後聼斷得情民免株累向因刑部等衙門事務審理遲延屢加申飭今積案已完宿弊漸革惟在外直𨽻各省督撫等衙門因循積習怠忽稽遲一切刑名案件有經年不結者有數年不結者或因承審官員不能恪秉虚公妥招定案每多草率含糊希圖苟且完結以致上官屢行批駮沉案積久不清或因上官意有偏狥借端頻行駮審因而營求滋弊顛倒是非寃抑無辜莫由申訴此等情弊皆由聼斷不公完結不速牽連淹滯苦累小民今應作何立法俾在外各衙門痛改積習永絶弊源訟簡刑清克稱平允著九卿詹事科道㑹同詳議具奏特諭康熙二十二年十月二十六日諭戸部陜西西安甘肅等處前當大兵進剿之時轉輸糧糗辦運芻茭一應軍需取給閭里小民由陸路供億勞費繁多今既經蕩平朕心時切軫念康熙二十三年應徵地丁各項錢糧著與蠲免三分之一以昭朕睠念民生勞苦之意又山西崞縣忻州定襄五臺代州振武衞新經地震被災頗重雖經遣官賑濟仍應量行加恩以示軫恤其被壓身亡民人所有康熙二十三年應徵地丁錢糧著與全免其房舍倒壊力不能修者丁銀全免地畝錢糧著免十分之四尔部速行該地方官曉諭小民務俾各霑實惠如有司官役借端朦混私行重徵者或經叅奏或經告發将經管各官從重治罪尔部即遵諭行特諭康熙二十二年十二月十七日諭戸部民為邦本必年穀順成家給人足乃愜朕撫育羣生之意比者巡行近畿見閭里生計僅支日用乃米價漸貴民食維艱又聞河南地方年嵗荒歉所在苦饑小民無以資生恐致流移失所朕心深切軫念直𨽻應作何平糴及勸諭捐輸河南應行緩徴併鼓勵捐輸設法賑濟等項事宜著九卿詹事科道㑹同確議具奏特諭康熙二十三年三月十七日諭九卿詹事科道御史衞執蒲奏請御門聼政或以五日或以二三日為期其意蓋欲君臣之間政事餘暇稍得休息也朕自躬親庶政宵旰弗遑念致治之道務在精勤勵始圖終勿宜有間二十餘年以來於凡用人行政事無鉅細㒺不殫心籌畫早夜孜孜有如一日郊廟禋享必躬執祀事間有不親詣之時皆甚非得已至於内殿齋居幾微悉謹左右􅉏御咸所稔知在朕未明求衣辨色視朝日與大小臣工率作省成用熙庶績近念尔諸臣奏事勞苦少展御門晷刻俾得從容入奏非圖便安邇年海宇敉寕政事漸簡頃復諭部院事務應得歸併者酌量合奏期於簡要清省從此民生日康刑清政肅部院章奏當不期省而自省若必預定三日五日以為奏事常期非朕始終勵精之意也其本内事情著内閣翰林院㑹同九卿詹事科道詳議具奏康熙二十三年五月十一日諭大學士勒徳洪明珠王熙吴正治宋徳宜學士席柱喇巴克馬爾圖圖納席爾逹牛鈕金汝祥吴興祖王鴻緒范承勲凡有給過陣亡身價及致祭銀兩後因事故扣追者至陞遷之間停止之俸并所裁缺汰兵餉其中情事䝉混多端錢糧出入動關國計自應極其明確以杜隠冐重支之弊著交與吏戸兵三部確議具奏康熙二十三年八月二十三日諭大學士勒徳洪等向令開海貿易謂於粤閩邊海民生有益若此二省民用充阜財貨流通各省俱有裨益且出海貿易非貧民所能冨商大賈貿遷有無薄徵其稅不致累民可充粤閩兵餉以免腹裏省分轉輸協濟之勞腹裏省分錢糧有餘小民又獲安養故令開海貿易今若照伊爾格圖等所呈給與各關定例欵項於橋道渡口等處概行徵税何以異於原無税課之地反増設一關科斂乎此事恐致擾害民生尔等傳諭九卿詹事科道㑹議具奏康熙二十三年九月初一日諭戸部朕軫念蒼生勤求治理邇年以來於畿輔郡縣時行歴覽補助兼施今俯允廷議諏吉東廵正欲體察民情周知吏治一應沿途供用皆令在京所司儲備無缺毫不取之民間猶恐地方官役不能悉體朕懐借端支應妄行濫取今特加申飭如有悖㫖私征一經發覺定行從重治罪更念朕此番廵歴原以俯恤編氓問俗觀風於閭閻休戚務期洞曉凡經過地方百姓須各安生業照常寧處毋得遷移逺避反滋擾累尔部即行令該地方官於府州縣城市邨莊窮鄉僻壤大張告示徧行曉諭務令通知以副朕惠愛元元之至意特諭康熙二十三年九月二十日諭大學士明珠王熙朕夙夜孜孜勤求治理深宫寧處軫念閭閻諏吉時廵省觀民隐經行所至登於泰山至聖遺蹤緬然可覩一覽衆山臨眺九有洵足攬天下之勝察造化之竒遂援筆濡毫書成普照乾坤四字可於孔子小天下處建亭懸額復書雲峰二字可於極頂處磨崖勒石其本年泰山香税免解該部用以鳩工庀材䖍修泰山頂上各廟應行事宜尔㑹同該撫確議具奏康熙二十三年十月十一日諭大學士明珠三冬時令嚴寒窮苦小民恐其無以資生餬口故於五城地方各支銀米設厰煮粥散給貧窮戸口原係朝廷撫恤小民之意今奉行日久經管各官視為具文虚應故事以致貧民嗷嗷待哺罔獲宿飽其令部院即嚴飭廵城御史及司坊官員必令親視散給毋得假手胥役侵漁虚冒務俾小民均霑實惠部院堂官仍不時稽察如有故違者題叅治罪以副朕愛養窮黎至意其令戸部都察院實心奉行康熙二十三年十月十六日諭大學士明珠王熙明太祖一代開創令主功徳並隆朕廵省方域将及江寧鍾山之麓陵寝斯在朕優遇前代况於其君實賢可祀之如禮内閣禮部太常寺㑹議具奏康熙二十三年十月二十五日諭大學士明珠尚書介山明太祖陵已遣官致祭但朕既抵江寧距陵非逺欲至其處親為拜奠具議以聞康熙二十三年十一月初二日諭大學士明珠總督王新命明太祖陵寢歴經年世幸本朝加意䕶守鬱然無恙朕躬詣奠祭典數優崇今車駕将旋圖善其後尔等可傳諭守陵太監及陵戸朝夕敬慎廵視罔輟灑埽維勤毋令附近民人旗丁恣行蹂踐其在陵守視人等特加賞賚以示恩恤彰勸厲焉特諭康熙二十三年十一月初二日諭江南江西總督江蘇廵撫明太祖天資英武敷政仁明芟刈羣雄混一區宇肇造基業功徳並隆其陵寢在鍾山之麓係江寧所屬地方向已有㫖令有司各官春秋致祭嚴禁樵採并設有守陵人戸朝夕廵視但為日已久不無廢弛今朕省方江寧親詣拜奠見墻垣傾圮林木凋殘皆係無知民人不遵約束恣肆作踐往來行走殊違法紀嗣後尔等督令地方各官不時廵察務俾守陵人役用心防䕶勿致附近旗丁居民仍前踐蹋所有春秋二祭亦必䖍潔舉行以副朕崇重古帝王陵寢至意特諭康熙二十三年十一月初三日諭吏部尚書伊桑阿朕車駕南廵省民疾苦路經髙郵寶應等處見民廬舍田疇被水淹沒朕心深為軫念詢問其故具悉梗概髙寶等處湖水下流原有海口以年久沙淤遂致壅塞今将入海故道濬治疏通可免水患自是往還每念及此不忍於懐此一方生靈必圖拯濟安全咸使得所始稱朕意尔同工部尚書薩木哈往被水災州縣逐一詳勘期於旬日内覆奏務期濟民除患總有經費在所不惜尔等體朕至意速行康熙二十三年十一月初四日諭江南大小諸臣朕向聞江南財賦之地今觀市鎮通衢似覺充盈其鄉邨之饒人情之樸不及北方皆因粉飾奢華所致尔等身為大小有司當潔已愛民奉公守法激濁揚清體恤民隐以副朕望老安少懐之至意康熙二十三年十一月初四日聖祖仁皇帝御製文集巻十四
