body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十八目録古今體詩三十七首元旦朝罷甲申春謁陵回鑾路經盤山有僧智朴呈接駕詩即用原韻二首春雪晴望康熙四十二年夏秋間恆雨為菑山左尤甚朕夙夜靡寧宵旰焦勞減膳撤樂坐不安席自冬至夏自夏至秋未嘗晷刻少安雖設法拯救幾乎難保幸四十三年二麥大熟秋成頗佳饑者未轉溝壑窮者皆得衣食實非朕之凉德所感賴上天之所鑒祐也故喜而不寐作長歌以示山莊書懷賜大學士詠醫山菊藍雀花靜坐偶成賦得霜葉紅於二月花看運河建壩處題邊景昭鳴禽圖翰林魏學誠該直命大學士陳廷敬出題考得四方無事太平年朕喜其句而偶成四韻立冬微雨雪偶成冬月微雨聞落葉燈月文房戲作園中十種葡萄味甚甘美戲作近體一律以示南書房諸臣乏良醫冬晴題閩粵進貢小香荔枝題墨竹詠燈賦得梅雪爭春臘日季冬南苑十首南苑晚雪總兵劉漢業補授肅州因地逺職重特書御製詩絶句一首賜之以奬武職惜兵愛民之意也除夕晚宴
