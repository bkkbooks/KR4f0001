body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷十一勅諭諭内閣總河報秋汛疏越二十日方到朕屢次臨幸洞悉河上情形如奏報水汛事早到則其中或有所指示猶可及時預防嗣後有奏河工急務者限兩三日飛馳遞送昔年報軍中機務一日馳七百餘里今從河上來二三日内到亦非難事康熙四十五年十月十七日諭刑部陜西秋審案王生彩擬緩決甚當但勘語内止言生彩拉傷李希泉之腎致斃擬以緩決而李希泉前次盜葱割耳之處未經提出不合人命關係重大一字一句不可不慎著改正具奏康熙四十五年十月十七日諭户部錢糧支用太多理當節省否則必致經費不敷彼時又欲議開捐納乎毎年有正項蠲免有河工費用必能大加節省方有裨益前光禄寺一年用銀一百萬兩今止用十萬工部一年用二百萬兩今止用二三十萬必如此然後可謂之節省也康熙四十五年十月二十一日諭大學士馬齊席哈納張玉書陳廷敬李光地前遣護軍統領西柱等往擒假達賴喇嘛及第巴妻子時皇太子與諸皇子及諸大臣俱言一假達賴喇嘛擒之何為朕意以衆䝉古俱傾心皈嚮達賴喇嘛此雖係假達賴而有達賴喇嘛之名衆䝉古皆服之儻不以朝命遣人往擒若為策旺喇卜灘迎去則西域䝉古皆向策旺喇卜灘矣故特遣西柱等前去西柱等方到其地策旺喇卜灘果令人来迎以此觀之若非遣人先徃則假達賴喇嘛必已歸策旺喇卜灘若歸策旺喇卜灘則事有難言者矣至西域回子及䝉古今衰弱已極欲取之亦甚易但併其地不足以耕種得其人不足以驅使且現今伊等已俱降封為王侯恪守法度是以不取此等情事馬齊俱知之尔漢大學士及九卿等想俱未深悉尔等可將朕諭明示九卿康熙四十五年十月二十一日諭大學士馬齊席哈納張玉書陳廷敬李光地朕不但悉知逹賴喇嘛之事回子及邊外䝉古始末與其祖父姓名俱知之昔日達賴喇嘛存日六十年來塞外不生一事俱各安靜即此可知其素行之不凡矣後達賴喇嘛身故第巴雖隐諱不言然觀其啓奏之辭非昔日達賴喇嘛語氣朕是以知其已殁遣使細訪果如所料兩年内乃盡得其欺詐之狀自達賴喇嘛故後第巴遂教噶爾丹各處妄行生事矣康熙四十五年十月二十二日諭大學士馬齊張玉書陳廷敬李光地等觀朝鮮國王凡事極其敬慎其國人亦皆感戴聞其國有八道北道與瓦爾喀地方土門江為界東道接倭子國西道接我鳳皇城南道接海猶有數小島此等地方太宗皇帝定朝鮮之後我兵無處不到以已破之國我朝為之重加營建俾安堵如故是以其國人於太宗皇帝駐軍之地樹立石碑備書更生之德累世感戴以至於今且彼更有可取者明之末年彼始終未嘗叛之猶為重禮義之邦也康熙四十五年十月二十三日諭大學士馬齊張玉書陳廷敬李光地等翻譯之事大有關繫向年纂修實錄校對朝鮮表文滿漢文意總不相符前大學士圖海杜立徳皆惶急呈朕親覽朕兩年苦心尋繹始得將文義完美作史之事殊為重大一字不可輕易増減所以朕於明史不敢自任者亦此故也近日大學士熊賜履以朱子書呈覽其中數語稍有可疑問之熊賜履以為非朱子之言殆朱子門人所記此不過託諸空言猶可矢口而談如係文案供招之事將何以解之信乎垂後之書不可忽也康熙四十五年十月二十三日諭大學士席哈納吏部侍郎張廷樞兵部侍郎蕭永藻田舜年一事關係土司竝於地方督撫提督亦有關係若不究其本末辨其是非則衆心不服尔等到彼可與前都御史梅鋗學士二格同審凡事必共相商酌而行併取該督口供如總督理虧則罪坐總督如土司理虧則罪坐土司惟公平則人心自服尔等至彼處湏出示曉諭衆土司若彼果有寃枉許其出訴尔等收呈詳審窮詰根柢如無寃枉則欽差大臣至彼地提人不解反固守關隘不納公差此特欲反耳竟發荆州大兵立剿之不可持兩端苟且結案也總督叅田舜年事極其狠毒今又欲草草完結何以服人心九卿並不據大體立議首䑕兩端愈非理矣尔等前去若不能辨明此事則於尔等聲名亦大有所係也康熙四十五年十月二十三日諭户部朕子育黎元日求所以休養利濟之道念惟賜租減賦實有裨益於民生直隷各省錢糧次第全蠲一年者業經數舉獨是厯嵗逋負積累加增舊税新徵勢難兼辦縱使少寛民力分年帶輸而督令續完仍多拮据朕睠懷及此深切軫恤是用蠲逋已責大沛恩膏俾閭閻獲免追呼官吏亦不罹叅罰直隷山東積欠錢糧今年俱已蠲免其山西陜西甘肅江蘇安徽浙江江西湖北湖南福建廣東各省自康熙四十三年以前未完地丁銀二百一十二萬二千七百兩有竒糧十萬五千七百石有竒著按數通行豁免或舊欠已完在官而見年錢糧未完足者亦准扣抵諭㫖到日各該撫立行所屬張示徧諭有不肖有司以完作欠朦溷銷算及開除不清者該督撫即時題叅嚴加治罪尔部即遵諭行特諭康熙四十五年十月二十五日諭禮部朝鮮南桃浦漂捐船隻所有黒角等物解送京師殊累驛遞且屬無用蘇木亦不必變價可即令該國王酌量處置所司移文傳諭之康熙四十五年十月二十五日諭大學士馬齊張玉書陳廷敬等山東長山縣周村一帶俱開鑪私鑄廵撫趙世顯不禁不捕反請鼔鑄大錢若不禁私鑄而鑄大錢則大錢重小錢輕小民必思射利燬大錢而鑄小錢是大不利於地方矣今山東奸民鑄小錢者甚多或地方官圖利與之同事亦未可知但未挐獲何可懸擬頃差侍郎恩丕等帶德州兵丁馳驛往長山周村等處捕鑄私錢之人挐獲之後竝私鑄之鑪帶往趙世顯處示之問地方現鑄私錢不禁不捕又欲請鑄大錢何也趙世顯將何辭以對外省督撫孰賢孰否朕俱知之清濁斷不能掩但不壞事不擾地方足矣康熙四十五年十月二十七日諭户部朕念八旗禁旅為國家根本所繫時厪加恩愛養用俾生計充盈或動支公帑數百萬代清積逋或於各旗設立官庫資濟匱絀所以為衆甲兵籌畫者甚切康熙四十二年又曽頒發帑金貸給八旗兵丁共六百五十五萬兩有竒至四十五年冬除陸續扣完外尚未完銀三百九十五萬六千六百兩有竒若仍行按月扣取恐各兵營辦器用贍養室家必有物力不支之慮朕毎懐及此深切軫惻兹特大沛㤙施式𢎞撫育將未經扣取銀兩通行豁免尔部即傳八旗都統等出示徧喻俾咸知朕優恤禁旅至意特諭康熙四十五年十一月十九日諭户部今嵗漢江水大南鄭等縣城垣田舍被水衝沒且米價騰貴小民艱食所有本年應徵錢糧著豁免明年以後地丁錢糧亦著暫行停徵俟應徵收之年該督撫察明具奏起科現在被災人民著該督撫速行賑濟康熙四十五年十一月二十日諭刑部厯年以來内外監候緩決人犯二百二十五名俱著免死減等發落在直隷各省者尔部即移文各該巡撫令遵㫖速行康熙四十五年十二月二十一日諭吏户兵工四部朕念黃淮兩河工程為東南要務屢次躬臨河上相度指示一切修防疏濬業已次苐奏功昨嵗河漕督撫諸臣詳勘地形請於溜淮套别開河道直達張福口以分淮勢朕欲即令動帑興築而督撫諸臣又以事關創建合詞請朕親閲九卿等集議復再三陳請朕以諸臣之言奏聞皇太后皇太后懿㫖謂河事重大允宜親臨指授朕祗遵慈命擇於康熙四十六年正月二十二日起行閱河舟楫往返不御室廬日用百需取辦内府經過府州縣毋得更以預備行宮供張御用冐侵庫帑科斂閭閻儻有不遵事覺定嚴加治罪其文武大小官員私相餽問隨從人役生事擾民及奸惡挾私告訐者俱如屢次諭㫖重罪不宥尔等部即轉行各該督撫通飭所屬張示徧喻俾咸知悉特諭康熙四十六年正月十三日諭扈從視河諸臣及總河衆河官等從前見所上河圖謂於運道民生必有裨益故屢次下㫖不必親閱即昨日到武家墩尚謂溜淮套河若開成則徐光啓功亦不小乃今日所見與圖中所繪絶不相同所立標竿有壊人田廬者有毁人墳墓者若總河及河官墳墓被人掘發肯嘿然坐置不問耶張鵬翮讀書講理學而為此事殊不可解先年靳輔開中河避黃河一百八十里之險確有成效至今人追念之其所開之河實因舊河疏濬今則鑿山開嶺不惟成功甚難即使功成將來汛水泛溢不入洪澤湖必有衝決運河之事矣明時淮黃與今迥别明之黃水勢强淮水勢弱故毎有倒灌之患朕甲子年閲河時兩河形勢記憶甚明後經漸次修治今淮强能敵黄矣然疏導湖水尚宜講求與其開溜淮套無益之河不若將洪澤湖出水之處再加寛深使淮流益暢更為有益現今帑藏充裕若果有益於河事即發千萬金亦所不惜觀蔣家壩天然壩一帶舊有河形更加挑浚深通俾商民船隻俱可通行豈不勝溜淮套百倍耶康熙四十六年二月二十日諭扈從大學士馬齊張玉書陳廷敬等溜淮套事督撫等奏請開濬真可謂輕舉妄動此間百姓甚是謹厚老成朕初問時但云倘若當開自邀聖鑒若不當開自然不允小民惟有静聼及聞停止開河一蹃百姓無不欣喜踴躍可見小民自有公論在也尔等可寫一諭㫖曉諭衆人康熙四十六年二月二十一日諭户部耗贈米石若不預行支給則旗丁必至困苦即所運漕糧一無掛欠回省而不肖官員竟不按數給與旗丁侵蝕入已亦未可定趙申喬將耗贈米石預給旗丁甚是尔部照戴璠條陳具議不合此事著仍照舊例行康熙四十六年三月初五日聖祖仁皇帝御製文第三集卷十一
