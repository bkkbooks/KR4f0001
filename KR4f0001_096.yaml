body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三目録敕諭諭户部諭大學士明珠諭內閣諭大學士勒德洪明珠王熙吳正治宋德宜學士麻爾圖牛鈕禪布吳興祖王起元徐乾學韓菼諭大學士勒德洪明珠王熙吳正治宋德宜學士麻爾圖牛鈕禪布吳興祖王起元徐乾學韓菼諭大學士勒德洪學士麻爾圖諭户部諭政治典訓總裁大學士勒德洪明珠王熙吳正治宋德宜户部尚書余國柱左都御史陳廷敬諭吏兵二部諭禮部諭大學士勒德洪明珠王熙吳正治宋德宜學士吳興祖王起元徐乾學韓菼諭刑部等衙門諭吏部諭吏兵二部諭禮部翰林院諭吏部諭吏部諭內閣諭刑部諭大學士勒德洪明珠王熙吳正治宋德宜學士麻爾圖牛鈕禪布蔡必漢噶思泰
