body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四敕諭諭河道總督張鵬翮此間邵伯更樓地方舊日被災形狀與山東飢民無異豈朕今日觀此地安居景象而忘山東之飢民乎朕念運糧賑濟事不可緩乘今日順風爾作速回清江料理轉運截留漕糧差官前往山東散賑至距揚州十五里沙壩橋河道情形朕自細閲回鑾時靣諭爾知之康熙四十二年二月初七日諭偏沅巡撫趙申喬湖南地方介在邊遠之境聞向來官吏積習相仍無藝私征種種不一計每歲科派有較正供額賦增至數倍者有司徵收錢糧加取火耗又視别省為獨重百姓窮蹙不支致多流離轉徙非將宿斃逐一剔除無以砥礪官方大蘇民困除從前已往諸事姑免察究外爾到地方嚴飭大小屬員痛改前非洗心奉職力減加耗盡革私徵務使流移者復返鄉閭守業者獲安隴畞庶副朕軫念遠省民生至意如仍有藐法不遵重為民害者即據實糾參從重治罪決不輕宥特諭康煕四十二年二月十二日諭扈從大學士馬齊張玉書學士色德里劉光美趙申喬分文不取信然但朕至杭州咨訪百姓言趙申喬好收詞訟民多受纍大凡居官固貴清亷尤必和平乃為盡善如果好收詞訟刁民興訟者必多縱使即為審理其被訟之人一家産業已蕩然矣如此民何以堪聞阿山亦喜受民詞總之為督撫者務以安靜不生事為貴耳康熙四十二年二月二十日諭扈從大學士馬齊張玉書學士色德里劉光美起居注揆敘滿保凡人告訐之言未可盡信朕所見事多矣試舉一事爾等共聽之昔年朱瑪喇奉命往擒于七時阿哈碩色曽以司官同往忽有一人出首于七隱匿在彼村中大兵即往圍其村村民不納知縣窘甚祼體入村謂衆人曰以爾等隱藏于七是以大兵來圍爾等可速將于七送出村人曰村中實未藏于七如不信試遣人入搜之大兵入村遍搜果無于七首告之人即指村中一生員曰此即藏于七之人也朱瑪喇遂執而殺之首告之人乃笑而言曰此人並未藏匿于七實與我有仇是以告之今既殺之我願畢矣縱殺我亦無怨朱瑪喇憤極又執首告之人殺之人情之可恨如此彼時知縣身亦受傷無辜百姓亦有被殺者阿哈碩色曽向朕泣奏此事夫害人者身受顯戮宜矣而無辜之人橫罹荼毒曽謂告訐之言可輕信乎康熙四十二年二月二十二日諭河道總督張鵬翮王公堤關係運道民生最為緊要堤岸單薄樁工漸朽應再加幫以資捍禦不可因淤灘可恃而忽之也康熙四十二年三月初二日諭河道總督張鵬翮高堰工程關係重大保守最為緊要朕今日乘舟由洪澤湖閲視見有殘缺石工以葦草鑲填儻遇水發危險堪虞至六壩見新修石壩堅固方慰朕懷其殘缺石工著即興修乘水未長之前完工用資捍禦至高家堰防險之人用候選縣丞經歷等微員此不過例監書辦出身家産微薄儻有疏忽干係不小須於候選官員內擇其職銜稍大身家殷實者委令防險如此則彼知自愛身家又有選用之望自然盡心防守有禆工程康熙四十二年三月初三日諭河道總督張鵬翮王家營對面鮑家營應開挑引河泄黃河泛漲之水以保障清江淮安地方著即行興工仍兩岸築堤以衛民田康熙四十二年三月初三日諭河道總督張鵬翮清口西壩乘此水淺時再加長數丈有益又半路劉河流掃灣堤岸單薄應築挑水壩康熙四十二年三月初四日諭內閣九卿等朕此番南巡遍閲河工大約已成功矣曩時總河于成龍不遵朕指授修築故未能底績今張鵬翮一一遵諭而行是以成功向來黃河水高六尺淮河水低六尺不能敵黃常患淤墊今將六壩堵閉洪澤湖水高力能敵黃則運河不致有倒灌之患此河工所以能告成也朕自御極以來無時不以民生為念雖纖悉之事不肯怠忽今四十餘年矣四海乂安民生富庶河工適又告成朕欲頒詔天下大加恩賚故星夜回鑾詔內款項爾等可會同詳閲有應增入者即議增入康熙四十二年三月十六日諭內閣頃朕往察河工原任侍郎任克溥於山東途次迎駕見其年將九十現在諸臣未有如其久者朕深為眷念著加刑部尚書銜以示優遇老臣至意可諭吏部知之康熙四十二年四月二十三日諭工部王起元等工程既竣著令回京張鵬翮疏內稱髙承爵工尚未完朕今歲南巡遍閲河工見高承爵所修工程水深成潭難於修築高家堰所關甚要儻工程有悮縱重治高承爵罪於事何益著移文總河張鵬翮如此處可修則另派委賢能官修築如不可修則宜另築越堤所用錢糧仍令高承爵發給康熙四十二年五月初四日諭禮部國子監文廟現敕廣善庫官員動帑修理順天府學尊經閣等處亦著一併督修用宏文教康熙四十二年五月十九日諭內閣各省督撫俱係朕簡用之人今以督撫所舉劾人員復行更張令九卿詹事科道逐一稽察能保九卿詹事科道比督撫盡皆公正耶若此反多夤緣將益增紛擾許志進條奏必有情斃所請不準行下所司知之康熙四十二年五月二十三日諭户部洪澤湖水勢洶湧更甚於大江黃河之水這失風漂沒漕糧準從寬豁免嗣後糧船經行洪澤湖失風者著照大江黃河漂沒例定議奏聞康熙四十二年七月十五日諭大學士九卿詹事掌印不掌印科道等官六月內因有二王之事朕心不勝悲慟至今猶未釋然又兼災祲頻告愈加憂鬱身體不安頃往坐湯泉始得稍解仍未全愈至於飢民救養之計未嘗時刻不厪於懷近有李煦人來詢知郯城至泰安田穀稍有可望由泰安至德州被災甚重今歲口外田穀大收口內各處田禾俱屬平常合共計算所糶之穀必不能多今應將漕糧多行截留於山東沿河州縣村鎮有名馬頭俱各存貯其捐納事例雖廣行無濟於事且日後必至紊亂東省人民現今乏食總使行此數事民有大半至於逃亡朕意八旗滿洲蒙古漢軍佐領一千有餘每三佐領下共出一人可得三百人每三佐領借與銀三千兩餘外捐助車輛駱駝頭口分派各州縣仍照前去人員養至來年七月及今八月內可以到彼况前往撫養地方民人甚有禆益今雖疊被災傷民人仍帖然未動此即有益之效也這事情爾等可確議至東省今歲錢糧漕米俱應速行停徵著議奏為此手書特諭康熙四十二年七月二十七日諭户部賑濟東省飢民事關緊要應差大臣分為三路每路差大臣一員將先派去人員一併往返巡察於事有益自泰安至郯城為中路著穆和倫去自濟南至登州為東路著辛保去自德州至兖州東昌濟寧為西路著卞永譽去截留漕糧關係緊要總漕桑格現今無事令作速前來親看截留其賑濟飢民人員所領雖係公物而勉力自效有濟於民事成回時著一併議敘康熙四十二年八月初二日諭户部邳州等處地方屢被災傷不減於東省但尚有水路可通著該督撫親往察閲應作何速行拯濟一面頒賑一面奏聞俟具題到日將應蠲豁錢糧另議具奏康熙四十一年八月初四日諭東省在京官員朕四次經過山東於民間生計無不深知東省與他省不同田間小民俱依有身家者為之耕種豐年則有身家之人所得者多而窮民所得之分甚少一遇凶年則已身並無田畞産業有力者流移於四方無力者即轉死於溝壑此等情狀爾東省大臣庶僚及有身家者亦當深加體念似此荒歉之歲雖不能大為拯濟若能輕減所入田租以各贍養其佃户不但深有益於窮民即爾等田地日後亦不致荒蕪如果民受實惠豈不勝謝恩千百倍耶這奏謝已悉所司知之康熙四十二年八月十一日諭兵部現今頒發特旨遣養飢民則閭閻小民斷不致有復為盜賊肆行搶掠之事今若特撥兵丁增設於各要路則兵丁食何糧餉以資防守兵丁無糧仍必致於擾民爾部並不詳加籌畫即議將李登瀛條奏準行殊屬草率况地方設立官兵原以衛民其地之遠近衝僻分晰甚明今並未議撥何地兵丁駐於何處又稱官兵應不時出海巡察防緝盜賊並未指令坐何船隻用何處水師殊屬糊塗著再確議以聞康熙四十二年九月十一日諭內閣部院等官朕因山左災荒勞心殫思屢行咨訪山左歲歉非止今歲為然地方官歷年隱匿不報今春朕因閲視河工親見災黎情形始行籌畫賑濟今歲田禾雖云失望尚有薄收之處巡撫布政使為伊等素有欠缺欲巧圖完補故甚其詞以奏報又夤緣科道紛紛急奏言盜賊蜂起人民相食私冀或開事例或撥銀兩因於其中侵蝕託言賑濟而實欲完補虧空以施鬼蜮之謀也朕幾墮其術中今京師遣往三路賑濟人員俱掣簽派撥州縣並不分成災與否一槩散賑遣去人員未奉有稽察諭旨惟視巡撫布政使所指地方賑濟應將此事交與三路大臣加意稽察至於條奏盜賊蜂起人民相食之員亦當明白詢問如盜賊蜂起必有殺人放火搶奪財物糧米之處與失事之人如人民相食亦必有被傷之人與食人之人如有不實即為巡撫布政使急請設發銀兩而言也大學士九卿諸臣會同議奏言官並不實心為民專為巡撫布政起見不誠可愧乎康熙四十二年九月十四日聖祖仁皇帝御製文第三集卷四
