body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻五十目録熱河三十六景詩烟波致爽并序芝逕雲隄并序無暑清凉并序延薫山館并序水芳巖秀并序萬壑松風并序松鶴清越并序雲山勝地并序四面雲山并序北枕雙峰并序西嶺晨霞幷序錘峰落照并序南山積雪并序梨花伴月并序曲水荷香并序風泉清聼并序濠濮間想并序天宇咸暢并序暖溜暄波并序泉源石壁并序青楓綠嶼并序鶯囀喬木并序香逺益清幷序金蓮映日并序逺近泉聲并序雲帆月舫并序芳渚臨流并序雲容水態并序澄泉遶石并序澄波疊翠并序石磯觀魚并序鏡水雲岑并序雙湖夾鏡并序長虹飲練并序甫田叢樾并序水流雲在并序
