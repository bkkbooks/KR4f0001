body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻一勅諭諭河道總督于成龍初六日到清水潭九里等處測量水平㸔得河水與湖水相高二尺三寸九分此一帶隔湖石堤闗係緊要宜速行修築朕在此處歩行㸔工未見一做工人員著察明叅處至高郵等處河水向湖而流河水似高一尺乗黄水未深通之前此等處堤工雖一丈不可忽略不可不急速儹築為此特諭康熙三十八年三月初七日諭河道總督于成龍董殿邦等畫河圖於七月初三日回言爾面色甚瘦如今飲食如何再細觀河圖内要緊應修兩處今特諭爾前在南方曽面諭将人字河芒稻河緊要挑穵聞至今未曽動工若真未動工則大有所失似此遲悮不但運河東堤難保且闗係民生最重及今不上緊挑寛五六十丈斷乎不可為此又專諭爾等又一件河圖内歸仁堤便民閘等口俱已堵塞毛誠舖迤下各口尚未堵塞既将便民閘等口堵塞則毛誠舖等口所出之水由何處洩出必致散漫各處民大受害此處闗係緊要宜速籌一䇿此二事外各處工程修有㡬分並将水勢情形即速奏聞康熙三十八年七月初三日諭河道總督張鵬翮古人治河之法與今河勢不同其最緊要者黃河何以使之深清水何以使之出爾宜詳加籌畫康熙三十九年三月十四日諭工部邵伯更樓決口自去歲奏報後屢據奏稱儹工修築乃迄今尚未報完以致漕艘十有餘隻漂沒擊碎其阻滯江干及瓜揚一帶地方不能前進者甚多漕運闗係重大在工官員所司何事稽遲怠玩至此已極俱著嚴議處分仍行該督設法倍料兼工堵築刻期報完勿致再誤邵伯更樓係船隻往來要地已經衝決十月有餘船隻阻滯不能前進之處漕督桑格並不題報至于成龍故後始行具題殊屬不合著所司一併察議康熙三十九年三月十五日諭河道總督張鵬翮引湖水使由人字河芒稻河入江朕所見最眞爾必須力行不可忽也黃河曲處挑穵使直則水流通暢泥沙不淤爾宜留心康熙三十九年三月十七日諭大學士伊桑阿馬齊前張鵬翮赴任時朕即指示以必毁攔黃壩挑濬芒稻河人字河大抵河工事務非身履其地詳察形勢無由悉知初張鵬翮奏請欲按書上之言試行修築朕諭云爾身至其地親加詳閲則應修之處便可知矣今毁去攔黃壩而清水遂出濬通海口而河勢亦稍減觀此則河工大可望也當于成龍赴任時朕亦曽諭以宜毁攔黃壩誠於彼時毁去早有效矣觀張鵬翮奏章詞簡而意明其辦事精詳可知朕與彼閒論時彼曽云在浙八年每歲錢糧並無缺欠今䝉朝廷擢用之恩無可仰報惟勉令江南錢糧每歲必期完結朕尚止之云爾勿輕出此言萬一不應後則難矣迄今思之彼固有成見也康熙三十九年六月初四日諭大學士伊桑阿馬齊張鵬翮所奏黃河曲處挑穵使直則對岸險工可平此説良是所謂曲處挑穵使直非謂取直於堤外乃兩堤之間自四五里至十里廣狹不一於此内曲者直之耳朕亦曽以此面諭于成龍于成龍之意甚忽視之朕不過暫往巡視于成龍乃久居河上之人毋論朕不能盡知即所深知者亦不可强令所司曲從朕意脱有不虞闗係非小今張鵬翮此奏與朕向時所見甚合朕凡事知者言之不知者不輕言即今邳州呂梁諸處情形如何並未親見若强以為知必致辭窮伊桑阿馬齊爾等俱曽親到河工若所未知者概以為知可乎張鵬翮遇事精勤從此久任河務必能有益康熙三十九年七月初四日諭工部内廷除賞賜外一應工作費用每月需銀不及千兩在外雜項工程何以每月輒用至數萬此中豈無估計浮多支取扣剋之獘觀工部每遇工程所派官員皆繫瞻狥情面請託之人其具題檔案止列總數未詳開細數且修造不堅於三年内倒壞者亦未定有監修官賠補之例在工官員皆苟且塞責餘剰錢糧惟務侵冒入已國家官帑豈可如此虛縻此後凡遇工程必簡選賢能司官引見㸃用務令堅固修造若三年内倒壞亦應定例令其賠補每月具題檔案将派修工程司官姓名及物料估計支用錢糧逐一詳明分晰細數造冊奏聞儻有估計浮多支取扣剋等獘察出定行重處康熙三十九年九月二十一日諭工部歸仁堤修築事宜屢經面諭于成龍最為緊要乃于成龍性偏未行詳㸔遷延時日以至於今觀張鵬翮所奏甚為合理此事所闗至要著九卿詹事科道可作速㑹同詳議具奏及今年黃河水小之時興工毋誤圖併發康熙三十九年九月二十四日諭户部等部沙唬船水手及應用什物現俱全備總河張鵬翮欲用若干著儘其取用将此船隻行文江南總督鎭江将軍委賢能官員押送應用勿致有悞康熙三十九年九月二十九日諭禮部英圭黎船隻遭風飄來甚為可憫著該地方官善加撫恤酌量捐資給足衣食即乗時發還以副朕柔遠之意康熙三十九年十月初七日諭大學士伊桑阿馬齊王熙呉琠熊賜履張英學士滿都邵穆布巢可托舒祿范承烈王九齡曹鑑倫言官風聞言事向曽准行今各省自督撫以下典史敎職以上将軍提鎭以下千把總以上凡官員賢否及闗係民生利病之事科道官有風聞者亦准陳奏設若挾私懷怨或彼此扶同或暗授囑託妄行糾劾者國家自有定例可㑹集滿漢掌印不掌印科道官以此諭諭之康熙三十九年十月初八日諭内閣修築高堰不足銀兩著照該督所請速行撥給乗此冬令水涸作速修築完工勿致遲悞張鵬翮毎事奏請詳明實能宣力若張鵬翮者朕不之信将誰信耶伊若果為利計歴任知府運使巡撫皆可得利既不取於彼豈肯於河工錢糧侵蝕肥已乎其操守亷潔誠不可及惟有時偏執已見耳然朕亦即時戒飭並不寛假也康熙三十九年十月初九日諭工部這修築高堰不足銀兩著照該督所請速行撥給乗此冬令水涸作速修築完工勿致遲悞康熙三十九年十月初九日諭内閣張鵬翮奏修築下河事宜深為得當誠如此修築錢糧節省底績亦易于成龍為修下河曽屢疏具題未得其宜朕俱不允此並非可狥情面之事朕於奏章必是非昭然毫無可疑者方允舉行雖日後有失朕直受之斷不委之他人此等事諒記注官必備載之于成龍在日最有聲勢交與亦廣即爾諸臣誰與抗衡凡于成龍所奏事於理不符者朕皆窮詰不行今張鵬翮所奏事俱合理朕皆照所請行朕並非偏向張鵬翮也初張鵬翮曽奏請改流白馬湖事毫無禆益朕不允行今所奏事實為有益因皆允之朕觀河工之弗成者一應弊端起於工部凡河工錢糧皆取之該部每事行賄貪圖肥已以致工程總無成效張鵬翮亦曽面奏云武弁藉空糧文官賴火耗河工官員别無所獲惟侵漁河工錢糧所以河務無成今張鵬翮所用錢糧俱非部支並無掣肘自到任以來一文亦不肥已正項河銀俱實用於河工此河事所以得有成效也康熙三十九年十二月十九日諭九卿等節宣運河水勢事宜朕曽面諭于成龍于成龍並未遵㫖挑濬今觀張鵬翮所奏甚是悉與前㫖相符即照所請行康熙四十年二月十五日諭直隸巡撫李光地朕歴年省耕畿甸咨訪民隱屢行蠲賑加惠黎元近見霸州大城文安地居窪下被水最甚雖遇豐年民猶艱食其三州縣節年積逋及本年應徵地丁正項爾即将應蠲錢糧細加察明豁免所免數目仍行題報務使眞正窮民咸霑實惠如有勢豪土棍包攬侵冐不肖有司聽胥吏作獘指富作貧假揑災傷以致澤不下究爾據實題叅期於民困獲蘇以副朕愛養軫恤之意特諭康熙四十年二月十五日諭大學士伊桑阿等河工豈可與臺灣並論臺灣係海外之地彼處官員俱屬揀用赴任時不帶家屬獨身前往三年後調陞别地此内有意存焉今張鵬翮奏稱河工官員保守三年不衝決即陞果依此行三年後惟河工官員陞遷其他盡壅塞矣且部中定例亦從此而壞張鵬翮居官清白如此行之尚可張鵬翮之外豈可乎九卿不知此意但視張鵬翮如何陳奏即照所奏議行其不可行之處九卿皆不知也康熙四十年二月二十三日諭大學士伊桑阿等朕以河工闗係緊要時厪於懷凡前代有闗河務之書無不披閲大約泛論則易而實行則難河性無定豈可執一法以治之惟委任得人相其機宜而變通行之方有益耳空言奚補哉今不計所言所行後果有效與否即纂修成書欲令後人遵守不但後人難以倣行揆之已心亦難自信且今之河工雖漸有緒尚未底績果如撲滅三逆蕩平噶爾丹之灼有成功允宜勒之於書垂示後世今河工尚未告竣遽纂成書可乎張鵬翮專任河務纂書之事且不必交翰林院即著張鵬翮彚輯呈覽康熙四十年三月初十日諭大學士伊桑阿馬齊工部議覆河工奏銷因銀數有一兩不符及四兩不符者輒行駮回錢糧數兩不符甚屬微細必待往來申奏然後改正殊覺多事嗣後令該部即移文改正不必煩奏户部此後奏銷錢糧若係十兩以内錯誤者亦俱著行文改正康熙四十年三月十五日聖祖仁皇帝御製文第三集巻一
