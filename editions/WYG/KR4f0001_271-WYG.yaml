body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻三十七雜著古文評論杜牧罪言綜天下之情形權累朝之得失如聚米畫沙不爽尺寸原十六衛府兵與藩鎮相為輕重而唐之興廢即因之溯源窮委論斷獨精戰論四支五敗字字精確而文亦磊砢自喜守論風規峻邁文采燄然燕將傳筆力陡健極似戰國䇿中文字鄭亞唐丞相太尉衛國公李徳裕㑹昌一品制集序本以讚徳裕之制作而益見國家功徳之崇隆品裁宏廓筆墨皆靈孫樵復佛寺奏就國計民生立論與昌黎原道永叔本論義相發明書何易于唐書昜于傳全採此文盖不惟工於序事而褒貶亦至公可信也書褒城驛前幅似主而實賔後幅似賔而實主此文家變化錯綜之法孫氏西齋錄文頗聱牙而是非不詭李商隱為濮陽公檄劉稹文淹通朗盡文之以姿法勝者羅隱上招討宋將軍書氣甚清疏頓挫處自然入古陸龜䝉復友生論文書穿貫源流博綜理趣殆從窮經味道中来故絶無揣摹影響之語皮日休請孟子為學科書斥莊老而尊孟子此等議論在唐人中不可多見請韓文公配饗書昌黎衛道之功得此書推尊益覺昭掲宇宙而不朽沈顔象刑解清拔之氣矯然自異五代後唐莊宗冊封呉越國文典贍有則猶足懾强藩之氣李繼岌伐蜀檄體本新藻而氣殊朗俊李嚴聘蜀笏記宣暢威靈使臣之義應爾詞亦雅稱周世宗賜南唐主李景書簡貴得體尺幅中備四時之氣又賜南唐主李景書義指温厚不為逆億伐江南詔嚴毅明正自能使聞者􅋏然王朴平邊䇿中一段議論乃呉之所以敝楚隋之所以取陳也籌畫既善文亦復佳南唐主李昇舉用儒吏詔崇尚儒術立意正大論廷臣勿言用兵勅此篇頗得保境息民之道辭亦警動南唐主李景災異詔憫惻之思正無煩多語答留守周宗乞罷鎮詔鎔鍊雅飭張義方上南唐烈祖書伉爽不羣僣國中之錚錚者江文蔚對仗彈馮延已魏岑文軒軒標舉略無媆靡之習歐陽廣論邊鎬必敗書質言無華論事諧暢潘佑代南唐主勸南漢劉鋹書事大之誠交鄰之道此書兩得之馮涓諫蜀主屢興兵旅疏此亦是節要語然意已周至幸寅遜諫擊毬疏意矯勁而語聳拔田淳言朝政得失疏蜀文類不卑弱豈揚馬之餘風使然耶呉越王錢鏐杭州羅城記涉筆􅈺雅亦有淵渾之氣丁思覲諫楚王馬希範書名義森嚴故辭論侃侃宋太祖諭輔臣詔承五代僭亂之後故以慎刑辟肅紀綱為要平刑詔明罰勅法情見乎辭下孟㫤詔誼本寛大詞亦温藹禁獻羡餘詔英明語正不在多禁鑄銅詔真懇之意溢於行墨治河詔簡要極有體裁江南平下詔骨秀神腴雅詞令則太宗非課最不書勞績詔明達治體有禆黜陟之典限日決獄詔深得古人無留獄之意禁喪葬舉樂詔事闗教化之本故言之不厭其詳戒許王元僖等詔可作一篇家訓讀止尊號詔撝謙之語出於至誠答樊知古詔起勢甚突兀詞義亦深確而不詭於正選寺監官詔古雅有則不類浮靡之音平權衡詔語本周官彌覺簡貴議立贖法詔本欽恤以為心故言之􅉃怛賜上官正手札辭約而理綜申理冤滯諭不為督責之辭而勸勉諄切仁者之言藹如也答李至詔明暢修潔真宗順時行火詔事既近古文亦爾雅可觀切責陳堯咨詔辭雖峻切而意却寛厚仁宗戒貢士進學詔廣勵人才深得激勸之道恤刑詔有益明允之治禁按赦前事詔詞㫖温厚意在蠲滌煩苛立制科舉詔制誥文以健筆為之便爾生色給致仕官奉詔曲體人情言之懇惻改定樂制詔淹雅之詞出之鄭重昇平氣象穆然可思戒百官詔琢句近古以遒勁為工頒樂名大安詔制作闗乎典禮有此大雅之篇庻足以鋪揚鴻業戒飭轉運使詔能悉俗吏之弊故明透乃爾戒百官詔崇尚寛裕足以敦礪薄俗賑濟災傷路詔中誠惻然形諸言表儆百工敦實行詔治體貴乎惇大此詔得之頒乆任格詔留心吏治播為令辭英宗飭百官詔措詞雅潔亦覺陳言務去飭舉人制氣體頗似兩漢聖祖仁皇帝御製文第三集巻三十七
