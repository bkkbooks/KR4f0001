body:
  text: 欽定四庫全書聖祖仁皇帝御製文集總目卷三十一古今體詩五十二首元旦上元覽貞觀政要慈寧宮問太皇太后安月昭仁殿春夜賜舊時講學賜撫遠大將軍圖海二首春日夜半琴晚春遊幸感懷河白洋湖船獵水邨鄚州河道喜雨賜寧古塔將軍巴海詩幷序橋望郊外卽事郊外偶作馬上口占複道口占夏日登景山同翰林張英髙士竒作夜靜讀書内廏閲馬夏日同大學士明珠暨諸侍衛過黒龍潭途中作黒龍潭由廣泉寺至臥佛寺山寺晩景咏臥佛寺古樹駐驆碧雲寺碧雲寺臨泉望月碧雲曉起再賦碧雲曉景洪光寺盤道來青軒臨眺二首法海寺瞻皇考御書敬佛二字坐法海寺偶吟賜聖感寺僧海岫駐蹕石景山石景山東望登戒壇下戒壇將至潭柘馬上同髙士竒聮句二首潭柘寺偶作咏潭柘寺竹石景山望渾河卷三十二古今體詩三十九首駐蹕南苑遣使㳟進太皇太后鮮果南苑元靈宮是世祖皇考建南苑行圍德壽寺南苑晩景瀛臺偶作咏水禽雨臨城望夏日有懷内苑立秋前一日晩同左右閒坐進鮮果秋蘭幷序初秋幸西苑觀荷命小舟採蓮臨池觀魚有懷夜至三鼔坐待議政大臣奏事有感而作七夕沙河途中作清河荒亭初秋景山題日精門古硯待曉賜奉命大將軍傑淑二首秋日咏刀海子北紅門秋雨後行圍戯作晾鷹臺南苑閲馬中秋望月賜輔國將軍俄啟詩并序秋日晩景有懷大將軍報吳逆暴死其下賊衆潰散無餘大兵指日進取恢復封疆康熙十七年九月初十日奉太皇太后臨御温泉㳟紀五言排律八韻駐蹕平家灘潞河曉起至太皇太后行殿問安見鴈南飛駐蹕薊州城南遠眺山邨山中獲野禽㳟進太皇太后曉起山路口號卷三十三古今體詩三十六首㳟謁孝陵太皇太后駕到温泉雨後經明總兵戚繼光所作八角石亭清晨入盤山二首古中盤望蓮花峰盤山絶頂三首晚過李靖菴二首星出歸營奉侍太皇太后臨御温泉因孟冬享廟暫回京夜半覽本山中曉色由鮎魚池出關咏瀑布水登景忠山灤河冬至囘京齋戒夜坐登邊城作温泉行温泉流杯戱作南苑橋上大風雪景山積雪侍衞下趨如飛元旦慈寧宮行禮春上元幸萬善殿戯作收復岳州作并序㳟上太皇太后萬壽詩二首賜大將軍安親王岳樂二首賜䕶軍統領桑格春夜月題周文矩畫說劒圖卷三十四古今體詩四十首春日郊行清明登玉泉山時廵近郊憫農事有作鄚州雜詩五首春日内苑賜宴詩并序初夏登樓臨水夏日同三王慈寧宮請太皇太后安夏旱步禱南郊喜雨五日泛舟賜内大臣侍衞宴詠蟬題蘇軾墨竹初寒懋勤殿古榦梅春曉春雪懋勤殿讀尚書至無逸篇有作春晝二首景山春望橊花咏觀天儀器鶴經筵進講周易秋日出郊觀稼題張擇端清明上河圖長至日祀天圜丘有述四章遠望西山積雪春盤端凝殿齋居賜直𨽻廵撫子成龍并序苑西新栁二首和唐太宗咏桃花即用原韻卷三十五古今體詩二十一首潞河三首廵幸出喜峰口過黃土巖大石磯塞上宴諸藩入喜峰口野望夏日迎薫亭午日夏日潭柘寺戒壇臥松蚤秋新霽夜坐瀛臺天津通惠河閲運艘滇平宮門聽政示閣部諸臣昇平嘉宴同羣臣賦詩用柏梁體并序元夜與諸王宴飲乾清宮
