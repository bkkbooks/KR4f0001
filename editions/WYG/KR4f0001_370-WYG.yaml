body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻三十五目録古今體詩三十三首春日即事曉發蘆溝六里橋鐡柱水村春水滿四澤舟中觀獵仲春聞雁閱永定河隄有序絡緯飬至暮春五十五年三月下旬園中桃杏玉蘭梅花齊放其中玉蘭茂盛可觀特請皇太后一閱去嵗三冬有雪至三月間農忙之際二十七日夜雨竟夕喜而成詠賦得隴麥五十五年冬謁陵作春幸風阻駐蹕白洋湖偶成小滿後偶旱途中祈雨四月二十三日甘霖大霈晚夏偶成憶揚州天寜寺竹七月十六日賜九十一嵗老和尚題畫澤卜尊丹巴胡土克圖老喇嘛上夀未開新荷戱題千里眼賜松江提督趙珀緑金蓮花賜老大臣蘓州廵撫吳存禮山莊四季冬至不能全禮病中偶爾問及工部尚書翰林院掌院學士徐元夢乃同學舊翰林康熙十六年以前進士再無一人矣率賦一律以遣悶懐
