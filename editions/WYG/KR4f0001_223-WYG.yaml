body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷十三勅諭諭户部江南地方頻年雨暘時若百穀順成閭井黎氓咸得遂生樂業但民間夙鮮葢蔵禦荒無術一遇歳歉即有匱乏之憂朕屢次南巡素所洞悉今年自夏入秋雨澤愆期該督撫先後奏至因念小民久未被災驟罹荒旱所闗甚鉅隨命九卿等速同詳議應行事宜業經勅令停徵并發倉穀賑濟顧倉儲數少未足徧給惟各州縣截留漕米可以實恵及民目下時已届冬總漕桑格無事著㑹同總督邵穆布巡撫于準親歷各州縣被災地方備加察勘將今年所徵漕糧毎州縣或留八九萬石或留十萬石酌量足支賑給之數分别多寡存留支㪚及今漕米尚未開兊截現收之糧以濟待哺之衆實於民生大有裨益此朕殷殷懷保赤子軫念如傷之至意尔部即移文該督等實心奉行仍開具賑濟實數奏聞特諭康熈四十六年十月初七日諭内閣今觀部院衙門司官甚是不及京察甄别既經停止若不考察漸至廢弛司官雖稍能辦事儻行止不端豈可容留其不能做稿説堂者亦應革退尔䓁俱係大臣這次考察不可互相狥情或從此衙門遷轉扵别衙門時日未久彼此不能悉知著九卿㑹同考察分别奏聞康熈四十六年十月二十三日諭户部江浙地方賦役殷繁倍扵他省朕屢經巡歷時切軫懷比年以來業已節次敷恩頻行蠲貸頃因兩省偶被旱災隨命按數減徵豁免漕欠竝分截本年漕糧令該督撫親往㪚賑猶念民間素鮮儲蓄生計不充非更加格外滋培則荒歉之餘未能驟臻康阜兹特再施膏澤用𢎞休養康熙四十七年江南浙江通省人丁共額徵銀六十九萬七千七百餘兩著悉與蠲免其今年被災安徽巡撫屬七州縣三衞江寧巡撫屬二十五州縣三衞應徵地畝銀共二百九十七萬五千二百餘兩糧三十九萬二千餘石浙江二十州縣一所應徵地畝銀九十六萬一千五百餘兩糧九萬六千餘石四十七年亦俱著免徵所有舊欠帶徵銀米竝暫停追取俟開徵時一併輸納務使小民一歳之内絶跡公庭安䖏隴畝俾得優游作息經理農桑庶㡬閭閻氣象可以日加豐豫諭㫖到日該督撫體朕孳孳恵愛黎元至意各飭有司實心奉行仍張示通曉令咸知悉儻蠲除不實致有侵冒察出定治重罪尔部即遵諭行特諭康熙四十六年十一月初二日諭内閣福建内地之民住居臺灣者甚多比來洊罹災䘲米穀不登在土著之人猶可採捕為生内地人民糧食匱乏在彼地既難以自存欲回故土又逺隔大洋前來無力如此情事誠為可憫著行文該地方官察明情願復歸鄉土者或遇兵丁換班之船或遇公務奉差之船令其附載帶回原籍康熈四十六年十一月十一日諭内閣拐賣人口者從重治罪扵理極當但買主不治重罪則人何由知警拐賣之事亦何由止息嗣後有買主審實知情者或併妻子解京或充發逺省則買人者知所畏懼必細察來歷始買而拐賣之事亦決少矣可令該部定例通行康熙四十六年十一月十九日諭工部在河各官應酌量才具堪用及有身家人員方可給帑辦工屢經奉㫖如楊芬等無籍㣲員輕令領帑致有虧空殊屬不合嗣後凡河官虧帑無追者河道總督及該管給發錢糧官員應作何䖏分賠補著一併定例奏聞康熈四十六年十一月二十日諭内閣廣東巡撫范時崇題運使陸曽虧空庫銀著落誑報之御史鄂洛䓁賠償九卿議准行甚不合理鄂洛等誑報之咎但當議處而已以陸曽虧空之庫銀責令鄂洛等另自照數全賠可乎應著落陸曽勒限追賠如限内不能全完再議分賠為是前者張霖案内有不當賠償之項議令賠償朕亦謂不合於理而免之此等不應追賠者部議雖准朕斷不允行康熈四十六年十一月二十三日諭内大臣大學士九卿等郊祀大典諸臣以天時嚴寒請朕勿親詣行禮朕巡行塞外水土極其調適駐蹕暢春園水土亦佳是以身體彊健歩履安和毫不知倦竝無頭眩足痛之苦雖尋常小疾亦一無所萌若果稍有患苦則即遣皇太子或大臣代行典禮何不可之有今身既無恙可欺妄乎况年齒漸増正欲乘未老之時躬親行禮耳康熙四十六年十一月二十三日諭江浙在京官員大學士張玉書尚書王鴻緒等朕在宮中無刻不以民間疾苦為念恐遇旱澇必思豫防至巡幸各省扵風俗民情無不諮訪即物性土宜皆親加詳考毎至一方必取一方之土以驗試其燥濕今歳南巡江浙見天氣久晴所經河渠港蕩之水比舊較淺即慮夏間或有亢暘之患是時麥田雖甚豐稔然南方二麥用為麯糵者多不似北方專資麵食南方惟賴稲米北方則兼種黍稷粱粟有㩗北方黍稷及蔬菜之類至南方種植者多不收穫此水土異宜不可强也且江浙地勢卑下不雨則蒸濕人不能堪有雨則凉人皆爽豁雖地稱水鄉而水溢易洩澇歳之為患尚淺旱嵗則為患甚劇北方經月不雨亦尚無礙南方夏秋間經旬缺雨則田皆坼裂禾苖漸槁矣喜雨亭記云十日不雨則無禾蓋謂此也江浙農功全資灌漑今河渠港蕩比舊俱淺者皆由素無瀦蓄所致雨澤偶愆濵河低田猶可戽水濟用高仰之田力無所施往往三農坐困朕兹為民生再三籌畫經久之計無如興水利建閘座蓄水灌田之為善也江南省之蘇松常鎮及浙江省之杭嘉湖諸郡所屬州縣或近太湖或通潮汐所有河渠水口宜酌建閘座平時閉閘蓄水遇旱則啓閘放水其支河港蕩淤淺者竝宜疏濬引水四達仍酌量建閘多蓄一二尺水即可灌高一二尺之田多蓄四五尺水即可灌髙四五尺之田準此行之可俾髙下田畝永逺無旱澇矣尔等其以朕意曉喻諸臣詳議以聞康熈四十六年十一月二十三日諭工部朕宵旰勤民視如赤子無一時一事不思為閭閻圖經久之計江南浙江生齒殷繁地不加増而仰食者日衆其風土隂晴燥濕及種植所宜迥與西北有異朕屢經巡省察之甚悉大抵民恃田畝為生田資灌溉為急雖東南名稱水鄉而水溢易泄旱熯難支夏秋之間經旬不雨則土坼而苖傷矣濵河低田猶可戽水濟用高仰之地力無所施往往三農坐困朕兹為民生再三籌畫非修治水利建立閘座使蓄水以灌輸田疇無以為農事緩急之備江南省蘇州松江常州鎮江浙江省杭州嘉興湖州各府屬州縣或近太湖㦯通潮汐宜扵所有河渠水口度地建閘隨時啓閉水有餘則宣洩之水不足則瀦蓄以備用其有支河港蕩淤淺者宜竝加疏濬使引水四達仍行建閘多蓄一二尺之水即田髙一二尺者資以灌溉矣多蓄四五尺之水即田髙四五尺者資以灌溉矣行之永久可俾髙下田畝無憂旱潦此于運道無渉而于民生實大有裨益今漕運總督與江浙督撫方料理截漕㪚賑尔部速移文該督撫䓁令將各州縣河渠應建閘蓄水之處竝應建若干座通行確察明晰具奏尔部即遵諭行特諭康熙四十六年十一月二十九日諭刑部漕船往來河道運丁人䓁夾帶私錢私鹽竝装載一切貨物遇有稽察員役動輙抗拒傷人放火誣賴沿途商民船隻悉被欺凌種種不法之事甚多朕所深悉漕運總督儻不嚴察懲處則運丁恣意横行必致重為民害這案著該督再行確審定擬以為悍丁生事病民者之戒康熙四十六年十二月初九日諭内閣頃部議天保縁事革職其伯爵應照無同胞兄弟者不准承襲但念此職乃撫順額駙李永芳本身軍功所得之職李永芳功臣也其勞績甚著朕不忍使其世職遽銷官檔尔䓁可令都統李正宗傳彼族人詢問何人應襲再來奏聞康熈四十六年十二月二十日諭内閣頃因刑部彚題内有一字錯誤朕以硃筆改正發出各部院本章朕皆一一全覽外人謂朕未必通覽毎多疏忽故朕於一應本章見有錯字必行改正翻譯不堪者亦改削之當用兵時一日三四百本章朕悉親覽無遺今一日中僅四五十本而已覽之何難一切事務總不可稍有懈慢之心也康熈四十六年十二月二十日諭工部河工動用錢糧輒以數萬數十萬計河官當估計時故行浮估以為日後節省之地此皆河工積弊嗣後凡有修理工程河道總督務親詣察勘確估奏聞不可一任河官浮冒侵帑康熙四十七年二月二十一日諭兵部朕南巡時見宣樓等應差船隻甚多在船人夫倚此爲生若盡行裁革則伊䓁資生無路或遇船隻朽壞酌量停修將人夫分撥别船應用或人夫有流亡缺少停其募補漸次裁減庶幾得宜著行文有差船地方督撫將船隻應裁應留數目及人夫作何裁汰確議奏聞康熈四十七年閏三月初二日諭工部朕南巡閱河時見洪澤湖風浪危險隄岸陡立商民船隻觸石損壞傷人甚多朕心時切軫念因特令河臣沿湖堤創設救生木椿自設樁以來數年内竝未損船傷人於商民大有禆益此樁應時加増修愈多愈善嗣後著江寕蘇州杭州三䖏織造毎嵗扵節省銀内各捐五百兩解送總河衙門以備救生樁之用該督逐嵗修理存案不必入奏銷如不實行修理於别項支用者從重治罪康熈四十七年五月初八日聖祖仁皇帝御製文第三集巻十三
