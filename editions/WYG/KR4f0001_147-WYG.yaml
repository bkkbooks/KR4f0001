body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻二十八北征勅諭諭陜西四川總督吳赫朕巡幸沿邉地方詢察閭井生聚及土田沃瘠之狀自晉歴秦經行二千餘里直抵寧夏所以勤求民隐至殷且切惟􅃋方資大河之灌注疏渠溉田宜於稼穡當兹春氣鬯遂正三農盡力南畞之時誠恐有司官員不體朕懷因車駕經臨調遣師旅借辭供億擾累小民既東作之有妨将西成之奚望今一切軍需芻糗俱經儲偫足以資用至扈從人員槩從簡約所有馬匹悉牧放水草善地竝不須以供辦草豆動煩民力尔可傳飭有司禁勿借端妄行科派違者事覺定行處分仍徧諭地方百姓務各安本業廛無廢市隴無輟耕庶不負朕親歴邉圉軫悉民依之至意特諭康熙三十六年三月二十七日諭大學士伊桑阿朕躬親至此地寧夏之官員兵丁去年於昭木多翁金地方拒戰陣亡者察明具奏其議叙之處該部照常議敘外官員遣侍衛慰問兵丁身銀即於此地給發康熙三十六年三月二十八日諭兵部寧夏之兵約至郭多里巴爾哈孫應移文大将軍伯費揚古統兵前來㑹合康熙三十六年三月二十八日諭議政大臣等隨往之大臣侍衞護軍執事人部院官員名數詳悉察明其所需口糧詳悉計算又大臣侍衞執事人員有馬匹羸痩者其馬匹數目及人名數亦詳悉察明其部院司官馬痩者令住於蒙古驛站康熙三十六年三月二十八日諭議政大臣朕差往噶爾丹之使員外郎愽席希筆帖式長夀回來已至喀倫地方格壘沽英攜其妻子已來投降噶爾丹亦遣使前來先行報聞人猶未至俟來到時噶爾丹或來投降或往何處詢問明白然後可以進兵現今孫思克愽濟兵速行文停其進剿待明晰情由行文知㑹之時然後進兵康熙三十六年三月二十九日諭兵部黒龍江之兵効力心切故薩卜蘇奏稱其馬臕肥壮耳朕今日閲城見黒龍江官兵馬匹臕力甚歉乗此難以逺歸伊等遇有調遣朕給與馬匹令彼騎乗伊等之馬一千七百匹令於察罕托海之地牧放遣人送至歸化城征剿事竣伊等仍各乗其馬回至本省甚易如此則草豆既省馬亦有益㑹同薩卜蘇議奏康熙三十六年閏三月初二日諭議政大臣大兵起程少緩則米糧應先運至白塔尔等㑹同運米左都御史于成龍将現有船隻量留渡船餘船皆令載米運至白塔所有水手不甚諳練其黒龍江之兵用船最熟此番運米著領本地水手乗此時運送兩次大兵所携四箇月米糧今自白塔擕帶甚有禆益著㑹同于成龍等議奏康熙三十六年閏三月初二日諭寧夏文武官員兵民人等朕體天育物日以治安為念雖身在宫庭而心恒周四海頃因指畫軍務不憚勤勞逺蒞寧夏無非為蕩滌寇氛綏乂生靈計也縁邉千餘里土壤磽瘠惟寧夏洪流灌輸諸渠環匝巡覧所至甚愜朕懷夫農桑者衣食之夲積儲者殷阜之原尔官吏宜董勸父老子弟三時力田以盡地利比屋勤殖以裕蓋藏縱使嵗偶不登亦可無憂匱乏若夫秦風健勇自昔為然其在朔方尤勝他郡尔等或職居将領或身𨽻戎行尚各勵精鋭以効干城禦侮之用斯國家有厚賴焉至於忠信慈惠服官之良軌孝弟齒讓生人之大經法紀不可不明禮教不可不肅勿以地處邉陲而不治以經術勿以習尚氣力而不澤於詩書總期上率下從庶幾馴臻雅化兹乗輿返蹕距靈朔雖逺而睠念塞垣如在几席尔等誠能敬體朕言将吏協恭兵民咸理生聚日益厚風俗日益淳則疆圉實有攸禆朕心亦用深慰慎勿視為具文辜朝廷惓惓牖導之意欽哉特諭康熙三十六年閏三月初二日諭大學士伊桑阿今寧夏緑旗兵已撥五百人以備征剿如兵不遣行則已若行每名亦賞銀十兩康熙三十六年閏三月初三日諭大學士伊桑阿甘州肅州凉州等處兵士去年與厄魯特拒戰時陣亡被創官員兵丁遣兵部司官一員馳驛前往㑹同該管官察眀原冊給與身銀傷銀康熙三十六年閏三月初三日諭大學士伊桑阿朕巡省方域至於寧夏寧夏之官員兵丁去年於昭木多翁金拒戰陣亡官員兵丁給與身銀外其被創官員兵丁亦察明原冊給與傷銀康熙三十六年閏三月初三日諭将軍馬思哈今噶爾丹勢極困蹙我兵衆多遣用不盡而行路亦覺煩擾鳥鎗護軍六百人前鋒五百人黒龍江兵四百人緑旗兵五百人此二千儘可足用所派前鋒及黒龍江之兵需用駝馬俱經奏明其鳥鎗護軍及砲火兵丁現各有馬四匹之外其各増馬一匹著取所留四百兵之馬添為五匹除有駱駝之人其無駱駝者兩人共給駱駝一隻所需駝馬併帶回四月口糧數目察明奏聞康熙三十六年閏三月初六日諭大學士伊桑阿前往緑旗兵五百人人賞銀十兩其即給與隨朕前來兵士行糧給至某月察明具奏庫勒納等帶來駝騾與兵部㑹看具奏康熙三十六年閏三月初九日諭大學士伊桑阿進剿兵給六月行糧隨朕前來兵給三月行糧其所需錢糧數目察明具奏康熙三十六年閏三月初九日諭議政大臣隨朕前往大臣官員及殷實之人各携帶本身口糧外有願帶官米或幾石或幾斗量其所能携往白塔者令各携至俟携至白塔時給散兵丁其宣示於衆携帶之人所携之數開具以聞康熙三十六年閏三月初九日諭議政大臣等孫思克愽濟所将兵前曽撥三千人念兵馬衆多征行煩苦今選發滿洲緑旗兵二千人其所留兵丁馬匹増給前往之兵携帶四月口糧遣赴阿南達處阿南達李林隆即統領此兵前往搜剿孫思克愽濟率所留之兵蹔住甘州於事理為宜其于成龍運米停駐之所亦應遣兵防䕶可令西安副都統阿蘭泰領西安兵三百人前往駐扎再留駐寕夏之京城前鋒每旗二十人及鳥鎗護軍砲火兵丁量行撥出隨朕前行餘仍令蹔駐寧夏命大臣一人統轄大将軍伯費揚古知㑹附近旗分䝉古王貝勒具子公台吉等有願自備四月餱糧効力行間者即令前來効力又費揚古軍前黒龍江兵一百人竝令帶往酌照四月口糧選察哈爾兵㩦四月糧㑹合於郭多里巴爾哈孫之地咸令統轄其費揚古駐扎之地著舒恕料理侍郎滿丕仍駐扎原處康熙三十六年閏三月初九日諭議政諸臣輓運糧餉及隨營設站之事朕與鄂爾多斯松拉卜貝勒言之彼奏稱青草生時我兵三千能運米設站今應自白塔以外運米設站俱委鄂爾多斯松拉卜貝勒令㑹同于成龍商酌而行白塔以内安設驛站之事交與總督吳赫西安副都統阿蘭泰兵三百名亦交與于成龍其馬思哈等所統之兵若止携帶一月口糧其三月口糧及隨營之米載於船内一次不能全完必須再運則大兵豈可無故守候應令馬思哈等之兵携帶兩月口糧其餘米用船輸運所剰之米衆力携帶儻再有餘剰令于成龍等酌量運至白塔大兵到白塔其間計十二日口糧将衆力駝載之米補給松拉卜貝勒于成龍等隨營逓運之米應抵於何地應停於何地著大将軍伯費揚古叅謀大臣㑹同于成龍商酌定議尔等與于成龍詳議具奏康熙三十六年閏三月初十日諭陜西總督提督巡撫總兵等官朕宵旰勤民慮周遐邇縁向來廵幸未經親歴邉境頃特濟河而西循秦省沿邉地方延覽風俗咨詢疾苦見所在兵民築土室以為居耕沙磧以為業生聚之計甚屬艱難朕惻然於𠂻軫念勿釋因思兵民倚賴全在将吏而将吏之表率惟督撫提鎮是視誠使督撫提鎮實能正已澄源則所屬守職奉公禄足自贍必無朘削兵民之事倘或積習相仍濫受屬員私餽因而所屬官弁節次求索取償於下文官則加徵無藝武弁則侵剋月餉勢不至於厲民剥兵不止如此而欲兾疾苦日蘇生聚日盛烏可得乎夫秦地俗尚素稱簡樸邉方士卒允屬精强總恃撫馭得人斯於兵民胥益朕兹駐蹕寧夏特召該省總督總兵以下官員凡在鎮城者俱賜宴内庭面加諄諭無非期望文武大吏董率屬員以仰副朝廷愛民恤兵至意自今以往尔等其益體朕懷交相砥礪文職皆習知民事豈身作官吏不恤百姓之依武職多起自行伍豈甫為将領遽忘軍士之苦上官克謹廉隅屬員各遵法紀馴至比屋殷阜列戍飽騰則兵民皆得所而尔等亦與有休寵以視厲民剝兵身名俱隕者孰得孰失尔等其敬念之特諭康熙三十六年閏三月初十日諭理藩院護軍統領鄂克濟哈既駐寧夏其現在厄魯特男婦幼稚共三十八名交與鄂克濟哈其所食之物照常給與此後由此路來降之厄魯特俱令鄂克濟哈於寧夏收養來降及各處送來之厄魯特令鄂克濟哈将人名男婦幼稚眀白開具報聞有新自噶爾丹處來人及緊要人将夲人及所送到數明白開具送至行在有指名調取者則照名送來鄂克濟哈所養之厄魯特将來送至何處著候㫖行康熙三十六年閏三月十三日諭議政大臣移㑹大将軍伯費揚古自寧夏前往大兵閏三月十七日起程費揚古可率所領兵以四月初十外十五内至郭多里巴爾哈孫康熙三十六年閏三月十三日諭議政大臣寧夏蘭州兵丁駐防事屬無益此所占營房原皆民居給價撥用者今取原價還官其房仍歸原主議政諸臣㑹同總督議奏康熙三十六年閏三月十三日諭總兵官王化行尔去嵗進剿噶爾丹効力行間人材壯健隊伍整齊勞績懋著大将軍伯費揚古陛見亦曽以効力奏聞緑旗總兵官無預㑹議之例特命尔於今次出師預㑹議事賜戴孔雀翎康熙三十六年閏三月十四日諭大學士伊桑阿等夲月二十三日以前自京送來與自此發往之事仍馳舊驛二十三日之後自京來之事則出沙虎口由新設驛站行自此發往之事則由新設驛站進沙虎口逓送二十三日以後内地舊設驛站外新添馬匹令總督吳赫撤囬其西路驛站著總督整飭康熙三十六年閏三月十五日諭領侍衞内大臣昨日聞處處多有喧雜之聲此皆八旗官兵來㑹於此雖覺喧雜朕含容之此後須嚴禁喧雜又見輜装行路皆無序次此後皆須整肅隊伍毋得妄行康熙三十六年閏三月十六日諭議政大臣羊為軍中所需食物馬思哈等将此羊八千九百十二隻應特委能員於兵未起程乗早寒涼時尋好水草驅送前行乃不特委專官牧養前赴以致羊三千疲乏且将疲乏之羊不委道員等大官而委之把總如此驅送其所存五千九百餘羊一二日之間又将報疲乏矣其送羊隻撥兵多少所委何官亦應察詢尔等以馬思哈等同為大臣故狥情面若朕有何瞻顧耶著再議具奏康熙三十六年閏三月十九日諭議政大臣孫思克所将兵丁衆多自足遣用其固原兵二千又遣往孫思克所則兵丁殊覺煩苦著㑹議具聞康熙三十六年閏三月二十二日諭議政大臣據多羅額駙阿拉卜潭台吉得木楚克奏稱瑚瑚腦爾台吉渣西把圖爾等來朝若於原野之間候其來至大禮亦未相符况四月起程而來邉内途間炎熱若令秋時來朝似為有當議政大臣㑹同阿拉卜潭得木楚克議奏康熙三十六年閏三月二十五日諭兵部原任侍郎趙山交與将軍馬思哈與原任侍郎思格則同趕送牛羊前途或有差遣招降噶爾丹及可効力之處遣伊等行康熙三十六年閏三月二十七日諭議政大臣官米每駱駝令載倉斛一石運至兩狼山大臣侍衞官員執事及殷實之人夲身既不進剿著察其肥壯駱駝載米轉送不必更令乗馬即附駱駝以前駝數著察明具奏康熙三十六年閏三月二十八日諭議政大臣朕自寧夏至此見有死者骸骨皆因去歲運米措處失宜人遭饑餒以致喪亡舊嵗中路進兵各驛站儲偫糧米旋師之時兵卒商旅量行給與未致饑餓死亡今次進兵所闗𦂳要凡事不可不籌畫周詳朕遣往寧夏取米五百石到時留駐於此湖灘河朔向有積貯米粟其大臣侍衞官員執事人䕶軍等寧夏所支兩月之米食至此地者令開除之從此至湖灘河朔所食之米令計數携去其所餘者俱令留此隨來之兵亦著量留命一大臣駐此管轄其駐此之大臣将所留米陸續緩運酌留於各驛站俟回旋兵卒商旅有絶糧者即煮粥食之庶我軍有所接濟矣上駟院閒馬一千四百匹亦留此於好草之地牧放肥壯其回旋之兵有馬匹艱難者給與騎乗而我軍在後疲弱之馬亦可至矣鄂克濟哈仍駐寧夏凡由驛站逓傳之事俱由邊外新設驛站馳送程途既近又無阻滯其總督吳赫所設船站驛站仍照常安設其船站以外令設䝉古驛站議政諸臣㑹議具奏康熙三十六年四月初一日諭議政大臣載米駱駝明早起程令内大臣明珠都統噶爾馬王氷譽率領中途一宿次日到彼明珠即還噶爾馬王永譽留彼䕶守明珠還時将駱駝加意帶囬康熙三十六年四月初一日諭議政大臣自寧夏起程往擒伊拉固克三胡圖克圖之大臣官員兵丁回時西安之兵仍赴寧夏其由西路往擒伊拉固克三胡圖克圖之西安緑旗官兵俱令赴甘州京城之大臣官員兵丁回時或駐於此或赴京城著㑹議具奏康熙三十六年四月初三日諭户部隨來之大臣侍衛官員兵丁執事人等扣回二十五日糧米共計多少此米給與所留二百護軍及官員四月之口糧更餘米多少眀悉詳察具聞康熙三十六年四月初三日諭議政大臣頃諸事俱畢惟噶爾丹孑身僅存大兵搜剿深入不久旋師路必由此今令每站貯米凡師回乏糧者即行支給其商人則煮粥食之投降之厄魯特以及瑚瑚腦兒來降之台吉等俱經此路米石馬匹咸留於此此間料理事務最為扼要朕欲躬親駐此思天下幾政所闗甚鉅朕故回師至領侍衛内大臣原屬禁衞扈從要職數日以來再三籌度此任最重故以領侍衞内大臣索額圖留駐兹地都統阿錫坦噶爾馬王永譽護軍統領蘓赫副都統巴塞亦留此其應料理事宜所留駐大臣與隨朕大臣㑹同詳晰議奏康熙三十六年四月初五日諭領侍衞内大臣舟行時諸臣俱各約束令魚貫而行視前船停泊後船即住自不致喧譁爭競而行時亦不擾亂嗣後大臣各各嚴行管轄康熙三十六年四月初八日諭大學士伊桑阿據山西廵撫倭倫以去歲山西數州縣歉收今米價甚貴奏聞頃噶爾丹殱滅天下悉已無事惟愛養兵民是為要務山西米價騰貴民生困苦朕聞之中懷軫惻扈從前來大臣侍衞官員執事人自船站坐來船隻現有水手至湖灘河朔時此船隻若逆流牽挽回至寧夏甚難曽諭總督吳赫就此船隻将湖灘河朔積貯米或三千石或再加多量行装載遣賢能官順流而下運至保徳州比時價減少糶賣於民大有禆益此事尔等議之待至湖灘河朔奏聞康熙三十六年四月十六日諭大學士伊桑阿朕今日有報遣往京城或内來之報及一切事件俱令由張家口遣發已有諭㫖尔等亦於驛站官員明悉行文令皆由張家口逓送選理藩院司官或筆帖式一人遣往大同收接凡西路賫送事宜俱令由邉外赴送俟朕進張家口時仍由内地驛站馳送康熙三十六年四月二十九日諭領侍衛内大臣今日駐扎之地與蒙古相間雜而處著曉諭我軍以至僕役恐有盜竊蒙古馬匹之人若有盜馬者一經發覺即照蒙古盜我軍之馬一例正法以此交各該管之人通行曉諭康熙三十六年五月初一日諭議政大臣大将軍伯費揚古處有因罪發往軍前効力者今進剿之路伊喇固克三胡圖克圖之人及厄魯特潰散之人處處多有之差往丹卽拉處應用發往軍前効力之人令散秩大臣丹巴前往失於輕忽著㑹議具奏康熙三十六年五月初二日諭議政大臣遣往丹即拉處應差因罪發往軍前効力之趙山思格則等伊等皆素行乖亂善於營求故諸臣瞻狥情面不行差遣致遣散秩大臣丹巴丹巴此行遇兇惡之徒亦未可定今将伊等派一人於丹津汪布處一人於阿拉布攤處各用自備馬匹偕蒙古司官筆帖式前往告以噶爾丹既死即使伊等招降務令阿拉布攤丹津汪布投順與之同來儻事不成或未至其地半塗而回大将軍卽於彼處正法示衆康熙三十六年五月初三日諭太僕寺厄魯特之台吉等馬各百匹散秩大臣等馬各八十匹一等侍衞等馬各五十匹二等侍衞以下閑散人以上馬各三十匹将爾衙門馬羣之馬頒賜康熙三十六年五月初五日諭侍郎安布禄昨日諸王貝勒等隨朕閲視馬羣今特加賜賚阿巴海之多羅卓里克圖郡王達馬林扎卜多羅郡王吳爾占噶拉卜蘇尼特之多羅杜稜郡王逹里扎卜蒿齊特之多羅郡王燕木品爾等馬各五十匹阿巴哈納爾之多羅貝勒卜兆阿巴海之固山達爾漢貝子車嶺敦魯卜阿巴哈納爾之固山貝子額林陳達西等馬各三十匹康熙三十六年五月初六日諭吏部温保居官甚劣苛虐百姓至於已極前乃自奏其居官甚善萬民贊美欲為樹碑由今觀之沿途衆􅞈無有不願食其肉而怨讟之者且温保非比他人彼曽為學士朕愛養百姓之心豈不知之甘度居官亦最庸劣今蒲州民變入山若輩如能素勤撫䘏百姓豈遂抗匿至此倭倫往彼招撫儻不順從欲将温保甘度拏赴彼處正法然後用兵今思其服官汚濁朘削小民殊為可恨此等貪官不加誅戮衆不知儆著議政大臣部院堂官㑹同議奏康熙三十六年五月十二日聖祖仁皇帝御製文第二集卷二十八
