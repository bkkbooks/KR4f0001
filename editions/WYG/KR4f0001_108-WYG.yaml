body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷九目録勅諭諭内閣諭大學士伊桑阿阿蘭泰學士朱都納邁圖西安布顔圖郭世隆王國昌諭大學士伊桑阿阿蘭泰學士朱都納邁圖西安博濟布顔圖郭世隆王國昌諭三朝國史館總裁大學士伊桑阿等諭内閣諭内閣諭戸部諭和碩裕親王福全等諭和碩恭親王常寧等諭戸部諭大學士伊桑阿阿蘭泰學士朱都納西安博濟王國昌諭大學士阿蘭泰諭户部諭内閣諭大學士伊桑阿阿蘭泰學士朱都納西安博濟王國昌諭大學士伊桑阿阿蘭泰學士朱都納西安博濟王國昌諭兵部諭都統瓦岱等諭都統郎談等諭大學士伊桑阿阿蘭泰兵部尚書馬奇學士邁圖西安博濟南塔海諭大學士伊桑阿阿蘭泰諭大學士伊桑阿阿蘭泰學士邁圖西安博濟南塔海傅繼祖
