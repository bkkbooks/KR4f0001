body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻二十六雜著康熙幾暇格物編星宿海黄河發源星宿海後人以星宿之名疑黄河從天上來非也朕嘗遣侍衛西窮河源至星宿海䝉古名鄂孰他臘鄂敦即星他臘即野地上飛泉雜湧成水泡千百從髙下望大小圓㸃燦如列星故名星宿耳朕親征厄魯特時於寜夏回鑾出横城口自船站登舟順河而下至湖灘河所二十一日皆前人未施舟楫之地波流起瀚水色黄濁日光摩盪熌爍如鎔金船中上下人員無不目眩也䝉氣䝉氣離地甚近四十度以上即不用䝉氣表矣故地方髙朗清處皆無䝉氣近有測量地里圖人早行晨雞未發忽見天際如日方升林木村舍依稀辨色湏㬰昬黒如故移時東方始明盖日在地平之下光暎䝉氣而浮上也正如置錢碗底逺視若無及盛滿水時則錢隨水光而顯見矣方音朕廵歴七省土俗民風皆留心體察凢各省分界處其土人語音即異如直𨽻各府所屬聲口間有不同而亦不甚相逺若一入徳州界便是山東語音一入固闗界便是山西語音以至江浙無不如此盖分𨽻各省故也䝉古部落雖多其語言總無大異以咸在郭畢也郭畢即瀚海其地多砂石少草木至其地者一見而知其為郭畢猶至窩集者一見而知其為窩集也窩集者宻樹叢林冬夏不見天日窩集窩集東至海邊接連烏喇黑龍江一帶西至俄羅斯或寛或窄叢林宻樹鱗次櫛比陽景罕曜如松栢及各種大樹皆以類相從不雜他木林中落葉常積數尺許泉水雨水至此皆不能流盡為泥滓人行甚難其地有熊及野豕貂䑕黑白灰鼠等物皆資松子橡栗以為食又産人參及各種藥料人多有不能辨識者與南方湖南四川相類鳥䑕同穴天地之大竒異甚多經典所載必有證據後人因未親知實見故疑而弗信如禹貢導渭自鳥䑕同穴孔安國傳云鳥䑕共為雌雄同穴而處蔡沈謂其說怪誕不經此特蔡沈未嘗身至其地耳張鵬翮奉命往俄羅斯經過地方見鳥䑕同穴事朕曽面詢之知禹貢之言不誣白粟米粟米本草粟米即小米有黄白二種黄者有粘有不粘本草注云粟粘者為秫北人謂為黄米是也惟白粟則性皆不粘七年前烏喇地方樹孔中忽生白粟一科土人以其子播穫生生不已遂盈畆頃味既甘羙性復柔和有以此粟來獻者朕命布植於山莊之内莖幹葉穂較他種倍大熟亦先時作為糕餌潔白如糯稻而細膩香滑殆過之想上古之各種嘉榖或先無而後有者槩如此可補農書所未有也使鹿使犬赫真飛雅喀鄂羅春其稜四種地方在東北海邉其人不事樹藝惟以魚為食以魚皮為衣其地不産牛馬家畜赫真飛雅喀使犬鄂羅春其稜使鹿以供負載皆馴熟聼人驅策往日歸化者甚衆前嵗遣人至彼又有無數野人投順其土俗約略相同也哈宻引雪山水灌田哈宻地方終嵗不雨間有微雨沾土即止亦無霧露惟冬月有雪而毎年庄田豐熟無旱乾之慮者以引雪山之水大者為渠小者為溝足資灌溉非如内地必仰藉雨澤也又其地多暑往嵗有回子二百餘人朕因噶爾旦事發令居杭州常念水土不同恐其不能耐熱及回京時無一人疾病詢之云哈宻土魯畨之熱更甚於杭州但土地髙燥有凉水可以觧暑杭州至三伏時則井泉河水皆温不能觧炎暑耳榖穂變蚊策妄阿喇布坦地方多種水田頗無旱潦之患惟或一年榖穂變蚊而飛撚視之為水或為血朕曽遣侍衛到彼親見其事嘗閱嶺南異物志云嶺表有樹結實如枇杷每熟即拆裂蚊子羣飛土人謂之蚊子樹此與榖穂變蚊之事相類程子曰天下之物必有對即此可見矣土伯特今之土伯特地方想即唐之回紇也徳宗時嘗以公主妻之至今其地尚有下嫁時物以此考之知為回紇舊地無疑石鹽石鹽産於回子地方毎髙山罅隙處多有之嶮峻不能至土人多用箭射取之色潔白眀朗略似水晶性温入火不爆者乃真可以療病與中土之鹽􅒯異又有紅色石鹽産於平地水澤中色微紅可愛土人飲食用此不聞入藥也氷厚數尺漢書有云積隂之處木皮三寸氷厚六尺後人未必深信不知近北極之地氷雪經冬夏不消結氷有至數尺厚者即今黒龍江以北皆是如此古人之言不為無因亦地土嚴寒之所使耳察哈延山黒龍江西有山名察哈延穴竅中白晝則吐燄晚則出火經年不熄近嗅之氣味如煤其灰燼黄白色如牛馬矢撚之即碎亦内地所未聞也南無字義佛經南無二字世人不知西域音義妄以私見穿鑿注觧纍帙盈篇究無一語歸著朕嘗問西土人知彼中以合掌稽首為南無音讀如那摩故經典凡諸佛號皆有南無二字盖云稽首某佛也此說最簡當因思毎見宋元人柬帖其致僧家者題紙尾云弟子某和南和南為頓首猶南無為稽首也達發哈魚達發哈魚黑龍江寜古塔諸處皆有之毎秋間從海而來銜尾前進不知旋退充積河渠莫可勝計土人竟有履魚背而渡者地絶處黒龍江以北地方日落後亦不甚暗個半時日即出盖地之圓可知也近北極太陽與地平週掩無多也朱子云唐太宗收至骨利幹置都督府其地夜易曉夜亦不甚暗盖地當絶處日影所射也又云通鑑說有人適外國夜熟一羊脾而天明此是地平之處日入地下而此處無所遮蔽故常光明以此知古人紀載皆有確據非好為新竒之說也南方物性南方梅杏桃李之類開花結實皆早於北方及至果熟或與北方同時或且有後時者其麥苗二月即已繁茂吐穂亦早宜乎成熟先於北方及較其收穫之期南北䆒無大異即如野草初春雖已長成而結子必待秋令總之南方風土柔緩物性亦復相似故米麵果實之屬食之常難運化朕屢次南廵親加體騐乃知之甚詳彼土著者皆習而不察也山海闗山海闗澄海樓舊所謂闗城堡也直峙海滸城根皆以鐡釡為基過其下者覆釡歴歴在目不知其幾千萬也京口之鐡甕城徒虚語耳考之志冊僅載闗城為明洪武年所建而基址未詳築於何時盖城臨海衝濤水激射非木石所能久固昔人巧出此想較之鎔鐡屑炭更為竒矣哈宻𤓰哈宻古𤓰州近域其𤓰較内地甜羙體甚鉅長尺許兩端皆銳彼國中徧種之毎熟時人惟啖此以代榖食遂覺氣體豐腴有逾平昔剖晒為脯芳鮮歴久不變自彼國臣服以來毎嵗常充供獻中土始嘗此味前此所未有也三門砥柱四十二年西廵過陜州觀三門砥柱盖砥柱一山屹立河中禹鑿之三穿使河出其間有似門狀故曰三門也俗云南為鬼門中為神門北為人門三門之險鬼門為最唐開元時陜郡太守李齊物更鑿砥柱以通漕燒石沃醯開山巔為輓路代宗時調巴蜀襄漢麻枲竹篠為綯以輓上陜運舟至今山上篾索深痕明顯如指前人作為總非後人所能及也雷聲不過百里雷電之類朱子論之極詳無復多言朕以筭法較之雷聲不能出百里其筭法依黄鍾凖尺寸定一杪之垂線或長或短或重或輕皆有一定之加減先試之銃砲之屬烟起即響其聲益逺益遲得凖比例而後筭雷砲之逺近即得矣朕毎測量過百里雖有電而聲不至方知雷聲之逺近也朕為河工至天津駐蹕蘆溝橋八旗放砲時值西北風砲聲似覺不逺大約將三百里以此度之大砲之響比雷尚逺無疑也海魚化麅黒龍江一帶地方毎冬令則有白項野麅從海邉來盈千累萬不可勝數形比内地者微大肉亦肥但其味稍腥想海魚化生之物故與山林所産不同月令云雀入大水為蛤雉入大水為蜃想此類乎石魚喀爾沁地方有青白色石開發一片輙有魚形如塗雌黄或三或四鱗鰭首尾形體具備各長數寸與今所謂馬口魚者無異揚腮振鬛猶作鼓浪游泳狀朕命工琢磨以裝硯匣配以松花江石誠几案間一雅玩也嘗讀水經注及酉陽雜爼言衡陽有石魚山石具魚體宛若刻畫又池北偶談述汧陽縣有石魚溝取石破之兩兩成魚可以辟蠧故宋人石魚詩云相傳此石能辟蠧功在琅凾并玉儲然未有如斯之纎悉克肖者也其與石俱生耶抑魚之化如零陵之燕海南之蟹耶物理之不可全窮又如此山氣海市見之於書人皆知之不知山巒之氣亦然塞外瀚海早行春秋之際空濶之處望之亦有如城郭樓臺者有如人物旌旗者有如樹木叢生鳥獸飛舞者逺觀景象無不刻肖逼視之則不見是皆山氣之所融結可與海市並傳也秦達罕秦達罕産於興安外如索約爾濟等地方即兎類也其形倍大肉味鮮潔春夏時毛色與兎略同至秋末冬初則變白如雪惟耳尖黒頴四時不改足上氄毛甚長盖彼地嚴寒非此則不足禦冬毎當春二三月孳生二次今畜於熱河山莊其毛色更變及孳生之時與在出産之地無異聖祖仁皇帝御製文第四集巻二十六
