body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷二十二北征勅諭諭皇太子二十七日駐蹕於里蘇邨二十八日駐蹕湖灘河朔漢人稱此為脱脱城此即黄河之岸向彼岸仰射之朕躬及皇長子新滿洲與善射者射過甚易波流亦緩不可與南方黄河相比若較天津入海之河甚狹者尤狹二十九日駐宿是日早鄂爾多斯之王貝勒貝子公台吉等渡河來見朕詣河干将河測量其闊五十三丈仰射而過五十餘步於是登舟朕與新滿洲逆流舉棹以試水勢船猶可行惟船之器具不佳不便用力衆䝉古等皆驚訝以為此黄河逆流行舟自我祖宗累世以來嚮所未聞往來過渡試之斷不致飄往下流現流冰凘衆人難以全渡惟冀其早凍耳自古以來過十月下旬未有不凍者京師水泊冰結之日可記之報聞自歸化城至黄河岸一百七十里自黄河岸至沙虎口一百七十里亦未經丈量到黄河之日初覺寒冷與京師凍河之日相似在此衣灰鼠羊裘狐腋其年老之人衣略加厚厄魯特赤馬一匹遣送皇太子馬甚佳足健而善走又甚調良以豆飼肥更不知若何又此處喀爾喀所產羊或係水土之故食之味甚厚朕故親視用水烹熟因候凍河閒暇無事親手執刀去其骨置匣中遣送可恭進皇太后前三十日初一日駐宿初二日早䝉古等來報稱距此地五十里西爾哈地方今夜凍冰二段每段有一里餘我等官長皆以為竒先遣我來彼衆人行走試看若可渡則即來奏聞於是差嚮導官特庫斯等往看又念此時若送盛京所進之物驛逓勞苦朕此處各種食物皆有之但鹿尾鹿舌各五十鱖魚鲫魚赭魯魚到時少許送至其他大魚鰉魚朕所不食野雉亦勿送來此地多而且肥橘子柑子等物雖到亦勿送來果麫諸物此地自寧夏取來食之麫甚佳雖御用好麫製為餅餌以之相比猶覺稍黒而硬寧夏之麫白而柔細雖多食之亦易消化葡萄亦佳其名公領孫大葡萄之蔕環繞有小𤨏子葡萄曩時常食𤨏子葡萄而未見其如此結實亦覺竒異產棃亦佳初三日早遣人渡河將鄂爾多斯王貝勒貝子公等所獻稱為馴良之馬百二十二匹内四十匹所獻馬三百匹内一百二十匹令驅赴黄河彼岸馬鞍從船渡過渡時見冰凌貼於兩岸河水比朕初到日不同水波不興與渡暢春園之河相似截流徑渡兩岸䝉古等俱合掌稽首相與約誓云此乃我等累世所居之地此河尚且如此效靈更有何人於我皇上之前敢萌異志於是乘其馬歴二時布小圍三次向來言鄂爾多斯之地洵不虚也伊等圍獵嫺熟雉兔復多此地雖有沙岡然皆平阜草多藂生馳騁幷無可慮朕自幼聞鄂爾多斯之兔今親見之圍獵畢申時照前渡河至駐蹕處日暮時特庫斯等來奏從西爾哈地方河之上流皆凍伊等往來渡試不致阻誤朕初四日駐宿初五日向西爾哈渡處移營觀之輜重可渡則渡若稍可虞則駐宿一二日此等事俱繕寫奏聞皇太后宫中咸令聞之康熙三十五年十一月初三日諭皇太子初四日晩降來之厄魯特布達里奏稱於十月初四日起程噶爾丹兵餘數百食用既乏天時寒冽潰散逃亡者甚多亦有死者伊之領事寨桑土謝圖諾爾布率衆來歸尚未至等語噶爾丹雖云前往哈密今諮訪知彼地勢之人及喀爾喀皆言齊七克孔俄羅阿即爾漢等處與枯倫白爾七爾相距三日程不過仍遶舊地而行度其情事難奔他所既無向往之處事更易圖又詳詢之鳥鎗鉛子火藥已盡鎗亦全無投順之人成羣而來所言甚悉今遣布達里赴京其妻在鄂欣家可令完聚皇太子幷與諸臣細問之此一大暢快事也土謝圖諾爾布係厄魯特大臣此人若來則噶爾丹之行藏即可決定俟來時再諭尔知之此語奏聞皇太后兼恭請皇太后萬安初四日駐宿初五日移營前向河之上流冰堅可渡處康熙三十五年十一月初五日諭皇太子前諭曾云初五日移營行五十里在西爾哈渡口冰凍處渡河後於初五日溯黄河上流行十八里至喀賴因托海地方觀看黄河已凍即於其地駐營將冰鑿看厚盈尺甚堅將三旗分為三路路皆墊土初六日輜重亦全渡此上流六里以外下流三里以外亦皆未凍衆䝉古驚訝咸云從來黄河之凍皆自北首寒處凍起如此和暖河皆不凍而獨於中一段結成厚冰不止嚮未曽見亦未曽聞渡河後晩至駐蹕之所王貝勒貝子公等之母妻俱至朕親至鄂爾多斯之地始知此地䝉古居處皆有體貌觀其風俗規模舊時䝉古道理未嘗少失六旗王貝勒貝子公台吉俱相和睦視同一體不分彼此盜賊皆無駝馬牛羊不須防守或馬匹驚失至二三年他人得之亦不隱匿送與渣克薩處令其原主識認王與貝勒之母皆非其生母伊等敬事之甚於生母殊有禮數可觀其他䝉古見此亦當愧死鄂爾多斯之生計皆佳牲畜蕃盛良馬復多雖微不及察哈爾之生計較之他䝉古其殷富遠甚其騎射之式雖不佳亦覺嫺熟多中今朕得黄河所產石花魚甚多有自口内賫送者亦有自䝉古賫送者甚鮮而肥膩味佳因皇太后不食大魚故未遣送朕駐蹕多日習見其水土佳甚食物柴薪俱饒人皆相宜且不甚寒冽朕在克魯倫河四月間所服之衣此時尚可不用京師寒時每覺隂冷自内寒噤斯獨不然此亦一佳地也自兹以後則未知若何耳是日駐蹕於東斯海驛初七日駐宿料理鄂爾多斯所進獻馬駝諸物初八日駐宿初九日移營十四里駐蹕於察罕布拉克此數日揀擇鄂爾多斯所進之馬皆極佳而性復馴良鄂爾多斯捉馬時不用套桿但趨往隨手執之即住未見跅􅋸之馬幼年皇子可騎者亦有之初十日移營行十九里駐蹕於胡蘇台十一日駐宿朕此來原欲相機而行今閒暇駐此天時復不苦寒惟就水草移營以俟噶爾丹困斃消息收納來降之人汝所遣來奏章於十一日早天未明時到本俱閲過發去之物料理畢即遣回朕所得肥雉三十乳酥一匣進獻皇太后餘俱照書付之此地肥雉甚多恐需驛馬故不多遣此等處亦照前咸令知之特諭康熙三十五年十一月十一日諭皇太子十一日發報未乆來降之厄魯特烏善台至細詢之彼於十月初六日來者所言與朕前遣往京之人無異但云噶爾丹欲使察罕沽英寨桑來奏正聚集其牲畜事若果真今已將到問話之頃噶爾丹之大寨桑土謝圖諾爾布至乃彼緊要之人知彼情事極為明晰詳盡噶爾丹困蹙是實事於月内必有端緒其餘大槩皆如前人所言欲往哈密其意已決聞副都統阿南達率兵堵截或未必前去似有駐扎於薩克薩圖胡魯克地方情狀土謝圖諾爾布其人頗優亦壯健攜來之人八十口噶爾丹若遣使來朕亦酌量遣使朕駐師於此可致噶爾丹困斃又聞噶爾丹既無生計時已嚴寒步行者衆其將何往譬猶穽内之獸必自斃耳為欲早使聞知迅速遣諭可奏聞皇太后幷傳知宫中諸大臣皆令聞之康熙三十五年十一月十一日諭皇太子十二日駐蹕於夸托羅會十三日駐宿是日上駟院侍衞瓦色阿薩納送馬至薄暮閲馬俱肥壯與朕帶來閒日更替騎乘之馬相似我軍之馬皆未甚痩亦尚有極肥者觀此時甚與駝馬相宜十四日駐宿將鄂爾多斯所獻之馬揀擇始畢發御馬羣七十一匹大馬羣六百十一匹駱駝一百四十三隻十五日駐宿是日閒暇無事將我軍中歌者鄂爾多斯之歌者及厄魯特之歌唱彈箏者二人令之歌其厄魯特之歌者雅克西云我年六十五歲厄魯特四部落之主皆曽見之今見聖主德皆全備仁慈無所不周恩惠無人不洽諸凡䝉古咸加撫卹不棄貧賤我舊主則不然一切人皆不令見惟自為尊大而已由此觀之興主真天縱之人也十六日駐蹕於即格蘇台十七日駐宿是日報至即遣回朕今循河岸而行歇息馬力以俟音信可將此奏聞皇太后幷宫中咸令知之諸皇子亦令知之康熙三十五年十一月十七日諭皇太子朕躬安善汝佳否來人於十六日早到諸事皆悉以奏聞皇太子所問甚周密而詳盡凡事欲皆明晰之意正與朕心相同朕不勝喜悦且汝居京師辦理事務如泰山之固故朕在邊外心意舒暢事無煩擾數時優閒冀此豈易得乎朕之福澤想由行善所致耶朕在此凡所遇人靡不告之汝之如此盡孝以事父凡事皆誠懇肫切朕亦願尔年齡遐遠子孫亦若尔之如此盡孝以敬事汝矣因洞悉汝諸事敬慎故書此以寄之康熙三十五年十一月十七日諭皇太子十九日我師駐宿巳時費揚古伯急報奏章至閲知噶爾丹遣人乞降兹以費揚古所上章急令聞知故遣馳報可奏聞皇太后恭請慈安宫中竝使聞知宣諭諸大臣兹事雖未明晰朕自有裁度汝等勿慮朕嘗謂噶爾丹破滅已盡以今觀之斯言殆適合也為此諭知康熙三十五年十一月十九日諭皇太子朕此地和暖問鄂爾多斯之地亦言暄和寧夏地方較京師更暖故皆種稻田此地殊不覺隂冷體中不甚熱亦不甚寒或係地方之水土佳故無病人也我軍全營未聞有一人身體不安者康熙三十五年十一月二十一日諭皇太子十九日遣報時親近侍衞阿南達奏章適至噶爾丹遣往達賴喇嘛及瑚瑚腦兒處之心腹喇嘛索諾木拉西等俱於朕所指示堵截之地盡皆擒獲故將其原奏章謄寫發往共人一百六十口馬八十餘匹駱駝百餘匹駝馬俱痩食物皆盡從噶爾丹處行經一月於蘇爾河地方擒獲噶爾丹遣往西域書十四封欲皆翻譯洞晰其情然後報知故未即發十九二十兩日譯畢觀彼將破敗困迫情狀俱行掩飾極其無恥卑微至於不堪譬之掩耳盜鈴曽不知達賴喇嘛瑚瑚腦兒聞之已乆矣十四封書雖無用亦俱謄寫發往可將此繕寫奏聞皇太后宫中皆令聞之滿洲大臣令其觀看特諭二十日晩駐營時阿南達又遣俄齊爾圖車陳汗之孫嘠爾丹多爾濟所使阿由寨桑賫奏章前來亦謄寫發往皇太子欲知始末情由問之阿爾尼自悉矣又諭康熙三十五年十一月二十三日諭皇太子二十二日宴饗鄂爾多斯按等級賞賜二十三日回師駐蹕於胡蘇台二十四日駐宿擬至湖灘河朔時駐數日湖灘河朔距此地八十里將軍薩布蘇有疾以朕處所有西洋藥露盡賜之前自京遣來副都統巴林病係勞症欲以賜之此露已盡不可不備此諭一到貯於數小玻瓈缾内寄來巴林病篤未必能還再有此等遠來者不必遣之康熙三十五年十一月二十六日諭皇太子朕躬安善汝佳否此地冬至前後乃大寒冷不能過京城嚴寒之日見䝉古之於寒冷甚為畏怯大不及吾滿洲漢人朕躬自朝至暮操弓而行䝉古偶射尚亦不能朕所衣狐肷裘銀鼠掛所戴小暖㡌䝉古衣大皮裘以禦寒康熙三十五年十一月二十六日諭皇太子二十五日之晨噶爾丹所遣格壘沽英杜拉爾寨桑至較朕昔年見時藍縷顦顇宛如老乞丐詳問其情狀噶爾丹之欲降蓋是實也其地之寨桑頭目人等附書者亦甚衆具言此事丹即拉慫慂倡説又以事闗重要特為詰問噶爾丹之意見言詞生計困蹙等情事其說冗長不備書惟以噶爾丹之來降實情大槩書寄可照前奏聞傳知康熙三十五年十一月二十六日諭皇太子恐格壘等知朕旋師因宣言初三日移營向邁達里進發彼既行而遂乃旋師矣初八日至右衞師旋即遇大寒我師背寒南行尚屢苦凍北往之人征行實難軍中之人稍强自支持者皆致於凍新滿洲索倫喀爾喀厄魯特亦有凍者渠等亦皆謂大寒朕躬幸不致凍於强自支持之中猶覺有光矣如此嚴寒朕未嘗見每晩慮商旅人民及跟役之輩或致凍斃多方善護卒獲無恙衝冐寒冽畢竟滿洲為最皇太子毋以朕既入關遠來迎接朕自有㫖家中寒冷未審如何此等情事照前奏聞傳知此諭書於右衞將軍之署欲更詳悉書之事既長冗而紙幅亦已盡矣康熙三十五年十二月初十日聖祖仁皇御製文第二集巻二十二
