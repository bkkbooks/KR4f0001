body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷二十一北征勅諭諭皇太子朕躬安好此行較前不同諸物豐盈天時頗佳每日愉快以行聞塞外今年暄燠問馬習言沿路水草俱佳野多兔山間有獸殆可遣懷每年進獻皇太后禮物汝於初三日親身詣送朕亦續遣太監賫進途中所有數種物也此書書畢適根敦代青貝勒書至來人云聞皇上親統大兵剿滅噶爾丹我貝勒領兵前赴惟期擒獲噶爾丹以立功勞有精兵千餘但馬略少耳兹倂以尚書班第書發往康熙三十五年九月二十六日諭皇太子撫遠大將軍領侍衞内大臣伯移咨理藩院為知會事康熙三十五年九月二十日未時厄魯特之人阿玉西來投順云我自阿濟爾布都諾隨丹即拉回至翁金貯米地方於本月初六日早見翁金之兵起營我等在旁潛伏俟其絡繹前行丹即拉率衆衝突欲搶馬䭾行李其殿後大兵隨放礮銃拒戰在行李之前兵馬亦回顧夾攻我厄魯特敗遁而西次日天晩下營我遂逃奔前來等語其投順之阿玉西乘汝衙門筆帖式詹住回京之便將去此文并人於二十八日晩間到問阿玉西對云此番搶米非丹即拉本意衆人言翁金現在有米與其餓死不如取而食之於是前往行及一程遇我哨兵擒喀爾喀三人遂隱伏山坡待我兵迤邐前行從中衝截守米之兵不及甲胄鳴笳首尾夾攻礮擊四次隨即敗遁彼一路見有厄魯特死者十餘人別無所見又問我兵曽失利乎彼云丹即拉曽傳勿殺人止搶米之令今勿言殺人幷厄魯特之馬反損失多矣丹即拉脱身後甚是怨悔云惟思清水捕魚水雖已渾魚終不得將如之何氣忿至極其馬俱羸弱徒歩者衆在我之後接踵而來者尚多先示大略俟有報至再傳諭康熙三十五年九月二十九日諭皇太子朕此番出行頗為欣愉無所掛懷地方亦較獨石一帶為優聞口外更佳野兔繁衍而沿邊多獸因選新滿洲前往捕獵汝可諭令敬謹飼養馬匹其衆人之馬朕分撥已於大同飼養根敦代青貝勒進五月前所捕得黑狐一貂鼠一猞狸猻一寄汝銀䑕二百進皇太后為此特諭康熙三十五年十月初二日諭皇太子朕於二十九日度察罕拖羅會嶺駐蹕於喀喇巴爾哈孫之地是日閱鑲黄旗牛羣其數至一萬六千頭毛色甚佳三十日駐蹕於昂古里湖地是日閲右翼達卜孫腦爾之馬羣其數至一萬匹整齊肥壯不可言喻初一日駐蹕於俄羅特布拉克之地是日閲正黄旗牛羣其數一萬六千頭羊七萬隻䝉古王等以下喀爾喀厄魯特之人咸以為竒云自我祖宗以至於今但有牛一二千頭遂稱極富從來未聞有至萬頭者今見馬匹無論大小盡皆肥壯光澤羊隻甚肥曩時亦曽聞朝廷之牧畜蕃多或以為告者太過未之深信今目擊如此始知我皇上諸福駢集羣相驚異贊頌向來聞張家口外甚寒自今觀之頗覺和暖河亦未凍或一處始有薄冰草雖黄而草根尚有青色夜間帳幕中不必􅎴火人服緜衣皮褂者甚多聞他年亦不如此較之哨鹿之地甚為温暖朕行䝉古地方多矣似此佳處未之見也此皆聖祖太宗皇帝幸歸化城時所指之地遺於子孫牧圉日増孳息日盛也宜哉圍獵時觀之兔雖不甚多亦不稀少地極平坦可以此奏皇太后知之阿爾薩闌衞寨桑以其幼主阿里牙來今令赴京師亦與車林渣布一體恩視學士拉西識其人可令彼通譯車卜登貝勅之母亦詣朕前令其赴京此人皇太后亦知之可令進見康熙三十五年十月初三日諭皇太子初二日駐蹕於瑚瑚厄爾吉偶率牧羣䝉古射獵初三日皇太后誕辰未啓行初四日駐蹕招哈初五日駐蹕和岳爾湖初六日駐蹕於巴喇特郭爾䝉古之男婦老幼日來迎者無數爭獻湯羊至數百隻并酥酪􅀈酒之物俱賜銀收納自軍士以至僕役食之不盡今已行過牧所至正黄旗正紅旗察哈爾地方生計亦好䝉古王台吉等言牧地䝉古八旗察哈爾兵丁生計較之我等台吉為優此時行路甚易牲畜既肥水草亦便即今天時猶暖潢潦之水夜則微凍風吹即融有衣裘者亦有未衣裘者自招哈山巒重疊樹木全無頑石磊磊朕之此行心甚和豫扈從者亦甚豐饒費揚古處咸朕兵卒誰日餉以牛羊朕殊為軫念發銀五千兩送至費揚古軍前令購牛羊食之此等情事繕寫奏聞皇太后幷令宫中知之康熙三十五年十月初九日諭皇太子初七日駐蹕胡魯蘇泰河有兔初八日駐蹕莫海圖兔少初九日駐蹕喀喇烏蘇麅頗多初十日駐蹕於察罕布拉克岱哈廟在大道之南三十里過杜白忒嶺往觀之廟漸傾圯岱哈水泊北岸有一湯泉水温喀爾喀之塞楞阿海王駐牧其地言今年樹藝大穫生計較前甚裕乃觀其情狀仍然貧寒者因其人頗優故賜牲畜五百歸途過烏兒圖嶺至朕御營自此山多樹木間見林藪山佳而壑險十一日過折兒德莫敦嶺駐蹕喀喇河朔野雉叢集山谷狹隘兩崖雄峻而難捕觀之類哨鹿之地亦有各種野畜然不多十二日未至歸化城四十里駐蹕於白塔之前兔少雉多狐亦有之地不足取且多鼠穴絶無平衍十三日抵歸化城城之老幼男婦數萬人衆持香迎於郊郭稽顙奏稱我兩土黙特自太宗皇帝至今五十九載其所貢賦者馬幾二百匹部員來時應馬二匹其撥什庫應馬一匹夏捉雉鹿掘石青秋則徵雛鷹冬則獵取野豕兼納狐皮因賦役甚重困苦已極聖主洞鑒一切賦役盡行豁免已六年矣此恩此德如天地高厚每思如何得一叩天顏不意駕臨荒野之地永增輝光我等愚氓亦有得瞻天顏之日乎歡聲大震因朕不收其牛羊皆殺而去毛其雞鴨鵝豬則烹熟之各戴於首再四求受心極誠切來人目覩之欲将此物令其攜去恐稽時日兹因示至歸化城之期附獻皇太后乳酥一匣肥雉十麅一製麋米一袋餘所進獻之物朕之太監與來人一同前往特諭康熙三十五年十月十三日諭皇太子朕躬安善汝佳否朕在此不知雨雪風寒今已至歸化城所行徐緩每日移營二三十里或四十里愛惜馬匹故一騎未曾損失且無跛蹶康熙三十五年十月十三日諭皇太子十四日從托音胡圖克圖寺移於南闕下營十五日駐宿整備大宴達賴喇嘛之使達頼汗之使瑚瑚腦爾八台吉之使歸化城喇嘛察哈爾之將士歸化城之將士俱賜筵讌甚衆盛華整十六日駐宿遂於西勒圖胡圖克圖寺觀看儺舞十七日至二十日皆駐宿此數日自早至夜分無有暇時從四方來之䝉古喇嘛及王與妃等以至兵民婦女咸集進獻駝馬牛羊食物者絡繹不絶或有至貧苦之人亦持馬絆絡首鞗革而來以獻其忱自軍中來喀爾喀之善巴親王諾鼐親王毛明安之班第貝勒渣薩克之台吉納爾布白孫之車陳即農呉爾占厄爾即亨之滚占哈坦把圖爾喀爾喀之黙爾根訥顏之弟開木純等有名目之人問噶爾丹信息答云我等在軍前知之甚詳噶爾丹信息今已急迫噶爾丹所居之地原係我等所居極其寒冽所食者雖無猶可食人馬之肉至衣服無有一夕遭遇極寒惟有凍斃而已更將何法以禦之我等杭愛山之地亦將為我困噶爾丹矣朕在此日事利濟人之離散者令其㑹合聞何處有彼婦人穉子即以價贖之令其完聚故投降者不絶因係善事而送出者亦衆九月初一日費揚古伯所調右衞之兵前已疲勞又無馬匹徒然調發以致困苦今回師將至故令親近侍衞馬武帶牛五十隻羊二百隻湯羊十隻往迎及到近地朕親於黄河岸迓而宴之乘便於鄂爾多斯之地圍獵觀其形勢軍士從京師乘來之馬俱於大同府餧養聞其甚肥壯現今隨朕前來之人皆乘牧羣之馬駒而來其略痩者即換新得肥馬乘騎尚有餘剩駝馬之價甚賤駱駝佳者不過三十金肥馬不過二十金此際未得噶爾丹確信堵截剿滅皆周詳謀畫以行可將此繕寫奏聞皇太后幷交與顧太監宫中咸令聞之朕在此雖無暇而意趣甚佳但得一二小物亦必恭進皇太后羊膾乃朕親視用灼石炙熟去骨包裹送來朕在此食之甚有味但已熟者及至京師未知何若不可再烹蒸食之良佳又歸化城耆老製為歌詞歌之語雖粗鄙亦有是處皇太后及妃等閲之一笑故幷寄去康熙三十五年十月二十日諭皇太子二十一日早從噶爾丹處厄魯特二人來降日中時又有厄魯特二人來降朕於此輩俱加賞賚中有一人其妻為我軍所獲彼一至即令完聚兩人相抱痛哭䝉古王等以下無有不下淚者皆喜悦稱為善事詳問之答云丹即拉回於十九日至枯倫白爾七爾地方見噶爾丹告之曰大兵各處堵截我詐稱投降用計而出噶爾丹甚嗟歎言我等專望於爾今將何以存活且兵又堵截此地不可留可往哈密取糧而食故於二十一日前往我等隨行一二日復向此而來途中賊盜甚多互相殺奪等語若果往哈密乃其絶地噶爾丹必為我所擒矣彼一帶地方堵截俱已完密更無可慮今後投降者當益衆陸續聞之二十一二十二日駐宿二十三日向黄河岸啓行我軍之馬皆肥壯康熙三十五年十月二十三日諭皇太子朕躬安好汝佳否此地尚爾温和河亦未凍著綿衣者甚多貿易擔荷之人猶不衣裸袒而行其土著年老之人皆甚以為竒言自我等祖父以來此時河水無冰風霜雨雪皆無如此暄暖嚮所未聞朕觀之亦與京師無異朕但御薄羊裘綿套騎射時尚覺汗出也康熙三十五年十月二十四日諭皇太子朕二十二日仍駐歸化城其北山下有二寺往視之二十三日觀射及角觝二十四日始自歸化城行三十三里駐蹕於河津邨之南歸化城老幼依戀繾綣揮淚道左二十五日駐宿是日右衞官兵二千五百人至朕躬出勞多備牛羊飯食親饗之闔營軍士歡聲動地朕駐蹕歸化城時各處多獻俘者皆給銀收納有各種工藝及彈箏唱歌者内一老人善謳其名雅克西年六十五歲胡曲最精善言説尤長滑稽初見朕時賞以衣㡌賜食并茶酒彼稽顙畢乃㸃首攘袂瞪視良乆以手指朕曰所謂大丈夫者是耶膽氣如此勇略如此以敵國之臣而臣之以敵國之歌者而使歌之如此國富兵强乃不事驕侈但利濟羣生完聚離散惟務積德兹復何言天下諸國實無與敵俱為臣僕理所必然耳於是叩首而坐方其以手指朕初發言時左右訝以為醉及聞其語莫不以其人雖鄙而言亦有合於理云有一搊箏者名齊倫其技亦精二十日駐蹕於達爾漢拜星自離歸化城向西南行地皆寛坦新設御屯於此所闢田畝耕之不盡所產柴薪用之有餘塞外諸地未有如歸化城之一望平曠也且草茂水佳朕隨從諸人未聞有病者阿米達桑格周卜世明珠等雖年老而色豐腴可知其風土之佳矣凡此皆隨手書之雖屬細末然朕在外之襟懷欲令聞知故以示汝可繕寫奏聞皇太后幷令宫中知之康熙三十五年十月二十七日聖祖仁皇帝御製文第二集卷二十一
