body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻十勅諭諭戸部前者大兵進剿四川已破朝天等關直至保寧恢復在邇因周有徳張德地席普臣駐劄廣元不將糧餉極力轉送軍前陜西總督廵撫亦不將糧餉極力運送以􅃱大兵糧餉不繼難於久駐遂爾退回貽誤軍機關係重大此數年以來使逆賊逋誅封疆未復兵民苦累休養無期皆周有徳張德地席普臣陜西總督廵撫怠玩遲延之故毎念及此深可痛恨目今大兵分路進取已經恢復漢中府不日前抵蜀疆相機剿撫底定可期軍前糧餉􅇰為緊要著陜西總督廵撫大小文官殫心料理設法運送務令兵食無匱士馬飽騰早奏㨗功以副朕定亂安民至意如該督撫等官漫不經心泄泄從事􅃱糧餉缺乏有誤軍機將督撫以下誤餉之官俱以軍法從事決不饒恕尔部即速為傳諭遵行特諭康熙十八年十一月初十日諭禮部本月初三日太和殿災變出非常朕心深切警惕兹欲詔告天下尔部即擇期具儀以聞特諭康熙十八年十二月初五日諭九卿詹事科道君臣誼均一體分勢雖懸而情意不隔安危欣戚無不可相告語者堂陛之義固宜如是也邇者朕體初平忽遇殿廷不戒被燬於火尔諸臣因朕偶恙復睹此災愛主心切必謂朕當過於憂慮朕披閲經史頗明大道朕之一身上受祖宗之付託下繫臣民之瞻仰為任匪輕寧不自愛惟是今秋有地震之變又各處饑饉洊臻宼盜未息此朕早作夜思中心惶懼寢食靡寧者至於殿廷告災乃上天致警敢不夙夜祗畏循省厥愆然其所關止屬朕躬臨御之所但得海宇清宴置斯民於衽席之上則朕今所居較諸前代茅茨土階尚或過矣豈至以露處為慮哉朕自五齡即知讀書八齡踐阼統蒞萬方太皇太后嘗問朕何欲朕敬對曰臣無他欲惟願天下乂安生民樂業共享太平之福而已當時左右實共聞之自兹迄今謹持此心兢兢業業恒如一日可以質諸寤寐儻有政治失宜皆朕躬之咎從不諉過臣下惓惓之意兹與尔等悉之特諭康熙十八年十二月初六日諭康親王傑淑王所奏據實指叅事已經覽悉朕思凡行一事必前後計慮果有裨於國家始可舉行若輕率妄動必􅃱舛錯今廣西湖南漢中興安等處俱已底定逆賊餘黨引領以冀歸正者不止百千若將耿精忠即行正法不但已經投誠之人以為後日亦必如此聲明其罪即未經投誠之人覩此寒心亦未可知關係實重前朕手諭欲令耿精忠來京者盖掣回福建一半滿兵之意非使即行處決俾王先來也如王善能勸諭令至京師諸事皆得平妥王但當加意開導之不可輕舉彼如必不赴京再行詳悉宻奏候㫖特諭康熙十九年正月初六日諭大將軍安親王岳樂褒徳賞功國家之令典安内攘外社稷之崇勲王連年以來遠蒞巖疆親經百戰􅌨風沐雨厯暑逾寒競揚貔武之雄克清梟獍之孽湖湘諸處已見蕩平滇黔餘氛俱成坐困更體朕軫念窮荒之心廣示招徠深加撫恤王師所至遐邇來歸㨗奏屢宣中外稱慶朕既嘉碩畫益篤親親爰命班師副朕懷想頃者聞王已抵武昌奏凱可期特遣使臣慰勞兼賜駱駝良馬以示優眷王其按程而來朕將計日以待特諭康熙十九年正月二十一日諭九卿科道官内陞外轉原以示勸懲也今見才優者猶知憚於外轉其或才力不及不稱言職之人安於外轉道員者甚多是但以示勸非所以示懲也故令九卿詹事科道㑹議務期得當魏象樞等奏稱恐天下不肖之輩不識朝廷慎重道員之意疑為厭薄言路之端等語邇年以來姚文然李之芳施維翰等内陞未久即任以大僚督撫亦因其克盡言職才能素著之故也此無論天下智愚不肖當亦知朝廷無厭薄言路之意矣其外轉者或係素無建白或係昧於事理或係任臆妄言或係才力不及原非因其條奏而外轉也又稱近年外轉之科道並無貪汚溺職之一人而五部郎中俸深陞道如范永茂髙恒豫盧元培程汝璞等􅂍私纍纍劣蹟彰彰者不知凡幾等語科道外轉者豈並無溺職之一人乎五部俸深陞道員者甚多豈盡係貪劣之人乎如陳丹赤等優者匿而不言獨舉范永茂等四人不辨賢否而槩言之可乎魏象樞去歳七月内曽於朕前靣奏科道官所行皆係徇私有負朝廷耳目之任罪皆應死今甫數月復言歴年外轉者並無溺職之一人前後參差何其速耶尔等所奏理不宜批答因註語内有以存國體之語故令諸臣知之至若外轉科道以小品官員用遂至有傷國體朕殊不解故特諭諸臣示以朕意康熙十九年正月二十一日諭大學士索額圖明珠李霨杜立徳馮溥雲南貴州係邊疆重地苗民雜處總督關係􅇰為緊要必得才謀超衆之人方克勝任將軍趙良棟勇略甚著操守清廉雖係武弁通逹文義著改授雲貴總督仍兼將軍必能蕩平地方撫輯兵民著議政王大臣九卿詹事科道官員㑹議具奏康熙十九年正月二十九日諭戸部前因各省地方多有饑饉已經遣官賑濟今見京師附近之地四方饑民流移在道朕心深為憫惻若不急行安揷令其得所將來必至鬻賣子女難以生全作何設法令其各歸原籍著該地方官加意撫綏安集復業以免流離著九卿詹事科道詳議具奏特諭康熙十九年二月初七日諭戸部尚書伊桑阿朕聞宣府等處歲值大祲吾民乏食鬻賣妻子以自求活夫人孰不愛其室家哉至欲延一朝夕之命割其所親憯惻莫甚焉其遣尔部郎中明格禮馳驛速往㑹同地方官賑濟急拯艱厄以紓朕懷康熙十九年二月二十六日諭大學士索額圖勒徳洪明珠李霨杜立徳馮溥學士噶爾圖希福徐元文李天馥頃者年復不登饑民就食多聚京師故令增設各厰煑糜救饑今四方失業之民聞而來者愈衆反􅃱流離道路有轉徙溝壑之虞且天氣漸向炎熱老幼羸弱聚之蒸為疾疫轉益災沴朕甚憂焉作何設法令其各歸原籍不􅃱失所仍令各該地方官拊循周恤毋􅃱流移饑民内有疾疫死亡者令五城作何給以藥餌醫治拯救去歲三冬無雪今春無雨刑獄淹禁恐有寃抑應即行清理乞食饑民向不許入裏城今應聽其出入用兵地方殉難諸臣卹典原候事平定議今應即與舉行陰陽不和盖由人事失當思欲感通未得其方以上數事皆朕意念所及尔等㑹同尚書侍郎左都御史副都御史詳議具奏尔等國之大臣所宜極慮深思以答委任應行應革關切時務者其各抒所見一併議聞康熙十九年四月初一日諭大學士索額圖五城賑濟饑民可各將姓名籍貫問明造冊交與總理賑濟僉都御史髙爾位彚送戸部康熙十九年四月初一日諭刑部去歲三冬無雪今春雨澤愆期天氣亢暘農事可慮朕念切民瘼夙夜焦勞或因刑獄淹禁中有寃枉􅆀干天和亦未可知兹特遣明珠杜立徳希福李天馥等㑹同三法司將已結重案逐一詳加審鞫如有罪可矜疑者即與察明事由開列具奏務期情法允協有枉必伸以副朕欽恤獄讞至意康熙十九年四月初二日諭吏兵二部自呉逆叛亂以來各用兵地方文武官員有矢志忠貞克篤臣誼抗賊不屈捐軀殉難者幽忠難泯大莭可風彼時即宜錫以卹典但以各處尙未蕩平其中有情莭未確者有應行察者有正在招撫未便遽行者不得已而緩至今日朕毎念及深為惻然兹各路㑹剿大勢底定餘氛指日殲滅其殉難各官應加褒卹以慰忠魂尔等即詳察議奏特諭康熙十九年四月初三日諭吏部朕萬幾之暇留心經史雖遜志時敏夙夜孜孜而硏究闡發良資講幄之功日講起居注各官俱以學行優長簡備顧問講解明晰奉職勤勞所纂講義典確精詳深裨治理侍讀學士張英供奉内廷日侍左右恪恭匪懈勤慎可嘉髙士竒杜訥學問淹通居職勤愼供奉有年應授為翰林官尔部俱一併從優議叙具奏以後著益殫心職業佐助典學以副朕崇儒重道稽古右文至意特諭康熙十九年四月初八日諭禮部農務為國家之本粒食乃兆姓所資必雨暘時若而後秋成可期自去冬以來雨雪未降今時已入夏甘霖尚稽久旱傷麥秋種未布農事深為可虞且失業之民饑饉流移尤堪憫惻或因政治未協致干天和朕用是夙夜靡寧循省儆惕兹當䖍誠齊戒躬詣天壇親行祈禱為民請命尔部即擇吉具儀來奏康熙十九年四月十一日諭吏部等衙門􅆀治安民之道首在懲戒貪蠧嚴禁科派而後積弊可清閭閻不擾近見街道衙門蠧役詐索害民又聞提督歩兵衙門五城司坊街道廵捕營等衙門各官不能潔已奉公恪遵法紀縱容衙役朘削小民或沿習陋規科斂行戸或借端挾詐官役分肥肆意横行無辜受害種種弊端深可痛恨向來雖經嚴禁定有處分之例但恐小民未能悉知仍被奸徒擾害應再加嚴飭務令家喻戸曉以副朕安全生民至意著各該衙門通行曉諭遵行特諭康熙十九年五月初二日諭大學士勒德洪明珠李霨杜立徳向以亢暘齋居䖍禱雖雨澤薄降四野田疇尚未霑足今兹不雨為時又久旱魃為災朕甚懼焉意者政事之失宜者多歟不然天心仁愛下民何其宜雨而久不雨也日者以政理之故勤求言矣而言者文繁無益其集九卿詹事科道掌印不掌印各官問今有何事當行何事當革悉意以陳毋有所隱康熙十九年五月十五日諭内閣九卿詹事科道朝廷􅆀治惟在端本澄源臣子服官首宜奉公杜弊大臣為小臣之表率京官乃外吏之觀型大法則小廉源清則流潔此從來不易之理如大臣果能精白乃心恪遵法紀勤修職業公爾忘私小臣自有所顧畏不敢妄行在外督撫各官自應慎守功令潔已愛民乃大臣等毎自謂清正無私粉飾空言至其所行往往營私作弊有玷官方深負委任之意科道係耳目之官凡有弊端自當據實叅奏且居處甚近如此情弊豈無見聞乃瞻徇情面緘黙不言即有條奏多係繁文言官職掌殊為未盡如肯從公糾舉孰敢恣行無忌朕以為目今之弊莫大於此近因天氣亢旱朕夙夜焦思念慮所及無不舉行感格之道猶恐未盡故特召尔等各面陳所見因宣諭朕意令尔等知之康熙十九年五月十五日諭恪純長公主公主被反叛所累屢年困頓朕毎念及未嘗不為惻然不意深染時症遣乳媪暨親近侍衞往視及回轉奏公主之語不勝感歎又聞病勢危篤即命該部院衙門將服飾執事等項星夜製辦今公主體中大愈將此各項盡送公主處以示朕惓惓注念之意但慮製辦期廹不甚佳耳康熙十九年六月初七日諭大學士索額圖勒徳洪明珠李霨杜立徳學士噶爾圖希福李天馥凡試職官員一年果係稱職者方准實授其未能稱職者或仍令再試或作何另用著吏部定例議奏康熙十九年六月二十日聖祖仁皇帝御製文集巻十
