body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷二十五目錄北征勅諭諭領侍衞内大臣國舅佟國維内大臣福善蘇爾達大學士伊桑阿阿蘭泰諭大學士伊桑阿阿蘭泰學士宋柱陶岱齊穡綏色三寶諭大學士伊桑阿阿蘭泰學士宋柱陶岱齊穡綏色三寶諭内閣諭勇略將軍趙良棟諭領侍衞内大臣伯費揚古諭太子少保振武將軍左都督孫思克諭揚威將軍覺羅恕書諭都察院左都御史于成龍兵部督捕右侍郎李鈵通政使司左通政喀拜諭兵部督捕右侍郎王國昌大理寺卿喻成龍光祿寺卿辛保内閣侍讀學士范承烈諭總統督理中路運務左都御史于成龍等諭大將軍伯費揚古諭禮兵二部諭大將軍伯費揚古諭大學士伊桑阿阿蘭泰諭大將軍伯費揚古諭大將軍伯費揚古諭大將軍伯費揚古諭大將軍伯費揚古
