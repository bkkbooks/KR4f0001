body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻二十八雜著書座右四則覽本之際不可說閒話不然差錯亦未可知如用人與刑名錢糧等事關係非小不可不慎又無一日不寫字無一日不看書義理自然貫通若畫地自限豈登髙行逺之至意哉又時當春令天氣融和萬物發生之時三農布種之日又為學之道須功夫嚴密久之其理自昭一叚自得之趣自不能已讀大學自古治道盛於唐虞而其所以為治之道即其所以為學之功後世聖人紹明厥緒以詔来者雖𣺌然千百載其大義㣲言豈有殊指哉大學首言明徳新民誠不異於堯典所言固可因以推論其符合之故而溯其所由致力之端矣堯典曰克明俊徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍大學之言明徳新民曰格物致知誠意正心修身齊家治國平天下此所謂先聖後聖若合符節者歟其言克明俊徳者統言之也猶大學言明明徳也格物致知誠意正心修身者分言之也而堯典闕然未明其義盖嘗以是而求之書曰人心惟危道心惟㣲惟精惟一允執厥中則其所以致力之端不外是矣夫曰惟危曰惟㣲則辨之不可不早辨所貴致其知矣曰惟精則格物之謂也知之既極其明則守之貴極其誠曰惟一則誠意之謂也以至正心修身皆主於一而允執厥中之義以全繼此而家齊國治天下平胥於此受裁成焉孰謂十六字之心傳不可以括大學之全書歟朕於帝王修己治人之道雖日加自勵而未之有得念大學所由致力之端而合之堯典以明其義云讀性理大全昔者堯舜以一中相授受禹湯文武周公繼之孔子又繼之祖述憲章大成以集於是言道者莫不折𠂻於孔子然孔子之言性與天道也雖子貢不得而聞况其下焉者乎孔子之後惟子輿氏首揚性善之旨而仁義充塞其道不行漢之諸儒抱其遺經以誦法孔子然僅窮六經之義未聞性道之傳也若夫荀卿之言性惡而理偽揚雄之言性善惡混修其善而為善人修其惡而為惡人皆與聖人之㫖陽合而陰悖雖韓愈之賢謂性有上中下三品之異亦似指氣質之性而言盖未得為至論焉宋儒生於千載之下探索㣲言紹明墜緒性道之理始昭然大著於天下今讀其遺書如周子之學以誠為本以無欺主靜為要二程子之學以主敬致知為先朱子之學以窮理致知主一居敬為務皆深有得於性天之㫖可以上承夫孔子之傳者也其他諸儒造詣所至或見諸撰述或形諸論説悉能發明先聖之傳黙契精㣲之藴其有功於斯道非淺鮮矣朕備覽前哲垂著之言手句讀而丹黄之雖研精極慮而於天人性命之㫖詎能洞鑒本源歟跋皇考世祖章皇帝御書正大光明四字後世祖章皇帝御筆書正大光明四字結搆蒼秀超越古今仰見聖神文武精一執中發於揮毫之間光昭日月誠足嫓羙心傳朕㒺不時為欽若敬摹勒石垂諸永久為子孫萬世法康熙十五年正月吉旦恭跋恭跋世祖章皇帝御書陋室銘後我皇考世祖章皇帝以上聖之資撫興王之運躬處九重心周蔀屋盖所謂養其民以致賢人矣至於親簡册灑翰墨無時而不存此念也今恭覩御筆書陋室銘一巻陋室者何山間水涯之居詩人之所謂考槃空谷也以萬乘之崇髙不㤀草茅之卑末於其所居若有取焉而親為書其辭則聖心之所存於此亦可見焉康熙十六年九月四日萬善殿記跋資政要覽右資政要覽三巻皇考世祖章皇帝機政餘暇博考羣籍萃精獵㣲御製成編朕時勤披讀思仰先猷洪惟皇考亶首出之資開太平之業所以承叙萬年裕我後嗣子孫無疆之祚者顯謨駿烈非寡昧之所能窺盖體具狥齊徳兼廣運因心以剏悉合於先程率性而行咸符乎天則過化存神之妙夫豈有資於效法也者而猶不廢夫學古之勤稽求之益豈非聖不自聖謙尊而光者乎予小子欽承手澤念紹庭聞寶此遺文常作蘭臺之秘陳兹大訓即為西序之珍恭綴片詞用貽来葉云爾跋王右軍書曹娥碑真蹟曹娥碑相傳為晉右軍將軍王羲之得意書今覩真蹟筆勢清圓秀勁衆羙兼偹古来楷法之精未有與之匹者至今千餘年神采生動透出絹素之外朕萬㡬餘暇披玩摹倣覺晉人風味宛在几案間因書數言識之跋王羲之快雪時晴帖晉右軍將軍王羲之真蹟存於世者尠矣快雪時晴嘗見刻之搨本中今覩其真蹟可為希代之寶藏之篋衍不時觀閲恍接其人於千載以上也跋董其昌書米芾書天馬賦縱横騫翥前無古人董其昌所臨既得其形似且極游行自如之妙朕嘗愛玩揭之屏風因題數語志真賞焉跋董其昌書朕觀昔人墨蹟華亭董其昌書晝錦堂記字體遒媚於晉唐人之中獨出新意製以為屏列諸座右晨夕流覽寜不逺勝鏤金錯彩者歟跋董其昌書此屏裝潢既成尚餘縑素詹事沈荃亦華亭人素學其昌筆法題跋數語命之續書以志朕意時康熙壬戌二月八日書宋搨淳化閣帖後宋太宗皇帝嘗遣使購歴代君臣書蹟命侍書王著模刻法帖十巻搨以澄心堂紙李廷珪墨大臣登兩府者方得賜焉盖其重之如此當時本不可多得况歴數百年之後乎此本乃賜翰林學士畢士安者神采煥發波磔明潤漢晉以来翰墨風規宛然猶在者尚賴此帖之存也朕㡬政餘閒啟帙披巻如晤徃昔心意融洽洵可寶而藏之也訓學篇皇初之㑹惠浸萌生澤及翔泳要其淳風沕穆難得而稱焉若夫上體乾撰俯育民物尼聖尚嘉之以冠徳表治炳煥於典謨者莫崇乎陶唐有虞氏之為君也其時肇命中天圅光始曜化神通變運啟文明而以禹臯稷契夔龍數賢聖為之臣亮天工熙帝載矣乃猶君臣咨嗟動色相儆勞謙恭已兢兢業業休哉帝者之上儀百王之芳軌也自兹以還或與治同道或與亂同歸未有不原於敬怠之殊途積漸為安危之異轍者朕研精經籍逖覽徃事念欽若之不易天位之維艱沖齡踐祚遂以安生民利天下為心厥後三逆之亂勞我師徒朕於此時憫念吾民罹此荼毒日昃而食中宵不寐階籤警夜軍書刺閨或已就枕披衣而興坐遽逹旦凡攻守之難易機宜之遲速地形之險平饋餉之盈詘間諜之虛實物情之真偽羣下之勞苦功能之髙下㒺不博稽獨運惕若有遺用是四征不憓踣跐剗膊草薙禽獮殲厥醜類底於廓清兹五年矣四方無事邊境寜謐風行海表萬里来庭朕固凉徳遘兹嘉㑹可不謂難得之時哉向使蒙業而安宴然以處三逆者尾大不掉蔓滋難圗或久而不發發至於大如火燎原不可撲滅乃欲使戍壘壤境之間芸芸黎烝耳不聞鳴鏑目不覩金革士旅無暴露之憂閭井無驛騷之患其可得乎又况能使六合怡怡羣生就理永無􅏓盭之虞長有恬熙之象乎今天下既平矣公卿大夫方伯連帥羣有司在官者可以少息其肩矣孔子繫易曰黄帝堯舜埀衣裳而天下治又稱舜無為而治比自武功耆定上下恪勤興廢祛慝㒺即於逸庶事漸康刑政㡬於清簡雖不敢仰追無為之聖化繼自今以徃公卿百寮退食自公將優㳺有餘日焉所謂難得之時者非耶朕嘗考漢唐治平之世有百官休沐之制有令節游宴之詔蘇軾亦謂士大夫捐親戚離墳墓宣力之餘亦欲取樂此人之至情諸臣際此休暇之時而有優游之適豈不甚愜於朕懷雖然難得者時可幸也亦可愓然警也昔漢文帝之賢值承平之日賈生獨以為未安未治者盖居安思危所以久安已治求治所以長治也朕又觀古先哲王以及名公卿賢士大夫無有不遜志於學者盖立身之本政治之原莫尚乎學堯則欽明文思舜則濬哲文明立人君之極也禹宅揆契掌教臯陶明刑伯典禮夔典樂立人臣之極也凡能此者其惟學乎朕雖探索羣書積日彌年不自暇逸然而未有所得中心􅍀然曷敢企望勲華之績諸臣舍臯夔將以何者為矩矱耶不寜惟是漢世三公九卿如倪寛公孫𢎞韋賢貢禹劉向蕭望之匡衡桓榮楊震之徒並以儒雅尊顯於朝廷凡國有大事則引經據義歸極於道故漢之政理最為近古逮於唐宋名臣如林咸本儒術發為事功即程顥程頤朱熹諸賢不得大用於其時而著書立説羽翼六經至今學者宗之為世坊表甚矣學之不可已也如此及是時百爾卿士翺翔乎詩書之苑囿斟酌乎道徳之淵源體心踐行率其子弟寜學而後仕毋仕而後學焉且夫農工商賈必世其業而士夫之子弟若一惰慢遂為平人間有出而仕者少或不學長無所知語及古今之事茫然如墮雲霧又或矜其私智不度弇陋如犢僨轅害斯大矣其不得仕者或飽食美衣冶游嬉戲忽忽過日一旦銷落泊如窮流可不念哉夫學以實本根資通逹定經權也未知事親者觀古人之事親而知孝未知事君者觀古人之事君而知忠未知天下之務者觀古人之前言徃行而知守經逹變由是作賔王家為國禎幹使振鷺之聲充庭鴻鸞之羽漸階詎弗美歟朕是以遐溯唐虞鋪觀歴代取君臣交儆之義以及修身教家之法而為之説云聖祖仁皇帝御製文集巻二十八
