body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻五十熱河三十六景詩烟波致爽并序熱河地旣髙敞氣亦清朗無䝉霧霾氛柳宗元記所謂曠如也四圍秀嶺十里澄湖致有爽氣雲山勝地之南有屋七楹遂以烟波致爽顔其額焉山莊頻避暑静黙少喧譁北控逺烟息南臨近壑嘉春歸魚出浪秋歛雁横沙觸目皆仙草迎牕遍藥花炎風晝致爽綿雨夜方賖土厚登雙榖泉甘剖翠𤓰古人戍武備今卒斷鳴笳生理農商事聚民至萬家芝逕雲隄并序夾水爲隄逶迤曲折逕分三枝列大小洲三形若芝英若雲朶復若如意有二橋通舟楫萬㡬少暇出丹闕樂水樂山好難歇避暑漠北土脉肥訪問村老㝷石碣衆云䝉古牧馬塲並乏人家無枯骨草木茂絶蚊蝎泉水佳人少疾因而乘騎閲河隈灣灣曲曲滿林樾測量荒野閲水平莊田勿動樹勿發自然天成地就勢不待人力假虛設君不見磬錘峰獨峙山麓立其東又不見萬壑松偃蓋重林造化同煦嫗光臨承露照青蔥色轉頻歳豐遊豫常思傷民力又恐偏勞土木工命匠先開芝逕隄隨山依水揉輻齊司農莫動帑金費寧拙捨巧洽羣黎邉垣利刃豈可恃荒滛無道有青史知警知戒勉在兹方能示衆撫遐邇雖無峻宇有雲樓登臨不解幾重愁連巖絶澗四時景憐我晚年宵旰憂若使扶養留精力同心治理再精求氣和重農紫宸志烽火不烟億萬秋無暑清凉并序循芝逕北行折而少東過小山下紅蓮滿渚綠樹縁隄靣南夏屋軒敞長廊聯絡爲無暑清凉山爽朝來水風㣲度泠然善也畏景先愁永晝長晩年好静益徬徨三庚退暑清風至九夏迎凉稱物芳意惜始終宵旰志踟蹰自問濟時方谷神不守還崇政暫養回心山水莊延薫山館并序入無暑清凉轉西爲延薫山館楹宇守朴不雘不雕得山居雅致啟北户引清風㡬忘六月夏木陰陰蓋溽暑炎風欵欵守峰銜山中無物能解愠獨有清凉免脱衫水芳巖秀并序水清則芳山静則秀此地泉甘水清故擇其所宜邃宇數十間於焉誦讀㡬暇静養可以滌煩可以悦性作此自戒始終之意云水性雜苦甜水芳即體厚名泉亦多覽未若此爲首頥卦明口實得正自養夀擇地立偃房根基度長久節宣在兹求勤儉勿落後朝牕千巖裏峭壁似天剖逺託思雲漢怡神至星斗精研書家奥臨池愈澁手清淡作飲饌偏心惡㫖酒讀老無逸篇年年祝大有萬壑松風并序在無暑清凉之南據髙阜臨深流長松環翠壑虛風度如笙鏞迭奏聲不數西湖萬松嶺也偃蓋龍鱗萬壑青逶迤芳甸雜雲汀白華朱萼勉人事愛敬南陔樂正經松鶴清越并序進榛子峪香草遍地異花綴崖夾嶺虬松蒼蔚鳴鶴飛翔登蓬瀛臨崑圃神怡心曠洵仙人所都不老之庭也夀比青松願千齡葉不彫銅龍鶴髪健喜動四時調雲山勝地并序萬壑松風之西髙樓北向憑牕逺眺林巒烟水一望無極氣象萬千洵登臨大觀也萬頃園林逹逺阡湖光山色入詩箋披雲見水平清理未識無愆守節宣四靣雲山并序澄泉繞石迤西過泉源盤岡紆嶺有亭翼然出衆山之巔諸峰羅列若揖若拱天氣晴朗數百里外巒光雲影皆可逺矚亭中長風四逹伏暑時蕭爽如秋殊狀崔嵬裏蘭衢入好詩逺岑如競秀近嶺似爭竒雨過風來緊山寒花落遲亭遥先得月樹密顯髙枝潮平無湧浪霧浄少多岐脉脉金明液溶溶積翠池常憂思解愠樂志餘清悲素學臣鄰老耆年自不知北枕雙峰并序環山莊皆山也山形至北尤髙亭之西北一峰峻出勢陂陀而逶迤者金山也其東北一峰㧞起勢雄偉而崒嵂者黒山也兩峰翼抱與兹亭相鼎峙焉嶔㟢岡岫紫宸闗乾地金峰坎黒山苦熱雲生雙嶺腹盆傾瞬息落溪灣西嶺晨霞并序傑閣凌波軒牕四出朝霞初煥林影錯繡西山麗景入几案間始登閣若履平地忽緣梯而降方知上下樓也雨歇更䦨斗柄東成霞聚散四方風時光豈在凌雲句寡過清談宜守中錘峰落照并序平岡之上敞亭東向諸峰横列於前夕陽西映紅紫萬狀似展黄公望浮嵐暖翠圖有山矗然倚天特作金碧色者磬錘峰也縱目湖山千載留白雲枕澗報深秋巉巖自有争佳處未若此峰景最幽南山積雪幷序山莊之南複嶺環拱嶺上積雪經時不消於北亭遥望皓潔凝映晴日朝鮮瓊瑶失素峨眉明月西崑閬風差足比擬圖畫難成丘壑容濃妝淡抹耐寒松水心山骨依然在不改氷霜積雪冬梨花伴月并序入梨樹峪過三岔口循澗西行可里許依巖架屋曲廊上下層閣參差翠嶺作屏梨花萬樹微雲淡月時清景尤絶雲牕倚石壁月宇伴梨花四季風光麗千巖土氣嘉瑩情如白日託志結丹霞夜静無人語朝來對客誇曲水荷香并序碧溪清淺隨石盤折流爲小池藕花無數綠葉髙低每新雨初過平隄水足落紅波面貼貼如泛杯蘭亭觴詠無此天趣荷氣參差逺益清蘭亭曲水亦虛名八珍㫖酒前賢戒空設流觴金玉羮風泉清聼并序兩峰之間流泉潏潏微風披拂滴石作琴筑音與鶴鳴松韻相應泉味甘馨怡神養夀恰合章孝標松下泉詩注瓶雲母滑潄齒茯苓香瑶池芝殿老萊心涌出新泉萬籟吟芳檻倚欄蒸靈液南山近指奏清音濠濮間想并序清流素練綠岫長林好鳥枝頭遊魚波際無非天適㑹心處在南華秋水矣茂林臨止水間想託身安飛躍禽魚静神情欲狀難天宇咸暢調萬斯年曲并序湖中一山突兀頂有平臺架屋三楹北卽上帝閣也仰接層霄俯臨碧水如登妙髙峰上北固烟雲海門風月皆歸一覽通閣斷霞應卜居人烟不到麗晴虛雲葉淡巧萬峰明雁過初賔鴻侣鷗雨秋花遍洲嶼暖溜暄波并序曲水之南過小阜有水自宫牆外流入蓋湯泉餘波也噴薄直下層石齒齒如潄玉液飛珠濺沫猶帶雲蒸霞蔚之勢水源暖溜輒蠲疴涌出隂陽滌蕩多懐保分流無近逺窮簷盡誦自然歌泉源石壁并序獅逕之北岡嶺蜿蜒數里翠崖如壁下暎流泉泉水静深尋源徙倚詠朱子問渠那得清如許爲有源頭活水來之句悠然有㑹水源依石壁雜踏至河隈清鏡分霄漢層波濺碧苔日長定九數髪白考三才天貺名猶鄙居心思道該青楓綠嶼并序北嶺多楓葉茂而美蔭其色油然不減梧桐芭蕉也踈牕掩映虚凉自生蘿蔦交枝垂掛崖畔水似青羅帶山如碧玉簪竒境在户牖間矣石磴髙盤處青楓引物華聞聲知樹密見景絶紛譁綠嶼臨牕牖晴雲趁綺霞忘言清静意頻望羣生嘉鶯囀喬木并序甫田叢樾之西夏木千章濃隂數里晨曦始旭宿露未晞黄鳥好音與薫風相和流聲逸韻山中一部笙簧也昨日聞鶯鳴柳樹今朝閲馬至崇杠朱英紫脱平原綠月駟雲􅀈錯落􅀈香逺益清調柳梢青并序曲水之東開凉軒前後臨池中植重臺千葉諸名種翠蓋凌波朱房含露流風冉冉芳氣竟谷出水漣漪香清益逺不染偏竒沙漠龍堆青湖芳草疑是誰知移根各地參差歸何處那分公私樓起千層荷占數頃炎景相宜金蓮暎日并序廣庭數畝植金蓮花萬本枝葉髙挺花靣圓徑二寸餘日光照射精彩煥目登樓下視直作黄金布地觀正色山川秀金蓮出五臺塞北無梅竹炎天暎日開逺近泉聲并序北爲趵突泉涌地觱沸西爲瀑布銀河倒瀉晶簾暎崖微風斜捲珠璣散空前後池塘白蓮萬朶花芬泉響直入廬山勝境矣引泉開瀑布迸水起飛珠鏘玉雲巖應色空有若無雲帆月舫調太平時并序臨水倣舟形爲閣廣一室袤數倍之周以石䦨䟽牕掩映宛如駕輕雲浮明月上有樓可登眺亦如舵樓也閣影凌波不動濤接靈鼇蓬萊别殿掛雲霄粲揮毫四季風光總無竭卧聞簫後樂先憂薫絃意藴羲爻芳渚臨流并序亭臨曲渚巨石枕流湖水自長橋瀉出至此折而南行亭左右岸石天成亘二里許蒼苔紫蘚豐草灌木極似范寛圖畫隄柳汀沙翡翠茵清溪芳渚躍凡鱗數叢夾岸山花放獨坐臨流惜谷神雲容水態并序闗口之南有室東向緣坡下望綠樹爲田青峰如堵川流溶溶白雲冶冶不知孰爲雲孰爲水也由長橋而渡疑入四明山中一逕分過雲南北雨過雲容易散波流水態長存悠然世俗惟念必得經書考原澄泉遶石并序亭南臨石池西二里許爲泉源源自石罅出截架鳴簹依山引流曲折而至雨後谿壑奔注各作石堰以遏泥沙故池水常澄澈可鑒每存髙静意至此結衡茅樹密開行路山長疑近郊水泉繞舊石雉雀樂新巢晴夜荷珠滴露凝衆木梢澄波疊翠并序如意洲之後小亭臨湖湖水清漣徹底北面層巒重掩雲簇濤湧特開屏障扁舟過此輒爲流連正如韋應物詩云碧泉交幽絶賞愛未能去疊翠聳千仞澄波屬紫文鑑開倒影列反照共氤氲石磯觀魚并序逺近泉聲而南渡石歩有亭東向倚山臨溪溪水清澈修鱗銜尾荇藻交枝歴歴可數溪邉有平石可坐以垂釣唱晩漁歌傍石磯空中任鳥帶雲飛羡魚結網何須計備有長竿墜釣肥鏡水雲岑并序後楹依嶺三面臨湖廊廡周遮隨山髙下波光嵐影變化烟雲佳景無邉令人應接不暇層崖千尺危嶂􅇽綠㡬重碧潭獅逕盤旋道北松枝宛轉山南沉吟力盡難得懸象俯察仰叅至理莫求别伎經書自有包函雙湖夾鏡并序山中諸泉從板橋流出匯爲一湖在石橋之右復從石橋下注放爲大湖兩湖相連阻以長隄猶西湖之裏外湖也連山隔水百泉齊夾鏡平流花雨隄非是天然石岸起何能人力作雕題長虹飲練幷序湖光澄碧一橋卧波橋南種敖漢荷花萬枝間以内地白蓮錦錯霞變清芬襲人蘇舜欽垂虹橋詩謂如玉宫銀界徒虛語耳長虹清徑羅層崖岸柳溪聲月照階淑景千林晴日出禽鳴處處入音諧甫田叢樾并序流杯亭之北𤓰圃之西平原如掌豐草茂木麕䴥雉兔交牣其間秋凉弓勁合烝徒行歩圍誠獵塲選地留憩田間樂曠觀恤閭閻叢林欣賞處遍地豫豐占水流雲在并序雲無心以出岫水不舎而長流造物者之無盡藏也杜甫詩云水流心不競雲在意俱遲斯言深有體驗雨後雲峰澄水流逺自凝岸花催短鬢髙年寸寸増聖祖仁皇帝御製文第三集巻五十
