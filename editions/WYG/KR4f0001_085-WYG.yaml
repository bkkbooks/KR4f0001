body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻四十古今體詩三十四首途次網得鮮魚馳進兩宫兼志思慕之誠千里難承玉陛歡鮮鱗網得勸加餐遥知長信開圅日定荷慈顏一笑看晩經淮陰淮水籠煙夜色横棲鴉不定樹頭鳴紅燈十里帆檣滿風送前舟奏樂聲平山堂宛轉平岡路向西山堂遺構白雲低簾前冬暖花仍發簷外風髙鳥亂啼仙仗何嘗驚野夢鳴鑣偶爾過幽棲文章太守心偏憶歐陽修自題平山堂詞有文章太守之句墨灑龍香壁上題天寜寺小艇沿流畫槳輕鹿園鐘磬有餘清門前一帯䢴溝水脈脈常含萬古情由儀真乘巨艦至京口長江萬里開鴻濛髙檣巨楫乘艨艟儀真京口路百里掛帆瞬息凌長風汀蘆洲樹看厯厯波恬浪闊光瀜瀜遄流直下入滄海逺源上與岷峩通山川斷續合雲霧日月照耀浮虚空舟行迅速疾飛駛恍聞擊鼓馮夷宫柂樓髙據極觀眺竒縱豁逹舒心胷年来江漢罷桴鼓河海清宴絶戰攻舳艫閒繫沙岸側水師捲甲懸長弓羽葆南廵渡揚子居安更念艱難功金山幷序金山在大江中南眺潤州北臨𤓰歩登陟其上縱目千里泱泱乎大觀也朕率扈從諸臣厯覽諸勝江山之竒未有逾於此者一覽江天勝東南勢盡收帆檣来極浦臺榭起中流路出丹崖上煙同碧漢浮登臨豁心目浩蕩俯滄洲試中泠泉緩酌中泠水曾傳第一泉如能作霖雨霑灑遍山川妙髙臺臺髙絶衆鳥臨眺暢清襟渺渺沙洲樹青青逺岸岑波濤巖下接洞壑檻邊深江水明如鏡彌徴天地心鐵甕城萬里晴江擁舳艫城髙鐵甕接康衢遺銘欲探華陽蹟舊宅難尋海岳圖半靣煙嵐雄北固一方形勢控東吳龍舟漫道廵行盛多恐深居政未敷竹林禪院在潤州城南竹徑數里一徑入深竹數里来上方叢生巖磴宻枝拂雲煙長華旗出林際芝蓋停三陽颯颯吹霜風碧葉紛翺翔山齋頗幽寂萬籟含虚光觸物感予懷歌彼淇澳章夜過丹陽錦纜徐牽夜未停遥天煙靄淡疎星居人兩岸明燈火早是輕帆過驛亭途中覽皇太子倣書以示之奎文一畫開天象保氏先教識六書筆勢須知貴嚴正好將功力足三餘錫山朝遊惠山寺閒飲惠山泉潄石流仍潔分池溜自圓松間幽徑闢巖下小亭懸聊共羣工濯天真本浩然吳閶鳴鑾獨上髙城望巷陌遥通水寺斜土俗惟知鬭歌舞閭閻不解種桑麻鳥啼茂苑千年樹霜冷吳宫十月花聲教四方猶未訖願將淳樸變繁華虎邱小阜迴岡落照紅長廊曲榭構西東獨憐劒石潺湲水霸業銷沉在此中句容道上漸入茅山境来當農暇時但看初日上未覺朔風吹碧歛寒塘水紅􅂷野樹枝江南經㡬郡民俗欲周知雨花臺何地飛花雨晴空無片雲江山恣遐矚草樹出清芬城郭參差見樓臺逺近分人家百萬户煙火盡氤氲幸報恩寺鳳刹髙懸上界燈珠缸璧帯一層層平臨下見諸天小晴日江山萬里澄駐蹕金陵以方物寄獻兩宫深宮違定省經月戀晨昏率土方為養蒼生共戴尊題書千里重託物寸心存遣使旌門外踟蹰望九閽金陵舊紫禁城懷古秣陵舊是圖王地此日鸞旗列隊過一代規模成徃蹟六朝興廢逐流波宮牆斷缺迷青瑣野水灣環剩玉河治理艱勤重殷鑒斜陽衰草繫情多江寜駐蹕皇太子啟至請安兼報讀完四書先聖有庭訓所聞在詩禮雖然國與家為學無二理昨者来江東相距三千里迢遥薊北雲念之不能已凌晨發郵筒開緘字滿紙語語皆天真讀書畢四子齠年識進修兹意良足喜還宜日就將無令有間止大禹惜寸陰今當重分晷披巻慕古人即事探奥㫖久久悦汝心自得芻豢美示江南大小諸吏東南財賦地江左人文藪時廵厯此疆民事日探剖風俗貴淳龎紛奢詎能久澄清屬大吏表率羣僚首郡縣布慈和愷悌歌父母民者國之本生計在畎畞六府既孔修三事安可後教化黙轉移各須盡官守户使敦詩書人知崇孝友庶㡬逺邇氓曍曍登仁壽誥誡申予懷斯言慎不負燕子磯夜泊巍峩一片江頭石千載人傳燕子磯疑有黿鼉藏窟宅時聞鐘磬出山扉牙檣緩住寒煙淨羽衛周連夜火圍沙岸聲聲動行漏蘆花深處雁驚飛髙郵湖見居民田廬多在水中因詢其故惻然念之淮揚罹水災流波常浩浩龍艦偶經過一望類洲島田畞盡沉淪舍廬半傾倒㷀㷀赤子民栖栖臥深潦對之心惕然無䇿施襁褓夾岸羅黔黎跽陳進耆老􅖴諏不厭頻利弊細探討饑寒或有由良慚奉蒼顥古人念一夫何况覩枯槁凛凛夜不寐憂勤惄如擣亟圖濬治功拯濟須及早㑹當復故業咸令樂懷保閲河堤作防河紆旰食六御出深宫緩轡求民隱臨流歎俗窮何年樂稼穡此日是疏通已著勤勞意安瀾早奏功泉林寺即子在川上處偶從川上駐行旃密樹重林帶野煙俯仰古今成一轍源泉晝夜尚涓涓途中長至旌門已報黄鐘節六琯葭飛律未殘靉靉占雲書太史瑲瑲執玉憶郊壇陽升一綫宮中日氷合重淵野外寒景福重闈應有慶晴光捧處是長安過闕里鸞輅来東魯先登夫子堂兩楹成俎豆數仞見宮牆道統唐虞接儒宗洙泗長入門撫松柏瞻拜肅冠裳闕里古檜榦聳朱甍外根蟠碧殿阿竒文成左紐元氣挺孤柯瑞與龜龍竝傳来嵗月多徘徊看手澤不共劫灰磨晩到河間太皇太后使人送乳餠食物綵斿晩駐瀛州道忽報銅龍騎使来心識慈懷同日照口傳温語逐陽回松脂似截盤中玉綺食初和鼎内梅兩月㡬虚甘㫖奉歸程欲聽曉鐘催廵幸回宮内殿進講毛詩丹甍繡户拂寒霜靜讀毛詩意覺長討論一言窮六義道心少悟愛斜陽原任總督于成龍居官清㢘自古罕有特命諸臣議䘏以勵官方服官敦㢘隅抗志貴孤潔敭厯著賢聲誰能茹荼檗况復擁旌麾藜藿甘以悦視彼懸魚操於今尤峻烈東南失保釐言念心如結江上見甘棠遺愛輿人説䘏典宜優崇庶不負清節匪獨彰國常且以風在列薊城遇雪凍雲封樹薊城西玉蕊輕盈亂馬蹄憶想年年常過此何曽瑞雪遍山谿讀左氏春秋作夫子維王道褒誅汗簡青千秋師鳳徳三傳翼麟經義理資參校丹鉛徹晝冥靜中欣悟入古訓是新銘聖祖仁皇帝御製文集巻四十
