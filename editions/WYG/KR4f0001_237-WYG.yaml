body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻二十序親征平定朔漠方略序朕祇承天眷懋紹祖宗丕基為億兆生民主薄海内外皆吾赤子雖越在邊徼荒服之地儻有一隅之弗寧一夫之不獲不忍恝然視也西北塞外喀爾喀七旗與厄魯特四部落並號雄藩同奉職貢非一日矣不意有厄魯特噶爾丹者賦性凶殘中懐狡詐戕害其兄弟兼并四部蠶食鄰封其勢日張其志益侈朕初聞厄魯特與喀爾喀交惡隨遣親近大臣頒恩賚以和觧之迨其後興兵搆怨又命大臣曉譬利害諭令息爭乃噶爾丹抗㫖狂逞致喀爾喀為所潰敗叩闗乞援朕收撫之置諸邊内資給餼牽始皆得所而噶爾丹猶修郄如故所在侵陵忽闌入我烏闌布通之地朕受鉞親王大臣問罪聲討大師克㨗未即殄除時賊倉皇宵遁深懼我軍之窮追投牒指誓因而釋之假使噶爾丹能自此悔禍改圖則雖至今存可也夫何轉瞬渝盟包藏不軌窺伺我斥堠摇惑我外藩潛敓我納木扎爾拖音肆虐不止朕深念此㓂斷宜速滅於是整飭士馬備峙糧糗決䇿親征而賊之蹤跡飄忽無常又慮其兵至逺颺兵退復入乃授密畫於科爾沁王沙津令其遣使誘賊約至近地旋調發盛京諸路軍禦東路分遣一軍截西路朕躬統六師從中路入比行近賊巢噶爾丹不敢抗我顔行聞風奔竄朕遂親率前鋒軍併日追擊賊窮蹙已極盡棄其子女輜重而遁會與我西路師遇大敗其軍噶爾丹僅以數人跳身走嗣是朕再駕而至鄂爾多斯三駕而至狼居胥山麓宣威布恵兼用互施招徠其黨羽遏絶其歸路其寨桑等接踵嚮附其子復為我擒賊自料勢不能逭遂爾仰藥授首所親信丹濟喇等亦相繼乞降二十餘年狡悍陸梁之勁㓂曽不二載悉皆草薙禽獮而大業克就矣夫烈燄弗戢必將燎原積㓂一日不除則疆圉一日不靖方親征之初舉也在廷諸臣多持異議狃於目前之計者謂兇鋒挫衂無足深憂憚於征繕之煩者謂大漠逰魂難以就縛不知除惡務盡制勝在謀歴觀漢唐宋之已事徃徃罷敝中國之力而不能成廓清邊塞之功良由經理失宜而殲鋤之不早也朕既逺鑒前轍復追維烏闌布通之失故不避寒暑艱辛親涖窮邉三勤薄伐惟是逆形已著然後徂征怙惡不悛然後摉討身先士卒則櫛風沐雨而人皆忘勞指畫軍儲則轉饟饋師而人爭用命茂草茁於荒磧流泉溢於沙陀萬里經行安如枕席非徼神祐曷繇臻此易曰天之所助者順也人之所助者信也朕仰慿天道俯惬人情以萬不得已而用兵之意乗刻不容緩而滅㓂之機立拯邉境之毒痡永底中原於清宴昭告郊廟適契成謀使非慮出萬全可輕言師旅哉兹前後用兵夲末具載卷中覽是編者尚克喻朕心焉増修皇輿表序皇輿表一編肇成於康熈己未製序卷端時置几案歴有年所顧原編紀載沿革於郡縣特詳其地列輿圖而未設有郡縣者槩未編入朕惟國家統御方夏覆載之内視均一體外藩䝉古諸屬國自祖宗朝後先收服次第歸誠迨朕臨御以來蕃王君長嵗時貢琛悉比内地繡壤相錯不啻萬有餘里邇者喀爾喀青海部衆稱臣嚮附土宇益廓計其山川封域斥堠之所屇分野之所屬皆按地而可考也至於山陬海澨新隸職方者二十餘年間建州樹邑徃徃而有又若朝鮮交阯諸國之奉職惟䖍邉徼土目之革心效順亦從來志方輿者所宜備載爰命儒臣更加増輯共十有六巻書成特令刋梓用示來兹於戲幅員延袤亦云廣矣而蕃生息厚風俗之道則實資於廟堂之經理朕開編循覽深念髙卑險易形勢不齊燥濕剛柔風氣各異然而秉彞恒性遐邇皆同朕以一身為中外元元主惟是張官置吏以牧民生禁暴設防以禦民患既鞠養之務徧尤教化之宜周早夜孶孶無日不心通乎四海九州之隠書不云乎自朝至於日中昃不遑暇食用咸和萬民凡我後人覩是編者知剏造之維艱思懐柔之不易則千百禩無疆之厯服其庶克永荷天庥也夫五燈全書序朕惟天生蒸民厥有恒性迨物交私蔽以後遂不能有善而無惡故操治世之權者必兢兢以勸善懲惡為先務焉大易著閑邪存誠之義尚書明福善禍淫之㫖皆所以啓牖下民使之回心嚮道而勿即於匪彞也間嘗流覽釋氏之書立教雖主於空寂而其戒欺去妄蠲忿窒欲亦與勸善懲惡之道葢無殊㫖焉自宗門教興曹溪而下五派迭衍各有撰述宋景徳以後裒集為傳燈諸録嗣是又舉挈要領彚成一編是為五燈會元洎乎夲朝沙門海寛念其支派繁衍自宋金元明數百年來傳述闕然乃著纉續一書今聖感寺僧超永復慮譜牒漸棼聞見不一用是旁蒐博考折𠂻於二編而叅訂之刪其煩蕪増所未備以成全書其用心也可謂勤矣至於簡牘所載互相印證之語罕譬曲喻為說甚夥而其大指要歸亦惟欲袪迷惑以復性真不越乎閑邪存誠牖人為善之意匪僅有裨於禪宗教㫖而已也故為之序清文鑑序朕惟自昔聖人易結繩以書契用使天下之義理悉歸文字天下之文字悉歸六書六書備而義理無不畢具苟不為講習修明則形聲㸃畫之制雖存其義㡬乎息矣我太祖髙皇帝創業垂訓至仁合於天地肇造清書大文昺如日月太宗文皇帝上聖之資開天之運繼志紹聞丕宣文治世祖章皇帝神靈首出智勇天授秉英斷之資持以恭儉擴寛仁之量濟以憂勤朕以凉徳膺祖宗之鴻圖即位多年未嘗晷刻不以法祖為念兢業自守宵旰靡遑萬㡬之暇惟以讀書窮理盡吾之志凡五經四書已經翻譯之外如綱目講義等有闗於治道者靡不譯盡近來老成耆舊漸就凋謝因而㣲文奥㫖久而弗彰承譌襲舛習而不察字句偶有失落語音或有不正國書所闗至鉅政事文章皆由此出非詳加釐定何所折𠂻非編輯成書何以取法爰詔儒臣分類排纂日以繕槀進呈朕親御丹黄逐一審訂觧詁之疑似者必晰同異於毫芒引据之闕遺者必援經史以互證或博咨於故老或㕘考於舊編大而天文地理小而名物象數十二字母五聲切音具載集中名曰清文鑑用探音聲之夲原究字畫之詳盡為部三十有六為類二百八十為書二十一卷清文得此而無餘藴凡以明祖徳之源流敬夲之深意也易云觀乎人文以化成天下朕仰承列祖創造之𢎞模深惟國家同文之盛典嵗閲數周彚成全帙誦是編者尚其體朕歴載之勤劬因音聲以求字畫因字畫以求文章繼自今詔令之出納章奏之敷陳以及達於遐陬勒諸琰琬者大經大法咸有據依一話一言式循典則庶㡬國書永貽於千百禩而與日星河漢長垂天壌也夫全唐詩録序在昔詩教之興夲性情之㣲導中和之㫖所以感人心而羙謡俗被金石而格神祗故大舜以教胄子樂正以造俊秀盖自二帝三王之世固已然矣文武成康之際王澤洽頌聲作洋洋乎洵足以繼薰風之操並卿雲之奏也自時厥後作者彌繁孔子從而刪定之使六義彰明一經燦列録其忠厚悱惻之辭以寓諷諭戒勉之意天道人事胥於是乎具焉漢魏以還尤多新製體例雖更前徽未邈至陳隋之末稍凌替矣唐之太宗致治㡬於三代之隆躬自撰著一時文人才士將相名臣詠吟遞發藻采繽紛踵襲雅騷之迹光昭正始之音而歌行律絶獨創兼能自遐古以來未甞有也爰及盛唐逮乎中晩或與運會為髙下而凡緣時託志觸物攄懐形諸翰簡者皆卓然成一家之言弗可廢也朕萬㡬餘閑迴環覽詠尋其指歸晰其正變而三百年升降得失之故亦因以可考焉於是論世觀人即其章句攬其菁英勒為成書置諸几席每勤披閲加以精研迄於今已歴有年所矣頃以視河南巡至於江浙見比閭士庶有吹豳擊壌之風獻詩頌者絡繹於途雖其工拙淺深各極其不齊之致而衢謳巷舞儼然省方之所採列國之所陳亦可見人情之愛戴而先王以詩為教之義濡染而蒸陶之者所闗甚鉅也翰林侍讀徐倬以全唐詩録進展巻而讀之與朕平時品第者盖有合焉嘉其耄年好學遷秩禮部侍郎以為天下學者之勸乃取兹集親為鑒定賜以帑金即命校刋俾誦習者由全唐之詩沿波討瀾以上溯夫汾泗之傳而㳺泳乎唐虞載賡之盛其於化理人心將大有裨益也矣是為序以弁其端云康熈四十五年三月初七日全唐詩序詩至唐而衆體悉備亦諸法畢該故稱詩者必視唐人為標準如射之就彀率治器之就規矩焉盖唐當開國之初即用聲律取士聚天下才智英傑之彥悉從事於六義之學以為進身之階則習之者固已専且勤矣而又堂陛之賡和友朋之贈處與夫登臨讌賞之即事感懐勞人遷客之觸物寓興一舉而託之於詩雖窮達殊途悲愉異境而以言乎攄寫性情則其致一也夫性情所寄千載同符安有運㑹之可區别而論次唐人之詩者輙執初盛中晚岐分疆陌而抑揚軒輊之過甚此皆後人强為之名非通論也自昔唐人選唐詩有殷璠元結令狐楚姚合數家巻帙未為詳備至宋初撰輯英華收録唐篇什極盛然詩以類從仍多脱漏未成一代鉅觀朕兹發内府所有全唐詩命諸詞臣合唐音統籤諸編參互校勘蒐補缺遺略去初盛中晚之名一依時代分置次第其人有通籍登朝嵗月可考者以嵗月先後為斷無可考者則援据詩中所詠之事與所同時之人繫焉得詩四萬八千九百餘首凡二千二百餘人釐為九百巻於是唐三百年詩人之菁華咸采擷薈萃於一編之内亦可云大備矣夫詩盈數萬格調各殊溯其學問夲原雖悉有師承指授而其精思獨悟不屑為苟同者皆能殚其才力所至沿尋風雅以卓然自成其家又其甚者寧為幽僻竒譎雜出於變風變雅之外而絶不致有蹈襲剽竊之弊是則唐人深造極詣之能事也學者問途於此探珠於淵海選材於鄧林博收約守而不自失其性情之正則真能善學唐人者矣豈其漫無持擇汎求優孟之形似者可以語詩也哉是用製序巻首以示刻全唐詩嘉與來學之㫖海内誦習者尚其知朕意焉聖祖仁皇帝御製文第三集巻二十
