body:
  text: 欽定四庫全書巻聖祖仁皇帝御製文集巻三十七古今體詩三十九首駐蹕南苑遣使恭進太皇太后鮮果日永離宮節候新薰風早已獻嘉珍赤瑛盤内甘鮮果奉進瑶池第一人南苑元靈宮是世祖皇考建傑閣横霄峻清都與漢翔規模開壯麗星宿燦輝光碧瓦浮空翠金鋪映日黄門當啼鳥靜户有異花香細草沿階發新槐拂檻凉紆迴疏輦路藻彩繪雕梁警蹕臨仙境瞻依問谷王敬欽崇太昊繼述憶先皇嵗月碑文古乾坤事業昌茫茫扶大造暭暭體穹蒼恭己身無倦齋心念不忘時廵非逸豫㡬暇豈遊荒衛騎驂驔列華旄宛轉颺南薰披萬物北斗起千祥瑞氣庭前見佳辰晝正長休歌白雲曲吾道在惟康南苑行圍苑中閒教陣無事靜論邊不廢時苗典思周天下先徳壽寺持身崇孝理清淨契真如嵗久開金寺時来降玉輿南苑晩景薰風南苑翠斿回處處連雲暮色催夜火輝煌盈帳幕離宫長待萬㡬来瀛臺偶作蟬鳴槐葉緑魚躍芰荷風太液臨斜景參差更不同咏水禽水禽遥泛雪池卉迥披紅桐葉翩翩舞迎薰景未窮雨稼穡憂勤在建章油雲灑落滿巖廊凭牕喜雨雨方足五穀秋成樂萬方臨城望城髙千仞衛山川虎踞龍盤王氣全車馬遥看雲霧裏民間休戚在當前夏日有懷木槿花開夏日長時摇清扇倚方牀三庚不輟臨朝政盛暑常思守戰塲内苑晩凉内苑看槐花依檻臨池日欲斜龍戲清潭娛夏景片雲生處足桑麻立秋前一日晩同左右閒坐進鮮果初到金風天氣晩㣲凉雨後畫簾垂九重迥出白雲逺三殿髙臨北斗移珍果滿盤新獻節碧梧一葉報秋時漏深不寐題詩句月色煇煌照鳳墀秋蘭幷序殿前盆卉芳蘭獨秀昔人稱為王者香又以方之君子因題四韻猗猗秋蘭色布葉何蔥青愛此王者香著花秀中庭幽芬散緗帙靜影依疎櫺豈必九畹多侈彼離騷經初秋幸西苑觀荷命小船採蓮命駕来西苑初秋向晩天芰荷池沼滿鷗鷺夕陽邊頻使移輕舫時来獻採蓮離宫闌檻外風動碧翩翩臨池觀魚有懷臨池魚躍白雲連太液東邊問小船一色水天明似鏡風波銷滅在何年夜至三鼓坐待議政大臣奏事有感而作午夜迢迢刻漏長每思戰士㡬迴腸海東波浪何年靖日望軍書奏凱章七夕爽氣三秋早仙期此夕經針樓連萬户機石動䨇星玉露交珠綴金風度綺軿天文在雲漢流影照彤庭沙河途中作煇煌明輦道將曉漏聲殘秋月西山落金風北野寒望陵悲樹色就景盼雲端每念芳華日溥溥露未乾清河荒亭楸葉晩蟬鳴荒亭蟋蟀聲露凝新樹色日出滿林明蛺蝶從枝舞蜻蜓㸃水輕欲看秋景好歸路且徐行初秋景山新凉樹色向金天御輦遥停蔓草邊盛暑已過銷夏日清風纔到有秋年髙臨三殿九重闊下看千家萬户連薄暮山亭觀射畢回宫複道起蒼煙題日精門古硯古硯何年斲雲箋冩御章宫門秋雨濕内殿晩風凉夕景鑪煙動晴光燭影長文房友筆墨灑翰起龍翔待曉閶闔餘殘暑夕籟鳴髙秋曖曖月始出泠泠露初浮逺色淡河漢新凉灑裀幬夜氣倍澄寂庭宇彌清幽眷言希古則羲軒詎可儔不寐定天保昧爽思旁求徃軫雖緬邈来途非阻修低徊待申旦治理今何由賜奉命大將軍傑淑二首巻斾生風壯氣揚早持龍節定炎方秋毫無犯民心悦盡掃欃槍奏凱章其二旄鉞纔臨父老迎樓船一舉海波清金甌已定千年業銅柱須標萬古名秋日咏刀七寶刀光耀斗牛建章佩帶向初秋清流越砥方知力截兕剸鯨斷不愁海子北紅門秋雨後行圍戲作晝漏稀聞紫陌長霏霏細雨過南莊雲飛御苑秋花濕風到紅門野草香玉輦遥臨平甸闊羽旗近傍逺林揚初晴少頃布圍獵好趁清凉躍驌驦晾鷹臺清晨漫上晾鷹臺八駿齊登萬馬催遥望九重雲霧裏羣臣就景獻詩来南苑閲馬渥洼龍種雪霜同毛骨天生氣格雄八駿齊觀南苑裏豈誇當日玉花驄中秋望月坐望中秋月正圓玲瓏丹桂植當天無私普照八荒外皎潔清光雲漢邊賜輔國將軍俄啓詩幷序内大臣輔國將軍俄啓侍從帷幄勤勞茂著百歩穿楊發矢如電因賜御章以旌其射觀徳由来上古風手持滿月緑沉弓鷹揚虎視流星逺中鵠穿楊為世雄秋日晩景有懷寒鴉秋景集南林遥倚屛山綺樹陰丹闕逺砧鳴午夜玉壺清漏起遐心衷情靜裏無人識外象閒中有物尋憶想千般聞落葉且須持筆漫㣲吟大將軍報吳逆暴死其下賊衆潰散無餘大兵指日進取恢復封疆遥天今日捷書来萬里歡聲動地開從此黎民皆樂業軍威應振凱歌迴康熙十七年九月初十日奉太皇太后臨御温泉恭紀五言排律八韻慈寜方曉日掖輦幸温泉羽騎清塵道華旗衛御前九重雙闕迥三輔萬家連蔥鬱東臯樹蒼茫北嶺煙問安頻色喜侍膳每心懸孝養尊親重時巡法祖䖍村村施化溥處處得恩光更慮民情隱深慚撫八埏駐蹕平家灘鑾輿駐蹕近滄浪行殿崔嵬對夕陽郊外村莊時極目秋成處處有風光潞河曉起至太皇太后行殿問安曉色方明在潞河孤山逺影鬱嵯峨孤山在潞河之東寝門恭問慈顏喜還愧無能作賦歌見雁南飛歸雁南飛有數行南飛度嶺向衡陽欲將信息傳軍士早報成功返故鄉駐蹕薊州城南逺眺山村萬騎驂驔擁薊城風行雷出逺天清㣲霜細草野狐懼寒露荒煙山鳥鳴捲幔浮凉侵帳殿倚牀明月似都京欣隨聖母遊情曠深夜還思勉愫誠山中獲野禽恭進太皇太后吹笳清輦道大地雜旌旂萬壑来秋色千巖散落暉鷹隨山雉逺箭帯野禽歸遣使呈鮮味須令馬迅飛曉起山路口號荒屋山中月色闌秋髙邊塞正風寒羊腸石道臨泉水已靜人聲足曠觀聖祖仁皇帝御製文集巻三十二
