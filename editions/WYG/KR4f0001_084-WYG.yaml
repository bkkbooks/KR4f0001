body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻四十目録古今體詩三十四首途次網得鮮魚馳進兩宫兼志思慕之誠晩經淮陰平山堂天寜寺由儀真乘巨艦至京口金山幷序試中泠泉妙髙臺鐵甕城竹林禪院在潤州城南竹徑數里夜過丹陽途中覽皇太子倣書以示之錫山吳閶虎邱句容道上雨花臺幸報恩寺駐蹕金陵以方物寄獻兩宫金陵舊紫禁城懷古江寜駐蹕皇太子啟至請安兼報讀完四書示江南大小諸吏燕子磯夜泊髙郵湖見居民田廬多在水中因詢其故惻然念之閲河堤作泉林寺即子在川上處途中長至過闕里闕里古檜晩到河間太皇太后使人送乳餠食物廵幸回宫内殿進講毛詩原任總督于成龍居官清㢘自古罕有特命諸臣議䘏以勵官方薊城遇雪讀左氏春秋作
