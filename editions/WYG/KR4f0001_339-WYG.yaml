body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻十九勅諭諭侍郎張廷玉學士勵廷儀自去嵗秋冬雨雪皆不甚足今立春至清明益覺亢旱民以食為天朕以萬姓為念雨暘不時朕心豈能安乎現今各處立壇為朕祈福不如祈雨倘得大沛甘霖朕即以為福矣爾等即傳諭各處康熙六十一年二月三十日諭大學士九卿詹事科道科道官俱係朕切近清要之員伊等尚有試俸之例至捐納人員皆照常補用但伊等在任不過數月事務尚未熟練即便陞遷如主事未乆又陞員外郎中外省府道等官陞補亦然未免太速應將伊等試俸三年再行陞用雖加捐陞補仍應隨帶試俸字様或堂官督撫題明稱職再行陞轉大學士九卿詹事科道㑹同確議具奏康熙六十一年三月二十六日諭大學士九卿等用人行政朝廷之大權也文官銓選掌之吏部武官遷除掌之兵部吏部論班論俸兵部論俸論銜從來定例也其武官歴三年加銜調補之例甚善近來督撫提鎮題補太多始不過州縣官千把總之類今則司道以下副叅以上亦皆保題矣值此用兵之際不妨姑行之此習若乆大有關係且伊等題補官員内雖有一二知者而不知者甚多補用後遂皆稱為奉㫖補授之員爾諸臣皆讀書之人何可不慮及此乎在京大小職官皆朕所選用賢否易知有不職者則去之非如外省督撫提鎮題用之員即九卿保舉或有所私其弊猶小盖用與不用全在朕也若外省保舉之官非朕所素知烏能一一定其優劣乎大學士㑹同九卿詳議具奏康熙六十一年三月二十六日諭户部趙宏燮奏將收貯真定順徳各州縣四萬石米平糶其餘州縣有米貴之處亦將倉糧平糶十分之三俱俟秋收後買補還項等語去年各州縣收貯庄頭等所交米石部内曽遣司官㑹同地方官糶賣其糶米銀兩至今尚未交完據此各州縣收貯倉糧俱無實在平日積貯原為備荒而設今值青黄不接之時固應平糶但地方官虧空倉糧不過糶賣數石即借此掩飾伊等虧空究竟倉糧既虧百姓從何糴買於民生並無益處也現在存倉米糓數果全有即照該督所請糶賣倘朕遣大臣查看時州縣並無米糓黎庻不得糴買將州縣官即行正法該管上司從重治罪康熙六十一年四月初四日諭大學士馬齊松柱蕭永藻王掞王頊齡學士阿克敦額赫納格爾布登徳吳爾泰蔣廷錫勵廷儀此所議應崇祀處皆是但其中尚有宜詳細斟酌者從前所定配享功臣大概開國元勲居多如明之徐逹不過一草莽武夫劉基係元之進士皆遭遇成功遂以元勲配享其有治安之世輔佐太平有功君國者反不得與配享之列是皆未為允當也又如有明天下皆壞於萬厯泰昌天啟三朝愍帝即位未嘗不勵精圖治真至無可如何明之亡非愍帝咎也朕少時見明之遺舊甚多知明末事最切稗官野史所載俱不足信愍帝不應與亡國之君同論萬厯泰昌天啟實不應入於崇祀之内大學士㑹同九卿將此詳細分别確議具奏康熙六十一年四月初九日諭朝鮮國王李昀朕惟父子相傳有國之常經兄弟繼及一時之權道兹覽王奏以抱疴日乆嗣續維艱請將親弟延成君昑建為世弟情辭懇至朕勉允所請遣大臣齎捧誥命封李昑為朝鮮國王世弟並賜綵幣等物惟王朂弟昑敦乃彛倫永懷忠順衍本支之休慶保宗社之安寧王如兆叶禖祥吉占熊夢王其再奏欽哉無替朕命故諭康熙六十一年四月初十日諭大學士馬齊等去年黄河漫溢流至直𨽻山東等處朕念有關民生漕運隨聞即遣官二三次前往勘騐特差諳練河工牛鈕齊蘇勒馬泰將應修挑水壩堤岸之處繪圖朕親為指示俱於嵗前修畢交與該撫將伊等撤囬冬天冰凍時所築工程至春日消融之候定稍覺動䧟楊宗義理宜親自看守不時遣官増土加埽極力保固乃身為地方廵撫並不留心踈忽從事復致衝決朕每慮及若不催儧修築告竣於雨水之先值雨水大行之際將作何堵築耶楊宗義不催築竣工殊屬不合一切工程俱着交與楊宗義令速修完倘不勝任將楊宗義拏交該部嚴加治罪康熙六十一年五月二十日諭刑部此事情部駁雖是而語氣太鬆朕知佘起蛟漢仗好係年滿千總曽經潘育龍題補守備逰擊之人這事亦年乆矣何得誣稱已故之潘育龍耶原審已屬不明今該撫竟不詳察事之縁由濫行混奏殊屬不合着仍交該撫另行詳細審明具奏倘不審明仍復混奏將該撫交部嚴加治罪康熙六十一年五月二十九日諭大學士馬齊尚書孫渣齊徐元夢侍郎查弼納六相學士格爾布吳爾泰蔡珽去嵗黄河泛溢流至直𨽻山東等處朕念民生運道關係綦重特遣牛鈕齊蘇勒馬泰前往親為指示於年前俱已修完將現成完竣之工交與楊宗義楊宗義聼信上游居住小人無稽之言視為甚易將預備加幫防守之處數月不行加謹看守以致衝決朕屢下嚴㫖着令於雨水之前務必儧修完竣若遇水大時便難堵築今竟至如此此河關數省之民生往來之糧艘朕日夜憂思望堵築完工之信楊宗義漫不經心既不多備物料又不在工所監修銷筭錢糧初非要務乃多方託故躱避今值雨水盛大之際以致修築將成之壩工又被衝決此工程關係𦂳要着九卿詹事科道㑹同速議具奏康熙六十一年六月初六日諭大學士馬齊尚書孫渣齊徐元夢侍郎查弼納六相學士格爾布吳爾泰蔡珽秦家厰隄工楊宗義牛鈕不能堵築馬營口所出之水想又如去年流至直𨽻長垣縣等處着行文直𨽻總督趙宏燮民間房屋地畆有被水渰者加意撫綏毋致失所此水泛濫亦必由張秋流入運河漕船恐致有悞令山東廵撫李樹徳親身前往監看料理修治下來之水若大引入鹽河流去使漕船可過毋致有悞康熙六十一年六月十三日諭兵部派撥千總發往各省分營當差爾等所議部文一到有出守備員缺即照所分次序具題補放若等候缺出具奏後始行補授則往返多需日期員缺必致乆懸伊等俱係朕揀選之人嗣後缺出報部部内即按次序補用不必引見亦不必具奏如此則任所得人甚速而缺不乆懸矣此所補人員内有老弱殘疾之人該督撫提鎮自必開缺也康熙六十一年七月二十一日諭刑部藍理出征効力之處甚多又在阿爾泰軍前効力回來身故此事情即着照督撫等察估完結其外别項俱從寛免其察追藍理從前曽治罪入旗將伊妻子俱於旗下撥出歸入原籍康熙六十一年八月十三日諭大學士馬齊等據盧詢奏六七月連次得雨又復概稱甘肅所屬地寒節遲目下夏麥等項正在收穫有五六分者有七八九分者米價尚未能平朕臨御政務殷殷以生民為念凢有各處人來必詳詢雨澤及收穫分數今年聞甘州肅州田禾甚嘉年羹堯亦經摺奏且雨澤雖數百里之内即有不同况甘州肅州所屬地方遼濶有數千里乎盧詢並不詳核聼信傳言以奏摺斷不發出將闔屬地方一概草率具奏盧詢於地方事務漫不經心奏朕之事不加敬慎妄行陳奏甚屬膽大鶻突暗昧浮躁不堪殊玷署理之職着嚴飭之如再冒昧陳奏着拿解交送刑部康熙六十一年八月二十八日諭大學士馬齊尚書孫渣齊侍郎勒什布張廷玉查弼納六相特古忒學士阿克敦額赫納格爾布吳爾泰蔣廷錫陜西廵撫噶什圖奏稱陜西虧空甚多若止於叅革官員名下追補究竟不能速完查秦省州縣火耗每兩有加二三錢者有加四五錢者臣與總督商議若量留本官用度其餘俱捐出補完合省虧空如此則虧空即可全完等語朕謂此事大有關係斷不可行定例私派之罪甚重火耗一項特以州縣官用度不敷故於正項之外略加些微原是私事朕曽諭陳璸云加一火耗似尚可寛容陳璸奏云此是聖恩寛大但不可說出許其加添朕思其言深為有理今陜西因叅出虧空太多無從完補不得已而為此舉彼雖宻奏朕若批發竟視為奏准之事加派之名朕豈受乎特諭爾等滿漢共知之康熙六十一年九月初十日諭大學士馬齊尚書孫渣齊侍郎勒什布張廷玉查弼納六相特古忒學士阿克敦額赫納格爾布吳爾泰蔣廷錫朕撫御寰區時以生民為念凢各省將軍督撫提鎮差遣進摺之人及從外省來者必詢問雨暘收穫與米糧物價今年五月間因京師錢價漸長故將應給兵丁月餉銀錢兼放至今尚未得平昔年因錢價貴管理錢法侍郎陳廷敬阿蘭泰佛倫馬世濟等條奏奸宄圖利毁錢作銅以致錢價騰貴如將制錢鑄重一錢則錢價即平於民甚便九卿照陳廷敬等所奏議覆准鑄小錢朕遲迴數月不肯准行是時科爾坤佛倫屢奏將制錢鑄小甚有裨益始從其請迨後私鑄甚多朕以制錢仍應照舊鑄大者為善故特降諭㫖而九卿復請鼔鑄大錢將小錢銷毁朕念小錢行之已乆忽又專行大錢未知於民有無利益暫令大小兼用試行三年一次奏聞於是大小並行自後錢價並未見長於民亦甚便利此皆朕所理之事所降諭㫖皆有記注可據也再從前商人辦買銅觔時錢價尚平自趙申喬奏請交八省督撫採買遂致遲悞部臣將遲悞官題叅朕以採辦銅觔始改交八省若將初次違限官治罪似屬寃抑故暫行寛恕其後銅觔雖陸續解送而不能全到有悞鼔鑄矣銅觔少則鼔鑄悞鼓鑄悞則錢價貴甚矣凡事不可執一湏隨時立法也鑄錢一事從前屢經更改今錢價何故驟貴如何使之得平交九卿詹事科道㑹同確議具奏可否鼔鑄小制錢與大制錢兼用其一併議之康熙六十一年九月初十日諭大學士馬齊等香山副將員缺部既行文令該督等題補今該督將人題補又責其與例不符一切武官職名俱載在部冊遇題補缺出查冊内有合例之官即應行文令其題補如無合例者即應照例補授朕停各處題補者特為將本地把總千總層累題至本地副將總兵之故若如此往返行文以致乆懸員缺反與朕原㫖不相符合將本發回另議具奏康熙六十一年九月十二日聖祖仁皇帝御製文第四集巻十九
