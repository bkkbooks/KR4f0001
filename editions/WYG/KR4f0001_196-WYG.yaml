body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集總目五巻第四十五古今體詩二十五首詠嶺外金蓮盛放可愛大城文安等處堤修完舟中駐蹕王家口朕偶至潭柘覽老和尚照福畫像因而有感故作詩賜之賜皇太子生辰詩國舅佟國維六十壽詩以賜之靜明園喜雨密雲作石匣營作倣唐人戲作讀書得風雲月露字因而分作四句中成絶一首塞外新秋夜聞雷雨大作曉賦志喜賦得芳氣有無中早起㸔雪詠盆中松竹梅各一首靜坐讀書自喻幷序詠鴈立春詠彈琴四十一年除夕書懷賦得爆竹聲中一歲除是日微雪賜雲南法界寺講經溥畹燈節戲作巻第四十六古今體詩三十首三渡齊河即事趵突泉留題源清流潔四字夜登泰山新栁覽淮黃成登金山望長江虎丘雨後見桃花過雲栖憩竹林下令人劚筍劚蘭雲栖歸途遇雨錢塘江潮西湖夜月岸側桑葉初碧癸未春二月二十日自杭回至蘇州是夜雨二十一日朕欲北行地方大小官員百姓留住二十二日雨甚再留不能起行二十三日雨晴又欲留故書懷以示巡省江浙見閭閻有起色示諸臣省刑愛民船泊無錫至江寧百姓歡迎遮道志喜行宮春雨作書竟日江寧道上口號清明麥秀下長江舟中作自江寧至京口登焦山維揚雨霽見泰安等數州縣饑民亟命設法賑濟東八牐舟遇順風志喜閲兩河告成事畢因有恩詔星夜回京至天津書懷前過江浙桃花已放今回鑾至津門復見桃花盛開詠各種牡丹詠杜鵑花賜高士奇巻第四十七古今體詩三十六首賦得萬物靜觀皆自得麥秋盈野志喜有序将之山荘四首賦得綠樹隂濃夏日長尖齊圎健筆之四德戲作四首古戍三絶賦得雨灑石壁來塞外山荘毎時屇炎暑即赴口外掖輦視膳朝夕温凊自初夏皇太后偶爾違和故不至此清凉之境因詠懷一首敬書於箑頭恭進以接清風而舒逺慕之微悃而已避暑駐蹕山荘六月間隂霖少晴自立秋日晴霽喜懷山荘夜雨聽灤河溜聲穹覽寺偶成兄裕親王輓詩二律過固闗入山西境固闗口號平定州幸西省至太原渡黄河潼闗駐蹕入陜西境望華山渭河見終南山冬至日抵西安遥祝皇太后萬壽長安行西安偶作回鑾至華隂欲登華山因風霧所阻由豫省回鑾渡孟津賜超玉和尚
