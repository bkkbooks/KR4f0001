body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集總目五巻四十三古今體詩四十一首季夏逰西山憶舊詠花夏日閒坐夏日郊行苦熱戱作雨中逺望日講畢同翰林張英髙士竒勵杜訥看荷初秋中元日蕉園作復逰盤山絶頂春日觀花夏日口外寄宫中避暑暢春園雨後新月喜雨詩十六韻幷序南廵再過濟南觀珍珠泉幷序經泰山之麓幷序再過淮南幷序淮城曉霜聞雁蠲江南逋賦幷序過維揚幷序金山江天寺焦山駐蹕金山雨過錫山虎丘望山後鄧尉山鄧尉小軒望太湖登靈巖晩過吳江入平望幷序禾中道上廵幸杭州吳山泛舟西湖西溪題西溪山荘以竹窻二字書賜髙士竒過桃花嶺至玉泉寺湖心亭渡錢塘江山隂巻四十四古今體詩四十八首謁大禹廟登卧龍山越望亭雲栖竹樹甚茂幽蘭滿山虎跑泉幷序靈隱寺飛来峰諭浙省将吏軍民幷序舟中書懐将逰華山以欲雨未徃雨中幸錫山園林惠泉無錫小民以羔羊惠酒爭獻御舟笑而遣之句容雨望廵幸江寧賜江寧文武将士宴於教塲再過明故宫江寧駐蹕幷序後湖詠幽蘭登報㤙寺浮圗上巳日再登金山長江夜月曉發維揚順風揚㠶午餘已過秦郵自宿遷解纜一日夜達山東境春晴舟中作途次書懐清明憂旱憶民事作榴花盆景榴花髙有數寸開花一朶輓大行皇后詩四首幷序中秋書懐守陵太監崔邦琪侍慈寧宫年久詩以賜之康熙二十八年歲旱冬又無雪朕焦心勞思寢食俱廢二月初間謁陵路遇大雨田野歡聲方少攄朕懐故賦五言律以記之暢春園衆花盛開最為可觀惟緑牡丹清雅迥常世所罕有賦七言絶以記之咏花瓶櫻桃雨後初晴戲作二首命裕親王福全皇長子允禔帥師征厄魯特錫之以詩養病塞北古北塞上望月康熙三十二年六月賜總督佛倫夏燕新蓮二首巻四十五古今體詩五十九首初秋晚雨後觀儀器初秋詠竹閒坐詠竹詠金蓮花祝巴林淑慧大長公主詩戲題自鳴鐘春日舟行夏日幸潞河雜詩三首親閲運河隄舟泊潞河千葉蓮題耕織圗耕第一圖浸種第二圖耕第三圖耙耨第四圖耖第五圖碌碡第六圖布秧第七圖初秧第八圖淤䕃第九圖㧞秧第十圖挿秧第十一圖一耘第十二圖二耘第十三圖三耘第十四圖灌溉第十五圖收刈第十六圖登塲第十七圖持穗第十八圖舂碓第十九圖籭第二十圖簸揚第二十一圖礱第二十二圖入倉第二十三圖祭神織第一圖浴蠶第二圖二眠第三圖三眠第四圖大起第五圖捉績第六圖分箔第七圖採桑第八圖上簇第九圖炙箔第十圖下簇第十一圖擇繭第十二圖窖繭第十三圖練絲第十四圖蠶蛾第十五圖祀謝第十六圖緯第十七圖織第十八圖絡緯第十九圖經第二十圖染色第二十一圖攀花第二十二圖剪帛第二十三圖成衣巻四十六古今體詩四十二首二月三十日親統六軍徂征漠北出居庸關赤城龍門過獨石口出塞訓厲軍士北藩諸部君長来迎沙漠二首風雪致禱遂爾晴霽賜皇子允祉賜皇子允祐春寒軫念將士途中新夏經明成祖勒銘處指示扈從諸臣并序賜皇子允禩帳殿對雨念畿輔四方農事賜将士食違皇太后定省言懐行殿示諸皇子瀚海營夜南望北斗雁栖沙磧并序時乏水於山坡得泉志喜克魯倫河上流雨後草生登山巔下瞰克魯倫河周覽山川形勢指揮營陣渡克魯倫河網魚暫駐待後軍至軍中夜嘗擐甲逹旦噶爾丹潰遁遂窮追之剿滅噶爾丹大㨗自賊中投誠来者皆宥之遣使示皇太子㨗音示宫中㨗音班師至拖陵班師拖陵留皇長子允禔殿後示之行間賜大學士張玉書外藩諸部落絡繹来賀宴賚之入關見雨膏潤澤禾苖茂遂喜而有作彈琴峡南口入京見百官及耆民童穉歡迎道周賜将軍孫思克
