body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷二十四北征勅諭諭皇太子三月十九日尼麻唐胡圖克圖卓爾莫隆喀木布到前已遣報其中情事因彼甚為秘密故未詳悉書寫今此事俱已明顯殊覺怪異於是不以為煩將始末詳悉書寫遣發令皇太子知之可細閲焉尼麻唐胡圖克圖到後朕念達賴喇嘛夙昔和順因體伊等秘密之意將尼麻唐胡圖克圖卓爾莫隆喀木布令近至御前朕左右惟有一等侍衞闗保海青三等侍衞喇西餘無他人伊等奏云老達賴喇嘛戌年已故小達賴喇嘛已生今年十五歲我等地方仗達賴喇嘛以存達賴喇嘛身故之時即欲奏聞竊恐生變又因喇嘛遺言及白賴奔奈冲奈冲者與巫覡相同降神推測之喇嘛之言必令待至相合年歲始聞知天朝皇帝及衆施主故於今年十月二十五日始出禪定令衆叅拜此事諦巴於差遣我等時令於佛前立誓必親見皇上密奏其他處俱以達賴喇嘛出禪遣告而未明悉其故奏訖朕将伊奏章幷所獻達賴喇嘛之像於原封之外面同伊等加封押以鈐記乃諭之云朕數年來乆知達賴喇嘛已故若達賴喇嘛尚存則參木巴秦木布胡圖克圖噶爾丹西勒圖七七克塔賴喀木布濟隆胡圖克圖等斷不如此妄行喀爾喀厄魯特亦不致破壞故朕降以嚴㫖今諦巴輸誠吐實密以奏朕朕亦密藏之俟十月初旬啓封宣示内外四十九旗喀爾喀衆渣克薩令為已故達賴喇嘛誦經致􅈖為小達賴喇嘛遣使稱賀既降諭㫖於是命寫勅書其辭曰諭掌瓦赤喇呾喇達賴喇嘛敎𢎞宣佛法王布忒達阿布迪朕臨御天下統理萬邦溥播仁恩懲創亂逆其抒誠恭順者則必嘉奬眷愛焉尔布忒達阿布迪先與噶爾丹同謀凡事惟左袒厄魯特而行將僨事之濟隆胡圖克圖堅留不遣其時朕以為達賴喇嘛若在斷然不致如此故特降嚴㫖於尔覽尔奏奉聖主嚴綸訓誨心甚憂懼今惟謹遵皇上諭㫖竭力黽勉自知過愆引罪陳奏朕與達賴喇嘛道法協一多歴年所有不垂念之理乎且尔土白特國朕若不撫愛埀顧得以安生樂業乎濟隆胡圖克圖乃達賴喇嘛特遣以和合喀爾喀厄魯特之人彼不和解喀爾喀厄魯特反導引厄魯特入喀倫之内與我師相戰情罪殊為可惡務必送至朕依尔所奏請從寛宥其身命全其戒律班禪胡圖克圖應於何年月日前來尔從容定期具奏噶爾丹與我抗拒為我師所大敗兇逆之寇情罪重大瑚瑚腦爾決不可存留其女尔必令送至若不遣送則咎在汝矣噶爾丹若伏罪投順其時另降勅㫖今尼麻唐胡圖克圖至以尔奏請之語俱密奏於朕前朕亦密降諭㫖朕之素志惟欲普天率土咸躋雍和同臻安樂以此惓惓於懷若摘發隱事以傾人國斷不為也嗣後尔益加恭順不違朕㫖以行朕亦棄尔前非嘉惠如初如此則尔土之民得沾利益而尔亦常享顯榮不替矣為此特遣正使理藩院主事保住副使主事薩哈連頒此諭㫖幷賜緞六端二十八日引見二十九日之晨遣行是日晩遣往策汪拉布灘處司務英固至奏云臣從波羅塔拉回因部中遣往策汪拉布灘咨文到即持此咨文返至策汪拉布灘處策汪拉布灘甚喜即遵㫖領兵捜剿噶爾丹而來距薩克薩圖胡魯克二十日之程有達賴喇嘛之使達爾罕厄木七到彼言達賴喇嘛已故十六年小達賴喇嘛已十五歲矣今尔等各安居本土不必起兵遂按兵而退臣知其不能有濟亦還達賴喇嘛之事西北諸人皆已聞之等語是日阿南達奏稱嘠爾丹多爾濟遣人來云瑚瑚腦爾之渣木巴稜喀木布致書有令我整備器械來與瑚瑚腦爾會盟之語我今屬聖主之人向來從未與瑚瑚腦爾之盟故我未前赴煩將此情事奏聞因其如此朕欲為達賴喇嘛秘密其事亦屬徒然且應詢問之事復多遂將尼麻唐胡圖克圖召回於初二日復至令諸臣傳㫖諭之曰尔等秘密之事朕埀念達賴喇嘛深秘密之槩不以告人今尔之使達爾罕厄木七等皆已傳布盡人皆聞朕獨秘密之何益尔等可與喇嘛等公同啓封將奏章翻譯幷觀達賴喇嘛之像因令此地喇嘛與尼麻唐親將封啓視泥塑達賴喇嘛之像其頭項處斷落在旁其時喇嘛等及諸臣凡所閲之人皆相驚訝云此事若於伊等去後開視或於十月開視以致如此我等殊覺索然天心與聖主每相符合正當尼麻唐猶未遠去而英固等適至乃伊等親身明晰此事本末皇上之誠信優待達賴喇嘛之處亦昭著矣十六年以來種種假託達賴喇嘛之言俱已顯然達賴喇嘛果有知亦應感戴聖主而不能不致憾於諦巴由此觀之諦巴於土白特國所為不善不言可知矣因無不贊頌而尼麻唐等甚為惶悚頓尔仆地口不能言惟自嗟怨此乃我等惡兆而已諦巴奏章云總統天下率土威福文殊菩薩至聖皇帝蓮花清淨座下謹奏言為衆生不幸第五世達賴喇嘛於壬戌年身故自太宗皇帝道法合一癸巳年至京師道法合一以來此地佛門最大者達賴喇嘛世間最大者壽與天同明竝日月大護法主人一應事情意雖切欲陳奏奉掌管占卜護持經典白賴奔柰冲之㫖但召親近侍奉之人達賴汗達賴巴圖爾告知之此外雖各親屬是年以前皆勿告語欲將此故陳奏心殊懇切但達賴喇嘛之㫖及護持經典柰冲語甚嚴切故未能陳奏惟聖明鑒之第六世轉生淨體因有避忌尚未叅拜俟至其年月日時奏知壽與天同至聖天朝皇帝大護法主始令衆聞知至所指定避忌之時至聖皇帝之外餘皆勿使聞之將護持經典柰冲所戒情由遣尼麻唐胡圖克圖卓爾莫隆喀木布等密奏惟明鑒之訓誨諭㫖埀愛不絶其出舍利焚葬等事推算未及於此故爾完厝今因賫奏章為利益生靈於壽與天同護法主人前獻便於供養達賴喇嘛之像乃臨終牀簀之鹽拌和塑成此喇嘛像若欲一心䖍供陳設香燭意謂當獲福慶謹將喇嘛像幷上等珍寶數珠氆氌等物於七月初旬吉日謹奏又經典一部載寫達賴喇嘛之始末及生死遺言因其繁多翻譯甚需時日在此喇嘛不能翻譯事務亦不甚緊要待章佳胡圖克圖到日譯完再遣觀此等情事十六年間朕所差往喇嘛等欺誑於朕至於已極無可憑信惟順諦巴之意總非實語此中丹木巴塞爾即堅稱親見達賴喇嘛尤屬可惡皇太子率理藩院大臣官員將黙爾根綽爾即以下喇嘛等俱傳集於栴檀寺將此情由説知即將丹木巴塞爾即拏問併其徒俱拘於理藩院彼二處所有房舍俱令封守今年正月初一日朕躬及皇太子問黙爾根綽爾即倡言達賴喇嘛尚在今何以實蹟顯露由此觀之飼犬尚能吠面生之人猶為有益豢養尔等喇嘛全然無益以此言譴責羞辱之將此十六年來遣往西域喇嘛等俱令清查各取口供啓奏喇嘛等今作何狀亦寄信來此情事令大臣看閲幷於皇太后前口奏大略以聞康熙三十六年閏三月初五日諭皇太子朕至此以儀器測驗北極較京師低一度二十分東西相去二千一百五十里今安多以法推算言日食九分四十六杪日食之日晴明測驗之食九分三十幾杪竝未至昏暗見星自寧夏視之京師在正東而微北初三日雨此竝令知之兼示諸臣康熙三十六年閏三月初五日諭皇太子自定邊至寧夏沿路皆沙磧無草鹹蒿鹹刺沙蒿度笈草之外皆斥鹵地也寧夏附近皆稻田引黄河之水以布種無事栽插地方水土不甚佳於人不甚相宜想皇太子欲聞之故爾示知黄河沿岸及邊外草極佳軍中之馬悉驅而牧之草青馬可飽也康熙三十六年閏三月初五日諭皇太子初七日遣往噶爾丹員外郎博席希來降之格壘沽英杜拉爾之子呉巴什俱至丹即拉之使察漢代曽遣還今復來至格壘沽英杜拉爾滿濟噶爾丹之使拉麻察卜丹即拉之使老卜臧等尚未至謄寫詢問伊等之言及噶爾丹之奏疏稍等待之於初十日早滿濟老卜臧來至申時遣往阿喇卜坦丹津汪布筆帖式赫塞策汪札卜王之長史馬尼圖等至喀倫奏報之事大將軍伯費揚古報聞之事俱至初十日晩格壘沽英杜拉爾拉麻察卜等來至詢問伊等之言謄寫一倂寄去觀噶爾丹情狀與丹即拉實不相協今阿喇卜坦丹津汪布又遵朕命心向我國誠哉彼人心離散困於饑饉也今移向額黒阿拉爾者以有魚之故耳豈其有從往之人歟頃來歸之人接踵而至彼之消息絡繹而聞朕心決定事機而後行斷不輕忽亦無急遽也今轉輸餉糧皆已籌畫完備征行師旅皆已調度周詳惟待其消息故時日未定耳糧饟草豆隨營之米粟駱駝騾馬糗糒之屬皆大有餘竝未苦累官員兵民也書至此朕所遣前鋒侍衞竒薩穆等擒厄魯特夫婦兩人至竒薩穆等奏言我等謹遵諭㫖指授於三月十九日自寧夏起程閏三月初一日至古爾班賽漢之地得此厄魯特來還等語厄魯特人札木蘇口供書於別幅為此諭知可示之諸臣康熙三十六年閏三月十一日諭皇太子二月間朕躬親赴寧夏欲招徠瑚瑚腦爾等西陲厄魯特故將情事宣示遣台吉阿拉布潭得木楚克都統杜斯噶爾商南多爾即等曽周詳訓諭令之前往其先未知事之成否且恐或至用兵亦未可知故未遣報今觀阿拉布潭等奏章言瑚瑚腦爾台吉等俱已歸順將欲趨赴行在矣兵革未嘗一試而西陲之厄魯特盡皆收服大喜慶之事故速報之策汪拉布灘已屬於我阿喇卜坦丹津汪布已遣使至亦屬於我朕在此喜悦烜赫不待言矣惟旦夕之間將噶爾丹或戮而送至或擒而送至朕坐以待之耳為此降諭令議政諸臣看閲於皇太后前奏聞宫中咸令知之阿拉布潭等奏章及詢問厄魯特阿喇卜坦來人之言謄寫竝發康熙三十六年閏三月十三日諭皇太子朕經理軍務完備於十五日向白塔啓行所經理諸務俱詳悉謄寫發往白塔乃黄河灣曲之地鄂爾多斯杜稜公之哨口此書到後奏報不必由邊内遣發令出沙虎口於邊外遣來可近千里而路亦易行邊内之地險惡不可勝言當雨水溽暑之時人中熱而馬倒斃者必多寧夏之地為瀚海之中年老及體弱之人不甚相宜雖無病人而腹中不調顏貌瘦損者往往有之在我衆則全不覺也寧夏距賀蘭山之邊百餘里水草之佳不必言朕隨行諸臣侍衞護軍執事人之馬及御廏之馬駝牛羊俱於察罕拖會地方牧放此二十日内俱略覺肥壯未嘗於地方取一東草一勺豆以為飼養之用故米豆芻茭存剩甚多諸路運送俱著停止即於所至之地各處存貯朕此番遠行專為籌畫糧餉酌定軍旅進止機宜而來其可為勞苦百姓煩擾地方之事乎今事務完備故詳悉書寫特示可以此與議政諸臣看之康熙三十六年閏三月十五日諭皇太子朕躬安善皇太子佳否朕沿黄河而行見其地甚佳草亦甚茂薪槱足用渣克木檉柳杞柳阿爾塔哈爾哈納䝉奎哈爾哈納等物皆有之黄河之曲其林藪處則有大鹿野豕平曠處則有黄羊之類雉兔有而不多因行兵不事圍獵於洲渚間乘舟以往略張步圍耳米穀俱以船載至白塔從白塔地方朕親視陸運使人人皆如朕奮勉事當可成矣俟至白塔後遣内使於皇太后前請安此報於二十三日四更時至即於是日酉時遣回康熙三十六年閏三月二十三日諭皇太子朕躬安善皇太子佳否朕自白塔行二十五里駐蹕於二十九日親閲前鋒軍士及黒龍江兵啓行初一日親閲鳥鎗兵緑旗兵啓行糧餉悉由水路於黄河順流運載除前沿路所食之糧不計自初一日始計足四閱月之糧給之前往馬駝肥健軍容嚴整朕駐蹕之地以繩度之去兩狼山一百二十里沿路無水漢人名兩狼山䝉古呼為哈爾哈納於是集軍中駱駝於于成龍未至之前運送糧餉過此無水之地待此運載駱駝還至之後朕即旋師前伏暑而還自京師乘來馬及前所遣馬皆肥駱駝亦佳有言由水路行八九日可至湖灘河朔其負載馬駝不能前赴由陸行可得二十日待起行之時再為報之康熙三十六年四月初一日諭皇太子朕躬安善皇太子佳否朕所籌畫軍務皆已完備運送糧米於狼居胥山駱駝皆無恙載到於初五日還初六日駐宿一日令馬駝渡河擬定軍衆由陸路遣發朕於水路啓行櫻桃進到朕以果實縈懷如此朔漠窮荒何事三度親臨耶自後毋送康熙三十六年四月初二日諭皇太子朕於初七日已由水路行黄河多曲岸則泥濘居人稀少應官之馬不可得凡奏疏俱令前赴木納河朔以待其師衆仍由陸路而往留内大臣索額圖於白塔地方付以鳥鎗兵二百名各旗馬一千四百餘匹朕軍中所攜餘米八百石如去年留尚書班第以備接濟回旋兵丁人役商旅也委任明白朕始啓行初謂四日可至木納不意日來多風波濤甚大程期稽緩十四之夜朕前經過時所見之額爾得尼班第達胡圖克圖遣人來告云今日薄暮有一小船言欲奏聞噶爾丹已死丹即拉俱歸降之事極為緊要情形甚是急速是以我之胡圖克圖以此喜音令我馳騎而來奏知皇帝朕因連夜令人覓馬由黄河兩岸前迎又以小舟逆流迓之十五日辰時散秩大臣布克韜至奏云上以小舟留於内大臣索額圖處曽諭以朕往木納之際若有緊要事情馬難驟至則令乘此小舟速赴行在今緊要喜慶之大事無有過於此者故著臣等星夜趲程臣等兩日夜至此賫有大將軍伯費揚古奏章等語今將大將軍伯費揚古奏章謄寫遣發外其噶爾丹首級令速致之一到迅送京師朕三次遠臨絶塞者以此賊不可一日姑容之故也所見若不明決豈肯貽笑後人而為此舉乎兹賴天地宗社之福諸厄魯特皆已收服䝉古諸國靡有一不來臣者俟噶爾丹首級解至京師時可傳集諸王貝勒貝子公滿漢大臣官員明告此故令會議覆奏送來朕心不勝喜悦持筆不能成文匆匆發諭康熙三十六年四月十五日諭皇太子朕躬安善皇太子佳否汝皇父薄德何意如此福慶凡所至之地指畫之事無不脗合此皆天地祖宗之眷祐也今此普天率土寇敵之言再不聞於耳矣朕懷抱已愜讐忿盡洩皇太子踴躍歡忭更當何如康熙三十六年四月十五日諭皇太子朕順黄河之流行十日尚未至木納水甚險而舟行可畏不可輕忽視之前曽詢問言四日可抵木納故令凡所奏報俱於木納等候今以舟行遲緩故遣司官從木納迎來於十六日至行在其遲緩之故以此又沿河一帶捕牲之處甚多洲渚間鹿豕與雉皆有之河内魚雖不多而亦不致缺乏雁鴻甚多河套之内乃鄂爾多斯之地河之北乃喀爾喀之地再偏東則烏拉特之地烏拉特生計甚饒牛羊充裕兩岸老幼男女擁塞稽首以此亦略擔遲因慶賀殄滅噶爾丹進獻駝馬牛羊者無數舟行時皆未收納惟以我軍所捕之物令彼飽餐而遣之䝉古等懷德畏威至於已極朕今惟致噶爾丹首級振旅京師長享太平為急務耳康熙三十六年四月十七日諭皇太子朕躬安善皇太子佳否十八日過木納七起爾寨桑來問彼之詞抄錄寄去外朕面加細問噶爾丹之死飲藥自殺信然矣或衆謀而毒以藥抑自飲藥俟車木卜臧卜來時從容問明可耳朕大事已畢意殊寛適日與諸臣每一語及輒一為欣忭噶爾丹之屍聞已焚之矣然雖復完具亦不過一枯朽頭顱耳先是呉三桂屍亦焚致其骨糜爛之於刑人之市而棄之其往例甚昭然也康熙三十六年四月二十日諭皇太子朕過湖灘河朔於三十日經沙虎口往張家口從邊内往則天氣暑熱而又當禾苖盛長之時邊外近而且凉今歲水草甚佳我軍之馬駝雖征行四閲月正值青草茂生無論貧富咸皆整飭一無所損失朕多方區畫必令全致之約略五月中旬可至京師京師之馬一無所需用此諭到後一切奏報皆從張家口遣奏御用茶湯冰水俱出張家口從驛逓來迎時當乳酥饒足䝉古等來迎者充塞於道食物亦多不必攜來迎接此等事俱奏聞皇太后并宫中咸令知之康熙三十六年四月三十日諭皇太子朕以去歲赴歸化城之路稍為紆曲故於驤藍驤紅正紅三旗察哈爾地方之中取路而歸䝉古生計殷實且時候正佳殊覺饒裕因滅噶爾丹爭來稱賀擁塞道路兩旁之山有麅間有別獸今以麅一隻乳酥諸物二函黄花菜一筐進皇太后其宫中亦如此發往又與皇太子麅一隻邊内暑熱至京佳否不可知因朕遠行日乆聊見縈念不在物耳朕於十五日前必至京師為此特諭康熙三十六年五月初二日聖祖仁皇帝御製文第二集卷二十四
