body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻十五目録勅諭諭大學士伊桑阿阿蘭泰尚書馬竒侍郎思格則阿爾稗學士宋柱齊穡傅繼祖綏色諭大學士伊桑阿阿蘭泰尚書馬竒傅臘塔索諾和圖納侍郎朱都納馬爾漢學士宋柱齊穡傳繼祖綏色諭大學士伊桑阿阿蘭泰諭大學士伊桑阿阿蘭泰學士宋柱陶岱齊穡綏色諭大學士伊桑阿阿蘭泰兵部尚書索諾和侍郎朱都納馬爾漢諭大學士王熙等諭大學士伊桑阿阿蘭泰諭内閣諭内大臣國舅佟國維等諭内大臣國舅佟國維等諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布禄諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布禄諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布禄諭大學士伊桑阿阿蘭泰尚書馬竒索諾和侍郎安布禄學士綏色等諭大學士阿蘭泰王熙張玉書李天馥學士三寳楊舒朱都納哈山韓菼徐嘉炎張榕端諭大學士伊桑阿阿蘭泰學士三寳楊舒朱都納哈山哈雅爾圖倭倫諭内閣諭内閣諭户部諭户部諭領侍衞内大臣索額圖明珠大學士伊桑阿阿蘭泰諭户部諭内閣諭内閣諭大學士伊桑阿阿蘭泰學士三寳羅察席爾登
