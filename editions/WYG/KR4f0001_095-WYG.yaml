body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻二勅諭諭大學士明珠太祖實錄先以小本兼滿漢字迅速繕寫送進朕將恭覽焉若待白鹿紙謄真大本實錄同進則為時太遲矣康熙二十四年二月十六日諭大學士勒徳洪明珠王熙吳正治宋徳宜學士麻爾圖圖納席爾達丹岱禪布吳興祖王起元内閣翰林院湏用通曉漢文善翻譯者其自卿員以下部院無品級筆帖式以上及滿洲䝉古漢軍廢官與隨旗行􅋅暨閒散人曉習漢文能譯滿文者聚而精加考試記其文學優長者用之其下所司速察以聞康熙二十四年三月初四日諭大學士勒徳洪明珠王熙吳正治宋徳宜學士麻爾圖席爾達吳興祖王起元議政所闗殊為機宻重要今見凡所議之事方經議訖即已宣露又滿洲䝉古都統本以人材勇健授為都統非以其練達事務而授之也都統中不克曉達事務者甚多諸若此者宜罷其議政其宜罷者具聞罷之至於兵事乃都統之専責仍照常預議尔等以此意降㫖於議政諸臣焉康熙二十四年三月初五日諭大學士勒徳洪明珠王熙吳正治宋徳宜學士麻爾圖圖納席爾達丹岱禪布吳興祖王起元朕廵省南服見經過地方城垣圮壞者所在多有夫城垣者生民之保障所以衛吾人者也亟宜修築之其令地方官何以葺治下之工部部議取㫖行焉康熙二十四年三月初六日諭大學士勒徳洪明珠遣徃俄羅斯之彼土六人各賞以衣帽鞾等物可傳諭理藩院康熙二十四年二月十七日諭大學士勒徳洪明珠王熙吳正治宋徳宜學士麻爾圖圖納牛鈕丹岱禪布吳興祖王起元徐乾學韓菼索倫達呼里總轄之任甚為要重必得賢能之人始能管理今著理藩院撥什庫善馳馬者一人由驛遞速遣至馬喇處馬喇身在彼土有賢能之人堪任索倫達呼里總轄者馬喇以其名明白具疏即付遣往撥什庫賫奏所遣撥什庫限徃返在二十日之内可傳諭理藩院康熙二十四年四月初七日諭户部朕撫御方夏愛養黎元早作夜思勤求治理閭閻疾苦無時不深軫念欲使民生樂業此屋豐盈惟當己責蠲租萬姓得沾實惠直隷地方頻遇旱災小民匱乏宜加恩恤順永保河等處圏占地方應徴康熙二十一年地丁錢糧已經詔行蠲免所有直隷八府康熙二十三年未完地丁錢糧盡與豁除其順永保河未經圏占地方及真順廣大等處康熙二十四年應徴地丁各項正賦俱著免三分之一尔部速行該地方官通行曉諭務使人人得被膏澤以副朕勤恤民隠至意如有不肖有司借端朦溷私行重徴者或經叅奏或被告發定行從重治罪尔部即遵諭行特諭康熙二十四年四月初十日諭大學士明珠曩者每一夫田撤還一晌之田近日丈量各旗有察出溢額之田今兹撥給何以不給此等田而以百姓開墾之田四百頃撥給耶其令户部堂官於十四日早至察溢額之田現有若干及以百姓開墾之田因何撥給詢問明白同户部堂官靣奏特諭康熙二十四年四月十二日諭大學士勒徳洪王熙吳正治宋徳宜學士麻爾圖圖納席爾達牛鈕丹岱禪布吳興祖王起元徐乾學韓菼與魏一徳同夥先經拿獲之犯已改為斬罪魏一徳亦應改為斬此本著照前㫖擬票簽送進嗣後凡如此等先經拿獲應正法重犯有㫖改減等者其續獲之犯亦照前減等完結擬票簽進覽一案同夥之人當一體治罪勿得前後互異尔等切記之康熙二十四年四月二十九日諭大學士勒徳洪明珠巴圖爾額爾克濟濃違離彼土嚮化而来宜加愛養經理其居處廼彼等原為俄七爾圖汗所屬累世進貢誠懇恪恭俄七爾圖汗之孫老卜臧滚布與巴圖爾額爾克濟濃當使聚合一處於所宜居之地為之經理令其居處賜之封號給以金印冊用昭示朕繼絶舉廢之至意焉可遣賢能台吉與理藩院堂官侍衛曉諭巴圖爾額爾克濟濃言以尔等搶奪毛明安及三烏喇特之故本宜遣兵征剿悉行翦滅但念俄七爾圖汗累世進貢誠懇恪恭特加矜憫尔等罪戾盡皆寛宥老卜臧滚布乃俄七爾圖汗之孫尔等皆屬一國為親近兄弟今令尔等皆與老卜臧滚布等聚合封以名號與老卜臧滚布等可以同居之善地相度定居遣使於達賴喇嘛以如此措置頒朕諭㫖其宜居之地亦與老卜臧滚布巴圖爾額爾克濟濃等公同相視令所遣台吉等還奏此事於今年八月即宜舉行尔等與議政王貝勒大臣䝉古大臣㑹同詳議以聞康熙二十四年五月二十四日諭大學士勒徳洪學士麻爾圖圖納俄羅斯闌入我邊塞擾害俄羅春索倫黑真費雅喀等處人民搶掠其家口雖屢肆兇暴朕不忍遽興兵革故未即遣發大兵征討數遣使曉諭俄羅斯恃其遼逺仍復抗拒益侵犯我邊鄙之人肆虐不止用是遣大兵直抵雅克薩之城彼因困廹已甚而後歸降爰遵朕命宥其困而後降之罪釋之使還大兵迅速征行破四十年盤踞之俄羅斯於數日之間獲雅克薩之城克奏厥績薩布蘇向来逗畱不進兵之罪應概從寛免又雅齊納鄂山本獲罪發遣之人其所互告之事仍行察議今進剿官兵殊屬勞苦令伊等暫回烏喇幾林地方於盛京達呼里之兵酌量派徃防守至於雅克薩城雖已克取防禦決不可疎應於何地永駐官兵彈壓此時即當定議著大學士勒徳洪學士麻爾圖圖納同郎談關保與議政王貝勒大臣㑹議具奏康熙二十四年六月十四日諭侍郎佛倫學士圖納席爾達牛鈕錢糧所闗甚重宜詳加釐剔以除虚冒濫支之弊近見上駟院以假印誑領太常寺亦以假印取絲現今發覺者雖止此其未發覺者謂之無有可乎此皆支給時不行詳察怠玩疎虞之所致也嗣後凡闗係支用錢糧事務必告之該部院堂官稽核得實用印文支取其四五十兩以下者遣筆帖式往領若踰此數則遣司官往領其給與時亦詳加稽核告之該部院堂官然後與之可也如此於職事亦無所曠廢告於該堂官及司員親徃領取亦豈難行之事尔等可傳諭户部凡内外支用錢糧不致虛冒朦混稽遅其詳議定例以聞康熙二十四年六月二十八日諭侍郎佛倫學士圖納席爾達牛鈕江西庫鎮堡泰和萬安黄泖鐵山碣西村石頭碣等處所殺敗者俱係小寇將此俱從優叙為頭等二等軍功則雲南黄草壩等處之大奮剿殺者又將以何等次敘之耶所議皆屬太過若本章盡行折出又致一番奏請事覺繁多此等議准之四十五疏咸發還兵部另議以聞不准議敘之二十二疏且畱覽康熙二十四年八月初九日諭大學士勒徳洪明珠學士麻爾圖圖納牛鈕丹岱禪布吳興祖王起元朕近觀牌樓原基甚深若將街衢掘至原基兩傍房屋皆在浮土之上難以久存而於觀瞻亦不相稱且所掘之土運於何處也至濬治護城河若積土城下遇雨水流入河内旋至淤塞在鑿河掘基需用帑金尚屬小事但慮興作無益應何法挑掘何方貯土尔等㑹同八旗都統副都統該部及各部院大臣歩軍統領詳閱街衢議奏康熙二十四年九月二十一日諭大學士勒徳洪明珠王熙吳正治宋徳宜學士麻爾圖圖納牛鈕丹岱禪布吳興祖王起元徐乾學韓菼監察御史錢珏題叅廵撫穆爾賽加徴火耗甚重一案令内閣九卿詹事科道官員持正詳議備列公論具奏内閣九卿官員以穆爾賽為人樸實不生事端奏聞穆爾賽居官不善朕所聞甚明故命原叅錢珏明白指實具奏今錢珏將加徴火耗甚重竝受禮物欵項已經指陳凡事令九卿官員㑹議原期公正得實今所議穆爾賽事朕意以為不公夫諸臣不從公詳議如此狥庇具議嗣後九卿諸臣何以倚任事務何以得理即如温代達爾布等最為大貪大惡之流朕特加懲治發往黑龍江前問九卿官員以穆爾賽為人樸實不生事端係誰所議尚書科爾坤奏稱係陳廷敬蔣宏道之言及問陳廷敬等皆奏稱臣等不曽如此説原説平常且朕又聞此事初議時原有穆爾賽無有劣蹟之語後散訖内閣復追囘九卿欲將無有劣蹟之語刪去尚書科爾坤説若將此語刪去我不肯與議遂未完竟而去首先立議穆爾賽為人樸實不生事端者即係庇護穆爾賽之人何官輙敢専擅殺人何官輙敢専擅救人此事斷不可仍前但稱係臣等公議務須各陳所見著隨朕行在之尚書都御史侍郎學士等往聽之康熙二十四年九月二十一日諭大學士勒徳洪明珠王熙吳正治宋徳宜學士麻爾圖圖納牛鈕丹岱禪布吳興祖王起元徐乾學韓菼九卿詹事科道令其㑹議㑹推本期至公至正務得真實今聞九卿㑹議之事間或不據實具議草率苟且因循而行有此一次立議争勝以冀下次不與相拂而從之者或有此一次將彼意中之人薦出冀下次將其親朋薦出以相報者或有薦其門生者有薦其同年者有薦其同鄉戚友者夫九卿㑹議㑹推理宜虛公持論豈可一二人専擅以行且設立科道本欲其凡事從實建言有執物護庇者即為指叅也其専擅執拗護庇之人何未見糾劾耶衆議之時亦有一同具議後因其事不當復云彼時我原如此説者如果原議時衆論與伊意不合即宜將已見明白敷陳另立一議既不另立一議同列職名又稱我曽如此説是斷斷不可者且今誰可以擅處誰耶即如張志棟近將九卿題叅亦誰如彼何也朕於康熙十八年亦因此等事曽經有㫖申飭可察前㫖一併復行傳諭凡事㑹議不必詢問本省大臣官員若每加詢問或致不肖之人益在地方生事横行本省督撫地方官無不畏懼且將凡屬㑹議之事無不囑託本省大臣官員矣政務何由得平今㑹議山西廵撫穆爾賽因係滿洲恐致敗露意欲從平易歸結耳若是何不於事前豫為勸戒令其公㢘乃不為豫戒徒於事發之後欲如此結案可乎尔等齊集滿漢九卿大臣傳諭申飭之康熙二十四年九月二十三日諭大學士勅徳洪明珠王熙吳正治宋徳宜學士麻爾圖牛鈕禪布吳興祖王起元徐乾學韓菼凡可一次㑹題完結之事嗣後不必兩三次具題於應㑹同之部院即㑹議結案奏聞如有仍違誤具題者尔等即隨簽以進康熙二十四年九月三十日諭大學士勒徳洪明珠學士麻爾圖牛鈕禪布傳諭厄魯特尔等進貢来使沿途往返擾害民生搶掠牲畜以致邊境内外百姓患苦者甚衆朕雖稔知以尔等逺方之人本不諳中國法紀無知妄行屢不加罪槩從寛免嗣後貢使往来如有攘奪為非者尔等率領頭目幷犯法之人皆依中國律令治罪曽經頒㫖曉諭今尔進貢頭目幷不嚴束傔從任其擾害將内地人毆死干紀甚矣先以尔等愚昧頑蠢凡細微奪攘之罪知而宥之乃屢邀寛免頻加曉諭全不欽遵竟至毆死内地之人今若不按法抵罪日後漸益恣肆大起争釁未可定也用是將毆死人命之伊忒木根依律處斬令尔等識之觀之此後尔等其謹遵成法嚴戢從人毋得肆惡妄行特諭康熙二十四年十月十一日諭大學士勒徳洪明珠今見外藩䝉古王貝勒貝子公台吉等有因徴收年貢羊酒借端多派殊屬累民可酌量大加裁減歸於至約令其進獻該部㑹同確議具奏康熙二十四年十月十六日諭大學士勒徳洪明珠王熙吳正治宋徳宜學士麻爾圖牛鈕禪布穆成格吳興祖王起元徐乾學韓菼近見工部凡於交送物件皆躭延時日抑勒不收弊端滋多此後其嚴禁之可傳諭工部康熙二十四年十月二十三日聖祖仁皇帝御製文第二集巻二
