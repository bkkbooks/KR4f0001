body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻四十四雜著題劉松年畫宋劉松年圖漢髙祖還沛作歌㑹飲想象開剏之主自有不世之功出羣之英所以有大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方之句朕覽其圖筆氣古勁似有意於毫端也因援筆記其後論韻府刻本大槩作詩之家無不用韻府羣玉者五車韻瑞不過察冷故事况刻板錯字甚多信不得所以朕有寫册大小兩部總不用刻本跋書大學跋康熙歲次癸未夏萬㡬多暇凡有閒日即讀經史以為立身行已之本大學一書尤為格致誠正脩齊治平之根内聖外王之大道總不越此故特親書以便熟讀庶㡬守心在腔子裏之句乎跋道徳仁藝扁後朱子四齋銘曰志道據徳依仁游藝朕取其言正理順得讀書正學之本故書此扁以示警勉之意賜翰林院跋徳業仁義扁後朱子又四齋銘曰崇徳廣業居仁由義朕取其尊徳性希聖學道中庸勝已私以此書扁望其登髙自卑行逺自邇之意賜詹事府跋都俞吁咈扁後言路以都俞吁咈勉之則上不虧於天下不失人臣事君之大道故書尚書都俞吁咈四字賜之跋書草訣百韻後禮部侍郎孫岳頒留心字學自幼立志倣董一時人物無出其右朕甚嘉焉命書草訣百韻萬㡬之暇不時觀覽見筆畫清秀深得書家三昧壬午冬月偶爾對臨方知老錬難於髣髴也故記之祭文告祈榖壇祭文康熙四十八年臣仰承眷命撫育萬方念切民生亟圖康又兩年以來江浙地方遭罹水旱民失生業去歳山東河南亦因被旱田禾歉收又去冬至今乾暵無雪臣雖抱病心切靡寧遡自順治二年以迄今日垂七十載承平日久生齒既繁野無曠土縱當大穫之歲猶慮民食不充儻或偶遇旱潦則臣雖竭慮殫思蠲租散賑而窮鄉僻壤豈能保無轉於溝壑之人在臣憂國憂民之念即始終不渝而雨澤應期實惟上天仁愛愚氓是賴兹者時届上辛春耕將舉臣理應躬詣齋次祗脩祀事但今幸荷天佑疾漸痊愈而肅將大禮尚未克勝身雖未能致齋而為萬民懇切禱祈之誠敢用攄布仰籲洪庥特命臣僚潔蠲敬戒䖍備玉帛牲醴粢盛庶品㳟祀上天伏冀昭鑒俾雨暘時若百榖用成三農𢎞濟尚饗賦桑賦并序朕廵省浙西桑林被野天下絲縷之供皆在東南而蠶桑之盛惟此一區近在宫中刻為耕織圖每示司牧使知其艱苦今更為賦以託意焉伊彼條桑其葉始荑春日載陽綠隂乃披紫陌上兮嫋嫋綺岸側兮垂垂來璧旭之晨照受光風之午吹影映帶兮青翰色彷彿兮翠旗既扶疎而相亞復低昻而參差念蠶事之欲動正芳候之如期聿兹女紅生計是賴采采盈筐愼加覆蓋虞日煦之少潤防雨頻之為害儻薄蘆之不繼時憂心之斾斾䖍飼食之維勤勞形神於塵􅅽摘曉露之輕滋乘良月之新薈望千畞之閒閒實蠶家之𢎞賚誠黼黻之必資繫衮職之用大其重等於苖稼為王政之不外予恒恐其難知作深宮之圖繪至夫厥貢著於尚書沃若詠於篇什公室見說於禮經牆下屢申於孟集試古訓之歴稽又民務之應急若乃訝為神木騁以青華末照是晞甘椹如𤓰馴雉表異黄鳥稱嘉雖景物之堪娯咸無闗於大家夫其詫幢幢之髙蓋美亭亭之奇樹靈根依倚於十洲巨跡遂闢於周宇類齊諧之荒唐皆予今日之所不取也聊因清晏簡牘是書用示逺邇是溉是鋤共知愛䕶種繞其廬蠶桑農穡安寳璠璵蓴賦并序蓴生杭之西湖與蕭山之湘湖一名水葵蒂葉之間精華可鑑而味又鮮美如士君子道勝而腴意象閒逺朕南巡浙江愛嘗其羮舟行多暇援毫賦之維此細物生於清流出泥不淄浸水不浮翳纖莖而内藴簇小穎以中抽濯寒影於氷壺含精光於玉璆夫其當春乃茁春暖漸稠藻荇詎匹菰蔣奚侔浴西湖之澄泓潄鏡水之滮瀏人薄言兮采之恒蕩漾兮方舟至若滑漿膩脂手掬難留登之簠簋調和是謀冒以紫薑雜以芳脩驚流匙之鮮瑩快入口之脆柔味雖標於沖淡意可符於麟虬固堪同於抱徳之士自保其潔素抑將比於超尚之徒深潛於隠幽非尋訪之不遺㡬有失於冥捜若迺薫風五月小卉芬裒香凝淺瀨色㸃輕漚華實竝茂更副予求彼洞庭之所擷恐難嫓兹妙産笑季鷹之所託又何待於思秋偶執筆以摛辭宜薦之於瓊樓聖祖仁皇帝御製文第三集巻四十四
