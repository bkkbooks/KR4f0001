body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻二十六雜著古文評論左傳鄭莊公叔叚本末隠公元年書曰烝烝乂不格姦人倫之至萬世之訓也以武姜之偏溺叔叚之貪愚莊公初無孝友之誠心遂不明於予奪之大義養成弟惡而後以兵取之其失德多矣衛石碏諫寵州吁隠公三年石碏之諫卓然千古正論有國有家者不可不三復斯言魯臧僖伯諫觀魚隠公五年辭義堅正有典有則鄭伯侵陳隠公六年一篇之中論斷多於序事是史家又一格歐陽五代諸傳每得此法鄭伯命大夫百里居許隠公十一年鄭莊公入人之國而不利其土地雖􅇶於齊魯猶庶幾能以私自克者君子許其有禮亦善善長之義也魯臧哀伯諫納郜鼎桓公二年典贍之中姿致蔚然呂東萊所謂從容委曲辭不廹而意獨切至者此類是也隨季梁勸修政桓公六年季梁在而楚不敢伐隨宮之竒行而晉即舉虞合二國之事觀之可以見用賢之效矣楚屈瑕伐羅桓公十三年戰勝而驕者必敗讀此可以知兵魯齊長勺之戰莊公十年兵法貴知彼知己此篇約略盡之晉獻公嬖驪姬莊公二十八年觀獻公之行事雖非驪姬二五亦無不亂之理此人事亦天道也晉獻公使大子申生伐東山臯落氏閔公二年申生之禍機牙已成雖無偏衣金玦其得免乎左氏雜引諸臣之言變化錯綜文特古藻楚屈完對齊侯僖公四年楚勢日强召陵一盟而俛首聽命齊桓屈服之功大矣宫之竒諫假道僖公五年前叚文勢緊峭後叚藻色紛披齊管仲論受鄭子華僖公七年於召陵見君臣之義明焉於甯母見父子之倫正焉左氏於此二事叙致特詳所謂好惡與聖人同也晉秦韓之戰僖公十五年韓之戰其曲在晋秦獲晉侯而因晉人之憂慼卒歸而禮之穆公於是乎有君人之度矣晉隂飴甥對秦伯僖公十五年飴甥立言之妙能使秦伯降心以從千古第一詞令也宋楚泓之戰僖公二十二年宋襄忍於鄫子而不忍於二毛謂之曰仁吾不信也公羊擬以文王之戰謬矣叙晉重耳出亡夲末僖公二十三年總十九年所歴各國之事而合叙之貫穿簡括此史家列傳體所從出富辰諫襄王僖公二十四年富辰欲王忍小忿以扞外侮亦自有見然至逆王命而執其使抑亦甚矣不能申明君臣之大義而但以親親為言豈正論乎宜無以動王之聽也魯展喜犒齊師僖公二十六年讀此等文字可見當時諸侯猶畏名義先王之澤未衰晋文公始霸僖公二十七年晋為三軍謀帥而必曰說禮樂敦詩書以戰功取霸而必曰文之教此等議論識見非三代以下人所及晋楚城濮之戰僖公二十八年城濮召陵霸功之大者召陵之師責包茅之貢問膠舟之罪何等辭嚴義正城濮之戰執宛春許曹衛以致䝉馬虎皮曳柴偽遁兵家隂謀無所不用此桓文譎正之分也鄭燭之武說秦伯僖公三十年晉之伐鄭夲以其無禮貳於楚特借辭耳故是役也晉主而秦客燭之武之言易入者以此秦蹇叔諫穆公襲鄭僖公三十二年違棄老成之言自古鮮有不敗者穆公敗而知悔庶曰能賢惜其能悔而不能改日㝷干戈而未有已也秦師自鄭入滑僖公三十三年秦師至滑而鄭不知㣲弦高之智鄭亦殆矣文逸宕多姿晉敗秦師於殽僖公三十三年是時晉鄭未睦秦師之東又非加兵於晉乃藉同姓為兵端而衰絰以從戎事是亦不可以已乎魯躋僖公文公二年弗忌之躋僖公所謂非禮之禮夫子責其不智左氏譏其失禮聖賢所見略同秦穆公濟河焚舟文公三年秦伯終任孟眀以成王官之㨗可為千古用人之法宋樂豫諫昭公文公七年親之以徳一語自是夲原之論不専為宋公道晉郤缺說趙宣子文公七年此篇深得懐柔之道宣子能用善言其相晉君以主齊盟也不亦宜哉魯季文子出莒僕文公十八年辭義典重高陽氏以下一叚太史公全採入舜夲紀王孫滿對楚子宣公三年問鼎逆節之萌也王孫滿之對一毫委蛇不得必如此辭嚴義正始足以杜覬覦之端折强臣之氣楚子入陳宣公十一年既縣陳矣聞正言而復之申叔深得納誨之方楚王亦有虚受之量楚子圍鄭宣公十二年鄭詞遜順得以小事大之體所以能不失國晉楚邲之戰宣公十二年傳文莫多於此而中間述言叙事繁冗纖悉秩然不亂粲然不遺典而雅富而豔竒而法曲而詳諸羙具矣齊衛新築之戰成公二年諸侯請隧大夫請曲縣繁纓僭越之端上下一轍記孔子之言所以立萬世之防也齊國佐對晉人成公二年鞌之戰齊之君臣以驕而致敗晉之將帥以和而有功晉卿譲功成公二年此篇僅百餘言所以處父子君臣僚友之道皆見晉鞏朔獻齊㨗于周成公二年義指嚴正辭氣温醇深得王朝誥誡之體晉知罃對楚子成公三年當時敦尚節概故罃之對楚王其詞强直如此晉韓厥謀遷國成公六年土厚水深地利也民從教人和也立國之道兩言盡之晉侯不從諸大夫而惟獻子是從可謂能擇善矣劉子論成肅公受脤成公十三年民受天地之中以生語極純粹故朱子稱之大叚亦醇正無疵非復春秋氣矜之習晉楚鄢陵之戰成公十六年晉楚鄢陵之戰范文子始終持不輕戰之議可為老成謀國不以勝楚而㣲有矜心也其論外寜内憂與孟子生於憂患之言正相發明晉悼公復霸成公十八年晉悼公初政發令用人一時井然釐舉壁壘頓新文亦簡嚴有法祁奚請老襄公三年善善惡惡之間因有私心而後有嫌疑故避嫌非君子之道也祁奚之心忘乎讐與子而唯才是舉心如皎日何復嫌疑可為後世人臣舉賢之法晉魏絳對晉侯襄公三年魏絳之行法晉侯之謝過親親賢賢兼得其義晉悼公緜上治兵襄公十三年卿大夫民之表也堂陛之上有競進之心無恬讓之雅何以化民成俗晉諸卿偕讓於上民以大和表正影端其㨗如此晉師曠論衛人出君襄公十四年典重醇茂處似國語在左傳中別為一格宋子罕辭玉襄公十五年古帝王捐金抵璧不貴異物惟賢材是重稼穡是務知國家之所寳在此不在彼也獻玉而子罕不受可謂智矣魯臧孫論詰盜襄公二十一年古人不納叛臣盖所以昭君臣之大義明古今之大防不貪其利而容之也邾庶其竊地來奔魯國容之臧武仲謂之賞盗其㫖嚴矣鄭子産論重幣襄公二十四年潔已澡躬臣子之義悖入悖出古訓所戒子産象齒焚身之論最為深切著明當官者宜銘諸座右子産然明論政襄公二十五年為政者保愛善良如農夫之育嘉榖剪除奸慝如農夫之去惡草故曰政如農功呉公子請觀周樂襄公二十九年季札以樂論列國之風上及三代之盛粲如指掌即孟子所謂聞其樂而知其徳也三百篇即當時樂章其審聽入㣲處尤當與六義叅㸔衛北宫文子相襄公如楚襄公三十一年鄭國多材亦由子産善於委任使各用其所長耳子産不毁鄉校襄公三十一年古帝王懸鞀設鐸以察邇言正所以通幽隠廣聞見也子産不毁鄉校以達輿情故孔子稱之子産論尹何為邑襄公三十一年喻政以羙錦又喻以田獵所以深著不學而仕之戒文勢逐叚相生竒峭古雋如層巒複水足令尋繹不窮衛北宫文子論威儀襄公三十一年經緯家國之謂禮容止進退之謂儀分别夲末處入㣲子産論晉侯疾昭公元年子産之論典而核醫和之論奥而博文特雄竒排宕古色陸離晏嬰叔向論齊晉昭公三年晏嬰叔向論齊晉之失切中情事可謂智矣但二子皆國之大臣明知其失而不能救體國之忠之謂何詞語古藻勁峭左氏之腴也晉司馬侯論三不殆昭公四年此篇論險不可恃一叚精嚴雄闊左傳中堂堂正正之文魯申豐論雨雹昭公四年古人重藏氷伐氷之禮以其為燮隂理陽助流徳化之一事也晉女叔齊論魯侯昭公五年以法紀政令為禮之大綱㨿國勢以立論切而不浮楚薳啓疆論辱晉昭公五年韓起叔向皆晉之賢是時晉國人材方盛故楚畏之而不敢辱古云山有猛獸藜藿為之不採於此益信鄭人鑄刑書昭公六年子産之鑄刑書用重典以救弊叔向之論刑書在修禮以勝刑一則權時之宜一則經久之道也芊尹無宇對楚子昭公七年無宇始而斷楚子之旌既而執人於王宫楚子終不加罪殆亦賢其斷旌而容之與魯孟僖子論禮昭公七年孔子千古禮義之宗孟僖子早知之命其子學禮在春秋時可謂卓識推論孔氏先徳遡源成湯以及正考父之主敬世徳相承毓為至聖淵源逺矣晉師曠論石言昭公八年師曠因怪異而進正言得諫君之體晉屠蒯諫平公昭公九年古者諫無専官前後左右􅉏御之賤咸可讜言規正所謂工執藝事以諫也膳宰之諫晉君饒有古人風義楚子革對靈王昭公十二年抑揚頓挫古雋峭潔極文勢之竒祈招一詩見古人諷諫遺意晉荀呉不納鼓叛人昭公十五年荀吳不以土地之利而納叛亡待其食竭力盡然後取之城克而不戮一人在春秋時猶可謂仁者之師郯子論官名昭公十七年古藻詳核斑駮離竒述官制處所謂賢者識其大者晏子諫誅祝史昭公二十年此篇言當以誠信事鬼神而福祐自至不當歸咎於祝史可破從來矯誣之惑文則典正𢎞麗博辯多姿晏子論梁􅉌據昭公二十年晏子辨和同議論極正大條暢可裨廟謨鄭子大叔對趙簡子論禮昭公二十五年此篇論禮首舉天經地義洞見夲源故議論精㣲閎暢禮運禮器諸篇悉夲於此晏子論禳慧昭公二十六年晏子首論彗星謂修徳可以勝灾繼論陳氏謂修禮可以已亂古人因事納忠之義切矣齊侯恱其言而不能用殆所謂悦而不繹者與仲尼論晉鑄刑鼎昭公二十九年尚徳緩刑為治之要斯篇與鄭鑄刑鼎同意文復簡潔邾黑肱以濫奔魯昭公三十一年邾黑肱以賤而書名惡之也不使叛亡者得掩其名則人皆知所儆畏此春秋筆削之法所謂一字之誅嚴於斧鉞也衛祝佗爭先蔡定公四年此篇歴舉先世典故文勢洋洋纚纚如潮如海理正而詞采復工孔子相夾谷之㑹定公十年聖人於樽俎之間雍容片言折强鄰之威合二國之好反汶陽之田良由盛徳動人詞嚴而義正也楚子西論夫差將敗哀公元年國之强弱視其君之志氣志氣振舉則國勢日强志氣頹靡則國勢日削自古未有不勤恤其民而可以戰勝攻取者也觀闔廬夫差之勝敗益可見矣仲尼論用田賦哀公十一年聖人論國賦處要言不煩故易曰吉人之辭寡聖祖仁皇帝御製文第三集
