body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻十八勅諭諭户部自古人臣事君必令民生疾苦具以上聞勸善懲惡屏絶私黨以愛民弭盜革除惡習敦厚風俗為務前張伯行奏稱務期家給人足仰報君恩今未及一年而遽云給足毋乃文飾太過乎嘗聞人多稱張伯行操守好又聞江浙地方强盜竊賊紛紛叢集鄉紳兵民甚屬不安更聞今嵗錢糧未清虧欠甚多又糧船遲誤米色不堪昔朕南巡時米價較今甚賤且竝無災祲猶慮小民窮苦屢頒諭㫖今盜賊滋蔓該撫反稱給足者無非掩飾前言耳未必於小民實有利益也嗣後毋得如此虚詞矜譽凡事必速行完結敦風厚俗弭盜安民催儹糧船清理錢糧以圖報効該部其嚴飭之康熙五十年十月初一日諭户部朕誕膺大統撫育寰區夙夜孜孜不自暇逸凡以為民也勤圖利濟休養安全即無水旱之虞時布寛仁之政蠲租除賦務使遐方率土無不均沾或値雨暘偶愆出帑發粟多方賑䘏其有益於吾民者靡弗備舉而亟行之朕慇懇周詳之至意前四十九年所頒諭㫖申晰甚明原欲將五十年天下錢糧通行蠲免以諸臣集議恐需用兵餉撥解之際兵民驛遞益致煩苦故自五十年為始三年之内全免一週除將直𨽻奉天等九直省康熙五十年地丁錢糧一概蠲免及歷年舊欠錢糧一併免徵外山西河南陜西甘肅湖北湖南各撫屬除漕項外五十一年應徵地畝銀共捌百四拾萬四千兩有竒人丁銀共一百二十萬捌千一百兩有竒著察明全免竝歷年舊欠共五拾四萬一千三百兩有竒亦俱著免徵其五十二年應蠲省分至期候㫖行民間舊欠既經豁免嗣後毎年額徵錢糧務如數全完儻完不及額或有虧空託稱民欠即責令督撫以下官員償補仍從重治罪該督撫湏實心力行期副朕惓惓愛民之意如有指稱事故侵欺科派事發之日必嚴行究治諭㫖到日徧示城郭鄉村深山窮谷咸使知悉尔部即遵諭行特諭康熙五十年十月初三日諭大學士温達陳廷敬蕭永藻等臺灣總兵官員缺殊屬緊要開列總兵官内一應調補之人著問九卿其福建省官員亦遣人往問大學士李光地并曉諭福建總督等將伊省武官内好者即行薦舉勿致隐漏如果據實具奏則福建省官員懼賢否必能直達皆勉力相率為好官矣福建地方遥逺因朕不得親臨故優劣未能即知如藍理兇惡盈滿聞而褫革之儻當伊罪未著之前先行罷黜於地方豈不大有裨益耶定海總兵呉郡居官甚優實心効力武官内允為苐一今代攝江南提督事務江南人亦皆稱道此人不可調補臺灣朕欲留俟要處提督用之餘著于列名人内舉奏康熙五十年十月初九日諭大學士温達李光地蕭永藻直省生員舉人增額既多赴考者較前倍衆分校官不將巻子全閲但檢意中之人及有關節巻子呈正副主考而主考亦止將分校官所呈巻子分别取中是以真材屈阨今科赴考者俱嘖有怨言謂好文被房官埋沒竟不呈送主考此皆主考官不能將巻子全閲之故也即今朕之記性雖不及上哲猶可為中資如一日閱時文百萹亦不能首尾全記主考官於數日之内閱巻㡬千定其次苐不過隨手出序而已未必得當也此特因出榜之期太近故耳如將出榜之期多展數日則主考得以盡閱巻子不致真材有遺珠之歎矣尔䓁問九卿具奏康熙五十年十月初九日諭禮部朕統御寰區撫綏萬國中外一體保育維殷惟期遐邇咸寕共享昇平之福至於藩邦有能仰體此心修明厥職者朕尤加意優待之兹朝鮮國王李焞自襲爵以來愼守封圻恪循儀度嵗時貢獻方物克殫悃忱四十餘年未嘗少懈其國中之事稍有關係者必奏明仰請定奪罔敢隐諱毎於欽差人員竭盡小心倍加敬禮且撫恤國人善於愛養所屬靡不恱服朕用是深為嘉美既嘗曲示恩誼而値彼地饑饉又自海洋運米賑濟故舉國人衆至今猶深感戴朝鮮貢獻朕屢加裁減以至甚輕但國小地隘其年例貢物内有白金一千兩紅豹皮一百四十二張猶恐艱於備辦嗣後將此二項永停貢獻又聞朝鮮國使沿途館舍盡皆傾圮難以止宿歷年進貢奏事人員甚為勞瘁著令各該地方官作速修葺堅固用副朕加恵逺人至意尔部即遵諭行特諭康熙五十年十月二十三日諭内閣天壇大祭朕親行禮曾有諭㫖嗣因朕躬少有違和大臣等再三奏阻故下㫖遣大臣恭代朕則照常齋戒這兩日體中安好如常更無可疑朕思天壇必親祭方展誠心朕仍親詣行禮大臣等不知朕意或又行奏阻朕今年已六十即或行禮少遲兩傍人少為扶助亦可也其速行傳諭康熙五十年十一月初十日諭内閣任丘文安地勢低窪素係積水之區朕所深悉因地勢處兩大河之間區處無策故令將苑家口之南數百里堤岸保固自滹沱等河至子牙河之北數百里堤岸亦加保固或任丘文安值雨水連綿所積之水髙於河水則將堤開放引水入河其河水髙時聼其自落此理之所必然也至異常水患非但兩河之間不可逆料即髙阜之地豈遂可恃今値無事之時毁拆民間田廬墳墓挑濬河道建築堤閘以疲民力虚費錢糧是斷然不可者又奏稱宣府白溝諸河之水匯於茅兒灣經保定縣達於苑家口等語附近宣化府之河山西大同左衛馬邑等處甚多俱係沙流㑹於蔚州之桑乾遂成渾河永定河其所稱諸水不知從何地越過永定河六里河淶水易水數重河道而突至保定縣耶况永定河身俱係沙土其通塞在於俄頃若必欲清理本源挑濬河道即竭盡直𨽻民力亦斷不能也樊紹祚不諳河務地勢冐昧生事混亂具奏不合其申飭之康熙五十年十一月二十八日諭户部等衙門這口外民内有在本處納糧者亦有不納糧者其本處納糧與否不過憑伊口説竝未行文本處查明無有確據是必詳查本處方知也現今所查十有餘萬民去來無定此番行查之後還不知續來多少回去多少將伊䓁盡行逐回原籍可憐窮民棲止無地若聼其閑住不納錢糧如許人民似又未可至殺虎口等處守備千總把總等交與遥管頗難稽查湏特設副將同知方好管轄自何溝起至何溝止副將同知各一員又自何溝起至何溝止副將同知各一員如令種地納糧其一切錢糧詞訟人命事件著同知料理捕盜事件著副將料理庶得明白這所奏未詳著再行確議以聞康熙五十年十二月十二日諭大學士温達等朕理事年久看得人命並審擬事件要期當乎理而已今陳汝咸條陳請照宋時洗冤録較定畫一屍格除鎗刀弓箭銅鐵䓁器外木棍䓁物俱不作兇器䓁語夫人命事件將拳毆脚踢木棍毆打致死者酌其兇器之輕重以定罪之輕重則事必致紊亂矣如針乃至微之物以針刺死者豈可因針非殺人兇器遂免其罪乎孟子云可使制梃以撻秦楚之堅甲利兵由此觀之木棍亦兇器也著問九卿康熙五十年十二月十三日諭禮部近見直隸各省創建寺廟者甚多建造寺廟則佔踞百姓田廬既成之後愚民又為僧道日用湊集銀錢購買貧人田地給與以致民田漸少且游民充為僧道窩藏逃亡罪犯行事不法者甚多實擾亂地方大無益於民生者也著各省督撫及地方官除原有寺廟外其創建增修永行禁止康熙五十年十二月十五日詔恩詔朕為天下生民主宵旰勤勞勵精圖治凡國家之休戚閭閻之樂利晷刻之間無不注意於此天下之大兆民之衆朕誰欺欺天乎至今四十餘載親歷饑饉者不知其幾南北用兵者不知其㡬人心向背者不知其幾天變地震者不知其㡬自責凉徳不能撫育履氷臨淵兢業惟守仰賴上天眷佑祖宗厚德幸生創業未久之際方免墜失今海㝢昇平年嵗稍和生民俱已樂業邇來諸王大小臣工士庶因朕五旬輿情肫切屢請加上尊號朕堅意固辭不允所請葢朕不以名譽稱揚為尚惟以海内富庶為心是以屢蠲賦役頻省刑罰總欲使老安少懷風俗淳厚漸㡬於康乂隆平之治近因淮黄告成乃東南要務再授方略望有善後朕不辭勞瘁親往閱視見畿輔山左江浙等省耆老人民俱中心愛戴雖童穉亦咸歡欣瞻仰是知民心皆一用是益深軫念視切如傷所以星夜回鑾兹特大沛𢎞㤙普施遐邇庶幾民生咸登壽域和協徧滿寰區所有應行事例開列於後於戲安民則惠益𢎞逮下之㤙御衆以寛聿溥好生之德布告天下咸使聞知康熙四十二年三月十八日聖祖仁皇帝御製文第三集巻十八
