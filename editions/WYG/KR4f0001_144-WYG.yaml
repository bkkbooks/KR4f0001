body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻二十七目録北征勅諭諭議政大臣等及大學士伊桑阿阿蘭泰諭大學士伊桑阿阿蘭泰諭議政大臣班第等大學士伊桑阿阿蘭泰諭大學士伊桑阿阿蘭泰諭大将軍伯費揚古諭領侍衛内大臣公福善等諭領侍衞内大臣諭理藩院諭大學士伊桑阿諭大将軍伯費揚古諭副都御史努赫諭大學士伊桑阿諭大學士伊桑阿諭領侍衛内大臣索額圖大學士伊桑阿諭戸部諭理藩院諭領侍衛内大臣索額圖等諭領侍衛内大臣索額圖大學士伊桑阿諭右衞将軍偏俄山西廵撫倭倫諭侍郎安布禄諭大将軍伯費揚古諭山西廵撫倭倫陜西廵撫黨愛甘肅廵撫郭洪諭領侍衛内大臣索額圖諭領侍衛内大臣及嚮導官諭領侍衞内大臣諭山西廵撫倭倫諭兵部諭侍郎安布禄諭員外郎薩哈連諭議政諸臣諭大學士伊桑阿諭大學士伊桑阿等諭大學士伊桑阿諭兵部諭議政諸臣諭大學士伊桑阿諭護軍統領托倫等諭領侍衛内大臣諭大學士伊桑阿諭大學士伊桑阿
