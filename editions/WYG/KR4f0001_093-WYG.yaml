body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻一勅諭諭内閣九卿詹事科道朕聞部院小官及筆帖式在差者輙令地方官迎迓以請朕安為名若所遣者近御人員地方官請安理所宜然若小官及筆帖式等輙令地方官以請安迎之殊不當於理宜禁之卿等議以聞康熙二十三年十一月三十日諭内閣穆敦請安所上章其還之山陵守視官員此後欲来請安者毋特具疏告之侍衛轉陳奏守視永陵福陵昭陵官員人等欲来省其親戚及以己私事欲来者各聼其自来但於職事無所曠斯已耳若曠其職事而来者則重罪之其悉示知此意康熙二十三年十二月初六日諭内閣泉林寺泗水之源在焉而吾孔子之所游息也朕親歴其地其樹之碑令所司議以聞康熙二十三年十二月初六日諭大學士勒徳洪明珠山東河南山西三省各遣兵部司官一員前徃派出征俄羅斯善用籐牌官兵除八旗察取外著於福建投誠安插墾荒之内願効力官兵詳察揀選善用藤牌者以足五百名之數調發前来并令曉諭此項官兵汝等徃征俄羅斯今冬即可回至原住地方所調官兵該省大吏酌量給與養贍妻子之資整備其夲身行装以善遣之其傳與兵部康熙二十三年十二月初八日諭大學士勒徳洪明珠議政王大臣議奏不發京師兵者議良是但直𨽻山東河南山西四省緑旗兵非經歴征戰之人也且黒龍江火器甚多不湏更増朕意於山東河南山西安插墾荒福建投誠能用藤牌官兵及𨽻八旗福建投誠官兵内選五百名令臺灣投誠何佑率之前往竝諭佑傳示官兵言今年冬即還師也薩布蘇起自卑微每見其陳奏移㑹事宜皆瞻顧支吾遷延時日觀此即四月進兵亦不過刈其禾而食之已耳所指示之事必不能奏効也此皆謫遣黑龍江狂劣之徒不樂成事私議阻撓而薩布蘇夲自微末重視此輩難於違拂其意以故如此兵事所關甚鉅最宜籌畫精詳必期有濟而後從事若所謀輕率又如昔時明安達禮輩以致退師反令俄羅斯有逞心矣今自京師遣一賢能大臣總領軍事俟取雅克薩之城令回京師又於盛京遣兵五百名代黒龍江兵防守城郭勤事耕種俟進剿之兵回時即遣還盛京此耕種事務令戸部堂官一員徃董領之俾勤力作觀俄羅斯所云早收榖種即吾土所種之春麥也今我師亦多種春麥大麥油麥於隕霜之前六月皆可收穫如此則不以出師之故致曠一年耕作矣又緑旗藤牌兵増給馬二千匹此馬於京師各佐領以至内府佐領各捐助馬一騎其不敷者發上駟院馬二百匹兵部馬二百匹再不敷者王以下堂官以上捐助以足其數發往盛京盛京各佐領出馬二千匹照曩時嚴加監視飼令肥壮以俟之更替京師所發之馬前往馬喇等所飼養之馬已預偹於齊七哈里地方聞其間止有十八日之程盛京之馬行至齊七哈里沿途若有倒斃者於馬喇處補給發徃如此則我軍之馬不致缺乏矣此遣往緑旗兵令各攜砲子或十枚或二十枚以往朕意如此措施似大有禆益議政王貝勒大臣逐一詳議具奏特諭康熙二十三年十二月初八日諭大學士勅徳洪明珠遣往黒龍江兵需用籐牌聞閩省製有雙層籐牌甚佳令福建提督施琅取其佳者四百面並揀擇需用大刀從福建由浙江江南山東迅速遞送京師事關軍機勿得遲悞特諭康熙二十三年十二月十四日諭大學士勒徳洪明珠尔等可傳諭議政王貝勒大臣征戰本非佳事不得已而後用之嚮者俄羅斯無故侵擾我邊陲後復漸入越我疆界索倫黒真費雅喀竒勒尔等處之人皆被擾害不獲寧居掠其家口納其逋逃搶其邨落奪其貂皮因彼頻年肆害曾屢行曉諭曰尔等無故入我邊境恣行搶奪朕何難遣發大兵将尔等撲滅但不忍即行殄戮故屢行曉諭欲令撤還尔衆歸我逋逃各居疆土互相貿易寧静無事以安生業數次遣人亦於来使處屢有文移俄羅斯總無一次回報反於黒真費雅喀之地仍行搶奪用是發兵於愛渾地方以堵截俄羅斯所行之路乃俄羅斯仍居我邊界不歸我逋逃今雖應行剿滅但念用兵夲非佳事我惟順天而行将大兵前臨雅克薩以朕諭㫖遣人宣布俄羅斯諭之曰屢次令尔退回歸我逋逃之人遣使馳書者數矣數年以来未有一次信息回報既不歸我逋逃反入我境内擾害地方搶掠人民妻子肆行不止為此遣發大兵前往堵截尔等所行之路於恒滚等處之俄羅斯許其歸順待以不死而生養之汝等仍不退離雅克薩地方故遣發大兵往行征討我師威力豈難剿撲尔等若即破壊尔城郭殄滅尔噍類自立成灰燼矣豈惟尔等俄羅斯普天之下率土之人朕皆惻然仁愛咸欲令其静寧無事各遂休飬故不忍将尔等遽行殄滅屢次曉諭尔等欲各安生業共享太平則當即返雅庫地方以雅庫為界於彼䖏捕取貂皮於彼土収其物産勿入我邊界恣意妄行汝能将已納之逋逃歸還則降我之俄羅斯亦發還於汝如此則邊塞貿易可通咸安樂利而兵革偃息生民無所擾害矣若執迷不悟㒺遵諭㫖仍行抗拒則大兵進剿摧破雅克薩之城且盡行誅戮矣可遣人前往明白開示俄羅斯果能遵㫖即回以雅庫為界而我兵駐劄愛渾則於雅克薩地方安置哨兵令疆界寜謐儻仍行抗拒則大兵相機而行若不如此周詳區畫今雖取雅克薩我兵進則俄羅斯退我兵還則俄羅斯又進用兵無止息之日而生民亦不獲安矣應否如此議政王貝勒大臣㑹議具奏康熙二十三年十二月十六日諭大學士勒徳洪明珠尚書科爾坤侍郎鄂爾多郭丕黑龍江兵食所關最為重要必當謀恒足之道尔等與議政王貝勒大臣㑹同詳議以聞又遣往黑龍江管轄緑旗兵丁之官甚多兵少而管轄之官多甚無益也可度量派官而兵更宜酌減以四百名為率亦既足用而兵糧不致過費且近冬之際緑旗兵在彼地殊無所事可由蒙古境毎百名分為一隊俾遞送之既非乆可至而兵糧又不至糜費矣其一併詳議以聞康熙二十四年正月二十七日諭大學士勒徳洪明珠尚書科爾坤哈占侍郎鄂爾多郭丕薩布蘇等自壊其田器盡斃其耕牛者若軰以為但於諸務曠誤以致廢事則令其離黒龍江而歸矣是其意也凡諸事務職任之人當各盡其心豫為籌度期無廢曠厥職其皆推諉於君上可乎凡於政務朕存之於心殫竭思慮是以於事不致廢曠若以謂有職司之人而専倚若軰聽其為之則軍機之事其必至於貽誤矣薩布蘇等其令議政諸臣察議之康熙二十四年正月二十七日諭大學士勒徳洪尚書科爾坤哈占侍郎鄂爾多科爾沁十旗今嵗進貢牛羊乳酒酥油諸物皆毋貢至京師悉送之黒龍江以給軍士籍其數奏聞仍以進貢例賞賚之如此似於兵丁有益議政王貝勒大臣㑹議以聞康熙二十四年正月二十七日諭大學士勒徳洪明珠馬喇自差遣以来効力良多且深諳雅克薩地方情形其授以副都統品級此兵事令徃㕘謀議特諭康熙二十四年正月二十七日諭大學士勒徳洪明珠林興珠乃勤勞効力之人且列侯爵可令㕘謀議著彭春等恒愛敬而厚視之特諭康熙二十四年正月二十八日諭大學士勒徳洪明珠遣徃征討雅克薩之緑旗官弁各照其現在職銜兵部新給以印信劄付而遣之特諭康熙二十四年正月二十八日諭大學士勒徳洪明珠彭春等至黑龍江時有移㑹雅克薩城文書用黒龍江将軍印遣發之特諭康熈二十四年正月二十八日諭按察使于成龍兹以海口關係運河下流特命尔督理髙寳等處下河事務管轄所屬附近海口州縣等處地方車路等河并串場河白駒丁溪草堰場等口逐一確勘挑濬深闊使髙郵等州縣減水壩一帯運河水口引流入海仍撫綏黎民勤宣徳意約束衙門官吏胥役恪遵法紀勿致作弊生事嚴飭所屬海口有司等官各循職掌勿使糜費錢糧怠弛曠廢一應海口俱宜善加挑濬毋令沙土淤淺以致水勢漲漫淹沒民間廬舎田疇其挑河一切事宜並應設官分任之䖏均申詳總河具題定奪勅中開載未盡應行事務尔悉申詳總河題請遵行嵗終将所修工程及支用錢糧細數一並造冊轉報總河題銷仍聽總河節制尔膺兹委任湏持廉秉公精心殫力俾水患永除民復舊業惟尔之功如或執拗乖張因循冒破殃民悞國責有所歸尔其慎之故勅康熙二十四年二月初四日諭吏部國家設立翰林衙門原以儲飬人材嫻習文學以備顧問編纂之用必淹貫經史博極羣書方克諳練體裁洞晰今古敷詞命意典贍宏通悉登著作之林用佐右文之治始為稱職今將翰林各官特行考試朕親加詳閲分别次第以示勸懲徐乾學韓菼孫岳頒歸允肅喬莱學問優長文章古雅宜加奨勵作何賞賚著議奏彭孫遹等文學亦通著照舊供職益勤研䆒以㡳精純周之麟崔如岳龎塏錢中諧顔光猷李元振費之逵李復泌劉果實劉芳喆文理荒疎未嫻體式難勝厥任除李元振劉芳喆已經降調其餘俱著對品調用尔部即遵諭行特諭康熙二十四年二月初七日諭大學士勒徳洪明珠驍騎校伊番等於三月初旬令馳驛由内路直徃黒龍江可傳諭兵部康熙二十四年二月十三日聖祖仁皇帝御製文第二集巻一
