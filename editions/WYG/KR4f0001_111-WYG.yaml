body:
  text: 欽定四庫全書聖祖仁皇帝御製文二集巻十勅諭諭户部八旗甲兵國家根本當使生計充裕匱乏無虞向因剿除三逆乆歷行間製辦軍器購送馬匹兼之户口日增費用益廣以致物力漸絀稱貸滋多朕每念及深為軫惻若不大沛恩施清完夙逋將愈至困迫難以資生今八旗滿洲䝉古護軍校驍騎校及另户護軍撥什庫馬甲倂子幼或無嗣寡婦老病傷殘告退人等家下馬甲所有積債尔部動支庫銀給還漢軍每佐領各給銀五千兩令其償還債負外餘者各該都統收貯以備公用其口外駐牧八旗察哈爾兵丁出征隨圍几有差使一同効力向竝未給錢糧亦屬可憫嗣後察哈爾護軍校驍騎校護軍撥什庫著月給錢糧各二兩甲兵及執事人竝太僕寺牧厰人役著月給錢糧各一兩俟其贍足時停支尔部即遵諭行特諭康熙三十年二月十七日諭大學士伊桑阿阿蘭泰學士邁圖西安南塔海傅繼祖盛京官屯五十所沿邊丁壯設為屯二十五所遷移於烏喇念此莊屯及沿邊丁壯居住年乆已成聚落今遽令遷移如此衆多人戸生業蕩然必致苦累仍留於盛京與遷移於烏喇皆公家之屯其為納賦則一也朕意此莊屯應停其遷徙於烏喇兵丁每歳派三百名耕種或一歳以烏喇之兵一歳以捕牲之人輪年耕種亦可以積榖矣此事所關綦重著學士麻爾圖馳驛往盛京烏喇令將軍副都統各部堂官悉喻朕意伊等之意若何詳議囘奏康熙三十年二月十八日諭大學士伊桑阿阿蘭泰王熙梁清標張玉書學士邁圖博極傅繼祖王國昌年遐齡彭孫遹王尹方河道所關重大凡修築濬治必速竣厥工斯有裨益冬則以沍寒凝凍春則以桃花水發夏秋則又以水澤漲溢難於興工屢請展限是週歳無可經營之日矣毛成舖地方最要理冝尅期完工工部不行詳察草率朦混議展限三月殊属未審可以此嚴諭尚書席珠河務工程若如此怠緩萬一泛漲衝決致壞河道汝能任此咎乎尔衙門竝記之康熙三十年五月二十六日諭大學士伊桑阿等喀爾喀原係進貢之國伊等不和知其必敗曾特遣大臣諭令和好後乃渝好與厄魯特搆戰窘迫來歸屢失生業窮困已極朕以好生之心撫綏養育曲盡周詳因此懇切抒誠願同四十九旗一例盖理所必然且比年來旱澇頻仍民生猶未蘇息風俗猶未醇厚奢靡猶未盡止朋黨猶未悉除彼此援引傾害猶未屛絶理應日益圖新時加黽勉君臣殫心竭力尚恐不逮居然以為至治遽受尊號斷爲不可所奏已知之康熙三十年五月二十七日諭大學士伊桑阿阿蘭泰學士邁圖西安博極傅繼祖王國昌年遐齡黑龍江松花江接壤之地彼處附近所居根奇勒諸姓中原有可披甲之人應酌量令其披甲駐防遣滿洲兵八十人往彼教訓之齊七喀爾地方以索倫逹呼里之衆酌量令其披甲駐防遣滿洲兵二百人往彼教訓之伊等居址附近亦心樂披甲如此則旣無遠徙之苦亦不致需用糗糧矣可以此詢問都統巴海令理藩院集議政諸臣㑹議以聞康熙三十年六月十六日諭内閣户部差年壯司官一員令馳驛至直𨽻廵撫處詳悉詢問畿輔所屬地方雨澤曾否霑足蝗蝻較前何如還奏康熙三十年六月二十二日諭户部朕頃廵行邊外入喜峰口見有民間田畞為蝗蝻所傷又聞榛子鎭及豐潤等處地方被蝗災者亦所在間有秋成失望則糧食維艱朕心深切軫念儻及今不為區畫儲蓄恐至來歳不免饑饉之虞著行該撫親歷直𨽻被災各州縣通加察勘悉心籌畫應作何積貯該撫詳議具奏其被災各地方明歳錢糧仍照例催科小民必致苦累著俟該撫察報分數到日將康熙三十一年春夏二季應徵錢糧緩至秋季徵收用稱朕體恤民生休息愛養至意尔部即遵諭行特諭康熙三十年九月十八日諭户部朕孜孜圖治軫切民依閭閻耕穫時勤諮訪其有以荒歉上聞者或蠲或賑旋卽施行務令得所念河南一省連歳秋成未獲豐稔非沛特恩蠲恤恐致生計艱難康熙三十一年錢糧著通行蠲免竝漕糧亦著停徵至山西陜西被災州縣錢糧除照分數蠲免外其康熙三十一年春夏二季應徵錢糧俱著緩至秋季徵收用稱眷愛黎元撫綏休養至意尔部卽遵諭行特諭康熙三十年九月十九日諭内閣各省副將及以左都督授世職之㕘將幷先經引見者徵取五人來京或一人至或二人至卽奏聞召見五人畢復徵取五人如前奏聞召見特諭康熙三十年九月二十九日諭内閣傳諭太常寺少卿沙拜向來廣東廣西鹽課雖屬地方官管理而豪強之徒輒行占據不輸國課貿販私鹽因循陋習隱匿侵欺以致病商病民今特遴選尔沙拜遣往稽察兩廣鹽政職任初設彼地商人多屬京師豪貴之家鹽課弊端朕知之甚悉非令汝將前此之弊必究發而叅劾之也尔蒞任後矢勤矢愼將積獘盡除商民咸利以裕國課而濟軍餉則尔之榮不必言矣尔素悉朕意若受人請託瞻狥情面不行革除積獘則欲保首領亦不可得也朕意兩廣一歳鹽課可充一歳軍餉汝之休咎咸在此行勉之愼之特諭康熙三十年十月初二日諭内閣聞畿輔榖價翔貴遣户部筆帖式一員往諭直𨽻廵撫令其於所屬地方以蒸酒糜米穀者其加意嚴禁之康熙三十年十月二十六日諭内閣朕以生􅟻之故冬至未詣天壇行禮各官上表稱賀其停止之康熙三十年十月二十八日諭吏部從來致治之道在正人心人心偏私則詐偽日生而習俗滋敝人心公直則囂競自息而庶績允釐朕蚤夜孜孜崇尚徳教蠲滌煩苛期與中外臣民共適於寛大和平之治凡大小諸臣素經拔擢咸思恩禮下逮曲全始終卽或因事放歸或罹咎罷斥仍令各安田里樂業遂生惟尔諸臣亦冝奉職恪共絶偏私而襄國事乃近見内外各官間有彼此傾軋伐異黨同私怨交尋牽連報復或已所銜恨而反囑人代糾陰為主使或意所欲言而不直指其事巧陥術中雖業已解職投閒仍復吹求不止株累逮於子弟顚覆及於身家甚且市井奸民亦得借端凌侮蔑紀傷化不可勝言凡若所行雖跡甚詭秘朕總覽㡬務已三十年此等情態知之最悉儻因仍陋習益致蔓延殊非朝廷所以體恤臣工保全愛惜之意夫讒譖􅎱嫉之害歷代皆有而明末為甚公家之事置若罔聞而分樹黨援飛誣排陷迄無虛日以致釀禍旣乆上延國家朕厯觀前史於此等背公誤國之人深切痛恨自今以往内外大小諸臣應仰體朕懷各端心術盡蠲私忿共矢公忠豈獨國事有禆即尔諸臣亦獲身名俱泰儻仍執迷不悟復踵前非朕將窮極根株悉坐以交結朋黨之罪尔部可即傳示中外使咸知朕意特諭康熙三十年十一月初九日諭内閣黑龍江軍士及船户人役以每歳耕稼穀尚不支奏請若以此為例每歳給發而所貯之穀有限遇需用米石時必致匱乏遣户部賢能司官一員㑹同黑龍江將軍副都統應作何核減給與詳議奏聞康熙三十年十一月十三日諭戸部朕前聞陜西西安鳯翔等處年歳不豋民艱粒食特命學士布喀星馳前往察勘賑濟頃來囘奏稱西安府屬咸寧等州縣衞鳯翔府屬􅔛縣等三縣米價騰貴百姓流移朕心深切軫念若不大沛恩施無以徧甦疾苦這被災各地方康熙三十一年額徵銀米著通行蠲免又聞甘肅廵撫所屬地方秋收豐稔米價較平著該督撫㑹同詳議作何購買轉輸速行賑濟務俾比屋得霑實惠不致仳離失所以副朕撫恤災黎至意尔部卽遵諭行特諭康熙三十年十一月十四日諭禮部自昔帝王敬天勤政凡遇垂象示儆必實修人事以答天戒頃欽天監奏推算日食當在康熙三十一年正月朔日夫日食為天象之變且又見於歳首朕兢惕靡寧力圖修省惟大小諸臣務精白乃心各盡職業以稱朕欽承昭格至意其元旦行禮筵宴著停止尔部卽遵諭行特諭康熙三十年十一月二十四日諭大學士伊桑阿阿蘭泰學士滿丕圖納哈思格則徳珠王國昌理藩院尚書額爾赫圖署侍郎事學士達瑚逃遁來䧏之喀爾喀杜楞言我原在巴圖爾厄爾克濟濃之弟博卽處博卽爲大兵所敗歩行逃脫於伊巴賴地方遇巴圖爾厄爾克濟濃所屬奇七納台吉等博卽得馬匹糗糧往尋其兄而去巴圖爾厄爾克濟濃所食旣盡困窮已極其内互相刼奪現在厄卽奈地方巴圖爾厄爾克濟濃所屬台吉奇七納等未得追隨而去在厄爾得木卽舒呼地方厄即奈距嘉峪關有四日之程等語西安之兵現戍寧夏著侍衛阿南達偕杜楞往至寧夏與將軍馬喇提督孫思克及總兵官等㑹同詳議偵探實信巴圖爾厄爾克濟濃所在果與嘉峪關相近可以撲㓕則酌量挑選滿洲綠旗兵遣往乘巴圖爾厄爾克濟濃之窮困而剿㓕之或可相機招撫二郎保克西現在彼處卽可遣往尔等與議政大臣㑹議奏聞康熙三十年十二月初二日諭户部朕撫馭區宇三十年以來早夜圖維惟以愛育蒼生俾咸臻安阜為念比嵗各省額徵錢糧業已次第蠲豁其歳運漕米向來未經議免朕時切軫懷所有京通各倉米穀撙節支給數載於兹今觀厯年儲積之粟恰足供用應將起運漕糧逐省蠲免以紓民力除河南省明歳漕糧已頒諭免徵外湖廣江西浙江江蘇安徽山東應輸漕米著自康熙三十一年始以次各蠲免一年至江寧京口杭州荆州大兵駐防地方亦應預行積貯著將康熙三十一年起運三十年漕米各截留十萬石存貯倉厫令該地方官敬愼守視以備需用尔部卽遵諭行特諭康熙三十年十二月初四日諭户部塞外聚穀甚屬要務故耕稼土田以廣積貯爲至切也達爾湖之地其田以内府莊屯之人耕之可令總管内務府於各莊屯内遣其丁壯其穀種耒耜及諸田器耕牛皆令豫備於三旗内府官員新滿洲護軍披甲之中熟諳農事者擇而遣之呼爾湖之地其田以八旗諸王莊屯之丁壯耕之其穀種耒耜及諸田器耕牛咸令豫備熟諳農事人員擇而遣之墾闢耕種之時稷與大麥油麥春麥四種榖皆可藝植稷冝多種之春麥冝少種之遣往耕田之人田旣耕種畢則酌留耘田之人其餘人遣還穀旣熟則所留耘田之人可以收穫此農人所食之米於古北口所貯米石中計口而授之西拉木倫之地其耕田悉照原議遣盛京人役前往俟農畢秋成之後視豐收地方其治田人員該部議叙尔等其議以聞康熙三十年十二月初七日諭内閣達爾湖呼爾湖西拉木倫地方耕田所需之牛著停其捐助於毎處遣户部司官一員帶庫銀照數購買以給與之康熙三十年十二月十二日諭兵部武職官員任寄封疆關係甚重必得其人始有禆益朕所簡閱素悉之員俱已次第拔擢今冝選材以備任用尔部行文各將軍總督提督廵撫及無提督省分總兵官於武職官員内副將以下千把總以上有灼見人材勇健諳練軍務整飭營伍愛惜士卒及行間効力曾經立功者不論本省别省見任候補限文到三日内各舉所知保奏不必彼此會同其在内八旗漢軍官員有人才素優嫺於約束堪任要地者亦著各都統副都統保奏尔部卽遵諭行特諭康熙三十年十二月十二日聖祖仁皇帝御製文第二集巻十
