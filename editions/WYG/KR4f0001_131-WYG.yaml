body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻二十北征勅諭諭皇太子我師以初五日發拖陵前進初四日即遣公主長史多禪中書阿必達齎勅諭與噶爾丹令阿拉布坦喀瓦爾達等二百人與之偕往朕曾訓之曰汝等勿至克魯倫河觀地方情形古爾班圖爾漢巴爾泰哈等處敵人恒駐有哨兵汝等往克魯倫河乃紆曲之道彼必來截汝後惟從顏土庫烈圖地方即將伊等遣發未遣發之前將我軍所獲厄魯特四人縱之使去令其傳信我使臣相繼而往乃伊等於初五日徑抵克魯倫河以未見敵哨蹤跡意謂哨兵已去疎於防備厄魯特人從山巔見之於初六日黎明時厄魯特近千人将馬羣堵截驅逐馬羣中䕶軍及跟隨人役將厄魯特人射殺仍驅馬羣回營我兵整齊排列放鎗殺厄魯特數人我兵雖有數人為厄魯特鳥鎗所中因綿甲皆未透惟一人㣲有傷㾗時喀瓦爾達令我兵且勿與戰勅諭事大務期必達為善令侍讀學士殷渣納與厄魯特人俄七爾偕往彼即将丹即拉之馬挽住云此乃聖主遣來使臣不可加以無禮於是俄七爾將彼䝉不殺之恩賞賚遣回及聖主親臨將軍費揚古從俄而渾土喇順下流而來告之丹即拉失聲驚恐即領受勅諭收兵急去喀瓦爾達等亦收兵而回於初六日申時到初七日駐蹕於庫烈圖西巴爾台布喇克地方中書阿必達從厄魯特營中來奏厄魯特人之言大聖主請稍緩師若即來我等甚懼我主今在土喇地方往來必需數日求少待之初八日早一面向克魯倫河進兵一面仍遣阿必達盆蘇克格隆等往諭彼曰汝等勿懼惟議和好耳我師不駐克魯倫河則水泉不給遣去後遂抵克魯倫河見兩岸皆山山大槩多險峻而少平坦河亦甚小較之南苑中河差大耳是日厄魯特處處哨兵皆見之不知其實在何處今我師相機而進彼宜於我師抵克魯倫之日迎而拒之不以河與我而戰為是乃即令河為我有其庸懦誠可見矣向後情事俟再報将士志氣皆奮勇精鋭恐汝等在京懸念急示知之可於皇太后前奏聞大學士滿尚書咸令觀看特諭康熙三十五年五月初九日諭皇太子因噶爾丹逃遁特示知之初九日早我軍中遣拏活口之新滿洲擒厄魯特一人至問之彼云因我馬疲乏衆人棄我而去比言汝等不挈我往我食已乏今將殺馬以食衆言汝勿殺馬但急隨我等蹤跡前來言畢而去等語朕於是賞賚之今同喇嘛及中書阿必達偕往辰時從厄魯特逃來人云噶爾丹始不信皇上親統兵至昨見爭據克魯倫河分隊進兵彼處處哨兵俱被追逐星散逃奔皆言向克魯倫河兵三隊不知數萬已抵克魯倫聞語遂爾潰遁其衆私相議曰康熙皇帝性不嗜殺於陣前擒獲之人皆賞以衣服而遣之我等從噶爾丹何所底止因大相怨恨欲投誠而來者甚衆觀此則噶爾丹逃遁是實費揚古之兵當前堵截我師追逐於後荷上天眷佑成功大槩可期矣故報京師知之可於皇太后前奏聞宫中亦令咸知正在軍中繁劇之際未及詳寫書來為此特諭康熙三十五年五月初十日諭皇太子初九日薄暮分派兵隊前往追逐初十日抵噶爾丹所住之地觀彼形跡亦不甚衆馬雖有而不多牛跡甚少羊跡亦少有之帳房釡鬵及稚子婦人所用之物鐵器鎗柄網罟帳房椽桿以至釜中之羮盡皆棄之而遁跟隨人役拾取者甚夥觀其生業可謂窮困至極矣師行之際自厄魯特投誠而來者相繼於道咸云噶爾丹住此地阿喇卜坦住於巴顏烏闌噶爾丹初不信皇帝親統兵至此於縱回厄魯特四人問此無水之地何由可至答云我等隨行聞其不待尋覓水泉但皇帝所指有水之地羣往掘取掘未畢輙水泉涌出咸足給用又我師進克魯倫河之日跟隨人於草間遺火焚燎向古爾班圖爾漢之地厄魯特人見之云康熙皇帝將火與兵齊進誰能抵敵即令其衆帳房輜重悉焚棄之身先逃遁衆厄魯特咸訕笑之曰始因何而來今因何而遁又有自阿喇卜坦處逃來者云阿喇卜坦在巴顏烏闌噶爾丹中夜來傳告以皇帝親至阿喇卜坦云汝乃無眷屬牲畜之國我乃有眷屬牲畜之國滿洲兵誰不稔知我斷然不與之戰遂棄之而回未至之前阿喇卜坦之衆半皆離畔尋又聞西路大兵砲聲厄魯特皆倉皇潰遁不知所措至於大亂今汝等追兵於來日日中當可追及其後隊牛羊矣朕於是周詳謀畫期出萬全決不輕易朕所統之兵盡皆整齊驍勇馬悉肥壯觀厄魯特之馬如我軍下等馬者有之我軍未至克魯倫河之先旱甚草未萌茁聞此數日來草皆茂生未知果否我軍逼臨賊境每日歡躍凡大小臣工以至跟隨人役喜悦不可勝言喀爾喀等亦因以奮勇言我等從前視厄魯特人馬精壯今隨皇上大兵來視厄魯特之形貌舉動較我等奴僕之下更不及矣皆願効力哨探擒拏活口因闌入網城泣告求往由此觀之人心惟在於鼓舞節制洵不虚也凡在京之人焉能知如此喜悦故於少暇時將始末情事大槩櫽括書遣示之可於皇太后前奏聞并宫中及滿大學士尚書内大臣侍衞等咸令知之伊桑阿想亦有信至特諭康熙三十五年五月十二日諭皇太子自前㫖諭汝之後於初十十一十二此三日前進窮追其潰竄狼狽之狀總不堪觀婦人稚子悉自殺戮棄之而去獲一老婦生口問之云其部落自相攻殺重被傷殘晝夜奔逃已前去四日由此觀之其去蓋已逺矣若費揚古兵得及堵剿此賊決不能脱若更愆期噶爾丹或得乘間遁去然此賊膽已喪落斷不能存永永敗絶矣我師欲悉往追逐八十日之糧已盡萬一為軍食所窘我如許全盛而至官員軍士已奏成功為何因此逋誅殘寇致重困我師職此之故與諸臣僉謀公議前抵費揚古之師以追擊之不及則還酌量簡選士馬遣發前往此於伊桑阿所報之外特頒諭㫖咸令聞知朕於十三日凱旋啓行朕躬安好恭請皇太后慈安諸皇子諸王大小諸臣以致軍士皆佳以我全師歡欣愷樂風聲所至兇敵摧殘此皆上天仁愛俯垂協應也㡬務至多無暇詳及此進皇太后慈覽宫中並使聞知特諭康熙三十五年五月十三日諭皇太子朕中路兵糧朕每日焦勞在念多方措施皆得無悞而西路之糧甚為可慮非全力催運不能有濟是故朕躬親率師衆迎糧而還撙節已到之糧豫濟西師之用者正此意耳康熙三十五年五月十三日諭皇太子伯費揚古兵已過土喇將噶爾丹去路盡皆堵截特示知之十四日朕所遣布庫殷渣納新滿洲䕶軍竒雅楚鄉導波羅等至奏云伯費揚古之兵於初三日已過土喇將噶爾丹所必由之路嚴密堵截以待之精鋭驍勇之兵一萬四千人已到其地後隊又相繼而至馬之肥壯雖不及朕所統兵然亦甚健朕聞之拱手向天再拜朕之微介於懐者惟此耳今可永遠廓清矣但接續聽報噶爾丹消息賊之情形已全在目中朕今惟舒懷喜悦經理糧餉接濟朕躬何以致斯福佑克稱所懐此皆祖宗黙佑天地眷顧之所致也朕在此不勝歡欣踴躍此二三日間即有成功捷報以此於皇太后前奏聞宫中以及滿洲大臣侍衞等咸令知之特諭朕班師移營已二日在拖陵布喇克駐蹕數日亦未可定此書寫於駐蹕他爾渾柴達木之地斯處水泉稀少朕躬自鑿井帷幄既設寫此書畢大雨傾注水遂足用朕復向天拜手以謝康熙三十五年五月十四日諭皇太子伯費揚古兵已將噶爾丹戰敗特示知之十五日夜四更時将軍馬思哈奏章至稱臣等於十四日距巴顏烏闌十五里追及前鋒兵探哨之喀瓦爾達將厄魯特人奔第來問之彼云噶爾丹於特勒爾即地方遇大將軍費揚古兵交戰噶爾丹敗北而退復列陣拒敵我師歩戰衝突而入兩兵正交戰時見噶爾丹兵有潰散奔敗之狀我遂逃出投奔皇上等語并將奔第遣來問之奔第彼云噶爾丹不信皇上親統兵至乃復驚駭恐懼日禱於佛前雖欲慰輯其衆而不能人心遂大動揺自見聖主兵威衆厄魯特私相謂曰康熙皇帝其速來攻取我等似此生活有何底止交戰處噶爾丹兵不及五千馬既極疲痩又聞聖主追逐已近諸凡器物盡皆委棄今雖逃出何以存活等語於是即以所聞於五更時寫書馳示可於皇太后前奏聞宫中及諸大臣咸令知之此後相繼報至即時遣發特諭康熙三十五年五月十六日諭皇太子朕十六日駐蹕古土爾布拉克地方經理回京士馬午後將軍馬思哈奏報伯費揚古兵大破噶爾丹噶爾丹所倚任之丹巴哈什哈等率衆投降我師等因將此奏報抄謄發去今大事已完朕惟待大將軍費揚古奏章至拜天以謝為此特頒諭㫖可奏聞皇太后傳知宫中及衆朝臣知之康熙三十五年五月十六日諭皇太子侍讀學士喇西引丹巴哈什哈於十七日到朕素識其面非下流無知識之人令喚入賜坐問之其應對語言真實明爽云噶爾丹素有謀為亦得人心每悔深入烏闌布通輕易交戰近思於克魯倫土喇諸處將喀爾喀及内地䝉古用計煽惑令人首尾不能相顧彼時希圖大舉滿洲聞知必然出師師少則與之戰師衆則委地而退待滿兵既旋復躡襲其後如此不數年自然財賦耗絶必至疲敝是以蓄謀而來也伊心志本侈今不意聖躬親統如許大兵度人所難行之瀚海俄頃而至厄魯特之衆窺見軍威莫不喪膽於初七日早即行潰遁晝夜奔馳棄其生計因追兵緊尾其後狼狽流離又於十四日在特勒爾即地方突遇西路大兵時厄魯特兵五千有餘鳥鎗不及二千自克魯倫巴顏烏闌以上極其亢旱莖草全無五晝夜倉皇敗走於無草之地沿途委頓隨去者少曽見西路之兵先據高阜我厄魯特據一小坡徒歩拒敵天朝大兵亦徒歩與戰火器齊發整肅從容相逼而進其前有舉棍者有將紅圓之物遮蔽其身者漸戰漸近至十歩内箭來如雨先從噶爾丹所領之隊敗遁次則丹即拉丹津温布亦遁阿喇卜坦一隊尚相拒未動於是滿洲騎兵將厄魯特大營圍繞其婦人穉子及馬駝俘獲甚多牛二萬頭羊四萬隻又見阿奴喀屯為鳥鎗所中而死戴巴兔爾寨桑中砲連貫數人而死波羅特和卓中箭而死後復短兵相接更有一隊所持非鎗非刀衝突直入所向之處人皆披靡斃者無算思我主背其誓言獲罪聖主天實厭之至於此極我等素行殺戮離拆人之妻子今孽歸已身輾轉思維愛惜性命故背我主而圖倖免殺戮存留皆出聖恩又以滿兵如何問之云我等會於烏闌布通時即以畏懾今來此克魯倫土喇我厄魯特傾國之人皆豫知滅亡惟噶爾丹一人以為不然猶妄言有成此乃天之定數彼不自知其然而然矣昔從噶爾丹征討諸國時所向咸剋如滿洲兵者實無敵於天下我厄魯特如何抵當適自取覆亡也又問噶爾丹得脱乎可擒獲乎對云聞噶爾丹僅率四五十人而走擾亂中未經目覩然雖得脱無以資生殆困餓以死耳書此正欲遣發十八日日中副都統阿南達齎至平滅厄魯特奏章遂一倂附往其陸續投誠之厄魯特二千有餘亦全獲其妻子牲畜剿滅厄魯特之事畢矣將此情節於皇太后前奏聞宫中咸令知之滿大學士尚書及内廷侍衞大臣亦令知悉朕已率衆望天申謝諸王大臣亦行慶賀特諭康熙三十五年五月十八日諭皇太子遣中使之後德木楚克台吉於二十一日到云十八日曽見兩處將軍會合賊於伯費揚古軍中投順者回子之阿卜都什汗厄魯特之車林渣卜台吉巴兔爾台吉顧魯黙爾根台吉韓度台吉梅寨桑馬木顧英寨桑厄林辰哈什哈顧英寨桑畢車七大喇嘛畢西勒爾兔綽爾濟被大兵剿殺之後來降之厄魯特云丹即拉於交兵時未動師敗自刎阿喇卜坦兩處著傷未見脱出曽見其所乘之馬殆亦死矣烏爾占渣布死於陣前噶爾丹所率約十人奔僧枯爾上流前往噶爾丹有言今已矣難以存留惟前往不拘何地饑餓以死而已如此怨咎而行此番被殺與投順者朕皆素知為噶爾丹信用之人今已殆盡但伊喇固克三胡圖克圖丹津温布二人未知消息投順於費揚古之人二千有餘投順馬思哈之人五百有餘將軍等遣人四面覓其蹤跡脱去無多擊賊之地我兵常隻身獨行撿尋賊物有廓然蕩平景狀朕曽遣侍衞馬五往觀俟回日明白詢問再諭朕恐汝等懸念故屢示之將此情仍於皇太后前奏聞康熙三十五年五月二十一日諭皇太子朕入喀倫見草長甚佳諸人之馬留在喀倫者皆更肥壯衆䝉古云比數歲以來不曽見如此草長茂盛雨水調匀之年自今春牲畜肥壯四種牲畜之孳息並無損傷此皆我聖主所賜福慶惠及我等者又内扎薩克喀爾喀翁嫗及婦人穉子迎於路次喜而言曰以我聖主之威福不惟一噶爾丹即十噶爾丹大兵一至亦立刻破滅矣今聖主建立大功奏凱而還我等來迎叩首從此共樂太平又有老婦等言我等初以為聖主不在富盛之地寶幄之中安居逸樂而當此寒苦之時何為來吾曹此等地方我等聞遠過瀚海前往克魯倫河我等老朽之人不覺眼中流淚每日哭泣意中思念我主為何深入如此荒遠悍惡之敵地忽聞將噶爾丹剿滅奏凱而還方知我威武聖主之來誠大慶幸也若非如此我等今生何以生活皆歡欣忭喜謂胸懷得以開暢稽顙至於破裂笑者哭者一時雜遝今正䝉古牲畜肥壯之時極為殷阜較我師去時迥相懸絶比時未經遣聞今特諭知可進皇太后慈覽並使宫中知之康熙三十五年五月二十九日聖祖仁皇帝御製文第二集卷二十
