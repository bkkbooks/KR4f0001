body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻三十雜著古文評論杜欽訟馮奉世䟽大指與劉向訟甘延夀䟽同體製亦略相似翼奉應直言封事引經徴事樸􅈪不雕薛宣申勅刺史䟽刺史外吏之表率也宣言於是乎得要領矣王尊勅掾功曹教鷹鸇之志見乎行墨劾匡衡張譚奏尊為司隸在孝元時適當顯顓權衡譚比附之際而寢黙不言此時成帝即位顯已徙官尊劾雖當惜其稍晚公乘興訟王尊書先歴舉尊之功狀次言被劾之由别白是非條理秩秩足令忠臣吐氣讒人戢志劉輔諫立趙偼伃䟽妃匹人倫之始王化所從出也自非有德之世不可以奉神靈之統而樹宫壼之儀成帝於是乎失徳矣谷永祭祀方術奏窮極方士情態可以正人心維風教訟陳湯䟽儳刻之筆書剴至之情結搆最勝梅福言王氏書斥言王氏如此切直谷永輩見之能無慚色請封孔子世為殷後書意主尊禮尼山而以繼嗣為言辭復警動孔衍上書辨眀家語家語真孔氏書與孔叢自别得博士言更足據正矣耿育訟陳湯書湯即不侯有此一書可以無憾王嘉請重二千石䟽闊略細故勿數改易皆深達治體之言然須慎簡其人乃有實效遣將行邊對動民以行應天以實聖人復起無以易此兩言日食論董賢奏論自爽徹意亦懇到再論董賢奏文無枝詞較日食奏更為勁切毋將隆諫賜武庫兵器奏質確不繁而意已獨至師丹定陶共王立廟議議甚正後世濮議興獻議皆當以此為準李尋災異對篇中援引雖繁其切於治術處固是正論鮑宣諫寵外親幸臣書直而不撓質而無飾故辭無嫌於過激也論董賢書辭尚質樸意存伉直所謂布帛菽粟之文可濟實用者也揚雄諫不受單于朝書文法而暢意婉而周劉歆毁廟議引據論議卓爾不羣洵可謂博而篤矣責讓太常博士書辭理明確有功經學之文賈譲治河奏治河之法古今異宜語其大者三䇿盡之矣後漢光武勅馮異平定安集光武首舉以訓將帥可謂王者之師仁人之言報隗囂手書駕馭羣雄推心置腹無復畛域之嫌恤民詔理寃獄釋滯囚以消亢旱之氣較圭璧禱祠逺勝賜竇融璽書竇融雄據河西待時觀變光武賜以璽書洞見情事融既憚英眀又懐大度委心効順永為漢藩所謂一紙書賢於十萬師也再報竇融詔光武初年公孫述在蜀隗囂在隴右皆割據稱雄所恃以扼二㓂者惟竇融在河西耳帝撫以至誠既無西顧之憂復收指臂之勢不數年隴蜀削平帝業之成重繫於此與公孫述書圖讖之說盛於西漢末年至光武初猶襲用之觀其以赤伏符受命是也故與公孫述書亦舉以立言賜隗囂詔屢賜囂書數遣來歙意在保全囂降蜀而自取殄滅宜哉詔上書不得言聖德盛而後能謙能謙而盛德益著光武此詔視唐諸帝之屢上尊號者彌増光烈矣詔讓劉尚仁厚之言哀矜惻怛為將者宜深體斯意地震詔軫恤災傷具有實政文亦簡質近古報臧宫馬武詔光武久在兵間深知用武之擾民故謹於開邊如此明帝報桓榮書明帝尊重師傅即高宗舊學甘盤之義祀明堂詔矞矞皇皇聲容俱偹東漢之盛史稱明章良有以哉爵李躬桓榮詔三代哲王皆盛行養老之典周秦以來斯禮久曠漢明帝能修舉於廢墜之後宜乎人心允洽圜橋門而觀聽者億萬計也獲寳鼎詔獲鼎薦廟乃歸羙於祖宗譲善於臣子復禁章奏浮辭虚譽則善矣班示封事詔史稱大禹昌言則拜仲虺賛湯改過不吝明帝班示封事猶得斯義手詔東平王國傳恩誼篤摯詞致淵雅為善最樂之言允為宗親楷範申眀科禁詔自古慎終之禮皆有制度品節所以辨貴賤之等安貧富之心維持風俗奬成㢘譲莫要於此詔語明確足以觧世之惑汴渠成詔黄河激湍奔流助以他水則勢益暴明帝修復隄防所以收河汴分流之利臨流而歎禹功繼世宗瓠子之作意概亦偉明徳馬皇后辭封爵詔明徳后損抑外家出於至誠示之以儉帥之以謙正所以保全長久之也明徳之識解超矣伏波之遺澤逺矣報帝請封外戚詔史稱馬后徳冠後宮觀其惓惓阻戚畹之封可為萬世龜鑑章帝命趙憙為太傅牟融為太尉詔漢建三公為師傅之官慎簡耆徳老成故特重之文復典醇有致實覈受廩詔矜恤流離務施實恵當無澤不下究之患地震舉賢良詔政無大小得人為夲自是要言不煩報東平王東平因災異上封事章帝虚己採納謙沖之意溢於言表賜東平瑯琊二王書賜書中篤念先徳敦睦宗親仁孝温文皆藹然至性之言史稱章帝長者不虚也論五經同異詔五經在兩漢時各祖其師說以専家鳴於世章帝特開虎觀詔諸儒講五經同異俾先聖典訓晦而復明漢諸帝尊經之功大矣日食詔舉士先巖穴毋取浮華尤得官人之要手詔東平王親親之誼辭愈樸而意愈真賜公卿助祭錢詔文質而思深言簡而意長兩漢詔令之所以擅今古也行秋稼詔行稼所以省民若供帳勞費適滋煩擾章帝下詔務崇省約欲令貧弱有利庶㡬夏諺逰豫之善選髙才生受學詔尊經之言蔚然雅正賜流民公田詔人情安土重遷罹水旱而致流移民生之最可矜者恤之如此當無鴻鴈澤中之歎詔報朱暉朱暉為太守時吏畏其威民懐其恵可謂㢘吏故章帝報書如此賜鄭均毛義穀詔崇奬孝義存問隠逸得為政之要詔三公守令最為親民與為才辨無寧簡樸與為精察無寧渾厚兩漢罷斥俗吏奬進安静悃愊之人此吏治所以近古也定律詔頌成康之盛歸羙刑措紀太宗之政首曰縱囚葢刑辟時當敬慎固不獨冬至立春後不宜報囚也詔袁安等集衆思廣忠益以禆廟謨此正晏子和同之辨詔辭深得此意詔改定禮制議禮同於聚訟所以貴折𠂻也文特簡雋遒古稟給孤幼詔恤孤懐幼仁言惻然以肥田賦貧民詔章帝因巡行觀俗東禮岱宗遂踐河防給貧民糧種以勸力農半免所過田租嘉恵生民善政釐舉兹逰故可紀也勅侍御史司空詔温醇愷惻以愛物為順天得體元之義詔齊相旌江革江革以至行受上賞奬人倫而厚風俗者莫大焉聖祖仁皇帝御製文第三集巻三十
