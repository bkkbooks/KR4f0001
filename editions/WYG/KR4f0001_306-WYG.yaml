  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻三目録勅諭諭吏部諭刑部諭大學士溫達松柱李光地蕭永藻王掞諭内閣諭大學士溫達松柱李光地蕭永藻王掞諭大學士溫達松柱李光地蕭永藻王掞諭大學士溫達松柱等諭大學士溫達松柱學士舒蘭馬良綽奇常㤗諭大學士松柱李光地蕭永藻王掞等諭大學士溫達松柱李光地蕭永藻王掞學士舒蘭馬良傅爾呼納綽奇常㤗彭始摶鄒士璁沈涵兼管翰林院事左都御史揆叙侍郎湯右曾等諭户部諭大學士溫達松柱李光地蕭永藻王掞學士綽奇常㤗沈涵等諭大學士溫達等諭大學士溫達等諭禮部
