body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻三十雜著康熙幾暇格物編菓單菓單出陜西查本草注云菓單以楸子為之即劉熙釋名所謂柰油也不知楸子所成特黄色一種耳有紅黒二種則以哈菓為之哈菓出肅州及寜夏邉外回子呼為哈忒今口外亦隨處有之枝幹叢生有柔刺不甚髙大其皮可以飾箭溜矢把耐乆倍於桃皮葉似野蒲萄而小結實攅聚秋深乃熟或赤色或青黒色故俗亦名紅菓黒菓邉人云秋時採取摘去枝梗將菓下鍋熬出津液漉去渣滓煉成薄膏貯别器内候少凉膏欲凝結畧如紙房抄紙法以木為匡抄而成皮勻薄如油紙揭起隂乾紅菓成者色紅黒菓成者色黒土人以之餉逺亦名菓煆皮以自熬煆而成也乃哈菓之名書籍皆不載是知古今方物畧而弗備者何可勝記也普盤普盤即木苺一名懸鈎子爾雅所謂箭也按本草云懸鈎樹生髙四五尺其莖白色有倒刺其葉有細齒頗似櫻桃葉而狹長又似地棠花葉四月開小白花結實色紅味酸羙人可多食之有以為即覆盆誤也盖苺有三種藤生縁樹而起者大麥苺乃入藥之覆盆也樹本挺而叢生者木苺一名山苺即普盤也草本委地而生者地苺亦名蛇苺不可食今江南人謂之蛇盤也各作泥臘西洋大紅出阿末里噶彼地有樹樹上有蟲俟蟲自落以布盛於樹下收之成大紅色蟲名各作泥臘考叚成式酉陽雜爼有紫􅑭出真臘國呼為勒佉亦出彼國使人云是蟻運土於樹端作窠結成紫􅑭唐本草蘇恭云紫􅑭正如臘蟲研取用之呉録所謂赤膠亦名紫梗色最紅非中國所有也又考元周達觀真臘風土記云紫梗蟲名生於一等樹上其樹長丈餘枝條欝茂葉似橘經冬而凋上生此蟲正如桑螵蛸之狀葉凋時蟲亦自落國人用以假色亦頗難得又唐人張彦逺名畫記云畫工善其事必利其器研錬重采用南海之蟻􅑭按今西洋之各作泥臘大小正如蟻腹研淘取色有成大紅者亦有成真紫者用之設采鮮艷異於中國之紅紫是即古之紫􅑭無疑而北宋以前畫用大紅色至今猶極鮮潤者實緣此也梌樹楓樹南北不同北方原無楓樹之名自南廵見楓樹方知北方之梌木即是楓樹但南方厥木惟喬所以直生北方厥木惟叢故矮短耳其枝葉則相同也阿濫阿濫之名見唐詩紀事驪山有小禽名阿濫堆禽經作􅀈􅬹鳥善鳴眀皇御玉笛採其聲翻新曲且名焉張祜詩云至今風俗驪山下村笛猶吹阿濫堆通雅云鸄驪山鳥也一名阿濫堆則古名鸄矣爾雅鸄鶶鷵䟽云鸄一名鶶鷵亦作鴳濫鴳讀安與阿音近韋昭所謂鴳扈蘇軾詩不見阿濫堆决起隨衝風此鳥有二種一種鳯頭者髙誘吕覽注所謂鴳一名冠雀是也一種無鳯頭者彚雅所謂阿蘭似百舌而無毛角是也江南人呼為鴳􅬹或訛為烏􅬹金光子金光子閩人呼酸棗樹極髙大葉長而尖如橄欖四月開花淺綠色結實如大棗八月始熟色黄故亦名金棗收乾則紫赤色味酸核圓而堅多竅人心之狀圓外竅中故此果專為心家藥閩書云酸棗出福州建寜福寜建寜人以為糕與樝糕相似或云其種自西域佛國來取其核就天然罅孔處雕鏤作羅漢形為念珠按政和本草圖經云酸棗真者最不易得其木髙數丈徑圍一二尺木理極細堅而且重皮亦細紋似蛇鱗其核仁大而色赤如丹今市之貨者皆棘實耳葛仙米葛仙米生湖廣沿溪山穴中石上遇大雨衝開穴口此米隨流而出土人撈取初取時如小鮮木耳紫綠色以醋拌之肥脆可食土人名天仙菜乾則名天仙米亦名葛仙米以水浸之與肉同煮猶作木耳味大約山洞内石髓滴石而成性寒不宜多食聞他府及四川時有之必遇水衝乃得嵗不常遇他如深山背隂處大雨之後石上亦間生然形質甚薄見日則化或乾如紙不可食矣又梧州府志葛仙米出北流縣勾漏洞石上為水所漬而成石耳類也采得暴乾仍漬以水如米狀以酒泛之清爽襲人此原非榖屬而名為米俗云晉葛洪隠此乏糧采以為食故名嶺南襍記云韶州仁化縣丹霞山産仙米徧地所生粒如粟而色緑煮熟大如米其味清腴大抵南方深山中皆有之也倒弔果倒弔果俗名弔搭果形似山梨而小體微長味酢肉多沙長蒂諸果始生時皆向上此果花實皆下垂故名生時堅澁熟乃沙性暖利健脾消食樹枝葉俱如梨為秦中物産今遵化㳂邊有之而考之書籍草木諸譜皆不載倒弔之名惟司馬相如上林賦云荅遝離支荅遝音近打拉張揖注云荅遝果名按梅堯臣牡丹詩用打拉二字北人方言以欹垂為打拉是荅遝名果或因其下垂也說文海篇俱作榙􅀈果今名弔搭或是荅遝音之轉耳林檎李類甚繁林檎其一也樹不甚髙枝葉皆如李花白唐人謂之月臨花實如李而差小有黄紅二種本草所謂金林檎紅林檎是也獨核有仁味甘津亦名來禽亦名蜜果此果味如蜜能來衆禽於林故得林檎來禽蜜果諸稱學圃餘䟽謂花紅即古林檎誤矣花紅柰屬也柰有數種其樹皆踈直葉皆大而厚花帶微紅其實之形色各以種分小而赤者曰柰子大而赤者曰㯽子白而㸃紅或純白圓且大者曰蘋婆果半紅白脆有津者曰花紅綿而沙者曰沙果西京雜記所以有素柰青柰丹柰之别也又有海棠果通志謂之海紅而闗西有楸子有榅桲滿洲呼山樝曰榅桲與陜西同音查梅堯臣有得沙苑榅桲詩政和本草附載榅桲於柰内是宋時已有此稱其始或從陜西流名闗外或從闗外通音陜西俱未可定亦皆柰類盖李之與柰其枝葉花實固區以别而其子核之異尤最易辨堅而獨者李類柔小而四五粒者柰類草木諸書皆以林檎附於柰内其亦未嘗體認物性矣人中人之水溝穴在鼻下口上一名人中脉論竒經諸書謂任督二脉一行於身之前一行於身之後㑹於素髎水溝斷交三穴三穴為面中三水溝又為三之中故名人中也一說人有九竅自鼻以上皆兩自口以下皆一此居其中故云是但釋中之義耳而王逵蠡海集為之說曰所謂人中者天食人以五氣鼻受之地食人以五味口受之人中盖居人身天地之中也此又未免穿鑿盖人受天地純全之氣成形四肢百骸能得其全獸則得其偏如猿猴猩猩之類凢諸寓獸亦似人形而其鼻柱直脣之間總無此水溝一叚以此辨人之獨異於獸水溝之所以得人中名也今滿洲呼呢呀爾馬䝉古呼庫門髙麗呼薩拉蜜皆直曰人而已可見義理真確自可通之六合竊疑古人氣穴辨論何以未經道此及閱素問骨空篇注有鼻人二字是古人亦秖呼為人矣鼢䑕俄羅斯近海北地最寒有地獸焉形似䑕而身大如象穴地以行見風日即斃其骨亦類象牙白澤柔滑紋無損裂土人毎於河濵土中得之以其骨製椀楪梳箆其肉性甚寒食之可除煩熱俄羅斯名摩門槖窪華名鼢䑕乃知神異經所云北方層氷之下有大䑕肉重千觔食之已熱字書謂鼢䑕别有一種大於水牛穿地而行見日月之光則死皆即此也地震朕臨攬六十年讀書閱事務體騐至理大凢地震皆由積氣所致程子曰凢地動只是氣動盖積土之氣不能純一閟欝既乆其勢不得不奮老子所謂地無以寜恐將發此地之所以動也隂陽廹而動於下深則震雖微而所及者廣淺則震雖大而所及者近廣者千里而遥近者百十里而止適當其始發處甚至落瓦倒垣裂地敗宇而方幅之内逓以近逺而差其發始於一處旁及四隅凢在東西南北者皆知其所自也至於湧泉溢水此皆地中所有隨此氣而岀耳既震之後積氣既發斷無再大震之理而其氣之復歸於脉絡者升䧏之間猶不能大順必至於安和通適而後反其寜静之體故大震之後不時有動摇此地氣反元之徴也宋儒謂陽氣欝而不申逆為往來則地為之震玉厯通政經云隂陽太甚則為地震此皆明於理者西北地方數十年内毎有震動而江浙絶無縁大江以南至於荆楚滇黔多大川支水地亦隆窪起伏無數百里平衍者其勢欹側下走氣無停行而西北之地彌廣磅礴其氣厚勁坌涌而又無水澤以舒洩之故易為震也然邉海之地如臺灣月輙數動者又何也海水力厚而勢平又以積隂之氣鎮乎土精之上國語所謂陽伏而不能岀隂廹而不能烝於是有地震此臺灣之所以常動也謝肇淛五雜組云閩廣地常動說者謂濵海水多則地浮夫地豈能浮於海乎此非通論京房言地震云於水則波今泛海者遇地動無風而舟自蕩摇舟中人輙能知也地震之由於積氣其理如此而人鮮有論及者故詳著之聖祖仁皇帝御製文第四集巻三十
