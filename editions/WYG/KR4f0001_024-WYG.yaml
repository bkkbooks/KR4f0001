  text: 欽定四庫全書聖祖仁皇帝御製文集巻十目錄勅諭諭户部諭禮部諭九卿詹事科道諭康親王傑淑諭大將軍安親王岳樂諭九卿諭大學士索額圖明珠李霨杜立徳馮溥諭戸部諭戸部尚書伊桑阿諭大學士索額圖勒徳洪明珠李霨杜立徳馮溥學士噶爾圖希福徐元文李天馥諭大學士索額圖諭刑部諭吏兵二部諭吏部諭禮部諭吏部等衙門諭大學士勒徳洪明珠李霨杜立徳諭内閣九卿詹事科道諭恪純長公主諭大學士索額圖勒徳洪明珠李霨杜立徳學士噶爾圖希福李天馥
