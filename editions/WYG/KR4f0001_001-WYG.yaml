  text: 欽定四庫全書聖祖仁皇帝御製文集總目巻一勅諭諭户部諭吏兵二部諭吏部諭吏部諭户部諭吏兵刑三部諭吏兵二部諭户部諭宗人府諭刑部諭刑部諭吏部諭吏部諭宗人府吏兵二部諭禮部諭兵刑二部諭兵部諭吏部諭吏部諭吏兵二部諭吏部諭户部諭吏部諭吏兵二部巻二勅諭諭吏兵二部諭禮部諭禮部諭吏部諭兵部諭兵部都察院督捕衙門諭戸兵二部諭禮部諭吏部等衙門諭禮部諭刑部諭都察院左都御史明珠諭禮部諭禮部諭吏兵二部諭禮部諭戸部諭禮部諭刑部等衙門諭大學士巴泰索額圖李霨魏裔介學士哲爾肯哈占達都色黑馬朗古張鳯儀靳輔陳敱永諭禮部諭禮部諭戸部卷三勅諭諭内閣翰林院諭刑部等衙門諭禮部諭吏部諭兵部諭宗人府吏兵二部諭禮部諭禮部諭吏兵二部諭吏部諭兵部併督捕衙門諭禮部尚書哈爾哈齊侍郎常鼐諭太常寺諭戸部諭吏部等衙門諭吏兵二部諭吏部諭刑部諭工部諭宗人府諭刑部諭禮部諭兵部諭禮部諭戸部諭戸部諭吏部諭兵部諭吏部諭吏兵二部諭戸部卷四勅諭諭禮部諭吏部諭吏部等衙門諭刑部諭戸部諭吏兵二部諭吏禮二部諭吏兵刑三部諭兵部諭兵刑二部諭兵部諭吏兵二部諭吏部諭兵刑二部諭兵部諭禮部諭兵刑二部諭兵部諭兵部卷五勅諭諭吏部諭禮部諭吏禮兵三部諭兵部諭吏部諭兵部諭刑部諭兵部諭禮部諭吏兵二部諭大將軍多羅貝勒等諭禮部諭内務府諭禮工二部諭兵部督捕衙門諭兵部諭吏戸兵三部諭戸部諭兵部巻六勅諭諭吏兵二部諭禮部諭吏戸兵三部諭禮部諭管侍衞内大臣諭海澄公黃芳世諭日講官起居注侍讀學士牛鈕諭禮部諭翰林院掌院學士喇沙里陳廷敬侍讀學士葉方藹侍講學士張英諭刑部諭新委西勒圖部落首領喇嘛墨爾根噶布褚諭平南親王奄達尚之信賫奏㕘將羅思漢諭遣徃將軍莽吉圖軍前侍講學士顧八代諭平南親王奄達尚之信賫奏囘粤張永祥諭禮部諭吏禮二部諭吏部諭大學士明珠諭大學士巴泰諭廣東提督王可臣諭大學士索額圖諭吏部等大小各衙門諭河南廵撫董國興諭遣徃廣西廵撫傅宏烈軍前筆帖式噶爾西拖洛諭大學士署禮部索額圖諭工部尚書馬喇侍郎温代卷七勅諭諭巴林長公主諭傅宏烈賫奏道臣劉曉諭内閣傳諭平南親王奄達尚之信賫奏人諭吏部諭將軍穆占諭戸部諭禮部諭吏戸兵三部諭撫蠻滅宼將軍廣西廵撫傅𢎞烈諭吏兵二部諭掌院學士陳廷敬侍講學士張英侍讀王士禎中書舎人髙士奇諭對秦吳黙納等諭大學士撫遠大將軍圖海諭吏部等衙門諭兵部諭中書舍人高士竒諭刑部諭禮部諭吏部等衙門諭將軍穆占
