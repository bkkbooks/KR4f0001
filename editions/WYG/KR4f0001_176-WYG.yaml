body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻四十三目録古今體詩四十一首季夏逰西山憶舊詠花夏日閒坐夏日郊行苦熱戲作雨中遠望日講畢同翰林張英髙士奇勵杜訥看荷初秋中元日焦園作復遊盤山絶頂春日觀花夏日口外寄宫中避暑暢春園雨後新月喜雨詩十六韻并序南廵再過濟南觀珍珠泉并序經泰山之􅅢并序再過淮南并序淮城曉霜聞雁蠲江南逋賦并序過維揚并序金山江天寺焦山駐蹕金山雨過錫山虎丘望山後鄧尉山鄧尉小軒望太湖登靈巖晩過吴江入平望并序禾中道上廵幸杭州呉山泛舟西湖西溪題西溪山莊以竹牕二字書賜髙士竒過桃花嶺至玉泉寺湖心亭渡錢塘江山隂
