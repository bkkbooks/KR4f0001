body:
  text: 欽定四庫全書聖祖仁皇帝御製文集總目卷三十六古今體詩三十八首東廵二首并序玉田駐蹕豐潤城西夷齊廟并序灤河泛舟經永平城南撫寧山海關幷序䝉恬所築長城姜女祠曉過寧遠行殿夜覽章奏呂翁山是聖祖太宗文皇帝擒洪承疇處松山杏山晩眺憩小凌河錦州道上駐蹕大凌河途次逢寒食十三山過廣寧望醫巫閭山渡句驪河過永安橋口占盛京遣使請太皇太后皇太后起居夜書奏疏畢偶成三月初六日告祭福陵㳟述十韻初八日告祭昭陵㳟述十二韻盛京舊宮告祀禮成宴諸臣於舊宮三月十一日雪中詣永陵告祭薩爾滸并序栁條邊望月望祀長白山松花江放船歌江中雨望經葉赫廢城鐵嶺雜咏卷三十七古今體詩四十首廵幸遼陽駐蹕遼陽夜深對月用唐太宗遼城望月詩原韻廣祐寺入千山祖樾寺龍泉寺行殿讀書示翰林侍講高士竒登澄海樓觀海端陽前一日囘宮機政偶暇輒畱意書法漫成夏日瀛臺許奏事諸臣網魚攜歸賜大學士杜立德并序賜大學士馮溥并序西山駐蹕夜聞秋聲玉泉山晚景用唐太宗秋日韻秋日紫光閣閱射九日幸景山登高大閱海東青曩因見鴈念征南將士曾題截句今禁旅凱旋聞鴈再作再遊盤山見案頭水仙花偶作二首黃金臺懷古自長城嶺至臺懷顯通寺殊像寺法相最異駐蹕靈鷲峰文殊寺天花登望海峰北臺眺望娑羅樹歌趙北口水淀雜詩四首南苑初夏玉泉山二首卷三十八古今體詩四十五首夏日奉太皇太后避暑興安石盤峪龍潭白水古北口曉發古北口望霧靈山第一泉次上都河青城道中九隘塞外對雨紅川駐蹕興安八首并序廵厯塞北雜咏四首楊川細河塞北早秋興安夜次楊嶺北過團河次石山尖峯山谷口作三道河晩望黃草川囘鑾抵古北口中秋日聞海上捷音是夜對月再成絶句賜施烺詩并序九日對菊秋日再過阜平再駐龍泉關冬日重登清凉山咏馬初冬自五臺囘次日雪盆中橘實甚繁咏此台灣平告祀孝陵有述卷三十九古今體詩四十二首玉河春水後苑漫興倣二王墨蹟紫光閣玉泉春曉夜玉蘭觀苖無意到潭柘詠時景櫻桃流杯亭晚眺有懷曉起再賦夏日水雲榭聞梵聲偶成瀛臺塞外省覽風俗再至紅川避暑紅川秋興曉發虚谷囘鑾至鰭鬛口秋雨初霽對月咏史四首仇英青緑畫東廵出都作晾鷹臺集䝉古諸部落慰勞遣之河間即古瀛州地景州觀開福寺塔次德州即事九河故道平原渡濟水廵幸東省黎庶擁馬瞻拜命訶警者弗禁得以察其疾苦趵突泉登濟南城望華不注登岱百丈崖觀瀑岱頂對月汶水吟䝉陰曉雪沂水渡黃河卷四十古今體詩三十四首途次網得鮮魚馳進兩宮兼志思慕之誠晚經淮陰平山堂天寧寺由儀眞乘巨艦至京口金山并序試中冷泉妙髙臺鐵甕城竹林禪院在潤州城南竹徑數里夜過丹陽途中覽皇太子倣書以示之錫山吳閶虎丘句容道上雨花臺幸報恩寺駐驆金陵以方物寄獻兩宫金陵舊紫禁城懷古江寧駐驆皇太子啓至請安兼報讀完四書示江南大小諸吏燕子磯夜泊髙郵湖見居民田廬多在水中因詢其故惻然念之閲河隄作泉林寺即子在川上處途中長至過闕里闕里古檜晚到河間太皇太后使人送乳餅食物廵幸囘宮内殿進講毛詩原任總督于成龍居官清廉自古罕有特命諸臣議䘏以勵官方薊城遇雪讀左氏春秋作
