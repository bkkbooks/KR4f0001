body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷十七勅諭諭户部定海總兵官吳郡願自備船隻親送浙江漕糧五萬石乘順風速達閩省以濟饑民實心効力有禆公務深可嘉尚著照所請速行康熈四十九年十月初九日諭兵部李雄久在登鎮各海岸海口險要情形早應詳察乃平日因循怠玩防範不嚴今賊船事發始借辭往沿海一路酌派巡防又身離汛地不先奏明及起程之後方行題報殊屬不合著嚴行申飭康熈四十九年十月十九日諭吏部田種玉効力舊臣年踰八十深可軫念其子候選州同田世元著以州同員缺即行補用康熈四十九年十月二十日諭吏部蘇達海等支給錢糧年月俱准通算此等人員皆經各旗保送朕親行揀選之人見在各缺著儘先補用以示鼓厲康熙四十九年十一月初六日諭吏部朕毎因朝列舊臣漸次衰謝時切軫懷特命内閣詢問順治年間進士所有罷職在籍者已無多人王士稹江臯周敏政葉矯然徐淑嘉宋慶逺皆以公事詿誤屏廢里居今年臻耄耋深可憫念著俱復還原職以示朕格外加㤙至意康熙四十九年十二月二十一日諭工部御壩西壩加長工程甚屬緊要俱如該督所請及時興工修築其應用錢糧著速估奏聞河圖留覽康熙四十九年十二月二十一日諭吏兵二部海洋盜劫與内地江湖盜案無異該管地方文武官能加意稽察盡力捜緝匪類自無所容豈可因海洋偶有失事遂禁絶商賈貿易王懿所奏無益下所司知之康熙五十年正月二十六日諭吏部凡解任官員應追賠銀兩地方承追官自應嚴催依限完結今因發回本旗本籍追賠遂欲將原叅承追官銷案是特希圖為承追官卸過之意如此必致互相推諉欠愈難完此例遵行已久不可更改著仍照定例行康熙五十年二月二十八日諭大學士温達等内閣翻通本事甚緊要如不得漢文意思或一二句言語翻錯於事之輕重大有關係内院侍讀學士侍讀官員俱係按俸補授之人所翻本章不甚妥當朕閱看清文多在内行走和蘇徐元夢雖係革職之員現今學翻漢文者無能過之將和蘇徐元夢補授内閣額外侍讀學士翻改本章康熙五十年三月初一日諭兵部朕扵水陸兵丁調用年久深悉其情事船出海洋必俟風候若不待時候不察風汛而强行之必致兵船損壞官兵係朕歴年養育之人遇賊自應効死如無賊而徒以巡哨受傷實屬可惜該總兵官湏於此留意大加謹慎至製砲不應令貧乏武官捐造著該撫即行捐資辦理康熈五十年三月初三日諭和碩顯親王顏璜等朕自幼讀書略觀經史持身務以誠敬為本治天下務以寛仁為尚雖徳之凉薄性之不敏而此心此念兢守五十年夙夜無間即纎悉細務不敢少有怠忽嘗觀古昔哲王君臨天下之久能持終者葢鮮朕前少年時血氣方壯常毅然有矯偏治敝之意兹春秋漸髙血氣漸耗胷中銳氣甚減而朝乾夕惕實與日加增今正當恪慎保終孜孜為萬姓圖治安之時也朕之御極年久皆祖宗厚德景福積累留貽之所致此請上尊號稱賀特虚文耳於朕躬毫無裨益史書所載慶雲靈芝天書萬壽節朝賀加上尊號等類徒為先儒所譏竝無善䖏有何所補而欲行之康熙五十年三月初三日諭和碩顯親王顔璜等朕於壽日停止朝賀已二十餘年兹諸王羣臣以今嵗當五十年昇平之㑹特請朕御殿行禮以惬中外官員士子及兵民人等仰望之心公疏奏陳詞意誠懇朕勉順羣情如所請行康熙五十年三月十一日諭兵部所議巡防事宜極其詳盡但此番捕獲洋盜皆係住居内地之人竝未盤踞島嶴其盡山花鳥山等處原無海港可以泊船今欲遣官兵鎮防巡哨一年一更換大洋之中徒勞兵力且恐致有傷損該地方文武官員惟嚴察内地奸民不致出洋盜劫則生民自然安輯著再加確議以聞康熙五十年三月二十二日諭户部這項無著錢糧俱係南巡時地方官公同動用伊等不敢申明以前任官員那用虧空之項著落後任官員賠補必致科派擾害百姓此處朕知之甚悉心殊不忍這項無著十萬八千有竒銀兩免其賠補以示朕軫念官民至意康熙五十年三月二十三日諭張鵬翮卿簡任司農清勤恪慎積獘剔除實心盡職大有裨益部務關係緊要料理需人雖卿父年踰八十聞精力尚健不必急請歸省康熙五十年三月二十八日諭大學士等朕綜理政事思以人命為重務必再三斟酌除真正死罪外其餘酌量寛宥看來偷盜人參為從者俱照例完結惟財主為首者今擬絞罪在牢者甚多此等人到秋審時亦宜赦之時值立夏漸漸炎熱監禁人犯汚穢氣味易扵染病致斃甚為可憐著交與刑部酌量減䓁議奏完結康熙五十年四月初二日諭大學士温達等此間大學士等將朕口傳㫖意令在京大學士齊集九卿詹事科道掌印未掌印官員通行曉諭伊等有可言之事在九卿前各親書奏聞朕自京偶爾違和至今扶掖未能行走又兼天時亢旱日夕憂慮寢食靡寕古來君臣之義最重必明良合徳方能上格天心感召和氣不在修飾虚名也今亢暘不雨君臣宜時相儆惕以萬民生計為憂其間念切國家不乏其人而玩泄性成者亦未必全無凡尔臣工理宜體朕孜孜憂民之念竭誠禱祝庶可望甘霖早沛耳康熈五十年五月初七日諭大學士温達等現在此處大學士等將朕手書諭㫖發往京城㑹集滿漢大學士九卿詹事掌印不掌印科道官詳晰傳諭伊等有應陳奏之事各自親書奏摺即當九卿前交明具奏朕自京師抱恙而出今行歩未健尚需人扶掖又兼天時亢旱蚤夜焦勞以致不安寢食自古君臣之義甚重必上下一德相成然後能感上天之心召致和氣不在徒飾虚文務空名以從事也今當此亢旱之際我君臣應協同心力夙夜靡寧以為萬民籌畫生計大抵諸臣内實心以國家為念者固自不少而秉性奸惡亦不可謂無人惟尔諸臣宜仰體朕懷日存憂惕為羣黎竭誠祈禱庶幾甘霖可冀倖早獲也特諭康熙五十年五月初八日諭大學士温達等此案正法人犯五十餘名人數甚多若在各省完結猶可今將許多人犯俱解京正法朕心殊屬不忍况從前廣東海賊案内三十餘人止將一二人正法其餘俱發往烏喇等處為水手當差鄭盡心等非大盜竝未與官兵抗拒不過廹於饑寒搶奪食物聞得鄭盡心等漢仗俱好出首鄭盡心之髙允泮能逺視五十餘里伊等俱係熟諳水性之人今將伊等從寛免死或歸併旗下或發往盛京烏喇等處為水手當差亦可此事前止三法司議奏今著問九卿詹事科道以聞康熙五十年五月二十二日諭大學士温達等張玉書耆舊老臣久任機務直亮清勤始終一節學問人品卓然不羣朕知之甚悉倚任方殷今忽病逝深切軫悼應得䘏典著察例具奏康熙五十年五月二十八日諭户部趙申喬奏稱滎澤縣被水衝地畝錢糧應行蠲免其凡係黃河水衝地畝俱著查明報部等語從來河流原無一定如河水遷流南岸則北岸地畝涸出河水遷流北㟁則南㟁地畝涸出地方官但知衝潰地畝錢糧奏請蠲免者甚多其衝後涸出地畝應徵錢糧之處竝無一人奏請今永定河水引入栁􅀢口故狠城等處地方涸出數千頃皆成膏腴有旗人耕種者亦有百姓耕種者昔年草屋數椽之人今俱蓋髙樓瓦舍居住矣地方官竝未將此涸出地畝查明奏聞也朕知之雖悉未肯深究趙申喬身為湖廣巡撫其長沙被江水衝決涸出之地亦曽查奏乎若如所請行則各省督撫地方官必至專以被衝地畝蠲免錢糧為事國家正賦勢必虧損朕在九卿前原欲面詢趙申喬此奏必係與鹿祐有隙藉之以辱鹿祐耳此事該部竝不詳確議覆即照趙申喬所請議行非特為趙申喬周旋顔面乎殊屬不合其請調武官之處似應杳明著再行確議具奏康熙五十年六月初十日諭刑部部議陳四一案甚謬據現獲陳四供稱四十四五兩年因本省不收無以度日於四十六年自山西帶領我一族并親屬婦女子姪一百三十餘口逃在陕西慶陽府居住二年四十八年前往河南從此流扵湖廣貴州地方等語顯係虚誑陜西等省自朕巡狩以來毎年俱係大有竝無一歳歉收督撫等題報豐稔之疏現在陳四等何事受饑百餘口人飄流乃爾耶若果係饑民妻子自應徒歩荷擔沿途乞食到田畝膏腴處所即當存住耕種養贍妻子度日因何又騎馬跨騾手執刀鎗周流各省且若此百什成羣越界逺行而該督撫竝不奏聞地方官反給衣服盤費糧米等物由是觀之未必非因平日不能鼔動百姓之心故轉相煽誘資給以便乘機生事為亂也且如許人衆飄流數載毎日口糧若干喂馬草料若干俱從何處得來尚謂之流民可乎大學士李光地任直隸巡撫時深忿寧津縣百姓流離地方官不行揭報題叅處分始行禁止前偽朱三太子人知之者多曽有巨室交接至家供其酒食延之讀書朕無不知也此案部議將陳四等妻子各發回原籍安置伊等離家多年發回無産業度日更撥何處地畝與之耕種乎此䖏並不加詳審即援今年四月釋放監禁罪人之例混議非特廢事豈明知之而欲聼其作􅅍耶齊世武等罔念恩遇將事推諉自圖安逸似此草率議覆不顧顔面鄙陋極矣今刑部事件廢弛皆由齊世武卞永譽部院堂官俱朕親自擢用理應感念主德實心盡職報効今以朕為年老何能頓忘朕㤙將事盡行廢弛致朕忿而誅戮悔無及矣康熙五十年七月二十二日諭吏刑二部督撫提鎮等平時不能撫恤百姓訓練兵丁及有事又不能相機速行剿撫縱容賊盜滋蔓騷擾地方肆行搶奪且遲延日久不將其事奏聞乃稱百姓不廢耕織照常安業夫强盜竊盜多至三四十人百姓尚畏懼逃避况數千民人為盜搶奪豈得謂百姓不廢耕織安居樂業乎此係赫壽等掩飾已過希圖卸罪巧行誣奏甚明著該部嚴察議奏康熙五十年八月初九日諭刑部朕聼政多年惟孜孜期乂安萬姓故凡發政施令務以真誠為尚儻矜憫犯法之人博取虚名夏則遇熱而審冬則遇寒而審不時遣官恤刑督撫審擬案件復屢屬堂司官分行駁改則貽累於兵民官驛糜費於迎送餽遺互訐多端不知作何底止督撫之專責首在敦厚風俗導民於善不時訓飭有司簡清詞訟速結案件不因細事多繫妻子無􅇳以致蕩析家資逃匿他省即為良吏雖不熱審亦無所關使不清本原不愛黎庶徒以熱審為言則各省有定限竝非至熱時訊理俱先時審結是有熱審之名而無其實益滋煩擾矣梁世勲不諳事體輕重草率冐昧妄行具題殊屬不合理應從重治罪但係無知陳奏著從寛免治罪康熙五十年八月十三日諭兵部朕前次巡幸南省藍理陛辭回任之時曽奏稱福建水師提督有呉英陸路提督有臣料理地方可保寧謐儻猶有盜賊之事臣無面目再覲天顔求主上寛懐䓁語今盜賊竊發不能即行剿撫縱容延蔓迄今尚未盡獲且藍理居官不端殊為溺職著革職從寛免交刑部范時崇黃秉中俱從寛免革職著各降五級戴罪効力許鳳陳有功俱從寛免革職著各降五級戴罪圖功盜賊務期盡行拿獲如不能盡行拿獲再加議罪康熙五十年九月初八日聖祖仁皇帝御製文第三集巻十七
