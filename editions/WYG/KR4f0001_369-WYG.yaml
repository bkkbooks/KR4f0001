body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻三十四古今體詩三十五首舟中觀耕種四野春耕阡陌安徐牽宻纜望河干土肥原係黄沙過永定河泛濫之際遍地黄水自治河之後得以耕種辛苦先年挽異瀾春歸勿訝春歸速還因冷覺遲煙寒榆莢落雨逐栁黄移惜景勤經學怡情喜恊時恵風雖曰盡長飬已相隨南方青竹叢林不乏觀玩北地氣寒非保䕶得宜即難藝植朕嘗有事河干往來數次覽竹樹之暢茂暫時停輦即行後於禁苑種植頗蕃今經三十餘年邇來延至數畆之廣其圍至八寸徑二寸五分有零古人以竹比君子因而思及草木無知積小以至於髙大人有血氣加之培飬豈非國家楨幹之選歟故賦七言一律記之培養叢篁多歴年竹牕抱莭緑雲鮮猗猗玉潤歌君子濟濟心虛憶俊賢可愛繽紛含宿雨最宜瀟灑動新烟餘春欲伴寒松住漸晚韶光被景牽五十四年仲夏避暑途中瑞麥盈野賦五言律以記忽送清塵雨題詩吮兎毫青黄接玉粒霡霂佐瓊膏入野農歌遍縁溪牧笛髙蔚林能解愠宻草滿亭臯毎見村農野老不識不知天然自得孝弟發於至性樸誠不事文辭故羙其實而取先進之意賦七言一律晝夜徬徨利禄間奚如鄙里野人閒詩書不解窮通事名姓無聞士宦班孔顔樂處簞瓢在孝弟真情稚子闗可笑文章少實據空將浮偽玷青綸擎盖荷珠調寄鷓鴣天數畆芳塘花未開荷珠清露落莓苔雨凉翡翠摇歌扇風㺯蜻蜓逐水隈乳燕舞曉鶯來炎天還似未春回葛衣日暮絲絲冷丹檻泉聲處處催雨後戱題回文詩雲收曉景霽烟開曲檻香凝露染苔分徑花光清氣􅐩紛紛雨思綺文裁佛手柑生緑熟黄却有因清香閩嶠共呈珍似開貝葉瞿曇手妙合華隂仙掌垠異物不須傳驛路竒芬欣得近楓宸畫圖尺素分枝幹相對無煩憶海濵賦得江城五月落梅花梅花一調楚江干吹徹瀟湘五月寒地北天南無謫叟不教覉思入毫端芝徑雲隄細雨歸舟長隄一線入芝逕小艇乗凉隔㟁移水向方橋瀠細浪風吹菡萏倒垂枝秋成已慶年豐兆暑盡無憂雲漢詩遺事陳𤓰為七夕偶因佳莭賦清辭題蘭君子之道闇然日章蕙蘭之質有風則香草木培植格物知詳飛潜動静各有攸藏秉精天地青紫芬芳産自松島移根草堂詠剪秋羅可惜輕羅任剪裁名傳南國向秋開未知紫塞多佳種雜置嫣紅配緑苔餞大學士李光地暫回閩省恊恭惟得老成儒味道經書翊廟謨白髪辭君千里去丹心捧日寸誠敷秋霜昔嵗明臣莭崑玉冲襟决勝符暫别恩榮宸翰餞勿勞逺念慰長途秋幸出郊見收成志喜莭屆啇秋早農忙屢嵗豐柴門歌再稔比屋樂同風人煙多慶色霜樹雜微紅極目髙低景山川一望中其二滌暑髙風至中分白露微草肥宜牧馬林薄好行圍水向堦前注峰排雲外稀斜陽臨帳殿晚色秘天機賦得帳殿鬱崔嵬茂林葉未黄賓鴈始成行後隊分山出前旌越嶺揚鹿鳴秋草盛人喜菊花香日暮帷宫近風髙暑氣藏其二清露知時轉纎雲却暑回豫逰臨石磴雜踏過河隈潭静魚吹沫林踈鹿印苔秋成良可賦為此共徘徊康熈五十四年十月初三日避暑山莊恭祝皇太后萬夀詩幷序伏以坤厚直方徳配含𢎞以光大母儀康健慶來積善之安貞靈芝仙草咸歡比日之休雪藕氷桃好祝如山之夀同雲未結花雨長存肅肅蓮華熒熒貝葉䖍寫金經取剛柔之不壊恭呈鄙語願福祉之無疆萬嵗千秋乃文章之故套耄年遐筭實世間之瑞人臣捧霞觴恭祝百嵗不揣無文敬賦長律誕值小春暖承顔愛日長農閒歌樂土臣喜拜山堂孟月祈年莭芳巵獻夀觴南峰留翠盖北斗燦珠行愉色常猶怯怡聲乆未忘歡心依白髮福曜現青方至飬慈闈慶遐齡母徳昌虚文豈作頌人瑞紀篇章冬日可愛秋斂冬藏暗發生循環潜應有餘情扶陽布序君人志愛日書雲宇宙明長至免行丹陛禮融風不設玉厨羹化醇意切慚凉徳漸喜春和萬物榮冬夜偶成隆冬何必辟寒犀惟有蒼顔性不迷玉律廻環新故接釭花夜永巻中題其二安危最係在君心待旦殷勤化理尋鶴髪多愁猶警惕長思時弊若臨深餞閩撫陳璸留犢從來漢史傳建牙分閫賴官賢寛嚴馭吏須交勉教飬宜民務使全嶺海屏藩消蜃氣闗山保障息烽烟迎年莭近新春至援筆楓宸餞别篇季冬湯泉素雪滿川山未露霜林盈野日將斜祈年正喜逢長至澡徳非同玩物華秉燭檢書冬夕永爇香待旦畫屏遮靈泉毎助消寒效總為純陽辨正邪五十四年除夕偶成待曙迎新莭辭寒憶舊時風光忽瞬息嵗月急星馳少小勞宵旰中年按古規精力雖云􅉵𠂻腸堅不移康熈五十五年正月元旦書懐乍回斗柄又芳晨端月元陽萬象新竹葉向風消積雪梅花除臘報初春彤庭啟莭迎祥始邃閣興文起草頻毎繹晦翁真樂處早知天意即生民上元前三日立春臘寒猶接上元燈牕外参差六出凝媚景新春催玉律恵風活水破蛟氷殷勤祈榖寜辭瘁勉强雕蟲愧未能九陌人烟多喜色千門比户望年登五十五年正月十二癸夘立春是日風從東北而至景雲宻布瑞雪鋪地至十三日未止書云立春與元日同占乃收成之兆故喜民有足食之慶朕慰宵旰之憂賦五言排律以記其事問夜何嘗歇殷勤六十年嵗華催短鬢寸晷惜擔肩豐歉無推數平成在事先人安為國瑞榖熟是民天慚撫陶甄治思將法令蠲雲濃春氣早風静漏聲傳南陌銀花徧東郊繡壤連管絃喧里巷燈火接山川不為私情擾寜躭寶饌延祗期民俗厚敢詡治功全禮讓傳家教詩書戒往愆翠烟籠􅅵畆泛泛潤桑田春寒梅遲化工莭候遞推移長飬生生雨露垂雪冷梅驚頻吐蕚春遲栁怯未颺絲陽禽北向還應早林雀羣争若有知和氣停雲今夕晚走橋明月賦新詞湯泉道上遇雪口占種麥田間盼尺盈牧羊沙漠惡飄霙王臣率土分憂樂莫道天公有不平春風扇微和雪消山露背泉暖日暄波蕩滌甘言疾澄清無妄疴其二淑氣來春甸和風慰愍農東郊滋土潤雲盡顯諸峰題朱倫瀚手指畫雪梅竹指端寫出犯寒梅老幹单枝雪裏培疑是江南春色晩紅芳遍野㸃青苔又雪覆石林竹時催臘盡梅閒雲飄逺岫長對翠屏開兩廣總督趙宏燦陛見來京鎮撫封疆多歴年滇黔百粤凱歸韉當時馬革抒誠切近日龍光錫慶綿萬里宣風梅嶺表三台擁莭桂江邉優隆主眷酬耆舊芸閣宸章賜綺筵賦得二月春風似剪刀春居别墅少人喧煦育深知造化恩雪净梅花舒緑蕚霜輕栁帶拂朱垣和風宇宙嚴寒解暖日亭臯物色繁無欲自然得静理丹顔已過白鬚存聖祖仁皇帝御製文第四集巻三十四
