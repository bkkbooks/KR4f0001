body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十九古今體詩四十二首玉河春水春回凍解玉河清㶑灩晴光繞鳳城翠嶺雪消新漲闊緑楊風動曉波平派分星海千重逺色映銀潢萬里明欲挽朝宗無限水徧流膏澤慰蒼生後苑漫興佳氣青蔥繞苑牆紅泉紫岫勝雲莊雕䦨細草經春滿綺閣繁花入午香雨露生成隨品類鳶魚飛躍自低昻閒亭久坐渾無事靜對琴書覺意長倣二王墨蹟春暮芳菲滿禁林鸞箋暇展學来禽銀鈎運處須師古象管揮時在正心案上露凝銅雀潤簾前花照墨池深却思𨽻篆原羲畫精理圖疇細討尋紫光閣政閒多豫日别館偶留連草緑含春氣花紅帶曉煙鳴禽聽繞樹新水看浮船物理何曾息從容憶撫弦玉泉春曉郊墅初晴後芳春曙色旋孤鸞堆畫障細穴吐新泉浪靜鮮鱗躍風恬紫菂姸怡情看萬象浩浩思無邊夜良夜觀圖史渾㤀刻漏深月流金殿影花轉玉階隂追琢崇民則居稽長道心緬懷皇古治四海遍謳吟玉蘭瓊姿本自江南種移向春光上苑栽試比羣芳真皎潔氷心一片曉風開觀苖無意到潭柘詠時景晝永薰風至清泉決決長芳年添景色遲日換流光舊竹隨堤發新花滿澗香觀苗不覺晩㣲雨㸃衣裳櫻桃禁籞朱櫻曉露匀不須驛騎拂紅塵芙蓉未賜千官㑹寢廟春殘早薦新流杯亭晩眺有懷霽宇開初夏臨池晩景鮮流觴觀宇宙列籍念桑田飛絮縁牕起閒花傍檻姸讀書新月下講道勉堯篇曉起再賦勝地堪修褉斯亭乃得名頗饒松竹􅃐無待管絃聲一水􅇽天象三陽暢物情政餘耽靜賞吟罷聽流鶯夏日水雲榭聞梵聲水榭周遮積翠苔薰風拂處午雲開忽聽梵誦驚殘夢疑是金繩覺路来偶成石岸衆芳靜斜陽栁色邊揮毫意獨逺魚躍在深淵瀛臺嵗序開炎節離宫繞翠微蓮香聞講席栁色映􅂷衣物阜風光好時清奏牘稀罷朝鵷鷺散花下珮聲歸塞外省覽風俗莫道巖闗險要荒總一家戍樓無鼓角戰壘是桑麻野靜知民樂時清見物華林中歸徑晩旌斾滿煙霞再至紅川避暑塞外留鑾蹕長林帳殿幽乍看南火厯已動北山秋露冷輕葵箑花寒御綺裘重来欣勝賞斯地即丹邱紅川秋興俛視八方盡髙天峻嶺分秋風起孤韻日色下溪雲曉發虚谷帷宫雨後納新凉虚谷風来百草香萬里晴雲任舒巻憑髙但見碧天長回鑾至鰭鬛口秋雨初霽對月纎月髙林動輝輝古塞長氷輪初濯露桂影欲飄香烏鵲聲頻起闗河色共凉旌門吟眺逺萬國自清光咏史四首鴻鈞運元氣萬彚無私恩上徳貴醇悶容覆如乾坤熙熙康衢老作息循晨昏耕鑿食其力安知帝徳尊在宥物自理巧歷難為言下覽商周際頌聲亦已繁其二三田嵗畢舉用以薦明禋聖王戒暴殄郊藪遊麒麟虞羅張復解原野氣已春六合豈不廣一靣何逡巡亳都百里間曠如天地仁寛政逮毛羽况乃蚩蚩民其三軒皇訪后牧相道光璿樞精誠契㝠漠在古豈有誣巍巍興王佐竟與夢寐符天意靖殷邦豈為榮一夫緬彼耕莘叟後有版築徒試觀説命篇典則追三謨其四尚父抱竒略壯齡運不偶一竿清渭濵經綸在其手志欲網九州吞舟非所取卜兆示先㡬龍彲載車後白旄師既陳青社符還剖偉哉八百基肇自一釣叟仇英青緑畫流鶯百囀起煙槐細雨油雲㸃翠苔松竹青青山色靜遊人倚杖尚徘徊東巡出都作閶闔来天風玉仗排雙鳳喬嶽聳髙標巡方翠華動晾鷹臺集蒙古諸部落慰勞遣之秋盡髙原霽景清逺人馬首頌巡行九經自重懷柔意欲使遐陬識治平河間即古瀛州地新霜来朔氣納稼滿西疇省歛因農暇觀風廓逺猷箕躔分冀野輿地古瀛州駐轡郊坰外斜陽下堞樓景州觀開福寺塔湧塔髙凌漢穹隆拱法筵虚鈴含逺籟宻宇繞寒煙不問三車法空勞七寶懸偶過成小憇漫比布金田次徳州即事近郭人煙集遥天月上初新寒添夜漏不寐坐看書九河故道野樹迷深岸荒荆露淺沙還思乘四載豈效泛浮槎平原冬晴栁葉未落潦盡寒潭初清龍鑣千騎萬騎雁隊一聲兩聲渡濟水曉渡更臨濟水野風時捲霓旌㡬曲寒流蕩漾十月輿梁始成巡幸東省黎庶擁馬瞻拜命訶警者弗禁得以察其疾苦東来端為重民生不事汾隂泰畤名井里儼存齊國俗田疇還憶厯山耕暫寛羽騎鈎陳衛一任村童野老迎敢道邇言勤訪察止期治理得輿情趵突泉十畞風潭曲亭間駐羽旂鳴濤飄素練迸水濺珠璣汲杓旋烹鼎侵階暗濕衣似從銀漢落噴作瀑泉飛登濟南城望華不注百雉城臨濟水隈雲山環拱接青莱更看瘦削孤峰色獨立亭亭秀作堆登岱巖巖岱嶽髙無極攀陟遥登最上頭路轉天門青靄合峰迴日觀白雲浮振衣嶻􅑖凌千仞騁目蒼茫辨九州欲與臣鄰崇實政金泥玉檢不須留百丈崖觀瀑懸崖千尺響奔湍澗道嶒峵動石瀾仿彿清天有風雨松陰漠漠逼人寒岱頂對月夜宿喬岳顛縹緲近雲闕孤髙絶塵翳天外見明月不聞城市喧惟聽空籟發開軒肆遐覽萬象爭突兀對此心悠然清夢自超越汶水吟汶水潺潺清似玉石澗縈紆行躑躅連山百里入莱蕪松栢綿蒙冬尚緑蒙陰曉雪一片寒雲向曉封雪花應候慰三農馬蹄碎踏瓊瑶路隔斷蒙山頂上峰沂水板橋緹騎度沙岸野舟移想像二三子浴沂春暮時渡黄河河流九曲迅飛鴻千里能施潤澤功疏鑿逺懷神禹蹟乘虚快覩滿帆風聖祖仁皇帝御製文集巻三十九
