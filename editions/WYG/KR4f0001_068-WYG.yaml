body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十二目録古今體詩三十九首駐蹕南苑遣使恭進太皇太后鮮果南苑元靈宮是世祖皇考建南苑行圍徳壽寺南苑晩景瀛臺偶作咏水禽雨臨城望夏日有懷内苑立秋前一日晚同左右閒坐進鮮果秋蘭幷序初秋幸西苑觀荷命小舟採蓮臨池觀魚有懷夜至三鼓坐待議政大臣奏事有感而作七夕沙河途中作清河荒亭初秋景山題日精門古硯待曉賜奉命大將軍傑淑二首秋日咏刀海子北紅門秋雨後行圍戲作晾鷹臺南苑閲馬中秋望月賜輔國將軍俄啓詩幷序秋日晩景有懷大將軍報吳逆暴死其下賊衆潰㪚無餘大兵指日進取恢復封疆康熙十七年九月初十日奉太皇太后臨御温泉恭紀五言排律八韻駐蹕平家灘潞河曉起至太皇太后行殿問安見雁南飛駐蹕薊州城南逺眺山村山中獲野禽恭進太皇太后曉起山路口號
