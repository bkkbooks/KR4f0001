body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻二十五雜著七詢體元主人膺期運撫寰海紀星次者垂七十年臨雲陛者周六十載常以薫風應律梅雨戒塗駐蹕興州之域棲神無暑之區追疇昔感居諸意怫鬱乎其不舒也自冲嵗承基弱齡親政敬天明威察民視聼夙寤晨興慮慚前聖更歴多艱無忘執競有若三藩叛命尾大必芟氛連海嶠烽起西南選熊虎鉏豺豻驅以雷掃以電神弧彎而天狼落枉矢飛而妖鳥􅄆覩六幕之塵清費八年之廟算黄淮并溢決㟁潰茭波漂百室道阻千艘翠華頻省橇周遭然後息桃花之怒浪平竹箭之驚濤人歸廬井帆接亭臯安知候之寒暑而躬之焦勞也西戎跳踉窺我藩籞張皇王師陵厲禁旅再嵗三征雲屯飇舉越瀚海度磧鹵忘渴飢均甘苦夫乃馘冒頓服侯㹪紫鷰徐入朱鷺凱還雖守成而述事等締造之囏難也至於戸口繁滋禆瀛表裏地震天灾習聞前史豈有遐遺痌瘝在已晝膳弗甘宵眠屢起恩不踰晷澤必下行牂羊靡歎鴻鴈輟鳴民咸安其居而後釋然於中情也躬不遑息心不自逸於兹五紀常如一日内則畏天閔人勤身恤物外則沐雨櫛風衝霜犯雪擾靈府損精和榮衛結轖神氣消磨年芳冉冉星髮皤皤勞稍渉而輙倦歩方跬而慮蹉思毎短於再審事旋忘於既過來日不可期去日已苦多矢乾乾以時行恐菁華之莫繼彼曦輪之既中異東隅之初麗將息意而燕游凛鴻業之攸繫誡一簣之功虧寜始勤而終替疲形竭智永思長吟歴年乆而慮愈逺閱事多而憂彌深兾家給而人足財未阜於虞琴語風移與俗易化未致夫儀禽慕視履之元吉知上佑之難諶其何以寛無窮之煩念發垂老之歡心於是左右侍臣文武有位二氏緇黄九流方伎奔走輦下負曝獻暄願言舒志錫福元元主人乃博采不遺從容顧問俾無忌諱各攄厥藴近侍之臣進曰竊聞帝王之為樂也祕苑閒宫逰宴有所班輸是營千門萬戸閣通往來樓迷去住亭名臨月臺稱黏雨黄金作屋玳瑁為梁文榱繡栱漆瓦雕牆間以沉檀飾以璿璫曉日照而後庭流影微風起而數里聞香則有夏宫妹喜殷室有蘇異扇摇其丹鵲嬖人獻於赤烏龍漦褒艶驪戎晉姝修明辭越夷光貢吴戚姬偏寵邢尹並都協律女弟謳者子夫帳中妝若月之蛤枕前分不夜之珠機絶巧工鍼神善製蟬飛薄鬢星熒髙髻思香競媚㸃膏逾麗羊車戀竹葉之扉馬射簇芙蓉之騎舍利穆婢小憐馮家蓮上玉兒桂邉麗華長蛾賜果憨女司花太真之鮮葩觧語窅孃之新月乍斜莫不秀發穠姿横生逸態顧影有䨇當時無對别有班姑偼伃左妹修儀蘭英獻賦上官評詩采蘋樂府花蘂宫詞咸摛華以待詔或稱羙於占辭爾其熊毛席緑象牙簟白時窺綺牕遥暎紅壁鈿綴金蟲釧裁琥珀袍飛瓊以流翠衰纎綃而染碧時則蘭苕纔露梧樹未霜紛瑶臺之窈窕度釦砌以徜徉喜方隅之晏清感莭序之廻換貴人生之行樂及良時而酣醼爰有龍膏始釀馬乳初來翠濤百榼紫霞千杯麒䏖麕髓猩脣豹胎雲鶬澤鵠淵鱗江鰓錯窮四海珍貢九垓蓐收動桂勾芒調梅於是衆伎俱陳八音齊舉笙鳴鳳翼筝移鴈柱鄷琅折栁之笛朋肯催花之鼓篳篥則桃皮含商琵琶則檀槽促羽雜沓繁㑹激揚清謳新翻水調唱徹凉州韻細而脣朱微粲聲凄而眉黛暗愁隨紅牙之緩緩協赤玉之悠悠彩雲仙隊素霓舞列長袖吸華輕裾廻雪釵潛摇以逐歩珮徐鏘而應莭翩鸞影以遥瞻希龍顔之豫悅及乎銀釭既爛銅漏猶遲惜餘歡之晼晩顧綵筆之葳蕤授簡尚宫歌以繫之歌曰拂巾接槃曲既揚妖姬素面華月光上為衾幬衛風霜下為履綦願同行日車永永駐扶桑千秋萬嵗樂未央若此乎徴新聲選麗色蕩樂娯心不知所極今主人乃欽欽翼翼勤而不息富有萬國而寸隂是惜泊然無以為歡臞然類於山澤盍釋萬務擷衆芳暫取以為消憂之術怡神之方乎主人曰昔嘗覽乎沫水故墟驪山荒殿姑蘇之臺瓊花之觀金粉埃塵喟焉長歎階厲召旤敗徳累名宜鑑傾城之轍母招伐性之兵年之少也不留聰明今垂七十矣寜復溺志於色聲文學之臣進曰清明在躬聲色不邇惟聖右文請陳皇始龍馬示象庖犧作圖繫辭贊翼三古同符邵演希夷程刋輔嗣朱集厥成推本占筮事濟民用理洩天秘百篇嬴燼及漢稍傳濟南則属讀詰屈闕里則科斗聫蜷照乘猶遺連城斯得執簡皆聖人之徒嘉言實王者之式齊韓暨魯各以詩名毛受子夏鄭繼其聲序由衛宏䟽縁劉焯自西晉以孤行至南宋而啟鑰春秋五家鄒夾無聞公榖口說左據舊文洛閩未遑張胡齊轡莫叅筆削之功誰炳衮鉞之義郁郁周禮制自元公書成定鼎官補考工儀禮為經禮記為傳河間之逸者已多小戴之存者未半至若史家之體祖於典謨編年記事左氏遺模遷承談基固纂彪業振古流芳將來取法范刪衆籍陳紀三方漢之仲季何其煒煌晉書天文淳風妙解沈約詞人宋志博采伯起撰魏子顯著齊自兹厥後僅而有稽梁陳齊周志皆無述隋書效宋五朝咸悉索頭島夷交相詆誣延夀後出南北部區唐書新修歐宋分庀視劉之舊最得統紀五季自鄶蕪而弗理卓哉廬陵庶追腐史司馬通鑑甲子是編搜積巻於秘閣陳炯戒於講筵猗綱目之大義揭羲娥以髙懸均左右史之舊職續書春秋之薪傳若乃南薫作歌晨露流詠池上答白雲之謡沛鄉起大風之興憂民魚而瓠子功成喜天馬而流沙道夐帝京十首雄氣無儔東堂三傑睿藻偏優太和之古調清峻大中之曲宴唱酬莫不包含黼黻敲戞琳璆溯敕幾之命意同巻阿以來㳺至於穗啟神農鸞徴少昊禹碑甚竒湯鼎為寳周穆紀日漢章名草宋文規模於子敬齊髙吐納夫僧䖍孝建之翰墨馳譽永明之筆力象賢梁帝觀鍾繇之意陳主品嗣真之篇逮夫貞觀妙入羲域瞻屏風而歎草書登御牀而取飛白睿宗則五雲紛飄明皇則八分英特是皆鴻鶱鶴舞虎卧龍跳寄閒情於緗素絢殊采於珠韜今主人躬上聖勤下學體太極超先覺折中四府等量百王乙夜未嘗停於覽酉山無所秘其藏爰申石渠之論載廣虎觀之議考代葉之隆汙較簡冊之同異固理熟而神融非玩物而䘮志也聖又多能道兼衆藝體工六文詞髙五際逢風景之清暢矚川岫之澄幽拂宣毫之圓健試剡藤之剛柔月露吟而意逺烟雲落而勢遒韻金聲而玉振象日字與奎鉤豈不興酣情逸俾彌性而優㳺乎主人曰經觀大義母為華葉史貴徴信匪誇渉獵入聖之階梯具在臨人之鑑戒斯憑允平生之所好慮垂耄之弗勝未免披吟亦事楮墨不争文士之長寜詡書家之則聊抒寫於一時何余情之可釋介胄之臣進曰文以飾治武乃申威雕蟲之技壯夫不為請論我國家軍容之赫赫戰功之巍巍也風后握竒力牧為將蛇鳥連營貔貅列仗殳執星廬戈環玉帳扛鼎誇雄翹闗示壯甲胄則飾貝齒綴朱綅精皆浴鐡麗悉縲金百疊之蛇鱗䕶臂重鐶之鮫鎧當心劒㦸則蘭葉凝霜蓮花舞雪龍訝津騰鯢驚水截雍狐之鍔千攢湛盧之鋒萬列弩矢則燕山之角朔漠之蓬削夏箭規唐弓鯨牙耀日鶉尾迎風羽横空而蝟黒鏑捲地而塵紅若乃驥産烏孫駒來赤水坰滿丹髦谷量緑耳六印聨珠三花散綺駕茲白於輈轅豢乗黄如鹿麂貢道通戎政理芻牧攸宜蕃庻莫紀爰分錦埒並鞚金覊珊瑚之鞭霞舉玫瑰之轡星馳左御周輿右陳殷輅樊纓則五色紛垂闟㦸則重牙畢駐於時塞樹初丹沙茅盡白彤雲籠帳殿之髙素月吐邉墻之隙八校清塗九斿照陌斾獵獵而穿林馬蕭蕭而度磧萬騎宻布兩翼斜張火明迥野角轉遥岡陣合而潮聲乍捲圍圓而虹影何長車邉獒猛縧畔鷹蒼脛隨草偃𤓰挾風颺毛飄飄其漸下足趯趯而全僵於是武士奏能烝徒雄發或拉豹以摧斑或拳貒而磔骨哂狼顧之尾疐喜熊挣而掌滑飲鏃而蒼鹿羣呼投罟而銀麞早蹶至若芳洲日霽春渚冰消狩南畿之廣澱按五花於輕橈舟聨鵞鸛之形浪蹙翼箕之勢弋必待飛繳無及細習水戰之神機授澤虞之莭制家秘珠玉之鈐士擁戈矛之銳既令一而力齊亦恩深而忠勵且我皇朝拓宇紘極來同羅地天之上下包日月之西東絶漠在藩籬之内荒服盡庭廡之中蠢兹孽醜恃其遐逖蛙謂井寛螳張臂力我軍乃經無皁歴不毛水名寒暑山號鏖鏊瘴烟晝宻訛火夜燒然而勇思敵愾義奮同袍度危輕於飛鳥攀險㨗於懸猱歡聲動油幕和氣逐星旄刀刺而甘泉涌旗展而毒氛消驚從天而忽下紛穴地以潛逃俯瑶池之浩蕩陟普陀之岧嶤渡金沙而㧞幟定三危以鳴鐃是則域絶梯航名遺圗史昔阻殊方今為同軌六師告㨗萬方送喜功髙涿野化嫓虞階扈征不逮殷武莫儕寜不足以鳴億代之愷樂釋一人之憂懐乎主人曰天有雷霆功同風雨聖作弧矢道濟干羽安不忘危訓兹貔虎率由周禮嵗有蒐苗搏犀兕以作氣冒風雪以習勞羽林兮親率琱弓兮手操垂老兮不懈匪樂此兮逰遨感唐宗之殪豕猶技癢而自豪何雄心之欲逞而英武之難韜八荒在闥七徳有征不得已而後用計萬全而謀成雖屢聞於露布長戚然其靡寜固不恃太平而弛偹亦非矜逺畧而佳兵釋氏之流進曰佛道崇虚不以威力常生歡喜之心必在清浄之域粤自日升法界雲散梵天古來證聖今刼當賢善慧夙願羅衛因縁夢占白象胎置金蓮徒衆則䧏生百億光明則遍燭大千發念四門凝神十地脫屣王城披緇林際安歩而青雀環飛跏趺而火龍戢勢當明星之出時應執月而度世其為道也戒行為本禪那為趨精進何勇忍辱如愚惟一真之自在忘色相之有無懸靈臺之澄鏡出濁水之明珠誕先登於慧岸乃永超乎迷塗離欲塵而皓潔變苦海為懽愉其為教也大拯羣生普濟萬有三乗可階六度是牖雷鼓揚聲霜鐘虚受灑甘露以息心聞妙音而稽首意樹生夫善果情田薅其害莠照暗室以芳苡擢汙池之瑞藕禆王化之淳和躋黎元於老夀爾其騰輝周室皎像漢庭蘇由識兆傅毅通靈天竺冩範石室緘經法顯於邁遍覺遐征訪鷄足之故跡啟鹿苑之舊扃竹簡誌其周歴松枝感其專誠則貝文自兹盛出金字於焉流行矣又有伊存初授迦羅始輯趙地宗澄秦都禮什宣譯大藏淵思秘笈䟦陁栖蹤於少林難提摹影於洛邑此則法雨之東被而禪風之西入也然乃律論雖著心印未承達磨逺屆爰示真乗珈棃轉付機契斯慿北宗神秀南𣲖慧能花開五葉燄發千燈是皆黙悟妙圎深通聖諦受如來之法眼嗣大士之苗裔夫其超九刼而授記繼六佛而仰瞻現白毫之功徳顯紫色之莊嚴天上天下其尊無對世出世間此道為貴是以帝釋皈依人王崇事元魏則一萬三千所江左亦四百八十寺莫不塔規雀離宇肖鷲峰花林藹藹蘭若叢叢須彌巍殿兠率净宫盤承團露鐸和髙風六牙殊狀九級神功升堂則月容霄表躡梯則人語天中亦有翦綵刻檀雕銀鏤玉香刹之金翠二丈幡幢之珍寳百斛龍鱗敷席鳳毛隠褥薦瓊膏而乳融焚瑶髓而烟馥現路衢之慶雲耀坊市之華燭洵佛事其煥儼轉法輪於大覺熙萬年之鴻祚頌五位之茀禄今主人無量夀相種大福因修成億刼𢎞濟兆民隨喜法喜能仁當仁邁應聲之前迹猗感運而䧏神願闡真如之教永綏極樂之身主人曰釋氏之道湛然虚净脫離六根明心見性無惡無善豈達性命義之不存又安能敬順動静以循環匪偏枯於寂定包理數其紛羅何談空而作聖雖了徹乎三生亦奚禆於國政既塵芥夫山河寜存心於萬姓捨身同泰迎骨鳳翔垂鑒前史曷云其臧敬而逺之聖言孔彰道家之流進曰釋開覺路老合儒宗直窺元奥大啟仙蹤原夫有物混成㝠㝠窈窈先天地生字之曰道隂陽互根坎離相抱本氣祖於太虚藴谷神之至寳綘宫爣烺玉房逶迤木公金母姹女嬰兒龍虎森列昴畢交馳神資澡雪妙合希夷維導引法為飬生主樞動不蠧水流曷腐摇天柱擊天鼓熊經鷮息猿攀鳥舞戯五禽而榮昌祛三蟲而輕舉六齋清净十戒精嚴元闗自扃尺宅長緘澄空鏡皎活水波恬戕身之斧㒺觸爽口之味奚沾心欲葆真鼻先視白息由意調氣縁思積抱一兮探珠守中兮拱璧存想而槖籥開内照而津梁闢爾乃納新吐故吞景含光絪緼太始呼吸元陽丹田鬱鬱炁海泱泱紫霧騰於上谷黄芽茁於中央迺有華池旁流璇露寳液瀠洄瓊漿布濩六府潛䟽百骸畢注汲醴井而難枯灌靈根而永固若乃九三列鼎六一和沙烟浮金竈乳吐瑶葩刀圭散雪鉛汞蒸霞充糧而煑白石擲米而成丹砂别有氷園之𤓰玉文之棗瀹术同調茹芝共𢷬籛鏗啜桂以緜齡務光哺薤而夀考偓佺食松而飛行南岳采苓而助姣王興換骨於菖蒲鳳綱咀華於卉草餌八石而方瞳服一丸而紫腦所以至人稟二氣運三真按七候具五因保戊已守庚申朝噏鬱儀夕采結璘内則九還毓性外則寸匕回春煉形為氣化氣成神烈焰莫灼弱水難淪金玉其色日月為身緑毛不槁赬頰長新則有赤松雨師崆峒親訪作歌黄竹授書河上笙吹緱嶺䄂挹浮邱竇令乗龍而上下琴髙控鯉以遨遊時而矯舉層霄遥征瀛海眺員嶠之崚嶒憇方壺之爽塏九色之鴻蹁蹮三素之雲靉靆霓旌荏苒以排烟螭衣陸離而絢彩芝童導舞桂女擎觴雉羹箸膩麟脯盤香鶴奏延年之曲鸞吟益夀之章揮三千之琅簡騁十二之文凰縣圃之景光自愛蕋宫之娱樂偏長今主人體乾元握太乙凝剛健之精造冲虚之室簡幾務之焦勞導皇躬以寜謐元始道合澹穆無為飬一心之和暢致八極於雍熙固性命之真樂仁夀之良基不得謂太上道妙與聖治而兩岐也主人曰道法自然為天地根老氏之學能飬其真流而成弊刑名放蕩長生乆視語益惝怳况神仙之杳𣺌氣歴劫而難聚縱白日兮飛昇與世道乎奚補慨秦漢之往事求方藥而何愚用清净而獲效寜化羙於皇初飬身夀人儒者有道保合太和何取黄老醫術之臣進曰衆家紛綸各有所宜導和釋結常守惟醫雖方技之小道誠親切而神竒自古炎農始宣藥品形色必區性味攸審亦越軒轅繼作内經運氣惟叙部候聿明岐彭扁俞振揚輔導君臣佐使之相須神聖工巧之畢到勒諸玉版典在靈蘭遭嬴禁而無恙嫓羲易而永傳爾乃鸑鷟鳴岐姬公制禮職領天官務寜王體調和食飲滋息本根精神欲其内守政事先乎理身左氏作傳載秦和之診視馬遷述史序倉公之證治備演鴻術兼表竒事嗣是長沙賢守垂金匱之要句漏仙令集玉函之妙華陽别録太白千金遞相授學不輟披尋猶復從壺中之幽叟搜肘後之秘藏門帶杏林而霏雪宅留橘井而浮香三世之名著十全之實彰以臣愚管仰揣聖躬非有隂陽勝負侵其外喜怒嗜慾伐其中特以懐萬古之永圗鍾四表之遥情憂慮太逺則費神智計過周則耗精黙識成性偶難憶於忽遺通微必睿時不属於思維得上藥以為助自壯盛而不衰西土浮陽作甘羙草式和羣品首資國老瑶光散彩人葠具形恒騰紫氣亦聞呼聲彤絲上布皓苓下生松腴不朽伏莬通靈苗名小草本為逺志醒心是頼出處非異堯韭天䧏昌陽引年百隂感氣九莭蟠根隰産惟芐地髓凝黄從下㑹意沉者尤良令應金蘂族辨苦薏齡延妙用露裛佳色藷藇修脆月盤煮糜生則膩滑乾收乃宜龍眼繁實粲若驪珠宻脾無滓益智有餘斯皆可以開心安神填精輔志乆服輕身近騐強記他若忘憂樹之丹棘合歡贈以青棠猶以力微效淺未敢貢於尚方也至於筋力小勩血氣異候樂不疲而覺强足容重而嫌後固無事於按蹻更靡假於鍼灸虋冬蔓茂經騐紫微日行三百有過鶱飛天精地骨枸杞還壯吠尨隠叢仙人作杖交藤如斗山翁成瑞髪重鬒黒歩逾便利伊仙靈􅀈輔足最神栁詩所歌不越盈旬穗象郗蟬性著逐馬丹參曽試蕭炳非假以之湯液去患若風之吹雲醪醴取益若寒之回春凡臣所陳氣擇其平味簡其良品無迂僻用必經常屏金石之多悍捨蟲獸之微毒先嘗奚待乎九折奏御方迓乎百福煩悁渙釋動作輕安加由繹而思彌永循端末而記益全襟舒兮懐暢色澤兮體胖何必髙居深念鬱悒心顔乎主人曰古帝垂經以原其本良師立方以使之平能回氣化有禆生生止祛疾疢匪駐年齡食惟榖味滋以薑桂若服藥之過多反五藏之為累况乎出産殊地採造愆期質同效異物是時非試不獲應乆愈失宜嘗探求者歴載猶影似而未真欲綜覽以著書恐貽誤於後人思邈有達言飬性先自慎寜以憂畏為本勿惟藥用是信於是有巖阿一老皓髯樸貌擊壤行歌韜華閟耀稽首山莊之門上獻芻蕘之言曰諸臣所論惡足以知主人哉昔者唐虞三代之治也堯徳曰欽君道之大虞廷交吁動色儆戒夏后克艱其政乃乂成湯慄慄臨淵是慨文王烝哉敬止不懈武受丹書戸牖銘誡謨誥雅頌歴古相傳於赫天命明徴聖言匪四海之為富將康濟夫黎元匪九重之為貴將仰荅夫蒼旻理庶官而無曠躬萬幾而必勤思艱鉅之負荷雖細微而靡捐不以天下為樂惟知為君之難今主人稽正學披往牒溯百世之緒繫億年之業撫幅員之廣博覩民物之繁稠日方中而恐悚雨未至而綢繆譬朽索之馭馬喻洪波之載舟覽青史以申鑒紆黄屋之深籌何一夫之可勝何一事之不可憂乎乃若内外建官賢才是樹用牧閭閻用治軍賦廢耳目而任心豈英髦之可遇爰詢訪於羣僚曷由消夫黨附或顯名於卑秩逮位髙而改度倘審察之未精將輕信而成誤又若蠲租賙食益下之經先時峙偹廪庾宜盈本常平之良規参社倉之遺軌非綱紀之得人徒名存而實詭及臨事而設施貴周宻於條理苟奉行之不臧竟何禆於井里法惟禁暴徳在好生律令不用道化以貞自親民之守令已莫必其得情况受讞於槐棘慿案牘之權衡罸雖薄而求當乃克慎乎祥刑毎登中於嵗杪占貫索之空澄若此者自非主人離照不遺乾綱獨運則何以肅官方解民愠作元命申清問百工允釐有條而不紊乎主人曰隠者之言羙矣然終奚以釋吾懐耶對曰王者之道父乾母坤嚴恭寅畏罔間晨昬維天之怒風烈雷焞側身修行言省其愆維天之喜景星慶雲婉容愉色以承其歡視無形而若見聼無聲而如聞儼精禋於二郊通志氣於兩間命變化其靡定福不可以倖干恒跼蹐而齋慄敢戯豫以自寛代天治物綏御遐邇睠此蒼生實吾赤子彼鞠育之慈恩固疴癢其一體崇責任於元后曽何分乎毛裏縱遥隔於帝閽如號啼之在耳果誠心而求瘼斯致頌於樂只宜乎舉膳踰昃求衣待旦苦身勞形耄期忘倦卜天行之泰否審人情之萃渙善罔小而祥基惡罔大而旤臶履虎尾以操心渉春冰而慮患笑與嚬其不假處閒燕而齊莊恐潛移夫威福杜窺伺之在旁治與亂其倚伏迨明盛而思防炳幾先以逺照用鞏固夫苞桑信盈虚之有數修人事以為常筮艱貞以旡咎豈宴安之可嘗感晩莭之易改永垂警夫怠荒期初終以如一運不已之陽剛雖齒髪之就衰尚黽勉以自强縱精力之漸耗詎愓厲之可忘是則主人之憂勤也天髙地下與之偕極日往月來周而無息舉天下之人莫可與分其責而又何術以自歡何時之能釋主人曰隠者之言實獲我心有志未逮我思益深夙披誦夫尚書攬帝王之金鏡君子所其無逸裕大猷以立政又觀玩夫周易綜微言於四聖能恐懼以致福兹得中而履正殷憂勞勩習與性成學於古訓不敢荒寜前途之計後世之寄疇勤疇恤繄余是視兢兢業業不知老之將至聖祖仁皇帝御製文第四集巻二十五
