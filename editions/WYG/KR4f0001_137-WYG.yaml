body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷二十三北征勅諭諭皇太子朕駐蹕岔道之日初八日早遣往諦巴處員外郎保柱奏章至故謄寫與車克楚所報之書一併發往傳示議政大臣因發報之便恭請皇太后萬安康熙三十六年二月初八日諭皇太子初九日遣往根敦代青貝勒處理藩院主事訥爾布以筆帖式効力倭里來稱伊等於十一月二十九日到彼根敦代青於伊等未到之前十一月初三日病故宣頒諭㫖畢於十二月三十日言旋以二月初九日還至言彼之力量不克征行初十日大將軍費揚古送到厄魯特來降之阿玉西於十二月初九日自彼來投言噶爾丹在薩克薩圖胡魯克地方所存者僅三百餘人此諭與諸大臣閲之其大槩及詳悉所問之處再書以示之自噶爾丹處來降於大將軍者厄魯特男三人婦二人之中有前所驛送之阿玉西問彼噶爾丹今在何處汝自何處來以何日出離本處阿玉西云我與塞卜屯巴爾住爾虧得和少齊同在褚胡爾瀚海之裏界去年十一月二十五日塞卜屯巴爾住爾虧得和少齊過瀚海往巴爾庫爾地方捕獸我來向薩克薩圖胡魯克於十二月初九日投奔聖主而來噶爾丹之處現在吳爾占札卜車凌奔塞冷阿巴阿拉爾拜訥顏格隆有名目者六人再壯弱男人共計不滿三百察罕沽英察罕石保塔爾達爾扎巴罕滿濟等共三百餘人向畢齊巴牙而去衮臻之子多爾濟塞布屯等幾四百人亦齊向畢齊巴牙而去杜爾白特車凌等約百有餘人向額隆古河而去拉思輪等幾六十人向科卜度而去濟木巴車爾貝今徒行矣又問噶爾丹居此薩克薩圖胡魯克地方乎馬匹牲畜幾何生計若何阿玉西云噶爾丹等候格壘沽英及遣往哈密之哈爾海達顏其有二馬之人少有一馬之人多而無馬之人亦甚多所居帳房所用食物皆無火藥鉛子已盡盜賊甚衆困蹙至於己極遣往阿喇卜坦之車凌奔既還其所言云何我未聞知大槩不與噶爾丹來會又問曽言噶爾丹至薩克薩圖胡魯克地方於春時收輯離散之人曽收輯否耶阿玉西云離散之人何處尋覓假令得之以何養贍自此以往潰散殆盡耳又問春時彼地馬得肥乎今馬臕何若阿玉西云馬甚痩畏盜賊而晝夜牽絏之其何能肥康熙三十六年二月初十日諭皇太子朕於十二日之晨自宣化府啓行日中時駐蹕左衞視事既畢正封題遣發適阿南達奏章至復啓封將阿南達奏章謄寫發往照前令看嗣後凡有令看之諭裕親王亦示之朕此處賞賚需用貂皮現今四執事橱内有百四十張照此等貂皮四百張較此略佳者百張共五百張御用緞匹蟒緞粧緞倭緞共百端又黄河冰解須用䉡繩可將長百丈餘甚粗新䉡繩三副長百丈餘細新䉡繩二副共載一車定於二十日送至右衞康熙三十六年二月十二日諭皇太子朕此處會議寧夏之地各處征調皆便朕親至寧夏相機而行定議如此因與大將軍伯費揚古商之大將軍伯費揚古亦以為宜往遂公同定議發衆兵馬由邊外前往朕減省隨從之人由尚書馬齊所立驛站之路行十九日從大同起程康熙三十六年二月十八日諭皇太子朕躬安善皇太子佳否朕自大同起程覽民生情狀不甚貧困糧草充裕與前所聞不同後來之駝騾可以不致阻滯矣自火水口至三岔百姓生業皆平常自三岔駐蹕李家溝之日地乏水泉前行嚮導豫貯水三百甕以備扈從人騎之需正行之頃天忽大雪又百姓自李家溝來者言岢嵐州小尊乾河水來已三日地方恐御路泥濘築堤壅之三岔乾河之水早間亦流至韓家樓亦築堤壅之言之不已朕至韓家樓觀看其水甚大小尊乾河之水築堤處深六七尺於是決開二堤申時水至李家溝下營處其深可没馬腹明日自李家溝至鄢堰邨五十三里水亦稀少仍貯水如前且山嶺險峻跋涉維艱前一日之雪因風凝聚如堆積之狀驅車人衆食此不致困乏而至因無地可以安營遂駐蹕山巔山之南約一里許覓得一河前所行之人未見此河也百姓亦隱而不告此路馬齊所經過者詢之便可明晰朕初不欲書示但扈從人員與地方百姓共知之事汝若聞知恐以未書諭為懷故特諭之此亦偶遇之事非闗竒異二十八日至保德州黄河水勢平緩較湖灘河朔水勢更平而不甚深以篙探之可至於底此等情事奏聞皇太后傳示諸臣自哈密擒送噶爾丹之子塞卜屯巴爾住爾解送京師路由大同宣府附近塞垣朕深以為慮此子豈易得之者耶至保德州時當令送往太原由太原至京較大同之路所遠不過三百里耳皇太子可與諸臣議遣部院大臣及司官往視同至京城大約於三月初五六間方可至朕所俟到京作何處置另發諭㫖康熙三十六年二月二十八日諭皇太子朕於二十八日巳時至保德州即傳示各以次渡黄河二十九日晨因書給賜諸臣扁額遂爾稍遲於是日巳時往看已濟者尚爾寥寥於是朕躬御小舟以粗䉡繩徑河横牽則往來過渡甚為便捷滿漢諸人無不稱竒洵大有益也皇太子所送䉡繩甚佳堅固而不致斷折初一日俱渡訖於初二日啓行可謂甚竒大有裨益因寄信與皇太子亦令喜悦又俄木克圖哈西哈已到塞卜屯巴爾住爾亦接踵而至康熙三十六年三月初三日諭皇太子渡黄河入陜西界山河地境形勢大異朕所經地方可比似者絶無城堡多在山巔不見一邨舍巖崖之下穴居而處平地少山之上無不耕之土民質近於忠厚兵卒健利野多獸跬步難行山雖平而澗壑最險水土佳人鮮病疾去神木縣四里即邊口鄂爾多斯䝉古多入邊來迎董魯卜王之母及其妃皆來請安是日初四薄暮噶爾丹子塞卜屯巴爾住爾來至見其身甚短小人亦庸下初五日即遣送京師至京緩其處分俟其父噶爾丹之信其至京日如何集衆令視之皇太子與滿漢大臣同為詳議具聞然後遵㫖行為此諭知上候皇太后萬安以此奏知宫中亦傳知康熙三十六年三月初四日諭皇太子朕躬安善皇太子佳否自神木縣往榆林之路皆沙磧崇岡甚為險惡非行兵之地觀此則知古人拓地興師修築長城竭天下脂膏於西北者未可謂非必非今人之所能也特仁者所不為耳朕隨行諸臣侍衞護軍執事人員不過四百人且不勝煩勞數萬軍旅何以率之而行乎磵壑甚多而砂礫又深故從榆林出邊於鄂爾多斯之地徑往寧夏陜西巡撫按察使來迎觀其人年老而衰頹殊不及山西巡撫倭倫將軍馬思哈奏報趙良棟於三月初四日病故其子天津道當速令聞之幷令速回宣化府知府范時崇居官稱善而行已不苟可補授天津道宣化府亦係要地捕盜同知祖永泰為霸州知州時居官稱善而行事不苟可補授之俱著迅速赴任朕行道遠而奏報間隔嗣後從行在遣發之書即於次日内遣回其間若有諭㫖則每事覆答亦於次日内遣回從各省來京之人可詢今春風景何如雨水何如即寄信至朕躬雖在軍中而慮周天下晷刻亦不能忘此心此意何時可釋此奏章於初七日午後到即時将進獻皇太后等物親視包裹本俱覽畢即將報批發至上燈時寫完即遣回嗣後報到之日時俱於本内寫明奏聞朕巡察山西陜西等處惟萬民觀瞻是重行事恐有未愜日切敬慎與南巡相同決不少自寛假幸而兩省兵民因朕撫愛年乆皆相感戴聚集輻輳亦不令警蹕朕躬自念薄德稍有不當何以副兆人之觀聽乎皇太子勿以為懷若類明武宗之所為誓不言旋也康熙三十六年三月初七日諭皇太子遣送塞卜屯巴爾住爾三等侍衞克西圖先是於宣化府馳驛迎至中衞攜來今仍令其解送大將軍伯費揚古處送來歸降之噶爾丹所屬厄魯特一人阿喇卜坦所屬厄魯特一人馳驛送至詢問伊等之言一倂謄寫寄往十三日自副都統阿南達處令送來之博羅特寨桑和朔齊來至此人口供亦書之寄往自出榆林邊口其地頗佳而路近此路若非朕詳問而來前赴寧夏亦甚跋涉艱難矣初四日自神木縣地方因噶爾丹之子塞卜屯巴爾住爾之故行文前往至十六日未到不知因何遲誤是日未時始至又十五日早京師所送魚網到朕料理軍務但思維如何可得噶爾丹使後日邊塞永清無事何暇捕魚耶康熙三十六年三月十六日諭皇太子恭請皇太后安十七日入安邊塞垣駐蹕前馬竒查看境路曽言安邊僅有四井百姓聞朕之來舉首城内外隱瞞之井二十有餘進塞垣處有二水泊營南又一水泊水甚足用是早天降時雨至十八日夜半極其霑足駐宿一日馬竒查看定邊堡亦云止有四井今泉涌沸而出水成澗流邊外相近處又出三水泊花馬池之地馬竒言有九井今有三十餘井邊外五里有大水泊安定堡舊井新井三十三處以此凡所經過水皆充足十九日阿爾畢特瑚攜尼麻唐胡圖克圖至詳奏其事本日大將軍伯費揚古奏報自厄魯特降來二喇嘛情由人尚未至事局似佳故謄寫示之俟人到詳加詢問再為諭示朕於三月初四日見塞卜屯巴爾住爾時即寫諭發往令諸臣會議此諭若應於四日内到則初七日可至京師速行議畢即於初八日馳送十一日可達朕所朕於是日批發十六日至京則塞卜屯巴爾住爾到日正值其時乃俟後發之報至始於十一日齎復十六日方到雖本日發回計期二十一日前後方能至都塞卜屯巴爾住爾到京已多時矣報發於十六日其間若有隔斷恐皇太后以為何故稽延故於二十一日之早寫發此諭兼令諸臣觀之康熙三十六年三月二十一日諭皇太子朕躬安善皇太子佳否二十一日駐蹕於安定堡二十二日駐蹕於興武營水皆足用朕自經榆林以來行路之頃每率綠旗汛兵圍獵以觀其技勇沿邊緑旗兵卒人材壯健自不待言且其隊伍整齊騎射􅈺熟與素日所聞不爽二十三日駐蹕清水堡有河二十四日駐蹕横城堡二十五日駐宿於黄河岸朕親視渡河日未暮渡畢二十六日抵寧夏風土尚佳貨食饒裕兵士精強馬皆肥壯馬思哈等所統之兵馬臕亦肥朕親乘之馬一無所損而至臕尚有八分者軍衆馬駝僅能至此蓋由途間乏草塵土更多山岡與平曠之處無非砂礫故跋涉頗艱自古兵行未有經兹路者尚書馬竒奏言自京師至寧夏道路里數二千七百二十里嚮導布達等奏言自京師至榆林自榆林由邊外入安邊口以至寧夏道路里數二千六百里學士楊舒以繩量道路里數自京師至榆林自榆林由邊外進安邊口以至寧夏二千一百五十里除各處駐宿之六日凡四十四日而至自寧夏丈量由歸化城至京師斷不過一千八百里路甚捷近而易行水草俱佳頃朕所經之路反迂曲而稍遠矣即遣中使往京去訖康熙三十六年三月二十八日諭皇太子三月二十九日晩大將軍伯費揚古報聞朕所遣員外郎博席希等還至及奏所詢問情由但其人尚未至朕所俟其至日問明再諭在京諸臣時望亟聞朕軍中消息故即謄寫所奏之書以閏三月初一日辰時發行遣往策汪拉布灘司務英固還至其言與主事常明同當此發報之時恭請皇太后萬安此事令在京議政諸臣會同抒其所見具議以聞又京師日食幾分如何光景明白書寄為此諭知康熙三十六年閏三月初一日諭皇太子朕至寧夏幾及十日每日籌畫儲備兵馬錢糧無晷刻之閒其在路也晨則䝉霧露晝則冒塵沙口疲於誡誨手胼於鞭轡行數千里之外以至於斯者亦祗以此孑遺之噶爾丹之故也朕於此時若在京師晨則可以周覽雜花晝則可以布席樹隂鳥鳴之聲可以悠然而聽熱則靜以息而凉則動以興非不知安怡之為可尚也亦惟是此心欲了畢丈夫之志意耳皇太子至孝人也抑或見花開之色聞鳥鳴之音覩在沼之游鱗觀上林之馴獸念及朕在斥鹵砂礫絶塞之地勞瘁艱難其痛於心而慕戀之耶然毋以朕縈慮也惟日夜於國家之事必盡其心有暇則披誦經史覽前世得失之跡以自適其心為此特諭康熙三十六年閏三月初五日聖祖仁皇帝御製文第二集卷二十三
