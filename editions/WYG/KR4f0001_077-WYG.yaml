body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十六古今體詩三十八首東巡二首幷序八年征動喜見澄平緬想祖宗功徳禮宜躬謁陵廟以告成功爰於二月十五日命駕東巡是日天氣晴和微風動斾從者溢路觀者夾途顧瞻逺邇莫不懽躍賦詩二首昆池不習戰寰宇已銷兵鴻業承匪易膚功久乃成威靈昭祖徳展謁慰羣情迢逓關山路寜辭千里行其二順動因時豫東風引翠旗鳴鑾萬騎出執事百僚隨日暖草初茁煙輕栁未絲春光無限好應有上陵詩玉田徐無山下水涓涓㡬道横流灌玉田驅犢荷鋤農事作五風十雨卜豐年駐蹕豐潤城西旌門鐃吹發雲璈行漏聲傳帳殿髙欲向山頭望明月豐潤縣有明月山恐驚霄漢避龍鑣夷齊廟幷序永平府治西古孤竹城夷齊廟在焉灤水經其前清風臺峙其後倚巖俯流足以登眺夫夷齊孤竹君之二子也能讓侯封不食周粟採薇首陽山獨行其志孟子以聖之清稱之盖人惟能立節自可埀名夷齊之去國潔身不求人知而廟貌千古迄今猶存吁造詣其可忽乎哉灤河水清駛荒山屹然峙上有孤竹城亂石半傾圮堂廡既具觀廟貌亦儼爾緬惟商代末天下漸披靡兹地實藩封人民差可恃兄弟以義讓富貴如敝屣叩馬諫周王數語昭青史遯跡首陽山薇蕨何其美萬載挹髙風頑懦聞之起蒼蒼臺下松湯湯臺前水勁節與澄流不媿相比擬停鑾碧山阿懷古未能已灤河泛舟平沙漠漠接長河天際浮雲落照多兩岸蒼山相竦峙扁舟一櫂任清波經永平城南三代幽偏地秦時右北平川原緜大陸形勝借堅城晴日初迎輦春風暗拂旌龍山遥入目縹緲白雲横撫寜輦路平鋪孤嶼東日華升處海雲紅忽聽百舌春啼巧盡在蒼條古木中山海關幷序連山據海地固金湯明時倚為險要設重鎮以守之我朝定鼎燕京埀四十年關門不閉既非設險還慙恃徳偶賦數言聊以紀事重關稱第一扼險倚雄邊地勢長城接天空滄海連戍歌終嵗苦插羽不時傳作鎮隆三輔征輸困百年笳寒龍塞月甲冷雉樓煙厯數歸皇極綱維秉化權漫勞嚴鎻鑰空自結山川在徳誠非易臨風更慨然蒙恬所築長城萬里經營到海涯紛紛調發逐浮誇當時用盡生民力天下何曾屬尔家姜女祠朝朝海上望夫還留得荒祠半仭山多少征人埋白骨獨將大節説紅顏曉過寜逺孤城臨巨野舊烈憶西征破壘荆榛滿邨雞向曉鳴行殿夜覽章奏飛逓傳来奏牘多旌門莫問夜如何銀燈毳幕春寒重恐是陰陽尚失和呂翁山是聖祖太宗文皇帝擒洪承疇處旌旗直捲陣雲沈濠塹遺蹤尚可尋十萬健兒皆解甲一時大帥此成擒民情效順當年事王業維艱聖祖心遂使關西如破竹至今戰氣晝陰森松山鳴笳伐鼓速兵機百勝謀成夜合圍月黑風髙神鬼泣金戈白馬識天威杏山晩眺野日荒荒蔓草平孤邨雞犬寂無聲山中獵罷殘陽晩時見髙原夜燒明憩小凌河河水流不息晝夜去涓涓昔為征戰地今是豫遊年駐馬孤岑外移舟古岸前殘陽下新栁約略見春妍錦州道上野徑臨官驛炊煙出杳冥地連榆塞紫山列錦屏青城郭知何處旌旄只暫停版圖歸大業堠火罷林坰駐蹕大凌河歸騎雲屯向晩過昇平笳吹動鐃歌光摇幕火繁星燦影暗旗風野霧多兵氣已銷沙右所軍聲猶壯大凌河豐京老將還能説曾記前途自倒戈途次逢寒食何處来春風澹蕩開晴旭不見杏花紅纔逢栁梢緑十三山迤邐峰連大道間憑空青削十三山敵樓人散堠臺廢終日茸茸草色閒過廣寜望醫巫閭山名山插霄漢朶朶青芙蓉連亘數十里隱現千百重迢遥不可極黛色堆竒峰窈窕復岝㟧鬱鬱多蒼松中有桃花洞杳靄常雲封萬古鎮幽州秩祀同岱宗盻望生引領瞻顧停六龍何時一登覽盪滌疏心胷渡句驪河野岸春蕪發青蔥一色齊皇輿連近逺地軸别東西日送霓旌影風催駿馬蹄山河緜帶礪回首重低迷過永安橋口占夾路飛塵宿雨消十年曽此駐龍鑣春風城闕知非逺㡬處輕寒變栁條盛京遣使請太皇太后皇太后起居夜書奏疏畢偶成雲山遥隔萬安宫定省心懸午夜中孺慕經時書不盡㣲誠憑仗與東風三月初六日告祭福陵恭述十韻瑞靄鍾靈闕晴煙繞閟宫萬山皆拱北百水盡洄東夭矯盤峰秀紆廻磴道通俯看環衆象遥睇極髙崇松柏丸丸直岡巒靣靣同恢𢎞思祖烈建樹本神功戰術無前略謨謀啓後衷揮蛇曾握劒定鼎有遺弓展禮威儀整申誠俎豆豐車書叨繼統藐爾媿㣲躬初八日告祭昭陵恭述十二韻盛徳兼三代威名定四方文謨真顯赫武烈實飛揚包幷收羣國虚謙集衆長網羅来俊彥締造闢洪荒卜世周埀厯開基漢啓疆靈山佳氣迥寢廟瑞雲張曠逺臨平陸幽深逼上蒼汗嘗趨石馬歌欲奏芝房洱海銷兵戰炎陬絶叛狂功成昭黙佑告祀肅誠將㣲念通層構含情望兩廂千官遵大典進退盡鏘鏘盛京舊宫雙懸鳳闕隱金鋪想見龍飛握瑞符殿列丹霄崇大政宫開紫極接神區君臣際㑹風雲日版籍留存山海圖堂構有懷追徃事土階儉樸示規模告祀禮成宴諸臣於舊宫閶闔門開玉座春金支徧插綺筵新鏗鏘劒珮千官集曼衍魚龍百戲陳功定舞干歌靖亂恩留過沛樂同民大風猛士何煩憶仗下班聯絳灌臣三月十一日雪中詣永陵告祭峰巒疊疊水層層王氣氤氲䕶永陵蟠伏諸山成虎踞飛騫衆壑佐龍騰雲封草木橋園古雪擁松楸輦路升一自遷岐基盛業深思遺緒媿難承薩爾滸幷序太祖髙皇帝嘗駐師於此以五百人破明四路兵數十萬衆殲杜松於鐵背山遂有遼東實帝業之所由基也城成龍躍竦重霄黄鉞麾時早定遼鐵背山一名洼轟木前酣戰罷横行萬里迅飛飇栁條邊望月雨過髙天霽晩虹關山迢逓月明中春風寂寂吹楊栁摇曵寒光度逺空望祀長白山名山鍾靈秀二水發真源翠靄籠天窟紅雲擁地根千秋佳兆啟一代典儀尊翹首瞻晴昊岧嶤逼帝閽松花江放船歌松花江江水清夜来雨過春濤生浪花疊錦繡縠明綵㠶畫鷁隨風輕簫韶小奏中流鳴蒼巖翠壁兩岸横浮雲耀日何晶晶乘流直下蛟龍驚連檣接艦屯江城貔貅健甲皆鋭精旌旄映水翻朱纓我来問俗非觀兵松花江江水清浩浩瀚瀚衝波行雲霞萬里開澄泓江中雨望煙雨連江勢最竒漫天霧黒影迷離掀翻波浪三千尺疑是蛟龍出沒時經葉赫廢城斷壘生新草空城尚野花翠華今日幸谷口動鳴笳鐵嶺雨餘塞草自緑日出山花更紅轍跡神州近逺驥鳴廣陌西東雜咏古戍行来日落孤邨坐對月明漠漠龍沙千里桓桓虎衛三更聖祖仁皇帝御製文集巻三十六
