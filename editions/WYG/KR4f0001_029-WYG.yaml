body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻十二勅諭諭大學士勒徳洪明珠李霨學士格爾古徳阿蘭泰石柱王守才張玉書賞罰乃國家之大柄忠逆實臣節之大防從古帝王敷治戡亂未有忠不賞而逆不罰者但其中情有輕重故法有寛嚴必功罪分明予奪精確始稱允恊前總兵官王永清身膺重任甘心從賊及大兵抵滇圍困省城為日甚乆猶不歸順乃與夏國相隨在奔竄迨計無復之始來投誠故拏禁其子封其家産今文武官員見在雲南仍不投順者可察出如王永清之例一併封拏其應作何結案曽經議政王等議俟雲南省城克復之後再議今議此案時應将從賊受職歸順後未經定議官員品秩稍大者通行察出具奏其從賊官員前已歸順曽經奉㫖從寛免罪者不必槩行察議此内有原為大吏靦顔從逆又受偽職者名節棄㓕大玷人臣之誼若輩不合仍令居官應俱革任著議奏儻其間有効力真確功績甚著之人應酌量留任仍於各名下明白開注勞績見在候缺者俱停其録用至明嵗以後文武各官舉行大計軍政凡屬從賊受職歸順者俟督撫提鎮開造計冊到日吏兵二部應行察明罷黜著議政王貝勒大臣㑹議具奏康熙二十年十二月初九日諭大學士勒徳洪明珠李霨馮溥尚書伊桑阿郭四海左都御史徐元文侍郎李天馥杜臻學士噶爾圖格爾古徳阿蘭泰石柱王守才李光地張玉書頃九卿等以逆首既除四方底定奏請上朕尊號朕自御極以來日夜孜孜以乂安民生為念乃逆賊吳三桂一倡變亂遂至塗炭八年當吳三桂初叛時散布偽劄煽惑人心各省兵民相率背叛此皆徳澤素未孚洽吏治不能剔釐所致幸頼上天眷佑祖宗威靈滿洲兵士之力逆渠授首奸黨悉除地方平靖獨念數年之中水旱頻仍災異疊見師旅疲於征調被創者未起閭閻敝於轉運困苦者未甦且因軍興不給裁減官員俸禄及各項錢糧竝増加各項銀兩仍未復舊每一軫念甚歉於懐若大小臣工人人廉潔俾生民得所風俗淳厚教化振興天下共享太平之福雖不上朕尊號令名實多如一切政治不能修舉則上尊號何益朕斷不受此虚名也朕自幼讀書覽古人君行事始終一轍者甚少嘗以為戒惟恐幾務或曠鮮克有終以故宵衣旰食祁寒盛暑不敢少間偶有違和亦勉出聽斷或中夜有機宜奏報未嘗不披衣而起朕非不知燕息自怡蓋所愛不在一身總為天下生靈計政事務求當理官職務在得人期於家給人足百姓樂業而已今吏鮮潔清之效民無康阜之休君臣之間全無功績可紀儻復上朕尊號加尔等官秩則徒有負媿何尊榮之有至於太皇太后皇太后加上徽號詔赦天下理所宜然其上朕尊號之事斷不可行乃朕實意非粉飾之辭也自今以徃大小臣工宜各洗心滌慮砥節厲行休飬蒼黎培復元氣尔等可向九卿各官悉諭朕意不必再行陳請康熙二十年十二月十四日諭議政王大臣頃九卿等以逆首既除四方底定奏請上朕尊號朕思曩平南王尚可喜奏請回籍時折出票簽面議圖海言斷不可遷移朕以三藩俱握兵柄恐日乆滋蔓馴致不測故决意撤回下議政王大臣九卿等官㑹議時未有言不可撤者皆以遵㫖宜撤議奏朕意已定遂命遷移不圖吳三桂背恩反叛天下騷動偽檄一傳在在響應八年之間兵疲民困幸荷上天眷佑祖宗福庇逆賊遂爾蕩平儻復再延數年将若之何爾時惟有莫洛米思漢明珠蘇拜塞克徳等言應遷移其餘竝未明言遷移吳三桂必致反叛向議此事之人至今尚多試言當日曽有謂吳三桂必反者否及吳三桂叛後各處擾亂多有退而非毁謂此事皆因遷移所致此等情事朕俱洞悉若彼時朕諉過於人将議應撤三藩者悉置於法諸人豈不死於非命耶朕素性不諉過臣下即今部院事務如有錯誤朕亦自任未嘗歸咎於人朕自少時以三藩勢燄日滋不可不撤豈因吳三桂反叛遂諉過於人耶賴天地祖宗之靈剿滅逆賊方為此言儻逆賊不滅其過豈不盡歸朕身今雖賊亂削平地方寜静而民困未甦瘡痍未起君臣宜各修省恤兵飬民布宣敎化務以廉潔為本共致太平若遂以為功徳崇上尊稱濫邀恩賚是可恥也康熙二十年十二月十四日諭大學士杜立徳卿弼亮老臣久任機密端醇恪㳟勤慎素著兹海宇蕩平時當令序内殿賜宴廷臣念卿臥疾不克同此歡讌特遣中使慰問賜以醴饌卿其加餐珍攝以副朕惓惓至意特諭康熙二十一年正月十四日諭禮部比年以來逆賊吳三桂背恩反叛擾亂地方仰荷祖宗在天之靈黙垂庇佑克奏蕩平應躬詣山陵展祭以告成功前初聞㨗音即謁孝陵行禮兹奉太皇太后慈諭太祖太宗山陵亦應親徃祭告隨命議政王貝勒大臣等㑹議僉謂事闗大典允宜舉行今擬即謁太祖太宗山陵䖍申昭告用展孝思應行事宜及需用各項著各該衙門速行偹辦尔部即遵諭行特諭康熙二十一年正月十七日諭将軍安褚䕶詳覽尔奏所言雖是但今雲南蕩平告成功之大典不便延遲中止朕與廷臣公同酌議於二月十五日啓行已有定期此外别旨俱口諭賫奏官員矣康熙二十一年二月初二日諭烏喇将軍巴海等今以雲南等處底定躬詣盛京告祭三陵意欲於扈從人等餧飬馬匹之暇觀看烏喇地方将軍應從何處帶領兵丁候迎可與盛京将軍定議行之再産鱏鰉等魚之處尔即詢明烏喇西特庫㑹同将湏用諸物悉加偹辦完整為此特諭康熙二十一年二月十一日諭學士張英尔素性醇樸侍從有年朝夕講筵恪㳟盡職兹因尔父未葬具疏請假朕念人子至情忠孝皆出一理准假南還特賜白金五百兩表裏二十匹既旌尔之勤勞兼資墓田之用尔其欽悉朕惓惓至意特諭康熙二十一年二月十四日諭裕親王福全相别以來忽復兼旬棣萼之思時在寤寐初四日已抵盛京山川形勢風土民情深維祖宗開創之艱難令人逺想慨然春氣漸佳知意興甚適也特此佈問不宣康熙二十一年三月初五日諭蘇大敦柱兹上太皇太后奏啟為切陳㣲衷仰祈睿鑒事内云自山海關至盛京水土皆佳獸多魚鮮每當食頃輙念不能馳奉太皇太后甚歉於懐到盛京後身親網獲鰱魚􅠧魚設法成叚浸以羊脂者一種鹽醃者一種星馳逓送心期兩件奉到之日儻得味仍鮮美庻可稍見㣲誠山中野燒自落榛實及山核桃朝鮮所進柿餅松子白果栗子附候安奏啓同徃等語所進之物可同奏啓一併送至慈寜宫其銀缾中所貯之魚到日鮮否明白奏知若太皇太后欲寄製成棗脯即實之缾中封固付來為此特諭康熙二十一年三月初八日諭户刑二部朕承祖宗丕緒撫御區宇日以子育元元為念自逆賊吳三桂倡亂滇南多方煽動軍興八載中外驛騷仰頼祖宗在天之靈黙垂眷佑殄滅兇渠民生乂安疆圉底定爰特行徧祀山陵之禮用告成功兹㳟詣福陵昭陵謁祭禮竣惟盛京為國家肇基重地朕躬親幸宜沛大澤以示殊恩山海闗以外及寜古塔等處地方官吏軍民人等除十惡等真正死罪不赦外其餘已結未結一切死罪俱著減等發落軍流徒杖等犯悉准赦免奉天錦州二府屬康熙二十一年地丁正項錢糧著通行蠲豁其官役墊補包賠等項應追銀兩察果家産盡絶亦并豁免用稱朕加惠根本優恤黎民至意特諭康熙二十一年三月初八日諭裕親王福全頃覽來奏具悉念朕之懐兹者告祭事畢廵行疆土兼講春蒐正當草淺獸肥弓燥手柔之時且地多豺虎麋鹿此樂惜不與王共之也近状想佳特此諮詢康熙二十一年三月十七日諭裕親王福全别來未幾麥氣迎秋荏苒流光良増思念每閱來疏足慰朕懐兹東廵典禮事事已畢經過之處無不喜見昇平二十日自盛京囬鑾㑹面可期佈問不宣康熙二十一年四月二十二日諭敦柱蘇大朕至渾河太子河遼河三河合流之處地名牛荘河水泛漲乗舟渡河扈從諸人以次待渡因暇舉網所得鰱魚五尾島子魚六尾鯉魚四尾􅠧魚四尾鯿魚三十二尾鴨嘴魚六尾重脣魚二尾中魚三尾杆條魚一尾共六十三尾欲遣人賫往恐日久味變故著驛逓馳送尔二人将魚進太皇太后兼奏明此意有何慈諭併此魚到去新鮮與否於隨常奏啟内詳細奏來為此特諭康熙二十一年四月二十三日諭刑部頃以逆賊殲滅海宇蕩平朕躬詣盛京展謁永陵福陵昭陵以告成功因而廵行邊塞咨詢民間疾苦東至烏喇地方見其風氣嚴寒由内地發遣安挿人犯水土不習難以資生念此輩雖干憲典但既經免死原欲令其生全若仍投畀窮荒終歸踣斃殊非法外寛宥之初念朕心深為不忍以後免死減等人犯俱著發徃尚陽堡安插其應發尚陽堡人犯改發遼陽安插至於反叛案内應流人犯仍發烏喇地方令其當差不必與新披甲之人為奴以昭朕軫恤民隐哀矜保全之意尔部即遵諭行特諭康熙二十一年五月初九日諭户兵工三部從前盛京看守陵寝及山海關等城守章京員缺俱令其子弟頂補後停止此例悉由京師補授頃朕以昭告成功展謁永陵福陵昭陵因周視所歴地方見道里遼逺徃返艱難若章京員缺盡從京師補授則家口遷移重為貧窶者之累且将前任章京房屋田地掣給新補之員以致前官孤孀無倚不能回京如欲即留彼地則田廬既空資生何䇿困苦日甚深用憫然嗣後盛京看守陵寢及山海關等處城守章京員缺不必自京補授著於伊等子弟内令該将軍選擇賢能者具題引見頂補以免其徃返遷移之苦儻伊等子弟無人堪用别有補授發徃之員可另撥田房給與其前任章京田房仍行留給不必掣出令其孤孀得所尔三部㑹同詳議具奏特諭康熙二十一年五月初十日聖祖仁皇帝御製文集巻十二
