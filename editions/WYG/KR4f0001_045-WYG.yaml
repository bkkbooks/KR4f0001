body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻二十記鄚州水淀記康熙十八年己未暮春之初朕萬幾有暇行幸鄚州于是惠風拂地淑景浮空節應佳辰時登令月與羣臣春蒐於南浦泛舟於河淀庶憑歡心以召和氣萬物暢茂順陽和而布政三光燭耀賑貧乏以勸農雖無山林臺閣之趣水村林藪有淳厚之俗沙鷗錦鱗互相游泳春花野草參差萬狀觀之不足因同侍從諸臣題詩賦鼔瑤琴俯仰古今飛觴飲宴昔人横汾昆明之遊皆所以洽上下之情同君臣之樂豈獨流連光景已哉故記之乾清宫讀書記二帝三王之治夐然尚已後之人興於千百世之下而欲遐稽往烈以為多聞畜德之資非載籍是賴厥道無由顧載籍極博大而道德之淺深政理之因革小而聲名度數采章文物之繁靡弗該也靡弗悉也若徒習其文辭侈其浩博而不深考其道法之大原得諸心而致諸用古人之言皆陳迹耳於我何與焉朕自沖齡性耽問學踐阼訖今罔自暇逸未明求衣待旦視事講臣執經羣工入奏未嘗一日不與相接旣退裁決庶務披覽章疏有間則書冊翰墨之外無他嗜好端居乾清宫取六經之書發而讀之以求契夫古聖人之心將以致其用而未能也又上下古今盱衡數千載思昔人之所以致其用者而求之乎紀志表傳編年紀事之文將以考其用而知其心之所存朝斯夕斯怡然忘倦蓋浩乎其未有涯悠然其未有艾也比者海宇乂安國家閒暇而風俗人心未能登進淳良聿臻上理毎一念之􅍀然於懷將以得之於心者而實致諸用焉積晦明閲寒暑展巻吟誦神理淵穆如晤古人夫乾為健天得一以清所貴執中而建極也自强不息以希天遜志好學以希聖朕雖不敏詎弗勉旃南巡筆記康熙甲子春日有以時値上元請行封禪及巡狩燔柴諸典禮者夫朕凉德菲躬臨御海㝢邇年以來水旱兵戈民亦勞止雖邀天庇佑四海蕩平萬姓樂業實未有豐功偉烈足以昭示來兹何敢效法前人銘功紀德至於巡狩古天子所以周省侯國使諸侯肆覲明堂考其政績今天下之權統一於内督撫之賢不肖朕皆得而知之又無事於巡狩之名也惟是近畿郡邑屢經巡幸補助時施而東南黎民風俗尚未周知乃於秋九月陳請兩宫暫違定省二十八日出京師經河間􅂈德州閲濟南城觀趵突泉題曰激湍百姓遮拜馬首口户繁盛比屋可封昔稱臨淄之間肩相摩轂相擊者今尚有遺風焉十一日至泰山石徑崚嶒緩步登陟四十里御障崖瀑水懸流五大夫枯松猶在巖畔或亦後人繼植者入南天門捫秦時無字碑至孔子小天下處眞可収羅宇宙暢豁襟懷題普照乾坤雲峰諸字宿泰山巓月色清朗賦詩遣興來日登日觀峰看扶桑日出下山祀於嶽廟嶽為五方之長發生萬物故躬祀之為蒼生祈福十三日雨雪駐蒙陰縣侍臣云明日小雪喜其應候詰朝雪霽望䝉山峰頂半入雲霧或隱或現其上石衣土人攀縋取之名蒙山頂上茶嘗考四川雅州有䝉山五峰極高峻上產甘露茶世所傳者或雅州之䝉山也渡沂水取魚旣多且鮮因遣使馳進兩宫以志思戀之懷葓花舖青淮之界居人輻輳十八日發宿遷縣閲黄河北堤岸一百八十里頻年水患工役浩繁民俗罷敝不若山左之庶饒渡河舟行過清江浦淮安府商賈往來舟楫如織寳應縣高郵州邵伯鎭皆以湖水汎濫未復故道居人草屋臨流床竈半在水中朕甚憫焉登岸步行十餘里親察水勢召集耆老秀才細訪其故皆云自海口壅塞水無所歸二十年來田畝已成巨浸賦詩紀事思所以拯濟之卄三日抵維揚市肆繁華園亭相望遊平山堂天寧寺百姓持香夾道意甚誠敬平山堂乃宋臣歐陽修所建修以文學侍從之臣出知揚州為政之暇優游談讌傳為佳話故朕詩有文章太守心偏憶之句卄四日將由儀眞幸江寧府忽遇順風可以速達京口遂乘沙船順流而下波恬浪靜瞬息七十里沙船江中戰艦也自岳州長沙用兵以來多得其力今河海清宴當時戰具僅供渡江之用然安不忘危朕於此時未嘗不念艱難用武之際次早登金山孤巒隱岫屹峙大江中飛閣流丹金碧照灼更有一峰離立曰善才石郭璞墓在其西上有妙高臺留雲亭朝陽洞下有中泠水稱天下第一泉朕率扈從諸臣一一探眺縱目千里題江天一覽四字并賦二詩竹林禪院在鎭江府城南五里曲徑逶迤茂林修竹高者四五丈大者圍尺青葉碧枝陰森崖谷實北地之所未有晩而登舟揚帆丹陽縣常州府無錫縣俱未及泊一晝夜行三百六十餘里達姑蘇舟人云從無如此之速者卄七日由楓橋入閶門登城閲視士民觀瞻莫不忭舞有獻賦頌者是日駐蹕城中念執事人役辛勤遠來遍賞白金聽其各帶方物以示體恤卄八日回鑾過虎丘山不甚高亭榭闌檻布滿其上千人石高下可容千人傳為生公講經處故旁有㸃頭石劒池在夾崖中殊可觀平逺堂俯瞰虎丘之背田疇林木望若錯錦蘇民仍列酒坊茶肆各安生業管絃競奏覺有昇平景象然徒事紛奢罔知務本未若東北風俗之樸實耳夜坐舟中與侍臣高士奇探論古今興廢之跡或讀尚書左傳及先秦兩漢文數篇或談周易或賦一詩毎至漏下三十刻不倦日以為常蓋詩書意味深長不似耳目之好易於煩厭也舟過無錫縣遊錫山觀惠泉石甃八角池水色渟泓味較玉泉遠不相及不知前人何以稱之為第二泉二十九日由丹陽縣陸行初一日過句容縣蜿蜒石堤數十里抵江寧府雨花臺在城南登之則江山城郭歴歴可見報恩寺規制𢎞壯寳塔九級金碧琉璃盡鏤梵相結構之巧殆竭人工非前代内帑所修不能至此城中闤闠充實煙火萬家景物太平昔稱六朝佳麗今亦不減大都也明日祭明洪武陵見其頽廢勅地方官禁䕶之過明故宫僅存遺趾不禁慨然作過金陵論并賦一詩登觀星臺望後湖題曠觀二字又明日再遣使進兩宫方物閲鎭將射於教塲頒賜扈從諸臣幣帛督撫御衣初四日發江寧府泊燕子磯峭壁臨江亦有勝致初十日閲高家堰堤工望洪澤湖汪洋千頃復由河南岸行一百八十里過桃源縣十一日渡河至宿遷次日駐蹕葓花舖自郯城沂州取道東兗渡沂濟祊汶泗諸水泗水出陪尾山下泉林寺側石穴吐水衆泉俱導古樹成林有石碑刻子在川上處然闕里志載孔子觀川亭在尼山宣聖廟側未知孰是十六日長至節天氣晴暖無朔風祁寒扈從諸人莫不欣喜十七日􅂈少昊陵顏子林駐蹕曲阜縣南十八日黎明祀於闕里齋心穆穆若有所見禮畢坐詩禮堂命孔氏子孫講周易大學遍觀車服禮器及漢唐碑版檜樹在大成門内古榦蒼然苔蘚潤澤眞靈蹟也敬想至聖道冠百王前代留金銀器具皆人力可辦獨以仗前曲柄龍盖留廟中并書萬世師表四字過闕里詩古檜賦出北門釃酒孔子墓下伯魚墓在孔子墓東十餘步子思墓在其前西有子貢廬墓之所左有宋眞宗駐蹕亭林中奇樹蔥鬱未可計數行三十里駐蹕兗州府杜甫所謂浮雲連海岱平野入青徐是也念周公制禮作樂道接文武頃過曲阜未得躬謁廟庭特製祭文遣親藩代祀之遂由汶上東阿高唐至德州亟欲定省兩宫兼程而歸是行也往返數旬所歴山東江南諸郡縣日以周諮民隱體察吏治為首務行道之頃復得覽其山川憑弔古蹟至於地方利弊則將有以斟酌損益焉率筆記之示朕之不徒事遊豫也泉林記朕被服至道誦法孔子於詩書簡冊之中羮牆載見如聞其言論而接其聲容者匪伊朝夕矣嘗以不得一登闕里之堂觀其車服禮器山川風物慨然至聖之音徽毎低佪於中而不能自已迺者在廷之臣咸謂古者天子巡省方岳觀察民俗朕俞其請因念岱宗在望于邁魯郊夙昔所懷今兹可慰歲之冬月輿衞北還抵於泗水東境距其縣治五十里陪尾山之陽衆泉出焉石竇㟏岈清流蕩潏下合沂泗逺波悠然相傳為子在川上處云旁有古寺厥名泉林陂陁幽曠樹木茂宻雖古今異時陵谷不改去聖人之居如此其近意者當日杖履所經周覽原泉黙契道體喟然發水哉之歎者其卽斯地耶於是停驂弭節瞻眺久之恍乎如有所得殆移晷而後去也夫天地無終窮流水之出於天地者亦無終窮聖人之道川流敦化萬古不息與天地流水同其無終窮焉其何能已於予懷耶孔子之繫易其言天也曰行健言地也曰無疆孟子之言水也曰盈科而後進君子之於聖人之道也溯源窮流學水至海亦若是焉而已矣朕旣幸宫牆親覿至止非遙而又喜泉源勝地聖跡所存而得游歴其處也遂為之記雪記民之貧富關乎歲歲之豐歉因乎天稼穯之道雨暘時若不苦旱不病澇則力作省而百穀暢茂及乎西成収穫必倍是謂豐年若宜暘而雨宜雨而暘高下燥濕違乎物性農力必困而百穀之登亦絀矣朕撫兹兆庶念民為邦本而歲為民天故衡量雨暘首於農事為兢兢比者畿甸之内夏則少雨冬則少雪蓋偏於陽也間省刑簡賦廣行賑恤天亦隨感輒應然甘澤之施未極汪濊恒用為憂甲子冬南巡還京師越數日大雪幸薊州復雪喜而記之以詩於時三輔郡邑逺近數千里田疇溝澮罔弗霑被數年以來未之有也小雅信南山之章曰上天同雲雨雪雰雰繼之曰旣優旣渥旣霑旣足生我百穀言乎雪盛於冬而潤澤乎春能使土膏饒洽而百穀豐實以臻有年之慶也則兹之應候而降周徧繁密淪浹郊圻若此將五土之宜頼以潤三農之緒賴以興殆豐年之徵也謂非天之所貺歟聞之雪乃五穀之精得則嵗豐歳豐則民富朕於是有厚望焉因援筆而為之記宫中日課記嘗讀商頌之詠成湯也曰聖敬日躋周詩之詠文武也曰緝熙曰執競其詠成王也曰夙夜基命宥密而史亦稱大禹惜寸陰蓋古帝王未嘗不終日乾乾夕惕若也朕於宫中未明求衣辨色而起則命講官捧書而入討論義理是典學者為一時出御宫門則羣工循序奏事朕親加咨度是聽政者為一時已而閣臣升階朕與詳求治理咨諏軍國者久之若夫宫禁之務各有攸司廷臣退乃裁決焉旣事竟罷朝宫中圖籍盈几案朕性好讀書丹黄評閲輒徑寸辨别古今治亂得失暇或賦詩或作古文或臨池灑翰以寫其自得之趣止此數事已不覺其日之夕矣及宫中燃燭玉漏初下則省一日所進章疏必審其理道之安而後已要非夜分不就宴息也如是者歲率以為常夫禹湯文武成王之德自揣烏能企及而不敢懈逸之心或者其庶幾焉因為記自勗以比於盤銘之義云聖祖仁皇帝御製文集巻二十
