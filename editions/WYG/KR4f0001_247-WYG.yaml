body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻二十五碑文重修菩薩頂碑文盖聞沙界三千標鴈門於五頂紺宫十二顯鷲嶺於一臺摩騰天眼之所憑阿育神光之攸燭水火金木行配土而居中南北東西嶽得嵩而成五諸方盡攝千聖咸登洵紫府之瑋觀名山之勝境矣兹菩薩頂寺者地多􅂕跡閣本真容㝠贊化機大布貞觀之詔宏資王度聿新景徳之規覩金像於白毫啓寳筵於翠岫羣龍北向樓臺聳蒼靄之中雙練南飛鍾磬出煙蘿之外曩以文殊示化獨現全身因之歴代相沿尚虚傑搆朕惟法輪常轉象教無邊宜開廣大之宗特發恢𢎞之願基因闢而加敞殿以配而彌尊河浮香象普賢分般若之光陸湧青蓮大士結跏趺之座㫋檀婆律有佛皆拈薝蔔優曇無花不笑彼此百千賢劫獨歸不二法門萬億人天共證前三妙諦豈獨金䋲珠網萃巾拂於一堂白足赤髭走盋囊於千里已哉爰勒豐碑永昭慧日和碩裕憲親王碑文國家景運厖洪本支百世用惇秩敘懋建屏藩矧兹同氣之最親加以懿行之茂著恩無間於終始禮務盡夫榮哀紀述生平倍増愾歎惟王為皇考世祖章皇帝之長子朕之親兄也胄既屬尊齒復居長而秉性寛和持身謙牧虚受之量雖疎賤不遺矜慎之衷雖細㣲必飭而其大者則在因心展孝曲盡慈寧色養之誠視國如家克敦夙夜奉公之義入而預聞大政出而翊贊戎機佐致昇平共享清晏豈期偶恙遽遘鞠凶當王之初疾也嘗遣醫審藥躬視再三王自謂漸瘳諄辭遜謝及朕時廵塞上哀訃忽聞遂觸冐炎蒸倍道遄返輟朝臨奠製誄抒懐歴喪禮之告竣常涕泗之横集顧瞻華屋杳隔春暉歲月不淹頓成陳迹能不悲夫迄今追惟徃事溯自髫齡或同侍寝門或偕游禁苑或参稽圖史或陪扈鑾輿朕日篤家人昆弟之歡而王則益修臣職惟謹四十餘年曽無失徳天懐樂善何日忘之經曰髙而不危所以長守貴也滿而不溢所以長守富也王服習斯訓美備厥躬按法旌行予諡曰憲洵無忝矣兹王之寝園在黄華山麓川廽巖抱既固且完朕親加相度迺襄大事嗣子保㤗命紹舊封式纘王緒於戲惟王克忠克孝之節允樹為臣為子之型王之休徳朕褒揚之王之後嗣朕佑芘之爰据實摛文勒之貞石用垂令聞於不朽俾後之覽者知所景仰焉和碩恭親王常寧碑文國家因親鍚寵固莫重於宗支而自近推恩尤必先乎同氣故手足之誼既篤生前軫恤之仁復加殁後凡以道隆敦本禮備飾終典至渥也惟王朕之介弟幼授親藩久沐尊崇歴霑賜賚方期奉天倫之樂承日接之歡克保修齡茂膺多祉何圖春秋猶壯齒髮未衰疢疾忽侵溘焉凋謝緬惟曩昔感悼良深特遣官以築幽宫復勒銘以垂貞碣嗚呼音容漸邈嗟朱邸之長辭歲月旋移悵黄壚之永閟式頒寵命昭示来兹不其休歟太子太傅都統三等公議政大臣吏部尚書中和殿大學士佐領贈少保仍兼太子太傅諡文襄圖海碑文朕撫御方夏勤求治理維兹丞弼之臣協心毗贊綏靖邦家實倚賴焉尔圖海秉資忠慤砥行端勤密勿周旋歴有年所敬以事上誠以持躬淵鑒沈幾克膺大任自為都統時嘗平荆楚西山之亂還入綸扉贊襄匪懈廼逆賊呉三桂憑藉寵靈煽動南服一時羣不逞之徒囂然附和察哈爾孤負國恩造釁搆孽爾以將軍副信郡王祗承廟算出闗征討膚功立奏東服底平繼以涇原騷動西土震驚命尔為大將軍以乗勝之師廻戈西嚮賊方肆其狂蹶思與滇逆併力惟尔以重臣建牙遂得横截秦隴扼亢擣虚逆勢窮蹙始帖耳垂尾復來效命邇年以来尔鎮撫三秦威略大著能使羣賊膽寒則凡天戈所指建耆定之成功者惟尔勞勩為多爵以上公俾之振旅方將復煩以機務與之講持盈保㤗之理共享隆平至治詎圖勤瘁之餘溘焉殞逝腹心失倚深用䀌傷雖恩䘏有加鍚之嘉諡而朕軫悼元老之心則未有己也爰命伐石樹之墓道使後有溯勲舊之烈者得以考焉康熙二十二年五月初二日武英殿大學士兼吏部尚書佐領加二級諡文清阿蘭㤗碑文朕惟國家之務全賴平章簡我良臣得之匪易其有克副股肱之寄積抒夙夜之勤律己彌見小心佐政能持大體方切倚毗而不假年飾終之禮有加哀徃之情恒篤用泐貞石永世有辭尔武英殿大學士兼吏部尚書佐領加二級諡文清阿蘭㤗有容之徳大受之材自歴百司御事以至為冢卿罔不慎乃在位朕甚嘉之用俾爾弼余一人以襄大政尔能和衷以協力推誠以布公遵國家蕩平正直之塗養人心清靜寧壹之福十年之久一𤯝無聞豈惟朕心所素知抑亦羣情所悦服至於潔廉之操尤著美於朝端蕭然故居朕嘗書額示寵且性本謙沖義惟止足每一求退朕輒黯然欲斷来章温言批答間有㣲疾賜問頻仍豈期近者臥病一旬遂爾不起輟朝深痛未解朕懐賵馬賻金䘏尔身後臨䘮祖奠如朕親行加祭易名悉從優異嗚呼緬生平不事聲名之迹惟密勿常多贊助之勞朕無溢辭務傳其實尚俾知我弼臣之遺徽茂烈足以光於邦家風於有位千秋不泯眎此豐碑康熙四十年四月初十日文訓飭士子文國家建立學校原以興行教化作育人才典至渥也朕臨馭以来隆重師儒加意庠序近復慎簡學使釐剔弊端務期風教修明賢材蔚起庻幾棫樸作人之意乃比来士習未端儒效罕著雖因内外臣工奉行未能盡善亦由尔諸生積錮已久猝難改易之故也兹特親製訓言再加警飭尔諸生其敬聽之從来學者先立品行次及文學學術事功源委有敘尔諸生幼聞庭訓長列宫牆朝夕誦讀寧無講究必也躬修實踐砥礪廉隅敦孝順以事親秉忠貞以立志窮經考義勿雜荒誕之談取友親師悉化憍盈之氣文章歸於醇雅毋事浮華軌度式於規繩最妨蕩軼子衿佻健自昔所譏苟行止有虧雖讀書何益若夫宅心弗淑行已多愆或蜚語流言脅制官長或隱糧包訟出入公門或唆撥姦猾欺孤凌弱或招呼朋類結社要盟乃如之人名教不容鄉黨弗齒縱倖逃禠扑濫竊章縫返之於衷能無愧乎况乎鄉㑹科名乃掄才大典闗係尤鉅士子果有真才實學何患困不逄年顧乃標榜虛名暗通聲氣夤緣詭遇罔顧身家又或改竄鄉貫希圖進取囂凌騰沸網利營私種種弊情深可痛恨且夫士子出身之始尤貴以正若兹厥初拜獻便已作姦犯科則異時敗檢踰閑何所不至又安望其秉公持正為國家宣猷樹績膺後先疏附之選哉朕用嘉惠尔等故不禁反復惓惓兹訓言頒到尔等務共體朕心恪遵明訓一切痛加改省爭自濯磨積行勤學以圖上進國家三年登造束帛弓旌不特尔身有榮即尔祖父亦増光寵矣逄時得志寧俟他求哉若仍視為具文玩愒弗儆毁方躍冶暴棄自甘則是尔等㝠頑無知終不能率教也既負栽培復干咎戾王章具在朕亦不能為爾等寛矣自兹以徃内而國學外而直省鄉校凡學臣師長皆有司鐸之責者並宜傳集諸生多方董勸以副朕懐否則職業弗修咎亦難逭勿謂朕言之不預也爾多士尚敬聼之哉康熙四十一年正月頌唯天為大頌幷序康熙乙酉正月六日初辛有事於南郊是夜瑞雪清塵光風拂面瞻拜之際不覺䖍密精誠筋力彊健所以不揣無文敬賦唯天為大頌一篇聊記其事云爾唯天溥覆唯大涵𢎞無㣲不照億兆攸同至諴感神豈曰髙崇玉帛鍾鼔禮云表衷為民請命祈榖神功潛施黙化密運罔窮惟予小子潔䖍齋戒對越昊蒼匪敢少懈食乃民命時若是快念兹邦本無逺弗届履薄臨氷敬勤作誡宵旰縈縈夙夜何解東風拂淑庚日布雲玉花遍野萬姓欣欣占年自慶望澤先殷愆多徳寡恐塞上聞一日二日萬幾紛紜休戚相闗乃寐夜分猗猗娭娭須臻風化熙熙皥皥所賴春夏惟徳動天編氓趨下燠寒以時蕃廡禾稼三季苦辛至冬少暇穀黍登塲子女敬迓紫壇紺席殷薦成田欽若昭事四十四年求端可畏鑑之在天慎終如始寸隂斡旋作民父母正直無偏前後念兹庶幾保全贊上帝閣贊唯天最髙下臨則近美惡昭章其情難隱忠孝有報逆者媿忿大道三無丹經五藴至哉敬誠守身慎謹維皇上帝降衷於民惸獨鰥寡懐保在心人之為善夙夜日新惻隱何自虚明覺真蒼蒼鑑此鍚福臣鄰威鎮北地神武𤣥方羣魔電掣萬類宣揚雨暘時若壽世康祥為七十八嵗老人光輪像贊法象為教報應之緣慈雲溥䕃甘露連綿四句一藏九部大千鼻竪睂横天真志堅覺性清靜呪鉢生蓮惟尔守戒特賜宸篇聖祖仁皇帝御製文第三集卷二十五
