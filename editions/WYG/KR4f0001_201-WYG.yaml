body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻二勅諭諭大學士伊桑阿馬齊王熙呉琠熊賜履張英等今治河事雖稍有緒未可遽稱底績唐埂六壩俱已堵塞夏秋時黃河水溢加以毛城舖水復入洪澤湖波濤洶湧則高家堰甚可危目下清水流出雖於運艘有益但高家堰一有衝決淮揚一帶地方俱不可保其為患甚大将所修如許工程俱付之無用矣昔于成龍任總河時不塞唐埂六壩非無所見蓋慮此而不行也今斷不可不愼加防護凡此皆朕親臨所見者並非紙上空言也張鵬翮修築石堤甚速彼處運石甚不易成工之速如此可謂實心効力者矣康熙四十年三月二十一日諭大學士伊桑阿等自古帝王用人行政皆賴大臣人臣薦舉賢良盡以人事君之大義雖或薦舉偶有未當若為所舉者因有賢吏之名遂力改所行始則有光於祖父中則奮厲於功名終則不負其所舉斯即良吏也若始以賢而舉之乃改行而為不肖既玷祖父之名復絶功名之路以致貽累於所舉斯則國家之大罪人也天下至大為人君者焉能人人而識别之且官方賢否或操守清正或貪汚不肖必難掩於百姓必難逃於衆論其居官即此可以見矣儻所舉之人居官皆善此乃實心為國無私之賢臣也所舉有善者有不善者此其心雖為國特識鑒未到之故耳若所舉皆貪汙行私此則大玷為臣之義不可一日容於世者也辨别臧否以鼓厲實行權在人主或居小吏時亦有善名及得志之後改行者甚多此則焉能預料既用而復疑之是故以知人為哲以疑則勿用用則勿疑為信私黨雖自昔有之然君子之黨與小人之黨從來未有不明晰者自兹以後朕惟視其居官操守清亷以為實據無庸預為疑度慕琛所奏已悉可下所司知之康煕四十年五月初二日諭大學士伊桑阿馬齊王熙呉琠熊賜履張英學士法良辛保傅紳范承烈王九齡曹鑑倫高承爵奏報泗州盱眙地方水災著總河張鵬翮㑹同兩江總督阿山親行察勘具奏前高家堰閉塞六壩時朕謂六壩塞完後泗州盱眙等處必被水淹曽向九卿降有諭㫖今六壩方經閉完洪澤湖水長泛溢泗州盱眙等處城郭果被水災高家堰堤益覺危險朕為此時厪於懷且天災靡定萬一有異常風暴及地動雷震之事亦未可知儻若高家堰至於危險則揚州淮安等處皆被災矣朕日夜念此甚切憂懼高家堰堤作何保守堅固或另有修治善䇿著張鵬翮陳奏可差爾衙門中書一員前徃康熙四十年五月二十一日諭大學士伊桑阿等頃張鵬翮奏開陶荘引河黃河水已向北岸流去若黃流趨向北岸則離清口甚逺乘此時從范承勲所築挑水壩起寛長加築堤岸過清口将黃河及清口之水儘向下流再匯合為一處則黃河之水可永無倒灌之虞朕先曽面勅于成龍今在河官員亦有知者著張鵬翮問在前曽知此事官員詳明定議奏聞其修堤所需錢糧即為估計所修之處速繪圖呈覽此事甚為緊要不得輕忽下所司知之康熙四十年九月初一日諭大學士伊桑阿等原任大學士阿蘭㤗在日存心端誠為國勤勞素著懋績今雖身故應贈䘏典加授少保太子太保以示朕矜念効力年久大臣之意特諭康熙四十年九月二十九日諭工部修理永定河並未動支庫帑其在工官員俱係自願捐修及赴工効力者所捐未完銀兩非侵漁錢糧及為事捐贖可比且其人亦已亡故若行令該旗責成家屬照數賠補殊為可憫俱著從寛免行追取康熙四十年十月初四日諭户部朕孜孜圖治宵旰靡寧於民生疾苦時切軫念甘肅等處地方切近邊陲土田瘠薄今年雨澤愆期田禾多有未穫閭閻饑困朕心深用憫惻已特勅該督撫等官将被災之處親行蠲賑令其得所更念來歲青黃不接西土小民輸納維艱著将甘肅巡撫所屬州縣衞所康熙四十一年分地丁錢糧通行豁免地方有司務期切實奉行毋令官吏借端侵漁俾小民得均霑實惠以副朕軫恤災黎之意爾部即遵諭行特諭康熙四十年十月初六日諭户部朕惟帝王致治裕民為先免賦蠲租實為要務朕宵旰憂勤咨求民瘼四方利病未嘗少釋於懷矧江蘇等處地方尤為財賦重地朕比年巡幸東南目擊民艱已多方軫恤令其安乂猶恐有司奉行不力德澤未盡下究民生罕遂康阜莫登兹将江蘇巡撫所屬州縣等處除漕項外康熙四十一年地丁錢糧盡行蠲免地方有司務期實意奉行使閭巷窮黎皆得均霑實惠庶㡬生民樂利豐裕可期儻不肖官吏仍陽奉隂違私立名色借端科派恣行侵剋負朕愛養生民至意事情發覺定行正法決不姑貸爾部即遵諭行特諭康熙四十年十月初十日諭大學士伊桑阿馬齊呉琠熊賜履張英學士辛保傅紳范承烈王九齡曹鑑倫凡官員本身効力自立官職者身故後應襲之人屬有廢疾遂停止襲職情殊可憫若准令承襲則廢疾在身不能趨赴公家之事此等人員應停給全俸止以每月錢糧支給俟其襲職後或生子或别有應襲之人足以充任使者即准替襲以全俸給之以示朝廷優恤世職之意可交與吏部詳議康熙四十年十月十一日諭大學士伊桑阿馬齊呉琠熊賜履學士辛保傅紳來道范承烈曹鑑倫直省地方料理事務必須簡任賢能爾衙門移文總督郭琇張鵬翮桑格華顯巡撫彭鵬李光地噶禮徐潮凡伊等所屬道員以下知縣以上官員有實心惠愛民生居官清亷者雖有詿誤降罰俱不必論著各具摺開送内閣其别省官員内有伊等所灼知者即越省亦列名奏聞康熙四十年十月二十五日諭大學士伊桑阿馬齊呉琠熊賜履學士辛保傅紳來道常壽來福范承烈曹鑑倫陸漫閘西岸改築土堤内外鑲柴見今錢糧雖省但蘆葦易致朽爛不能堅久二三年後又致重修張鵬翮在任雖無可虞若張鵬翮離任或淮黃水漲有危險之處鑲柴工程朽爛豈不更難著将此情節備寫差員往張鵬翮處令其確議陳奏康熙四十年十一月十四日諭大學士馬齊等朕於科道官員許其風聞入告者耑為廣開言路使自督撫以下各官有一切事務任意妄為及所行貪劣致害民生者皆知所顧忌而警戒也科道官員糾叅不實例有處分又或言不合理及生事妄奏者外轉有之罷職亦有之至於被叅之人具疏回奏止應辨晰是非不應支離牽引因彼一身被叅而舉原叅者之父子兄弟親戚皆受指摘以逞報復則自此以後孰敢更糾一人頃左必蕃叅郭琇郭琇即将叅已之人轉行窮詰王材任叅高承爵高承爵即将王材任之父與其親戚妄意牽連且如錢鈺曽叅原為巡撫穆爾賽在任貪婪及後錢鈺授山東巡撫其居官並無勝於穆爾賽之處他若此類者甚多彭鵬身為言官時亦曽叅人兹為王度昭所劾理應止以切已之事剖晰奏明乃今訐奏王度昭謂其曲庇親戚而其間所有夙怨又未指出實據彭鵬雖操守清亷居官亦善所回奏反復瀆陳詞氣不勝忿激凡在君上之前不應陳奏之言輙形於章疏粗戾已極著以嚴㫖傳飭之康煕四十年十二月十六日諭大學士伊桑阿馬齊等高家堰等處堤工雖竣然未遇大水俟來年經過水汛之後方可驗其成功若爛泥淺一帶水出不暢則高家堰究屬可憂向意欲從武家墩出水此事尚須斟酌前日問張玉書奏淮水尚大高堰舊堤俱為湖水所浸據此則泗州盱眙安得不被水災河身之淺深以洪澤湖之高下為驗湖水低得一尺河身方深得一尺今洪澤湖水比甲子年高有數尺可見河身未曽刷深高家堰之堤恐過此以往尚未可知也張鵬翮請閲河摺子可留内閣康熙四十年十二月十八日諭刑部朕欽恤民命念切好生每於法司奏上爰書必披覽再三詳求可生之理其或情罪允符不忍立置之法者則令監候緩決以俟來歲之再讞顧罪犯一經緩決即皆冀望生全而長困桁楊淹留歲月自新無路朕甚傷之今方春始和萬物暢遂憫兹沉繫之獄用沛矜釋之仁現在爾部及直省監禁人犯凡經康熙四十年秋審奏㫖監候緩決者著察明通行減等發落仍開具人數奏聞爾部即遵諭行特諭康熙四十一年正月二十四日諭内閣朕昔巡視西省地方聞葉九思居官甚優遂擢用為大同府知府後因公罣誤部議革職朕特令罷職留任今已歴數載其服官之善不改於前比來年齒亦漸長可給還與原官諭吏部知之康熙四十一年二月初八日諭户部朕躬理㡬務年久深知稼穡之事念阜民之道期於有備去冬北地少雪今春雨澤微降尚未霑足誠恐蝗蝻易生有傷農事所在官吏亟宜先時預防直隸山東山西河南陜西江北地方歴年積貯倉糧果否足額該督撫宜確加稽核務使廩有餘儲不致匱乏其一切預備事宜須悉心講求料理縱年歲不甚豐稔亦可賑濟無虞至直隸各省現今雨澤有無多寡著該督撫即行具摺奏聞以紓朕宵旰勤民之意爾部即遵諭行特諭康熙四十一年三月初十日諭漢大學士九卿翰詹科道諸臣尋章摘句華麗詞藻非帝王之所本朕四十餘年惟日兢兢未嘗晷刻稍釋萬幾自警有始無終之誚念兹在兹也政事稍暇頗好書射歴年以來所積臨摹字幅賜卿等觀㸔康熙四十一年四月諭刑部凡罪犯存留養親必其親係無罪可憫之人方可奏請留養這案陳蒂生與其子陳潮同毆陳大生致死則陳蒂生亦係有罪之人今将陳潮引存養例奏請於義不合著再議具奏康熙四十一年四月十二日諭大學士王熙卿耆年舊德歴官最久自去歲告病在家朕無日不注念老臣也近日九卿皆求扁額字對想卿身雖在告心未嘗一時不在朝中故特書扁一面對一聮臨米芾書一幅賜卿卿其勉强餐食輔以醫藥慰朕不忘舊臣之至意康熙四十一年四月二十三日諭禮部這訓飭士子文若令各府州縣學宮一體勒石恐有不產石州縣地方或致借端擾派著俟國子監勒石後以搨本彚頒各省轉發所屬各學康熙四十一年六月初一日諭吏刑二部黃梅知縣李錦部議仍准留任凡官員去留之權豈可令百姓干預聚衆肆行之風亦漸不可長該督撫庸懦無能平時不能約束軍民及至事出專務遮飾具題爾部並不詳察止據所奏苟且議結殊屬不合李錦居官雖優不可仍留黃梅縣任著令來京於直隸附近地方員缺用康熙四十一年九月初九日諭禮部琉球國失水二人拯救復甦著地方官加意贍養俟便船資給發還此等船隻損壞人被溺傷皆因修艌不堅所致嗣後琉球貢使囬國時該督撫須驗視船隻務令堅固以副朕矜恤遠人之意康熙四十一年九月十三日諭户部甘肅距京路途遥遠這茜草嗣後不必解送著該撫差官齎額設銀兩來京採買交納以紓民力康煕四十一年九月十三日聖祖仁皇帝御製文第三集卷二
