body:
  text: 欽定四庫全書集部七聖祖仁皇帝御製文集别集類六國朝總目録初集四十卷二集五十巻三集五十巻四集三十六卷臣等謹案聖祖仁皇帝御製詩文自康熙二十二年癸亥以前為初集三十六年丁丑以前為二集五十年辛夘以前為三集並大學士臣張玉書等編録山東廵撫臣蔣陳錫等校刋告成於康熙五十三年七月其自五十一年壬辰以後迄六十一年壬寅為四集則刋成於雍正十年十二月和碩莊親王臣允禄等編録侍講學士臣方苞等校刋自勅諭至古今體詩為門各十有六為巻都一百七十六敬謹繕録用冠古今集部又有專刻詩集二十八巻禮部侍郎臣髙士竒等校刋所載詩篇次第悉與文集合故未敢複繕云乾隆三十九年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書聖祖仁皇帝御製文集進表翰林院編修加六級臣蔣漣㳟承勅㫖校刋御製文第一集至第三集共一百四十卷俱已告成謹奉表上進者臣漣誠惶誠恐稽首頓首上言蓋聞日月經天煥陰陽之精藴圖書授聖宣明旦之光輝觀象成文可大而可久體元合撰有德必有言聿遡都俞緬維喜起英華既發渾噩遂開爰自商周迄於唐宋瓊箱漸富什襲法宮綈帙曽編流傳藝苑然縁情賦物多風雲雕繪之詞或遺實尋虚少道德根源之論若乃離明旁照宥密單心乾健自强始終典學集大成而首出無過一人推極盛於兩間有如今日欽惟我皇上道髙周孔統接羲軒晰至理為至文發揮純粹涵太極於無極妙合眞精玉振金聲自然條貫河流岳峙允矣髙深盛德難以形容聖學莫能贊歎臣漣猥從江介世受隆恩何意日邊身邀異數特允芻言之請賜刻瑶棱獲因摳讀之時仰瞻奎藻蓋海㝢之昇平已久聖人之著作日新雨沛如絲悉智仁之流見風行渙汗皆天地之性情廵狩省方一篇無逸問安視膳全部孝經庶物庶名兼該道器實心實政原本敬誠得易簡於乾坤混茫陶鑄寓法程於謨典貫絡綱維濬古今未盡之藏暢九垓而泝八埏包含廣大闡事物難窮之義匯萬殊而歸一致考索精深湯盤遜此周詳禹鼎讓茲博洽春秋冬夏揮毫而渾備四時禮樂詩書染素而自呈全體加以揚風榷雅啓秀摛華字字神竒直契無聲之帝載篇篇美善何殊肖物之化工洵宇宙之大觀實洪濛所未有雲章三集已統三才玉厯萬年應成萬卷牙籤錦軸珍並嫏嬛銀匣縹囊重逾鴻寶臣漣空慙漸陸有愧䝉泉幸與校讐竊附蠡測管窺之見夙懷鉛槧本無繪天畫日之能繼晷披繙猶虞隕越歷年追琢祗懼粗疎鐫鏤成書榮施葵藿編排竣事慶溢縑緗伏願廣布寰瀛昭垂琬琰示執中之㫖羣知先後同符錫建極之言人識治平有本奏太和之琴瑟咸沐薰風播元始之鼔鐘共聞鈞樂則盈廷師濟由學海以觀瀾率土譽髦企文山而覆簣豈止家絃户誦𢎞敷彝訓於六經佇看日珥星鈎永賁榮光於奕禩臣漣無任瞻天仰聖激切屛營之至謹奉表隨進以聞
