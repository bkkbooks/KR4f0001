body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷八勅諭諭大學士伊桑阿阿蘭泰學士凱音布拜里朱都納邁圖西安博濟郭世隆王國昌理藩院事務所關最要官員缺出應用之人甚少䝉古旗阿達哈哈番拜他喇布勒哈番拖沙喇哈番及侍衞令各旗都統引見奏聞此中有通習文字者選用康熙二十八年九月十一日諭大學士伊桑阿阿蘭泰學士凱音布拜里朱都納邁圖西安博濟郭世隆王國昌今嵗旱禾稼未登草豆價值勢必翔貴滿兵馬匹飼養為艱可察八旗貧窘護軍甲士特給以養馬錢糧至來嵗之秋卿等㑹同滿九卿具議以聞康熙二十八年九月十一日諭大學士伊桑阿阿蘭泰學士凱音布朱都納邁圖西安博濟郭世隆王國昌來歸之喀爾喀人衆饑窮至於已極自相攘奪强凌其弱若不速設總理職任遣賢能䝉古王台吉等申明法紀訓化禁禦集其離散之衆必將仳離困窮益至於極今冬来春何以為生其下議政王貝勒大臣會同詳議以聞康熙二十八年九月十一日諭大學士伊桑阿阿蘭泰學士凱音布朱都納邁圖西安博濟郭世隆王國昌佐領伊庫等所送黒龍江官莊壯丁若至其地已過耕種之時則無所得食矣可遣戸部司官一人往察之果逾耕種之期無食者量與之粟以養贍之其下戸部康熙二十八年九月十八日諭大學士伊桑阿阿蘭泰學士凱音布朱都納邁圖西安博濟郭世隆王國昌直隷所屬被災地方其一嵗錢糧為數若干湖廣之湖北所屬被災地方其一嵗錢糧為數若干速察之今日即以聞康熙二十八年九月十八日諭户部朕勤求治理篤念民依欲使婦子幹寧用是頻蠲租賦至於時值荒歉倍切焦思賑贍之恩尤宜亟沛今嵗畿輔亢暘為虐播種愆期年榖不登小民艱食旱灾情形朕所親見夙夜殷勞軫念已久顧此煢煢之民餬口尚不能給若更責以輸賦必致流移失業直𨽻被災州縣衞所所有本年地丁各項錢糧除已徴在官外其餘未經徴收及康熙二十九年上半年錢糧盡行蠲免尔部速行該撫通行曉諭務使均沾實恵以副朕拯恤窮黎至意如民人仍致流散或不肖官役朦混侵蝕及仍行私征者將該撫一并嚴加處分尔部即遵諭行特諭康熙二十八年九月十八日諭大學士伊桑阿阿蘭泰學士凱音布朱都納邁圖西安博濟郭世隆王國昌佐領所隷事務洞知詳察乃佐領等官専責此後凡令稽察之事佐領官所稽察若不明晰惽昧無能者戸部㕘奏今所察貧窘人戸之事儻朦混不明亦令戸部㕘奏康熙二十八年九月二十二日諭户部今嵗畿内亢暘田畝鮮穫朕所深悉被災人民已加恩蠲賑八旗田莊俱在畿輔近地同屬災傷滿洲䝉古漢軍甲兵皆須養馬原資禾稼以供飼秣今榖既不登芻豆必致湧貴雖給有月餉銀米可以贍育家口貧乏兵丁經營草料恐滋困累朕殊用軫念著詳察實係窮兵無力養馬者開列名數送部自本年十月起至来年秋成時止其馬匹所需錢糧應加給賜以昭朕一體愛恤兵民之意作何恩給尔部確議具奏特諭康熙二十八年九月二十八日諭政治典訓館總裁伊桑阿等朕御極三十年來惟兢兢秖畏常存始勤終怠之虞孜孜不荒每思滿損謙益之戒今閲此書増愧於懐況比年不登民生未遂地震星變往往頻仍正當君臣上下協心同慮撫綏萬邦夙夜黽勉尚且不暇豈容自矜自伐以重已過違道取譽以務虛名欲將此書停止編摩卿等其議之康熙二十八年九月二十九日諭大學士伊桑阿王熙梁清標徐元文學士凱音布朱都納邁圖西安博濟郭世隆王國昌彭孫遹顧汧今嵗京師附近地方遇旱榖用勿登小民資生無計雖錢糧既已蠲免加恩賑賚給以帑金而求糴米粟亦覺維艱依然無食困於生計朕念之每為憫然也頃朕躬詣山陵所過之地諮問民間疾苦閲視被災情形不僅艱難於米粟而已也雖燔爇之薪藁亦無之饑寒交迫曷以為生若不及時善加賑恤必致流移失所朕日夜焦勞不安於懐今兹適遇饑饉公家莊田及諸王以下大臣庶官殷實人等莊田積聚糧榖可酌量助給又直𨽻鄉紳富民有積榖者並令助給散賑其散給帑金務令實給小民以為薪槱之用如此似於饑民方有裨益汝等與九卿詹事科道官會同詳議以聞康熙二十八年十一月初六日諭戸部朕念小民衣食惟田畝是賴必年榖順成斯生計無乏若遭罹荒歉饘粥尚且艱難正賦安能輸辦今年湖北亢旱為災已遣官會同該督察勘今據將武昌等府所屬二十九州縣八衞所災傷分數勘明具奏朕心深用軫念儻不亟加蠲恤恐致流移失所武昌等四府今年錢糧前已全蠲其被災二十州縣四衞所康熙二十九年上半年地丁錢糧著與蠲免荆州安陸二府所屬被災九州縣四衞所本年地丁錢糧除已徴在官外其未經徴收及二十九年上半年錢糧亦盡行蠲免尔部速行該督撫通行曉諭務使均沾實恵以副朕拯濟窮黎至意如民人或致流散不肖官役朦混侵蝕及仍行私征者將該督撫一并嚴加處分尔部即遵諭行特諭康熙二十八年十一月十八日諭戸部朕撫育蒸黎務期休養閭閻疾苦時軫朕懐今覽總督范承勲奏雲南屯地錢糧自康熙二十一年至二十七年每嵗拖欠懇請分年帶征朕念雲南百姓前曾供億王師繼又遷移叛屬家口運送勞悴本年正賦輸將尚屬艱難復令帶徴逋租必致益滋困累著將歴年所欠屯賦銀七萬一千二百餘兩米麥等項十萬七百餘石盡行蠲免以示朕軫念民生至意其令該督撫通行曉諭務使得沾實恵如有不肖官員仍私自徴比者該督撫指名題㕘從重治罪尔部即遵諭行特諭康熙二十八年十二月初三日諭内閣九卿詹事科道今嵗京畿遇旱小民餬口維艱數經蠲免錢糧頃雖散給賑濟而雨雪尚未及時朕心正爾未安兹雖值新正上元令節朕軫念小民生計彌切憂勤汝等亦宜體朕軫䘏民生至意共加惕勵時厪乃心今當封印之時慎勿各圖逸樂每日皆齊集午門前於救災恤民之道詳悉計議康熙二十八年十二月十八日諭内閣朕意於祭祈穀壇文欲更製焉祈榖壇或有一代祀之亦有不祀之者輔臣時輟其祀矣朕以為民祈榖之故肇舉祀事每嵗祭文皆因舊詞比年榖未大登民艱於食夫特為民生致祭祈榖宜悉陳其情愫更製新詞此事内閣九卿詹事掌印不掌印科道官㑹同詳議來日早奏聞康熙二十八年十二月二十二日諭皇太子殿時代祭暫安奉前者朕因炙艾忌風未得親詣中心鬱悶五内不安念汝年已長成漸曉事務況好書自得孝友性成朕甚嘉悦所以遣汝恭代大禮今暫逺離足為深念特使内侍馳賜南方新到春橘冬筍脯脩令汝嘗時物耳特諭康熙二十八年十二月二十三日諭戸部朕撫育黎元早夜孜孜惟厚生是亟重念積貯民之大命曾屢頒諭㫖令各地方大吏督率有司於豐稔之年曉諭編氓務令多積米糧俾俯仰有資凶荒可備乃比年以來未見實心奉行閭閻盖蔵不能充裕常平積榖視等具文即如畿輔近地偶罹旱荒民間蓄積鮮少致為補苴之術嗣後直省總督巡撫及司道府州縣官員於積榖事宜切實舉行務令戸有餘糧倉庾充牣縱遇儉嵗艱食無虞以副朕愛養生民至意如有仍前玩愒苟圖塞責儻遇災歉漫無儲備者將該督撫及地方各官一併從重治罪尔部即遵諭通行特諭康熙二十九年正月初十日諭户部朕撫御區㝢夙夜孜孜惟期厚民之生使漸登殷阜重念食為民天必盖蔵素裕而後水旱無虞曾經特頒諭㫖著各地方大吏督率有司曉諭小民務令多積米糧庶俾俯仰有資凶荒可備已經通行其各省徧設常平及義倉社倉勸諭捐輸米穀亦有㫖允行後復有㫖常平等倉積榖闗係最為緊要現今某省實心奉行某省奉行不力著再行各該督撫確察具奏朕於積貯一事申飭不啻再三藉令所在官司能具體朕心實有儲蓄何至如直𨽻地方偶罹旱災輒為補苴之術嗣後直省總督巡撫及司道府州縣官員務宜恪遵屢次諭㫖切實舉行俾家有餘糧倉庾充牣以副朕愛養生民至意如有仍前玩愒苟圖塞責漫無積貯者將該管官員及總督巡撫一併從重治罪尔部即遵諭通行特諭康熙二十九年正月十一日諭戸部朕惟阜民之道端在重農必東作功勤然後西成有賴畿輔地方去嵗遭罹荒歉已經蠲免錢糧特發帑金兼支倉粟賑濟雖小民餬口有資其子粒牛具恐多匱乏今時届首春田功肇始若弗經營措給將誤俶載之期播種不齊倉箱何望直𨽻被災州縣衞所窮民有不能自備牛種等項者該撫督率有司勸諭捐輸及時分行助給務令田疇遍得耕易毋致稍有荒蕪八旗官兵皆倚屯莊收穫用以資生若有被災貧乏耕作無力者該都統等通行各該佐領酌量佽助牛種所有莊田勿致播種後時以副朕敦本勸農愛養兵民至意尔部即遵諭行特諭康熙二十九年正月十二日諭大學士伊桑阿阿蘭泰學士朱都納西安博濟席喇王國昌比年以來部院滿洲司官各處奉差理事頗著勤勞自郎中以下有職掌官以上可加察核以頒恩賚是察核也分一二三等以為序次其不入等次者各部院堂官繕寫摺子啓奏此内有曾經别部題㕘而復用者無庸序入因公罣誤而復用者仍序之康熙二十九年正月十三日諭内閣外省駐防將軍副都統母令購買民人誠有此禁未嘗禁軍弁買人也祖明雖係副都統祖植檜家奴然現為駐防外省之披甲今將駐防外省之家奴而披甲者不准購買則征行無跟役之人矣將軍㕘疏不符可發回之康熙二十九年二月初三日諭内閣九卿詹事科道昨嵗畿輔荒歉朕慮民食維艱或至流離道路既蠲除其田租矣復特發帑金三十萬兩并動支常平倉粟令該撫徧行賑貸盖期災黎得所毋使離散也今聞通衢相近之民雖已獲霑恩澤而僻壤窮簷究不能以自存致於越鄉去土者甚衆夫小民流移若此則司牧大吏所賑救者安在耶前所發三十萬帑金未審如何散給所在人民有無轉徙應遣部院大臣往加詳察至於四方流民率多就食京師今年五城粥厰雖經倍給銀米寛為其期但恐饑氓漸集無以遍贍㒺克均霑慈恵宜增設粥厰擇各部滿漢賢能司官俾親賑焉尔等其會議以聞康熙二十九年二月初三日諭内閣部院衙門事件恐以朕在外調攝致章疏稀簡可仍照常具奏朕總理自有暇也可通諭各部院知之康熙二十九年二月十八日諭大學士伊桑阿阿蘭泰學士朱都納西安博濟席喇布顔圖王國昌刼盜被鄰居之人及衆人擒獲或為被盜之家人擒獲皆應賞勵盜若抗拒捕者被創應依行間受傷例賞之其下該部議奏康熙二十九年三月初七日諭大學士伊桑阿阿蘭泰學士朱都納邁圖西安博濟布顔圖郭世隆王國昌所諭策汪拉布灘詔書及賞賚之物令理藩院選擇賢能司官一員送去交與達瑚著達瑚送往策汪拉布灘處自京師所遣官與彼地主事奔璽皆留住邉闗達瑚事竣言旋著馳驛來京此遣去官及達瑚同事之主事奔璽仍留邉外偵取消息不時奏報達瑚既迅速啓行所騎牲口及食物等項地方官毋得稽悞贍給充足令其前往可交理藩院兵部康熙二十九年四月初四日諭内閣此時亢旱米價翔貴八旗官兵秋季應支米石可預給其半康熙二十九年四月十六日諭内閣天時旱乾囹圄重罪已令清理今所在祈禱望雨甚殷除死犯以外凡拘禁枷號鞭責等罪咸從寛釋之康熙二十九年四月十六日聖祖仁皇帝御製文第二集卷八
