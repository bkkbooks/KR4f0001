body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻四十八古今體詩三十七首元旦朝罷四十三年瞬息間㒺知自惜鬢將斑晉秦豐裕羣情悦齊魯調饑萬姓艱經史保懷分善惡古今吏治辨賢姦一生終始此心在何卜新春樂解顔甲申春謁陵回鑾路經盤山有僧智朴呈接駕詩即用原韻二首廿載常輕歩年華去莫從古松分逺近老衲自舂容問及當時景猶疑隔嶺重山高勞脚力來往徧雲峰其二鈴鐸鳴山下田疇雨露恩是日㣲雨經聲連静舍法語閉柴門隱跡安無意清思禮世尊春風來拂面依舊是乾坤春雪晴望調寄㸃絳唇積素飄颻和風欲度千門曉冷時盡了禁苑梅花繞妙舞鶯聲歌詠清平調殘臘杳青春偏矯日影寒松杪康熙四十二年夏秋間恒雨為菑山左尤甚朕夙夜靡寜宵旰焦勞減膳撤樂坐不安席自冬至夏自夏至秋未嘗晷刻少安雖設法拯救㡬乎難保幸四十三年二麥大熟秋成頗佳饑者未轉溝壑窮者皆得衣食實非朕之凉徳所感賴上天之所鑒祐也故喜而不寐作長歌以示璇璣玉衡齊七政祇懼敏徳天眷命百志惟熙亮天功六府三事湏主敬天地無私本至公人事有違失五正水旱從來不可測全賴有司勉安定癸未夏秋恒雨頻二麥秋禾皆沒淪州縣無䇿萬姓逃父子流離呼蒼旻奏疏紛紛連早夜手書的的察憂貧蠲賦蠲賑詔數下民食維艱豈不詢截漕施惠恐不及遣官分飬誡沾均人力雖盡惟時難唯天至仁不絶食甲申春夏風雨調麥隴翛翛衆喘息夏苖徧野雙穗多輿情顔解去菜色山左編氓閒且樂畿南黎庶喜而康從此休息湏謹慎防灾備患豈有傷閑邪存誠勉官吏清廉奉職守封疆民脂民膏供爾祿痛癢莫知悮籌量宗子家相同胞義勿使叢脞述職方山莊書懷賜大學士待旦勤勤望雨晴京南塞北察安氓已知雲歛無霪潦未卜田間有稲稉八月秋成歡宇内四方風景解春卿大川舟楫同憂慽更覺凝承信洛英詠醫神聖豈能再調方最近情存誠慎藥性仁術盡平生山菊藍雀花雨過初凉至山花徧野馨雖無紅紫豔能使屬車停靜坐偶成靜中危坐忘機巧無覺有空色相消渾似太𤣥非可道利名終始定難摇賦得霜葉紅於二月花塞鴻初度驚霜信楓葉流丹樹樹紅最喜山林清俗念故應暫却世塵風看運河建壩處十月風霜幸潞河隔林疎葉盡寒柯岸邊土薄難容水隄外沙沉易漲波春末淺夫忙用力秋深霖雨失時禾往來踟躇臨淵歎何惜分流建壩多題邊景昭鳴禽圖青綠繽紛巧畫工鳴禽對對繞芳叢黃鶯能語吟高樹白燕低飛喜惠風騷人紙上貪春晝客旅邨中知氣融無意篷牕真偽辨枝頭猶帶豔林紅翰林魏學誠該直命大學士陳廷敬出題考得四方無事太平年朕喜其句而偶成四韻太平久逺湏憂慮無怠無荒即樂天教化原從風俗起觀瞻祇係廟堂堅精心可畏先賢語守法勿更大義全問道愚民何為願官清省事便豐年立冬微雨雪偶成朔風拂戸牖梅蕊報門䦨頒厯小春候同雲十日寒瓊花連雨潤侍女怯衣單念彼窮簷苦還思盤石安冬月微雨聞落葉寒條晳歴被風催霜葉紛紜雜雨來節届元英冬氣暖恐傷物性豈悠哉燈月文房戲作缸花冷月並爭光書幌牙籤御墨香先識薛濤盈淨潔揮來毛頴賦瓊章園中十種葡萄味甚甘美戲作近體一律以示南書房諸臣休誇大宛貴莫訝漢宮傳十種標名異千條帶葉鮮隨班命内侍分賜列忠賢飽食和心胃歸鞍賦木天乏良醫長息上池水偏疑夀世書七診理不再九候勢全虚肱折知良術身輕辨病除名醫非取利滌臟足心舒冬晴秋雨連綿道不通冬晴少雪喜清宮階前瑞草呈長至盆内梅花報色紅閉戸㸃文燒蠟短垂簾靜思萬緣空願言一善猶心定總覽經書衆慮同題閩粤進貢小香荔枝閩粤山川産綘囊味叅崖蜜色含香大官先散詞林客捧出瑶階和玉漿題墨竹原韻濃墨叢篁寫意生風枝欲動不聞聲虚懐還待寒松友記與瑶篇識重輕詠燈寒冬秉燭不成章欲解先賢命意長經史預分知善惡詩吟自辨性情良賦得梅雪爭春梅花十里香猶在雪白千山嶺益眀盈尺預知秋麥壯爭春豈不讓生生臘日調寄風入松衝寒待臘雪花飄詞意並琴挑嘉平嵗暮春光近朔風冽裘暖狐貂湏曉民間衣薄那知宫裏寛饒隆冬氣慘綘香燒披覽共仙韶氊簾軟幕凉還透微雲一抹散瓊瑶聼得梅將開也先看綠蕚清標季冬南苑十首鑾輿出禁門前隊已臨苑威徳如風行感恩似草偃其二麥叢還待雪苑靜那看風平野無塵蹟寒條逺近同其三講武不忘威勞農亦預知回看止輦處盡是嵗寒枝其四武職皆熊貔沒羽穿楊力所向任干城挽强視道徳其五三驅一面網雉兎正堪肥弦響無虚落日暮即收圍其六驥徳鄙千里飛黃汗血傳臨風嘶逺路蹋雪意貞堅其七赤精長耳速撮獸􅟥麋鹿迅㨗欺飛騰戀主犬為獨其八雄飛恥燕雀受緤志凌雲闊臆驚禽鳥鷹揚冠不羣其九罷獵歸鞍早樂施命大官分餐不畏冷祇恐夜間寒其十離宫乙夜靜堪將嵗月除懸燈覽奏摺終始復如初南苑晩雪七月傷多雨三冬少問天晴開逾至日雲作近新年獵雪宜岐麥銀花潤早田心勞催短鬢憂樂驗誰先總兵劉漢業補授肅州因地逺職重特書御製詩截句一首賜之以奬武職惜兵愛民之意也此去陽闗路八千總戎逺鎮磧沙邊欲知營伍精兵法遐邇懷柔似御前除夕晚宴辭舊迎新嵗事終未知來日與今同平生惡酒難堪飲一世勞心不計功滿座兒孫教樂善數班鵷鷺勸和衷此宵家宴逢除夕湏遣紛紜靜守中聖祖仁皇帝御製文第三集卷四十八
