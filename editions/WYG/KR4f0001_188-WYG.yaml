body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻四十九目録古今體詩四十一首興京駐蹕奉天府渡遼河所過松山杏山大凌河皆聖祖用武之地有述入山海闗廣寧道中永平駐蹕豐潤即事望海歊蒸暑氣賦得漠漠水田飛白鷺賜髙士奇示諸皇子賦得雨去花光濕風歸葉影疎出畿東觀秋成萬樹叢中月一輪詠林檎用皇三子秋日郊行應制詩韻八哥兒潞河發舟天津徳州東昌道中舟過濟寧入江南境經邳徐界上雨閱河渡揚子江金山寺月夜巡厯江南示意虎丘閱河之便奉皇太后臨幸武林是日喜晴雲栖寺西湖湖心亭閒覽宋臣蘇軾開湖溉田築隄瀦水杭民利之為政者不當如是乎鷲峰雲林寺菜畦行宮雨中望吴山閱浙江駐防将士射
