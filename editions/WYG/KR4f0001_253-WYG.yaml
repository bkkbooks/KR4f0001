body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷二十八雜著古文評論漢髙帝入闗告諭秦民重足而立如在湯火中一旦除苛法約三章人心所歸天命繫之漢室數百年之基業定於此矣為義帝發喪告諸侯申大義以動天下之心楚項雖强其勢已孤矣不必决之垓下之戰也罷兵詔豁達大度髙帝之所由興罷兵一詔其氣概尤可想見令諸吏善遇髙爵詔重爵位念勲勞有國之常經軫恤曲至倍見篤厚之誼求賢詔人材者國家之楨幹儲蓄而器使之惟患其不廣髙帝時取士之法未備宜其求之若渴也文帝議振貸詔民胞物與之懐形諸詔令自覺藹然如春養老詔引年尚齒三代之制具詳時存問厚賜予著為令典亦可謂善養老者矣賜南粤王佗書趙佗請罷兩將軍求親昆弟其有悔心之萌乎文帝賜書深自貶損詞意真朴佗之感服固其宜也日食求賢詔詩曰不顯亦臨昭事上帝之心無時可懈因日食而克謹天戒亦倍凛於平日爾除誹謗妖言之令詔秦多厲禁高帝滌除煩苛乃誹謗妖言之令至文帝時始除之亦已晚矣賜民田租之半詔蠲租一事乃古今第一仁政下至窮谷荒陬皆沾實恵然必宫庭之上力崇節儉然後可以行此文帝賜田租之半葢由此道也議犯法相坐詔聖王下車以泣罪人忍濫及其父母妻子乎議除收孥相坐律足徴仁厚之至勸農詔用意藹至敷詞委曲千載讀之猶足感動况當時之人乎勞賜三老孝悌力田詔廣教化旌廉吏深得致治之原俗臻和樂職此故歟除肉刑詔或謂肉刑除而民輕犯法不可以勝姦不知肢體既殘絶其自新之路慘莫甚焉易之以笞所全實多除田租稅詔文帝至是屢下蠲租之詔矣此真恭儉之實效非可勉行於旦夕者令祠官致敬無祈詔􅎟稷非馨明徳惟馨苟務修徳天休自至若徒以祠官之祝辭而欲為人君祈福果何為耶罷之洵為卓識䇿賢良詔親䇿賢良自此始詔辭簡質猶見古人風㫖議佐百姓詔念切民依務使家給人足而後已語語愷惻如見其憂勞之心定和親詔以四荒之外不安其生引為己咎是王者以天下為一家氣象遺匈奴書拳拳於寢兵恤民務期萬物各得其所卒致海内殷富粟至十餘錢則其明效大驗也景帝定孝文廟樂舞詔髙帝初定天下及乎孝恵之時百姓瘡痍未復文帝躬行節儉恩深淵流廟號太宗樂舞昭徳宜哉讞疑獄詔詔詞嚴眀有斷制然哀矜惻怛之意益可見矣治獄務寛詔書曰惟眀克允覆鞫迭訊不厭其詳所以廣好生之徳也令天下務農蠶詔崇夲抑末語語切至毋為墨吏所侵暴尤深中民隠重㢘士詔徴㢘以懲貪風正所以作士氣勸農桑詔文帝嘉恵元元閭閻之間可謂康阜矣至於景帝之時猶不忘勸課農桑史稱其克遵前業信不誣也武帝䇿賢良制申韓蘇張之習汨沒人心已久武帝䇿士慨然以則先王法上古為問兩京之經學昌明儒修蔚起肇端於此矣復䇿賢良制武帝感仲舒之對䇿因復䇿多士當時崇尚經術登進才賢意亦勤矣復䇿賢良制制辭屢進益切其於天人化理之源流可謂孜孜不倦矣養老詔恤老耆而及其子孫曲體人情之至䇿賢良詔武帝復徴賢良文學詔詞蔚然古麗足徴一代文治之羙興廉舉孝詔興㢘舉孝深以壅於上聞為戒至立為不舉之罰以懲二千石官長漢武之求材可謂切矣赦天下詔詔詞簡潔亦見古致置博士弟子詔興崇庠序奬進人材乃國家之急務漢置博士以尊經術實始於此賜三老孝悌力田帛詔朝廷之徳澤每患其不能下究慮奉行者之未善也縣鄉即賜毋贅聚可謂良法賜齊王閎䇿辭意嚴正能使聽者凛然賜燕王旦䇿建國之時申嚴邊備可謂長顧却慮矣賜廣陵王胥䇿武帝分錫茅土鮮克令終於此見封建之不可復行矣遣博士巡行天下詔遣使固有専責因以問民疾苦留意人材曲折詳盡深得詔令之體遣博士巡行江南詔致粟救荒善政也詞氣尤極懇惻封周子南君詔周有聖徳而漢未逺為之立後以修祀事與封三恪義同勅楊僕書歴數其罪無可逃避得以自效如更生矣此使過之法減内史地租詔興水利以便民復薄租入以寛其力損上益下之誠溢於言表察茂材異等詔人之才分不齊曷可拘以常格昔人相士謂於牝牡驪黄之外亦此意也賜會稽太守書嚴助與淮南王相結故非人臣禮治郡無聞其罪之小者賜吾丘夀王璽書時以東郡多事任夀王以都尉且兼太守之職倚毗至専其何以逭隕越之咎罷屯輪臺詔武帝於稽古禮文之事修舉廢墜俾三代典制燦然復興有功世道不淺乃不克遵文景之節儉遂致海内虚耗晚年悔悟已無及矣昭帝賜涿郡韓福等五人詔優賜有行義者使修孝弟以教鄉里較之居官盡職禆益尤多賜燕王旦璽書論情論理歩歩𦂳嚴結語更極警痛宣帝地震舉賢良方正詔宣帝銳意圖治是年春以嵗饑詔振農民甫三月又因變詔舉賢良皇皇不自暇逸中興之業已見一斑令郡國舉孝弟詔漢承秦敝敦夲行以挽頽風乃其要務故自文帝武帝皆致意焉罷車騎等屯兵詔戍卒之勞自古為甚特詔罷之恵民實政也遭喪勿繇詔以公家繇役致民不得𦵏誠為可憫詔詞惋惻入情首匿勿坐詔倫紀至重則首匿可原風化所闗自不得執一而論減鹽賈詔民隠之壅於上聞者多矣軫恤之方自當無㣲不至令郡國嵗上繫囚詔書稱惟刑之恤易言明慎用刑而不留獄此詔得之詞亦警動令二千石察官屬詔書曰非佞折獄惟良折獄察官屬以務平法得慎刑之道矣益吏奉詔念及侵漁百姓益吏奉以養其㢘深於愛民也使尚書詔問黄覇言不廹切而意實嚴核戒不禁姦邪詔致治有要惟務寛大不流於縱弛考名實不近於刻覈斯善矣元帝責丞相御史詔元帝初政汲汲以弭盜振饑為事足見願治之心蠲減律令詔肫切婉摯猶見忠厚之遺宮館勿繕治詔克守恭儉乃元帝之所長詔詞亦古質地震赦天下詔不為浮飾之言能宣欝悼之實亦詔令之工者罷珠崖詔懇惻之情溢於言表赦天下詔矜全民命惟恐䧟於苛吏之深文此史臣所以賛其寛𢎞也罷甘泉建章宫衛詔詞近質實意則周詳復責丞相御史詔亟於拯民之困圖維肫切情見乎辭罷初陵縣邑詔漢文最為沉鬱此獨以華贍出之已開唐人風氣賜東平王太后璽書委婉諄復足以啓人之悟班史謂元帝號令温雅有古之風烈於兹可見勅東平傅相詔傅相之於王任至重矣以詔勅督責之最得要領報貢禹貢禹以明經潔行徴葢㢘静寡欲之人也使之在列足以風示有位成帝減刑詔大辟之刑至千有餘條文法之吏得以因緣為奸者何可勝計成帝念及此亦可見其天資之善順四時月令詔引經據古文亦燦然舉博士詔儒官専司教化所闗至重固當慎選其人勸農詔漢之文景首重農桑優恤勸誡詳於他務成帝此詔猶有繩其祖武之意遣使者巡行郡國詔遡流民失業之由思所以振救安全之委曲周到具見誠悃禁列侯近臣奢僭詔辨等威崇節儉則僭侈不作而風俗可淳匪細故也食祿之家尤易流於奢靡令行自近深中􅑆要哀帝罷樂府官詔君子聽樂以平其心葢將於宫縣考擊之間求制作之夲原也若鄭衛之聲何可並列樂府以煩専官聖祖仁皇帝御製文第三集卷二十八
