body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻七目錄勅諭諭巴林長公主諭傅𢎞烈賫奏道臣劉曉諭内閣傳諭平南親王奄達尚之信賫奏人諭吏部諭將軍穆占諭戸部諭禮部諭吏戸兵三部諭撫蠻滅宼將軍廣西廵撫傅𢎞烈諭吏兵二部諭掌院學士陳廷敬侍講學士張英侍讀王士禎中書舎人髙士竒諭對秦吳黙納等諭大學士撫逺大將軍圖海諭吏部等衙門諭兵部諭中書舎人髙士竒諭刑部諭禮部諭吏部等衙門諭將軍穆占
