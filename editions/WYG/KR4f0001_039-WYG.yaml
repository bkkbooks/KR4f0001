body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻十七表上太皇太后進衣表康熙十六年十二月二十六日伏以聖慈埀裕啓萬年光大之圖景運維新極四海尊親之戴溥鴻恩於庶類配坤德之無疆錫懿訓於孫謀比春暉之有耀欣逄令節敬展微忱恭惟聖祖母昭聖慈壽恭簡安懿章慶敦惠温莊康和仁宣太皇太后陛下純仁積慶盛德凝庥髙厚難名至道永符於覆載禎祥駢集遐齡常竝乎升恒値寳厯之方亨仰璇階之正泰謹奉觴而介壽爰製錦以伸懷膝下本支百世長看戲綵宫中堯舜萬方共覩埀裳率土同懽普天咸忭臣夙承教誨永沐涵濡瞻繡服之光華樂慈顏之康豫伏願崇禧益茂睂壽増隆昭徽範於子孫享昌後燕天之盛廣嘉祉於民物彰歛時錫福之仁臣踴躍懽忭之至上太皇太后萬壽表康熙十七年二月初八日伏以慈德同天五福集箕疇之盛遐齡配地萬方騰嵩祝之聲岡陵獻瑞於瑶階永符安吉日月呈輝於寳算常竝升恒遠邇尊親寰海忻忭恭惟聖祖母昭聖慈壽恭簡安懿章慶敦惠温莊康和仁宣太皇太后陛下性成至德躬備純禧懿訓𢎞深範累朝而作則恩施高厚含萬物而化光啓景運於維熙正期頤之方茂南極光連寳􅄔隆名永戴重闈東風慶入韶年佳氣恒瞻二月肅綺筵而介壽捧玉醴以稱觴藉庭實之微儀冀慈顏之一顧懽生殿陛喜溢階墀臣祗奉誨言仰承鞠育合臣民之頌祝率子姓以賡颺伏願福嘏無疆壽祺增盛玉冊煥千秋之彩徽音偕星漢同昭瑶池埀五色之雲景祜與乾坤咸㤗臣踴躍懽忭之至上太皇太后萬壽表康熙十八年二月初八日伏以時啓陽和萬國祝呼嵩之盛天開旭景千秋樂無疆之休山川獻瑞於慈宫八方同慶河漢呈祥於内殿四海咸清逺邇尊親寰宇忻忭恭惟聖祖母昭聖慈壽恭簡安懿章慶敦惠溫莊康和仁宣太皇太后陛下性成仁聖德配坤貞日月竝光照率土而作範雨露浹洽明物理而埀恩遇佳節於雍熙被春風之浩蕩壽祉綿洪億禩福星臨耀兆年昭淑美之𢎞規崇高厚之懿訓岡陵擬頌進扁額以敷揚葵藿申誠賦詩詞而拜舞懽生丹陛喜溢彤墀臣服膺誨言仰承咻煦實邦家之共戴顧慈孝之相成伏願純嘏尤繁錫齡彌廣瑶池稱北斗之樽寳冊上南極之籙臣踴躍懽忭之至論愼幾微論易曰幾者動之微吉之先見者也夫天下之廣事物之衆其接於中而㪚見於外者至紛綸而莫可紀極然當其寂焉獨處萬感不交自人窺之罔測端倪而心之隱躍欲動者已灼然其不能遏此所謂幾也幾動而理與欲遂分是以古之聖賢於一念之發必審之於中曰此為理乎為欲乎理則擴充之欲則禁止之不待其滋長顯露而後為補救也以故理日長而欲日消昔大禹嘗以慎乃在位告舜而復推其㫖於安止幾康舜之庸作歌也亦曰勅天之命惟時惟幾夫不言事而言幾何哉蓋事顯而幾微也微則幽而難辨危而難持苟非察之於早而謹之於終則天命之在人者必漓心之安於止者必蕩軼而踰檢矣朕兢兢業業一日二日萬幾惟恐隱微之地有一端未善故日講求於先儒性命之學以務盡其誠意正心之功而猶恐未得其要也孜孜焉從事於惇頤之所謂思張載之所謂豫朱熹之所謂敬劼毖罔懈庶幾愼獨之方可企而全歟由斯以觀易與書之言幾猶大學之言獨中庸之言微顯也其道總不外於一愼而已矣然朕勉焉而未能自信也蓋人心道心消長靡定勢不中立或縱於一時而貽於久遠或疎於一事而誤及多端則其失非淺鮮也其何以無歉於聖賢性命之學乎哉無逸以致壽論三代盛時民風沕穆政令醇簡天下諸侯分治其國為之君者可以優游坐治矣乃聖君處此必兢兢業業宵旰不遑以自勞其神力然卒獲享遐福而成令名秦漢以降廢封建而為郡縣凡事之有關於宫府者無不奏請於天子其幾務之衆千百倍於三代宜為之君者日給且不暇乃或自圖便安至信神仙為可學輒為方士所誤曾不之返者何哉朕嘗觀於商周漢唐諸往事而得其故矣人君之所無逸者莫如商之中宗與高宗及周之文王中宗則嚴恭寅畏天命自度高宗則作其卽位不敢荒寧文王則懷保小民惠鮮鰥寡而考其享國之年此三君者最為悠久迄今無逸一篇班班可覩也人君之好逸樂者莫如秦之始皇漢之武帝唐之憲宗始皇旣并天下方士爭言不死之藥於是遣使訪三神山久之藥卒不可得武帝敬鬼神之事祠太乙建飛廉館作柏梁臺以招天神之屬游心芒思者數年究無左驗乃自歎愚惑憲宗詔求方士用柳泌為刺史求仙藥後服之日益躁渴夫中宗高宗文王之敬修其德而享福者若此始皇武帝憲宗之博養其生而寡效者若彼然則帝王致壽之道從可識矣宋儒吕祖謙曰敬之方壽之理也蓋無逸則主敬主敬則無欲無欲者仁也孔子曰仁者壽又仁則有德孔子曰大德必得其壽舜年百有十歲是也則壽之理亦視其德之盛衰為何如耳朕願後世之為君者無惑於神仙之説而第求之無逸之㫖則身與天下皆䝉其福矣君臣一體論泰交之治其惟唐虞之世乎天尊地卑自然之定位也泰之象乾下坤上天之氣下降地之氣上升陰陽交而成歲功也君尊臣卑百王之大經也唐虞之時君都而臣俞君吁而臣咈同其寅焉協其恭焉上下交而成治功也昔人謂天下猶一身君為元首大臣為心腹其次為股肱又其次為耳目又其次為爪牙天下之疲癃殘疾則癢疴疾痛舉切吾身者也而况於君臣之際乎三代以還堂廉疏逺志氣日暌上之情無以達於下下之情亦往往至於壅閼而難以自通政治之衰率由於此唐之太宗受言納諫時時延訪羣臣藹然有家人之誼故貞觀之政庶幾近古後之圖治者莫能及焉有明之世君臣濶絶至有輔弼之臣經年不一見顔色者凡出納之命皆假於宦䜿之手相沿不變以至於亡此上下不交之所致也我列聖相承上下一心志氣感孚罔不周浹朕嗣守丕基臨御以來無一日不與羣臣接見恒恐席崇高之勢不克盡羣下之情嘗讀易至泰之二曰包荒用馮河不遐遺朋亡得尚於中行言保泰之臣能以中道合乎君也泰之五曰帝乙歸妹以祉元吉言主泰之君能柔中虚已以應乎臣也五之義朕方自勉以仰企乎唐虞之治二之義則尚頼百爾有位一乃心德以匡不逮此又君臣一體之實也寛嚴論昔子産之論政也曰惟有德者能以寛服民其次莫如猛斯殆為鄭言之耳要非致治之本論也致治之本在寛仁今夫天化育萬物生之以春長之以夏成之以秋藏之以冬陰陽消息四序代嬗而其道歸於生生為用仁愛為極夫豈春夏寛而秋冬嚴歟古之聖王知其然體上天仁愛之心出而御物德以道之政以齊之刑以範之惟務化民於善閑民於義而已不忍制民以術怵民以威也是故五刑之屬三千皆本惻怛之心以出之而非慘刻峻削之為也夫物剛則折絃急則絶政苛則國危法峻則民亂反是者有安而無危有治而無亂三代之成事無論已秦用李斯挾荀卿之學行督責之令不數年而秦亡漢高以寛大為政入關而萬民大悦光武以柔道治天下而王業用興唐太宗聽魏徵之言崇尚教化而幾致刑措是古之帝王以寛得之者多矣未聞其以寛失也若後世祖述申韓之徒有謂民驕於愛聽於威非嚴不足以集事不知衰世之主百度廢弛馴致淪敗者其失在紀綱廢弛詎寛之謂哉朕撫綏元元期以純王之道化民成俗凡束濕之政弗敢庸也苛察之明弗敢尚也恐恐焉日慮其刑之重而德之薄夫寧忍從事於猛歟書曰克寛克仁彰信兆民詩曰不競不絿不剛不柔敷政優優百禄是遒詩書之言朕之蓍鑑矣愼刑論聖人之治天下有禮有刑禮也者所以勸民之為善也刑也者所以禁民之為非也五倫以為凖三物以為坊漸而摩之優游而自化之邪慝不作比户可封聖人之心豈不甚愜而勢有不能於是制為刑罰以驅之於後使天下之人􅌶然有所畏而不入於非彞是刑之設也聖人之所不得已也其輕者傷肌膚重者戕性命天下之慘痛至刑罰極矣聖人在上不能使天下無刑人而政平訟理一民一物卒無顛連困苦之虞者則惟此慎刑之道得也夫生人之性有善而無不善陷溺旣久匪僻廼生一旦麗於郵罰雖欲悔之固無及已故聖人之慎刑所以全民衷也雨露雷霆天之所以成歳功也而一歲之中雨露時行雷霆之用不數數見焉故聖人之慎刑所以順天道也在易之噬嗑其象為明罰勅法而卽繼之以賁曰無敢折獄豐之象為折獄致刑而卽繼之以旅曰明慎用刑噬嗑上離下震豐上震下離於義為明為斷而賁與旅皆有艮體於義為止聖人之意以為用刑之道貴乎明斷相資而必本之於至慎聖人之心如此其昭然而可覩也然則愼刑者所以止刑也書曰刑期無刑其謂是歟朕嘗謂欲天下之治必使刑獄清簡者誠有見於此也蓋惟刑愼則不濫善人無誤罹文網之懼刑慎則必當不善者無僥倖苟免之心天下雖大天下之民雖衆使為善必䝉福澤為不善必不可倖免則是非别白大道昭明㑹極歸極是訓是行而刑措不用矣學校論治天下者莫亟於正人心厚風俗其道在尚教化以先之學校者教化所從出將以納民於軌物者也是以古者家有塾黨有庠術有序國有學人生八歲自王以下至於庶人之子弟皆入小學及其十有五年則自元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學蓋自家至於國莫不有學自天子至於庶人莫不學自幼至於長莫不皆學几學有詩書禮樂以為之本干戈羽籥以為之文父子君臣長幼之道於是焉觀之六德六行之教於是焉取之所以淑其耳目手足之舉措而養其心以復其性以為修己治人之大者可謂備至矣是以當時之君子履信思順以事其上小人亦皆樂循禮而恥犯法侯撻不事而至治以興後世學校寖廣博士之途寖繁所以立教之方失先王之遺意士之遊其中者直以為利禄之階欲期道德之一詎不難哉且夫今之所謂教者誦讀焉而已爾而又弗實致其力以防其放僻邪侈之心使氣之充而識之明以漸求復其性其何以為修己治人之道哉故曰教隆於上化成於下教不明於上而欲化成於下猶却行而求前也教化者為治之本學校者教化之原欲敦隆教化而興起學校者其道安在在務其本而不求其末尚其實而不務其華以内行為先不汲汲於聲譽以經術為要不屑屑於文辭如是則於聖人化民成俗之道庶乎其有當也夫聖祖仁皇帝御製文集巻十七
