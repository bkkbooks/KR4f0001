body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十五古今體詩二十五首詠嶺外金蓮盛放可愛小令栁梢青萬頃金蓮平臨難盡髙眺千般珠蹙移花翠翻帶月無暑神仙俗人莫道輕寒悠雅處餘香滿山嶺外磊落逺方隱者誰似清間大城文安等處堤修完舟中駐蹕王家口積水頻縈慮長堤幸已成桑麻連井邑花栁近清明漸愜勤民意還深問俗情蘭橈經過處布榖喚春耕朕偶至潭柘覽老和尚照福畫像因而有感故作詩賜之法像儼然參涅槃皆因大夢住山間若非明鏡當臺語笑指真圖併戒壇賜皇太子生辰詩百歲桐長老千年松滿枝萬峰迎瑞氣億兆慶靈芝國舅佟國維六十夀詩以賜之領袖髙門稱退讓英華雅望冠椒房謙和不恃勳臣貴謹恪能承寵眷長鶴算天增籌國老松年仙授飬生方齊眉共享團圓慶特賜流霞捧夀觴靜明園喜雨西山初夏玉泉清暮雨隨風滿鳳城四野皆霑比屋慶八荒盡望樂豐盈密雲作連年駐蹕此城隈雲谷無塵金碧堆斗室何妨宇宙志晨昏常掖輦輿回石匣營作青嶺橫峰蔭薜蘿時方小暑緑新荷蒲編詩興光巖穴虎士桓桓扣角歌倣唐人戲作一村耕作兩村耕兩處緣來一處成下止豐亨上土旱南山落雨北山晴河流數轉河流去任性無常任性行萬物參差須格物一生何苦太關情讀書得風雲月露字因而分作四句中成絶一首吟風欲識詩書髓㺯月須參天地心莫遣雲塵繞八極時時湛露沛髙深塞外新秋松塞雲峰轉邊陲秋氣長楓林消溽暑柏葉送清香禾黍宜關外情懷喜夜涼年豐還重榖處處有餘糧夜聞雷雨大作曉賦志喜秋成望澤意懸懸駐輦山莊已數天雷送溪聲連夜雨爐凝香靄潤鸞箋開襟漏報殘鐘曙破夢茶敲活火煎半百無文惟自樂頓教心地作清漣賦得芳氣有無中大儒吟詠物正自託詩情氣質原含內芬芳逺向榮藕花中外直綘雪有無名惟願菊蘭氣山林勿使輕早起看雪凛冽朔風舞雪逶迤靜夜髙眠起聼藝窗萬籟依然尋句韋編詠盆中松竹梅各一首松歲寒堅後雕秀萼山林性移根黼座傍可託青松柄竹此君霜後青密葉欲停雪叢篁傍小山清節依然潔梅瓊林遺玉骨粉蕊趁氷姿香透芙蓉帳詩成度玉墀靜坐讀書自喻并序朕在暢春園萬幾之暇季冬寒甚連日風雪靜坐讀書自限文韻偶成二十韻自喻朕原本無學不過經書成語堆集成句卿等皆老學素望朕所深知其中韻腳不當平仄不和典故不穩聨句不雅者即速改正或成一篇亦未可知壯年好血氣半老少知聞顧諟惟當謹銘盤不至宭勵精勉圖治旰食盡民殷性理宗濂洛臨摹倣鵝羣煌煌勞夢想濟濟詠南薰懸鐘是進德止輦問停雲懷保編氓苦惠鮮鰥寡煴留心刑服念鄙笑圖書焚優禮任舟楫憑軒尊典墳前星誡琢磨帝子識羣分外戚無矜勢諸王惜舊勳烽煙熄萬里瀚海畏三軍淮黃關國計漕運致憂勤土木毋輕動民情宜所欣志廣則寬裕神清息俗紛由來惡旨酒自喻喜玄纁長歌詠白雪論賦小橫汾幾暇講寥廓提籌算紫氛乾陽得復轉測景考斜曛有始無終歎為山一簣慬詠鴈品清斂燕雀髙潔許賔鴻衡陽時有憶留伴佐雄風立春調寄太平時淑景維新爆竹聲手調羮詞臣載筆賦瓊英學西京鳯閣龍樓晝漸長物資生勸官勉力盡升平竹馬迎詠彈琴流水髙山志清音本自虛朱絃準古調和氣近宸居四十一年除夕書懷平生宵旰志七七又將過忘寢愁暘雨精心勉泰和送寒辭故歲待曙問民疴莫論新春媚預憐五噫歌賦得爆竹聲中一歲除是日微雪爆竹連宵不夜城占年積素即豐盈維新四始全仁政修省三朝冀太平拂曙和風臨上日通晨淑氣擁華清願將柏葉芳樽酒賜與臣鄰共太羮賜雲南法界寺講經溥畹昆明度法語滇海論新禪萬里雖云逺金經自有傳燈節戲作隱隱光風度栁條千尋銀箭列丹霄龍銜火樹開花看欲見山青待雪消聖祖仁皇帝御製文第三集卷四十五
