body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十九古今體詩六十二首康熙四十四年元旦用唐太宗元日舊韻午夜占天象平眀憶歲光旌旗旋轉動鐘鼓奏玎璫臨下開誠信守身勿自荒履端出寶厯正始勉巖廊聖道原無逺仁慈漸得昌位髙仰五帝責重倣三王惜物由心儉去華莫喜妝常懷兢惕誡遐邇願梯航賦得光風遍寰宇佳氣先春麗景殊光風遍拂到寰區新年二日逢齋戒去臘三朝讀典謨立志銘心閩洛理虛懷注念鬼神孚豈知人意皆從善愛此元元是鞏圖覽皇清文頴內大學士陳廷敬作各體詩清雅醇厚非集字纍句之初學所能窺也故作五言近體一律以表風度橫經召視草記事翼鴻毛禮義傳家訓清新授紫毫房姚比就韻李杜並詩豪何似升平相開懷宫錦袍賦得當戶翠峰稠限山鬟關顔杳冥巉巖石蒼茫逺近山案書無俗韻侍女有雲鬟靜省參三教動淪閉四關間來偶獨詠自笑為開顔閲河南巡出京五言排律十二韻五幸畿南域鳴鑾出帝京數巡乏鏡海減從省春耕人望返風吏官針留犢名治民屬大法分閫欲氷清豫動懷柔典觀瞻感慨情東臯迎淑氣綺陌擁霓旌凍解流澌逺寒遲惜歲更岸容新柳報堤候早梅驚日月幾何改神思逐物縈停車咨實政載路喜和平緑鬢將成白衰顔義自眀精微執一旨守久道心生乙酉仲春南巡船窗偶作調寄柳梢青大塊光風春疇一望滿目從容桂棹初搖牙檣始立淑色煙籠隄邊對對賔鴻村莊裏安平氣融樂志情深讀書意逺與古和同船窗對月小飲皎潔朧朧向晚明鮮雲細雨過帆輕上樽空設原非飲梅賦無花句亦成媚景依然鋪錦甸晴光更與助桃笙隔溪酒市迎流近轉岸遙聞笑語聲擬田家春日芳晨麥隴布風和片片如雲萬畞坡忽覩逺村垂柳處喧聲頗覺住人多過臨清閘岸轉蒲帆速檣回樹影低波傾閘勢險溜緊浪聲齊連嵗歌雲漢今春釋慘悽往還為赤子注意在黔黎南巡舟行會通河雜詠四首風徑寒猶在低篷抵博平麥畦青遍野方意近清明其二三載齊民飢多方濟一喘後先益在兹晷刻心難遣其三遲日雲煙靜芳春膏澤多時暘時雨望祝稔並祥禾其四案讀臨清流澄懷夕景悠敕幾逢事少吟詠敢忘憂河南巡撫趙宏燮陛見求訓旨故作截句一首賜之宣布撫安在已廉剛柔率屬要溫謙中州民俗多忠厚務使和平莫太嚴乙酉南巡途間觀麥少雨上巳日抵微山湖口閘春雨大霈因賦五言近體一首以志喜農事遍東臯心間不自勞閘添濟運水風送逐漁篙雨罩湖光隱春深日影髙遙觀兩岸麥樂志賦輕舠楊家莊新開中河得順風觀民居漫詠二首瞬息風帆百里餘往來數次過淮徐光隂猶似當年景自覺頻催點鬢疏其二春雨初開弄栁絲漁舟唱晚寸隂移廟堂時注淮黃事今日安瀾天下知駐蹕淮安一宿即過鵝黃垂柳迓清明野望湖邊逺碧橫古渡煙波春色好新堤靜溜水心平杏花才吐梅先盡鸜鵒偏言鶯未鳴迅速行舟惟一目何關有意與無情幸天寧寺空濛為洗竹風過惜殘梅鳥語當階樹雲行動早雷晨鐘接豹尾僧舍踏芳埃更覺清心賞塵襟笑口開朕每至南方覽景物雅趣川澤秀麗者靡不賞玩移時也雖身居九五樂佳山水之情與衆何異但不至曠日遲久有纍居民耳所以一目即過者亦恐後人錯借口實而不知所以然也至於茱萸灣之行宫乃係鹽商百姓感恩之誠而建起雖不與地方官吏但工價不下數千嘗覽漢書文帝惜露臺百金後世稱之况為三宿所費十倍於此乎故作述懷近體一首以自警又粘之壁間以示維揚之衆又駐塔灣見物華先存蔀屋重桑麻惠風遍拂維揚市沛澤均霑吳越家作鑑道君開艮嶽長噓煬帝溺瓊花澆胸經史安邦用莫遣爭能縱欲奢覽奏章少倦甲夜得寢又被清磬驚醒復睡夢中作成起時已忘少半故前後增補以成四韻賜紀蔭老和尚邇來未臨法書久不作字手澀難於運管字不甚佳春夢深沉新剎中陡聞清磬在鄰東方疑般若真非相不解金經盡是空鼻竪眉橫無著落胸寬意闊有塵籠毫光咫尺臨髙眺滿目江干淑景融長江靜浪歌傳來江勢最凶險萬里長流湍瀲灎蔥嶺分派自岷山江漢黑水界蜀陜逶迤東注百川歸縈帶如駛經諸磯風波雲霧全眇眇羣峰屹立暝煙微鐵鎖橫江原氣怯投鞭斷流借蓋威未若自然順天意無怠無荒廣川濟利涉須憑正剛柔分理全賴作舟枻仁者如斯稱水德治人御事先光霽最喜長江能容物更羡長江有寬厲每度無險浪且平登臨慷慨古今情未卜始終概難信願言永靜勿紛更自過江至常州府雜詠四首風平楊子渡舉棹過長江暮色林低水晴光月照窗其二愛竹為長緑南方已滿林喬松分路側並作映江潯其三夜過丹陽道紅塵不染帆氤氲存五內浩氣託經函其四延陵曙色闌意與渚田寬人盡農桑力文風表裏觀至閶門明麗山川列象輝光風輕艗帶煙霏雲隨御仗分河畔雨洗微塵花點衣虎丘一詠三天風雨百花催獨賞幽蘭倚檻栽俯瞰田間浮麥浪輿情足食即春臺自蘇州行至昏刻未到崑山河傍有竹林數畞晚風可佳故駐蹕於此賦得徑節疏枝帶晚風之句無意虛中得徑節非關強作有疏枝晚風不待春將老寸晷豈容年少時落照崑山掩玉色逺分秦望感人思初來更覺漁家樂援筆題箋歎暮詩雨中登玉峰萬井人煙春雨濃菜花麥秀滋丰茸登髙欲識江湖性染翰留題文筆峰船泊三江口滿眼湖山麗九峰負海隅沃野吳淞境橫雲館驛衢觀風來澤國非是喜靈區雨過泊舟處星連映水珠泛黃浦江飛渡浦江意自如午潮往返到階除欲知震澤分流處非是觀漁觸浪餘松江進鮮鰣魚有懷古有盛魚奉老親錦鱗初得尚方珍雖然星夜傳馳驛豈似鮮新出水濱駐蹕杭州府越境湖山秀文風天地成南臨控禹穴西枕俯蓬瀛容與雙峰近徘徊數句盈民心多愛戴少慰始終情西湖遇雨雨洗催花葉滿林柴門曉色靜沉沉微飄栁絮春光晚輕縠徐波見水心西湖戲作晴雨分山色臨流啓壯觀樓臺橫水面梵塔插雲端忽訝松間竹當誇巖下蘭風光被草木無處不成歡幸雲栖二首鳥道沿江問信潮石頭恬靜有歸橈轉移至險看洄洑盡得人防莫失調其二竹徑因依長緑苔桑田菜麥碧巖隈此來也為佳山水又恐遲行畏景催無錫惠山之作花盡春殘一徑深清流長惹百年心溪邊鳥語錫山麓坐對梧楸歎碧林回舟至常州府是夜甘霖大霈夏淺雲髙惜阪田江南比歲賴豐年麥秋遍野堪收穫靈雨愆期倍惕乾夜半篷窗聞浙瀝曉來練浦聼潺湲此行往返無他事益見民情逺近虔自鎮江之江寧調寄臨江仙一路江邊煙景千般鶯曉園林夕陽小屋暫容身松風清習氣麥浪得甘霖夾岸漁歌唱晚臨流按譜行吟肩輿遙指石榴隂怡情援筆録危坐待知音駐蹕江寧雨後幸雨花臺膏澍一夜雨初曉喜晴輝警蹕長千里鳴鑾不闔扉人勤並物盛官守莫心違出京遲日久怯暑便思歸織造處閲機房終歲勤勞匹練成千絲一剪截縱橫此觀不為雲章巧欲儉驕奢賭未萌自龍潭用戰艦頃刻至金山來往無濤如皎鏡江干極目逺峰連昔時血戰君山側今日平成萬里天見龍行並序四月三十日駐蹕金山是日申刻無風雷惟細雨一陳既過而西南現龍橫亘數十丈宛轉移時遂入雲端問及土人非起蛟也名為龍見以為祥瑞等語朕亦不以為異故援筆漫成見龍行以示隨侍在田在天連二五純陽變化參吞吐非如起蛟壞田廬又非密霧傷園圃雲端前後發祥光逶迤上下行有矩而乘六龍以御天不違施德普時雨有亢有悔有虧盈首出庶物用精明大哉龍德從其類發揮純粹須經營長江一派何泱漭素波萬里盡澄泓象震凌雲敦元氣日新顧諟玩無聲髙旻寺塔頂放光塔頂丹霄近光函宜日中成平願地久熙皥似山崇不識曇雲法先知寰海同回舟何怪速心急盻潮風回鑾中河三首風雨中河阻心旌北望遙歸舟吳越逺不必憶溪橋其二江南苦雨多冀北少靈雨此念未嘗忘此心鑑萬古其三錦纜牽舟逺蒲帆逐浪深回看舊蹕處不競自澄心千葉蓮池夜聞雨滴之聲田田荷蓋雨聲齊樓蕊繽紛向晚迷樹葉不愁點翠幄秧針豈憶灌青畦密林有意通宵響茂草無知遍地萋偶爾喜吟今歲好漫將詩句入新題詠畫梨花最愛梨花白又惜同春老惟此畫圖中冬夏長美好不令風雨摧且無蜂蝶嬈靚妝伴月容盡在紙間造惡紫嫌奪朱素體物難攪三品運胸中六法生卉草乙酉秋日山莊偶成山花野菊喜清風塞北煙光報嶺楓無暑不知秋氣至數叢蘭蕊放離宮一路清廉圖青蓮挺挺不汚泥豈被重波亂性迷雖有羡魚心尚在清風由是見崇題賜吏部尚書宋犖豫告還里久任封疆事蘇臺淨點塵東曹班次重北闕性情真憐舊吟風度無文餞老臣林泉益壯志當樂故鄉春大病少愈見春至述懷神衰意絶見新春忽報春風送紫晨淑氣雖催首正節病軀不改定中身心傷億兆惜皇極血盡黎元愧聖真此後如先意未卜紅塵碌碌阜人民春日有所思二首淡抹濃妝總是新白鬚慵懶度三春若非碌碌紅塵縳近得清心飬谷神其二疊疊愁腸無日舒春風細雨緑芳初詩中乏興疑新句自問何傷露地居五臺有懷又到清涼境巉巖卷復垂勞心愧自省瘦骨夕鳴悲膏雨隨春令寒霜惜大時文殊色相在惟願鬼神知大學士張玉書挽詩文章末齒秉絲綸舊德凝承近紫宸瀚海天山同正略江干河道與嘗新表賢未及身先沒頤飬空談夢後湮揮淚長歔歎佐斗從來傷痛肅雍臣孟秋涼風初至白髮詳詞切勞心至語煩蟬鳴催木葉月映冷泉源雲去天疑近露凝草益繁山村題舊事唯德遍黎元賦得秋水共長天一色江渚長天一目收滕王風送引扁舟當年未識文章巧唐世詩詞並水流新秋蟲聲咽晚涼雲斂天涯外何處尋髙山知音在一會聖祖仁皇帝御製文第三集卷四十九
