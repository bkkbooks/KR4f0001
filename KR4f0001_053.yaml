body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷二十四頌福陵頌并序惟上帝鑒觀下民誕畀神聖俾立君極以開闢草昧埀統億祀非甚盛德曷克應天順人而締造鴻業焉我太祖高皇帝聰眀睿知本於性生英武勇略迥不世出故能躬著戎衣手提尺劒而疆宇日拓丕受景命顯庸東國騰威區夏雖太王之居岐翦商文王之江漢歸化未足方斯赫濯也豫小子仰荷列聖丕基統御萬國昄章式廓隆古圖籍所莫覯矣然上迹聖祖當日一成一旅櫛沐風雨斬刈荆棘張彼撻伐順者綏之逆者殄之統一羣部建元正位國始立焉既乃鞠旅徂征遐邇讋服悉臣悉氓遂定鼎遼土而王業愈光顯矣於戲盛哉惟天生聖惟聖奉天我太祖創業之艱如彼而埀統之逺如此豈非天實授之而克荷厥休者哉豫小子景仰謨烈奚敢忘紹述焉爰作頌曰於昭太祖誕膺景命允武允文體協仁聖天罰恭行赫然割正啓疆東海聿懷兆姓戰罔弗克威略如神德罔弗冒桀驁咸臣受籙踐祚帝厯鼎新建官立制王路丕遵爰誓六師濯征明國以少擊衆羣醜胥殛長驅鐵嶺墮彼厄塞芒芒遼瀋隸我版域會極歸極乃建皇都大統肇迹炳埀帝謨在昔湯文蹶起一隅先聖後聖同軌合符皇哉龍興山川孔固寢園崔嵬風雲盤互玉衣鐵馬百神衛護仰頌先猷萬年錫祚昭陵頌並序國家垂厯服無疆之休類必有神聖開天肇興王業又必有神聖繼體式廓鴻基故能經綸宇宙積功纍仁保世滋大我太宗文皇帝挺濬哲之資蘊欽明之德紹膺寶位纘前謨而光顯之外奮威武內修文教百度具舉臣民胥悅於是南征則墮巖關繞明都耀兵燕趙鞠旅齊魯投鞭渤海飲馬黃河六師安行莫我敢遏東征則誅二綏服朝鮮納款列為屛藩西征則三十五部厥角歸命貢賮奉朔蓋其允塞之猷桓撥之略赫濯於覆載間矣乃若惇九族惠元元郊圻以飭爵秩以班賞善宥過優禮勳舊求賢之思若渴崇儒之化丕隆雖古帝德廣運曷以加焉當是時義問炳爍仁風翔洽一統之規已裕矣猶畫境息民俟天休命於戲皇哉盛哉昔殷祥長發而湯受之周室本支百世而文啓之若我皇祖詎有遜美豫小子嗣承丕緒撫安海宇以𢎞億萬祀之業紹述祖德敬揚先烈乃作頌曰猗歟皇祖克配彼天光被四表仁泛八埏既受共球神人攸主至治洋洋𢎞謨訏訏桓哉七萃撻彼南疆匪疚匪棘兆人是匡徂征朝鮮爰渡鴨緑聲其攜二綏其臣屬西荒千帳慕義同歸鐘鼓始振稽顙莫違至化覃敷函夏率育天錫大寶景命有僕曰崇儒雅曰敘彝倫五章五用式迪俊民法度孔昭典常聿正嫓美唐虞惟后克聖建中錫極詒我後昆皇皇大烈億祀彌尊肅望山陵光華燀赫永言埀裕敬承靡斁孝陵頌並序蓋聞乾苞合契誕開長發之祥坤極育靈永錫丕承之祚是以溯若水者誦顓頊之遺風登穀林者仰陶唐之餘澤莫不煒煌瑶牒炳爍珍符垂裕萬年流輝千載况乎當紹庭之日篤纘緒之思覃厚既深覲揚滋切者乎我皇考世祖章皇帝躬上聖之資啓維新之運宅中圖治保大定功舞干羽於兩階武昭文洽受共球於萬國遠至邇安峻德𢎞勳懿綱釀化至矣盛矣蔑以加矣肆豫一人嗣膺厯服方厪纂承之志彌深對越之心展謁孝陵式瞻園寢驚秋霜之始肅感春露之初濡光烈宣昭僾在見聞之內聲靈赫濯儼然陟降之前敬申繼述之情用廣敷陳之義爰拜手稽首而為頌曰奕奕孝陵蔥蔥佳靄多沛艾兮土脈淳和地靈清泰無塵磕兮五峰屏嶂三臺襟帶拱內外兮王氣如龍紫雲如蓋紛來會兮猗歟皇考陟降往來常在兹兮桂宫蘭殿繡磶文榱鬱參差兮鸞旗羽葆蒼虯翠螭何葳蕤兮太和充溢景光淑熹亘四維兮琬琰在房圖球在序神所處兮金穗宵明玉衣晨舉永終古兮如接形聲如聆笑語我聖父兮以妥以侑式垂懿舉昭來許兮我寵受之蕃衍鴻龎命溥將兮紹聞衣德繼序其則不愆忘兮凝休篤祜錫祉儲祥一人慶兮本支百世詒燕無疆祚靈長兮大德景福頌並序恭惟聖祖母太皇太后躬備聖德天錫純禧作配我太宗文皇帝內廷翼贊肇造邦家誕育我世祖章皇帝瑞應昌期撫綏函夏爰及小子纘承基緒十有六載恩勤鞠育莫罄名言訓迪𢎞深難於殫述蓋皇天眷佑我國家篤生聖哲母儀後昆以為積慶凝祥之本猗歟盛哉啓百代之鴻圖樹千秋之懿則備纍朝之孝養極四海之尊親德福兼隆康寧壽考曠古以來未有若我太皇太后之盛者也臣日侍慈闈欽瞻懿範戴天地而莫能窮其高厚仰日月而莫能繪其光華顧念罔極深恩敢辭固陋敬揚萬一冀展微忱爰拜手稽首而獻頌曰天開景祚運際龎鴻太祖啓宇嗣以太宗文武神聖帝業光融惟聖祖母大德嫓隆純仁至孝克儉克恭茂修內治佐厥成功逮我皇考誕膺天祿沖睿承乾海宇賓服允賴聖慈劬勞顧復式訓寬仁垂型雍肅德洽萬邦恩流九族以天下養奄受多福越豫小子大業祗承帡幪啓佑仰戴慈寧仁如天覆靜比坤貞𢎞綱大政懿訓是程勉以懷保惕以勵精孫謀宏遠壼教光亨漙愛宣慈秉禮度義端莊誠一萬善咸備穆處深宫含𢎞庶類德化殷流惠風遐暨顯號鴻名昭埀後嗣寶册騰輝瑶編紀瑞聖人之配誕生聖人古惟太姒今兹比倫壽祺正茂休祉駢臻本支百世子孫繩振慶延家國光被臣民億萬斯年景祐常新聖祖仁皇帝御製文集卷二十四
