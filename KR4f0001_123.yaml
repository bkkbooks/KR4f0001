body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷十六敕諭諭勇略將軍趙良棟頃尚書馬齊自寧夏回奏卿臥病不能動履用是深軫朕懷念卿師旅舊勞諳悉邊務耆年里居正可時與咨訪乃抱疴日久頤養為要特賜以人參鹿尾馳示存問尚其善加調攝俾夙疾頓痊副朕眷注至意特諭康熙三十六年正月十七日諭大學士伊桑阿等揚州淮安徐州等處被災錢糧該總督巡撫奏請蠲免疏至即與全蠲康熙三十六年正月二十二日諭吏部都察院國家設立都御史及科道官員以建白為專責所以逹下情而祛壅蔽職任至重使言官果能奉法秉公實心盡職則閭閻疾苦咸得上聞官吏貪邪皆可釐剔故廣開言路為圖治第一要務近時言官條奏參劾章疏寥寥雖間有入告而深切時政從實直奏者甚少此豈委任言路之初指乎自今以後凡事關國計民生及吏治臧否但有確見即應指陳其所言可行與否裁酌自在朝廷雖言有不當言官亦不坐罪自皇子諸王及內外大臣官員有所為貪虐不法並交相比附傾軋黨援理應糾舉之事務必大破情靣據實指參勿得畏怯貴要瞻徇容隱即朕躬有失亦冝進言朕決不加責其有懷挾偏私借端傾陷者朕因言察情隱微自能洞悉凡屬言官尚各精白乃心力矢忠讜以無負朕殷切責望至意爾部院即傳諭行特諭康熙三十六年二月初四日諭吏部等衙門朕頃以狡寇噶爾丹未滅調度軍務親蒞塞外因念民依巡歷邊境所至咨訪目擊山西陜西緣邊一路地皆砂磧難事耕耘人多穴處類鮮恆業其土壤磽瘠固已生計維艱而地方遼遠疾苦無由上聞大小官吏不能子愛小民更恣橫索遂使閭井日漸虛耗比年用兵以來一應軍需芻糗俱動支正項錢糧儲偫供應從不取辦閭閻乃各府州縣官員借端私徵重收火耗督撫布政使等官又不仰體朝廷恤民至意糾察貪汙禁革加派反多瞻徇曲庇又或督撫庸懦懈弛因而筆帖式及衙門人役無所忌憚擅作姦斃以致民生滋蹙朕心深切軫惻今外寇已經蕩平惟以綏乂地方拊循百姓為急務山陜兩省關係緊要應作何撫恤休飬著九卿詹事科道會同詳議具奏特諭康熙三十六年五月十九日諭大學士伊桑阿阿蘭泰學士三寶楊舒羅察席爾登爾等可傳諭兵部選擇少壯而善馳騁者或司官或筆帖式一員馳驛速往山西巡撫倭倫處問伊招撫之事已經若何並沿途田禾及天時雨水協和與否詳閲以還康熙三十六年五月二十三日諭大學士伊桑阿阿蘭泰爾等傳諭工部或司官或筆帖式選善馳騁者一員馳驛前往閲視黃河今年水勢若何河上工程若何興工者何處明白閲視並咨詢河道總督而歸歸時沿途田禾及雨水情形悉閲看以聞康熙三十六年六月初七日諭提督江南學政學士張榕端提督浙江學政侍講張希良自古帝王治天下率以興賢育才為首務稽察前制各省學政皆用詞臣董率之任至重也近來士習未變文事未彰良由督學各官不能仰體朕意兹特命爾前往江南浙江等處提督各府州縣學政爾尚端軌儀崇經術勤勸課嚴坊刻振維新之典革積衰之斃毋炫華而遺實毋避怨以市恩俾士有真材國收實用南土人文所萃尤冝加意作新多方鼓舞以稱朝廷培植人材至意所屬司道府州縣及提調等官凡關係學政者聽爾據實考核及禮部題準申飭事冝俱當著實舉行向有傳諭嚴禁考試情斃爾當恪奉遵依至於本處督撫各有攸司不得互相干預如遇公事交接暨文移往來俱照平行其布按都三司接見禮儀往來文書有干係學政者俱照巡撫衙門例行爾受兹委任務嚴絶情面一秉虛公振拔孤寒澄汰汙賤教士有程取文有法俾士風丕變時惟爾功如或蹈常襲故違命曠職亦惟爾罰爾其慎之故敕康熙三十六年六月十五日諭明史館監修大學士伊桑阿張玉書李天馥吏部尚書熊賜履總裁户部尚書陳廷敬禮部尚書張英原任左都御史王鴻緒朕惟百祀之成模備於載籍而前代之信史定於興朝故事具存允關巨典粵若有明受厯二百七十餘年其間創守之規盛衰之勢人物之臧否制度之損益與夫天官地輿兵刑食貨諸大政莫不散在簡册歷歷可稽顧歲月寖久聞見異辭附會既多錯忤益甚使非折衷至當何以埀示來兹朕萬幾餘暇於有明實録諸書屢厪披覽當洪永開國之際創業埀統綱舉目張立政建官法良意美傳諸纍葉雖中更多故而恪守祖制足以自存又十六朝之內宫禁毖嚴而女主不聞預政乾綱獨御而權姦不敢上侵統論一代規模漢迄唐宋皆不及也惟是晚近諸君生於深宫之中長於婦寺之手不能接對羣臣巡省風俗以致民隱壅於上聞軍務日益弛廢逮末季朋黨滋繁一時大小臣工悉固私交而行欺罔遂使國是淆亂盜賊恣猖役重賦煩邊腹交困而明祚馴至衰危矣直道在人公論難泯史書至重傳信為冝朕數召儒臣面加訓諭自開局纂修以來歲久未告竣事欲期速蕆冝專責成兹特命爾為監修總裁官爾其董率分纂諸臣旁採舊聞時勤討論事當核實議必持平毋膠已見而意涉偏私毋狃積習而語鄰矯激務使褒貶適中是非有凖綱立而條不紊言簡而事不遺用成一代信史以副朕委任至意爾其勉之欽哉康熙三十六年八月十四日諭內閣陜西山西兩省文官缺出可令吏部奏聞朕親選賢能者調補之康熙三十六年九月二十日諭宗人府禮部國家樂育人材振興文教將使海內英俊之士莫不蒸蒸蔚起矧宗室子弟繫託天潢豈無卓越之姿足稱令器允冝甄陶奬勵俾克有成考諸前史以公族應制舉入仕者代不乏人今屬籍所載日益繁衍除已授爵秩人員外間散子姓素無職業誠恐進取之途未闢嚮學之意漸隳嗣後八旗宗室子弟有能力學屬文奮志科目應令與滿洲諸生一體應試編號取中如此則賦質頴異者咸服習於詩書而學業成就者不阻抑於仕進凡屬宗支人人得以自效而於朕興賢睦族之至意亦用是以允愜焉爾等衙門即遵諭行特諭康熙三十六年九月二十八日諭兵部軍政大典五年一舉所以黜陟將辨砥礪官方使賢者知勸而不肖者知警關係甚重每見督撫提鎮不能實心奉行輒向所屬需索部費恣意誅求因而將辨以下節次朘削重為兵害至於所舉所劾或瞻徇情面或曲庇私交扣剋額餉虛冒兵糧濫受餽遺虐取規利真正貪酷及衰懦闒冗不能騎射之員不行糾劾止將微員細事草率塞責以致貪酷庸劣之輩無所戒懲而守法奉公宣勞盡職者遏抑不彰無所激勸殊負朝廷旌别淑慝之至意爾部可即通行各省督撫提鎮這次舉行軍政務矢公愼力破積斃俾舉一人衆皆以為賢劾一人衆皆以為不肖庶激揚咸當而國家允收得人之效儻因循陋習不加悛改後有發覺定將上官一並從重治罪特諭康熙三十六年十月初十日諭大學士伊桑阿阿蘭泰去歲中路大兵遣車克楚祁薩穆往探噶爾丹營盤伊等身抵其地偵視而歸因此曽將車克楚祁薩穆俱授拖沙喇哈番之職與伊等同去之蒙古亦俱授以官職矣但彼時未曽示諭該部今敕兵部議之並令移會吏部康熙三十六年十月十二日諭內閣下河地方久罹水患朕心時切軫念前命挑濬白駒岡門等口原欲使水盡通流田皆涸出今見興化泰州等州縣積水尚多田仍淹沒民生甚屬苦纍著行文總漕總河親往會勘將下河積水何故壅塞不能迅流應作何盡令歸海涸出民田之處一一詳閲議奏康熙三十六年十月十五日諭户部比年出師討寇總為中外生民永圖休息故不憚軍興征繕之煩遠歷邊塞其一切飛芻挽粟皆動支正供額賦不使纍及閭閻獨是大兵牧養馬匹及三次師行出入皆經山西地方緣邊各州縣衛所固屬勉力急公其餘諸郡雖非師旅所經亦有協辦轉輸行賫居送之事又該省歲屢不登穀價翔貴民間生計甚屬艱難朕乘輿頻臨目所親覩軫念殷切未嘗一日釋懷昨歲曽有諭旨俟噶爾丹殄滅之後誕布德音渙敷庥澤今寇氛盡滌邊境輯寧是宜格外加恩用綏黎庶康熙三十七年山西通省地丁銀米著一槩蠲免爾部移文該撫令遍飭所屬實心奉行家喻户曉務俾深山窮谷均霑朝廷德惠儻或借端征派澤不下究事覺定行從重治罪爾部即遵諭行特諭康熙三十六年十月十五日諭大學士伊桑阿阿蘭泰右衛屯駐禁軍原因噶爾丹之事預為之備也今噶爾丹之事已畢此兵仍令全駐則供給芻秣轉運維艱可留滿洲驍騎一千其蒙古分編佐領駐防之兵全行留駐此外護軍及驍騎火器營兵俱應調回四十九旗之貧乏蒙古有令沿邊居住者俱察出遣至右衛歸𨽻蒙古佐領下作為甲士此駐防禁軍應即撤回抑候時氣和暖後撤爾等與議政大臣會議以聞康熙三十六年十月十七日諭方略館總裁大學士伊桑阿阿蘭泰王熙張玉書李天馥吏部尚書熊賜履禮部尚書張英朕惟自古帝王御宇欲億兆永底於時雍必遐荒無間於聲教故攘外乃以安內蕩寇斯可寧人理則相因事非得已我國家肇造區夏混一車書功業懋昭聲靈遐暢朕纘承丕基孜孜圖治惟期海宇嚮化使世登熙皥時慶諴和乃厄魯特噶爾丹者恃其險遠輒肆跳梁藉喀爾喀搆怨為名擾我邊陲侵我內地屢經懲創而頑黠不悛疊布恩施而負固自若朕思邊徼一日弗寧則民生一日不靖與其每歲遠防曷若一勞永逸爰親總六師三臨絶塞踰越險阻衝冒炎寒深入不毛之域直窮大漠之鄉仰賴天地祖宗之靈社稷之福克殄巨憝掃清蟻聚寰海自此升平人民得以休息是用益切勵精勤求化理而諸臣咸謂進剿機宜悉出朕躬指授一時稟命密議罕傳諸路行師勞心最久若非宣付史館無以埀信將來再四懇陳勉從所請於康熙三十六年八月二十二日開局纂修特命卿為總裁官卿其督率在館諸臣次第詮訂資衆手之編摩蕆三征之令典豈曰鋪揚簡册用張撻伐之威庶幾昭示來兹不忘艱難之自卿其勉之欽哉故諭康熙三十六年十二月二十二日聖祖仁皇帝御製文第二集卷十六
