body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷七敕諭諭巴林長公主淑慧長公主體中安否公主孝敬性成諸事無不周詳即至微之物皆極精美每年各種油凝乳餅并羊臘等件進奉太皇太后及朕者尤極誠恪故太皇太后聖祖母時增匕箸朕亦為之加餐念姑常從逺處賫送思特製衣相寄未有式樣因將薩哈爾察貂皮外褂貂􅀈袍并鈕扣又製帽黑狐皮一張文綺內縀表裏各十端付之來使若不以輕微可製衣服之天氣嚴寒遣人未便故詳布朕意附札以往康熙十六年十一月二十五日諭傅宏烈賫奏道臣劉曉將軍傅宏烈為國忘家黽勉效力所奏諸事俱係當今急務區畫周詳朕甚嘉納爾歸傳與傅宏烈此後益當整頓師旅速滅賊寇以副朕出民湯火至意康熙十七年正月十一日諭內閣傳諭平南親王奄達尚之信賫奏人昔爾老王在時果品細物無不誠潔二年以來粵東事變道路阻塞信使不通念及爾老王素日忠貞不貮為國忘家罔不憫傷今王能承先志恢復粵東使人逺來請安兼進橙子可嘉但用兵之秋非比無事之時况見此物不勝思念爾老王王當安戢地方恢復粵西湖南以全爾老王未盡之意朕心甚為期望此等細務勞人費事勿復為念已後暫止康熙十七年正月十二日諭吏部自古一代之興必有博學鴻儒振起文運闡發經史潤色詞章以備顧問著作之選朕萬幾時暇遊心文翰思得博洽之士用資典學我朝定鼎以來崇儒重道培養人材四海之廣豈無竒才碩彥學問淵通文藻瑰麗可以追踪前哲者凡有學行兼優文詞卓越之人不論已未出仕著在京三品以上及科道官員在外督撫布按各舉所知朕將親試録用其餘內外各官果有真知灼見在內開送吏部在外開報於該督撫代為題薦務令虛公延訪期得真才以副朕求賢右文之意爾部即通行傳諭遵行特諭康熙十七年正月二十三日諭將軍穆占爾所密奏事宜朕已悉知前議政王大臣所議因無接濟之兵令爾前進今賊將韓大任窮蹙來歸諸處俱已尅復江西全省將士皆有餘暇故著簡親王與爾㑹同酌議移文想尚未至爾是以先為陳奏耳在廷所議乃合諸路情形統籌全局覽爾將軍等所奏各執已見者甚衆此皆無濟於事嗣後須當同心勉力無負委任將軍身體如何彼處諸將士佳否原奏發回特諭康熙十七年二月初四日諭戶部錢糧關係國家大計年來各處兵馬需用糧餉最為浩繁在外總督巡撫及經管錢糧各官俱宜潔已奉公殫心料理一應支放開銷務須嚴加稽核詳慎節省方於軍國有禆近見各處奏銷或製備物料並不先行題明藉口軍機緊急濫請銷算或不行察核重復支給又不為扣抵或朦混重領希圖利已致滋糜費以及侵欺浮冒種種弊端難以枚舉以後應作何嚴行禁飭處分爾部㑹同吏兵工三部詳議定例具奏特諭康熙十七年二月初九日諭禮部皇后鈕祜盧氏端懿夙著作配朕躬奉事太皇太后皇太后恪恭婉順殫竭孝忱正位宫闈節儉寬仁克襄內治芳型伊始淑德彌彰兹於康熙十七年二月二十六日崩逝追念壼儀良深痛悼宜有稱諡以埀永久著內閣翰林院㑹同擬奏其應行典禮爾部詳察速議具奏特諭康熙十七年三月初二日諭吏戶兵三部朕統御寰區孜孜圖治期於朝野安恬民生樂業共享升平乃副朕宵旰勵精之願不意逆賊吳三桂背恩煽亂各處用兵禁旅征剿供應浩繁念及百姓困苦不忍加𣲖科斂因允諸臣節次條奏如裁减驛站官俸工食及存留各項錢糧改折漕白二糧顔料各物增添鹽課鹽丁房田稅契牙行雜稅宦戶田地錢糧奏銷浮冒隱漏地畝嚴行定例處分用過軍需未經報部不准銷算以上新定各例不無過嚴但為籌畫軍需早滅逆賊以安百姓之故事平之日自有裁酌各省督撫提鎮大小文武等官俱宜上體朕意下念民生潔已奉公愛惜物力務期早奏蕩平與民休息以稱朕乂安海宇至意爾三部即通行傳諭遵行特諭康熙十七年三月十二日諭撫蠻滅寇將軍廣西巡撫傅𢎞烈覽卿所奏安人心固內地𠞰賊之策一一悉備疏內頒㫖及部議不甚如意又一時更換撫院藩司心甚疑畏暫允其請俟廣西平定再為更易未為遲也等語以後朕自有裁酌疏內河南緑旗兵三千北邊緑旗馬兵一千福建藤牌手一千或江西贑州鎮標挑兵一千著前營遊擊管天祥帶領迅赴臣營臣得此添兵五千便可獨力前征等語但調北邊緑旗官兵途路遙逺不能無慮近省緑旗官兵但有可調務允所奏疏內用其弟帶領官兵來守梧州等語此人離粵日久難以復回又恐其兄有疑心也密陳之疏留中其廣東布政司一事髙州官兵一事滿洲大兵一事已有密㫖著部議卿國爾忘家勳猷夙著恢復潯梧斬賊巨魁屢屢有功因賊負固踞險一時不能即效卿愈加勤力𠞰撫粵西掃蕩逆氛以副朕倚任至意特諭康熙十七年三月十六日諭吏兵二部向以閩省海疆要地雖經恢復海逆未平民生凋敝撫綏防禦全藉文武大吏殫心料理方於兵民有裨今總督郎廷相提督段應舉自簡任以來為時已久山谷之伏莽未靖閭閻之困苦未蘇吏治未見澄清營伍漫無整頓寇警頻聞地方騷擾更有甚者海賊侵犯內地事前不能防禦事後不能堵𠞰皆由該提督庸劣無才職業不修殊負簡任之意豈可仍令在任貽誤封疆著大將軍康親王參贊大臣靖南王及鎮平將軍㑹同嚴加確議密行具奏爾二部即遵諭行特諭康熙十七年三月二十四日諭掌院學士陳廷敬侍講學士張英侍讀王士禎中書舍人髙士竒朕召卿等編輯適五臺山貢至天花鮮馨罕有可稱佳味特賜卿等使知名山風土也康熙十七年閏三月二十一日諭對秦吳默納等爾等聞有皇后事欲以告祭長白山事畢將所委諸務暫停來京固是但來已無及且烏喇等處未可頻行遣使可將大小事宜逐一料理完結從容歸來朕於二三月間體稍違和今已安善爾等佳否康熙十七年閏三月二十五日諭大學士撫遠大將軍圖海卿向在機密重任澡德浴身志節髙潔奉命西征早清巨寇宣布德意兵過之地秋毫無犯舊德老成可謂社稷之臣前者拉都戶來知卿平安朕心良足慰也今因拉都戶復回汛地故示朕意特諭康熙十七年四月初五日諭吏部等衙門國家設法定例原期章程盡善埀之久逺上裨軍國下益民生必藉內外臣工精白乃心恪恭詳慎實心奉行方克永遵而無弊近見各處章奏凡於現行之例或借端營私巧為掩飾或推諉卸過冀免處分或徇庇情面曲為彌縫凡行一事每滋弊端以致良法美意澤未下究而纍已及民揆諸立法初意殊為未符此等情弊科道官雖有風聞因無確據難於指參朕雖洞悉緣由期其自行改悔不加深求遂爾因循以為僥幸之路以後在內部院等衙門在外督撫各官俱著滌慮洗心痛改積習於有益國家民生事務籌畫擔當不避嫌怨務期法行無弊恩被閭閻以副朕立法定制愛飬斯民至意如視為故事仍蹈前轍事經發覺定行嚴加處分決不饒恕著通行申飭遵行特諭康熙十七年四月二十三日諭兵部提督九門步軍統領費揚古自任事以來夙夜勤勞殫心料理緝獲盜賊搜捕奸宄使里巷寧謐輦轂肅清向來效力有年今尤克稱厥職應行議叙以示鼓勵作何加恩著議奏特諭康熙十七年四月二十七日諭中書舍人髙士竒爾在內辦事有年凡密諭及朕所覽講章詩文等件纂輯書寫甚多實為可嘉特賜表裏十匹銀百兩以旌爾之勤勞特諭康熙十七年五月初十日諭刑部刑獄重地人命攸關天氣炎熱亟宜清理雖熱審定例每歲舉行但已結大案見在監禁者其中各犯或有無知而罹法網小過而陷重辟株連無辜淹禁日久朕心每思及此深為惻然兹特遣索額圖勒德洪杜立德屯泰等㑹同三法司逐一詳加審理凡有罪可矜疑者即與察明事由開列具奏務使情法允協有枉必申以副朕欽恤刑獄至意特諭康熙十七年五月十三日諭禮部朕惟天人感召理有固然人事失於下則天變應於上捷如影響豈曰罔稽今時值盛夏天氣亢暘雨澤維艱炎暑特甚禾苗枯槁農事堪憂朕用是夙夜靡寧力圖修省躬親齊戒䖍禱甘霖務期精誠上達感格天心爾部即察例擇期具儀來奏特諭康熙十七年六月十三日諭吏部等衙門時當盛夏亢暘不雨酷暑經旬藴隆未解又於是月十二日有青氣竟天之異因朕凉德布政不均罔克昭事上帝協叙陰陽上天埀戒良有其由朕夙夜倣徨循省思咎兹已躬親齊戒䖍行祈禱因念國家立綱陳紀分職宣猷政務繁多易滋闕失或用人未當賢否混淆以致庶績未熙事多叢脞內而部院總天下之樞機或條例有未盡善外而督撫繫生民之休戚或吏治有未澄清以致朝廷德意不能下究軍民疾苦無由上聞召兹災眚譴告良殷凡今有應行應革事宜關係政治得失者著在京三品以上堂上官及言路諸臣各抒所見切實直陳朕將採擇施行用以上迓天和綏乂蒸庶勿得浮泛塞責負朕求言圖治至意特諭康熙十七年六月十三日諭將軍穆占爾等近來行兵致有大臣陳亡聞之不勝傷悼兼之兩將軍彼此推諉以非已汛為辭恐於事機有誤深為憂之爾等爭執雖屬細事但爾前此欲將簡親王兵與爾相繼前進止留將軍和善額附希福鎮守陳請前來朕未之允蓋以江西地方所關甚巨且無接續之兵此將軍等所悉知務令江西不生事變兩將軍商確萬全保其無虞屢有諭旨何至尚厪朕懷今簡親王留鎮在彼尚有此事爾復藉口非已汛地倘如所請遣簡親王繼爾進兵今此賊衆又將何兵禦之滿兵之勢貴聚聚則處處攻戰始克有利若無用空城使滿兵分駐以寡力而遇賊輕戰有志氣者盡殁行陳無賴之徒俱行敗北如此則實為可惜滿兵關係極為重大利戰則戰利守則守宜合全力以破賊衆若將所復賊棄之空城固執分守似乎不可今福建廣東情形亦不甚妥爾等益當同心協意保固地方特此密諭康熙十七年七月初二日聖祖仁皇帝御製文集卷七
