body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷二十敕諭諭乾清門頭等侍衛拉錫總督年羹堯因虧空錢糧將各官題參處分革職其虧空錢糧至今不能賠補今因辦理軍需陜西巡撫噶什圖總督年羮堯會商將民間火耗加徴墊補等情題請第民間火耗只可議減豈可加增朕在位六十一年從未加徴民間火耗一次今安可照伊等所題加增乎且虧空錢糧之數雖多現今從未有墊補之語由此觀之西安庫內未必存有銀兩今正值軍機之際雖甚需銀而伊等以有虧空延捱不敢題請倘致有誤緊要軍需亦未可定此處交議政大臣會議將户部庫銀撥送西安彼處庫內有銀即行收貯如庫內無銀軍機需用之處一面動用一面奏聞其虧空缺欠錢糧伊等自然墊補也康熙六十一年九月十三日諭領侍衛內大臣侍衛等八旗都統前鋒統領護軍統領副都統參領等內閣九卿詹事科道直𨽻巡撫守道朕臨御天下六十餘載年至古稀太祖皇帝時大臣官員幼時及見三分之一太宗皇帝時大臣官員猶見一半世祖皇帝時大臣官員俱曽全見眀萬厯泰昌天啓崇禎時大臣官員及舊內監亦曽有及見者朕凡事留心詢問故於前朝諸事知之甚悉御極以來嘗思事多變易皆難預定惟寬平公正因時制宜一切不預執己見夫子云寬則得衆信則人任焉朕宵旰憂勤無刻不以民生為念凡政事利弊必推求其故近見天下錢糧各省皆有虧空陜西尤甚其所以致此者皆有根源蓋自用兵以來大兵經行督撫及地方官惟期過伊地方便可畢事因資助馬匹盤費衣服食物甚多倉卒間取自何處無可設法則必那用庫帑及撤兵時又給各兵馬匹銀兩即如自藏回來之將軍以下兵丁沿途所得反多於正項是以各官捐助兵餉動輒萬金人但知取用而已此等銀兩出自何項並無一人問及也至捐納一項大臣官員並未交銀而空取實收者甚多不但朕知之甚明爾諸大臣亦所共知也官之虧空錢糧者俱已題參離任其虧空銀兩追比不得新任官又不代完此項銀兩終無著落故用兵之地歷年錢糧奏銷朕悉從寬緩正為此也前蕩平三逆原任布政司徐惺所用兵餉至四十餘年尚不能清完朕念皆係軍需那用將未完銀兩俱從寬免蓋寬緩則州縣力舒上可不誤國帑下可不病民力去年陜西督撫題參虧空各官奏請將此虧空銀兩追出以充兵餉後追比不得伊等無可奈何巡撫噶什圖密奏欲加通省火耗以完虧空此摺朕若批發便謂朕令加徴若不批發又謂已曽奏眀定例私派之罪甚重火耗一項特以州縣官供應甚繁差使過多故於正項之外略加些微以助常俸所不足原屬私事若公然如其所請聼之加添則必致與正項一例將肆無忌憚矣所以將噶什圖奏摺申飭批發第陜省督撫既不能追比虧空又不敢請撥錢糧倘有緊要軍機焉能不致遲誤朕因交與議政大臣議覆動户部庫帑五十萬兩解送也又如賑飢一事自應於夏麥無收之後散賑方於百姓有益今各省每於三四月間或遇氷雹或雨澤愆期即借此以為青黃不接具題請賑揑銷倉榖及至五六月時民間乏食而倉中已籽粒無存矣且今年陜省奏稱地震朽爛倉糧夫地震何至糧朽此皆州縣借端開銷耳今各省雖各有虧空而陜省尤屬緊要特傳集爾等至朕前面諭近日噶什圖所奏虧空錢糧一摺交與九卿詹事科道閲畢一併確議具奏康熙六十一年十月初二日諭內閣九卿等覽所奏皆過於實事朕以沖齡即位賴世祖章皇帝入關以來深仁厚澤建不拔之業至今八十年太平有自來矣朕自幼讀書每覽前代帝王忿懥憂患纍其內幾務紛紜勞其外年嵗不久景祚不長者未嘗不拊膺長歎朕涼德亦不過如此幸得運逾花甲嵗登古稀鬚眉皆白氣血衰憊當此之際翼翼小心惟恐善後之策不能預料保泰圖安夙夜氷兢况今西陲用兵士卒暴露轉運罷敝民生乏食物價騰貴正宜君臣同寅協恭奠萬姓於將來自古慶賀多者後人不取况亦何益乎朕自六十餘年正旦之外未嘗受慶惟六十夀時三月十八日進表行禮今卿等所請無庸多議康熙六十一年十月二十六日詔恩詔朕五十餘年上畏下懼以敬以誠覃思上理且以一心對越上帝未嘗瞬息稍懈賴昊穹之孚祐祖宗之蔭庇邇來國家蓄積有餘民間年嵗頗豐朕以涼德勉思列聖體天順公慮患操心敷景運於休期洪基業於光顯夙夜氷兢宵旰靡遑屈指春秋今屆六旬矣覽自秦漢以下稱帝者一百九十有三享祚綿長無如朕之久者朕之虛薄良深歉仄何敢少有倦怠有負孜孜圖治之初心况在位久者始勤終忽往往不能垂令名於後所以乾惕之懷彌殷深危之念愈切兼之承平嵗久幅員日廣户口漸增風俗益薄朕與臣鄰夙夜在兹以剛健中正惇大成裕謙尊有終持盈保泰猶恐未能豈自滿假少有逸豫朕以天下為心天下當亦體朕之𠂻各矢藎誠皆敦孝敬型仁講讓守己奉公務勤職業官僚胥勸人士奮興使遐邇之均被小大之咸周以享升平之福此非朕之德乃天地祖宗之賜今朕式慰中外臣民之請博考典禮大沛膏澤用稱朕躋世於仁夀之至意所應行事例開列於後於戲錫民以福為皇極得夀之徴御衆以寬乃萬國咸寧之本布告天下咸使聞知康熙五十二年三月十八日遺詔從來帝王之治天下未嘗不以敬天法祖為首務敬天法祖之實在柔逺能邇休養蒼生共四海之利為利一天下之心為心保邦於未危致治於未亂夙夜孜孜寤寐不忘為久逺之國計庶乎近之今朕年屆七旬在位六十一年實賴天地宗社之默佑非朕涼德之所致也歷觀史册自黃帝甲子迄今四千三百五十餘年共三百一帝如朕在位之久者甚少朕臨御至二十年時不敢逆料至三十年三十年時不敢逆料至四十年今已六十一年矣尚書洪範所載一曰夀二曰富三曰康寧四曰攸好德五曰考終命五福以考終命列於第五者誠以其難得故也今朕年已登耆富有四海子孫百五十餘人天下安樂朕之福亦云厚矣即或有不虞心亦泰然念自御極以來雖不敢自謂能移風易俗家給人足上擬三代眀聖之主而欲致海宇升平人民樂業孜孜汲汲小心敬慎夙夜不遑未嘗少懈數十年來殫心竭力有如一日此豈僅勞苦二字所能該括耶前代帝王或享年不永史論概以為酒色所致此皆書生好為譏評雖純全盡美之君亦必抉摘瑕疵朕今為前代帝王剖白言之蓋由天下事繁不勝勞憊之所致也諸葛亮云鞠躬盡瘁死而後已為人臣者惟諸葛亮能如此耳若帝王仔肩甚重無可旁諉豈臣下所可比擬臣下可仕則仕可止則止年老致政而歸抱子弄孫猶得優遊自適為君者勤劬一生了無休息之日如舜雖稱無為而治然身殁於蒼梧禹乘四載胼手胝足終於會稽似此皆勤勞政事巡行周歷不遑寧處豈可謂之崇尚無為清淨自持乎易遁卦六爻未嘗言及人主之事可見人主原無偃息之地可以退藏鞠躬盡瘁誠謂此也自古得天下之正莫如我朝太祖太宗初無取天下之心嘗兵及京城諸大臣咸云當取太宗皇帝曰明與我國素非和好今欲取之甚易但念係中國之主不忍取也後流賊李自成攻破京城崇禎自縊臣民相率來迎乃剪滅闖寇入承大統稽查典禮安葬崇禎昔漢髙祖係泗上亭長明太祖一皇覺寺僧項羽起兵攻秦而天下卒歸於漢元末陳友諒等蜂起而天下卒歸於明我朝承襲先烈應天順人撫有區宇以此見亂臣賊子無非為真主驅除也凡帝王自有天命應享夀考者不能使之不享夀考應享太平者不能使之不享太平朕自幼讀書於古今道理粗能通曉又年力盛時能彎十五力弓發十三把箭用兵臨戎之事皆所優為然平生未嘗妄殺一人平定三藩掃清漠北皆出一心運籌户部帑金非用師賑飢未嘗妄費謂皆小民脂膏故也所有巡狩行宫不施采繪每處所費不過一二萬金較之河工嵗費三百餘萬尚不及百分之一昔梁武帝亦創業英雄後至耄年為侯景所逼遂有臺城之禍隋文帝亦開創之主不能預知其子煬帝之惡卒致不克令終皆由辨之不早也朕之子孫百有餘人朕年已七十諸王大臣官員軍民以及蒙古人等無不愛惜朕年邁之人今雖以夀終朕亦愈恱至太祖皇帝之子禮親王饒餘王之子孫現今俱各安全朕身後爾等若能協心保全朕亦欣然安逝雍親王皇四子世宗憲皇帝廟諱人品貴重深肖朕躬必能克承大統著繼朕登基即皇帝位即遵典制持服二十七日釋服布告中外咸使聞知康熙六十一年十一月十三日聖祖仁皇帝御製文第四集卷二十
