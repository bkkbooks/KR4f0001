body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻四十五目錄古今體詩二十五首詠嶺外金蓮盛放可愛大城文安等處堤脩完舟中駐蹕王家口朕偶至潭柘覽老和尚照福畫像因而有感故作詩賜之賜皇太子生辰詩國舅佟國維六十夀詩以賜之靜明園喜雨密雲作石匣營作倣唐人戲作讀書得風雲月露字因而分作四句中成絶一首塞外新秋夜聞雷雨大作曉賦志喜賦得芳氣有無中早起看雪詠盆中松竹梅各一首靜坐讀書自喻并序詠鴈立春詠彈琴四十一年除夕書懷賦得爆竹聲中一歲除是日微雪賜雲南法界寺講經溥畹燈節戲作
