body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷十五目録敕諭諭大學士伊桑阿阿蘭泰尚書馬竒侍郎思格則阿爾稗學士宋柱齊穡傅繼祖綏色諭大學士伊桑阿阿蘭泰尚書馬竒傅臘塔索諾和圖納侍郎朱都納馬爾漢學士宋柱齊穡傳繼祖綏色諭大學士伊桑阿阿蘭泰諭大學士伊桑阿阿蘭泰學士宋柱陶岱齊穡綏色諭大學士伊桑阿阿蘭泰兵部尚書索諾和侍郎朱都納馬爾漢諭大學士王熙等諭大學士伊桑阿阿蘭泰諭內閣諭內大臣國舅佟國維等諭內大臣國舅佟國維等諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布祿諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布祿諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布祿諭大學士伊桑阿阿蘭泰尚書馬竒索諾和侍郎安布祿學士綏色等諭大學士阿蘭泰王熙張玉書李天馥學士三寶楊舒朱都納哈山韓菼徐嘉炎張榕端諭大學士伊桑阿阿蘭泰學士三寶楊舒朱都納哈山哈雅爾圖倭倫諭內閣諭內閣諭户部諭户部諭領侍衛內大臣索額圖明珠大學士伊桑阿阿蘭泰諭户部諭內閣諭內閣諭大學士伊桑阿阿蘭泰學士三寶羅察席爾登
