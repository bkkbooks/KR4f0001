body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集總目六卷第四十八古今體詩三十七首元旦朝罷甲申春謁陵回鑾路經盤山有僧智朴呈接駕詩即用原韻二首春雪晴望康熙四十二年夏秋間恆雨為災山左尤甚朕夙夜靡寧宵旰焦勞減膳撤樂坐不安席自冬至夏自夏至秋未嘗晷刻少安雖設法拯救幾乎難保幸四十三年二麥大熟秋成頗佳飢者未轉溝壑窮者皆得衣食實非朕之涼德所感賴上天之所鑒祐也故喜而不寐作長歌以示山莊書懷賜大學士詠醫山菊藍雀花靜坐偶成賦得霜葉紅於二月花看運河建壩處題邊景昭鳴禽圖翰林魏學誠該直命大學士陳廷敬出題考得四方無事太平年朕喜其句而偶成四韻立冬微雨雪偶成冬月微雨聞落葉燈月文房戲作園中十種葡萄味甚甘美戲作近體一律以示南書房諸臣乏良醫冬晴題閩粵進貢小香荔枝題墨竹詠燈賦得梅雪爭春臘日季冬南苑十首南苑晚雪總兵劉漢業補授肅州因地逺職重特書御製詩截句一首賜之以奬武職惜兵愛民之意也除夕晚宴卷第四十九古今體詩六十二首康熙四十四年元旦用唐太宗元日舊韻賦得光風遍寰宇覽皇清文頴內大學士陳廷敬作各體詩清雅醇厚非集字纍句之初學所能窺也故作五言近體一律以表風度賦得當户翠峰稠閲河南巡出京乙酉仲春南巡船窗偶作船窗對月小飲擬田家春日過臨清閘南巡舟行會通河雜詠四首河南巡撫趙宏燮陛見求訓旨故作截句一首賜之乙酉南巡途間觀麥少雨上巳日抵微山湖口閘春雨大霈因賦五言近體一首以志喜楊家莊新開中河得順風觀民居漫詠二首駐蹕淮安一宿即過幸天寧寺朕每至南方覽景物雅趣川澤秀麗者靡不賞玩移時也雖身居九五樂佳山水之情與衆何異但不至曠日遲久有纍居民耳所以一目即過者亦恐後人錯借口實而不知所以然也至於茱萸灣之行宫乃係鹽商百姓感恩之誠而建起雖不與地方官吏但工價不下數千嘗覽漢書文帝惜露臺百金後世稱之况為三宿所費十倍於此乎故作述懷近體一首以自警又粘之壁間以示維揚之衆覽奏章少倦甲夜得寢又被清磬驚醒復睡夢中作成起時已忘少半故前後增補以成四韻賜紀蔭老和尚邇來未臨法書久不作字手澀難於運管字不甚佳長江靜浪歌自過江至常州府雜詠四首至閶門虎丘一詠自蘇州行至昏刻未到崑山河傍有竹林數畞晚風可佳故駐蹕於此賦得徑節疏枝帶晚風之句雨中登玉峰船泊三江口泛黃浦江松江進鮮鰣魚有懷駐蹕杭州府西湖遇雨西湖戲作幸雲栖二首無錫惠山之作回舟至常州府是夜甘霖大霈自鎮江之江寧駐蹕江寧雨後幸雨花臺織造處閲機房自龍潭用戰艦頃刻至金山見龍行有序高旻寺塔頂放光回鑾中河三首千葉蓮池夜聞雨滴之聲詠畫梨花乙酉秋日山莊偶成一路清亷圖賜吏部尚書宋犖豫告還里大病少愈見春至述懷春日有所思二首五臺有懷大學士張玉書挽詩孟秋涼風初至賦得秋水共長天一色新秋卷第五十熱河三十六景詩煙波致爽並序芝徑雲隄並序無暑清涼並序延薰山館並序水芳巖秀並序萬壑松風並序松鶴清越並序雲山勝地並序四面雲山並序北枕雙峰並序西嶺晨霞並序錘峰落照並序南山積雪並序梨花伴月並序曲水荷香並序風泉清聽並序濠濮間想並序天宇咸暢並序暖溜暄波並序泉源石壁並序青楓緑嶼並序鶯囀喬木並序香逺益清並序金蓮映日並序逺近泉聲並序雲帆月舫並序芳渚臨流並序雲容水態並序澄泉繞石並序澄波疊翠並序石磯觀魚並序鏡水雲岑並序雙湖夾鏡並序長虹飲練並序甫田叢樾並序水流雲在並序
