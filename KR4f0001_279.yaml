body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十一雜著古文評論蘇轍侍御史林旦權淮南運副救荒思得良使者語約而要郭逵自致仕起知潞州雅馴逼古范鎮侍讀太一宫使婉摰入情藹如之言劉摯尚書右丞義指婉縟名言可佩自齊州回論時事立言有緒多棐摯纒綿之致陳州為張安道論時事書悃愊之語抒寫能盡再論分别邪正劄子君子進而小人退此治道所以休隆世運所以清泰也子由此劄最得其旨足以闢調停之謬矣元祐會計録序本是專言會計却語語欲其安飬休息用意深逺而文勢紆徐君術二以逸宕之文發深至之思自覺瀠洄入勝君術四意主推誠待下立言最為無弊臣事䇿一熟悉古來情偽始能如此敷暢臣事䇿四宋之兵制視唐為弱此能深中時斃而文氣寬舒中却有精警之色臣事䇿九子由此文欲使仕宦者忘其遙逺而又習知其土風民俗則易以致治亦可云通識矣臣事䇿十通達周官之法故不失之固泥民政䇿一文境愈淡文格愈髙末一段深得興起教化之本孔子曰觀於鄉而知王道之易易者正此謂也民政䇿二大意欲復古孝弟之科而文之虛實相㴠波濤曲折特臻勝境民政䇿三其言甚醇可以厚風俗敦教化民政䇿四欲訓練土兵與大蘇之論吻合而思緒機軸各極其妙民政䇿六禁遊民重本業意止兩言而脫缷回環處煙波無際民政䇿八此足國裕民之計為效雖遲而其利甚大非留心經濟者不能商論識議純正文字緊嚴周論以文質為自然之勢乃通儒之言文亦光采煥發六國論洞徹當時天下形勢故立論行文爽健乃爾秦論一揆度嬴秦國勢終始竪議髙卓迥出意表秦論二前論雄駿此論平正前論猶近於權謀此則庶幾王道矣五霸論成見在中故語不貴多而能扼其要晉論推勘入細談虛者不得矜其髙尚隋論秦取天下甚難隋取天下甚易其勢不同此却舉其得失之故以為先後如出一轍洵淵識也書論論意暗指新法而借書以發攄之文氣寬紆令人三復不厭漢昭帝論近裏之言亦切漢事曽鞏勸學詔風勵庠序詞令醇茂爾雅勸農詔其諄勉處與漢詔相上下正長各舉屬官詔此詔參酌古今之宜然必長二官身自廉正而後簡舉不謬表率之地亦良重矣賜髙麗詔溫潤特至賈昌衡知鄧州制以召父杜母為之勸用意良厚王制䇿典之文此為正則又典雅可以方軌西漢相制整練中多名貴之語又視唐時諸制誥殆有過之無不及也尚書左右丞制淵懿溫栗之音吏部尚書制非不簡嚴却自然瀏利可誦戶部尚書制詳於職掌可備典故祕書監制此選既清詔詞亦甚雅則將軍制公賞罰篤恩信兩言甚要為將之道略盡此矣熙寧轉對疏南豐之文邃於經籍而運以古健之筆其闡發義理處彌見朗徹此疏所陳洵為完粹之言也自福州召判太常寺上殿劄子詳言以暢典學之旨此等議論大醇無小疵也移滄州過闕上殿劄子極鋪張掦厲之文而歸於戒懼祗愼可云有典有則救災議計較利害得失處經畫最周變通不滯可補周禮所未及寄歐陽舍人書矜貴莊嚴而氣自紆回不迫讀此等文當細觀其轉折脫卸之法福州上執政書出入風雅之中自有溫柔敦厚之氣知其本乎性情者深也新序目録序愼取二字真讀書要訣此論文所獨闢列女傳目録序閨門之內王化之原暢達其詞足以茂明風教矣南齊書目録序臚陳得失當與劉知幾史通並傳梁書目録序説理極為精湛其言大而有本禮閣新儀目録序論聖人因時制禮處原本經術此見南豐為學本領范貫之奏議集序歸重仁宗得體得法識髙力厚典貴之文先大夫集後序層折以舒其情使人忠孝之思油然而生送丁琰序南豐之文每一發議必根柢於大中至正之道如此言人才盛衰由於學校勸懲之法可云探見本原也筠州學記開局甚寬收束甚緊題之前後意無不到宜黃縣學記直從學立言所以深避筠州一記之雷同而昌明博碩無非經籍之腴潤諸學記中罕見其匹越州趙公救災記斟酌古法敘次詳密可禆救災之術撫州顔魯公祠堂記激昂頓挫善於作勢之文末拈一仁字收煞處亦甚有力徐孺子祠堂記出處士人之大節也必一衷於聖人之道則干祿不為汙而潔身不為恝矣議論平實規摹亦老書魏鄭公傳筆筆沉著辨駁甚精三復其言可以興起千載邪正辨直作兩扇文字而紆徐曲折有無限波瀾子固集中之别格説用詮理之文而措辭倍覺精爽特類子書讀賈誼傳借意賈生自攄所學雄渾可以吞吐一切上田正言書切偲之雅忠藎之規上歐蔡書一氣淵涵極文章之勝觀而懇懇處尤可見用意之深曾肇論選忠良博古之士置諸左右文頗質實而􅈺於事理漢文帝論論斷典確不可移易而結處尤有斟酌重修御史臺記詳整中有嚴重之氣動人聽覩韓維求直言詔桑林之禱此其餘風國子博士种諤可左藏庫副使殿中丞种診可洛苑副使簡淨明當淮南江浙荆湖南北路都大發運使右諫議大夫馬仲甫可依前右諫議大夫充天章閣待制髙陽開路都總管兼安撫使兼知瀛州軍州事管內勸農使字字修潔西京左藏庫副使帶御器械李元方可莊宅副使語自蒼徑乞詢問講讀臣寮狀敷陳明練指趣瞭然聖祖仁皇帝御製文第三集卷四十一
