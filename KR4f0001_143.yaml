body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻二十六北征勅諭諭大将軍伯費揚古近日以噶爾丹處來奔之人所言觀之其饑寒困蹙至於已極此大機㑹也上天佑助有以賊畀我之象矣斯時更不可失汝等宜切切注意曩者朕躬親至克魯倫時汝等大兵若前行三日至巴顔烏蘭相近之地噶爾丹從何得脱商南多爾即來後若将所至地方一經奏聞朕所遣殷渣納額林秦等於十三日之前若到朕何故旋師以汝等之兵斷然難至皆困於饑餒故以朕營米糧為轉移之計經理而還然至於賊衆多致兔脱來降者又復逃回朕實不意其如此今思此等情事追悔不可勝言汝等兩大将軍㑹合時中路之兵馬皆肥壯理應挑選軍士通融馬匹即行追逐其潰散之衆俱行收集而來彼時雖至潰散因無收納者零星㑹合以致衆多此理之必然者今汝等作何商議噶爾丹何所底止朕因相距遼逺切欲聞之特書手勅以諭康熙三十五年九月初三日諭大将軍伯費揚古汝遣本錫賫奏九月十二日至已洞悉情事兹丹即拉雖云投降而噶爾丹之言於今未至然彼雖不投降破敗已極果其來降大将軍可善言慰導令至歸化城其時相與籌度措置特易易耳彼所遣使若送至朕所朕措處良難不得不諭令歸降彼若遵㫖來降将不復更有所議矣今自丹即拉以下凡所遣人至奏聞送至朕所噶爾丹若遣使來汝即以言覆之我乃大将軍凡事皆我耑任我主亦不拂我言今尔等馳奏而返時愈寒冽汝之來人致盡凍斃汝可即歸令噶爾丹來降其時我為汝奏懇於是賞其來使慰以善言遣之卽還此等情事一面奏聞一面更加周防其周防事宜馬最為要朕在軍中見我軍之勇健無可訾議而於防護馬匹最覺疎虞萬一詐稱投降夤夜乗我不備驅馬以出所繫匪輕汝諳練行間事多閲歴聊以朕意念所及書以諭焉聞噶爾丹信息以在京豫養之馬軍士騎乗朕躬以九月十九日起程前往歸化城此際常須奏聞情勢為佳朕心喜欲亟聞彼中實音為此特諭康熙三十五年九月十六日諭大将軍伯費揚古等汝所奏翁金守護米石副都統祖良弼之事此本於九月十九日早至朕所前五月十三日我兵擊賊以後為西路善後事宜降有諭㫖及該部文移俱在檔案朕何庸再言經數月而未行掣回者何故朕遣将軍舒恕侍郎滿丕者又何故汝之此行更為何事朕殊不解朕在京師事惟獨斷西路之事未全善慮未周詳即逐件言之衆意亦未必以為然今悉如朕所言矣噶爾丹困蹙已極旦夕之間将寒凍以死其頭目遣人來以為此大機㑹故爾喜悦今相戰則來降之人将懼而中止又得帳房釡鬵此事朕以未得掣回之故深以為憾又奏章内将翁金所有兵丁若干官員為誰器械何如戰時久暫若何何以退却此撥什庫兵丁何以奔來俱未詳載朕相距遥遠不勝憤懣嗣後凡奏事必将始末詳具為善特諭康熙三十五年九月十九日諭領侍衞内大臣大同宣化府積貯草豆甚多騎官馬之新滿洲䕶軍三百名内令二百十名騎逹卜孫腦兒馬羣之馬隨往前去其九十名将伊等所騎官馬九百匹赴大同府餧養大臣侍衞官員不騎官馬者亦照職掌定額令留馬於大同府三旗各派大臣一員及侍衞三員經理飼秣其前行兩起大兵亦令赴大同府餧養馬匹如此則於程途無阻於軍事有益矣俟下營後議奏康熙三十五年九月二十日諭扈從官員兵丁朕行甚緩無急廹處各騎士皆善加調適以行下至僕役俱以此通行嚴飭曉諭康熙三十五年九月二十日諭户部宣化府錢糧前已屢經蠲免但比年以來所屬各州縣牧養軍前需用馬匹又大兵絡繹往來雖各有支給經費而供億甚繁殊勞民力朕廵幸經臨深切軫念著将康熙三十六年宣化府屬地丁銀米全與蠲豁仍行文該撫通行曉諭俾民間均霑實惠以副朕寛恤黎元至意尔部即遵諭行特諭康熙三十五年九月二十三日諭領侍衞内大臣凡肥壯馬匹則拴至天曉若五六分臕之馬則拴至三更時可将此通諭衆人知之康熙三十五年九月二十三日諭領侍衞内大臣朕見餧馬之草皆被踐踏馬宜於夜間拴至當餧之時少少添草餧之為何徒然令其作踐可傳諭諸臣竝曉示衆人知之康熙三十五年九月二十三日諭大将軍伯費揚古汝報副都統祖良弼擊敗厄魯特奏書二十四日之晨至於沙城朕覽之不勝欣喜勿謂我師擊敗賊衆彼即全軍得脫噶爾丹但無所掠獲則彼奔潰離散之外更有何計将軍惟事招徠切為要圖務使潰散以盡其餘所下敕諭及招降事宜已令本錫等傳㫖兹不再及惟以善言慰導致彼來歸再為籌度為此特諭朕躬甚安佳怡悦在途汝安善否康熙三十五年九月二十四日諭領侍衞内大臣騎乗官馬侍衞三旗䕶軍内府執事人員各所乗馬若記得旗分佐領将原旗分佐領原騎乗人名書於木牌繫之馬項若記不得旗分佐領各書其人之名繫之著通行傳諭康熙三十五年九月二十四日諭領侍衛内大臣朕日出後始行亦不甚早當於未啟行之前先撤帳房朕行時即隨後同行則途中既便而於馬畜有益觀此番軍中帳房不於未行之前豫撤朕遣人催促而後撤付䭾載者甚多朕行時始結束追趕而前晝日既短在後之人何時可到馬畜亦甚至勞苦今每日行不過三四十里又非暑熱之時僕役可以照常步行如此則於馬匹大有禆益可傳諭諸臣并曉示衆人知之康熙三十五年九月二十六日諭領侍衛内大臣今已出邉外騎來馬匹肥者拴至五鼓始可牧放臕歉者少歇息之汗乾即可牧放康熙三十五年九月二十八日諭内大臣等來降之厄魯特云噶爾丹於波羅吳納罕空金渣巴罕等處過冬令丹即拉來波羅吳納罕之地相尋波羅吳納罕者向來渣薩克圖汗所居之地問其地之所在則距喀倫有四十餘日之程今大将軍伯費揚古進兵右衛兵每人乗馬一匹騾驢負載前往亦且瘦弱朕度其斷不能至噶爾丹所居之地必於翁金一帶地方以馬瘦而返至翁金而返則兵力徒勞而無益於事朕令於大同牧養馬匹者專為探實噶爾丹所在現今可進則黒龍江之兵六百人前鋒二百人新滿洲四百人察哈爾渣薩克之兵挑選千人整齊砲火鳥鎗全給以肥壯馬駝多帶糧餉令之進剿乗其窮困可以一鼓而殲滅之矣頃噶爾丹破壞已極我等為何不深籌殄滅之計而空勞士馬之力乎今速行文大将軍伯費揚古令其停止進兵若果有機㑹易於擒獲則勿停止噶爾丹困蹙無可往之地儻今冬雖未可行來歲草生之時令馬匹肥壯整備駱駝噶爾丹任其所之必搜尋其地而剿滅之此際将降來厄魯特之人接踵差遣招降厄魯特最為要務惟事招降足令彼勢全潰尔等㑹議即於今晚具奏康熙三十五年九月二十九日諭尚書馬竒大将軍費揚古所領兵士甚為勞苦食用必至缺少欲将朕所用牲口發去道路遼逺牲既瘠瘦且須時日可遣人到尚書班第取沙虎口大同等處現存銀五千兩遣官一員送至大将軍費揚古酌量買皮襖牛羊等物給與軍士康熙三十五年十月初一日諭大學士阿蘭泰尚書馬竒今歲歸化城一帶年穀豐收而價值亦賤至歸化城時隨行之人所給十日口糧可折價與之令彼各自市買其歸化城之米所以備軍需也此地米穀餘剰則右衛之兵儻有徵發取路甚便以之給散大有禆益尔等議奏康熙三十五年十月十一日諭大學士阿蘭泰尚書馬竒黒龍江之兵出師日久據将軍奏稱所食口糧可至十一月初五日朕至歸化城時應將察哈爾兵五百名新滿洲一百名給足口糧馬匹遣往更代著議奏康熙三十五年十月十一日諭兵部朕至歸化城之日自張家口至歸化城所有常設驛站外中途添設之驛俱撤回至沙虎口一路以兵部隨行之馬添設驛站康熙三十五年十月十一日諭議政大臣士卒十日猶可不支口糧儻駐扎日久豈可不行支給且歸化城附近地方牧草維艱應将多餘人役瘦弱馬匹酌量遣往大同右衞等處飼養等候或遣黑龍江兵一百名或留此兵於新滿洲兵内遣往著㑹議具奏康熙三十五年十月十二日諭領侍衞内大臣歸化城貿易人多僕役諸人恐有妄行搶奪著副都統阿第将土墨特䝉古亦宜嚴行禁止諸臣侍衞執事人員及軍士馬畜毋得偷竊可諭衆知之康熙三十五年十月十三日諭尚書馬竒朕見歸化城馬駝多而價亦平官員侍衞兵丁人等有欲借銀兩通融購買馬駝者奏聞給與銀兩先是騎官馬新滿洲不准借給銀兩今如有借者亦准給與康熙三十五年十月十三日諭大學士阿蘭泰右衞官員兵丁自駐防右衛以來屢經出兵甚為勞苦朕心殊切軫念著尔前去将官員兵丁所借官庫銀兩扣除俸禄錢糧俱蹔行停止其有陣亡官員兵丁人役俱著詳察即給與身價現今給賞則於官兵生計大有禆益可同學士一人酌帶司官馳驛前往将諭㫖通行曉示康熙三十五年十月十四日諭議政諸臣頃将軍費揚古奏稱黒龍江官兵所給五十日口糧於九月初五日期滿故将喀倫所有米石算至十一月初五日給與兩月之糧除截留一千石外餘米俱賞給䝉古所留米千石俱給與官兵喀倫現在無米等語原令将喀倫所有米石給與兵丁儘其足用其所餘者始給與七旗䝉古今遽爾給散為時太早而非䇿矣可行文将軍費揚古又派察哈爾兵五百人令内大臣吳巴什領之給以二月餱糧前赴大将軍費揚古處此兵到時将黒龍江兵内視其人材壮健而馬匹肥者選百人留之官員亦酌量兵數存留於解送銀五千兩内酌量支取於所留兵百人亦照察哈爾兵兩月餱糧之數給與餘兵俱著發回康熙三十五年十月十六日諭大學士阿蘭泰右衞官員兵丁甚為勞苦滿洲䝉古漢軍官員兵丁所借官庫銀兩俱著豁免漢軍扣還之例向來不同自奉諭㫖以後漢軍所借銀兩照常扣還陣亡者已給身價外其有在軍前病故官員兵丁人役及受傷官員兵丁人役等按所察名數照例給賞此係已經查明之事大學士不必前往學士倭倫往彼一一給散倭倫到右衞時集衆宣示諭㫖将詳查賞賚之事傳知議政大臣及諸臣幷詳悉移咨亦令大将軍知之竢右衞出征兵丁到時大學士阿蘭泰傳集亦行曉諭康熙三十五年十月二十日諭大學士阿蘭泰右衞官兵已經頒賞大同府緑旗官兵亦經屢次隨征勞苦其陣亡及軍前病故與被創之人俱應加恩賞賚著學士倭倫前往大同府詳察一一照例恩恤其無子嗣承受銀兩者向有致祭之例亦察例致祭學士倭倫賞恤事畢隨即前來康熙三十五年十月二十二日諭領侍衞内大臣應留大臣一人於歸化城收養來降之厄魯特完聚其夫妻給以衣服餱糧等務皆令其料理可令内大臣宗室永吉并乾清門侍衞韓楚哈員外郎董殿邦副都統阿第公同商酌而行支縀皮襖二百領皮襖一百領銀三百兩付之有給食物需用之處将此銀三百兩應用註冊於歸化城之土墨特䝉古勿行徵取厄魯特來降之人其素有名目者以縀皮襖給之其微賤者以皮襖給之永吉韓楚哈隨朕至湖灘河朔仍還於歸化城留住安親王到歸化城時王與副都統雅圖留住於歸化城出師日久其隨從之人俱著回京康熙三十五年十月二十三日諭兵部将軍薩普蘇病未痊愈不必隨朕前往將伊所帶官員兵丁一百十人率往大同府養馬以待自大将軍伯費揚古處有兵五百人到時亦令往大同府養馬若大将軍處有急務即率伊兵丁六百人前赴大将軍康熙三十五年十月二十三日諭尚書馬竒朕念右衞兵丁勞苦遣侍衛馬武以牛羊犒賚之馬武回朕詢知兵丁中步行者甚多食用亦匱乏可每人賞銀三兩即速詳查兵丁名數具奏康熙三十五年十月二十四日諭領侍衞内大臣右衞官兵明日可到我軍自出師以來皆談笑優游每日飽食二次來朝止早餐一次其晚時一次不必再食俱持以饗右衞勞苦之兵御膳房兩次飯食及諸皇子兩次飯食亦俱持以饗右衞之兵可将此通行曉諭諸臣執事人員并合營知悉俱各持往其所飲茶亦令茶房預備康熙三十五年十月二十四日諭領侍衞内大臣適遇停駐之日自王以下衆人所乗來馬匹皆令查㸃有多至數百者亦有少者俱著詳察具奏朕不過欲知其數而已御廐馬亦并查㸃又衆人所乗馬中有臕力不能行十日者另令查出曽給與衆人所乗官馬及御廐馬并查之我軍路程甚遠此馬焉能行到今右衛無馬之兵令其乗之而往於馬上各繫其主之姓名伊等現有官支草豆即令飼養肥壯若有調發乗此前往回時各給還原主有損亡者朕力可以賠償之康熙三十五年十月二十五日諭領侍衞内大臣尚書班第此皆係官馬朕所乗内廐之馬亦有之因右衞軍士無馬以致步行者故令乗之可将此馬與無馬之人通融乗騎䭾載前至右衞到右衞後軍士等現有草豆令其飼養肥壯遇有調發則乗之而往若無調發則俟其肥時送往京師此皆官馬一匹亦不可損失康熙三十五年十月二十五日諭領侍衞内大臣尚書班第右衞兵丁所借支官庫銀俱已豁免今此兵一到右衞其管轄之人令兵丁急速整備馬匹必致借支官銀措辦如此則兵丁生計又致困苦矣其兵丁備辦馬匹蹔停從容購買目前若有調發現有朕行在之兵其給兵丁所騎之馬或送大同飼養或留右衛飼養俱聼從其便兵部即速移文右衛䕶軍統領康熙三十五年十月二十六日諭大将軍伯費揚古聞右衞軍士回即遣侍衛馬武驅牛羊往迎二十四日朕躬親至渾津邨迓之二十五日賜宴湊三日之糧賞給行糧銀各三兩觀軍士甚疲苦見其步行狼狽情状朕心深為憫惻躬親閲視凡軍士咸以茶飯餅餌酒肉飲食之自諸臣以至軍士歡聲動地前聞調右衛兵朕稔知此兵決難前進雖徒步竭蹶而往亦不能至所指之地故朕以現在飼養馬駝酌量足以制噶爾丹之數率之前來途中聞丹即拉已回朕又將帶來察哈爾兵五百人給以百日餱糧遣往更換黑龍江之兵朕駐蹕歸化城十日歸化城米穀一勺未曽支用凡來降之人再四詳問皆言噶爾丹向哈宻去若果往哈宻則朕意以為擒獲益易矣哈宻距嘉峪闗十二日之程行走亦易故朕意将所領兵竟赴寧夏朕由寧夏前往有調遣之處就近可以相機行事必将噶爾丹擒獲誅戮始愜朕志但朕啟行後噶爾丹及丹即拉等若稱投降而來尔等兵力單薄而右衛之兵無馬朕慮及於此故遣使與汝商酌汝等㑹議具本速行奏聞朕在湖灘河朔待之特諭康熙三十五年十月二十六日諭領侍衞内大臣朕日行惟二三十里耳牧羣之馬何故早來此正當飼草之時嗣後稍遲送至并通諭衆人知之康熙三十五年十月二十七日諭領侍衞内大臣尚書班第黄河水深飲馬時勿絆其足若有傾跌難於拯救可以此通諭衆人知之康熙三十五年十月二十八日諭領侍衛内大臣班第等今年春出征之山陜緑旗兵因軍粮匱乏絡繹遺留在後仍結隊夥眀顯回汛此等較之逃回者不同糧米既乏而離将軍又遠遂各尋營汛而還若行議罪情為可憫應将此等從寛免其察議現拏繫獄者俱行釋放著通行曉諭康熙三十五年十月三十日諭大将軍伯費揚古汝二十九日覆朕諭㫖所奏章疏於初二日晚到閲知欲調太原駐防兵及廵撫標兵一千名沙虎口前未出征騎兵五百名朕思太原兵既未諳戎行且前至歸化城已及千里之遥緑旗兵人惟一馬當此天時嚴寒雖得遠至力已疲竭緊急之頃責其用命實至僨事今以朕營火器護軍千人砲火兵二百四十人前鋒兵二百六十人共足汝所調一千五百之數為汝備之營馬既肥衣装亦厚此兵士隨朕出入諳練為優朝有消息夕可征行朕駐蹕於此噶爾丹確信亟欲聞知其人若有來降付與最善馳騁者迅赴行在若噶爾丹有來降音息喀倫外所居喀爾喀不急急移入内地而遽信其來歸坐誤大事則所繫非淺鮮也頃丹卽拉稱降遣使而反侵我糧情状昭然可覩矣今不可再誤當益切周防更為逺慮為此特諭康熙三十五年十一月初四日諭領侍衛内大臣草甚叢宻營内之火各宜謹慎嚴行禁諭恐於迎風處失火朕御營有何可慮惟衆人之故耳可以此通行嚴加曉示康熙三十五年十一月初九日諭尚書馬竒與貝勒松拉布同往遣前鋒參領阿禄一等侍衛巴爾楚喀為首領伊等餱糧雖貝勒松拉布給與恐不足食用亦未可定可将銀百兩付阿禄於不足時湊用康熙三十五年十一月二十一日諭尚書馬竒厄魯特之嘎爾丹多爾濟聞其窘乏從此地賜給銀兩則道逺䭾載維艱主事華善至甘州肅州等處向地方官取銀一千兩賜與嘎爾丹多爾濟即付來使阿岳持去其阿岳賞銀三十兩同來二人賞銀二十兩康熙三十五年十一月二十二日諭領侍衞内大臣班第等噶爾丹餘孽欲盡殄滅之西路豫備最為緊要西安調遣滿洲兵二千人之馬緑旗兵之馬及李學生所送五千茶馬之外後有繼得之馬遣司員㑹同廵撫俱於甘肅地方飼養則於軍務實有禆益著㑹議具奏康熙三十五年十一月二十四日諭議政大臣大将軍伯費揚古可減省隨從之人馳驛疾速前來商酌軍機将軍事務暫著舒恕代理可速移文康熙三十五年十一月二十四日諭大學士阿蘭泰右衛大同府官員兵丁毋得勞頓馬匹逺道來迎各於所駐城郭之外就近迎接可行文諭之康熙三十五年十二月初四日諭領侍衞内大臣馬思哈等此際甚無事朕與将軍費揚古商議噶爾丹若於今冬來降将軍費揚古處現有察哈爾兵五百人黒龍江兵一百人又将右衛鳥鎗兵二百人副将黄元鳥鎗兵一百人令右衞䕶軍統領将馬上可載之砲酌量以數位給之大同府飼養馬匹鳥鎗前鋒四百人共兵七百人著前鋒統領碩鼐率之前赴右衛豫備停妥聽大将軍調遣碩鼐即率之而進此兵七百人将軍費揚古處所有兵六百人又調集扎薩克䝉古之兵千人共有二千餘人兵力不可勝用矣如此則大同所有鳥鎗護軍一千人火器兵二百四十人前鋒四百人黒龍江兵五百人現今所留護軍二百人槩不調遣令其駐扎養馬於來歲進𠞰之時始行調用著伊等㑹議具奏康熙三十五年十二月初七日聖祖仁皇帝御製文第二集卷二十六
