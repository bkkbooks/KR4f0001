  text: 欽定四庫全書聖祖仁皇帝御製文集卷十目録敕諭諭户部諭禮部諭九卿詹事科道諭康親王傑淑諭大將軍安親王嶽樂諭九卿諭大學士索額圖明珠李霨杜立德馮溥諭戶部諭戶部尚書伊桑阿諭大學士索額圖勒德洪明珠李霨杜立德馮溥學士噶爾圖希福徐元文李天馥諭大學士索額圖諭刑部諭吏兵二部諭吏部諭禮部諭吏部等衙門諭大學士勒德洪明珠李霨杜立德諭內閣九卿詹事科道諭恪純長公主諭大學士索額圖勒德洪明珠李霨杜立德學士噶爾圖希福李天馥
