body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷六目録敕諭諭吏兵二部諭禮部諭吏戶兵三部諭禮部諭管侍衛內大臣諭海澄公黃芳世諭日講官起居注侍讀學士牛鈕諭禮部諭翰林院掌院學士喇沙里陳廷敬侍讀學士葉方藹侍講學士張英諭刑部諭新委西勒圖部落首領喇嘛墨爾根噶布褚諭平南親王奄達尚之信齎奏參將羅思漢諭遣往將軍莽吉圗軍前侍講學士顧八代諭平南親王奄達尚之信齎奏回粵張永祥諭禮部諭吏禮二部諭吏部諭大學士明珠諭大學士巴泰諭廣東提督王可臣諭大學士索額圖諭吏部等大小各衙門諭河南巡撫董國興諭遣往廣西巡撫傅𢎞烈軍前筆帖式噶爾西拖洛諭大學士署禮部索額圗諭工部尚書馬喇侍郎溫代
