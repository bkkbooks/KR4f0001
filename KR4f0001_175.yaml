body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻四十二賦恭祝皇太后萬夀無疆賦有序蓋聞世運昇平内庭懋儀型之慶天心錫嘏彤管髙婣睦之風惟度協於中和斯福昭其美備我聖母皇太后仁慈夙秉恭儉習成濯龍明徳久冠宮闈致治宣仁胥稱堯舜兹當冬月之初正逢周甲之喜敬泐蕪詞上介遐夀聿抒孺慕之微忱兼採臣民之共願瞻依莫殫忭舞惟殷謹拜手而賦曰惟坤作則配天行健圖籙祥呈璇衡瑞獻西池之青鳥飛来南極之明星乍現佐治登三流歡吹萬篚筐玉帛萬國獻其球琳夏清冬溫一心慰以至願婉妗降於華渚飛瓊舞於綺苑祈厯算之永延湛精神而靡倦椀盛沆瀣之漿鼎熟胡麻之飯織夀字以成圖捧霞觴而進勸序届初冬花明永晝欣拜舞以爭先肅趨蹌而恐後岡陵之禱嵩岱同巍松柏之篇椿桃並茂雲璈響徹協鸞鶴以雙清砌草憂忘報嶺梅之先秀指海屋以籌添睇斗杓而錫祐山若積而彌深地以増而益厚普天率土咸頌仁慈閬苑蓬壺齊呼聖夀若乃春秋佳勝媚景舒徐奉晨昏於軒榭親顔色於庭幃岸栁汀花依依含笑隄鶯梁燕嚦嚦相呼於是汎龍艦扶鳳輿或怡情於碧沼或攬勝於金鋪叙天倫之樂事暢逍遥以共娱尊養樂愷古昔所無誠乃邁徽猷於任姒臻至治於唐虞咏兹懿淑富有嘉祥身與心而俱泰福因徳而逾彰謹集萬方之玉帛肅百序之冠裳翦鮫人之千錦貢織女之七襄寳座煙霏層層珠蓋博山香遶陣陣都梁樂奏雲門之曲仙来瑶島之疆竊欣侍奉膝前趨迎朝暮浥霞彩於靈萱酌太和於甘露臣則稟誨諄諄撫兹寰宇際日吉以時良樂和風而甘雨恭逢夀域之開䖍製荒蕪之句願母夀之靡涯享鴻圖之景祚優游悅豫金石比其堅貞綿亘扶疎楩楠同其蟠固愧莫罄於頌颺載降階而陳賦汗血馬賦有序稽古居大功者不忘艱難克巨憝者必懷天眷是以執醜歌於常武撻伐歸於降監而易曰王用出征有嘉折首葢言人君恭行天罰肆討不庭軍旅所届能奏蕩定其績為莫可冺也朕以逆寇噶爾丹攫噬屬國邊徼弗寧用是親秉黄鉞三統六師揚威萬里所過焚其廬帳殲其醜類馘其妻孥散其徒黨未及二載滅此窫窳骨戮専車懸乎藁街敢曰予一人勞哉實天所賜爾當大師再出狡賊畜牧盡為我獲中有良馬繄惟汗血獻至帳殿之前千官七校竦視競悅昔漢得宛馬推本太乙作樂郊廟然不過貳師所攻取耳未嘗自將而殄絶之也則今兹駔駿呈才允足徵天貺而有合於詩易折首執醜之義矣萬幾餘暇因濡翰而賦之曰維歲在柔兆困敦薄伐至於絶幕雷霆震其聲靈箕翼張其䀜霍何小醜之螳臂遇鋒車而猶攫虎旅夾以大鏖封豕殲而染鍔同宛首之圅庭覩遺孽之面縛遹穹廬之悉焚猗善馬之就絡爾其産邁渥洼符亞玉澤俶儻權竒沫赭汗赤氣騰千里姿雄八尺信滅没之逸倫軼超景之絶跡幾埋沙磧以畢生幸仰雲衢而稱徳於是寳鉸飾容金羈節歩聨轡龍媒參鑣象輅競鐡駟以凌飇環豹尾而清路凱音奏而和鳴都人見而企慕昔帝軒膺籙皁服吉光后虞垂衣地出乘黄禹敷水土而飛引御文綏江漢而朱鬛髙驤璿臺驅兩龍之駕代邸騁九逸之良此皆協治平以效瑞而非靖寇亂以寧疆是則神驥之歸列廄絳液之灑鏤章洵足昭我武之有赫與天眷之丕昌顧撫兹八鑾之蹀躞永諧萬國之樂康將愈凜朽馭於夏訓而遠希圖出於羲皇也木棉賦有序木棉之為利於人溥矣衣被禦寒實有賴焉夫既紡以為布復擘以為絖卒歲之謀出之隴畞功不在五穀下嘗稽之載籍島夷卉服註以為吉貝即其種也然止以充逺方之貢而未嘗遍植於中土故周禮婦功惟治蠶枲唐徵庸調但及絲麻至木棉之種後世由外蕃始入於關陜閩粤今則逺邇貴賤咸資其利而昔人篇什罕有及之者故為之賦曰攷吉貝之佳種披丘索以窮源道伽毗而逺来由秦粤而衍蕃倣崖州之紡織製七襄而無痕傚宋人之洴澼比八綿而同温先麥秋而播種齊壺棗而登原宿黄雲於萬蕊堕白雪於千村落秋實於露晞軋機軸於星昏煖佐耆年之帛陽回寒女之門幸卒歲之可娱乃民力之普存若應鐘之司律正薄寒之中人月照牛衣之夜霜侵葛屨之辰家挾千箱之纊路絶百結之鶉曝茅簷而歌愛日賽田祖而洽比鄰謝履絲之靡麗免于貉之艱辛故夫八口之家九土之氓無沍寒之膚裂罕疾風之條鳴時和年豐水耨火耕歲落三鍾之棉塲登百畞之秔同彼婦子樂此太平奚羨纂組之巧與夫縞紵之輕慨風詩之未錄省方問俗將以補豳什而續授衣之經金蓮花賦侔嘉名於華頂結異質於清凉冠方貢之三品賦正色於中央搴芙蓉而在陸麗䓿萏於崇岡顧栁池之非偶豈蘋澗之可方煥彪炳而成文散栴檀而結燼煙横鉢裏之香妝沐江干之靚受範公輸之規移芳彭澤之徑田田與芰蓋殊形矯矯並木蘭比勁若夫當融風之拂樹値暑雨之平池面鏡潭而寫色掩玉砌以横枝葉潤陵晨之霧花含照夜之珠襲輕芬於衣縠映斜月於窻帷本託根於道岸曽何畏乎泥淄爾乃草鋪微緑之區蝶舞輕黄之翅沾芳則土脉流膏落蕊則蜜脾分饋非桃李而成蹊與鞠衣而同製於是滴珠露以硏黄挹金房而瀉翠玉板潤而脂融松腴蒸而雲翳摘珍產於山經表奇芳於幽閟異紅采於巖阿謝朱霞於水曲漏鐫長樂之銅壺燈燦蓬山之銀燭卑五華之仙葩超四照之靈木彼夫緑竹則稱君子青松以儗大夫澤荷載於萹什猗蘭紀於史書惟斯卉之挺秀拔衆彚而標奇感無言於空谷久掩嫮於山陂移土碪於上苑沐日月之光曦化同被於偃草忱獲效乎傾葵菊賦當金飇之蕭摵正珠露之飄零睹百卉之具腓感菀枯之遞更疇晩序而挺節矯氣化而敷榮爰有紫蒂含芳黄華逞茂擢苕頴於春初曜丰容於霜後先梅萼而吐芬繼蘭叢而擅秀既勁操之彌堅實寒香之可嗅爾其宻葉䝉茸繁英歴琭霞蔚雲蒸煙披雨沐色徴土徳之純氣稟金行之肅舞燈影而紛披傍籬根而芳馥似幽人之相依豈世情之共逐是以丘園逸叟山澤癯儒植而供翫擷以當蔬存真味於澹泊協濳徳以敷腴亦有餐霞御氣乘雲握符盤飣桐杞囊繫茱萸或年夀之永延或災患之濳袪斯其著效於仙靈之籙尤不可以耳目拘也至若賦餐英於楚客傳送酒於晋賢泛甘馨於南郡準節令於渾天罔不貞操卓爾髙韻悠然宜名流之競羨亦譜籍之長編矧兹北闕秋深西山氣爽餘桕葉之參差剩楓林之莽蒼蝶揚揚而媚秋雁􅗳􅗳而流響寒漠漠而侵堦月溶溶而度幌爾乃横逸態以寡儔吐層蘤而直上種類間錯名品紛羅映小山之叢桂覆潭水之澄波低昂兮如紫衣之垂袖璀璨兮如白貝之編珂稟黄中之通理知中美之孔多葢與松筠而共勁亦視桃李而殊科彼夫揚霜傑於詩人誇日精於本草藉滋培於寒雨綻鮮華於清曉咸以孤潔方幽人之貞髙逸擬君子之道苟其歴歲寒而長存何恨乎挺生之不早聖祖仁皇帝御製文第二集巻四十二
