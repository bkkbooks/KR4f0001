body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷三十五雜著古文評論崔融諫稅關市疏毋擾是此篇大義文則陸離璀璨色澤彌古張東之請罷兵戍姚州書荒徼絶域古有羈縻之義不欲以勞罷中國也兹篇論情事詳核有識宋璟封還詔書奏經稱諸侯之孝曰制節謹度滿而不溢斯文殆相發揮張說梁國公姚崇神道碑銘詳整巨麗敘功紀行皆舉其大故要而不煩宋公遺愛碑頌古質有鼎彞之色頌辭跌蕩岸異逈非恆徑蘇頲開元三年處分朝集使敕誠勵則嚴注望彌切足以令人勗勉諫鑾駕親征表攄瀝欵誠不煩雕飾而自然精采唐文之絶無俳偶者張九齡開元三十一年處分十道朝集使敕語徑而氣彌舒詞腴而㫖益切可識九齡風度矣請重守令慎選舉疏唐時重京秩而輕外任特甚故九齡極言之至語人材以清議名節為重則古今之通義也上姚令公書昔人論唐諸臣謂姚崇尚通此可謂藥石之針矣張均宗廟加籩豆議孝思無窮而常典有制範圍古今所以安人情而順天道也斯文殆發明禮經之義劉秩貨泉議論錢法源流利弊極詳終之以禁銅為䇿亦救弊之一道也孔璋請代李雍死表雍固奇士斯文與人皆奇較谷永訟陳湯疏更為激昂栁芳氏族論臚次厯代族氏詳核淹通足以為考古之助顔真卿論元皇帝祧遷狀論祧遷義正而詞確論百官論事疏磊落英爽真卿多徑節故文亦似之諡號狀禀經義以立言所見亦超郭子儀辭太尉疏汾陽有功而讓忠誠貫於始終故其文亦絶無勦飾乃爾請乘輿還京師疏陳昌言決大計扶危定傾汾陽可謂社稷臣矣楊綰條奏貢舉疏論貢舉情事皆切中古今流弊意在黜抑浮競崇奬實學良為有本之言賈至議楊綰條奏貢舉疏推原治理所由𥪡議鴻壯與楊綰條奏足相發明元結辭容州表情既懇惻詞復悽楚元結文在唐諸家中極稱峭拔此尤其傑出者劉晏與元載書探古人之遺跡陳當時之利病晏於治河轉漕可稱勤懇故關中卒賴其利也常衮減徴京畿夏麥制制詞瑩淨誦之猶能感人大厯四年大赦詔誠懇所至筆能曲折赴之深得哀矜勿喜之意大厯六年放京畿丁役及免稅制蠲賦省役以憂百姓中多愷悌之言大厯十四年減徴京畿丁役等制音節詞句皆能取澤於古馬璘神道碑銘擷左國之菁華兼兩漢之雋腴恢奇英岸光氣熊炳獨孤及唐景皇帝配昊天上帝議議禮之文貴確不在枝葉繁蔓此文近之上疏陳政清言疏朗足見當時冗兵糜食之害李華中書政事堂記直起直收義存鑒戒文有剛果之氣如風雨驟至集於筆端李翰進張巡中丞傳表張巡孤忠拒寇實有功於唐之再造斯文激揚忠烈聲光飇舉殆足以發抒其氣陸贄興元元年奉天改元大赦詔誕告之文仁音如此故能使當時之民聞詔書而感泣也興元元年命馬燧渾瑊招討河中制止罪狀懷光一人無一語及朔方將士所以離散黨與收拾人心妙有機權足徴廟算興元元年命李晟制國家優重功臣奬其前勞正以䇿其後效此制得之矣論治亂之略疏篇中前言事後言理敷祍而談最為融浹論徴稅疏權衡於先後之間酌量於緩急之際於國無損而於民所益滋多此疏之大指也論納諫疏矚理於微論事舉要論關中事宜狀深識逺算之言不特以閎通擅美論前所答奏未施行狀補牘而陳忠懇之情溢於行墨詞義茂美直餘事耳請罷瓊林大盈庫狀涇原軍士之變以二庫為兵端故贄立言如此請兩稅以布帛為額狀此論與徴稅疏立言互相表裏而更為詳盡請罷兵狀當獻捷之時原兵革之始暢發其意可謂偉辭權德輿兩漢辨亡論尊道重儒君臨之極軌若張禹胡廣輩致身寵榮苟貪祿利使後世指目可謂士林之羞矣答栁福州書太學人材所自出唐宋以來以名賢處之造就多士德輿此書可謂知本之論矣陸贄翰苑集序陸贄為文閎博流暢委折盡致謀畫能中機宜誠奏議之傑搆也臚述生平論次條達序文之似傳體者髙郢魯議魯不得用天子禮樂自是正論而篇中疏密得宜濃纖合法文章之有圭臬者栁冕再答張僕射書文甚簡淨而欵篤之意獨至與權德輿書敘厯代人才得失之由最為明確復杜相公書謂文章由於風俗風俗根於人心卓然探本之言梁肅補闕李君前集序文章有王霸之分立論恢奇前此未有代太常答蘇端駁楊綰諡文貞議義以典而能確詞以恕而能公持此核人可以論世而不爽矣沈既濟論行辟召之法疏立論巖巖清峙可為衡鑑之資于公異收兩京露布辭鋒邁達筆陳韶舉西平故是元功得此庶能相配裴度諫用皇甫鏄程异為相疏度身更患難故雖欵欵忠愛而出之有危迫之音論魏宏簡元稹疏是時度以使相討河朔而惓惓不忘忠謇所謂爾身在外乃心罔不在王室也李絳請崇國學疏文致爽朗髙舉論裴均進銀器狀挺徑之辭一往峭邁聖祖仁皇帝御製文第三集卷三十五
