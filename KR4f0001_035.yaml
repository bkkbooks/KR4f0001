body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷十五奏書奏太皇太后書謹奏聖祖母太皇太后臣躬詣陵寢暫别庭闈叨䝉庇佑一路安善可慰聖懷因此恭請萬安臣引領殿陛不勝瞻切之至謹具奏聞康熙二十一年二月二十日奏太皇太后書謹奏聖祖母太皇太后臣自東行以來於二十三日已出山海關恐煩垂念特此奏知謹請聖躬萬安曷勝懸想之至謹具奏聞康熙二十一年二月二十四日奏太皇太后書謹奏聖祖母太皇太后臣暌離訓誨思念日增戀戀之心須㬰不能忘也日前請候起居定䝉慈鑒再此恭請萬安曷勝嚮往之至謹具奏聞康熙二十一年二月三十日奏太皇太后書謹奏聖祖母太皇太后臣於初四日至盛京謁陵已畢祭告之事次第舉行盛京風土淳厚仰見祖宗創立鴻基庇䕃子孫不淺也専此遣人恭請萬安未盡縷縷之懷謹具奏聞康煕二十一年三月初五日奏太皇太后書謹奏聖祖母太皇太后臣於初五日遣人回京陳述愚欵必䝉聖覽今者福陵昭陵告祭方畢擬初九日率領諸王大臣往謁永陵為此恭請萬安謹具奏聞康熙二十一年三月初八日奏太皇太后書奏為切陳微衷仰祈睿鑒事臣自山海關至盛京水土皆佳獸多魚鮮每當食頃輒念不能馳奉太皇太后聖祖母甚歉於懷到盛京後身親網獲鰱魚􅠧魚設法成段浸以羊脂者一種鹽醃者一種星馳遞送心期奉到之日儻得味仍鮮美庶可稍見微誠山中野燒自落榛實及山核桃朝鮮所進柿餅松子白果栗子附候安奏啓同往伏乞俯賜一笑不勝欣幸康熙二十一年三月初八日奏太皇太后書謹奏聖祖母太皇太后臣初九日自盛京啓行十一日詣永陵告祭環視地形山回水繞佳氣鬱蔥真是興王基業也兹因大典已畢敬想祖宗開疆非易臣至此甚難故欲躬率諸王貝勒大臣䝉古等周行邊境親加撫綏兼以畋獵講武俟所至何處再當具奏專此恭請萬安謹具奏聞康熙二十一年三月十三日奏太皇太后書謹奏聖祖母太皇太后十三日曾有箋奏奉逹慈聼巡狩東行皆平山巨澤日間行五六十里今至栁條邊地方専此恭請萬安謹具奏聞康熙二十一年三月十七日奏太皇太后書謹奏聖祖母太皇太后臣雖屢有章奏言未盡意京師地暖時届春深遙知聖體康和聖情嘉悅臣心殊為欣慰也専此恭請萬安謹具奏聞康熙二十一年三月二十日奏太皇太后書謹奏聖祖母太皇太后臣屢䝉溫諭緩行深加慰勞頃者所歷邊境頗近烏喇二十五日已至其處因思長白山乃祖宗發祥重地臣叨繼大統不能躬行祭祀故於烏喇地方遙拜名山以展望祀之典暫停一二日即可回盛京矣所有愚欵另遣人陳奏先此恭請萬安謹具奏聞康熙二十一年三月二十六日奏太皇太后書謹奏聖祖母太皇太后臣於二十六日曾將情節詳行陳奏外烏喇等處地方於二十六二十七日又經大雨道路甚是泥濘河渠水漲渡橋盡行衝决一二人尚可行走行營人衆跋涉殊屬艱難故臣與諸臣公同商議少延數日俟水勢稍掣即當速回總不越八十日之限也為此恭請萬安一併奏明康熙二十一年四月初一日奏太皇太后書謹奏聖祖母太皇太后臣自到烏喇之後連值隂雨諸處未得巡行今亦不便久稽當即勉強登程矣特遣人恭請萬安兼進江魚統冀慈鑒謹具奏聞康熙二十一年四月初五日奏太皇太后書謹奏聖祖母太皇太后昨初七日稍得晴霽即從烏喇啓行専此恭請萬安兼慰慈念謹具奏聞康熙二十一年四月初八日奏太皇太后書謹奏聖祖母太皇太后自初七日以來天氣雖晴河水未下橋梁難成道路尚多泥淖今已勉強行至中途矣専此恭請萬安一併陳述謹具奏聞康熙二十一年四月十一日奏太皇太后書謹奏聖祖母太皇太后臣途中情形前已具奏不再陳述兹特恭請萬安謹具奏聞康熙二十一年四月十五日奏太皇太后書謹奏聖祖母太皇太后臣於十六日回至盛京矣自謁陵望祀長白山以來經過之處軍民人等無不歡欣鼓舞喜見太平皆仰賴聖祖母鴻庥福庇所致也専此恭請萬安謹具奏聞康熙二十一年四月十八日奏太皇太后書謹奏聖祖母太皇太后臣於四月二十日已從盛京啓行兹因恭請萬安之便謹具奏聞康熙二十一年四月二十二日奏太皇太后書謹奏聖祖母太皇太后捧讀教諭深䝉慈念感戴無涯每聞聖祉康和臣心殊為欣忭兹特恭請萬安謹具奏聞康熙二十一年四月二十六日奏太皇太后書謹奏聖祖母太皇太后臣久别庭闈急欲望見聖顔四月三十日進山海關五月初一日留皇太子同大營按程緩行臣當先詣宫闕恭請萬安初四五之間必可到都喜慈雲之日近奉教誨之有期専此謹具奏聞康熙二十一年四月三十日奏太皇太后書臣於十九日至五臺菩薩頂目覩地方官吏督率工匠鑿山開石修除道路皆極敬謹民役甚勞又詳看長城嶺迤東雖係﨑嶇逼仄尚可用小肩輿勉強登陟至長城嶺尤為難行高可二十餘里皆屬峭險其陡崖不可下視今雖就原徑修砌稍寬儻登陟萬有不虞臣何以當之伏冀太皇太后聖祖母睿鑒愚悃仍詢太監趙守寶定奪實為至幸鑾駕既已到此臣豈不欲太皇太后聖祖母至菩薩頂瞻禮但極危至險之處不行奏明為孫者不能即安也曷勝悚惕待命之至康熙二十二年九月二十日聖祖仁皇帝御製文集卷十五
