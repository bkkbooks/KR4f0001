body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十七目録古今體詩二十八首暮秋重出居庸關登雞鳴山遙祝皇太后千秋䝉古老稚來迎咸勞遣之閲馬牛羊羣山行厄魯特之衆相繼來歸咸詢其父母兄弟妻子為陳前所獲者覓令完聚塞外初冬駐蹕歸化城古寺賜宴諸䝉古歸化城夜月昭君墓并序塞外寒夜書懷黃河并序十一月三日泛舟黃河流凌始下舟行之頃河水瑩潔波浪忽平脫脫城冰渡鄂爾多斯行圍雉兔甚多曉寒念將士河套西望噶爾丹遣人乞降示議政諸臣途中長至示大將軍伯費揚古入沙虎口右衛駐蹕經大同府并序汗血馬
