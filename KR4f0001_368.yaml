body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十四目録古今體詩三十五首舟中觀耕種春歸南方靑竹叢林不乏觀玩北地氣寒非保護得宜即難藝植朕嘗有事河干往來數次覽竹樹之暢茂暫時停輦即行後於禁苑種植頗蕃今經三十餘年邇來延致數畝之廣其圍至八寸徑二寸五分有零古人以竹比君子因而思及草木無知積小以至於髙大人有血氣加之培養豈非國家楨幹之選歟故賦七言一律記之五十四年仲夏避暑途中瑞麥盈野賦五言律以記每見村農野老不識不知天然自得孝弟發於至性朴誠不事文辭故美其實而取先進之意賦七言一律擎蓋荷珠調寄鷓鴣天雨後戲題回文詩佛手柑賦得江城五月落梅花芝徑雲隄細雨歸舟題蘭詠剪秋羅餞大學士李光地暫回閩省秋幸出郊見收成志喜五言律二首賦得帳殿鬱崔嵬二首康熙五十四年十月初三日避暑山莊恭祝皇太后萬夀詩并序冬日可愛冬夜偶成二首餞閩撫陳璸季冬湯泉五十四年除夕偶成康熙五十五年正月元旦書懷上元前三日立春五十五年正月十二癸卯立春是日風從東北而至景雲密布瑞雪鋪地至十三日未止書云立春與元日同占乃收成之兆故喜民有足食之慶朕慰宵旰之憂賦五言排律以記其事春寒梅遲湯泉道上遇雪口占春風扇微和二首題朱倫瀚手指畫雪梅竹二首兩廣總督趙宏燦陛見來京賦得二月春風似剪刀
