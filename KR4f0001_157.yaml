body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三十三記恭侍皇太后駕臨金山記朕臨馭以來緬維祖宗付託之重孜孜圗治宵旰不遑兹幸中外清平無事則裕民肅吏以登上理端在斯時顧朕身居九重慮周蔀屋閭閻疾苦容或壅於上聞又淮黃濬築務繁非親行相度亦無由底績於是載舉南巡之典以咨求民瘼然上念皇太后春秋亦髙矣誠恐違離日久定省有缺於心歉然用是敦請同行謹擇於今年二月之吉朕率諸子捧鑾輿登仙鷁發自潞河一路問安視膳無間宮闈朕心少慊惟皇太后天性仁慈軫念民隱尤切每見田家作苦則指謂諸子曰稼穡艱難如此汝輩生長深宮可勿念乎諸子悉受教惟謹即朕日祗聆懿訓所至布德施惠惟恐一夫不獲聖慈每聞之必為色喜顧謂諸子曰汝父皇愛民如是太平可永保矣老身為加一飯蓋盛德之下逮如此河工既閲畢朕將南由吳㑹歷武林取道建業以歸乃復奉慈駕南臨於四月之望自瓜步渡江江中有峰聳峙曰金山亦名勝也山椒庭院清幽齊堂閟邃爰掖慈帷於斯駐蹕焉而是日天氣晴和江光如鏡帆檣上下煙樹氤氲皇太后隨意曯眺天懷舒暢朕率諸子進蔬茗獻筍芋即山櫻沼芡竝荷親嘗曰田間味何可棄也蓋皇太后秉躬謙抑雖瞿曇蘭若亦施恩禮又聖澤所加首先㷀獨諸凡村嫗田婦罔不攜持童稚環繞翟車仰瞻宮扇一時懿綸溫慰賞賚駢蕃而臣僚命婦之嫻於禮者亦皆環珮霞帔伏迎道左親炙鑾輿遠近傳為盛事山陬海澨婦孺旄倪稱兕觥而祝慈壽者且數千里趾相接也猗與休哉朕觀從古陰教如省繅觀穫載在禮經即前代宣宗亦嘗親奉母幃巡覽畿甸賦詩紀事侈為美談朕兹幸際升平太和豫順合億兆之歡心以隆尊養亦庶幾以孝治光海宇之意而皇太后之徽音懿行可臚彤管為萬世母儀法者尤亘古罕覯也朕謹薰沐拜紀勒諸貞珉以垂奕祀云創興盛京海運記傳曰補乏薦饑道也朕孜孜圖治冀臻上理一夫不獲若納諸隍是以平時謹財用廣委積一遇凶荒則蠲租已責之外開廩發賑設糜平糴靡政弗舉惟是東北地勢曠莽陸挽維艱遼左暨朔漠諸部尤屬險逺計惟航海轉粟事簡功倍規畫於中者非一日矣癸酉冬盛京穀不登民艱於食乃發山東濱海郡縣常平倉米二萬石由登州運至三坌河海運之役自兹始明年二月親幸天津訪海道自大沽口達三坌較便三月命部員董厥事截留山東漕米二萬石用商船三十連檣出津門海若效順三晝夜即抵三坌因建倉遼陽開化城諸處儲峙之又分舟運至盛京米價頓減饑困以蘇朕念盛京根本重地積貯多則民食永足乃於丙子春復截留山東漕米五萬石運至三坌河如故其秋諭截留次年漕米六萬石遣部臣偕督撫造新船二十加運二萬石既又諭增造船十來嵗可運至十二萬石猶慮運船少也明年春諭福建將軍督撫勸導商船泛海貿易至則給以運直所齎貨物止徵正稅一時商賈靡不踴躍趨事海舶大集於是截留河南山東漕米共二十萬石用天津浙閩船前後轉運以達盛京者共數十萬有奇適烏喇告饑遂以所運粟分輸易屯河士卒數萬咸賴生全而是時大兵方進剿逆寇噶爾丹需糧孔亟用以頒給軍儲不匱其年冬盛京陵寢各屬兵民及科爾沁諸屬國窮戶人等咸以疾苦聞復發盛京存貯米賑之其所濟之遠如此因命來歲仍自大沽故道用天津船運山東河南漕米六萬石以備軍民之需而商舶至是亦弗用矣是役也挽數十萬之粟經數千里之遙帆檣一集倉庾俱滿無踰關度嶺之勞絶車載牛牽之苦波委水輸禾囷自轉賑陪京而人民胥樂給軍糈而庚癸不呼內以撫綏藩部外以摧滅强寇皆由肇舉海運一法斷自朕衷屢試而效故自侯甸以至要荒均受其賜夫舉一事而有濟於一方者古人尚不敢忘况若兹之費省利大功神惠博使不載其始末垂示簡冊將良法美意久而漸失後何所考用是援筆而紀其實云海運賑濟朝鮮記朕聞救灾拯患王政所亟是以夙夜求莫雖在遐荒絶域猶若恫瘝乃身矧屬在藩維苟有疾苦何忍一日置也康熙三十六年冬朝鮮國王李焞奏比歲薦饑廩庾告匱公私困窮八路流殍相續於道籲懇中江開市貿穀以蘇溝瘠俾無殄國祀朕深為惻然立允其請遂於明年二月命部臣往天津截留河南漕米用商船出大沽海口至山東登州更用雞頭船撥運引路又頒發帑金廣給運直緩徵鹽課以鼓勵商人將盛京所存海運米平價貿易共水陸運米四萬石加賚者一萬石朝鮮舉國臣庶方藜藿不飽獲此太倉玉粒如坻如京人賜之食莫不忭舞欣悅凋瘵盡起該王具表陳謝感激殊恩備言民命續於既絶邦祚延於垂亡蓋轉運之速賑貸之周亦古所未有也朕念朝鮮自皇祖撫定以來奠其社稷綏其疆宇俾世守東藩奉職修貢恩至渥矣兹者告饑不憚轉輸數千里之勞不惜糜費數萬石之粟環國土而戶給之非獨救灾拯患遠邁春秋泛舟之義實所以普澤藩封而光昭先德也是烏可以無記暢春園記都城西直門外十二里曰海淀淀有南有北自萬泉莊平地湧泉奔流㶁㶁匯於丹陵沜沜之大以百頃沃野平疇澄波遠岫綺合繡錯蓋神皋之勝區也朕臨御以來日夕萬幾罔自暇逸久積辛劬漸以滋疾偶緣暇時於兹游憩酌泉水而甘顧而賞焉清風徐引煩疴乍除爰稽前朝戚畹武清侯李偉因兹形勝構為別墅當時韋曲之壯麗歷歷可考圮廢之餘遺址周環十里雖歲遠零落故蹟堪尋瞰飛樓之鬱律循水檻之逶迤古樹蒼藤往往而在爰詔內司少加規度依髙為阜即卑成池相體勢之自然取石甓夫固有計庸畀直不役一夫宫館苑籞足為寧神怡性之所永惟儉德捐泰去雕視昔亭臺丘壑林木泉石之勝挈其廣袤十僅存夫六七惟彌望漣漪水勢加勝耳當夫重巒極浦朝煙夕霏芳萼發於四序珍禽喧於百族禾稼豐稔滿野鋪芬寓景無方㑹心斯遠其或穱稌未實暘雨非時臨陌以閔胼胝開軒而察溝澮占離畢則殷然望詠雲漢則悄然憂宛若禹甸周原在我户牖也每以春秋佳日天宇澄鮮之時或盛夏鬱蒸炎景爍金之候機務少暇則祗奉頤養游息於兹足以迓清和而滌煩暑寄遠矚而康慈顏扶輿後先承歡愛日有天倫之樂焉其軒墀爽塏以聽政事曲房邃宇以貯簡編茅屋塗茨略無藻飾於焉架以橋梁濟以舟楫間以籬落周以繚垣如是焉而已矣既成而以暢春為名非必其特宜於春日也夫三統之迭建以子為天之春丑為地之春寅為人之春而易文言稱乾元統天則四德皆元四時皆春也先王體之以對時育物使圓頂方趾之衆各得其所跂行喙息之屬咸若其生光天之下熙熙焉皥皥焉八風罔或弗宣六氣罔或弗達此其所以為暢春者也若乃秦有阿房漢有上林唐有繡嶺宋有艮嶽金釭璧帶之飾包山跨谷之廣朕固不能為亦意所弗取朕匪敢希蹤古人嫓美曩軌安土階之陋惜露臺之費亦惟是順時宣滯承顏致養期萬類之乂和思大化之周浹一民一物念兹在兹朕之心豈有已哉於是為之記而系以詩詩曰昔在夏姒克儉卑宮亦越姬文勿亟庶攻若稽古訓是欽是崇針銘戶牖夙夜朕躬棟宇之興因基前代巖宿丹霞檐棲翠靄營之度之以治蕪廢有沸泉源汪濊斯在駕言西郊聊駐綵斿甘彼挹酌工築斯謀瑩徹明鏡縈帶芳流川上徘徊以泳以游因山成峻就谷斯卑咨彼將作毋曰改為松軒茅殿實惟豫宜亦有朴斫豫尚念兹撰辰經始不日落成豈曰游豫燕喜是營展事慈闈那居高明遐矚俯瞰聊用娛情粵有圖史藏之延閣惟此大廡㑹彼朱襮鬱鬱溝塍依然耕鑿無假人工渺瀰雲壑有鷁其舟有虹其梁可帆可涉於焉徜徉文武之道一弛一張退省庶政其罔弗臧嘗聞君德莫大於仁體元出治於時為春願言物阜還使俗醇暢春之義以告臣鄰萼輝園記京師西北隅地曠而幽西山疊巘近可指矚清泉交流渟泓於其間林木茂密禾黍芊綿有古鄠杜之風焉朕既築暢春園時往以省耕觀稼炎暑蒸鬱亦將以憩息於此也東北御果園舊地以賜裕親王其地有清泉喬木因而葺治循乎自然林樾丘壑具蕭逺之致王既為斯園請朕名之夫詩以棠華比兄弟朕每讀詩未嘗不三復留連思古人友愛之誼天倫之樂雍雍怡怡被於絃誦竊欣慕焉因以萼輝名兹園蓋有取於詩人之㫖也王秉性寬和入則集議巖廊翼贊機政退居之暇澄懷簡淡不涉外務時當風日佳美眺覽郊坰輒至斯地蔭嘉樹鏡清流問農閲圃古人有言為善之暇想足怡神王之遊息於兹園也其猶此意也歟唐開元中營興慶宮賜諸王第於宮側建為花萼相輝之樓史冊傳之朕所嘉尚於是既命其名而並記其事云聖祖仁皇帝御製文第二集卷三十三
