body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻四十六目錄古今體詩四十二首二月三十日親統六軍徂征漠北出居庸闗赤城龍門過獨石口出塞訓厲軍士北藩諸部君長来迎沙漠二首風雪致禱遂爾晴霽賜皇子允祉賜皇子允祐春寒軫念將士途中新夏經明成祖勒銘處指示扈從諸臣并序賜皇子允禩帳殿對雨念畿輔四方農事賜將士食違皇太后定省言懷行殿示諸皇子瀚海營夜南望北斗雁棲沙磧有序時乏水於山坡得泉志喜克魯倫河上流雨後草生登山巔下瞰克魯倫河周覽山川形勢指麾營陣渡克魯倫河網魚暫駐待後軍至軍中夜嘗擐甲達旦噶爾丹潰遁遂窮追之剿滅噶爾丹大㨗自賊中投誠来者皆宥之遣使示皇太子㨗音示宮中㨗音班師次拖陵班師拖陵留皇長子允禔殿後示之行間賜大學士張玉書外蕃諸部落絡繹来賀宴賚之入關見雨膏潤澤禾苖茂遂喜而有作彈琴峽南口入京見百官及耆民童穉歡迎道周賜將軍孫思克
