body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻三十八雜著古文評論神宗賜韓琦詔仁言雋永諭邊臣詔從容不迫是盛世語求直言詔時有古氣磅礴其間諭文彦博手詔馬政國之所重宜加意整飭乃爾求言詔温文安雅能以頓挫出之詔令佳品也資治通鑑序質而不浮足以綜貫源流包括全史髙宗罷上壽詔語亦悽惋察吏詔達於政體之言幸學手詔整練有餘視北宋諸詔文又一格調矣禁加耗詔真實辭不假文飾孝宗斷獄詔有古崛之風奬諭魏王愷詔篇短詞腴極有古趣興水利詔情勢朗豁言故鑿鑿賜魏王愷詔辭甚雅令禁兩税折錢詔酌盈劑虚言獨欵悉罷官鬻鹽詔真切處可以感人光宗諭守令詔本末先後四字措語甚約而包舉甚博信為政之紀綱寧宗賑荒詔詔意諄復仁心為質理宗從祀五臣詔一事而有闗千載者如此等詔文是矣罪已詔語自懇到不為矯飾張齊賢論安邊疏議論能探究源本而文體亦堅重不靡田錫論邊事疏思慮深逺老成謀國之言上太宗疏通體愷切而無亢激之氣王禹偁請諸邑嚴守備疏備禦有方在當時為救弊之要長洲縣治記清晰之筆陳靖勸農疏名論碩畫切實不浮魯宗道請重親民之官疏斥言吏弊詳確無倫孫奭諫祀汾隂疏飇發泉流不以字句見長再諫祀汾隂疏與前疏雖出一意而彌増剴至論天書明摯聳聼識解視王旦諸人髙出數等矣尹洙諫時政疏三事中言必中的不僅以條暢為長蘇舜欽玉清宫災上疏湛深經術發為讜言宜其雅健乃爾宋祁言災異疏明而無隱樸而不支張方平條制資廕勅𢎞此逺謨育才厚俗胥有賴焉論屯田源委分明事理詳悉王珪賜呉奎免恩命不允詔淵然古色戒諭夏國主詔辭不過嚴而簡潔有體賜皇長子淮陽郡王免恩命不允批答深潤無俗氛賜皇伯祖承亮改封秦國公免恩命不允批答舉止闊逺絶去纖弱賜韓琦免明堂恩命不允批答鉅典閎辭略見此答除富弼制氣局闊大非鄭公不稱此辭蔡襄論増置諫官指事殷勤意亦悠然無盡送黄子思寺丞知咸陽序以令與宰相竝舉益見社稷民人之重包拯請罷天下科率深見精慮發於言表論委任大臣理正識超議歸矩矱石介明禁法令有重輕行之有本末本末輕重一舛則民罔知所從此篇深得體要而文亦爽健上潁川蔡侍郎書正辭不撓一種虚受之意自藹然可掬呉育駁唐詢請停賢良茂才二科疏詳達之章既有益於人才亦有闗於政治錢公輔仁宗配明堂議文雖專論一朝而事闗典禮可備採擇鄭獬應詔上疏籌時經世蓄於心而發於言備亂拈出公私二字立論最善而文筆矯矯足以勝之范仲淹上時務書不為峭急之音而意自深至推委臣下論博求賢士一篇大意文最穆然可思韓琦諫垣存藁序進言一衷於理而出之以至誠得古人臣獻納之義富弼辭定䇿遷官奏沉至中益著惓懇司馬光上殿論御臣劄子通達古今故發必中的請定儲貳疏無雕鏤之迹發乎自然上皇太后疏思理淹詳立説明整上英宗疏義正辭明可祛紛紜之論論治身先孝治國先公疏兩意竝舉引人入勝上英宗言時政闕失疏質言無飾文復雅健仁宗配明堂議詳據典禮可正諸家之謬崇奉濮安懿王典禮議名義正大千古不磨應詔論體要反覆條暢綽有餘裕辭職疏不泛作辭榮之語故爾可傳乞省覽農民封事劄子備言民事艱難以深斥新法之害周詳隱惻得無逸一篇之意論皇城司巡察親事官劄子超然知體之論五規五篇振挈要領可謂碩論訏謨而氣體亦深厚爾雅乞改求諫詔書劄子言事之文能扼理要知人論用筆如剸犀截象嶄然有勢范鎮請裁冗官冗兵疏洞中當時情事故明快如此其欲寛民力以為備尤為國家本計再陳官冗兵多疏詳復推原文勢愈緊而用意愈切殆彌災之本術經國之藥言也范百祿對制科䇿正論典禮之失故詞不嫌於激切聖祖仁皇帝御製文第三集巻三十八
