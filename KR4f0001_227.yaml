body:
  text: 欽定四庫全書聖祖仁皇帝御製文苐三集卷十五敕諭諭內閣九卿等湖廣江西糧米在江南浙江販賣者甚多而米價並不曽減令爾等會議今覽爾等與九卿所議大略相同却於朕意迥相懸殊如爾等議將收買米石堆貯者定例禁止儻因此借端妄行摉查則徒為衙門人役之利于百姓絲毫無益而且有損雖將稽察不清之督撫等降處亦不知畏何濟之有爾等所議者枝葉耳根本處全未講求朕意將此米石于根本處詳加稽察則收米堆積之斃自除湖廣江西之米或江南浙江官民及貿易之人或本地百姓及他處貿易之人在某馬頭某鎮店將某家米買賣若干及姓名察明甚易行文湖廣總督巡撫江西巡撫令差賢能官員於有名馬頭大鎮店內察明買賣人姓名米數至月終即具摺奏聞江南浙江總督巡撫處亦照此奏摺咨會若如此行而湖廣江西之米不至江南浙江販賣則更于何處販賣耶凡此米石人皆共知買賣事情不待禁約而販賣者必多似於百姓大有裨益朕此旨並爾等所議奏摺付九卿同閲若皆以為是著交與該部將朕諭旨作速咨行湖廣江西江南浙江總督巡撫若更有應議之處著另議具奏康熙四十八年七月初十日諭內閣九卿等湖廣省衡州永州辰州瀏陽永興等處糧米甚多先年征剿逆賊時百姓盡皆避匿大兵于數村莊內尋覓糧食凡歷數月取用未竭此等地方皆有水路可通若有通江西水路之處則湖廣督撫或難於稽查亦未可定若該撫等親詣此等地方悉其情形更為善也康熙四十八年七月十四日諭兵部國家慎簡武臣專膺閫寄惟是敉寧疆圉和輯軍民斯於地方大有裨益而酬庸奬勳之典宜加優渥焉陜西提督潘育龍久履戎行蔚建勞績歷試重鎮克殫謀猷自擢任西秦以來御兵飭伍有勇知方邊境肅清閭閻安堵既威望之茂著亦年齒之日增兹特晉加顯秩用彰異數著授為鎮綏將軍仍管陜西提督事務以示朕隆眷老臣至意爾部即遵諭行特諭康熙四十八年八月初七日諭河南巡撫鹿祐督撫奉職循理不畏懼人本無所難每因部費繁多以致不能潔已誠使實心任事專為民生則一切情面俱不宜瞻顧近來科道糾參皆受人指使並無從公出于已見者督撫亦然明知某州縣居官不善必私計其人曽有權要相託與否如有囑託便不敢糾參賢否混淆不能辨别皆此故耳河南俗朴民淳本易為治比年五榖豐收今歲開歸等處雖稍被水潦已曽蠲免錢糧交該地方官賑濟嗣後一有災傷爾即當據實奏聞不可隱匿亦不可過實積穀備荒最為緊要但各處積穀未必皆實推陳易新之説聼之雖美而行之甚難當青黃不接時將倉穀散去倘值秋成歉收便不能還倉若再如此一年則倉穀必多虧缺設遇災荒將何賑濟爾等漢官一見倉庫虧空心中張皇因而有託人打點安排之事官聲便不能好巡撫乃地方大吏不在徒務虛文應實心籌畫思有益于民者為之况清廉不專在一已必使布按以下一併為廉吏方能有益于民所謂廉吏者亦非一文不取之謂若纖毫無所資給則居常日用及家人胥役何以為生如州縣官止取一分火耗此外不取便稱好官其真正貪黷無忌者自當參處若使一概從苛糾摘則屬吏不勝參矣至于刑獄關係民命與他事不同錢糧等項有不合處部院可以駁查刑獄命案一經勘定部中亦難更改案內但有可疑務須駁審朕即位五十年來于刑名最加慎重凡督撫陛辭之時朕每以刑名一事須至詳至愼諄諭再三爾可留心聼讞以仰體朕矜恤庶獄之意又文武官員共事一方每多不和總兵等官私扣月糧未足深罪文官雖極清潔尚足自給武職有何所入儻地方有事文臣可以坐鎮武官須有身臨鋒鏑之苦自唐以後文武始分從前文武相兼之時可云我非武臣亦推諉他人耶爾到任務與武臣相和兵民一視乃于地方有裨益也康熙四十八年九月二十八日諭都察院通州兩岸堤工每年派官修理一年一換前旨甚明本內未將本年所派司官明白指出含糊推諉具議殊屬不合著都察院嚴察議奏康熙四十八年十月初二日諭大學士溫達尚書耿額朕觀八旗漢軍人等用於文職者多而用於武職者少嗣後武鄉會試亦著八旗漢軍人等考試所增額數不過數名可以收健勇人才之用於武科甚為有益康熙四十八年十月初五日諭大學士溫達張玉書陳廷敬李光地兵部尚書蕭永藻侍郎李先復宋駿業武科取士國家大典數科以來所見人才技勇漸不如前此事關係甚重宜廣其途以備録用如在內部院司官筆帖式兼管武職歷升至堂官者不乏其人在外提督總兵官亦多起家行伍人才何定之有現在八旗監生充甲兵者俱有入文場應試之例今直省緑旗各營兵丁及拔補把總千總並年滿千總等久在行伍多有健勇及善射之人此等人員內有能讀書通曉文義願入武場應試者應分别令其應武鄉會試其應鄉試者即于所在充伍及出仕地方應試不必復回原籍至雲南貴州廣西等逺省來京應武會試者亦應酌定中額使不至脫科以示鼓勵如此則緑旗人員內有技勇者皆得入科目以自效而武榜人員內亦得實有技勇之人於武科甚有裨益其福建廣東二省武進士舉人生監或兵民人等有熟諳水性練習水師事宜願於出洋巡哨船隻隨官兵效力者如果能擒殺賊衆立有功績著督撫察明保題具奏康熙四十八年十月初六日諭刑部江南浙江連歲災荒地方困苦又今年兩省疾疫盛行人民傷斃者甚衆雖該省督撫未經奏聞朕訪知災病之狀深用惻然民命至重朕宵旰孜孜惟以矜全百姓為念一切刑獄奏讞尤加欽恤比年因江浙盜案疊見凡犯盜劫者悉皆依律坐罪今閲秋審情真各案所議情罪俱屬允協但念災荒疾病之餘復將數十罪犯一時正法朕心殊為不忍江浙兩省應處決情真人犯俱著停止一年康熙四十八年十月十六日諭户部今嵗入夏以後朕因南方二麥不登北地亦被微潦宵旰軫慮甚切焦勞繼而畿輔稔收三吳秋熟兼以四方奏報咸獲有年朕心始為稍慰夫水旱災傷事所時有而小民皆如赤子一以疾苦見告即不忍恝置于懷今念江南淮安府揚州府徐州三屬地卑積水被災獨重秋禾未播種者甚多雖本年錢糧業經全免又曽遣官分賑而失業之民宜加格外之恩以𢎞愛養康熙四十九年淮揚徐三屬邳州等十九州縣三衛額徵地丁銀五十九萬三千八百兩有竒著通行蠲免又河南省歸德府屬啇丘等六縣山東省兖州府屬濟寧等四州縣或被夏災或被秋災雖已各依分數例免額賦並宜更施膏澤用厚民生康熙四十九年商丘等縣應徴地丁銀二十萬二千四百兩有竒濟寧等州縣應徴地丁銀一十四萬六千六百兩有竒俱著通行蠲免其應蠲免州縣有舊欠未完錢糧亦著停徴一年諭旨到日各該督撫嚴飭有司體朕殷殷軫恤災氓至意張示遍喻悉心奉行務俾窮鄉僻壤均霑實惠如有不肖官吏借端私徵者即行察參爾部即遵諭行特諭康熙四十八年十月二十五日諭大學士溫達張玉書陳廷敬學士塞爾圖孫柱仇兆鰲王思軾滿丕滿寶顧恱履潘宗洛頃郝林條奏各省錢糧虧空事情彼但知州縣錢糧有歷年虧空之斃而所以虧空之原未之知也則亦徒為空言而已凡言虧空者或謂官吏侵蝕或謂餽送上官此固事所時有然而地方有清正著名之督撫而所屬官員虧空更多又何説也如趙申喬齊世武張鵬翮李光地皆不受屬官餽遺何以州縣有司尚多虧空耶爾等年齒雖老朕聼政日久更歷事多各州縣虧空根原察之甚悉從前各省錢糧除地丁正項外雜項錢糧不解京者甚多自三逆變亂以後軍興浩繁乃將一切存留項欵盡數解部其留地方者惟俸工等必不可省之經費且節次裁減為數甚少此外一絲一粒無不陸續解送京師雖有尾欠十數兩部中亦必令起解州縣有司無纖毫餘地可以動支因而不得已有那移正項之事此乃虧空之大根原也年來户部覆本嚴查虧空錢糧者朕從未折出蓋深晰病原在此州縣官員實多苦纍但既參虧空必須追賠如正項錢糧二千兩未完五百兩按分數議處其例甚輕若那用五百兩則處分甚重今但令之賠償足額則那移出納還充官用其罪可寬便不必深究凡事不可深究者極多即如州縣一分火耗亦法所不應取朋友交際一二十金亦法所不應受若以此法一概繩人則人皆獲過無所措手足矣且如户部庫中錢糧歷年存積數極難清前此庫貯一二千萬兩時曽令部中盤查經一年後方始查完竟多餘銀二十餘萬即各倉糧米亦歷年堆積陳陳相因贏餘不少不肖官吏侵盜銀米者未嘗無人若行盤查數仍不缺所以斃極難除總之定例所在有犯必懲其中細微不能深究諸事大抵如此現今户部庫銀收貯五千餘萬兩時當承平無用兵之費又無土木工程朕每年經費極其節省此存庫銀兩並無别用去年蠲免錢糧至八百餘萬而所存尚多因思從前恐內帑不足故以外省錢糧收入户部自今觀之亦未為盡善天下財賦止有此數在內有餘則在外不足凡事須豫為計乃能有備以部庫銀一二千萬兩分貯各省庫中似亦有濟儻在外各省一旦倉猝需用反從京師解出得毋有緩不及事之慮耶此亦當於無事之時從長商確者也爾等可將朕此旨一一向九卿等言之康熙四十八年十一月初十日諭吏部漕運總督嵗輸玉粒上裕京儲綏理軍民拊循丁辨職任為至重要總督桑格自簡任治漕以來老成持重謹厚寬平殫力轉輸悉心經畫每嵗身親儹運俾漕艘依期抵通十餘年間從無稽遲貽誤之事且馭衆有法恤下有恩所屬運官旗丁無不感頌愛戴真不愧為地方大吏今年齒已長而精力未衰久任勤勞良可嘉尚著特授為兵部尚書兼都察院右都御史仍加太子太保以示朝廷崇奬老臣酬庸褒勳至意爾部即遵諭行特諭康熙四十八年十一月十三日聖祖仁皇帝御製文第三集卷十五
