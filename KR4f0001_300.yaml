body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集總目三卷第二十一論理學論先天後天論同聲相應論序性理精義序朱子全書序歷代年表序卷第二十二序御選唐詩序康熙字典序月令輯要序周易折中序春秋傳説彚纂序福建總督范承謨畫壁集序卷第二十三記刈麥記碑記顯應寺碑記􅡹髻山玉皇閣碑記湯山龍尊王佛廟碑記碑文資福院碑文溥仁寺碑文彚宗寺碑文平定西藏碑文卷第二十四銘雕畫盤中果銘題跋題沈宗敬畫文欽若昊天厯象日月星辰敬授人時於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信事父母能竭其力事君能致其身溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説由堯舜至於湯五百有餘歲若禹臯陶則見而知之若湯則聞而知之由湯至於文王五百有餘歲若伊尹萊朱則見而知之若文王則聞而知之由文王至於孔子五百有餘歲若太公望散宜生則見而知之若孔子則聞而知之烏鬚文頌景福宮頌寧壽宮頌卷第二十五雜著七詢卷第二十六雜著康熙幾暇格物編計二十五條卷第二十七雜著康熙幾暇格物編計二十三條卷第二十八雜著康熙幾暇格物編計一十四條卷第二十九雜著康熙幾暇格物編計一十一條卷第三十雜著康熙幾暇格物編計一十二條卷第三十一雜著康熙幾暇格物編計八條賦時和年豐慶祝賦并序
