body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷十五敕諭諭大學士伊桑阿阿蘭泰尚書馬竒侍郎思格則阿爾稗學士宋柱齊穡傅繼祖綏色前遣喇西察巴林翁牛特克什克屯阿魯科爾沁六旗貧乏者賑給米糧喇西未曽遍察近聞巴林等六旗貧乏者不能聊生可速敕喇西令率司官筆帖式察明六旗貧乏口數報之內大臣明珠明珠今事畢將返矣可令以文書迎之於途明珠可留坡賴村監視散給汝等同户部理藩院㑹議以聞康熙三十四年十二月初八日諭大學士伊桑阿阿蘭泰尚書馬竒𫝊臘塔索諾和圖納侍郎朱都納馬爾漢學士宋柱齊穡傅繼祖綏色革職及候缺官又進士舉人秀才監生俊秀無品級筆帖式管庫之士有願自備馬匹牲口往軍前效力者凱旋之日革職者以原職用候缺官及進士諸色人以應升之職先用若或被傷及陳亡者革職者以原品恩恤議叙進士以下亦照職官一體恩恤議叙廢官中或年老有疾不能身赴願以子弟代者亦照身赴例視其原官給賞議叙復其原官敕兵部傳諭八旗及內府佐領察前往效力人數具聞康熙三十四年十二月初十日諭大學士伊桑阿阿蘭泰西路師行後預備出征之王貝勒貝子公等酌量發往歸化城屯守康熙三十四年十二月初十日諭大學士伊桑阿阿蘭泰學士宋柱陶岱齊穡綏色雅克薩諸地夙産佳貂比年羅捕殆已至稀乏若以貂不及格之故遂復治罪則官員徒爾受過佳貂實無可得自兹以往額數既足以不及格之故免其處分其令戶部理藩院內務府㑹同移文黑龍江將軍薩布蘇仍令其定議具奏康熙三十四年十二月十九日諭大學士伊桑阿阿蘭泰兵部尚書索諾和侍郎朱都納馬爾漢古北口總兵官李世逹奏言身病不能前來今當軍興之際可升石峽副將馬進良為古北口總兵官石峽副將以劉虎為之索額圖曽奏總兵官許盛年老有疾其令解任此缺升通州副將白斌皆令於年內速赴新任白斌既到任可選其標下兵卒前赴軍中總兵官李世逹令養病來京病痊起用康熙三十四年十二月二十三日諭大學士王熙等朕自臨御以來日以愛養兵民為念未嘗輕於用兵遠事征討方今宇內固已無事惟厄魯特噶爾丹違背約誓恣行狂逞侵略我歸服之喀爾喀恐漸致邊民不得休息故特遣發各路大兵分道並進務期剿蕩以為塞外民生除患向年烏瀾布通之役朕以䇿誘噶爾丹入距京師僅七百里許大兵已經擊敗乃竟中賊計致噶爾丹遁走彼時朕躬偶爾違和未得親至其地失此機㑹至今猶憾噶爾丹竄伏巴顔烏喇地方相距未甚遼遠以是不憚勤勞親蒞邊外相機行事此賊既滅則中外寧謐可無他虞假使及今不除日後設防兵民益多擾纍所奏已知之康熙三十五年正月二十四日諭大學士伊桑阿阿蘭泰江南浙江山東江西四省所製綿甲一有造竣者即接續解京此額數之外再支正帑量其工力竭蹶製造於三月初旬內可速送至特諭康熙三十五年正月二十七日諭內閣通州至大通橋向無民船往來其有禁例乎今若令小舟泛載似於民生殊有利濟可令户工二部㑹同倉場侍郎具議以聞康熙三十五年二月初四日諭內大臣國舅佟國維等喀爾喀王善木巴曽奏噶爾丹不可使久據克魯倫地方應速征剿而此次用師渠盡所有馬匹供我軍騎乘甚著勞績殊可嘉奬貝子盆蘇克聞韓都逃遁即遣人追捕此次用兵凡擒活口偵賊信亦懋著勤勞應將伊等叙功以示激勸議政諸臣㑹議具奏康熙三十五年六月初十日諭內大臣國舅佟國維等朕沿途觀閲邊內禾苗至佳邊外田莊聞五月內經霜乃是重加播植者于成龍所運之糧供給兩路大兵餘者甚多曽諭于成龍云察罕腦兒等處前經種地造倉以貯米穀可即現有之倉運入收貯今應將此糧儲詳議其預籌之可令㑹議以聞康熙三十五年六月初十日諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布祿朕兹出師見察哈爾之軍人皆壯健效力為最其護軍每月應加餉銀一兩至四十九旗士卒連年出征巡哨往返勞苦每兵一名歲以六兩為率給與三年其㑹議以聞康熙三十五年六月十一日諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布祿將軍費揚古等疏稱右衛寧夏之兵皆自納喇忒地方遣回矣朕思西路之糧不知運至何處軍士或致乏食未可料也今選擇賢能司官二員如鍾神保者前往歸化城令喇嘛及官員富户等量出駱駝車輛運湖灘河朔之米往迎而接濟之其㑹議以聞康熙三十五年六月十一日諭大學士伊桑阿阿蘭泰尚書馬竒佛倫索諾和侍郎安布祿軍士所乘出征馬匹到時監收仍給錢糧照常飼養缺者毋令按補每佐領駱駝二隻馬或二十匹或三十匹定數飼養凡有軍事可供需用為益良多至內廄發與騎乘之馬到時亦俱交送內廄隱匿不交者亦或有之著各都統嚴察令其盡數送入其㑹議以聞康熙三十五年六月十一日諭大學士伊桑阿阿蘭泰尚書馬竒索諾和侍郎安布祿學士綏色等聞西路之西安兵緑旗兵蒙古兵已遣回交與副都統席爾哈逹留住翁金地方今此兵曽否回汛及米糧曽否接濟竝無奏報可令兵部理藩院選司官一員遣其迅往寧夏歸化城確探兵至何地軍食接濟與否速行奏聞康熙三十五年六月二十日諭大學士阿蘭泰王熙張玉書李天馥學士三寶楊舒朱都納哈山韓菼徐嘉炎張榕端此次軍興宣化府大同府飼馬修路百姓勞苦至矣爾等識之俟十月間啓奏以蠲來嵗田租康熙三十五年七月初六日諭大學士伊桑阿阿蘭泰學士三寶楊舒朱都納哈山哈雅爾圖倭倫此次尾隨大兵所設驛站人員供應軍務竝無貽誤今天氣漸寒而事已畢皆令撤回其中驛馬未經倒斃而全存者及有倒斃而賠補者皆議叙具奏倒斃而未補者並所斃馬數詳察奏聞其傳示兵部康熙三十五年八月二十日諭內閣今應移文諭知將軍薩布蘇伊軍士之糧已給至十月初止若軍士率赴京師將馬匹飼養後遣則往返紆遠將軍薩布蘇所統軍士可委賢能之人自塞外遣還薩布蘇減省騎從親自來京若馬匹疲瘦軍士回汛維艱薩布蘇可並率至京飼養然後遣往薩布蘇不必再為請㫖一面啓行一面奏聞可也康熙三十五年八月二十三日諭內閣大將軍伯費揚古既駐師喀倫則安郡王可率軍士從容牧馬而還員外郎色楞留於安郡王屯駐之地偵探邊警康熙三十五年八月二十三日諭户部宣化府錢糧前已屢經蠲免但比年以來所屬各州縣牧養軍前需用馬匹又大兵絡繹往來各有支給經費而供億甚繁殊勞民力朕巡幸經臨深切軫念著將康熙三十六年宣化府屬地丁銀米全與蠲豁仍行文該撫通行曉諭俾民間均霑實惠以副朕寬恤黎元至意爾部即遵諭行特諭康熙三十五年九月二十三日諭户部朕惟治天下之要惟以乂安民生為急顧欲安民生必除寇虐欲除寇虐必事師旅方今寰宇承平人咸樂業獨厄魯特噶爾丹狂逆邊塞荼毒生靈朕思為邊境人民永絶後患故特遣發貔貅分道進剿朕躬不憚勤勞以今歲春月親統中路大兵深入無水草之地直抵拖諾比噶爾丹聞朕親臨盡棄輜重倉皇宵遁適與西路大兵相遇大敗潰散俘獲其人口其寨桑等來歸甚衆而噶爾丹收殘賊千餘人仍竄伏於枯倫百爾齊爾等處地方朕因於冬月復統軍出邊相機剿撫行抵鄂爾多斯於是厄魯特人民來歸者絡繹相屬噶爾丹力窮勢蹙亦遣格壘沽英具奏乞降隨經頒示敕諭許其歸順惟是噶爾丹乃狡詐叵測之人其果否來降未可深信應仍厲兵秣馬待來歲出師撲剿務絶根株比年以來軍前需用馬匹在大同府屬牧養者甚多措辦草料等項雖俱支用正項錢糧而供應浩繁殊勞民力但必此賊盡滅然後邊外蒙古賴以輯寧而在內生民亦獲休息師旅之興大非得已該郡官民尚各勉力急公勿以煩苦為慮朕兹從邊外返蹕雲中深軫民力之艱用沛特恩以示寬恤康熙三十六年大同府屬州縣衛所應徵地丁銀米著全與蠲免俟噶爾丹殄滅之後朕自誕布德音渙敷休澤爾部即行文該撫通行曉諭俾咸悉朕惠愛黎元至意特諭康熙三十五年十二月初八日諭領侍衛內大臣索額圖明珠大學士伊桑阿阿蘭泰朕此次出師察獲回子汗阿卜都里徐特之子孫及阿爾虎林白克等之妻子今即速遣還之可馳諭川陜總督令回子汗阿卜都里徐特暫止還國俟此所獲伊等眷屬到時令其完聚偕往康熙三十五年十二月二十五日諭户部朕惟治安天下惟期民生得所而欲民生得所必以敷恩寬賦為要朕於一切事務少有動用民力之處即厪懷殷切刻不能忘比年以來因厄魯特噶爾丹狂逞逆命遣發大兵分道進剿軍興供億不得已而煩民力甘肅所屬各州縣衛所及榆林等處沿邊各州縣衛所適當師行要道其喂養軍前需用馬匹至大兵往來經過各項措辦雖俱支給正項錢糧而供應繁多閭閻勞苦朕心深用軫念著將康熙三十六年甘肅巡撫所屬州縣衛所陜西巡撫所屬榆林等沿邊州縣衛所地丁銀米盡行蠲免行文各該撫遍加曉諭務俾小民均霑實惠稱朕體恤黎元至意甘肅所屬銀米既經全免需用錢糧著於鄰近省分作速撥給爾部即遵諭行特諭康熙三十五年十二月二十九日諭內閣黑龍江幾林烏喇地方頻歲不登可移文盛京將軍令整繕船隻依前噶爾圖所運之例將盛京倉儲米穀以彼地人力運五千石至莫爾渾伊屯之地積貯之康熙三十五年十二月二十九日諭內閣今年自天津海運至盛京之米已給散科爾沁貧乏之衆來嵗仍當自天津運米至盛京其轉運船隻不必用福建浙江二省者止用天津船隻挽輸一次足矣可諭侍郎陶岱康熙三十五年十二月二十九日諭大學士伊桑阿阿蘭泰學士三寶羅察席爾登去歲霸州等處州縣曽運通州之米與被災百姓減價平糶閭閻甚為得濟今年水災更甚應如去歲運米於各州縣平糶可敕直𨽻巡撫沈朝聘何州何縣當運米若干與民懋遷之其作速詳察即繕滿字摺子具奏毋緩俟開印時也康熙三十五年十二月二十九日聖祖仁皇帝御製文第二集卷十五
