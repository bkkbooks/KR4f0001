  text: 欽定四庫全書聖祖仁皇帝御製文第三集總目三卷第十三敕諭諭户部諭內閣諭户部諭內閣諭內閣諭工部諭內閣諭內大臣大學士九卿等諭江浙在京官員大學士張玉書尚書王鴻緒等諭工部諭刑部諭內閣諭內閣諭工部諭兵部諭工部卷第十四敕諭諭九卿詹事科道諭兵部諭工部諭內閣諭吏部諭户部諭刑部諭內閣諭户部諭刑部諭浙江巡撫黃秉中諭兵部諭宗人府諭兵部諭刑部諭兵部諭內閣九卿等卷第十五敕諭諭內閣九卿等諭內閣九卿等諭兵部諭河南巡撫鹿祐諭都察院諭大學士溫達尚書耿額諭大學士溫達張玉書陳廷敬李光地兵部尚書蕭永藻侍郎李先復宋駿業諭刑部諭户部諭大學士溫達張玉書陳廷敬學士塞爾圖孫柱仇兆鰲王思軾滿丕滿寶顧悅履潘宗洛諭吏部卷第十六敕諭諭內閣諭户部尚書張鵬翮內閣學士噶敏圖諭刑部諭工部諭都察院諭八旗都統副都統參領等諭南書房侍直大學士陳廷敬等諭吏部諭工部諭户部諭大學士溫達張玉書陳廷敬李光地學士塞爾圖孫柱滿丕滿保王思軾顧悅履潘宗洛諭户部諭户部諭兵部諭刑部諭户部諭兵部諭户部諭兵部諭户部諭兵部諭户部卷第十七敕諭諭户部諭兵部諭吏部諭吏部諭吏部諭工部諭吏兵二部諭吏部諭大學士溫達等諭兵部諭和碩顯親王顏璜等諭和碩顯親王顏璜等諭兵部諭户部諭張鵬翮諭大學士等諭大學士溫達等諭大學士溫達等諭大學士溫達等諭大學士溫達等諭户部諭刑部諭吏刑二部諭刑部諭兵部卷第十八敕諭諭户部諭户部諭大學士溫達陳廷敬蕭永藻等諭大學士溫達李光地蕭永藻諭禮部諭內閣諭內閣諭户部等衙門諭大學士溫達等諭禮部詔恩詔
