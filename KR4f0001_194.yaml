  text: 欽定四庫全書聖祖仁皇帝御製文第三集總目三巻第十三勅諭諭户部諭内閣諭户部諭内閣諭内閣諭工部諭内閣諭内大臣大學士九卿等諭江浙在京官員大學士張玉書尚書王鴻緒等諭工部諭刑部諭内閣諭内閣諭工部諭兵部諭工部巻第十四勅諭諭九卿詹事科道諭兵部諭工部諭内閣諭吏部諭户部諭刑部諭内閣諭户部諭刑部諭浙江巡撫黄秉中諭兵部諭宗人府諭兵部諭刑部諭兵部諭内閣九卿等巻第十五勅諭諭内閣九卿等諭内閣九卿等諭兵部諭河南巡撫鹿祐諭都察院諭大學士温達尚書耿額諭大學士温達張玉書陳廷敬李光地兵部尚書蕭永藻侍郎李先復宋駿業諭刑部諭户部諭大學士温達張玉書陳廷敬學士塞爾圖孫柱仇兆鰲王思軾滿丕滿寶顧悅履潘宗洛諭吏部巻第十六勅諭諭内閣諭户部尚書張鵬翮内閣學士噶敏圖諭刑部諭工部諭都察院諭八旗都統副都統叅領等諭南書房侍直大學士陳廷敬等諭吏部諭工部諭户部諭大學士温達張玉書陳廷敬李光地學士塞爾圖孫柱滿丕滿保王思軾顧悅履潘宗洛諭户部諭户部諭兵部諭刑部諭户部諭兵部諭户部諭兵部諭户部諭兵部諭户部巻第十七勅諭諭户部諭兵部諭吏部諭吏部諭吏部諭工部諭吏兵二部諭吏部諭大學士温達等諭兵部諭和碩顯親王顏璜等諭和碩顯親王顏璜等諭兵部諭户部諭張鵬翮諭大學士等諭大學士温達等諭大學士温達等諭大學士温達等諭大學士温達等諭户部諭刑部諭吏刑二部諭刑部諭兵部卷第十八勅諭諭户部諭户部諭大學士温達陳廷敬蕭永藻等諭大學士温達李光地蕭永藻諭禮部諭内閣諭内閣諭户部等衙門諭大學士温達等諭禮部詔恩詔
