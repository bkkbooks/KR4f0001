body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十二古今體詩二十九首嵗除前二日立春嵗盡星回朔氣消迎新慵聼奏笙簫梅花欲報春先到猶怯凝寒瑞雪飄嘉平月初雪後晚坐偶有所見書懷尺雪同雲晴亦佳心參運水及搬柴羣烏將宿頻遷樹半壁餘光反照階慷慨行年周甲子徘徊撫景對宫槐豈辭􅌨沐編氓志疾苦先知天下懷詠鳥鎗由來火具三皇始後世方興欲廣威未盡響聲先鴈落已騰煙處帶禽歸海洋掃却鯨魚浪漠北清塵解鐡衣朕親統六師至寧夏駐蹕二十日遍觀地勢遊覽山形城之東南有巽湖水最清偶爾得野鴨一隻羽毛滋潤黃頭紫背胸白翅短與他處所有回然不同業已忘矣今經十五載忽於畫中又見此禽因而有感故援筆以記七邉曽歷賀蘭山塞北咽喉最險關叠翠崕巒人蹟滅堆沙道路柏林攀柏林者非聳然喬木之謂自神木至寧夏積石堆沙之中生柏樹婆娑盤旋一根至於二三里就地牽攀人馬難走髙者不過五六尺粗不過拱把故有柏林攀之句漢渠遙轉唐渠㑹濁水先流清水灣野鳥閒棲猶得靜吾今自覩二毛斑詠自鳴鐘法自西洋始巧心授受知輪行隨刻轉表指按分移綘幘休催曉金鐘預報時清晨勤政務數問奏章遲賦得禁城春色曉蒼蒼淑色曈曨射早光御園梅栁怯寒霜三宫紫氣通瑶殿九陌和風到建章春社先農開布種初辛祈榖望書祥鶯聲燕語添詩思欲去浮文夙夜忙趙北口水淀作風微見水緑日暖弄窗妍樹老依根壯心平任物遷維舟臨草岸揮翰借壺天此日廟旁借一屋寫字非是禽魚樂人稠萬户烟賦得時人不識豫心樂恩波遍布首邦畿此嵗地丁俱已蠲免愛此佳時緑尚微血耗飬衰心益壯神煩物擾體無違暮年筋骨猶能强半世憂勞幸免非老慣豫逰山水處傍人那得識天機檣燈泊舟淺水意如何為惜春光怡興多倚檻晚晴吟皓月推窗夜靜恱清波氷消浪潔魚吹沫風轉雲開鴈踏莎更有檣燈分掩映輝煌豈亞扣船歌檣燈調寄㸃綘唇一名南浦月夜靜更深船窗臨淀見波影出看何景燈映牙檣炯自笑無文難得佳詞整揮毛頴水平天永淡露春風冷五十一年春二月二十四日回鑾遇雨故作春雨行春雨難過時春耕不可誤江南苦多霪河北厭久煦地濕易蒸雲土鹼能散霧年年常覿此惟祝順暘雨縱然䝉天眷更欲明三務去嵗銀花盈尺餘今看滂沛滿溝渠兒童應門有喜色農夫奔走百愁舒忙布種治畦𬞞山谷原隰免欷歔四民俯仰皆安業廟堂憂憫當少除娛目怡心願後樂又慮夏秋苗何如仰兾隂晴無􅐩忒方致大有登農書閲河長歌并序朕閲河出郊自南苑過蘆溝順永定河之南岸見十五年前泥村水鄉捕魚蝦而度生者今起為髙屋新宇種榖黍而有食矣水淀改成沃野溜沙變為美田因思古人云有治人無治法斯言信哉若治之不早民至於今未知何似也故有感而作長歌一篇以示善後之計云爾春風春社豔陽天雪盡塵清遍路阡曽記當時泊舟處今成沃土及膏田十年之前泛黃水民生困苦少人烟歷歷實情親目覩老轉少徙益難撫挾男抱女至馬前皆云此河不可堵桑乾馬邑雖發源山中諸流數難數吾想畿內不能防何况逺慮治淮黃數巡髙下南北岸方知渾流為民傷春末無水沙自漲雨多散漫遍汪洋若非動衆勞人力黎庶無田漸乏食廟謨不惜費帑金救民每嵗受饑溺開河端在辨髙低堤岸逺近有凖則未終二年永定成泥沙黃溜直南傾萬姓方蘇愁心解從此鄉村祝太平昔日宵旰嘗縈慮將來善後勿紛更憶詠蘇州風俗鄧尉梅梢月虎邱浪裏峰人爭天地秀物雜理文宗俗尚非交讓官針乏協恭輿情常若此何日奏時雍偶觀演劇作雅頌不能傳詩詞降作調唐人歌舞精元曲選聲妙若曰得仙音究未探其要暫為遣見聞寄此發長嘯三月初十日恭請皇太后雅玩齊進膳看梅花當年梅雪伴今嵗暮春遲銀杏舒新葉木蘭蓋緑枝花當亭畔發香逐雨中移别殿陳鮮蜜尚方獻瑞芝老萊舞膝下珠草列仙墀敬上喬松祝欣瞻王母儀捧觴稱夀句進酒問安詞地潤鋪紅蕚波澄斂玉池髙峰多爽氣綺樹得丰姿漏轉催辰半表行近畫竒承歡同永日孝思莫違時㑹慶思經義千秋古訓垂暢春園西新園觀花春光盡季月花信露羣芳細草沿階緑竒葩撲戶香寸隂惜鬢短尺影逐時長心向詩書奧精研莫可荒西苑試士霽日東風暖平川宇宙寬文章隨世轉經史得人安講學前賢奧觀光後進歡有生宵旰慮獨望和羹難大學士陳廷敬挽詩世傳詩賦重名在獨遺榮去嵗傷元輔去嵗大學士張玉書故連年痛巨卿朝恩葵志勵國典玉衡平儒雅空興嘆含毫感倍生湯泉應候一為消疾駐靈泉步輦平明觀插田喜見蕣華方遍野更看修竹逺籠烟雖無玩賞因偕樂屢慶豐登共息肩窗外雨聲滴草舍密林鶯語亦欣然將軍潘育龍久任封疆故存問賜詩少年勇戰啓元戎久任三秦鐡石𠂻守土防邉資壯略披堅敵陳表彤弓升平當惜老臣在竹帛還酬舊日功白首怡神存碩果願期添算荷恩隆賜將軍吳英水陸封疆六十年曽經百戰駕輕船蓬臺逺涉鯨鯢浪島嶼全消烽火烟將老偏宜立志壯宸襟每注施恩延波濤有作須先靖黽勉防微計未然冬至讀易復自純坤起隂陽由靜生飛灰識地氣吹律考中聲六甲周天運九疇味道精非圖窮理譽本末近分明黃臘梅臘後江南得早梅春遲北地見花開不隨岸栁初眠候祇伴寒松破凍回賦得冬日可愛復卦初生處景隨玉管回前旗分鳥道後仗向龍堆愛日冬偏暖臨橋氷未開寬城行幸地越嶺少塵埃詠雪並序偶出喜雪題衆以舊體擬典故而成朕知目前畢竟無雪不可為喜故改作詠雪以已意而就非有意於詞藻也季秋封地雨寒月减同雲忽見峰頭白那看樹杪氛衆方矜藻繢我獨念耕耘未卜來朝慶田疇積幾分賦得月照氷池半璧映河隈光瑩鑒溯洄源清同皎潔溜靜自徘徊逺照移松嶺寒輝展鏡臺羊腸分岔路飄渺碧雲堆吏部尚書引年致仕宋犖因朕六旬夀慶祝來京事畢五月內回本鄉朕念舊臣特書七言律一首以紀其事云受祉林泉頥飬年世家耆德自天全少時劍佩登三殿久任吳淞撫九阡行儉銓衡有令譽廣平才藻入清篇修齡喜得人間夀雪作鬚眉興欲仙賜大學士溫達自少存心敦孝友中年芳譽畹蘭清樞垣華省看封事儲粟經邦著政聲三殿絲綸資作楫九霄雨露啓和羮君臣鬚髮蒼然矣時念虞廷進善旌幾暇隨筆書懷雲窗欲視逺啓戶北慿觀豈若登山望徒勞譜石看禪徒空世界仙每誤爐丹何似詩書藴常圖根本安聖祖仁皇帝御製文第四集卷三十二
