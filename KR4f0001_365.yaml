body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻三十二古今體詩二十九首嵗除前二日立春嵗盡星回朔氣消迎新慵聼奏笙簫梅花欲報春先到猶怯凝寒瑞雪飄嘉平月初雪後晚坐偶有所見書懐尺雪同雲晴亦佳心叅運水及搬柴羣烏將宿頻遷樹半壁餘光反照堦慷慨行年周甲子徘徊撫景對宫槐豈辭􅌨沐編氓志疾苦先知天下懐詠鳥鎗由來火具三皇始後世方興欲廣威未盡響聲先鴈落已騰煙處帶禽歸海洋掃却鯨魚浪漠北清塵觧鐡衣朕親統六師至寜夏駐蹕二十日遍觀地勢㳺覽山形城之東南有巽湖水最清偶爾得野鴨一隻羽毛滋潤黄頭紫背胸白翅短與他處所有廻然不同業已忘矣今經十五載忽於畫中又見此禽因而有感故援筆以記七邉曽歴賀蘭山塞北咽喉最險闗叠翠崕巒人蹟滅堆沙道路栢林攀栢林者非聳然喬木之謂自神木至寜夏積石堆沙之中生栢樹婆娑盤旋一根至於二三里就地牽攀人馬難走髙者不過五六尺粗不過拱把故有栢林攀之句漢渠遥轉唐渠㑹濁水先流清水灣野鳥閒棲猶得静吾今自覩二毛斑詠自鳴鐘法自西洋始巧心授受知輪行隨刻轉表指按分移綘幘休催曉金鐘預報時清晨勤政務數問奏章遲賦得禁城春色曉蒼蒼淑色曈曨射早光御園梅栁怯寒霜三宫紫氣通瑶殿九陌和風到建章春社先農開布種初辛祈榖望書祥鶯聲燕語添詩思欲去浮文夙夜忙趙北口水淀作風微見水緑日暖弄牕妍樹老依根壮心平任物遷維舟臨草㟁揮翰借壺天此日廟旁借一屋冩字非是禽魚樂人稠萬户烟賦得時人不識予心樂恩波遍布首邦畿此嵗地丁俱已蠲免愛此佳時緑尚微血耗飬衰心益壮神煩物擾體無違暮年筋骨猶能强半世憂勞幸免非老慣豫逰山水處傍人那得識天機檣燈泊舟淺水意如何為惜春光怡興多倚檻晚晴吟皓月推牕夜静恱清波氷消浪㓗魚吹沫風轉雲開鴈踏莎更有檣燈分掩映輝煌豈亞扣船歌檣燈調寄㸃綘唇一名南浦月夜静更深船牕臨淀見波影出看何景燈映牙檣炯自笑無文難得佳詞整揮毛頴水平天永淡露春風冷五十一年春二月二十四日回鑾遇雨故作春雨行春雨難過時春耕不可誤江南苦多霪河北厭乆煦地濕易蒸雲土鹼能散霧年年常覿此惟祝順暘雨縱然䝉天眷更欲明三務去嵗銀花盈尺餘今看滂沛滿溝渠兒童應門有喜色農夫奔走百愁舒忙布種治畦𬞞山谷原隰免欷歔四民俯仰皆安業廟堂憂憫當少除娯目怡心願後樂又慮夏秋苗何如仰兾隂晴無􅐩忒方致大有登農書閱河長歌并序朕閱河出郊自南苑過蘆溝順永定河之南岸見十五年前泥村水鄉捕魚蝦而度生者今起為髙屋新宇種榖黍而有食矣水淀改成沃野溜沙變為羙田因思古人云有治人無治法斯言信哉若治之不早民至於今未知何似也故有感而作長歌一篇以示善後之計云爾春風春社豔陽天雪盡塵清徧路阡曽記當時泊舟處今成沃土及膏田十年之前汎黄水民生困苦少人烟歴歴實情親目覩老轉少徙益難撫挾男抱女至馬前皆云此河不可堵桑乾馬邑雖發源山中諸流數難數吾想畿内不能防何况逺慮治淮黄數廵髙下南北㟁方知渾流為民傷春末無水沙自漲雨多散漫遍汪洋若非動衆勞人力黎庻無田漸乏食廟謨不惜費帑金救民毎嵗受饑溺開河端在辨髙低堤㟁逺近有凖則未終二年永定成泥沙黄溜直南傾萬姓方蘇愁心觧從此鄉村祝太平昔日宵旰嘗縈慮將來善後勿紛更憶詠蘇州風俗鄧尉梅梢月虎邱浪裏峰人争天地秀物雜理文宗俗尚非交譲官箴乏恊恭輿情常若此何日奏時雍偶觀演劇作雅頌不能傳詩詞䧏作調唐人歌舞精元曲選聲妙若曰得仙音究未探其要暫為遣見聞寄此發長嘯三月初十日恭請皇太后雅玩齋進膳看梅花當年梅雪伴今嵗暮春遲銀杏舒新葉木蘭盖緑枝花當亭畔發香逐雨中移别殿陳鮮蜜尚方獻瑞芝老萊舞膝下珠草列仙墀敬上喬松祝欣瞻王母儀捧觴稱夀句進酒問安詞地潤鋪紅蕚波澄歛玉池髙峰多爽氣綺樹得丰姿漏轉催辰半表行近畫竒承歡同永日孝思莫違時㑹慶思經義千秋古訓垂暢春園西新園觀花春光盡季月花信露羣芳細草沿階緑竒葩撲戸香寸隂惜鬢短尺影逐時長心向詩書奥精研莫可荒西苑試士霽日東風暖平川宇宙寛文章隨世轉經史得人安講學前賢奥觀光後進歡有生宵旰慮獨望和羹難大學士陳廷敬輓詩世傳詩賦重名在獨遺榮去嵗傷元輔去嵗大學士張玉書故連年痛鉅卿朝恩葵志勵國典玉衡平儒雅空興嘆含毫感倍生湯泉應候一為消疾駐靈泉歩輦平明觀挿田喜見蕣華方遍野更㸔修竹逺籠烟雖無玩賞因偕樂屢慶豐登共息肩牕外雨聲滴草舍宻林鶯語亦欣然將軍潘育龍乆任封疆故存問賜詩少年勇戰啟元戎乆任三秦鐡石𠂻守土防邉資壯畧披堅敵陣表彤弓昇平當惜老臣在竹帛還酬舊日功白首怡神存碩果願期添算荷恩隆賜將軍呉英水陸封疆六十年曽經百戰駕輕船蓬臺逺渉鯨鯢浪島嶼全消烽火烟將老偏宜立志壯宸襟毎注施恩延波濤有作湏先靖黽勉防微計未然冬至讀易復自純坤起隂陽由静生飛灰識地氣吹律考中聲六甲周天運九疇味道精非圖窮理譽本末近分明黄臘梅臘後江南得早梅春遲北地見花開不隨㟁栁初眠候祇伴寒松破凍回賦得冬日可愛復卦初生處景隨玉管回前旗分鳥道後仗向龍堆愛日冬偏暖臨橋氷未開寛城行幸地越嶺少塵埃詠雪幷序偶出喜雪題衆以舊體擬典故而成朕知目前畢竟無雪不可為喜故改作詠雪以已意而就非有意於詞藻也季秋封地雨寒月减同雲忽見峰頭白那㸔樹杪雰衆方矜藻繢我獨念耕耘未卜來朝慶田疇積㡬分賦得月照氷池半璧映河隈光瑩鑒溯洄源清同皎潔溜静自徘徊逺照移松嶺寒輝展鏡臺羊腸分岔路飄渺碧雲堆吏部尚書引年致仕宋犖因朕六旬夀慶祝來京事畢五月内回本鄉朕念舊臣特書七言律一首以紀其事云受祉林泉頥飬年世家耆徳自天全少時劍佩登三殿乆任呉淞撫九阡行儉銓衡有令譽廣平才藻入清篇修齡喜得人間夀雪作鬚眉興欲仙賜大學士温達自少存心敦孝友中年芳譽畹蘭清樞垣華省㸔封事儲粟經邦著政聲三殿絲綸資作楫九霄雨露啟和羮君臣鬚髪蒼然矣時念虞廷進善旌幾暇隨筆書懐雲牕欲視逺啟戸北慿觀豈若登山望徒勞譜石㸔禪徒空世界仙毎誤爐丹何似詩書藴常圖根本安聖祖仁皇帝御製文第四集巻三十二
