body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三十二序通鑑綱目序朕惟自古帝王御世大經大法莫備於史唐虞三代之史尚書所載典謨訓誥皆是也自仲尼因魯史作春秋始編年繫月紀載之中褒貶寓焉大要歸於扶植綱常闡揚道法後之言史者必宗之宋司馬光奉詔纂修資治通鑑論者以為博而得其要簡而周於事朱熹夲之為綱目綱倣春秋目倣左氏義例森嚴首尾條貫足以示勸懲而昭法戒煌煌乎典章之總㑹而治道之權衡也前編則上溯羲黃徵引經傳足備稽考續編則下逮宋遼金元其中叙事雖間得其實然而議論偏私紀載乖舛往往有之視朱熹所撰綱目迥乎其不侔矣朕撫御㝢內夙夜兢業每思說命之言曰學於古訓乃有獲朕於萬幾之暇潛心六經大義微言孜孜殫究以講求古帝王治天下之大道於綱目一書朝夕起居之時循環披覽手未釋卷以是考前代君臣得失之故世運升降之由紀綱法度之所以立人心風俗之所由純事有關乎典常言有禆乎治體者靡不竟委窮源詳加論斷如是者有年矣爰於內廷設立書局命翻譯呈覽朕躬親裁定為之疏解務期曉暢無遺歸於至當而後止立有程課自元旦以至嵗除未嘗有一日之間即巡幸所至亦必以卷帙自隨迄今三年有餘全集告竣將鋟梓頒行儒臣請序其端朕念是編所記述皆有關於治天下國家之務非等於尋常紀載之書法戒昭然永為金鑑凡我臣工其各殫心觀摩以體朕黽勉法古之意且垂之奕世使子孫臣僚莫不奉為典型酌乎治理斯作君之道出其中而作師之道亦出其中矣是又朕惓惓此書之意也夫幸魯盛典序朕惟自古帝王聲教翔洽風俗茂美莫不由於崇儒重道典學右文用能發詩書之潤澤宣道德之閫奧推厥淵源皆夲洙泗以故追崇之典歷代相仍或躬詣闕里修謁奠之儀潔志肅容盡誠備物其間禮數隨世損益至於希風服教百代式型異世同揆莫之或二猗歟盛矣朕臨御以來垂三十載溯危微之統緒念生安之聖哲恆慮凉薄未克祗承用是夙夜單心孜孜不倦惟我至聖先師孔子配天地參陰陽模範百王師表萬祀朕每研搜至道涵泳六經覺憲章祖述刪定贊修之功日星揭而江河流私心嚮往竊有願學之志焉乃者東巡踰泰岱涉泗沂遂詣闕里親行釋奠得瞻廟貌仰聖容以為德盛功隆欽崇宜極凡厥典禮有加前代又親製文辭手寫以勒之貞石務用導揚至教風示來兹夫緬懷曩哲繼躅前賢猶思覩其物采接其居處况先師遺風餘烈久而彌新重以朕之寤寐羮墻僾乎如見及過杏壇相圃之間山川儼然檜楷如故髣佛金石絃誦之聲聞於千載而上流連往復不能自已也衍聖公孔育圻上疏陳謝且以禮儀隆重非直一家榮遇請修幸魯盛典一書朕既可其奏久之書成復請敘言以冠其端朕萬幾餘晷敦勉弗遑實欲默契先師尊聞行知於以阜物諴民風同道一庶幾躋世運於唐虞登治術於三古是書也豈徒使天下後世知朕於先師欽慕無已如此且愈以見聖人之道覆幬羣倫苞育萬象即凡車服禮器之遺皆足令人感發而興起也故賜之序南巡詩序朕念切民依咨詢幽隱於二十八年春再舉南巡爰自畿甸東臨齊魯沿泝江淮達於吳越曩者甲子之歲輿衛所經瞻顧閭閻觀省謡俗憫懷澤國軫恤羣黎未嘗一日忘於朕心已嘗形諸篇詠載前集中今兹重歷郡邑見民物漸殷生業就理逺勝曩時中心慰悅又不禁吟咏及之途中停警撤蹕欲以洞悉輿情數千里間百姓歡躍載路星攢雲集瞻依愛戴發於至誠朕自惟化理何以克洽民情益用是欿然也乃於巡歷所至沛膏澤飭官方戒民俗修典禮經武備覽河防施諸事矣又發諸言或御帳殿或撫船窗吟咏所及性情在焉古人云詩言志凡朕篇章所寓時以民生風化惓惓為念即間於眺覽之際抒寫景物指顧河山要其寄託則自有在也因裒而集之為南巡詩一卷云南巡詩序朕三度南巡咸因視河親為籌畫遂至江浙察吏安民所歷之地隨其時宜廣沛膏澤拯疾苦焉兹行兼奉皇太后鑾輿而南既可無闕定省之儀且欲見先帝開基冨有四海而朕守成教育率土清寧無慚付託以博慈顔之懌悅然往返遄迅絶無滯留百司章奏三日一送行在即與剖决舟行多暇仍覽書史日操觚翰偶寄吟篇莫非記採風俗時存懷保兢業之意後之人讀朕前後南巡諸詩知朕心之有在云爾皇輿表序粵稽古皇統一海寓畫疆經野建立萬國以作民極故周禮土地之圖掌於司徒𨽻於小宰而左傳稱左史倚相能誦八索九丘孔安國曰九丘者九州之志也史記載蕭何入關收秦圖籍髙帝以故具知天下厄塞是可見有國家者封域之廣狹郡邑之興廢固不可不務逺稽而近考也朕嘗博觀羣史上溯源流髙辛創立九州虞帝分為十二周初職方以統九服保章以辨分星胙土列爵天下井如秦兼并六國罷封建置郡縣先王之制至秦而一變矣自是一統之盛漢隋唐宋元明制度遞有更革漢曰十三部唐曰十五道宋曰十五路隋則改州為郡元則以路𨽻省明則革省置司其都邑變遷紛紜鬱翳或地存而名亡或名同而地異或地析而民散莫可紀極他若三國六朝五代幅􅊷既隘升改寄置尤為煩冗矣朕因是簡命儒臣倣史家年表法以夲朝府州縣之名為經辨於其首自唐虞以迄有明之地與郡國州縣為緯分列其下朕復親加裁訂以詳以核古今輿制粲若星辰之羅於天歷厯可數也爰命曰皇輿表若夫土宇之廣北越沙漠南踰滄溟開闢以來未列版圖者咸歸籍內附以古無其名故斯表亦不能悉載焉雖然是寧獨討論之助云爾哉傳曰有德此有人有人此有土詩曰聖敬日躋昭格遲遲上帝是祗帝命式於九圍則撫斯表也朕敢不益博大厥德以膺兹孔厚之版章與是為序懋勤殿法帖序朕惟書契既興歷代相傳自篆籀變而為隸楷行草古人往往積嵗月殫學力結體運思以務臻其妙所由來逺矣嘗於機政之暇游心翰藻觀晉人所書體尚圓潤結構天然風采流奕斂鋒藏鍔而自能雄徑故歷代重之逮唐以後或格法謹嚴或筆勢軒翥類皆神明於昔人之矩矱而變化出之以自成一家之書亦代不乏人在昔右文之君得一名蹟每使當世之能書者排類摹倣鐫諸文石以廣其流傳為䇿府藝林之所共寶如聖教蘭亭以及淳化淳熙諸墨刻皆其最著者也朕念古帖嵗久漸湮近時轉相摹刻者多失其真因取內府所藏舊搨與名人墨蹟逺自上古以迄夲朝編次撫刻題曰懋勤殿法帖凡二十有八卷帝王法書自漢以後咸在簡牘有明諸帝之善書者亦搜輯其遺楮以列於後洪惟我世祖章皇帝聰明天亶深心典學時灑宸翰雄竒髙古體格渾成神彩炳煥洵足卓越前代謹以登諸琬琰昭示子孫臣民垂諸不朽朕自幼習書豪素在側寒暑靡間歷年以來手書敕諭詩文跋語以及臨摹昔人名蹟屢盈笥篋每思字學淵微雖精研日久正欿然未敢自信緣諸臣敦懇再四勉從其請用識嗜古之夙志云爾皇太子皇子亦晨夕侍朕習學因并附焉以䇿勵其意夫書列六藝之中兼八體之妙唐太宗論筆法謂欲書之時當收視反聽絶慮凝神心正氣和則契於微妙昔人評右軍書樂毅論有忠臣烈士之象曺娥碑有孝子順孫之象逍遙篇有抱素拔俗之象畫像贊有矜莊嚴肅之象由是觀之學書之道亦非僅操觚染翰之為其通於學問性情有如是哉後之覽者考源鏡流由今溯古臨池之學具在斯帙矣故於刻石既成而序之耕織圖序朕早夜勤毖研求治理念生民之夲以衣食為天嘗讀豳風無逸諸篇其言稼穡蠺桑纎悉具備昔人以此被之管絃列於典誥有天下國家者洵不可不留連三復於其際也西漢詔令最為近古其言曰農事傷則饑之夲也女紅害則寒之原也又曰老耆以壽終幼孤得遂長欲臻斯理者舍夲務其曷以哉朕每巡省風謡樂觀農事於南北土疆之性黍稌播種之宜節候早晚之殊蝗蝻捕治之法素愛咨詢知此甚晰聽政時恆與諸臣工言之於豐澤園之側治田數畦環以溪水阡陌井然在目桔橰之聲盈耳嵗收嘉禾數十鍾隴畔樹桑傍列蠺舍浴繭繅絲恍然如茒簷蔀屋因構知稼軒秋雲亭以臨觀之古人有言衣帛當思織女之寒食粟當念農夫之苦朕惓惓於此至深且切也爰繪耕織圖各二十三幅朕於每幅製詩一章以吟詠其勤苦而書之於圖自始事迄終事農人胼手胝足之勞蠺女繭絲機杼之瘁咸備極其情狀復命鏤板流傳用以示子孫臣庶俾知粒食維艱授衣匪易書曰惟土物愛厥心臧庶於斯圖有所感發焉且欲令寰宇之內皆敦崇本業勤以謀之儉以積之衣食豐饒以共躋於安和冨壽之域斯則朕嘉惠元元之至意也夫聖祖仁皇帝御製文第二集卷三十二
