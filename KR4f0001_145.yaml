body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷二十七北征敕諭諭議政大臣等及大學士伊桑阿阿蘭泰今噶爾丹之勢窮蹙已極若天與不取是坐失機會矣又格壘沽英杜拉爾寨桑已限以八十日遣去先所遣吳爾占扎卜之母齊巴哈戚其信亦將可至今不整繕甲兵預為之備必致有誤兹者出師亦分兩路而進每一路兵三千二路之兵不必互相期約視其所遇以為進取此次軍旅緑旗之兵多調亦屬無濟惟少發士卒而多攜馬匹其馬匹量給士卒則可與禁軍一同征行矣今兹用兵所需糧米仍如常隨運附近邉疆購買牛羊尚為易得可支用正帑每一路買備牛羊二萬攜去大有禆益至挽運軍儲駱駝最要駝與馬俱應廣備此購買駝馬驢騾牛羊等畜當遣賢能官往肅州寧夏二處採買其具議以聞康熙三十六年正月初三日諭大學士伊桑阿阿蘭泰三千軍士伊等盔甲器械釡帳等物所重斤數若干百日米石之數及所重斤數若干馱載需用牲畜若干至牛羊二萬可供軍食者幾何時也部院大臣其會同詳議以聞此次軍士行裝可較去歲春間者酌量稍輕省之康熙三十六年正月初六日諭議政大臣班第等大學士伊桑阿阿蘭泰行兵者以道路為至要朕已召嚮導萬舒克博洛等來若輩到時遣嚮導親近一等侍衛僧圖等同現駐大同之護軍參領車克楚前往寧夏選西安官兵內勇健者百人率領直至古爾班賽漢地方閲視道路計自寧夏而往去來約需四十日伊等於途間或遇噶爾丹之人則生擒之力儻相敵即殺之若與伊拉固克三胡圖克圖相遇亦并擒之康熙三十六年正月初六日諭大學士伊桑阿阿蘭泰寧夏地方採買駝馬驢騾牛羊著交西安副都統阿蘭泰肅州採買著現駐宣化府之侍郎席米圖去皆支正帑以時直購辦毋得減少其價著選部院賢能司官遣至阿蘭泰席米圖處會同督撫及地方官監買伊等其勸諭地方官量所有駝馬驢騾共佐軍興爾大學士等會同部院大臣將司官中之素有材能而曽奉差遣又家道不匱乏者選擇引見毋得徇情又大將軍伯費揚古今若有征行仍率前鋒統領碩鼐等預備之兵前進若無征行而大同養馬之兵或有遣發則碩鼐率所部先鋒會師而進又黑龍江之兵既以器械不足來奏難以逺發應遣往右衛屯駐豫備其再議以聞康熙三十六年正月初七日諭大將軍伯費揚古駐扎肅州副都統阿南逹報稱噶爾丹之子塞卜屯巴爾住爾於哈密地方擒獲正月十六日之夕正觀燈視煙火於暢春園西門諸蒙古及降來厄魯特男婦聚觀其時奏章適至衆皆歡忭汝坐鎮邉荒離朕左右欲汝聞知令謄阿南逹奏章遣往當在新年燈節之時舉國老幼共皆歡娛相聚適興優遊汝在絶塞苦寒荒涼寂寞之地甚切眷懷爰賜胙肉鹿尾遼魚包瓜諸物問汝安好為書以喻意朕躬甚安於汝昔見時無異也汝安好否至噶爾丹當如何殄滅不失機會朕與議政諸臣議定再降諭旨為此特諭康熙三十六年正月十八日諭領侍衛內大臣公福善等頃當春時馬不可即令飲水略拴少時先飼以草然後飲之諸臣及侍衛執事人員部院衙門通行曉諭康熙三十六年二月初六日諭領侍衛內大臣輜裝行時約束最為緊要若照常專令大臣管理視為故事嗣後著大臣二員每旗侍衛十員護軍校三人管束大臣職名每日開列具奏朕親閲派遣侍衛不論新舊輪班派出管轄輜裝馱載或偏即扶助之一遇險阻之地照看管束朕躬時或在輜裝之前或在輜裝之後巡視查問若違誤必行治罪決不寬恕派出大臣等所管轄日期每日記之康熙三十六年二月初七日諭理藩院差往達賴喇嘛之主事保住及往尼麻唐胡圖克圖之員外阿爾必特呼所差往事情及所聞信音皆詳悉書寫交與驛站筆帖式星夜迅速馳奏保住在後速來康熙三十六年二月初七日諭大學士伊桑阿今遣一能言大臣帶領瑚瑚腦兒之渣西把圖爾台吉之使臣溫布波碩克圖即農之羅壘厄木七波碩克圖即農之姪厄爾德尼台吉所屬納木喀拉木扎木巴等前往瑚瑚腦兒之地説瑚瑚腦兒台吉與之偕來令會議具奏康熙三十六年二月初十日諭大將軍伯費揚古朕以二月六日出京於十一日前至宣府觀此時情勢噶爾丹窮困已極雖欲歸降自彼至此亦豈易易寧夏地方與噶爾丹所在薩克薩圖胡魯克格隔特哈郎古特相近已令參領車克楚親近侍衛僧圖等領西安寧夏兵一百人前至伊克敖拉偵探伊等報稱於二月初三日起程矣欲令知此故爾遣諭朕意欲令將軍孫思克博濟領兵三千人為一路出嘉峪關或取道哈密或取道巴爾庫爾前進車克楚等還時所偵路可行則以三千兵為一路出寧夏進所新偵路設不可行以兩路併為一路定所向前進事宜可濟朕今往寧夏親視大兵糧餉地方情形汝意更復云何特為商略故諭遣往諦巴主事保住所奏報付去令知康熙三十六年二月十一日諭副都御史努赫汝親身日率科道官各一員留行於輜重之後沿途跟役人等妄行之徒若有掠奪民物相攘鬭者汝等察拏指名參奏如汝等不行察拏有在朕前叩閽者於汝等必不姑容每晚無事則具揭送大學士所康熙三十六年二月十二日諭大學士伊桑阿修治道路若委地方官員則必致太過遣嚮導官法保布達照朕往哨鹿可行一車之路修治之其山西省道路著按察使巴錫道員王輔前往董領夫役閲視修治令侍郎常綬前往於每宿處預備草豆柴薪其後尚書庫勒納等帶來騾駝所需草豆柴薪亦令伊等預備渡黃河後陜西道路甚寬無庸大修或有宜略修處亦未可定常綬法保布達等閲看應修之處指示地方官修治尚書馬齊所擬宿處太近法保布達照現今我軍移營於五六十里擬定宿處若道路過為修治以致纍民與地方官無涉皆係法保布達之事著明白曉諭康熙三十六年二月十四日諭大學士伊桑阿自古帝王巡行凡所過地方前代帝王陵寢先賢墳墓及名山大川皆行致祭此甚盛典也朕今巡行沿途所經其有古帝王陵寢先賢墳墓名山大川皆詳察具奏應致祭者祭之康熙三十六年二月十七日諭領侍衛內大臣索額圖大學士伊桑阿大同養馬新滿洲護軍二百人自京隨來新滿洲護軍一百人其中有馬匹倒斃人材庸劣者留一百人於大同其餘護軍一百人由邊內隨行一百人令自邊外前往留於大同護軍百人之馬有肥壯者各取二匹給與隨行護軍二百人人各一匹黑龍江將軍所領兵既經遣行其大將軍伯費揚古所需兵不得不預備令撥右衛兵七百名以備調遣右衛兵馬匹缺少侍郎多竒所飼之馬又甚羸瘦前所撥兵二百名其馬六百匹已預為飼養今增撥五百人以上駟院馬一千二百五十匹右衛兵在大同飼養之馬二百五十匹共馬一千五百匹令飼養以備後撥五百兵之用共計兵七百預備馬二千一百匹大同養馬委布喀為首領有馬少不能前隨之司官留二員以副之黑龍江將軍薩普蘇所奏請充跟役之兵五十名照兵丁支給兩月錢糧一同支給康熙三十六年二月十七日諭戶部沿途既有米糧計行至寧夏日程照大同時價折給銀兩聽其自便糴買較駝載而往甚為利益其會同議政內大臣大學士等具議以聞康熙三十六年二月十七日諭理藩院著傳旨諭貝勒松拉卜噶爾丹已將擒獲其子塞卜屯巴爾住爾已為阿南達俘獲解送旦夕將到今聞噶爾丹在薩克薩圖胡魯克之南格隔特哈郎古特之地賊黨僅餘四五百人又瑚瑚腦兒台吉等俱已投降現今請安之使已至朕躬親往寧夏右翼三旗具勒公台吉等共派兵二千人預備爾等蒙古於馱載牧放之事素為練習可預備以待朕躬至寧夏向何處進兵著候旨行侍衛綽克拖前往傳旨諭左翼王貝勒貝子台吉等爾等聞朕往寧夏其由徑路請安俱著停止爾等有願效馳驅者俱赴松拉卜貝勒處等待聽候指示以行康熙三十六年二月十七日諭領侍衛內大臣索額圖等侍郎多竒於去年九月飼馬其後始遣侍郎阿爾稗飼馬多竒所飼之馬既多數月較之阿爾稗所飼之馬羸瘦著交與領侍衛大臣大學士嚴加議處具奏康熙三十六年二月十七日諭領侍衛內大臣索額圖大學士伊桑阿觀衆所乘之馬腹皆不飽買草弗得亦未可定邊內行走官員侍衛護軍執事諸人所乘馬匹察眀數目沿途有草則給草束無草則給銀兩具議以聞康熙三十六年二月十七日諭右衛將軍偏俄山西巡撫倭倫頃給發右衛官員兵丁米豆草價值較時價減少以致窮兵苦纍亦未可定又詢察大同府所屬州縣衛所之民運送右衛官兵馬匹所用草束苦纍可將兵丁之馬各留一匹於右衛餘馬發附近州縣衛所酌派官員兵丁看守飼養小民可免運送之苦此後每草一束應作何給價傳諭議政大臣大學士及在事官員爾等亦同會議具奏康熙三十六年二月十八日諭侍郎安布祿朕自邊內往寧夏可令爾衙門司官一員住沙虎口有來請安貢獻者向伊等言皇上起程去逺矣爾等雖往亦無益俱令之回朕行至寧夏令此司官由邉外來赴寧夏康熙三十六年二月十八日諭大將軍伯費揚古汝二月十四日所奏事於十六日晚至朕於十七日抵大同兵馬俱分派眀晰朕躬於十九日啓行從邉內往寧夏黑龍江兵丁俱率之而行派右衛兵七百人各給以御馬羣等處現餧馬匹令其預備俱明白交與右衛將軍偏俄今噶爾丹困蹙情狀如此斷然不致用兵萬一噶爾丹有前來消息速致信來朕由寧夏進兵以襲其後今或噶爾丹所屬之人來降或遣使來皆洵問詳明即速奏聞少其人數陸續遣來又汝軍前所有察哈爾兵及黑龍江兵之米若盡于成龍等所運米且勿支動將歸化城米儘其足用取來給與此米若移取太艱則於一千五百石內以五百石撙節給用其千石不可輕動特諭康熙三十六年二月十九日諭山西巡撫倭倫陜西巡撫黨愛甘肅巡撫郭洪朕比年出師剿寇總期乂安邉徼永輯民生兹厄魯特噶爾丹業已勢蹙力窮畏死悔罪遣使具奏乞降朕特親統六師再臨邉塞相機剿撫因欲乘便循覽邉境形勢並察視軍民生理遂遣發禁旅取道邉外朕自大同從內地前赴寧夏一路地方見緣邉州縣地土瘠薄軍民生計艱難朕心深切軫念一切御用所需皆自內廷措辦不以煩民扈從人員俱極簡少市易之物悉依時值誠恐有強取抑價等事已令都察院及科道官逐日稽察糾劾其經過城堡衢市輒多結綵亦殊覺擾纍嗣後著通行停止乘輿巡幸本為安民豈可反勞民力爾等務嚴飭有司不得借端妄行科派仍張示曉諭俾窮簷編戶咸悉朕曲體民依至意特諭康熙三十六年二月二十日諭領侍衛內大臣索額圖頃因雨雪或在邊內或在邉外馬騾拴住皆用氊蓋不可怠忽可通諭衆人知之康熙三十六年二月二十四日諭領侍衛內大臣及嚮導官來日駐蹕於李家溝其地但有一小泉一井已駐水三百甕豫備作何料理分給著議奏康熙三十六年二月二十五日諭領侍衛內大臣今年雨雪凡駱駝及馬騾之鞍皆勿缷善為遮蔽可以此通諭衆知之康熙三十六年二月二十六日諭山西巡撫倭倫朕撫御區宇念切民依故不憚勤勞親歷邉境惟孳孳以靖寇安民為急兹簡約扈從人員從大同一路緣邉地方進指寧夏因遍察閭閻生聚及土壤肥瘠收穫豐歉之狀見邉氓生計維艱朕心深用軫惻雖一切供御之物纎毫不以纍民而乘輿巡幸經臨宜特敷庥澤以示恩恤除大同府額賦已有諭旨豁免外其經過岢嵐州河曲縣保德州所屬地方並各衛所康熙三十六年應徵地丁銀米著通與蠲免爾即行令該管官員張示遍諭務俾窮鄉僻壤均霑實惠以稱朕子育黎元至意特諭康熙三十六年二月二十七日諭兵部朕觀緑旗營馬皆肥壯伊等現無調遣俟至神木將隨行瘦馬易營馬一百匹至榆林時易營馬二百匹果係瘦者方令更易每馬貼銀五兩令各馬主增給則隨行馬之瘦者可乘肥馬緑旗兵又皆得銀交為有益易馬之人並旗分佐領其所易何營之馬與緑旗兵姓名馬之數目明白開寫奏聞著領侍衛內大臣大學士會同兵部詳議具奏康熙三十六年三月初一日諭侍郎安布祿選爾衙門賢能司官一員令出神木邉由邉外至榆林道路幾程水草若何可詳悉問明俄爾多斯蒙古仍至神木候旨康熙三十六年三月初二日諭員外郎薩哈連汝即前往出榆林邉詢問蒙古自榆林由邉外至寧夏道路來至榆林候旨康熙三十六年三月初四日諭議政諸臣將軍孫思克博濟之兵進剿則噶爾丹勢迫逃奔而東亦未可定今派寧夏所有西安兵八百名緑旗兵一千名京城前鋒兵二百名令攜帶百日口糧遣往郭多里巴爾哈孫駐扎偵探堵禦其所運送之米自寧夏載之舟中由黃河順流而下至河干分路時然後以駝騾負載隨營運送駝騾自寧夏間散趕赴其隨營運米之處著將軍馬思哈會同于成龍等議奏康熙三十六年三月初五日諭議政諸臣朕至寧夏始調遣甘肅之兵恐致遲誤正當噶爾丹困迫之時西安滿洲兵二千名緑旗兵一千名備於甘肅日久馬已肥壯機會斷不可失宜速令進兵於薩克薩圖胡魯克一帶搜剿各攜百日口糧薩克薩圖胡魯克距嘉峪關不逺米糧不必隨運噶爾丹若遠行逃遁則進剿之兵計米而旋凡進剿滿洲緑旗官兵皆令賞銀十兩儻另有可行事宜及奏請之處孫思克博濟阿南達等商酌議奏自哈密擒送俄木克圖哈西哈遣赴將軍孫思克軍前有可進兵機宜即宜進兵剿滅則俄木克圖哈西哈不必差往若噶爾丹逃遁已逺則遣俄木克圖哈西哈往噶爾丹處令言我軍非事征戰實來撫汝汝宜來降其寧夏之兵駐於郭多里巴爾哈孫令其堵禦之處亦應行文知會孫思克等著會議具奏康熙三十六年三月初五日諭大學士伊桑阿州縣已各論其地方大小積貯米穀兵丁所駐沿邉衛堡亦屬緊要其榆林等處衛堡亦照州縣大小中積貯之例將捐納米穀積聚預備著交與該巡撫康熙三十六年三月十一日諭大學士伊桑阿等今日驛程甚逺致馬疲苦其間增設一驛明日所宿中途亦增設一驛每驛設馬二十匹他若較此為近或四十五十里者則不必增設驛程康熙三十六年三月十一日諭大學士伊桑阿安邉磚井鹽城鋪莫布拉等九處水泉不多應豫遣人增添掘井爾與兵部會議遣嚮導一人前往康熙三十六年三月十三日諭兵部前鋒侍衛竒薩穆長史庫即根著委為首領併侍衛進木巴護衛穆渣哈兒嚮導護衛阿那達老卜臧席拉布西喇卜及寧夏所有新滿洲三人竒薩穆挑選帶往伊克敖拉巴漢敖拉觀看地形此十人各隨人役一名各乘肥馬三匹所需之馬不必動用官養馬匹令總督吳赫等將伊等肥馬與之乘騎無弓矢撒帶腰刀鳥鎗者俱料理全備令其前往康熙三十六年三月十四日諭議政諸臣寧夏之兵於三月十九日起程暫令停止馬匹臕力如何米糧作何料理並未明白奏陳著行文詢問之康熙三十六年三月十五日諭大學士伊桑阿可行文寧夏諸臣毋得勞頓馬匹逺道來迎大臣等惟本身於黃河彼岸迎接官員兵丁俟朕到寧夏之日於近城地方步行迎接康熙三十六年三月十七日諭護軍統領托倫等今日天雨且寒駱駝馬騾但得草飼秣或在營中或在城內各從其便其在野牧放之駱駝馬騾善加遮蔽可以此諭衆及內府佐領咸令知之康熙三十六年三月十九日諭領侍衛內大臣今日駐蹕之地井泉稀少其有力者不必言其貧微者不獲飲馬亦未可定原派四人一夥明日各親看飲馬管轄之官亦加詳察若違朕旨不行飲馬朕若知之決不輕恕以此通行曉諭執事人員咸令知悉康熙三十六年三月二十日諭大學士伊桑阿趙良棟乃為國宣力建功之人今已身故不必以其躁急性褊為意來朝經過其門欲遣皇長子及部院諸臣往視致祭一次陳福曽為國效力適至此地亦應致祭一次可與議政大臣滿漢大學士部院諸臣會議具奏康熙三十六年三月二十五日諭大學士伊桑阿朕躬親至此地寧夏陳亡官員兵丁宜察明加恩陳亡官員有遣官奠酒之例如有陳亡官員應遣官致奠康熙三十六年三月二十六日聖祖仁皇帝御製文第二集卷二十七
