body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十八目録古今體詩四十五首夏日奉太皇太后避暑興安石盤峪龍潭白水古北口曉發古北口望霧靈山第一泉次上都河青城道中九隘塞外對雨紅川駐蹕興安八首并序廵歴塞北雜詠四首楊川細河塞北早秋興安夜次楊嶺北過團河次石山尖峰山谷口作三道河晩望黄草川回鑾抵古北口中秋日聞海上㨗音是夜對月再成絶句賜施烺詩并序九日對菊秋日再過阜平再駐龍泉關冬日重登清凉山詠馬初冬自五臺回次日雪盆中橘實甚繁詠此台灣平告祀孝陵有述
