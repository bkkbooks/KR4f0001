body:
  text: 欽定四庫全書聖祖仁皇帝御製文二集卷十二敕諭諭大學士伊桑阿阿蘭泰學士席喇傅繼祖溫保戴通安布祿聞厄魯特噶爾丹無所得食困迫已極仰食於其所屬番人而有來哈密之信哈密於我邊塞相去最近可發寧夏駐防滿兵令往甘肅提督孫思克處為之預備孫思克所轄官兵亦當令其整頓豫備此外本省附近地方官兵有冝調發預備者令孫思克一面調發一面奏聞又貝子察汗巴爾之弟班第自瑚瑚腦兒來時由西喇塔喇於邊內行來遇伊拉固克三胡圖克圖亦由邊內行往如此潛行來往邊塞官員何以不復稽察耶此亦當檄孫思克邊塞官員令其嚴加戒飭汝等會同兵部密議以聞康熙三十二年正月初二日諭內閣日者盛京招民有議敘之例今西安等處流民尚有未歸本業者兹西安等處流民招復幾户復歸本業助給牛種等物令之耕種收穫一季者其冝議敘吏户二部察例以聞康熙三十二年二月初一日諭內閣西安米價尚爾翔貴户部可招募身家殷實各省富商給以正項錢糧並照驗文據聽其於各省地方購買糧米運至西安發糶所得利息聽商人自取之如此往來運販待西安米價得平之時但收所給原銀大有裨益也其具議以聞康熙三十二年二月初一日諭內閣騎射乃我國家振興要務朕深悉其由於三旗內府佐領中幼稚特命官教之皆各嫺習騎射由是以觀騎射之優劣繫於教與不教耳凡兹稚子不自幼時教習則騎射之事漸至衰替今於八旗官學生及佐領中間散稚子亦當專官教習之汝等會同八旗都統議以聞康熙三十二年二月初五日諭內閣廣東省鹽丁鹽課自康熙二十二年於原額外加銀一萬四千二百四十六兩此所加銀今歲可免其半康熙三十二年二月初八日諭內閣宗族之始皆一祖所生當極致親睦共相愛恤扶持以為生也今見諸王以下互相讒害樂禍幸災略無親睦之誼凡若此者朕知而不言誰復言者吾宗室中如此於我人民得無愧乎以親九族九族既睦書有之矣且或者同為宗室以他祖父之名名其子若孫者有之今吾宗室之中不定為親睦以相愛恤扶持之道長此安窮無所底止朕意此後入八分公以上諸吉凶事會集之禮依向所定者行之如未入八分公以下至於間散宗室其吉凶之事亦冝定會集儀式此皆令八旗會集則不勝其繁矣其令本翼會集焉喪事則一旗之中為之服别旗惟去其纓又間散宗室中有極貧者一有吉凶之事則稱貸而為之致有窘迫者凡若此類諸王以下間散宗室以上各以其意出助銀一兩或數星出者既不以為難而得之者良有所益庶不至苦於債負矣其會集自其身之品級以下者而會集之間散宗室無品級者則視其父之品級會集凡會集不至者有司者察參如此則皆相識而親不惟是也有為不善者遇之亦可教以正若貧宗室亦不困於為生此欲我宗室和協優遊以安處之意也又宗室中今名有犯者宗人府悉察改焉自兹以往歲所送名亦即詳察其有犯者駁之令改焉朕此旨汝等同滿洲尚書侍郎宣示諸王及間散宗室令其會同定議以聞康熙三十二年二月初十日諭大學士伊桑阿阿蘭泰尚書馬竒顧八代索諾和圖納薩穆哈班第都御史沙海侍郎溫逹滿丕學士席喇傅繼祖安布祿聞噶爾丹艱於食窮困已極來就食於哈密哈密近在塞下若不豫為設備乘隙事生其時不及防矣今雖於甘肅令滿洲緑旗兵預備而兵力尚單可自京師每佐領出兵二人由邊外往寧夏就提督孫思克處預備陜西總督標下火器營兵出二千人馬兵出千人亦遣往孫思克處令其預備汝等可同議政大臣領侍衛內大臣索額圖郎談副都統阿南逹議以聞康熙三十二年二月十四日諭內閣往年山東旱遣故尚書蘇赫禱於泰山今歲陜西郡縣雨澤雖布而往者數罹旱災矣夫華山關中名山也宜遣大臣祀之卿等同禮部諸臣議以聞康熙三十二年二月十五日諭大學士伊桑阿阿蘭泰王熙張玉書李天馥學士席喇傳繼祖溫保戴通安布祿王尹方李柟李應豸衛既齊本降級調用一州判耳以其素有虛名特復其原官以檢討又超擢為布政使未幾內升府尹纍加遷擢至副都御史遂又授為貴州巡撫受國家恩可謂至矣為府尹時其條奏疏中自詡比之召伯君陳假若其所行者一二符其所言猶有可恕者乃初至貴州遂私動兵革妄生邊事殺無罪苗民詐報軍功種種欺謊凡此惡行雖常人所不為而彼以古人自况反不知忌憚而為之蓋於彼所言者略不相顧而大負國家之恩矣彼平昔但務虛名妄稱道學委之以事毫無實濟若此欺罔世人沽取虛名之輩不得不重加懲創為欺世盜名者之戒汝等同九卿於午門外召既齊問之康熙三十二年二月二十七日諭領侍衛內大臣郎談等近聞厄魯特噶爾丹得食甚艱有來哈密地方覓食之信哈密逼近甘肅邊界若不預為之防恐彼乘隙生事一時不及設備致失機宜故遣發禁旅特命爾領侍衛內大臣郎談為昭武將軍前往爾統領大軍赴孫思克處駐劄防備一切事務爾同西安將軍博濟振武將軍提督孫思克商酌而行簡閲兵馬餵養肥壯整搠器械務嚴束官兵不得騷擾百姓其一應錢糧聽有司各官應付地方事情不得干預至於官兵俱有部頒紀律如有違犯爾等會同商酌照依定例處分不得姑息以致紀律懈弛爾等須會商不時遣人遠探消息儻噶爾丹有犯邊情形爾等有出口應行機宜一面奏聞一面施行毋失事機爾等其愼之故諭康熙三十二年三月二十一日諭內閣山陵掌印郎中古塞邁圖桑額員外郎阿布喇彼皆效力於山陵年且久矣竟不得遷良可憫也可兼太常寺卿銜視其兼銜給之俸汝等議以聞康熙三十二年三月二十六日諭內閣見各省解送物料其中亦有無用者亦有此間購買價輕而可得者其下户部詳議其當解不當解者具以聞將以紓吾民焉康熙三十二年三月二十六日諭內閣聞自黃河逆流而上船運粟至朱仙鎮自朱仙鎮陸挽數里逹於黃河以小船載運可抵潼關若此挽運可歟否歟又不涉黃流而他河有可輸運者歟抑果無歟其敕于成龍令擇才敏者往審視之悉以逹內閣卿等以聞康熙三十二年四月初六日諭領侍衛內大臣伯費揚古兹以歸化城乃邊外各部落扎薩克總要之地凡西北蒙古地方有事皆可預為防禦現在雖有土墨忒兩旗官員兵丁但隊伍紀律素不嚴整今又增蒙古兵甚多不可不特設將軍管理總率兩旗都統副都統訓練新舊官兵整理器械法制初定關係甚重兹命爾領侍衛內大臣伯費揚古前往管理安北將軍事務俟一年更換爾駐劄歸化城統轄兩旗官兵及新增兵丁務須申明紀律謹練士卒整飭隊伍修備器械革除積斃勸課耕種廣儲糧糗不時偵探各處消息一切事宜與兩旗都統副都統計議而行凡有軍機事務即時奏請候旨施行爾受兹委任須殫心竭力宣布德威操練官兵一如禁旅斯克稱委任爾其愼之故諭康熙三十二年六月十五日諭內閣聞陜西雨水最多山東雨水亦多此兩省雨多則黃河之水必大惟此之故朕時縈於懷殷殷慮之可遣户部員外郎伊巴里再擇司官一人往見于成龍詳問水勢及堤岸情形來奏康熙三十二年六月二十一日諭內閣朕於各省往來者及請安而至者必問其地方情形雨澤應時與否頃自江南浙江來者問之云江浙間今年甚旱戶部其擇司官二員一遣往江南一遣往浙江詳詢江南總督浙江巡撫雨水情形來奏康熙三十二年六月二十八日諭户部朕撫御寰宇早夜孜孜惟以實惠及民俾登康阜為念廣西四川貴州雲南四省俱屬邊地土壤磽瘠民生艱苦與腹內舟車輻輳得以廣資生計者不同朕時切軫懷厯歲以來屢施恩恤廣西省康熙十六年通省錢糧十七年十八年民欠錢糧貴州省二十二年秋冬及二十三年春夏地丁錢糧又貴州四川二省二十五年未完及二十六年應徵錢糧雲南省二十七年以前屯地積欠錢糧俱經次第蠲豁兹念育民之道無如寬賦矧邊省地方非再沛優恤之恩則閭閻無由充裕所有康熙三十三年四省應徵地丁銀米著通行蠲免仍行文該督撫遍加曉諭令人霑實澤以稱朕加惠遠省民生至意如有不肖有司借端朦混私自徵收者該督撫指名奏劾從重治罪爾部即遵諭行特諭康熙三十二年八月初三日諭內閣江浙二省今年夏旱雖不成災秋收量必有限若漕糧照常徵收起運恐民食將至匱乏朕為此常切軫念除浙江漕糧已經改於今年蠲免外其江南漕糧今年或三分免一或免一半俟至該省應蠲年分將今年所免米石照數補徵起運於漕糧既無缺少官民大有禆益著滿漢大學士等會同户部堂官倉場侍郎等作速確議具奏康熙三十二年九月十六日諭內閣前尚書科爾坤諳練事務在户部時著有勤勞被參之事殊不明晰以其年邁不復任用可復其尚書銜又米漢雯被參之事亦不明晰供奉內庭勤勞有年可復其原官特諭康熙三十二年十月初十日諭內閣聞山東今年田收之後九月中蝗螟叢生必已遺種於田矣而今歲雨水連綿來春少旱蝗則復生未可知也先事豫圖可不為之計歟乘時竭力盡耕其田庶幾蝗種瘞於土而糜爛不復更生矣若遺種即有未盡來歲復萌地方官即各於疆理區畫逐捕不使滋蔓其亦大有益也命户部速牒直𨽻山東河南山西陜西巡撫等示所領郡縣咸令悉知田則必於今歲來春皆勉力耕耨蝗螟之災務令消滅若郡縣有不能盡耕耨其田者蝗或更生則必力為捕滅毋使蝗災為吾民患康熙三十二年十月初十日諭户部陜西西安鳯翔二府地方連被災傷朕多方賑救轉粟蠲租又招集流移散給牛種然後四方仳離之民漸次復還鄉井今歲雖雨澤霑足百穀阜成而人民甫脫飢寒未饒生計若明歲應徵錢糧即令輸納誠恐閭閻儲蓄終難充裕西鳯二府屬被災州縣衛所康熙三十三年糧米照舊徵收外其地丁銀兩著通與蠲免爾部即行文該督撫嚴敕各屬遍加曉諭務俾均霑實惠以稱朕愛養休息至意如有不肖有司濛混私征者該督撫指名劾奏從重治罪康熙三十二年十月十二日諭户部朕念切民生時厪宵旰或在宫禁之中或經巡省之地務以編氓疾苦備悉咨詢其從各省來京陛見官員及往來奉使人等亦無不以該省雨澤曽否應時田畝有無收穫並閭閻資生情形一一體訪比年以來因國家經費尚充遂將各省地丁額賦及舊欠錢糧節次蠲免即從前未經停征之漕糧亦逐年免徵總欲使海隅蒼生培固元氣庶臻於家給人足之風今歲畿輔地方雖禾稼未獲稔收初意小民糊口之需猶足資給未必生計遂致艱難頃者展謁山陵沿途察訪民隱見今歲雨水過溢田畝被淹沒者甚多穀耗不登米價翔貴又聞順天河間保定永平四府所屬皆然目前米價既貴將來春夏之際時值益昻小民必艱粒食此朕目所親覩若來歲錢糧仍然徵收朕心實有未忍順天河間保定永平四府康熙三十三年應徵地丁銀米著通行蠲免所有厯年舊欠悉與豁除行文該撫曉諭各屬務令人霑實惠以副朕子育黎元至意爾部即遵諭行特諭康熙三十二年十一月二十五日諭大學士伊桑阿阿蘭泰學士傅繼祖溫保德珠戴通沈圖常書行間被創及殘廢者雖已給身價之半而不食錢糧則貧者無以為生此人皆奮力兵陳至於殘廢良可憫惻兹後若此殘廢中尚可支持者充南苑門甲倉庫諸地老人缺給以錢糧前為護軍校驍騎校而有可支持者諸館之首領及其副缺用之康熙三十二年十二月十四日諭兵部本朝滿州官兵從來精鋭驍勇遇寇必克所向無敵前厄魯特噶爾丹之役官兵不能悉體朕意即行剿滅致失機會罔奏膚功朕每念及時恚於懷故比年以來簡閲官兵歲凡兩舉朕躬臨指示訓誨頃閲武時見諸士卒行列整齊隊伍明晰進退嫺熟嚴肅無譁所有軍令無不遵守該管官員號令約束既嚴且善此皆官兵協志同心各加奮勵所致朕心深為嘉悅八旗前鋒護軍撥什庫驍騎兵等各賞給一月錢糧間散官員照護軍給一月錢糧火器驍騎兵亦照護軍賞給有管轄職掌官員悉賞給內庫縀匹其賞賜縀匹户部會同總管內務府衙門議奏這次閲武時官員內有降級罰俸者俱準開復以示朕體恤將士申明賞罰之至意至八旗步軍官兵有察緝盜賊巡理道路等役甚多極為勞苦步軍亦各賞給一月錢糧管步軍官員亦各賞給縀匹奬勤恤勞用稱朕意爾部即遵諭行特諭康熙三十二年十二月二十日聖祖仁皇帝御製文第二集卷十二
