body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷三十一雜著古文評論和帝罷收鹽鐡詔昭帝時舉四方賢良即言願罷鹽鐡官逮此時邊方寧謐故毅然去之求曹相國後詔念舊酬勳繼絶舉廢詞意溫藹詔旨中極有風致者選舉詔漢選舉責成二千石刺史故得人為盛舉賢良詔和帝求賢諸詔綽有西漢風致封班超詔漢立功西域每求智勇之士置為都尉當時最稱得人亦由奬勵激賞之典重也蝗災罪已詔遇災引咎深自謙抑得詔令之體擇良吏詔周宣以雲漢為憂詩人美之斯詔大意略同留諸王詔詔語雖簡深得友愛之義和熹鄧皇后詔河南尹豹等貴戚子弟乃國家肺腑股肱幼而不學長且面牆恃貴而驕恃富而侈職此故也此詔辭可謂深中情事矣殤帝敕司隸校尉部刺史痛言俗吏之弊最為嚴切安帝旱蝗詔民生疾苦豈可壅於上聞宜詔詞専及之霖雨傷稼詔國家德意惟在有司實意奉行始無屯膏之弊申制度科品詔綺縠珠璣之侈濫及厮走與賈誼所論略同正京師以示四逺尤得風化之要順帝敕桂陽太守文礱封還大珠責以求媚非徒不貴異物亦以風勵廉節桓帝災異詔酒醪足以糜榖西漢詔令每引以為戒亦貴粟之一端也竇融責讓隗囂書竇融早識成敗可謂智士始終一節不愧貞臣責囂以大義惜其不能聽從耳馬援與楊廣書委曲婉至動以天性之恩曉以君臣之義其激昂古宕處則龍門筆法也朱勃追訟馬援書馬伏波有佐命之功而未有顯過此書代為辨晰歸於賞功宥過意良厚矣班彪請太子諸王官屬疏論豫教之道在於審所與居戒慎所習要言不煩乞優答北胸奴奏示以坦白得駕馭外藩之體王命論應天順人為一篇大指反覆徴引以暢其説文之極有光焰者桓談上時政疏定國是重夲業所謂政貴體要復上時政疏光武時頗尚讖緯故桓談極言之文亦剴直明切杜林論增科禁疏寬禁網捐苛細正以扶進廉潔奬成節概義實相因張純正昭穆疏光武中興漢業以元帝為大宗别建四親廟蓋以嗣繼統緒為重亦可以息後世紛紛之論矣鄭興日食疏引春秋洪範以立言皆有根據陳元請立左氏疏左氏傳博雅竒麗敘事擅古今之長公穀文亦多雋逸故三傳并傳學宫朱浮日食疏古者吏道以久任為善有治績顯效則增秩賜金璽書褒美時守令更代太煩故朱浮因日食言之與彭寵書諭以名義動以利害雄快徑直聳然可聽第五倫論竇氏疏勳戚以謙慎為美滿盈為戒第五倫所言不止國家防微之善道亦戚畹保家之明鑒也勸成風德疏書稱明作有功惇大成裕惇大者政之體也明作者政之用也此篇論治以惇大為夲文亦簡切韋彪置官選職疏登用大臣以公忠識量為重不在應對小慧簿書末節篇中獨暢此義孔僖上章帝自訟書孔僖所陳願開張聽聞即無逸皇自敬德之意何敞諫用竇氏疏指陳貴戚直言不諱非欲摧折之正欲保全之何敞於漢可謂忠矣徐防五經章句疏漢時五經諸家各設博士故箋疏之説有互相徑庭者至宋諸儒而統紀一矣宋儒羽翼經傳之功固自不朽魯恭諫盛夏斷獄疏順時為治欽若之實况刑辟尤所當慎乎魯恭之言實與月令相發明魯丕舉賢良方正對䇿簡直修潔較西漢諸儒之文別為一格論經術疏古人於經學守其師説如規矩權衡所以尊經也班固文帝紀贊贊才二百餘字而文帝恭儉寬仁治功約略已盡固洵良史哉武帝紀贊歷敘武帝尊經好古制度禮文之事彬彬可觀矣結處義正辭徑可謂髙文老筆昭帝紀贊論事措意極其整暇有舂容大雅之致成帝紀贊敘述所聞用筆輕雋在論贊中又是一格諸侯王表序援引周秦論列漢世或詳或略極錯綜變化之致纚纚千言讀之惟恐其盡髙惠髙后文帝功臣表序於論議中引用前人撰著以成文史漢中多有此體外戚恩澤侯表序建官惟賢位事惟能矧通侯之爵乎此序逐段用意特見文心公孫𢎞卜式兒寬傳贊筆力矯健論次凡數十人絶不覺其煩重司馬遷傳贊立論雖駁史遷文之抑揚盡致猶大類其筆法公孫賀劉屈氂車千秋王欣楊敞蔡義陳萬年鄭𢎞等傳贊鋪敘處如間雲卷舒自成變態循吏傳序吏必夲經術以廣教化始能嘉惠元元登風俗於淳古此循吏之所以可貴也貨殖傳序洞見夲原語語鄭重有關世道昌黎原道大意多出於此遊俠傳序立言極其正大覺史遷之豔稱駮而不純矣西域傳贊每假論敘中斡旋一二語遂覺神采飛動崔駰誡竇憲書忠告之意敦迫於中故見之書牘婉惻而周詳憲不知戒愚孰甚焉樊準勸興儒學疏儒學之興莫甚於東漢至安帝時文教寖衰流風偷薄矣此可謂匡時之論陳忠論喪服疏典質不飾嚴栗之色溢於簡册容諫疏敘述古人雖爾繁稱遠引然用意深至彌覺欵曲言中使疏古穆之氣朴直之辭翟酺諫外戚疏明而切簡而健自是灼見夲原之論虞詡請復三郡疏黝然有古光持論亦復精警左雄上順帝陳吏事疏守長於民最親賢否關閭閻休戚疏中徴引極為典切郎顗上災異封事造語精核故不厭其繁縟劉梁辨和同論博考往籍斷以正義和同之介較若白黑矣李固災異䇿對意愈婉而氣愈直讜論碩辭可刋金石陳事疏老成卓偉之言自爾伉正援日南議萬里赴援既言其失又能䇿畫方略條論井然謀國之忠何其懇到也皇甫規舉賢良方正對䇿披瀝直陳於對䇿中尤為竒特陳蕃諫封賞內寵疏徑爽峭利之中自有沉摯深厚之氣劉瑜陳事書條析當時之弊極盡情致文亦波折古宕劉陶鑄錢議因鑄冶而及農殖真知夲之論張敞上王暢奏記用刑不如行恩求姦未若禮賢洵為精義名言傅燮請誅中官疏慷慨上書情最真至蔡雍上靈帝封事湛深經術曉達時務封事之佳者幽兾刺史久闕疏言議徑正文氣紆徐諫伐鮮卑議引據多於論斷然具有精理碩畫司空文烈侯楊公碑言能舉其大者故筆力超渾郭有道碑文藻腴流利已開晉魏六朝之風然西京矩矱猶存也文範先生陳仲弓銘華而不縟故淵穆之氣浩乎無涯鄭康成詩譜序論詩之正變獨為眀審孔融肉刑議義有根據語無泛設告髙密縣教盛事佳文故自可傳應劭上漢儀疏仿仲舒春秋決獄之義刪定律令以為漢儀是有關係文字陳琳為袁紹檄豫州筆嚴霜雪氣激風霆不僅以辭采見長為袁紹與公孫瓉書立格修整遣言古茂當從呂相絶秦書得來臧洪報陳琳書深情溢於簡牘故音節琅然聖祖仁皇帝御製文第三集卷三十一
