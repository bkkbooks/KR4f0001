body:
  text: 欽定四庫全書卷聖祖仁皇帝御製文集卷三十七古今體詩三十九首駐蹕南苑遣使恭進太皇太后鮮果日永離宮節候新薰風早已獻嘉珍赤瑛盤內甘鮮果奉進瑶池第一人南苑元靈宮是世祖皇考建傑閣橫霄峻清都與漢翔規模開壯麗星宿燦輝光碧瓦浮空翠金鋪映日黃門當啼鳥靜户有異花香細草沿階發新槐拂檻涼紆回疏輦路藻彩繪雕梁警蹕臨仙境瞻依問谷王敬欽崇太昊繼述憶先皇嵗月碑文古乾坤事業昌茫茫扶大造暭暭體穹蒼恭己身無倦齋心念不忘時巡非逸豫幾暇豈遊荒衛騎驂驔列華旄宛轉揚南薰披萬物北斗起千祥瑞氣庭前見佳辰晝正長休歌白雲曲吾道在惟康南苑行圍苑中間教陳無事靜論邊不廢時苗典思周天下先德壽寺持身崇孝理清淨契真如嵗久開金寺時來降玉輿南苑晚景薰風南苑翠斿回處處連雲暮色催夜火輝煌盈帳幕離宫長待萬幾來瀛臺偶作蟬鳴槐葉緑魚躍芰荷風太液臨斜景參差更不同咏水禽水禽遙泛雪池卉迥披紅桐葉翩翩舞迎薰景未窮雨稼穡憂勤在建章油雲灑落滿巖廊憑窗喜雨雨方足五穀秋成樂萬方臨城望城髙千仞衛山川虎踞龍盤王氣全車馬遙看雲霧裏民間休戚在當前夏日有懷木槿花開夏日長時搖清扇倚方牀三庚不輟臨朝政盛暑常思守戰場內苑晚涼內苑看槐花依檻臨池日欲斜龍戲清潭娛夏景片雲生處足桑麻立秋前一日晚同左右間坐進鮮果初到金風天氣晚微涼雨後畫簾垂九重迥出白雲逺三殿髙臨北斗移珍果滿盤新獻節碧梧一葉報秋時漏深不寐題詩句月色輝煌照鳳墀秋蘭並序殿前盆卉芳蘭獨秀昔人稱為王者香又以方之君子因題四韻猗猗秋蘭色布葉何蔥青愛此王者香著花秀中庭幽芬散緗帙靜影依疏櫺豈必九畹多侈彼離騷經初秋幸西苑觀荷命小船採蓮命駕來西苑初秋向晚天芰荷池沼滿鷗鷺夕陽邊頻使移輕舫時來獻採蓮離宫闌檻外風動碧翩翩臨池觀魚有懷臨池魚躍白雲連太液東邊問小船一色水天明似鏡風波銷滅在何年夜至三鼓坐待議政大臣奏事有感而作午夜迢迢刻漏長每思戰士幾回腸海東波浪何年靖日望軍書奏凱章七夕爽氣三秋早仙期此夕經針樓連萬户機石動雙星玉露交珠綴金風度綺軿天文在雲漢流影照彤庭沙河途中作輝煌明輦道將曉漏聲殘秋月西山落金風北野寒望陵悲樹色就景盼雲端每念芳華日溥溥露未乾清河荒亭楸葉晚蟬鳴荒亭蟋蟀聲露凝新樹色日出滿林明蛺蝶從枝舞蜻蜓點水輕欲看秋景好歸路且徐行初秋景山新涼樹色向金天御輦遙停蔓草邊盛暑已過銷夏日清風才到有秋年髙臨三殿九重闊下看千家萬户連薄暮山亭觀射畢回宫復道起蒼煙題日精門古硯古硯何年斫雲箋寫御章宫門秋雨濕內殿晚風涼夕景爐煙動晴光燭影長文房友筆墨灑翰起龍翔待曉閶闔餘殘暑夕籟鳴髙秋曖曖月始出泠泠露初浮逺色淡河漢新涼灑裀幬夜氣倍澄寂庭宇彌清幽眷言希古則羲軒詎可儔不寐定天保昧爽思旁求往軫雖緬邈來途非阻修低徊待申旦治理今何由賜奉命大將軍傑淑二首卷斾生風壯氣揚早持龍節定炎方秋毫無犯民心悅盡掃欃槍奏凱章其二旄鉞才臨父老迎樓船一舉海波清金甌已定千年業銅柱須標萬古名秋日咏刀七寶刀光耀斗牛建章佩帶向初秋清流越砥方知力截兕剸鯨斷不愁海子北紅門秋雨後行圍戲作晝漏稀聞紫陌長霏霏細雨過南莊雲飛御苑秋花濕風到紅門野草香玉輦遙臨平甸闊羽旗近傍逺林揚初晴少頃布圍獵好趁清涼躍驌驦晾鷹臺清晨漫上晾鷹臺八駿齊登萬馬催遙望九重雲霧裏羣臣就景獻詩來南苑閲馬渥窪龍種雪霜同毛骨天生氣格雄八駿齊觀南苑裏豈誇當日玉花驄中秋望月坐望中秋月正圓玲瓏丹桂植當天無私普照八荒外皎潔清光雲漢邊賜輔國將軍俄啓詩並序內大臣輔國將軍俄啓侍從帷幄勤勞茂著百步穿楊發矢如電因賜御章以旌其射觀德由來上古風手持滿月緑沉弓鷹揚虎視流星逺中鵠穿楊為世雄秋日晚景有懷寒鴉秋景集南林遙倚屛山綺樹陰丹闕逺砧鳴午夜玉壺清漏起遐心衷情靜裏無人識外象間中有物尋憶想千般聞落葉且須持筆漫微吟大將軍報吳逆暴死其下賊衆潰散無餘大兵指日進取恢復封疆遙天今日捷書來萬里歡聲動地開從此黎民皆樂業軍威應振凱歌回康熙十七年九月初十日奉太皇太后臨御溫泉恭紀五言排律八韻慈寧方曉日掖輦幸溫泉羽騎清塵道華旗衛御前九重雙闕迥三輔萬家連蔥鬱東臯樹蒼茫北嶺煙問安頻色喜侍膳每心懸孝養尊親重時巡法祖虔村村施化溥處處得恩光更慮民情隱深慚撫八埏駐蹕平家灘鑾輿駐蹕近滄浪行殿崔嵬對夕陽郊外村莊時極目秋成處處有風光潞河曉起至太皇太后行殿問安曉色方明在潞河孤山逺影鬱嵯峨孤山在潞河之東寢門恭問慈顏喜還愧無能作賦歌見雁南飛歸雁南飛有數行南飛度嶺向衡陽欲將信息傳軍士早報成功返故鄉駐蹕薊州城南逺眺山村萬騎驂驔擁薊城風行雷出逺天清微霜細草野狐懼寒露荒煙山鳥鳴捲幔浮涼侵帳殿倚牀明月似都京欣隨聖母遊情曠深夜還思勉愫誠山中獲野禽恭進太皇太后吹笳清輦道大地雜旌旗萬壑來秋色千巖散落暉鷹隨山雉逺箭帶野禽歸遣使呈鮮味須令馬迅飛曉起山路口號荒屋山中月色闌秋髙邊塞正風寒羊腸石道臨泉水已靜人聲足曠觀聖祖仁皇帝御製文集卷三十二
