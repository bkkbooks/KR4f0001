body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻十八論禮樂論禮樂何始乎始於天地而通於陰陽何者天位乎上地位乎下萬物中處尊卑燦列而禮以行二氣絪緼合同而化而樂以興禮者主於一定其道屬陰樂者主於流通其道屬陽故漢儒謂陽倡始是以樂言作陰制度於陽是以禮言制此禮與樂之所由分也然二者不可偏勝禮勝則過峻而違人情樂勝則和而無節日流蕩而忘返猶之陽勝則亢陰勝則溢也朕嘗讀周禮有曰以天產作陰德以中禮防之以地產作陽德以和樂防之又似乎禮原於陽而樂原於陰者何哉蓋天之所產陽也而其沖然無象者則為陰之靜地之所產陰也而其磅礴外見者則為陽之動故大宗伯之掌禮大司樂之掌樂其防民之道二而一也朱熹曰嚴而泰和而節夫嚴者禮和者樂而所謂泰與節者非禮之中有樂樂之中有禮歟然此特言其禮樂之理爾若夫治定功成制禮作樂以漸摩天下則必上之人履中蹈和秉至德以為之基而後可協天地之極此朕之所以欿然而不敢足也居敬行簡論觀民氣之靜躁而政之得失可知也觀政事之繁簡而治之隆替可知也上古之世淳淳悶悶執契而自平結繩而自治猗歟盛矣自禪繼相承創守代見張弛因革道非一端約而舉之其政簡者其治隆其政繁者其治替此古今不易之理雖百世而可知也雖然此特就其所行者言之耳若夫宰治之原則有至要者存焉使操之本無而一以簡為主則任法之獘必傷於綜核省事之漸必流於叢脞秦之衡石程書晉之清言召禍其所失均也必也主之以至一本之以無私正心以窮理而是非不得淆其中虚己以知人而邪正不得熒其外夫然後見之措施清靜畫一無為而治事有不期簡而自簡者故曰君子之學大居敬農桑論嘗觀王政之本在乎農桑虞舜之命棄曰汝后稷播時百穀禹之告舜也曰政在養民水火金木土穀惟修殷之考績羣辟亦曰稼穯匪懈周以農事開基至成王之世制禮作樂典章明備彬彬郁郁然周公所作矇史所歌若豳風七月之篇其道于耜舉趾采桑載績之事反覆不置何前後聖同一指歟蓋農者所以食也桑者所以衣也農事傷則饑之原女紅廢則寒之原小民饑寒廹於身而欲其稱仁慕義有無不競遵路㑹極其勢不能朕嘗躬行三推以率天下農矣而敦實崇儉之令繩督有司靡不加意宜乎薄海以内襏襫之衆比肩於野杼柚之聲相聞於里庶幾古初醇樸之風乃逐末者未盡息而錦繡纂組之文日盛也中夜求治惄焉慮之孟子曰菽粟如水火而民焉有不仁㫖哉斯言使天下之民咸知貴五穀尊布帛服勤戒奢力田孝悌而又德以道之教以匡之禮以一之樂以和之將比户可封而躋斯世於仁壽之域故曰農桑王政之本也讀書貴毋自欺論古之聖人生而知之猶必學而取諸人者不敢自信也不敢自信者不敢自欺也蓋人之知也有涯不能憑虚以悟故必假於詩書六藝之文誦讀以舉其詞思索以晰其義綜微研賾以窮其指歸而後可以多識前言往行以畜其德然詩書六藝之文至奥博矣有其所可知者亦有其所不可知者使不加以深造之功而槪以為有得則其不可知者吾心先受其蔽而可知者亦危殆而有所不安是自欺也豈所謂格物窮理之學乎朕自沖年讀書於隻字未明必往覆尋繹積漸於諷詠之中而未能實獲於義藴之内竊以為古人毋自欺之學卽此為可見故不敢不致其力也夫誠意之要首嚴自欺於以正心於以修身於以治國平天下豈獨讀書一事為然哉讀書貴有恒論為學之道朕旣要其本於毋自欺矣雖然尤患於始勤而終惰也蓋聖賢入道非學之難而有恒之為難書曰惟學遜志務時敏厥修乃來夫虚以受人勤以勵己則其所修常若原泉始達汨汨不已而必曰時者則恒之説也詩曰日就月將學有緝熙于光明夫君子博聞强識敦行不怠以故知日廣而能日崇若朝勤而夕懈進鋭而退速則學彌晦矣何光明之有是詩人之言要亦恒之説也人之為學非好之篤嗜之深其勢必不能以持久何則詩書之氣未克浸滛於性情之内則離而去之矣求其學之有成詎可得哉朕自八齡雅好典籍無論細旃廣厦諷詠古訓日與講臣共之卽至鑾車帳殿之間罔廢圖史尋味討論弗敢畏其艱深而阻焉弗敢騖於外物而遷焉蓋初終如一日也然聖賢理道至為精微朕孜孜矻矻愧僅得其糟粕耳苟能由是而益加勉焉庶於學問之途或尚有所獲但恐志氣怠弛乘於不覺書曰為山九仞功虧一簣此言克終之不易也朕用是兢兢焉以有恒為警云王道論治天下必審擇所以為治之道然後運之有本而措之也不勞蓋得其道則一時無赫赫之功而久大之業可以永建而不拔不得其道則雖殫精敝形而終無以幾於治故治理之方不可不審也其要在仁義而已矣昔三代之盛也蠲煩去苛屏飾斥偽先躬行而後文告崇禮讓而緩刑罰優游漸漬不期效於旦夕迨積之旣久風俗日茂人心日醇大化敦龎號為上理此行仁義之所致也秦漢而下務為一切苟且之政以檢束其民民生其時亦皆匿情飾貌以應其上上下相蒙競趨媮薄治功之降逺不古若此則不行仁義之過也故曰仁以育之義以正之仁以育之所以養也義以正之所以教也孔子曰如有王者必世而後仁又曰聖人久于其道而天下化成蓋言王道之成仁義之效也是以聖王在上制田里廣樹畜省刑而薄歛崇本而抑末使天下之民家給人足有俯仰之樂而無阽危之患由是立庠序之制置慈惠之師修六禮以節其性播六樂以淑其情明七教以興其德齊八政以禁其非當是之時六合之逺一家之積也四海之廣一身之推也天下之久安而長治猶泰山而四維之也其去夫驩虞之治不亦逺乎嗚呼天下重器也有天下大業也彼挈缾之智猶必厝之於至安况夫居重器而履大業者哉盍亦知所擇矣過金陵論金陵禹貢揚州之域秦立郡縣為秣陵兩漢因之孫權時稱建業東晉及宋齊梁陳地號佳麗隋唐之間六朝舊跡漸致湮没南唐李氏始更築城名金陵府明有天下建都於此窺明太祖之意以為宅中圖大控制四方千百世無有替也歲在甲子冬十一月朕省方南來駐蹕江寧將登鍾山酹酒於明太祖之陵道出故宫荆榛滿目昔者鳳闕之巍峩今則頽垣斷壁矣昔者玉河之灣環今則荒溝廢岸矣路旁老民跽而進曰若為建極殿若為乾清宫階磌陛級猶得想見其華構焉夫明太祖以布衣起淮泗之間經營大業應天順人奄有區夏頃過其城市閭閻巷陌未改舊觀而宫闕無一存者覩此興懷能不有呉宫花草晉代衣冠之歎耶昔人論形勢之地首推燕秦金陵次之然金陵雖有長江之險為天塹而地脉單弱無所憑倚六朝偏安弗克自振固厯數之不齊或亦地勢使然也明自文皇靖難之後嘗以燕京為行在宣德末年遂徒而都之其時金陵臺殿苑囿之觀聲名文物之盛南北竝峙逺勝六朝迨承平旣久忽於治安萬厯以後政事漸弛宦寺朋黨交相構陷門户日分而士氣澆漓賦歛日繁而民心渙㪚闖賊以烏合之衆唾手燕京宗社不守馬阮以囂偽之徒託名恢復僅快私仇使有明艱難創造之基業未三百年而為丘墟良可悲夫孟子曰天時不如地利地利不如人和有國家者知天心之可畏地利之不足恃兢兢業業取前代廢興之蹟日加儆惕焉則庶幾矣勤儉論嘗觀堯以執中之㫖授舜舜以執中之㫖授禹而孔子之稱禹曰無間然舜亦美其勤邦儉家蓋以禹之奉已簡薄而於天地祖宗生民數大事克備夫道以致其厚有合於中之㫖焉夫崇宫室豐飲食美衣服此人心也其幾易溺敬天地孝祖宗拯民生此道心也其幾易怠溺則侈侈則嗜慾日荒怠則逸逸則理道日逺發於一心見諸天下而盛衰治亂之途判矣傳曰私欲𢎞多則德義鮮少德義不行則邇者騷離逺者距違甚言奢之不可不戒也至書載文王卑服卽康功田功又言自朝至於日中昃不遑暇食用諴和萬民伊尹之告太甲曰慎乃儉德惟懷永圖噫儉與勤之道盡之矣朕檢身省心常恐弗及故萬幾日御以自砥礪而宫中府中之用刻意損抑較之前代毎歲所需十不及一雖不敢比於大禹文王之為君而兢兢勿侈勿逸之念恒欲化雕返朴袪肆崇敬以務幾乎道然人心危而道心微苟侈泰之私中於幾微勢必形於家國其弊有不可遏者則慎修思永尤執中之要道也歟辯王霸辯禪繼之統分而後有三王㑹盟之事興而後有五霸世之儒者尚論古今推明已事語仁義則尊隆王道言權術則崇尚霸功要其同異得失之辨可得而言也大約出之有誠偽行之有公私耳天下之民其阽於危而思卽安也不啻如饑之待哺寒之待衣上之人有萬物一體之懷有天下為家之意仁以漸之義以摩之而下之人亦皆愛之如父母敬之如師保咸有不忍去其上之心此王道也法立而政明令行而禁止有市德於下之心而下亦有所懾服此霸功也故誅伐同也而應天順人之與克威立慬不同也播告同也而至誠惻怛之與噢咻嘔喻不同也此誠偽之分公私之辨可以見王霸之大端矣世或有謂古今異宜王霸貴乎雜用者不知古今雖異而天命民彞之理豈有異乎春秋戰國之時三綱淪九法斁世風日下人心日偷矣而孔子孟子生於其時不聞有隨時遷就之説所守者一以道德仁義為歸雖其不能見用於時君而萬世之天下皆得以其空言治之孰謂王道之宜於古而不宜於今乎若以雜霸之術而欲奏熙隆之治猶適越者而北其轅也故作王霸辯云聖祖仁皇帝御製文集巻十八
