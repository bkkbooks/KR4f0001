body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷二十二序御選唐詩序古者六藝之事皆所以㴠養性情而為道德之助也而從容諷詠感人最深者莫近於詩故虞廷典樂依永和聲帝親命焉成周時六義領在樂官而為教學之先務自三百篇降及漢魏六朝體製遞增至唐而大備故言詩者以唐為法其時選本如河嶽英靈中興間氣御覽才調諸集其所收擇各有意指而觀者每有不遍不該之歎朕萬幾餘暇留意篇什廣搜博採已刻全唐詩集而自曩昔披覽嘗取其尤者彚為一編古風近體各以類相從計三十二卷蓋討索貴於詳備而用以吟咏性情則當挹其精華而潄其芳潤每當臨朝聼政巡行獮狩之餘展卷留連未嘗不悠然而有得也因命儒臣依次編注朕親加考訂一字一句必溯其源流條分縷析其有徴引訛誤及脫漏者隨諭改定逾嵗告成因付開雕以示後學孔子曰溫柔敦厚詩教也是編所取雖風格不一而皆以溫柔敦厚為宗其憂思感憤倩麗纎巧之作雖工不録使覽者得宣志逹情以範於和平蓋亦用古人以正聲感人之義記有之君子在車則聞鑾和之音行則鳴珮玉是以非辟之心無自而入也審此而朕之寄意於詩與刋布是編之指俱可得而見矣是為序康熙字典序易傳曰上古結繩而治後世聖人易之以書契百官以治萬民以察周官外史掌逹書名於四方保氏養國子教以六書而考文列於三重蓋以其為萬事百物之統紀而足以助流政教也古文篆𨽻隨世遞變至漢許氏始有說文然重義而略於音故世謂漢儒識文字而不識子母江左之儒識四聲而不識七音七音之傳肇自西域以三十六字為母從為四聲橫為七音而後天下之聲總於是焉嘗考管子之書所載五方之民其聲之清濁髙下各象其川原泉壤淺深廣狹而生故於五音必有所偏得則能全備七音者鮮矣此歷代相傳取音者所以不能較若畫一也自說文以後字書善者於梁則玉篇於唐則廣韻於宋則集韻於金則五音集韻於元則韻㑹於明則洪武正韻皆流通當世衣被後學其傳而未甚顯者尚數十百家當其編輯皆自謂毫髮無憾而後儒推論輒多同異或所收之字繁省失中或所引之書濫踈無凖或字有數義而不詳或音有數切而不備曽無善兼美具可奉為典常而不易者朕每念經傳至博音義繁賾據一人之見守一家之說未必能㑹通罔缺也爰命儒臣悉取舊籍次第排纂切音解義一本說文玉篇兼用廣韻集韻韻㑹正韻其餘字書一音一義之可採者靡有遺逸至諸書引證未備者則自經史百子以及漢晉唐宋元明以來詩人文士所述莫不旁羅博證使有依據然後古今形體之辨方言聲氣之殊部分班列開卷了然無一義之不詳一音之不備矣凡五閲歲而其書始成命曰字典於以昭同文之治俾承學稽古者得以備知文字之源流而官府吏民亦有所遵守焉是為序月令輯要序古者於明堂之中施十二月之令本堯典授時之意而推廣之今所傳大戴禮夏小正篇小戴禮月令篇三代之遺文大略可見矣月令雖出吕覽而蔡雍次其章句孔頴逹定其正義推明周公品制列之於經漢晋而下若四民月令四時纂要以及千金錦帶嵗華紀麗嵗時雜記諸書代有撰述未覩賅備前眀之季馮應京戴任始輯月令廣義二十四卷為士庶通用觀其原本經訓推衍義類用意亦云勤矣顧其採托既多蕪纍間出爰命儒臣重加編緝次第呈覽親為裁定正訛芟復一歸雅馴别起義例補所未備博觀約取務合於體要而切於實用庶幾古者明堂月令之遺式矣書成名曰月令輯要舊本圖說并為釐正列諸卷端因天時而課治功察物候以盡人事自國家政典下逮氓庶作息均可參驗而閎覽博物之學亦於是乎有取焉由今而後言紀時之書者其必以此為權輿也夫周易折中序易學之廣大悉備秦漢而後無復得其精微矣至有宋以來周卲程張闡發其奧惟朱子兼象數天理違衆而定之五百餘年無復同異宋元明至於我朝因先儒已發之微㫖或有妄參已見漸至啓後人之疑朕自弱齡留心經義五十餘年未嘗少輟但知諸書大全之駁雜奈非專經之純熟深知大學士李光地素學有本易理精詳特命修周易折中上律河洛之本末下及衆儒之考定與持論之不可易者折中而取之越二寒暑甲夜披覽隻字片句斟酌無遺康熙五十四年春告成而傳之天下後世能以正學為事者自有所見歟春秋傳說彚纂序六經皆孔聖刪述而孟子特言孔子作春秋左氏公羊榖梁三家各述所聞以為傳門弟子各衍其師說末流益紛以一字為褒貶以變例為賞罰微言既絶大義弗彰至於災祥䜟緯之學興而更趨於怪僻程子所謂炳若日星者不因此而反晦乎逮宋胡安國進春秋解義明代立於學官用以貢舉取士於是四傳並行宗其說者率多穿鑿附㑹去經義逾逺朕於春秋獨服膺朱子之論朱子曰春秋明道正誼據實書事使人觀之以為鑒戒書名書爵亦無意義此言真有得者而惜乎朱子未有成書也朕恐世之學者牽於支離之說而莫能悟特命大學士王掞纂輯是書以四傳為主其有舛於經者刪之以集說為輔其有畔於傳者勿録書成凡若干卷名之曰傳說彚纂夫春秋之作以遊夏之賢不能贊一詞司馬遷稱七十子之徒口授其傳指而人人異端當時已無定論後之諸儒欲於千百年後懸斷聖人筆削之㫖不亦難乎是書之輯亦惟擇其言之當於理者雖不敢謂深於春秋而辨之詳取之慎於屬詞比事之教或有資焉是為序福建總督范承謨畫壁集序朕惟帝王教化首重名節所以維繫人心扶樹綱紀也古人臣以身事主守土膺疆或遇蝥賊潜生豺狼勃起則捐軀矢志取義成仁而其激烈慷慨之氣間發為文辭雖質直無華後世論録終有不可泯滅者以其出於忠義之誠本乎性情之正也福建總督范承謨名臣之子授節閩海方值逆監盜兵偏隅煽焰籌略未展橫罹幽縶閲三寒暑貞操彌堅故其皭然不滓之志縈紆鬱屈無所攄露乃以墻壁為書箋以桴薪為筆墨題分甲乙字辨衡從日月既深篇章漸積名曰畫壁記實也卒能終始不撓歸於正命若承謨者可謂冒白刃而不疑守丹心而自信者矣夫以茹荼含檗之餘每念不忘君父故詩文不必盡合於古之作者而浩然之氣流行充溢當其胸填聲咽髮植風生土塊灰丸同於利劍禿毫斷梗等比霜矛寫忠孝之性靈奪奸凶之殘魄是又豈刻雕藻繢塗飾虛浮者之所能及乎自三逆殄滅寰宇謐寧恤典頻加恩綸屢降固已延賞後昆光賁泉壤矣兹特允其子時崇所請復為序其存稿蓋善善欲長春秋之義辨章特錫數出非常庶幾追妥忠魂亦以風厲臣節焉聖祖仁皇帝御製文第四集卷二十二
