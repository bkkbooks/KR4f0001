body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四敕諭諭三法司衙門朕惟自古帝王撫御羣臣百姓政教修明治化洽暢與其繩以刑罰使人怵惕文網苟幸無罪不如感以德意俾民蒸蒸向善不忍為非書稱協和萬邦黎民於變時雍又稱臨下以簡御衆以寬唐虞盛時從欲風動其效章章如是朕嘗心慕隆古力行教化兾以感發天良偕之蕩平正直之道而人情囂偽風俗頽敝明罰勑法國憲不可以已雖嘗屢行矜恤絶去煩苛終思尚德緩刑乃為至治之極軌自康熙元年以來中外臣民習染澆風爭事詐偽公行賕賂貪冒營求因緣請托作姦犯科頑鈍者恬弗知恥姦黠者愍不畏法以致是非乖謬綱紀廢弛朕親政以後洞悉姦弊加意釐剔振飭憲章務使骩律干紀之衆莫能匿慝法無旁貸人無遁情庶幾禁遏頑豪杜塞僥幸近見罹於罪罟者漸覺減少但革面未能革心畏罪不如知恥原夫立法之意夲欲使人難犯今因法令嚴密輒思苟免苟免之心切則彌逢之弊深羣心日夕恐懼不寧巧偽滋多亦未可定今欲崇尚德化務存惇大蕩滌邪穢一切令之自新除前經審擬完結各案及關係宫殿陵寢河道工程侵欺正項錢糧不議外內外現經發覺一應枉法得贓行賄與受人員仍革職止免擬重辟照例定罪追贓其此等未經發覺者悉與寬免有以諭前事參奏訐告者一槩不準自諭以後中外臣民須洗心易慮省改前非守法奉公敦厲廉恥以副朕使人寡過之至意再有干犯自難曲宥至於旗下間散官員人等及民間豪惡黨類並無職任乃攬説公事交結衙門妄行訛詐賄囑關通實繁有徒朕皆稔悉嗣後益當恪遵法紀勿蹈故轍如怙終不悛發覺之時從重治罪決不寬貸爾法司即通飭內外大小各衙門八旗及內府佐領曉諭知悉一體遵行特諭康熙二十五年五月初一日諭一統志館總裁勒德洪等朕惟古帝王宅中圖治總攬萬方因天文以紀星野因地利以兆疆域因人官物曲以修政教故禹貢五服職方九州紀於典書千載可覩朕纘紹丕基撫兹方夏恢我土宇逹於遐方惟是疆域錯紛幅員遼濶萬里之逺念切堂階其間風氣羣分民情類别不有綴録何以周知顧由漢以來方輿地理作者頗多詳略既殊今昔互異爰敕所司肇開館局網羅文獻質訂圖經將薈萃成書以著一代之巨典名曰大清一統志特命卿為總裁官其董率纂修官恪勤乃事務求采搜閎博體例精詳厄塞山川風土人物指掌可治畫地成圖萬幾之餘朕將親覽且俾奕世子孫披牒而慎維屏之寄式版而念小人之依以永我國家無疆之曆服有攸賴焉卿其勉之欽哉康熙二十五年五月初七日諭三法司衙門近因天氣炎熱特遣部院大臣會同三法司詳加審鞫將罪犯已經減等發落其直𨽻各省問刑衙門罪犯雖經詳慎始定爰書但內外原屬一體有情可矜疑者亦未可定著各直省督撫將已結案內現在監禁者逐一詳加審理果可矜疑開明具奏爾三法司覆加詳核照例減等以副朕慎刑愛民至意特諭康熙二十五年六月初七日諭大學士敕德洪明珠吳正治宋德宜學士禪布蔡必漢噶思泰吳興祖徐廷璽韓菼郭棻各省輿圖載入一統志事殊重要或一省有大圖而無小圖或一省有里數程途而無疆界或一省有疆界而無里數程途各省皆不一例何也可詢之曽為總督巡撫者康熙二十五年六月十二日諭工部右侍郎孫在豐朕前因巡幸爰至江南見髙寶興鹽山江泰等處積水汪洋民罹昏墊朕甚憫之應行開濬下河疏通海口俾水有所歸民間始得耕種特發帑金拯救七邑災民屢集廷議兼詢輿情允協僉謀事當釐舉兹命爾前往淮揚所屬下河一帶車路等河並串場河白駒丁溪草堰場等口挑濬事務專屬於爾監修爾宜往來親歷多方經畫講求源流脈絡次第興工督率帶去司官等務實心任事勿得怠忽擾害其司道府廳州縣等官如有違玩貽誤及勢豪紳襟妄行干預包攬生事阻撓工程者指名參奏濬過工程丈尺用過夫料數目造册畫圗貼説具奏爾受兹專委須竭忠盡力悉心區處速竣大工使海口疏通水消田墾蒸黎復業以副朕救民至意如因循怠忽虛費財力責有所歸爾其慎之故敕康熙二十五年七月初四日諭刑部刑獄民命攸關聽斷雖貴精詳而案牘務無留滯庶事得速竣民免株纍向來凡朔一二日及齋戒等期不理刑名爾衙門一切奏章俱行停止因而案件間有停積恐聽審人犯久候拖纍覆核案件遷延滋弊嗣後遇前項日期除循例不行刑外其餘照常章疏事件仍行審理啓奏務期獄無稽緩案得早清以副朕明慎用刑之至意特諭康熙二十五年七月二十三日諭大學士勒德洪明珠王熙吳正治宋德宜學士禪布蔡必漢吳興祖徐廷璽李光地韓菼郭棻每月朔初二日及凡齋戒日刑部所上常事照常發科刑戮重罪事關人命者勿發可併數日章疏齋戒畢發之或留中或發之內閣者皆如之康熙二十五年七月二十三日諭荷蘭國王耀漢連氏甘勃氏朕惟柔遠能邇盛代之嘉謨修職獻琛藩臣之大節輸誠匪懈寵賚宜頒爾荷蘭國王耀漢連氏甘勃氏屬在遐方克抒丹悃遣使賫表納貢忠藎之忱良可嘉尚用是降敕奬諭并賜王文綺白金等物王其祗承益勵忠貞以副朕眷欽哉故敕康熙二十五年七月二十七日諭大學士勒德洪明珠王熙吳正治宋德宜學士禪布蔡必漢噶思泰吳喇岱吳興祖徐廷璽李光地韓菼郭棻各省駐防人貟有授世職者令其來京道路遼逺生産苦於遷移此後不必令其來京官則令其仍留原任撥什庫兵丁則以品職相稱之官辨及驍騎校缺用之康熙二十五年八月二十六日諭內閣遣兵防戍所繫最要兵部堂官可速往會同盛京將軍副都統今所議防戍可行與否詳議以聞康熙二十五年九月初九日諭戶部自古帝王撫馭九有軫念民依凡鞠謀生養為計甚周猶以賜復蠲租為布德行仁之要務朕嘉與海內元元共圗樂利弛征減賦時厪於懷惟頻渙恩施俾萬姓得沾實惠念直𨽻畿輔重地天下根夲寬租之詔屢沛往年但順永保河較之畿南諸府差役倍多供億尤劇應加軫恤又湖廣湖南福建四川貴州地方昔年為賊竊踞民遭苦纍今雖獲有寧宇更宜培養以厚民生應一體蠲免用昭愷懌直𨽻順永保河四府及四川貴州兩省所有康熙二十六年應徴地丁各項錢糧俱著蠲免二十五年未完錢糧亦著悉與豁除湖廣湖南福建兩省所有康熙二十六年下半年二十七年上半年地丁各項錢糧及二十五年未完錢糧亦與盡行豁免爾部速行該地方通行曉諭務使人民均被恩膏以副朕愛育蒼生至意如有不肖有司官役借端朦混反私行重徴者該督撫指名題參從重治罪如該督撫徇隱不行糾舉或經參奏或被告發定行一併從重治罪爾部即遵諭行特諭康熙二十五年九月初九日諭大學士勒德洪明珠王熙吳正治宋德宜學士禪布蔡必漢噶思泰吳喇岱齊穡吳興祖徐廷璽李光地韓菼郭棻錦州鳯凰城等地方人民稀少頗有曠土可令如墨爾根黑龍江耕種之例為之其下所司康熙二十五年九月二十四日諭大學士勒德洪明珠王熙吳正治宋德宜學士禪布蔡必漢噶思泰吳喇岱齊穡吳興祖徐廷璽李光地韓菼郭棻逃人刺面所以禁逃也而捕逃緝獲者事仍如故且刺面之逃人贖身為民者亦有之此後逃人其主有願免其刺字者宜聽其免刺九卿詹事科道於會集之便議以聞康熙二十五年十月初二日諭大學士明珠諭俄羅斯察罕汗敕書中情事前命曉諭其使兹曉諭時以敕書稿曉諭之若授敕書時則跪受之禮宜令其知之康熙二十五年十月初六日諭禮部朕惟敬天奉祖郊祀廟饗必精白厥心竭誠致慎庶幾有孚昭格用洽明禋朕於祭祀壇廟每躬詣行禮未嘗不齋明祓濯實圖感通凡從事於祀典者皆宜表裏精誠虔盡職掌近見執事陪祀各官間有因循怠忽視為具文不能盡志致慤共效昭事之忱殊為非禮嗣後務俾各秉誠心克恭祀事凡行禮儀節始終整肅毋得慢易用副朕敬奉天祖至意作何再加通飭永可遵行著九卿詹事科道會同詳加確議具奏特諭康熙二十五年十一月十六日諭戶部朕惟自古帝王撫馭寰區勤宣德意必軫恤民隱加惠閭閻俾黎元樂業比戶豐盈而後化協時雍治登隆理朕念切民依鞠謀生養欲使羣生樂利幹止寧成惟頻行減賦蠲租庶萬姓得沾實惠前念直𨽻畿輔重地王化所宜先大沛恩膏用培邦夲而順永保河四府地方人民較之畿南差役倍多煩苦故將康熙二十六年地丁各項錢糧同湖南福建四川貴州四省錢糧盡與豁免比慮兵餉或有不敷真順廣大四府地方未經一體蠲免今聞此四府人民間有艱苦朕心深為軫念宜速施渥澤均示仁恩著將此四府康熙二十六年地丁各項錢糧盡行蠲免爾部速行地方官通行曉諭務使人民均沾實惠以副朕愛育蒼生至意如有不肖有司官役借端朦混私行重徴者該撫指名題參從重治罪如該撫徇隱不行糾舉或經參奏或被告發定行一併從重治罪爾部即遵諭行特諭康熙二十五年十二月諭大學士勒德洪明珠學士禪布噶思泰吳喇岱齊穡吳興祖額爾赫圖日者遣部員自幾林烏喇至黑龍江以蒙古席白逹呼里索倫等人力耕種田榖大獲夫民食所關至重來歲仍遣前種田官員以蒙古席白逹呼里索倫等人力耕種郎中博竒所監種田地較諸處收穫為多足供驛站人役之口糧又積貯其餘榖博竒效力視衆為優其注之册此遣去諸員可互易其地監視耕種博竒又復大獲則議敘焉康熙二十五年十二月初六日諭大學士勒德洪明珠學士禪布噶思泰吳喇岱齊穡額爾赫圖聞有運盛京糧米於山海關內者又泛海販糶於山東者多有之糧米所繫最為緊要况今防戍官軍人口衆多糧糈可適足不致缺乏耶未可必也宜止其販糶糧米其下所司密咨移盛京將軍副都統户部侍郎以己意禁之康熙二十五年十二月初六日諭大學士勒德洪明珠學士禪布噶思泰吳喇岱額爾赫圖吳興祖徐廷璽京師重地所關鴻巨盜賊凶棍察緝宜嚴其在步兵尤為專責前步軍統領費揚古在任嚴於巡緝其所管轄屏絶情面今現任步軍校席特庫亦於情面能為拒絶巡緝管轄甚嚴若步軍統領總尉皆如席特庫盜賊凶棍畏罹法網自當斂迹京師庶得肅清左翼總尉穆呼逹年老衰弱右翼總尉沙木布為人庸懦皆令解任二等侍衛逹漢泰其人堪用可任管轄其代沙木布為總尉穆呼逹缺選擇以聞俟此總尉之缺既補之後可令步軍統領總尉等會同於現任步軍副尉步軍校等員中察其不克任管轄庸劣者罷之其下兵部康熙二十六年二月初二日諭大學士勒德洪明珠學士禪布吳喇岱額爾赫圖吳興祖徐廷璽昨夜正陽門外失火漢官皆不事撲滅但袖手旁視今八旗都統副都統五旗護軍統領向不預直宿可於要地分班輪直若偶遇火即為撲滅儻有傳集之事亦易齊聚方今時際升平並無效力之地分班直宿以盡勤勞分所宜然令滿洲蒙古漢軍都統副都統五旗護軍統領會議以聞康熙二十六年二月十二日聖祖仁皇帝御製文第二集卷四
