body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十雜著康熙幾暇格物編果單果單出陜西查本草注云果單以楸子為之即劉熙釋名所謂奈油也不知楸子所成特黃色一種耳有紅黑二種則以哈果為之哈果出肅州及寧夏邉外回子呼為哈忒今口外亦隨處有之枝幹叢生有柔刺不甚髙大其皮可以飾箭溜矢把耐久倍於桃皮葉似野蒲萄而小結實攢聚秋深乃熟或赤色或青黑色故俗亦名紅果黑果邉人云秋時採取摘去枝梗將果下鍋熬出津液漉去渣滓煉成薄膏貯别器內候少涼膏欲凝結略如紙房抄紙法以木為匡抄而成皮勻薄如油紙揭起隂乾紅果成者色紅黑果成者色黑土人以之餉逺亦名果煆皮以自熬煆而成也乃哈果之名書籍皆不載是知古今方物略而弗備者何可勝記也普盤普盤即木莓一名懸鈎子爾雅所謂箭也按本草云懸鈎樹生髙四五尺其莖白色有倒刺其葉有細齒頗似櫻桃葉而狹長又似地棠花葉四月開小白花結實色紅味酸美人可多食之有以為即覆盆誤也蓋莓有三種藤生緣樹而起者大麥莓乃入藥之覆盆也樹本挺而叢生者木莓一名山莓即普盤也草本委地而生者地莓亦名蛇莓不可食今江南人謂之蛇盤也各作泥臘西洋大紅出阿末里噶彼地有樹樹上有蟲俟蟲自落以布盛於樹下收之成大紅色蟲名各作泥臘考假成式酉陽雜爼有紫􅑭出真臘國呼為勒佉亦出彼國使人云是蟻運土於樹端作窠結成紫􅑭唐本草蘇恭云紫􅑭正如臘蟲研取用之吳録所謂赤膠亦名紫梗色最紅非中國所有也又考元周達觀真臘風土記云紫梗蟲名生於一等樹上其樹長丈餘枝條鬱茂葉似橘經冬而凋上生此蟲正如桑螵蛸之狀葉凋時蟲亦自落國人用以假色亦頗難得又唐人張彥逺名畫記云畫工善其事必利其器研錬重采用南海之蟻􅑭按今西洋之各作泥臘大小正如蟻腹研淘取色有成大紅者亦有成真紫者用之設采鮮艷異於中國之紅紫是即古之紫􅑭無疑而北宋以前畫用大紅色至今猶極鮮潤者實緣此也梌樹楓樹南北不同北方原無楓樹之名自南巡見楓樹方知北方之梌木即是楓樹但南方厥木惟喬所以直生北方厥木惟叢故矮短耳其枝葉則相同也阿濫阿濫之名見唐詩紀事驪山有小禽名阿濫堆禽經作􅀈􅬹鳥善鳴眀皇御玉笛採其聲翻新曲且名焉張祜詩云至今風俗驪山下村笛猶吹阿濫堆通雅云鸄驪山鳥也一名阿濫堆則古名鸄矣爾雅鸄鶶鷵疏云鸄一名鶶鷵亦作鴳濫鴳讀安與阿音近韋昭所謂鴳扈蘇軾詩不見阿濫堆決起隨衝風此鳥有二種一種鳯頭者髙誘吕覽注所謂鴳一名冠雀是也一種無鳯頭者彚雅所謂阿蘭似百舌而無毛角是也江南人呼為鴳􅬹或訛為烏􅬹金光子金光子閩人呼酸棗樹極髙大葉長而尖如橄欖四月開花淺緑色結實如大棗八月始熟色黃故亦名金棗收乾則紫赤色味酸核圓而堅多竅人心之狀圓外竅中故此果專為心家藥閩書云酸棗出福州建寧福寧建寧人以為糕與樝糕相似或云其種自西域佛國來取其核就天然罅孔處雕鏤作羅漢形為念珠按政和本草圖經云酸棗真者最不易得其木髙數丈徑圍一二尺木理極細堅而且重皮亦細紋似蛇鱗其核仁大而色赤如丹今市之貨者皆棘實耳葛仙米葛仙米生湖廣沿溪山穴中石上遇大雨衝開穴口此米隨流而出土人撈取初取時如小鮮木耳紫緑色以醋拌之肥脆可食土人名天仙菜乾則名天仙米亦名葛仙米以水浸之與肉同煮猶作木耳味大約山洞內石髓滴石而成性寒不宜多食聞他府及四川時有之必遇水衝乃得嵗不常遇他如深山背隂處大雨之後石上亦間生然形質甚薄見日則化或乾如紙不可食矣又梧州府志葛仙米出北流縣勾漏洞石上為水所漬而成石耳類也采得暴乾仍漬以水如米狀以酒泛之清爽襲人此原非榖屬而名為米俗云晉葛洪隱此乏糧采以為食故名嶺南雜記云韶州仁化縣丹霞山産仙米遍地所生粒如粟而色緑煮熟大如米其味清腴大抵南方深山中皆有之也倒弔果倒弔果俗名弔搭果形似山梨而小體微長味酢肉多沙長蒂諸果始生時皆向上此果花實皆下垂故名生時堅澀熟乃沙性暖利健脾消食樹枝葉俱如梨為秦中物産今遵化沿邊有之而考之書籍草木諸譜皆不載倒弔之名惟司馬相如上林賦云答遝離支答遝音近打拉張揖注云答遝果名按梅堯臣牡丹詩用打拉二字北人方言以欹垂為打拉是答遝名果或因其下垂也説文海篇俱作榙􅀈果今名弔搭或是答遝音之轉耳林檎李類甚繁林檎其一也樹不甚髙枝葉皆如李花白唐人謂之月臨花實如李而差小有黃紅二種本草所謂金林檎紅林檎是也獨核有仁味甘津亦名來禽亦名蜜果此果味如蜜能來衆禽於林故得林檎來禽蜜果諸稱學圃餘疏謂花紅即古林檎誤矣花紅奈屬也奈有數種其樹皆踈直葉皆大而厚花帶微紅其實之形色各以種分小而赤者曰奈子大而赤者曰檳子白而點紅或純白圓且大者曰蘋婆果半紅白脆有津者曰花紅綿而沙者曰沙果西京雜記所以有素奈青奈丹奈之别也又有海棠果通志謂之海紅而關西有楸子有榅桲滿洲呼山樝曰榅桲與陜西同音查梅堯臣有得沙苑榅桲詩政和本草附載榅桲於奈內是宋時已有此稱其始或從陜西流名關外或從關外通音陜西俱未可定亦皆奈類蓋李之與奈其枝葉花實固區以别而其子核之異尤最易辨堅而獨者李類柔小而四五粒者奈類草木諸書皆以林檎附於奈內其亦未嘗體認物性矣人中人之水溝穴在鼻下口上一名人中脈論竒經諸書謂任督二脈一行於身之前一行於身之後會於素髎水溝斷交三穴三穴為面中三水溝又為三之中故名人中也一説人有九竅自鼻以上皆兩自口以下皆一此居其中故云是但釋中之義耳而王逵蠡海集為之説曰所謂人中者天食人以五氣鼻受之地食人以五味口受之人中蓋居人身天地之中也此又未免穿鑿蓋人受天地純全之氣成形四肢百骸能得其全獸則得其偏如猿猴猩猩之類凡諸寓獸亦似人形而其鼻柱直脣之間總無此水溝一假以此辨人之獨異於獸水溝之所以得人中名也今滿洲呼呢呀爾馬蒙古呼庫門髙麗呼薩拉蜜皆直曰人而已可見義理真確自可通之六合竊疑古人氣穴辨論何以未經道此及閲素問骨空篇注有鼻人二字是古人亦秖呼為人矣蚡鼠俄羅斯近海北地最寒有地獸焉形似鼠而身大如象穴地以行見風日即斃其骨亦類象牙白澤柔滑紋無損裂土人每於河濵土中得之以其骨製碗楪梳箆其肉性甚寒食之可除煩熱俄羅斯名摩門槖窪華名蚡鼠乃知神異經所云北方層氷之下有大鼠肉重千斤食之已熱字書謂蚡鼠别有一種大於水牛穿地而行見日月之光則死皆即此也地震朕臨攬六十年讀書閲事務體驗至理大凡地震皆由積氣所致程子曰凡地動只是氣動蓋積土之氣不能純一閟鬱既久其勢不得不奮老子所謂地無以寧恐將發此地之所以動也隂陽迫而動於下深則震雖微而所及者廣淺則震雖大而所及者近廣者千里而遙近者百十里而止適當其始發處甚至落瓦倒垣裂地敗宇而方幅之內遞以近逺而差其發始於一處旁及四隅凡在東西南北者皆知其所自也至於湧泉溢水此皆地中所有隨此氣而出耳既震之後積氣既發斷無再大震之理而其氣之復歸於脈絡者升降之間猶不能大順必至於安和通適而後反其寧靜之體故大震之後不時有動搖此地氣反元之徴也宋儒謂陽氣鬱而不申逆為往來則地為之震玉厯通政經云隂陽太甚則為地震此皆明於理者西北地方數十年內每有震動而江浙絶無緣大江以南至於荆楚滇黔多大川支水地亦隆窪起伏無數百里平衍者其勢欹側下走氣無停行而西北之地彌廣磅礴其氣厚徑坌涌而又無水澤以舒泄之故易為震也然邉海之地如臺灣月輒數動者又何也海水力厚而勢平又以積隂之氣鎮乎土精之上國語所謂陽伏而不能出隂迫而不能蒸於是有地震此臺灣之所以常動也謝肇浙五雜組云閩廣地常動説者謂濵海水多則地浮夫地豈能浮於海乎此非通論京房言地震云於水則波今泛海者遇地動無風而舟自蕩搖舟中人輒能知也地震之由於積氣其理如此而人鮮有論及者故詳著之聖祖仁皇帝御製文第四集卷三十
