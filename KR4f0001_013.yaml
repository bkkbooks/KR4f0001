body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷四勅諭諭禮部壇廟祭祀國家大典必儀文詳備允符禮制乃可肅將誠敬昭格神明其致祭時辰齋戒處所稽諸徃代各有定制尔部詳察典例酌議妥確具奏特諭康熙十二年八月二十日諭吏部向來定例外官告病不准起用原以防其規避但其中或有才品優長政績素著者廹於一時至情引例告歸終身棄置不錄深為可惜應令地方督撫確行諮訪果有才品堪用者據實保奏以憑擢用其作何舉行尔部詳議具奏特諭康熙十二年九月初五日諭吏部等衙門國家致治首在崇尚寛大愛惜人才俾事例簡明易於遵守處分允當不至煩苛乃符明作惇大之治向來各部衙門俱定有處分條例已經頒行但其中款項太多過於繁宻以致奉行者或以膠執為守法或以苛察為詳明或例所未載援引比附輕重失宜徒據成規罔原情理大小各官稍有過誤動觸文網雖具才能弗獲展布深為可惜著該部各衙門將見行處分條例重加訂正斟酌情法刪繁從簡應去應留逐一分别詳議具奏特諭康熙十二年九月十八日諭刑部自古帝王欽恤民命務期獄無枉縱讞决明允以成刑措之治朕每於秋決重犯特為詳慎惟恐一夫有寃以傷和氣向來朝審之例先期進呈招册然後九卿科道㑹審覆奏完結乃外省秋審奏本内止有節畧觀覽未能明晰又有屢經續到之案為期甚廹以致過期復俟來年殊為不合以後外省秋審應令預期照在京朝審例造册進呈亦著九卿科道㑹同覆核奏請定奪其造進招册及奉㫖結案行咨俱應限定日期尔部一併詳議定例具奏特諭康熙十二年十一月初一日諭戸部自古國家久安長治之謨莫不以足民為首務必使田野開闢蓋藏有餘而又取之不盡其力然後民氣和樂聿成豐亨豫大之休見行墾荒定例俱限六年起科朕思小民拮据開荒物力艱難恐催科期廹反致失業朕心深為軫念以後各省開墾荒地俱著再加寛限通計十年方行起科其該管地方官員原有議叙定例如新任之官自圖紀叙故掩前功紛更擾民者著各該督撫嚴行稽察題㕘處分尔部即遵諭行特諭康熙十二年十一月初五日諭吏兵二部國家用人宜尚恬靜之風人臣服官首重廉耻之節邇來文武官員或因不得陞遷或因不與差遣輙稱寃枉紛紛控告不過圖便已私原非從公起見即使果係應陞應差自行辨白希求榮利廉耻之道已虧豈能修舉職業克副任使理宜嚴加禁止以肅官常尔二部通行申飭遵行特諭康熙十二年十二月初六日諭吏禮二部致治之道首重人才儲養之源由於學校必衡鑒得人釐剔有法乃能革除積弊遴㧞眞材以彰文治之盛近聞直省學差沿襲陋規隳廢職業營私作弊考試不公以致真才淪棄文治不光今應作何整飭差遣何官磨勘考核之法何以盡善務期永革弊端著九卿科道㑹同詳確議奏特諭康熙十二年十二月十八日諭吏兵刑三部吳三桂背恩反叛其原係伊所屬之人見在直𨽻各省文武官員人等恐因三桂反叛心懷疑畏致罹法網有負朕撫育好生之意已有諭㫖槩從寛宥雖有父兄子弟見在雲南者亦不株連其見隨吳應熊在京及職任部院官員亦應寛宥著議政王貝勒大臣㑹同確議具奏康熙十二年十二月二十三日諭兵部近因逆賊吳三桂背恩反叛已遣大兵前徃征剿聞彼處百姓有預先驚避者輕離家室恐致失所朕心深為憫念向來大兵紀律嚴明所過並無騷擾今寧南靖宼大將軍啓行朕復面加戒諭務令秋毫無犯安輯地方逆寇煽亂不過一隅大兵到日立見蕩平該地方軍民人等俱係朕之赤子遣發大兵原以衞民何必妄生驚恐著該地方官廣行宣諭俾其各安生理勿致流離以副朕定亂安民之意尔部即速行湖廣督撫提鎮等官通行曉諭遵行特諭康熙十三年正月十八日諭兵刑二部近因逆犯楊起隆詐稱朱三煽惑愚民潛謀不軌陸續緝獲俱經審明正法其株連者業行省釋除逆首楊起隆張子房金玉環鄭得勝仍嚴緝務獲外其餘黨與一槩從寛免緝以後著改行從善恪遵法紀勿得自干憲典軍民人等俱宜各安生理不得聽信訛言自生疑懼旁人亦不許妄行搜拏首告借端嚇詐擾害善良尔二部即出示通行曉諭特諭康熙十三年正月二十三日諭兵部陜西提督王輔臣久歴戎行勞績素著近舉首反賊吳三桂所送逆劄遣子奏聞堅守臣節益見忠貞朕心深為嘉恱前已有㫖事平之日從優議叙今應即行加恩以彰激勸及其子作何叙用尔部一併速議具奏特諭康熙十三年二月初四日諭吏兵二部陜西邊陲要地西控番回南通巴蜀幅員遼闊素號巖疆茲逆賊吳三桂煽亂滇黔四川從逆秦省地處鄰封恐有奸徒揺惑以致人心不寧雖有督撫提鎮等官各盡乃職但軍務繁重必須專遣大臣假以便宜相機行事方可綏靖中外保固邊疆刑部尚書莫洛前任秦督深得軍民之心諳曉地方情形茲特授為經畧率領滿兵駐劄西安府㑹同將軍總督而行廵撫提鎮以下悉聽節制兵馬糧餉悉聽調發一切應行事宜不從中制文武各官聽便選用吏兵二部不得掣肘隣省用兵當應援者酌量䇿應如有軍機將軍總督領兵而行俟湖廣四川地方底定即命還朝應兼職銜及應給勅印尔二部㑹同速議具奏特諭康熙十三年二月二十七日諭吏部大兵進𠞰逆賊指日蕩平地方恢復之後即應設官撫綏民生料理事務頃以需人甚急已將漢軍堪用人員照該督撫所請發徃軍前候用其漢人中素有清操及才能堪任煩劇者不拘資格著漢官大學士以下三品堂官以上據實保舉發徃軍前與漢軍官員一體並用務期虚公舉薦有裨地方以副朕廣攬人才之意尔部即遵諭行特諭康熙十三年三月二十日諭兵刑二部逆賊吳三桂値明季闖賊之變委身從賊尋以父死賊手窮竄來歸世祖章皇帝念其投誠優封王爵授之軍旅委以事權異數殊恩振古未有爰及朕躬特進親王倚任等於腹心恩禮加於勲舊方期其感恩圖報殫竭忠忱詎意三桂以梟獍之資懷狙詐之計隂圖不軌自啓釁端藉請搬移輙行叛逆煽惑奸宄荼毒生靈極惡窮兇神人共憤已經遣發大兵進𠞰剋期蕩平諸王大臣㑹議反逆子孫理應誅戮以彰國法再三奏請朕尚冀其悔禍自新束身待罪未忍即行加誅近覽三桂奏章詞語乖戾妄行乞請諸王大臣咸以三桂怙惡不悛其子孫即宜棄市再難寛緩朕思亂臣賊子孽由自作刑章具在衆論僉同朕亦不得而曲貸之也本當照廷議將吳應熊吳世霖并其餘子俱行凌遲處死但以應熊久在近侍朕心不忍故將應熊及子世霖處絞其餘幼子俱免死入官應坐人犯分别正法所有干連人等情罪稍可矜原者勅所司槩行省釋以昭法外之仁尔二部即通行曉諭内外軍民人等俾咸悉朕意特諭康熙十三年四月十三日諭兵部逆賊耿精忠庸懦無能癡愚寡識祗緣伊祖耿仲明航海來歸太宗文皇帝念其投誠之功特封王爵寵眷優隆世祖章皇帝定鼎燕京復加委任令其統兵鎮粤中道殞身其子耿繼茂叨恩承襲兩鎮巖疆恪共職守朕惓懷勲裔恩禮有加及其病亡尤深軫䘏特遣部臣頒賜勅諭俾耿精忠襲封王爵自伊祖以及伊身受恩三世四十餘年在精忠賴祖父之餘勲冒朝廷之崇秩自宜感恩圖報殫竭忠忱不意其包藏禍心潛謀不軌乗吳逆之變輙行反叛煽亂地方罪惡昭彰國法難宥今削其王爵遣發大兵進𠞰指日蕩平但念其所屬官兵及地方官員軍民人等或被逆賊廹脅雖懷忠義莫能自明恐大兵一到玉石難分有能擒斬耿精忠投獻軍前者優加爵賞或以兵馬城池納款者論功叙錄或力有不逮能自拔來歸者亦免罪收用其原係所屬之人直隷各省文武官員人等槩從寛宥雖有父子兄弟見在福建者亦不株連勿得心懷疑畏自罹法網負朕好生之意尔部即作速通行曉諭遵行特諭康熙十三年四月二十七日諭禮部皇后黒舎里氏作配朕躬已經十載上事太皇太后皇太后克盡誠孝佐朕内治尤極敬勤節儉居身寛仁逮下宮闈式化淑德彰聞茲於康熙十三年五月初三日崩逝惓懷懿範痛悼彌深宜有稱諡以垂永久著内閣翰林院㑹同擬奏其應行典禮尔部詳察速議具奏特諭康煕十三年五月初八日諭兵刑二部蔡禄係福建投誠之人念其來歸加以宫銜給之世職復從優擢用補授河南河北總兵官理應殫竭忠忱力圖報効不意其潛蓄逆謀欲應吳逆披甲練兵約期煽亂經驛遞所設筆帖式密行報部奏聞差内大臣阿宻達前徃察訊已近懷慶令人喚彼乃并不出城迎接及入城徃伊衙門輙敢放砲射箭拒敵因其叛形顯著俱行擒拏奏請正法朕以人命關係重大恐有寃枉復令詳加究審據其兵丁家人口供稱蔡禄製造鳥鎗買騾馬與楊來嘉差人徃來同謀要迎吳逆謀反情眞即將蔡祿父子併伊姪蔡鼎席及同謀罪犯人等俱行正法其餘投誠墾荒弁兵事無干涉者槩不株連叛逆法所必誅良善務加綏輯國有成憲軍民無得驚疑尔二部即通行曉諭俾咸悉朕意特諭康熙十三年五月十一日諭兵部平南王尚可喜累朝勲舊久鎮巖疆勞績懋著近吳三桂等叛逆以來復能篤守忠貞殫心籌畫屢抒謀略保固地方事平之日從優議叙已經有㫖其藩下官兵及該省文武官員兵丁俱能協力同心克効忠順防禦逆賊勞瘁行間朕心時切軫念事平之日俱著一併從優叙賚尔部即速行傳諭俾咸悉朕意特諭康熙十三年五月二十六日諭兵部曩者耿精忠之祖耿仲明於太宗文皇帝時航海歸誠優錫王爵効力行間勞績茂著及其身故墨勒根王不令承襲世祖章皇帝追念舊勲特准其子耿繼茂仍襲王封令其兩鎮巖疆為國藩屏爰及朕躬惓懷勲裔恩寵有加後覽其病終遺疏有地方兵民凋敝賊宼未滅死不瞑目等語忠義肫篤深切軫念且因繼茂之子精忠自幼曾為近侍准襲王爵仍鎮閩省朕以精忠必能紹伊祖父遺訓殫竭忠猷無沗先烈乃不意近為逆賊吳三桂誘惑煽亂地方棄累世之忠貞搆一旦之狂舉既干國法復墜家聲朕猶念其祖父前功諒精忠必係一時無知墮人狡計與吳三桂不同故將三桂子孫正法精忠在京諸弟照舊寛容所屬官兵並未加罪今湖廣遣寧南靖宼大將軍順承王統領大兵由湖南進勦雲貴吳逆指日授首鎮南將軍尼雅漢統領大兵由廣西進勦雲貴四川遣安西將軍赫業及西安將軍民尔喀等統領大兵已攻克七盤朝天等闗直抵保寧刻期底定全川並勦雲貴安南將軍希尔根統領大兵由江西進𠞰福建平寇將軍耿特巴魯統領大兵由廣東進𠞰福建又遣揚威將軍阿密達鎮西將軍席普臣安南將軍華善鎮東將軍喇哈達等各統領大兵駐劄江南京口等處調度征𠞰精忠殲滅在於旦夕但念其祖父宣力累朝洎精忠之身遽至覆亡宗祀斬絶朕心深為不忍且吳三桂乃本身投誠之人背恩反叛自取誅戮精忠祖父以來受恩三世四十餘年非素蓄逆謀首倡叛亂者比尔部即傳諭精忠果能追念累朝恩德及伊父忠藎遺言革心悔禍投誠自首將侵犯内地海賊速勦圖功即行赦免前罪視之如初朕以至誠待天下必不食言俾其善自審度勿負朕保全勲舊之意尔部即遵諭速行傳知特諭康熙十三年六月初一日聖祖仁皇帝御製文集卷四
