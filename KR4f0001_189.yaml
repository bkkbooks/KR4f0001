body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十九古今體詩四十一首興京靄靄興王地風雲莫可攀瀠洄千曲水盤疊百重山瞻拜陵園肅凝思大業艱蘢蔥松柏茂瑞鳥滿林間駐蹕奉天府四海為家日鳴鑾過舊京新豐安可並若水事堪并城市風猶古絃歌化漸行巍峨城闕在往歲幾經營渡遼河雪霽寒流已合冰雁行飛處曉天澄初冬欲盡歸程疾回首煙光望二陵所過松山杏山大凌河皆聖祖用武之地有述松杏山頭野草黃朔風凄緊下前岡雲屯虎旅新行在地著龍興舊戰場壁壘尋來餘氣色田疇耕處拾刀鎗恢𢎞聖緒存遺跡東海洋洋祖德長入山海關長城盡處海山竒守險無勞百萬師寰宇蒼生歸厯數當年指顧定鴻基廣寧道中漠漠寒雲色戌樓終日閒饑烏號曉月路出十三山永平駐蹕颯颯風聲響畫旗灤河東岸獵歸時廟堂幾務親裁决非是行帷寐獨遲豐潤即事去日披金露歸時動朔吹農家收穫罷就暖向朝曦望海天際無涯萬里餘風潮雲島接宸輿朝宗不棄能容物惟有虛心對洛書歊蒸暑氣賦得漠漠水田飛白鷺日射湖光㶑灩餘三庚修景未應除盈田粳稻將成實滿隴禾苖更自如靜裏歊蒸不著意心中無事樂於書黃鸝白鷺由他去恐誤分陰漸漸踈賜髙士竒草年載筆近螭頭心慕江湖難再留忽憶當時論左國依稀又是十三秋示諸皇子勤儉守家法為仁勉四針讀書須立體學問更從心佻達愆非淺浮華罪漸深人皆知此道何必論古今賦得雨去花光濕風歸葉影踈晚蟬聲漸急白雁暫髙飛月照湖光轉波連山色微荷疏知氣肅花老覺時非不必愁秋冷宮人自有衣出畿東觀秋成隂霖連六月宵旰念民生微風收潦水過雨見秋成古北龍旗近漁陽鳳輦行戍樓烽火息險豈藉長城萬樹叢中月一輪殘暑新開雨後時層巒密樹萬年枝扁舟歸去思還轉小艇回波意欲遲泛泛月明懸玉鏡輕輕浪影動玻瓈冰盤酒宴同金谷簫鼓龍吟太液池詠林檎野果初來上苑東紫紅鮮品進離宮雖然不及羣珍味也有微誠在此中用皇三子秋日郊行應制詩韻風髙鳳閣秋萬物變清幽露冷凝仙掌雲寒聚嶺頭荷疏起一雁蒲盡現羣鷗郊外西成好應知禾黍收八哥兒衆喜能言强欲言或籠或架繫髙軒縱然欲憶林間樂誰肯從容解覆盆潞河發舟青翰舟迎旭日升官河放溜始開冰巡行每為求民瘼寧避春寒曉霧凝天津河栁絲絲變嫩黃海門遙望色微茫賈航商舶連檣至貢賮時看集萬方德州長河絶流澌曉坐寒仍肅若使居深宮安知有冷燠東昌道中陌草稀疏緑未回水村近午暖微催萬人爭向船頭望多是喁喁待澤來舟過濟寧濟水平分南北流山桃花綻古墟頭粼粼碧浪層層樹便覺春風起櫂謳入江南境行盡兖東程乍入江南路水潦切痌瘝深心察其故經邳徐界上泗水通淮澤坡陀認馬陵經過懷十載戶口幾新增雨雲氣未肯開綿密清明雨繫纜古河湄為念夫徒苦閲河淮黃疏濬費經營跋涉三來不憚行幾處隄防親指畫佇期耕稼樂功成渡揚子江曉霧風初豁揚帆縱綵舟危峰真屹立漩水急洄流碧轉沿江柳沙平遠嶼洲十年巡再至騁目睇神丘金山寺月夜江山春物已雍和萬里晴光月倍多重倚髙樓觀海闊浩然心境更如何巡厯江南示意財賦稱兹地時巡復此經春膏宜豆麥煙景遍林亭靡麗風應換敦龎訓屢形施恩頻已責聊爾翠華停虎丘隨風畫楫到山塘水市陰籠草木香石不點頭誰說法惟存澗響雜笙簧閲河之便奉皇太后臨幸武林是日喜晴雄城千雉帶江湖羽衛重臨氣象殊九有承歡逢勝日萬民擁戴滿亨衢時當豐嵗人咸樂海不揚波澤遠濡况是春陽布暄暖無邊韶景溢輿區雲栖寺江路轉隈隩山行愜心賞古樹與茂竹翳蔽極深廣潺潺細泉流萋萋芳草長其際春之暮天氣堪俯仰鳥性鳴晴曦蜂蝶爭下上巡省歷窮谷所至察萬象小憩澗壑幽澤貴被草莽西湖湖光開瀲灩臨幸及芳時淺翠堆山色輕香拂水湄彩斿看自動畫鷁覺平移靜坐觀羣類資生得所宜湖心亭閒覽虛牖層闌挹翠微春容淡沱送晴暉澄波如鏡涵天影魚鳥欣欣自息機宋臣蘇軾開湖溉田築隄瀦水杭民利之為政者不當如是乎長隄十里跨湖波官栁青青覆軟莎漫道只為逰賞地懸知布政在民和鷲峰何處飛來一塊石嵌空巖竇作玲瓏下臨巨澗淙淙冷上蔭長松謖謖風雲林寺無為幾事少問俗駐林丘衛騎森嚴減爐煙靉靆浮鳥啼香界古花綴梵筵幽野徑春風引輕鋪細草柔菜畦東南農事已春深菜隴花開滿地金獨愛小民勤力作馬頭堪慰省方心行宮雨中望吳山檻外青山縱目收繁花初落葉新稠更教㸃染煙雲色添得窗前翠欲流閲浙江駐防將士射羽林舊將分防重吳越名區古要疆講武正宜清晏日人人自擅技穿楊聖祖仁皇帝御製文第二集卷四十九
