body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集總目四卷二十九表恭上太皇太后萬夀表奏書奏皇太后書奏皇太后書奏皇太后書奏皇太后書奏皇太后書奏皇太后書奏皇太后書奏皇太后書卷三十論博約一貫論王道近民論業廣惟勤論廉靜論論兵論息兵安民説太極圗説小學課士説樂府説捕蝗説製硯説解四維解卷三十一序日講詩經解義序日講春秋解義序日講禮記解義序孝經衍義序經筵講章序日講通鑑解義序卷三十二序通鑑綱目序幸魯盛典序南巡詩序南巡詩序皇輿考序懋勤殿法帖序耕織圗序卷三十三記恭侍皇太后駕臨金山記創興盛京海運記海運賑濟朝鮮記暢春園記蕚輝園記卷三十四碑文重修闕里孔子廟碑平定朔漠告成太學碑開國佐運勳臣武勳王揚古里直義公蜚英東𢎞毅公額宜都碑賜一等公內大臣都統國舅諡忠勇佟國綱碑文賜江南江西總督傅臘塔碑文天津海神廟碑金山江天寺碑射虎川臺麓寺碑菩薩頂大文殊院碑萬夀寺戒壇碑𢎞慈廣濟寺碑五臺殊像寺碑五臺碧山寺碑卷三十五頌祈榖壇頌并序二典頌有序禹陵頌并序贊王右軍洗硯池贊并序石鼓贊并序針河臣針漕臣針臺省針太常針提鎮針銘淵鑑齋銘佩文齋銘知稼軒銘察罕七羅勒石銘拖諾山勒石銘昭木多勒石銘狼居胥山勒石銘卷三十六雜著親征漠北紀略上卷三十七雜著親征漠北紀略下卷三十八雜著閲史緒論四十一條卷三十九雜著閲史緒論六十六條卷四十雜著庭訓讀周禮書後書戰國䇿後書性理奧後跋虞世南墨迹後跋顔真卿墨迹後跋蘇軾墨迹後跋黃庭堅墨迹後跋米芾墨迹後跋朱子墨迹後跋趙孟俯墨迹後跋董其昌墨迹後連珠卷四十一祭文躬詣天壇祈雨祭文天壇謝雨祭文躬禱天壇文天壇祈雨祭文祈穀壇祭文親征噶爾丹告祭天壇文剿滅噶爾丹告祭天壇文剿滅噶爾丹告祭歷代帝王陵寢文剿滅噶爾丹告祭先師孔子文祭禹陵文祭明太祖文祭西嶽華山文重修闕里聖廟告成遣皇子告祭文卷四十二賦恭祝皇太后萬夀無疆賦汗血馬賦木棉賦金蓮花賦菊賦
