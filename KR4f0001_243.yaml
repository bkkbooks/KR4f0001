body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷二十三碑記普濟堂碑記京師廣寧門外有普濟堂焉門臨孔道地接神區萃萬國之梯航普兆民之樂利熙来攘徃之衆胥慶春臺肩摩轂擊之倫咸登壽域然而川塗跋涉易興趼足之嗟風雨晦明難遂棲身之願或徘徊岐路最急貲糧或偃蹇孱軀尤需醫藥於是都人尚義上户輸金託此三乗之津梁用濟四生之疾苦慈雲法雨資佛力以醒羣迷夕唄晨鐘贊王化以𢎞大澤寒得衣而饑得食羈旅如歸病有託而療有方疲癃立起既安全之甚衆且存歿之皆寧有司以聞深為嘉悦夫好義輕施乃良民之美行恤灾拯患寔盛世之休風喜見我民還敦古道咸能體朕憂民之念推朕救民之心創建雖肇乎都城效法期及乎寰宇成比户可封之俗慰一夫不獲之懐書傳從欲於四方詩詠徧徳於百姓此則朕之志也爰賜之額曰膏澤回春而為之記康熙四十四年五月髙旻寺碑記茱茰灣者乃維揚俗稱寶塔灣也居三岔河之中南眺金焦諸峰北枕蜀岡之麓足為淮南勝地凡上江由儀真下江由𤓰步至此皆㑹歸運河而北上也朕比歲以来躬臨河干諮詢經畫者屢矣每抵一處未嘗不懐保編氓施恵工商故兩淮鹽課永減額徴停輸贏羡又聞往来迎送費用私派者甚鉅特頒嚴㫖盡為禁止從此商民得以安席漸皆獲所則朕之巡幸者少有益乎朕三十八年奉皇太后鑾輿偕行晨昏侍養視河既畢勉從輿請濟江而南周覽呉㑹民生風俗見茱茰灣歲久寢圮朕欲頒内帑略為修葺為皇太后祝釐而衆商以被澤優渥不待期㑹踴躍赴功庀材協力惟恐或後不日告竣舊刹式廓鼎新荘嚴𢎞敞兼以翬飛傑閣憑髙四眺臨大江通南北因書額賜之曰髙旻寺勒文於石永垂久逺惟是雨暘應時河海清晏舉一世共臻於仁壽之域斯四十餘年宵旰勤民之念所厚期也即此塔工蕆事具見羣情愛戴之誼出於至誠是亦有不可冺者爰為書之以志始末云補陀羅迦山普濟寺碑記稽考梵書補陀羅迦山有三一居厄納忒黑一居忒白忒一居南海即是山也本山誌書未得其詳當年海宼猖狂凡禁海之外寺宇梵刹皆為灰燼自康熙二十二年蕩平臺灣海波永息故遊方衲子因舊基址斬蓬蒿刈藜藿而更新焉朕時廵浙西特遣專官䖍修淨供敬書題額永鎮山門復發帑金重修寺宇務俾殿堂廡牖丹碧華厯棼橑煥美而一木一石悉出公家一夫一役不煩民力上為慈闈延禧下為蒼生錫祉也朕自弱齡誦讀經史以修齊治平為本未暇覽金經貝葉空寂泡影之文所以不能窺其堂奥槩而言之元者善之長也佛者以善為本推而擴之大約無二上天好生化育萬彚大士慈悲度盡衆生亦無二也朕求治勤民四十餘載矣今者兵革已銷而民生未臻康阜梗頑雖化而民情未盡淳良皆因水旱靡常豐歉各異此朕寤寐孳孳不能釋也以大士之力庻幾慈雲法雨甘露祥風使歲稔人安萬姓仁壽則普濟之𢎞功即時雍之上理是朕之心也夫爰書翰簡勒諸穹碑垂示無盡云康熙四十五年歲次甲申嘉平月上旬書重修清凉山羅睺寺碑記朕省方觀民所過名山大川壯觀勝蹟與夫往聖先賢講學明道之地心切向徃多所表章而釋氏之宫標靈顯異所在多有亦間留題以寄遐懐嘗一再至五臺山慨然於清凉真境如游崆峒汾水之間登眺五峰俱賜扁額維兹羅睺寺其地近文殊現相處其取義似皈依西方十六祖創建自唐顯迹於宋續修於勝國賢藩迨我先朝曽闢院以供十方暨朕躬亦嘗寵以翰墨而日月既久榱題傾圮赤白漫漶今住持僧元旦復規而新之加麗焉夫浮屠義不三宿則無地非桑下也以無所住為常住亦何處不清凉也然其過化之所徃徃留精舎焉亦弟子職也徃聞羅睺擊鐘集大衆以别聲聞而宋丞相張商英嘗見神燈兹寺中則今元旦之舉於將廢也鐘聲燈影或者復聞聞而見見乎因援筆而賜之記康熙四十五年二月碑文重修天竺寺碑文朕御厯凝庥心周區域省方設教蹕駐湖山眷兹民力於東南詎止皇輿之名勝若迺因其舊蹟無侈前觀則天竺寺之所由以重修也粤惟鷲嶺著於西方法輪則一竺峰麗於南國名刹維三固緇梵所薰修亦僊靈之窟宅潮音送響遥接普陀塔影横空長留舎利瑞光發於澗上奇木像大士之容白衣感夫夢中淨域建看經之院或旱乾間作禾麥告枯而幡蓋来迎霔雨濡足有禱輒應無福不臻斯固歷晉宋以迄今寔亦載簡編而可信意者能仁之量等於好生佛道之成闗乎民隱推斯指也不其偉與將使般若之門隨方而啓仁壽之域舉世咸登有其興矣曷可廢哉朕曩者親奉慈闈式臨兹宇自芳湖而西顧望初地以南循輦過花迎旌迴雲捲巖深乳竇含真珠之寶光峰轉飛来帶琉璃之紺色百靈斯護七聖不迷既祝我皇太后壽履康寧復冀凡兹庶民室家盈慶然則迦釋之𢎞慈與國家之布徳豈有殊也顧念山靈如昔寺貌未新我皇太后為國發心為民祈福時申慈命重葺香林兹役之興不妨民事凌雲再煥將無乾竺之靈匪日成功實篤坤元之慶恒沙國土偕常樂以同升億萬蒼生享太平而無極是則我皇太后之聖心依然迦釋之心而於朕經營天下利濟生民之心亦適有愜也夫南海補陀法雨寺碑文盖聞圓通妙象般若真源開覺路於金繩大地證菩提之慧聞潮音於碧海恒沙誦普度之聲紺殿維新滄波永靜惟兹法雨寺者南海補陀山大士之别院也名山佛國大海慈航青嶂干霄髙逼梵天之上洪濤浴日祥開淨土之塲一柱如擎震旦指為名勝三山可接方輿記其神奇值氛祲之震驚致山川之闃寂僧徒雲散佛宇灰飛比者運值清寧慶海波之不作地連溟渤望法界而知歸特頒内府之金重建空王之宅鳩工揆日蔀屋不勞庀材築基鼛鼓弗作珠宫貝闕涵聖水以無邊鼇柱鼉梁覺迷津之可渡坐青蓮之寶像圓滿輪輝藝紫竹於祇林荘嚴毫相瞻慈雲之普照鍚法雨之嘉名海若效靈天呉護法標霞髙建来萬國之梯航彼岸可登作十方之津筏藉其廣大上以祝聖母之遐齡假此慈悲下以鍚羣黎之多福則㫋檀香外盡成仁壽之區水月光中悉是涵濡之澤勒諸琬琰昭示来兹康熙四十三年十一月廣仁寺碑文朕存心天下睠顧西陲惟兹闗隴之區實切封疆之重歲當癸未特舉時廵省方設教訓吏寧人已責除租行慶布徳引年賜帛奬學興賢所過山川聖哲祠域遣修祀事用殫精禋凡所以禆邦政厚民生者靡弗致其勤焉又以運際承平無忘武備簡稽將士整飭戎行發内帑之金錢普軍中之頒給爰於演武之塲躬親校射之典以建威銷萌之義有觀徳習禮之風顧念久安長治務在因俗宜民若乾竺之傳言雖殊尚而利濟之道指有同歸閲武之頃周覽地形相其爽塏命創招提即大賚之餘貲為雙林之小築厥工匪侈逾載告竣斯役也經營適協乎輿情銖黍不煩夫民力將使黄山巖岫秀比靈山渭水波濤凝如定水洪河浪息渡法海之津梁華嶽雲開通耆闍之轍迹五陵六郡之衆迴向香城外蕃屬國而遥羣遊淨土賁神光之常護上以祝慈壽於無涯助王化之遐宣下以鍚民庥於有永其亦朕綏懐寰宇順導烝黎之至意也歟於是題廣仁之額標括三乗書多寶之碑昭垂奕葉云爾康熙四十四年十一月初一日重修南嶽廟碑文衡嶽為天南巨鎮上應北斗玉衡亦名壽嶽主靈長於禄位緜福祚於子孫載在星經由来尚已往歲專官致祭肅薦馨香復以廟貌傾頹勅命修葺蠲吉蕆事鳩工庀材不斂閭左之錢不費公旬之役羣臣歡忭庻民子来經始於四十四年七月訖工於四十六年九月不三歲而落成榱桷一新丹碧重煥於時億萬臣民以兹嶽為主壽之山咸欲伸其愛戴之悃為朕祝釐而督撫諸臣亦合詞籲請謂宜親頒文翰宣導輿情朕以萬邦為懐踐祚以来殫思治理區畫周詳敬天勤民不遑暇逸而於嶽瀆諸祀典禮必䖍凡以洽神人和上下也維兹南嶽靈爽斯憑亦期與吾民共樂雍熙同登仁壽大四海從風之治固萬年有道之基是則朕斂時鍚福之至願云爾爰書重修歲月以示崇徳報功之意俾勒之貞珉昭諸億禩焉重修西嶽廟碑文天地定位山嶽效靈體發育之能贊生成之徳尊踰四瀆秩視三公祀典之於五嶽禮綦重矣矧華山峻峙雍州雄踞西土辨方維酉兆歲事於有秋盛徳在金助氣機之始肅興雨則膏流河渭出雲而氣接恒嵩尤宇宙之奥區神祗之靈府也嶽廟當華隂衢道基址崇宏棟梁巍煥明禋肹蠁降格居歆國家之邀福迓禧以大庇我陜東西數千里之蒼黔者於是乎在而年歲浸久則傾圮漫漶不能無虞朕於癸未冬省方西廵蒞止少華之麓矚雲臺望仙掌靈蹤勝蹟髣髴於煙嵐翠靄間而西連隴坂東接函闗土俗民風停車坐悉秋露凝而勤收穫商飇起而謹蓋藏年穀屢豐閭閻日阜自非神庥曷克臻此於是入祠展謁遣祭致䖍特命所司鳩工載葺不興一役輪奐丕新蓐收之别館増輝少昊之下都彌絢自今以始達精忱於玉帛陳黍稷之馨香黙佑潛孚嘉祥翕集佐坤靈以作成萬物宏兌澤而利濟羣方豈有量哉爰勒豐碑用垂奕禩康熙四十四年十月初一日聖祖仁皇帝御製文第三集卷二十三
