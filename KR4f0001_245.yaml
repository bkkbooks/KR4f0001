body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷二十四碑文五臺山棲賢寺碑文蓋惟鷲嶺西來西土旋移樂土鳳林東望東臺即是春臺漸近神京雲湧一峰獨秀回翔震旦蓮開五朵齊明谷鋪錦繡之花輝連忍草溝注清涼之水法具慈航名髙選佛之場眺瀛洲而若鏡迹表棲賢之社探石洞以如霞儼然證道之區允矣降真之所昔者大士於此現身早證圓通闡從聞思修之教顯標真實偕隨聲應感之緣曽為七佛之師化宣纍劫今作十方之主澤普羣生幸兹常喜之國都瞻禮妙德之相好出緡錢於內帑香火頻仍啓傑構於靈山莊嚴斯在祗園遐敞地分五百坤輿寶座一乘光遍三千世界禪枝影靜願風雨之調均覺海波澄信金湯之擁護祝慈有慶九天之壽域長新綿祚無疆兆姓之福田永賴礱鐫貞石託記載於斯文抒寫至懷俾昭垂於來許五臺山顯通寺碑文山分五頂亘右輔之雄區地接三霄顯西方之化域惟大士棲真之所髙揭獅床為竺蘭演教之場羣標鴈舍靡不矗瓊梯於碧漢耀琳宇於丹巖兹顯通寺者創自永平闢大孚之靈迹拓於元魏增善住之崇基唐宗始易前稱勝代再頒嘉號玉花園畔紺雨繽紛甘露津邊璇源滴瀝神燈煥彩散列巘以千星飛閣翔空絢明霞於萬疊洵臺懷之上剎恆朔之名藍也朕駕鑾輅以時巡望鷲峰而企嚮身雲忽湧陟初地之清涼心月常圓燭慧光之鴻朗特捐淨施香界重開聿改舊觀熏修倍肅石上辟支現影顯示吉祥函中舍利升輝盡生歡喜葳蕤紫菌宛同四照交枝曲折紅泉即是八功衍派上以綿慈闈之景算壽嶽彌崇下以鍚兆姓之繁禧祥河普潤爰鐫片碣用詔來兹五臺山湧泉寺碑文地湧璇源山驛著醒心之號天開金界禪宫標盥掌之名故鍊性髙僧每棲真於碧澗而薰修淨侣多遁迹於丹泉用浣滌乎塵氛乃流傳夫靈迹五臺山湧泉寺者祗陀化域震旦清都宿歷井參聳蓮花之五萼山連恆代環柏谷以千盤師利垂光神燈燭夜摩騰演教仙梵飄空陟中頂之岧嶤指北巖而迤邐路入清涼之谷萬派跳珠俗稱澡浴之池一泓噀玉神膏滭沸金猊駐影而徘徊細縠奫淪香象凌波而蹴踏諸天撝護四衆皈依既撥蘚以披榛遂結亭而甃石雪竇寫空明之色月林生定慧之香朕以西巡駕臨初地喜清瀾之不竭念聖境之未湮爰發帑金式扶象教揭獅堂以纓壑紺碧重新翼鴈舍以連霄煙嵐增煥雖慈恩廣大千江共印圓暉而誠愫感通一勺亦沾法乳珠幡寶網無雲不現吉祥粥鼓齋鐘是水皆分功德綿靈長於億載甘露恆滋普福利於羣生祥河永濟泐諸貞石昭示來兹五臺山廣宗寺碑文蓋聞教闡浮提資神功於廣運理融淨域表大義於正宗山號清涼藏名歡喜覽勝則鴈門紫塞標竒則鹿苑珠林式承由舊之規宜示維新之象廣宗寺者幽棲妙境禪悅精藍泉飛猊座之旁塔湧鷲峰之半當其開基曩代鑿石成龕架宇虛巖範銅為瓦大孚金像儼然分照十方小朵天城久矣齊稱五佛屬星霜之流易致風雨之漂搖朕法駕時巡祗園蒞止特頒金帑再飾寶坊畫棟於以重輝雲􅎝因兹永煥風幡髙卓偕鐵鳳以翺翔月鏡長圓並金羊而焜耀種福田於福地事重祝釐宣梵唄於梵天意兼勸俗庶幾宏敷廣席徹權實之指歸丕振宗傳識源流之派别云爾五臺山白雲寺碑文三明闡教𢎞塵海之津梁八正開宗示靈山之門閾白雲寺者五臺之接待院也面臨逵道已饒林麓之觀後枕巖椒即是煙霞之宅乍棼絲而出岫紺馬羣翔俄散綺以盈川玉毫同色縈青繚白朝暮皆宜罨翠浮嵐隂晴互換松寮爽塏霏香靄於諸天蓮社蕭間隔氛埃於下界聖真兹焉顯化開士託以潛棲溯厥由來亦云舊矣然而法輪未建祕境猶湮階繡苔錢難覓雀離之舍壁留蝸篆莫瞻螺髻之容惟洪構之有期信勝因之不昧朕旁搜竺典結念名區特頒內府之金鏐用飾上方之象設天龍八部齊拱齋筵鍾板六時共修禪誦剎竿髙峙風琴動而月鏡升梵宇長新意蕊飛而心燈炳冀願船之普濟道在𢎞慈庶覺路之咸登義存廣善云爾東嶽廟碑文京師朝陽門外向有東嶽廟自元明迄今歷有年所康熙三十七年居民不戒而燬於火其明年朕發廣善庫金鳩工庀材命和碩裕親王董其事不勞一民不興一役經始於三十九年三月訖工於四十一年六月不三歲而落成殿閣廊廡視舊加飭焉夫五嶽為名山之長而泰山尤羣嶽之宗於時為春於德為仁而其神之靈又能膚寸成雲霖雨天下故諸嶽止祀於其方而泰山之祠遍宇內崇德報功所從來久矣朕即位以來殫心治理訪求民隱閲視河工屢經魯地皆命專官致祭凡以為蒼生祈福祉也兹朝陽既都城之巽位而東嶽廟又適在其地則因其方位之宜以隆望秩之典亦禮之可以義起者然則斯廟之成也神既得所憑依而民亦遂其瞻仰自兹以往風雨以節寒暑以時俾海宇得休養生息以共樂於豐穰之世庶於朕四十餘年惠愛黎元之意其稍有慰乎爰書重建之歲月以昭示來兹云爾康熙歲次甲申冬十一月上旬書穹覽寺碑文哈喇和屯者蒙古名色釋之即烏城也乃古興州之所轄因世久事殊前朝未及設官分職皇輿等書編察難考朕避暑出塞因土肥水甘泉清峰秀故駐蹕於此未嘗不飲食倍加精神爽健所以鳩工此地建離宫數十間茅茨土階不彩不畫但取其容坐避暑之計也日理萬幾未嘗少輟與宫中無異萬幾偶暇即窮經史性理諸書臨池揮翰膳後即較射觀德以安不忘危之念此其大略也因有離宫隨侍人員共祝萬壽而建寺不日即成又求扁額以垂永久朕賜書云穹覽取沈約驤首覽層穹之意在行宫之巽位寺勢雖微蓮社梵音鈴鐸經聲巨細皆備內有三大士相仙衣飄揚瑞園涵影以空寂為本慈悲為教汲引四生津梁三界清鐘夜聞逺近罔弗皈依月殿朗輝中外靡不瞻仰况右倚層巖左帶大河口外諸藩來往進貢皆由經過三庚無暑六月生風地脈宜穀氣清少病誠為佳景前朝以戍邊不暇何得駐蹕今四海為一八表同風自京北至萬里如同家人父子豈有他術哉以誠而已今臣下歸福於朕朕曰天下皆福朕之福也先憂後樂朕之職也所願者年豐歲稔煙塵永息余之念兹在兹之意足矣無以妄求佛有所知自有保護康熙四十三年歲次甲申秋八月中秋日北鎮廟碑文醫巫閭屹峙東北為幽州巨鎮昔虞帝封十有二山此其一也穹崇磅礴靈瑞所鍾實護王氣以壯鴻圖與嶽瀆諸神並垂祀典朕省方問俗嘗過其境望其佳氣鬱鬱蔥蔥上插霄漢下瞰蓬瀛懸瀑飛流喬松盤蔚知其所以保障而迎休者蓋有素矣向鍚扁額式展褒崇而廟貌未隆無以昭顯特敕修造遣專官以恪乃事凡所需給皆頒自內府始於康熙四十五年七月訖於本年十一月不四月而告厥成功焉規制宏備輪奐維新紺宇琳宫照耀山谷於時臣民瞻仰罔不欣悅而府尹臣奏請謂宜光文翰勒諸貞珉朕御極以來勤恤民隱祗奉天庥敬共神明罔敢稍斁維北鎮之奕奕為神京之翊輔嘉符凝集靈爽式憑神其永贊雍熙益𢎞福祜鍚蕃昌於庶類固丕祚於萬年用慰朕精虔之至意爰樹穹碑書重修歲月以示來兹康熙四十七年閏三月隆興寺碑文真定府城隆興寺者前臨滹水後睇恆山城郭逶迤林木縈帶敞髙明之淨域標爽塏之琳宫考厥始基肇自隋代宋開寶時重加創造神光夜燭首出赤山之銅法雨晨流復下頰龍之木靈異既啓崇宇斯興遂洗香埿仍裝寶像稽諸紀載良有明徴自是以來七百餘載風雨摧剝日就傾圮朕曩從巡省所過爰命鳩工役不煩民資出內府復以專官董領其事經始康熙四十二年之夏落成四十八年之冬復殿重樓雲日輝映層欒列棟金碧參差開銑鋈之真容具莊嚴之實相七十三尺復還舊觀千萬億身長留勝迹洵十方所瞻仰為萬品所皈依兹寺也密邇神京接連畿輔地當都會時際豐穰煙火於焉殷繁輪蹄之所輻湊莫不齋心肅慮致禮加虔斯亦慈氏之宏規而法門之傑構矣夫旨窮六度首以仁義為宗諦演三乘多證善惡之果宣昭覺路導引迷津亦有禆於人心不無關於世教今兹重新梵宇更續禪燈上為慈闈祝釐下為兆民祈福營建之意實在於斯寺中榜額凡十有九皆朕親書復製碑文勒諸貞石俾垂無窮焉重修西頂廣仁宫碑文天地之大德曰生在四時為春在四德為仁易文言曰元者善之長也君子體仁足以長人自古帝王茂對育物四海之大萬民之衆以及昆蟲草木之微各遂其生者無非體天地好生之德以流澤於無窮也易繫辭又言乾大生坤廣生則是生物之功天始之而地更廣之蓋坤者母道也母道主慈其於生物為尢近焉京城西直門外有西頂舊建碧霞元君宫地近西山之麓直今西苑之西南所謂萬泉莊者固郊畿一勝境也元君初號天妃宋宣和間始著靈異厥後禦災捍患奇迹屢彰下迄元明代加封號成𢎞而後祠觀尤盛郛郭之間五頂環列西頂其一也歲時既久陳迹都荒碑碣猶存榱桷弗整其謂妥神何歲在戊子發內帑命有司鳩工重葺之閲一載而落成棟宇穹然垣廡翼然殿寢秩然丹雘燦然瞻拜其下者虔肅有加焉朕於萬幾之暇亦往展禮仰祝聖母之釐俯介生民之祉以祈純嘏以鞏皇圖顔其額曰廣仁宫羣臣請立石以紀之朕思仁之為道大矣擴之可放六合約之止在一心先儒論仁謂心如穀種其生之性即為仁故物物而有仁則生生而不已天地之於人物父母之於子皆是道也朕君臨天下日以養育羣生為念俾稚者得以長壯者得以樂老者得以安期於生齒殷繁兵刑寢息民無夭札物無疵癘總以一仁推之而有餘今獨於兹廟曰廣仁者蓋以元君之為神有母道焉母道莫大於坤今之廟宫適位坤維元君其佐坤之厚德以廣其仁使首善之區同臻壽域寰宇之內永託慈庥斯神貺與日星共著而禋祀與金石常新矣聖祖仁皇帝御製文第三集卷二十四
