body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷九敕諭諭內閣九卿詹事科道滿漢各官兹者異常地震爾九卿大臣各官其意若何朕每念及甚為悚惕豈非皆由朕躬料理幾務未當大小臣工所行不公不法科道各官不直行參奏無以仰合天意以致變生耶今朕躬力圖修省務期挽回天意爾各官亦各宜洗滌肺腸公忠自矢痛改前非存心愛民為國且爾等自被任用以來家計頗已饒裕乃全無為國報效之心爾等所善之人即以為善而奏聞爾等所不合之人即不行奏請此等不公事情朕聞見最確欲即行處分猶望改過雖知之而不令議罪也今見所行愈加貪黷習以為常且從前遇此等災變之事朕亦屢曾申飭但在朕前云欽遵申飭之㫖究竟全不奉行前此大奸大惡之人朕重加處分爾等亦所明知此即榜樣也再科道各官向來於大奸大惡之人未見糾參或因事體曖昧未有憑據難於舉發此後科道各官如有確見即行據實參奏若依然虛飾如前所行奸惡巧為遮蓋不加省改或事情發覺或經朕訪出雖欲寬免國法具在決不饒恕著即傳諭齊集諸臣咸令知悉康熙十八年七月二十八日諭大學士明珠李霨尚書宋德宜左都御史魏象樞學士佛倫地震示警災及軍民朕居髙御物勤恤民隱遇兹變異惻怛彌殷其摧塌房屋壓傷人口惟恐五城御史不能逐戶細察止憑司坊官員總甲人等開報未盡詳確不得均霑實惠應分遣不在五城滿漢御史詳加稽察著都察院遵行康熙十八年七月二十八日諭大學士明珠地震傾倒民居朕心憫念至於窮苦兵丁出征在外房屋毁壞妻子露處無力修葺更堪惻然可敕該部行令八旗各佐領下官員殷實者共相存恤出資修助俾貧困之家早獲寧居該旗都統副都統參領親行詳察毋致遺漏使窮苦之人妻子無棲息之所朕亦時加訪問若有玩忽該旗都統副都統參領佐領驍騎校小撥什庫俱從重治罪康熙十八年七月二十八日諭大學士明珠兹因地震五城地方房屋傾頽貧苦小民不能補葺朕心特為軫念兩鄰十家戶有互相存恤之義可協助修理如官紳富民願捐資為貧民修理房屋者該管官酌量奬勵其令都察院行五城御史遵行康熙十八年七月二十八日諭吏部等衙門朕薄德寡識愆尤實多遘此地震大變中夜撫膺自思如臨冰淵兢惕悚惶益加修省仍宣布朕心使爾諸大臣總督巡撫司道有司各官咸共聞知務期洗心滌慮實意為國為民斯於國家有所裨益即爾等亦並受其福庶幾天和可致若仍虗文掩飾致負朕意詢訪得實決不為爾等姑容也一民生困苦已極而大臣長吏之家日益富饒民間情形雖未昭著近因家無衣食將子女入京賤鬻者不可勝數非其明驗乎此皆地方官吏諂媚上官苛派百姓總督巡撫司道又轉而餽送在京大臣以天生有限之物力民間易盡之脂膏盡歸貪吏私槖小民愁怨之氣上干天和以致召水旱日食星變地震泉涸之異一大臣朋比狥私者甚多每遇㑹推選用時皆舉其平素往來交好之人但云辦事有能並不問其操守清正如此而謂不上干天和者未之有也一用兵地方諸王將軍大臣於攻城克敵之時不思安民定難以立功名但志在肥已多掠占小民子女或借為通賊每將良民廬舍焚燬子女俘獲財物攘取名雖救民於水火實則陷民於水火之中也如此有不上干天和者乎一外官於民生疾苦不使上聞朝廷一切為民詔㫖亦不使下達雖遇水旱災荒奏聞部覆或則蠲免錢糧分數或則給散銀米賑濟皆地方官吏苟且侵漁揑報虛數以致百姓不霑實惠是使窮民而益窮也如此有不上干天和者乎一大小問刑官員將刑獄供招不行速結使良民久羈囹圄改造口供草率定案證據無憑枉坐人罪其間又有衙門蠧役恐嚇索詐致一事而破數家之産如此有不上干天和者乎一包衣下人及諸王貝勒大臣家人侵占小民生理所在指稱名色以網市利干預詞訟肆行非法有司不敢犯其鋒反行財賄甚且身為奴僕而鮮衣良馬逺勝仕宦之人如此貴賤倒置為害不淺以上數條事雖異而源則同總之大臣廉則總督巡撫有所畏憚不敢枉法以行私總督巡撫清正則屬下官吏操守自潔雖有一二不肖有司亦必改心易慮不致大為民害此等事朕非不素知但以正在用兵之際每示寬容今上天屢垂警戒敢不昭布朕心嚴行誡飭以勉思共回天意作何立法嚴禁務期盡除積弊著九卿詹事科道㑹同詳議具奏特諭康熙十八年七月三十日諭大學士索額圖明珠戶部尚書伊桑阿官員兵丁房屋墻垣頃因地震塌毁甚多一時不能修葺四品官員以下原有半俸此一次仍行全給其明甲撥什庫披甲當差人役錢糧併原增銀一兩著即支與兩月令其修理康熙十八年八月初二日諭吏部等衙門凡為臣子者同寅協恭自古皆然今各部院辦理事務大小漢官凡事推諉滿官事之得當則歸功於已如事失宜則缷過於人至於入署不待事畢諉於滿官祗圖早歸宴㑹嬉逰不為國家盡力擔當料理公務自此以後各宜協力同心務盡厥職不可仍前推諉至科道各官平日章奏內將一二可行之事隱附私情希圖作弊凡有條議鮮非無因閲覽奏疏多以已為至公至廉其囑託公事肆行妄為外播威勢挾制多端地方督撫等官莫不畏懼小民困苦未必不由於此作何懲戒著九卿詹事科道詳議具奏特諭康熙十八年八月十二日諭戶部侍郎薩木哈通州三河等處地震災變壓傷人口無人收瘞殊為可憫戶工二部㑹同將旗下及民人房屋并各寺廟內有見被壓埋者作何察明數目其速議具奏康熙十八年八月十八日諭九卿詹事科道自古設立臺省原係朝廷耳目之官上之則匡過陳善下之則激濁揚清務求知無不言言無不盡乃稱厥職近見直言讜論者不過幾人徇私好名者不可勝數朕自臨御以來略知此情每期言路諸臣化其偏私實陳得失輔登上理頃有以風聞請者試約略論之如今之章奏已見施行者雖不明言為風聞何嘗不是風聞今若開風聞之條使言事者果能奉公無私知之既確言之當理即當敷陳何必名為風聞方入告也儻生事之小人恃為可以風聞但知已之好惡必致擅作威福以行其私彼言之者既無確見聼之者安能問其是非故曰無稽之言勿聼弗詢之謀勿庸正所以誡言之無據謀之自專也况天下之大臣民之衆導之以理曉之以法待臣下須寬仁有容不因細事而即黜之所以體羣工也用人則隨才器使無求全責備之心蓋以人材有不齊也若關天下之重朋黨徇私之情皆國家可參可言之大事不但科道而已有志之臣民槩可以言之何在區區風聞之言能斂戢奸貪之志氣哉治國家者在有治人不患無治法爾康熙十八年八月二十六日諭大學士索額圖明珠李霨杜立德馮溥學士噶爾圖佛倫希福項景襄李天馥自古帝王治天下之道因革損益期於盡善原無數百年不弊之法果屬不可行者自應參酌時宜歸於可久至於制度既定事可遵行不宜議論紛紜朝更夕改近閲章奏亦有不思事之可否但欲徒為更張或粗識數字即為大言凖之事理殊屬茫昧如逞空言無補實用誰其不能且明末一切事例遊移不定上無道揆下無法守以致淪亡此皆爾等所親見亦衆所共知今後凡條奏本章爾大學士等務加詳酌康熙十八年八月二十七日諭九卿科道今將科道兩衙門本章情弊無益國計民生之處一一講究卿等必有至公之衆論以佐朕意卿等但有所見即直言不可隱諱自古設立科道原係朝廷耳目之官務求知無不言言無不盡方稱其職今每見直言讜論者不過幾人徇私好名者不可勝數即如科道條陳一事部議妥確奉㫖准行又有科道官言其不可者今日之所謂是明日又轉而為非朝更夕改部院至於督撫有司不知今日之事或行二三日而即更或行數月而即更茫無成憲難取信於天下豈治道至理哉舉其大槩如舉才能一事是因人材不一有能理繁者有有操守者有練習其事者自古選賢任能治之大道與論俸不同其法未嘗不善即世祖皇帝時亦曽有諭常行選擇之條偶有徇私作弊之人將不肖寡廉者薦之因一人而其法遂壞自朕親政以來如鹽差關差數行更換以後條陳不知又改幾次也又如戶部銷算錢糧一事因督撫所報不合時價故部議駮回而科道輒有言者以為督撫地方大臣斷無虛估價值肥已行私凡有銷算皆不應駮查及部議徑准督撫之銷算不行再駁則科道又以督撫冒破錢糧一束草原價若干開銷若干一石豆原價若干開銷若干不特草豆為然凡馬匹等項事事皆有虛冒部中不行詳查槩聼督撫開銷以徇情面由此觀之部議不行駮回則以為徇督撫之私情駮回則以為督撫地方大臣不宜疑其有所虛冒又恐衙役往來騷擾生事或應駮不應駮何者為是兩說俱無定論是皆大者餘悉難述康熙十八年八月二十九日諭護軍統領吳丹近者廣西南寧賊將軍吳世琮被誅湖南武岡州吳國柱亦已授首廣西湖南俱經投誠賊意懈弛賊兵潰散天下之人咸知賊勢必敗罔不引領望諸將軍早清逆氛爾等陜西將士駐馬無傷斃人無疾病之地不思速滅賊寇支吾推諉進取無期又有何人代為爾等破賊耶爾在朕左右稔知朕意應勇果任事參贊大將軍機宜以立功勳頃大將軍稱言來京陛見面奏軍國大事比至陳奏並無成算有失衆望此固軍前將士所悉知也若失此機㑹可乘之時萬一賊據四川貴州雲南以為巢穴致歲月相持彼時悔無及矣宜速行籌畫特諭康熙十八年九月初九日諭大學士索額圖明珠李霨馮溥學士噶爾圖佛倫項景襄今聞錢法漸弛鼓鑄收銅等項滋生弊端以致制錢日少價值騰貴著尸工二部都察院堂官同詣錢局親察每鑄錢一文必重一錢應作何釐剔弊端俾制錢充裕永可遵行著徹底確察逐一定議具奏至於部院衙門各處所有廢銅器皿毁壞銅鐘及廢紅衣大小銅炮并直𨽻各省所存廢紅衣大小銅炮著盡行確察解部鼓鑄康熙十八年九月十三日諭禮部前以地震示警朕恐懼修省夙夜靡寧已經遣官䖍告郊壇乃精誠未達迄今時復震動未已朕心益用悚惕兹當䖍誠齊戒躬詣天壇親行祈禱爾部即擇期具儀來奏特諭康熙十八年九月十三日諭刑部國家設立法制原以禁暴止奸安全良善故律例繁簡因時制宜總期合於古帝王欽恤民命之意向因人心滋僞輕視法網及强暴之徒凌虐小民故於定律之外復嚴設條例俾其畏而知警免罹刑辟乃近來犯法者多而奸宄未見衰止人命關係重大朕心深用惻然其定律之外所有條例如罪不至死而新例議死或情罪原輕而新例過嚴者應去應存著九卿詹事科道㑹同詳加酌定確議具奏特諭康熙十八年九月十四日諭大學士索額圖明珠李霨杜立德馮溥學士噶爾圖佛倫項景襄李天馥地震以來修葺破壞工費甚多時值用兵軍需孔亟度支浩繁各處工役或有遲延浮冒侵蝕等弊除奉先殿皇太子宫並總管內務府監造工程外其各處修造著都察院逐一詳察康熙十八年十月十五日諭康親王傑淑自數年用兵以來所費錢糧不資以致民力疲困今大破湖南賊寇餘孽遁入雲貴扼據險要抵死支持其勢旦夕殄滅惟福建海賊竊踞海澄倚金門厦門為營窟騎兵無所用其力惟藉水師樓櫓攻取甚屬緊要王等曾言今嵗賀蘭國船隻若到於八月內進攻海寇儻賀蘭國船隻愆期當內徙邊海人民堅壁清野以待其困今嵗因賀蘭國之船未至故前議不行近者福建緑旗兵丁較取厦門金門時漸增數倍即無滿兵止以緑旗兵丁剿滅賊寇未為不足現在福建滿兵甚多應即掣一半以省糧餉以蘇民力但耿精忠尚在閩中虞有意外之變故暫為停止朕思即令精忠來京此輩惶恐疑畏或生他故如留精忠在彼王親率滿兵一半回京似屬不可設必候諸處底定則福建需用糧餉較之他省不啻什百為今之計王當開諭耿精忠令其陳奏請安詣京陛見儻精忠因王之言具疏止可令其自來若精忠未能即行王獨率滿兵一半先回則勢更有所不可也此事關係甚為重大王當詳細籌畫具奏特諭康熙十八年十月二十三日聖祖仁皇帝御製文集卷九
