body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷三十七目録古今體詩四十首廵幸遼陽駐蹕遼陽夜深對月用唐太宗遼城望月詩原韻廣祐寺入千山祖樾寺龍泉寺行殿讀書示翰林侍講髙士竒登澄海樓觀海端陽前一日回宫機政偶暇輙留意書法漫成夏日瀛臺許奏事諸臣網魚攜歸賜大學士杜立德并序賜大學士馮溥并序西山駐蹕夜聞秋聲玉泉山晚景用唐太宗秋日韻秋日紫光閣閱射九日幸景山登髙大閱海東青曩因見雁念征南將士曾題截句今禁旅凱旋聞雁再作再遊盤山見案頭水仙花偶作二首黄金臺懷古自長城嶺至臺懷顯通寺殊像寺法相最異駐蹕靈鷲峰文殊寺天花登望海峰北臺眺望娑羅樹歌趙北口水淀雜詩四首南苑初夏玉泉山二首
