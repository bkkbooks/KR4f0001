  text: 欽定四庫全書聖祖仁皇帝御製文集卷二目録敕諭諭吏兵二部諭禮部諭禮部諭吏部諭兵部諭兵部都察院督捕衙門諭戶兵二部諭禮部諭吏部等衙門諭禮部諭刑部諭都察院左都御史明珠諭禮部諭禮部諭吏兵二部諭禮部諭戶部諭禮部諭刑部等衙門諭大學士巴泰索額圖李霨魏裔介學士哲爾肯哈占達都色黑馬朗古張鳯儀靳輔陳敱永諭禮部諭禮部諭戶部
