body:
  text: 欽定四庫全書聖祖仁皇帝御製文集總目卷三十一古今體詩五十二首元旦上元覽貞觀政要慈寧宮問太皇太后安月昭仁殿春夜賜舊時講學賜撫遠大將軍圖海二首春日夜半琴晚春遊幸感懷河白洋湖船獵水村鄚州河道喜雨賜寧古塔將軍巴海詩並序橋望郊外即事郊外偶作馬上口占復道口占夏日登景山同翰林張英髙士竒作夜靜讀書內廏閲馬夏日同大學士明珠暨諸侍衛過黑龍潭途中作黑龍潭由廣泉寺至臥佛寺山寺晚景咏臥佛寺古樹駐驆碧雲寺碧雲寺臨泉望月碧雲曉起再賦碧雲曉景洪光寺盤道來青軒臨眺二首法海寺瞻皇考御書敬佛二字坐法海寺偶吟賜聖感寺僧海岫駐蹕石景山石景山東望登戒壇下戒壇將至潭柘馬上同髙士竒聮句二首潭柘寺偶作咏潭柘寺竹石景山望渾河卷三十二古今體詩三十九首駐蹕南苑遣使恭進太皇太后鮮果南苑元靈宮是世祖皇考建南苑行圍德壽寺南苑晚景瀛臺偶作咏水禽雨臨城望夏日有懷內苑立秋前一日晚同左右間坐進鮮果秋蘭並序初秋幸西苑觀荷命小舟採蓮臨池觀魚有懷夜至三鼓坐待議政大臣奏事有感而作七夕沙河途中作清河荒亭初秋景山題日精門古硯待曉賜奉命大將軍傑淑二首秋日咏刀海子北紅門秋雨後行圍戲作晾鷹臺南苑閲馬中秋望月賜輔國將軍俄啓詩并序秋日晚景有懷大將軍報吳逆暴死其下賊衆潰散無餘大兵指日進取恢復封疆康熙十七年九月初十日奉太皇太后臨御溫泉恭紀五言排律八韻駐蹕平家灘潞河曉起至太皇太后行殿問安見鴈南飛駐蹕薊州城南遠眺山村山中獲野禽恭進太皇太后曉起山路口號卷三十三古今體詩三十六首恭謁孝陵太皇太后駕到溫泉雨後經明總兵戚繼光所作八角石亭清晨入盤山二首古中盤望蓮花峰盤山絶頂三首晚過李靖菴二首星出歸營奉侍太皇太后臨御溫泉因孟冬享廟暫回京夜半覽本山中曉色由鮎魚池出關咏瀑布水登景忠山灤河冬至回京齋戒夜坐登邊城作溫泉行溫泉流杯戲作南苑橋上大風雪景山積雪侍衛下趨如飛元旦慈寧宮行禮春上元幸萬善殿戲作收復嶽州作并序恭上太皇太后萬壽詩二首賜大將軍安親王嶽樂二首賜護軍統領桑格春夜月題周文矩畫説劒圖卷三十四古今體詩四十首春日郊行清明登玉泉山時巡近郊憫農事有作鄚州雜詩五首春日內苑賜宴詩并序初夏登樓臨水夏日同三王慈寧宮請太皇太后安夏旱步禱南郊喜雨五日泛舟賜內大臣侍衛宴詠蟬題蘇軾墨竹初寒懋勤殿古幹梅春曉春雪懋勤殿讀尚書至無逸篇有作春晝二首景山春望榴花咏觀天儀器鶴經筵進講周易秋日出郊觀稼題張擇端清明上河圖長至日祀天圜丘有述四章遠望西山積雪春盤端凝殿齋居賜直𨽻巡撫子成龍并序苑西新栁二首和唐太宗咏桃花即用原韻卷三十五古今體詩二十一首潞河三首巡幸出喜峰口過黃土巖大石磯塞上宴諸藩入喜峰口野望夏日迎薰亭午日夏日潭柘寺戒壇臥松蚤秋新霽夜坐瀛臺天津通惠河閲運艘滇平宮門聽政示閣部諸臣升平嘉宴同羣臣賦詩用柏梁體并序元夜與諸王宴飲乾清宮
