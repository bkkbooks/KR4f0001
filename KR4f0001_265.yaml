body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻三十四雜著古文評論北齊邢邵請建明堂太學疏語華意質非僅鞶帨之工杜弼為東魏移梁朝檄度䇿梁事如符契悉合而文筆雅健北周武帝停徴發詔息事寧人恤民之善經治理之要道仁音琅琅可以感人毁露寢諸殿詔文既莊雅氣亦淵茂不事雕琢而渾噩之致見乎尺幅中此後代詔令之最近於文景者報于謹詔詞意篤摰隆禮勲舊猶有盛世之風于謹為三老詔敦行古典得憲老乞言之遺意蘓綽為周太祖作六條詔書治平之理此六條足以盡之要當以力行為亟亟耳第二條此以王道立説有古儒者氣象第三條重農務本乃王政之大端措置處亦井然明悉第四條天之生才自足供一代之用豈有借才於異代此自是千古名言第五條天地之大徳曰生重物之生所以奉若天道故矜慎刑獄是治天下第一義也第六條此言征税亦救時之務以上六條當時令百官誦習牧守令長非通此者不得居官盖重其言而用之如此庾信賀平鄴都表警麗中自有典則功臣不死王事請門襲封表以典核之辭抒懇惻之悃無嫌其為駢儷也隋文帝辭封禪詔謙沖非由矯飾無須辭費正樂詔聖王制作之精意此雖未能詳盡然其識議亦有可擇與元諧勅語不多而有令音亦耀徳不觀兵之意也賜髙麗王湯璽書曉示逺人必如此朗暢始可悉其情事文亦質實牛宏請開獻書之路表此表有功經籍不在王儉阮孝緒下也李諤論文體書不獨文教有禆亦可使頽風歸厚唐髙祖修定科律詔漢髙入闗除秦苛法唐祖受禪修隋律令一代創興以刑法為重務其規模可概覩矣太宗金鏡唐之太宗致治幾於三代之隆今覽金鏡所載其於處已行政用人之道亦何其見之明而言之詳也此所以追蹤徃古歟致仕朝㕘在見任本品上詔舂容雅贍淵淵金石之音賜孝義髙年粟帛詔敘意屬辭婉切暢悉殊覺情文生動誡厚葬及賜功臣陪塋地詔深情内藴麗藻外敷褒李大亮書温純深潤詞不煩而意甚摯帝範序述天位之不昜敘王業之艱難垂訓後昆特為深切帝範後序意既切至文復典正純雅晉宣帝傳贊選詞厚縟而大義相繩處殊自嚴正不磨晉武帝傳贊文瀾浩渺而反覆抑揚於當時情事最為穩切睿宗褒魏知古手制清辭簡指悠然自逺勞畢構璽書條數弊源洵為探本之論而文彩爛然使人耳目一新明皇帝發宣撫使勅典正之論而辭涉華腴則質文損益風㑹使然也求賢良詔意既纒綿而言皆雅令誡勵風俗勅清靜不擾和平不爭王道之成何以加此焚珠玉錦繡勅英茂鴻駿亦古人貴五穀而賤金玉之意勅朝集使拊循斯民惟牧守是寄一不稱職則兆人何賴焉教勅之辭故宜諄切如此勅朝集使辭義何等殷切是不欲僅奉行故事者明皇初政所以蔚然可觀處分朝集使勅吏治所賴以振飭者全在敷奏明試之時不如此深切鄭重安能致理故知臨軒勅遣非屬具文也孝經正義序説經之家徃徃鑿空騁異使聖人之道不明於天下此能深斥其流弊而文亦簡貴可傳肅宗讞獄詔有惻怛之思故文情條暢代宗増修學宫詔金革之餘加意文學不惟收拾人心自是立國本務大赦詔播告之文語意加詳而名理亦復斐亹徳宗亢旱罪已詔文辭贍潤而有真意流貫其間命令之佳者褒功臣詔思老成之功烈而欲圖列其容儀亦所以勸後勵世也君臣箴有訓誡之誠有勸勉之義上下勤恤庻幾盛世遺風西平王李晟東渭橋紀功碑敘戡定之烈奕奕精采文雖以偶麗見勝而西京遺軌猶存贈太尉段秀實紀功碑𥪡義正大播辭詳整可以植綱常勵風教武宗毁佛寺制明斷之舉宏碩之論洵有禆於風化人心傅奕請除釋教疏痛斥異端理明氣壯始能為此非過激也徐賢妃諫息兵罷役疏謇諤之辭得於宫掖貞觀之治故爾流聲千載房喬諫伐髙麗疏文勢浩瀚靡有涯涘魏徴論治疏反覆援引文勢自相貫注辭亦淹暢不拘請罷工役疏論古今奢儉非擷華攬藻之文上十思疏風格詳整中特多懇到之語論十漸不克終疏昜戒履霜書言惟幾皆致謹於漸之義魏徴舉十漸以立説殆亦慎終於始之道也求賢審官疏開闢盡變列論臣品可謂曲中張𤣥素請罷修乾元殿疏辭不煩蕪而義甚爽豁彌足使人繹思李百藥封建論該洽精詳深明於損益之宜利害之故可謂閎辭碩謀矣馬周論奉親享廟襲封樂工等疏剴篤之辭出之以委蛇盖由其忠誠内結耳岑文本上太宗勤政疏開引其端而所包至廣政之體要略盡於此禇遂良請復髙昌疏唐之郡縣髙昌者國家服逺之略遂良請復髙昌者臣子謀國之忠兩者正不妨竝美耳張藴古大寶箴炳炳琅琅如觀禮樂之噐狄仁傑請赦河北諸州疏定亂之方惟崇尚寛大則能消人心之疑懼而反側自安斯謂洞晰機要諫造大像疏摹寫勞費曲盡俗情佛骨表意多本此請罷百姓戍四鎮疏請罷四鎮逺戍以息百姓命意與賈捐之罷珠崖對同而文之頓挫古鬱亦近之劉知幾上蕭至忠書班馬以前以專家著美晉唐而後以衆手多疵推論史局之難盖後先一轍矣陳子昂對利害三事論事簡當不涉支蔓百姓安則樂生不安則輕生洞逹人情可謂經國之言諫雅州討生羌書子昻本蜀人故言蜀用兵利害警切動聼蜀恃險為固險不可使通良有逺識蘓安恒請復位於皇太子疏論還政事不少為婉避之詞文自有奇氣救魏元忠疏語簡而氣岸唐文之似兩漢者聖祖仁皇帝御製文第三集巻三十四
