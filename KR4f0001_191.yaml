body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷五十古今體詩五十首示江南浙江守土諸臣宇宙方清寧吏治尚端廉農使樂耕鑿民使適里閻大寮總其要小吏毋苛纖紀綱不可弛隨時酌寬嚴為上能自愛羣屬必畏鉗訟惟善得情操守時警砭勿恃才妄作勿以媚自忺務令比戶豐膏澤遠近霑朱轓與彤騶萬姓所具瞻臧否道有碑防口難可箝不見廣厦材聳幹從幽濳不見沖霄鶴飲啄本靜恬告誡示勉勗保護兹庶黔再過鷲峰愛此清幽一徑深馬隨泉響入雲林蒼苔古洞何年鑿脈脈韶光自賞心登吳山重經層巘暫停鑾天日晴和覽眺寬城市萬家煙火近念兹莫遣有飢寒望錢塘江江流幾折勢灣環指點遙岑是越山南朔東西無一事春風浩蕩奉慈顔虎跑泉靈泉涌地寒侵骨勝迹名髙著虎跑似恐被人頻汲取一泓清迥出山坳由淨慈寺經南屛諸山紆曲南屏路欣隨步輦來皇時奉觀覽太后鳥飛驚玉仗花落點經臺邃閣聞松籟疏籬逬竹胎雙峰髙不極更在白雲隈孤山放鶴亭處士人何在山前夕照來亭空不見鶴磴古尚留梅楊栁縈煙嫩棠梨過雨開今朝間繫艇還自愛賢才玉泉有五色魚賜名清漣寺錦鱗遊泳漾池紋隱藻穿蘋暗作羣濠濮會心原不遠清漣題額與傳聞西湖再作面面山容淡盈盈水態清流文縈傑閣波影蕩髙城燕舞知迎棹花低解避旌乘春𢎞沛澤隨地稔民情浙省道上書懷遍野農桑繞翠旌畦邊童叟帶雲耕江山盡是升平日寸晷難忘終始情桑林乍緑蠶事方興詩以嘉之彌望桑林吐葉垂枝嫩碧初勻竹舍正殷蠶務天工雨露維均曉發嘉興數里城依水千門路向田菜塍無近遠桑岸互綿連土沃勤為最年豐儉欲先雲開林野秀初日上行旃花山警蹕來初地青山鳥道深風生松澗合雲暗石苔侵靜晝飛間蝶餘春噪晚禽空留支遁迹物外託宸襟支硎山龍池東北古支硎石室寒泉句可聽支遁詩云石室可蔽身寒泉濯溫手想得雨餘懸瀑布飛流界破數峰青回鑾復過惠山是誰妙筆點巒容藴藉迎人四五峰堪挹山泉烹雀蕊併添新黛入甌濃舟行野望惠風萬頃下芳畦逺水拖煙曉狀迷河上草新才覆地林間花墮半沾泥翩翾弱燕穿船入宛轉芳鶯隔樹啼若問撫闌端坐意默思豐裕洽羣黎駐蹕江寧偶述雲覆輕隂雨淨塵南巡又隔十經春山河舊數陪京重士庶今看沐化淳古巷烏衣人已換芳洲白鷺迹成陳元元億萬咸安樂教養休和屬大鈞修報恩寺塔初畢登之塔勢搖晨旭憑陵上九霄琉璃莊淨域金碧啓香寮地俯三山近江環匹練遙隔窗雲霧起戶户瑞煙飄過明太祖陵有感拔起英雄草昧間煌煌大業豈能刪玉魚金碗雖如故煙霧低迷獨愴顔月夜登燕子磯石勢疑飛動江濤足下看天空來皎月風定斂奔湍緑樹燈光亂蒼崖夏夜寒經過睹形勝往往駐鳴鑾江行風帆來往亂江流樓櫓縱橫拍浪浮只在艄工持柁穩曽將為政喻操舟憶暢春園牡丹曉雨疏踈薄灑午風習習輕吹忽念暢春花事正當萬朵開時金山雨望煙樹重重兩岸間流雲著水水漫漫江煙江樹無窮盡不讓蓬瀛島上山山中晚霽返照開澄景餘霞作綺流夜深明月出隔岸見蘆洲中泠泉靜飲中泠水清寒味日新頓令超象外爽豁有天真望焦山念已已曽登其上大江日夜波汪洋金山焦山兩相望金山樓閣蕩丹碧焦山竹樹多鬱蒼境深流廣人罕至往年曽一登其岡頃者放舟仍北渡壯哉滉漾雲低昂青巖翠壁幽且蒨圖經名著傳焦光何時瘞鶴在山足遺銘剝蝕存華陽山下有瘞鶴銘為華陽真逸撰止存六十餘字葭洲白鳥忽飛出江花冥冥江草芳是日雨餘氣清淑夏首晴晝欣舒長倚艦四顧暢襟抱好風豁達來天閶念淮揚居民特留漕糧二十萬以濟之回鑾之日復諄諭所司使布實惠廣厦豈不樂何事駕飛艫意惟悉民隱遑問歷道途淮揚皆巨郡地本號饒腴居人百萬家土狹濱衆湖禾麥苟不登老幼日待餔恩意宜渥沛拯濟留天儲實惠布州邑遠邇均有無諄諭嚴再三毋徒飽吏胥茅屋有起色比户充黍稌願兹瘠壤農皥皥躋唐虞泛洪澤湖偶詠積水空明浸太虛輕舠間泛進徐徐菰蘆絶岸柴門小終歲生涯業捕魚漁舟夜泊漁父不罹世中形任意飄流夜泊汀惟有長間心靜處何如名利係朝廷渡河北歸三吳問俗罷旋蹕渡洪流微日籠華蓋輕飇送御舟水能安泛濫堤遣護田疇自此民休息紓豫南顧憂宿遷行過江南水與山栁舒花放鳥緡蠻明朝重至邳徐路鳳闕龍樓計日還過八閘宛轉河形一線通瀦流疊石賴人功天庾歲歲關飛挽全在隨時啓閉中仲子廟河口孤祠在千年祀典存當階松半偃繞碣蘚堪捫懷古題新額遺風想聖門行舟清晝永岸草採芳蓀途次端午蕤賓逢夏律午日俯澄流黃鳥林中變新蒲岸外稠宮筵傳綵粽仙酒泛丹榴遙憶蓬萊上垂楊蔭御溝山左道中鳳艒南巡往復歸夏禽拂水避雲旗川平桂棹何須舉風正蒲帆疾似飛雞犬滿村人足食繭絲入市戶充衣間間陌上晴曛好暇覽時光暢萬幾望岱憶舊青天竦峙翠雲濃端坐船頭眺岱宗憶上崇嶐最髙頂非探芝檢效東封闕里重修思欲一往以天氣日暑急奉慈輿北歸未得瞻視紀詩八韻廣殿丹青煥飛甍黼藻新思排仙馭往却奉翠輿辰仰慕尼山側興懷泗水濱存心惟志道勉力事依仁望斗知非遠升堂念每惇廡松應鬛長階檜益苔皴過魯時逢夏歸帆罷問津迢迢曲阜路沿泝幾勞神見途中夏麥將熟志喜江滸淮壖道已周歸看東省麥盈疇雨滋膏潤苖多秀早慶今年大有秋北境曈曈曙色上帆檣野水波添滿路光應是皇畿程已近林風吹送棗花香候兄裕親王花萼樓前別已經春夏餘平明挂錦纜日暮傍樵漁吳越當年景江湖各自如留心民事重隔月信音疏江南風雨阻回程二十天近京又是微旱五月二十五日霖雨如注喜雨雨阻回鑾二十天近京又旱意懸懸若能南北皆無慮惟賴青蒼大有年賜峨􅖭老僧名山越遍未到天涯欲得真印勤修離家雷音雖拜那見拈花知此無益再遊中華八旬老矣行履不斜言語忠厚一字弗遮觀爾朴誠朕意甚嘉峨􅖭峍崒直逼雲霞明心見性靜守毋譁察永定河源從自馬邑溜轉入桑乾渾流推濁浪平野變沙灘草載為民害一時奏效難豈辭宵旰苦須治此河安巡子牙河建壩暫别宮槐幸子牙近村處處少人家清和微暑浮畦麥緑樹初隂接岸沙隄外草荒艱籽粒淀中水淺捕魚蝦黃童白叟望霖雨霖雨先施莫自賖盛夏晚偶成蟬聲急處秋將近綿雨過時暑漸微樹色渺茫憑遠閣雲峰掩映罩斜暉西成平野年當稔煙息關山事不違披覽牙籤心自得揮毫乙夜勉羣幾七夕觀千葉蓮玉露初分水殿涼滿池紅白雜芬芳香飄隨座皆秋色細月朧朧挂未央暢春園觀稻時七月十一日也七月紫芒五里香近園遺種祝禎祥炎方寒北皆稱瑞稼穡天工樂歲穰詠桐老圖賜裕親王丹桂秋香飄碧虛青桐迎露葉扶疏願將花萼樓前老帝子王孫永結廬為考試歎人才當義取王道豈紛更放利來多怨徇私有惡聲文宗濂洛理士仰楷模情若問生前事尚憐死後名禁園秋霽樹冷催蟬咽荷疏表影長深秋殘暑氣微爽待髙陽户外遠塵迹園中多蕙香溶溶新雨霽吟乏愧成章聖祖仁皇帝御製文第二集卷五十
