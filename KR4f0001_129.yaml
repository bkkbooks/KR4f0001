body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷十九北征勅諭諭皇太子朕躬甚安於此月初十日至獨石口十一日出邊前往隨朕兵馬皆整齊精鋭後隊各營雖未見亦聞其善但朕軍中隨行之馬除内廐千匹兵部千匹外别無餘馬伯費揚古軍中有餘馬七千駝三千朕欲豫備肥馬三千匹送至餘無他故康熙三十五年三月初十日諭皇太子此番出師諸事咸合朕心甚為嘉悦故身體與面顏俱好且風土水泉皆佳行營事簡日多暇豫但願上天眷顧黙垂協應耳此書寫於十四日十五日早起行至中途忽起東南風大雨傾注雪霰繼作寒氣嚴冽其夜隨止十六日早察馬畜俱無恙幸豫備周宻雨雪亦未乆也此惟皇太子知之康熙三十五年三月十六日諭皇太子朕兹行遠出塞外經過䝉古地方所見與所聞迥異水草既佳㸑燎咸裕馬矢雖經雨濕塞外各種野草及榆柳之條皆可為薪喀倫以内水泉無庸疏鑿雖大兵於一處征行水草薪燎亦斷然無悞但所慮者天時無定倐忽雨雪風寒為可憂耳惟恒暘乆晴斯大幸也出師以來數次雜遇雨雪無有妨礙青草既茁羊可飽食馬亦從此與枯荄並秣所禱者上天眷佑不遇雨雪則朕之斯舉似可迅奏成功矣恭請皇太后萬安朕躬甚安諸皇子諸王以至臣工軍士皆好皇太子佳否康熙三十五年三月十九日諭皇太子朕躬甚安皇太子佳否諸皇子皆佳以至大臣官員軍士俱好雨雪雖不甚但連朝不霽朕懐稍覺焦勞此處居住䝉古却皆喜悦云我等斯地屢年亢旱草不萌生遂至於窮困已極皇上駕臨始有雨雪草皆茂盛觀此則征行之人與居住之人其情大不相同矣京師雨澤何如此間之草羊可飽食馬於沙際雜枯荄而食猶未得飽耳草色大概漸佳水泉給用朕所經歴之地雖盡偕大兵於一處征行亦可無悞薪燎具足後此則尚未知也康熙三十五年三月二十二日諭皇太子朕沿途至喀倫觀覽草漸茂盛從四月初一日以後馬可飽飼羊亦近肥水泉給足故三旗並行雖八旗駐於一處亦得無悞㸑薪足用較之前所聞者大異矣三月内雨雪㣲多稍未適意緣此懐抱不暢今意已寛舒因待出古北口之火器營漢軍兵遂爾多駐時日至彼處日期未可豫定前遣往噶爾丹二次使臣俱於初七日到噶爾丹今在土喇於三月十六日令伊等歩回奏章大概與前相同皆好語也彼牲畜甚瘦人所食亦罕少我師頭隊哨兵已詳悉指示遣往矣土喇地方距喀倫大約有十八宿之程京師二十日所送來馬三千匹皆肥健全至惟兵部之馬不及耳塞外所產草木諸物寄來觀看幷奏皇太后請視之宫中咸令觀看朕躬甚安諸皇子諸王以至羣臣軍士俱好水草甚佳康熙三十五年四月十三日諭皇太子自出喀倫見水草甚佳地方形勢無平原曠野盡皆低山處處有沙岡凡喀倫内所常見之走獸飛禽皆無惟黄羊野騾大烏鳥白翎雀耳此地除牧養牲畜外並無佳處我軍重車所經無有阻悞看來沙行視泥行為易自獨石口至喀倫以繩量之有八百里較向日行人所量之數日見短少自京師至獨石口為路甚近約計不過四百二十三里皇太子可試使一人繩量之喀倫地方用儀器測驗北極高度比京師高五度以此度之里數乃一千二百五十里朕所過蘇尼特阿巴哈阿巴哈納爾等旗各皆効力濬井泉修道路治橋梁除石礫視内地甚優敬謹至於己極誠可嘉悦漸北行漸寒喀倫外見舊氷雪尚㣲存晨行時或有鬚凍之日而槩無妨於草之生長此亦一竒也然諸䝉古以今年為大熱朕所統兵已近喀倫遣䕶軍叅領車克楚前鋒侍衞竒薩穆盆楚克貝子侍衞穆渣哈爾阿巴哈納爾布昭貝勒鄉導索訥木察哈爾䕶軍撥什庫三人理藩院撥什庫一人人給善馬各三匹往克魯倫河一帶偵探蹤跡於四月十二日車克楚竒薩穆來報初九日至伊渣爾厄爾幾納地方潛入噶爾丹兩哨兵之間視其形跡併牲畜計之共約有二千餘此外更復何有為山所隔視之無所見噶爾丹哨兵見我蹤跡正追尋間我等突出前來於初十日遇沙津王所遣佐領俄七里等十五人口稱噶爾丹於此月初自土喇移營向克魯倫河下流第三日遣我等歸噶爾丹至達爾罕敖喇矣汝等勿與我等同行噶爾丹人相隨在後若問之難以應答汝等宜速出語訖遣之使行以此觀之噶爾丹去我軍八宿矣整肅軍旅訓備偵哨大約十日可與敵會此乃緊要情事應書在前前數事隨思意所及而書故將此書於後為此諭之康熙三十五年四月十四日諭皇太子我軍將哨兵前進偵探消息以待後營齊集噶爾丹仍在車克楚所探之地實為我師之幸儻趨克魯倫河下流而往則迤東䝉古恐為震驚故調奉天烏喇兵馬令會於索鑰爾濟地方已經行文汝宜促之并不時探問報聞康熙三十五年四月十四日諭皇太子朕所統兵旅區畫齊備深入克魯倫克勒地方若無停留稽緩六七日内或可與敵相遇初聞此地僅可一二旗魚貫而行今水泉充給此數日來分派已定以前鋒營及八旗火器營兩綠旗營察哈爾兵居前為一隊次則朕之大營及鑲黄正黄正白三旗凡四營為一隊再次則以正紅鑲白鑲紅正藍鑲藍凡五營為一隊先行之前鋒與鑲藍旗後尾相去約百里四月十七日八旗綠旗及火器營俱已會集軍容整肅馬臕健壯擬至克魯倫河之前一日約齊而進此際彼即望風奔逃亦必為我軍所困若其順克魯倫河而下或稍需時日耳因便示知之特諭康熙三十五年四月二十一日諭皇太子朕所經過之處非大瀚海也西之瀚海較此更闊然觀之亦非平衍之地山阜聯綿砂石間雜自出喀倫未見寸土其砂亦堅硬履之不陷瀚海中所產石塊與砂附去觀看營中軍士鑿井甚易一人可鑿二三十處因水泊中取水嫌遠咸於近帳房處鑿之可掘之地亦易認識有謂之善達者地窪而潤掘未二尺即可及泉有謂之賽爾者山間溝徑掘僅尺餘即可及泉有謂之布里杜者乃叢草積潦水雖有而佳者少有謂之窺布爾者水流地中以手探之泉即隨出故野騾以蹄抉之而飲風土景况一無所取地盡碎石下馬偶竚立可射之處亦少我軍士未曽騎射其地實未見佳也草則叢生而土高所以縈絆馬足又各種野䑕所穿之穴較興安一帶鼢䑕之穴更深殊覺可厭草名頗多有郁爾呼草牛羊駝馬食之最宜以此稱佳内地䝉古皆不能識又有蘇離草生最高故将此二種亦附去觀看此番行師日期皆因火器營甚是耽閣即今猶等待而行必日期相符乃善也恐噶爾丹順克魯倫河遠去遣納木渣爾王長史庫即根一等侍衞博羅輝三等侍衞額林辰理藩院撥什庫訥爾布車木楚克納木渣爾旗分之鄉導七旺阿巴哈納爾之鄉導索諾此六人各給馬三匹令其自克魯倫河之額古德哈爾哈偵探於四月十四日遣往二十一日早來覆奏云臣等自額古德地方渡克魯倫河沿流而上約行百里至塔爾吉而即適遇一人意欲擒挐詢問因而追逐之忽從山後約有三十人迎來追臣等幾五十里時已漸近狂飇頓作覿面不能相視彼因止而不前臣等乘此渡河而回噶爾丹在克魯倫河地方是實等語朕之大營距噶爾丹所在不過五程噶爾丹似茫無知覺我軍駐處山勢高峻易設偵探故前移哨兵於古爾班圖爾漢巴爾泰哈地方特諭康熙三十五年四月二十一日諭皇太子朕緩進之意特示汝知前將近敵情由屢有諭㫖二十一日酉時將軍費揚古由横設驛站奏稱五月初三日可抵土喇等語伊前疏云於四月二十四日抵土喇朕擬度時日欲於四月二十五日間抵克魯倫河前進乃許乆未經奏報忽而改期我軍難以指畫於是傳集八旗諸王及議政諸臣會議衆見不同有言即宜進剿者有言原議兩路之兵約會前進所關重大應少緩我師以觀局勢朕再四籌度未能適當其可姑少為相機徐行前諭㫖曽言進剿今復稍有濡遲若不傳示其故恐汝計日懸心因書以諭意噶爾丹情形萬不計及此路進兵猶自夢夢耳但所慮者相距匪遥噶爾丹聞知必爾逃遁機會可惜然彼雖逃遁諒亦未得全脱也為此特諭費揚古奏疏亦謄寫發往將此情由奏聞皇太后幷轉諭大學士尚書知之康熙三十五年四月二十三日諭皇太子朕統大兵駐蹕察罕布喇克之日費揚古遣來期約之商南多爾即喇嘛於四月二十六日薄暮至彼於行路之間遇厄魯特二人擒來問之彼云噶爾丹向克魯倫河下流移營問費揚古何時可至云五月初六間可至巴顏烏闌因是我師仍稍緩以待之從察罕布喇克至克魯倫河約略三百里未經量度難得其實此數日間未見汝奏章幷皇太后萬安音問朕懐不勝惓切昨薩卜蘇奏事之便又未見汝請安奏章益増懸念朕躬甚安諸皇子俱佳皇太子佳否皇太后前奏章一封付顧太監書一封皆附之而往為此特諭小事俱經從前遣示外餘無他事故不具康熙三十五年四月二十七日諭皇太子比來未得汝奏章朕懐懸念今汝奏至得仰悉皇太后萬安因待費揚古之兵駐蹕數日馬皆稍肥風土水草與前示汝者無異恐敵人知覺哨兵仍附近大營未令前移此時彼聞知與否無由能悉朕躬固安但早夜焦勞洵為至極諸皇子諸王并諸臣以及將士皆好皇太子佳否在京諸皇子俱佳否此處别無他物惟有砂石耳四月三十日車林渣卜等七台吉至伊等與納木渣爾托音同在一處向被噶爾丹搶掠敗遁渡克魯倫河北在俄濃一帶地方因馬匹疲乏今始得向内地移營來言其故并遣送所獲厄魯特二人赴京與朕差往烏爾輝地之人相遇因來傍大兵之後朕厚加賞賚諭以噶爾丹去此不遠爾等速入喀倫車林渣卜欲來請朕安願為効力止将伊眷口遣入喀倫身赴朕營喀爾喀之車陳汗亦來今尚未至養心殿所製上用藥封固四兩并薑四觔此諭一到即於奏事之便附來自京師所齎奏章於五月初二日辰時至朕在此整齊軍旅於初四日進剿敵人情景尚未得聞相距二百三十里地已漸近規模略可見矣四月二十九日頭運糧車至八旗綠旗内府兵䝉古兵及職事人員酌量増給支放米糧時營外堆積如山觀者擁塞内喀爾喀諸人云我等意料滿洲斷不能如此而來由今觀之凡聖主所經可将京師諸物盡載行營中也真為可畏莫不撟舌驚駭將士志氣與在京同其勇奮情狀未能備述朕之心思則非如在京時矣事體重大期出萬全非可苟圖僥倖故既殫心力復黙禱彼蒼以行之耳特諭康熙三十五年五月初二日諭皇太子朕所統大兵以初四日前進會天雨於初五日進兵軍丁馬健在京所給馬有全存者亦有存四匹三匹二匹者大概整肅此行也喀爾喀及内札薩克䝉古甚得其力凡偵探斥堠單行差遣之處皆用此屬一一書示不勝其煩旋師之日面言之朕所遣羅卜臧額爾得尼台吉來據奏俄濃下流塔布囊烏特引弓之人有千胡倫布爾之土爾希木地方齊卜齊弩特有數百家阿里牙札薩克之阿爾薩闌衞寨桑等有全收伊等向喀倫前來之狀此等人若歸降則巴爾呼喀爾喀更無餘矣此亦大快事也今漸近克魯倫河我䝉古馬健故於初五日射獵野騾黄羊䝉古喀爾喀等陸續來會者二千有餘遣用有濟給以軍律署為官校編之部伍車陳汗來見其較前頗優兹已過瀚海山川形勢雖同而草漸蕃廡初六日次枯呼車爾湖此地即去年噶爾丹掠納木渣爾托音之處也去克魯倫百七十里康熙三十五年五月初八日聖祖仁皇帝御製文第二集巻十九
