body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻四十八目録古今體詩四十首再度居庸關雪霽駐蹕大同府過馬邑望鴈門關途間紀事并序保徳州渡黄河出塞并序横城堡渡黄河抵寧夏望賀蘭山自寧夏出塞濱河行至白塔乘舟順流而下抵湖灘河朔作黄河舟行即事噶爾丹平後示諸臣晩眺凱旋言懷懷来示皇太子入居庸關清河覲皇太后慈顔近郊曉望二首諸皇子来迎示之見迎駕者過密雲作出古北口口外設屯耕植聚落漸成經喀爾沁口外中秋行圍敖漢柰曼查魯忒諸部落塞外偶述至廓爾沁部落與諸䝉古宴秋暮入烏喇境松花江網魚最多頒賜從臣泛松花江閱窩集并序駐蹕烏喇之船厰憶壬戌春夏巡行此地每五日一奏請聖祖母太皇太后安今不可得矣書志慨慕烏喇山㠗間古木灌莽澤潦徧野即黄龍府之地也今人未暇詳攷賦詩二首行圍所經灰發葉赫哈達諸地皆我祖宗之所開并遺跡存焉賦詩二首
