body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十七古今體詩三十六首賦得萬物靜觀皆自得布教皇風性理尋右文惠化無私臨清閒靜省危微志宴坐動觀人道心天地渾元肅氣象乾坤闔闢識書林聖賢雅頌原無逺實在存神詠四針麥秋盈野志喜有序歲次癸未夏至有事於方澤齊戒自暢春園進宮見麥氣盈秋田園茂勝雨暘得時稼穡有望從來北方雨澤豔陽清和之際每每難得皆因去冬隂雪連綿自春至夏未缺甘霖所以草木花果罔不豐榮人心榖價罔不和平故志喜而為詠去冬盈尺雪占年今夏翛翛麥隴全萬畞皆齊誕降榖千家秀實已登阡先憂暘雨惟民疾後樂時豐紀玉箋志喜雕蟲晚學愧薰風南至影花甎將之山莊四首畏暑心何勝平眀出玉墀萬幾豈歇息臨政有疇咨其二暖溜自平地風光此日佳暄波由近發浩澤無津涯其三駐輦相風竿臨書羡五傳情瀾分暑節疏爽須葵扇其四霖雨消塵蹟輕霞照野荆詞臣每扈從上賞賦昆明賦得緑樹隂濃夏日長緑槐影䕃碧紗厨茂樹紛紛葉漸殊綿雨新霖消九夏薰風初熱未三驅末垂蟬咽濃隂下修景雲開炎暑無長日山中吟詠畢氣清塞外鄙凉珠尖齊圓健筆之四德戲作四首尖鋭雖云利鋒鋩日計摧藏拙莫言巧生花自有來其二齊之故有道人一已千能默運良為手揮毫須敬承其三圓活幽人本珠璣三品詳剛方學米芾宛轉倣其昌其四健乃乾行體才分不息功書稱欽若語賡頌賴文風古戍三絶隱隱山頭皆古戍中原民力盡邊城曽聞父老經年戰回首生靈血淚盈其二金甌永固識人和萬里烽煙發興多設使山林有暗曉更須太息論如何其三舊日山中罷馬歎今時避暑樂清風窮兵豈若為觀德仁義無私八表同賦得雨灑石壁來潤葉隨風洗緑枝羣峰著雨盡離披隂霖又念農家業事事何煩先預知塞外山莊嶻嶭連青嶂懸崖挂緑溪魚隨淵靜戲鶴喜樹髙棲洞逺行僧斷林寒過客迷惟豫心舊好逸興少同躋每時届炎暑即赴口外掖輦視膳朝夕溫凊自初夏皇太后偶爾違和故不至此清凉之境因詠懷一首敬書於箑頭恭進以接清風而舒逺慕之微悃而已遙想京中暑氣䦨猶思上苑有氷紈山莊咫尺何曾逺欲進瑶池一笑看避暑駐蹕山莊六月間隂霖少晴自立秋日晴霽喜懷亢暘望十雨霪雨思晴天纍日貫秋序終朝潦水綿身雖無暑汗心實抱迍邅忽覩西風緊油雲逐嶺巔山莊夜雨聼灤河溜聲臨流震耳似驚潮滚滚泠泠眺綺寮夜色初分秋景霽風聲已送積霖飄皆因百壑歸來逺非是孤川自去饒何比長江無棄物小河水涸豈容橈穹覽寺偶成塞北鐘聲久不聞梵音列剎共氤氲雨花柏樹同僧老開世瞿曇永法雲兄裕親王挽詩二律花萼空虛夢悲歌暮景傷淚同秋雨濕聲逐碧天長清頌連香桂心慈厭帝鄉徽章縱有秩寂寂歎時光其二少小同居處義深讀孝經賦詩明務本攜手問慈寧樂善從無息神襟物外停繁憂題舊日血淚染疏櫺過固關入山西境鳥道入雲中風光塞漠同人依險地立城自越山叢俗朴觀民舍才多壯士雄芹泉連冀北回首指青驄固關口號關固須憑人守城高所賴兵防若非威德恩惠恃險何曽世長平定州勞農豈憚元英節寒景風沙透體來志有鵲山無覓處目前常見凍雲回幸西省至太原黎元瞻翠蓋三晉力桑麻納稼知豐稔祈年意靜嘉邉無戍卒苦巷有讀書家此幸非遊玩隆冬見玉花渡黃河潼關駐蹕星源來晉甸天險峙秦關波湧方舟速威明古戍閒萬民瞻鳯輦百職集鵷班冬省經兹地移風先化頑入陜西境世逺山河在漢唐史有存風光移萬户景物換千門歎昔當殷鑑籌今廣湛恩從來秦隴地莫使競心繁望華山一月風霜塵土中忽看翠蓋擁三峰漢廷金掌今應笑惟有華巔並古松渭河見終南山渭水自縈紆秦川喜清曠山勢何岧嶤經過絶塵坱馬首見層巒直插青霄上雲際有飛泉朝光明畫嶂石險登臨難心寒不可量太乙本仙源天都聊騁望歲歲松柏林遐睇心神暢問俗戒征途便欲慰幽訪冬至日抵西安遙祝皇太后萬夀葭管初回日景長西秦行幸抵披香願將唐句南山夀遙捧蓬萊萬里觴長安行河山天險古金湯都邑規模溯漢唐陸海膏腴本沃壤秦風慓悍稱巖疆每因眷念勞中夜忍使時巡後一方逺幸衝寒訪民隱終南太華遙相望豳岐不乏耕織業漆沮尚存搜狩場重農藏富屢詔諭雨暘時若歌豐穰雄兵超距賈餘勇野老謳吟多宿糧要令遐陬沾湛露詎以無事弛邊防大閲三軍訓甲士來朝諸部趨蕃王蠲租恤下恩未已共躋仁夀樂且康渭水氷消回暖律南山煙靄動初陽停鑾懷古還披卷宵旰勤求意不忘西安偶作八水源秦隴山河輔帝京此方文武職須教盡和平回鑾至華隂欲登華山因風霧所阻踟蹰風霧阻蓮峰未識雲臺止水溶秦地山川聊一望方輿畎畞盡三農兵民擁道心隨仗文武攀轅淚滿容凉德何能衢壤樂皆因歲久慶時雍由豫省回鑾渡孟津遙望嵩峰欲逼天太行綿亘洛陽川金明池畔無烽火醉白堂前起玉煙千里中州古擊壤兩河分界舊原田扁舟穩渡觀民俗休飬心殷冀有年賜超玉和尚秦晉山河巡幸畢回鑾攬轡歷新中忽聞梵語如風送疑是江南話桂叢聖祖仁皇帝御製文第三集卷四十七
