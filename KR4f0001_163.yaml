body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三十六雜著親征漠北紀略上三十四年八月噶爾丹至克魯倫河搶掠納木渣爾托音之後竟于克魯倫土喇相近處居住自秋徂冬將朕三次使臣甚加侮辱朕因是深知此人勢熾心侈愍不畏死窺伺中原決然不肯寧息難同衆人視為不足介意若聽畏憚勞苦碌碌庸人之言恐後日竭各省之膏脂盡靡費於北邊又若前代矣故預為逺圖曽令三品以上諸臣集議比時議當征討者舉朝不過三四人衆雖口稱小醜何足計議而意中仍有畏憚煩難之狀是以朕心深咎之風寒雨雪皆所不辭習於戰鬬之徑寇亦所不避必親往征討斯意堅定亦欲天下自兹以往永久寧謐非僅為目前一時苟且之計也從此秣馬匹精器械教營伍練攻戰激勵將士申明賞罰審度朕所豢養官兵所嚮之處斷能不辱國威確乎可信用是告祭於天地宗社以二月三十日親統中路大兵往征西路大將軍伯費揚古領兵以二月十八日啓行兩路約略相期在四月下旬會於土喇之地此其間若噶爾丹往克魯倫河之下流與中路兵相近而與西路兵相逺則中路兵必待西路之兵若噶爾丹在土喇地方與西路兵相近而與中路兵相逺則西路兵必待東路之兵計畫已定於未啓行之前二月十六日特旨諭大將軍伯費揚古曰大兵進剿朕與議政大臣所議者已遣書諭汝外今聞根敦代青貝勒進至洪俄賴之內七斯希布地方汝等二路兵恐將喀爾喀誤以為厄魯特此事至要宜向阿南達切實曉諭之又汝等過翁金後將好鄉導給與商南多爾即從何地相通約定日期遣至朕軍前為善此二事雖無大關係思慮所及因交與阿迪令諭知之又於二月二十三日特旨諭大將軍伯費揚古曰覽總兵官康調元所奏有山西巡撫所助騾匹米石俱未到等語朕觀此或因大兵起程日期改近稍有措辦未及亦未可定糧餉牲畜所關最重前後之間將軍宜審顧萬全汝等所由道逺運送糧餉較中路其難數倍萬一糧餉不能陸續運至汝等兩路之兵恐致匱乏此事朕心深切憂慮特手諭急速馳示又於三月初一日特旨諭大將軍伯費揚古曰副都統阿玉璽等到於大兵駐劄南口之日聞其鑿井易成不勝喜悅汝等領兵至喀倫報聞之時將汝至翁金之日約略定期奏聞又將到土喇日期詢問喀爾喀好鄉導以地名與日期約略議定奏聞朕所統之兵行走駐劄皆因西路兵之故量寬時日為此特諭知之三月十九日大將軍伯費揚古奏疏至疏稱撫逺大將軍領侍衛內大臣伯臣費揚古等謹奏為奏聞事臣等率領大兵於三月十三日至喀倫即於十四日分派京師及右衛兵十五日臣費揚古率領京師大兵大同緑旗官兵由東路進揚威將軍覺羅舒恕率領右衛大兵由西路進詳詢鄉導等將駐宿之地約略分擬十八宿於四月初三日至翁金又二十一宿於是月二十四日至土喇又三宿於二十七日至巴顏烏蘭又據副都統馮國相報稱上所頒發炮八位於三月初七日至拖里胡地方等語臣等候之則遲遂留都統伊勒慎每旗派護軍參領二員護軍百人防衛炮位急速趕來因令於喀倫待之至翁金後另行奏聞外為此謹奏康煕三十五年三月十四日題等因前來十九日特旨諭大將軍伯費揚古曰爾至喀倫算至翁金土喇日期奏疏於駐蹕揆宿三月十九日蚤到汝等奏稱至土喇在四月二十四日朕所統之兵因雨雪稍阻兼以趲候重車雖急速前行於二十四日之先斷不能至土喇汝所領兵於三月十六日之雨或有遲阻將日期另行開除具奏若無所遲阻至翁金奏聞之時亦另行明白具奏汝軍中馬匹何如運米車輛已至何處得寧夏兵消息否此等情形每具疏時必行奏聞正月二十八日奔來喀爾喀之逃人言噶爾丹在土喇河上流為此特諭四月十三日護軍參領車克楚前鋒侍衛竒薩穆喀爾喀盆楚克貝子之侍衛穆渣哈爾同鄉導二人蒙古二人共七人來奏云臣等遵旨夜行晝伏相機偵探於伊渣爾厄爾幾納地方見噶爾丹形迹有厄魯特是實臣等於回行第二日遇科爾沁土謝圖親王沙津遣往噶爾丹之俄七里等十五人伊等云噶爾丹入吾計中矣彼言現今領俄羅斯炮手鳥鎗兵六萬再俟六萬俄羅斯兵至即順克魯倫河而下直抵科爾沁汝之二王著即應合而行因將我等甚加敬禮遣回我等應與汝輩同行但現今我等之後有厄魯特哨兵相隨汝等可慮此時即相別速行奏聞我等亦接踵而往等語此信至即特旨諭大將軍伯費揚古曰諭大將軍伯費揚古朕所統之兵近喀倫地方曾遣參領車克楚前鋒侍衛奇薩穆於克魯倫一帶地方踹尋蹤迹偵探消息四月十二日車克楚等至奏云臣等初九日至伊渣爾厄爾幾納地方觀看見其形迹自彼處回行於初十日遇沙津王所遣俄七里等十五人伊等云噶爾丹於是月初從土喇向克魯倫移營第三日將我等遣回噶爾丹在達爾罕敖喇山等語由是觀之噶爾丹於朕所統之兵相近矣此賊乃狡詐叵測之人潰遁時未必回奔土喇必渡克魯倫河或自俄濃巴爾即奔塞稜格地方或繞巴顏烏蘭之後詭遁汝兩路之兵知其順克魯倫而下若隨之而往落空亦未可定朕為此深切憂慮特專遣人爾大將軍費揚古將彼處地方凡賊可以脫逃之路周詳詢問加意堵截勿以其順下流而來遂輕視之為此特諭寫敕遣侍衛殷渣納同鄉導波羅等十五人令其沿喀倫直尋翁金而往務期必達大將軍伯費揚古軍中之信自三月十九日到後至四月二十一日大將軍伯費揚古奏疏始到疏稱撫逺大將軍領侍衛內大臣伯臣費揚古等謹奏為奏聞事皇上三月十九日所頒諭旨於本月二十八日駐劄阿爾哈林圖地方未時至三月十六日臣領兵所行之路無雨是月二十二日有雨薄暮復雪途中稍有泥濘兵行遲一二日之程又炮車一日止行二三十里一時不能隨大兵故將神威大炮留於喀倫派緑旗官兵守護頃上所頒新製炮八位景山子母炮二十四位江南所進子母炮五十五位用大同所餧養隨行駱駝二百隻載之而行運米卿員喻成龍侍讀學士范承烈於三月二十四日臣駐劄招哈察罕和朔地方時趕至臣處言運米車輛在二十二三日可出喀倫途中水草稀少且牲口皆從太原一直行來是以盡皆疲瘦請將十五日口糧留於喀倫以備大兵凱旋之用將十五日口糧運至翁金等地方備用其二十日口糧用小車及挽車牲口中擇其可用者運至土喇以供應大兵等語大兵口糧所關緊要臣等會議將十五日口糧留於喀倫其三十五日口糧盡行運至土喇小車及所選挽車牲口不足則將載炮所餘隨行駱駝令其助運議定遣喻成龍等往料理臣從歸化城起程時將寧夏兵何時啓行何日可至翁金曾遣人問之孫思克等回稱我等所領之兵以二月二十二日啓行三十八日可至翁金等語適諭旨至即遣人往令將寧夏兵今至何處速行咨報臣於四月初六日在翁金口之東席喇胡魯蘇台地方駐劄大兵因按鑿井處下營是以分為二隊而行初七日駐師一日以俟後隊大兵初八日齊至烏闌厄爾幾地方駐劄寧夏之兵若於初九日亦至烏闌厄爾幾臣等或一路進兵或分路進兵公同商酌定議俟啇南多爾即赴御前時明白具奏儻或不至正月二十八日曾有奔來喀爾喀之逃人既言噶爾丹在土喇上流臣等焉可遲緩等待則於初十日起營前往土喇寧夏兵到日令其隨之而進又鄉導等約略計算自烏闌厄爾幾初十日起營經二十二宿於次月初三日可至土喇河阿喇克山之西克勒和朔地方為此謹具奏聞康熙三十五年四月初七日題本月二十二日特旨諭大將軍伯費揚古曰汝初七日奏疏以二十一日酉時到覽奏五月初三日可至土喇等語汝等原奏稱二十三日至土喇二十七日至巴顏烏蘭朕所統之兵水草皆得無誤故擬定二十五日至克魯倫河今遣發前鋒已觀其形迹得其活口噶爾丹有向克魯倫下流情狀距朕五日之程此其間汝宜纍次遣人來奏則朕易於相待因汝等久未奏聞不知已至何處恐等待日期遲誤急速前進遂甚在汝等之先今等待與前進兩端皆屬機要事關重大汝等作何行走宜速報聞兩路之兵有先到數日者必相待而行原有成約朕兹相待而行儻不得已日期所關至大則相機而行為此特諭遣侍衛額林辰鄉導渣卜等仍由捷徑速往務期必達一面傳集前後營諸王諸皇子內大臣都統前鋒統領護軍統領副都統以上諸臣諭曰前者大將軍伯費揚古奏稱四月二十四日至土喇二十七日至巴顏烏闌故整齊中路大兵已近抵敵所今大將軍伯費揚古等途中阻滯情由多日不行奏聞頃忽更改日期具奏現今朕所統之兵既已近臨噶爾丹無庸等待伯費揚古之兵欲即行前進鑲紅旗大營皇子胤祉公福善副都統孫渣七侍郎席爾達等議稱不必等待即行前進餘諸王皇子大臣皆稱此番大兵非尋常可比皇上親帥征討萬分之中微有未周所關非輕伯費揚古所展日期十餘日耳宜少待之不致甚遲朕採聽衆論嚴肅斥堠躬親巡察每日防禦萬一噶爾丹聞大兵至恐其逺遁皆預備之四月二十六日啇南多爾即賫大將軍伯費揚古所奏二疏至其一疏稱撫逺大將軍領侍衛內大臣伯臣費揚古等謹奏為題明事前者卿員喻成龍等前赴臣所稱運米車輛在二十二三日可出喀倫牲口皆從太原一直行來是以盡皆疲瘦等語臣等會議將十五日口糧留於喀倫其三十五日口糧令運至土喇計議已定遣喻成龍等往料理又寧夏之兵何時啓行何日可至翁金遣人往問孫思克等回稱已於二月二十二日啓行三十八日可至翁金等語臣於四月初六日駐劄席拉胡魯蘇台地方初七日駐兵一日以待後隊大兵初八日齊至烏闌厄爾幾地方駐劄寧夏之兵若止烏闌厄爾幾或一路進兵或分路進兵公同商酌定議俟商南多爾即前往時明白具奏儻仍不至臣等焉可遲緩等待則於初十日啓行前往土喇寧夏兵到日令其隨之而進自烏闌厄爾幾初十日起營經二十二宿於次月初三日可至土喇河阿喇克山之西克勒和朔地方俱經奏聞在案初九日據運米侍郎王國昌等報稱我等欽遵上諭至山西太原府會同巡撫商議需用牲口甚多各州縣千里數百里不等逺處採買至太原府齊集裝載兵役口糧青草未生之際牲口所需豆料及器械帳房鑼鍋板片等物於二月初八日陸續從太原府起程經鴈門關險峻之山行千餘里至湖灘河朔又將大兵正項口糧押車兵役口糧及駱駝鞍屉繩索等物攤載車輛雖重而牲口壯健視有水處下營行走今水草稀少處處多有沙石牲口漸至疲瘦倒斃不意到喀倫海柳圖等處之車輛遇二十一二十二兩日兩夜大雨北風飇發牲口雖經遮蔽因寒冷而斃者甚多前後倒斃牲口數目將效力人等所捐牲口四百餘匹補用尚且不足又將我等本身及官員隨來效力人等所騎馬騾幫助今挽車馬騾疲乏者甚多米雖不能全行運至但大兵口糧關係最為緊急又斷然不可遲誤是以將現今稍可用之牲口令其牽挽小車裝載大兵二十日口糧竭力運至大兵外又將十日口糧進送至郭多里巴爾哈孫地方以備大兵凱旋之用請留二十日口糧於喀倫但小車之行甚緩趕至大兵日期不能豫必大兵接續米糧關係緊要大將軍若不相助照看貽誤亦未可定今不預行報明至臨時雖加我等重罪於事亦屬無益行在相隔道逺故將此等艱難之處報知大將軍求大將軍垂念將兵米二事措處萬全轉奏等語臣即刻回文云大兵深入征討口糧所關甚為緊要前給過八十日口糧食用已五十日矣至土喇時即係散給口糧之期郭多里巴爾哈孫翁金距土喇不逺留於郭多里巴爾哈孫翁金之米運至土喇亦不為難今又將隨行駱駝遣往汝等處幫助汝等仍照前所奏將三十五日口糧急速趲來尾大兵而行不可遲延去訖臣率領大兵初十日從烏闌厄爾幾起行至察罕和朔振武將軍孫思克西安將軍博濟副都統阿南達率領西安滿兵五百人輕騎而來於十一日趕至臣等於察罕和朔地方孫思克等云我所帶領緑旗兵七千部文一到隨即起程倉猝間馬匹牲口難於齊備兼以途中於三月二十一二十二日遇大風雨馬匹牲口半致擔誤我所領之兵現今在後距大兵有十日之程皆接續而行是以我選擇兵二千人親自率領趕至大兵同行博濟云我所帶領滿兵二千漢軍兵一千途中遇風雨馬匹稍有擔誤與大將軍所領大兵相距十日之程難以尅期趕至將此兵內選擇二千人親身率領急速趕至大兵同行今既議運往翁金米石一半運至土喇請將馬匹缺少之兵千人即令其防護運往土喇米石隨之而行如此則於兵米二者似乎皆有禆益等語於是臣等公同會議今大兵直趨噶爾丹所在之處搗其巢穴而𠞰滅之其西安寧夏之滿兵二千人緑旗兵二千人俱應照將軍孫思克博濟等所言其餘滿兵一千人令防護按察使囊吉理等所運送之米此兵留西安副都統席爾哈達祖良璧駐防協領等管轄其半留翁金之米著於將軍孫思克標下所留兵丁內撥派五百人令副將張憲載管轄守護又陜西西安寧夏等處調來滿洲漢軍緑旗兵四千人與大兵相距有十日之程不便由兩路進此兵相應隨臣所進之路急速前來與臣等一路同行為此謹具奏聞其一疏稱撫逺大將軍領侍衛內大臣伯臣費揚古等謹奏為奏聞事準兵部咨稱據將軍孫思克疏請留寧夏兵丁回時所食一月之糧在後送至翁金地方應令孫思克等於翁金地方少留官兵此所運一月之糧及馱米牲口一並收存交割之後其運米官兵著令即回等語臣等竊惟大兵進剿口糧關係甚屬緊要米既運至翁金則去土喇路程不逺囊吉理等所運送一月口糧一半留於翁金將一半即用其腳力運至土喇似屬有益按察使囊吉理副將楊琳及運米各官皆係伊本省大臣稱為才優揀選舉出之人料此米可以運至土喇又行文按察使囊吉理副將楊琳等為口糧關係甚要事準兵部移咨振武將軍孫思克疏稱進剿之兵若隨身挈帶四月口糧則滿兵跟隨人少緑旗兵全無跟隨之人挈帶而行殊屬煩難臣等會議相應減去三千跟隨人役口糧令進剿之兵挈帶三月口糧一月乾糧兵丁回時所食一月之糧暫留在後趲運至翁金此運米關係重大不得不選文武中賢能要員派出運送因將鞏昌按察使囊吉理漢中城守營副將楊琳洮岷道董紹孔等文武各官酌量擬派臣等於凡用兵事務料理皆畢今兵於二月二十二日自寧夏起程為此謹具奏聞康熙三十五年二月二十四日題三月初八日奉旨該部知道等因欽遵密封到部查係報明料理出兵事宜官兵從寧夏起程情由應無庸議覆將此移咨知會撫逺大將軍等因前來照得大兵進剿口糧關係甚要按察使囊吉理副將楊琳汝等俱係朝廷簡任要職宜仰副皇上任用之意殫竭心思黽勉效力今各路大兵將噶爾丹聲罪致討搗其巢穴而剿滅之口糧所關更為緊要正為臣子者所當圖效之際前者將軍孫思克等所議未可拘執汝等運送萬人所需一月口糧之內一半仍照孫思克從前所奏留貯翁金交與孫思克等所留看守米石官兵令其加意守護其一半即以爾等運至翁金之馬匹牲口腳力速行趲運至土喇軍前其防護運往土喇米石於西安副都統席爾哈達祖良璧處留兵一千名令其護送此所指等處將米運至汝等勞績亦不小矣等因已經行文為此謹具奏聞康熙三十五年四月十二日題商南多爾即口奏西邊之兵不便兩路行走故從一路來馬匹困乏徒步者多京師右衛西安及西邊緑旗兵共一萬四千人前來餘皆遣回其大兵尾後所設驛站亦且疲敝所運之米全然未至等語因此言復令會議皆以西二路兵今歸一路此兵甚為勞苦若噶爾丹人衆馬健則深為可慮且科爾沁沙津王之俄七里曾有俄羅斯兵六萬之語關係非輕因稍有瞻顧朕諭之曰朕所統大兵不勞而至人得休息馬皆肥壯不獨滿兵與緑旗兵丁雖跟隨人役亦無一不至者如此精鋭整齊人人願效死力敵雖有十萬朕躬親帥領相機戰剿一靣遣使賊勢若衆則與我兵交戰勢若不敵則潰遁但此賊若逃朕與爾等恐尚有後悔之處乎議政諸臣云賊寇潰遁則吾事濟矣相應遣使衆議僉同於是派出使臣曉以利害差遣已定嗣是選擇喀爾喀納木渣爾郡王之長史庫即根理藩院撥什庫訥爾布等七人諭以爾等前往克魯倫河之歐德哈爾哈地方潛藏渡河伏於北山遡流儘力前往偵探曽聞噶爾丹順河下流而行今或恐已過我兵駐劄之處為此遣往伊等回稱臣等遵旨至歐德哈爾哈踹看蹤迹知賊未過此處我等渡河溯流而上行五十餘里至塔爾吉而即地方見一人我等將欲擒拿復旨遂窮追之適遇厄魯特伏賊三十餘人欲圍我等飛騎奔來正當不能走脫之時忽風霾大作從後將我等環繞遮蔽彼此不能相見因順風而出出時觀看已至古爾班圖爾漢口即此知我皇上洪福上天眷佑遂向天叩頭而來厄魯特在塔爾吉而即地方是實又曾遣親近一等侍衛喀瓦爾達一等侍衛巴當阿一等侍衛巴爾出喀等酌同前鋒等令至古爾班圖爾漢一帶地方潛探賊哨來報於二十四日駐蹕察罕布喇克時回到奏稱臣等遵旨往日夜間行過巴爾泰哈之山黎明時適至西圖爾漢山上賊哨始至我等避過偵看賊哨駐於山上尋水北向克魯倫河瞭望見有煙起厄魯特在此是實恐其窺見我等遮蔽於山曲折而來等語觀此兩次情節益顯然洞悉矣聖祖仁皇帝御製文第二集卷三十六
