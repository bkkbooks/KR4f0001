body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷二十七雜著古文評論國語穆王將征犬戎布令修德不勤兵於遠自是先王撫馭荒服之要道穆王以不享征之棄祖訓矣故先儒謂國語列周國風列王於此見周德之衰厲王虐國人謗王古稱愚者之言聖人擇焉雖邇言謭說亦得以登於鞀鐸而達之於上者蓋古人容納之廣忠厚之至也厲王說榮夷公王者不言有無况専之乎榮公用而周敗可為千古嗜利之戒宣王即位不藉千畝周禮因井田而制軍賦故務農講武相為表裏篇中征則有威守則有財二語正見兵農之合宣王既喪南國之師古者治民之官日與民相習故不料而知其多少至宣王時農務漸弛因師敗而遂有料民之舉治兵急而治農之政愈緩矣晉文公既定襄王於郟晉文自以功在王室侈然自大妄請天子之禮襄王舉先王之舊章以折服之舒婉中倍極峻厲遂使晉文愧悚退聽皇哉訓誥之文定王使單襄公聘於宋廢教棄制蔑官犯令皆亡國之政也而犯令尤甚文中序次自有輕重榖洛鬪大意總在修德行政穀洛自然效順反復敷陳極為愷摯周景王將鑄大錢景王改鑄大錢原以救灾備患然不合民情故單穆公以為佐灾可見王道在乎因民海鳥曰爰居無名之祀聖王不録曲禮曰淫祀無福則妄祀亦何益哉此篇可與禮經相發眀宣公夏濫於泗淵藏罟不如置里革於側所謂在人不在笏也通篇典麗謹嚴洵文章極則公父文伯退朝敬姜勞則思逸則淫數語可謂見道之言當與無逸豳風諸篇同讀仲尼在陳聖人博學多識於此可見齊閭􅉌來盟發揮藴義甚大非足恭之謂桓公自莒反于齊鮑叔薦管仲於桓公委寄以齊國之重卒能顯名諸侯取威定霸孔子亦許其功而稱其仁則鮑叔之推賢桓公之善任皆彰彰於後世矣正月之朝鄉長復事規畫明整治國如治家誠霸佐才也桓公欲從事于諸侯鋪叙霸功幾同王道但其親睦諸侯全是以謀以力王霸之所由分也至文之簡練典重洵是史漢紀傳之祖文公問于胥臣有聖質然後有聖學詩曰追琢其章金玉其相皆質與學相須之義叔向見韓宣子大夫憂貧寧獨身之灾殃將及國故治世首禁官邪莊王使士亹傅太子葴楚莊伯者猶鄭重國夲甚矣豫教之宜備靈王為章華之臺敷論舂容傅大如聆黃鐘大呂穆然清廟之音左史倚相廷見申公子亹聞倚相之言惕然而懼子亹可謂能受善矣靈王虐白公子張驟諫近臣諫遠臣謗輿人誦用以自誥三代盛王所由隆也靈王以規為瑱禍及乾溪宜哉鬪且廷見令尹子常積貨蓄怨語警切聳動可為當官之戒王孫圉聘於晉春秋使臣皆極一時賢士大夫之選故對揚鄰國恆不辱命吳王夫差起師伐越越君臣之隂謀全在廣侈吳王之心一語麋鹿逰姑蘇者以此吳王夫差告諸大夫申胥事前之言洞若觀火吳越之興亡决矣固不待鴟夷投江時也吳王還自伐齊吳之申胥楚之范增老謀不用屈志而死千古同慨吳王夫差還自黃池隂謀猛鷙君臣夫婦致死一心積之二十年吳安得不亡記者歸美之於下羣臣集衆謀有以也夫越王句踐即位三年而欲伐吳敬怠之分治忽所由關也無時不敬則可以久安長治句踐不能敬之於始既危而後懼隱忍圖功僅乃獲濟亦幸矣哉公羊傳元年春王正月隱公大一統之語實有關於名教蓋春秋之作率天下以尊周室正月繫王示周德雖衰天命未改之意癸未葬宋繆公隱公三年公穀文短調間用長句亦復逶迤有致紀侯大去其國莊公四年以吞滅為念則復讐為長亂之階以雪恥為心則復讐為大義之舉故公羊於襄公猶有取焉夏四月四卜郊不從乃免牲猶三望僖公三十一年魯郊非禮孔子修春秋因卜郊而寓意諸儒論之詳矣惟公羊簡而盡公子遂如齊納幣文公二年聖人緣人情而制禮非由外鑠也以人心為皆有之一語何等剴切毛伯來求金文公九年王者無求一語持論正大若穀梁所云求車猶可求金甚矣非篤論也世室屋壞文公十三年昔魯公之魯而周公仍留治東都以繫天下之望公羊所謂欲天下之一乎周者是也何休注公羊以為嫌於周公之魯則恐天下迥心趨鄉之何其淺視乎成王周公也晉放其大夫胥甲父于衛宣公元年讀此傳知古君臣之間去就有禮春秋時不能盡然晉趙盾衛孫冕侵陳宣公六年比事屬辭層折盡致較左氏尤勝冬葬許悼公昭公十九年聽止赦止見春秋筆削大公無私此與趙盾事遂為實録西狩獲麟哀公十四年章法之妙若斷若續忽合忽離穀梁傳元年春王正月隱公伯夷叔齊之讓國求仁而得仁泰伯虞仲之讓國避地以興周若隱之讓國則成惠公之邪心啓桓公之篡弒故曰小道也壬申御廩災乙亥嘗桓公十四年周官時享前期十日師執事而卜日誓戒今壬申乙亥相距四日不卜不戒故穀梁子以為志不敬也臧孫辰告糴于齊莊公二十八年觀此見積貯備荒有國家者之急務國非其國君子譏之虞師晉師滅夏陽僖公二年三傳無異同而穀梁叙事簡要文尤逸宕諸侯盟于首戴僖公五年篇中以尊王為主亦反經行權之意晉殺其大夫里克僖公十年筆筆生動當時情事躍然在人耳目之間初稅畝宣公十五年公田之法十取其一今又履其餘畝先王之良法美意其謂之何是以傳者交譏焉大饑襄公二十四年觀大侵之禮見先王畏天勤民實心實政秋搜于紅昭公八年古奧典贍可補周禮所未備戰國䇿司馬錯張儀論伐韓蜀戰國之時不復知有周天子矣錯獨曰劫天子惡名也大義凛然後魯肅之存劉王猛之戒不伐晋亦同此意甘茂拔宜陽讒臣在內大將鮮有能成功於外者此古今所同慨也甘茂之言剴切曲暢可為萬世鑒黃歇說秦王當時䇿士往往嫁禍韓魏如黃歇之意在紓楚患耳逮韓魏既亡不三年楚亦滅矣所謂滅六國者六國也不信然耶文特雄辨應侯謂昭王先設兩喻正意只淡淡說過蓋前既危言切論至是知昭王之心已移故苐借比喻之辭一申明其說使聽者竦然武安君諫秦昭王伐趙以趙之殘而難攻以韓魏楚之完而易取可見兵無常强亦無常弱而其機則在能懼與否而已鄒忌諷齊王納諫文甚諧麗動人却是千古不易之正論淳于髠一日見七士寥寥數語為歐陽朋黨論之所自出人以薦賢為嫌者可以袪其惑矣馮暖客孟嘗君馮暖焚劵為孟嘗結民志也若漢之文景時下蠲租之令其得民也大矣豈區區示義之足云蘇子說齊閔王不為福先不為禍始此權藉之說也聖人則以上順天道為權下合人心為藉王者有征無戰用此道也田單攻狄淋漓生動語語雋冷莊辛論幸臣文近於賦瑰麗可觀蘇秦以合從說趙文勢忽斷忽連若長江萬里波瀾無盡若移此神志明內聖外王之道仁義禮智之功當時所就又復何如哉觸讋說趙太后從容委曲而取成功可謂善於進言者魯仲連義不帝秦不帝秦大義也辭封爵高節也責新垣衍處風㫖奕奕魯君酒色味論戰國之君皆講富强魯君獨舉四事警切動人尚有周公之遺教也信陵君諫魏王四公子中信陵最賢即此一書審度事理瞭如指掌雖善謀國者何以加之郭隗說燕昭王昭王用郭隗之言卑躬致士卒復齊讐可謂賢矣蘇代約燕王形容秦處盡得其情狀文筆亦有循環刺蜚之致樂毅去燕適趙毅報惠王書雖急於自明其情志悱惻文辭深婉固書牘之祖也秦孝公下令國中孝公急思光復先業博謀於賓客羣臣得勵精圖治之意惜乎不知修德行仁沾沾於竒計彊秦也趙良說商君商鞅以殘忍鍥刻之性變法速效苟且目前何暇計治理之純疵耶孝公舉國以從誤矣李斯諫逐客書古人搜羅賢才招以弓旌縻以好爵若既入其國而以客逐之則非矣李斯本邪辟之學此篇論取材宜廣則不可以人廢言也子嬰進諫二世書信任便嬖輕棄老成鮮有不敗人家國者漢唐之季覆轍相尋尤可浩歎騶忌子以鼓琴見齊威王樂記云聲音之道與政相通確有至理淳于髠說騶忌子持論亦正特務為隱語終是戰國習氣楚人對頃襄王諷楚報秦有得於春秋復仇之㫖全以譬喻行文彌覺古雋聖祖仁皇帝御製文第三集卷二十七
