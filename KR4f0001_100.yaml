body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷五目録敕諭諭吏部諭刑部諭大學士勒德洪明珠諭大學士明珠王熙宋德宜余國柱學士禪布吳喇岱額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦諭大學士勒德洪眀珠王熙宋德宜余國柱學士禪布額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦諭大學士勒德洪眀珠王熙宋德宜余國柱學士禪布額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦諭內閣諭大學士勒德洪明珠諭大學士勒德洪明珠諭內閣諭大學士明珠學士禪布額爾赫圖舜拜諭尚書鄂爾圖郎中伊爾克圖溫保諭八旗都統三品以上官諭滿洲管漢軍副都統參領等諭內閣諭內閣諭大學士勒德洪眀珠學士齊穡額爾赫圖舜拜多奇凱音布趙山諭戶部諭刑部諭大學士眀珠諭大學士眀珠諭內閣等衙門諭大學士勒德洪等諭大學士勒德洪等
