body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻五目録勅諭諭吏部諭刑部諭大學士勒徳洪明珠諭大學士明珠王熙宋徳宜余國柱學士禪布吳喇岱額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦諭大學士勒徳洪眀珠王熙宋徳宜余國柱學士禪布額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦諭大學士勒徳洪眀珠王熙宋徳宜余國柱學士禪布額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦諭内閣諭大學士勒徳洪明珠諭大學士勒徳洪明珠諭内閣諭大學士明珠學士禪布額爾赫圖舜拜諭尚書鄂爾圖郎中伊爾克圖温保諭八旗都統三品以上官諭滿洲管漢軍副都統㕘領等諭内閣諭内閣諭大學士勒徳洪眀珠學士齊穡額爾赫圖舜拜多奇凱音布趙山諭戸部諭刑部諭大學士眀珠諭大學士眀珠諭内閣等衙門諭大學士勒徳洪等諭大學士勒徳洪等
