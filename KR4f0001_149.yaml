body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻二十九表上太皇太后萬夀表康熙二十五年二月初八日伏以壼敎垂仁得一綏永寧之慶母儀示範含元彰至順之符徽音播於三朝𢎞開岳籙聖澤敷於萬國備斂箕疇宫禁胥歡臣民咸喜恭惟聖祖母昭聖慈夀恭簡安懿章慶敦惠温荘康和仁宣太皇太后陛下道優貞吉徳協化光懿則承天文母啓興王之業嘉禎誕聖堯門𢎞裕後之模慈惠聿著含飴聲揚彤管恭儉嘗先服練美備瑶闈徽稱冠今古之尊仁夀迓升恒之祉兹值夾鍾應律正蓂開八葉之辰更逢奎宿迎陽恰桃結蟠枝之實指蓬萊而獻瑞環長樂以稱觴臣幼荷深恩長資明訓孝養難酬㒺極尊崇聊展承歡伏願景命彌新純禧益茂叶八千嵗以為春東朝永蒞錫億萬年而成算西母常來臣踴躍懽忭之至奏書奏皇太后書謹奏聖母皇太后臣違慈顏日久所以未敢專使請安者軍中來往人頻則語言淆雜於事機無益且臣意若仰荷天佑迅成大功将同㨗音竝奏以此藴結於懷恒於夢寐之中屢候聖母興居不勝瞻仰兹故再拜恭請萬安伏祈聖母手諭示知之此間水泉清而地氣寒臣體中甚佳諸皇子諸王皆各安善大小諸臣以至軍士俱好臣所統兵無有滯誤咸整肅以至糧車亦接續而來但以待伯費揚古之兵遂多需時日耳噶爾丹所在距我師甚近彼聞臣親帥兵來必爾竄逃今但臣一路進兵則恐其途徑既多彼将從他處奔突總之此行天心眷顧似有可憑伏望聖慈寛舒以待之五月初旬若得事竣我軍之馬得草已壯及六月初十日可以還京為此特具奏章自瀚海内察罕布喇克地方馳聞康熙三十五年四月二十七日奏皇太后書謹奏聞行軍班師始末仰請慈安事臣自出京畿軍行在道日惟訓習軍士愛惜戰馬周防哨瞭申明賞罰計程行四十日可抵其處因待伯費揚古期㑹之兵沿途駐師殆及一月以此遂致遲緩至於上天仁愛事事黙垂眷佑水泉乏絶之地倏爾清流沸湧克魯倫地旱甚噶爾丹馬畜痩斃自正月以至於今求雨不雨草枯如冬我兵甫至而雨草遂茂生且來降之厄魯特問我軍云此地三日前青草曽無一莖今何以忽焉而生汝師中誠有善於求雨者乎又見我師於河中捕魚彼云汝師捕之輒爾多獲我等捕之一無所得於此見我等口禄絶矣我軍追逐厄魯特凡五日見其所遺佛經帳房所自殺婦人稚子及疾病之人釜鬵釀具網罟甲胄鞍轡衣服食用木器竝在釜之羮在革之酪盡其所有貧窮度日之物率皆委棄其垂首䑕竄之狀殊不堪觀矣比問蒙古及喀爾喀等曰如此捐棄逃竄汝等視之以為何如皆云此不但棄其重器物雖輕物亦棄之度日之資咸盡矣惟倉皇求生竝其所屬之人皆不暇顧又喀爾喀之言曰此即我等當日情形我等叨䝉聖主恩養得以有生否則盡委溝壑矣今噶爾丹誰復豢養必窮困盡絶而已其言如此以臣觀之果然噶爾丹雖經逃遁料其斷不能復來因灼見其情形蹤跡如此遂酌遣将士窮追往迎伯費揚古之軍蓋此行也臣統大兵深入賊望風遁逃全師凱旋者誠大慶也誠大幸也且蒙古之性情地方之水草兵法之宜守宜戰宜招徠宜遣使宜㷊燎及斷其道路防禦堵截難易機宜目所洞悉身所經歴咸已知之自兹以後亦甚易易矣臣於六月初十内可至京師臣此行乃國家福祉上天眷佑為此不勝欣喜惓切具奏以聞康熙三十五年五月十三日奏皇太后書謹奏為報聞大軍所指一切機宜咸奏膚功上天協應至於已極仰請萬安事臣君臨萬邦撫御天下於兹三十餘年數經擾亂俱已削平惟此厄魯特噶爾丹自烏瀾布通遁逃以來悖棄誓言希圖報復摇動外藩桀驁已甚凡此皆臣所灼知此賊一日不滅我國家一日不寧是以前後周悉思維不憚一身勞苦大漠沙磧多方跋涉自古迄今軍旅未行之路冒遠徂征出其不意以此强㓂肝膽為之破裂不戰而逃臣窮追五日見其沿途将所用器物盡皆委棄已經逺去更欲前追以今年克魯倫地方草未發生頃始萌茁軍糧漸至短少再四籌度徒勞師衆故度量敵人蹤跡遣兵進追於所遣兵補給二十日口糧班師而還業經馳奏以聞荷蒙上天垂眷俯協人心伯費揚古之兵適至戰於特勒爾卽地方剿殺噶爾丹賊衆子女駝馬牛羊盡皆俘獲厄魯特今已殄滅矣臣不獲定省慈安奉侍左右者凡八十日盡剿賊衆奏凱而旋於六月初十内可以抵京此皆上天黙佑凡在師中人等㒺不踴躍歡忭臣之福慶駢集所向有成臣誠不自知也不勝懇切屏營謹奏以聞康熙三十五年五月十八日奏皇太后書謹奏為報聞臣進邉口日期㳟請聖安事臣違聖母定省日久惓切之忱靡間時刻遠塞徂征荷天篤祐誕奏成功凱旋已於初五日進邉口於沿途見蒙古生計阿巴哈蘇尼特等旗駱駝皆健馬匹較少牛羊饒裕察哈爾八旗御牧地方較前頗覺殷富我上都馬羣因途次經過臣咸視之甚充盛孳息今年塞草蕃廡四種牲畜咸皆肥碩家家皆有湩酒乳酪充牣其中隨臣從軍中來者彼皆挽持其轡勸飲勸食且途中進獻駝馬牛羊不可勝用從軍之馬皆壯故大半遣留於口外馬羣每日來迎於道旁者男婦幼稚約略一二千人臣旋鑣甚速其追隨不及者且将隨至京師途間趨迎拜舞者無算甚覺烜赫有光口内禾苗暢茂為此謹具奏聞康熙三十五年六月初五日奏皇太后書謹奏為遥祝慈夀事臣自離紫闥數隔晨昏瞻企彤闈日依左右頃當小春應律令誕欣逢臣身歴關山未獲捧觴介夀神馳禁籞聊思作頌呼嵩謹遥拜行禮所有年例進祝儀品交皇太子允礽呈上仰希俯鑒兹偶得野物附使申獻一味㫖甘用達微誠於鴈塞千秋有慶正昭景福於鸞階伏願聖母夀厯靡涯與嵗華之竝永嘉禧茂集比山岳以増崇臣不勝懽忭翹切之至康熙三十五年九月二十八日奏皇太后書謹奏為謝恩事十月二十七日頒示慈㫖賫到裘服外衣不勝歡欣但此間河尚未凍帳房中不湏置火天無風雲時而暖燠間或一日思就清涼之處與皇太后違離遥逺意者念如前此之征行過為縈慮也兹時此衣且不服俟再加嚴寒即歡忭而服之二十八日至黄河此即鄂爾多斯部落之境雉兔充盈徧於原野鄂爾多斯之衆預為儲備而迎謁者甚為恭肅至彼當再奏鄂爾多斯去歸化城約百餘里以䋲度之未竟其事在此行圍遣懷皇太后可寛思念之心也康熙三十五年十月二十七日奏皇太后書謹奏為奏聞噶爾丹必來降順確實情形事自今夏以來臣脗知噶爾丹必窮困投降故乗兹時㑹躬出邉外欲收服噶爾丹所屬之人翦其羽翼窮其所往而招降之再為區處以此而來自出塞垣即遣師於哈宻布隆吉爾地方堵截又於喀倫一帶各處堵截俘獲中有願回者皆重加賞賚屢次遣往招降一切行事皆與意相孚合自啟行以至歸化城來投降人口三百有餘阿南達等所俘獲之人并計五百有餘噶爾丹力窮計盡稱欲投降遣其格壘沽英杜拉爾寨桑至此人先曽計議來投沙克肫土謝圖諾爾布等亦知之是以外則仍佯為使臣而私宻問之則皆以實情告與來降之人無異言自土謝圖諾爾布來後噶爾丹自知破壞已極集丹即拉衆寨桑同議衆人言今目前窮蹙已至知必破壞我等為首之寨桑等屢往投順所屬之人逃亡者無日不有今若不往投聖主其将何往若有可往之地及能養贍我等之人指示一處則我等隨之而往若無則我等不能相從居住矣噶爾丹更無計䇿不得已遣我來來時噶爾丹丹即拉呼我近前避人而靣告之曰我向來所行乖戾以致如此汝至看彼處大臣情狀若有留我之意我即投奔等語我因請問屢次為使臣前往對答言詞當稍剛直乎抑謙遜乎噶爾丹丹即拉云我等今無所往惟乞活命言詞稍有違拂可乎諭㫖如何即當遵㫖不可有違拂之言既出丹即拉私向我言汝之此行我等所餘厄魯特數人生死之命皆係於汝當黽勉敬慎又阿巴寨桑車凌奔寨桑執我之手而告之曰汝速往速回我等候汝消息即往投聖主汝妻子我等照看之問彼處何所食答云薩克薩圖胡魯克地方野獸多我等無多人得野獸則食野獸不得野獸則殺馬以食今鳥鎗藥盡設弩機以捕之地甚寒冷凍死者往往恒有我來時九月十二日今且凍死者益多矣我等厄魯特應受罪孽故遲死以至今日因嗟歎淚下又噶爾丹向衆言曰天下之人各不相同仁聖太平皇帝洵為竒異其愛養人民敵國皆被其澤故我國之人盡皆歸往矣因歎息不已以此觀之投降真實臣荷天心眷佑意謂此事可以觀厥成矣為此恭聞之皇太后亦同喜悅并請萬安特奏康熙三十五年十一月二十六日奏皇太后書謹奏為恭謝慈恩仰請萬安事夲月十六日駐營鄂爾多斯之境同噶拉克水泊皇太后慈㫖以臣生日賜金銀茶壺二執賫到臣懽忭拜受仰惟母后於二千里之外常為思念寄以如許之物臣非不知縈懷之切也去年自春中之月至夏之中自秋杪之月至冬之末今復春将盡矣遠在原野不克侍左右而問安者亦祗為此一噶爾丹耳今賊子就擒其下離散乗此之時不可不盡去其根株此蓋斷不容已之勢臣至寧夏相機㑹而行為此謹具謝恩以奏康熙三十六年三月十六日聖祖仁皇帝御製文第二集巻二十九
