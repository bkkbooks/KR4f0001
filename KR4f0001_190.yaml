body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷五十目録古今體詩五十首示江南浙江守土諸臣再過鷲峰登吳山望錢塘江虎跑泉由淨慈寺經南屛諸山孤山放鶴亭玉泉有五色魚賜名清漣寺西湖再作浙省道上書懷桑林乍緑蠶事方興詩以嘉之曉發嘉興花山支硎山回鑾復過惠山舟行野望駐蹕江寧偶述修報恩寺塔初畢登之過明太祖陵有感月夜登燕子磯江行憶暢春園牡丹金山雨望山中晚霽中泠泉望焦山念已已曽登其上念淮揚居民特留漕糧二十萬以濟之回鑾之日復諄諭所司使布實惠泛洪澤湖偶詠漁舟夜泊渡河北歸宿遷過八閘仲子廟途次端午山左道中望岱憶舊闕里重修思欲一往以天氣日暑急奉慈輿北歸未得瞻視紀詩八韻見途中夏麥將熟志喜北境候兄裕親王江南風雨阻回程二十天近京又是微旱五月二十五日霖雨如注喜雨賜峨􅖭老僧察永定河巡子牙河建壩盛夏晚偶成七夕觀千葉蓮暢春園觀稻時七月十一日也詠桐老圖賜裕親王為考試歎禁園秋霽
