body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻三十九雜著古文評論歐陽修勸學詔斟酌得宜意頗近古弛茶禁詔慮周細事言復仁藹論刪去九經正義中讖緯劄子漢儒於經學表章微緒最為有功而間引讖緯未免駁雜此論自是卓識論臺諫官唐介等冝早牽復劄子於氣度舒徐中見其爽直論事極中窽㑹乞補館職劄子清言如屑可謂其風肆好者矣論杜衍范仲淹等罷政事狀從四人事跡顯然處一一引証更不自立議論遂爾警切上范司諫書情義諄篤文思安雅大家中有數文字代人上王樞密求先集序書有起伏有開闔氣雄而筆宕本論揭出禮義二字見歐陽為學有本領處以此繼昌黎之後武倡濂洛之先聲扶翼名教厥功非小為君難論上文氣峻決是極有斷制之作為君難論下議論與故實相經緯機法略似上篇縱囚論以緊峭之筆發深摯之思故持論甚堅而有力唐書兵志論源流得失洞然指掌唐書禮樂志論綜次淹洽而妙有鎔鍊唐書藝文志論振宕中却寓舂容之概自是歐陽本色唐書食貨志論正議被以雅辭渢渢可誦五代史前蜀王建世家論目光逺矚於治道極有維繫五代史馮道傳論文既髙妙而寓意特深五代史周臣傳論偉論出之閒淡是歐文獨勝處五代史唐六臣傳論興㑹淋漓無意不暢五代史宦者傳論筆愈轉則勢愈緊勢愈緊則意愈切如千巖萬壑洑流迴瀾豈非文章極觀五代史伶官傳論抑揚頓放中無限烟波文之神似龍門者朋黨論敘述最詳論斷最緊故能淹通事理剖決嫌疑集中傑作也送徐無黨南歸序自待甚重故立論皆髙人一層吉州新學記格局闊大波瀾老成王彦章畫像記錯綜開闔自然入妙與栁州段太尉逸事狀神理相合豐樂亭記歸美國家太平以為豐樂之由立言有體而俯仰處更多閒情逸韻胡先生墓表安定教士之法規條最詳篇中專舉此事殆所謂論人必於其大者也瀧岡阡表敘述先徳情文深婉令謦欬千載如生可謂仁孝之言周惇頤太極圖説拈一靜字是周子教人為學喫緊工夫然湏是仁義中正始為有本之學否則淪於空寂矣此可見先儒之言毫無滲漏處張載西銘孔子嘗有言曰仁人事天如事親西銘精奥確切深有以發明孔子之意程子以為仁之體盖有見乎此也與呂微仲書佛氏之説不可窮詰此專就道理上一一辨駁直使之無説自解程顥論君道純儒之學實際之言論王霸識論皆不落第二層可以見其生平學術有原本處論十事十事皆切當時之務儒者之效優於經濟乃爾論新法據理駮論不屑屑勘及利害所見獨超答横渠張子厚先生動亦定静亦定顯微一致是徹上徹下之功若離絶外物以求静此釋老之學所以别於我儒也明道此書最為明白的當晉城縣令題名記義存法戒即一記亦不苟作程頤上仁宗皇帝書所學既純故規模自爾正大代彭思永論濮王典禮引喻甚明持論極正可以折羣喙之紛紛矣上太皇太后書程子自任之重隱然有堯舜其君之意殆與伊訓説命之篇後先光映者也論經筵第一劄子總在本原上著意發為議論故純正宏闊絶無偏駮論經筵第二劄子匡輔翼贊之道略盡是篇易傳序言理精要包舉全易春秋傳序先聖作經之意後人以揣摩穿鑿之見求之則滋晦矣三復此文始知先儒為學精慎如此答朱長文書言貴立誠文以載道此能闡發其㫖覺善誘之心殷然無已顔子所好何學論備舉學聖工夫語語自親歴中得来故無一切影響之言明道先生墓表在伊川言之無溢辭在明道當之無媿色楊時論王安石邪説疏安石學術深為宋世之害龜山得統程門辭而闢之其功偉矣答陳瑩中書疏解精奥足以發揮易理使學者渙如氷釋范育正䝉序正䝉一書廣大精㣲無所不有學者欲探溯道源此其津筏乎王安石范鎮加修撰制詞指鄭重髙旦可著作佐郎制語有典據徳妃沈氏姪孫獻卿可試大理評事制婉愜可誦磨勘轉官制得古人考課遺意王伯恭轉官制莊重得體製甘昭吉入内副都知制古人言正於羣僕侍御之臣此猶得其義崔嶧刑部侍郎致仕制遒古之篇贊勉交備上時政疏詞極嚴勁氣則浩瀚論館職劄子以窮理知人為本立言有要禮論論禮原於性能條暢其説而文亦具有古雋之氣周公論論雖翻新而不入於深刻辨難之文此為雅則三聖人論聖各詣其極非必有意矯世而文勢組舞自奕奕動人上田正言書書意從昌黎諍臣論得来筆自伉爽䖍州學記論議却自醇正文章極其疎古度支副使㕔壁題名記守法者吏即有治人無治法之義文亦筆筆入古慈谿縣學記此與䖍州學記皆借一州一邑發揮大議閎闊重厚之文復讐解極意論駁自成一家之言給事中孔公墓誌銘敘述清疏善於裁制廣西轉運使蘇君墓誌銘敘次中能備輕重淺深之法文亦抑揚盡致㤗州海陵縣主簿許君墓誌銘情辭相稱王深甫墓誌銘通篇純發議論格調自異而文思倍加沉鬱王安國後周書序借周書發論識意矯矯迥别庸音蘇洵上仁宗皇帝書反覆數千言於天下事瞭然心目自爾快切明透上富相公書左縈右拂極文章之勝入正意處隱躍不露更覺深婉修禮書狀思深慮逺故能為此嚴正之論春秋論持論最得要領用筆更沉著精鷙具此識力始可以論斷古今明論辭義精核處自鑿鑿不磨管仲論正意全責仲不能舉賢自代獨見其大而行文極有法度辨姦識見明到要從學問中得来非億中也用間通篇皆説間不足恃而始終不脱却間字開闔縱横文之能事備矣六國稔悉情勢歩歩深入歸到大意如千鈞一發壁壘皆新張益州畫像記不屑屑述益州治狀措詞髙渾而精采光芒溢於毫楮上韓昭文論山陵書忠告之情直諒之言余靖正瑞論涉筆開爽可以正緯書之妄姚璹論論史官職守能中事理不徒資掌故備蒐考也聖祖仁皇帝御製文第三集巻三十九
