body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集總目五卷四十三古今體詩四十一首季夏逰西山憶舊詠花夏日閒坐夏日郊行苦熱戲作雨中逺望日講畢同翰林張英髙士竒勵杜訥看荷初秋中元日蕉園作復逰盤山絶頂春日觀花夏日口外寄宫中避暑暢春園雨後新月喜雨詩十六韻並序南巡再過濟南觀珍珠泉並序經泰山之麓並序再過淮南並序淮城曉霜聞雁蠲江南逋賦並序過維揚並序金山江天寺焦山駐蹕金山雨過錫山虎丘望山後鄧尉山鄧尉小軒望太湖登靈巖晚過吳江入平望並序禾中道上巡幸杭州吳山泛舟西湖西溪題西溪山莊以竹窗二字書賜髙士竒過桃花嶺至玉泉寺湖心亭渡錢塘江山隂卷四十四古今體詩四十八首謁大禹廟登卧龍山越望亭雲栖竹樹甚茂幽蘭滿山虎跑泉並序靈隱寺飛來峰諭浙省將吏軍民並序舟中書懷將逰華山以欲雨未往雨中幸錫山園林惠泉無錫小民以羔羊惠酒爭獻御舟笑而遣之句容雨望巡幸江寧賜江寧文武將士宴於教場再過明故宫江寧駐蹕並序後湖詠幽蘭登報恩寺浮圗上巳日再登金山長江夜月曉發維揚順風揚帆午餘已過秦郵自宿遷解纜一日夜達山東境春晴舟中作途次書懷清明憂旱憶民事作榴花盆景榴花髙有數寸開花一朵挽大行皇后詩四首並序中秋書懷守陵太監崔邦琪侍慈寧宫年久詩以賜之康熙二十八年歲旱冬又無雪朕焦心勞思寢食俱廢二月初間謁陵路遇大雨田野歡聲方少攄朕懷故賦五言律以記之暢春園衆花盛開最為可觀惟緑牡丹清雅迥常世所罕有賦七言絶以記之咏花瓶櫻桃雨後初晴戲作二首命裕親王福全皇長子允禔帥師征厄魯特錫之以詩養病塞北古北塞上望月康熙三十二年六月賜總督佛倫夏燕新蓮二首卷四十五古今體詩五十九首初秋晚雨後觀儀器初秋詠竹閒坐詠竹詠金蓮花祝巴林淑慧大長公主詩戲題自鳴鐘春日舟行夏日幸潞河雜詩三首親閲運河隄舟泊潞河千葉蓮題耕織圗耕第一圖浸種第二圖耕第三圖耙耨第四圖耖第五圖碌碡第六圖布秧第七圖初秧第八圖淤䕃第九圖拔秧第十圖插秧第十一圖一耘第十二圖二耘第十三圖三耘第十四圖灌溉第十五圖收刈第十六圖登場第十七圖持穗第十八圖舂碓第十九圖籭第二十圖簸揚第二十一圖礱第二十二圖入倉第二十三圖祭神織第一圖浴蠶第二圖二眠第三圖三眠第四圖大起第五圖捉績第六圖分箔第七圖採桑第八圖上簇第九圖炙箔第十圖下簇第十一圖擇繭第十二圖窖繭第十三圖練絲第十四圖蠶蛾第十五圖祀謝第十六圖緯第十七圖織第十八圖絡緯第十九圖經第二十圖染色第二十一圖攀花第二十二圖剪帛第二十三圖成衣卷四十六古今體詩四十二首二月三十日親統六軍徂征漠北出居庸關赤城龍門過獨石口出塞訓厲軍士北藩諸部君長來迎沙漠二首風雪致禱遂爾晴霽賜皇子允祉賜皇子允祐春寒軫念將士途中新夏經明成祖勒銘處指示扈從諸臣并序賜皇子允祀帳殿對雨念畿輔四方農事賜將士食違皇太后定省言懷行殿示諸皇子瀚海營夜南望北斗雁栖沙磧并序時乏水於山坡得泉志喜克魯倫河上流雨後草生登山巔下瞰克魯倫河周覽山川形勢指揮營陳渡克魯倫河網魚暫駐待後軍至軍中夜嘗擐甲逹旦噶爾丹潰遁遂窮追之剿滅噶爾丹大捷自賊中投誠來者皆宥之遣使示皇太子捷音示宫中捷音班師至拖陵班師拖陵留皇長子允禔殿後示之行間賜大學士張玉書外藩諸部落絡繹來賀宴賚之入關見雨膏潤澤禾苖茂遂喜而有作彈琴峽南口入京見百官及耆民童稚歡迎道周賜將軍孫思克
