body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十一祭文躬詣天壇祈雨祭文康熙二十六年臣以眇躬仰承天眷撫育羣黎兢兢業業惟恐隕越邇者自春徂夏雨澤愆期京輔亢暘深懷疚懼良由渺躬不德政未咸宜大小臣工罔盡厥心惟君臣之咎於億兆何辜前者循省已過詔告四方而靈雨尚未沾足浹旬仰望彌切焦勞兹特潔蠲吉日率勵羣工實圖洗心齊祓將事呼籲上帝切望慈休謹以牲帛醴齊粢盛親行䖍禱伏冀俯鑒誠懇大沛甘霖俾兆民之咸蘇惟邦家之有慶引領郊壇尚祈昭格謹告天壇謝雨祭文康熙二十六年惟大造無私覆幬萬物顧兹億兆迭荷生成邇者雨澤愆期恐妨穡事臣為民請命齊祓深宮訓誡羣臣共加惕厲謹諏吉日䖍告郊壇乃於吉蠲之辰甘霖旋降更當步禱之夕靈澍再敷浹旬之間四郊優渥從此三農有慶歲事可期是皆帝載洪慈惠及黎庶眇躬何幸徼福蒼穹被德彌深戴恩罔極謹以牲帛醴齊粢盛報謝伏冀歆格躬禱天壇文康熙二十六年臣仰承天祐奉事祖母太皇太后髙年荷庇藉得安康今者疾病驟作一旬以內漸覺沉篤旦夕可慮臣夙夜靡寧寢食捐廢遍問方醫䖍治藥餌罔克奏效五內憂灼莫知所措竊思天心仁愛覆幬無方矧臣眇躬夙䝉慈眷憶自弱齡早失怙恃趨承祖母膝下三十餘年鞠養教誨以至有成設無祖母太皇太后臣斷不能致有今日成立罔極之恩畢生難報直兹危殆方寸憒迷惟有潔蠲擇日謹率羣臣呼籲皇穹伏懇憫念篤誠立垂昭鑒俾沉疴迅起遐算長延若大數或窮願減臣齡冀增太皇太后數年之夀為此匍伏壇下仰祈洪祐不勝懇禱之至天壇祈雨祭文康熙二十八年臣仰承眷祐綏育黎元宵旰兢兢罔敢怠逸惟冀雨暘時若民物阜成乃者仲夏已臨甘霖未沛閔兹農事怵惕靡寧深慮渺躬凉德政治失宜在廷百職未能靖共爾位克殫乃心致此亢暘憂及黔庶今耕夫懸耜播種後期艱食堪虞雲霓望迫若非仰祈穹昊何由俯慰民生用是祇肅齊居兼勵卿士實圖滌祓共竭精誠謹以牲帛醴齊粢盛䖍禱郊壇伏冀昭鑒微衷立施解澤俾三農之普利庶億姓之咸休翹首鴻慈不勝顒切謹告祈榖壇祭文臣纘承鴻業撫育蒸黎惟貴粟重農先務是亟荷天之眷歷紀順成率土元元久沾樂利頃者歲行在已旱暵為憂畿甸之間阻饑尤甚臣覩災饉閔此窮簷宵旰省惟中情惶惕殫心賑救罔敢暇寧顧時閲三冬同雲鮮應側席減膳倍篤焦勞兹者候届上辛田功肇始伏念天心仁愛必軫民力艱難苟非錫以豐穰何由共登康乂敢因祈歲展竭悃誠冀昭事之精䖍荷穹蒼之鑒格謹率臣寮以玉帛牲醴粢盛庶品恭祀上帝仰祈右兹將享時若雨暘用觀百穀之登溥洽三農之慶尚饗親征噶爾丹告祭天壇文臣仰承鴻祐臨馭兆民夙夜恪恭罔敢逸豫惟期中外乂安咸遂生養比年以來厄魯特噶爾丹荒陬狡寇悖逆天常肆行凶虐曾經征剿窮寇敗遁乃猶怙終不悛蔑棄誓言侵掠喀爾喀潛伏近塞詭詐跳梁稔惡巳極久為人心所共憤自為上蒼所不容臣兹恭行天罰聲罪致討遣發大兵分道並進臣特躬涖邉外相機行事用掃除頑梗之患以永綏荒徼之民擇於二月三十日啓行伏祈帝鑒謹告剿滅噶爾丹告祭天壇文臣祇承景命臨御萬方惟期中外乂安咸遂生養兹以厄魯特噶爾丹荒陬狡寇肆虐跳梁怙惡有年神人共疾臣用是於丙子春親統六師恭行天討越踰瀚海掃蕩賊氛深入窮追師徒大捷於丙子秋再履邊境經畫招徠於丁丑春復至朔方奮揚武略逆子俘獲醜類革心凶渠殄亡邊塵盡滌遐荒番部罔不歸誠皆藉上蒼𢎞祐之靈俾成絶塞永清之烈特遣専官用申禋祀敬告成功伏惟帝鑒尚饗剿滅噶爾丹告祭歷代帝王陵寢文自古帝王受天景命制治綏猷必禁暴除殘以乂安黎庶緬懷往烈道實同符朕欽承帝祉臨御九圍兹以狡寇跳梁親征漠北蕩滌寇氛廓清邊徼永消兵革以與普天率土樂育太和敬遣專官代將牲帛昭告古先哲后䖍修禋祀式彰安攘之模用展景行之志仰企明靈俯垂鑒饗剿滅噶爾丹告祭先師孔子文朕服膺聖訓殫究遺文凡兹六籍所垂惟以安民為要臨御以來孜孜圖治綏乂蒸生逺邇中外視同一體乃有厄魯特噶爾丹荒陬狡寇肆虐跳梁擾毒邉方稔惡巳極朕親統六師三臨絶塞𢎞彰撻伐克奏膚功逆孽就俘凶渠殄滅遐荒番部罔不歸誠自兹永靖邉塵咸安生業惟是至聖先師默相啓佑特遣專官敬申禋祀祇告成功伏惟昭鑒尚饗祭禹陵文惟王精一傳心儉勤式訓道由天錫啓皇極之圖疇功在民生定中邦之井牧四載昔勞疏鑿永賴平成九叙早著謀謨惟歌府事行其無間德遠益新朕省方東南道經吳越覩長江之浩渺心切泝洄瞻髙巘之嵯峨企深仰止幸矣松楸伊邇儼然律度可親特薦馨香躬修祀事惟祈靈爽尚克來歆祭明太祖文惟帝天錫勇智奮起布衣統一寰區周詳制作鴻謨偉烈前代莫倫朕曩歲時巡躬修醑薦景其遺轍不囿成規兹因閲視河防省方南邁園陵如故睇松柏以興思功德猶存稽典章而可範溯懷彌切親酹重申靈其鑒兹尚期歆享祭西嶽華山文朕惟五嶽之祀載於虞書所由來逺矣稽考歷代舊章國有慶典必舉告祭之文蓋以含靈布澤能錫福於斯民故禋祀惟䖍禮至重焉西嶽華山之神聳峙關中照臨西土比年以來秦省左右亢旱頻仍百姓艱食流離轉徙未有寧居田疇荒蕪不能墾闢朕憫念焦勞罔間宵旰反覆圖維或者因朕之不德或者有司之不肖以致雨暘失節重困吾民前者蠲租發賑屢遣大臣拯民疾苦守土巨僚亦已更置殫心竭慮以盡人事而蒸民猶未臻康食朕念國家以民為本民以食為天百穀蕃滋端賴雨澤順時霑足咸藉神功用是特遣皇長子允禔䖍申殷薦祇期默佑時沛甘霖俾三農常沾優渥之庥庶兆姓永享豐亨之樂錫民嘉祉丕慰朕懷不益光歟朕之斯舉非以媚神求福也惟敬為百姓請命爰布誠悃神其鑒之謹告重修闕里聖廟告成遣皇子告祭文朕惟道統與治統相維作君與作師並重先師孔子德由天縱學集大成綜千聖之心傳為萬世之師表故廟祀久逺垂於無窮朕御㝢以來立綱陳紀彰教敷治咸奉至聖為法程凡典禮追崇竭誠致敬自京師下逮郡邑辟雍泮水建廟釋奠罔不修舉况兹闕里乃聖人鍾育之鄉車服禮器於斯藏守曩者東巡展拜之餘仰觀廟貌多歷年所漸有頽敝深厪於衷用是命官董理重加修葺棟宇維新以妥聖靈兹當告成特遣皇子允祉致祭爼豆肅陳恍乎接至聖之音容以將朕儼恪欽崇至意陟降在兹尚祈歆饗聖祖仁皇帝御製文第二集卷四十一
