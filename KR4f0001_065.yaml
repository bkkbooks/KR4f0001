body:
  text: 欽定四庫全書卷聖祖仁皇帝御製文集卷三十賦春雨賦神籥絪緼化機和煦元氣上融醲膏下聚首五行者曰水潤萬物者惟雨于時蒼祗蒞節青鳥司晨餘寒未斂禁火方新風輕揚以習習雲密布而鱗鱗垂九霄之嘉澍飛四野之甘津始觸石以吐液旋彌空而散澤初曵縷以吹絲繼緣霤而滴墀乍密還踈欲斷又續拂宇披檐挹川注谷既磅礴而淋漓亦瀰漫而滲漉戛綺埒之明璣流銅池之文縠木欣欣以向榮草萋萋而如沐若夫徂畛徂隰是蓘是穮塍麥漸秀田禾始苖廣地道之發育資土脈之沃饒雖霑體而塗足幸渥葉而濡條况乃灌溉神州濊汪赤縣無逺弗届靡幽不遍灑郊牧而歡呼浹寰瀛而舞忭慶玉燭之長調喜豐年之屢見夫惟天地之德廣大無私春生夏長雲行雨施寓栽培於無意普美利於不知植品物以咸若含細大而莫遺所以解澤旁皇湛恩深厚覆被民生惠鮮隴畞興有淹於三陽敷仙霖於千耦世竝享夫豐亨俗咸登於仁壽洋洋乎造物之𢎞功豫一人乎何有梧桐賦撫萬彚之生成攬植物之暢茂見藹藹之梧桐為良材之僅覯當綺閣而結柯臨玉階而吐秀既託根以得地亦含靈而迎候扇淑景於春陽振英華於清晝揚蕤瑶樹布葉金鑾碧滋密綴翠纈深攢散澄暉於幃幄濯鮮色於琅玕被光華於日月耀羽儀於鳳鸞乃有釀雲上覆瓊泉下浸長浥潤於丹穹永敷榮於紫禁雨滴疏聲風吹籟鳴乍饗回於環珮已樂合於竽笙若夫新條始引清露初流如潔清之士邈焉而寡儔挺節無撓陵虛欲上如謇直之臣介然而不黨菶菶者其陰可以矢卷阿之頌音離離者其實可以廣湛露之雅什韻虞氏之文琴絙軒皇之素瑟信天地之嘉生非凡材之能匹彼夫桃李之佳蔭松柏之貞心甘棠蔽芾於南國玉樹青蔥於上林雖留詠於在昔詎埒美於斯今至於嶧山孤立之姿龍門百尺之幹或擢本於邱樊或漸色於巖畔豈若兹樹之曜穎朝陽植枝霄漢負聳壑之遐標增麗城之榮觀也哉弩賦並序弩之制昉於有熊氏周禮掌之稿人後世寖失其巧爰命工人規古遺制而神明之省度悉合乃為賦曰觀五材之利用美四弩之超羣法軒轅之天巧象枉矢之星文關施牙列樞合機分爾其勢若迅雷形如規月雪鏃騫騰霜鋩激越邁白的之神竒埒黃間之飄忽墜百石於三連引千鈞於一髮若爾秋原蕭颯春草縈茸長楸獵馬甫草軍容既省括而命中亦裂眥而洞胸弋封狐於巨壑射飛隼於髙墉至於魚麗六師龍驤萬騎羽箭霆鳴雕弧雨厲踰貫蝨以呈能軼穿楊而逞藝彼夫黑矟朱㦸玉劒金鋋或收功於後徑或制勝於中權雖宣威而克敵未届逺而乘堅豈與夫夾庾唐大之制同垂烈於戎旃夜亮木賦並序塞上古木夜視有光遇雨益明移置室中即之可以燭物嘉其有異故賦猗嘉木之逈異垂四照之華英蜿輪囷於川壤萃盤錯於柯莖外禀㢲德內藴離精煥然夕皎灼爾宵明晼瑞星之初麗炯璧月之漸生既騰輝於山谷亦揚彩於檐楹若乃靈根濯雨榮枝浥露芳澤加鮮澄暉逺布方隱之而彌耀旋即之而如晤洵昭質之無虧何冥行之是懼爾乃金膏灺蕊鶴焰韜光獨飛熛而振采長煜煜以煌煌吐瓊文於赤水懸瑶景於昆岡非朝華而夕謝殆積暗以能彰於是列之桂宫置以椒室流映金鋪近燭緗帙豈浮豔之為容亮靈竒之足述庶含章之可貞雖在野而靡失西苑芙蓉賦惟澤芝志於爾雅菡萏詠於風詩繄金塘之麗草允栁沼之朱儀夫其的爍輕莎翩蹮清瀨玉節蟠根翠羽襞蓋縷黃作鬚跗紫成蒂蔭太液之漣漪蕩昆明之霧靄爾乃幽房晨折芳葩夜舒前迎丹殿後匝瑶除髙披直道斜裊周廬萋萋川碧渺渺天虛光留錦鶩陰唼文魚葉漾珠而錯落影翻月而軒渠若夫黛罨如烟華濃似綺藻采橫洲霱雲被沚或雪沁瓊英螺含碧花桃倩紅􅞉菊分金蕊競秀揚輝爛兮出水如仰如俯似低復昻亭亭交倚田田並將宛若瑶林之四映矯如朱鷺之載翔至於萍合橋痕蒲牽波縠溪靜禽喧臺髙樹復梅雨滴而浮馨麥飇扇而散馥氤氲於講席之書郁烈乎侍臣之服間命沙棠之楫駕芙蓉之舟似搴華峰之種無待汾水之謳宴羣工於在鎬聊悅豫以凝庥蓋其擢素挺生拔泥不滓外直中通花榮實㫖潔比髙人清同君子是以廬山則淵明届焉濂溪則惇頤樂只余願賢士之釋荷裳乃眷幽姿而不自己松賦猗歟喬松鍾靈上苑柯百尺以如搴蓋千年而欲偃散積秀於蓮峰蔭孤芳於蘭畹標豔冶之不矜抗風塵其獨逺若夫盤根泰岱聳幹匡廬涵貞溫岫映彩嵩衢比德則質符君子授秩則名榮大夫三眠遜其徑節百木讓為仙株爾其緑玉抽針黛蛾攢葉夭矯虯鱗騰趠龍鬛謖謖離羣森森爽睫碧駕嶧桐翠增堯莢至十圍蓊鬱連抱巃嵸濤乍驚而疑雨聲既逺而猶風𢎞景聞之於牖比陶潛撫彼於籬東更若招柏為朋呼筠偕響白頻遊青牛時往蘿蔦旁牽芝苓暗長落氛霧於瓊階藹菁蔥於書幌或俯垂紫磴或斜倚清池鷺獨鶱而啄實鶴載舞而巢枝日騰照兮光蔚薈月流素兮隂紛披繄符邱之神王羌偓佺所心怡是以茂姿式詠於雅詩貞修表揚於戴禮箕山則棟欲生雲石室則脂堪作餌非幽品之可懷曷詳美於圖史至若皂衣迎氣白草迷煙雪霏千里氷凝萬川橘柚罷色杞梓藏妍獨斯樹之不改厯嵗寒而蒼然凉飇至弗移其操沍陰積彌著其堅信國家之楨幹而表德者所取焉玉泉賦若夫天産瑰竒地標靈迥融則川流峙惟山靜撫風壤之清淳對玉泉之幽靚信芳甸之名區而神臯之勝境也爾其洞壑厜㕒巖阿叢復源出髙岡溜生寒麓瑶竇濺珠瓊沙噴玉控以翔螭引之鳴瀑初噴薄以飄絲旋瀠洄而曵縠既瀺灂於澗溪遂渺瀰於陵陸侔色則素纈無痕儷質則纖塵不屬挹味則如醴如膏揣聲則為琴為筑於是長輸逺逝澶漫演迤曲之為沼渟之為池拭一泓之明鏡㵼千頃之琉璃排玲瓏之雁齒跨蜿蜒之虹鬐拓澄湖而西匯環仙籞而東馳當其春日載陽惠風潛扇草緑初芽栁黃欲線捲百尺之湘漪拖十重之楚練蔭逺樹之芊綿泛落英之蔥蒨及夫長嬴届節新漲平堤林霏夕斂嵐彩晨飛抽碧筒以徐引綴丹的以紛披展含風之翠葆搴裛露之紅衣若乃炎歊既回鮮飇疏豁泠泠桂間嫋嫋蘋末見鳬鴈之沉浮望煙雲之出沒掬晧魄於晴瀾散清暉於深樾至於凄辰中律水樹蕭騷木葉盡脫微霜始飄耿氷雪以流映擁貞萋而後凋攬六宇之曠邈寄余懷於泬寥是其為狀也何時不妍何妍不極境近心逺目營神逸有林坰之美而無待於攀躋有亭榭之安而無勞於雕飾豈所語於入華林者擬濠濮之遊涉太液者象蓬瀛之域也耶行殿讀書賦並序東巡十有餘日矣寒夜初永行帷清肅取大易尚書及前代史籍探索披覽夜分乃休侍臣髙士竒每以過勞為請然朕勤政愛民之外惟涵泳乎詩書心契古人寤寐勿倦非此何以自樂耶乃作行殿讀書賦以示之紹三后之令緒兮撫曩代之遺蹤爰省方而設教兮言時巡於兖東軫豫懷於蔀屋兮息豫駕於蒿宫發圖書於行笈兮窮墳典之淵通溯帝王之餘烈兮勤效法之深𠂻昔唐虞之詢嶽兮闢四門而明目禹泣罪而下車兮湯解網以致祝文獵渭以求賢兮武邁邦以問俗景列聖之芳模兮睎千秋之懿躅庶咸五而登三兮亦覲光而式穀惟時商秋甫謝寒律初尋風日髙肅雲物蕭森陳羽衛之清約兮憩帷宫之靜深愛三冬之暇景兮惜萬幾之餘陰於是心曠情怡氣恬神攝玉虯書嚴銅蠡宵歇望山海之崇深兮凛載登而載涉詎博洽之自矜兮何菁華之足獵鄙虞初之屬車兮陋河東之遺篋冀文教之永敷兮播風聲而四浹竹賦並序江南修竹成林森如緑玉見輒愛之昔人所以歌君子也舟行閒暇偶作賦曰攬嘉生之植物美修竹之㛹娟振葳蕤以擢地結蒼翠而參天吐碧鮮於原隰含玉潤於山川拂丹霄以煥采濯晨露以增妍爾其體本貞堅性惟髙孑欵欵虛中亭亭秀越居逺俗以無塵生自然而有列游必集於鵷鸞色不渝於霜雪抱君子之德生豈凡姿之可埒至於汗青為簡截管成聲文章彬郁律吕和鳴流兩間之元化開萬古之菁英亦有簜材敷布箭括叢生鏃礪作器規矩中程或埀美於九府或程能於五兵斯其為致用之廣逺尤不可以一得名也至若淇澳見稱於衛國夾池作賦於梁園詠千畞於渭上想一葉於湘潭罔不絶羣標傑意殊態嚴况爾闕北秋髙江南地潔見衆茂之咸凋知孤貞之自結巨幹凌風修莖映月豈徒覽夫清陰實興感乎徑節何當植根綺殿布影彤庭彩鸞下集丹鳳載鳴將曉餐夫珠實亦暮託於紺莖乃其峭蒨之容檀欒之美繁條綴青芳筠孕紫散夏景於瑶林蔭春華於仙沚戞素籟以風疏被青暉而雲委影入户而窺簷聲含宫而嚼徴亦足以怡情適性娛目賞心徘徊晨夕抒寫髙吟響蕭蕭而隱几飇颯颯以開襟披十重之緗帙鼓五弦之雅琴聊濡毫以成賦寄豫思於遙探闕里古檜賦並序孔子手植檜在杏壇之側金貞祐間無復存矣元至元三十年再茁故處明𢎞治間又燬於火今所遺者不枯不榮屹立霜露而秀色獨異撫摩久之乃作賦曰維槎丫之靈質實鈞化之所鍾標扶輿之竒特峙先聖之故宫涵元氣以不朽與至道而俱崇爾其黛幹蒼蒼孤柯濯濯鶴骨初扶霜鱗未作儼茁軋以方舒類鴻荒之忽鑿謝縟采於春華完淳風於太朴夭矯拂勃星臨露滴枝無取於樛樛葉全稀於摵摵夕飇度兮弗驚朝旭烘兮如滌伊間氣之潛滋惟神爽之咸集徘徊延却宛轉斷連蟠屈兮若佾羽之在列聳削兮若簨簴之待懸則有築以崇封沃以膏壤方以周闌角以文磉足縮心歔目給神賞蘿煙奪翠松籟失響於是楷因之而擢穎蓍感之而抽莖爭葳㽔於弦誦之里齊扶疏於禮樂之庭朝菌慚兮一旦大椿讓兮千齡上泝真宰之功逺契無為之代均雲行兮雨施等乾始兮坤載疇則出混茫之中而居耳目之外與三才以竝植綿厯祀其長在亦有扶桑海表若木山顛東瀛西極揭日摩天迹雖誇於神異植非出於文宣宜瞪乎其後矣邈無得而稱焉聖祖仁皇帝御製文集卷三十
