body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷十五敕諭諭大學士馬齊松柱蕭永藻王掞王頊齡學士常夀阿克敦德音額赫納格爾布登德蔣廷錫勵廷儀朕臨御以來凡事惟以實心行實政務俾羣黎均霑實惠為要從未諱言災傷崇尚虛文今嵗江南浙江湖廣等大稔豫省微覺歉收朕已頒諭旨將運京漕糧停其轉運令於彼處收貯但陜西地方現有軍務今嵗糧榖適又歉收故朕預頒諭旨著總漕施世綸將運米路徑勘視具奏協同總督鄂海辦事除陜西歷年錢糧屢經蠲免并明嵗錢糧另頒諭旨蠲免外今嵗動支常平倉榖散賑而地方官員大半悉在軍前現今皆係署印官辦事人員殊少應照曩年遣官賑濟山東百姓之例差往賑濟問九卿詹事科道會議具奏康熙五十九年十月十五日諭户部朕自御極以來無日不以民生為念凡閭閻疾苦必詳加咨訪至於地方偶遇災傷一有所聞即行蠲賑撫恤備至務期黎庶遂生樂業優遊化日六十年來夙夜孜孜未嘗稍釋也邇年因西陲用兵師行糧從雖芻粟悉支正供絲毫無擾民間然轉輸必需民力勞苦宜恤曽將康熙五十八年陜西甘肅所屬額征地丁銀一百八十八萬兩零歷年舊欠銀四萬兩零康熙五十九年沿邉各州縣衛所額征銀九萬八千一百兩零屢沛恩綸盡行蠲免近聞二年歉收民有艱於粒食者辦賦急公力何能支若非渙敷德澤無以培養窮氓是宜特頒浩蕩之恩用申勤求民瘼之念著將陜西巡撫甘肅巡撫所屬通省各州縣衛所除應征米豆草束外康熙六十年應征地丁銀一百八十八萬三千七百四十兩零通行蠲免爾部速行文該督撫遍行曉諭實心奉行務俾均霑實惠如有不肖官吏陽奉隂違澤不下究者該督撫嚴察題參從重治罪又署撫花善奏稱甘肅地方數年歉收糧草價值騰貴兵丁採買維艱朕念兵丁效力行間勞瘁堪憫尤當軫恤準預給半年餉銀著即行文附近省分撥銀三十萬兩速解甘撫頒發以副朕篤念民勞優恤軍士至意爾部即遵諭行特諭康熙五十九年十月十七日諭兵部噶爾弼等凜遵朕所指授率領官兵前往從古用兵所未到之險逺絶域俱各奮勵由拉里路進兵克取招地將凖噶兒人等信用之逆惡畨僧五人正法撫綏唐古特土伯特人衆甚屬可嘉著將取招官兵從前所領之銀免其扣取其恩賞之處另有諭旨外在事將軍以下兵丁以上俱著從優議敘具奏康熙五十九年十月十七日諭兵部朕惟國家綏乂地方愛養兵民實係緊要朕自臨御以來夙興夜寐無時不以軍民生計為念比年策妄阿喇布坦蠢動跋扈侵我哈密殱及喇藏占取藏地騷擾土伯特唐古特人衆再土魯畨之人皆在四川雲南一帶邉境居住凖噶兒人等若將土魯畨侵取又將土伯特唐古特人衆煽惑侵犯青海不但難於應援亦且不能取藏是以調四川雲南滿漢官兵由拉里路前發西路大兵由青海進藏官兵俱感朕素日豢養之恩遵朕指授各加奮勵直抵險逺絶域克取藏地殊堪軫念應大沛恩澤四川雲南滿漢官兵從前所領俸餉俱著免其扣取仍遣堂官賞給取藏之四川雲南滿漢官兵每人銀拾兩所賞銀兩即賞給本人妻子以示朕軫恤軍前效力勞苦官兵之至意爾部即遵諭行特諭康熙五十九年十月十七日諭兵部前遣大兵取藏議政大臣及九卿俱以藏地遙逺路塗險惡且有瘴氣何能遽至宜固守邉疆執奏朕以凖噶兒人等現今占取藏地騷擾土伯特唐古特再土魯畨皆在雲南四川一帶居住若將土魯畨侵取又鼓動土伯特唐古特人衆侵犯青海彼時既難於應援亦且不能取藏遂決意獨斷著振武將軍傳爾丹征西將軍祁里德靖逆將軍富寧安管領三路官兵前往策妄阿喇布坦邉境驚擾襲擊定西將軍噶爾弼管領雲南四川滿漢官兵由拉里路前進平逆將軍顔信管領西路官兵由青海進藏又遣大將軍王總領大兵駐劄穆魯烏蘇便宜調遣辦理糧餉官兵俱各奮勵其三路襲擊之兵至策妄阿喇布坦邉境屢次大勝剿殺賊兵擒獲人畜招撫數千凖噶兒人衆噶爾弼等由拉里路前進取藏樹立大功兹覽大將軍王奏顔信等三次將策零敦多布殺敗賊兵逃竄等語殊屬可嘉在事將軍以下兵丁以上俱著從優議敘具奏康熙五十九年十月二十二日諭大學士馬齊松柱蕭永藻王掞王頊齡學士常夀阿克敦德音額赫納格爾布蔣廷錫勵廷儀李周望李􅌧科道官等缺俱係行取知縣補授之主事併各部院衙門由正途出身之主事員外郎郎中等官揀選補授並未論及品級也今若不查伊等原升之品級將主事員外郎補授之科道官內升俱超擢至堂官果其卓然特出雖係白丁朕可不次用為大臣何况科道等官若俱屬平常而不查原升品級竟一體內升超用未免越次監察御史尚有巡城之事給事中除奏事侍班外伊等並無所事再閲其條奏亦無甚緊要有益於政治也著將伊等問九卿舉出時由何銜升任之處一併查明具奏康熙五十九年十月三十日諭大學士學士九卿等朕於地理從幼留心凡古今山川名號無論邉徼遐荒必詳考圖籍廣詢方言務得其正故遣使臣至崑崙西畨諸處凡大江黃河黑水金沙瀾滄諸水發源之地皆目擊詳求載入輿圖今大兵得藏邉外諸畨悉心歸化三藏阿里之地俱入版圖其山川名號畨漢異同當於此時考證明核庶可傳信於後大概中國諸大水皆發於東南大幹內外其源委可得而縷析也黃河之源出西寧外枯爾坤山之東衆泉流出沮洳渙散不可勝數望之燦如列星蒙古名敖敦他拉西畨名蘇羅木譯言星宿海也是為河源滙為查靈鄂靈二湖東南行折北復東行由歸德堡積石關入蘭州岷江之源出於黃河之西巴顔哈拉嶺七七勒哈納畨名岷揑撮漢書所謂岷山在西徼外江水所出是也而禹貢導江之處在今四川黃勝關外乃禇山古人謂江源與河源相近禹貢岷山導江乃引其流非源也斯言實有可據其水自黃勝關流入至灌縣分數十岐至新津縣復合為一東南流至敘州府金沙江入之金沙江之源自逹賴喇嘛東北烏揑烏蘇流出烏揑烏蘇譯言乳牛山也其水名母魯烏蘇東南流入喀木地又東南流徑中甸入雲南塔城關名金沙江至麗江府亦名麗江至永北府會打沖河東流徑武定府入四川界至敘州府合岷江流徑夔州府入湖廣境由荆州府至武昌府與漢江合漢江源出陜西寧羌州北嶓冡山名漾水東流至南鄭縣為漢水入湖廣界東南流至漢陽縣漢口合岷江此諸水在東南大幹之內故源發於西畨委入於中國也瀾滄江有二源一源於喀木之格爾幾雜噶兒山名雜禇河一源於喀木之濟魯肯他拉名敖母禇河二水會於義木多廟之南名拉克禇河流入雲南境為瀾滄江南流至車里宣撫司名九龍江流入緬國瀾滄之西為哈拉烏蘇即禹貢之黑水今雲南所謂潞江也其水自逹賴喇嘛東北哈拉腦兒流出東南入喀木界又東南流入怒彝界為怒江入雲南大塘隘名潞江南流徑永昌府潞江安撫司境入緬國潞江之西為龍川江龍川江之源從喀木所屬春多嶺流出南流入雲南大塘隘西流為龍川江至漢龍關入緬國此諸水在東南大幹之外故皆流入南海也又雲南邉境有檳榔江者其源發自阿里之岡底斯東打母朱喀巴珀山譯言馬口也有泉流出為牙母藏布江從南折東流徑藏危地過日噶公噶兒城傍合噶爾詔母倫江又南流徑公布部落地入雲南古勇州為檳榔江出鐵壁關入緬國而岡底斯之南有山名郎千喀巴珀譯言象口也有泉流出入馬品母逹賴腦兒又流入郎噶腦兒兩湖之水西流至桑納地岡底斯之北有山名僧格喀巴珀譯言獅子口也有泉流出西行亦至桑納地二水合而南行又折東行至那克拉蘇母多地與岡底斯西馬珀家喀巴珀山所出之水會馬珀家喀巴珀者譯言孔雀口也其水南行至那克拉蘇母多地會東行之水東南流至厄納忒克國為岡噶母倫江即佛法所謂恆河也佛國記載魏法顯順恆河入南海至山東之渤海入口應即此水矣梵書言四大水出於阿耨逹山下有阿耨逹池以今考之意即岡底斯是唐古特稱岡底斯者猶言衆山水之根與釋典之言相合岡底斯之前有二湖連接土人相傳為西王母瑶池意即阿耨逹池也又梵書言普陀山有三一在厄納忒克之正南海中山上有石天宫觀自在菩薩遊舍是乃真普陀一在浙江之定海縣海中為善財第二十八參觀音菩薩説法處一在土伯特今畨名布逹拉山也亦為觀音化現之地釋氏之書本自西域故於彼地山川頗可引為據也禹貢導黑水至於三危舊注以三危為山名而不能知其所在朕今始考其實三危者猶中國之三省也打箭罏之西南逹賴喇嘛所屬拉里城之東南為喀木地逹賴喇嘛所屬為危地班禪胡土克圖所屬為藏地合三地為三危耳哈拉烏蘇由其地入海故曰導黑水至於三危入於南海也至於諸畨名號雖與史傳不同而亦有可據者今之土伯特即唐之突厥唐太宗時以公主下降公主供佛像於廟今畨人名招招者譯言如來也其地猶有唐時中國載去佛像明成化中烏斯藏大寶法王來朝辭歸時以半駕鹵簿送之遣內監護行內監至四川邉境即不能前進而返留其儀仗於佛廟至今往來之人多有見之此載於明實録者爾等將山川地名詳細改正具奏康熙五十九年十一月十八日諭九卿捐輸特為有益軍務舉行現今議敘人員內有不交銀穀謊領實收者亦未可定如果不照數交納臨用時必致有誤軍務著交九卿有不交銀穀領取實收者查出時將給與實收領取實收者即正軍法原本發回添議具奏康熙五十九年十二月十九日諭大學士馬齊松柱王掞王頊齡學士常夀阿克敦德音格爾布登德蔣廷錫勵廷儀魏廷珍朕觀九卿詹事科道保舉人員並未矢公悉有所為或有視地方優劣而舉者或有自謂屏絶交逰閉户不出而緘口不舉一人者或有自己不舉轉囑他人令其舉出者凡如此類伊等以朕為不知朕則知之甚悉也存斯心者真名教中罪人安得謂之讀書人乎如果矢志公忠者伊所舉之人有改操之處即應糾參乃近來習俗不可漸長必須查出懲治方知畏懼龔鐸僅一少詹耳所保者甚多伊又並未外任何所見而保舉如許衆多耶爾等會同吏部都察院將從前保人甚多而無當者悉行參奏康熙五十九年十二月二十一日聖祖仁皇帝御製文第四集卷十五
