body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集總目二巻第七勅諭諭户部諭户部諭工部諭内閣諭大學士九卿等諭刑部諭内閣諭吏部諭吏户兵工四部諭工部諭刑部諭扈從大學士馬齊張玉書陳廷敬諭山東廵撫趙世顯諭河道總督張鵬翮諭河道總督張鵬翮及河工官員巻第八勅諭諭江南總督阿山廵撫宋犖諭江南督撫諭内閣禮部諭扈從大學士張玉書陳廷敬翰林查昇陳壯履錢名世蔣廷錫汪灝勵廷儀等諭扈從大學士馬齊張玉書陳廷敬諭扈從内閣吏部諭浙江福建總督金世榮浙江巡撫張泰交福建廵撫李斯義諭江南總督阿山江寧廵撫宋犖安徽廵撫劉光羙諭扈從大學士馬齊張玉書陳廷敬等諭吏部諭河道總督張鵬翮諭扈從諸大臣及河臣等諭河道總督張鵬翮諭河道總督張鵬翮諭河道總督張鵬翮諭山東巡撫趙世顯諭河道總督張鵬翮諭河道總督張鵬翮諭河道總督張鵬翮諭内閣諭户部諭大學士馬齊席哈納張玉書陳廷敬等諭户部諭户部巻第九勅諭諭内閣諭户部諭扈從大學士等諭工部諭内閣諭工部諭扈從大學士馬齊等諭户部諭户部諭工部諭内閣諭内閣諭大學士馬齊席哈納張玉書陳廷敬等諭大學士等諭户部諭兵部諭貴州巡撫陳詵諭大學士馬齊席哈納張玉書陳廷敬諭九卿詹事科道諭大學士馬齊席哈納張玉書陳廷敬諭兵部巻第十勅諭諭兵部諭雲南巡撫郭瑮諭大學士馬齊席哈納張玉書陳廷敬等諭内閣諭刑部諭内閣諭户部諭修國史諸臣諭户工二部諭内閣諭内閣諭刑部諭刑部諭户部諭刑部諭刑部諭内閣諭武殿試讀巻官等諭武殿試讀巻官等諭吏部尚書温達諭内閣諭内閣卷第十一勅諭諭内閣諭刑部諭户部諭大學士馬齊席哈納張玉書陳廷敬李光地諭大學士馬齊席哈納張玉書陳廷敬李光地諭大學士馬齊張玉書陳廷敬李光地等諭大學士馬齊張玉書陳廷敬李光地等諭大學士席哈納吏部侍郎張廷樞兵部侍郎蕭永藻諭户部諭禮部諭大學士馬齊張玉書陳廷敬等諭户部諭户部諭刑部諭吏户兵工四部諭扈從視河諸臣及總河衆河官等諭扈從大學士馬齊張玉書陳廷敬等諭户部卷第十二勅諭諭户部諭户部諭浙江福建總督梁鼐浙江巡撫王然江南江西總督邵穆布安徽巡撫劉光羙江蘇巡撫于準山東巡撫趙世顯諭刑部諭扈從大學士馬齊張玉書陳廷敬等諭吏部諭户部諭兵部諭内閣諭内閣諭内閣諭工部諭大學士馬齊等諭起居注官揆叙等諭大學士馬齊等諭兵部諭大學士馬齊等諭户部
