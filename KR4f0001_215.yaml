body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻九勅諭諭内閣官員薦舉卓異闗係激勸大典所列事蹟期有實濟於地方百姓開載虚文無益嗣後薦舉卓異務期無加派無濫刑無盜案無錢糧拖欠無虧空倉庫銀米境内民生得所地方日有起色方可膺卓異之選其他所開虚文俱不必入可㑹同九卿詹事科道定議具奏康熙四十四年五月十九日諭户部江南不用小錢惟江北行使皆由山東多私鑄之故糧船及龍衣船載來北地者甚多朕已諭織造嚴加察緝今急收小錢與衆未便惟有嚴禁私鑄少寛禁小錢之限期方善耳康熙四十四年五月二十日諭扈從大學士等海賊案件今斷不可輕宥從前曽屢經寛釋如再宥則人不知警宼賊滋長臺灣為之不寧矣時勢不同當因時調度恐京中諸臣不知所以不免之故爾等将此意諭知在京大學士及刑部大臣康熙四十四年六月十九日諭工部四十二年朕閱河堤時張鵬翮等奏石堤於八九月間完工及今春閱視尚有未完之處曽在高堰堤上於衆人之前面諭此堤經朕閱後今已三載而工尚未完萬一水勢大至欲恃此草埽捍禦難矣於時張鵬翮曽奏可以捍禦斷無妨礙今疏内雖稱漫溢堤岸或係已完石堤或係石工未及修完之處該部一併速議奏聞康熙四十四年七月初四日諭内閣人命案件闗係重大有先審情真而後審屬虚者前任督撫審結之案後任督撫将不符之處輒稱無庸更改可乎今佟毓秀欲将秋審人犯停其解赴省城則永無平反之事矣所奏無益不可行下所司知之康熙四十四年七月二十八日諭工部這修堤需用銀五萬餘兩著照所請速行動支修築朕今春閱河視高家堰所修石堤有修完保守已過三年者有仍未修完者若将修完保守已過三年之人與未修完之人一例坐罪則屬屈抑何人修完何人未修完著總河張鵬翮作速察明奏聞康熙四十四年八月初二日諭扈從大學士馬齊等四十二年春朕往巡南省見山東歲歉民饑之状即截漕停徵蠲免錢糧遣情愿効力官員前往賑濟迨至秋間又撥八旗官員令每佐領領銀一千兩分往頒賑民乃得蘇是以効力人員皆令議敘今各佐領借支未還銀一千兩如仍向佐領按數扣除則兵丁糧餉必致不敷著将官庫利銀抵還此銀之數免於佐領扣除康熙四十四年八月初三日諭户部每佐領下未還所領官銀一千兩若令一百個月完結為日甚久兵丁錢糧艱窘此項銀兩著将官庫息銀補還免於各佐領下扣除用寛八旗甲兵之力康熙四十四年八月初五日諭户部鳳陽府屬州縣及睢寧沭陽二縣被災應蠲數目俱依議速行災傷地方應徵地丁漕項銀米著暫停徵俟明年秋收後該撫以所收豐歉具題請㫖康熙四十四年九月二十五日諭工部方今海宇昇平惟以安阜黎元為急東南要務莫重於河防朕數經南巡指示修築方略凡以籌運道濟民生也自曩歲兩河先後衝決而黄流淤墊繼以高堰唐埂壩久決未塞而洪澤湖水直從決口旁洩以致淮水力弱黄水倒灌全河㡬至潰壞於是分遣廷臣發帑金數百萬増築高堰盡閉六壩俾淮水全注清口又特築挑水壩以逼黄溜趨向北岸仍開濬陶荘引河以導黄北流然後黄水無倒灌之患四十二年以河工漸可底績躬親臨視時高堰石工尚多未竣飭令迅速修築又因仲荘閘水勢湍急恐逼黄流倒浸清口遂命閉仲荘閘改建楊家荘閘閘工既成今年春復往巡閱比至高堰見石工仍未完固舊埽亦多朽塌諄諭河臣張鵬翮謂水勢無常修防宜豫一有疎忽則前工盡隳且甫奏安瀾旋報衝決天下其謂之何張鵬翮猶奏稱堤工捍禦可以無虞迨伏汛大水驟發果衝決古溝唐埂清水溝等處淮揚一路田畞被淹者甚衆今已嚴飭堵塞決口刻期竣工朕屢親蒞河干詳度形勢當水漲之時若高堰及運河減水壩不令開放則堤堰甚為危險若開壩宣洩則閭閻隴畞必致淹傷方春水涸民間盡皆播種一經夏水驟漲開壩放流而所播之種悉被淹沒朕心惻然殊為不忍使不設法導流俾水有所收束則瀕湖及下河民田究不免於水患朕再三籌畫宜於高堰三壩之下挑濬一河兩旁築堤束水入高郵邵伯諸湖湖外亦量築土堤不使漫溢其高郵減水壩下亦挑濬一河兩旁築堤束水由串塲河入白駒丁溪草堰等河白駒等河淤淺之處並開濬深通俾之入海如此則各壩所出之水不致有渙散衝流之害又洪澤湖水勢大漲泗州盱眙等州縣俱被水災應於泗州一帶受水之地亦酌量築堤收束毋令汎濫則所全於淮安揚州鳳陽三郡民生者多矣此事原於河道無涉在河官止知保護河道不復詳計民生朕惟民間田畞所繫甚重宜圖萬全可久之䇿築堤束水行之北河業有成效則施之南河當亦有濟應從何地築堤延袤若干里需費㡬何行令江南總督總漕總河江蘇巡撫㑹同確勘詳議具奏爾部即遵諭行特諭康熙四十四年十月初四日諭内閣今直省人命案件較前亦極少矣康熙四五年至三十九年人命事甚多朕數年來留心詳察稍可矜者必為之求生路極可惡者始正法以為衆戒又不時嚴飭該管官員是以自四十年以後命案漸減觀歴年秋審冊便可知矣滿洲自定新例以後命案亦絶少大抵人命事不可不詳其情理代彼求生路亦不可不使國法平允但處分得宜事自少也康熙四十四年十月初七日諭内閣各省秋審尚無可議朝審則太寛書云罪疑惟輕以其罪有可疑之處而輕之也若無可疑則以公平為貴現在殺人之人情罪顯然又何所疑而欲從寛乎執法之人但當詳情據理以定罪一味從寛則惡人何所警戒可以此諭刑部康熙四十四年十月十五日諭大學士馬齊席哈納張玉書陳廷敬等各省提督内如李芳述趙宏燦潘育龍岳昇龍俞益謨皆有名而李芳述尤年久當呉三桂時即在行間諳習兵事頃征紅苗之際令極嚴明其標兵一人陣亡則同立一處之兵必負其屍出送於提督之前隨即還立原伍略無差誤凡出征之前鋒軍無不歎異之張雲翼在松江雖松江鄉紳稍有怨言而此番南巡見其練兵甚善民皆稱之亦良将也康熙四十四年十一月初三日諭大學士等俄羅斯來使所賫之文乃喇塔諾托多烏祖克俄羅斯三種文也外國之文亦有三十六字母者亦有三十字五十字母者朕交喇嘛詳考視之其來源與中國同但不分平聲上聲去聲而尚有入聲其兩字合音甚明中國平上去入四韻極精兩字合音不甚緊要是以學者少漸至棄之問翰林官四聲無不知者問兩字合音則不能知中國所有之字外國皆有之特不全耳康熙四十四年十一月十二日諭户部朕宵旰勤民厪思愛養惟務簡徵寛賦以期實惠黎元間有州縣水旱不登即詔所司亟議蠲賑其直隸各省每歲應輸額賦有以次遞蠲者有頻蠲數年者有将帶徵積欠暫令停徵者凡以蠲除額賦專為小民樂業遂生一歲以内足不踐長吏之庭耳不聞追呼之擾庶㡬休養日久馴致家給户足而民咸得所也曩年楚省錢糧雖屢行豁免今已歴數載未經特蠲應将該省額賦全免一年以示朕加恩優渥之至意湖北湖南康熙四十五年除漕糧漕項外其餘地丁銀米一概免徵舊欠未完者並停輸納爾部移文該督撫令各飭屬員張示徧諭窮鄉僻壤咸使周知儻不肖官吏於額徵之外巧立名色别有科派私圖肥已者察出定治重罪爾部即遵諭行特諭康熙四十四年十一月十七日諭兵部每幇漕船止恃千總一員管領漕糧所繫甚重近見領運千總庸劣者多著漕運總督将庸劣不堪之員察出盡行懲革該部另選擇補授俾不致貽悞重運康熙四十四年十二月十一日諭貴州巡撫陳詵貴州地方小易治雖有苗人亦無他事但以文武和睦安靜不生事為要清官多刻刻是清官不足處屬吏貪汚固當叅劾其居官平常者則須敎誨之邉地原苦為大吏者不可欲見才若尋出事做顯我才情便非正理爾切識之康熙四十四年十二月二十日諭大學士馬齊席哈納張玉書陳廷敬衞所改為州縣斷斷不可前于成龍為直隸巡撫即欲以衞所改為州縣朕不允所請後郭世隆又以此條奏九卿議從其言因而准行至今百姓猶以為苦近者如此况遠者乎御史陳勲所奏著不准行康熙四十五年三月初四日諭九卿詹事科道朕總理㡬務甚久兹年歲日益夙夜乾惕與月俱増自去冬無雪及今春深尚未得雨地氣熯燥不和又雲色多細縷状朕知之既晰豈可不降諭㫖此非僅無雨且恐别有變異與其有變而後講求不如君臣於未事之先将政事得失任為己責竭誠攄忠詳加計議之為當也但數語頌揚虚辭省改未可即以塞責夫民為邦本食為民命朕自東作以至收穫厪念靡寧迨秋成以後或豐或歉之既定然後此心少釋别為計畫爾等俱係大臣或司言職事有缺失各宜直陳這所議未詳盡著再行確議以聞康熙四十五年三月初六日諭大學士馬齊席哈納張玉書陳廷敬朕觀前史如漢朝有災異見即誅一宰相此大謬矣夫宰相者佐君理事之人儻有失誤君臣共之竟諉之宰相可乎或有為君者凡事俱付與宰相此乃其君之過不得獨咎宰相也康熙十八年地震魏象樞云有密本因獨留面奏言此非常之變惟重處索額圖明珠可以弭此災矣朕謂此皆朕身之過與伊等何預朕斷不以已之過移之他人也魏象樞惶遽不能對當呉三桂叛時索額圖奏云始言遷徙呉三桂之人可斬也朕謂欲遷移者朕之意也與他人何涉索額圖甚懼而退至於巴圖魯公敖拜遏必隆為圏地事殺尚書蘇納海督撫朱昌祚王登聮寃抑殊甚此等事皆朕所不忍行者朱昌祚不但不當殺並不當治罪也康熙四十五年三月初八日諭兵部國家綏靖疆圉安輯軍民惟專閫元戎是頼有實能久鎮邉境懋著成勞者則奨勩酬庸宜踰常格貴州提督李芳述自歴行間二十餘載屢立戰功及黔省蒞事以來御軍有法訓下知方威望蔚聞謀猷益殫矧年稱耆宿見今舊将閱歲之久罕與嫓倫用沛殊恩特彰優異著加太子少保授為鎮遠将軍以示朕褒寵勞臣至意爾部即遵諭行特諭康熙四十五年四月初四日聖祖仁皇帝御製文第三集巻九
