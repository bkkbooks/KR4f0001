body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷十六敕諭諭內閣河南地方當黃河上流最關緊要設河水有出漕旁溢之事則下流沙土易淤為患甚巨這工程著總河親往察看仍飭該省河官沿河修防堤岸勿致疏虞下所司知之康熙四十八年十一月十八日諭戶部尚書張鵬翮內閣學士噶敏圖爾等到河工傳旨與總河趙世顯河工關係緊要加謹修防不可稍有忽略宿遷以下有清水入黃河得以刷沙遄行宿遷以上至河南一帶無清水入黃必須將兩岸堤工小心修防令水不出漕導水由漕中行始無淤沙之患至於黃河發水由上源寧夏而來著行文陜西總督轉行寧夏同知遇黃河水長時將長水情形作速報知總河河南巡撫約二十日即報到務期預為修防康熙四十八年十一月二十四日諭刑部本內有兩次竊盜和尚著發往黑龍江當差定例內擺牙喇撥什庫披甲人等脫逃刑部與該旗大臣等會同嚴審如旗人有竊盜事出亦著照此例會同該管大臣官員嚴加究審竊盜非過誤之罪刺字之人何容留在京師嗣後兩次竊盜俱發往黑龍江應當差者著當差應給與窮披甲為奴者著給與為奴康熙四十八年十二月十一日諭工部盔甲等軍器關係緊要武職官員不能捐助辦製前有江南督撫捐造解送湖廣之例著交與河南巡撫與文職官員設法捐造給與該鎮康熙四十八年十二月十一日諭都察院光祿寺用過錢糧一兩月內令即核明奏銷前屢下諭旨甚明今年三月內用過錢糧至今始行奏銷如此則今年用過錢糧必推諉至於明嵗事關錢糧豈可遲延這遲延緣由著都察院嚴加察議具奏其本年四月以來用過錢糧著該衙門年內作速核明奏銷康熙四十八年十二月十九日諭八旗都統副都統參領等朕經理國家大小事務必長計逺慮期於軍民人等實能永久奉行蓋無時不籌畫於朕懷也近見八旗苟且治生糜費極多皆因該管人員止圖利已而其族長等又不教之以忠孝為重遂爾致此頃為去冬米價騰貴令將二月應放之米於正月即行支放因而米價隨即稍減據理而論米價貴賤應與八旗人等絶不相涉今細繹其故八旗官兵將所給之米未及抵家止貪得一時小利輒行變賣在所得之利甚微而銀兩耗去米價又增於是衆皆怨悔無及將來八月之米勢必六七月間又求放給若米價仍然不減則來年之米必又與今年相等矣方今天下承平日久户口滋繁南方糧米連年不到者甚多舉國中但知計利其慮及日後衆人匱乏者並無一人八旗官員猶如一身一家豈可一時不相勸諭不相訓誡乎嗣後凡所關給之米務期大加節省用至照常放米之時勿墮姦惡富豪輩收積米糧之詭計此亦八旗人等一效力之處也朕每日進膳二次此外不食别物煙酒及檳榔等物皆屬無用試觀衆人於此等無用之物輒日費幾文人人詰問當無一爽又其甚者貧而效富用必求盈且用所不當用之物中人之産不久即罄矣此皆染于惡俗無教導之人所致爾等俱為大臣官員有養育管理之職今兵革不用無可效力惟亷潔自持熟練禁旅並為衆人生計時時仰體朕懷多方區畫似此效力不更愈於行間致命之勞績乎朕為八旗生計慮及久遠與為天下萬民謀生計者中外一視愛養無殊故預令爾等知之特此手書敕諭康熙四十九年正月二十四日諭南書房侍直大學士陳廷敬等朕留意典籍編定羣書比年以來如朱子全書佩文韻府淵鑑類函廣羣芳譜併其餘各書悉加修纂次第告成至於字學並關切要允宜酌訂一書字彚失之簡略正字通涉于泛濫兼之各方風土不同南北音聲各異司馬光之類萹分部或有未明沈約之聲韻後人不無訾議洪武正韻雖多駁辨迄不能行仍依沈韻朕嘗參閲諸家究心考證凡蒙古西域洋外諸國多從字母而來音由地殊難以牽引大抵天地之元音發於人聲人聲之象形寄于點畫今欲詳略得中歸於至當增字彚之闕遺刪正字通之繁冗勒為成書垂示永久爾等酌議式例具奏康熙四十九年三月初十日諭吏部原任大學士李霨贊理機務二十餘年始終恪慎𢡟著勤勞朕懷時切追念其孫主事李敏啓著越常格升補提督四譯館太常寺少卿以示崇奬舊臣優録後嗣至意康熙四十九年三月十二日諭工部刨鉛事情前因白爾客條奏從遼陽州改往西錦州大碑嶺等處今又因席爾圖所奏仍議改遼陽前所奏是則今所奏非今所奏是則前所奏非一切事務該部應據理剖斷分别是非議處乃止就現在條奏草率具議遽準更改殊屬不合凡部院官員及在外督撫若更換一人皆如此頻改定例則貽誤甚多必致敗事著嚴行申飭這事情再加確議以聞康熙四十九年三月十七日諭户部漕糧例不蠲免念浙省被災之後民力艱難這緩徵漕米九萬二千餘石著免徴收康熙四十九年三月十七日諭大學士溫達張玉書陳廷敬李光地學士塞爾圖孫柱滿丕滿保王思軾顧恱履潘宗洛這次行取知縣人材皆堪用廖之諒鄒汝魯居官素優著以科道員缺補授其餘俱暫給知縣俸分與六部候主事缺出挨次銓補如有别項應用之處再侯旨行康熙四十九年四月二十九日諭户部據葉九思奏新徵錢糧俱能完納若將歷年舊欠錢糧一概徵收不能全完等語四十四年四十五年未完錢糧著照該撫所請準於四十九年徵收四十六年四十七年錢糧亦照該撫所請準于五十年五十一年分年帶徵儻新徵錢糧不能全完該部嚴加察議以聞康熙四十九年六月初一日諭户部據張伯行奏新徴錢糧俱能全納若將歷年舊欠一概徵收不能全完等語四十四年四十五年四十六年四十七年未完地丁等項錢糧著照該撫所請準於五十年起分四年帶徵四十七年漕項錢糧亦照該撫所請準於五十三年帶徵儻新徵錢糧不能全完該部嚴加察議以聞康熙四十九年六月初一日諭兵部這番人搆亂事情並非副將張宏印起釁張宏印一聞事發即率官兵剿滅峰崖山等處番衆殱僇七十餘人餘俱招撫甚為可嘉著降二級留任其被番人戕害守備韓國元千總洪章高仲元皆因地方公務追逐交戰以致身亡情屬可憫著一併議敘奏聞康熙四十九年七月初八日諭刑部齊翠葛特等兩家相毆以致齊翠之弟齊文葛特之父巴津達爾俱被毆殞命今將齊翠葛特又擬罪論死是兩家死至四人殊可憫惻著再議具奏康熙四十九年七月十七日諭户部各省事務果有濟於兵民地方官籌畫至當即應舉行王度昭請於鎮筸發庫銀三千兩買穀萬石建倉積貯穀貴減價平糶穀賤買補還倉地方既大有裨益而錢糧亦不至濫費具見實心任事可嘉著即照所請行康熙四十九年七月二十日諭兵部陜西多才勇之人各營兵丁又準考試如舉人中額太少則拔取必致遺漏人才不無壅塞著將武舉額數於原額外增二十名康熙四十九年七月二十九日諭戶部這截留漕米監運至狼山乍浦著侍郎塔進泰李旭升去仍令福建地方提督總兵官前來接運賑濟災黎事關重大塔進泰等著先馳驛速赴福建將賑濟事宜會同該督撫明白詳議並料理船隻遣行再回江浙候領運提鎮等到日以所截留之米照數交給事畢回京康熙四十九年八月二十日諭兵部熟諳水性年老舊人今已殆盡沿海武職員缺甚屬緊要應如提督施世驃所請選擇諳練水性之人次第補授所司即議奏聞康熙四十九年八月二十七日諭戶部捐輸米穀原以貯倉備賑大小麥易於黴爛從無捐麥之例米穀價貴二麥價賤今欲捐麥代米不過便于捐納之人耳於倉厫積儲百姓賑濟並無裨益張伯行所請殊屬不合著嚴行申飭康熙四十九年九月十六日諭兵部據奏八月二十五日文登營副將等報有北來鳥船七隻沙船一隻泊成山頭外洋等處二十六日賊船移入棉花島官兵攻打又遁出外洋等語地方一有賊寇即當立時題報該撫鎮彼時不即奏聞及盛京將軍題擊敗海賊餘衆遁往山東奏旨令速行細察該撫方具摺陳奏殊屬不合賊船往盛京者原從東省經過沿海官兵何以不行堵剿今賊船敗回必仍經山東江南浙江該管各汛官兵務嚴加追擒勿致疏縱該部作速通行康熙四十九年九月二十四日諭户部朕恭膺天眷祗承列祖鴻庥統御萬方子育兆庶厪懷至治宵旰靡寧幸際海宇同風邊隅嚮化遐邇中外帖然袵席之安者是皆仰荷天地祖宗福佑之所致也方朕八齡踐祚之初太皇太后問朕何欲朕對臣無他欲惟願天下治安生民樂業共享太平之福而已迄今五十年矣惓惓此心未嘗一日少釋每思民為邦本勤恤為先政在養民蠲租為急數十年以來除水旱災傷例應豁免外其直省錢糧次第通蠲一年者屢經舉行更有一年蠲及數省一省連蠲數年者前後蠲除之數據户部奏稱通共會計已逾萬萬朕一無所顧惜百姓足君孰與不足朝廷恩澤不施及於百姓將安施乎朕每歲供御所需概從儉約各項奏銷浮冒亦漸次清釐外無師旅餉饋之煩內無工役興作之費因以歷年節損之儲蓄為頻歲渙解之恩膏朕之蠲免屢行而無國計不足之慮亦恃此經畫之有素也比來省方時邁已歷七省南北人民風俗及日用生計靡不周知而民生所以未盡殷阜者良由承平既久户口日蕃地不加增産不加益食用不給理有必然朕洞矚此隱時深軫念爰不靳敷仁用蘇民力明年為康熙五十年思再沛大恩以及吾民原欲將天下錢糧一概蠲免因衆大臣集議恐各處需用兵餉撥解之際兵民驛遞益致煩苦細加籌畫悉以奏聞故自明年始於三年以內通免一周俾遠近均霑德澤直隸奉天浙江福建廣東廣西四川雲南貴州各巡撫及府尹所屬除漕項錢糧外康熙五十年應徵地畝銀共七百二十二萬六千一百兩有竒應徵人丁銀共一百一十五萬一千兩有竒俱著察明全免並歷年舊欠共一百一十八萬五千四百兩有竒亦俱著免徵其五十一年五十二年應蠲省分至期候旨行民間舊欠既經豁免嗣後每年額徵錢糧務如數全完儻完不及額或别有虧空託稱民欠則負國甚矣即責令督撫以下官員償補仍從重治罪夫地方大吏以及監司守令皆與吾民誼均休戚者也誠克體朕孳孳保赤之懷實心愛養力杜侵牟朘削則閭閻咸得衣食滋殖無有失所而為官吏者亦身名俱泰豈非升平樂利之盛事歟爾部移文各督撫諭旨到日即刋刻頒布遍示窮簷令咸知悉特諭康熙四十九年十月初三日聖祖仁皇帝御製文苐三集卷十六
