body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十四古今體詩四十首春日郊行春殿晴雲繞鑾輿出禁闈桃花臨紫陌栁葉暗青旂宿雨能清蹕和風早拂衣馬嘶馳道逺滿地盡芳菲清明登玉泉山寒食登髙芳草青泉聲映栁出春亭心中懷得天然處坐對沙鷗樂野汀時廵近郊憫農事有作芳郊景物麗淑氣扇暮春靈雨應良節光風薄嘉辰省耕已届候夙駕方来廵前驅列式道羽衛羅鈎陳時有田間子荷耒披車塵譏訶勿頻數疾苦當咨詢千耦幸終畆二鬴猶懸囷穮蓘爾勤動痌瘝予隱親賙賜出泉府拊循屬官臣行潦有挹噐冽井無枯津所惠良未徧嗛嗛愧斯人鄚州雜詩五首條風鼓櫂動清漪夹岸青青楊栁垂輕轉牙檣觀易水波光日影暎旌旗其二桃花歴落李花開緑栁含烟傍水隈鴻雁平沙看不盡春光曖曖入蓬莱其三為省春耕歴灞灃鑾輿頻止勸農功柴門掩處烟村靜碧水長橋落彩虹其四陽氣温和臨樹久花繁物靜草芊芊莎添嫩色含波緑栁覆金堤翠幕連其五野水瀰漫處處長方流涵玉動珠光風移藻荇波㾗闊千㸃鷖鳬栁一行春日内苑賜宴詩并序已未三月律應姑洗望日之吉賜内閣大臣及侍衛宴於内苑時乃玩花於綘雪玉樹含風浮杯於西齋金池漾月因題四韻以示諸臣春深内苑裏珍席宴羣臣蝶向雙檐舞花飛複閣新和羮期上佐調鼎協洪鈞蕭鼓歡無極芳年醉此辰初夏登樓臨水澄潭徹底開心鏡栁絮輕飛近玉樓處處晴花風拂起鶯啼四月繞芳洲夏日同三王慈寧宫請太皇太后安九天旭日照銅龍朝罷從容侍上宫花蕚聨翩方晝永晨昏常與問安同夏旱歩禱南郊喜雨歴春憫農勞首夏望嘉榖離畢月故遲密雲去何速顥穹閟膏澤及此祈年夙齋居承穆清中夜起自肅繁星麗赤霄雲漢光自煜雞鳴開重闉輿馬輟華轂歩禱升郊壇祠官啓太祝是時甘澍零霑潤及拜伏空濛迫閶闔噴薄驅海瀆屏翳灑道廻滲漉足裳服麥隴應秀色重穎欲在目願惟歌屢豐餘粟棲比屋五日泛舟賜内大臣侍衛宴錫宴公卿禮數隆浴蘭令節泛翔鴻波開舟楫迎仙仗岸轉旌旗驟玉驄積翠香蒲經宿雨輕烟寶幄散薫風臣民共樂昇平日暢飲何論灞滻雄咏蟬飲露當凉夜吟風向晩晴乍移深樹影又聽别枝聲與物心無競離塵翼最輕秋懷聊寄咏愛爾獨能清題蘇軾墨竹徑尺篔簹墨淺深雪堂健筆勢千尋縱饒凝露春梢色不比凌霜挺節心初寒灑雪凝霜正渺漫曉来朔色滿林巒何當吹遍鄒陽律盡却人間黍谷寒懋勤殿古榦梅宫梅先發上林枝淡白含芳窈窕姿若待春風吹律暖影隨朝日樂雍熙春曉夜短正宜眠又聞天色曉臨門親政務豈厭事多少春雪三冬望雪意殷殷積素春来亂玉紋農事東疇堪播植勤民方不愧為君懋勤殿讀尚書至無逸篇有作元化斡四運淑景催芳年乾乾總萬幾寸隂惜屢遷綈几散瑶帙阿閣颺鑪烟澄懷求至理孔壁存遺編公旦訓無逸則古多所宣言念小民依田功稼穡先天命良匪易敬德省厥愆法戒備近王炯炯斧扆前寤寐思古人千禩精意傳端居不遑暇三復期勉旃春晝二首液池氷泮後阿閣燕来初晝轉銅壺漏春添玉案書晴絲烟乍捲花霧綺還舒萬象生成意欣欣各自如其二亭午朝初暇方春候轉佳惠風来上已遲日麗中街鶯語頻遷樹花隂半映階所期凝庶績永使萬邦懷景山春望雲霄千尺倚丹邱輦下山河一望收鳯翥中天連紫闕龍蟠北極壯皇州烟生沆瀣春初麗露濕芙蓉翠欲流却向閭閻看蔀屋崇髙還厪廟堂憂榴花未結千房實先開五月花紅綃簾户下疑似漢時槎詠觀天儀噐乾象極髙逺孰者為綱維惟此貞恒理可以揆測知靈臺有儀噐云自古聖貽偃蓋金粲粲飾體珠離離横玉筦其中激水相推移内挈黄赤道外互南北垂紫宸凝不動列曜如峙碁制作侔造化法撰窮神竒昔在有虞氏以命和與羲七政順其軌庶績咸用熙後来代有述神明夫前規日官比申命欽哉重人時惟㡬恒自勅曰旦凜在兹五緯協位序燠寒無僭差永言答靈眷長與休禎期鶴夜警三霄露秋凌萬里雲立同薛稷畫舞憶鮑昭文經筵進講周易桂宫仙仗啓蘭殿講筵開朝士鳴珂集詞臣執簡来天苞宣一畫人極位三才待抉羲文秘羮牆日㡬回秋日出郊觀稼秋氣日寥迥萬象皆蒼蒼朝暾被渥露草木含晶光西成方届候農事將築場於焉省歛穫令典重百王輕軒屏前置夙駕無嚴装郊原一以眺烟樹紛成行微風散深樾清流抱廻塘土脉秀且沃篝車鬱相望新䥥粲如月刈此溪雲黄捃拾復何幸遺秉滿道旁鳥雀互翔集婦子咸恱康行將吹葦籥報爾千斯箱眷言三時勤艱難詎可忘茫茫視九壤豈盡歌豐穰二鬴苟不充予饑惄如傷幸兹樂有年時若雨與暘朂哉慎所麗田功庶無荒題張擇端清明上河圖天津橋下水粼粼栁外盤舟夹畫輪想見汴京全盛日春遊多少太平人長至日祀天圜丘有述四章於穆天縡鑒觀惟赫播物無私佑于有德髙皇受命膺符闡繹丕顯太宗廓圖登績眷我皇考九圍是式克享天心立民之極一章洪惟景運集於渺躬南諧北爕君兹萬邦夙夜敬止恒惕于𠂻毋曰髙髙聽卑則聰毋曰盱盱視逺斯通罔敢逸豫昭事必恭二章是月仲冬維日長至爰啓㤗壇肅將禋祀濟濟奉璋羣工在位牲玉既陳籥舞乃備對越有䖍百神攸暨雲旓揚揚華皇晢晢三章乃辨雲物載觀載書乃占豐年多黍多稌南陸曜采導我歸輿芸香始生景長以舒初陽来復相協厥居垂象是則奉若不渝四章逺望西山積雪積雪西山秀仙峰玉樹林凍雲添暮色寒日淡遥岑春盤小摘園中露新香糁作羮嵗和欣有兆甘菜已春生端寧殿齋居肅肅羣籟屏裊裊鑪烟舒諏日躬禋祀濯祓臨齋居輝輝閣西日流影照綺疏坐久微風来冷然吹衣裾霽心觀萬象黙見天地初感神在至誠寧俟灌鬯餘賜直𨽻廵撫于成龍并序直𨽻廵撫于成龍秉性惇樸廉介夙聞朕心嘉頼俾典節鉞保釐畿輔惟能激濁揚清始終如一清潔之操白首彌厲真國家之可重人所不能也兹来陛見爰賜以詩用示敦勵之義且以風有位焉自昔崇廉治勤思吏道澄郊圻王化始鎻鑰重臣膺政績聞留犢風期素飲氷勗哉貞晚節襃命日欽承苑西新栁二首岸草青回太液池春来又見栁垂絲東風小苑三眠後最愛鵞黄蘸水枝其二輕烟漠漠栁青青半拂虹橋半水亭啼鳥數聲春晝永博山香裊隔簾聽和唐太宗咏桃花即用原韻苑裏韶華滿春工試綺装霞輕籠樹影日暖散林光倚檻千叢錦開簾百合香東風自駘宕長䕶萬年芳聖祖仁皇帝御製文集巻三十四
