body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷三敕諭諭內閣翰林院致治之道無過法祖鑒於成憲乃罔有愆欽惟太祖髙皇帝開天垂統太宗文皇帝式廓鴻圖規模𢎞遠啓佑無疆朕御極以來景仰先猷時切儀型之念世祖皇帝時曽命儒臣纂修太祖聖訓太宗聖訓雖具稿進呈未經裁定頒布茲特命圖海李霨為總裁官折爾肯折庫納熊賜履為副總裁官達哈塔胡密子楊正中郭四海陳嘉猷富拉塔王揚昌陳志紀周𢎞衛既齊為纂修官滿官四員漢官四員為謄録官滿漢典籍典簿四員為收掌官悉依前式分别義類重加考訂勒成全書朕得以朝夕觀覽是訓是行亦俾子孫臣民率由無斁卿等膺茲委任須恪恭勤勵務期早竣以副朕覲光揚烈至意特諭康熙十年四月初四日諭刑部等衙門邇來天氣亢暘不雨或因刑獄淹禁中有寃枉亦未可知爾等將現監人犯詳加清理如有情罪可矜疑者照例減等發落其現審人犯爾等速為審理應減等者即與減等應釋放者即行釋放務期獄無寃滯以迓天和爾等即遵諭行特諭康熙十年四月初五日諭禮部今已入夏亢暘不雨農事堪憂朕念切民生躬自刻責特頒嚴旨戒飭各官修省過愆祈求雨澤乃精誠未達霖雨尚稽朕心晝夜焦勞不遑啓處茲朕虔誠齋戒躬詣天壇祭告懇祈甘霖速降以拯生民爾部作速擇吉其祭告儀物即行備辧特諭康熙十年四月初七日諭吏部朕觀侍郎嚴正矩章雲鷺通政使霍叔瑾才具庸常不能盡職俱著以原官致仕爾部即遵諭行特諭康熙十年四月二十一日諭兵部武官有防守地方緝捕盜賊之責必弓馬嫺熟方克勝任其不稱職者雖總督提督等有不時糾參之例但與其糾參於後貽誤地方不如於選授之時詳加選擇除現任推升各員外以後凡係應到部掣籤之官爾部即考驗其弓馬然後令其掣籤如有不堪者具題照例給以原品頂帶停其補授爾部即遵諭行特諭康熙十年五月十一日諭宗人府吏兵二部以後王以下及文武官員處分罰銀及罰土黑勒威勒之例應否酌量其情罪改為罰俸著確議具奏特諭康熙十年五月二十六日諭禮部朕仰體世祖章皇帝遺志欲躬詣太祖太宗山陵展祭以告成功前命議政王貝勒大臣九卿科道等會議以各處多有災傷暫行停止今奉太皇太后旨謂朕躬謁山陵展祭告成關係大典即宜舉行以盡孝思朕仰遵慈命擬躬行謁陵禮應行事宜及需用各項著各該衙門速行備辧爾部即遵諭行特諭康熙十年八月初六日諭禮部耕藉大典事關勸農來春應照例舉行其應行事宜詳察典例具奏特諭康煕十年八月初八日諭吏兵二部差官巡察各地方及差遣大臣閲視兵馬等事前經條奏俱著候旨舉行今思巡察地方關係吏治民生閲視兵馬關係邊防軍務俱屬緊要應差遣何項官員著九卿科道會同確議具奏特諭康熙十年八月初八日諭吏部前因浙江巡撫范承謨以患病具奏準其回京調理故將山東巡撫袁懋功調補今據兩省督提奏稱百姓愛戴號泣請留情詞懇切特順民情俱著各留原任張鳯儀著候另缺推補爾部即遵諭行特諭康熙十年八月二十九日諭兵部併督捕衙門直𨽻重地理宜肅清邇來盜賊繁多大為民害地方官怠玩不能力行禁戢以致劫掠時聞真盜捕獲者少良民株纍甚多皆因防汛官員止於降罰帶罪緝拏其間有失事最多不能盡職者仍令留任愈致貽誤地方今盜賊應作何禁戢嚴拏及以盜案降罰幾次者作何處分爾部再行定議具奏至京城內外盜賊棍徒肆行無忌作何責成官役嚴行緝拏亦著一併議奏特諭康熙十年十二月初五日諭禮部尚書哈爾哈齊侍郎常鼐人君對越神祗務盡其誠敬之心禮儀節文宜臻明備每年元旦躬詣堂子展拜可令鳴贊贊禮永著為例康熙十一年正月初一日諭太常寺祀典關係重大理宜敬慎嫺習近見爾衙門典禮俱未諳練又所奏音樂多未合節殊非慎重禋祀之義以後著詳加練習勿得仍前怠忽褻越祀典特諭康熙十一年正月十八日諭戶部江南省連年水旱相仍災傷甚重與别省不同若將舊欠錢糧一併追徵民生愈致困苦朕心不忍其該省以前未完錢糧察實係拖欠在民者著暫行停徵俟民力稍蘇之時再行具奏請旨爾部即遵諭行特諭康熙十一年四月初四日諭吏部等衙門江南省事務繁劇與他省不同向來照定限料理不能如期完結各官罹參罰者甚多前原任山陜總督莫洛曽請寬限積案始得清楚今應照此例將江南省一切陳積事件寬其限期令地方官料理完結爾部等衙門詳議具奏特諭康熙十一年四月初六日諭吏兵二部陜西幅員遼闊邊疆重地防禦宜周省城有將軍滿兵駐防總督衙門應移駐近邊扼要地方專管陜西以便控制其山西省附近京師應照山東河南例令該撫料理爾二部會同詳議具奏特諭康熙十一年四月十八日諭吏部原任大學士衛周祚品行端方清慎素著曩以引疾請告回籍調理今閣務殷繁贊理需人著即召取馳驛來京入閣辦事爾部即遵諭行特諭康熙十一年四月二十七日諭刑部刑獄重地人命攸關天氣炎熱亟宜清理雖熱審現有定例但已結大案現在監禁各犯或有無知而罹法網小過而陷重辟者株連無辜久淹禁羈朕心每思及此深為惻然茲特遣大學士圖海杜立德學士哈占宋德宜等會同三法司逐一詳加審鞫凡有罪可矜疑者即與察明事由開列具奏務使情法允協有枉必申以副朕欽恤刑獄至意特諭康熙十一年六月二十五日諭工部河道屢年衝決地方被災民生困苦深軫朕懷據差往看視決口侍衛吳丹學士郭廷祚回京繪圖進呈朕觀黃河自宿遷以至清河皆為緊要雖有遙堤恐一層未足捍蔽水勢應否於遙堤之外再築遙堤爾部即行河道總督漕運總督會同相視商酌築堤果否有益併所需錢糧若干逐一詳確議奏爾部即遵諭行特諭康熙十一年六月二十七日諭宗人府貝子尚善性行端良凡事小心敬慎勤勞為國著仍復其原多羅貝勒爾衙門即遵諭行特諭康熙十一年閏七月初二日諭刑部設立刑法原以戢姦禁暴必事情重大方可用刑嚴訊近見內外問刑衙門嘗有濫用夾棍致斃人命者朕心殊為不忍以後審問事情爾等務加詳慎勿得輕聽問官不分輕重動輒夾訊希圖草率結案仍將審事官員嚴加申飭不時稽察其有任情作弊者即行指實題參務使重刑不得濫及無辜以副朕矜恤民命至意若有不應夾訊之人擅用夾棍及罪不至死徑行夾死者應作何處分爾部會同吏兵二部定議具奏特諭康熙十一年閏七月十四日諭禮部帝王致治首在維持風化辨别等威崇尚節儉禁止奢侈故能使人心淳朴治化休隆近見內外官員軍民人等服用奢靡僭越無度富者趨尚華麗貧者互相效尤以致窘乏為非盜竊詐偽由此而起人心囂凌風俗頽壞其於治化所關匪細今應作何分别務行禁止著九卿科道會同嚴加確議定例具奏特諭康熙十一年八月十一日諭兵部都統副都統職司軍務關係重大必得其人乃克勝任以後漢軍都統缺出著將該旗副都統應升官員現任提督一併開列具奏副都統缺出著將該旗參領應升官員現任總兵官一併開列具奏爾部即遵諭行特諭康熙十一年十月十九日諭禮部民資粒食以生今當播種之時亢暘不雨農事堪憂皆由朕躬涼德政治有所未協未能仰格天心用是夙夜靡寧實圖修省以感召休和為民請命爾部即虔誠祈禱雨澤以副朕勤恤民隱至意特諭康熙十二年三月十一日諭戶部江南要地財賦繁多前馬祜所報歷年那移侵欠錢糧數目未清雖經有旨暫行停徵但官民侵欠必須分晰明白應追應蠲始免牽混若止責令該督撫清察歲月遲延茫無頭緒以致官民受纍無所底止今應否專差大臣前往徹底清察著九卿科道會同詳議具奏特諭康熙十二年三月十三日諭戶部江南蘇松常鎮淮揚六府連年災荒民生困苦與别處不同朕心時切軫念除今年錢糧已經派撥兵餉外其六府康熙十三年地丁正項錢糧特行蠲免一半以昭朕存恤災黎至意爾部即將應蠲免數目察明確議具奏特諭康煕十二年四月十二日諭吏部國家大小事務在內責成部院在外責成督撫其事情重大煩難者固應照限完結如平常易結之事理應速結以清沉滯近見內外各衙門題覆本章有將易結之事遲延不結必俟限滿乃為具題其不行具題完結遲滯者必多牽連守候必致苦纍以後著速行完結勿得遲延務俾案件清楚以副朕委任至意爾部即通行傳諭遵行特諭康熙十二年五月十一日諭兵部茲因地方底定平西親王吳三桂平南王尚可喜靖南王耿精忠各具疏請撤安插已允所請令其搬移前來地方應行事務及兵馬機宜必籌畫周詳乃為善後之䇿應各遣大臣一員前往會同該藩及總督巡撫提督商確作何布置官兵防守地方並照管該藩等起行應差官員職名開列具奏特諭康熙十二年八月初九日諭吏部國家設立言官專司耳目凡政治得失民生利弊必須詳切條陳直言無隱斯為稱職若但敷衍虛文浮冗勦襲或以不急之務草率塞責非朕廣開言路之意今將科道官親加考試其留用各員著益加勉勵殫心盡職以副委任內石文郁范時起何名揚才庸無文不稱言職著革職爾部即遵諭行特諭康煕十二年八月十二日諭吏兵二部雲南地屬遠疆今該藩官兵既撤控制需人應專設雲南總督一員添設提督一員責成專管料理爾部速議具奏特諭康熙十二年八月十八日諭戶部平西親王吳三桂平南王尚可喜靖南王耿精忠等請撤安插已允搬移該藩及各官兵家口安插地方所需房屋田地等項應預為料理務令到日即有寧居以副朕體恤遷移至意爾部作速詳議具奏特諭康煕十二年八月十八日聖祖仁皇帝御製文集卷三
