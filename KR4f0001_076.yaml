body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷三十六目録古今體詩三十八首東巡二首並序玉田駐蹕豐潤城西夷齊廟並序灤河泛舟經永平城南撫寧山海關並序蒙恬所築長城薑女祠曉過寧逺行殿夜覽章奏呂翁山是聖祖太宗文皇帝擒洪承疇處松山杏山晚眺憩小凌河錦州道上駐蹕大凌河途次逢寒食十三山過廣寧望醫巫閭山渡句驪河過永安橋口占盛京遣使請太皇太后皇太后起居夜書奏疏畢偶成三月初六日告祭福陵恭述十韻初八日告祭昭陵恭述十二韻盛京舊宫告祀禮成宴諸臣於舊宫三月十一日雪中詣永陵告祭薩爾滸並序栁條邊望月望祀長白山松花江放船歌江中雨望經葉赫廢城鐵嶺雜詠
