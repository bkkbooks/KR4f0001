body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻四十六目錄古今體詩三十首三渡齊河即事趵突泉留題源清流潔四字夜登泰山新栁覽淮黃成登金山望長江虎丘雨後見桃花過雲栖憩竹林下令人劚筍劚蘭雲栖歸途遇雨錢塘江潮西湖夜月岸側桑葉初碧癸未春二月二十日自杭回至蘇州是夜雨二十一日朕欲北行地方大小官員百姓留住二十二日雨甚再留不能起行二十三日雨晴又欲留故書懷以示廵省江浙見閭閻有起色示諸臣省刑愛民船泊無錫至江寧百姓歡迎遮道志喜行宫春雨作書竟日江寧道上口號清明麥秀下長江舟中作自江寧至京口登焦山維揚雨霽見泰安等數州縣饑民亟命設法賑濟東八牐舟遇順風志喜閱兩河告成事畢因有恩詔星夜回京至天津書懷前過江浙桃花已放今囬鑾至津門復見桃花盛開詠各種牡丹詠杜鵑花賜髙士竒
