body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三十九雜著閲史緒論唐太宗面舉羣臣得失謂劉洎私於朋友傳有之云公爾忘私私於朋友者必有忝於朝廷在昔已然今人愈甚矣唐太宗貶蕭瑀為商州刺史漢唐以來士人信從佛教者往往有之皆其識見愚昧中無所主故為所惑耳若蕭瑀自請出家則又愚之至矣唐太宗時殺華州刺史李君羡䜟緯之說本不足據如唐太宗以疑誅李君羡既失為政之體而又無益於事可為信䜟者之戒唐高宗時太子𢎞以忤天后遽薨𢎞之奏請義陽宣城二公主出降洵仁厚之至意苐時方母后逞志宜曲為感悟徐俟轉移徑上聞於君父致觸母后之怒亦有自取之咎云武后不豫閻朝隱禱少室山事朝隱自為犧牲沐浴伏爼上請代太后命此小人獻媚之極致亦不足道苐武后遂喜而厚賞之則崇長諂諛甚為失體狄仁傑卒太后泣云朝堂空矣仁傑在當時為諸臣第一武后亦以第一流目之人臣特患不能竭忠為國爾若果盡誠無二不以身家為念雖當艱危之際亦可深䝉主眷况朝廷清明乎唐臨淄王隆基討韋氏天星亂落如雪凡天星皆有定數若史册所紀星隕頗多甚至亂落如雪果爾則星之殘缺不可勝數矣何至今猶燦然如故耶此等必流星過度誤以為隕落也道士司馬承禎對唐睿宗語陰陽術數道士且不屑為况人主日御萬幾何暇及此睿宗之問為失言矣承禎應對確有至理固請還山尤見高致唐明皇焚珠玉錦繡於殿前人主崇尚節儉自是美德苐當近情平易不可矯激太甚如唐明皇以珠玉錦繡焚之殿前矣未幾復遣使求珠翠竒寶何前後之判然不侔耶鋭始者必鮮終人情大抵然也唐明皇殺三子人主信任讒佞不能自保其子如漢武帝巫蠱之篇每不忍觀况一日殺三子乎奸邪之害人家國亦憯毒之至哉唐明皇次於馬嵬軍士殺楊國忠唐明皇耽於逸樂任用楊國忠以致倉卒出奔軍士憤怨是其素所逸樂者即取禍之道也歷觀史冊比比皆是矣李光弼與史思明戰於邙山敗績兵機遲速關係最重利害所爭間不容髮有宜速而遲者固失事機有宜遲而速者亦患於輕躁皆足取敗至於輕信僉壬浮說及令中使督師往往僨事以至全軍覆沒如魚朝恩之促李光弼者何可勝數明季亦坐此弊郭子儀因盜發父塜乃以天譴引咎自漢唐以來之勳臣功名最盛而福祚克全者以郭子儀為首稱非其得於天者獨厚也良由篤棐謙沖不敢以功業自矜故能終身顯榮聲施後世觀其自謂不能禁暴乃遭天譴數語其虛懷卓識過人逺矣唐德宗時罷𣙜酒酟酒之糜穀甚多若能禁止穀必有餘苐在地方官相機裁抑使民自然樂從斯為有益如必自朝廷禁之則恐奉行不善反滋弊端矣陸贄奏代李楚琳事陸贄章奏甚多莫不竭忠盡智悉中機宜此尤務全國體深有合於王道雖遭時不淑其嘉謨碩畫足為臣子進言之法李晟表請為僧不許懇辭方鎮亦不許李晟雖遭讒間不能坦然自信則亦未嘗學問之故也凡人臣善處功名者不多概見惟在帝王加意保全之斯可得善始善終耳唐德宗時詔葺白起廟贈兵部尚書白起即當褒贈而因或人虛誑之言亦非政體况起之殘忍好殺不可以饗爼豆而風示將帥也明甚德宗之舉有兩失矣唐德宗謂建中之亂術士豫言之蓋天命也天下託命於人主而相職佐君以有為故朝廷振作則慶流宗社澤被蒸民非時命所得而主也李泌云惟君相不可言命確是實理唐德宗撫納雲南王異牟尋帝王於要荒之外非不欲聲教遐暨苐未免煩後慮耳觀唐德宗之招雲南等部以弱吐蕃而卒亦為患可知懷遠有道不必强致之也唐憲宗時裴潾闢栁泌之藥不可服金石性烈烹煉益毒從古餌之被害者衆矣後人猶蹈覆轍何也夫金石固不可餌即養生家服氣之說亦屬矯揉朕嘗體中小不平尋味參同契諸道書殊無所益靜覽性理一編遂覺神志清明舉體强固足見方士家言皆不可信唐文宗與李德裕言朋黨事人受天地之中以生所謂公心也公好公惡豈可阿狥若曲附朋黨滅天理喪人心無所不至矣士流讀書明理至於如此豈不愧衾影哉唐懿宗拜十六陵發明非之古人雖重廟祭然陵寢所在拜之未為非禮傳云過墓思哀乃人情也故天下風俗雖殊至於拜墓則四海同然矣尹起莘之言於理未確馮道對唐明宗謂歷險則謹而無失平路則逸而巔蹶粵稽史冊國家當䝉庥襲慶之後率以豐亨豫大弛其兢業之心漸致廢墜者往往有之所以古昔聖賢每於持盈保泰之際三致意焉馮道以明宗喜有年而設譬以對猶得古人遺意雖道之生平不足比數而其言固自可採也馮道卒自後晉至周皆以篡得國馮道歷臣其比肩事主之人其俯仰愧怍不識當何若矣乃猶著長樂老敘以自述其榮遇當時反以德量稱之四維不張於兹為甚無惑乎其亂亡接踵也五代紀六朝五代於開國之初貽謀率多未善一切舉動苟且目前殊無久長之計以視漢唐之規模宏逺相去奚啻徑庭宋太祖欲察羣情向背頗為微行宋太祖欲察羣情而不安於深宫宴處洵勵精求治之心苐當命駕時巡省方問俗進窮簷之父老而使得自言其疾苦則民隱足以周知可無九閽萬里之隔矣何必僕僕微行以自輕耶南漢主作燒煮剝剔刀山劒樹之刑愚民自罹法網情罪昭然萬無可生之路必不得已而刑之尚覺惻然不忍何得於五刑之外恣為慘酷殘民以逞耶宋太祖時五星聚奎五星之行於天度數不同遲速各異何由聚於一宿雖史冊書之考諸天文斷之以理終不可信宋太祖時潘美用樊若水策造浮梁渡江江勢之洶湧浮梁似乎難結或當時聯舟而濟也即如晉伐吳時吳以鐵索截江晉用炬鎔斷之夫以鐵之重截江之闊何能浮而不沉此皆紀事者未及深思之過宋真宗時天書見於承天門虛誕之說欺人且不可况假為書詞以欺天乎宋真宗之蔽惑不待言也王欽若小人之尤以致其君過舉罪難逭矣宋真宗時作玉清昭應宮宋真宗以天書之故作此宮以奉之勞民傷財置於無用之地復為御容以待天書命大臣兼領宮使何所取義甚不可解王旦遺令諸子削髮披緇以斂王旦輔弼大臣不能救正天書之失負職甚矣至於臨歿之時悔心始萌亦已無及復遺令削髮披緇以斂是其心猶謂佞佛可以免過則平日之崇信異端不能篤守正道益較然可覩矣宋仁宗時夏人寇渭川旗左麾左伏起右麾右伏起史筆須徑質高潔言簡而事詳朕覽綱目續編文氣薄弱字句之間每多冗雜有似稗官小說者較之正編相去遠矣至發明廣義率剿襲陳言泛濫無當且議論偏謬尤不足觀宋仁宗時劉羲叟以鐘聲弇鬱謂之害金帝當感心腹之疾樂以昭功德召和氣當從其大者言之偶爾之疾亦屬感應毋乃瑣屑乎况古樂久失其傳羲叟何所考據不過憑臆之詞好事者遂為之傅㑹爾司馬光上宋仁宗劄子司馬光立朝行已正大和平無幾微之可議不祗冠有宋諸臣求之歷代亦不可多得其論君德有三曰仁明武治道有三曰任官信賞必罰要言至理可書丹扆座右萬世不易也宋英宗時司馬光以不能四六辭翰林學士司馬光綜史傳為通鑑其學殖淹博文詞最為典雅豈不能為四六者蓋因宋承五季之後時猶崇尚排偶競趨浮華故光以不能四六為辭所以矯當世之失而欲返之於淳朴其用意良深矣固非如後世鄙陋無文之人高談性命而蔑視詞章以自文其不學者所得而藉口也宋神宗時詔王安石越次入對王安石賦性堅僻動輒援引古義以文其執拗之私心而又口給便捷應辨不窮足以惑亂人主之聽所謂大奸似忠大詐似信也宋神宗時蘇軾言求治太急聽言太廣進人太鋭宋神宗勵精圖治王安石遂以新奇可喜之說雜沓竝進漸致海內棼然民生重困蘇軾云願鎮以安靜待事之來然後應之深得致治大體不祗為當時藥石至其條奏詳明洋洋纚纚忌者乃以縱橫譏之非公論矣宋神宗時用巨木為濬川杷杷之不可以濬川雖庸俗皆知之當時決違衆議特置濬河司設官以主其事迂疏之甚宋神宗時鄭俠上流民圖熙寧之時民苦新法如在湯火鄭俠以疏遠小臣繪圖上聞其為民請命忠讜激切之心猶可想見司馬光謂改新法當如救焚拯溺宋哲宗之初廷臣咸欲革除新法猶以改父之政為嫌司馬光毅然為以母改子遂使羣疑立釋可謂要言不煩善處大事者矣若以紹聖更法遂尤其建議之際已留瑕隙令惠卿輩得持其短長是皆事後之見爾宋哲宗時召程頤為崇政殿說書歷代講筵之設率臨御殿廷諸臣拱侍不過進講數行徒了故事而已夫有何益必清宮便殿潛心誦讀朝夕研究始能貫通義理有㑹於心宋徽宗時詔童貫等勒兵巡邊以應金遼之建國在宋之先相鄰百有餘年一旦乘遼之敝結金以圖之不知唇亡齒寒失策極矣矧信誓昭然甘於背棄其不祥孰大焉固不待靖康之末而知其顛覆巳宋徽宗時勒蔡京致仕蔡京以庸劣之流依附小人以圖登進即當燭其奸回決意屛黜逮其誤國而始逐之已無及矣用人之道誠不可不慎之於始也宋欽宗時以李綱為東京留守李綱之忠悃篤摯誠有大過人者苐靖康之時國勢已不可為即使盡行其言久居其位亦未必有濟也宋欽宗時宗澤與金人十三戰皆捷欽宗失國距此才四月爾宗澤一木之支其力幾何十三戰皆捷似有虛冒也曩進剿逆賊時我兵偶失利緑旗營將猶以捷聞將軍詰之則曰明朝舊例皆然可見陋習相沿其來已久宋髙宗時曹勛建議謀奉上皇由海道歸徽欽北行年餘宋之諸臣未有能畫一策者曹勛所議雖涉險道未必得當然其亟於君父之心則猶可取也宗澤聞警猶對客圍棋兵凶戰危大將臨敵當如何戒懼可與客對奕乎或其時亦有矯情鎮物之意紀事者未必不加飾其辭爾宋高宗時吳璘新立疊陳法鋒鏑相接迅不及停何暇約計為百步則用神臂弓七十步則用强弓從容擬議若是耶是皆全不知兵徒於紙上談之乃謂以此取勝恐未必然宋高宗作損齊宋高宗以損名齊自是清心寡欲之意苐當其時正宜奮勵有為非僅淡泊撝謙可以恢復大業即此一端觀之知其優游苟且而無振作之志矣宋孝宗時月四朝太上皇上皇在御自當乘暇問視豈可限定朝見之期孝宗於宋固敦倫之主乃以月四朝遂盛稱於史冊何所見之狹也宋孝宗時從太上皇幸玉津園人子愛日之誠從幸園亭未為不可論者則極非之若唐太宗奉太上皇置酒未央宫又以止於一見為孝養之缺務為刻論互相矛盾悖謬至矣宋孝宗作敬天圖敬天以實不以文詩所云不顯亦臨小心翼翼昭事上帝皆常存敬畏不因有所見而始愓也宋孝宗作敬天圖尚隔一膜虞允文之言可謂切至宋孝宗時陳賈請禁道學宋之諸臣排擊程朱以僞道學斥之固非正論若塗飾言貌襲取君子之名其隱微踐履實不可以告人者則又不可不辨設以假竊之徒盡目之為道學是宋室之與聞性天者更多於孔門也宋光宗時羣臣請朝重華宮不果行人君以孝治天下則臣下觀感以作忠兆民親睦而成俗真所謂至德要道也宋光宗不朝重華宮蔑棄彞倫莫此為甚至於勉强一朝都人為之大悅則其宮庭悖德久為舉國之所共憂矣宋寧宗時李全㑹張林襲金東平敗績當時金之兵力固衰以敵方張之元則不足以敵垂敝之宋則有餘兵法有云知己知彼宋人何其昏憒也先是遼困於金宋乘其釁巳為遼所敗前車既覆而不悔亦深可憫哉宋理宗詔贈朱熹太師信國公宋理宗以不得與朱子同時為憾續編書之以見嚮慕正學之切不知當時信任僉壬即使朱子在朝恐亦為讒邪所中不得大行其道此皆掠美虛談且以彰其祖宗之失尤非所宜宋理宗時蜀將王䕫迎謁余玠王䕫帥所部迎余玠班聲如雷江水為沸雖屬形容之詞涉於誕妄矣他如矢大如椽山崩則江水不通鎖鎗以為橋畫地為船以習水戰之類不可枚舉又張貴募士伏水數日不食手能鑿船敵船豈皆聾瞶無一覺者伏水數日而又不食恐非人所能也徒為奇闢之說以新耳目揆之情理皆不足信宋理宗封賈似道衛國公權傾中外天下之大待理於一人斷宜讀書明理使萬幾洞察於中可以當前立決自然權不下移若中無定見不得不委任臣下漸致乾綱解弛太阿旁落鮮有不敗者如宋理宗可以為鑒宋帝㬎時陳宜中請遷都不果行人臣事上自當一言一事極其詳確宋末危急之時陳宜中慟哭請遷都乃以倉卒失奏行期致太后束裝虛待儒者涵養素定雖造次必於是顛沛必於是宜中良愧此矣宋帝㬎時羣臣相繼逃遁人臣之誼與國同休戚者也宋之丞相章鑑與廷臣曽子淵輩相率潛逃平日所學何事乃徑不知有綱常不顧惜廉恥乎元世祖時遣使窮河源漢之張騫唐之蔡元鼎所訪河源皆不過玉門關外紀載寥寥元之都實遠履發源之地紀其分流伏脈歷歷可指較之往代相去懸絶論者乃以為無益何也元世祖紀稱伯顔不妄殺勞而不伐大將統數十萬衆摧堅陷陳能不妄殺者元之伯顏與宋之曹彬可以竝稱至其勞而不伐若不知有平宋之功則又卓然獨步元成宗時太史奏日食不應凡日月之薄蝕原有定期若日食二分有竒其象甚微且當巳時陽光方盛仰觀未明遂以當食不食為說可謂浮誕矣今日食不及三分皆不入占誠為有見元泰定帝時禁西僧馳驛擾民郵傳之設所以速使節非軍國重務不得輕擾之至於金字圓符元時用以備邊乃僧人佩符乘驛者多至傳舍不能容無謂甚矣元政之衰於此可見元順帝時更鈔法金錢實貨而以鈔易之即使上下流通亦易於腐敗非經久之計也昔人交子㑹子每行之多弊不便於民凡為民所不便者皆不可行鈔法其一端也聖祖仁皇帝御製文第二集卷三十九
