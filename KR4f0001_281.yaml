body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十二雜著古文評論劉摰請修敕令刑罰非聖人之得已若科條繁密則有深文周內之弊此文剴篤詳明能述欽恤之意蘇頌論省曹寺監法令繁密帝王之道易則易知簡則易從此中正之言非補救之論也呂公著請令文武致仕官依外任官給俸錢緣情立説乃優恤耆老之誼呂大防論祖宗之法宋之家法逺軼漢唐於此可見其概呂大鈞選小臣宿衛議交互發意滔滔如泉源之湧溢范純仁論發運均輸狀論事之文難於中窽此殆得之奏陳靑苖等法疏力詆新法反有激成之患似此婉切深摰能不使人動心易聼李清臣䇿旨語能綜要故各綴數言而大意已自包舉勢原以勢字為主而錯綜參互以暢之文氣酣適讀此使人怡神議官綜練世務之言可令官方整肅明責立言深中窽會亦甚精警固本以教導宗室為國之本計識慮自爾深逺秦論洞矚成敗非由臆斷隋論光武亦尚吏治然猶能以王道行之隋文則專尚吏耳議論深細是前人未見到處范祖禹論封樁劄子兩事並陳意實相貫計慮周詳老成碩畫封還臣寮論浙西賑濟事狀逐段敷陳因憂民之切益以見謀國之忠封還差道士陳景元校道書事狀意本中正詞亦明剴邇英留對劄子宋世賢主必推仁宗此劄稱引最合第二劄子以至公至正本於至靜語有根據學問治功皆不越乎此江公望論邏察熙皥之時豈尚刻核文深得此義朝補之答外舅兵部杜侍郎書君子之道持已宜嚴而論人宜恕此庶幾得其意矣陳師道上林秀州書以禮自重嶷然有品張耒論法上法立弊生論甚警透論法下質文損益之故聖人誠有所不得已焉文筆髙奇意亦超然自逺敦俗論見地既優而勢更馳騁不可羈紲憫刑論上人法兼舉立言最為無斃非僅以髙談取勝雙槐堂記善為波濤而理特確正秦觀集䇿序此仿佛敘傳體而措詞甚有古奧之致法律下正色而言仁人之用心也王令師説以廣學樹師為治道昌隆之本與昌黎師説各自一意正命其佳處全在明白淺易可以警迷釋惑鄒浩富紹庭除祠部郎官制典嚴不佻謝文瓘除給事中制稜稜露爽可以激厲在官王資深等並除監察御史制申勉得體斯為綸言上哲宗皇帝書利害對舉文情條達能悉事宜李之儀代范忠宣公遺表原本篤棐之誼而文能行以整練斯為佳製朝説之元符三年應詔封事十事中治道之本原時政之得失靡不該舉而博辨雄詞奔會絡繹才士之文直臣之義也恥新好新騁異文士通病其不可與入道者往往坐此此為下一針砭傳易堂記敘次易學源流殆無遺義可以羽翼經傳李昭玘進保伍之䇿疏確識宏裁與周官遺制相為表裏李綱答詔問攻戰守備措置綏懷之方當日時勢已自難挽特文字疏暢可觀湖海集序和平溫厚風人之餘韻也汪藻為隆祐太后草詔典飭中特有新藻程俱與李樞密論事書用意深長不為一切權宜之説羅從彥韋齋記讀此記知考亭之學得於父師者其源流至深逺矣鄭樵通志總序網千載而成文綜百家以立説閎覽博物此其一助也李燾湖北漕司乖崖堂記乖崖有宋偉人此記可稱實録王十朋上殿劄子發論以氣字為主文亦具英風毅節楊萬里論神威疏辭源茂達而論據甚精論選法在吏不在官振大綱略苛細此銓政名言也周必大賜奉國軍節度使同知大宗正事士銖上表再辭免加食邑食實封不允仍斷來章批答峭潔無凡響賜威武軍節度使主管侍衛馬軍司公事李顯忠辭免加食邑食實封不允仍斷來章批答數語自爾古雅賜尚書右僕射虞允文上表再辭免轉左光祿大夫特封成國公加食邑食實封恩不允批答胚胎於訓誥賜參知政事龔茂良上表再辭免進太上日厯特轉兩官依例加恩恩命不允仍斷來章批答善於比擬賜顯謨閣直學士左朝議大夫知潭州沈介乞守本官職致仕不允詔德言藹然賜觀文殿大學士左光祿大夫知福州陳俊卿乞改除一在外宫觀遣差不允詔舂容之言特饒情致科舉詔亦得側席旁求之意幸學詔盛典鴻章良足相稱賜利州觀察使韓彥直辭免除鄂州駐劄御前諸軍都統制恩命不允詔古藻奕然賜觀文殿大學士左正議大夫知紹興軍府事蔣芾乞檢會前奏除一宫祠不允詔髙雅不屑雕潤賜虞允文辭免特進左丞相兼樞密使進封華國公加食邑食實封恩命不允詔詞義淹贍賜草土劉珙允詔溫雅多風賜觀文殿學士大中大夫知建康軍府充江南東路安撫使兼行宮留守劉珙乞差在外宮觀不允詔德意宣達賜少保觀文殿大學士充醴泉觀使侍讀永國公史浩乞休官不允詔爽徑不事華靡賜奉國軍節度使殿前都指揮使王友直乞除一宮觀遣差不允詔溫語並有鋒頴賜朝散郎權尚書禮部侍郎兼侍講齊慶胄辭免除禮部侍郎恩命不允詔朗潤兼擅聖祖仁皇帝御製文第三集卷四十二
