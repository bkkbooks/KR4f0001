body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷七目録敕諭諭巴林長公主諭傅𢎞烈賫奏道臣劉曉諭內閣傳諭平南親王奄達尚之信賫奏人諭吏部諭將軍穆占諭戶部諭禮部諭吏戶兵三部諭撫蠻滅寇將軍廣西巡撫傅𢎞烈諭吏兵二部諭掌院學士陳廷敬侍講學士張英侍讀王士禎中書舍人髙士竒諭對秦吳默納等諭大學士撫逺大將軍圖海諭吏部等衙門諭兵部諭中書舍人髙士竒諭刑部諭禮部諭吏部等衙門諭將軍穆占
