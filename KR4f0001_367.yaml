body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十三古今體詩四十九首五月上旬避暑熱河塗中喜麥秋盈野雨暘得時賦七言一律畏暑乘輿出鳳城麥秋預卜望庚晴千村共飽連年稔萬井同歡比屋盈谷有靈泉山脈壯道無峻嶺馬蹄輕移風易俗先忠孝蕃息編氓在厚生夏日山莊日永炎風盛純隂在內含扶陽求物理避暑豈幽探山靜清歊熱泉瀠照碧嵐隨時駐步輦無著亦無貪其二畏景消煩慮吟詩續古風野花羅檻外山鳥滿林中雲氣氤氲合鶯鳴颯爽同無能尋麗句賦物愧難工金蓮盛放曽觀貝葉志金蓮再見清涼遍地鮮近日山房栽植茂參差髙下共爭妍其二數畝金蓮萬朵黃凌晨浥露色輝煌薰風拂檻清波映併作芙蕖滿院香賦得山林引興長曽讀杜詩解紛紛議論多遇時非泰運行道至蹉跎托迹山林趣披懷水石歌千年賦比興後世豈能過詠夏甘泉日永秩南訛清氣重雲入句多性理精研過盛夏豈因白首廢編摩其二信風已盡接朱明長飬舂容草木亨潄露調氷消暑氣何如心靜則神清詠新竹叢隂半畝潤新篁花氣繽紛伴竹香可愛霏微昨夜雨簷前風響趂蒼筤熱河産人參雖不及遼左枝葉皆同命翰林蔣廷錫畫圖因戲作七言截句記之舊傳補氣為神草近日庸醫誤地精五葉五枝成洛數順時當用在權衡蘭菊圖尺楮繪秋容搜尋墨淡濃丹青偏綽約錦繡雜䒠茸意運含毫手神生應矩胸自分枝向背形影入芳蹤蓮花岩松牡丹離宫初雨後花氣滿天街石壁流泉響松坪古幹佳香凝金掌露名重玉盤叉靜裏經聲息方知道有涯嘉禾雙頴夜雨初晴日素商驅暑天林紅變緑葉榖熟卜豐年勿訝嘉禾瑞須知貴粟先秋成各地異大有再書篇湧翠岩觀瀑賞白蓮畢竟天然造化功方能巧設古今同噴雲百尺穿岩石瀑水千層點藥叢波湧白蓮承曉露溪浮緑蓋動香風經聲似脫紅塵外泡影依稀宇宙中梨樹峪道中步輦口占入峪橋分三岔路傍崕步輦景何深山中獨見松林影時有清流助鼓琴其二一溪展轉見山花步步石苔楊栁斜試看目前將熟果青榛郁李並堪誇雲巖三庚不用碧筒酒九井何貪消暑珠自有雲峰來澍雨巉巖風颯到茅廬山居即事清啇方至催蟬急林葉吟風暑漸遙三伏炎蒸才過半山居遍地喜禾苖覽孝經衍義有感而作孝友乾坤藴彛倫宇宙開無違遵制禮色飬勉循陔風木追前事春秋思表哀歡心從博愛錫類育英才惡慢須防過驕危誡取災教原由匪懈德本足兼該不敬有何别存誠自可推始終勸興行經義日昭回用梌木杯器素輕珠玉器專製及時杯錯節分花影盤根别利才茂林成木癭深谷染莓苔淡泊明吾志天然見體裁春行千紅艷萬紫鮮頻催鬚鬢方寸懸桃火栁煙恐蕩志吟風㺯月禁狂顛案牘惟勤被景牽逢春又惡鬭芳妍禮樂詩書海嶽編進德修業須鑽研曇雲寂滅淪王道老氏無為徒苟延致知端賴格物先次第由來性理篇性理無私天地宣太極乾坤未畫前敬承執中授受逺勿替心傳思永年去嵗八九月雨最多民間俗説封地雨故一冬少雪猶可支持自交立春復不見雲所以望雨甚殷昨晚密雲四起夜深甘霖即霈田間老幼無不舉手加額歡聲載道朕以民食為天喜均一體故賦七言近體以示羣臣吟詠由來喜雨多久晴喜雨更如何天心即是民心感海甸應同畿甸歌立政剛柔符造化體仁寬裕得人和兩間物理原難盡勿入浮詩曲士科春行愛此融融飬育多平原髙下識恩波雖然迅速春難住四季何嘗離太和栁絮御苑春將盡和風鼓物生藝窗來淑氣丹陛奏清聲眠栁垂青瑣流鶯囀碧泓沾泥非有意髙下點蓬瀛清潭一潭清冷拂逰塵活水源頭可問津靜處定知無復浪動時須認養潛鱗臨流能解薰風意對景先愁潦雨頻雲影波光相映處湛然澄徹見天真讀朱子全書有感而作降𠂻天命同仁性氣質多偏亦有全人十已千知自勉參三列九授師傳直方表裏須涵飬朝夕云為在惕乾喻道程朱明盡善正心窮理遡淵淵暑將退歊蒸少退解煩憂白髮蒼顔萬里愁觸物方知開造化間來更覺有源流倒垂樹影河邉水懸挂波聲岸上樓分外並無著意處惟將周易靜中求浙閩總督范時崇陛見來京朕每念祖為開創宰輔父乃忠義名臣所以待之優重今因回任特書御詩餞送翼唐九佐開天命論道三台識國楨握管表章文學館持忠堅保嵗寒名棟梁祖幹家聲重蘭桂孫枝令譽清浙閩封疆慎撫育惟期寧靜勉精誠古北口提督馬進良以年老辭去朕念當日鷹揚百戰挽強執鋭自守紫塞內外恬靜皆因宿將老成之所致今回林泉深所惜也故賦五言特記不忘疆場舊事也勇貫先鋒氣鷹揚後陳威秦關提寶劒沙磧歷天旗白髮秋霜肅丹心皎日輝餞飲軍民别恩崇賜御衣賦得萬壑泉消夏千峰翠作秋白藏新素莭碧澗洗心泉爽籟鳴楸葉纎雲罩野田鴻飛橫峻嶺鶴舞愛平川見雨心愁潦聞暘意省愆聞江南旱西成登瑞榖南畝慶豐年逺近無殊别盈虛有後先桑榆懷壯志吟詠借瑶篇生理隨時發淵𠂻重體乾大西門升八旗官閲騎射作騎射為觀德從來舊制存久安惜將老長治厭兵繁訓練雖成法忠貞實本原先知親上義不必問私恩江南諸臣草載安瀾自有因河干臨幸至於頻白首常思善後策青疇每念力農晨移風實賴封疆吏化俗無勞專事臣吳越山川猶在目雖忘多景不忘民靈泉啓文明莭應黃鐘律陽生復卦前烈風催短鬢暖溜益稀年梅候宫中樹詩成几上箋乾坤先後畫至理在精研賦得恩光日邉來冬藏待春發艮止佐東生八極分仁政諸方拱嚮明車書同內外民物望豐亨敬奉無私義殷勤宵旰情五十三年冬至齋戒作姤復生生已渾同不因小往大來中簫韶如在精誠致鐘鼓云乎禮樂崇日月無私能廣運聖賢有教佐天功老年豈惜衰殘力強欲躬行盡潔𠂻五十三年冬旱十二月初二日大雪二十一日又雪途中偶成玉花泱漭近春和步輦平明回陌過村老憑門吟里曲行人載道詠寒歌無塵逺視山橫塞破凍齊驅馬渡河盈尺王畿皆作瑞龍沙惟慮雪霜多塞外不冝多雪賦得梅候宫中樹積雪梅猶冷春寒竹色沉占年勤逺慮惡酒自髙吟憂樂同民切詩書味道深光風來錦甸生飬見天心賦得三十六宫都是春四時觀物視韋篇奧旨微言開畫前月窟天根來往處地雷乾巽互環旋青陽和煦為春首淑日依遲作道筌運轉洪鈞推造化體元善政在身先日月無私能廣運春寒暗解消氷勢膏澍新添助發生繡壤已看隨處潤柴扉共樂及時耕運籌普被羣黎廣宵旰先思積粟盈每覽前村童叟恱楓宸少慰白鬚情春日郊行示地方官警蹕幸畿南中和慰閭里千村靜路塵淑氣遍逺邇其二每春來此地黎庶盡安康尚德先寬政官僚勉直方其三春搜省耕種莫悮農桑時假寐羹墻睹殷勤意在兹其四牧民寄所重授鉞賴宣風曩昔官針在開誠上下同其五平成多歷年生齒既蕃庶惟食在天時輕徭民自豫其六案讀五經義遐觀四海圖緬懷洙泗訓期共樂天衢舟中鼓琴蓬窗聼緑綺月影映船遙靜裏宫啇别風前律吕調雁飛遙集渚魚躍欲乘潮雨歇苔猶濕應知助麥苗和風細雨春潭連霡霂沙岸泊輕舟鴨緑苔痕靜人間載酒逰風帆通野望雨氣雜清流懷保先農事觀耕鳳蹕留望湖春色極目平波心水同煙添媚景日曈曨湖邉淑色年年有似我澄懷數省躬其二倚檻平明對草廬溪濵來往隱樵漁雖然九五乘乾位山水幽情自卷舒聖祖仁皇帝御製文第四集卷三十三
