body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷二十五贊至聖先師孔子贊并序蓋自三才建而天地不居其功一中傳而聖人代宣其藴有行道之聖得位以綏猷有明道之聖立言以埀憲此正學所以常明人心所以不泯也粵稽往緒仰溯前徽堯舜禹湯文武達而在上兼君師之寄行道之聖人也孔于不得位窮而在下秉刪述之權明道之聖人也行道者勳業炳於一朝明道者教思周於百世堯舜文武之後不有孔子則學術紛淆仁義湮塞斯道之失傳也久矣後之人而欲探二帝三王之心法以為治國平天下之凖其奚所取衷焉然則孔子之為萬古一人也審矣朕巡省東國謁祀闕里景企滋深敬摛筆而為之贊曰清濁有氣剛柔有質聖人參之人極以立行著習察舍道莫由惟皇建極惟后綏猷作君作師埀統萬古曰惟堯舜禹湯文武五百餘歲至聖挺生聲金振玉集厥大成序書刪詩定禮正樂既窮象繫亦嚴筆削上紹往緒下示來型道不終晦秩然大經百家紛紜殊途異趣日月無踰羮牆可晤孔子之道惟中與庸此心此理千聖所同孔子之德仁義中正秉彝之好根本天性庶幾夙夜勗哉令圖溯源洙泗景躅唐虞載歷庭除式觀禮器濡毫仰贊心焉遐企百世而上以聖為歸百世而下以聖為師非師夫子惟師於道統天御世惟道為寶泰山巖巖東海泱決牆高萬仞夫子之堂孰窺其藩孰窺其徑道不逺人克念作聖顏子贊聖道早聞天資獨粹約禮博文不遷不二一善服膺萬德來萃能化而齊其樂一致禮樂四代治法兼備用行舍藏王佐之器曾子贊洙泗之傳魯以得之一貫曰唯聖學在兹明德新民止善為期格致誠正均平以推至德要道百行所基纂承統緒修明訓辭子思子贊於穆天命道之大原靜養動察庸德庸言以育萬物以贊乾坤九經三重大法是存篤恭愼獨成德之門卷之藏密擴之無垠孟子贊哲人既萎楊墨昌熾子輿闢之曰仁曰義性善獨闡知言養氣道稱堯舜學屏功利煌煌七篇並埀六藝孔學攸傳禹功作配老子出關圖贊趙孟俯畫修身養夀古隱君子掌藏室書為柱下史清靜自正是其大旨宗周式微羣雄龍戰逝將去此八荒周遍徐甲負笥青牛服韅關尹望氣物色候門和光抱一目擊道存少留著書虛無是論元文既宣解人亦寡入於無垠廣莫之野去住兩忘物無害者吳興學士繪事肖神既寫道德又貌仙真高古肅穆髣佛伊人神龍見首變化莫同乘雲上下孰知其終至聖所名斯言我從畫馬贊大梁韓幹古之筆精寫此駿足千載如生紅光耀脣紫豔承睫削玉霜蹄團花霧鬛乾維叶象房宿效形體中儀式法合圖經鵠起鸞停風猋電駛不遇九方孰致千里我聞在昔文德誕敷飛黃服皂騕裊駕車覽物心怡披圖神往曾是權奇曾是俶儻南浮滇水北絶玉山利兹地用充我天間陳所翁畫龍贊雲龍騤騤衆物之靈暫行萬里少息千齡飛潛應候變化無形乾爻九五取象君德時乘六位周流八極雲行雨施品彚生殖爰有哲匠絹素經營僧繇舐筆董羽研精蜿蜒夭矯巧若天成嗟此好手聲價超越得水能飛點睛斯活波濤騰涌煙霧滅沒逺宅江海亦遊名都夏王逺駕虞舜受圖命官紀年用表禎符德至泉水神物乃下馴擾可豢奚俟摹寫祕藏斯卷以驗真者筆贊文犀之植中山之毫絢以藻采潤以蘭膏翡翠其牀玉璧其匣濡之隃糜翰染八法若墳若典若史若經奉以撰述逸於汗青時維休昌誕敷文德弓矢載櫜彤管競飭遐哉八表車書其同結繩云邈永資爾功針講官針豫企至道覃思簡編朝夕討習禮茂講筵詩人有云顯示德行啓沃惟賢庶幾金鏡爾列詞苑峨峨在廷細旃廣厦論史談經體之行之朕躬是力載獻載替爾職宜飭毋務勦説毋苟雷同毋繆於正毋悖厥中在昔大儒稱先則古臯夔是師言規行矩誼貴翼勵先正其心爾苟勿欺吐辭足欽詎曰名義可以塗飾詎曰聖賢可以蠡測關閩濂洛炳矣心傳撰述大旨庠序宗焉用昭儒修用𢎞教澤爾其勉兹尚無攸斁督撫針芒芒方域分理需人嶽牧之選實惟重臣寄以封疆千里而逺地則星羅令猶風偃控攝文武統馭官司繩違糾慢宣德布慈廉善是旌貪黷毋宥小眚是矜吞舟毋漏彼昏而墨日削月朘或市徇縱以恣嬌虔澤不下殫民隱罔恤政乃不和為時蟊賊曽是源濁而流則清曾是表正而景則傾職汝之由是曰曠墜軫我元元保釐奚賴天命天討我不敢私勗哉有位敬聽針辭祭酒針豫敷文德式禮辟雍允維祭酒多士攸宗在昔有虞命夔教胄洎於成周升彼孝秀撫今區夏遵路陳常海域遣子願齒膠庠爾長乃司表率匪易木繩斯直玉琢斯器蒸蒸譽髦爾儀是型濟濟橋門爾訓是聆惟廉持躬惟慎率屬佻達其懲戒董其勗皇矣謨典如鏗金鏞闡揚罔盡則效奚從毋矜而華導之誠正毋詭而趨範之孔孟王化丕盛視乎成均苟隳厥職曷明人倫儒行克臧汝績乃效黽勉詔媺助宣聲教給事中針咨爾給事實專言職厥地惟親禁闥之側入納奏劄出奉綸章清勤斯稱敬愼斯臧六曹有失汝其正之百僚有邪汝其諍之豫懷邦直謇諤足多庶兹有位胥用濯磨罔逞已私小心乃集罔見近利不阿乃立勿流於黨而苟為同勿懾於威而戾夫公道貴毋欺論尚執要棄佞勵忠令聞始劭爾之無忝寵錫是承爾之弗率譴罰是膺憲典丕昭視爾賢否靖獻克誠國恩孔厚毋曰秩卑補闕拾遺夙夜匪懈勗哉攸司御史針柱下一星列曜太紫其象維何今也御史淬厲風裁檢齊霜紀下飭官方上參國是肅肅柏府峨峨豸冠其職清要簪筆朝端百司有闕是繩是彈民澤或壅是宣是殫汝不自克何以懲墨汝不自正何以糾慝毋畏強禦毋縱殘賊庶幾夙夜邦之司直昔之法吏正色臺中為我耳目效彼股肱馳聲簡册流美無窮敬之敬之罔不克恭守令針五等封建古今異宜郡縣之制百王同規壤地磐牙提封棊峙大者一州小則百里有社有稷有民有人守令何職職兹拊循勸農課桑宣條設教偃風以德從星惟好毋營筐篋毋急簿書悃愊之治歲計有餘莫高匪天而卑其聽莫愚匪民而智其性民不可掩天不可欺一之不愼而戚自詒稽古治效嘉禾瑞麥勉能其官紹休前迹銘硯銘鳳咮之姿龍尾之質雕焉琢焉登翰墨室如圭之方桓信是率如璧之圓蒲穀是匹或巉而巖芙蓉崒嵂或潤而泉玉膏湓溢腹坦而容目仰而出外斂其華中堅其實端溪伊何縝密以栗銅臺伊何澤黝以漆靜兮不佻動兮不軼研之隃糜運之不律磨礲性情發揮道術厥功懋哉允惟迪吉鼎銘庖犧作鼎尚象太乙神禹鑄金九鼎崒嵂皇哉鼎義易稱元吉巽濟以離烹飪何飶享帝養賢位命凝一初象維陰利其否出二克剛中是為有實陽居乃腹和而悔失苟或比陰覆餗莫恤厥鉉伊何金玉其質大德保之守以無逸屏風銘維爾卓立巍然嚮離亦稱斧扆亦名罘罳動而有則靜而不欹端廉方直藩翰攸宜繄昔漢殿圖畫載披永言好德納彼良規洎乎唐室十漸用裨大書作障釋兹念兹豫懷上聖治企無為南靣聽政埀拱於斯云何敢逸廣列訓辭擬諸士史以獻典詩鳥鎗銘範金為質石火中蘊體約用𢎞宣威制勝潛發其機愼持其柄摧堅擊逺聲光震迅翼我武功式臻耆定鳥鎗銘一器也體類戈戟功逾矢炮當機迅發則星馳而電激落雲霄之徑翮殲林莽之軼材洵武功之良具更無所施而不宜弩銘珍木自南其理則直省括有度用以觀德弩銘夾也柔克唐也剛克不剛不柔兹器維則聖祖仁皇帝御製文集卷二十五
