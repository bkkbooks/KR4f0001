body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十七目錄古今體詩三十六首賦得萬物靜觀皆自得麥秋盈野志喜并序將之山莊四首賦得綠樹陰濃夏日長尖齊圓健筆之四徳戲作四首古戍三絶賦得雨灑石壁來塞外山莊每時届炎暑即赴口外掖輦視膳朝夕温凊自初夏皇太后偶爾違和故不至此清凉之境因詠懷一首敬書於箑頭㳟進以接清風而舒逺慕之微悃而已避暑駐蹕山莊六月間隂霖少晴自立秋日晴霽喜懷山莊夜雨聼灤河溜聲穹覽寺偶成兄裕親王輓詩二律過固闗入山西境固闗口號平定州幸西省至太原渡黃河潼闗駐蹕入陜西境望華山渭河見終南山冬至日抵西安遥祝皇太后萬夀長安行西安偶作回鑾至華隂欲登華山因風霧所阻由豫省回鑾渡孟津賜超玉和尚
