body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷十七敕諭諭大學士九卿等朕於河務留心最切經歷最深往年屢次閲河時精力尚强親乘小舟不避水險各處周覽凡水泉原委皆知之甚悉山東運河全賴衆泉蓄泄微山諸湖以濟漕運今山東多開稻田截湖水上流之泉以資灌溉上流既截湖水自然無所蓄瀦安能濟運水在地中如人身之有血氣血氣有餘方可用滲泄之藥若血氣不足正需滋養安可再加滲泄乎地方官未知水之源流一任民間放水灌田以為愛惜百姓不知漕運實因此而誤也若不許民間偷截泉水則湖水易足湖水既足自能濟運矣今不講究本原但見湖水日少河身日淺徒事開濬假使河身日深泉水不繼雖費百萬帑金終歸無用且古人所置南北諸閘更將何以處之古人置閘其逺近踈密皆因地形髙下水勢緩急以為蓄泄或一地二閘或一二十里一閘確有一定丈尺不可更易分水龍王廟閘座尤關緊要當時宋禮用白英老人之策築戴村壩以遏汶水導之出鵝河口入南旺湖然後分流南北以分水口為水脊蓋山東登萊諸山之脉自關東來結為泰山是北幹分支之一在黃河之東而黃河之西山脉自終南太一南屆淮汝為中幹分支之一黃河行乎兩支之中故昔時河自天津入海以後漸徙而南至淮安入海而登州以上馬谷山以下從無黃河之跡者山脉限之也分水口之水脊又為泰山分支之分脊處白英積數十年精思確有所見定為此議宋禮從之因勢均導南得七分北得三分增修水閘以時啓閉漕運遂通此等膽識後人斷斷不敢實亦不能得水平如此之准也今此二閘最宜斟酌啓閉若淺於南則當閉北閘使分北之水亦歸於南淺於北則當閉南閘使分南之水亦歸於北湖泉並注南北合流雖有旱暵亦無慮矣豈若徒事開濬勞費而無功乎往年山東百姓欲開新河朕恐其下流泛濫降㫖弗許今巡撫請開彭口新河此地一面為微山湖一面為嶧縣諸山更從何處開鑿耶張鵬翮到山東將朕此㫖詳諭巡撫申飭地方官令其相度泉源蓄積湖水俾漕運無誤特易易耳黃河關係最大自元至明嵗有衝決未有安瀾二十餘年如今日者然圖治於己治保安於己安河工雖已告成尤當時加巡視不可踈忽今春多風而少雨恐秋間雨水必多地方官宜加意堤防張鵬翮去看山東運河由臨清起至韓莊閘韓莊閘離邳州不逺并去看邳州低窪之水曽否泄出太行堤曹縣至單縣亦當往看有賢能司官多帶兩員去地方有用著之處即留彼料理康熙六十年四月初十日諭大學士九卿等去冬雪大所以今春雨澤甚少大約冬雪多則春雨必少春雨少則秋霖必多此非有占驗而得知者也朕六十年來留心農事較量雨暘往往不爽且南方得雪有益於田土北方雖有大雪被風飄𣪚於田土無益今嵗山東得雨河南山西陜西未甚得雨備荒最為緊要不可不預為籌畫若直𨽻山東河南料理已屬非易至山西陜西其補救尤難古人云三年耕則有一年之蓄九年耕則有三年之蓄言雖可聼行之不易如設立社倉原屬良法但前李光地張伯行曽經舉行終無成效至於各省積貯榖石雖俱報稱數千百萬實在存倉者無幾即出陳因新之法亦不為不善第春間僅有所出秋後並無所入州縣官侵蝕入已急則即以折銀掩飾此等積弊朕知之甚詳其報荒之真僞虛實朕亦無不洞悉如熱河所積榖石每年减價平糶秋收糴補還倉數目無多稽查頗易所以每有餘糧耳語云大兵之後必有凶年昔征剿三逆時豐收足以供給並無一州一縣貽誤及平定以後亦間有歉收者雖然綢繆未雨不可不為預慮也邇來稍覺暵旱政事或有缺失應行改正之處爾等㑹同詳議具奏康熙六十年四月十九日諭户部尚書孫渣齊朕覽京城所報米價殊屬騰貴將京通倉米石交與侍郎張伯行比時價减五分糶賣內務府莊頭所交榖石現在州縣收貯亦派滿漢賢能司官照此糶賣正值榖價騰貴之時恐有偷盜倉內米石者著提督等不時緝拿照此速行康熙六十年四月二十六日諭大學士九卿今年入春以來見天氣不調曽經再三面諭諸臣尚能記憶否地寒麥晚之處猶可望三四分收成山左河南山陜麥盡已無用矣屢次祈雨為日頗久若更展期祈禱反屬不敬不如停止至天壇遣官祈雨之例朕非忘懷令朕躬違和不能行走所遣官員豈能如朕之誠敬徒邀遣官天壇祈雨之虛名朕心何安目今所望惟秋禾耳康熙六十年五月初十日諭大學士九卿等朕御極六十年自冲齡之時惟以黎庶為重故不惜身命勤勞至今今春朕之子弟暨六世孫與舉國官兵人民請行大慶典禮在朕固所應受衆亦咸以為宜朕意以上則係皇考賔天之年下則西陲用兵凡陳亡病故者功罪尚未明晰今年非好嵗也幸彼時堅辭不受以今觀之若受慶典則私議朕之過者不可枚舉矣朕躬自四月違和五月初旬又復感寒遂覺病甚以致面色消减或稍行動或多言語便不勝倦乏目今直𨽻山左河南山陜麥已無收民多逃散屢令大學士九卿議奏茫無頭緒似此尚忍而不言將來不知作何底止也諸大臣皆受髙爵厚祿應視萬民如一身一家各抒拯救之法若謂朕必降諭㫖推委於朕則諸大臣所任何事耶今朕躬甚弱心思亦短易倦善忘惟諸大臣是賴救民之策不可不急為籌畫應速行詳議慎勿輕視倘再遲延時日被災之民不能待矣康熙六十年五月二十四日諭大學士馬齊等朕因陜省歉收雖將錢糧蠲免動給倉糧又發庫帑特差官員散賑百姓尚未安堵今施世綸亦束手無策此俱係地方官員不切實留心為民設法綏理以至百姓流離聞得山西陜西富户積藏米石甚多若得好官勸諭糴買可以多得著將內庫銀發出五十萬兩作速帶赴山西陜西買米散賑左都御史朱軾丁憂因浙江巡撫時居官好令在任守制近啓奏要往軍前效力伊讀書之人前往軍前如何行走似此等地方當往效力著派左都御史朱軾往山西光祿寺卿盧詢往陜西再挑選部院賢能官員隨往每處帶銀二十五萬兩勸諭富戶照時價糴買米石庶乎易得將此傳示九卿詹事科道即令朱軾等帶銀作速前往不必又來奏請訓㫖特諭康熙六十年五月二十五日諭臺灣衆民臺灣衆民據督臣滿保等所奏并伊等進摺家人所言臺灣百姓似有變動又奏稱滿保等於五月初十日領兵起程等語朕思爾等俱係內地之民非同賊寇或為饑寒所迫或因不肖官員刻剝遂致一二匪類倡誘衆人殺害官兵情知罪不能免乃妄行强抗其實與衆何涉今若遽行征剿朕心大有不忍故諭總督滿保令其暫停進兵爾等若即就撫自原諒爾罪倘執迷不悟則遣大兵圍剿俱成灰燼矣臺灣只一海島四面貨物俱不能至本地所産不敷所用祇賴閩省錢糧養贍耳前海賊占據六十餘年猶且剿服不遺餘孽今匪類數人亦何能為耶諭㫖到時即將困迫情由訴明改惡歸正仍皆朕之赤子朕知此事非爾等本願必有不得已苦情意謂與其坐以待斃不如苟且偷生因而肆行虜掠原其致此之罪俱在不肖官員爾等俱係朕歷年豢養良民朕不忍剿除故暫停進兵若總督提督總兵官統領大兵前往圍剿爾等安能支持此㫖一到諒必就撫毋得執迷不悟妄自取死特諭康熙六十年六月初三日諭宗人府平逆將軍顔信朕親伯之孫朕之姪也此畨統領滿洲䝉古緑旗兵丁過自古未到之烟瘴惡水無人居處之絶域殱滅賊寇平定藏地允稱不辱宗支克展勇略深屬可嘉相應表揚以示奬勸爾衙門即遵㫖議封公爵具奏特諭康熙六十年六月初六日諭大學士馬齊等聞得米從海口出海者甚多江南海口所出之米尚少湖廣江西等處米盡到浙江乍浦地方出海雖經禁約不能盡止福建地方正在需米之時又派浙江兵二千往閩駐防恐米價益貴米到乍浦價值必賤交與浙江巡撫提督先備海船嚴禁私賣不許出海動帑買米三萬石載於船上提督派官兵押運從海運至厦門收貯自福寧州直至福州府不過十數日之內即可逹厦門斯事甚屬緊要嗣後出海米石交與江南浙江總督巡撫提督總兵官嚴行禁止方好其福建販賣米石不必禁止爾等將此㫖録出奏聞交與九卿閲過速行可也康熙六十年六月十四日諭大學士馬齊等朕觀各省官員內或有一員欲避繁劇具呈告退不數月另行捐補他省兹陜西省係用兵之際正在辦理錢糧重務或因聞訃丁憂以致遲誤辦理事件知州王珏令在任守制知縣王志深亦令留任如嗣後有此等呈稱丁憂告退人員作何料理著九卿詹事科道㑹同議奏康熙六十年閏六月十五日諭吏部捕盜同知員缺將未滿三年人員揀選補授以後即照同知缺升補調用在任既不能久升遷亦覺太速將伊等俱留三年俟過三年再以原俸推升調補康熙六十年閏六月十六日諭吏兵二部總督滿保提督施世驃調遣官兵施世驃親身數次大敗賊衆攻取鹿耳門安平鎮七日內即克復臺灣府可嘉總督提督以下在事官兵著議叙具奏守備陳策擒殺作亂奸民范景文鼓勵平民為兵協力堅守淡水營又同大兵進剿殊屬可嘉陳策著從優加為左都督補授臺灣總兵官與伊同事官兵著從優議叙具奏康熙六十年七月初十日諭浙閩總督滿保等臺灣府文職官員平日並不愛民但知圖利苛索及盜賊一發又首先帶領家産棄城敗回澎湖殊屬可惡道員以下文職官員俱著提拿總督滿保提督施世驃㑹同審明即發往臺灣府正法將伊等家産查明賞賜效力有功之人康熙六十年七月初十日諭大學士等自古黃河遷徙無常每有衝决堤岸淹沒田廬之患昔黃河㑹九河從天津入海後漸遷徙以成今河約計遷徙之處已千餘里矣漢武帝塞瓠子口嗣後代有衝決朕留心河務屢行親閲動數千萬帑金指示河臣修築髙家堰石堤及凡應修築之處奏安瀾者幾四十年於運道民生均有禆益前巡幸在湖灘河所保德州橫城潼關孟津徐州宿遷邳州桃源清口等處俱曽渡河自橫城順黃河下流歷人所未經行之河套凡舟行二十二日直逹數千里所至之處無不詳視惟孟津渡河時因淤沙不能直渡因委折而行彼時朕即慮及沙淤則流滯堤岸必致衝決今據報黃河衝決流入沁河自直𨽻長垣縣至山東等處若今冬即行堵築堅固可保無虞倘不能堵築堅固自決處以下黃河勢分沙壅河水陡長則堤岸之危非此即彼矣朕知之最為明切這所奏衝決之處或在瓠子口之上或在瓠子口之下並河道情形著詳細問明九卿暨河南省官員具奏此事不可輕視康熙六十年九月初六日聖祖仁皇帝御製文第四集卷十七
