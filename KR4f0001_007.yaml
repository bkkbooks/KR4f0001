body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷一敕諭諭戶部前以爾部題請直𨽻各省廢藩田産差部員會同各該督撫將荒熟田地酌量變價今思小民將地變價承買之後復徵錢糧則民重纍著免變價撤回差去部員除變價已完田地外將現在未變價田地交與該督撫給與原種之人令其耕種照常徵收錢糧以副朕愛養民生之意至於無人承種餘田應作何料理著議奏爾部即遵諭行特諭康熙八年三月初八日諭吏兵二部鰲拜等以勳舊大臣世受國恩奉皇考遺詔輔佐政務理應精白乃心盡忠圖報不意鰲拜結黨專權紊亂朝政紛更成憲罔上行私凡用人行政鰲拜欺藐朕躬姿意妄為文武官員欲令盡出其門內外要路俱用伊之姦黨班布爾善穆里瑪馬爾賽塞奔代阿思哈噶出哈濟實訥莫太必等結為黨羽凡事先於私家商定乃行與伊交好者多方引用不合者即行排陷種種姦惡難以枚舉朕久已悉知但以鰲拜身係大臣受纍朝寵眷甚厚猶望其改行從善克保功名以全始終乃近觀其罪惡日多上負皇考付託之重暴虐肆行致失天下之望遏必隆明知其惡緘默不言意在容身亦負委任朕以其罪狀昭著將其事款命諸王大臣公同究審俱已得實以其情罪重大皆擬刑辟奏聞朕復召鰲拜等面加鞫問情罪俱真本當依議處分但念鰲拜纍朝效力年久且皇考曽經倚任朕不忍加誅姑從寬免死革職籍沒仍行拘禁遏必隆無結黨之事免其重罪削去太師及後加公爵其原有一等公爵仍準留與伊子其班布爾善穆里瑪阿思哈噶出哈太必塞奔代訥莫或係院部大臣或係左右侍衛乃皆依附權勢結黨行私表裏為姦擅作威福罪在不赦皆已正法其餘皆係微末之人一時苟圖僥幸朕不忍盡加誅戮寬宥免死從輕治罪至於內外滿漢文武官員或有畏其權勢而依附者或有身圖幸進而依附者本當察處姑從寬免自今以後務須洗心滌慮痛改前非遵守法度恪共職業以副朕整飭紀綱愛養百姓至意爾二部即傳諭內外遵行特諭康熙八年五月二十五日諭吏部近究審鰲拜等罪案據稱莫洛白清額阿塔皆其黨羽本當逮問治以重罪念其既經用為督撫畀以地方重任以來剔除加派火耗等弊姑從寬免罪仍留原任以後著益殫心勉力潔已率屬綏輯地方愛養生民以副朕宥過留用之意特諭康熙八年五月二十六日諭吏部朕夙夜圖治念切民生艱難必加意撫綏各俾安居樂業乃成久安長治之道邇年水旱頻仍盜賊未靖兼以貪官汚吏肆行朘削以致百姓財盡力窮日不聊生朕甚憫焉爾等部院大臣科道各官或任要職或有言責著即將拯救生民疾苦切實裨益之處各攄所見明白陳奏以備採用勿得妄行借端以無益之事塞責指陳負朕加惠黎元圖治求言之意爾部即傳諭遵行特諭康熙八年六月初六日諭户部凡奉差及地方見任各官俱有料理公務併撫綏百姓之責宜各盡乃職以副朕差遣簡用之意近聞奉差官員及督撫提鎮等大小文武各官不思各盡乃職反圖利己買良民為奴甚至多買餽送親友此等違法妄行好生可惡以後著永行嚴禁若仍前恣買良民者從重治罪決不饒恕爾部即遵諭通行曉諭特諭康熙八年六月初六日諭吏兵刑三部近審鰲拜家人罪案據洪善泥滿供出總督白秉真原任巡撫張自德尚書龔鼎孶庶吉士王彥阿達哈哈番金鼎分得撥什庫高鬍子正紅旗髙姓之官伊等俱曾囑託行賄本當嚴究從重治罪但思此等囑託行賄者尚多非止伊等朕已有諭旨將內外各官苟圖幸進作弊者俱從寬免今供出各官亦俱從寬免罪以後務須洗心改過恪守法紀副朕寬宥之意如不改過惡仍前作弊定行加等從重治罪決不饒恕爾部即行曉諭特諭康熙八年六月初七日諭吏兵二部蘇克薩哈奉皇考遺詔輔政蘇克薩哈雖係有罪罪止本身不至誅滅子孫後嗣此皆鰲拜等與蘇克薩哈不和挾讐滅其子孫後嗣深為可憫其白爾黑圖等並無罪犯因係族人連坐誅戮殊屬寃枉其蘇克薩哈原官及白爾黑圖等官職俱應給還爾二部將此案所革官員俱行察明議奏特諭康熙八年六月十一日諭戶部朕纘承祖宗丕基乂安天下撫育羣生滿漢軍民原無異視務俾各得其所乃愜朕心比年以來復將民間房地圈給旗下以致生民失業衣食無資流離困苦已極深為可憫以後圈占民間房地著永行停止其今年所圈房地俱著退還民間爾部即速通行曉諭昭朕加惠生民至意至於旗下無地亦難資生應否將古北等口邊外空間之地撥給耕種著議政王貝勒大臣會同確議具奏特諭康熙八年六月十七日諭宗人府自古帝王建國親親賢賢義在並重我太祖太宗世祖以來篤念本支敦睦九族咸加愛恤欲其成立以共膺福祿也朕思罪有大小法有重輕宗室犯罪遽行革除宗室朕心不忍除世祖皇帝時定案外自順治十八年以後凡宗室有犯罪革除宗室者著將情節一併察明具奏特諭康熙八年六月二十七日諭刑部近聞官民家人以自縊投水身死報部者甚多凡此皆因本主不加愛養或逼責過甚難以存活故致身死非有迫切之情豈肯自盡以後官民務須各將家人撫恤訓養勿得仍行逼責致死人命至重爾部即行曉諭申飭特諭康熙八年六月二十七日諭刑部設立通政司及登聞鼓衙門原以通達民隱陳告寃抑果有真正寃枉事情應赴該部院衙門告理近見姦惡棍徒或以瑣細小事揑成重大或以私讐借端陷害善良或受人雇託代為控告或擅入禁地及行幸之所衝突儀仗趣近喊告及將此等狀詞交與部院審理並無大事及寃枉之處反因被告干證將良民株連受纍者甚多故前此已行禁止今仍多有違禁妄告者以後著嚴加禁止如有惡徒仍前瀆告者除所告之事不準外著照律治罪爾部即嚴加曉諭遵行特諭康熙八年六月二十九日諭吏部刑部事務殷繁關係人命殊為緊要必得才猷練達者乃能勝任內國史院大學士對哈納諳練刑部事務著加太子太保以內國史院大學士管刑部尚書事尚書明珠著以原品候補特諭康熙八年七月初四日諭吏部閲處分原任户部尚書蘇納海原案並無大罪鰲拜等但以為撥地遲延遽行拏問多端文致誣陷不案律文任意將無辜處死原任總督朱昌祚巡撫王登聯於撥換地畞時見民間旗下困苦因有地方之責具疏奏聞輒以為非其職掌越行干預亦不按律文寃枉處死伊等皆國家大臣並無大罪寃死深為可憫理應昭雪以示仁恩作何恩恤豫諡及廕子入國子監讀書爾部議奏特諭康熙八年七月十一日諭宗人府吏兵二部凡令議政王貝勒大臣會議之事俱係國家重大機密事務會議之時理應極其慎密今聞會議之事尚未具題在外之人即得聞知此皆會議處不加慎密不嚴行約束間雜隨從之人以致聽聞傳語或係會議之官傳説將國家大事如此預先泄漏殊為不合至於人衆愈覺煩雜其諸王貝勒法一丹大間散議政大臣俱著停其議政以後凡會議時諸王貝勒大臣務須慎密勿致泄漏爾衙門該部即通行曉諭嚴飭特諭康熙八年八月初二日諭禮部凡進貢來朝人等騎用馬匹駱駝應加意喂養肥壯以便往來行走昭示柔綏遠人之意近聞喂馬人役侵盜草料致馬駝竟不肥壯殊為可惡此皆監管喂養章京及部內堂司官怠玩不經心之故以後若再仍前偷盜草料著監管喂養章京及巡察官員稽察舉發如不舉發致馬駝瘦弱將部內堂司官及喂養官役一併從重治罪決不饒恕特諭康熙八年八月初五日諭兵刑二部京師重地理應肅清近聞竊盜剪綹搶奪詐騙者甚多此皆步兵及五城司坊各官並巡捕營官兵稽察不嚴巡緝不力或番役人等與盜交通受賄縱容以致姦惡之徒肆行無忌殊非法紀以後著該管文武官員嚴加巡察督率番役兵丁力行緝拏務使姦宄肅清良民無擾如仍前怠玩縱容交通作弊將該管官員一併從重治罪決不饒恕爾部即遵諭行特諭康熙八年八月初五日諭兵部近聞邉外蒙古進貢馬匹有接至邊界不由賣主強逼勒買者甚至搶奪偷盜又或沿途跟隨強買或已入館將進貢馬匹強買此等違法妄行俱大不合理以後進貢馬匹必俟察收方許官員兵丁購買餘馬如仍前妄行者作何處分爾部會同理藩院議奏特諭康熙八年八月初七日諭吏部前京察處分滿尚書侍郎等因無事故被革俱給還原官令其候補今思滿漢諸臣被革相同朕原無異視應一體昭恩京察內有漢尚書侍郎革處者著察明議奏特諭康熙八年八月十一日諭吏部國家政務惟藉羣工贊理在京各衙門大小官員必各稱其職乃可以襄郅隆之化部院等衙門滿漢各官應行澄敘以示勸懲大學士尚書及三品以上堂官俱著自陳三品司官及四品以下各官爾部會同都察院詳加甄别具奏在外總督巡撫係封疆大臣職任緊要著該部院察明任內功過稱職與否詳加甄别具奏爾部即遵諭行特諭康熙八年八月十二日諭吏兵二部內大臣侍衛文武大小各官各有職掌理應精白乃心恪遵法紀循分盡職以副朕任用之意近見有不安厥分交通在內近侍使令人員妄行干求或潛為援引或畏威趨奉揆之臣誼殊為不合朕施行政務懲創姦詐佞諛察其忠賢才能者用之有等匪類妄行陷人以圖僥幸自以為賢希覬升遷善地以後如有不遵禁例仍前干求趨奉者定行從重治罪決不饒恕爾二部即通行內外及包衣佐領嚴加申飭遵行特諭康熙八年八月十二日諭吏部朕思部院事務緊要分理詳核係司官職掌必得賢能之人方克勝任今爾部止將部院所有官員調用其旗下上朝官員內豈無堪於部院任用者著嚴行曉諭各該滿洲漢軍都統副都統等於阿達哈哈番以下拖沙喇哈番以上有通曉滿文或通曉漢文堪於部院任用有才能之官從公詳擇一旗四五員以下咨送爾部俟各旗缺出與應升官員一併擬出題用特諭康熙八年十月初三日諭戶部朕巡幸田獵之處一切御用等項俱係各該衙門由京城備辧供用毫無取於地方除內廏馬匹不用草料其部中應差馬匹所需草料亦屬不多向來聞有地方官員指稱御用科派民間各物伺候既不便銷算又不退還民間貪汚官吏侵肥入已以致小民苦纍殊違法紀以後著嚴行禁止如地方有司仍有借端科派者著該管官嚴加稽察題參重處如該管官不行參奏或别經發覺將該管官一併治罪爾部即通行嚴飭仍刋示曉諭遵行特諭康熙八年十月初四日諭吏部原任山陜總督莫洛陜西巡撫白清額已經甄别處分本當不復任用近據甘肅巡撫劉斗等合詞奏稱莫洛有益地方兵民數千哀求代題留任又據西安等處鄉約百姓趙璉等稱莫洛白清額實心實政老稚感恱保奏留任等語朕思簡用督撫原欲其綏輯地方愛養百姓今莫洛等既為地方愛戴特順輿情免其處分莫洛白清額俱著復還原官仍留任以後著益殫心供職以副朕寬宥任用之意達爾布著改為山西巡撫馬雄鎮著候缺另用爾部即遵諭行特諭康熙八年十一月初八日諭吏兵二部朕因田獵畿南文武官來朝見者親加詢問河間縣知縣劉果才具優長著從優升用又閲試弓馬都司孔𢎞憲千總王希哲侯慶凱把總陳良弼俱弓馬嫺熟具有才幹俱著從優升用冀州知州李顯忠才具庸劣河間府副將佟透年老有病遊擊羅騰蛟楊煥斌守備黃焻周鴻儒朱緯焦乃善馬現龍千總王天才薛琰孫大載李實先王名揚王濬宗爾振賈顯沈永祥韓得桂張書化朱振芳把總李克生包得勝金名第金成李從善張龍王之相崔起龍劉元勝趙勇等俱弓馬不嫺才力不及著察議具奏爾部即遵諭行特諭康熙八年十一月初九日聖祖仁皇帝御製文集卷一
