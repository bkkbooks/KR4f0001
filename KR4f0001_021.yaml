body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷八敕諭諭大將軍康親王傑淑近聞海澄被陷大臣提督俱各自盡殊為憫惻前以初至兵力即當削平山海諸寇因爾等輕視賊衆止知休養士卒有失逺謀以至於此今勢不可緩緩則賊可据守地方積蓄糧草固其濠壘所關非細或有匪類乘此蠢動亦未可定王其悉心籌度謀出萬全速滅賊氛慰朕懸切行間諸事王應統為陳奏特此密諭康熙十七年七月初二日諭安親王嶽樂王肺腑至親久駐炎疆因長沙地勢卑濕朕每多懸念來使抵京奏王平安朕心良足慰也今牙圖復回長沙故示朕意特諭康熙十七年七月二十六日因嶽州將軍等失機特諭議政諸臣據今時勢最緊要者全在嶽州此不可不速取也近雖少有失利然民為賊所迫尚有嚮往朝廷之心朕欲親率滿洲緑旗大兵聲明肆討儻失此機㑹則滿兵不服水土致挫鋒鋭愈難收拾凡在軍前將軍皆謂破賊無期委靡如此即有志者恐亦掣肘不能行矣㑹議者國家謀猷所賴卿等有速滅巨憝救民水火之策亦宜預為商確著詳議以聞康熙十七年八月十六日諭禮部元良關係國本慶喜懋膺天眷今皇太子出痘荷天地祖宗社稷之祐已經痊愈朕心欣悅應遣官致祭圜丘方澤太廟社稷行告謝禮爾部作速擇吉來奏特諭康熙十七年十二月初九日諭吏部皇太子出痘痊愈朕心欣悅醫官甄國鼐候選知縣傅為格侍奉調理小心勤慎宜行議叙以示加恩爾部議奏特諭康熙十七年十二月二十五日諭盛京將軍安褚護今據鎮守寧古塔烏喇將軍巴海寄字與侍衛瓢子對秦云副都統布克韜還自盛京向衆宣言已經遷移盛京之人出兵不行差遣凡有事故俱照寧古塔例寬至五年始行結案遷移之人皆加級賞賚其時適值將布克韜補授副都統鄂泰員缺移文到彼宣㫖畢布克韜復向逹布都杜牛諾海祁木訥等言伊得補副都統之故爾等亦應遷移因此達布都杜牛諾海祁木訥等俱各率本佐領於正月初六初十日與從前原欲遷移佐領一同遷移惟副都統查努喀瓦柳杜布達喀阿巴泰巴牛堪屠木柱賈齊哈七佐領並納達納半佐領仍欲留彼其先不願遷者今既欣然欲遷望兩侍衛轉奏等語觀此則達布都杜牛諾海祁木訥等所言遷移是實若將伊等於盛京安插則地方窄狹所分田土遙遠必致糜費錢糧爾來京師曾面奏云欲於山海關以外諸城分設駐防協領副都統將舊官兵歸併一處駐札似為有益今詳繹爾言甚當應速行之其地方逺近田土多寡㑹同彼處大臣詳議具奏特諭康熙十八年正月初五日諭戶部江西舊缺錢糧屢經該省總督巡撫及科道等官奏請蠲免朕已洞悉但當逆賊煽亂之時各省地方與賊接壤者被其侵犯迫而從逆情非得已故於平定之後其舊缺錢糧應蠲免者悉行蠲免江西於賊未到之先地方奸徒輒行倡亂廣信南康饒州奉新寧州宜黃安仁永新永豐彭澤湖口瀘溪玉山鉛山等處所在背叛忠義全無紳襟兵民人等或附和嘯聚抗拒官軍或運送糧米助張賊勢或布散僞劄惑誘良民或窩藏奸細潛通消息輕負國恩相率從逆以致寇氛益熾兵力多分遲延平定之期勞師費餉揆厥所由良可痛恨即今田廬蕩析家室仳離皆其自作之孽逋賦未蠲職此之故但思逆寇漸經殱除地方凋敝舊缺追比民困愈深朕心殊為不忍其十六年以前舊缺錢糧著盡行蠲免爾部即行該督撫通行曉示務使小民均霑實惠以昭朕愛養百姓至意特諭康熙十八年二月初四日諭內務府近聞從前所賜包衣佐領及渾託河人等葬地今已無餘此等窮寒之人在日辛勤供役沒無葬身之處甚為可憫著於戶部查交爾衙門田地內酌量撥給特諭康熙十八年二月初九日諭吏部朕以萬幾時暇留心經史思得博學鴻儒備顧問著作之選故特頒諭㫖令內外諸臣各舉所知膺薦人員已經陸續到部欲行考試因天寒晷短恐其難於屬文弗獲展厥藴抱今天氣已漸融和應定期考試所有合行事宜爾部㑹同翰林院詳議具奏特諭康熙十八年二月十七日諭兵部我國家開創大業軍法最為嚴明凡擊斬賊衆攻取城池必據實奏報復行確核功罪昭著故能信賞必罰鼓勵戎行並無虛僞冒功之弊今自用兵以來每覽各處奏捷章疏其中固有實在建功者亦有虛詞妄報者如擊敗賊兵動稱斬殺甚多或云數千或云萬餘或云不計其數甚至賊棄空城或云如何攻取如何恢復妄行謊報微功小寇任意鋪張議叙之時希冀濫邀升賞殊非人臣事上勿欺實心為國之誼以後各處領兵大將軍將軍督撫提鎮等務須洗心滌慮勿蹈前轍凡於報捷必確核功績據實上聞如因仍陋習冒濫軍功或被傍人舉首或別經發覺定以軍法從重治罪決不饒恕爾部即通加嚴飭併曉諭官兵一體遵行特諭康熙十八年三月二十一日諭禮部自古帝王敦重倫常篤念勳舊必有褒嘉之典以示推恩孝昭皇后德著椒宮母儀天下懿範如在每切追思其父公遏必隆簪纓世裔宣力纍朝忠殫謀猷功存弼亮况篤生賢淑佐理宮闈宜加表揚垂諸永久已敕所司特為建立祠堂其妻縣主夙懋溫恭克昭家訓宜並袝享朕親製碑文勒之貞珉告成之日應賜諭祭爾部詳察典例具奏特諭康熙十八年三月二十四日諭禮部時已入夏天氣亢暘農務方興雨澤未降恐麥禾不能及時長養朕心深為惓切著爾部堂上官一員同順天府官員竭誠祈禱特諭康熙十八年三月二十六日諭吏部薦舉到文學人員已經親試其取中一等彭孫遹倪燦張烈汪霦喬萊王頊齡李因篤秦松齡周清源陳維嵩徐嘉炎陸葇馮朂錢中諧汪楫袁佑朱彞尊湯斌汪琬邱象隨二等李來泰潘耒沈珩施潤章米漢雯黃與堅李鎧徐釚沈筠周慶曾尤侗范必英崔如嶽張鴻烈方象瑛李澄中吳元龍龎塏毛竒齡金甫吳任臣陳鴻績曹宜溥毛升芳曹禾黎騫髙詠龍燮邵吳逺嚴繩孫俱著纂修明史其現任候補及已仕未仕各員作何分別授以職銜其餘現任者仍歸原任候補者仍令候補未仕者俱著回籍內有年老者作何量給職銜以示恩榮爾部一併詳議具奏告病者不必補試特諭康熙十八年三月二十九日諭刑部今已入夏亢陽不雨耕種愆期民生何賴或內外問刑衙門有無知而罹法網小過而陷重辟株連無辜淹禁日久刑獄重地人命攸關審擬未當有干天和朕心每思及此深用警惕兹特遣索額圖明珠杜立德等㑹同三法司將已結大案見在監禁者逐一詳加審理務期明允無使寃滯其在外直省監候重犯應選三法司滿漢賢能司官前往察審凡罪可矜疑者㑹同該撫臬司詳開情由具奏俾無枉無縱以祈天休副朕愼刑愛民至意其應遣司官開列職名具奏特諭康熙十八年四月初四日諭禮部民資粒食以生今時值夏令雨澤未降久旱傷麥秋種未下農事堪憂皆由朕躬凉德政治未協大小臣工不能廉已愛民勤修職業致干天和朕用是夙夜靡寧深切警惕實圖修省諸臣亦宜循省過愆恪共乃職期於共襄治理感召休和兹當䖍誠齊戒躬詣天壇親行祈禱為民請命爾部即擇期具儀來奏特諭康熙十八年四月初十日諭兵部湖南廣西等處已經底定滇黔指日蕩平凡在京在外大小文武官員內有家口陷於賊中者有隻身投誠家口仍在彼處者有以前抗賊被害而家口尚有留遺者大兵到日著逐一清察務加保全俾令得所聼其親眷完聚爾部即通行傳諭各路大將軍將軍督撫提鎮等遵行特諭康熙十八年四月二十二日諭兵部逆賊吳三桂煽亂以來各處大小文武官員克堅臣節不負朝廷不辱身名者既已加恩旌異以勵忠貞其或勢窮力極迫而從賊者朕久已洞悉苟悔罪來歸概行寬宥惟祖澤清父子受國家恩飬甚厚前澤清叛時意其必被賊迫脅不得已從逆及既降復叛則甘心附賊可知情罪重大國法難容不許招撫亦不許准其投誠爾部即密行傳諭各路大將軍督撫提鎮等遵行康熙十八年四月二十二日諭戶部民生以食為天必蓋藏素裕而後水旱無虞自古耕九餘三重農貴粟所以藏富於民經久不匱洵國家之要務也比以連年豐稔粒米充盈小民不知蓄積恣其狼戾故去年山東河南一逢歲歉即以饑饉流移見告雖議蠲議賑加意撫綏而被災之民生計難遂良由地方有司各官平日不以民食為重未行申明勸喻之故近據四方奏報雨澤霑足可望有年恐豐熟之後百姓仍前不加撙節妄行耗費著各該地方大吏督率有司曉諭小民務令力田節用多積米糧庶俾俯仰有資凶荒可備以副朕愛養斯民至意爾部即遵諭行特諭康熙十八年六月初八日諭吏部等衙門自古帝王撫御萬方兢兢業業勤求治理必期陰陽順序和氣凝庥或遇災異示警務省愆思過實修人事挽回天心兹者本月二十八日巳時地震之變譴告非常反覆思維深切悚惕蓋由朕躬不德敷治未均用人行政多未允符內外臣工不能精白乃心恪盡職掌或罔上行私或貪縱無忌或因循推諉或恣肆虐民是非顚倒措置乖方大臣不法小臣不廉上干天和召斯災眚若不洗心滌慮痛除積習無以昭感格而致嘉祥朕兹力勤政務實圖修省目今應行應革事宜著部院三品以上官及科道在外各該督撫明白條奏直言無隱其在京三品以上堂官并督撫提鎮俱著據實自陳毋得浮泛塞責爾部即遵行仍通行曉諭內外軍民人等咸使聞知特諭康熙十八年七月二十八日諭戶工二部朕御極以來孜孜求治期於上合天心下安黎庶夙夜兢惕不敢怠荒乃於本月二十八日巳時地忽大震變出非常皆因朕躬不德政治未協大小臣工弗能恪共職業以致陰陽不和災異示警深思愆咎悚息靡寧兹當力圖修省以迓天庥念京城內外軍民房屋多有傾倒無力修葺恐致失業壓倒人口不能棺殮良可憫惻作何加恩軫恤著速議具奏仍通行曉諭咸使聞知特諭康熙十八年七月二十八日聖祖仁皇帝御製文集卷八
