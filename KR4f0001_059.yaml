body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷二十七雜著講筵緒論計三十九則經學在於切實通明折衷諸說史學在於始末淹貫論定是非二者皆確有證據難於支離其說故必由積纍之功涵泳之久較之詞章之學其難易固不同也書云不役耳目百度惟貞孟子所謂耳目之官不思而蔽於物物交物則引之而已正心思為耳目所役之意始為所引漸為所役勢有必然康誥一篇言修德保民之要極為詳備如明德新民如保赤子惟命不于常等語大學多引用之今繹觀其訓諭諄切文詞古奧具見三代聖賢咨警之意書云要囚服念五六日至于旬時古人又稱再斯可矣若斷獄而至于旬時不决固愼重之意又恐獄久淹則易滋弊古人之意惟求其真知灼見而無疑獄之為難也酒誥中數節似寬而實嚴正古人治世之微權也近日小民蓄積匱乏一遇水旱遂爾捐瘠莫支幾填溝壑此皆豐稔之年粒米狼戾不能儲備之故也古人常云三年耕必有一年之積九年耕必有三年之通此先事預防之至計所當講求於平日者自古帝王崇信方士以求神仙者不可勝數如唐之憲宗武宗宣宗皆餌金石之藥以求壽考而不知反以自戕其生覆轍相尋而不知悔者昔人每深歎其愚此皆未知無逸可以致壽聖賢原有切實可信之理也朕自沖年臨御以來民間疾苦及貪吏弊竇留心體察已久其中情斃知之素矣但念君德莫大於有容治道莫尚於能寬故每事務存矜恕其有自罹於法者尚不忍置之重典誠恐近於苛刻有乖體恤臣工之至意也朝廷設立科道原寄以耳目重任邇來民生困苦朝廷之德澤不能下究科道各官於國計民生之大實心講究確切敷陳者寥寥無幾但將六部現行之事指摘紛更希圖塞責冀免春秋年例處分其在朕前所奏皆若至廉至公及考其行事狥私自利者不可勝數所謂耳目之官風紀之任豈不大負厥職哉近日貪私之斃滿漢皆然滿人聚處京城形迹尚為易見漢人散處外郡往往有田宅彌連州縣挾其冨厚之勢侵凌小民有司莫敢詰其非者科道官寧不知之而不聞有所糾參舉發此皆言官溺職民生失所之由也天下國家事莫不有大小重輕之勢故凡事當權衡折衷必務從其大者重者今言官論事論人多指摘瑕疵但見及一偏而於大局全體所關不能審度其輕重即如用兵之地督撫大吏職任至重至其製備鞍馬招募技勇激賞將士以及供餽官兵之費勢與內地不同儻復事事苛責恐隳其任事之心亦將何以展布其手足若兵興時用之兵休時遽黜之亦非所以慰勸勞臣且言官每事惟知推諉獨不思身在㑹議㑹推之列何不可直陳於事前而必待推過於事後乎若其始或知而不言或有所畏而不言皆非實心任事之道也近日外吏可謂極難營私者固不免於糾參即有守正者又多不為人所容若因一時之彈核而遽置於重典常恐有寃抑可矜故每兢兢然愼之近日民生貧困家給人足之樂遠不及於古而風俗之奢靡日甚向嚴加禁止漸有規模自兵興以來稍弛其禁誠恐奉行不善或至擾民每思足民良法終無逾於此嘗閲明宣宗實録其奉事母后和敬有禮至今覽之猶足令人感慕朕常思先王以孝治天下故夫子稱至德要道莫加於此自唐宋以來人君往往疏於定省有經年不一見者獨不思朝夕承歡乃家庭之常禮且天倫至性何嘗以貴賤殊也觀古廢興之際如夏商之桀紂周之幽厲所以墜失天命皆其自取後世亦有無大失德而隕覆其家國者如明之崇禎年間是也皆由其臣子背公狥私處言路者變易是非淆亂可否曾無實心體國之人故至此耳嘗觀明仁宗宣宗時用法皆極寬平每思人君承天子民時育萬物自當以寬厚為根本始可成敦裕之治但不可過於縱弛所貴乎寬而有制耳國家財賦出於民民力有限當思撙節愛養則國家常見其有餘每見明季諸君奢侈無度宫中服食及創造寺觀動至數十萬我朝崇尚朴質較之當時僅百之一二耳嘗閲歷代史册見開創之初及守成之主政簡治約上下臣民有所遵守末世君臣變亂成法朝夕紛更終無補益所謂天下本無事庸人自擾之耳讀古人書當審其大義之所在所謂一以貫之也若其字句之間即古人亦互有異同不必指摘辨駮以務求伸一已之說聖人立言必渾淪切實後人求其說而過之每蹈虛寂之斃如釋老之書朕向亦曾流覽深知其虛幻無益於政治易曰有君臣父子上下然後禮義有所措今釋道之教棄絶五倫根本既失其餘言論更何著落易曰天地之大德曰生天地人竝列而為三才今釋道之教生生之理已絶是使三才且有時而窮此皆其大體錯謬不待辨而自明者也自十二年用兵以來嘗取前人韜略武備等書閲之亦皆紙上談兵無益於事間有用符呪法術者尤屬不經我朝用兵自有調度且號令嚴明人人具有勇敢之氣即公卿士夫皆嫻戎馬故所向多能成功王者之師行之以正豈藉詭譎之術哉嘗聞明宫闈中食御浩繁糜費不資掖庭宫人幾至數千此皆可為深鑒朕思人主惟能自檢束恭謹則貴者益貴易所謂謙尊而光也若惟知侈縱反不覺其可貴矣我祖宗相傳以此為訓朕恆用是凜凛嘗聞明宫掖中人數甚多往往饑寒不恤鞭笞無度因而致斃者亦甚衆小有營建動費巨萬以本朝各宫計之尚不及當時妃嬪一宫所用之數本朝自入關定鼎以來外廷軍國之費與明代略相髣佛至宫中服用則三十六年之間尚不及當時一年所用之數蓋深念民力艱難國儲至重鑒彼侈靡之失𢎞昭敦朴之風古人云以一人治天下不以天下奉一人常思此言而不敢過也祖宗以來纍代相傳家法巡幸所至尤以勞費為慮我太宗皇帝時每車駕所歷一切御用之物皆辦自宫中凡扈從之人絲毫不以擾民朕偶有巡幸惟守成憲誠恐駐蹕之地侵擾官民也朕觀明世宗時廷臣爭執者莫如議禮一事然兹事折衷最難總由世宗為興獻王長子而興獻王又别無子嗣則世宗尊崇之議未為不當父子天性至恩恐難盡以義屈情也履霜堅氷之喻可謂切至司馬光作通鑑託始於周以三晉為諸侯而首發論斷極言防微杜漸之宜謹正闡明此爻之義千古治亂不能出其範圍後世如莽操之禍總皆由辨之不早耳易理雖變化無窮而歷觀諸卦實有一貫之義大約審爻位之陰陽辨剛柔之中正而吉凶悔吝之數即不外乎此矣易卦中大象言簡義該獨扼一篇之要如乾之自强不息坤之厚德載物䝉之果行育德師之容民畜衆全卦之義蘊不越乎此尤當尋繹三代井田之法寓兵於農正易所謂容民畜衆也自兵農既分勢難復合後世有欲於曠間之壤倣古行井田之法者不惟無補於民正恐益滋煩擾天下事興一利不如去一斃之為愈增一事不如省一事之為得也古車戰之法其廢已久由今思之不獨山林原隰難於馳驅即平衍之地亦不易用蓋一車之中左主射右主擊刺居中者主御或有一人不用命則勝負所關不小此後世所以難行也古人紀一事當觀其要㫖所在如郭隗市駿之語見求士不可以不誠甘茂投杼之言見任人不可以不信此要領處尤不可不知也久亂之民思治秦民日在湯火之中沛公入關首行寬大之政與父老約法三章民心既歸王業根本已定於此漢高帝之待韓信不能如漢光武宋太祖之待功臣者亦時勢不同也光武宋祖之時功臣歸於京師無握兵之權無震主之勢故保全之尚易韓信居楚兵柄在握天下初平人心未定高帝收之亦非得已總由所遇之時不同故所行亦各異耳上古人心淳朴故鄉舉里選之法尚可以得真才後世人心日漓奔競日多若行古法於後世恐益滋其僞勢不得不以科舉為重耳古有八議之法議賢議貴議功議能正以養大臣之廉恥而不輕加以戮辱古云刑不上大夫固所以敬大臣亦所以尊重國體也人臣之義以責難於君陳善閉邪為正叔孫通以為天子無過舉因而成之是欲飾其君以無過之名而反陷其君於文過之實宜為後世所譏也後人謂陳平周勃之對吕后若能與王陵同持正論未必吕后之意不可回此蓋事後論人恆見其易耳吕后以悍鷙之威當稱制之日欲王諸吕氣凌羣臣此豈平勃諸人口舌之所能爭乎是以君子論事又當觀其世也嘗觀文帝以斷獄錢穀之數問宰相固為未當而陳平對以一切有主者亦為未善二者乃國家之大務宰相自宜振舉其綱領豈可云專責於所主乎古者田以井授人皆自耕其田故室家殷阜而鮮失業遊食之民後世富室之田跨連阡陌貧民代為耕耨是以素無蓋藏一遇水旱遂致遊食四方流亡載道亦勢使然也朕自幼讀通鑑於張釋之論犯蹕盜環二事深喜其用法平允不愧廷尉之職易之理雖無所不該下至士庶人皆可用而聖人立經垂訓之大義則為有天下國家者而發一辭一語皆可通於政治故繫辭有曰其稱名也小其取類也大此所以為萬世法程也聖祖仁皇帝御製文集卷二十七
