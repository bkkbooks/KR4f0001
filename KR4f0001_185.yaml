body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十七古今體詩二十八首暮秋重出居庸關亂榆叢栁未經霜峻嶺崇巒曉色蒼峽裏細泉流不竭仍聞太古韻鏗鏘登雞鳴山鳥道盤空近塞垣羊河如帶繞山根停鑾欲覽沿邊勢石上藤蘿手自捫遙祝皇太后千秋臨風懷繡扆佳氣望瑶宮月首蓂三葉冬遲菊萬叢十月十二日始立冬夀尊浮碧蟻箋奏託雲鴻景祚綿綿永南山頌不窮䝉古老稚來迎咸勞遣之塞閲雞延建羽旄常因國計不辭勞蒼頭黃口紛然至天地為心示覆幬閲馬牛羊羣邊境地閒敞畜牧多蕃滋掌理各有職水草實咸宜疆輿裕驅策享宴豐牲犧日給大官庖歲供內廄騎不煩畎畞力生息頻在兹偶來歷塞垣按轡省所司千羣牝牡壯萬隊雲錦竒暖就陽坡眠驕向秋原馳非獨充犒賚兼得佐熊羆夏五破狡虜挂弓天山陲甲士歸伍閒休養正此時庶物詎云細國用恆相資嘶飲適其性覆載本無私山行古木荒山落葉稀寒流幾曲漾斜暉馬蹄行遍龍堆路總是金湯户外扉厄魯特之衆相繼來歸咸詢其父母兄弟妻子為陳前所獲者覓令完聚締宇蒞八表一視貴同仁苟有不得所此中常肫肫荒裔乃異類猘驁性頑嚚橫戈臨朔漠窟穴頓淪湮將士俘擒衆竄遁僅及身逋亡日來投稽首心誠諄念彼骨肉離咸為加撫詢廣諭命尋識使得完天倫歡聲繼感泣寒塞生和春綏柔寓大權萬物歸鴻鈞塞外初冬隂山南去雁行多渺渺沙原六御過報是初冬新律改依然霜曉氣暄和駐蹕歸化城一片孤城古塞西霜寒木落駐旌霓恩施域外心無倦威懾荒遐化欲齊歸戍健兒欣日暇放閒戰馬就風嘶五原舊是烽煙地相傳舊屬五原郡地亭障安恬靜鼓鼙古寺入望香臺迥巡行陟歷遙磬聲清靜夜幡影揚晴霄梵相金泥古經廊畫壁凋登臨縱遐矚紫塞接岧嶤賜宴諸䝉古羽林列隊宴行宮內外綏懷一體中霜仗輝煌明塞日晴斿宛轉捲邉風人霑挏酒羣情洽樂合羌笳率舞同卉服狨裘無老幼歡然盡識化鈞公歸化城夜月此際殊方月關山遠近看清輝臨玉帳皎色耀金盤煙野照逾闊霜空夜未寒坐消行漏永沙塞絶風湍昭君墓并序胸奴梗化邊陲自周秦漢唐無代不有頃朕於春夏親統六師破厄魯特噶爾丹於克魯倫河西北復於秋九月西巡由張家口出塞撫察我邊鄙厄魯特敗殘之衆降者踵至其頭目來歸者咸豫近職開誠示信絶無猜疑冬十月十三日至歸化城為我兵屯戍之所城南十餘里土阜突然傳為昭君墓即志所云青冡也昔有不得志於功名或身遭遷謫往往託昭君怨而為詩以寫其抑鬱則在當日之怨極而悲又不知何如此冡之留兹土適足為漢譏焉我國家輿圖遠大遐邇諸部落世世臣屬奔走不暇凡有驅策如臂之使指甘為僕婢而不辭恆自緬懷前烈敢不慎修思永夫昭君墓何足詠也因之有感於治理遂成八韻南北分天地存亡見廟謨含悲辭漢主揮淚赴胸奴目睹當年冡心懷四海圖葆旌巡遠徼藩落效馳驅欲笑和親失還嫌餌術迂漢賈誼䇿言用五術以餌胸奴開誠示異族布化越荒途漠漠龍沙際寥寥雁塞隅偶吟因有觸意獨與人殊塞外寒夜書懷帳殿深沈夜未眠靜思籌略聽羌絃金甌更闢千千里瀚海無波萬萬年露冷宵寒凝翠幕塞髙風定歇征韉旁人莫道行兵遠自有單于首到邊黃河并序河源發於塞外流經萬里餘始由中土入海曩曽遣使探流窮源河之為利為害莫不洞悉近以巡省邊隅駐蹕湖灘河朔一水瀠洄自西北來流不甚濁而波緩岸隘而土堅白草蕭蕭黃沙彌望其中環抱約地千二百餘里草豐水美便於畜牧明𢎞治間淪於外彝地逼秦境時相寇擾故諸臣每言不宜棄此衆議紛然人多不察恆惜其言之未用然使當日即用其言加兵塞外揆理度勢豈遂能驅而遠之亦必徒勞士馬耳朕嘗以收復河套之論謂其心忠於國則可謂其灼見事機言之可行則未然也國家威德所布龍荒大漠與河套盡入版圖諸䝉古歲修賮貢奉職惟謹非務德意綏柔詎兵力之所可致耶故臨流增思詩示永久洪流逺且長迢遙逾塞垣旋繞幾曲折沙雜波濤渾漸下漸開拓建瓴勢迅奔所經雖綿邈脈絡自有根東南藉挽輸疏瀹頻討論昔歲省隄防淮濟親臨軒今兹歷大荒羽衛成雲屯崚嶒兩岸間天寒落漲痕冰澌斷更續晶晶耀朝暾此中地沃饒水草佳且繁昔人議收復斯舉誠難言觀俗撫幽遐老幼爭攀援殊方亦蒼赤咸施沐浴恩期令歸化意來者如河源晝夜入滄海包括彌乾坤十一月三日泛舟黃河流凌始下舟行之頃河水瑩潔波浪忽平黃濤何洶洶寒至始流凌解纜風猶緊移舟浪不興威行宜氣肅恩布覺陽升化理應多洽囂氛頃刻澄脫脫城土墉四面築何堅地壓長河尚屹然國計思清荒服外早將糧粟實窮邊冰渡雲深卓萬騎風徑響千旗半夜河冰合安然過六師時河冰未合師行之頃忽報可渡次早如行平地鄂爾多斯行圍雉兔甚多地敞沙平河外天合圍雉兔日盈千籌邊正欲勞筋骨時控雕弧左右弦曉寒念將士長河凍結朔風攢帶甲橫戈未即安每見霜華侵曉月最憐將士不勝寒河套西望往代存虛議今為我外藩河環沙磧暖境闊草灘繁錯落綏延接迷離朔漠吞時巡曽不到特示撫柔恩噶爾丹遣人乞降示議政諸臣醜類蠢頑思負固干矛指處朽枯摧空勞狡計營三窟卓有深機布九垓窮犬始為搖尾䇿奔狼聊作乞生哀無私何靳恢湯網未必真誠款塞來途中長至關塞經時蹕未回律逢葭琯暗飛灰遙知日晷添宮線暖閣前頭放早梅示大將軍伯費揚古仗鉞親驅寇分麾扼要先戰能遵指授動輒秉機權梟鳥巢全覆妖狐命苟延樓蘭須共滅功勝勒燕然入沙虎口秋末巡沙塞冬深六轡還野回千澗水雲掩百重山獵獵寒風徑駸駸班馬間勤勞因國事計日對慈顔右衛駐蹕西陲古鎮雄土俗亦唐風邊候年催箭遙天月似弓干戈分禁旅控制接雲中細栁新營舍精嚴面面同經大同府并序大同古之雲中外與五原隂山相接內連雁門朔代最為要地自昔軍旅之所屯戍商賈之所往來雖厥壤寒瘠俗實佻靡明武宗託言巡邊每來逰幸留輒數月為後人所議朕撫輯龍荒一歲之中再行塞上由大同至歸化城路稍遠而地暖由張家口至歸化城路稍近而地荒前獨取道張家口者蓋有故焉兹以將士久露於外候寒草枯人騎糗芻非內地不便遂入沙虎口過右衛經大同城念民徭役蠲除明年租特敕六軍一宿而過曩朕兩幸南省惟以察民疾苦興利除弊為務其山川風土隨意覽觀而已此行不辭勞瘁親冒霜雪期欲早靖沙漠又非南巡可比朕平日凡涉一境歷一事必慎思而審行之庶得古人翼翼之意塞行初返斾止蹕偶城闉帝典尊明德湯盤鑑日新時巡惟濟物敷政在安人特豁雲中賦軍需供億頻汗血馬驊騮應産渥窪中骨相昂藏汗血紅星角晶熒如掣電霜蹄蹀躞已追風聖祖仁皇帝御製文第二集卷四十七
