body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻六勅諭諭議政大臣喀爾喀扎薩克王等着議政大臣㑹議宜給與一慿據伊等所住地方相隔遼逺若當有事即互相救援甚好况閔柱爾公之旗分尤逺居界外勢亦單弱喀爾喀等都是一様扎薩克倘有事故私去救援不知是與不是大家觀望事必擔悞今哈宻有信總兵官路振聲聞知即行徃救七日可到哈宻今喀爾喀等着給與慿據有信即相救援務俾不致有悞將此情由交與議政大臣康熙五十四年六月初六日諭議政大臣據爾等所議欲將米石運至推河地方等語公閔柱爾所住厄德爾齊老圖地方與推河相去不逺祁里德等領兵在厄德爾齊老圖左近揀有好水草可以耕種及魚獸繁多堪以駐兵之處移兵駐劄則邊地既便於打牲又可保䕶公閔柱爾等眷屬將米運至駐兵處所不但有益而進兵亦近着運米大人將米運至駐兵之處其所食羊隻欲在内地扎薩克喀爾喀扎薩克等凑取三十二萬等語此如許羊隻一時不能驟得且路逺趕送艱難着將達禮杭靄之羊五萬隻張家口瓦爾達所管之羊五萬隻推河左近之喀爾喀扎薩克等凑羊十萬隻共羊二十萬隻進兵時隨後趕進不但有益行走亦甚便㨗并亦容易可得其駱駝欲在内地扎薩克喀爾喀扎薩克等凑取八千隻等語内地扎薩克無有駱駝人皆盡知惟喀爾喀扎薩克一處有如許駱駝焉能一時驟得自推河地方所進之兵食米者無多且運到米石之馬騾亦可一併駝米前進也如許駱駝若無用處只向喀爾喀扎薩克等凑取駱駝三千隻亦足充用運米一節不可遲緩將此事另繕摺具奏即宜施行其餘事件俟祁里德等議奏到日再行定奪康熙五十四年六月初八日諭議政大臣據富寧安席柱所奏今年進兵取土魯畨等語今若在甘肅等處將馬匹喂養肥壯於九月間方取土魯畨則適值冬令且伊地方太近不如仍照原議明年前進攻取為是這事情着交與議政大臣議祁里德信息亦應等候再䇿妄阿喇布坦曽有秋天兵至哈宻之語總兵官路振聲力量單弱西安之兵既在甘肅等處喂養馬匹着將甘肅提標兵發與路振聲助力之處議奏康熙五十四年六月初十日諭九卿近見甘肅廵撫疏稱固原等處地方今歲又旱田禾枯槁現今九卿㑹同速議但固原等十七處缺額銀米亦不甚多即分年帶徴被災之民斷不能完納應察明蠲免着九卿詹事科道將前事一併詳察速議康熙五十四年六月二十日諭大學士松柱學士查弼納敦拜等軍務事現今各省俱行捐輸若俟伊等所捐方行辦理或致悞事亦未可知軍務所需錢糧不多如俱動正頃錢糧則事既不悞而且有益此外若有地方官再行捐輸者於事裨益更多着諭議政大臣併行文京城大學士及諸大臣等再從前議政大臣所議之事到部後曾經復奏現今議政大臣議復一切事件着該部俱照前繕本用印奏聞康熙五十四年六月二十二日諭大學士松柱學士查弼納敦拜等覽兵部為查臺跕奏摺已有三十餘次臺跕乃為軍機事務而設有應令特行馳送之事亦有應俟便發徃之事若不論𦂳要與否一概馳送則臺跕必致苦累將此傳諭兵部康熙五十四年六月二十八日諭吏部尚書富寧安朕因信任於爾所以此畨將爾派出事屬𦂳要闗係甚大凡事務仔細留心倘若無事行文將爾等掣回設或有事䇿妄阿喇布坦之兵勢一齊前來在臨近調轉之事曽經指示於爾但相隔地方遼逺有𦂳急事即飛馳報信來徃需得二十日軍機之事不可遲悞爾親身到處有調轉之事不必啓奏即與將軍商議酌量而行再有新滿洲隨朕行走甚屬習慣在哨塘亦甚熟練者選派十名與爾隨徃法腦係隨朕行走熟練之人哨塘等處甚屬要𦂳着隨爾去新滿洲之内有爾所知者令其帶徃再與都統阿喇納同去之副都統吳昆人屬平常而軍旅熟練爾在途間遇見即可帶回康熙五十四年七月初二日諭户部銅斤事情經九卿議覆結案商人所欠銀兩俱交部全完工部寳源局所欠銅斤亦已清還毫無欠缺伊等應賠内庫銀兩在内務府催追完結甚易與剖全無干渉今部以銅斤仍交王綱明等採買將拖欠銀兩分年坐扣已還銀兩仍交内庫所議全不是矣若將銅斤又交伊等以致再欠可乎錢法事務係户部專責應作何辦買銅斤不悞鼔鑄之處再議具奏康熙五十四年七月初二日諭議政大臣博貝所奏將呉良海歸服有䇿妄阿喇布坦所屬在厄敏處居住之厄魯特杜爾伯特丹津一千户之人招撫歸服若抗拒不服即行攻取似此動作以彰聲勢甚是其間設有不睦致相仇敵聞博貝之兵前徃以為大軍將至紛紛擾亂便可得彼真信雖䇿妄阿喇布坦兵來救授地方亦逺更有阿爾泰嶺之雪攔阻不能前進矣博貝又奏稱臣有兵一千五百僅已彀用不求增益若聖主以尚可增添有根敦扎薩克協理台吉羅卜藏之所屬翁科時之兵扎薩克濟納米達之兵此二扎薩克之兵原在和托古特一處行走與厄魯特攻戰熟練之人等再有扎薩克台吉阿禮雅之兵亦善於破敵將此三個扎薩克之兵添於我足矣其餘之兵既不知道亦不求助着即將此三個扎薩克之兵添給博貝帶領此兵前去遣人徃呉良海處以好言安慰云爾等原欲歸順我聖主今欲歸順應乘此招撫投誠若不傾服入於樹宻之處此乃無闗𦂳要相其形勢行事可也至杜爾伯特丹津以誠信確實差人招服大彰聲勢為要博貝剿撫前去時若有䇿妄阿喇布坦之兵向我喀爾喀直冲前來即着尋其後尾隨杜爾伯特之丹津與厄魯特散秩大臣車領伊等係弟兄令車領差伊親信能人冩給書信將現在所議之事發於博貝或派勤慎章京或筆帖式作速飛馳并帶車領人同去即令前去之人同博貝之兵一齊進發將此情由着交議政大臣議康熙五十四年七月初二日諭議政大臣軍務糧餉闗係甚要天時地利不可不通徹籌畫現今運米一事朕甚為躊躇前日直𨽻廵撫河南廵撫奏摺據稱牲口已如數起解又稱因雨水過多恐泥濘一時不能得到等語看來今歲雨水實大此頃牲口到湖灘河所定疲瘦不堪且前去路逺必至沍寒之時及至回來正歲底大寒人與牲口冷處不曾經慣必致大受傷損殊屬煩難所派大人雖竭力圖効亦無法可施及至奏請似覺誤事朕意將此㫖抄録與將軍費揚古並散秩大臣祁里德等滿洲索倫䝉古兵糧若可以節用支持到明年五月則今歲預備齊畢來春青草一發即令運米如何議政大臣速行詳議具奏康熙五十四年七月十四日諭大學士松柱學士查弼納敦拜星俄特常壽閲刑部奏章繁複者甚多皆由府州縣司道各官審録供招盡行全載所致該府司道果讞有别情自應叙入若無互異之處但註明該府司道與州縣各官歴審皆同一語止將州縣初招並督撫等大吏審擬之處叙明本内足矣若將前後陸續審報供招雷同備載徒使繕冩重複案件亦至遲延户部奏章亦有類此者着九卿詹事科道㑹同議奏康熙五十四年十月初四日諭大學士馬齊等朕禮遇諸大臣甚優自始至終無不期其保全凢官員才守及居官之處靡不詳察朕曩廵狩至龍泉闗駐蹕之日曾面詢趙鳯詔噶禮居官何如趙鳯詔奏稱山西地方官噶禮第一清亷一錢不要朕以鳯詔乃趙申喬之子斷不欺朕聽信其言屢擢噶禮至江南總督又奏稱婦女不失節乃當然之事居官不受賄亦當然之事如居官受賄即與婦女失節等朕諭爾言雖則鄙俚誠能如此存心甚佳迨噶禮事敗後朕詢尚書張鵬翮曽奏趙鳯詔居官貪婪近晉撫蘇克濟摺奏趙鳯詔受賄甚多應行糾叅朕手批令其停止以俟悛改乃諭㫖未到叅本已至今閲趙申喬所奏詞意忿激殊非大臣之體著飭行仍令在任供職康熙五十四年十月二十六日諭户部朕蚤夜孜孜軫懷民瘼四方水旱時勤諮詢惟恐閭閻之蓋藏未裕一遇儉歲收穫失望窮黎即無以資生也直𨽻順天保定河間永平宣化五府所屬地方今歲雨水過溢田畝被渰者甚多穀耗不登民艱粒食現今緩征賑借雖惠澤頻施而來春應辦錢糧若仍行徴取則民力匱乏輸將難繼着將五府州縣康熙五十五年地丁銀八十五萬五千八百兩零糧米豆穀一十一萬五千五百石零草九萬四千九百束零俱通行蠲免爾部行文該督遍飭所屬實心奉行俾窮鄉僻壤均沾朝廷德意倘有不肖官吏私徴侵蝕者察出定行從重治罪爾部即遵諭行特諭康熙五十四年十月三十日聖祖仁皇帝御製文第四集巻六
