body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集巻十四勅諭諭領侍衛内大臣議政大臣軍前調回大臣八旗都統前鋒統領䕶軍統領副都統等太祖太宗時滿洲兵於凢征戰之所俱自備馬匹口糧行走到處所向立功並無遲悞今官兵凢有行走之處馬匹糧餉一切物件俱給自官帑且以為不足而怨咨生焉此皆我滿洲風習較之曩昔有異亦由於該管官並不嚴飭之故也朕辦理軍務閱歴甚多當日攻取岳州時但從陸路抵禦以致許乆不得朕諭在洞庭湖預備船隻以水路遏賊貝勒查尼以湖中風浪甚大船不能穏恐有碍於兵丁以請撤船兵奏聞朕諭岳州城已被困不乆即獲今將船兵撤退賊得由水道往來何能有得岳州之期哉若兵丁於水道不利即與朕之殺害無異朕自承任不撤船兵嚴飭看守不乆而岳州下矣再征討雲南時貝子張泰將軍頼塔率領滿洲兵每佐領下撥二十七名總督哈詹蔡毓榮董繼國金光祖提督桑格趙徠等標下營兵合計共三四十萬有餘離雲南城七十里安營一邉到湖一邉到山並未進兵於湖斷其水路賊㓂米糧照舊運行城内並不危急後趙良棟率領寧夏兵到云我等連營四布不就近往戰何日得城迨至日乆米糧不到雖滿兵無妨營兵何以存立耶張泰云兵丁俱從逺來且城亦朝夕可獲皇上恤養兵丁何可令其傷損設或營兵不能禦敵我等勢必捐軀趙良棟云貝子果領兵進戰奪城此功可邀封親王郡王何故作此等議論乎我領本標營兵徑自前往遂進戰奪取得勝橋而趙良棟之兵亦瘁甚矣張泰向趙良棟云爾兵已瘁何不將爾之兵撤回令總督蔡毓榮率兵看守趙良棟云我將死戰所得之地如何交與他人看守不聼張泰之言城内賊㓂始覺危急不數日而雲南下矣亦由善於計謀相機而動也再出征烏蘭布通時阿宻逹因天晚要撤兵云皇上必不以撤兵故遂殺我等將兵撤退索額圖明珠選勇士六七百人埋伏勇士云挑選我輩原擬或戰或追詎意止令看守彼此不無忿怨後中路出兵時三品以上大臣官員等㑹議進兵之處衆皆謂不可獨朕與費揚古以兵為可進遂决意進兵及至科拖地方衆皆不欲前發大臣等勸朕將兵撤回巴渾岱爾亦在其中朕諭以祭告天地太廟社稷親統兵前來並不見賊踪如何驟行撤兵不允所請將兵前進噶爾旦聞我兵威甚是驚懼如鼠竄而去朕選兵着馬斯喀為將軍尾追噶爾旦遇西路兵攻擊大敗之朕將中路于成龍所運頭隊米遣明珠速送至費揚古軍前二隊米亦即着續送三隊米内朕但留十八天口糧餘米俱送西路軍前是以西路兵丁未至饑饉俱得保全而回朕是時若輕信大臣等言中道撤兵則兩路兵丁何得立功奏凱耶今看領兵大臣官員等祇為一身之計不視朕事為𦂳要内存私意彼此争論不和又向兵丁沽買好名多取口糧及不能䭾載至於抛棄毫無珍惜之意如此可乎不可乎朕之滿洲兵俱係精兵無可議論全在領兵者將朕之事專心辦理不求安逸賞罰精明事體如何得致錯悞進兵西藏時色楞不候衆人獨自前往不知者妄行議論額倫特因病在後隨後追至色楞皆奮不顧身如此猶可謂色楞進之過速乎今䇿妄諾爾布將伊兵丁善全而歸伊所領之兵甚感亦惟感伊而已朕頗不憐憫也朕祇憐憫進西路身亡兵丁事定之後自然分别加恩至文武大臣官員等果能清亷自無可議但領兵大臣專務清亷將何所挾持以勸賞兵丁乎部院衙門清亷者止能自守其身辦如此大事恐不能也朕年少時每於講武練兵等事違命者即置之於法内外大小悉知儆惕由此觀之訓練之事不可踈忽也兹衆喀爾喀誠服朕之風化青海等亦如之䇿妄呵喇布坦之人霸占藏地毁其寺廟散其番僧累其臣僚青海等理應棄命忘身奮勇致討乃伊等口稱維持黄教却無實心効力之人策零敦多布領兵在藏居住彼處人以地逺我兵不能深入策零敦多布從伊地歩行一年有餘忍饑帶餒而至招所以彼之兵衆以彼之形狀尚且能至我軍顧不能至乎今滿漢大臣咸謂不必進兵朕意此時不進兵安藏賊㓂漸至收服畨子等將作何處置耶故特諭爾等安藏大兵决宜前進康熙五十九年正月初五日諭和碩顯親王衍璜等朕碌碌在位五十九年朕亦不知此皆上蒼眷佑先聖造福於朕何渉且西陲現在用兵軍民殊屬勞苦去嵗正月朔日食方今七月朔又值日食海洋颶風飄没官兵船隻山左東三府黎民饑饉流離屢次起蛟城池及民間廬舎户口被淹淮黄水大僅能搶䕶民人風俗未治官員政事未端此正君臣殷殷求治之時至於區區慶賀行禮甚非朕意朕御極雖在順治十八年間現今時厯係康熙五十九年此亦不可不審康熙五十九年正月十二日諭大學士馬齊等總督年羹堯自軍興以來効力辦理甚優漢仗亦好其四川之兵預備練習甚是整齊止就伊等威勢可以成功速行文總督年羹堯令伊帶領四川滿漢兵馬進剿如有能署理總督事務地方不致生事者令總督年羹堯奏聞署理年羹堯即授為將軍帶領雲南四川兵馬前進如不得署理之人四川地方𦂳要着授䕶軍統領噶爾弼為將軍帶領雲南四川兩處兵馬前進其將軍印勅若不速行造送恐致不及凢各處領兵大人非授為將軍難以弹壓人衆祁里德此次前來看其人亦去得可管轄衆䝉古台吉亦應授為將軍給與印勅進剿西藏之招地其領大兵之將軍印勅應速造送往所給印勅交大學士等具奏康熙五十九年二月十六日諭大學士馬齊等前日覽户部尚書趙申喬辭䟽朕深憐之念其操守清亷始終一轍性雖暴躁而為人朴直年近八旬病勢料難全愈倘一時不保亦未可定趙申喬乃革職留任之官照陳詵之例復還原職當賠之銀一概寛免内閣將此㫖速行發去令病人早知一日或五内少得安寧便於調攝頤養也康熙五十九年四月二十二日諭大學士馬齊等總兵官金國正所奏陜西兩年收成歉薄百姓有流離之狀陜西地方關係甚要文武官員内賢能者俱已發往軍前此處應着實留心着交與九卿詳加議奏聞得四川兵丁照常操練其别省並不操練陜西緑旗兵數較他省甚多出兵去者無幾其現存兵丁豈可不操練器械豈可不修整着嚴飭督撫提鎮實心奉行至總督鄂海從前居官亦優今因年老聲名甚不如前此兩年歉收之處並未奏聞將此亦諭九卿康熙五十九年五月十五日諭靖逆將軍富寧安等看今嵗稍旱即速行文與四路軍中大人等如兵馬營中亢旱馬尚未肥或進兵之路甚旱水草不敷既經軍中之大人等議定進兵復何敢以亢旱不能進兵為辭擅自停止軍務所關甚大朕從前屢次曽諭過議政大臣並領兵之大臣等凢軍機之事今日如此定議明日又改俱未可定要在相其機變而行因此朕必熟思而後特頒㫖意苟無㫖意恐軍中之大臣難於奉行也若現今旱甚惟期早到所指之處及至彼處因亢旱而無水草馬匹倒斃則兵馬如何前進如何回旋而明年如何進兵耶總之軍中雨水及時牧草果好行兵自無艱阻應即行進兵設或亢旱馬匹疲瘦雨水不調牧草不堪則即以不宜進兵之處令軍中之大臣等定議具奏斷不可將今嵗若不宜進兵來年亦可再進作游移之語呈奏也路途遥逺恐發去文書不到遲延遺失亦未可定湏明日發一次續後再行文一次其巴爾庫爾與阿爾泰兩路乃係一起若一處不可則將一處停止西路雲南四川之兵伊等乃各自分起也康熙五十九年五月十五日諭大學士馬齊等朕聞保安懷來等處地震宜速遣大臣前往賑濟若俟部中啟奏便致遲延着派副都御史楊柱屠沂令伊等作速自京城出居庸關前往延慶州保安懷來沙城等處查閲一靣奏聞施恩并探取蔚州廣昌渾源州等處信息如被災果重着一併施恩派直𨽻守道李維鈞酌量帶地方官幾員自彼處前往其派包衣官一員將内庫銀帶三萬兩之處朕於阿哥處另下諭㫖康熙五十九年六月二十一日諭大學士馬齊尚書孫渣齊徐元夢等楊宗義所奏此事不至開捐朕先廵幸陜西曽問河南由黄河水路通至陜西之處地方官以不能行走回奏上古大禹鑿龍門通濬水道漢唐之時俱經輓運豈有不能行船之理朕特遣三阿哥往勘三阿哥乘騎渡黄河至砥柱龍門看過竟可行船且私鹽船隻亦多從此往來由龍門至黄河直抵渭河至西安北門從絳州汾河可至山西太原彼時曽有交與西安將軍總督廵撫山西河南廵撫㑹看具題之本楊宗義不知此等縁由因有此奏着將將軍總督廵撫等㑹題原案查奏至總漕施世綸居官素優歴年漕船俱經催儧全完並無遲悞本年漕船已經過畢此間並無事務漕運印務交與總河趙世顯署理施世綸速赴豫省從河南府由黄河至西安輓運路徑勘明具奏陜西現存榖石數目亦查明具奏今陜西正值軍需之際施世綸暫居陜西令恊助鄂海辦理糧餉事務康熙五十九年七月初十日諭吏部今正值軍務之時如有需員之處目前即得官發往事方有濟如照陳瓉條奏大臣等雖易於辦理而發往官員之貧富何由得知似此屢次變更軍務反致遲悞今值軍興正人臣効力之時陳瓉着以御史銜發往大將軍王處令其効力行走伊至彼地何以有益於軍務及速得人員辦理之處既知之後再行條奏康熙五十九年九月十二日諭吏部知府蔣兆龍部議降二級調用西邉正值軍務之時地方不肖官員規避以圖脱離彼處多有從輕議處回籍又復捐納希得美缺者此輩不可不懲蔣兆龍着革職不許捐納自後此等從輕議處官員俱照此例革職亦勿得令其捐納康熙五十九年九月十二日聖祖仁皇帝御製文第四集巻十四
