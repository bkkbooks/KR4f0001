body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷三十七古今體詩四十首巡幸遼陽肅將軒駕向遼陽暖日晴薰百草芳照野山川皆動色掀天旌斾自生光林間蒼蘚侵人徑城上新花綴女牆欲問襄平舊郛郭千年華表鶴飛翔駐蹕遼陽夜深對月用唐太宗遼城望月詩原韻夜氣澄炎景清光渡海碣流雲漸稀朗繁星粲如綴蟾殿魄初明氷輪影未缺懷古聽行漏素心良藴結曠然望九霄妖氛盡殄滅廣祐寺禪宫多嵗月瑞塔積風煙翡翠苔碑暗珠璣寶相傳馴簷來紫鴿湧地出青蓮微雨輕埃洗兹晨興獨偏寺創於唐時中有自來佛像入千山曉入千山路煙光織翠蘿﨑􅋂緣石磴宛轉歷巖阿樹杪朱旗出藤隂玉勒過物華看亦好景色愛清和祖樾寺青山橫古寺羽斾陟層巔地僻茅堂小橋危石徑穿夏條含嫩葉春卉發餘妍寂寞空林午時聞鐘磬傳龍泉寺狹徑才容騎香臺欲起龍懸崖千仭落斷碣百年封泉細通幽壑庭深暗古松臨髙一騁望積翠靄重重行殿讀書示翰林侍講髙士竒六御東巡海上回夜深思古帙重開祕書日日隨行幄玉輦前頭珥筆來登澄海樓觀海危樓千尺壓洪荒騁目雲霞入渺茫吞吐百川歸領袖往來萬國奉梯航波濤滚滚乾坤大星宿煌煌日月光閬苑蓬壺何處是豈貪漢武覓神方端陽前一日回宫滿路榴花映玉輿爐煙香繞侍臣裾經時逺道彤闈隔先向慈寧問起居機政偶暇輒留意書法漫成紫宸喚仗曉初散坐挹朝爽浮南榮時平偶得機政暇觚稜浮影風日清盤螭畫几青玉色回鸞素紙雪繭明臨池試作波折勢染翰聊適優間情體安要使結構密志一始覺風神生心手調娛本非易筌蹄脫落寧有程古來聖學亦遊藝别具妙詣非形聲夏日瀛臺許奏事諸臣網魚攜歸西苑頗幽邃崇臺俯畿甸鮮雲蔭修廊南薰披廣殿水木既周遭卉物亦蔥蒨嵐光翠欲流林暉清可薦於兹滌煩暑敢曰恣遊衍眺逺暢陽和居髙協靈撰朝來覽封事灑灑意忘倦髙閣晝漏移彤墀集羣彥靖共往汝諧勤劬答豫眷姑為池籞遊從容任所便投綸錦鬛飛舉手纎鱗見委蛇退食心庶幾娛式燕賜大學士杜立德并序內閣大學士杜立德弼亮老臣綸扉久重引年請歸陳乞至再遐心既固未可勉留詩以送之用申繾綣之懷十載資賢佐勞深致太平訏謨留紫闥風度重丹楹方倚鹽梅略難違邱壑情餐芝黃綺伴軒冕有餘清賜大學士馮溥并序內閣大學士馮溥贊襄密勿著有勞勩乃以髙年數請歸老念深箕潁頓謝簪紱悵別之心聊書四韻環海銷兵日元臣樂志年草堂開緑野别墅築平泉望切巖廊重人思霖雨賢青門歸路逺逸興豁雲天西山駐蹕夜聞秋聲西風吹長林木葉響如雨起視山月髙浮雲無一縷玉泉山晚景用唐太宗秋日韻晴霞收逺岫宿鳥赴髙林石激泉鳴玉波回月湧金薰爐籠竹翠行漏出松隂坐愛秋光好翛然靜此心秋日紫光閣閲射碧漢層雲斂金風別館開騶虞賔射禮士馬羽林材隊引花間入鑣分栁外催桓桓心膂寄堪許屬車陪九日幸景山登髙秋色淨樓臺登髙紫禁隈千門鳴雁度萬井霽煙開翠拂鑾輿上雲隨豹尾來佳辰欣宴賞滿泛菊花杯大閲南苑風髙水潦收旋催羽隊肅貔貅九天鼓吹鳴金鐲萬乘旌旄擁翠虯馬足過時殘雪盡鑾聲回處朔雲浮宣威端在承平日自昔經邦有大猷海東青羽蟲三百有六十神俊最數海東青性秉金靈含火德異材上映瑶光星軒昻時作左右顧整拂六翮披霜翎期門射生諳調習雄飛忽掣黃絛鈴徑如千鈞激砮石迅如九野鞭雷霆原頭草枯眼愈疾砉然一舉凌髙冥萬夫立馬齊注目下逐鳥雀無留形爪牙之用安可廢有若猛士清郊坰晾鷹築臺存勝迹佳名豈獨標禽經曩因見雁念征南將士曾題截句今禁旅凱旋聞雁再作上林秋曉淨煙霏每聽征鴻憶授衣此日諸軍齊奏凱銜書不用更南飛再遊盤山薊州城北黃崖前水甘土厚多平阡崇山特起矗霄漢栝柏夾路隂參天回巒復嶂倍娟秀幽林邃谷時夤緣雲藏古寺行未到樹杪先有鐘聲傳數峰突兀勢陡絶上迫箕尾雙星躔峩峩石狀獸蹲立因風搖曵如空懸深潭清冷那可測知是百尺神龍淵鉢泉恍惚有海眼潮井呼吸通百川不然泛濫亦易挹何為萬古清涓涓神工融結天巧鑿更騁逺目窮髙巔漁陽古郡最阻厄屹為左輔雄幽燕即今交河逺置候此實堂奧非臨邊太平粗喜有端緒石根沙磧皆原田偶兹登陟聊駐斾用寄襟抱題斯篇見案頭水仙花偶作二首翠帔緗冠白玉珈清姿終不汙泥沙騷人空自吟芳芷未識凌波第一花其二氷雪為肌玉鍊顔亭亭如立藐姑山羣花只在軒窗外那得移來几案間黃金臺懷古昭王禮賢士築館黃金臺矯矯昌國君奮袂起塵埃下齊七十城聲振滄海隈汶篁植薊邱豈曰非雄才遺迹雖榛蕪千載猶低佪市駿固有術貴在先龍媒但得一士賢可以收羣材自長城嶺至臺懷山行竟日夕風景一以殊萬馬魚貫前宛若登天衢雲際冠層峰雪外辨修途叢卉未甲坼寒禽互喧呼曲澗響環玦空籟鳴笙竽縱乏綺麗觀煙蘿淡相娛流覽多所欣未覺道路紆五臺遙入抱鬱鬱誠靈區翠微未及上身已臨清都佳氣愜遐賞曠懷抗逺圖陶唐此故土餘澤仍漸濡刻玉緬往迹遊河景前模載詠蟋蟀吟遺風今有無顯通寺蘭若翠微重諸天第一峰金輪開漢日紫府覔仙宗雪映交窗迥雲封閣道濃夕陽松影外處處報疏鐘殊像寺法相最異五髻瞻殊像千花聚法筵經營思哲匠髣佛見初禪緤馬明霞外燃燈畫壁前不須仙梵放清磬已冷然駐蹕靈鷲峰文殊寺地敞層臺近林開法象遙香泉分乳鉢佛火簇松寮紺馬迎鑾入珠幢引隊飄竺蘭遺迹在選勝歷山椒天花靈山過雨萬松青朵朵緗雲摘翠屏玉笈重緘敕飛騎先調六膳進慈寧登望海峰誰駕鰲為柱神州左一方重關連委粟半夜豁扶桑曉散嵐光白晴收水氣黃瀛壖不可極萬里自蒼茫北臺眺望絶磴摩羣峭髙寒逼斗宫鐘鳴千嶂外人語九霄中朔雪晴猶積春氷暖未融憑虛看陸海此地即方蓬娑羅樹歌娑羅珍木不易得此樹惟應月中植想見初從西域移山中有人多未識海桐結蕊松栝形千花散盡七葉青山禽回翔不敢集虛堂落子風泠泠楚州遺碑今已偃峩睂雪外雙林逺未若兹山近可遊靈根終古蟠層巘繁隂亭午轉團圞回睇精藍路幾盤憑教紫府仙山樹寫入披香殿裏看趙北口趙北時巡至燕南古戍聞人煙生曉市橋影漾晴雲浴鳥迎船出垂楊隔浦分中流清賞洽簫鼓陋橫汾水淀雜詩四首輕舟十里五里垂栁千絲萬絲忽聽農歌起處滿村紅杏開時其二春水船行天上泠風雨過田家深樹幾聲布榖晚晴千縷明霞其三銜泥雙燕沙際喚雨單鳩樹頭昨夜桃花新水鯉魚躍入蘭舟其四為愛沙明水逺更看栁軃花新草木禽魚咸若河山民物同春南苑十里郊南路紅門啓上林嵗時搜狩禮畎畝豫遊心羽仗連花影帷宫接栁隂鳳城回首望縹眇五雲深初夏玉泉山二首别館依丹麓疏簾映碧莎泉聲當檻出花氣入垣多路轉溪橋接舟沿石竇過薰風能阜物藻景已清和其二山翠引鳴鑣湖光漾畫橈野雲低隔寺沙栁暗藏橋百囀黃鸝近雙飛白鷺遙今年農事早時雨足新苖聖祖仁皇帝御製文集卷三十七
