body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十六古今體詩三十首三渡齊河即事淑氣霓旌繞光風拂濟川曾經三次渡未若十年前疾苦勞宵旰深恩賴保全頗知民食重安撫責臣賢趵突泉留題源清流潔四字突兀泉聲湧淨波東流逺近浴羲和源清分泒白雲潔不慮浮沙汙水渦夜登泰山日斜登泰岱嶺腹隔層霄深夜回鑾處便忘石磴遙新栁畿內栁絲未出黃江南栁色已成行鬱金枝上啼鶯早積翠河邊待夕陽覽淮黃成殷勤久矣理淮黃幾度風塵授治方九曲素稱天下險四來實為兆民傷使清引濁須勤慎分勢開疏在不荒雖奏安瀾寬旰食誡前善後奠金湯登金山望長江煙雲清處曉霞飛萬里滔滔映紫微靈液渺茫浮淑氣孤峰峍崒照晴暉花翻浪湧疑天色風動帆張共德威晝夜如斯莫間歇體乾勉已識璿璣虎丘秀壁名吳水懸蘿接紫霞仁風期大吏厚俗止紛華停輦輿情問開軒畎畞賖笙歌陳勿用意使盡桑麻雨後見梅花新雨濛濛宜五沃蒸霞始放見錢江初春錦繡鋪千樹落日微吟坐北窗過雲栖憩竹林下令人劚筍劚蘭尋春二月幸雲栖滿目天光入品題密林布蔭樵漁樂幽柏成行蕙芷齊浴手臨泉開籜筍傍巖倚石選蓬藜餘杭風景西湖勝未若山中待竹迷雲栖歸途遇雨錢江風雨促前旌竹樹繽紛細草萌夾岸黎元瞻拜切頻施膏澤愜民情錢塘江潮相傳氷岸雪崖勢滚滚掀翻擁怒濤風靜不聞千里浪三臨越地識江臯西湖夜月月照清漣靜不波鸞簫象管夜來多輕舟豈羡江湖勝欲寫無私屬棹歌岸側桑葉初碧夾岸青青繞御舟濃桑初茁滿村謳省方遍問蠶家苦春雨連綿盡日憂癸未春二月二十日自杭回至蘇州是夜雨二十一日朕欲北行地方大小官員百姓留住二十二日雨甚冉留不能起行二十三日雨晴又欲留故書懷以示躊躇星夜兩河工又至吳鄉泊趠風春雨姑蘇留豹尾黎情江浙戀青驄翠華景從無雲蓋遍覆時巡有折衷不意龍蟠虎踞勝豈因景物雜謙沖巡省江浙見閭閻有起色示諸臣省刑愛民巡方不用駕樓船白舫蘭橈問市廛和氣成春知歲稔清風布物愛時妍齊民但示蒲鞭辱報國應同竹節堅莫恃才名輕庶政冥冥中自有青天船泊無錫掦帆百餘里警蹕惠山泉竹倚青松外藤懸秀嶺巔垂楊初匝幔新藻寫澄淵惟愛此清潔開言點素箋至江寧百姓歡迎遮道志喜童叟欣迎步輦前春風潤雨萬條煙若非念切軍民久爭得歡聲祝八千行宫春雨作書竟日離宫暫駐輦竟日檢牙籤自愧書家奧臨池正筆傳江寧道上口號白下回程傍竹林平山水溜似鳴琴星馳不為隂晴阻瓜步城南念舊吟清明麥秀清明前後麥花香遍野氤氲映驌驦須認秋成春雨密隔溪村落飲斜陽下長江舟中作一鷺蘆中起雙鷗沙上鳴翠煙含碧嶂瑞靄覆瓊英洲轉牙檣亂江流大塊橫智仁山水德動靜也移情自江寧至京口輕綃初霽引江干隔岸蘆洲映水寒吳會人文因氣秀金焦巒勢起𢎞觀往來客旅千重艗上下波濤萬里灘逝者綿綿無歇息利名今古視艱難登焦山風帆戰艦入沙洲不動雲煙一豫遊只見晴光安水面潮聲靜裏卷潭湫維揚雨霽二十四橋夜雨收蜀岡阜下水西流禪心欲定沾泥絮不為繁華紫綺裘見泰安等數州縣飢民亟命設法賑濟東路行輦到人食正薦飢呼庚兒女盼宸遊衆所依村中皆菜色散去掩柴扉救荒先發穀轉漕迅如飛兩旬無多日有司報民歸地丁既已責私泒務全希盡力專邦本留意欲國肥麥秋猶可望黎命其庶幾東八閘舟遇順風志喜千里程途數日還岸回轉轉抱清灣雲帆不用荃橈力喜志恩從大內頒閲兩河告成事畢因有恩詔星夜回京至天津書懷閲河臨南國飛斾轉金臺不畏中宵困豈因華祝催千秋明鏡鑑萬夀鄙霞杯沐雨櫛風緊恩從渙汗開前過江浙桃花已放今回鑾至津門復見桃花盛開調寄點絳唇再見桃花津門紅映依然好回鑾才到疑似兩春報錦纜仙舟星夜盼辰曉情飄渺豔陽時嫋不是垂楊老詠各種牡丹晨葩吐禁苑花蒔就新晴玉版參仙蕊金絲雜緑英色含潑墨發氣逐彩雲生莫訝清平調天香自有情詠杜鵑花賜髙士竒石巖如火本天台秀質丹心日月催移根禁苑清詩句朱夏山林惜茂才聖祖仁皇帝御製文第三集卷四十六
