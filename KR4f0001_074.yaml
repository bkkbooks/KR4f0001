body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十五目錄古今體詩二十一首潞河三首廵幸出喜峯口過黄土巖大石磯塞上宴諸藩入喜峯口野望夏日迎薰亭午日潭柘寺戒壇卧松早秋新霽夜坐瀛臺天津通恵河閱運艘滇平宫門聽政示閣部諸臣昇平嘉宴同羣臣賦詩用柏梁體并序元夜與諸王宴飲乾清宫
