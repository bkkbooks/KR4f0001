body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷五敕諭諭兵部山東地方稱有海賊坐鳥船二隻行劫朕思山東地方雖下諭旨令造鳥船亦必從福建浙江江南成造而來若不知山東不能造船如何辦事歷年福建商船於六月內到天津候十月北風始回朕因欲明晰海道令人坐商船前往將地方徑路繪圖帶來知之甚悉今欲知海賊之源但令往福建浙江及江南崇明等處察訪即得之若在山東察訪必不能得目下冬令將屇正值北風海賊不能久留於直隸山東必已向浙閩路去俟明歲船隻可行時下旨於有水師海船之省令入各海島搜剿將此旨識之俟回京日啓奏康熙四十二年九月十五日諭內閣兵部紅苗事當籌一勞永逸之計苗人固慣行搶掠而因內地人勾通煽誘者亦有之今照廣東八排猺人事遣大臣一員前往領荆州兵再酌派廣西湖南貴州三省兵齊至苗地協力圍困令其畏懼就撫則百姓可永免侵掠之患至山東所有海賊必係福建浙江崇明等處坐鳥船而來者若不將賊數多寡及嘯聚何地出沒何路詳悉周知難以料理應遣大臣一員前往招撫先招撫一二起細詢夥盜確數如何嘯聚並何處屯住何路出入一一明晰則餘賊或剿或撫無難矣俱交部詳議康熙四十二年九月二十四日諭吏部閲此疏內有請禁督撫建德政碑等語凡地方大小官吏若居官果優縱欲禁止百姓立碑亦不能止如劣迹昭著雖強令立碑後必毁壞聞昔日屈盡美為廣西巡撫回京時百姓持鍬橛鋤其馬迹庶民之心豈能強取耶禁立碑一段可刪去康熙四十二年九月二十六日諭大學士馬齊席哈納張玉書吳琠陳廷敬等江南督撫提督著公同捐造洋船二十隻俟來年春令山東水師營官兵前往江南取至山東候用目前山東海盜非真正海中積賊皆貿易之人資本虧折肆行搶奪者可令學士常壽前往招撫再令筆帖式三人往山東三路問賑濟事並視民間情形限第六日到京朕自幼聽理政事極其敬謹時時惕厲於心今已年艾諸事更加戒懼不敢稍有懈惰忽略也康熙四十二年十月初二日諭吏户兵三部朕統御寰區勤求治理鑾輿時邁省方觀民春月閲視河工自畿輔山東以及江浙地方皆經巡幸兹兩河漸已底績所至之地民生風俗亦因以周知念陜西省為巖疆重地當出師塞外時曽經歷其邊境而西安一路未及親蒞頃陜西督撫諸臣言秦民望幸之心至殷且切合詞陳奏而河南山西巡撫等亦諄切具請乘此冬令農隙之際觀覽民風詢察吏治簡閲禁旅整飭軍營實為要務用是輕裝約從諏吉西巡沿途一切供御皆內廷儲備纖毫不取辦於地方即偶有市易之物亦敕所司依時價給值不許錙銖抑勒所過大小官吏宜體朕愛民德意勿借詞供億私派閭閻如有悖旨科斂者察出即以軍法從事地方官不許與扈從人員指稱交戚私相餽遺違者並以軍法從事其扈從人員宜約束僕役勿使妄行如不遵法紀生事擾民一併從重治罪朕視民如子凡乘輿所至市廛隴畞宜各安生理米豆薪芻等物民間照常貿易不必禁止惟懷私挾詐衝突告訐者所告事不與準理仍嚴加治罪爾等即傳諭扈從官員人等並行各督撫令於經過府州縣城市村莊遍示曉諭俾咸悉朕懷特諭康熙四十二年十月初五日諭大學士馬齊西哈納張玉書吳琠陳廷敬學士常壽色德里滿丕趙士芳王九齡曹鑑倫古北口總兵官馬進良宣化府總兵官尚宣居官甚優人才亦壯健皆堪任提督之員但因南方暑熱不宜年老之人故未升授此職向有以提督銜管總兵官事之例著兵部察例以聞康熙四十二年十月初六日諭武殿試讀卷官武進士中原有人才朕意欲廣武會試中額以示鼓厲文官不許本籍為臨民之官武官須習知本地形勢方有益國家所最重者邊疆簡用武臣大有關係兵可百年不用不可一日廢兵今承平日久從前老於行間之戰將漸次雕零昔之海上投誠者習於水戰今亦不可多得矣初議取臺灣時都統喇哈逹以為斷不能取而施烺獨任之遂爾成功此後若有疏虞欲再取難矣海上行舟與江湖不同江湖之中雖能習於水戰用之海上必不相宜沿邊一帶邊將尚可得人此後水師切宜加意康熙四十二年十月初六日諭奉命撫苗尚書席爾逹等凡事同心協力則無不成不和則事無一成且行兵立營須用怯遇敵對壘須用勇又以機先為要儻臨事時疑慮不定必致有悮爾等當以果毅行之如苗人歸降止誅倡亂肆虐之人否則殲其抗拒不服者毋得玉石不分僇及無辜我滿兵以力勝者多此行須用計招撫委婉從事勿徒恃勇力至於立營必擇高阜處設立前朕在寧夏時審度時勢多方調度是以錢糧不耗費兵民亦無苦纍此皆在主將之巧於設施耳荆州副都統朱滿湖廣提督俞益謨俱矯健久於用兵可與伊等商酌而行提督李芳述張旺行間效力處亦多土司田舜年前於雲南用兵時輸誠協濟甚有裨益此去可奬厲用之苗人歸附後探其巢穴仍加謹愼隄防不可以彼歸順遂輕忽視之康熙四十二年十月初六日諭大學士馬齊張玉書吳琠陳廷敬朕觀河道已治總河張鵬翮及河工官員俱甚效力黃河一切工程朕知之最悉先是永定河用掃大有裨益是以朕諭張鵬翮黃河亦宜用掃張鵬翮回奏永定河勢小可以用掃黃河勢大難以用掃朕云姑試用之且所費錢糧無幾張鵬翮因而用掃河堤今果堅固矣至於洪澤湖水勢甚險堤岸復高往來舟楫一遭漂沒人命輒難救援朕曽諭河官張弼李梅於沿湖坡將長木樁斜釘於水中船雖漂沒人尚可以攀援獲命張弼李梅俱以朕諭為是俟於釘樁木後驗之康熙四十二年十月初七日諭工部覽河臣奏中河之水由楊家莊開河出口清水暢流敵黃舟楫通行高家堰六壩及各處工程俱保固平穩海口大通河底日深去路甚速淮水暢出黃水絶無倒灌之虞下河等處窪下之區俱得田禾豐收民居安晏所報秋汛水勢已悉所司知之康熙四十二年十月初八日諭户部山東省去歲農收各州縣豐歉不一今春朕南巡過山東時已分别被災輕重蠲免錢糧並遣效力人員星馳賑濟比及回鑾東省又告潦災朕宵旰軫懷悉心籌畫截留漕糧平價發糶兼出帑金遣八旗人員分道散賑仍於三路各遣大臣經理所在飢民庶得資以全活不致仳離失所猶念被災之後民力未紓宜更加德澤以宏休養康熙四十三年地丁銀米著通行蠲免有積年錢糧拖欠在民者亦著察明免徵行文該撫率所屬有司詳愼奉行務令人霑實惠有違旨私徵者察出定從重治罪仍令各州縣遍示曉諭俾窮鄉僻壤咸悉朕惓惓惠愛災黎至意又朕南巡回京原擬蠲浙省明歲錢糧兹因東省災傷先行蠲免其浙省錢糧俟至明歲另頒諭旨爾部即遵諭行特諭康熙四十二年十月初十日諭吏工二部黃淮兩河關係運道民生最為重要朕念治河國家大事夙夜厪懷未嘗少釋披圖咨衆雖已悉其源流顧水勢變遷不常必真知洞晰方可實見施行是以不憚勤勞屢親巡閲察其險易之形勢審其疏導之機宜緩急次第具有成畫至於簡命河臣倚任甚切凡所屬官吏皆聽選用大修工程費以數百萬計歲修帑金亦以數十萬計乃康熙三十七年黃淮並漲總河董安國不堅築堤堰疏通海口因而河身墊高溢出河岸以致倒灌洪澤湖口湖水從六壩旁泄由運河入下河淹沒民田於是罷董安國以于成龍代之朕隨授以治河方略詳加指示三十八年親往閲河駐蹕清口河干又面諭于成龍清口宜築挑水壩挑黃水使趨北岸方可免倒灌清水之患隨指定其地再三申命于成龍不遵朕旨致無成功及用張鵬翮為河道總督面諭云頃已發帑數百萬令大臣官員往高堰築堤閉六壩使逼洪澤湖水暢出清口而清口築挑水壩尤為緊要此壩不築則黃水頂衝斷不能使向北岸湖水必不得暢流張鵬翮遵奉朕言壩工築成黃溜遂直趨陶莊清水因以直出疊經伏秋大漲並無倒灌之事其浚張福口等引河築歸仁堤疏人字芒稻涇澗等河開大通口皆遵朕旨一一告竣今年春朕閲河至桃源見龍窩等處頂衝危險命增築挑水壩比壩工刻日訖事河勢遂平中河仲莊閘口以與清口相對特命改由楊家莊漕挽安流商民利濟曩時黃水泛漲或與岸平或漫溢四出今黃河深通河岸距水面丈餘縱遇大漲亦可無虞矣張鵬翮所修工程雖悉經朕裁斷而在河數載殫心宣力不辭艱瘁又清潔自持一應錢糧俱實用於河工無纖毫浮耗朕心深為嘉悅所屬大小河員並皆勉力赴工共襄河務亦屬可嘉自總河以下各官爾二部即詳加議敘具奏特諭康熙四十二年十月初十日諭大學士馬齊等朕聞山東巡撫布政使將賑濟飢民人員帶去銀兩俱收貯布政司庫內至今猶未散給若此則賑濟飢民之事不致遲誤乎此項銀兩俱係自京帶往並非伊等庫內之銀且前往人員皆三牛録會同保出賢能有身家之人伊等但當察所養飢民之優劣至於耗費儉用銀兩之處俱係派去人員之事與伊等何涉而將此銀收貯至今仍不散給必待飢民逃散之後始行賑濟耶此係何心朕不得知是又劉愷之計也况派去三百餘人員不作速分派地方俱令久住濟南勢必至於無所糊口爾等交部作速移咨詢問王國昌等康熙四十二年十月二十二日聖祖仁皇帝御製文第三集卷五
