body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十九目録古今體詩六十二首康熙四十四年元旦用唐太宗元日舊韻賦得光風遍寰宇覽皇清文頴內大學士陳廷敬作各體詩清雅醇厚非集字纍句之初學所能窺也故作五言近體一律以表風度賦得當戶翠峰稠閲河南巡出京乙酉仲春南巡船窗偶作船窗對月小飲擬田家春日過臨清閘南巡舟行會通河雜詠四首河南巡撫趙𢎞燮陛見求訓旨故作絶句一首賜之乙酉南巡途間觀麥少雨上巳日抵微山湖口閘春雨大沛因賦五言近體一首以志喜楊家莊新開中河得順風觀民居漫詠二首駐蹕淮安一宿即過幸天寧寺朕每至南方覽景物雅趣川澤秀麗者靡不賞玩移時也雖身居九五樂佳山水之情與衆何異但不至曠日持久有纍居民耳所以一目即過者亦恐後人錯借口實而不知所以然也至於茱萸灣之行宮乃係鹽商百姓感恩之誠而建起雖不與地方官吏但工價不下數千嘗覽漢書文帝惜露臺百金後世稱之况為三宿所費十倍於此乎故作述懷近體一首以自警又粘之壁間以示維揚之衆覽奏章少倦甲夜得寢又被清磬驚醒復睡夢中作成起時已忘少半故前後增補以成四韻賜紀蔭老和尚邇來未臨法書久不作字手澀難於運管字不甚佳長江靜浪歌自過江至常州府雜詠四首至閶門虎丘一詠自蘇州行至昏刻未到崑山河傍有竹林數畞晚風可佳故駐蹕於此賦得徑節疏枝帶晚風之句雨中登玉峰船泊三江口泛黃浦江松江進鮮鰣魚有懷駐蹕杭州府西湖遇雨西湖戲作幸雲栖二首無錫惠山之作回舟至常州府是夜甘霖大沛自鎮江之江寧駐蹕江寧雨後幸雨花臺織造處閲機房自龍潭用戰艦頃刻至金山見龍行并序髙旻寺塔頂放光回鑾中河三首千葉蓮池夜聞雨滴之聲詠畫梨花乙酉秋日山莊偶成一路清廉圖賜吏部尚書宋犖豫告還里大病少愈見春至述懷春日有所思二首五臺有懷大學士張玉書挽詩孟秋涼風初至賦得秋水共長天一色新秋
