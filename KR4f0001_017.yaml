body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷六敕諭諭吏兵二部撫遠大將軍都統大學士圖海器識老成才猷練達贊襄機務宣力纍朝以文武之長才兼忠愛之至性勞績茂著倚毗良殷前察哈爾布爾尼背恩反叛命圖海為副將軍統兵征剿運籌決勝克振軍威未及一月捷功立奏逆賊殱滅疆圉敉寧近以平涼等處阻兵日久屢命剿撫罔有成效特簡圗海為大將軍總統大兵節制各路果爾謀略淵深調度得宜軍鋒所至一戰克捷更能體朕好生之心宣布恩威開誠招撫遂使平涼慶陽固原等處文武官員兵民人等傾心向化悔罪歸誠生民免於塗炭地方得以安全數日之間關隴悉皆底定皆由籌畫周詳布置神速剿撫並用克建膚功圗海以心膂大臣膺秉鉞重寄實心為國克副倚任朕心深為嘉恱於軍功議敘外應從優加恩以示朕眷注忠勤酬答勳庸至意著議政王貝勒大臣會同議奏特諭康熙十五年八月二十日諭禮部帝王克謹天戒凡有埀象皆關治理故設立專官職司占候所係甚重一切祥異理應詳加推測不時具奏今欽天監衙門止於尋常節氣尚有觀驗至今嵗三月初間霜霧及以前星辰凌犯等項應行占奏者並未奏聞皆由該監官員蒙昧疏忽有負職掌爾部即行察議具奏以後欽天監所奏占候本章內閣照例票擬批發特諭康熙十六年三月十三日諭吏戶兵三部自逆賊吳三桂煽亂以來各用兵地方文武官員或矢志固守勢窮莫支盡節封疆或身陷賊中堅貞不屈橫被慘害或從容就義全家殉難視死如歸此皆為國捐軀克全忠節深為可憫其有骸骨未能歸葬妻子尚寄逺方孤苦無依更堪軫惻宜加恩恤以慰忠魂著各該督撫察明凡殉難文武大小官員骸骨妻子俱準動正項錢糧資送歸里以昭朕優恤忠節至意特諭康熙十六年三月二十七日諭禮部朕恭奉聖祖母太皇太后慈諭册立妃公遏必隆之女為皇后爾部即選擇吉期開具儀注來奏特諭康熙十六年五月十一日諭管侍衛內大臣海澄公黃芳世舉家殉莭被慘至極芳世坐次曾入內大臣班中已後凡有恩賞皆與內大臣一體頒賜坐次仍在舊列伊或有奏事並請安人來俱照外省漢藩等例著內班侍衛代為陳奏康熙十六年五月十六日諭海澄公黃芳世卿父子功烈素著復全家殉難每念及此朕心罔不傷悼况卿由粵東進剿忽遭廣省兵變孤身涉險而出可見忠貞不貮顚沛不改其守今仍襲海澄公鎮守福建水師提督總兵官卿愈加訓練鼓舞將士以靖海氛使地方秋毫無犯百姓安堵方為不負封疆重寄特諭康熙十六年五月十八日諭日講官起居注侍讀學士牛鈕爾考中進士正宜黽勉學問之時抑且年富力強自當大有進益誦讀之功固不可廢躬行實踐尤為至要務時勤職業也康熙十六年五月二十日諭禮部朕恭奉聖祖母太皇太后慈諭稽古帝王宮闈之制必備妃嬪以襄內政今册封佟氏為貴妃李氏為安嬪王佳氏為敬嬪董氏為端嬪馬佳氏為榮嬪納喇氏為惠嬪郭羅洛氏為宜嬪黑舍里氏為僖嬪爾部即選擇吉期開列儀注具奏特諭康熙十六年五月二十四日諭翰林院掌院學士喇沙里陳廷敬侍讀學士葉方藹侍講學士張英卿等進講啓導一一悉備皆內聖外王修齊治平之道朕雖不敏罔不孜孜詢之每講之時必專意以聽但學問無窮不在徒言要惟當躬行實踐方有益於所學卿等仍愈加直言毋有隱諱以助朕好學進修之意康熙十六年五月二十八日諭刑部邇者農事方殷天氣亢旱朕念切民依夙夜憂惕或刑獄淹禁中有寃抑致干天和亦未可知兹特遣巴泰明珠孔國岱項景襄會同三法司將已結重案逐一詳加審理凡有罪可矜疑者即與察明事由開列具奏務使情法允協有枉必申以副朕省刑恤民至意特諭康熙十六年六月初二日諭新委西勒圖部落首領喇嘛墨爾根噶布褚此廟係太宗皇帝建立令滿習禮胡圖克突喇嘛居住嗣令諾門汗喇嘛居住嗣令爾叔西勒圖綽爾濟喇嘛居住後因徒衆揭告革退屢經更換喇嘛管理俱貪蒙古市利止以蓄飬蕃滋家計殷厚為念求其能明梵教之理勉力課誦者甚少積習漸深至蒙古額木齊之輩學騎射鎗法當察哈爾叛時依附惡黨同抗大兵後叛逆盡除仍念爾叔西勒圖綽爾濟原係大喇嘛可以約束復令管理今已物故以爾為滿習禮胡圖克突之親選委管理部落爾到彼即將喇嘛陋習盡行釐革務遵本業克守清規絶去欺妄梵教佛法咸宜闡明若踵行前弊則上負太宗皇帝建剎之意下實有愧於諸名喇嘛也欽哉康熙十六年六月十四日諭平南親王奄達尚之信齎奏參將羅思漢爾王素懷忠藎思報效國家朕已知之舉廣東全省歸誠民免湯火之患深為可嘉據今時勢剿滅吳三桂甚為緊要大兵進取務貴神速吳逆近在湘潭其意蓋以大兵必從衡永廣東進攻故據此為備今廣西若能反正爾王即宜率兵三路進剿滿洲大兵亦令各路遄發前此吳三桂率領偽將軍十八人賊兵十萬屯聚長沙挑濠立樁僅可支持旦夕若大兵數路並進吳逆斷無如許偽將賊兵隨處備設濠樁以與大兵相抗其滅亡可翹足而待矣爾到彼即傳朕諭康熙十六年六月十四日諭遣往將軍莽吉圖軍前侍講學士顧八代將軍莽吉圖於指授之處克奏成功深為可嘉宜益加勉勵以副朕委任之意用兵之道以神速為上從前稽遲以致嶽州漳州廣東全省未收捷效伊所親見此後凡有徵調俱宜剋期迅發爾顧八代以內閣職掌前往檔案册籍須逐一詳明無預外事以盡乃職康熙十六年六月二十七日諭平南親王奄達尚之信齎奏回粵張永祥近來逆賊俱偏在廣西一邊奄達宜親率將士進剿以圖功效爾張永祥既授總兵官俟有專汛應勉勵職守安戢兵民整飭地方剿除賊寇可也康熙十六年七月十三日諭禮部世祖章皇帝乳母朴氏保育先皇克昭敬慎朕躬幼時殫心調護夙夜殷勤撫視周詳情實等於顧復提攜備至時罔怠於寒暄襁抱曲體乎性情勤渠彌切於啼笑恭謹抒匪懈之忱淑惠盡慈愛之義每懷疇昔時厪於𠂻封典宜加用彰隆眷今封為奉聖夫人頂帽服色照公夫人品級爾部即遵諭行特諭康熙十六年七月二十五日諭吏禮二部自古帝王統御寰區首在敦崇孝治既已追尊母后揚扢慈徽尤必推恩外戚優加封爵展孝思於靡盡昭發祥之有源甚盛典也緬惟慈和皇太后奉事太皇太后克盡誠孝佐助皇考夙著敬勤誕育朕躬纘承鴻業每懷顧復深慈不勝本源永慕恩推所自允符彛章原任都統精竒尼哈番佟圖賴慈和皇太后之父也勳舊世裔宣力纍朝厚德鍾祥篤生聖母念劬勞之罔報宜恩禮之隆施特晉崇階以昭典制佟圖賴著將精竒尼哈番加封為一等公妻焦氏封為公夫人給與誥命世襲罔替爾部即遵諭行特諭康熙十六年七月二十五日諭吏部內閣機密重地事務殷繁需人贊理尚書勒德洪明珠著補授內閣大學士應兼職銜著議奏爾部即遵諭行特諭康熙十六年七月二十九日諭大學士明珠卿才能素著久任股肱特簡絲綸重地贊理機務因卿夙稽典史曉鬯古今責難陳善之理文獻通考等書皆致君澤民至道所係特以賜卿退食之暇可時觀閲以副朕虛懷求治之意特諭康熙十六年八月初一日諭大學士巴泰卿以年邁請休情詞懇切準以原官致仕以遂其志念卿效力有年清端勤慎今將所御衣冠帶靴特賜與卿用旌老臣以昭朕始終眷戀至意特諭康熙十六年八月十四日諭廣東提督王可臣卿久任巖疆聲名素著故特簡禁近兹因廣東要地授為提督爾至地方撫戢兵民剿滅賊寇奠安疆圉以副朕委任之意康熙十六年八月十五日諭大學士索額圖卿首膺機密之重素著輔弼之猷讜言屢進每得其效竭力無餘恆見其勞誠為股肱心膂兼之藴蓄淵深博聞廣見想翰墨餘事博物品類必了然心目朕於萬幾之暇貯有試筆墨字五幅珍玩玉器二具特賜與卿瞻觀之時即知隆眷之意特諭康熙十六年八月十八日諭吏部等大小各衙門向來各衙門事件關係重大者雖有定限赴科道稽察但事有易結者即宜速結必俟限滿方行題覆多致壅滯更有各項呈狀不係注銷者任意耽延借端拘提人犯數月不為審結無辜牽纍殊堪憫惻以後題覆本章俱著速行料理不必盡拘定限至於審理事件亦速為完結著照注銷欽件例定限每月造册赴都察院科道稽察具奏爾等各宜力圖振作體恤民隱以副朕孜孜求治之意特諭康熙十六年八月二十三日諭河南巡撫董國興爾前任巡撫雖無善狀未有過端因病求罷遂爾解任今復簡爾巡撫河南宜以愛民為要徵收賦稅慎勿煩擾百姓委曲勸輸以資兵餉務期竭盡心力以副特用之意康熙十六年九月初二日諭遣往廣西巡撫傅宏烈軍前筆帖式噶爾西拖洛傅宏烈自歸正以來盡力報效綏定地方朕深嘉焉傳諭知之爾等亦宜殫心勉勵凡伊所司檔案之外他事無得干預康熙十六年九月初八日諭大學士署禮部索額圖所賜外藩蒙古廩食數原充足所飼馬匹亦皆肥壯粟肉草豆未曽核減近聞供給不足馬匹瘦羸此皆司事並看餵馬匹人員作弊侵剋所致此後著禮部堂官親身嚴察康熙十六年九月初九日諭工部尚書馬喇侍郎溫代爾等俱係特簡工部近見工部事務弊端甚多各宜勉盡乃職釐剔積弊以副朕委任之意康熙十六年十一月初二日聖祖仁皇帝御製文集卷六
