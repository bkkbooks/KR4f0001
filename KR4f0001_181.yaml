body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十五古今體詩五十九首初秋晚雨後觀儀器從容更覺靜悠悠片片荷香送小舟日落開窗雲外景風清拂户雨中秋寬懷自有數行字樂志須操一算籌向日最喜天文算法萬物無窮最易曉其間諸象列天球初秋詠竹森萃青青繞碧塘霜姿靄靄動幽香寒風不變終身節緑葉紛然映晚涼間坐詠竹門外千竿細竹窗前萬朵鮮花秋寒衆色皆變惟爾霜姿可嘉詠金蓮花迢遞從沙漠孤根待品題清香拂檻入正色與心齊磊落安山北參差鷲嶺西炎風曽避暑髙潔少人躋祝巴林淑慧大長公主詩并序公主秀育天潢祥鍾坤順為皇考同氣之親淑容懿範儼若慈闈履貴盛而沖和居顯榮而祗慎耆年令德宗黨式欽惠澤淪洽於逺人徽柔著聞於中外數十年來篤愛朕躬禮周意摯故常迎留京邸晨夕相依用展敦睦之義惟祝遐齡康豫馴致期頤俾得色笑恆瞻德音長奉藉以慰朕追慕慈寧之永念豈不休歟爰賦五言以介睂夀長祝南山夀願言北斗詩祥開應帝女釐降自金枝沙漠黎心服坤貞天下知年年慶人瑞歲歲賞瑶池戲題自鳴鐘晝夜循環勝刻漏綢繆宛轉報時全隂晴不改衷腸性萬里遙來二百年此器至中國二百年矣夏日舟行靈液開仙仗清暉映碧波黃鸝鳴茂樹歸雁戲青莎水曲蒲帆轉岸回錦纜過三春曽布德月下聽謳歌夏日幸潞河雜詩三首水色連天四望收輕舠桂楫放中流東南惟有長江勝一片雲帆萬里逰其二曽記當年幸潞河翠旌熠爚映微波臨流士女爭瞻望不禁扁舟唱棹歌其三野雲漸起罩斜陽暮泊平沙覺水涼初更未寢吟詩句靜見爐中焚異香親閲運河堤舊歲隂霖勝憂勤億兆難析津通鵲渚形勢接桑乾物理常求治朝堂亦自安運堤久未整岸堰最宜完夾道黎民悅沿河老幼歡雲容隨豹尾暑氣擁仙鑾九醖賢人酒三漿龍鳳團匡牀搜典誥流水奏幽蘭棹響逼前駕漁歌進小灘去回四百里舟次五雲端舟泊潞河萬里帆檣宛轉來炎天繫纜泊河隈長江曽著操舟説短夢頻思作楫才隔水翛翛秋麥起繞林處處野花開從容披閲依書幌靜爾忘言憶九垓千葉蓮禁苑初秋玉殿涼緑荷經瀨遞清商千英水面重重豔幾度風前柄柄香宮女移船搖紺葉近臣載筆詠紅芳定心坐對西山靜不管穠纖映夕陽題耕織圖耕第一圖浸種暄和節候肇農功自此勤勞處處同早辨東田穜稑種褰裳涉水浸筠籠第二圖耕土膏初動正春晴野老支笻早課耕辛苦田家惟穡事隴邉時聽叱牛聲第三圖耙耨每當旰食念民依南畝三時願不違已見深耕還易耨緑蓑青笠雨霏霏第四圖耖東阡西陌水潺湲扶耖泥塗未得間為念饔飧由力作敢辭竭蹶向田間第五圖碌碡老農力穡慮偏周早夜扶犂未肯休更駕烏犍施碌碡好教春水滿平疇第六圖布秧農家布種避春寒甲坼初萌最可觀自昔虞書傳播穀民間莫作等間看第七圖初秧一年農事在春深無限田家望歲心最愛清和天氣好緑疇千頃露秧針第八圖淤蔭從來土沃藉農勤豐歉皆由用力分剃草灑灰滋地利心期千畝稼如雲第九圖拔秧青蔥刺水滿平川移植西疇更勃然節序驚心芒種迫分秧須及夏初天第十圖插秧千畦水澤正瀰瀰競插新秧恐後時亞旅同心欣力作月明歸去莫嫌遲第十一圖一耘豐苖翼翼出清波荑稗叢生可若何非種自應芟剃盡莫教稂莠敗嘉禾第十二圖二耘曽為耘苖結隊行更憂宿草去還生隴間餽饁頻來往勞勩田家婦子情第十三圖三耘䆉稏盈畦日正長復勤穮蓘下方塘堪憐曝背炎蒸下惟冀青疇發紫芒第十四圖灌溉塍田六月水泉微引溜通渠迅若飛轉盡桔橰筋力瘁斜陽西下未言歸第十五圖收刈滿目黃雲曉露晞腰鐮穫稻喜晴暉兒童處處收遺穗村舍家家荷擔歸第十六圖登場年穀豐穰萬寶成築場納稼積如京回思望杏瞻蒲日多少辛勤感倍生第十七圖持穗南畞秋來慶阜成瞿瞿未釋老農情霜天曉起呼鄰里遍聽村村打稻聲第十八圖舂碓秋林茅屋晚風吹杵臼相依近短籬比舍舂聲如和答家家篝火夜深時第十九圖籭謾言嘉榖可登盤粳秕還憂欲去難粒粒皆從辛苦得農家真作雨珠看第二十圖簸揚作苦三時用力深簸揚偏愛近風林須知白粲流匙滑費盡農夫百種心第二十一圖礱經營阡陌苦胼胝艱食由來念阻飢且喜稼成登石磑從兹鼓腹樂雍熙第二十二圖入倉倉箱頓滿各欣然補葺牛牢雨雪天盼到蓋藏休暇日從前拮據已經年第二十三圖祭神東疇舉趾祝年豐喜見盈寧百室同粒我蒸民遺澤遠吹豳擊鼓報難窮織第一圖浴蠶豳風曽著授衣篇蠶事初興穀雨天更考公桑傳禮制先宜浴種向晴川第二圖二眠柔桑初翦緑參差陌上歸來日正遲村舍家家簾幕靜春蠶新長再眠時第三圖三眠紅女勤劬日載陽鳴鳩拂羽恰條桑只因三臥蠶將老翦燭頻看夜未央第四圖大起春深處處掩茅堂滿架吳蠶婦子忙料得今年收繭倍冰絲雪縷可盈筐第五圖捉績連宵食葉正紛紛風雨聲喧隔户聞喜見新蠶瑩似玉燈前檢點最辛勤第六圖分箔愛逢晴日映疏簾新緑如雲葉漸添天氣晴和蠶事廣移筐分箔遍茅簷第七圖採桑桑田雨足葉蕃滋恰是春蠶大起時負筥攜筐紛笑語戴鵀飛上最髙枝第八圖上簇頻執纖筐不厭疲久忘膏沐與調飢今朝士女歡顔色看我冰蠶作繭時第九圖炙箔蠶性由來苦畏寒深垂簾幕夜將闌爐頭更爇松明火老媪殷勤日探看第十圖下簇自昔蠶繅重婦功曽聞獻繭在深宮披圖喜見纍纍滿茅屋清光積雪同第十一圖擇繭冰繭方堪作素紈重綿亦藉禦深寒就中自有因材法揀取筐間次第觀第十二圖窖繭一年蠶事已成功歷數從前屬女紅聞説及時還窖繭荷鋤又向緑隂中第十三圖練絲炊煙處處繞柴籬翠釜香生煮繭時無限經綸從此出盆頭喜色動雙睂第十四圖蠶蛾蛾兒布子如金粟水際分飛任所之莫令繭絲遺利盡來年留作授衣資第十五圖祀謝勞勞拜簇祭神桑喜得絲成願已償自是西陵功德盛萬年衣被澤無疆第十六圖緯緑隂掩映野人家每到蠶時靜不譁一自夏初成繭後籬邉新聽響繅車第十七圖織從來蠶績女功多當念勤勞惜綺羅織婦絲絲經手作夜寒猶自未停梭第十八圖絡緯無衣卒歲早關情寒氣催人蟋蟀聲茅屋疏籬秋夜永短檠相對絡絲成第十九圖經織紝精勤有季蘭牽絲分理製羅紈鳴機來往桑隂裏已作吳綃匹練看第二十圖染色凝膏比潔絡新絲傳得仙方色陸離一代文明資賁飾須教五采備彰施第二十一圖攀花巧樣爭傳濯錦紋堪憐織女最殷勤雲章霞綵娛人意自著尋常縞布裙第二十二圖翦帛手把齊紈冰雪清秋衣欲製重含情逡巡莫謾施刀尺萬縷千絲織得成第二十三圖成衣已成束帛又縫紉始得衣裳可庇身自昔宮庭多浣濯總憐蠶織重勞人聖祖仁皇帝御製文第二集卷四十五
