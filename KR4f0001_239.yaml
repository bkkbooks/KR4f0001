body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷二十一序資治通鑑綱目全書序朕惟自古帝王言動必記而史事以興顧周禮外史所掌卷帙寖繁即紀傳亦異千百年來微言大義昭揭天壤必以尼山筆削為斷所從來尚矣粵自龍門而降纍朝國乘體製略同涑水司馬氏易分類為合編蓋猶左氏法也紫陽朱子特起而振舉之綱以提要目以備詳嵗時列於上而天統明章程繫於下而人紀立增損精切豫奪謹嚴庶幾春秋大居正之宗指與雖其間事例櫽括稍有脫誤大都門人一時采輯之過實非晦菴夲意也自時厥後有前編有外紀有大紀續編以及考證集覽發明質實之類諸家論著不一而足要皆商確折𠂻互相參訂明儒陳仁錫裒集而剞劂之不可謂非先哲之功臣也朕幾務之暇留神披閲博稽詳考纖悉靡遺取義必抉其精徴辭必搜其奧析疑正陋釐異闡幽務期法戒昭彰質文融貫前後所著論斷凡百有餘首兹允諸臣請並以付梓頒布宇內俾士子流傳誦習開卷瞭然不特天人理欲之微古今治忽之故一一臚如指掌即子朱子祖述宣尼維持世教之苦𠂻並可潛孚默契於數千載之下是則朕敦崇古學作新蒸民之至意也爰叙述以冠篇端用昭示於無窮焉佩文韻府序朕萬幾在御日昃宵分未遑自逸時當燕閒不輟問學羣經子史誦其文而晰其義矣以至百家之書凡可以裨世教勵民風者修眀補正罔使闕遺嘗謂韻府羣玉五車韻瑞諸書事繫於字字統於韻稽古者近而取之約而能博是書之作誠不為無所見也然其為書簡而不詳略而不備且引據多誤朕每致意焉欲博稽衆籍著為全書爰於康熙四十三年夏六月朕與內直翰林諸臣親加考訂證其訛舛增其脫漏或有某經某史所載某字某事未備者朕復時時面諭一一增録漸次成帙猶以故實或未極博於十月復命閣部大臣更加搜采以裒益之既有原夲增夲又有內增外增將付剞劂矣名曰佩文韻府隨於十二月開局武英殿集翰林諸臣合併詳勘逐日進覽旋授梓人於五十年十月全書告成共一百零六卷一萬八千餘頁囊括古今網羅巨細韻學之盛未有過於此書者也書成諸臣請序朕念自初至今經八年矣歷寒暑之久積嵗月之勤朕於此書政事之暇未嘗惜一日之勞也朕又嘗諭諸臣從來著一大書非數十年之功不能成今數年以來所成大部書凡十有餘種若非合衆人之力豈能刻期告竣故凡先後預事諸臣皆命列名其中兹序佩文韻府因備記編撰之始末遂及修集諸書之大指以見成書之不易如此淵鑑類函序朕幾務餘暇博涉藝林每覽一書必盡其全帙沉潛往復既得其始終條理精義之所存而文句英華亦常讀之矣嘗謂古人政事文章雖出於二然文章以言理政事則理之發邇而見遠者也豈僅以其區區文句之間而可以自命為學術乎自六朝乃有類書而尤盛於唐此豈非求之文句之間者哉雖然理之所寓於斯萃焉弗可廢也昔者孔子之繫易也曰方以類聚又曰夲乎天者親上夲乎地者親下則各從其類也於諸卦則曰其稱名也小其取類也大蓋以天下古今事物之理畢具於易而易之為書因理象物因物徴辭以斷天下之疑而成天下之務者各從其類以明之然則類書之作其亦不違於聖人立言之意歟書之最著者藝文類聚北堂書鈔初學記白帖杜氏通典宋明以來撰者寖廣若博而不繁簡而能核者抑亦鮮矣獨俞安期唐類函頗稱詳括大抵祖述歐陽詢之類聚稍刪存書鈔初學記白帖通典而附益之安期明人也而曰唐類函者以其皆唐輯也既缺宋以來書而唐以前亦有脫漏者爰命儒臣逖稽旁搜泝洄往籍網羅近代增其所無詳其所略參伍錯綜以摛其異探賾索隱以約其同要之不離乎以類相從而類始備焉書成計四百五十卷夫自有類書迄於今千有餘年而集其大成可不謂斯文之少補乎學者或未能盡讀天下之書觀於此而得其大凡因以求盡其始終條理精義之所存其於格物致知之功修辭立誠之事為益匪淺鮮矣歷代賦彚序賦者六義之一也風雅頌興賦比六者而賦居興比之中蓋其敷陳事理抒寫物情興比不得並焉故賦之於詩功尤為獨多由是以來興比不能單行而賦遂繼詩之後卓然自見於世故曰賦者古詩之流也班固又謂登髙能賦可以為大夫言感物造端材智深美可以與國政事故可以為列大夫也是則賦之於詩具其一體及其閎肆漫衍與詩並行而其事可通於用人書曰敷奏以言夫敷奏者有近乎賦之義使堯舜而在今日亦所不廢則豈非文章之可貴者哉朕嘗於幾務之暇博觀典籍見古者諸侯卿大夫交接鄰國時稱詩以喻志不必其所自作皆謂之賦如晉公子重耳賦六月魯文公賦菁菁者莪鄭穆公賦鴻雁魯穆叔賦祁父之類皆取古詩歌之以喻其志即詠吟之遺音得心意之所存使聞之者足以感發興起而因以明其如相告語之情猶之敷布其義而直陳之故謂之賦也春秋之後聘問詠歌不行於列國於是羈臣志士自言其情而賦乃作焉其始創自荀况宦遊於楚作為五賦楚臣屈原乃作離騷後人尊之為經而班固以為屈原作賦以諷諭則巳名其為賦矣其後宋玉唐勒皆競為之漢興賈誼枚乘司馬相如揚雄張衡之流製作尤盛三國兩晉以逮六朝變而為排至於唐宋變而為律又變而為文而唐宋則用以取士其時名臣偉人往往多出其中逮及元而始不列於科目朕以其不可盡廢也間嘗以是求天下之才故命詞臣考稽古昔搜采缺逸都為一集親加鑒定令校刋焉為叙其源流興罷之故以示天下使凡為學者知朕意云康熙四十五年三月二十日清涼山新志序朕惟清涼山古稱文殊大士演教之區也兹山聳峙於鴈門雲中之表接恆嶽而俯滹沱橫臨朔塞藩屏京畿其地風徑而高寒層氷結於隂巖積雪留於炎夏故名清涼然地雖寒而嘉木芳草䝉茸山谷稱靈異焉五峰竦立上矗霄漢日月之所回環煙霞之所虧蔽蒼然深秀其為神臯奧區蓋自昔而已然矣是以自漢迄今歷代皆有崇建古剎精藍遍滿巖岫宇內稱靈山佛土最著者有三峨􅖭普陀而五臺為尤盛焉我世祖章皇帝上為慈闈祝釐下為蒼生錫福賜金遣使屢沛恩施朕數經駐蹕兹山為兩宮祈康寧福祉因而登五峰陟臺懷各為文勒石以紀之琪樹靈葩形於萹詠蓋嘗念佛教以清淨慈惠為夲以戒定智慧為宗亦有裨於勸善逺慝兹山又密邇塞垣逺離塵俗當為清修者之所棲泊故於此每惓惓焉山之有志所以紀形勝述建置載藝文俾後之人有所稽考往蹟舊聞不致湮沒兹編詳簡適中不蕪不支清凉勝境可撫卷而得其梗概也因叙於簡端康熙四十年五月初三日四朝詩選序生民之始禀二儀之精含五常之性而其理具於一心人心之靈日出而不窮詩大序謂在心為志發言為詩其闡明虞廷言志之意而歸夲於心者其意深矣蓋時運推移質文屢變其言之所發雖殊而心之所存無異則詩之為道安可謂古今人不相及哉觀於宋金元明之詩而其義尤著焉世之論詩者謂唐以詩賦取士故唐之詩為獨盛夫唐之詩誠盛矣若夫宋之取士始以詩賦熙寧専主經義而罷詩賦元祐初復詩賦至紹聖而又羅之其後又復與經義並行金大略如宋制元自仁宗罷詩而存賦明則詩賦皆罷之士於其時以其餘力兼習有韻之言専之則易美兼之則難工而其至者亦往往嫓北宋而追三唐豈非人心之靈日出而不窮者歟此又可見古今人不甚相逺也朕夙興夜寐永圖治安念養士育才國家盛典考言詢事曩代良規亦既試之制藝使通經術兼以論表判䇿俾達古今而於科目之外時以詩賦取人每當省方觀民之㑹士之所進詩賦古文止輦受觀停舟延問親試而拔其尤者亦多矣蓋舉斯世而措之禮陶樂淑之中被以溫柔敦厚之教故所以奬勸之者靡弗至焉近得全唐詩已命儒臣校訂刋布海內由唐以來千有餘年之久流傳自昔未見之書亦可謂斯文之厚幸矣遂又命博採宋金元明之詩每代分體各編自名篇巨集以及斷簡殘章罔有闕遺稍擇而録之付之剞劂用以標詩人之極致擴後進之見聞譬猶六代遞奏八音之律無爽九流並遡一致之理同歸然則唐以後之詩又自今而傳矣夫詩之日逺而日新如此而皆夲於人之一心孔子云詩三百一言以蔽之曰思無邪子之言詩法也即心法也子夏味絢素之章子貢悟琢磨之句二子者一以文學列於四科一以多識得聞一貫朕於是有以見夫天之所以畀於人者此心此理隨在流通願學者謹其所存而審其所發將以上達夫大夲大原而充廣乎萬事萬物豈惟詩之為道也哉聖祖仁皇帝御製文第三集卷二十一
