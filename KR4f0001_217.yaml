body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷十敕諭諭兵部陜西邊方武職全賴俸祿資給所需棉甲若令捐造恐致生扣剋兵餉之弊著陜西總督巡撫甘肅巡撫照數作速捐造交該提督散給完日具奏康熙四十五年四月十七日諭雲南巡撫郭瑮雲南係邊地因爾賢能故特加簡用爾往當小心辦事雲南米穀豐足地方太平爾但一意撫恤兵民不可越外生事為巡撫者必如齊世武之操守清正乃善既為督撫豈憂衣食缺乏前任督撫一味欺蔽故身名俱敗爾當體朕意實心奉行康熙四十五年四月二十四日諭大學士馬齊席哈納張玉書陳廷敬等總督石文晟前劾土司田舜年何不同後摺一併具奏乃致兩番參劾又摺內不言兩巡撫專請交提督審問此必有故從前吳三桂自水西烏蒙土司地方進兵取雲南因知其地産銀遂於康熙初年奏請進剿水西後得其地分為四府我軍此番亦大有損傷今此事雖小斷不可生事爾等將前後奏摺及土司呈詞一併抄出發與湖南巡撫趙申喬湖廣提督俞益謨令不必會同商議可各出已見作速具奏康熙四十五年四月二十九日諭內閣去嵗視南河時曽於衆人前言髙堰堤工不堅尚宜增築張鵬翮以河工已完斷然無害朕謂爾雖言工完朕不能信及後堤工潰決幸是唐埂六堤上流若在下流如何堵禦康熙七年九年二十二年七里溝清水潭龍窩等處沖決之時其水甚大去年水不甚大然而沖決者河臣自以為河工已完玩忽之所致也康熙四十五年五月初一日諭刑部李應貴係大光棍其主伊洛爾圖責打至死雖例當治罪而其情事稍有不同著免其主罪使惡棍聞而知懼康熙四十五年五月初一日諭內閣直隸巡撫趙𢎞變前為河間數州縣積欠錢糧請分年帶徵朕已批發令其具題昨日欲下旨查直隸厯年拖欠錢糧總數偶爾遺忘可著户部察明速奏有民困難徵者即酌量豁免康熙四十五年五月初九日諭户部朕宵旰圖維勤求民隱每欲敷蠲貸之恩以為閭閻留有餘之力直隸山東地方四十二年偶遇災沴因特免山東四十三四兩年額賦並四十一年以前積欠錢糧直隸則順天河間兩府四十四年額賦亦俱豁免今雖屢年收穫民氣漸舒而所有宿逋尚應輸納朕念黎元方有起色辦賦猶艱一時新舊並徴勢難兼應宜更加寬恤以𢎞休養直隸自康熙四十一年至四十三年各府屬未完民欠銀八萬二千七百兩有竒糧五千九百石有竒山東省康熙四十二年各府屬未完民欠銀一百六十九萬一千七百兩有竒糧五千九百石有竒或見在徵取或分年帶徵俱著通行蠲免俾小民悉除逋負之纍儻應徵舊欠有見完納在官者即準抵本年正賦諭旨到日各該撫速行所屬有司遍示曉喻有不肖官吏朦溷徵收不與開除明白者該撫即時參劾嚴加治罪爾部即遵諭行特諭康熙四十五年五月十七日諭修國史諸臣開國功臣作傳當因其事迹先後以定次第若視功績分次第或有本人功績少而子孫功績多者反置子孫於前列可乎今應分别太祖太宗世祖三朝功臣以何人居首請旨再定至逮事三朝功臣各於本人傳內通行開載事迹其子孫有立功者附載於下俟作傳畢可録出分給其子孫各一通令藏於家康熙四十五年六月初一日諭户工二部户部工部凡咨取錢糧事俱不奏聞所以二三十萬銀兩不過以一咨文取之而事已畢嗣後著户工二部將不啓奏用咨文動支大小款項錢糧於月終明白彚奏則凡事知所警畏而錢糧大可節省矣康熙四十五年六月十九日諭內閣該撫前以建鐵索橋奏請朕初慮成功之難今工已報完於兵民實大有裨益爾等亦知鐵索橋之所繇來乎往時達賴喇嘛西路地方所建鐵索橋甚多此安樂地方亦照彼式建造然與雲南鐵索橋不同雲南地方傍有石崖釘鐵索建橋極其堅固此處以石為柱貫鐵索為橋尚恐久後未必能堅固也康熙四十五年六月二十八日諭內閣朕自親政以來斷不許人懷挾私讐互相陷害是以三四十年間無大臣互訐之事此一端朕心頗以為善凡誣陷人及攻城屠戮人者縱使其身幸免於禍子孫斷乎不昌近觀貪官受報亦復如是從前督撫如屈盡美等皆以貪故其子孫極貧困不能自存或有學道考試不公而所生之子凡書讀過即忘並有瘖啞者殊為可畏聞武會試亦未盡公前次考試時朕有所素知之人亦與考朕恐人知之則必取中故不以告人凡人功名所繫但欲其公取耳朕尚以孤寒抱屈為念試官何不一計及於此乎康熙四十五年七月初二日諭刑部馬羣頭目及放馬人等若有凌虐居民莊頭及所行凶惡事發定行處死該管大臣官員一併嚴處決不寬貸屢有明旨今人命事發將該管大臣官員並置不議而事內關涉之人所議俱輕著察明原旨再嚴加議處以聞康熙四十五年七月初九日諭刑部部議歐打蘇儀鳳一案稱與太監張玉無干朕平昔恐太監生事約束甚嚴這事既與太監無干張玉又何故同去此皆因該管首領等不行嚴管以致張玉得乘間而出張玉及該管首領等再一併嚴加議處具奏康熙四十五年八月初二日諭户部陜西捐納一事厯年甚久今復將三十一萬餘石未完溢米欲行頂捐具題或前捐案內欵項未清欲倚藉此事完結或地方官員更欲借端希圖取利有此情弊亦未可知若在京城頂捐事易完結且不煩擾九卿詹事科道可再會同議奏康熙四十五年八月十一日諭刑部凡盜犯無自認口供方待夥盜質證陳子為一案既稱厯審夥劫分贓與原招相符又稱夥盜已決無證應擬斬候質是否與律例符合著察明確議以聞康熙四十五年八月十一日諭刑部朱拉哈原非廣東本籍之人又無公務差遣以旗下人擅離京城至廣東輒因私事打死百總情罪可惡擬以緩決非是著改為情真大凡執法之人不可少偏若將當正法之人寬宥則惡人何所懲戒乎康熙四十五年十月初一日諭內閣敦拜向為司官朕洊次擢用至尚書並無效力勤勞之處凡事不留心詳察聲名亦不佳廷議係國家大事前曾有事會議敦拜全不諳事理恣意妄言彼時即當黜退今既以年老乞休著解吏部尚書任彼並非有勞舊臣不必豫以優旨凡為人臣者雖當暮年宜更加意潔已勤勞王事如謂年老略不留心諸務黽勉自效豈任彼為大臣徒使之榮顯已耶如此者罷之亦何足惜尚書溫達自任工部以來聲名甚優凡事敬慎而寬著調補吏部尚書工部事務亦緊要但六部侍郎名俱不甚佳部臣之優劣外省督撫却知之甚真居官美惡豈能欺人耶户部錢糧事務斃端極多滿漢大臣名亦不佳今刑部十日彚題一次猶覺斃竇差少耳康熙四十五年十月初一日諭武殿試讀卷官等今天下太平日久曽經戰陳大臣已少知海上用兵之法者益稀日後臺灣不無可慮朕甲子年南巡由江寧登舟而下至黃天蕩江風大作衆皆懼欲下篷朕獨令滿篷衝風而行佇立船頭射江豚略不經意後又南巡乘船渡江即覺心動去歲之行見人渡江者即為心悸朕以一身而數更端皆年為之也大約年少則志氣強年老則志氣衰嘗問之先登老將皆云彼時年俱少壯故能登城今則怯矣將軍提督總兵官前當年少故冒鋒鏑越險阻所在效力今官至大位家亦富饒且年髙者多設一旦有事使之率兵而行欲其奮勇登先效命如前時何可多得耶康熙四十五年十月初六日諭武殿試讀卷官等凡人必耐得勞苦乃能有成不耐勞苦到處無用不但武臣為然即文臣若不勞苦如何學問成就今爾等二三老臣年雖高而勤勞實甚觀部院官止圖安逸凡事俱不經心兵部前以會試人未到齊請展限數日此彼所親奏之事也昨問續到幾人堂官俱不知因令問司官筆帖式亦皆不知朕之使問司官筆帖式者此言甚重不知伊等亦知之否至於會議時九卿內但一二人立議餘皆隨班畫題竟無一留心任事之人矣康熙四十五年十月初六日諭吏部尚書溫達朕因吏部事務緊要故特簡任爾凡銓選皆有定例爾但當遵例而行至于掣籤時遞呈駮查或作單月或作雙月俱多情弊如果有不平之處宜先期遞呈臨期方遞呈者安保無情斃乎爾宜留心康熙四十五年十月初九日諭內閣九卿議土司事但議使兩造平息總督石文晟原參田舜年建造宮殿行凶作惡是以羈留于武昌府今田舜年已故石文晟又具奏欲息其事如土司等果抗拒不法則當發兵征剿土司等若無罪則當反坐原參之人朕意以二格所奏為是此事不便令督撫提督會同審理當于京中特遣大臣前往察審著以此諭九卿康熙四十五年十月十三日諭內閣兩廣鹽課每歲缺額甚多此皆各處浮費太繁之所致也如將浮費欵項交與巡鹽御史察核必不能清惟令巡撫兼理鹽務一年則未完之項俱可清矣爾等可同九卿等會議以聞康熙四十五年十月十三日聖祖仁皇帝御製文第三集卷十
