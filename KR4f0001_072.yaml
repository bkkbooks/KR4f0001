body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十四目録古今體詩四十首春日郊行清明登玉泉山時廵近郊憫農事有作鄚州雜詩五首春日内苑賜宴詩并序初夏登樓臨水夏日同三王慈寧宫請太皇太后安夏旱歩禱南郊喜雨五日泛舟賜内大臣侍衛宴咏蟬題蘇軾墨竹初寒懋勤殿古榦梅春曉春雪懋勤殿讀尚書至無逸篇有作春晝二首景山春望榴花咏觀天儀噐鶴經筵進講周易秋日出郊觀稼題張擇端清明上河圖長至日祀天圜邱有述四章逺望西山積雪春盤端凝殿齋居賜直𨽻廵撫于成龍并序苑西新栁二首和唐太宗咏桃花即用原韻
