body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷二敕諭諭吏兵二部向來包衣佐領下官員子弟不准為廕生監生其筆帖式無有品級今思內外官員效力相同加恩豈宜有别包衣佐領官員子弟准為廕監及筆帖式給與品級之處爾部定議具奏特諭康熙九年二月二十八日諭禮部慈和皇太后誕育朕躬未遂孝養思慕之忱每切於懷雖已上尊諡但今升祔太廟配食皇考典禮關係重大其應進諡號著議政王貝勒大臣九卿科道㑹同詳議具奏特諭康熙九年閏二月二十三日諭禮部皇考升遐倏忽十載罔極之思時恫於懷山陵在望未一展祭尤切悽愴朕擬於今歲八月恭行謁陵禮又奉太皇太后旨思念情殷亦欲詣陵朕敬遵慈命躬侍前往所有應行典禮及需用各項爾部詳議具奏特諭康熙九年閏二月三十日諭吏部朕思滿漢大小官員職掌相同品級有異應行畫一著議政王貝勒大臣㑹同定議具奏特諭康熙九年三月初九日諭兵部設立驛傳原為往來差遣緊要事務速於接應近聞州縣各驛馬匹缺少應付遲誤驛遞原有額設錢糧喂養草料驛傳道專行管理乃不盡心嚴察以致尅減錢糧馬匹缺乏應作何稽察嚴禁爾部其詳議具奏特諭康熙九年三月十四日諭兵部都察院督捕衙門京師重地理宜肅清近聞京城內外惡棍肆行無忌或借端挾詐勒騙錢財或公然搶奪攪擾市肆或結夥橫行凶毆良民又夜間盜劫時聞拏獲甚少此皆步兵甲喇大該巡城御史司坊各官督捕司官捕營將辨稽察不嚴緝捕無能以致奸盜不息善良受害作何嚴行申飭緝拏如該管官仍前怠玩者作何處分爾部院衙門㑹同定議具奏特諭康熙九年三月十四日諭户兵二部滿洲甲兵係國家根本雖天下平定不可不加意愛養近聞八旗甲兵喂養馬匹整辦器械費用繁多除月餉外别無生理不足贍養妻子家口朕甚憫之月餉銀米應作何增給著為永例爾二部㑹同詳議具奏特諭康熙九年三月二十日諭禮部自閏二月以來天氣亢暘雨澤稀少農務方殷殊切朕懷著爾部堂上官同順天府官員竭誠祈禱其應斷屠宰照例行特諭康熙九年三月二十二日諭吏部等衙門時已入夏雨澤愆期皆由部院大小臣工因循舊習不能精白乃心公廉盡職以致政務失當有干天和爾等堂上官宜力圖修省靖共職業嚴督所屬司官凡事應秉公勤勵革除積弊勿瞻狥情面仍稽察胥吏作奸事有應結者速行完結勿得借端多駁圖遂已私其問刑等衙門一切獄訟務期平允得情速審速結勿得株纍無辜久淹羈禁爾等大小各官須實心修省勿得視為具文仍前怠玩有負朕委任責成之意著吏部通行申飭特諭康熙九年三月二十二日諭禮部科爾沁博爾濟金氏秉圖郡王額濟殷之親叔額德台吉之子三等台吉阿郁錫之女選進宮中待年方欲冊封今遽爾長逝朕心深切軫悼宜追封為妃其封號及應行禮儀爾部即察例議奏特諭康熙九年五月初九日諭刑部近覽章奏罪犯監禁踰限不行速審以致斃獄者甚多夫各犯自有應得之罪未死於法先死於獄殊非慎刑折獄之意朕心深為不忍爾部將踰限不結監斃幾人以上者作何嚴加處分詳議定例具奏特諭康熙九年六月十一日諭都察院左都御史明珠國家朝儀大體所在貴於整齊嚴肅不止係堂陛之觀瞻亦以見臣心之敬肆諸王大臣有踰越班行交相接語或輕佻嬉笑禮不踰階而相與言又况其甚乎爾衙門監察御史侍班切近見而不糾豈真目未之覩皆緣畏事狥情所以如此都察院職任重大朕躬有失尚爾指陳王及諸臣乃不參奏揆之事理實所未協今後有失儀者毋得容隱康熙九年八月初四日諭禮部太祖髙皇帝創建鴻圖肇興景運太宗文皇帝丕基式廓大業克𢎞逮世祖章皇帝誕昭功德統一寰區即欲躬詣太祖太宗山陵以天下一統致告用展孝思因盜賊未靖師旅繁興暫停往謁朕以眇躬纘承鴻緒上託祖宗隆庥天下底定盜賊緝寧兵戈偃息每念皇考未竟之志朝夕寢食不遑寧處本欲先詣太祖太宗山陵再詣世祖山陵因奉太皇太后慈命以世祖升遐十年未得一詣陵寢於今年八月前往朕是以恭侍太皇太后先詣孝陵展謁禮成言還今欲仰體皇考前志躬詣太祖太宗山陵以告成功展朕孝思著議政王貝勒大臣內院九卿科道掌印不掌印各官㑹議具奏爾部即遵諭行特諭康熙九年九月初二日諭禮部天文關係重大必選擇得人令其專心習學方能通曉精微著選取官學生令其與漢天文生一同習學有精通者俟該衙門缺出考試補用作何選取習學爾部議奏特諭康熙九年九月初四日諭吏兵二部朕惟致治雍熙在於大小官員悉尚廉潔使民生得遂內外滿漢文武官員各有職守理應律已潔清屛絶餽受乃能恪恭職業副朕任使至意近聞尚有因循陋習借名令節生辰在外文武官員剝削兵民餽送督撫提鎮司道等官督撫提鎮司道等官復苛索下官餽送在京大臣部院大臣官員科道等官在京官員亦交相餽遺前雖屢經嚴禁未見悛改仍行授受殊違潔已奉公之義兵民日漸窮困職此之由以後著痛加省改斷絶餽受以盡厥職如仍行餽受事發之日定將授受之人一併從重治罪必不姑息爾部即遵諭嚴加曉諭內外遵行特諭康熙九年九月二十一日諭禮部朕惟至治之世不專以法令為務而以教化為先其時人心醇良風俗朴厚刑措不用比屋可封長治久安茂登上理蓋法令禁於一時而教化維於可久若徒恃法令而教化不先是舍本而務末也近見風俗日敝人心不古囂陵成習僭濫多端狙詐之術日工獄訟之興靡已或豪富凌轢孤寒或劣紳武斷鄉曲或惡襟出入衙署或蠧棍詐害善良萑苻之劫掠時聞讐忿之傷殺疊見陷羅法網刑所必加誅之則無知可憫宥之則憲典難寬念茲刑辟之日繁良由化導之未善朕今欲法古帝王尚德緩刑化民成俗舉凡敦孝弟以重人倫篤宗族以昭雍睦和鄉黨以息爭訟重農桑以足衣食尚節儉以惜財用隆學校以端士習黜異端以崇正學講法律以警愚頑明禮讓以厚風俗務本業以定民志訓子弟以禁非為息誣告以全良善誡窩逃以免株連完錢糧以省催科聨保甲以弭盜賊解讐忿以重身命等項作何訓迪勸導及作何責成內外文武該管各官督率舉行爾部詳察典制定議具奏特諭康熙九年十月初九日諭戶部淮揚所屬地方歲比不登屢厪朕懷今年又遭異常水災黃淮交漲隄岸衝決百姓室廬多被淹沒夏麥未獲登場秋禾布種水潫難施民生失所特差部臣速行踏勘准動正項錢糧存積銀米將饑民詳加賑濟但被災之民既無耕穫何以輸糧如再加催科愈不堪命今年淮揚所屬被災地方應徵錢糧共該若干爾部速行酌議蠲免以副朕恤災愛民至意特諭康熙九年十月初十日諭禮部帝王圖治必稽古典學以資啓沃之益經筵日講允屬大典宜即舉行爾部詳察典例擇吉具儀來奏特諭康熙九年十月十三日諭刑部等衙門向來定例流徙尚陽堡寧古塔等處人犯六月十二月不行發遣其餘月分俱發今思十月至正月終俱屬寒冷之時流人多有貧者衣裝單薄無以禦寒以罪不至死之人凍斃道途殊為可憫以後流徙尚陽堡寧古塔人犯十月至正月終及六月俱停其發遣餘月照常發遣爾部即遵諭行特諭康熙九年十二月十四日諭大學士巴泰索額圖李霨魏裔介學士哲爾肯哈占達都色黑馬朗古張鳯儀靳輔陳敱永朕近日披覽章疏於科道官條奏有合於事理裨益政治者虛懷聽納不憚見之施行其所言無益不可行者非勦襲陳言則浮泛塞責爾諸臣寧有不知今後有言關政理切實可行者照常票擬朕親加裁奪其或不可行者若悉下部議既屬無益徒令章奏繁多恐反致應行政務有所稽違爾等可詳酌事理以不准行擬㫖朕仍審擇而執其中古之聖帝賢王雖邇言是察亦無稽勿聽用言致治之道蓋當如此康熙九年十二月二十五日諭禮部朕前欲仰體世祖章皇帝遺志躬詣太祖太宗山陵展祭以告成功命議政王貝勒大臣等㑹議議政王等以去年各處多有水旱之災且為時甚迫應用之物預備難及具題暫行停止今思太祖太宗創業垂統功德隆盛山陵在望刻不能忘去年恭謁孝陵禮成今已數月若再久延時日孝思莫殫朕懷殊切靡寧茲當海內無事欲乘此時躬詣太祖太宗山陵以告成功用展孝思事關大典著議政王貝勒大臣內閣九卿科道掌印不掌印各官㑹議具奏爾部即遵諭行特諭康煕十年正月十二日諭禮部今歲三春無雨風霾日作耕種愆期民生何賴皆由朕躬凉德政治未協大小臣工不能殫忠為國恪修職業瞻顧因循惟圖自便偏私怠忽致干天和用是朕夙夜靡寧深切警惕今實圖修省勵精勤政體上天仁愛之意感召休和為民請命內閣六部都察院等衙門大小官員各有職掌皆宜體朕倚任之意共效贊襄持廉秉公克盡厥職洗心滌慮痛改前非以迓天和爾部即遵諭通行申飭祈雨事宜照例作速舉行特諭康熙十年三月十九日諭戶部頃因差往江南郎中禪塔海奏事來京朕面詢民生休戚據奏稱淮揚一帶地方水患未消人民饑饉流亡前雖行賑濟今無以糊口困窮至極聞此情形深切憫惻民為邦本如斯困苦豈可不速行拯救今應即行差官前往賑濟或就近截留漕米或動支何項銀兩糴米給散饑民爾部作速議奏特諭康熙十年三月二十八日聖祖仁皇帝御製文集卷二
