body:
  text: 欽定四庫全書卷聖祖仁皇帝御製文第二集卷三十五頌祈穀壇頌有序嘗觀古之明王必嚴於敬天隆於尊祖誠於養人惟其敬天故饗帝尊祖故崇配養人故重農而上辛祈穀厥義備焉蓋隂陽順風雨調災沴不生五穀咸熟斯比戶可封然後寬刑簡賦導以禮樂躋之仁壽苟陰陽失序風雨不時則五穀傷矣五穀傷而民饑至矣修粢盛而奏馨聞將何藉焉豫肅將禋祀每遇薦享大典備極誠敬期於孚格蒼穹為羣黎提福幸海內穡事浹歲順成即間遘微祲而補助旋施有秋洊至豈非上天粒我蒸民而默佑豫一人以無疆之休哉仰戴帝慈莫可名喻聊攄感忱作為頌曰皇矣上帝仁覆萬國靡物弗懷鑒於有德古聖聿修昭事建極元日殷薦爰祈粒食藐躬受命精意以禋太圻體方郊丘象圜屋而大享典禮均䖍外至必主本祖本天巍巍三聖陟降攸格盡志對越百神其懌曰潔豆籩曰崇圭璧匪祝一身為民請澤惟天監觀愛我兆人宜夏而夏宜春而春和風應節甘雨司辰灾螟罔作瑞穗含醇豈止郊畿式暨五服畇畇疆理何土不淑嶷嶷黍稷何産不熟造化靳施伊誰能育啓蟄而耕納稼而場于耜于趾我倉我箱詎曰農夫實豫之慶上下交裕藉此豐穰民則不知豫敢忘賜湛恩汪濊頌思奚匱嵗嵗吉蠲竭誠肆類庶其眷之永錫樂利二典頌有序粵稽伏羲始畫卦象而未有文詞倉頡造字而篆籀之傳亦多淹失上古文章之見於六經者殆無有先於二典者矣朕服習尚書景慕勳華之德業羮牆見焉竊以為包羅千古之治術無有出其範圍者朝夕涵濡用自勵朂爰作頌曰煌煌二典邃古所傳乾綱坤維嶽峙星躔如海負地如日麗天六經諸史肇開厥先欽眀濬哲恭讓塞淵至德在躬光被八埏寅餞授時法創璣璿後之儀象咸取則焉巡嶽考績疇咨簡賢後之命官率循罔愆文質而奧事簡以全髙明博厚治象巋然夏商而降踵武鴻編支分派別謨誥丕宣散為萬象流為百川仰瞻帝典若陟泰巔伊豫夙夜誦習有年望洋測海弗憚精研遙遙統緒深愧仔肩永言祗頌躬自陶甄禹陵頌朕閲視河淮省方浙地㑹稽在望爰渡錢塘展拜大禹陵廟瞻眺久之敕有司歲加修葺春秋蒞祼粢盛牲醴必豐必䖍以志崇報之意時康煕二十八年二月十五日也緬維大禹接二帝之心傳開三代之治運昏墊既平教稼明倫由是而起其有功於後世不淺豈特當時利賴哉朕自御宇以來軫懷饑溺留意河防講求疏濬漸見底績周行山澤益仰前徽爰作頌曰下民其咨聖人乃生危微精一允執相承克勤克儉不伐不矜隨山刋木地平天成九州始辨萬世永寧六府三事政教修明㑹稽巨鎮五嶽嫓靈兹惟其藏陵谷式經百神守護松柏鬱貞仰止高山時切景行贊王右軍洗硯池贊有序沂州治西南池水一泓漣漪清淺在斷垣荒草中朕甲子己巳南巡兩經其地咨訪土人曰此晉右軍將軍王羲之澤筆池也一名洗研池相傳即其故宅傍有曬書臺嵗久蕪沒今為緇流所宅祠宇三楹面離背坎上設右軍像風神雋爽儼然晉代衣冠墀廡碣石鱗次中為琅琊十七帖餘皆後人憑弔詩文及紀載祠宇興廢始末舊有洗研池三大字斷闕不全嘗考晉書右軍雖系琅琊自其父曠巳南遷右軍未歷江北或者以王氏舊居所在遂傅㑹之未足深辨朕萬幾餘暇日事臨池雅愛其筆法近復命新蘭亭故址以表彰之夫右軍懷經世大略遭時多故用違其才觀其與桓溫書其人品學問槩可想見使得行其志於以毗輔晉室振挽頽風豈僅以書法見長哉乃為之贊曰右軍於書稟生知質仍不廢學功專且一臨池浣墨池水如漆艾山何高沂河有泌山城古祠人傳遺蹟緬懷大夫士林之特究厥生平乃心王室經濟可名奚止藝術虎卧龍跳其人其筆石鼓贊有序朕釋奠先師於國學觀石鼓於廟門之兩廡緬懷周宣迄今二千餘年而中興之烈岐陽之搜俯仰如昨魯壁汲冢缺有間矣此文此石獨焕然與日月爭光是三代法物之僅存者也今列在太學實斯文之盛嘗尋繹搨本推詳其遺義有㑹於心焉乃為贊曰猗歟周宣纘緒文武一時從臣方叔召虎搜於岐陽陳列斨弩鐫功告成伐石作鼓以歌以銘載規載矩豈備考擊致煩矇瞽鼓鼙思將義蓋有取歷二千年鑠日蝕土蝌蚪失傳剝落誰補車攻馬同麀鹿麌麌晨星缺月完句可數天門詄蕩岐山翔舞軒頡是班鍾王敢伍陳在泮宮設於廊廡是切是磋匪擊匪拊橋門觀禮如對簋簠庶幾文治再見三古針河臣針自古水患惟河為大治之有方民乃無害禹疏而九平成攸賴降及漢唐決復未艾漸徙而南宋元滋溢今河昔河議不可一昔止河防今兼漕法既弭其患復資其力矧此一方耕鑿失職澤國波臣恫瘝已極肩兹巨任曷容怠佚毋俾金隄潰於蟻穴毋使田廬淪為蛟窟毋徒糜國帑而勢難終日毋虛勞畚築而功鮮核實務圖先事盡利導䇿莫悔後時飾補苴術勿即私而背公勿辭勞而就逸惟潔清以自持兼集思而廣益則患無不除績可光冊示我河臣敬哉以朂漕臣針國家定鼎㑹極幽冀歲漕東南積偫惟備舳艫銜尾數百萬計轉輸有程貴以時至專設重臣式董厥事我徒我旅亦云孔勩尚其寬恤厚彼糗粻尚其撫綏摩彼疴癢毋借空名耗閭左藏毋踵陋習損經制常爾克持廉則吏罔弗臧吏克守法則軍罔弗康軍既樂康競挽以將孰困而逋孰盜其糧官苟剝之用飽巳囊下復效之鼠雀曷防濡滯河干如稻集蝗總計而論蝕我太倉國儲民食毋乃兩傷爾膺斯任莫忝王章臺省針臺省之設言責斯專寄以耳目寧取具員通明無滯公正無偏黨援宜化畛域宜捐洞達政體斯曰能賢古昔諍臣風規凜然訏謨讜論垂光簡編朕每覽繹如鑑在懸居是官者表裏方直精白乃心充廣其識國計民生臧否黜陟凡所敷陳敬將悃愊風霜之任以懲奸慝搏擊之威以警貪墨毋托細務苟塞言職毋紛成憲妄逞胸臆書思入告當寧對揚沽名匪正營私孔傷或藏嫌怨謬為雌黃受人指囑尤為不臧形諸奏牘有玷皂囊職司獻替亟宜審詳敬爾在公風紀巖廊針詞用朂誕告聮常太常針翼翼奉常是曰清卿班躋九列專職匪輕國之大事莫如祀典恪勤􅈺習斯副厥選郊壇宗廟必潔必䖍齊明祗肅誓誡維先制備容臺用相百禮贊導法儀駿奔有體作樂殷薦八音克諧永言登歌律呂無乖舞辨文武應聲合節綴兆均調以象功德牲牷籩豆務殫乃心苾芬上達庶冀居歆吉蠲有違或乘爾瞶精禋有忒或形爾懈糾繩靡逭國典昭垂針辭誕告其敬聽之提鎮針武臣之職建威銷萌星羅棊布以壯干城韜鈐宜裕紀律宜明拊循宜至訓練宜精計安黎庶爰設五兵易言畜衆詩詠求寧閭閻參伍勿擾吾氓山無伏莽海絶長鯨民恬耕鑿惟爾之能饋餉時給毋致呼庚爾能廉潔衆以飽騰投醪飲河古史所稱惠逮卒伍忠愛乃生如捍頭目如衛父兄羣心從違視爾攸行文武輯睦毋相抗衡軍民調劑務持其平朕親簡閲黜陟有程下逮偏裨選授匪輕才勇必録窳惰必懲矧爾大帥節鉞是膺宜體朕意勉竭股肱銘淵鑒齊銘搆室藝苑匪求堂皇六籍斯列百家斯藏聿求治道攬兹舊章古人遜志歉若望洋取義於淵源深且長浩演渟泓蓄之有常既澄其體復藴其光清暉朗映無物不彰於焉鑒之洞毫晰芒以兹發政如涉津梁以兹擇人如鑑否臧我懷前哲陟降在傍見道於衡覿聖於墻實惟簡編乃獲周行披覽之餘奧義以詳擷其精英以備遺忘亦名淵鑒昭示無疆目擊道存文治永昌佩文齊銘堯紀文思舜稱文明文以經世天地精英河洛啓祕圖書肇興典謨埀則雅頌繼聲楷模百代統歸六經乾坤樞紐民物準繩潤如河海炳若日星簡編具在黽勉服膺如寒待衣繭絲呈能如饑待食菽粟惟馨人倫日用匪此莫勝紉蘭為佩楚辭可徵佩弦佩韋柔剛互成亦有佩玉義取溫瑩豫所佩者古訓是程朝斯夕斯孔思周情味道之腴體泰志寧縹緗炳蔚卷軸縱橫研求探討澡祓性靈揭之座右恆視斯銘知稼軒銘史書大有惟國之瑞食為民天邦本所繫西苑有廬茅簷土砌風雨攸除桑柘蓊翳農祥乘春南榮晨蒞歲云秋矣流火西次於焉占星以戒農事物養於䝉禾保於稚驗其勾萌在晦明際雷雨甲坼剛柔竝試灌溉為仁芟剃為義二者不廢穎栗可冀歲之歉穰人力是視儻違其時饑寒或遺閔兹農夫終歲勞瘁在昔有邰嘉種手藝採入豳吹咏及纖細用銘斯軒庶幾此志察罕七羅勒石銘康熙三十五年歲次丙子四月丙戌朔十四日己亥大清皇帝征討厄魯特噶爾丹將六軍過此御筆勒銘維天所覆皆吾赤子綏靖邊陲殄滅蛇豕山澤效靈草蕃泉㫖羽衛斯經貞石用紀拖諾山勒石銘康熙三十五年嵗次丙子五月丙辰朔十二日丁卯大清皇帝征討厄魯特噶爾丹駐蹕拖諾山御筆勒銘瀚海蕩蕩臚朐泱泱親御六師我武維揚震雷霆威讋日月光翦厥凶醜安定遐荒昭木多勒石銘康熙三十五年嵗次丙子五月丙辰朔十三日戊辰大清皇帝征討厄魯特噶爾丹大兵邀擊於昭木多之地盡殲賊衆御筆勒銘天心洪佑翦逆摧凶困獸西竄膏我軍鋒一鼓而殲漠庭遂空摩崖刻石丕振武功狼居胥山勒石銘康熙三十六年嵗次丁丑四月朔日庚戌大清皇帝討滅厄魯特噶爾丹駐蹕狼居胥山御筆勒銘登狼居胥遡大河曲遐播德威以綏荒服殄寇寧人義正仁育絶域來同敷天永福聖祖仁皇帝御製文第二集卷三十五
