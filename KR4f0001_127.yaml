body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷十八敕諭諭戶部朕君臨天下期於黎民樂業各獲其所凡興利除害之事靡不舉行蠲免賑濟之恩靡不下逮比年以來因淮揚所屬地方疊罹水患業已歲蠲額賦賑恤頻施又動支數百萬帑金責令在河諸臣於應挑應築之處酌量修理務使泛濫之水匯歸入海被淹之廬舍田畝盡皆涸出用底幹寧乃錢糧竟爾虛費卒不能使積淹有歸田廬未涸民生未遂朕聞之惻然軫懷值兹四方無事之時欲將一切修舉事宜詳閲指示用是躬親臨幸沿途審視黃河水勢咨訪地方父老比至歸仁堤高家堰量度地形高下應挑應築一一明示河臣惟是被淹地方米價騰涌生計維艱朕目擊民依深用厪念著將漕糧截留十萬石於高郵寶應興化泰州鹽城山陽江都受災七州縣各留一萬石悉較時價減值發糶餘米三萬石著於邳州留八千石宿遷桃源清河安東四縣各留五千五百石亦較時價減糶此各州縣發糶之米著就道交與漕運總督河道總督邳州著遣司官一員前往監視再截留米十萬石於揚州淮安各收貯五萬石這應留漕糧不論何處米石著就近截留爾部即遵諭行康熙三十八年三月初七日諭總督于成龍初六日在清水潭九里地方試水平測量河水髙湖水二尺三寸九分此一帶攩湖之石堤甚為緊要理應速行修造朕在此親自步行看驗修理河工官員不見一人理應行查即參至高郵州地方看得河水向湖內流河水似高一尺有餘趂黃河之水未深之時此等堤岸即一丈之地不可不緊急修理為此特諭康熙三十八年三月初七日諭刑部朕愛養民生慎重刑獄凡有奏讞時示矜全兹鑾輿南巡見沿途老稚男婦環跪歡迎心甚嘉悅念此編氓皆吾赤子原期生聚教訓共底善良其或陷於刑章致困囹圄改過無路惻然傷之所經過山東江南兩省見在監禁人犯除十惡真正死罪及詔欵不赦等罪並官吏犯贓不宥外其餘自康熙三十八年三月十五日以前死罪及軍流徒罪以下已結未結俱著寬釋此朝廷巡幸所至欲使並生之至意可通行曉諭令咸悉朕懷爾部即遵諭行特諭康熙三十八年三月十三日諭户部東南為財賦重地朕時加軫念頻歲以來雖在邊塞用兵之際未嘗不早夜殷殷眷懷寬恤兹以中外升平特事巡省並閲河工比至江南親察民間饒瘠之狀見淮南北地方疊罹水患深用惻然已經屢蠲屢賑仍命截留漕糧減價平糶其餘各州縣固市肆安輯耕鑿恬熙而額賦浩繁民生拮据歷年逋負積算日增合行江蘇巡撫安徽巡撫所屬舊缺帶徵錢糧計及百萬念小民方供新稅復急舊逋物力維艱勢難兼辦里井既多催科之擾官吏復滋參罰之煩應沛特恩槩行蠲豁除康熙三十三年恩詔內已經赦免外其三十四五六年奏銷未完民缺一應地丁錢糧米豆麥雜稅爾部行文該督撫察明俱著免徵務飭有司悉心奉行俾使窮簷蔀屋均霑實惠如有已徵在官詭稱民缺希圖侵蝕肥已者一經發覺定從重治罪朕身處宫禁與巡歷方隅無非孳孳民事但使閭閻豐足則國家裨益良多以此不惜蠲除頻敷德澤凡厥官吏軍民宜咸知朕意爾部即遵諭行特諭康熙三十八年三月十三日諭吏部朕以勤求民隱閲視河工特舉鑾輿巡省一切供御之費皆自內庭儲偫不下煩於有司而經過山東江南地方各官備辦夫船等項效力殊屬勤勞此等官員有因公詿誤罰俸住俸降俸降級革職留任者著察明悉從寬免爾部即遵諭行康熙三十八年三月十九日諭吏户兵三部朕眷念東南民生風俗特行巡省兼以黃淮為患親閲河工比巡歷堤堰詳加相度以疏導修築之法指授河臣刻期興作隨南涉江表遍察民依頃至蘇州府駐蹕有浙江文武官吏及在籍官員迎謁於行在言浙民望幸之心至殷且切合詞諄懇不啻再三朕勉狥輿情揚旌前發以三月十九日啓行自出京師以來一切供御之需皆出儲備其沿途日用令該衙門照各地方時價採辦一無所纍於民如有官吏借名科派致擾閭閻者察實以軍法從事地方大小文武官員與扈從官員借稱親舊私相餽遺與受之人及扈從大小官員隨從人等有橫行生事者一並軍法從事凡經過地方百姓各安生業皆如常時務令廛無廢市隴不輟耕毋得遑遽引避方今正届農時所過田畝勿令踐踏其軍民人等懷挾私怨受人指使擅於駐蹕處所輒行告訐者一槩嚴禁不准仍照衝突儀仗例嚴加治罪爾部即傳諭扈從大小官員人等並行該督撫于各府州縣城市鄉村遍張告示悉行曉諭務令億兆通知以副朕體恤惠愛至意特諭康熙三十八年三月十九日諭户部朕因淮揚地方數被水患躬臨巡省目擊田廬淹沒之苦深加軫恤既截留漕糧以濟民生仍蠲除積缺以紓民困其昨歲淮揚兩屬被災錢糧曽經該督撫具題部議照例減免三分今念百姓糊口維艱安能辦賦應破常格用沛特恩淮揚府屬海州山陽安東鹽城揚州府屬高郵泰州江都興化寶應九州縣並淮安大河二衛康熙三十七年未完地丁漕項等銀一十九萬有竒米麥十一萬石有竒著全與蠲免爾部行文該督撫即飭各州縣張示曉諭務體朕憫惻羣黎之至意俾窮鄉僻壤均霑實惠如有不肖官吏私徵侵蝕者察出定治重罪特諭康熙三十八年三月二十二日諭刑部朕巡視東南行次浙省因官吏軍民依戀誠懇特留蹕數日以慰喁喁奏請之情獨念獲罪人犯身淹刑獄一干法網無由自新兹乘輿經臨惻然矜憫用沛好生之澤聿示格外之仁該省各屬地方有罪犯現在監禁者除十惡等真正死罪及詔欵不赦等罪與官吏犯贓不宥外其餘自三十八年三月二十六日以前死罪以下已結未結悉著寬釋夫省刑宥罪者朝廷之殊恩守身奉法者小民之常分必使黎庶嚮風咸知寡過期稱朕孳孳教育羣生至意可行文該督撫遍傳所屬張示曉諭爾部即遵諭行特諭康熙三十八年三月二十六日諭吏部朕頃自江南巡歷浙省沿途供御悉經儲備不以纎毫取辦閭閻而地方官料理夫船等項一無缺誤殊屬勤勞此等官員有因公詿誤罰俸住俸降俸降級革職留任者著察明悉從寬免爾部即遵諭行特諭康熙三十八年三月二十六日諭户部朕以省方問俗巡歷三吳比至浙省見緣路農桑固遍隴畝而地有肥磽時有豐歉歷年正供錢糧因輸納維艱致多逋負雖已准分年帶徵而新舊之賦取給於一時恐力作之民終難於兼辦應通行蠲豁以𢎞庥澤除康熙三十三年以前恩詔赦免外其三十四五六年奏銷未完民缺地丁錢糧米豆麥雜稅著一槩免徵爾部行文該督撫責令有司悉心奉行務俾均霑實惠如有官吏以完作缺詭詞侵蝕者察出定從重治罪夫朝廷頻賜田租所以優恤民力誠使閭里之間人敦本業家有餘儲則藏富在民朕深嘉賴可傳示官吏軍民人等令咸知悉爾部即遵諭行特諭康熙三十八年三月二十六日諭户禮二部朕子育黎元勤求治理日孜孜以施德澤厚民生為急務而江浙二省尤東南要地朕時切軫念比歲以來蠲豁田賦賑濟凶荒有請必行無災不恤雖漕項錢糧向未蠲免者亦曽特㫖蠲免愛養之道備極周詳庶幾民生日益康阜用是乘輿時邁於視河事竣巡歷江浙咨訪民間情形見淮揚一路既困潦災而他所過州縣察其耕穫之盈虛市廛之贏絀視十年以前實為不及此皆由地方有司奉行不善不能使實惠及民所以小民雖懷愛戴之誠而朝廷恩澤卒未下究朕目擊厪懷亟思拯恤截留漕糧寬免積缺另有諭㫖惟各鹽差關差向因軍需繁費於正額外令在差官員以所私得贏餘交納充用今思各官孰肯自捐私槖勢必仍行苛取商瘠民困均坐此弊著將加增銀兩一槩停罷以紓商民之纍其兩淮鹽課康熙三十六年曽加增四十萬兩今恐商人辦課維艱有漸致匱乏者著減去二十萬兩此外有應行應革事宜朕還都以後仍加商確次第舉行該督撫藩臬皆地方大吏亦著悉心體訪凡有可為民興利除害者作速勘實陳奏嚴革雜派禁止刁訟然後胥吏不能作奸良民得以安業儻官吏有悖㫖妄行者許商民首告該督撫察出即行參奏朕視民如傷惟恐一夫不獲其所兹值海㝢升平兵革不事正當與民休息之時故特渙沛德音減徵寬稅以為閭閻留有餘之力萬一嗣後别有急需或不得已而稍議加增想在小民亦能共諒朕懷輸將之恐後也至於江南浙江人文稱盛入學名數前已酌定增額今著於府學大學中學小學各增五名舉行一次以示奬勵人才至意爾部即遵諭行特諭康熙三十八年四月初二日諭户部朕巡幸江南遍察地方疾苦深知民間生計艱難故將通省積缺錢糧盡行蠲免所過州縣有被災甚重者俱經拯濟務俾得所兹聞鳳陽府屬去歲潦災甚重是用破格加恩以示優恤康熙三十七年該府屬壽州泗州亳州鳳陽臨淮懷遠五河虹縣䝉城盱眙靈璧十一州縣並泗州一衛未完地丁漕項等銀米著一槩免徵爾部行文該督撫即飭該地方有司張示曉諭令窮鄉僻壤咸悉朝廷曲軫災黎之至意如有不肖官吏悖㫖私徵使百姓不沾實惠者察出定治重罪爾部即遵諭行特諭康熙三十八年四月十六日諭户部朕巡省民生風俗南至於江浙兹以返蹕行經山東緣途延見父老咨詢農事幸今歲雨暘時若二麥繼登小民可以無憂粒食但前年被災泰安等二十七州縣生計尚未豐盈宜更加恩休養所有康熙三十六年未完地丁銀米俱著免徵其三十七年應徵錢糧原因災傷令於三十八年完納今念一歲之內並輸二歲之租恐物力艱難未能兼辦著分作三年帶徵以示寬恤爾部移文該撫轉飭有司眀白張示務使窮鄉僻壤均沾實惠以無負朝廷曲軫民依至意儻有不肖官吏私徵侵蝕致上澤不下及者察出定治重罪爾部即遵諭行特諭康熙三十八年五月初六日諭內閣九卿詹事科道朕南巡至浙江見百姓生計大不如前歷年來屢將舊缺錢糧盡行豁免其被災地方槩行賑濟恩澤屢加在百姓應比往年豐足今反不及從前富庶皆因府州縣官剝削人民多派侵取餽送上司或有沽名不受餽送而因事借端索取更甚凡有微小易結應審之事牽連多人遲延索詐者甚多此等情由在京官員亦有所聞而九卿科道無有不知其督撫不將此等情弊釐剔察參反將行賄官員薦舉廉正官員糾劾以致民生失所殊失朕愛養元元之至意且畿輔近地因朕不時巡察直隸地方竟無私派侵取情弊故人不知有私派之苦其各省督撫若體朕愛民至意實力奉行或有不肖劣員若科道不畏人不狥情察訪糾參則有司何敢復行私派侵取今作何令吏治澄清萬民樂業共享太平熙皥之治爾部㑹同確議具奏特諭康熙三十八年五月十八日諭戶部朕思小民生計惟農畝是賴必年穀收成斯衣食無缺淮揚所屬海州等州縣衛接年河流浸漫田廬編氓艱於粒食朕心深切軫念已將康熙三十八年錢糧俱行蠲免今春南巡目覩民間疾苦恐致失所復將康熙三十七年未完錢糧盡與豁除諭令所司將沿河堤岸堅固修築乃修防未竣夏秋又致冲決田廬盡沒水中特命該撫往駐被災地方動支積貯米穀並將漕糧截留親行賑給今念清口河流未通民田仍遭淹沒耕穫無從百姓饘粥尚且艱難來年租賦安能輸辦著將這被災海州山陽安東鹽城大河衛高郵泰州江都興化寶應等州縣衛康熙三十九年地丁銀米等項及漕糧漕項銀兩盡行蠲免爾部速令該督撫通行曉諭務俾均霑實惠以副朕拯恤災黎至意如有不肖官役朦混侵冒仍行私徵者該督撫嚴察指參從重治罪爾部即遵諭行特諭康熙三十八年十一月初五日諭户部朕君臨天下撫馭兆人無日不以休養生息為念嘉與元元共圖豐樂蠲租賜復時切於懷故從前於直𨽻各省權其緩急先後頻渙恩施今海宇升平四方無事欲使普天率土咸登阜饒惟湖南地方素稱魚米之鄉比年雖年穀順成而民間猶未盡充裕是用格外加恩以綏黎庶所有康熙三十九年湖南通省地丁雜稅等項錢糧著一槩蠲免爾部移文該督撫令遍飭所屬實心奉行家諭户曉務俾深山窮谷均霑朝廷德惠以副朕愛民如子至意儻或借端徵派澤不下究事覺定行從重治罪爾部即遵諭行特諭康熙三十八年十一月初八日諭吏部凡奉差遣官員理宜恪慎潔己辦理公務事竣即遄旋復命庶不負委任之意嗣後如巡鹽𣙜稅審事察荒及一應差遣併部委各項官員儻有沿途騷擾需索繞道妄行或公務已畢仍逗留地方借端生事恣意亂行或將所帶筆帖式撥什庫人等私自遣往他處督撫係簡任封疆大臣著即指名參奏以憑究治如督撫瞻狥容隱不行糾參事情發覺將督撫一併議處爾部即遵諭行特諭康熙三十八年十二月初九日諭户部淮揚等處百姓頻年罹於水災未寧幹止朕心時切軫念比歲以來多方優恤蠲免賑給靡不舉行去年春朕親履河干目擊小民田廬皆被淹沒災黎艱於粒食益為憫惻於懷爰命地方官按户賑濟又將截留漕糧發賑平糶俾得贍養上下兩隄岸前雖屢發帑金修築迄無裨益去年二月面諭河工諸臣速行修治至今尚無成效復遴選廷臣同往經理無非軫懷民瘼欲令黃運兩河隄岸速成斯民早安生業耳念水患一日不除則百姓一日不得耕種用是深以為慮著將今年漕糧截留二十萬石存貯淮揚地方備用爾部即遵諭行特諭康熙三十九年三月初二日諭户部國家要務莫如貴粟重農朕宵旰圖治念切民生惟期年榖順成積貯饒裕於以休養黎元咸登樂利今聞直隸各省雨澤以時秋成大熟當此豐收之時正當以饑饉為念誠恐歲稔穀賤小民罔知愛惜粒米狼戾以致家無儲蓄一遇歲歉遂至仳離著該督撫嚴飭地方有司勸諭民間撙節煩費加意積貯務使蓋藏有餘閭閻充裕以副朕重農敦本愛養元元至意爾部即遵諭行特諭康熙三十九年七月二十五日聖祖仁皇帝御製文第二集卷十八
