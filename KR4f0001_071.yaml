body:
  text: 欽定四庫全書卷聖祖仁皇帝御製文集卷三十三古今體詩三十六首恭謁孝陵玉殿寒松祕秋霜落樹枝緬懷文武業創立太平基曉色星辰動晴光日月埀望陵愁不斷孝思起深悲太皇太后駕到溫泉溫谷神丹力不窮五雲暖溜繞行宫聖躬喜得今康豫宇宙歡欣舊日同雨後經明總兵戚繼光所作八角石亭華清雨後問安回徐步山椒到水隈秋木荒池今白草寒花故壘舊青苔精靈銷散人何處功業留傳志未灰為將當年堪拊髀亭開八角尚崔嵬清晨入盤山二首日出入盤山宸遊草木閒村莊人盡望處處水潺潺其二當年乘輦到今日復來遊山水不同色泉聲還細流古中盤望蓮花峰中盤遙望蓮花峰日映山林氣色重老衲吟詩渾半偈翠輿臨發又從容盤山絶頂三首上盤絶頂俯神京九月登山積翠晴荒寺日髙人少至野林煙靜鳥無聲道中勒馬觀風景澗下留鑾愛水清縱目徘徊猶不盡氤氲縹眇海雲輕其二四顧清標髙逼天風雲塞上斂寒煙遙觀沙漠宣威逺近控州城作鎮懸紫蓋山中獨竒秀雙峰嶺外更綿聯九秋朗耀幾千里落葉蕭條滿目前其三薄暮東峰來返照遊心怡曠動揮毫題詩數句林光晚作賦初聯雁陳髙盤道崚嶒難步躡危巖嶻􅑖恐身勞欲歸帳殿還傳語引路山僧度逺臯晚過李靖菴二首兩崖石壁出秋雲野草寒林有鹿羣古剎斜陽人寂寂香煙飄處雜紛紜其二蒼茫絶頂樹參差落日還營過竹籬念及凌煙留姓字獨於古壁一題詩星出歸營皎皎星河路向西將歸玉帳渡山溪羽林扈從皆雄將掃靖煙塵萬馬齊奉侍太皇太后臨御溫泉因孟冬享廟暫回京金風肅郊甸秋光瀰皓穹曉鐘出長樂羽衛臨新豐重闈慶康悅遊豫溫泉宫鳴鑣玉輿側侍蹕清塵中晨夕奉慈顔婉愈承歡衷原野陪登覽瑞靄光熊熊應鐘忽届節霜露霏空濛夙興感時序廟祀宜欽崇饗獻薦圭璧對越必微躬暫辭瓊島月還御瑶池驄殿闕欣在望齊祓明禋通眷言整星駕依戀心靡窮夜半覽本初冬夜靜正三更宵旰清心勉勵精自愧事繁機不敏細披章奏察民情山中曉色星漢參差曉色開髙峰初日射莓苔閒來駐蹕山村靜坐愛明霞入酒杯由鮎魚池出關咏瀑布水巉巖瀑布挂前川樹冷煙寒羃碧天關外黎民風俗厚涵濡威德已多年登景忠山景忠逺上日方闌巖壑層層生早寒嶺腹凍雲凝玉仗山中瑞氣接仙鸞鳴鐘澗裏經聲近擊鼓樓前樹影殘繚繞旌旗縈石道六龍行處萬民觀灤河寒邊逺繞至灤河徹底清明不見波駐輦徘徊千萬里石鯨兩岸影嵯峨冬至回京齊戒夜坐一陽初發便知天暫别慈顏日日懸午夜齊明湛心志夢中猶自侍溫泉登邊城作冬月荒山落日斜岧嶤野景幾千家邊城戍色雲煙靜緑水清河走白沙溫泉行溫泉泉水沸且清仙源遙自丹砂生沐日浴月泛靈液微波細浪流琮琤初經石竇漾暄溜烈勢直與炎曦爭瀠洄碧澗落花駐掩映翠巘霜林明汀回溪轉入欄檻甃以文石何澄泓方壺圓嶠時自暖紫芝朱草冬常榮殿啓披香溢石髓盤低承露浮金莖冲融太和蓄元氣炎德利物功難名氤氲沆瀣結紫霧縹眇雲霞連赤城髙秋九月天颯爽鸞旗鳳節紛相迎慈寧雕輦度閶闔絳霄帳殿開蓬瀛神泉淑景供遊賞流金潄玉堪怡情時巡豈必瑶圃逺對此心意皆和平華清繡嶺杳寂寞鯨魚鳬雁徒縱橫曷若兹泉獨標異萬年勝蹟環神京嵗時來往護仙蹕㸃筆為賦溫泉行溫泉流杯戲作曉霜早落滿池清一氣涓涓愜勝情偶坐浮杯幾暇日君臣對景論平生南苑橋上大風南苑霜華㸃翠旗嚴風臘月斷流澌已知朔氣催寒盡橋跨長虹湧溜遲雪細玉輕盈下碧霄和煙飛霰上寒條片才落地濺濺濕羅綺花紋處處飄景山積雪侍衛下趨如飛憑髙縱逺覽積雪明山峰直下數千尺飛騰跨玉龍元旦慈寧宫行禮太蔟初分來萬國融融淑景動青陽曈曨翠蓋祥雲覆縹眇蘭宫瑞氣揚節遇三元開寶厯時逢四始奉霞觴山呼拜舞臣民樂願頌千年正未央春旭日含新淑春光覆滿屋東皇轉嵗華融氣雜山谷上元幸萬善殿戲作雪霽寒輕景物鮮上元臨幸遇參禪方文無人般若靜天花虛落古松前收復嶽州作並序逆賊吳三桂既經天誅之後不數月而嶽城恢復良由三桂背恩倡亂荼毒生靈經年以來死者相望於道路生者逃竄於四方積尸遍野民不聊生皆朕德之薄不能撫綏之故也今賴皇天之眷佑祖宗之威福羣臣盡力將士用命前後恢復閩海兩粵以至湖南嶽陽諸處擒斬賊魁殆盡望風歸正不可勝數所餘小醜勢如破竹解吾民之倒懸行有日矣特賦長歌以舒其懷聿豫凉薄蒞洪荒遂使巨慝亂天常東南黎庶苦紛擾幾年戎馬蹂疆場臨軒重簡親藩出軍威萬里風雷疾肆伐原因討不庭專征大義昭星日臥榻安容有悖狂太阿豈好弛紀律再敕元臣佩虎符戈矛剗地生寒栗鐵騎驍騰擁楚雲霓旌閃爍連江濆七澤三湘據衝要樓船璧壘屯諸軍一時將士盡忿激人人都願成功勳懸知叛逆衆所惡直須吹氣清妖氛顧此生靈負何罪流離轉徙多饑餒處處田疇蕪不耕年年桑柘無人採聞說荒榛遍野廬還傷老弱填江海每念邊陲一憮然立身天地慙主宰未忍加兵戕我民深宫宵旰勤五載五載躊躇常恭默㑹當滅此乃朝食旗捲閩疆甲士降陳開百粵堅城尅已見懷光伏冥誅更看元濟成俘䤋鼙鼓旌旄定嶽陽雕戈金鏃清區域指顧能收六詔煙宣恩早布招徠德書奏傳來慰兩宫乂安社稷開鴻濛翼翼小心恆敬慎敢忘繼述在朕躬期與宰司百執事共相砥礪克厥終恭上太皇太后萬壽詩二首和風瑞氣滿簾櫳慈壽無疆祝上宫喜得萬方同孝養千秋福德竝蒼穹其二透户卿雲接御香彤墀新栁拜韶陽宮中堯舜兼文母恭捧南山萬壽觴賜大將軍安親王嶽樂二首大開册府紀元功伐罪安民將略雄佇見天潢蒙上賞明光髙宴賦彤弓其二洞庭南嶽盡提封九伐勳名勒景鐘眼底窮荒皆赤子早銷金甲勸三農賜護軍統領桑格百戰威名已早揚頻年秉鉞在巖疆素知果勇兼韜略應著𢎞圖肅鬼方春夜月晚來風景麗初晴月色輝朧朧穿竹樹照耀滿宫幃題周文矩畫說劒圖鵝溪尺幅衣冠古貌出蒙莊辨論新劒客滿前毛髮動須知繪事亦通神聖祖仁皇帝御製文集卷三十三
