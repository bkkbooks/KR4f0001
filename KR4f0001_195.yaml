body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集總目四卷第十九論宋高宗父母之讐終身不雪論三角形推算法論量天尺論卷第二十序親征平定朔漠方略序增修皇輿表序五燈全書序清文鑑序全唐詩録序全唐詩序卷第二十一序資治通鑑綱目全書序佩文韻府序淵鑑類函序厯代賦彚序清凉山新志序四朝詩選序卷第二十二序詠物詩選序厯代題畫詩類序厯代詩餘選序書畫譜序廣羣芳譜序記水性記黃船記避暑山莊記卷第二十三碑記普濟堂碑記高旻寺碑記補陀羅迦山普濟寺碑記重修清凉山羅睺寺碑記碑文重修天竺寺碑文南海補陀法雨寺碑文廣仁寺碑文重修南嶽廟碑文重修西嶽廟碑文卷第二十四碑文五臺山棲賢寺碑文五臺山顯通寺碑文五臺山湧泉寺碑文五臺山廣宗寺碑文五臺山白雲寺碑文東嶽廟碑文穹覽寺碑文北鎮廟碑文隆興寺碑文重修西頂廣仁宮碑文卷第二十五碑文重修菩薩頂碑文和碩裕憲親王碑文和碩恭親王常寧碑文太子太傅都統三等公議政大臣吏部尚書中和殿大學士佐領贈少保仍兼太子太傅諡文襄圖海碑文武英殿大學士兼吏部尚書佐領加二級諡文清阿蘭泰碑文文訓飭士子文頌唯天為大頌並序贊上帝閣贊為七十八歲老人光輪像贊卷第二十六雜著古文評論計八十一條卷第二十七雜著古文評論計七十六條卷第二十八雜著古文評論計八十條卷第二十九雜著古文評論計七十條卷第三十雜著古文評論計六十九條卷第三十一雜著古文評論計八十四條卷第三十二雜著古文評論計八十二條卷第三十三雜著古文評論計八十條卷第三十四雜著古文評論計七十一條卷第三十五雜著古文評論計五十八條卷第三十六雜著古文評論計九十條卷第三十七雜著古文評論計七十二條卷第三十八雜著古文評論計七十三條卷第三十九雜著古文評論計八十六條卷第四十雜著古文評論計八十三條卷第四十一雜著古文評論計七十七條卷第四十二雜著古文評論計六十六條卷第四十三雜著古文評論計九十三條卷第四十四雜著題劉松年畫論韻府刻本跋書大學跋跋道德仁藝扁後跋德業仁義扁後跋都俞吁咈扁後跋書草訣百韻後祭文告祈穀壇祭文賦桑賦並序蓴賦並序
