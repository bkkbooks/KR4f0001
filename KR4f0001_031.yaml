body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷十三敕諭諭將軍巴海副都統薩布蘇瓦里虎等朕幸吉林地方訪詢民隱見兵丁役重差繁勞苦至極此等情由回鑾之日將軍以下至於兵丁教諭大意已有特㫖朕自至京師復為思繹不將各種無益差徭顯與革除兵丁人等終無禆補且不得霑實惠矣一鷹鸇窩雛於三月尋覓四月內捕取最妨農事兼屬無益况所得鷹鸇不諳呼飼難至京師徒勞人力應行停止一自八月放鷹原欲令之熟習以便賫送數年以來竝無名鷹貢至京師在烏喇地方兵丁於冬寒之時尋覓山雞人馬勞頓應行停止一圍獵以講武事必不可廢亦不可無時冬月行大圍臘底行年圍春夏則看馬之肥瘠酌量行圍令貧人採取禽獸皮肉須預先傳明日期以便遵行所獲禽獸均行分給圍獵不整肅者照例懲治不可時加責罰苛求瑣屑遇有猛獸須小心防禦以人為重勿致誤有所傷一打鱏鰉等魚既有專管西特庫等烏喇兵丁應停差役其搬移新滿洲採取造房並船隻桅木等項及偵探巡邏等差俱係軍務乃駐防官兵專責不可寬假應照常行此外偶爾差遣大臣侍衛督看採取東珠砍伐木植尋覓鷹鸇不涉每歲定例所行之事似無過勞此後將軍以下撥什庫以上應念兵丁逺居邊境無市貿易身冒嚴寒往採山木妻子汲水操作備極艱辛時加憐憫吉林烏喇田地米糧甚為緊要農事有誤關係非細宜勸勉之使勤耕種朕軫念滿洲人民生理欲遣人專往以驛遞疲斃故因筆帖式來奏特諭康熙二十一年五月十九日諭大學士勒德洪明珠李霨王熙學士噶爾圖石柱張玉書朕觀部院衙門大小官員俱分班啓奏甚或一部分作數班朕與爾等皆每日曉起部院官員分數班啓奏殊非上下一體勵精圖治之意嗣後滿漢大小官員除有事故外凡遇啓奏事宜俱著一同啓奏都察院衙門及科道官員無逐日啓奏本章著每日黎明齊集午門如滿漢部院官員有怠惰規避者即行察參又大小各衙門滿漢官員雖該衙門無啓奏事宜亦著每日同啓奏官員黎明齊集午門俟啓奏事畢同散有怠惰規避不於黎明齊集者亦著都察院及科道官員察出參奏康熙二十一年五月二十九日諭部院諸臣朕因天氣炎熱特奉兩官避暑瀛臺今幸天下少安四方無事然每日侵晨御門聽政未嘗暫輟卿等各勤職掌時來啓奏曾記宋史所載賜諸臣於後苑賞花釣魚傳為美談今於橋畔懸設罾網以待卿等遊釣可於奏事之暇各就水次舉網得魚隨其大小多寡攜歸邸舍以見朕一體燕適之意誰謂東方曼倩割肉之事不可見於今日也特諭康熙二十一年六月初三日諭户部漕糧關係國儲理應早登倉庾向因經管各官及旗丁人等怠緩遷延每致遲誤故嚴定處分之例以警積玩但定例過嚴期限迫促經管文武大小各官及旗丁人等不無苦纍爾部㑹同吏兵二部將見行之例再加詳酌定議務期不誤漕運不病官民寬嚴適中永可遵守以副朕軫恤至意特諭康熙二十一年六月十二日諭刑部時已季夏雨澤愆期邇來亢旱益甚農事堪憂朕思天人一理感格之道必有未孚且刑獄或有淹滯寃抑之氣最能上干天和內外大小問刑各衙門審讞案件恐有聽斷不公曲直顚倒以及草率怠忽任意遲延致無辜之人久羈犴狴爾部即通行申飭今後問刑各官凡應速結事情即為歸結勿得借端稽緩苦纍平民務期虛明公允詳慎得情以副朕欽恤刑獄感召休祥至意特諭康熙二十一年六月十四日諭吏部圖治首在安民勸善莫先懲惡必咨詢廉訪責有專官而後民隱得以上聞奸頑為之斂戢近聞直省各地方多有紳襟勢要土棍豪強及旗下凶惡人員並莊頭等縱暴恣行武斷鄉曲有司畏威而不敢問大吏狥隱而不能糾非特遣大臣巡察難以袪除積弊直𨽻為畿輔重地尤當首先澄清今應遣大臣一員前往㑹同該撫巡歷地方有勢要豪強旗人莊頭大為民害者廉訪真實惡蹟指名題參重加懲處以警奸徒用安良善副朕移易風俗愛飬民生至意應遣大臣爾部即開列具奏特諭康熙二十一年七月初四日諭户部尚書梁清標侍郎李天馥運丁輸挽糧儲備極艱苦朕時在念浙省運丁錢糧有未經全復者今應否全復著議奏康熙二十一年七月二十八日諭兵部近因逆賊蕩平四方底定將經制之外增設緑旗兵丁議令裁汰於二年內陸續報完原以寬恤民力敉寧地方今思各處兵丁多有隨征進剿效力行間綿厯歲時備嘗艱苦事平回汛若漫無分别一概裁汰深為可憫著該督撫提鎮等官於裁汰之時詳加察閲不得混留私人反將曾經效力兵丁輒行裁退至於已􅥘兵丁及投誠歸農人等恐有無籍可歸艱於生計者著各該地方官設法安插善加撫輯務俾有以資生母致流離失所擾纍平民爾部即通行申飭經管文武大小官員實心奉行殫力料理以副朕恤兵愛民至意特諭康熙二十一年七月二十九日諭議政王貝勒大臣內閣九卿詹事科道傳諭王進寶趙良棟前逆賊竊據漢中四川等處地方悉力固守在外領兵諸將咸以恢復為難因特遣學士希福馳往傳諭從來漢將所轄地方猝有變亂即用漢兵勘定原無待借力於滿兵之事爾等皆封疆大臣久歷戎行應各率所𨽻部曲將士相機進取時趙良棟即首先倡議應行恢復隨允良棟議刻期進剿於是爾等同往克取漢中王進寶自蘭州失守遂率兵乘筏渡河恢取蘭州鞏昌等處剿禦賊寇所向奏功及同取漢中之後意見不合嫌隙漸生遂爾分路進兵趙良棟直取成都王進寶恢復保寧若成都不下則雖攻保寧未易即拔若保寧未克則雖下成都難以固守勢必復退是爾等二人功績俱著封疆使能公爾忘私和衷共濟即統士卒乘勝長驅則滇黔賊寇可以計日殄滅何復遷延歲月遲至一二年之久耶且爾等既克四川賊衆膽落遂悉其精鋭入川抗拒雖中路空虛大兵得乘機進取沅州鎮逺貴陽等處而川中賊勢復張已恢之疆土幾致再陷此皆由爾等不能和衷之所致也爾等賦性鹵莽不諳大體各懷私忿互相攻訐屢疏求勝交圖陷害朕當爾等訐奏之初即已洞悉情事念爾等功績竝茂惟欲保全絶無深究之意且一切投誠人員有免其前罪者有仍加録用者况爾等建功之臣耶今爾等俱至京師如欲治罪何難逮問重處但朕意終以曲全為念特將爾等互訐章奏俱行發還槩不究問其遲於救援失陷地方關係軍機等事者仍照例察議此非為爾等二人調解朕深惟國家大體務欲保護勞臣用全終始故兹申諭自今以往爾等其洗心滌慮各改前愆消釋私嫌共矢忠藎以副朕優待功臣至意康熙二十一年九月初一日諭禮部古帝王敦崇孝治恩篤懿親生則被以寵榮歿則優加追恤歷稽往牒典例攸存孝康慈和莊懿恭惠崇天育聖章皇后之母誥贈一等公佟圖賴妻誥封一等公妻一品夫人覺羅氏育秀名門作儷巨室誕育皇妣衍慶𢎞長奄逝遽聞朕心深為軫悼應作何恩恤著察例從優議奏特諭康熙二十一年十一月十八日諭兵部國家撫定寰區削平逆亂必資將士之力我太祖太宗訓詰戎兵申嚴紀律信賞必罰懲勸維彰其時行間將帥爭自奮勵所向奏功後因歷年既久奉行少寬人情不無怠弛朕御極以來恪守祖宗成憲每於戎政兵機加意整飭自逆賊叛亂各路將帥統兵征剿行間功罪屢經奏報朕念我國家軍法自昔嚴明稽核殿最務從詳確頻頒詔㫖炳如日星今逆賊殄滅武功告成振旅班師正分别功罪昭示懲勸之時因思軍法固不可寬功罪自宜相抵必酌量重輕情法允協庶俾羣心悅服激厲將來凱旋大兵將帥內現在應議者有直抵雲南建立功績人員應詳察功過准其相抵雖未至雲南果立有大功亦應准抵其未至雲南及竝無大功者仍照軍法處分著議政王貝勒大臣㑹同確議具奏爾部即遵諭行特諭康熙二十一年十二月初九日諭禮部農事為民生之本必雨雪以時庶春耕不誤秋成可期今歲入冬以來尚未降雪愆陽日久時序失宜田畞暵乾恐妨明年東作應䖍行祈禱爾部即照例作速舉行特諭康熙二十一年十二月十四日諭部院大臣從來君臣之分雖甚尊嚴上下之情貴相浹洽嘗觀唐宋盛時堂廉不隔以成交泰之治卿等朝夕勤勞出入奏對朕心時切嘉念今將內廏馬匹及滇中新到馬匹擇其馴良易於控御者頒賜卿等兼以內紵卿等其各承受示朕優念之懷康煕二十二年正月十三日諭朝覲各官爾等各有職掌關係國計民生自宜實心辦理如奏銷錢糧採買米石借端浮冒希圖侵剋審理刑獄顛倒是非稽延歲月致纍平民皆因爾等因循怠玩積弊未除嗣後俱應潔已奉公殫心盡職諸凡公務俱照在內各衙門事例勤慎料理著實遵行乃副朕察吏安民之意爾等若謂道途遙逺所行斃端未必盡知仍沿陋習漫無省改憲典具存決不姑貸爾等悉知欽哉康熙二十二年二月初九日諭刑部國家設立問刑衙門期於明罰敕法弼教化民必審鞫精詳讞決平允而後民情悅服寃抑畢伸近見爾部審理大小事件每多草率因循瞻狥舛錯全無振刷省改如聽訟之時兩造是非自應分别定案因意有偏私往往不問曲直勒令和息或逼撤原狀含糊完結以致奸頑幸免良善含寃又如入官財物奉差籍沒官員不能廉潔自持據實冊報乃恣意侵盜竟飽私囊貪黷成風愍不畏罪殊非人臣奉公守法之誼至於審事官員膠執已見聽斷不公或更改口詞圖遂私意或恐喝犯證不令直供或妄肆株連稽延月日或怠玩疏忽苟且告竣此等斃端種種難以枚舉嗣後堂司各官俱著洗心滌慮痛改前非一切刑名事務必令情法允協無枉無縱恪遵法紀持廉秉公以副委任之意特諭康熙二十二年三月二十二日諭户部黔省為滇南孔道地瘠民貪大兵凱旋挽輸芻糗供應人夫極其浩繁且起解吳逆家口駱驛運送不無苦纍恐小民竭力供億生計艱難朕心深為憫惻所有本年秋冬及來年春夏應徵地丁正項錢糧盡行蠲免以示朕勤恤民隱至意爾部即遵諭行特諭康熙二十二年四月初九日諭大學士勒德洪明珠李霨王熙黃機吳正治學士薩海阿蘭泰石柱王守才金汝祥胡簡敬孫在豐朝廷優恤臣工賜以碑祭之文必使當其實行毋得恣意抑揚撰擬之人親戚同鄉悉宜回避所進刑部侍郎葉方藹祭文著另行撰擬一並奏覽康熙二十二年六月初八日諭刑部人命關係重大凡現審人犯自應早取口供速行完結庶不致無辜久禁囹圄淹滯斃命其中有應行詳審及等候質對者或暫行監候或羈禁各門該管官員亦當嚴加稽察不時照管毋令獄卒及守門人等借端需索恣行凌虐且各犯雖有應得之罪若未死於法先死於獄既非憲典亦干天和朕心尤為不忍向來在外各衙門審理人犯或係監斃或在路物故凡一起內至三人以上者定有處分之例今思內外刑獄事屬一體嗣後在內各衙門及各門監禁人犯一起致斃幾人以上者作何處分著九卿詹事科道㑹同詳議定例具奏爾部即遵諭行特諭康熙二十二年閏六月二十日聖祖仁皇帝御製文集卷十三
