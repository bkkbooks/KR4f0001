body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷二十四銘雕畫盤中果銘惡紫奪朱真贋難分畫工妙手雕刻氤氲雖無佳味亦可成文盤中纍纍案上紛紛出自四季逺貢殷勤混同南北觀覽長欣題跋題沈宗敬畫山髙可以逺望松喬可以多年瀑水長傾碧潭共注怡懷爽神飬心得力處全在筆端文欽若昊天厯象日月星辰敬授人時敬天授時必本之河洛而成矣夫堯之為聖人俯察仰觀得厯象之真惟其敬也非驗之日月星辰何以得授時之凖乎吾思太極者實理之所在隂陽者變化之根源聖人能明此道故因天之所運立制宜民而悉本之於敬焉夫欽天者非一而燦列者不可不察上天之載無聲無臭不可階而升也聖人仰觀蒼蒼一動一靜之中察其所以而知天之所轉紛綸交錯而實有度之可量數之可憑此所以為憲天之道乎夫敬天者非一而長正者不可不知上天之宰沖漠無朕不可私為論也聖人仰觀浩浩實理實氣之中度乎至當而知人之於天裁成輔相而實有智之可殫能之可竭此所以為奉天之道乎夫厯乃紀數數之不明何以言厯自有河洛即有數矣因數之當合者合之當分者分之如度天之三百六十之度合三百六十五日四分度之一其盈者不待言而可知矣夫象乃制器器之不明何以言象自有璣衡即有象矣隨度之當合者合之當分者分之如赤道之十二草四之宫合三百六十五度四分度之一其虛者不待言而可知矣夫日之所躔不離赤道有經而無緯遲速不等若以三百六十度推之則差之逺矣上古自有定見有可考焉日躔不正其影難測漸而冬至黃鐘不可問矣夫月之所離不離白道有緯而合經合朔不勻若以三百六十度推之則速之甚矣上古自有定數有可知焉月離無據相食難明漸而上凌下犯不可凖矣星有恆星五星五星轉太陽而行恆星隨天體而動日星有過不及之理而後有差分之可表辰有定極北極北極運衆星而定干支按度數而分辰次有不可改之道而後無紛更之可憂厯之可數象之可察日月之可評星辰之可定聖人則之而惟人時之重莫過乎耕穫敬天之事莫過乎愛民天之所運雖有紛綸交錯聖人之道實有精一全體所以五氣順布四時和行以此敬天授時其道豈可易乎於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信詩稱文王之聖德曽子舉之以立知止之極焉蓋聖人於人倫日用之常兼明德新民止於至善也此詩之所以詠敬止乎且夫天生蒸民有物有則而文王獨全焉克盡仁敬孝慈信之實而無淺露迫切之意安行之氣象學者豈可不究其精微之藴乎仁者體天之道也必自惻隱之心而始仁者愛人惡人亦是仁也純亦不已之誠先憂後樂使天下家給人足顛連而無告者咸得生全此元者善之長也斯所謂仁之至非以私恩小惠為仁也敬者盡無不敬也必自事君之心而起敬者陳善閉邪亦是敬也純亦不已之誠夙夜匪懈使天下移風易俗民情不能上聞者咸得流通此敬者有諸中也斯所謂敬之至非以擎跽曲拳為敬也孝慈足以立父子之極其唯文王乎蓋孝子之事親晨昏定省視膳問安此謂儀文不足言孝也更有甚者口過怨惡非孝也滿溢髙危非孝也弟子服勞非孝也不讀正書非孝也祇守天經地義必敬必戒兢業自持罔失人子色難之教非聖人其孰能之乎慈父之教子大綱小紀循分自安此謂大義不足盡慈也更有過者溺愛不明非慈也厚敬賊愛非慈也相戾不哭非慈也不教正書非慈也直示天理倫常善繼善述由親及逺罔失喬梓天性之誠非聖人其孰能之乎普天率土莫非王臣柔逺能邇莫非一體非信無可以久德非信無可以感人發號施令一有不信民無所措厚往薄來一有不信逺人不服與人交而不信則為賣友言既出而反食則為欺妄此天衷於人孺子之情也聖人則終身守之矣文王徽柔懿恭小心翼翼能盡仁敬孝慈信所以詩人美之曰如絲之緒愈續而愈長如火之光愈熾而愈烈始終無窮敬無間也企望聖人止於至善何如哉事父母能竭其力事君能致其身誠於事君事親而竭力致身者貴矣夫力之與身於忠孝之大端必盡其誠斯無餘矣今夫人一生之責寧有止乎思三代以上學者皆在務本聖人之教必在明倫吾因之有感焉君子之道莫大乎孝父母天性未嘗一日少忘但為物欲所蔽有時而間則失人子事親之道而背父母慈愛之心當深思襁褓之際至於幼至於長何時不在父母之憂懷體父母飬育之心盡子道精一無二用力於德之本敦行於教所先制節謹度道法之在所必遵凡所以竭其力者自不容於不謹孝子之深愛必有和氣動於中則形於外矢終身之慕也一則以喜一則以懼然究何事而喜也為人子以父母之心為心庶幾立身行道少盡竭力之義乎君子之道莫大乎忠君臣腹心未嘗一念少懈苐為富貴所搖有時而變則失臣子事君之理而忘元首股肱之誼當深思出處之意至於士至於官無處不在大君之覆幬感君父髙厚之恩勉臣職精一無二公爾以忘其私國爾以忘其家效忠勵節威福之不自己出凡所以致其身者理不容於不勤人臣之忠愛必有正氣誠於中乃見於事矢篤棐之忱也一則以憂一則以樂然究何時而樂也為人臣以大君之德為德庶幾鞠躬盡瘁少得致身之道乎若夫竭力以事父母不得父母之歡心徒勞而不得其中致身以事大君不得大君為堯舜貪祿而不得其正受恩而不忍負者為子必孝為臣必忠大哉此言可不勉耶溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説觀聖人廣大靜深之時出兼敬信説之驗矣蓋萬物無不備充積於中而有源本也德之盛感之深非聖人焉能若是乎吾嘗觀夫聖人五德積於中發見於外者皆有本焉天下至理皆由此出人倫要道皆從此敘教思無窮保民無疆仁義禮智容執敬别惟其時矣聖賢之道從此旁通綱常名節亦從此立建極錫福愛民如子格致誠正修齊治平見其出矣極其盛而如昊天其德何如哉吾思聖人非有心於如天也至德廣運四海之利病閭閻幽隱無微不照故溥博即如天乎極其深而如淵泉其德何如哉吾思聖人非有意於淵泉也至德宏深八表之同風中外遐邇皆歸度內故淵泉即如淵乎有時而見也上顧天命下畏民碞以天治人端自君身憯怛之憂中和之色夙夜匪懈使之各治生業則民望之如父母所以見威儀而民莫不敬有時而言也發揮斯道講求經術以民為本當先施仁至誠之意忠恕之風宵旰不忘使之各守知識則民戴之如覆載所以施號令而民莫不信若夫時而行也過化存神德洋恩溥兆民向善薄海從風薰陶漸染樂其樂而利其利口滿擊壤之曲耳飽仁義之聲政事之布民莫不説此可以驗出之時歟蓋聖人紹主敬執中之傳以運乃聖乃神乃武乃文之德民之仰戴夫聖神文武者其敬信與説固有不期然而然者矣聖人本生知安行之資更盡曰仁曰義曰禮曰智之理民之習聞夫仁義禮智者其敬信與説固有莫之致而致者矣後之君子仰望前聖之盛德洵莫可名言哉由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之由文王至於孔子五百有餘嵗若太公望散宜生則見而知之若孔子則聞而知之歷敘道統之傳以明聖賢之經世焉夫孟氏以其見聞之真而歷敘帝王以及孔子也若曰天道不能整齊自有先後遲速時世相承之際以發明內聖外王之道歷聖心傳必有其人而佐之矣吾知稽衆舍己者堯也與人為善者舜也堯之為君也偹道之全明倫之大富而不驕貴而不逸欽明文思民感焉如天神雲日聖人安焉而已舜之為君也仁義之性重華之德明試以功車服以庸度量權衡民依焉致四方風動聖人性之而已稱禹曰文命敷於四海臯陶曰明刑以弼五教者見而知之之徴乎吾思禹之治天下也野無遺賢萬邦咸寧六府孔修而著地平天成之功矣臯陶之為臣也無過不及民協於中四達教化而輔刑期無刑之治矣稱湯曰克寬克仁彰信兆民發明降衷恆性克綏厥猷五百餘嵗之後前聖後聖聞而知之者何如哉稱文王曰至德至純積功纍仁以至緝熙敬止誕登道岸五百餘嵗之後繼往開來聞而知之者何如哉舜言精一伊尹能發堯言執中仲虺能發君臣相得之盛猶目之所覩者乎至於太公望散宜生者輔弼文武如兹迪彛教敬勝義勝之學佐佑文王豈非見而知之乎大聖之所為雖云聞而知之吾思堯舜之道明在典謨其間精一之傳執中之守放勳重華光被四表濬哲文明大禹之樂善湯之解網文武之除暴儒者豈能倣佛其間而擬議之乎天生孔子發明格致誠正修齊治平刪詩書定禮樂後世仰望如天之髙如地之厚如日月之明而不能名言之矣信乎若非聖人萬古如長夜者豈虛語哉蓋孔門賢者顔氏曽氏傳得其宗發揮性理之淵源亦可謂見而知之者也至於孟氏雖隔百有餘嵗身居亂世挺然以仁義為心以道德為本傳聖聖相承之奧闢楊墨異端之誣後人始知有性善飬氣之説矣孟氏之有功於聖門起來學於後世其功豈淺歟夫天道人道必待人而後興古人云堯舜無優劣禹湯文武周孔孟子之傳互相發明若使聖賢不作風教凌敗不可問矣後之學聖人之道者必自孟子始烏鬚文有人進烏鬚方朕笑而辭曰自古帝王鬢斑鬚白者史書罕載吾今幸而斑白矣况在廊廟文武和衷同朕休戚夀考且寧華首之老已過半朝皆賴祖宗積善纍德之效所以受無疆之福得四海餘慶萬類仁夀使元元之衆安生樂業於此觀之可謂足矣但守初保末善後之策顒望日新凡國計民生先憂後樂行發於身者亦不可掩也嘗讀古聖詩書欲得至理倘有一失即不免寖微寖滅之患為君之難可勝言哉宵旰焦勞勤求民瘼未嘗為已有所私也爾之所慮惜吾之老朕之所思務去其偽若能神強氣健雖日理萬幾實不敢辭但諺云老者能忘憊者昏憒此係耆年之所使亦無可奈也漢儒有云正朝廷以正百官正百官以正萬民只宜居易俟命若假為烏鬚以老為少則欺人視聽矣豈朕之所為乎其身不正其令不從故辭其烏鬚方而未免歎心血之太勞耳頌景福宫頌慈顔懿教祇奉銘針福祉靈夀遐齡喜深松筠玉樹繞砌清音淑德純嘏萱枝茂林揮毫敬頌永日葵心寧夀宫頌天開夀域地會瑶池南極添算北辰降慈螽斯衍慶白鶴來儀躬勞著訓福祉永綏恭獻長頌敬託腐詞聖祖仁皇帝御製文第四集卷二十四
