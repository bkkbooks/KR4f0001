body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷八敕諭諭江南總督阿山巡撫宋犖朕為兩河告成楊家莊新河建閘故來巡視因爾等同地方士民所請過江而南見百姓雖不能家給豐裕且幸安居樂業而無菜色朕心少慰矣編氓皆吾赤子數十年休息培養民雖至愚皆已深知所以扶老攜幼日計數萬隨舟擁道歡聲洋溢者降衷之誠也但人多路隘菜花麥秀遍地青苗不能保其無損朕甚惜焉爾等即出示曉諭萬勿踏壞田苗有負厪念特諭康熙四十四年三月二十六日諭江南督撫百姓隨船擁道日計數萬恐人多路隘菜蔬麥苗彌漫田野不能無踐損之虞朕甚惜焉可出示曉諭令勿踏傷康熙四十四年三月二十八日諭內閣禮部原任侍郎勵杜訥供奉南書房三十餘年謹慎勤勞無有過愆以品級不應與諡但從前沈荃曽經與諡勵杜訥亦應與諡以示優恤著㑹同議奏康熙四十四年三月二十八日諭扈從大學士張玉書陳廷敬翰林查升陳壯履錢名世蔣廷錫汪灝勵廷儀等朕萬幾餘暇臨摹古人書法於明董其昌真蹟尤加欣賞兹來松江特書芝英雲氣四大字扁額並於前後書評贊十數行可命提督張雲翼將扁製就往懸於其家又其昌曽孫候選州同董建中家貧可憫著吏部遇就近省分州同員缺即與補授康熙四十四年三月二十九日諭扈從大學士馬齊張玉書陳廷敬頃山東巡撫趙世顯奏三月初三日全省俱得雨二十州縣雨微小七十州縣俱霑足朕時時以農事為念曽問京師來人云三月十六二十四日兩日俱大雨想畿輔地方已皆霑足矣康熙四十四年四月初四日諭扈從內閣吏部翰林侍讀徐倬年踰八十學問淵博可特授侍郎銜以示奬進儒臣之意爾等㑹同議奏康熙四十四年四月初六日諭浙江福建總督金世榮浙江巡撫張泰交福建巡撫李斯義朕頃因親閲河工濟江而南至於浙省見民間生聚殷繁菜畦麥隴遠近彌望農事可冀豐穰朕心用以稍慰凡車駕臨幸之地必大敷膏澤以下逮黎元而各省錢糧屢次遞蠲浙江本年地丁銀米又經全免無可加恩惟是刑獄為民命攸關朕每當重罪奏讞之時常深切矜恤今乘輿所至父老子弟夾道歡迎而身陷囹圄之人獨自新無路朕甚憫焉浙江福建兩省康熙四十四年四月初八日以前凡犯罪詔款不應赦者不赦外其餘死罪以下已發覺未發覺俱著減等發落四十三年秋審奉㫖監候緩決者一併減等發落仍開具人數奏聞爾等其體朕為民巡省布德好生之意即詳慎察明遵行特諭康熙四十四年四月初七日諭江南總督阿山江寧巡撫宋犖安徽巡撫劉光美朕念切民生凡巡幸所經之處咨詢利弊訪問官方未嘗少懈向因江浙人情好尚詞訟因而傾家敗業者往往有之邇來習俗頗覺淳厚詞訟已減大半生聚稍加繁殷雨暘有時麥田茂美朕心甚慰念江寧安徽錢糧已經節次蠲免今車駕親臨特頒沛澤將江寧安徽所屬地方人犯亦應照浙閩加恩概從末減可將康熙四十四年四月二十六日以前凡罪犯詔款不應赦者不赦外其餘死罪以下已發覺未發覺俱著減等發落四十三年秋審奉㫖監候緩決者一併減等發落仍開具人數奏聞使普天赤子咸在化育之中縲絏愚民亦有自新之路爾等其體朕矜恤黎元慎重民命之至意即詳恪察明遵行特諭康熙四十四年四月二十六日諭扈從大學士馬齊張玉書陳廷敬等宋明之時議馬政者皆無善䇿牧馬惟口外為最善今口外馬厰孳生已及十萬牛則六萬羊則二十餘萬若將此馬與牛羊驅入內地牧養即日費萬金不足口外水草肥美不費絲毫之餉而馬畜自然孳息因定額以馬十萬牛六萬羊二十一萬為限向年疫氣盛行䝉古馬畜多倒斃而官厰與彼同在一處毫無傷損前巡行塞外時見牲畜彌滿山谷間歷行七八日猶絡繹不絶也康熙四十四年閏四月初一日諭吏部土司苗人即准其考試用為牧民官亦復無幾部議不准行何所見之淺耶如吳越初不奉中國之化逮後從風服教俱同為中國之人以此例觀即可知矣著俱照該撫所請行康熙四十四年閏四月初一日諭河道總督張鵬翮高家堰石工完者准先與銷算保固三年免其賠修堤根下廢地可諭河兵試令種稻其餘除留取土搶修之地外令捐栽蘆荻以資工料照例議叙康熙四十四年閏四月初十日諭扈從諸大臣及河臣等朕留心河道親閲者屢矣河之形勢必身歷其地始知成功之次第朕每至河上必到此惠濟祠以觀水勢三十八年以前黃水泛濫凡爾等所立之地皆黃水也彼時自舟中望之水與岸平岸之四圍皆可遙見其後水漸歸漕岸高於水今則岸之去水又高有丈餘清水暢流逼黃竟抵北岸黃流僅成一線觀此形勢朕之河工大成矣朕心甚為快然向年自寧夏回曽走黃河察看彼處河勢亦甚險水面有與此相等者有更大於此者張玉書亦曽見之河在口外原走邉地因木難山是一整石山黃河至此觸石而回遂流入中國不然中國寧有此河患耶康熙四十四年閏四月十一日諭河道總督張鵬翮惠濟祠前植標杆處可建挑水壩祠後掃灣處亦宜建挑水壩以保淤灘但此二處挑水壩俱不宜太長恐逼水盡向北岸有礙楊家莊口門卞家汪舊壩修建甚佳再略加寬長更善康熙四十四年閏四月十一日諭河道總督張鵬翮河工積弊汛官利於堤岸有事修建大工得以侵冒河帑又希圖修橋建閘興無益工程於中取利著嚴飭各官痛改前非加謹修防儻有故違定行正法以示懲戒其地方有司官員膜視河工致有貽誤者爾題參到日將地方官亦行正法河官平時須預備物料以為不時修防之需若料物不備遇工程險要倉皇無措雖將該管官重處亦屬無濟康熙四十四年閏四月十三日諭河道總督張鵬翮九里岡堤工修理得法不似從前直掃不能挑溜令修魚鱗掃逐段挺出逼溜開行使窪處漸淤此法甚善其掃工釘樁處可再建挑水壩二座若恐水深則先建磯觜壩形出水俟其壩下漸淤層次加修則料不加多而功易成康熙四十四年閏四月十三日諭山東巡撫趙世顯朕因四方無事車駕南巡得訪民情深知利弊回舟山左見麥秋大熟民無菜色朕心甚慰凡鑾輿所臨加恩宥過企望刑期無刑也東省前歲儉收衣食惟難所以犯法者衆嘗念臨下之道惠化為先原情之仁含育在宥是宜悉除愆咎盡起枯沉可將山東所屬地方人犯亦照江南浙閩恩例槩從末減自康熙四十四年閏四月二十日以前凡罪犯詔款不應赦者不赦外其餘死罪以下已發覺未發覺俱著減等發落四十三年秋審奉㫖監候緩決者一併減等發落仍開具人數奏聞但山東人性强悍輕生為盜者頗多爾等不時訓誨教養以副朕愛惜人命之至意頒示六府曉諭闔省特諭康熙四十四年閏四月二十日諭河道總督張鵬翮山東運河轉漕入京師關係緊要不可忽略朕來時閲視堤岸不堪今回鑾時計期兩三月而堤工修理甚屬堅固嗣後當照此加謹修理不可因朕已經閲過致有懈怠爾宜識之運河各閘照依漕規啓閉有勢要官員經過不許狥情擅自開放泄水以致漕船稽遲違者朕決不宥康熙四十四年閏四月二十一日諭河道總督張鵬翮高家堰每堡設立防險人員關係最為緊要現在防險各員俟秋汛後察明分别去留至簽釘救生樁木全活人命甚有禆益但釘過六處係險要之地其空處尚多全湖俱釘救生樁木約需銀五六千兩朕於內帑節用之銀發往修建務期救濟民生不動部撥錢糧爾即估計具摺遣人奏聞康熙四十四年閏四月二十一日諭河道總督張鵬翮戴村壩遏汶水出南旺分濟南北運道關係緊要總河巡撫應各差官前往看視康熙四十四年閏四月二十一日諭內閣開科取士以能明經義為重若增入詩賦則士子攻習詞章反於經義疏淺甚非國家磨厲實學之意今闈試届期俞化鵬妄請更張成法大不合理該部覆議允行亦屬不合可下㫖通行嚴飭康熙四十四年五月初五日諭户部聞廣平縣地畞被淹百姓苦纍輸納額賦甚屬艱難著該撫察明停徵俟田地涸出之日開墾起科以紓民力康熙四十四年五月初五日諭大學士馬齊席哈納張玉書陳廷敬等本內請免帶徵拖缺錢糧一事最當斟酌凡免來年錢糧必於歲前傳諭者特使百姓預知蠲免不為有司所欺耳今於免賦之年仍令帶徵舊缺則不無朦混徵收之弊此事行自何年爾等察明具奏康熙四十四年五月初八日諭户部凡撥餉應就近撥給將直隸錢糧撥與江寧該部原撥時即誤矣今又將直隸應解部錢糧發往俟秋收後方得起解則遲誤益甚著另議具奏兵餉關係緊急此後撥餉務於就近省分撥往勿致有悮康熙四十四年五月十二日諭户部嗣後蠲免新年錢糧如併免積缺則帶徵俱免如止蠲本年錢糧無免舊缺之㫖則所有舊缺錢糧俱於次年徵收蠲免之年概不得開徵永著為例康熙四十四年五月十九日聖祖仁皇帝御製文第三集卷八
