body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十六古今體詩三十八首千叟宴百里山川積素妍古稀白髮㑹瓊筵還須尚齒勿尊爵且向長眉拜瑞年莫訝君臣同健壯願偕億兆共昌延萬幾惟我無休暇七十衰齡未歇肩朕自幼不喜厚味今年登古稀深知粗食軟𬞞足以頤養天和有人進蔞蒿苦麻者因而書懷淡泊生津液清虛樂有餘鬢霜慚薄德神􅉵恐髙譽苦好山林趣深耽性道書山翁多耄耋粗食並園𬞞題新安道上滿目平川映逺空身形少健一衰翁社前荷鍤爭春暖隴畔扶犂趂晚風雨澤深邀天地德耕桑還賴穡人功京南每出同村叟總得陽和一氣中示平藏將士去年藏裏凱歌回丹陛今朝宴賞陪萬里辛勤瞬息過歡聲載道似春雷六十一年春齊戒書性理參天地經書輔國朝勿勞民力盡莫使俗氛囂不悮農桑事須輕內外徭風髙林鳥靜雨足路塵消視察焉能隱行藏豈可搖桑榆雖景暮松柏後霜凋長養春容盛寬嚴君德調倦勤應不免對越愧明昭園中無處無花觸目皆是故作此自嘲無花無酒亦氤氲况有清香到處聞萬紫千紅雖瞬息古稀吟詠忘辛勤端陽春夏連年旱魃災雖逢令莭免流杯清和幸得甘霖霈競渡蒲樽覽一回久旱無雨夙夜倣徨夏至前方得普霑喜雨雖云快豈無久旱由望雲待旦起問夜數更愁霹靂偏稽候雷遲小滿後方有聲風霾任作尤西成登榖後方慰憫農憂豐登者朕之獲福歉收者朕之失政出此入彼不能自恕故作近體一律以自遣喜雨人同我不然鰓鰓宵旰待豐年千村時若千村慶一日恆暘一日愆率土盈寧難並得普天恩澤豈兼全先憂後樂何能遂衰景殘齡秖自憐避雨聞鐘雨阻端陽湧翠隈荷香瀑水㸃新苔午鐘忽送曇花曲那得閒心笑幾回同老侍衛龎眉經嵗月憶昔舊人稀少小兒童戲年髙親故違歎無手足力偏有友朋譏膝下曾孫事怡情待晚暉佛桑花木槿層樓號佛桑新移逺道愛芬芳開時先占榴花艷留日還同菊蕊香京中報到霖雨普霑亢陽愁久旱霖雨滿溝渠倐忽枯枝潤須臾卷葉舒千村勤襏襫萬頃促犂鋤企望收成後欣看榖賤書夏至山莊逢夏至齊戒禁中同翠渚萍先緑荷池花未紅葛衣求體便𬞞食養心功偶得因幾暇偷閒碧樹叢山莊晚眺島嶼堪圖畫溪橋宛自成池邊樹影接峰外月華生衆鳥巢簷穩羣獐伏地平無知知德化推擴至民情登四面雲山雲梯石磴逼巃嵸倚杖傍觀衆壑同更上一層圖逺望奈何樹雜與烟籠夏日山莊百花齊放咫尺雄關一線墻景風已拂尚芬芳近都愛此清凉地逢草逢花莫不香題山水畫嶺岫嶔﨑路渺茫畫工摹寫各舒長雲峰四起添山色竹樹重隂致夏凉最愛蕭踈隨意筆可稱流動賞心方依稀岩洞神仙住那得閒情問草堂山中自詠一生何事不斟量老至偷閒自可傷倦體每思依石憩俗情且喜對山忘舂容無計尋方便荏苒誰能駐景光濯足滄浪清水在企思歸詠舞雩傍山居迎薰避暑駐山莊四顧重重邱壑長雨後雛鶯歌密樹風前練雀舞斜廊靜觀得趣無非景佳興涵虛可致凉烹茗汲泉清意味箇中誰解有真香戲作回文年豐足雨和時榖賤家家展眉專意民安物阜先為德廣恩施題畫敞懷瀟灑馭風仙散慮逍遙不記年名利牽情忙若輩方知憂樂豈兼全早御稻紫芒半頃緑隂隂最愛先時御稻深若使炎方多廣布可能兩次見秧針題畫隔溪隱隱見窗紗幾度呼童問酒家尺幅林巒分逺近畫工濃淡最堪誇挽總督趙宏燮四十餘年撫近京旗民稱善政和平保全終始君恩重奄逝悲凉衆涕盈不畏刁頑持法紀久司鎖鑰務精明官方仍在歸泉壤節鉞空懸攬轡情自笑古稀月宇啓窗紗身閒興轉賖龎眉臨事暗垂老厭人譁懶惰心惟靜精勤目已花臨池慚手澀無復競龍蛇立秋在六月庚伏雖云盡依然六月中歊蒸臨水榭溽暑望金風未變楸梧色還舒菡蓞紅杖藜西顧意數問奏邊功憶陜西長安城闕昔曾遊黃水名山宛在眸清渭東流流自在陽關逺去去何休民稠地險人難化榖賤年豐信有收衰老無能再一覽緬懷西顧愈添愁其二秦嶺河西風俗淳尚餘剛徑氣難馴寬嚴相濟毋偏執教養兼施在體仁官久每聞滋反覆吏新未曉作陶甄小詩自覺乏文麗可盡𠂻腸對士民月來香月色東升候晚明金風初到吐芳英忽聞香撲紗帷近更覺游仙夢轉清膳酒自述盈餘休說帝王家儉朴身先務戒奢盛饌醇醲應有損野𬞞風味亦堪嘉樽中㫖酒無能飲案上珍肴勿過加淡泊寧心和五味養身得正勝丹砂樹葉扇葉緑存生氣香清却暑風輕搖能夏􅐩巧製見人工惡繁華村野無知太古風心依先進是吾𠂻不須問到繁華樂願與生民遡受中書懷不逮精神老愈愁銀鬚鶴髮更何求艱難世事危心力履薄臨深豈自由中元日同僧語夙夜焦勞白髮盈愁腸一日幾回縈偷閒暫向山僧話可掃塵緣愛憎情喜嶺外水土露凝肥草净無塵處處泉源漾碧津食少事多宵旰老暫偷閒暇養吾身六十一年秋出哨嵗嵗經行處山川照舊時峰巒不改色鬢髮已如絲勝地清凉適衰年水土冝非因耽逸豫實借憩神思隔嶺疑圍濶聞聲呼鹿隨歸營常早歇撫景自堪怡行伍原齊偹屏藩任指麾薄來厚往義逺近普恩施回鑾獵罷回鑾塞冷時旻天今嵗落霜遲圍人競帶甘肥脯田叟爭收髙下􅓱榖賤共知欣有食物多須記守長規西成盈野倉箱滿關內依然是所思聖祖仁皇帝御製文第四集卷三十六
