body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷二十六雜著講筵緒論計四十六則大學一書言明德新民誠修已治人之要道也千古君道之隆莫過於堯舜觀克明峻德以親九族平章百姓協和萬邦此正大學修身教家由家及國由國及天下之理然必已德既明而後可推以及人故大學以愼德為本古人有言反經合道謂之權先儒已有論其非者天下止有一經常不易之理權衡輕重隨時斟酌而不失乎經常之理此即所謂權也豈有反經而可以行權者乎古稱慶都感赤龍之祥孕十有四月生堯此等事先儒常疑之正孟子所謂盡信書不如無書之意也蓋聖人不語怪以垂戒於世而後人猶有矯誣上天侈言祥瑞之事况敢從而啓之乎前代治河皆以為宜疏決而放之海則永無河患但今運道自淮以北必由黃河一百八十里而後達於運河與古形勢不同則古説亦何可盡行也論才則必以德為本故德勝才謂之君子才勝德謂之小人司馬光之言洵為篤論寬𢎞容納正所以開敢言之路而使人得盡其言舜之大智全在於此從來有生知有學知有困知而及其成功則一未有下學既久而不可以上達者但功夫固不可躐等而進尤不可半塗而止為山九仞功虧一簣此正謂半塗而廢者也孟子一書言仁義最為親切最為詳盡為功於後學不淺中庸言至誠至聖贊化育參天地制度考文之盛聲名洋溢之逺可謂費矣究竟上天之載無聲無臭何其隱也中庸之旨大約不外於費隱前代所造渾天儀未嘗不善但世久法湮交食錯亂不能枚舉曾講究古法新法故知其槩古法推算冬至及日月交食多用積數因數多奇零盈縮虛實之難明不能合於天新法多用餘數及濛氣差之類又驗之於測景故較之古法僅能與天象相合咨詢固宜廣攬而衆好之必察焉衆惡之必察焉又不可不詳加審辨也唐人詩命意高逺用事清新吟詠再三意味不窮近代人詩雖工然英華外露終乏唐人深厚雄渾之氣書謂刑期于無刑古來任人而不任法故常原情輕重未嘗膠於一定所以宥過無大刑故無小後世人情巧偽日滋輕重大小不得不斷之一定之法此亦勢之不得已也大禹謨帝德罔愆一節常涵泳理會其贊帝舜如天之仁該括已盡如與其殺不辜寧失不經二語覺聖人慈愛惻怛之意千載如見儉以成廉侈以致貪此乃理勢之必然者國家刑法之制原非得已然懲警姦慝又不可無每於刑法必反覆祥愼期於至當未嘗一事有所輕忽人臣進言固當直切無隱人君納諫尤當虛懷悅從若勉聽其言後復厭棄其人則人懷顧忌不敢盡言矣每閲唐太宗魏徵之事歎君臣遇合之際千古為難魏徵對太宗之言臣願為良臣毋為忠臣嘗思忠良原無二理惟在人君善處之以成其始終耳朕每有巡幸即留心訪察民間利斃政治得失如河工一事屢年衝決雖由水勢泛溢亦間有不肖小吏利於興工往往為此旋修旋決遂成河患若竟聽之入海則運道淤塞不通近簡命河臣董理辨其水勢疏其故道嚴察下吏重其考成果能實心行之庶或一勞永逸閲禹貢注中所釋九河諸説紛紜亦無確見大約書史經秦火以來上古事已難於考證後人以意求之豈能吻合曩巡幸薊州盤山時侍臣奏盤山佛寺有佛骨佛牙因言佛牙闊二寸許長過之比諭之曰古所謂聖賢皆與人無異故學堯則可至於堯學舜則可至於舜能忠則為忠臣能孝則為孝子此聖賢所以可貴也若爾所言佛牙之大如此則佛本天地間奇異之人生來便不可學又何用尊奉為哉言者無以對雍州西北之地古稱沙漠向來人迹罕通是以紀載所傳多未詳確今皆奉車書往來故知之獨詳大約甘肅之西從長城外至四川松潘止十餘日可達導江雖始於岷山其實江源尚在茂州之西至岷山始大耳黃河自積石北流為河套之地至延安府入陜西境其地亦不甚逺今阿爾多斯固山之地即是也言治河者謂宜順其入海之性不宜障塞以與之爭此但言其理耳今河決在七里溝去海止四十餘里若聽其順流入海既可不勞人功亦且永無河患豈不甚便但淮以北二百里之運道遂成枯渠國計所關故不得不使其迂回而入淮河之故道此由時勢與古不同也古人所謂民可近不可下者即孟子所謂民為貴之意蓋天視自我民視天聽自我民聽斯豈非邦本之謂乎臨民以主敬為本昔人有言一念不敬或貽四海之憂一日不敬或以致千百年之患禮記首言毋不敬五子之歌始終皆言敬愼大抵誠與敬千聖相傳之學不越乎此今人沿於明季陋習積漸日深清操潔已難言之矣職守亦多至曠怠罕能恪勤朝廷良法美意往往施行未久即為叢斃之地常欲化導轉移每患積習之難去也書言推亡固存此正中庸所云因材而篤栽培傾覆之意王者體天心以為賞罰正宜如是人君以天下之耳目為耳目以天下之心思為心思何患聞見之不廣觀舜以好問好察而稱大智則知自用則小者正與之相反矣書中義理原自完備惟在詮解明白加以反覆玩味自然旨趣無窮若多為援引反致書理不能豁然矣嘗觀古來帝王如唐虞之都俞吁咈唐太宗之聽言納諫君臣上下如家人父子情誼浹洽故能陳善閉邪各盡所懷登於至治明朝末世君臣隔越以致四方疾苦生民利斃無由上聞我太祖太宗世祖相傳以來上下一心滿漢文武皆為一體情誼常令周通隱微無有間隔一遊一豫體恤民情創作艱難立萬世不易之法朕雖涼德上慕前王之盛事凛遵祖宗之家法思與天下賢才共圖治理常以家人父子之誼相待臣僚罔不兢業以前代為明鑒也人君出入警蹕固宜嚴肅朕見明朝之君高居深宫過於安逸凡郊祀偶出所乘之輦皆鐵絲作幃以防不測人君臨御天下以四海為一家當使遐邇上下傾心歸慕若刀矢可加於輦幄之中則人心離二雖鐵壁何益故古來賢聖之君尚德不尚威也詩以吟詠性靈如唐太宗諸篇未有不以天下黎民為念者歐陽修憎蒼蠅賦題雖小喻讒人亂國意極深長每喜讀之君臣之際當使情誼浹洽則下志得以上通孔子所謂君使臣以禮孟子所謂君之視臣如手足皆此義也書云德無常師主善為師善無常主協于克一此節大旨不外博約之義嘗閲直解有云聖人之取善如冶人之鍊金或取之於沙或取之於水曾無定在所謂德無常師也逮既鎔鍊之後沙者忘其為沙水者忘其為水但見其為精純之金所謂協于克一也此喻可謂明切世風澆漓人皆不能潔已自愛故今日求操守廉介之人甚難或僅能自守而其才不克有為當理繁治劇之時又苦於不能肆應可見人才之難也昔人曾有論高宗以舊勞于外幼居民間當必久知傅説之賢而思用之恐人未信而託為帝賚之言此論甚是蓋恐後人藉口神奇以開矯誣之漸也端人正士當與之日親自有啓沃開陳之益此古人所以重朝夕之納諫也若小人日近則不覺其損而自損矣講書以明理為要理既明則與古人之説無往不合此所謂一本散為萬殊萬殊歸於一本博約兼資之道也自幼讀書凡一字未明必加尋繹期無自欺不特讀書為然治天下國家亦不外是也書云惟斆學半此句有二説一説自學與教人功居其半一説教者之指授僅示以半其餘必待學者之自悟直解亦主後説注以其近於禪家解悟機鋒而闢之是也異獸珍禽雖古人所不尚但西洋逺貢來京跋涉艱阻多歷歲月誠心慕化良為可嘉却之非柔逺之道故留畜上林非侈苑囿之觀也讀書以有恆為主積纍滋灌則義蘊日新每見人期效於旦夕常致精神誤用究歸無益也嘗詳覽古人詩文造語精微才學兼到閲之似易效之甚難故云讀書萬卷方能下筆有神更須善運古人於筆底化陳腐為清新斯為盡善人君惟敬修其德以與天意相感孚不必指何事為何德之應總之和氣致祥乖氣致戾乃古今不易之恆理遇祥益謙遇災知警乃人君應天之實事亦無時不致其謹凛而已通鑑前編所引諸説雖皆古人遺書但不若朱子綱目切要純正古史中如黃帝鼎湖乘龍及周穆王宴於瑤池之事皆非正史所傳雖文章中嘗採用之不過資其華藻以新耳目其實不足信也聖祖仁皇帝御製文集卷二十六
