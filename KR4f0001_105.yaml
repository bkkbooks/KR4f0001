body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷七勅諭諭吏戸兵工四部朕統莅寰宇二十八年於兹早作夜思勤求治理務恤黎庶永圖乂安如黄運兩河運道民生攸係朕日切心勞比年工役雖漸有緒而應修應塞議論紛紜曩嵗巡幸曾允淮揚士民所請疏濬下河前已興工尚稽底績屢經廷議請朕親行閱視今特諏吉南巡躬歴河道兼欲觀覽民情周知吏治所至沿途供億皆令在京所司儲偫一切不取之民間即有日用應需該衙門於所在地方照市估平買不許錙銖抑勒小民猶恐地方官吏不能悉體朕懐借名科派供應今特頒諭嚴飭如有悖㫖借端私征者察實即以軍法從事地方文武大小官員不許與扈從官員指稱交戚輒通餽遺違者餽送收受人員並以軍法從事其扈從大小官員及随往傔役如有横行生事擾民者一并從重治罪朕兹巡省原以軫恤編氓咨諏風俗凡經過地方百姓各安生業務令廛無廢市隴不輟耕毋得倉皇驚避輒滋煩擾其軍民人等懐奸挾詐希逞私憤擅於駐蹕處所瀆行告訐者一槩嚴禁倘有妄控除所告事不與准理外仍嚴加治罪尔部即傳諭扈從大小官員人等並行令各該督撫於府州縣城市邨莊窮鄉僻壤徧懸告示備行曉諭務令通知以副朕恵愛元元至意特諭康熙二十八年正月初二日諭扈從部院諸臣朕巡歴所至再經岱麓重瞻祠宇詢其廟祝知香火荒涼日用難給岱頂諸廟亦復如之念泰山為五嶽之長載在祀典有功社稷不宜使之漸就寥落合將每嵗香税錢糧内量給數百金使上下嶽廟與元君諸祠守祀者得有資賴曉夜盡心兼可時加修葺以壯往来觀瞻示朕崇祀之意尔諸臣即與山東巡撫藩臬會議以聞康熙二十八年正月諭山東巡撫錢珏朕軫恤民隐載舉時巡懋宣徳化勤求疾苦比至山東所經城邑百姓扶老攜幼夾道歡迎朕問及連嵗順成民生少得安業苐思百姓足則國家充裕若期比户豐盈必以蠲租減賦除其雜派為先邇年以來各省地丁錢糧已經節次豁免山東地丁正賦意欲來嵗蠲除兹因巡幸至此特先諭該撫速行曉示日傳三百里遐邨僻壤咸使聞知以副朕省耕問俗之意特諭康熙二十八年正月十五日諭總督傅臘塔王騭巡撫洪之傑金鋐朕因省察黎庶疾苦兼閲河工巡幸江南便道至浙觀問風俗簡約儀衞鹵簿不設扈從者僅三百餘人頃經維揚民間結綵歡迎盈衢溢巷雖出其恭敬愛戴之誠恐致稍損物力甚為惜之朕視㝢内編氓皆吾赤子惟使比戸豐饒即不張結綵幔朕心亦所嘉悦前途經歴諸郡邑宜體朕意悉為停止又見百姓老幼男婦奔走雜遝瞻望恐後未免喧譁擁塞念此行原以為民不嚴警蹕但人衆無所區别高崖水次或有傾跌之虞一夫不獲其所足軫朕懐此後止於夾道跪迎勿得紊亂追趨致有諸患著即詳加曉諭使知朕愛民切實咸為遵行特諭康熙二十八年二月諭皇太子朕自出京以來歴經河間府與山東之徳州濟南泰安沂州江南之宿遷清河渡黄過淮安高郵揚州諸處見一路百姓扶老攜幼夾道歡迎者日有百萬諮問民情皆曰數嵗豐登民生樂業加以連嵗蠲免錢糧禁止雜派鄉紳士庶咸被恵澤無可為報惟祝華封願萬夀無疆而已朕思何徳感動億兆之歡心以至於斯況天下至大黎首至衆不加勉强如出於一或有實政及人之深耶昨又特蠲江南全省歴年積欠帶徵錢糧二百二十餘萬無非使民已足而益求其足之意諭㫖既下歡呼載途吏民咸謂更得休息矣一路晴霽寒暄得宜朕體甚適不必為念知皇太子近狀俱佳亦慰朕懐故特宣示康熙二十八年二月諭扈從部院諸臣朕稽古省方咨求治理閲視河道期底平成凡有利於民生必令霑夫實恵兹行次浙省禹陵在望念大禹功徳隆盛萬世永賴應行親詣以展企慕之忱其致祭典禮所司即察例舉行政治所先在崇文教江南浙江為人文萃集之地入學額數應酌量加增永昭𢎞奬著該督撫詳議奏請江寧鎮江杭州駐防滿洲漢軍兵丁鎮守要地久歴嵗時深用軫念應作何恩賚以彰優恤著該部議奏自南巡以來所經過地方官員除八法處分及列欵糾劾外凡因公詿誤降級留任者俱准與開復降級調用者著帶所降之級留任其經過地方見在監禁人犯除十惡及詔欵所不赦等罪並官員犯贓不宥外其餘自康熙二十八年二月十一日以前死罪及軍流徒罪以下已結未結俱著寛釋以示朕赦罪宥過之意備辦船隻地方各官効力勤勞著該督撫會同奉差官員確查具題各加一級縴夫供役勞苦亦著該督撫察明人數量給恩賞朕厪念民依特蠲租賦總期實徳潤澤蒼生近見民間有建立碑亭稱頌徳意者雖出羣黎感戴之誠但恐各郡皆然未免致損民力誠使閭閻殷阜則裨益良多碑亭何與焉嗣後亦宜停止江浙錢糧既經蠲豁猶慮有不肖有司借端詞訟朘削民生著該督撫嚴行禁飭至各處𣙜關原有則例朕舟行所至諮訪過關商民每不難於輸納額税而以稽留闗次不能速過為苦𣙜闗官員理宜遵奉屢頒諭㫖恤商恵民豈可反貽商民之累自今應力除積弊凡商民抵闗交納正税即與放行毋得稽留苛勒以致苦累違者定行從重處分朕早夜孜孜惟冀官吏軍民士農商賈無一人不獲其所故於民生吏治圖維區畫務極周詳尔等可即傳諭俾一體奉行稱朕意焉特諭康熙二十八年二月十一日諭浙閩總督王騭朕巡行江表緬懐禹徳躬率羣臣展祭陵廟顧瞻殿廡圮傾禮器缺略人役寥寥荒凉增歎愚民風俗崇祀淫祠爼豆馨香奔走恐後宜祀之神反多輕忽朕甚慨焉在昔帝王陵寢理應隆重培護況大禹道冠百王身勞疏鑿奠寧率土至今攸賴豈可因循特書地平天成四字懸之宇下著地方官即加修理畢備儀物守祀人役亦宜增添俾規模𢎞整嵗時嚴肅兼賜銀二百兩給與守祀之人此後益令敬慎地方官亦須時為留心以副朕尊崇遐慕之懐其即遵諭行特諭康熙二十八年二月十六日諭扈從部院諸臣朕巡省民生風俗行次浙江見省會兵民俱相和輯生齒蕃庶閭里乂安但觀民間習尚好行爭訟爭訟一興則不肖有司因縁詐索勢所必至縱或官員無所朘削而胥吏作奸究不能無私行勒取之弊小民之牽連苦累者多矣夫微忿不捐搆成嫌怨小則耗損物力大則傾隕身家其為蠧害不可勝言矜此愚民允宜深戒地方大小衙門官員亦應各簡詞訟勸導閭閻俾守分息爭共安生業又夙聞東南巨商大賈號稱輻輳今朕行歴吳越州郡察其市肆貿遷多係晉省之人而土著者盖寡良由晉風多儉積累易饒而南人習俗奢靡家無儲蓄日所經營僅供朝夕一遇水旱不登則民生將至坐困苟不變易陋俗何以致家給人足之風尔等可傳諭將軍總督等令家喻戸曉務使敦本興讓崇儉黜浮兵民日益協和風俗日益淳樸詞訟日益減少積貯日益豐盈則敎洽化行朕心實嘉賴焉特諭康熙二十八年二月十七日諭内閣朕巡行南省往視河道江南淮安諸地方自民人船夫皆稱譽前河道總督靳輔思念之不忘且見靳輔濬治河道上河隄岸修築堅固其於河務既克有濟實心任事勞績昭然曩革職太過其以原官致仕例復其原品康熙二十八年三月二十一日諭戸部國家設官榷税原以通商裕課利益民生非務取盈致滋紛擾朕巡行地方軫恤民隐諮諏利弊有應興革者即見諸施行近聞江浙閩廣四省海闗於大洋興販商船遵照則例徴取税課原未累民但將沿海地方採捕魚鰕及貿易小船槩行徴取小民不便今應作何徴收俾商民均益著九卿詹事科道會同確議具奏特諭康熙二十八年閏三月初十日諭刑部時已入夏天氣亢暘農事方殷雨澤未降朕軫念民依深為惓切或因刑獄中有無知罹法審擬失平情罪未符致干天和亦未可定兹特遣阿蘭泰徐元文會同三法司將已結重案見在監禁者逐一詳加審理凡有罪可矜疑即與察明事由開列具奏務俾情法允協不致淹滯圜扉以副朕省刑恤民至意特諭康熙二十八年閏三月二十八日諭内閣頃者時已初夏雨澤雖降而猶未霑足其命禮部照前祈禱之禮三日禁止殺牲不理刑名事務䖍恭齋祓以祈甘雨特諭康熙二十八年四月十三日諭大學士伊桑阿今嵗旱已久其傳諭九卿詹事科道朕與卿等靜䖏以俟之耶應行應革事有無耶抑何以禱祀而求之耶其會同詳議以聞康熙二十八年四月二十七日諭禮部時已仲夏雨澤未霑農事堪憂已經遣官於太嵗天神地祗諸壇祈求未應朕衷夙夜靡寧今特遣官於天壇地壇社稷䖍行禱祀尔部即察例擇期來奏特諭康熙二十八年五月初六日諭禮部自春徂夏時雨愆期朕念切民生躬自刻責祗被齋居戒飭臣工共圖修省曾經遣官遍禱天地神祗微雨雖降未沛祥霖今三伏届期農事可慮朕心彌切焦勞不遑寧處兹仍潔誠齋戒特遣官於天壇䖍行禱祀尚期仰格蒼昊下拯黔黎尔部即察例擇日來奏特諭康熙二十八年六月初四日諭大學士伊桑阿阿蘭泰學士凱音布朱都納邁圖索諾和西安郭世隆八旗㕘領佐領有職任之官多有以疾告休者此中亦有以不能騎射畏憚而求罷者夫管轄職任仍須得舊人為佳其傳諭八旗都統副都統等自是以後若此告休者詳察之果疾病不可支者允其休可也若雖不能利於騎射而能管轄者仍留用之康熙二十八年六月二十五日諭禮部欽奉皇太后諭㫖皇貴妃孝敬性成淑儀素著鞠育衆子備極恩勤今忽爾遘疾勢在瀕危予心深為軫惜應即立為皇后以示寵褒欽此前者九卿諸臣屢以冊立中宫上請朕心少有思維遷延未許今祗遵慈諭立皇貴妃佟氏為皇后應行典禮尔部即議具奏特諭康熙二十八年七月初九日諭禮部皇后佟氏淑徳夙成芳徽懋著侍奉皇太后克盡孝誠撫育諸子悉均慈愛禔躬敬慎御下寛仁式備儀型宫闈胥化頃遵慈諭作配朕躬尚期内治之永襄何意沉疴之難起兹於康熙二十八年七月初十日崩逝睠懐懿範痛悼良深宜有稱諡以垂永久著内閣翰林院會同擬奏其應行典禮尔部詳察速議具奏特諭康熙二十八年七月十五日諭戸部朕前巡幸江南凡所經歴於編氓疾苦必詳加體察如傷念切每沛恩膏朕過邳州親見彼處田地多為水淹沒耕耘既無所施賦税如何取辦其現在被淹田畞應納地丁及漕項錢糧俱行蠲免歴年逋欠亦盡與豁除該督撫即行出示徧曉窮鄉仍不時亷察儻有不肖官員仍行私征者題㕘從重治罪以副朕愛惜民生至意尔部即遵諭行特諭康熙二十八年七月二十二日諭戸部今嵗天氣亢暘雨澤鮮少畿輔地方雖不時間已得雨然或甘澍未敷或播種後時收穫失望窮民閲歴冬春難保必無艱食用是朕衷預念軫恤加殷著差尔部賢能司官會同該撫於州縣等處徧行親歴詳加察勘其有果係被災者作何贍救使不罹患害著一併察議具奏特諭康熙二十八年七月二十二日諭吏部自古帝王撫馭寰區端賴宫闈之助惟后徳之賢淑王化本源繫焉内治綦重典禮宜隆爰考歴代冊立中宫即推恩所生錫之封爵載在彞章其來舊矣緬維大行皇后性秉柔嘉心存恪慎溥寛仁而逮下崇節儉以持躬奉事重闈克抒誠孝撫育衆子均被恩勤方作配於朕躬冀永資夫壼敎忽爾崩逝殊悼朕懐禮已備乎榮哀恩未加於戚畹内大臣舅佟國維乃大行皇后之父也勲舊懿親忠貞世篤勞勩夙昭乎環衞謀謨允贊乎巖廊兹奉皇太后慈諭大行皇后誕秀名宗丕彰令範懿徽遽謝悲怛滋殷思后徳之流芳洵良臣之毓慶宜加峻秩以協典章朕恪遵慈命特錫殊恩佟國維著封為一等公給與誥命世襲罔替尔部即遵諭行特諭康熙二十八年七月二十八日聖祖仁皇帝御製文第二集卷七
