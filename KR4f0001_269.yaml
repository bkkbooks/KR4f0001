body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集巻三十六雜著古文評論韓愈論佛骨表義正詞直足以祛世俗之惑允為有唐一代儒宗禘祫議禘祫之議紛如聚訟此論折衷衆議條貫井然復讐狀典據精核益知經術之重論今年權停舉選狀於論事之中暢發閎議愈文徃徃有此所以迥出諸家之上原道奥衍閎深理純辭達荀揚輩未足方駕也守戒體局峭嚴字字精采杜牧守論蓋祖述此篇而氣之雄健則逺不逮矣師説提一道字為主識解最髙而用筆尤極其古峭張中丞傳後敘敘致曲折如畫真得龍門神髓非徒形似也爭臣論一解一難開闔有法答李翊書好學深思讀書養氣昌黎一生得力略盡此篇答劉正夫書於樸茂中獨見風骨與孟尚書書昌黎文最為古峻今觀集中言理諸篇皆坦夷直截蓋欲明斯道於天下故語必歸於醇正再與鄂州栁中丞書談兵事文英氣勃發西漢晁錯趙充國毎以此擅長斯文近之與祠部陸員外書駕軼排宕極瀇瀁之勢送水陸運使韓侍御歸所治序前幅舉其成功後幅勉其建績下語不繁而屯制之宜已瞭然指掌送浮屠文暢師序昌黎力排釋氏而為浮屠贈言如此正原道中所謂明先王之道以道之者也送鄭尚書序光偉其氣磊落其辭而出以精思故爾超絶送齊皥下第序極頓挫激昂之妙文之最有機局者送許郢州序寓規於勸凡為守牧者均當勒之座隅平淮西碑渾噩似誥銘髙古如雅頌體裁宏鉅斷為唐文第一曹成王碑原本忠孝立言已操要領而敘事遣辭奇而能法碑版之文此其極則也處州孔子廟碑氣體髙深而古色黝然他家丹雘其辭終居下乘耳魏博節度觀察使沂國公先廟碑銘敘文簡質銘詞古奥其古奥處可及其簡質處不可及袁氏先廟碑揭出孝字便見此文闗係不細而詞理淹綜足以發之司勲員外孔君墓誌銘老筆紛披彌見丰骨卓犖烏氏廟碑銘雄姿灝氣有揮斥八極之意南海神廟碑典重髙華足以潤色太平鋪張盛事後幅拓開一步文境倍覺寛舒司徒兼侍中中書令贈太尉許國公神道碑銘古氣盤紆風格峭拔大類先秦文字鱷魚文用筆嶄嶄自是奇文栁宗元獻平淮夷雅表頌颺國美之文典雅為上宏贍次之華縟又次之如此其上乘也駮復讐議挈出刑禮二字竝提作骨駁辨至為精核晉文公問守原議𥪡議精嚴遣調警拔森然法戒之文與太學諸生書辭㫖雅暢中寓有好賢與善之意故倍覺娓娓可思答韋中立論師道書命意深厚不為苛激之音與韓愈論史官書詞極雄辨理甚堅正段太尉逸事狀刻畫情事能使太尉鬚眉畢現與昌黎張中丞傳後敘工力悉敵封建論博辨縱横字字沉鷙中間錯舉秦漢唐之制引據甚精斷制甚確守道論演迤條達湏知栁州文中又有此一種南府君睢陽廟碑以兩漢之健骨運六代之腴辭箕子碑立議奇而不軼於法有此識力始可以尚論古人陸文通先生墓表表章經學之文要湏如此簡確裴瑾崇豐二陵集禮後序通篇惟用直敘此所謂淵雅之音故無湏於抗墜也栁宗直西漢文類序此篇逼真西漢近古而尤壯麗殆子厚所以自狀其文品也嶺南節度使饗軍堂記雄深者其思理也整麗者其體製也復有一種俊邁之風格旋轉於其間豈非傑搆邠寧進奏院記能於小中見大而體局𢎞敞詞亦足以配之監祭使壁記用筆謹嚴遣言典重始終以敬字綰結尤為扼要興州江運記敘述議論皆以典奥出之可謂壁壘森嚴神采煥發劒門銘不作縈紆之勢而自然矯㧞錄此以式輕靡之習白居昜初授拾遺獻書婉巽而多風納約自牖之義也授孔戣右散騎常侍制辭甚圓美授鄭覃給事中制􅈺雅猶存典則元稹獻事表機理淹暢不事雕繢唐文之又一格也論諫職表文筆清疏而意獨懇到與韓愈書闡幽之言足扶名教劉禹錫許州文宣王新廟碑古藻繽紛極為雅贍李翺論事疏用忠正大臣忠正小臣莫敢為不正千古名言屏奸佞鋪敘之文自爾詳盡改税法明白曉暢絶進獻論財貨從出之源洞中情事文復英爽切摰復性書惕厲其詞可以警學平賦書序經濟之文立論自佳上宰相書洮洮清辯雋利可喜答進士朱載言書行已之道為學之方是書約略盡之而其敘文章源流正變處尤為詳確楊烈婦傳摹寫情事有聲有色末作斷語亦自詳整髙愍女碑於大處發論局陣展舒波瀾空闊田𢎞正謝賜節鉞表語語出於忠欵絶無游辭呂温功臣恕死議逐段議論皆以兩意互發字字深陗氣體亦遒上不羣張荆州畫贊義本嚴正詞復奇宕精理内含聲光外射皇甫湜論進奉書指事切實能發天下為家之義故吏部侍郎昌黎韓先生墓誌銘淵奥古崛殆有意倣昌黎而為之者舒元輿上論貢士書侃侃發攄最為正論然國家固宜重士而士亦宜知所以自重如此庻兩得之耳李漢韓愈文集序序昌黎文提道字為主詞㫖深閎得不謂之知言歐陽詹太學張博士講禮記記敘事中饒有樸茂之氣音節近古劉蕡制䇿對剴至詳明發揮經術此逼真西京文字可以追蹤晁董李徳裕討劉稹制徳裕處分澤潞比跡蔡功似此辭義嚴明所謂制勝於廟堂也賜回鶻書意簡嚴中能盡事理賜回鶻可汗書温言撫慰而開諭曉晰深得布告諸蕃之體奉宣撰太和公主書詞意諄詳妙有操縱賜石雄詔意辭鋒精整足以壯鼔旗而新壁壘後幅戒以持重允為樽俎名言賜王宰詔意詞不過嚴而意甚英決又賜王宰詔意兵事機宜規畫詳審非獨運籌之妙亦見馭將之權代劉沔與回鶻宰相頡于伽思書回鶻有功於唐故不用嚴詞誚讓而多勸諭之言以大字小之義也為宰相與李執方書語直而意婉文特妙於布置論侍講奏孔子門徒事狀理解明確正論肅然議禮法等大事廣諮諏以定國是有識之言論維州事狀僧孺處置維州一事守匹夫之小信忘經國之逺圖誠為失計此文可謂論據詳明矣丹扆六箴六事所陳周詳篤摯名言粲然臣子論立功立節兩言已括臣道而又以名節為本洵為卓爾之見忠諫論多引事實略發辨議而意已明近倖論切於唐季一時之事實千古之龜鑑也聖祖仁皇帝御製文第三集巻三十六
