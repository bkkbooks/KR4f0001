body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷四十三雜著古文評論胡宏祭祀郊社論禮以義起黜向來穿鑿附㑹之說而獨歸於彞典鼎象百物能發新議得於獨見劉子翬曽子論以敬字立論是聖賢徹始徹終之學朱松上李丞相書正言無隱深中南宋時獘送程復亨序有切偲而無繾綣贈言如此古義可風羅願淳安縣社壇記考論精鑿益見稽古之益程大昌象刑說蔡傳謂象刑如天之垂象示人疏解甚精得此論發揮更無遺義矣范浚悔說悔乃進徳之機立說最為沈快彭龜年戒聖性傷急疏言不冗而理甚透可以匹埒匡衡劉光祖論朋黨疏文有以質直為貴者此類是也陳傅良進周禮說序周禮自是周公之書此最言之精確末幅說熙寧新法之害用意尤細文王論合書易以論聖人識解深邃文筆有類諸子陸游與尉論捕盜書捕盜以民為耳目是亦機宜朱子壬午應詔封事論治則精要而不浮論事則眀暢而不冗大儒之言自爾迥别辛丑延和奏劄二本天人理欲以立言自是培飬根本議論戊申封事讀前後二段知儒者學術之正讀中一段知儒者經濟之優此等封章卓然千古甲寅行宫便殿奏劄二窮理居敬是朱子一生學問本源以此為先資足徴靖獻之忠矣賀陳丞相書藴忠藎之意發為直諒之言固應勉勵備至答韓尚書書此書可以勵士節砥廉隅不徒文字之工答鄭自眀書講眀學術扶進人才兩意無不該暢與臺端書激切痛快之言一根於忠愛洵可垂世而不刋上宰相書非任事之誠孰肯進此戅言所謂實心實政者具見於此此段語意痛切非見之最眞不能言及此是即古人臨深履薄之心朽索六馬之喻朕生平念兹在兹者亦即此也答梁丞相書舉綱挈要義藴𢎞長與留丞相書立意透快自是眀通之識與留丞相書篇中言君子小人消長之機極為明切答汪尚書書紫陽為學本領略具於此書朱陸異同得失亦於此可見答吕伯恭書極精細又極渾融非朱子不能見到此答陸子夀書此文考據既精而用意尤慎即議禮一事可悟進學之道與王龜齡書極寫嚮往之誠末兼勉勵意兩賢相慕豈同世情酬酢與劉共父書若無意為文而文之敏妙迥非脩辭家所能企及由其理勝故耳答陳體仁書約舉理要可與言詩可與正樂與龔實之書詞令清圓而意致懇篤於人才本末輕重之際辨之甚眀詩集傳序藴藉深逺玩味此序可得讀詩之法亦可收學詩之益呂氏家塾讀詩記後序誦後一段文湏識得古人讀書用心矜慎不苟如此大學章句序立言必綜其要能令千載之下曠若發矇中庸章句序此書最朱子所盡心一序溯原竟委大指已自囊括漳州教授㕔壁記敦重教職足以警勵師儒轉運司蠲免鹽錢記勤宣上徳辭令温純名堂室記記堂室耳而必溯父師之教敘為學之本乃純乎義理之文衢州江山縣學記前幅褒美後義更進一層靜江府學記切要不浮有資教化江陵府曲江樓記俯仰流連極一唱三歎之致建寧府崇安縣學田記兼教飬立言用意特為淵厚鄂州社稷壇記詳引古制稱述地徳從來無此典核婺州金華縣社倉記義倉本良法篇中將青苖相較處尤覺利病劃然衡州石鼓書院記砥俗式浮言重鼎呂福州州學經史閣記不取新奇而文氣自疎達動人學校貢舉私議此議本程子之意而益發其所未備洵可以得眞才而收實效矣觀心說眀快透悉總欲學者實地加功張栻入見孝宗奏單挈一誠字洵治道之紀綱呂祖謙戒諭兩淮守令恤農詔古蔚中有眞氣淪浹戒諭沿邊脩武備詔加意振飭措語近古建隆編勅序頌揚本朝體製肅穆而詞意閎逺代宰臣史浩等恭書御製秋日幸秘書省近體詩下方就一事中發出三層意思腕力渾勁頡頏兩漢白鹿洞書院記崇文講學允為治道所重斯篇能發揮大指典醇不佻陸九淵送宜黃何尉序敘令尉之賢否狀民心之欣戚有禆激揚吏治劉晏知取予論劉晏終與桑孔有别持論最公末以正義裁之予奪抑揚確然不爽陳亮送徐子才赴富陽序鋒頴迸軼英英四射論傳註註疏雖未盡聖賢精意然實有功經學下筆極有分寸葉適上寧宗皇帝劄子拈和平二字作主文亦粹然以醇財計上具此淵通之識始可權衡㑹計瑞安縣重脩縣學記髙文醇理名貴可思蔡沉書經集傳序提心法二字為一篇領要足該典謨訓誥之義陳淳宗㑹樓記論古宗法之重詳贍典雅有禆禮教眞徳秀夏震特授武信軍節度使殿前都指揮使進封加食邑食實封閎整可視唐諸制皇伯師垂特授少保依前定江軍節度使致仕天水郡開國公加食邑食實封令所司擇日備禮冊命制絶麗而典賜寳謨閣直學士朝議大夫知建康府兼江淮制置使黃度乞檢㑹前奏許令致仕不允詔音節流美賜太中大夫知樞密院事雷孝友正奉大夫参知政事樓鑰太中大夫同知樞密院事章良能端眀殿學士通奉大夫簽書樞密院事宇文紹節兼太子賓客辭免皇太子講授春秋終篇各特與轉行一官不允詔簡而有文賜通議大夫知樞密院事兼参知政事雷孝友宣奉大夫参知政事樓鑰通議大夫同知樞密院事章良能端眀殿學士正議大夫簽書樞密院事宇文紹節兼太子賓客辭免皇太子讀三朝寳訓終篇竝特與轉行一官不允詔沐浴於典誥而出之上殿奏劄兩意分疏條理秩秩庚午六月十五日輪對奏劄二辭皆警拔一言可當千古直前奏劄分疏六事極意發眀文勢流暢充裕無與為比直前奏劄分别邪正情狀較然召除禮侍上殿奏劄以人心為格天之本而歸原於公平正大乃入告之嘉謨大學衍義序只敘作書大意能以平正勝人魏了翁賜左丞相鄭清之乞上印綬不允詔以疏經代言彌見清新賜吏部尚書李􅌫乞歸田里不允詔敦古非浮豔可及論給事臺諫之言語必沉著迅快論士大夫風俗意在匡繩士風不為苛疾趙鑰夫宗藩文類序古者親賢之輔端由於飬之厚而教之豫文能暢發可為準則瀘州重脩學記淹貫經學肆筆皆有精采洪氏天目山房記其廣捜逺綜可以資多聞其探本反約可以正學術文辭爾雅又其餘也瀘州贍軍田記由瀘州說到天下由軍田說到井田封建之制極能開拓文勢拙齋記物欲之知徳性之知湛然圓通使人胸無滯義眉州江鄉館記古義錯陳小中見大井牧說熟於周官推見先王經世深心黃震平糶倉記正當之論可以勸善風世王柏賦詩辨古人賦詩多斷章取義有未可以類拘者然禮義之大防不可不立斯文庶得其指歸矣牟子才聚散劄子一氣流注而中間頓挫綰結篇法井然方逢辰上理宗書披瀝衷誠無不罄竭文天祥瑞州三賢堂記敘三賢進退有闗國家文情彌覺宛折正氣歌序斯篇出於至性慷慨悽惻朕每於披讀之際不覺淚下數行其忠君憂國之誠洵足以彌宇宙而貫金石謝枋得交信錄語近箋疏亦饒古趣聖祖仁皇帝御製文第三集巻四十三
