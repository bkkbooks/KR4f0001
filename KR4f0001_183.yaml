body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十六古今體詩四十二首二月三十日親統六軍徂征漠北惟天盡所覆眷命畀我清自豫蒞鴻祚恆願銷甲兵狡焉窺北疆屬國橫相攖夙昔張撻伐凶醜皆顛傾赦之釋不誅開網全其生怙終恣跳梁邊鄙搖羣情皇皇仁義師聲討必有名春雪灑貝胄朔風捲龍旌眷兹貙虎士金革勞逺征於鑠振我武赫赫揚天聲出居庸關羣峰倚天半直北峙雄關古塞煙雲合清時壁壘閒軍鋒趨朔漠馬蹟度重山漸向邊城路旌旗疊翠間赤城慈宫曽駐此溫泉展轉依稀草五年今日征途冰未解當時凍嶺雪還全往年奉際即太皇太后臨幸之是此時漸近邊關風土别長驅旌斾嶽山連孤城寒重深宵靜敢卜龍沙奏凱旋龍門絶巘何時鑿五丁雙崖萬仞闢門屏潺湲塞水嵯峨石振旅歸來定勒銘過獨石口關名獨石插遙天路繞青冥絶嶂懸翠壁千尋標九塞黃雲萬疊護三邊霓旌曉度長城月毳帳春回大漠煙總為民生勤戰伐不辭籌畫在中權出塞訓厲軍士鐵馬金戈整六師鼓行出塞暮春時邊塵盡掃從今始莫讓天山建績竒北藩諸部君長來迎關山直北盡王臣屬國侵陵煽亂頻為靖邊方勤士馬欲令藩落輯民人聲靈有赫羣知肅抃舞來同意倍親共覩此行清朔漠保疆綏土俗還淳沙漠二首髙下龍堆萬馬趨直將漠外作疆隅漢家只守飛狐嶺坐使中原失遠圖其二沙磧荒榆細柳多步行不用蹀鳴珂時率將士步行連朝登頓渾無倦甘苦身先士荷戈風雪致禱遂爾晴霽塞外春深雨雪頻寒風猶自拂征塵昨朝遣祀咨宗伯已見遙天霽色新賜皇子允祉玉弩金戈壯此行期門環衛在連營深居莫忘勤勞意須識間關出塞情賜皇子允祐逆我顔行討必加六軍嚴肅靜無譁分營此日如棊布奮武羣看捲塞沙春寒軫念將士大漠春殘雪尚飛從征車馬正騑騑風回沙路迷金勒寒送冰花上鐵衣每念折衝憑士氣况從絶徼奉天威六軍同奮赳桓志佇見睛曛滿翠旗途中新夏邊草才青節序更征裘未換入朱明遙思南陌東阡候正是居人急耦耕經明成祖勒銘處指示扈從諸臣并序朕率師行四十五日至我哨界界內外髙阜坡陀大抵皆黃白沙五色石北行十一里有石瑩然獨出明成祖北伐刻銘其上時則永樂八年庚寅四月十六日朕今過此適在四月十四日山原猶昔時日同符朕謂明成祖之率師而行也與今日異其時出邊皆敵人也今䝉古悉我效力之人其時皆漢人步卒今我兵悉騎士且熟習邊外之行由此觀之明成祖深入敵中數千里縱橫若行無人之境亦誠難矣我軍若不及彼良可愧也凡聞斯語者當人人自奮焉爰紀其事而繫之以詩伊昔永樂年征馬嘶朔風磧間銘片石苔蘚磨青銅我行初拂拭夏節欣相同當時月在已今值清和中後先間兩日彼亦一代雄我武討不庭春發明光宮塞草緑微茁雨雪隂濛濛或言時尚早稍待邊花紅寧知英傑人所見良疏通迅行掩不備兵法貴折衝軍謀在帷殿士氣如虎熊豈不資羣策惟斷斯有功作詩紀其事聊以示臣工賜皇子允祀戎行親蒞制機宜櫛沐風霜總不辭隨侍晨昏依帳殿焦勞情事爾應知帳殿對雨念畿輔四方農事氣和時雨降駐蹕對荒陬㸃㸃侵油幕霏霏濕翠斿未知同甸服果足渥田疇軫念民依切馳書付置郵賜將士食萬騎擁雕弓長鳴向北風龍荒彌曠逺虎旅正驍雄戰鼓黃雲外旌門紫氣中朕躬方蓐食與爾六軍同違皇太后定省言懷帳殿風髙日影移庭闈常憶問安時寸心每自依清禁慈念遙應繫北陲柔遠肯教罹疾苦除殘焉敢惜胼胝預期露布飛章入早報瑶階母后知行殿示諸皇子師行日已遠邊馬風蕭蕭眷言靖疆宇寧憚道路遙彼寇鄰北藩譎謀聲動搖除惡必拔本稂莠隳良苖外攘內斯安務令金甲銷吾民息轉輸丁男無敝雕一勞方永逸所戒怠與驕天心鑒此誠雨暘時以調瀚海四月天山路今朝瀚海行積沙流絶塞落日度連營戰伐因聲罪馳驅為息兵敢云黃屋重辛苦事親征營夜南望北斗碧琉璃界四垂邊漸覺雲低欲到天為問北來行近遠果然北斗挂南川雁栖沙磧有序朕親提士旅迅掃邊塵野宿宵興風髙月冷慨居人之絶跡見沙雁之羣栖曠遠蕭條艱難跋涉念兹徂征之役實殷求定之心眷彼昔賢斐然有作覽遺文之垂後在息武以寧人夙抱此懷因物興感為靖風塵夜不眠平沙四顧斷人煙征夫欲度隂山外北雁偏棲瀚海邊黷武詩書天子戒惟仁經史帝王先須看戰壘生靈骨弔古文章信可傳時乏水於山坡得泉志喜麾兵深入賊巢邊斯地從來乏水泉報道六軍齊飲馬清流山畔忽涓涓克魯倫河上流雨後草生晚從岸曲駐前旌雨歇行營草怒生一望青青河上色平蕪共聽馬嘶聲登山巔下瞰克魯倫河周覽山川形勢指麾營陳策馬登崇岡岡勢亦崔嵬浩浩見河流迢遞西隅來杳然罕人跡周覽復徘徊命我熊羆士往駐山之隈旌旗布林麓寇見應疑猜六師壓其陳賊勢立崩摧麾示諸部曲號令肅風雷俯視窟中殄滅同纖埃渡克魯倫河網魚暫駐待後軍至臚朐河水何泱泱髙山發源清且長漠北經流數千里東趨遼海歸扶桑夙昔河壖亦沃土狡寇來據巢其疆自春徂夏雨澤斷塞草不緑川原黃驚聞我師自天來逺渡沙磧思遁藏焚巢裹餱夜竄走老羸稚幼委道傍朕率輕騎渡河北平沙淺水湔甲裳命士舉網截清流鮮鱗潑剌河中央笑彼智短氣復懦捐棄形勢奔倉皇此時中宵自顛沛當年北鄙徒披猖我師英武且整暇臨河飲馬皆鷹揚黃鉞一麾諸部集回首萬騎方騰驤軍中夜嘗擐甲達旦四山風靜建旌旄帳外沙明片月髙除逆安民非得已終宵擐甲敢言勞噶爾丹潰遁遂窮追之謾道爰爰窟多久從西路列雕戈疾馳莫憚追奔力須使窮禽入網羅剿滅噶爾丹大捷殘寇疲宵遁橫衝節制兵我師乘鋭氣誰許丐餘生貔虎三軍合鯨鯢一戰平愧稱謀畫定討罪荷天成自賊中投誠來者皆宥之伐叛軍聲震若雷奔亡賊勢已全摧龍荒所至皆蒼赤許爾投戈向化來遣使示皇太子捷音逋寇多年快翦除風清塞北已回車遙知念切馳相慰驛騎南歸賜捷書示宮中捷音向南瞻北斗水際見飛鴻雪照平沙月雲生大漠風捷書傳遠塞喜氣溢深宮奏凱鳴鑾近新荷夏正中班師次拖陵戰馬初閒甲士歡揮戈早已破樓蘭彌天星斗銷兵氣照徹邊山五月寒班師拖陵留皇長子允禔殿後示之北伐經時鐵馬馳自春徂夏歷邊陲炎風暑雨歸來日留待旋鑣撫六師行間賜大學士張玉書疇昔謀康阜除頑事戰攻若非揚九伐何以靖三農古義嚴聲討儒臣在折衝遐荒風雪裏扈蹕紀軍容外藩諸部落絡繹來賀宴賚之諸部名王集扶攜繞御營皆言清朔漠從此樂生成喜溢車書㑹歡騰鼓角聲朕懷勤撫恤所志在休兵入關見雨膏潤澤禾苖茂遂喜而有作甘雨時霖為洗兵恰逢戰勝武功成軍容萬隊初旋凱婦子千村正饁耕天意要荒同職貢人歡閭井共升平征途每憶民生事喜見桑麻愜此情彈琴峽琮琤流水意倣佛似鳴琴曲度泉歸壑聲兼峽泛吟空山傳逸響終古奏清音不御金徽久泠泠㑹素心南口鑾輿歷遠度龍城已近郊圻一日程時雨潤來山翠重更添髙下小溪聲入京見百官耆民童稚歡迎道周星斿葆羽禁城闉雨霽郊坰不動塵旭日薰風歸凱路黃童白叟太平人正逢師至經三月敢比苖頑格七旬從此普天無戰鬬更將休養朂臣鄰賜將軍孫思克天討恭行日軍威戰捷時列營張犄角扼吭有偏師立見窮追盡能承節制竒鷹揚資遠略宿望在西陲聖祖仁皇帝御製文第二集卷四十六
