body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷九敕諭諭內閣䝉古稟性怠惰不能深計生業往嵗小旱即致饑窘初意賑贍乏食之人所需有限及觀散給米穀之數至多凡人生業各自勤勉必籌畫終嵗之計撙節用度方可不致窮困若每求賑贍終於生聚無日今正當暄和之時遣通曉䝉古事務重臣會同外藩之諸王貝勒貝子台吉等作何逐家教諭令其各勤生業旗內貧人作何養贍俾安樂利凡此數者當令其規畫久逺詳細商酌可下議政王貝勒大臣會同確議以聞康熙二十九年四月十六日諭大學士伊桑阿阿蘭泰學士朱都納邁圖西安布顔圖郭世隆王國昌汝等行文諭倉場侍郎凱音布原任總河靳輔曰山東河道自分水龍王廟以南流入運河之水不一而足舟行無阻分水龍王廟以北匯入運河者惟河南衛水而已並無别渠相濟南旺所蓄之水又不能多常致淤淺阻滯今將駱馬湖之水不令其自禹王臺流入沭河俾駱馬湖之水蓄貯毋泄於運道有無裨益至駱馬湖與南旺等湖相距地勢高低抑復如何山東東阿縣之鹽河及别河有可通入運河者否河南衛河之外有别河可資以疏入運河者否著凱音布靳輔訪其地諳練之人委曲咨詢若有可措施之處親加詳閲繪圖來奏康熙二十九年四月十七日諭大學士伊桑阿阿蘭泰學士朱都納邁圖西安博濟布顏圖郭世隆王國昌太常寺鴻臚寺等衙門鳴贊官原擇其聲音𢎞亮者選用論俸升為主事若等歷年未久乃由捷徑反越年久筆帖式先升其聲音不善者取為鳴贊閲數年並未贊禮一次者有之可下㫖太常寺鴻臚寺等衙門察現任鳴贊等官將聲音劣者題參革其鳴贊以筆帖式補用如將劣者不行斥革朕察出并治罪焉康熙二十九年四月二十四日諭三朝國史館總裁大學士伊桑阿等朕惟帝王肇基垂統綏御萬方駿業𢎞謨必勒諸簡冊傳示無窮所以炳耀豐功宣揚至治甚盛典也我太祖高皇帝誕膺寶籙鼎命維新締造丕圖規模宏逺太宗文皇帝道隆作述運啓休明式廓禎符燕貽景祚世祖章皇帝統一寰區化成治定中和懋建聲教遐敷惟列聖之相承冠百王而首出鴻猷峻德巍煥難名緯武經文昭垂無斁舉凡戡亂安邦之略立綱陳紀之宜用人行政之方牖民成俗之本布於方策歷久彌新創制顯庸燦然明備即當時勳舊諸臣翊贊王室宣力四方亦莫不託附風雲懋彰勞績惟從龍而應運信昭代之多才朕夙夜紹庭思闡先烈爰命儒臣恭修三朝國史兹特命爾為總裁官爾其督率在館諸臣薈萃琅函博搜掌故折衷至當裁訂成書毋尚浮夸而乖情實毋狥偏見而失公平毋過質略而意不周該毋務鋪張而詞多繁縟務期事歸確核文極雅馴勤以董成敏而竣事庶幾垂型萬世傳信千秋以覲耿光以揚大烈稱朕意焉爾其勉之毋忽欽哉康熙二十九年五月初一日諭內閣河道所關至為重大一二年來雨水稀少管河官必視河道為常事矣今年景象似多雨水可馳諭總河嚴飭該管官晝夜防視務保河隄無虞特諭康熙二十九年五月二十二日諭內閣所派漢軍一千五百鳥鎗兵每名賞銀十兩如兵不遣發亦免其追取即與之可耳出征人員之外凡漢軍內外現任及候缺堂官以下筆帖式等官以上各令捐一馬以給軍士康熙二十九年六月二十一日諭户部朕撫育蒸黎勤求民瘼務期休養漸致阜安閭閻間有疾苦朕衷時切軫念近見廣東高州瓊州等府所屬州縣丁地各項錢糧厯年每致逋缺此內係官役侵漁及豪强頑梗抗納者自應嚴究追取如果因丁缺地荒不能輸納儻仍行征比照例考成小民既困追呼有司復罹參罰徒滋擾纍終無裨益著該督撫將實係户口稀少田畝荒蕪一切徭賦無從辦納州縣歷年所缺錢糧數目詳加察明具奏爾部即遵諭行特諭康熙二十九年六月二十八日諭和碩裕親王福全等喀爾喀厄魯特原屬同修職貢之國因伊等交惡搆兵朕不忍民生塗炭曾遣使與達賴喇嘛使人偕往厄魯特諭令仍尋舊好乃厄魯特噶爾丹陽順陰違反侵擾我屬部掠奪烏朱穆秦四佐領兹用遣發大軍聲罪致討特命爾和碩裕親王福全為撫逺大將軍皇長子允禔為副與內大臣國舅佟國維內大臣索額圖眀珠阿密達公蘇努都統國舅佟國綱公彭春都統諾邁護軍統領楊代前鋒統領邁圖等籌畫善策協議舉行勿謂自知而不納衆論勿當事會而致失機宜勿恃兵强而輕視逆寇嚴偵逺探罔或疏虞其統領䝉古兵丁前來之王貝勒扎薩克台吉等亦與共相商確酌量而行所調盛京烏喇官兵到時爾一併統率調遣有能擒斬噶爾丹來歸者分别升賞爾須約束將士申嚴紀律凡經過地方毋得騷擾百姓歸順良民加意撫恤務體朕定亂懷逺至意其行間將領功績及重罪俱察實紀眀彚奏各官有犯小過者當即處分至於驍騎校護軍校以下無論大小罪過俱商酌徑行處治務將厄魯特殲剿廓清安靖邉圉斯稱委任爾等宜殫竭心力蚤奏膚功欽哉故諭康熙二十九年七月初五日諭和碩恭親王常寧等喀爾喀厄魯特原屬同修職貢之國因伊等交惡搆兵朕不忍民生塗炭曾遣使與達賴喇嘛使人偕往厄魯特諭令仍尋舊好乃厄魯特噶爾丹陽順陰違反侵擾我屬部掠奪烏朱穆秦四佐領兹用遣發大軍聲罪致討特命爾和碩恭親王常寧為安北大將軍和碩簡親王雅布多羅信郡王鄂札為副與都統喇克達阿錫坦前鋒統領班達爾沙護軍統領繆齊納等統領官兵前往征剿行間諸事爾與和碩簡親王雅布多羅信郡王鄂札都統喇克達阿錫坦前鋒統領班達爾沙護軍統領繆齊納等籌畫善䇿協議舉行勿謂自知而不納衆論勿當事會而致失機宜勿恃兵强而輕視逆寇嚴偵逺探罔或疏虞其統領䝉古兵丁前來之王貝勒扎薩克台吉等亦與共相商確酌量而行所調盛京烏喇官兵到時爾一併統率調遣有能擒斬噶爾丹來歸者分别升賞爾須約束將士申嚴紀律凡經過地方毋得騷擾百姓歸順良民加意撫恤務體朕定亂懷逺至意其行間將領功績及重罪俱察實紀明彚奏各官有犯小過者當即處分至於驍騎校護軍校以下無論大小罪過俱商酌徑行處治務將厄魯特殲剿廓清安靖邉圉斯稱委任爾等宜殫竭心力蚤奏膚功欽哉故諭康熙二十九年七月初五日諭戶部朕撫育黎元勤思治理足民之道宜裕蓋藏從來水旱靡常必豐年恆有積貯庶歉嵗不憂饑饉如康熙二十七年頗稱豐稔誠使民間經營撙節早為儲偫何至二十八年偶遇旱祲室皆懸磬總因先時無備遂致糊口維艱比蠲除正賦特發帑金分行賑濟所在官司悉仰體朕懷竭力從事被災之衆始獲安全倘非拯救多方則㷀黎必流移失所今霖雨時降黍苗被野刈穫在即可望有秋惟恐愚民不知愛惜物力狼藉耗費秖為目前之計罔圖來嵗之需縱令年獲屢豐亦難漸臻殷阜應行直省各督撫嚴飭地方官吏家喻户曉務俾及時積貯度終嵗所食常有餘儲用副朕軫念民依綢繆區畫至意爾部即遵諭行特諭康熙二十九年七月初十日諭大學士伊桑阿阿蘭泰學士朱都納西安博濟王國昌今軍士年少者衆不諳戰陳聞日者用師士卒步伐止齊皆未嫺習春秋二季應加訓練可下㫖議政大臣具議以聞康熙二十九年七月十一日諭大學士阿蘭泰驛務所繫綦要巡撫于成龍可親至京師前往綜理驛站其標下所調士卒著委賢能官隨後統率往至遵化天津總兵官標下士卒不必調赴保定即委賢能官自天津啓行徑往遵化著兵部差善馳馬官一員往諭之康熙二十九年七月三十日諭户部盛京兵丁全恃南畝耕穫及月給糧餉以為資生之計昨嵗盛京禾稼不登貧困兵丁艱於粒食曽以所有屯糧頒發賑救頃值軍興遣一等侍衛齊蘭布往調盛京兵丁隨發諭㫖令無馬匹者給以官厰馬匹無行糧者給以莊屯糧米而官兵因踴躍遄征倉卒之際置辦一切軍􅋔遂支領明年二月分應給俸餉又預支五箇月錢糧刻期進發比厄魯特噶爾丹敗遁盛京官兵雖未經接戰而奮勇敵愾深可嘉悅今若將預支俸餉復行抵扣則窮乏兵丁必致生計艱窘朕心殊切憫惻所預給明年二月分應支俸餉及增給五箇月錢糧著免抵扣仍照常支給俸餉以示朕愛養將士軫恤疾苦至意爾部即遵諭行特諭康熙二十九年九月初四日諭內閣邊外捕賊被殺者恤與身價被創者以受傷銀兩給之守關口之章京守備把總等官及軍士皆勉效勞勩亦賞賚之可諭兵部康熙二十九年九月十四日諭大學士伊桑阿阿蘭泰學士朱都納西安博濟王國昌盛京軍士皆能挽强但其地雖有筋與弦而無牛角所以軍士難得良弓盛京既有筋弦及工匠而户部庫內現貯牛角今年即發角二千對運至將軍公署將軍等可監視造弓散給軍士自明年為始每年以角一千對發往盛京將軍可也康熙二十九年十月初四日諭大學士伊桑阿阿蘭泰學士朱都納西安博濟王國昌吳爾泰自主事優升郎中差往福建審理時朕曽以所審情事明白訓諭吳爾泰至彼妄滋事端將衆知府盡令解任州縣各官槩取供狀聲言夾訊巡撫恣意嚇詐以致福建百姓驚惶罷市數日違朕諭㫖而行此等之人不加懲治則後之獨奉差遣審理事務者罔知警戒矣吳爾泰著革去郎中發往黑龍江效力爾等可傳㫖諭彼罹兹罪戾今誰能援救而護蔽之也康熙二十九年十月初五日諭兵部京師為輦轂重地人民商賈四方輻輳京城內外統轄必有専責務俾稽察奸宄消弭盜賊然後商民得以安堵今城內地方既屬步軍統領管理城外巡捕三營又屬兵部督捕等衙門管轄內外責任各殊不相統攝遇有盜案反難察緝嗣後巡捕三營亦令步軍統領管理京城內外一體巡察責任既専則於芟除盜賊安輯商民庶有裨益其三營事務作何歸併管理著九卿詹事科道會同確議具奏爾部即遵諭行康熙三十年二月初一日諭都統瓦岱等兹以厄魯特噶爾丹去嵗雖經大敗立誓陳請但伊性生奸狡或乘我不備突來搶掠近邉歸順喀爾喀等亦未可定故遣發大兵特命爾都統瓦岱為定北將軍前往張家口駐劄防備凡事爾同都統喀代王永譽護軍統領洪海副都統方格科爾代喻維邦商酌而行駐劄張家口將兵丁馬匹飼養肥壯務須整搠器械嚴肅官兵不得騷擾民間其一應錢糧聽有司各官應付地方事情不得干預至於官兵俱有部頒紀律如有違犯爾等會同商酌照依定例處分不得姑息以致紀律懈弛若有出口應行機宜另頒諭㫖爾等其慎之故諭康熙三十年二月初一日諭都統郎談等兹以厄魯特噶爾丹去嵗雖經大敗立誓陳請但伊性生奸狡或乘我不備突來搶掠近邉歸順喀爾喀等亦未可定故遣發大兵特命爾都統郎談為安北將軍前往大同府駐劄防備凡事爾同都統公宗室華善都統李正宗護軍統領宗室輝蘭副都統委署前鋒統領碩鼐副都統馬齊田象坤郎化麟商酌而行駐劄大同府將兵丁馬匹飼養肥壯務須整搠器械嚴束官兵不得騷擾民間其一應錢糧聽有司各官應付地方事情不得干預至於官兵俱有部頒紀律如有違犯爾等會同商酌照依定例處分不得姑息以致紀律懈弛若有出口應行機宜另頒諭㫖爾等其慎之故諭康熙三十年二月初一日諭大學士伊桑阿阿蘭泰兵部尚書馬奇學士邁圖西安博濟南塔海八旗滿洲䝉古漢軍以至內府佐領其護軍校驍騎校小撥什庫護軍及另户披甲孤子寡婦之家僕披甲者所借債負本銀所賣餉銀糧米俱令清察實數察核時若本無債負而假為稱貸取與本未賣餉銀糧米而假為買賣互相造謀虛誑作證將詐僞及妄保之人即行正法斷不姑貸也康熙三十年二月初七日諭大學士伊桑阿阿蘭泰八旗中貧乏之人令清察其債負此事情前降諭㫖甚明若稽遲時日必滋弊端叢生令迅速察奏內府佐領令各該都統詳悉嚴察康熙三十年二月十二日諭大學士伊桑阿阿蘭泰學士邁圖西安博濟南塔海傅繼祖八旗兵丁債負償還之後若又遇有不得已之事必需稱貸者向部借貸則事體煩擾應於各旗派出部院堂官與該都統及副都統公同酌視其所遭之事以官銀借貸逐月於錢糧扣除如此則兵丁斷然不致困乏每月餉銀糧米得以自贍而不至有稱貸之苦將永永裨益矣應派堂官户部列名具奏康熙三十年二月十六日聖祖仁皇帝御製文第二集卷九
