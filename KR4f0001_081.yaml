body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷三十八古今體詩四十五首夏日奉太皇太后避暑興安玉輦親扶出鳳城青霄遙指五雲生鳴鑾日映中天永避暑風來北塞清萬里山河通逺徼九邊形勝抱神京登臨但得慈顔喜長侍瑶臺嵗嵗行石盤峪龍潭谷轉盤千騎潭深靜一泓魚迎斜照出禽雜野風鳴捫石苔偏滑分流水益清悠然愜心賞歸路月華生白水亂峰回合古檀州白水雲根一道流誰信塞垣圖畫似凉風斜日放漁舟古北口斷山踰古北石壁開峻遠形勝固難憑在德不在險曉發古北口望霧靈山流吹凌晨發長旓出塞分遠峰猶見月古木半籠雲地迥疏人跡山回簇馬羣觀風當夏景澗草自含薰第一泉峻阜橫岡紫塞連羽林衛士宿三千閒聽鼓角空山裏月上長城第一泉次上都河磧裏水潺潺前旌杳靄間長風吹海月一夜照關山虎旅嚴宵衛星宫列從班髙峰望縹眇明發欲躋攀青城道中雲屯萬騎汗沾濡不謂凉風滿上都行到青城齊色喜恍疑人影濯氷壺九隘合沓羣峰接瀠洄九隘通片雲晴作雨髙樹午多風磧近扶珠幰沙平驟玉驄凌歊何用築三伏杪秋同塞外對雨奮雷殷殷鳴大澤飛雨千山萬山白草色花香濯更新荒岡處處流泉脈回望神京接塞雲雨聲應得四郊聞黍苖翼翼平疇遠多少農人話夜分紅川紫塞紅川接上京晝閒雉尾暑風輕茅茨不改階三尺臺殿何須築九成谷鳥羣飛林欲暮邊花齊發雨新晴試看屬國歡娛日大漠虛烟處處生駐蹕興安八首并序出古北口岡巒盤互地形漸髙行五百里至興安峻嶺竦峙自張家口蜿蜒而來橫亘塞外南北諸山盡出其下地當蒙古諸部道里之中為曩昔枕戈擐甲戰爭之所逮我列祖肇握乾符恢廓天緒德威所被四十八部罔不傾心內附古之甌脫今𨽻方輿癸亥夏六月奉太皇太后避暑來游駐蹕於此炎歊不至清風滿林山雨既濡萬卉齊發於時逺邇小大藩臣各率其屬趨侍行殿既于苖以講武事復燕衎以懷逺人撫此遐陬在禹迹方行之外聲教四訖皆祖功宗德之貽朕今紹祚獲際升平能無永念乎即事書懷得詩八首祖德隆三后天心廓九圍謳歌通毳幕風雨想戎衣一自車書合長看職貢歸黃圖無內外時邁有光輝其二特奉仙輿出晴巒駐羽旄風多停彩扇驛逺進冰桃麗草金蓮湧塞上多金蓮花較清凉山尤勝濃隂碧樹髙墉臺新月上廣樂奏雲璈其三重嶺疊雲烟旌旗拂塞天草香薰翠幄花暖接紅川雁磧長城外龍荒勝地傳回瞻亭障逺千里抱幽燕其四六月浮埃淨髙居暑氣消千山低接帳萬木迥凌霄地擁邊沙闊天臨塞曲遙封章達行在銀燭秉凉宵其五虎㦸閒清候逍遙覽物華烟籠千樹栁暑發四時花風土暄凉異山川道里賖濯枝新雨歇皎皎散飛霞其六地脈連荒服山形赴上陘炎歊移月令分野别星經樺屋參覃白松林斷續青雲沙一萬里屬國盡來庭其七邊雲澄霽色山翠㸃行衣馬引雕弓過禽連羽箭飛旌旗開一靣草樹入長圍我武當搜狩非因耀德威其八紫塞行巡日雕輿問俗年大庖陳折爼仙醴秩初筵屏翰金湯壯光華賜豫宣示慈良有意裒對在敷天巡歷塞北雜咏四首疊嶂層崖一線開草深徑路絶塵埃龍沙雨後灤河水日夜朝宗入塞來其二雲開灌木萬山清縹眇前旌拂曉星漫道窮荒人跡少幾家烟火簇邊庭其三職方風土有遺書問俗今還一駐車禾黍近來耕稼滿烟鋤雲鍤遍新畬其四塞北風多露氣凉幔城坐聽漏聲長只今六月渾無暑已見飄來木葉黃楊川塞栁多於薺清川逐望平西風吹幾日碎葉欲成城細河一水沙岡外回流甲帳前日長時飲鹿風至忽聞蟬棕葉鋪凉殿松花落細旃從來銷夏地未勝此中偏塞北早秋萬馬邊聲合千旓障口開霜威隨出塞秋色壯登臺雁度連營去鷹呼絶巘回蒼茫雲海月永夜照龍堆興安夜連峰橫亘塞東西緹幕髙臨百尺梯坐覺銀河天際近仰看珠斗夜深低次楊嶺北半嶺黃雲合新凉畫角聞羱羊沙草外落日自為羣過團河逺水團沙白溫風絶塞收三星流火夕已擁翠雲裘次石山凉生旌羽露華漙畫角聲髙夜未闌行幄不知三伏過仗前翻覺六軍寒尖峰山谷口作塞山秀出亦娟娟細路穿林碧磴懸却為晚來飛雨過數峰橫翠入寒烟三道河晚望磧樹隱霧深河流帶沙淺不須朔吹髙先有飛蓬卷黃草川烟沙一片塞天圍舊說秋髙苜蓿肥今日邊屯皆樂土茅檐松火接金微回鑾抵古北口黃谷清河古戍間鑾車此日省方還長林曲抱千溪水小徑斜通萬仞山地扼襟喉趨朔漠天留鎖鑰枕雄關時平不用誇形勝雲物秋澄斥候閒中秋日聞海上捷音萬里扶桑早掛弓水犀軍指島門空來庭豈為修文德柔逺初非黷武功牙帳受降秋色外羽林奏捷月明中海隅久念蒼生困耕鑿從今九壤同是夜對月再成絶句明月中秋節馳書海外來自今天漢上萬里烟雲開賜施烺詩并序海氛之不靖䑸艟出沒波濤震驚濵海居民魚鹽蠶織耕穫之利咸失其業朕心恆憫惻焉邇者滇黔隴蜀湖湘百粵悉底敉寧蕞爾台灣阻險負固爾施烺銜命徂征決䇿進取樓船所指將士一心遂克島門迫其營窟勇以奪其氣誠以致其歸捷書到闕時值中秋對此佳辰欣聞凱奏念瀛壖赤子獲登袵席用紓南顧之憂惟爾丕績即解是日所御之衣馳賜載褒以詩島嶼全軍入滄溟一戰收降帆來蜃市露布徹龍樓上將能宣力竒功本伐謀伏波名共美南紀盡安流九日對菊不與繁花競寒苞晚更香數莖偏挺秀嘉爾傲風霜秋日再過阜平春經阜平縣夾道多榛杞雉堞久傾頽郛郭僅遺址耆老遮馬前其言質且俚土磽願力田三時事耘耔所苦井稅輸道逺越山水聞之切痛瘝寧爾在幹止有司近拊循瘡痍庶能起十室忠信存何况境百里郊圻戒申畫風土亦洵美問俗此重來居民咸色喜易彼蒿與萊荒塗漸成市經野得良圖可以喻治理再駐龍泉關髙臨晴雨外絶磴似凌空節物經冬異關山對月同龍泉氷未白雁塞葉初紅歷歷曾遊地香臺在眼中冬日重登清凉山紫府名山憶舊蹤招提駐罕認雲松隂崖尚有春時雪落日仍聽下界鐘塞逺渾河寒更白林疏恆嶽翠逾重祝釐交叶人天慶銀榜新題遍五峰詠馬岐陽方較獵騕裊盡龍媒仗下黃金勒橫秋號逸材初冬自五臺回次日雪鳴鑾多霽日停斾雪紛紛色向寒初積聲宜靜裏聞捲簾山忽近掃石徑猶分却憶清凉界峰連萬壑雲盆中橘實甚繁詠此厥包禹貢自揚州作頌騷人楚澤留爭似青條朱實好移來滿樹洞庭秋台灣平告祀孝陵有述纘武平瀛海諏辰謁寢陵翠微千嶂拱紫氣五雲凝聖德光垂裕神謨大顯承乾坤資翕闢日月象升恆奕世謳歌集多方歷數膺逺猶思燕翼盛業想龍興卉服皆來享鯨波自此澄明禋稽舊典萬􅑤肅嘗蒸聖祖仁皇帝御製文集卷三十八
