body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十二目録古今體詩二十九首嵗除前二日立春嘉平月初雪後晚坐偶有所見書懷詠鳥鎗朕親統六師至寧夏駐蹕二十日遍觀地勢游覽山形城之東南有巽湖水最清偶爾得野鴨一隻羽毛滋潤黃頭紫背胸白翅短與他處所有回然不同業已忘矣今經十五載忽於畫中又見此禽因而有感故援筆以記詠自鳴鐘賦得禁城春色曉蒼蒼趙北口水淀作賦得時人不識豫心樂檣燈檣燈調寄㸃綘唇一名南浦月五十一年春二月二十四日回鑾遇雨故作春雨行閲河長歌并序憶詠蘇州風俗偶觀演劇作三月初十日恭請皇太后雅玩齊進膳看梅花暢春園西新園觀花西苑試士大學士陳廷敬挽詩湯泉應候將軍潘育龍久任封疆故存問賜詩賜將軍吳英冬至讀易黃臘梅賦得冬日可愛詠雪并序賦得月照氷池吏部尚書引年致仕宋犖因朕六旬夀慶祝來京事畢五月內回本鄉朕念舊臣特書七言律一首以紀其事云賜大學士溫達幾暇隨筆書懷
