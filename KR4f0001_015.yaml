body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷五敕諭諭吏部自古帝王統御天下必資后德之賢贊助政理昭宮闈之令範端王化之本源粵稽往代册立中宫即加恩所生榮鍚封爵所以重內治隆恩禮甚盛典也緬維仁孝皇后作配朕躬歷經十載上事太皇太后皇太后克誠克孝佐朕治理惟敬惟勤節儉居身寬仁逮下儀型允備淑德著聞詎意忽焉崩逝深悼朕懷榮哀之禮已行推恩之典未舉內大臣噶布喇乃仁孝皇后之父也勳舊世裔素篤忠貞翊衛攄夙夜之勞謀猷重股肱之寄茲奉太皇太后慈諭仁孝皇后育質名門夙昭內則芳儀永謝時切悲思維后德之攸彰實鍾祥之有自宜加崇秩以合舊章朕恪遵慈命特錫殊恩噶布喇著封為一等公給與誥命世襲罔替爾部即遵諭行特諭康熙十三年十二月初八日諭禮部古帝王撫御天下莫不以禮制為先務然釐定章程必文質適中方可昭垂永久前見風俗近奢恐漸流於僭濫故令更定條例一切服飾力崇儉朴冀反淳龎詎意有司奉行過當專事苛細借端紛擾以致商賈壅滯物力匱詘小民深為未便以後著仍照康熙九年定例遵行現今一應禁約俱行停止爾部即遵諭行特諭康熙十三年十二月十三日諭吏禮兵三部平南王尚可喜航海歸誠勳猷懋著太宗文皇帝嘉其勞績特錫王封及定鼎燕京復能殫竭忠忱贊襄大業世祖章皇帝知其夙篤忠貞畀以巖疆重任鎮守粵東海氛寧靖百姓乂安近因吳三桂耿精忠等叛逆該藩益勵忠純克抒偉略悉心籌畫數建膚功朕甚嘉焉事平優叙已有屢㫖前據奏稱年老任重請以其子尚之孝承襲王爵已允所請今思該藩纍朝勳舊功著封疆宜錫殊榮以酬茂績平南王尚可喜著晉封為平南親王即令其子尚之孝襲封尚可喜以親王品級頂帶支俸示朕優眷之意廣東文武事務著尚可喜照舊料理其親王之寶亦著暫行掌管尚之孝統兵在潮著給與大將軍印應行封典爾等衙門即遵諭行特諭康煕十四年正月初九日諭兵部寧夏總兵官陳福效力巖疆勞績素著屢次舉首逆劄克篤忠貞且其妻子家屬見在川中逆賊挾誘全無顧戀矢志不移深為可嘉著以見兼職銜升補陜西提督給與敕印仍暫駐寧夏管總兵官事俟平凉地方平定之後即赴平凉料理提督事務陳福之弟守備陳竒妻子家口亦陷賊中深為可憫著從優以參將升用爾部即遵諭行特諭康熙十四年三月十九日諭吏部內閣機密重地事務殷繁贊理需人原任大學士巴泰耆舊大臣雖向以年老請休精力尚健才品優長久諳閣務仍著以原銜入閣辦事翰林院掌院學士熊賜履素有才能居官清慎著升內閣大學士應兼職銜著議奏爾部即遵諭行特諭康熙十四年三月三十日諭兵部本月初四日太監劉忠傳奉太皇太后諭㫖慈寧宫內庶妃有母九十餘嵗同其兄薩麻地尚在察哈爾處聞之深為憫惻軍前可弗加虜掠等語朕欽承諭㫖仰見太皇太后仁慈已極敢不敬副聖懷爾部即速行文彼處如伊等陳亡則已或存一二或全未傷殘即行收管其家産亦勿致散失交與內務府所管莊頭解送來京特諭康熙十四年五月初四日諭刑部邇者天氣炎亢農事堪憂雖䖍誠禱祈尚稽雨澤朕念切民瘼夙夜焦勞或因刑獄淹禁中有寃枉致干天和亦未可知茲特遣索額圖熊賜履等㑹同三法司將已結重案逐一詳加審鞫如有罪可矜疑者即與察明事由開列具奏務期情法允協有枉必伸以副朕欽恤獄讞至意特諭康熙十四年五月十七日諭兵部秦省巖疆重地軍務方殷靖逆將軍靖逆侯張勇忠勤懋著謀略優長久鎮西陲奠安疆圉近復躬履行間殫心籌畫屢敗賊衆恢復城池志期殲滅逆渠底定秦隴朕甚嘉之凡用兵籌餉一切機宜必須重其事權不拘常格而後可以整飭軍紀齊一衆心以收蕩平之績所屬地方總兵官有故違節制不聽調遣者許即行指參副將以下有臨陳畏縮殺良冒功者聽以軍法從事其文官自道員以下倘有遲誤緊急軍需者許㑹同巡撫據實參奏務令克展壯猷早奏膚功以副朕委任至意爾部即遵諭速行特諭康熙十四年閏五月初一日諭禮部帝王紹基垂統長治久安必建立元儲懋隆國本以綿宗社之祥慰臣民之望朕荷天眷誕生嫡子已及二齡茲者欽承太皇太后皇太后慈命建儲大典宜即舉行今以嫡子為皇太子爾部詳察應行典禮選擇吉期具奏特諭康熙十四年六月初三日諭吏兵二部逆賊耿精忠背恩附逆煽亂閩疆荼毒生靈罪惡重大其兄弟親族人等律應不赦但念伊祖耿仲明於太宗文皇帝時航海歸誠效力行間著有勞績伊父耿繼茂自世祖章皇帝時亦效力行間鎮守邊陲耿精忠雖行同禽獸辜負國恩其弟耿昭忠耿聚忠等道途隔遠實未同謀竟爾株連朕心不忍耿昭忠耿聚忠及親族屬下人等茲槩從寬典盡行釋放所有官職俱令照舊爾部即遵諭行特諭康熙十四年七月初四日諭大將軍多羅貝勒等比者仰荷天佑及國家福祚秦州鞏昌蘭州等處漸次懾服朕甚嘉恱亦係兵丁自保寧徒步跋涉深明大義殊死效力所致貝勒等須不時存念若輩艱苦非緊要必節其勞無大過則寬其罰始可謂之軫恤行間勞瘁也貝勒等身為將軍事情經練頗多必能同寅協恭折衷而行斷不狥一已之利但相隔遼遠意慮所及不得不為申布秦地實為形勢要區今張勇等將軍提督總兵及投誠兵衆雲屯一處將軍張勇之功況亦甚大恐貝勒等藐忽視之生彼憤悶時厪朕懷貝勒等既效勤勞底定秦省務期克奏全功以慰朕望為此特諭康熙十四年七月十六日諭禮部往代帝王陵寢所在地方理宜守護以妥神靈朕近行幸湯泉道經昌平見明朝諸陵殿宇雖存户牖損壞附近樹木亦被摧殘朕心深為憫惻爾部即嚴加申飭守陵人户令其小心護防仍責令該地方官不時稽察勿致仍前怠玩以副朕優禮前代之意特諭康熙十四年九月十五日諭內務府設官分職務得真材必分别勤惰録用方可各勉職守有裨部院衙門政務朕見票本筆帖式溫泰為人勤慎雖才品無甚優長自世祖章皇帝時即在票本之處效力守分寡交兼之年久其同事之人俱經超擢惟伊無人汲引耳現有郎中缺出應將溫泰補用示朕造就之意且以風勵後之實心效力者爾等即遵諭行特諭康熙十四年九月二十九日諭禮工二部仁孝皇后陵寢已卜定於孝陵附近之山理應備依典制營建但目今軍需浩繁民力維艱著將地宫先行修造其餘一應工程俟國用充足之日次第舉行著即選擇吉期竝應行事宜詳議具奏特諭康熙十五年正月十三日諭兵部督捕衙門逃人事情關係旗下重大前因恐致百姓株連困苦故將條例屢行更改減定期於兵民兩益近見各該地方官奉行疏玩緝獲日少旗下民生深為未便茲應遣部院大臣㑹同爾衙門將新舊條例逐一詳定務俾永遠可行其應差官員職名著即開列具奏特諭康熙十五年正月十四日諭兵部自逆賊煽亂以來各省緑旗官員兵丁勦禦賊寇恢復地方戮力行間著有勞績朕心時切軫念凡以前奉㫖事平議叙者爾部逐一察明功次即行議叙以昭朕酬庸鼓勵之意爾部即遵諭行特諭康熙十五年五月初二日諭吏户兵三部邇年以來各處大兵征𠞰軍需浩繁一切供應皆出民力凡領兵將軍將辨及地方督撫文武大小各官俱當以國計民生為念潔已奉公加意撙節表率屬員恪遵法紀以副朕戡亂救民之意乃有不思𠞰寇安民平定地方專營私射利糜費錢糧軍前所用米豆草束等項自將軍以下有自行販買囑託地方官多取價值地方官狥其情面浮冒開銷者亦有地方官販買支放多行開銷者有已備本色不行收納折價入已者有民間運到米豆草束地方官故意遲延掯勒及至軍前又將解官多方刁難恣意需索方肯收納者至於購買馬匹不開實價以少為多濫行銷算種種情弊難以枚舉皆由大小各員互相狥庇惟知貪利圖便已私大不合理應嚴加禁飭處分以清積弊以後此等事情發覺者照貪官例治罪有能舉首者從優議叙著議政王貝勒大臣㑹同逐一詳確定議具奏特諭康熙十五年八月初四日諭户部目今正當軍需浩繁在外總督巡撫及經管錢糧各官俱宜潔已奉公殫心料理一應收支銷算詳明造册據實開報聽部核議近見部覆各處奏銷本內或因款項不符或因數目舛錯或因造報遺漏或因册結不到多致駁察道路往返動經歲月明係地方各官不加意清釐故留疑竇希圖延挨時日以滋弊端錢糧朦混不清民力苦纍益甚以後如何盡除積習錢糧不致駁察爾部定議具奏特諭康熙十五年八月十六日諭兵部自逆賊煽亂以來奸徒附和侵擾地方關隴以西疆域遼闊大兵一時未集人心不無動搖靖逆將軍靖逆侯張勇提督王進寶鎮臣孫思克一聞蘭州之變即統領兵馬星馳渡河𠞰殺賊衆攻圍蘭州臨鞏等處恢復城池條奏機宜舉發僞札拏獲奸細綏靖邊陲其功甚大及大兵攻取平凉專任靖逆侯張勇等鎮守秦鞏復殫心籌畫調度合宜𠞰禦川賊屢奏捷音紓朕西顧之憂厥功尤為茂著伊等皆宿將重臣矢志報國同心協力展布謀猷兼以訓練士卒忠義素孚故能身先行陳所向克捷其屬下官員兵丁亦皆效力共建功績朕甚嘉之於軍功議叙之外應從優加恩以示朕奬勵忠貞酬答勳勞至意著議政王貝勒大臣㑹同議奏特諭康熙十五年八月二十日聖祖仁皇帝御製文集卷五
