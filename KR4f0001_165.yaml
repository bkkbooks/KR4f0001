body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三十七雜著親征漠北紀略下中路大兵挈帶八十日口糧行裝太重故將二十日之米留於中途今因等候西路之兵將及六十日特遣內府管駱駝官員催至米石於五月初一日給與古北口宣府緑旗兵二十二日口糧兼賜所食牛羊其有留下米石不足八十日口糧之人皆補給之於拖陵地方整肅大兵所獲厄魯特四人賞賜衣服明示以出師之故令其偕使臣於五月初四日往中路大兵以五月初五日前進是日駐蹕於阿敦七老之地行五十里初六日至枯呼車爾胡地方行六十九里是日早朕領親近侍衛行遇西哨科爾沁之巴克席胡爾貝勒喀爾喀車木楚克納木渣爾公阿玉西公朕諭之曰賊哨駐於古爾班圗爾漢地方當前所見者此名阿思哈圖山汝等哨瞭必占此山駐劄明日賊哨不知汝等在此則必自阿思哈圖山之東來窺吾大營朕之前鋒見而追逐汝等可橫截擒拏諭而遣之初七日原擬駐蹕於顏土庫烈圖地方遂將大兵分排隊伍緑旗居中漢軍火器營排列兩旁盔甲烜赫士卒奮勇旌旗輝耀掩映山川辰時來報朕所遣防哨一等侍衛喀丢往追竊窺我營之厄魯特七人至阿思哈圖山之東阿思哈圖所設巴克席胡爾貝勒等哨兵見之迎來接續追趕朕笑曰何必追逐聽其報伊噶爾丹更好是日午間至顏土庫烈圖地方原有水窪皆已枯竭於是鄉導等惶恐四靣奔馳尋水朕思此原係有水之地今乃無水意者上天欲我兵直抵克魯倫河亦未可定但步兵已行五十餘里今又行四十餘里無水之地若遇賊將何以戰且後隊之兵必至天晚遂傳喀爾沁和碩額駙噶爾臧諭曰爾今即前往令爾父杜稜王札西領伊兵千餘名駐顏土山髙處防護大兵後隊盡過若有警則一靣交戰一面來報無事則俟昏黑隨後抽兵而來斷然不可泄露密諭遣之時各處尚未報得水泉不勝憂慮親近侍衛吳什回奏稱馳過一山坡即得一泉往下流六七里約足供大兵人馬一夜之用朕心深為喜悅遂前往遍閲立營掘壕之處明白交付各旗時厄魯特人將朕差往中書阿必達遣回令其口奏云聞康熙皇帝親統兵前來自汝使臣到方知確信我噶爾丹波朔克圖汗在土喇地方不在此處汝兵請緩之若竟衝突而來我則避去必欲窮迫之則我亦能動手等語空身而回復遣盆蘇克格隆喇嘛及中書阿必達理藩院撥什庫因才能克稱任使授以防禦職銜之訥爾布往厄魯特諭之曰朕之此行為蒙古諸部落不能咸遂安養之故非必欲剿戮汝等而來也今汝等請緩我師此地水泉稀少我師來日必至克魯倫河始可緩耳明白曉諭薄暮從哨地遣往是日賊之哨兵與我軍之哨兵相對而駐因駐劄稍遲後隊之兵安營未畢掘濠未完朕躬親巡視見之甚以為可慮將王及大臣旗纛朕親自指視令其防衛至起更時始畢令皇長子胤禔領侍衛內大臣索額圖徹夜巡視朕躬及諸臣侍衛軍士皆未及支帷幄帳房俱身擐甲胄直至天曉是日行七十六里因近庫烈圖山其地名為庫烈圖西巴爾台布喇克初八日天明時令軍士皆暇豫整齊隊伍已畢朕減省侍從登髙阜處用遠鏡眺望俯見河流未見有人形迹料賊必堅據此河占此水以圖死戰因等候後隊之兵坐於髙處觀看東則有厄爾德尼拖羅海山西則有從巴爾台哈直下臨河之山麓此地因遮蔽觀看未晰於是傳集科爾沁土謝圖親王沙津達爾罕親王班第喀爾喀車陳汗納木渣爾王席地西里貝勒盆楚克貝子等諭之曰賊必據河死戰爾等率汝所屬蒙古兵二千人將西邊從巴爾台哈直下山麓高處據之作大兵全向此往之勢賊若來犯勿與之戰誘之使來賊以為從此來而備之則大兵爭先占據其河指示訖又命親近侍衛喀瓦爾達赫哲爾根令帶新滿洲侍衛於厄爾德尼拖羅海歐德哈爾哈一帶有無賊寇確實偵探諭訖正前行時見一人從克魯倫疾馳而來於是遣近隨侍衛往視之乃朕所遣理藩院撥什庫訥爾布回奏稱臣等於今早到克魯倫河遇厄魯特七人見我等即往上流馳去於是喇嘛中書二人令我回將此情由啓奏伊等隨其蹤迹追去等語朕於是即至克魯倫河觀看已無賊蹤朕因是歎息顧謂左右曰噶爾丹習於戰鬬西攻回子取千餘城收四部落之厄魯特盡殺戮其兄弟破七旗之喀爾喀所向無敵乃不據克魯倫河而戰則其庸劣懦怯顯然可見矣所謂俄羅斯兵亦屬虛妄今我軍欲戰不可得矣惟以窮追為至要耳因等候後隊兵遂於河取魚暫坐軍士齊到後將此故告之安設營壘照前布置至日未落皆備是日行四十八里駐驆克魯倫河之布隆地方念深入賊巢不知四面賊從何而來分布哨兵南則於巴爾台哈一帶地方安設北則向塔爾吉而即口僧枯爾口安設東則於厄爾德尼拖羅海及河之下流安設西則於克魯倫河之上流安設內又設八旗防衛薄暮時朕謂前鋒營行走親近侍衛喀瓦爾達曰我軍明日擊賊哨兵擒一活口便得其真消息矣正在商量作何擒拏之計適有頭隊前鋒統領碩鼐哨地擒來厄魯特一人問之伊稱皇上所遣使到時我噶爾丹不信皇上親臨云康熙皇帝不在中國安居逸樂過此無水瀚海之地寧能飛渡乎嗣於所放回之厄魯特四人將黃幄布城網城及起居一一詢問始信今日伊親登北孟納爾山瞭望大兵見軍行隊伍規模云此兵不似烏闌布通時覺甚是精練難於脫身於是傳示其衆令皆棄帳房器械商量連夜逃遁等語於是亦賞以衣服仍令訥爾布趕送至前所遣二使臣之處初九日行十七里駐驆於克魯倫河之曲是日諭議政諸臣曰噶爾丹若相拒交戰不應以河與我今觀其沿河上流狼狽而去其為潰遁也真矣若帶緑旗步兵追趕敵人皆係乘馬必致遠脫欲將步兵及粗重器械留下以便前往諸王大臣等甚難之後乃遵諭於是命內大臣阿彌達領緑旗步兵殿後令其行走時四面皆謹防之諄切委諭總兵官嶽升龍馬進良白斌等各領標下馬兵隨之而進初十日見沿途帳房釜鬵一切器物盡皆拋棄潰遁之狀不堪觀矣衆人之意始猶以為引誘詐遁後漸察之甚為真確是日從厄魯特逃來者接踵而至所言皆如前行五十五里於克魯倫河之渣各寨相對處駐驆克魯倫河以上自正月無雨旱甚儼然隆冬地無一莖青草此數日天氣陰雲下營甫畢而雨草遂怒生自出京師至是馬臕猶壯因此地無草牲口微覺勞頓是日駐蹕克魯倫河之克勒和朔行六十五里復諭議政諸臣曰此三日一路看來噶爾丹將老幼及日用器物盡皆棄之而遁其奔潰之狀甚為倉惶今揀選我軍將大炮留下前往追逐每佐領護軍一名並火器營大炮留於此駐蹕之地十二日追逐八十里駐蹕於拖諾山前綏爾哈圖地方議政諸臣等公議噶爾丹已極窘迫連奔五晝夜我師雖窮追五日軍中因待火器晝行早息計其間已相距三日之程中路之米應於八十日內運至土喇今尚不能望其運至克魯倫按察使劉暟牲口所載米五百石麵七千斤既報以五月初九日至拖陵亦至十一日始到嗣後米無到期拖諾地方距拖陵約三百里劉暟之米非十日不能運到雖運到亦不足大兵二三日之需伯費揚古兵又無信息我師止餘七日之糧所關重大等語因衆別無計策觀噶爾丹潰遁蹤迹並酌量所獲賊人之言議將滿洲漢軍火器營兵全往親軍及前鋒兵全往察哈爾兵蒙古兵哈爾沁兵內挑選馬匹可用者二千人並緑旗三總兵之馬兵全往著領侍衛內大臣馬思哈為大將軍酌派參謀大臣將回行官兵之米湊為二十日口糧給之諭曰爾等追逐五日前至土喇料亦決不能及如果可追及朕躬斷不肯旋師今噶爾丹破壞已盡朕所目擊想決不敢再至諭畢於是將大兵駐劄防哨護衛之處周詳指示又念西路大兵乏糧日久今應速回拖陵將現到之米不必給與朕所統官兵令其徑過趲至土喇以濟西路大兵續到之米僅留支應數日餘皆陸續催趲運至彼軍十三日親視大將軍馬思哈等起營後朕亦統所留之兵於十三日旋師是日行六十五里駐蹕於克魯倫河之克勒河朔地方十四日午後朕於四月十三日所遣侍衛殷渣納等齎大將軍伯費揚古奏疏至疏稱撫遠大將軍領侍衛內大臣伯臣費揚古謹奏為奏聞事臣等率領大兵於四月二十六日至杭愛山之喀喇托羅海駐劄時藍翎侍衛殷渣納等齎到皇上手書諭旨殷渣納又帶來行在兵部咨稱議政大臣欽奉上諭議得皇上所頒大將軍手敕已極詳備應行文大將軍費揚古預防噶爾丹遁走塞稜格之路留陜西兵令其攔截伊仍親領大兵躡其尾後而來一切皆當遵上諭所指示行為此具題奉旨依議等因前來臣等公同議得上諭所指示極為詳備除臣等率領大兵躡尾後而進外將軍孫思克等所帶陜西之兵應仰遵上諭指示留以預防噶爾丹遁走塞稜格之路令其堵截但因陜西兵來時途遇風雨馬匹牲口皆有擔誤先經題明挑選滿兵二千緑旗兵二千令趕隨大兵而行在案今若留此四千兵令堵截噶爾丹遁走塞稜格之路則兵力單薄臣等請照前所奏仍從一路進兵今聞噶爾丹順克魯倫河下流而往在達爾罕敖喇地方近於皇上所統大兵之處臣所統官兵皆歡躍奮激思即刻躡賊尾而進慿仗聖主天威從後剿滅但臣等本係庸劣大兵行七十餘日牲口稍疲不能剋期速至仰祈睿鑒留臣等西路官兵一生面目乞皇上稍緩六軍為此謹具奏聞康熙三十五年五月初二日題又一疏稱臣費揚古謹密題為奏聞事先是運米卿員喻成龍等趕至軍前稱途中水草稀少牲口從太原一直行來皆致疲瘦臣等公同商議將十五日口糧留於喀倫其三十五日口糧將小車及挑選挽車牲口並載炮所餘隨行駱駝令其運到題明在案查右衛官兵所挈帶八十日口糧扣至五月初四日應滿京師大兵所挈帶八十日口糧扣至五月十一日應滿因是曽移咨督運諸臣言汝等所運口糧須於所挈帶八十日口糧未完之前作速運到據伊等回稱四百餘乘小車裝載米石於四月初九日從喀倫起程儘力催趲而行看來地稍堅硬處一日僅可行三十餘里於沙磧坡嶺之地一日僅可行二十里大風起則為風所撼難以用力推挽隨所到處天晚即行駐宿官兵挈帶八十日口糧未完之前不能運至大兵處不得不預行報明等語大兵口糧所關甚要臣等因遣駱駝七十餘隻往迎米石於四月二十五日在揆宿地方發回令於喀倫將十五日口糧攤留其三十五日口糧仍照前議趲赴軍前速抵土喇雖行文去後至今不能趲赴軍前看來路途遙遠牲口之力不足若再從土喇往前趲赴大兵其勢更難但噶爾丹既在達爾罕敖喇地方臣等所領大兵不便候西路運送之米俟駱駝載米到後挈帶八十日口糧盡時即酌量續給率領大兵赴皇上軍前到行在後仰請敕督運諸臣將中路大兵米糧分給臣路官兵為此謹具疏密奏康熙三十五年五月初二日題是日駐蹕他爾渾柴達木地方計七十四里十五日朕於四月二十四日所遣侍衛額林辰又齎大將軍伯費揚古奏疏至疏稱撫遠大將軍領侍衛內大臣伯臣費揚古等謹密題為奏聞事臣等率領大兵於五月初一日到厄布爾山溝之阿達克地方駐劄二等侍衛台吉布庫額林辰等齎皇上手書諭旨至臣等欽遵上諭應即領大兵星夜前赴但大兵所行路遠牲口稍疲且噶爾丹將布爾車克地方往前去十有餘程之草盡行燒燎故遣人於前途速往覔草臣等率領大兵仍於初三日趲行至土喇躡噶爾丹尾後而進惟仰乞皇上稍緩六軍留臣等及官兵一生靣目又藍翎侍衛殷渣納等於四月二十八日前往時臣等以陜西官兵不便分留從一路而進其西路所運口糧不能趲至大兵情由曽具二疏交與殷渣納奏聞殷渣納與額林辰之至御前難定誰先故將前二疏另行繕寫一併謹具奏聞康熙三十五年五月初二日題遂將此二疏事宜示議政諸臣諭曰伊等西路情形前此未經奏報將朕二次從捷徑遣往侍衛留住多日始令來奏西路糧絶乃求中路之糧約定日期三次違悮此等情由朕已洞悉之皆豫為料理完備今此疏至爾等衆人皆見之矣果何如乎諸臣及侍從人員咸奏云皇上預先料定故雖兩路糧有擔誤兵役無一困乏者且移中路之糧經理西路委曲周詳臣等踴躍歡忭無既是日駐蹕古土爾布拉克地方計八十二里十六日大將軍馬思哈將從厄魯特來投誠之丹巴哈什哈察罕西達爾哈什哈呼戶訥爾之波碩克兔濟農之羅雷厄木七等及二百家口遣來審問伊等稱噶爾丹見大兵形迹竟夜奔遁於拖諾山將欲拒戰而不能遏止其部下之兵又於厄赫木布爾哈蘇台地方正欲於栁林內將駱駝卧列拒戰聞西路兵聲息噶爾丹乃云中路之兵勢甚可畏勿與爭鋒竟擊西路之兵搶掠而去傳示後即向土喇而行衆兵連奔五晝夜又因無草馬駝甚瘦戰兵五千餘人鳥鎗以千計至此地已極狠狽及與西路兵交鋒即已大敗我等見事勢已去先曽為使臣三次到京皆受聖主深恩若念及此或將我留養故來投誠等語又問噶爾丹情形彼稱於交戰時先衆遁走後被大兵所圍我等於未合圍之先奔出故此後情形不得而知是日駐蹕西拖陵計四十四里十八日駐蹕於去時所宿之中拖陵計二十六里是日正黃旗副都統阿南達齎剿滅噶爾丹捷報至此疏已經傳布中外兹無庸詳記庚午年將噶爾丹誘至烏闌布通之地距京師七百餘里耳此時當使一人一騎不返朕用是積憾於懷者六年於兹矣今噶爾丹違蔑誓言包藏侈心潛竄土喇克魯倫地方煽惑人心侮辱信使稔惡貫盈至於已極念天下蒼生恐將受其擾纍精誠之意上告穹蒼夙昔水泉乏絶之地而靈源出矣芻茭不産之地而茂草生矣樵蘇不給之地而薪槱足矣噶爾丹者如荒野之禽獸去來無定古人所謂聚則比於烏合羣則同於鹿豕羅之匪易攫之實難正此之謂也朕統此每佐領護軍六人漢軍火器營二千人緑旗兵二千餘人蒙古兵二千餘人直抵賊巢毫無瞻顧挺然而行者朕躬非素􅈺於軍旅也非熟知地勢之險易也非習於觸冒寒暑也非預諳其水草也惟所憑者天理所恃者人心故不懷安逸不恃尊崇與軍士同其菲食日惟一餐恆飲濁水甘受勞苦而為此行上天降鑒祖宗默佑將已經脫逃之賊寇恰濟西師之困乏將斷難俘獲之牲畜適飽西路之飢疲此果人力乎抑由天眷乎由是觀之我國家無疆之景福於兹可見矣往返九十九日之內凱旋京師途經五千里一人一騎未嘗困憊留皇長子允禔殿後亦不出二旬咸振旅而歸聖祖仁皇帝御製文第二集卷三十七
