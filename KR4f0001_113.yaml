body:
  text: 欽定四庫全書聖祖仁皇帝御製文二集卷十一敕諭諭大學士伊桑阿阿蘭泰去歲陜西西安等處年穀不收罔有積貯以致閭閻困苦至極已遣使賑濟之矣直𨽻所轄地方素有儲蓄或州縣稍有不登即以所儲米穀從均贍給是以民生獲濟良多今年豐歉尚未可知陜西省府州縣現存米穀之數應行察明先時預備至各省府州縣皆令積貯米穀數千石則禆益黎庶者大矣可下各該督撫等令各府州縣積貯米穀其所積穀數當逐一膳冊詳報户部著九卿詹事科道等會議以聞康熙三十一年正月初二日諭大學士伊桑阿阿蘭泰王熙張玉書學士王國昌滿丕圖納哈王尹方王掞李柟前者纂修明史諸臣所撰本紀列傳曽以數卷進呈朕詳晰披閲並命熊賜履校讐熊賜履寫簽呈奏於洪武永樂本紀訾議甚多朕思洪武係開基之主功德隆盛宣德乃守成賢辟雖運會不同事蹟攸殊然皆勵精顯於一時謨烈垂諸奕世為君事業各克殫盡朕亦一代之主也鋭意圖治朝夕罔懈綜理萬幾孳孳懋勉期登郅隆若將前代賢君搜求其間隙議論其是非朕不惟本無此德本無此才亦實無此意也朕自反厥躬於古之聖君既不能逮何敢輕議前代之令主耶若表揚洪武宣德著為論贊朕尚可指示詞臣撰文稱美儻深求刻論非朕意所忍為也至開創時佐運文武諸臣各著勳績列傳之中若撰文臣事述優於武臣則議論失平難為信史纂修史書雖史臣職也適際朕時撰成明史苟稍有未協咎歸於朕矣明代實録及紀載事蹟諸書皆當搜羅藏弆異日明史告成之後新史與舊書俾得竝觀以備天下後世之公論焉前曽以此指面諭徐元文爾等當知之康熙三十一年正月二十七日諭修明史諸臣朕自冲齡即在宫中披覽經史明實録曽閲數過見其間立言過當紀載失實者甚多纂修明史冝加詳酌如𢎞治中太后思念崇王欲令入朝此亦情理之至常且所封之地初不甚遠而一時大臣及科道官員交章爭執以為不可至云人民騷擾國勢動搖時已有㫖召崇王矣竟因人言而止夫書言以親九族九族既睦若藩王就封必不可召見則自古帝王所云睦族之道謂何又正德實録載午朝罷後於御道得匿名文簿一卷傳㫖詰問百官皆跪於丹墀時仆而暴死者數人暍而病者尤衆夫夏月雖天時炎熱何至人多暴卒且行間將士每披堅執鋭戮力於烈日之中未聞因暑而致死豈朝堂之上病暍若斯之甚耶所云盡信書不如無書此之謂矣至於宦官為害厯代有之明如王振劉瑾魏忠賢輩負罪尤甚崇禎時誅鋤閹黨極為善政但謂明之亡亡於太監則朕殊不以為然明末朋黨紛爭在廷諸臣匱封疆社稷於度外惟以門户勝負為念不待智者知其必亡乃以國祚之顚覆盡諉罪於太監謂由中官用事之故烏得為篤論耶朕宫中所用太監止令供灑掃奔走之役一嚬一笑從不假借所以數十年以來太監皆極貧乏有不能自給者爾諸臣想亦悉知朕非信用太監之主惟朕可為此言作史之道務在秉公持平不應膠執私見為一偏之論今特與諸臣言之冝共知此意康熙三十一年正月二十九日諭户部朕勤求治理念切民依凡有往來人等必以年歲之豐歉雨澤之有無一切閭閻情形備悉咨訪前聞陜西西安鳯翔各屬饑荒已經特頒諭㫖蠲免錢糧竝發帑金專遣大臣賑濟仍撥給别省錢糧刻期運送務使均霑實惠人獲更生近又聞頒賑之前尚有貧民散入四方流離失業勢不能復還鄉井儻不曲加撫綏必致轉於溝壑深為可憫凡流民所至地方應令該省督撫董率有司區畫賑濟令各得所其賑濟過人口數目著具冊題報有能酌量資給俾回原籍者一並造冊具奏至於湖廣襄陽等處距潼關相近且道路平坦易於轉輸襄陽等處所有積貯米穀應令該督撫運至潼關陜西督撫接受轉運庶於散給兵餉賑濟饑民均有裨益應作何挽運爾部作速詳議具奏特諭康熙三十一年二月初四日諭大學士伊桑阿阿蘭泰陜西省西安鳯翔兩府所屬地方去歲遇災雖曽自京師頒發帑金遣官賑濟然百姓仍有流移者此皆無積貯預備之故也今靳輔已簡任河道總督矣靳輔於河道情形熟練曉暢可截今年漕米二十萬石交與靳輔作何酌量雇船由黃河挽運抵山西蒲州等處預為積貯即偶遇災傷既有所備於軍儲民生咸獲裨益矣至由黃河逆流轉運勢屬艱險若有米船損壞之事免其議罪則靳輔亦得殫心盡力黽勉報稱可降㫖九卿㑹議爾等亦同靳輔議之康熙三十一年二月初四日諭內閣江北漕米速行截留二十萬石至蒲州等處積貯預備誠為有益但自砥柱至蒲州一帶地方可否挽運若遣部中司官往視或勘閲草率借端推諉稱為不可若交與地方官則退縮畏事託辭勞民或以彼地豐收無處需米指稱不必挽運或因循遲緩以致氷凍指稱不可輸挽如此則特命運米亦屬徒然矣凡事身任其責殫心奉公竭蹶圖之無有不奏效者前黑龍江置戍轉運軍儲衆皆謂地屬初闢其事為難朕惟斷自一已見諸施行今屯兵列障運道開通絶塞遐邊丕振功效此即已著之實驗也可下九卿議之康熙三十一年三月初四日諭大學士伊桑阿阿蘭泰王熙張玉書學士德珠溫保王國昌王尹方王掞李柟總河靳輔年邁而有疾河務所關至要當豫遣材幹之人用副靳輔俾習練河務則異日可以接續綜理其下九卿議奏康熙三十一年三月十六日諭兵部國家簡用武臣委任封疆重寄專期軍民輯睦邊境乂安其實有宣力纍年茂樹偉伐者則旌庸之典必加渥焉甘肅提督孫思克久厯邊地熟諳機冝當秦省用兵之時素著勞績自任提督以來益殫謀猷實心幹濟惠愛洽於士卒威望讋乎外彛特沛殊恩用昭寵奬著加太子少保給一拜他喇布勒哈番以示朕展勳酬勞至意爾部即遵諭行特諭康熙三十一年三月十七日諭大學士伊桑阿阿蘭泰學士德珠溫保王國昌近觀科道等官竟無條奏者夫設立科道特欲其有所建白也當言之時應不時具奏可以此意傳與科道官知之康熙三十一年三月二十九日諭大學士伊桑阿阿蘭泰張玉書學士𫝊繼祖溫保王國昌王尹方王掞李柟喀爾喀王貝勒貝子公台吉等向未入覲京師初次來朝者仍依原賞喀爾喀之例給之若曽經入覲一次已蒙錫豫而復來者皆凖四十九旗例以頒賚焉其下理藩院注冊著為定例遵行可耳康熙三十一年四月十九日諭大學士伊桑阿阿蘭泰張玉書學士傅繼祖溫保王國昌王尹方王掞李柟遣往察看黃河之前鋒統領碩鼐等差回奏稱察看黃河自寧夏至潼關皆可舟運但龍王站一處水勢陡絶湍激不可行船其間由陸路起剝十里過水陡之處即由船運便可直至潼關西安矣既如此應差工部賢能司官一員會同巡撫葉穆濟於船窩裏地方造可載一百石之船二百隻逆流至龍王站下停泊預為備用又聞歸化城北翁魁等山産有材木令遣八旗鐡匠木匠歸化城派出夫役伐木踞板運至湖灘河朔津口造裝載一百石之船二百隻此造船所需鐡與油麻等物自該部發往船工既畢之後將大同米石出沙虎口轉運至湖灘河朔津渡泊船之處俟彼時再議造船之暇自大同至湖灘河朔工所其轉運之路應察看詳明預加料理爾等會同户工二部確議以聞康熙三十一年五月初一日諭大學士伊桑阿阿蘭泰張玉書尚書馬竒侍郎凱音布學士傅繼祖溫保王國昌王尹方王掞李柟聞山西平陽府等處雨水協時牟麥豐收其直必賤可遣賢能官員往彼購買預為積貯不惟有益於民異日儻有需用亦得所資矣可令九卿詹事科道會議以聞康熙三十一年五月初一日諭大學士伊桑阿阿蘭泰張玉書學士𫝊繼祖溫保王國昌王尹方王掞李柟積穀者至要之務也誠有所積貯雖遇災傷斷不致於饑饉但小民不知儲蓄每值豐收之年恣意糜費及逢儉歲遂底困窮今時届麥秋可敕各該地方官勸諭百姓比戶量力共相樂輸委積儲峙州縣官將捐助者姓名與米數注冊秋成之後亦倣此行焉其春時乏食者貸與之至秋照數收入以為積蓄夫每年於麥穀告登之候勸勉捐輸則數歲之間倉廩充裕即罹災䘲民食自可不虞匱乏矣爾等會同九卿詹事科道議奏康熙三十一年五月初二日諭大學士伊桑阿阿蘭泰今年陜西西安地方三春雨水愆期秋收豐歉未可預計襄陽者附近西安形勝之地也可將截留江寧荆州糧各十萬石交與該督撫以官船運至襄陽先時儲蓄其下九卿詹事科道即行㑹議以聞康熙三十一年五月初九日諭大學士伊桑阿阿蘭泰學士傳繼祖逹瑚溫保王國昌戴通西安巡撫布哈疏稱雨水未足人民患病者頗多夫雨水不足則秋收難望若何拯濟其疾病若何救治可下九卿科道㑹議以聞康熙三十一年五月二十四日諭大學士伊桑阿阿蘭泰侍郎朱都納學士傅繼祖逹瑚溫保戴通王國昌朕思此時正當簡閲軍旅以備調遣每佐領撥鳥鎗護軍各一人撥前鋒親軍護軍各十人漢軍火器營兵撥二千人如無須調遣朕巡厯塞外時親率以往此兵各給整理器械銀十兩使今冬竟不徵發則所給銀兩可於軍餉之內寬緩其期零星除扣之其下㫖議政大臣各都統將所派禁旅器械軍裝皆令全具無缺以備一有調遣立可啓行大臣官辨並擬出焉此師不過預備而已可將是意諭軍士知之康熙三十一年五月二十八日諭尚書庫勒納等審事畢爾等親齎來奏知府副將在邊疆啓隙生事以未叛指為已叛擅興師旅詭報擊敗者事關軍機即行加戮何必遲疑爾等會同總督審明即於彼地正法示衆否則遐邊遠域啓隙謊報者安所懲戒耶至於土司爾等如再三招徠安輯彼仍抗拒不出會同總督撲剿之可將此㫖繕寫呈覽交大學士等特諭康熙三十一年七月初八日諭大學士伊桑阿阿蘭泰學士傅繼祖戴通王國昌將軍薩布蘇奏請逹呼里西白之五百兵令其學習鳥鎗夫以邊兵訓練火器所言雖是但逹呼里西白之衆遷徙甫至未獲寧居盡其族類槩令學習似為未當或俟之數年安土樂業始令操練鳥鎗或應作何籌度另為訓練其密咨薩布蘇具議以覆康熙三十一年七月十五日諭大學士伊桑阿阿蘭泰學士傅繼祖席喇逹瑚戴通聞西安所屬驛站凋敝可交該督撫整頓之彼土民生近日情形比前如何田禾收穫豐歉如何秋麥已播種乎抑猶未也可令詳明踏看來奏康熙三十一年九月十四日諭大學士伊桑阿阿蘭泰學士席喇逹瑚戴通今所備禁旅之內每佐領撥護軍七名其前鋒軍則簡四百名火器營兵則分其半於十月杪遣赴大同飼養馬匹預備徵調應遣大臣令兵部奏請曽隨朕之每佐領護軍一人可除出之至京師簡軍預備其事宜亦令具議以聞康熙三十一年九月十五日諭大學士伊桑阿阿蘭泰學士席喇傅繼祖逹瑚德珠戴通筆帖式季慶鶴力保盜賊情殊可惡其革職發往黑龍江效力可改簽批發前者工部筆帖式愛新阿監造新滿洲房屋曽有梁木摧折致新滿洲被壓而斃聞其為人不孝不義至於已極八旗之衆無弗知者乃工部堂官不行題𠫭褫革反委為司員令監工作夫筆帖式者漸次升擢可為司員可為大臣者也如此不孝不義之人豈可為大臣與司員哉其嚴飭各部院有似此孝義不修行止謬亂好生事端代寫詞狀者察出革其筆帖式儻被革者異日挾仇訐告朕決不聼理也可咸傳諭之康熙三十一年十月初二日諭户部陜西西安等處地方連歲凶荒繼以疾疫因而閭閻失業洊致流移朕軫恤民艱焦勞宵旰自去歲冬月以來頒發帑金蠲免正賦挽輸積穀轉運漕糧屢次特遣大臣察勘多方賑濟念國家所重惟在養民目今秦省雖薄有秋收但民間匱乏已極儻非格外加恩無以使積困書蘇轉徙盡復陜西巡撫所屬府州縣衛所康熙三十二年地丁銀米著通行免徵從前所有積缺未完錢糧亦著通行蠲豁務俾比屋同霑實惠小民咸慶更生用稱朕子愛元元撫育安全至意爾部即遵諭行特諭康熙三十一年十月初六日諭刑部朕保乂黎元崇尚寬大每於刑獄之事輒厪矜恤之懷秦省西安等處地方比歲薦饑閭閻困苦業已多方賑恤屢諭蠲租尤冝大沛仁恩特加赦宥凡陜西巡撫所屬今年秋審情真緩決人犯內除十惡及軍機獲罪官員犯罪不赦外其餘自諭㫖到日通省免死照例減等發落有見在審擬未經結案者亦如之嗣後務令革心嚮善副朕法外生全至意爾部即遵諭行特諭康熙三十一年十月十二日諭吏部都察院國家設立言官職司耳目一切吏治民生得失利弊皆冝殫思畢慮據實直陳近見滿漢科道官員建白甚少殊非朕責望言路之意嗣後應各矢公忠研求時務凡可以裨益國家之事悉攄所見奏聞以俟採擇但不得懷挾私情紛更定例勦襲陳言浮泛塞責其有真知灼見應糾劾者即行參奏亦不得暗受囑託代人報復苛責細事希圖傾陷爾部即傳諭遵行特諭康熙三十一年十月二十三日諭大學士伊桑阿阿蘭泰學士席喇傅繼祖德珠戴通安布祿將軍薩布蘇佟寶等奏請驛站缺丁依數頂補無妻室者給以婦人驛遞再為增匱壯丁馬畜錢糧俱行添設則驛站可不致困敝朕思驛站困敝者皆該將軍等不省徭役不簡事件絶非要務槩令馳驛勒索之所致也雖添置驛丁增給錢糧事若不務簡省䆒復何益且所需婦人為數多矣取給一時將焉可得伊等在彼其可得緣由或有成算耶可敕該將軍薩布蘇佟寶等如何減省徭役不致凋敝驛遞所缺男婦從何充補㑹同盛京將軍確議報部康熙三十一年十二月二十一日諭大學士伊桑阿學士席喇傅繼祖德珠溫保戴通安布祿大同右衛屯駐大兵有事則大同總兵官必協同征行其鎮標兵及沙虎口協標兵皆當改為騎卒可下兵部議奏康熙三十一年十二月二十八日諭大學士伊桑阿學士席喇傅繼祖德珠溫保戴通安布祿聞西安米價尚復翔貴流民還籍者少朕為陜西地方民生時存諸懷必如何措施然後於民有濟蓋孳孳不置也先是聞自湖廣之襄陽抵陜西商州水路可逹已遣郎中蘇赫納閲視今問之內大臣索額圖乃亦乘船自商州行至襄陽夫西安米價如尚翔貴則流民不能復歸本籍自商州至襄陽既有水路可將現運至襄陽之米二十萬石即自襄陽水路轉輸至商州更自商州轉輸至西安俾相販糶則陜民之饑者流者均得蘇息矣可特遣京師賢能大臣一員會同總督丁思孔總兵官王化行等率道員劉暟將轉運米石及招還流民之事委之專理其自襄陽運至西安之米以湖廣價直止加算所運腳費與之貿易則米價必賤於民生大有禆益而流移之衆亦獲速還故土所得米直齎至湖廣復買米糧亦依此法轉輸平糶當俟陜西流民悉還本籍米價既賤之後方行停止爾等㑹同速議以聞康熙三十一年十二月二十八日聖祖仁皇帝御製文二集卷十一
