body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻十六目録勅諭諭勇略將軍趙良棟諭大學士伊桑阿等諭吏部都察院諭吏部等衙門諭大學士伊桑阿阿蘭泰學士三寳楊舒羅察席爾登諭大學士伊桑阿阿蘭泰諭提督江南學政學士張榕端提督浙江學政侍講張希良諭明史館監修大學士伊桑阿張玉書李天馥吏部尚書熊賜履總裁户部尚書陳廷敬禮部尚書張英原任左都御史王鴻緒諭内閣諭宗人府禮部諭兵部諭大學士伊桑阿阿蘭泰諭内閣諭户部諭大學士伊桑阿阿蘭泰諭方略館總裁大學士伊桑阿阿蘭泰王熙張玉書李天馥吏部尚書熊賜履禮部尚書張英
