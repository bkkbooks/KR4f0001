body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷十一敕諭諭大學士馬齊兵部侍郎查弼納學士渣克旦勒什布外省總督巡撫提督總兵官俱有繕摺請安之例伊等請安摺子朕俱硃筆批發其在外大臣於朕所差人員前請安理所應當今聞得凡由京出外及各省引見官員前亦俱請朕安甚屬不合伊等既欲請安即可繕摺具奏乃以督撫提鎮大臣在微員前跪請朕安殊屬非體且雖行請安伊等亦不能轉逹奏聞嗣後在此等來往人員之前奏請朕安者永行停止康熙五十六年四月二十二日諭將軍傅爾丹等吳良海與禽獸等耳有無總無關係現今大處掃滅之事乃屬緊要若大處不理止將吳良海收取遷移以為緊要一經舉動之日向何地驅逐耶策妄阿喇布坦若一搖動吳良海自俱為我有凡謀大事之人應將小處暫置現今羅卜藏逹席之信亦尚未來也康熙五十六年五月二十日諭大學士今年春夏亢旱兹值大雨時行之候或連綿隂雨亦未可定應傳諭八旗軍民人等將顛危房屋墻垣修理滲漏之處早行苫蓋并潮濕朽壞物件移放髙處凡事豫則易備朕係年老之人凡經歷之處心思所到即行傳諭即不連綿隂雨平常豫備亦好也康熙五十六年六月初三日諭大學士馬齊等劉順卿將伊胞兄當時打死刑部照例擬斬立決甚是但念有誤殺之語故朕憐憫著九卿會議將此監候秋後處決亦屬法外施恩豈可竟議寬免九卿總視事非干已不甚留心草率議免殊屬不合著將本發回再議具奏康熙五十六年六月初九日諭吏部據趙申喬奏一念愚誠誓不欺君父但精力既衰救過不逮皇上始終矜全等語如不欺君汝子趙鳳詔居官甚屬貪婪侵欺數十萬銀兩汝何不陳奏為人臣者居官一日當盡一日之心屢以衰老推諉糊塗辦事其如國家之事何凡事不平心靜氣以求合宜有意固執逮至勢不能行則云我衰老救過不逮將以此為錯誤乎抑知而不改也若如此行事為君者安能終始矜全耶趙申喬於謝恩摺內將此等不應奏之語具奏殊屬不合其嚴飭之康熙五十六年七月十八日諭議政大臣等三路襲擊軍兵俱遵朕指示成功整旅而還其將軍蒙古王貝勒貝子公台吉等及武職大臣官員以下軍兵以上俱到極邉之處回來凡地方逺近道路平險水草多少以至敵人情形動靜之狀大略俱已悉知著將現在彼處光景逐一寫明奏聞再今將軍兵作何料理令將軍蒙古王貝勒貝子公台吉等及武職大臣官員以下軍兵以上各抒己見寫明具奏并行文將軍富寧安傅爾丹等三路軍兵俱已回來或敵人侵犯哨汛偷竊搶奪事未可定我軍應作何嚴加防範議政大臣詳議以聞康熙五十六年八月十五日諭諾爾布色楞布逹禮等爾等俱在青海走過業已識熟所以派爾等前去如今喇藏若能敗策妄阿喇布坦之兵信到即調回爾等倘喇藏被策妄阿喇布坦所敗爾等即與青海台吉等一體同心協力征討明白曉諭務當合而為一使伊等絶無猜疑不致生變乃好或喇藏與策妄阿喇布坦之兵會合欲征代青和碩齊須告知青海衆台吉等云策妄阿喇布坦與我大軍為敵今喇藏策妄阿喇布坦合一是與我顯為仇敵聖主始終仁愛保護顧什汗之子孫直至於今一則是聖主之恩二則是爾等祖父所立之教此時正當發憤報效與我併力而行甚易易也今四川西寧等處邉界之兵有十萬現在又調荆州滿兵一萬在成都預備太原等處滿兵又調在西寧凖備我兵真不可勝用將此情亦明白諭知代青和碩齊策妄阿喇布坦之兵先征喇藏既畢方去圖謀逹賴喇嘛必如此告知再將軍額倫特曽在軍營走過漢仗既好才具亦優凡事要爾等一體同心若有所聞見處務必公同商酌而行康熙五十六年九月初一日諭議政大臣此次兵丁雖未臨陳克取地方然官兵協意同心效力甚屬可嘉此二十五萬六千零四十三兩銀兩將朕內庫發出令之整理馬匹器械第路逺不能即逹附近何處地方所有錢糧著户部速行料理成功時此項銀兩不必扣除俸祿錢糧俱作朕之賞賜若未有行走之處空回各本汛者如議政所議仍行扣除現將內庫銀兩照此數交與户部速行解往陜西此項錢糧係朕特恩其另造檔案務令核實清楚特諭康熙五十六年九月初六日諭大學士馬齊等從前曽諭九卿各省官員內有居官不好聲名不堪者隨聞隨即繕摺具奏今李錫居官甚劣何以竟無一人奏朕各省官員賢否九卿豈無所聞凡大臣啓奏苟所聞不確於奏摺內即云臣所聞如此不甚詳確一併聲明未嘗不可朕亦止欲知之耳並非不加訪實即行治罪也况奏摺又不發出隨聞隨奏各省官員亦知懲戒悛改近閲九卿保舉以為好官而薦引者有之以為劣員而糾參者何並無一人著諭九卿康熙五十六年九月二十日諭大學士馬齊等河南盜賊蔓延如此總兵馮君洗一次未嘗奏聞巡撫張聖佐雖經具奏並不將實情聲明又不嚴加查緝是以朕諭令山西總兵金國正巡撫蘇克濟查奏乃知張聖佐等不能查緝此盜因遣尚書張廷樞學士勒什布等前往查拿今已全獲覽其供狀與金國正蘇克濟等所奏相符此案鄰省各官俱已確聞而九卿豈竟無所聞耶九卿內有豫省人何亦無一人奏聞也從前屢諭一應事務應隨聞隨奏似此關係地方要事自應有聞即奏或所奏未切不妨奏云臣所聞如此所知未確一併陳明至巡撫年羹堯所賞差往松潘兵丁銀兩米石牛羊茶葉康泰等領去並未全給兵丁致各兵鼓噪而回此皆康泰平素並不訓練并不撫恤之故也各省督撫提臣悉係封疆大吏總兵官等有管轄一省兵丁防守地方之責關係甚重凡補總兵時朕惟視其騎射嫻熟人材壯健曽有效力之處即行除授此內有居官不好不留心地方並不黽勉供職者九卿官員應隨聞隨奏今觀九卿保舉人員惟圖利己兾其酬報即行薦舉者甚多似此有關地方要務以及大吏賢否雖有聞知竟置若罔聞並不具奏爾等會同九卿議奏康熙五十六年十月十九日諭户部朕統馭寰區撫綏萬國無分中外凡率土兵民之生計未嘗一日不為之勤求也自剿滅三藩以後為八旗甲兵詳加籌畫曽頒發帑金數百萬兩代清積逋又資其匱絀復賞數百萬兩凡隨圍出征雖給行在錢糧官駝馬匹猶恐用度不繼設立八旗官庫以濟官兵四十五年復施恩將官庫未經扣完銀三百九十五萬六千六百餘兩盡與除免嗣後官庫事務漸至擾亂故停止八旗之庫設立公庫自此以來官兵有益庫內案件亦甚清楚但每月扣取錢糧朕深為厪念曽有無耻積惡撥什庫侵欺兵餉朕故交與户部將兩月錢糧一次支放俱令給與本人近聞領取銀兩兵丁甫出部門即被人持去公庫既行扣除又復償還私債兵丁所剩甚少以此養贍室家奉行差務斷然不足朕每懷及此深切軫惻兹特大沛恩施式𢎞撫育停止公庫將現今未經扣完銀一百九十一萬八千兩有竒通行豁免自五十七年正月為始著給與兵丁全分銀兩爾部即傳諭八旗都統等出示通曉俾咸知朕優恤禁旅至意康熙五十六年十一月二十四日諭户部朕撫馭寰宇五十餘年夜寐夙興為小民勤求生遂凡率土逺近皆期共享樂利聿成家給人足之休未嘗一日不厪諸懷也數十年以來各省正賦屢經全免歷年積欠亦已蠲徴偶有雨澤愆期或發倉廩散給或截漕糧賑救不惜數萬萬金錢米榖頻沛恩施誠念窮簷之艱慮其至於顛連失所耳近者民力雖已稍紓然念分年帶徴銀兩若不格外優寬則小民一歲所獲分納二年之賦以其贏餘養贍室家斷難充足朕每懷及此軫惻良深宜更加殊恩通行豁免今將直𨽻安徽江蘇浙江江西湖廣西安甘肅等八處帶徴地丁屯衛銀二百三十九萬八千三百八十兩有竒概免徴收其漕項雖例不準免亦著破格施恩將安徽江蘇所屬帶徴漕項銀四十九萬五千一百九十餘兩米麥豆一十四萬六千六百一十餘石內免徴各半爾部即行文該督撫嚴飭所屬實心奉行遍加曉諭俾民間無徴催之纍均霑實惠用稱朕撫恤羣黎至意倘有不肖有司借端朦混私行徴收者該督撫嚴察參處如該督撫失察一併從重處分爾部即遵諭行康熙五十六年十一月二十五日諭大學士馬齊松柱李光地王掞等歷觀古來帝王建立起居注亦間有廢置者朕在位日久設立多年近見記注官內多年少微員皆非諳練事務之人伊等且不知措置此身又何能全記朕之諭旨耶且官職卑小或有事關大臣者囑托伊等即任意粉飾裝點朕之諭旨及多遺漏不行備録且抄寫旨意與人視為常事記注之事關係甚巨一言失實足啓後世之疑即如趙熊詔曽私抄諭旨擕出朕若設立起居注一二年而即廢或謂朕懼伊等記載是非亦未可知朕立起居注甚為久逺在位五十七年矣非從前在位日淺之主可比其是非何待伊等記注此衙門全無裨益作何裁革之處爾等會同九卿議奏康熙五十七年三月初三日諭大學士馬齊等發往黑龍江伊蘭哈喇三姓地方之人俱因凶惡發遣人亦日多若發在一處地方必致生事行凶此後停其發往著發喀爾喀和卜圖烏蘭古木地方彼處水土甚好著築城安插令其開墾耕種八旗每佐領派護軍披甲各一名於八月內馬匹肥壯時前去二年一換駐劄彼處看守如此則沿途臺站甚屬緊要每站應設立車輛預備毋致犯人勞苦方好著交與京城議政大臣會同九卿議奏康熙五十七年七月十五日聖祖仁皇帝御製文第四集卷十一
