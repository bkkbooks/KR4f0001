body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三敕諭諭吏部川陜總督殷泰前曾因病奏請解任調理朕念殷泰清潔自持約束屬下恩威並用陜省軍民罔不感戴朕甚愛惜令在任調攝已有諭旨今病勢未能即愈總督印務雖有巡撫署理但陜西地方遼濶最屬緊要總督員缺不可久懸殷泰著解任湖廣總督鄂海屢任陜西熟諳地方兵民情性俱所深悉且才具頗優將鄂海調補川陜總督特諭康熙五十二年四月初七日諭刑部朕聽政日久凡果係裨益民生之事有所聞見立即施行其聽之似是而鮮實惠者斷不行也京師及各省惟不稽延事件速行料理則凡事不至叢脞自無淹滯牽纍之弊此乃本源要務也今趙申喬惟以農忙為言不諳甚矣若謂四月至七月有誤農功則八月正北方收穫田穀之候在南方係禾苖正長之時至廣東福建十月間始行刈稻種麥直至二月麥秋農民未嘗少有休暇也且有多事大吏及督撫等收受詞狀不預加詳察不速行審理案牘堆積完結無期終歲耕啇為之停廢小民紛紛嗟怨况遲誤事件豈獨四月以後乎即去冬詞訟延至五月亦妨農時前此恤刑之事每致淹遲以故停止此事亦與相似所奏無益也康熙五十二年四月初八日諭大學士溫達松柱李光地蕭永藻王掞朕前一聞廣東米價騰貴即降諭旨將漕糧截留由海運濟并作何速行賑濟之處交與九卿會議發常平倉積穀三十萬石平價糶賣已經交與趙申喬等前往辦理今將軍管源忠又以米價騰貴繕摺具奏及朕詳問巡撫滿丕遣來奏摺家人口稱彼處雨水調勻麥稻茂盛現今收麥等語滿丕今又發常平倉積穀二十萬石見在平糶趙申喬等再到彼處賑濟民間斷不致乏食俟八九月北風起時動撥江浙兩省捐納米三十萬石用水師營戰船裝載由海運往不惟米石可以濟民而兵丁亦得習練水師事務若廣東豐收將此運至米石一半存貯粵省一半分運閩省備貯庶於民生大有裨益爾等與九卿會議具奏特諭康熙五十二年五月初三日諭內閣提督康泰奏稱蜀省一碗水地方聚集萬餘人開礦隨逐隨聚差官力行驅逐等因繕摺具奏朕念此等偷開礦厰之徒皆係無室可居無田可耕乏産貧民每日所得錙銖以為養生之計若將此等乏産貧民盡行禁止則伊等何以為生果如滇省礦厰所出頗多亦可資助兵餉此處所出無多該地方文武官員作何設法使窮民獲有微利養贍生命但不得聚衆生事妄行不法似屬可行爾等與九卿會議具奏康熙五十二年五月初三日諭大學士溫達松柱李光地蕭永藻王掞武官係朕親驗騎射及人材壯健補授故爾識認文官皆係臨民之官關係尤重凡掣籖月官悉行引見應補授者俱行補授其年老不及者令原品休致惟在外升補等官概不引見伊等賢否豈得周知嗣後作何驗看辨别爾等與九卿會議具奏康熙五十二年五月初三日諭大學士溫達松柱李光地蕭永藻王掞今年八月時將江南捐納米內發二十萬石用鎮海將軍標下戰船及松江提標戰船狼山鎮標戰船裝載著總兵穆廷栻總管船隻浙江捐納米內撥十萬石用浙江提標戰船及定海鎮標戰船裝載著總兵吳升總管船隻俱運至廣省此運米兵丁口糧及回汛時或遇風勢不順行船有阻亦未可定所需口糧亦宜預備帶往不得動用賑濟額米江南織造署內朕曾預偹米一萬石如八九月間江南有動用處則已如無所動用將此項米石亦應一併運去所缺米石朕另行補貯著行文該督撫詳悉速議具奏康熙五十二年五月初五日諭大學士溫達松柱等先經拿獲海賊俱已發遣寧古塔等處現今陳尚義一百餘人又來歸誠伊等俱係熟識水性海道之人盛京金州地方著設立水師營將伊等發往近據山東總兵李雄奏請裁伊標水師營戰船十隻即將所裁數內截留數船分往金州看守地方巡防海洋似有裨益著滿漢九卿詹事科道會同確議具奏康熙五十二年閏五月初九日諭大學士溫達松柱學士舒蘭馬良綽奇常泰總督赫壽為廣東省運米所奏疏內以戰船今係大修之年俱各修理不堪應用請雇民船運米等語沿海各省設立戰船者特為防護地方裨益民生以備急需也今據稱戰船俱不堪用請雇民船可知戰船少而民間貿易之鳥船多雖有修船之名徒致耗費錢糧况修一戰船需用之錢糧甚多觀此將所修戰船或賣與民人或雇與民人貿易并將民人破壞船隻頂補充數揑稱修理亦未可定倘有用處將如之何此習相沿成風應用之時恐必致遲誤著問九卿令會議以聞康熙五十二年七月十二日諭大學士松柱李光地蕭永藻王掞等三年鄉會試原期得實學真才自必以研究經書義旨為根本蓋四書五經皆聖人講理明道之書貫始徹終無非精意近見鄉會試俱擇取冠冕吉祥語出題每多宿搆幸獲致讀書通經之士漸少今後闈中題目應不拘忌諱庶難預作揣摩實學自出著九卿會議具奏康熙五十二年十月十一日諭大學士溫達松柱李光地蕭永藻王掞學士舒蘭馬良傅爾呼納綽奇常泰彭始摶鄒士璁沈涵兼管翰林院事左都御史揆敘侍郎湯右曾等翰林官關係緊要必讀書立品方稱厥職今翰林官甚多朕皆不識自講讀學士以下編檢以上及滿洲漢軍由進士選入翰林者其中或有不修行檢日事飲博及詩文書法全不究心又或督學典試分考聲名不好者爾等會同九卿詳查舉出即行黜退各省皆有翰林九卿豈無聞見毋容徇隱其現在散館庶吉士及教習進士內有此等人亦舉出革退康熙五十二年十月二十九日諭户部朕勤求民瘼無間遐邇雖在邊徼逺省偶有旱潦災傷無不訪察情形殫思賑救今歲直省各處俱獲收成惟廣東三水清逺高要高明四會五縣福建侯官縣福防廳所屬福右衛二處甘肅靖逺衛環縣鎮原縣固原州固原衛平涼縣崇信縣慶陽衛靈州所會寧縣寧夏中衛寧夏所古浪所一十四處今歲夏秋被災各督撫已經奏聞雖各省地丁錢糧新經全免然一方災歉悉厪朕心艱食之際重以追呼朕所不忍其明年應徵廣東省三水等五縣額銀七萬七千九百兩零米一萬七千六百石零福建省侯官縣等二處額銀三萬六千六百兩零米六千四百石零甘肅靖逺衛等一十四處額銀四萬七千七百兩零糧八萬八千五百石零草八十四萬三百束零盡與蠲豁爾部即行文各督撫務須星速奉行即刻遍行曉諭俾民間無徵催之纍肆力東作用稱朕撫恤災黎至意倘有不肖有司奉行稽遲或借端别行科派使小民不霑實惠該督撫嚴察參處如該督撫失察一併從重處分爾部即遵諭速行康熙五十二年十一月初七日諭大學士溫達松柱李光地蕭永藻王掞學士綽奇常泰沈涵等近見直𨽻各省考取武進士額數或一省偏多或一省偏少皆因不知其弓馬武藝止憑文章取中以致騎射嫻熟諳習韜略之人多有遺漏嗣後考取武進士不必拘定額數俟天下會試武舉齊集京師令該部將各省赴試到部武舉照例考試弓馬將合式武舉等實數查明預行奏聞朕計省之大小人之多寡照考取文進士例按省酌定取中武進士額數考取時就本省卷內擇佳者照所定數取中如此則學習武藝弓馬優長者不致遺漏矣康熙五十二年十一月初八日諭大學士溫達等文武考試雖曰兩途俱係遴拔人才而習文之內亦有學習武略善於騎射者習武之內亦有通曉制藝學問優長者如或拘於成例以文武兩途不令通融應試則不能各展所長必致遺漏真才嗣後文生員舉人內有情願改就武場考試者武生員舉人內有情願改就文場考試者應各聽其考試如此則各得施其所學文武兩途皆得真才矣著九卿詹事科道議奏康熙五十二年十一月初十日諭大學士溫達等地方文武官原為弭盜安民而設如平日綏輯得宜遇有草竊事發即時查拏誅滅何致劫奪若徒事招撫則官兵漸至疏忽草竊小賊益無忌憚於地方甚屬無益嗣後山海盜賊有真心嚮化自行投首者該督撫察明奏聞其遣人撫諭招來之處永行停止康熙五十二年十一月十六日諭禮部爾部於一切禁止事件應加意遵行務期得當覽僧官等呈甚是現今京師各種僧人賢愚不一前有誑稱善知識等名與諸王大臣往來生事者爾部不能稽查言官不能糾劾乃推諉僧官不能奉行深為溺職僧録司職甚卑微各處遊僧嘗脅制僧官至無容身之地若依此奏愈至查禁無人各種僧衆益恣意肆行矣著再詳議具奏康熙五十二年十二月十六日聖祖仁皇帝御製文第四集卷三
