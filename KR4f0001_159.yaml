body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷三十四碑文重修闕里孔子廟碑朕惟大道昭垂堯舜啓中天之聖禹湯文武紹危微精一之傳治功以成道法斯著至孔子雖不得位而贊修刪定闡精義於六經祖述憲章會衆理於一貫為往聖繼絶學為萬世正人心使堯舜禹湯文武之道燦然丕著於宇宙與天地無終極焉誠哉先賢所稱自生民以來未有盛於孔子者也往歲甲子朕巡省東方躬詣闕里登聖人之堂祗將祀事覩其車服禮器金石絃歌蓋徘徊久之不能去焉顧聖廟多歷年所丹雘改色榱桷漸圮用是惄然於心特發內帑專官往董其役鳩工庀材重加葺治經始於辛未之夏事竣於壬申之秋廟貌一新觀瞻以肅蓋深惟孔子之道垂範古今朕願學之志時切於懷每考天人性道之原修齊治平之要思以逺紹前緒牖迪生民凡所以尊崇褒顯者靡不隆禮竭誠以將景行仰止至意而况廟庭之地尤為聖人神明所憑依者哉今者登堂而陳爼豆入室而習禮儀營構既堅采章彌煥庶幾於朕心深有慰焉用是特遣皇子胤祉敬展禋祀以告落成凡我臣民瞻仰宫牆倍增嚴翼尚益思敦崇德義砥礪倫常以不負朕尊師重道之意豈不休與因勒貞石系以辭曰麟書啓瑞素王挺生上律下襲玉振金聲範圍百代陶甄萬類道備中和德參天地立型垂訓師道昭宣象懸七曜海納百川曩巡東魯臨河登岱峩峩尼山羮牆斯在虔恭展謁至德是欽宗風溥博教澤閎深洙泗之陽殿寢翼翼上棟下宇神靈安宅冬官特飭締造維新宏規大啓肅奉明禋聖人之居永以觀德千載傳心四方式則平定朔漠告成太學碑惟天盡所覆海內外日月所出入之區悉以畀豫一人自踐阼今蚤夜殫思休養生息冀臻煕皥以克副維皇大德好生之意庶幾疆域無事得以偃兵息民乃厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外輒狡焉肆其凶逆犯我邊鄙虐我臣服人用弗寧夫蕩寇所以息民攘外所以安內邊寇不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬臨朔漠欲使悔而革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢涉寒暑勞苦艱難與偏裨士卒共之逮彼狂授首脅從歸誠荒外君長來享闕下西北萬里灌燧銷烽中外乂謐惟朕不得已用兵以安民既告厥成事乃蠲釋眚災潔事禋望為億兆祈升平之福而廷臣請紀功太學垂示來兹朕勞心於邦夲嘗欲以文德化成天下顧兹武略廷臣僉謂所以建威消萌宜昭斯績於有永也朕不獲辭考之禮王制有曰天子將出征受成於學出征執有罪反釋奠於學以訊馘告而泮宫之詩亦曰矯矯虎臣在泮獻馘又禮王師大獻則奏愷樂大司樂掌其事則是古者文事武事為一折衝之用具在樽爼之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祗歸而遣祀闕里兹允廷臣之請猶禮光師以告克之遺意而於六經之旨為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征伐自天子出朕臨域中逾兹三紀嘗見羮墻寤寐永矢下念民瘼上承帝謂四海無外盡𨽻侯尉維彼凶醜瀆亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉畀不施將害稼穡度彼遊魂險逺是怙震以德威可往而取朕志先定龜筮其依屬車萬乘建以龍旗祝融驂鸞風伯戒途宜暘而暘利我樵蘇大野水涸川瀆效靈泉忽自涌其甘如􅌬設為犄角一出其西一出其東中自將之絶域無人獸羣自掩五日窮追彼狂走險大殲於路波血其孥翦其黨孽俘彼卒徒衆烏晝號單馬宵遁恐久駐師重為民困慎固戍守還轅於京自夏徂冬雨雪其零載馳載驅我行至再蠢兹窮寇昏惑不悔我邊我氓以休以助爰寧其居爰復其賦藩落老稚斯恬斯嬉歲晏來歸春與之期春風飄翩揚我斾旓我今于邁如涉我郊言秣我馬狼居胥山登髙以眺閔彼彈丸天降凶罰孤雛就羈三駕三捷封狼輿尸既臘梟獍既獮豺貙大漠西北解甲棄殳振旅凱入澤霈郊卜明禋肆赦用迓景福昔我往矣在泮飲酒陳師鞠旅誓屈羣醜今我來思在泮獻功有赫頌聲文軌來同採芹採藻頌興東魯車攻馬同亦鐫石鼓師在安民出非得已古人有作昭示斯旨緬維虞廷誕敷文德聖如先師戰慎必克惟兵宜戢惟德乃綏億萬斯年視此銘詞開國佐運勳臣武勳王揚古里直義公蜚英東𢎞毅公額宜都碑朕惟我國家創建丕基開無疆之景運既篤生神聖英武之君以翦除亂逆啓闢疆宇戡定諸邦一統之烈肇於東土其時則有一德一心之佐殫忠戮力經營四方以翊鴻猷而成大業蓋天實挺生異才鍾山嶽之靈挾風霆之氣貞誠不二毅勇無倫名髙百戰之勳位超五等之爵垂聲竹帛配食廟廷以與國家共承休祉子孫世衍其澤是豈偶然者哉當我列祖之龍興也一時人材蔚起猛士如雲戰將如雨以藝勇稱以功名顯者不可勝數而功冠諸臣為一代元勳則有開國佐運忠勇王揚古里直義公蜚英東𢎞毅公額宜都尤為傑出焉朕嘗恭覽列聖實録考三臣行事折衝行間則戰必勝攻必克平居則矢忠直贊謀畫豐功偉績至今焜耀簡編未嘗不緬想英風興懷往迹昔人創造艱難枕戈擐甲櫛風沐雨之勞恆留連往復不能去於懷也歲在戊寅朕巡行舊京展祀陵寢追維祖宗功德隆盛並及當時佐命之臣丘壠所在皆遣官致祭而於三臣之墓特親至奠醊以示優崇仍復專官祭享蓋功在社稷以死勤事古人爰有明禋之典朕篤念勳庸用申異數並為文勒諸貞石以昭示於無極焉賜一等公內大臣都統國舅諡忠勇佟國綱碑朕惟自昔勳舊之臣乃心王室平居恪勤職事左右宣勞一旦奉揚威命忠不辭難勇不避險鴻名駿烈焜耀無窮史册所書良足嘉歎爾佟國綱賦性貞純秉心淵塞親居元舅而敬以持身位列上公而謙能服物入則虔共宿衛出則管領禁軍偉量夙重於巖廊令聞允孚於寮寀乃者小醜搆爭近逼邊圉三軍聲討簡佑元戎爾乃慷慨厲兵紏桓敵愾屬賊鋒之既挫將棄壘以潛奔爾猶擐甲直前提戈獨進鋭志彌堅金石壯氣逾薄虹霓誓掃陸梁永清朔漠豈期上將遽殞師中夫爾以肺腑之親心膂之寄秩崇望峻勞久勳高假令偕衆旋軍亦可從容奏凱而義存憤激甘蹈艱危人盡如斯寇奚足殄易曰君子以致命遂志傳曰殺敵為果致果為毅惟忠生勇爾實兼之循行易名斯無愧矣嗚呼典禮加隆榮哀悉備英風震於邊徼徑節炳若丹青九原有知應無遺憾惟朕眷思懿戚篤念老成身後追褒久而益痛特命所司勒文墓石昭朕無已之懷亦俾後人知所激勸焉賜江南江西總督傅臘塔碑朕惟國家所以資封疆之大吏者固在乎操履潔清正已率物又必優幹濟之才具通明之識斯足以振肅下僚綜理繁劇綏靖兵民以無負乎簡任之重古人所謂有猷有為有守兼之者實難其人也爾傅臘塔秉性貞誠賦材敏達朕屢經拔擢出典屛藩入為卿二稔知其品行端廉謨猷恢裕念兩江幅􅊷遼闊事務殷繁彈壓保釐亟需偉略爰畀爾總制之任俾展其經理之才爾能精白一心坊表庶職風清弊絶輿論翕然更能寬嚴互用咸綱舉而目張教養兼修亦害除而利溥軍民輯睦里井乂安斯其才守兼優豈非國家之楨幹臣工之模楷者與倚任方殷遽爾徂逝吏民謳思至於流涕且籲請尸祝觀愛戴之弗諼知德施之未泯朕用是深軫於懷馳賜奠醊恤典加渥諡曰清端製文以褒美之嗚呼人臣能奉宣德意以嘉惠一方生膺顯秩殁有榮名勒之貞珉傳於奕世寧不休與天津海神廟碑朕昔巡厯天津詢知直沽海口去盛京數百里舟航泛涉實利轉輸乃者奉錦兩郡歲穀不登兵民乏食深厪朕懷而陸運之程踰山越谷曠日為勞厥惟創興海運斯足拯濟民生爰命學士陶岱往蒞其事酌撥倉粟運以巨艘出直沾之口東指遼海篙師棹卒並力一心波濤不興天日清皎祥飇遄送帆槳如馳甫三日即達盛京賑給所暨周遍窮簷俾此京輔之邦咸與遂生樂業則惟爾海神有靈克相朕以寧兹兆庶也朕惟望秩之典國有常祀而非常之功尤宜報享天津東舊有海神廟今特命工庀材重加營建朱甍碧瓦規制崇宏庶幾鑒兹悃忱益加祐助豈惟豫一人惠鮮之意藉以有成將盛京世世軍民皆得邀神貺於勿替也是用揭諸穹碑表神之功德以埀示永久焉金山江天寺碑大江之中有山岌峩嶻嶪湧波濤而傑出者無如金山山之上高閣飛棟軒然四列凡夫日月之蔽虧風煙之噴薄帆檣樓堞鳬魚之出沒隱見於其中者舉可俯而有也夫岷山之源其始濫觴及乎建瓴而下近縈巴蜀遠跨荆揚數千里而歸墟於大壑滔滔南紀昔人目之天塹當六代時偏安建業江之左右遂為重鎮是山以卷石屹乎中流引淮泗苞吳會可不謂天下之雄觀形勢之極勝者哉今四海一家書同軌合纖塵不揚斥堠無警舟車則萬國霧會筐篚則九域星馳是山也信足以為登臨之美蓋異夫昔之憑藉江山以為險者矣朕南巡過此停憩山寺撫長江之安流見水天之相接曠焉興懷書江天一覽四字留之寺中爰命葺而新之不以勞吾民事竣請額其瑰壯巨麗當益足以增江山之奇矣因憶舊觀浩渺澄泓空闊無際猶可心會遂名之曰江天寺云射虎川臺麓寺碑五臺峙京邑之西綿亘晉代數州地是為天下靈區奧境以壯固神京癸亥春二月朕巡省民俗言陟兹山而觀覽焉去臺懷數十里適有虎隱現叢薄間朕偶御弧矢一發殪之里人皆歡呼曰是為民害久矣今鑾輿臨幸而此獸用殛殆天之所以除民災也因號其地曰射虎川且相率為浮屠之宮以表厥異既成襟帶山澤靣勢爽塏重櫨巨棟鳥革翬飛與臺上諸名剎相映帶稱勝槩焉邦人重其事請朕制文勒碑以垂永久夫事雖微而苟有利於民則皆可紀以示後嘗觀周禮特命官掌設弧矢以攻猛獸蓋虎豹鷙戾能戕人害物者必殄絶之仁民故也朕乘輿所歷偶接於耳目之前爰發一矢斃一獸事則適然而羣心咸悅流傳以為嘉美其有合於先王服猛之義也夫故俯順其請因勒斯文用志巡歷之歲時云爾菩薩頂大文殊院碑夫坤輿九壤厥有名區方志所標莫之勝紀若其巒隴綿邈巖岡崇阻縈紆窈窕悠然遠望列峰競秀壁立霞駮不可殫視則惟清涼山之五臺為最勝五臺並高數十里如覆盂如懸棧閣如鶻摩天如鼇脊出海飛崿穹岫飄渺超忽而風高氣寒土脈深狹遠近如一至夫鬱盤回薄斥為廣衍之地藴真萃異信為靈迹之所棲託者惟臺懷為最勝臺懷居五臺之中左襟右帶前俯後仰若在懷抱其地陽陸平林舊多梵剎有菩薩頂文殊院者相傳文殊示現於此其殿廡尤莊嚴𢎞邃殆福地之精藍神坰之奧迹也我朝建鼎以來歲有賜給為國祝釐蓋其境域過清不可以業四民故於禪棲為宜雖寥迥深岨介於無何有之鄉巾瓶施乞遠莫能致然象教所感伊蒲之供率集於四方居其地者亦類能謹教律嚴心行致其潔虔以一歸於慈氏之訓庶克稱國家優厚之意焉朕西巡駐蹕兹地因劖詞於石列之院中以垂示無極云萬壽寺戒壇碑西山地接神京嶺岫綿亘林壑深美中多精藍古剎考其歷年久遠建置自唐以來者則萬壽寺戒壇為最古寺在唐曰慧聚明正統時始易今名其地渡渾河而西山徑盤互紆回而入中復豁焉宏暢壇殿軒翼猶見古遺製深山長谷烏可少此清嚴之宇以眺覽名勝哉朕以時巡偶至斯地輒為駐輦顧近寺諸山為産煤所居民規利日事疏斸念精舍之側鑿山採石良非所宜爰命釐定四止而禁之俾梵境常寧舊觀弗替於以葆靈育秀山川當益增輝澤爾𢎞慈廣濟寺碑蓋聞堂開鹿苑誇祗樹之香林境闢鷲峰傳寶華之勝地若其清風盈丈室亦豈在於離羣皎月映禪心初何嫌於近市正以琳宮伊邇瞻龍象者知尊精舍非遙聽鼓鐘者易肅兹𢎞慈廣濟寺夙稱名剎舊住高僧梵宇莊嚴峙鳳城之兌位唄音宣朗接紫陌之西隅古木垂蔭於階除皓鶴聞經於戺戶境幽塵隔如在山林心遠地偏焉知闤闠蓮花幢內常明日月之燈柏子香中深入栴檀之海六時禪誦鐸鈴響徹丹霄四海緇流鉢錫雲依法界藏經閣敞珠聯貝葉之文説戒壇高石點雨花之偈是以駐蹕常臨於淨地揮毫特賁於禪扉眷此幽恬賞其清曠僧湛祐心通釋典志勵虔修葺陳構而維新率羣衲以遵禮住持僧然叢克襄厥事庭宇秩然蓋其教以利益羣生為本其事以修持戒律為歸朕嘉其同善之心挹彼廣慈之義俯俞敦請爰錫斯文振寶筏之宗風宏金繩之覺路用垂貞石以示來兹五臺殊像寺碑蓋惟清涼福地拱紫塞以標靈臺頂名山矗蒼穹而聳秀文殊飛錫之所夙號神臯吉祥闡教之區舊多精剎况龕留古佛為法海之殊觀壤接中臺乃香林之勝境創琳宫於自昔葺紺宇以維新兹殊像禪寺開基臺畔結宇山阿谷邇鳳林環千巖之紫翠堂臨鹿苑俯萬壑之煙霞峰曰梵仙望層巒於天際泉稱般若落清澗於雲中殿有金容因名殊像天人肅穆羣瞻龍象之尊儀度莊嚴共禮狻猊之座青蓮妙相琉璃光映於林端碧樹幽棲鐘磬聲聞於嶺外乃以歲年歷久陳迹都荒風雨所摧僧寮非舊慨此丹楹畫壁無非蛛網塵封朕為慈闈祝釐故爾法駕戾止憫兹頺廢爰命締修梵宇再興唄筵如故祗園金地依然多寶之場佛頂珠光重現牟尼之瑞招提既肅緇衲咸歸室可賴以安禪用勵清修之衆事有裨於勸俗聿宏覺善之門式勒貞珉永垂奕祀五臺碧山寺碑原夫園成祗樹聿標鷲嶺之竒香滿栴檀定據琳宫之勝况山雄雲代宇結清涼文殊演教而開基天龍八部迦葉瞻容而俯首螺髻千身繄朔塞之名區實梵王之法界經馱白馬覩貝畫之常新地布黃金喜薝林之重燦兹碧山寺棟搆臺阿翬飛巖畔榜傳普濟化城之玉磶猶存谷號華嚴德水之青蓮時現銀龕珠洞映三藏之神光疊嶂層巒萃五方之靈秀浮煙罨翠迥接蒼穹含藹流清旁分緑澗何羣峰之凝碧繞丈室以增幽鴈塔崚嶒朱夏帶陰山之雪鶴林高下白毫連紫極之雲兹因歲月遷移川陵委寂禪枝忍草侵榛蔓以交蕪寶鐸雕甍歷風霜而黯色朕親來佛地藉祝慈禧爰整金繩丕施珠網啓琉璃之淨國寶樹攢香燦瓔珞之紅樓曇花四照相輪自備巧傍新幡丹鳳飛來還棲舊剎苾芻競集宏參不二之宗象力攸崇衆證無為之果用鐫貞石永煥名山聖祖仁皇帝御製文第二集卷三十四
