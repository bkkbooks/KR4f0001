body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷十七敕諭諭大學士伊桑阿阿蘭泰厄魯特親王札實巴圖爾等遣還時此處給與馬駝遣司官送往總督吳赫速赴寧夏量撥馬駝俟伊等至寧夏時即應付而遣之其自京師乘往寧夏之馬駝交與送往之官於草生時在察罕拖海地方牧養數日從塞外遊牧而來若草未生則暫於彼處飼之俟草生加意牧養帶回特諭康熙三十七年正月二十五日諭內閣運往朝鮮國米石敕侍郎陶岱共運致三萬石以一萬石賞賚朝鮮國以二萬石平糶特諭康熙三十七年正月二十六日諭內閣遣户部曽經保舉司官二員於被水災沿河之保定霸州固安文安大城永清開州新安等州縣截留山東河南漕糧每處運致一萬石以備積貯米價騰貴時平值糶賣敕户部速議具奏康熙三十七年二月二十五日諭內閣霸州新安等處此數年來水發時渾河之水與保定府南之河水常有泛漲旗下及民人莊田皆被淹沒詳詢其故蓋因保定府南之河水與渾河之水匯流於一處勢不能容以致泛濫此二河道著左都御史于成龍往保定府南河著原任總督王新命往作何修治令其水自分流詳看繪圖議奏今值農事方興不可用百姓之力遣旗下丁壯備器械給以銀米令其修築伊等往時部院衙門司官筆帖式酌量奏請帶往於十日之內即令啓行康熙三十七年二月二十五日諭大學士伊桑阿阿蘭泰尚書席爾逹侍郎馬爾漢覺羅三寶學士羅察布泰噶禮辛保溫逹今承平無事八旗佐領所飼馬匹每佐領或留六騎或留七騎其餘以四月發往牧地於九月初旬仍復來京每歲如此則錢糧既可節省而羸馬亦得以蘇息矣其更代牧視每旗副都統一員參領二員量領官員兵丁於水草佳處遊牧爾大學士等㑹同户兵二部議奏康熙三十七年三月二十五日諭建威將軍宗室費揚古北邊地方甚屬緊要兹命爾管領滿洲蒙古漢軍官兵駐劄右衛兼管歸化城地方爾須甄别將領賢否申明紀律操練士卒整飭器械一應錢糧草料等項會同巡撫及該道商確支給尤須加意嚴飭官兵不許倚勢橫行強奪市物操練新設蒙古兵丁使遵法紀不許將打草放馬為名侵擾民田務俾兵民和輯不得苦纍地方歸化城乃邊外各部落扎薩克總要之地見在雖有土墨忒兩旗官員兵丁但隊伍紀律素不嚴整今又增蒙古兵甚多爾總率兩旗都統副都統不時訓練革除積斃勸課耕種廣儲糧糗如遇內外邊境有賊寇消息即與副都統竝歸化城都統副都統等計議一面奏聞一面率領官兵奮勇剿除毋致滋蔓其有需用緑旗官兵之處大同宣府緑旗官兵聽爾酌量調遣凡敕中開載未盡事宜俱與副都統歸化城都統副都統等同心計議相機施行勿致失誤不得執拗虛憍有妨事務凡錢穀詞訟民間一應事情俱屬地方官管理不得干預爾受兹重任須殫竭忠悃宣布德威弭盜安民方稱委任如或貪黷乖張縱兵擾民貽誤重地責有所歸爾其慎之故諭康熙三十七年四月十七日諭清修禪師都綱喇嘛丹巴格隆朕惟佛氏之教以空寂為宗以慈悲為用上翊皇度下濟民生其徒有能闡揚其教者朝廷必嘉與之爾丹巴格隆夙承梵教恪守清規領衆䖍修以祝庥祉深可嘉尚兹授爾為清修禪師仍提督喇嘛僧衆朝夕讚宣菩薩頂真容院乃五臺山名勝之地清淨之所凡一應軍民人等毋令騷擾爾尚益勉進修用𢎞慈化丕振宗風以副朕褒奬之意欽哉故諭康熙三十七年四月二十二日諭內閣覽科道衙門月終注銷案件但奏稱無違限之事而事務若干件於幾日完結並未開載此後應將事件數目竝完結日期於疏內詳列具奏康熙三十七年五月十七日諭內閣烏喇寧古塔幾林烏喇黑龍江等處新滿洲內曽授官職以老病解任者照其原官品級給俸祿以養贍之矣此等解任之官令其子弟承替則供職得人而俸祿亦不致虛糜其敕兵部逐一詳察具奏康熙三十七年五月二十一日諭灌頂普慧𢎞善大國師札薩克逹喇嘛默爾根綽爾濟朕惟佛氏之道清淨慈悲西土之人崇信已久其徒有能敷揚遺教者國家亦因而嘉與之爾默爾根綽爾濟始居邊剎來住都城精持戒律為國祝釐歷有年所兹授爾為灌頂普慧𢎞善大國師爾尚率在京𢎞仁寺比丘䖍修淨業仍攝西寧𢎞善寺徒衆恪禀清規庶無負朕褒奬之意欽哉故諭康熙三十七年六月初四日諭內閣朕巡省盛京車駕既發之後副都統吳逹禪到日令其馳赴行在已有諭㫖矣其餘大臣庶官奉差回時不必前來又各處赴京陛見臣工如有應俟啓奏之事令其暫候如無事待奏其各回本任康熙三十七年七月二十六日諭大學士伊桑阿阿蘭泰今叛逆噶爾丹骸骨已經搜獲不日解至而遺孽就俘亦拘繫在此應如何處置爾等㑹同議政大臣滿漢九卿詰朝集議以聞康熙三十七年七月二十七日諭大學士伊桑阿阿蘭泰王熙李天馥吳琠學士布泰噶禮辛保溫逹恩丕顧藻徐嘉炎李録豫爾等移文奉差茶馬官所易之馬豫備三千匹可遣理藩院户兵二部賢能司官各一員前往於來年四月間青草甫長之時取道塞外解送京師康熙三十七年十一月十五日諭大學士伊桑阿阿蘭泰王熙李天馥吳琠學士布泰噶禮辛保溫逹恩丕顧藻徐嘉炎李録豫開濬下河民生攸繫朕為閭閻疾苦深切軫念曽命凱音布孫在豐于成龍王新命等專司開濬伊等俱奏工程告竣民生大蒙利益載在冊籍存部可考人亦具在可以質詢也由今觀之止是虛糜國帑水勢竝未消減田畝竝未涸出所謂有益民生者果何在耶今桑格又奏當行開濬而九卿並不詳詰從前開濬諸人亦不稽考冊籍遽議准行如果此次開濬巨浸全消疆理盡復民業得濟朕於錢糧絶無吝惜即動發帑金令其興工而已至捐助事例竝不宜允行即今山陜所捐銀米其事尚未明晰也若下河果如其所請疏鑿開濬而桑格等能必水即消田即出有禆於民以身家保奏則即令開濬之御史吳甫生亦以此事條奏所言甚是可將其疏並發九卿詳詢前次督濬者復稽考諸冊籍然後確議以聞康熙三十七年十一月十五日諭大學士伊桑阿阿蘭泰朕觀部院官員自論俸補授以來久未察劾以致年齒衰邁才力不及者甚多可令各部院衙門察其年老才劣並行止乖亂者參奏將所參之人引見焉康熙三十七年十一月二十二日諭大學士伊桑阿阿蘭泰王熙李天馥吳琠學士布泰噶禮溫逹錢齊保恩丕顧藻徐嘉炎李録豫今時際隆冬正當水涸而董安國乃奏水長朕觀其所奏諸事皆於河道水性罔協其冝殊不稱職著革任于成龍原任河道總督今河上工程皆其未完之事其下效力之人亦衆此缺著將于成龍補授速召來京陛見詳議河務令其馳驛赴任董安國未完各項錢糧及修築工程皆逐一交明于成龍可傳諭九卿知之康熙三十七年十一月二十七日諭內閣河務緊要董安國修築工程繁多恐致與于成龍等彼此推諉可遣部院堂官一員並率賢能司官前往㑹同漕督桑格將已完未完之工並所用錢糧數目逐一詳明察丈細造清冊齎來康熙三十七年十二月初一日諭內閣緣事婦人拘喚至部院衙門對簿鞫問於理未協朕因此故曽屢次頒發諭㫖今見因事牽連之婦人仍有拘至公庭質訊者嗣後除婦人親身犯罪外無論官員民人之妻有事屬牽連應行質訊之處可遣司官筆帖式往其家問取口詞其拘至公庭永行停止康熙三十七年十二月初十日諭內閣今觀部院司官竝未親筆撰稿皆委筆帖式為之堂官亦不加看閲即行啓奏是以兵部補授參將之疏中有舛錯良由此故嗣後朕不時傳部院司官令其撰作看語親加試閲若不能撰者不止將司官議罪即堂官亦竝加處分所以預為曉諭也可遍傳部院衙門知之康熙三十七年十二月十一日諭户部淮安揚州鳯陽等處比年水患頻仍浸漫隄岸田多淹沒耕穫無從百姓艱於粒食經朕時加軫恤屢賑屢蠲被災地方賴以安堵但念久歉之餘恐致資生匱乏朕厪憫殷切未嘗稍釋於懷前此雖頻敷庥澤至再至三用禆羣黎生計猶恐開春東作農事艱難若不大沛恩施安能令小民各得其所著將海州山陽安東鹽城高郵泰州江都興化寶應壽州泗州亳州鳯陽臨淮懷遠五河虹縣蒙城盱眙靈璧等州縣並被災各衛所康熙三十八年一切地丁銀米等項及漕糧盡行蠲免務使民間均霑實惠以副朕體恤元元生息愛養至意爾部即遵諭行特諭康熙三十七年十二月二十五日諭吏户兵工四部朕撫馭寰區乂安中外孜孜圖治宵旰勤民期於天下咸遂生成物無不得其所今邊烽永靖四方無事獨是黃淮為患衝决時聞下河地方田廬漂沒朕軫念民艱曩曽屢遣大臣往令督理不惜數百萬帑金務期早綏黎庶乃歷年已久迄無成功今水勢仍復橫溢浸漫城閭沉沒隴畝以致民多失業董其役者未有上䇿可以冝民時厪朕懷未嘗少釋在內諸臣咸請朕親臨指示以為一勞永逸之圖方今春時雨水减少正冝講求疏濬以遂安瀾爰諏吉南巡親加勘閲更以吳地乃東南奧壤襟帶江湖勵俗省耕兼行臨視凡一切往返供億已皆俾辦於京師即途次日用所須亦令各衙門照本地時值採買總於民間一無所纍仍恐沿途官吏藉名科派致纍閭閻故特頒諭嚴行申飭如有悖㫖假託派索者察實即以軍法從事該地方大小文武官員不許與扈從官員藉稱親舊擅相餽遺違者與受人員竝以軍法從事其護從大小官員隨行傔從人等如有橫行生事者一並從重治罪凡經過地方百姓各安生業皆如常時務令㕓無廢市隴不輟耕毋得惶遽引避其軍民人等懷挾私怨受人指使擅於駐蹕處所輒行告訐者一槩嚴禁不准仍照衝突儀仗例嚴加治罪爾部即傳諭扈從大小官員人等並行各該督撫於各府州縣城市鄉村遍張告示備行曉諭務令億兆通知以副朕體恤惠愛至意特諭康熙三十八年正月二十一日聖祖仁皇帝御製文第二集卷十七
