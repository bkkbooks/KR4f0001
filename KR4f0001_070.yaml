body:
  text: 欽定四庫全書聖祖仁皇帝御製文集巻三十三目録古今體詩三十六首恭謁孝陵太皇太后駕到温泉雨後經明總兵戚繼光所作八角石亭清晨入盤山二首古中盤望蓮花峰盤山絶頂三首晩過李靖菴二首星出歸營奉侍太皇太后臨御温泉因孟冬享廟暫回京夜半覽本山中曉色由鮎魚池出闗咏瀑布水登景忠山灤河冬至回京齋戒夜坐登邊城作温泉行温泉流杯戲作南苑橋上大風雪景山積雪侍衛下趨如飛元旦慈寜宫行禮春上元幸萬善殿戲作收復岳州作幷序恭上太皇太后萬壽詩二首賜大將軍安親王岳樂二首賜䕶軍統領桑格春夜月題周文矩畫説劒圖
