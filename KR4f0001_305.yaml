body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷二敕諭諭禮部朕御極以來惟欲萬國乂安上則敬天法祖下則埀令名於後世孜孜然以致鬚髮盡白心血耗散歷盡憂勤蕩平險阻自古帝王在位不久享年不遐者論者往往歸於别故而未諒帝王實不勝其難實不堪其勞憂懼所迫以致享祚之不永也朕反覆思維帝堯固辭華封之祝必似朕臨蒞年久之君方能知聖人言之有實也餘則斷不能知矣朕本凉德惟賴祖考得國之正積福之深在位五十餘年壽屆六十今憂勞倍增氣血漸憊惟恐愈久而力不支願不遂以致不全終始一世勤瘁俱屬徒然朕惟兢兢惕厲並無留心祈求甲子之周也覽禮部請㫖之奏悉係虛文無有實際朕惟願臣清子孝兄友弟恭人人皆讀正書勉盡職業國安民治盜賊寧息各以至誠實意為朕六􅐆慶祝朕即嘉納此外儀文朕無所好這所奏不准行康熙五十一年十月十九日諭直𨽻巡撫趙宏燮直省督撫每奏報年穀收成朕必批令預籌積貯以偹小有災荒即行賑濟諭㫖甚明井陘小縣村落無幾偶遇小災便聞人民不得安堵如果能遵前㫖於豐年預為貯積人民何至艱食不安其居此皆因地方官奉行不實全無儲蓄所致嗣後地方官須遵朕前㫖實心奉行務期有濟民生特諭康熙五十一年十月十九日諭大學士溫達松柱李光地王掞學士馬良傅爾呼納綽奇彭始摶鄒士璁沈涵吏部引見八月分掣簽官員內問九卿有行止不端出身不正者各據見聞陳奏將所奏之員即令原品休致此等人員不於此時查明俟到任後被上司參劾致缺久懸於地方甚屬無益嗣後月分官員掣簽後某得某缺人品何如行止何如之處著問九卿具摺啓奏康熙五十一年十月二十五日諭大學士溫達松柱李光地王掞學士馬良傅爾呼納綽奇彭始摶鄒士璁沈涵告降武舉遽以千把補用不諳營伍事務殊為無益李雄所奏亦是將伊等分撥八旗照漢擺牙拉一體操演再行補用方於管轄兵丁防守事宜均有裨益著問九卿具奏康熙五十一年十月二十五日諭大學士溫達等朕辦事有年凡人命審擬事件要期悉當乎理今陳汝咸條陳應照宋時洗寃録較定處所畫一除鎗刀弓箭銅鐡等器械外木棍等俱不作凶器夫人命事件將拳毆腳踢木棍毆打致死者酌凶器輕重以定罪之輕重則事必致舛錯如針乃最微之物將針刺人致死豈可因針非殺人凶器而免其罪乎孟子云可使制梃以撻秦楚之堅甲利兵由此觀之木棍亦凶器也可問九卿康熙五十一年十二月十五日諭大學士溫達松柱李光地蕭永藻王掞鄉㑹試皆掄才大典關係國家甚屬緊要今見考試官不遴取真才止圖賄賂夤緣作弊者漸多此等若不立置重典斷乎不可正考官係考場統領之員副考官同考官等通同作弊巖加覺察是其專責而謂不知情可乎趙晉吳肇中二案處分正考官等互異應行嚴議著問九卿具奏康熙五十二年正月二十五日諭大學士溫達松柱李光地蕭永藻王掞近閲部院衙門堂司官員俱各守分惟刑部侍郎張志棟前任三省巡撫時居官何如已必自知屢經革職降級之後補小衙門堂官及授刑部以來辦事好勝爭競把持衙門凡九卿㑹同揀選保舉時惟伊保薦者甚多猶為未足又在别人保薦處列名自大吏降補小衙門理宜自愧乃復靦顔貪戀官職專以保舉為事殊屬無耻著革職康熙五十二年正月二十五日諭大學士溫達等督撫為各省地方得人起見懇切陳奏理所宜然其應否准行補授恩出自朕近見督撫此等事題請言官每從中阻撓邇來一御史奏稱閩屬十六州縣員缺滿保請揀選卓異薦舉官員補授可為一時之計未可為經久之例不如擇本省之員調補若以卓異薦舉官員補授發往必至懸缺以待於地方無益等語閲之似乎近理其實皆係卓異薦舉官員逆料伊等應該升轉不願往海濱苦地希圖美缺因於未經部覆之先預行條奏則部議自然不准所以特囑言官言之也如此則權盡歸都察院科道等官此是明末惡習斷不可長爾等到京問九卿詹事科道具奏朕回鑾時務將閩屬十六州縣員缺即行補授發往特諭康熙五十二年二月二十五日諭吏部尚書管倉場事務富寧安户部侍郎塔進泰噶敏圖朕今日自暢春園來詢問米價云比往年少昂緣今歲天下各省人民來集者甚多米價故較往年翔貴今倉內米數充足先發一萬石照時值減糶則來集人民可以賤價得米而京城米又得盈餘於民生大有裨益若一萬石不敷再發一萬石糶賣爾等將價值定議具奏發米自三月初一日起盡此月止康熙五十二年二月二十九日諭王貝勒大臣九卿詹事科道朕昨回宮見京城內外為朕六十壽慶賀保安祈福祝延者不計其數朕實凉德自覺愧汗從來帝王之治天下罔不以民生為念若為一已之私即不能擴而充之矣朕若先知必令止之今已成矣難違衆志夜來思之達旦朕所以為天下萬國蒼生之主者萬姓安即朕之安天下福即朕之福若能祈禱兩暘時若家給人足則朕安寢飽食可以却病延年此朕之求福非有妄想也傳之各處凡有祝延者必以雨暘時若萬邦咸寧為先朕已老矣夙夜匪懈履薄臨深之念與日俱增豈敢稍自滿假乎特諭康熙五十二年三月初一日諭南書房翰林朕聞各省為祝萬壽來者甚衆其中老人更多皆非本地人時屆春間寒熱不均或有水土不服亦未可知爾等即傳與漢官等倘有一二有恙者即令太醫院看治務得實惠以示朕愛養耆老之至意特諭康熙五十二年三月初八日諭南書房翰林各省祝萬壽老人俱於十七日在西直門外本省龍棚下齊集接駕十八日齊至前朝外聽禮部指地方行禮行禮後若再至龍棚恐城門擁擠老年之人實有未便況十七日朕進宮時經過各省龍棚諸老人已得從容瞻仰十八日行禮後諸老人不必再至龍棚下接駕爾等傳與各省漢官遍諭各省老人知悉特諭康熙五十二年三月十一日諭大學士溫達等今歲天下老人為朕六旬大慶皆從數千里匍匐而來如何令其空歸欲賜伊等筵宴然後遣回著查八旗滿洲䝉古漢軍漢人大學士以下民以上年逾六十者奏聞在本月二十二三兩日內擇定一日賜宴預為奏聞便於備辦內有艱於動履不能前來者聽之其能來者俱令之來即不能來者朕另行按分頒給詔內有恩賜老人一欵凡恩賜有名者於名下注明今時漸炎熱賜宴後即令各回原籍耕種其家奴勿入所查數內再查八旗滿洲䝉古漢軍以至包衣佐領下不論官員閒散人等年七十以上老婦亦著奏聞俟老人賜宴後再定一日送至皇太后宮賜宴內有艱於動履不能前來者聽之其能來者俱令之來若有貧乏不能來者著各屬協助車馬使之前來俱開真實年數不可揑報再敕宗人府諸王以下宗室子孫內二旬以下十歲以上選擇聰明堪供任使者六七十令於耆老前執爵宣勸即朕子孫皆令之出宗室外不用他人也康熙五十二年三月十七日諭大學士九卿等朕聞廣東米價騰貴每石賣至一兩八九錢至二兩不等將軍管源忠亦因米貴具摺奏聞朕軫念天下民生無間逺邇雖邊徼之外視之猶輦轂之傍也粵地素號産米之區從無價高至一兩以上及二兩者兹米價驟增小民必至艱食督撫係封疆大吏凡有關地方事務隨所見聞應即據實陳奏今萬里情形朕已周悉而伊等漫無奏報殊屬懈忽前福建歲荒米貴朕特㫖截漕數十萬由海道轉運賑濟諭㫖方頒市價立平於地方大有裨益今廣東亦宜照福建截漕海運朕因詳詢投誠海賊陳尚義等目今截留江南漕糧可否由海轉運廣東陳尚義等稱奴才等係重犯聖主從寬免死留生人世深恩厚德淪浹肌髓感戴無既惟期圖報萬一戮力效命今若截江南漕糧由海轉運八九日可至福建自福建八九日可扺廣東但奴才等係死囚蟻輩此事關係重大非微賤所敢身任現今風勢不順斷未可轉運必至八九月後北風漸利始可海運等語朕意於八九月後將水師營戰船裝載米石運送易於到廣而兵丁亦并可熟練水務其天下地丁錢糧前已於三年內全免一周但今粵地米價翔涌若將本年地丁錢糧仍行催徵則民力維艱難免輸將之苦應將本年地丁錢糧停其催徵遣趙申喬等前往廣東㑹同督撫將朕軫念民生至意刋示宣布以慰輿情再恩詔內有賞賚緑旗兵丁一欵即令趙申喬等乘便動支彼處庫帑親行核實按名逐一散給俾各沾實惠爾等㑹同確議具奏特諭康熙五十二年三月二十三日諭大學士溫達等年老諸大臣內於世祖章皇帝時居官者惟宋犖田種玉而已今年齒老邁雖閒居林下朕覩之不禁軫恤宋犖現有尚書品級在身田種玉著給與工部尚書銜俱准給誥封宋犖田種玉著酌加宮保以示朕不忘耆舊之至意特諭康熙五十二年三月二十五日諭各直省老人書稱文王善養老者孟子云五十非帛不暖七十非肉不飽帝王之治天下發政施仁未嘗不以養老尊賢為首務近來士大夫只論做官之賢否而移風易俗之實政入孝出弟之本心未暇講究朕因今日之盛典特宣此意若孝弟之念少輕而求移風易俗其所厚者薄而其薄者厚矣爾等皆是老者比回鄉井之間各曉諭鄰里須先孝弟倘天下皆知孝弟為重此誠移風易俗之本禮樂道德之根非淺鮮也昨日甘霖大沛四野沾足朕心大悅爾等毋誤農時速回本地特諭康熙五十二年三月二十五日聖祖仁皇帝御製文第四集卷二
