body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷五敕諭諭大學士溫逹松柱李光地蕭永藻王掞等部院滿洲漢軍及漢司官皆有辦事責任必謹慎勤敏始克稱職如有懶惰昏庸輕浮躁妄生事招搖疾病疲癃者豈容姑留又外省地方官內有大臣子弟及大臣保舉升任之人恃伊父兄及保舉大臣更或倚藉師生恣意妄行督撫掣肘俱不能約束即如居官清亷之人亦應素位而行謹慎自持豈可自恃清亷遍僻固執乎爾等㑹同九卿詳議具奏康熙五十四年二月初三日諭吏部尚書張鵬翮等張伯行著暫停革職看守審理伊疏內有不欺君并張元隆夥賊甚多將蘇州米糧買去等語巡撫係地方大吏管轄文武官員且有調兵責任若海中有賊即應率領官兵親身察拿况盛京山東江浙閩粵等省沿海地方設立將軍督撫提鎮水師官兵原為海防而設張元隆等銀兩雖多沿海一帶官兵豈能盡行賄賂鄭盡心陳尚義等本係海賊頭目朕久已招撫拿獲今張伯行將伊等支吾搪塞希圖完事與伊不欺君之語殊為乖舛張伯行必深知賊巢始奏稱海中有賊務將此賊察拿審明具奏康熙五十四年二月初三日諭直𨽻巡撫趙宏燮朕嘗讀無逸篇留心稼穡久矣去嵗臘前瑞雪盈尺時届陽節細雨連綿輿情怡恱早得布種矣所慮者起發太盛則收穫之際恐有二疸之虞爾等遍示民間時值耘耕即令苖稀疏預防風霾朕以民生為念勸農為本已有所知不得不示特諭康熙五十四年二月十三日諭直𨽻巡撫趙宏燮朕每年春間行幸水淀近見民生雖不能家給人足比之往時似覺差勝但村莊之中誦讀尚少朕思移風易俗莫過讀書非此無可上進况畿輔之地乃王化所先宜於窮鄉僻野皆立義學延師教讀以勉勵孝弟可望成人矣爾即遍示莊村皆知朕崇文好學之深意特諭康熙五十四年二月二十二日諭吏部趙宏燮簡任直𨽻巡撫已届十年勤勞供職實心任事旗民輯睦盜案稀少京畿重地趙宏燮著加總督職銜仍管理巡撫事務特諭康熙五十四年三月初四日諭吏部尚書張鵬翮副都御史阿錫鼐張鵬翮等係特遣審理此案大臣欽交事件應盡心審明原委具奏這事情屢經前往審理並未將原委審明海中如果有盜賊張鵬翮等應同張伯行親詣賊巢查拿審明若海中無賊張伯行前奏不欺君之語乖謬顯然如此則事之是否自明其有應行請㫖之處宜具奏候㫖審理乃屢次前往未能徹底審明希圖苟且完事䝉混結案今又請將張伯行革職嚴審繕摺具奏殊玷官針這事情仍著張鵬翮阿錫鼐前往徹底審明具奏康熙五十四年三月十五日諭大學士溫逹松柱李光地蕭永藻王掞自昔帝王敬天勤政凡遇垂象必實修人事以答天戒今嵗四月朔日蝕望又月蝕凡關係國計民生或有應改應行之處爾等㑹同九卿詳議以聞康熙五十四年三月二十七日諭吏部凡月選官員與民最親有關地方故令九卿驗看今僉云未聞並未將不好者舉出若薦舉賢員數人同薦更好至舉劣員一二人即可舉出嗣後月選官員有出身不明係人家僕或捐還原職官員內從前居官有劣蹟者九卿各據所見即行指出與其到任參劾不若初選時黜退地方亦不受害如此則吏治咸修民生大有禆益九卿諸臣務須留心詳酌將此傳諭九卿康熙五十四年四月初五日諭議政大臣八旗馬匹俱已出厰著照出厰馬數令佐領下殷實之家並該佐領人公派拴養照常給發錢糧目下雖稍覺煩難後來䆒竟有益如有行動則從此騎馬前去一到口上彼處之馬又到諸凡便益著詳議其拴養駱駝之處一併詳議以聞康熙五十四年四月十五日諭議政大臣總兵路振聲現率伊標兵前往路振聲係諳練行間之人朕所稔知䇿妄阿喇布坦人少此兵足以制之若彼全力齊來似覺不足必須倍加籌畫相度機勢而行著速行文提督爾等所議三處之兵派一大臣總統調度此兵乃西安將軍所管之兵將軍親往不便又令大臣管轄應派一能辦事大臣與將軍公同啇酌而行著尚書富寧安去派新滿洲侍衛十員前往效力現派法腦隨富寧安前去祁里德原係大臣著授為散秩大臣前往推河亦派新滿洲侍衛前去著派出呢牙哈出婁鄭格令帶侍衛翎前往厄魯特巴爾虎之侍衛官員亦令挑選帶去富寧安等馳驛前往進兵之時令從總督巡撫取馬匹牲口此二處派理藩院章京各一員西安總督料理軍務糧餉甚屬諳練巡撫亦好爾等議令巡撫料理糧餉甚是康熙五十四年四月十五日諭議政大臣昨日所議之事朕再三尋繹䇿妄阿喇布坦作何謀略雖不知其實其到我哈密地方便不可為虗若彼傾國而來勢有萬餘我一總兵之力微有不足不可不預為周備也應著右衛兵即刻預備八旗查哈兒厄魯特巴爾虎兵內挑選千名發往歸化城如用右衛兵時令其一同前往鄂爾多斯阿寶額駙之兵亦應令預備一同前去著詳議康熙五十四年四月十五日諭議政大臣等澤卜尊丹巴胡土克圖處著善於馳驛賢能司官一員速去諭胡土克圖云有䇿妄阿喇布坦二千兵前來被我哈密徊子厄敏並遊擊潘至善等領二百漢兵盡行殺敗殺死厄魯特九十人生擒厄魯特三人將此情由令胡土克圖速派人前往䇿妄阿喇布坦處去云中國至聖皇帝大沛仁恩欲天下共享太平安逸過日爾無故發兵被駐扎哈密二百漢兵並幾箇徊子盡行殺敗今既被殺敗如何過日何不速遣使至皇帝聖前跪請伏罪若不如此懇求必至盡行剿滅衆生靈亦遭塗炭現在滿洲䝉古漢人並喀爾喀厄魯特各處之兵盡行預備我係出家人但為衆生憐惜性命兼念舊好差人指教於爾當作速跪請伏罪等語將此書稿繕寫呈覽具奏發往康熙五十四年四月十九日諭喇藏台吉察漢逹席喇藏汗因與朕如一家相好先前將噶爾旦丹津發往䇿妄阿喇布坦去時朕曽降諭以為不可伊不聼朕諭今䇿妄阿喇布坦似覺難於發回又現有我兵攔路朕若彼時強將噶爾旦丹津力阻不許發去豈不好來今朕亦不能無悔辟如朕將蘇爾札誆哄帶來不發回去亦何不可但既為大君似此等事斷乎不行也如今爾汗部下無人勢力微小蘇爾札多帶人去甚好今䇿妄阿喇布坦無故前來將我邉境之哈密侵擾被我二百漢兵幾箇􅉰子擊敗令不堪當䇿妄阿喇布坦以哈密青海人等視為容易而來而不知者且謂我忌憚䇿妄阿喇布坦豈知朕欲普天下一切大衆安享太平之至意耶先前朕原欲與䇿妄阿喇布坦在和卜圖烏蘭古木等處親身來㑹閲有言爾汗及䇿妄阿喇布坦不過在偏僻居住幾人耳祈聖主憐愛衆生奏請從寬朕遂中止先前剿滅噶爾旦時噶爾旦之骸骨並伊之女凖齊海并屬下人等我俱應收取方是後來因䇿妄阿喇布坦將噶爾旦之尸首伊女凖齊海解送前來其餘俱賞與䇿妄阿喇布坦伊等俱被我數次殺敗心寒膽裂此人盡知之現在喀爾喀厄魯特陜西四川松潘打箭爐雲南貴州等處俱已備兵爾汗可放心安居矣在邉口周圍居住爾等湯古忒之人等無知勿得妄生懼怕致有亂動我兵斷不擾害於人也其將此情由告爾喇藏汗康熙五十四年四月二十日諭議政大臣如今預備兵馬方好派黑龍江兵五百名並打牲索倫打虎爾兵五百名又三處喀喇沁兵一千名每人俱著各帶長鎗鳥鎗此二千兵內打牲兵丁黑龍江兵索倫打虎爾兵著從口外往歸化城去喀喇沁兵著即騎伊等牲口自本處起程其口糧到湖灘河所再支領倉米倘口糧短少著支領唐三營倉米於八旗出厰馬匹內給與喀喇沁兵丁每人馬二匹如同歸化城查哈爾並右衛預備之兵發往推河地方駐札則不拘何處俱可去得矣交與議政大臣議奏康熙五十四年四月二十二日諭議政大臣喀喇沁之兵著噶倫兒帶去將他布囊色白派出侍衛色楞放為副都統前去喀喇沁兵丁乃係用車裝載口糧如車上另行派人甚屬費米著將趕車之人即充入一千兵丁數內索倫打虎爾兵著總管保住並哈忒虎之子衣里布帶往康熙五十四年四月二十三日諭大學士松柱兵部尚書孫徴灝等遊擊潘至善率領緑旗兵丁二百名擊敗䇿妄阿喇布坦侵犯哈密之賊衆二千人殊為可嘉非尋常可比前雖諭令賞給朕心猶為未足今再加賞給此二百名兵丁各給與把總劄付其中陳亡兵丁十餘人亦給與把總劄付准伊妻子食俸今升平日久兵革休息倉卒間仍能如舊奮勇直前朕深為嘉恱因手書特諭著速議具奏康熙五十四年四月三十日諭戶部趙申喬同戶部堂官等具摺面奏時不勝氣忿躁急奏稱朝廷庫內帑銀啇人等侵蝕二百餘萬現今銅斤不能接續作速停止伊等採辦仍交與各關差官員方好等語朕亦可其所奏思設法補完缺缺銀兩故將啇人所缺之銀俱清還戶部停其採辦其所缺銀兩現今內務府追補與戶部無涉今疏稱皇上神謀睿慮無微不照朕治天下惟寬仁是務此等細事素不縈懷且非不知為君者無庸干涉部院司官筆帖式辦理之事祇緣此有關係故耳九卿所議甚是今又何必好勝以圖更改疏內又稱現有買來銅鉛五百五十六萬三千斤交完寶泉局五十四年銅額有餘等語既有一年有餘之銅鉛前靣奏時何不明白陳說為何如此躁急以致前後互異錢法事務係戶部專責爾部仍須平氣屏私再行公同逐一明白議奏康熙五十四年六月初二日聖祖仁皇帝御製文第四集卷五
