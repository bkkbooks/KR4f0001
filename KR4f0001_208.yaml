  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷六目録敕諭諭山西巡撫噶禮諭散秩內大臣公傅爾丹諭兵部諭禮部諭川陜總督華顯陜西巡撫鄂海甘肅巡撫齊世武諭河南巡撫徐潮諭大學士馬齊席哈納張玉書吳琠陳廷敬學士色德禮鐵圖滿丕阿蘭泰趙士芳王九齡曹鑑倫徐秉義諭吏禮二部諭吏部諭刑部諭户部諭工部諭起居注官揆敘海寶諭大學士馬齊起居注官滿保海寶諭欽天監諭兵部諭户部諭户部
