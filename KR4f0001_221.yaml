body:
  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷十二敕諭諭户部廣東兵餉不敷每年將就近省分錢糧按數撥解這巡鹽衙門所得羡餘及運司衙門羡餘銀兩部議俱著解京不合著將此項銀兩即存留彼地充餉以省撥解之煩康熙四十六年三月初五日諭户部興安州城垣堤岸不必各官捐修所需錢糧無多俟該撫估計到日將在京頂捐西安米石銀兩爾部如數支給可以尅期完工康熙四十六年三月十四日諭浙江福建總督梁鼐浙江巡撫王然江南江西總督邵穆布安徽巡撫劉光美江蘇巡撫于準山東巡撫趙世顯朕頃因視河駐蹕淮上江浙兩省官員及地方紳士軍民咸環道逺迎懇請臨幸朕勉順羣情涉江而南循省風俗所至郡縣見雨暘應時麥苖蕃殖比閭樂業可兾盈寧雖山東一路尚未悉覩而江浙田疇鬱蔥在望深愜朕懷方今二麥垂熟正將刈穫之時一切扈從人員皆以次舟行不致蹂踏誠恐百姓緣途迎送老稚扶㩗動盈千萬越阡度陌未免踐傷朕心甚為軫惜雖民情依戀出於悃誠但農事方殷應今所過地方悉停止岸傍迎送且車駕來時小民業已瞻覲兹節候漸熱朕舟行乘夜迎涼亦未可定民雖逺來無由親見爾等督撫可張示遍加曉喻使各知悉俾無負朕重農愛民之意特諭康熙四十六年四月十一日諭刑部張四因其兄方在臥病其嫂牛氏毆打其兄張四勸阻不止情急毆牛氏致死情有可原著照例減等發落康熙四十六年四月十八日諭扈從大學士馬齊張玉書陳廷敬等浙江巡撫王然諸事極其小心朕昨面諭之云巡撫係地方大臣凡遇應行之事須有擔當可行則行不宜過於畏愼總督梁鼐則所行不差可以任用提督吳英真是老將前召見時問以地方事宜所對有原有委與一切粗率者不同當馬得功海上用兵時吳英即在其內厯今五十餘年所經戰陳甚多目前諸將中能明白水性料理水師者罕能及之其人亦頗通文義如此老將當授以將軍之銜如孫思克李芳述例可作諭旨下兵部授之康熙四十六年四月十九日諭吏部朕厪念河防屢行親閲凡自昔河道之源流及歷來治河之得失按圖考迹靡不周知粵從明季寇氛決黃灌汴而洪流橫溢嵗久不治迄於本朝在河諸臣皆未能殫心修築以致康熙十四五年間黃淮交敝海口漸淤河事幾於大壞朕乃特命靳輔為河道總督靳輔自受事以後斟酌時宜相度形勢興建堤壩廣疏引河排衆議而不撓竭精勤以自效于是淮黃故道次第修復而漕運大通其一切經理之法具在雖嗣後河臣互有損益而規模措置不能易也至於創開中河以避黃河一百八十里遄悍之險因而漕挽安流商民利濟其有功於運道民生至逺且大朕每涖河干遍加咨訪沿淮一路軍民感頌靳輔治績者衆口如一久而不衰夫人臣有大建樹於國家者奬勳酬庸宜從優渥雖賜恤易名已循彞典尚應特豫褒敘賁以殊恩靳輔著加贈太子太保仍給世職拜他喇布勒哈番用彰朝廷追美勞臣之典為矢忠宣力者勸爾部即遵諭行特諭康熙四十六年五月二十九日諭户部朕屢次視河南巡凡所過地方遇有各省漕船務加詢問因備悉其長途輸挽之事每船額載糧米數百石全責成於旗丁旗丁管領重運逺涉江河經行數千里始抵通州身家性命所關其責甚巨及交納入倉時設有糧數不足則處分追賠定例極嚴既有懲創處分之例即不可無奬賞激勸之典如各營兵丁內因人材壯健勉力報效拔補將領者甚多旗丁中有歷運四五十年者纍嵗積勞奉公若不定一議敘之例則希榮無階衆丁何所鼓勵嗣後凡有領運照數全完者應行總漕奬賞若於額定糧數之外有多交者計算米數並領運次數議敘授以職銜庶各幫運丁皆踴躍自效而不肖之徒侵蝕虧損之弊亦可以漸止此朕破格優恤旗丁裨益漕務之至意爾部即遵旨會同兵部詳議定例以聞康熙四十六年五月二十九日諭兵部國家綏輯兵民乂安海嶠必資威望素重之臣以畀干城之寄有能久鎮巖疆實彰勞績者則錫命酬庸宜加顯秩福建水師提督吳英當王師初定八閩即親履行陳自偏裨以至大將敡歷四十餘年比任提閫以來益殫壯謀克修軍紀目前諸將中明習水性訓練舟師者罕與嫓倫是用特渙殊恩俾膺異數著授為威略將軍仍管水師提督事務以示朕優眷勞臣至意爾部即遵諭行特諭康熙四十六年五月二十九日諭內閣朕此番閲視河道回鑾時過臨清閘有一安慶運船觸損所載糧米俱被水侵恐部中以其不在江河不豫豁免是乃朕所親見者著傳與户部察明免其賠補康熙四十六年六月初五日諭內閣朕每次巡幸循歷方隅雖窮鄉僻壤小民之生計鮮不周知觀東南西北地勢水土與夫飲食衣服器用悉皆不同穀桑麻綿耕種各隨土宜非人力所能移奪地方官員將小民現在力作之務若能加意勸導使不致荒廢即為實能盡心之人今責成地方官令五畝之田種桑二株百畝之田種桑四十株此四十株之桑葉養蠶幾何此桑從何處移植即令移植未必水土盡與桑木之性相合更閲幾年便可成用此等物情言者並未計及且山東人於蠶種初出時皆置之山間橡樹之上俟其結繭並無用桑育蠶之事此等處言者亦未之知小民惟利是從雖以法禁之不止若無利雖百計嚴督之不行此亦理之所必然者今當升平之日惟以無事為本乃不度地理之燥濕不計水土之順逆欲強迫百姓募南人以教之蠶斷斷乎不可行也李紹周所奏已悉下所司知之康熙四十六年六月初六日諭內閣李紹周又奏北地開渠事聞之似是而行之斷乎不可民間田畝雖有髙下悉皆一槩耕種雨水過多之嵗則髙田有收而窪田無穫雨水不足之嵗則髙田無穫而窪田有收今若無故責成有司開濬溝渠必致逼擾百姓若動用正項錢糧又需費無窮且地方官員難周知田土之髙下勢必須人量度儻定欲壞民間現耕之田以疏水道小民又孰肯聼其毁棄已田也耶南方田畝陂塘雖有引水出入之路如天時雨澤失調亦難免災䘲何况北地當此無事之際不宜新創事端以重纍官民下所司知之康熙四十六年六月初六日諭工部頃朕閲視河工見黃淮俱已安流運河亦較前深通重運無阻但湖水大漲則運河東堤尤屬緊要應速興工加修這工程交與總河詳勘動用各省督撫捐輸河工銀兩盡心堅築工完報部察核其天然壩建閘開河等工亦著將此項錢糧動用康熙四十六年六月初六日諭大學士馬齊等近日總督博濟請於甘肅開捐納朕即批以當行與否可與甘肅巡撫齊世武商酌再奏捐納一事原非善政若在甘肅地方開例至臨時又必奏甘肅路逺願捐之人不能跋涉仍請在西方等處捐納朕灼見此等情弊故特批當行與否與齊世武商酌兹特令爾等知之康熙四十六年六月十七日諭起居注官揆敘等今年朕於二月二十八日抵揚州彼時麥已秀矣至四月二十日回鑾則正在刈麥之時南方麥秀雖早於北方而仍與北方同熟至於穀稼果品大略皆然江南梅花正月即放至五月始實朕取至暢春園種之見其三月花放亦於五月結實花放於兩月之前而同至五月結實此皆水土之故也南方之物開花吐穟雖早而成實遲故食之則難消北方之物開花吐穟雖遲而成實速故食之則易消皆土性冷暖自然不可強者試於塞外種稻其地髙寒難以收穫種别項之穀則無如塞外豐茂者江南不及京都京都不及塞外朕以此等土性向張玉書李光地言之彼皆心服謂朕所見極是朕巡行各省所見諸物無不留心詳察故知之甚明確也康熙四十六年六月二十八日諭大學士馬齊等江浙被旱災事王然於六月二十八日具題邵穆布於七月初十日具題伊等題報之後有雨無雨著問江南浙江九卿大小諸臣或有伊等家信或問之南方來人著即陳奏雖有錯誤亦不較也至江西湖廣兩省雨水米穀何如亦著問明與九卿所議另具摺來奏江西湖廣雨水調和米穀有收尚無妨礙儻雨水不調關係甚大不可不預為籌畫也康熙四十六年七月二十八日諭兵部外省城守營兵因管束不嚴以致兵丁氣習甚壞參領張倫若有貪婪事迹自應列欵糾參今因責治有過兵丁即加處分則嗣後兵丁必有妄訐該管官員之事此風甚不可長京口將軍等題參張倫不合張倫不必處分康熙四十六年九月十七日諭大學士馬齊等近日于準以旱荒請行捐納若開捐納之例其中僥幸者不過數人而已於貧民毫無益也此中情事朕知之甚晰今急行拯救始於地方有濟若待捐納則民皆流散矣康熙四十六年九月十九日諭户部從來漕糧關係倉儲最為重要每歲刻期輸挽槩不停徵即蠲除節年額賦亦不及漕項朕前以國家經費尚充曽有酌免漕糧之事係出特恩去年頒發諭旨已將江南省民欠地丁銀米自康熙四十三年以前通行蠲豁而漕項所欠尚在徵收今念江南地方現被旱災除新徵糧米另有諭旨酌量截留散賑外其四十三年以前江寧巡撫所屬各府州縣未完民欠漕項銀兩六十八萬七千兩有竒米麥三十一萬一千八百石有竒著該撫一一察明悉與全免用紓閭閻之餘力俾辦額運之正供事切利民蠲逾常格爾部移文該撫令張示遍諭務使均霑實澤以稱朕深軫民依之意如有不肖有司朦混重徵者察出定從重治罪爾部即遵諭行特諭康熙四十六年十月初七日聖祖仁皇帝御製文第三集卷十二
