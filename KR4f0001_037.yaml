body:
  text: 欽定四庫全書聖祖仁皇帝御製文集卷十六奏書奏皇太后書奏為名分尊卑關係甚大陳瀝愚衷仰祈聖母慈鑒事自古母子關乎天倫尊卑各有定分近以細務每蒙慈旨將皇帝字樣俱行高寫皇太后諭旨反接書其下此雖慈愛為子之至意臣每捧讀不勝感激而不能無悚惕之心謹頓首再拜嗣後伏乞聖母慈旨照例高寫或書諭或書臣名則遂為子之分於心始安而仰戴聖母慈惠愈無窮矣臣不勝戰栗待命之至康熙十六年七月二十六日奏皇太后書臣奉太皇太后於三月二十日自京師啓行二十五日特駐蹕於灤河岸二十六日仍留太皇太后親至河干觀取魚賜宴山川甚佳翠紫交錯聖懷殊為歡悅二十八日回至湯泉太皇太后聖躬康和臣頓首敬請皇太后萬安臣體平善宫眷暨保成俱佳為此一併奏聞康熙二十年三月二十八日奏皇太后書奏為奏聞事近者太皇太后聖體康嘉湯泉之水甚宜臣於初五日行獵邊外宫眷暨保成俱平善今特遣使敬請皇太后萬安一併謹奏康熙二十年四月初六日奏皇太后書謹奏請皇太后聖體萬安臣自出邊外地方涼爽水土甘肥禽獸繁多甚為暢適保成亦佳臣殪三虎將其中最大者去其肉骨櫝之以草並所獲野豕麅鹿及鹿羔鹿尾恭奉皇太后觀覽兼充庖膳為此謹奏康熙二十年四月二十日奏皇太后書謹奏聖母皇太后臣躬詣陵寢暫别庭闈叨蒙庇佑一路安善可慰聖懷因此恭請萬安臣引領殿陛不勝瞻切之至謹具奏聞康熙二十一年二月二十日奏皇太后書謹奏聖母皇太后臣自東行以來於二十三日已出山海關恐煩埀念特此奏知謹請聖躬萬安曷勝懸想之至謹具奏聞康熙二十一年二月二十四日奏皇太后書謹奏聖母皇太后臣暌離訓誨思念日增戀戀之心須臾不能忘也日前請候起居定蒙慈鑒再此恭請萬安曷勝嚮往之至謹具奏聞康熙二十一年二月三十日奏皇太后書謹奏聖母皇太后臣於初四日至盛京謁陵已畢祭告之事次第舉行盛京風土淳厚仰見祖宗創立鴻基庇蔭子孫不淺也專此遣人恭請萬安未盡縷縷之懷謹具奏聞康熙二十一年三月初五日奏皇太后書謹奏聖母皇太后臣於初五日遣人回京陳述愚欵必蒙聖覽今者福陵昭陵告祭方畢擬初九日率領諸王大臣往謁永陵為此恭請萬安謹具奏聞康熙二十一年三月初八日奏皇太后書謹奏聖母皇太后臣初九日自盛京啓行十一日詣永陵告祭環視地形山回水繞佳氣鬱蔥真是興王基業也兹因大典已畢敬想祖宗開疆非易臣至此甚難故欲躬率諸王具勒大臣蒙古等周行邊境親加撫綏兼以畋獵講武俟所至何處再當具奏專此恭請萬安謹具奏聞康熙二十一年三月十三日奏皇太后書謹奏聖母皇太后十三日曾有箋奏奉達慈聽巡狩東行皆平山巨澤日間行五六十里今至柳條邊地方專此恭請萬安謹具奏聞康熙二十一年三月十七日奏皇太后書謹奏聖母皇太后臣雖屢有章奏言未盡意京師地暖時屆春深遙知聖體康和聖情嘉悅臣心殊為欣慰也專此恭請萬安謹具奏聞康熙二十一年三月二十日奏皇太后書謹奏聖母皇太后臣屢蒙溫諭緩行深加慰勞頃者所歷邊境頗近烏喇二十五日已至其處因思長白乃祖宗發祥重地臣叨繼大統不能躬行祭祀故於烏喇地方遙拜名山以展望祀之典暫停一二日即可回盛京矣所有愚欵另遣人陳奏先此恭請萬安謹具奏聞康熙二十一年三月二十六日奏皇太后書謹奏聖母皇太后臣巡行烏喇曾具奏陳明兹因雨阻亦只在數日之間可以取程回盛京矣為此恭請萬安謹具奏聞康熙二十一年四月初一日奏皇太后書謹奏聖母皇太后臣到烏喇情形前已陳奏今又值陰雨俟天氣稍晴即可就道矣專遣人恭請萬安謹具奏聞康熙二十一年四月初五日奏皇太后書謹奏聖母皇太后昨初七日稍得晴霽即從烏喇啓行專此恭請萬安兼慰慈念謹具奏聞康熙二十一年四月初八日奏皇太后書謹奏聖母皇太后自初七日以來天氣雖晴河水未下橋梁難成道路尚多泥淖今已勉強行至中途矣專此恭請萬安一並陳述謹具奏聞康熙二十一年四月十一日奏皇太后書謹奏聖母皇太后臣途中情形前已具奏不再陳述兹特恭請萬安謹具奏聞康熙二十一年四月十五日奏皇太后書謹奏聖母皇太后臣於十六日回至盛京矣自謁陵望祀長白山以來經過之處軍民人等無不歡欣鼓舞喜見太平皆仰賴聖母鴻庥福庇所致也專此恭請萬安謹具奏聞康熙二十一年四月十八日奏皇太后書謹奏聖母皇太后臣於四月二十日已從盛京啓行兹因恭請萬安之便謹具奏聞康熙二十一年四月二十二日奏皇太后書謹奏聖母皇太后捧讀教諭深蒙慈念感戴無涯每聞聖祉康和臣心殊為欣忭兹特恭請萬安謹具奏聞康熙二十一年四月二十六日奏皇太后書謹奏聖母皇太后臣久别庭闈急欲望見聖顏四月三十日進山海關五月初一日留皇太子同大營按程緩行臣當先詣宫闕恭請萬安初四五之間必可到都喜慈雲之日近奉教誨之有期專此謹具奏聞康熙二十一年四月三十日奏皇太后書奏為恭請萬安兼陳微衷仰祈睿鑒事臣隨侍聖祖母臨幸烏喇代興安拜察地方朝夕欣奉慈顏今已回鑾將至京師但還宮日期未便預定凡臣所經過皆大山茂林並無土産佳物惟畋獵所獲鹿尾鹿脯因時當盛暑醃晒成乾曾經進奉未知到日其味何如蒙加餐否臣自拜違漸及兩月欲表思念聖母之心將臣鳥鎗所得鹿尾親手法製並揀榛令坐塘筆帖式等馳送用申誠悃伏冀埀鑒少賜匕箸臣不勝瞻切之至謹奏康熙二十二年七月初十日聖祖仁皇帝御製文集卷十六
