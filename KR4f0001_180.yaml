  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷四十五目録古今體詩五十九首初秋晚雨後觀儀器初秋詠竹閒坐詠竹詠金蓮花祝巴林淑慧大長公主詩并序戲題自鳴鐘春日舟行夏日幸潞河雜詩三首親閲運河堤舟泊潞河千葉蓮題耕織圖耕第一圖浸種第二圖耕第三圖耙耨第四圖耖第五圖碌碡第六圖布秧第七圖初秧第八圖淤䕃第九圖拔秧第十圖插秧第十一圖一耘第十二圖二耘第十三圖三耘第十四圖灌溉第十五圖收刈第十六圖登場第十七圖持穗第十八圖舂碓第十九圖籭第二十圖簸揚第二十一圖礱第二十二圖入倉第二十三圖祭神織第一圖浴蠶第二圖二眠第三圖三眠第四圖大起第五圖捉績第六圖分箔第七圖採桑第八圖上簇第九圖炙箔第十圖下簇第十一圖擇繭第十二圖窖繭第十三圖練絲第十四圖蠶蛾第十五圖祀謝第十六圖緯第十七圖織第十八圖絡緯第十九圖經第二十圖染色第二十一圖攀花第二十二圖翦帛第二十三圖成衣
