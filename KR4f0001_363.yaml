body:
  text: 欽定四庫全書聖祖仁皇帝御製文第四集卷三十一雜著康熙幾暇格物編江源中國水之大而流長者惟河與江其源皆出西番界河之源自元史發眀之後人因得知其大略江之源則從未有能確指其地者酈道元水經注頗言其端委而於發源之處則云以今所聞殆未濫觴道元亦闕疑而弗敢定也今三藏之地俱歸版籍山川原委皆可案圖以稽乃知所謂岷山導江者江水泛濫中國之始禹從此水而導之江之源實不在是也江源發於科爾坤山之東南有三泉流出一自匝巴顔哈拉嶺流出名七七拉噶納一自麻穆巴顔哈拉嶺流出名麻穆七七拉噶納一自巴顔吐呼母巴顔哈拉嶺流出名古科克巴哈七七拉噶納合而東南流土人名岷揑撮岷揑撮者譯言岷江也是為岷江之源南流至岷納克地名鴉龍江又南流至占對宣撫司㑹打冲河入於金沙江東流徑雲南境至四川叙州府與川江合是真江源根據後人但見打冲河之入金沙金沙之入川江而又據禹貢東别為沱之文謂川江為岷江溯流以窮源謂江源必在黃勝關外不知鴉龍江之上流實為江源也故導江之江有蜀江離江錦江都江之稱隨地隨時異名而不得專岷江之目者非其源也宋范成大陸游亦嘗言之范成大吳船録曰江源自西戎由岷山澗壑中出而合於都江今書所云止自中國言耳陸游入蜀記曰嘗登岷山欲窮江源而不可得蓋自蜀郡之西大山廣谷西南走蠻箐中皆岷山也則江所從來逺矣二說皆知黃勝關流入之江非江源而不能定其所在後人反據禹貢文以辨其非漢書地理志謂岷山在湔氐道西徼外江水所出言雖無弊特不知所謂徼外者今科爾坤山之東南耶抑即黃勝關外地也元史云江水出蜀西南徼外東至於岷山而禹導之可謂得其方矣而不能眀悉如記河源者蓋河自都實奉使後始得其源大江濬發之地從無人至者元世祖南征即從蔥嶺而南直逹天竺緬甸由雲貴徑湖廣以返路在江源之外故不得其詳也然亦有至其地而究未能辨之者眀之宗泐是也宗泐使西域歸云西番抹必力赤巴山有二水在東北者為河源在東南者為犛牛河江源也犛牛河即麗江一名金沙江者宗泐但見是水之先合於金沙江而後合於川江不知金沙江别源於西番之乳牛山去江源西千餘里乃謂岷江即金沙誤矣數家之說猶近於影響其餘荒唐散漫更無可採隋經籍志有尋江源一卷其書不傳間見地記有引之者其說云岷江發源於臨洮木塔山臨洮今洮州衛洮河橫亘於南江豈能越洮河而南下耶即有其書必多舛錯亦不足觀已惟眀徐𢎞祖有溯江紀源一篇頗切於形理𢎞祖曰河入中國歷省五而入海江入中國亦歷省五而入海計其吐納江倍於河按其發源河自崑崙之北江自崑崙之南按崑崙即科爾坤之訛非真崑崙也非江源短而河源長也又云北龍夾河之北南龍抱江之南中龍中界之北龍祇南向半支入中國惟南龍磅礴半宇內其脉亦發於崑崙與金沙江相並南下環滇池以達五嶺龍長則源脉亦長江之所以大於河也至李膺益州記云羊膊嶺水分為二派一東南流為大江一西南流為大渡河元金履祥釋禹貢從之夫大渡河源發於四川大邑縣之霧中山至嘉定州合川江其去岷江真源東西相隔千餘里去禹導江之處南北亦相懸五百餘里禹貢導江之處在今黃勝關外乃褚山而云俱發於羊膊嶺何其謬耶此皆未得其真惑於載籍以意懸揣而失之也學者孰從而徴之故詳記江源并論列諸家之說於篇恆河釋氏之書本自西域其紀山川似乎荒怪然亦頗有依據不可盡非其言小有舛錯者或述之傳聞或譯於筆授轉相記說而訛耳如因本經云阿耨達山頂有阿耨達池池東有恆伽河從象口出流入東海南有辛頭河從牛口出流入南海西有博義河從馬口出流入西海北有斯陀河從師子口出流入北海後人據文疑水從牛馬師象口出必無之理不知所謂牛馬象師者皆山之形似也其云入東南西北海則誤矣阿耨達山今之岡底斯也岡底斯之前有二湖番名馬品母達賴湖郎噶湖即阿耨達池也其東有山曰馬口番名打母朱喀巴珀有水流出東南入雲南境為檳榔江徑緬甸入南海其南有山曰象口番名郎千喀巴珀有水流出入二湖而西流其北有山曰師子口番名僧格喀巴珀有水流出亦西行與象口之水㑹而南流其西有山曰孔雀口番名馬珀家喀巴珀有水流出南行與象師口之水㑹而東南流為恆河番名岡噶母倫江入南海是經所謂牛馬師象口者方位或不同至今番人猶稱名之特四水一分流於東為檳榔江三合流於南為恆河而總入於南海無分入四海之道耳酈道元水經注引西域記云阿耨達山有水名遙奴名薩罕名恆伽三水俱入恆河兹說信然又括地志謂阿耨達山一名崑崙者非也崑崙去岡底斯西二十度在天竺之極西西印度之北以北極為天頂故河圖括地象曰崑崙橫為地軸上為天鎮道經謂天之中嶽水經謂崑崙在地之中皆言在天地之中也岡底斯去北極偏東二十度其非崑崙明矣浮白浮白二字人但知為飲罰爵之名不知浮白乃人身氣穴之一素問黃帝問氣穴篇曰目瞳子浮白二穴注云浮白在耳後入髮際足太陽少陽二脉之㑹特以古人未經用過而素問為醫藥之書學者未能旁通故知者鮮耳若玉樓銀海經蘇軾詩中引用後人皆知玉樓為肩銀海為目矣御稻米豐澤園中有水田數區布玉田榖種嵗至九月始刈穫登場一日循行阡陌時方六月下旬榖穗方頴忽見一科髙出衆稻之上實已堅好因收藏其種待來年驗其成熟之早否明嵗六月時此種果先熟從此生生不已嵗取千百四十餘年以來內膳所進皆此米也其米色微紅而粒長氣香而味腴以其生自苑田故名御稻米一嵗兩種亦能成兩熟口外種稻至白露以後數天不能成熟惟此種可以白露前收割故山莊稻田所收每嵗避暑用之尚有贏餘曽頒給其種與江浙督撫織造令民間種之聞兩省頗有此米惜未廣也南方氣暖其熟必早於北地當夏秋之交麥禾不接得此早稻利民非小若更一嵗兩種則畝有倍石之收將來蓋藏漸可充實矣昔宋仁宗聞占城有早熟稻遣使由福建而往以珍物易其禾種給江淮兩浙即今南方所謂黑榖米也粒細而性硬又結實甚稀故種者絶少今御稻不待逺求生於禁苑與古之雀銜天雨者無異朕每飯時嘗願與天下羣黎共此嘉榖也食氣熊於山中必有跧伏之所大抵在巖洞之間人謂之熊館至冬時入蟄呵氣成冰封其穴口僅留一小孔靜伏於內至春乃出毛詩名物解云熊能引氣故冬蟄不食昔年曽獵得蟄熊驗視腸胃净潔無物知不食之言信矣倘獵者不即斃之窟中熊逸而去則雖冬月亦必搏獸而食以此悟道家習靜之士能危坐兩三日不食不饑者即食氣內息之道也若與人應對酬酢便不耐饑餓此無他氣隨音而動動則外泄內虛也張紫陽云氣全則生存華他五禽之戲本於莊周吹詬呼吸吐故納新熊經鳥伸導引養形之術各有所由來矣鳥舌凡鳥舌皆附著下噱有短如粒者有及觜之半者有長與咮齊者其短者聲濁而促稍長者聲亦轉長與咮齊者其聲圓轉流麗鳴亦能久如黃鸝百舌畫眉阿􅀈之屬是也其舌之似人者如鸚鵡了哥松鴉即可委曲其聲以像人語鸜鵒舌似人而有歧故必翦去之而後可學人言然率皆不過數語而止淮南子所謂鸚鵡能言而不可使長言者得其所言而不得其所以言也此諸鳥舌皆根於喉而藏於咮唯啄木之舌其根通於腦後其尖逾引逾伸長出於咮寸餘樹中蟲蠧雖潛藏穴隙皆伸其舌鈎取之又有一種蛇頭鳥其頸項甚長其舌亦如啄木每為鷹鷂擊擒輒伸其舌以刺鷹鷂負痛力一少縱則逸而逝矣此能以舌為用而不能鳴者以其舌之太長也元命苞曰舌為言之達人之舌短者言澀舌長者音不正理亦如是地中有火嘗閲陸游老學庵筆記云南鄭見一軍校火山軍人也言火山之南鋤钁所及烈焰應手涌出故以火山名軍後人疑宋之火山軍為今岢嵐州地但有火山之名而無騰焰之事遂謂其說為妄不知此特地氣有變易耳今黑龍江及䝉古敖漢現有地中出火之處去土面一二寸炎光隨起接以引火之物輒傳焰而灼土人耕種時略耘反之布種其上不兩三月即收穫矣蓋地氣極熱發生最速故也先儒謂火行分寄於金木水土元命苞曰火之為言委隨也謂隨物而具也朱子曰金木水火體質屬土王逵謂火實生土而土亦能生火山經所載令邱騰火諸薄炎山事亦有之無足怪者地志云蜀川火井隨處而發久者百年或數十年光焰乃息此又火隨地氣而聚散之一徴也禽鳥肫肚之别蠡海集云飛禽為陽皆食果榖走獸為隂皆食芻藁此言殆未盡然飛禽之中即有食生食榖之異其食生者則有肚如鶴鸛鶖鵜之類是也食榖者則有肫如鵝鴨雞雀之類是也集韻云肚胃也肫肚皆鳥之胃以所食而分故凡食生而兼食榖食榖而兼食生者其肫肚與專食榖食生者又各少别至於諸獸如牛羊鹿麅麞之胃則曰膍即肚之旁俗所謂百葉者周禮謂之脾析醢人注云脾析牛百葉也字說曰牛羊等物食生草故有百葉夫牛羊何嘗不食豆菽乎其百葉亦非因食生草而有大凡倒噍之獸皆有百葉爾雅曰牛曰齝羊曰齥麋鹿曰齸注云齝食之已久復出嚼之也反芻出嚼曰齥說文云齸者藏之粻中吐而噍也是牛羊麋鹿皆倒噍故有百葉以類推之可知矣又如熊羆之屬則兼食生物𬞞菜猿猴之屬則專食果榖虎豹之屬則非生物不食走獸未嘗不食果榖而亦豈皆食芻藁乎昔人謂鳥獸得氣之偏五臟六腑不能備具辨之甚詳而肫肚百葉之說獨未有發明之者見其粗而不知其精也惟人於飲食亦有與臟腑不合者少沾氣味即噦吐反逆終身不能入口此其腸胃之間亦必有異處靈樞經謂五臟有大小髙下堅脆故飲食嗜好不齊信哉言也賦時和年豐慶祝賦並序朕誕辰免慶賀行禮者亦多年矣近因六旬羣臣固請又有恩綸故勉從衆意前一日進宫受賀頒詔往返二日各省慶祝萬夀設壇誦經不止億兆朕握樞臨極章句之能素不為務但自幼齡讀書屬文每覽大儒雖不以華麗為尚亦間有作者似取吟詠以托性情因而有感用時和年豐慶祝賦七字為韻賦曰幸升平之泰運歷嵗月之良時季春移序而大端化俗淑氣氤氲而諸政無為恐德弗類乾惕是規求賢每形乎寤寐治體未致夫昌期同心翊贊是賴多士恭已臨軒憑茲九司主屏虛諛而啓千秋不拔之業臣去私饋而建百世無窮之基此前聖之至理後人所未思也爾乃揚鑾青野設輦鳴珂大昊斯啓大樂在和衡塗峻闢雲殿義路廣宣偈歌新花受雨露以爭豔春鳥應載陽而舞多衆芳芬鬱麗景遮那都人士女轂擊肩摩逺近縫掖重登制科於是音發簫鼓聲雜管絃百戲盈阡陌以鬭勝羣黎集岐路而爭先勿驚勿動而民偃如草不震不騰而朝宗若川結綵繽紛惜傷物力之勞費鋪筵絡繹止禁珍饈之競妍去奢崇儉力穡祈年此帝王所當知其然也又乃駢羅羽衛杳渺仙宫金莖玉露福地倥侗論芝田之可種拂珠樹而還童服氣錬精曖碧臺之錯落守神凝思參紫府之穹崇此皆耗精氣於虛廓廢政事之全功凛黷祀弗欽之㫖戒思元蕩志之風若夫遍列傳燈廣懸法鏡期衆善之並臻兾靈祗之協慶布德延福仰慈䕃於慧雲妙覺能仁渡寶筏於西聖香風普拂花宫真印潛孚斗柄詳考影形之實恐遺有漏之行於是明三綱斂五福法天地之無私叶神人之祕祝養老尊賢重農貴粟含生欣欣長世朴朴祈萬寶之順成望彼蒼之戬榖願永永其若兹凝休徴於茀祿原夫泰運升恆乾元下濟謙尊有終恆久勿替先稼穡之惟艱惠鰥寡之是務陽順叙而不愆隂應期以相附沛甘㴻以咸周扇和風而廣布聞善言於詩書乃豫懷之所慕寫兾望之孔殷爰抽毫而作賦聖祖仁皇帝御製文第四集卷三十一
