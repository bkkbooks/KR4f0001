body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集巻十三勅諭諭内閣黒龍江墨爾根波爾得之地官員兵丁與索倫逹虎里之人助其耕種亦有年矣若仍前相助力作其官員兵丁及索倫逹虎里之人皆致勞苦此數年來所種之穀儻足以備用則集衆力以耕作可以停止著將軍薩布蘇詳議具奏遣兵部筆帖式一人往康熙三十三年正月三十日諭内閣據户部所察霸州等十州縣存貯米五萬七千五百餘石穀八百石天津衞存貯米一萬石穀四萬四千一百餘石此米穀現在倉與否足以賑給與否若足用則以餘米平價糶與百姓可行與否山東漕糧截留數萬石平價糶賣則穀價不騰於民大有禆益今輓至何州縣平價以糶應截留米若干萬石卽遣户部司官一員至巡撫郭世隆處令其逐一迅速詳議付彼齎奏康熙三十三年二月初一日諭大學士伊桑阿阿蘭泰直𨽻所屬被災之霸州永清等州縣其發粟賑濟及以倉米平價糶賣彼地小民得沾實惠與否可遣官察視之尔等與九卿詹事科道㑹議以聞康熙三十三年三月初八日諭内閣進士選取庶吉士教習讀書所以造育人材備他日之用司敎習者理冝嚴加督課使之勤勉嚮學此番考試庶吉士觀其所學甚劣較曩時庶吉士迴然不及此皆傅繼祖等教習怠弛不專心致志之所致也傅繼祖等下吏部嚴察具奏康熙三十三年三月十六日諭户部山西平陽府澤州沁州所屬地方前因蝗旱災傷民生困苦已經蠲免額賦竝加賑濟而被荒失業之衆猶未盡覩幹寧其康熙三十年三十一年未完地丁錢糧及借賑銀米若仍令帶征刻期完納誠恐閭閻力絀益致艱難著將所逋欠錢糧五十八萬一千六百餘兩米豆二萬八千五百八十餘石通行蠲豁用紓民力尔部行文該撫嚴飭該府州縣官悉心奉行務俾人霑實惠儻有已完在官揑稱民欠及已奉蠲免仍復重徵官吏作奸侵漁中飽一有發覺定以軍法從事遇赦不宥尔部卽遵諭行特諭康熙三十三年三月二十三日諭大學士伊桑阿阿蘭泰今値春暮草生之時噶爾丹與策旺阿拉布灘互相攻戰以至近吾邊境未可知也簡選西安滿洲兵一千五百人將軍博濟親帥之此勅書到時速往將軍孫思克處預備若有邊警與孫思克商酌以行將軍郎談等所帥之兵仍駐寧夏孫思克等若有所征行待其傳檄卽時趨赴共相商酌以行康熙三十三年三月二十八日諭内閣朕處深宫之中日以閭閻生計為念毎廵歷郊甸必循視農桑周諮耕耨田間事宜知之最悉誠能豫籌穡事廣備災祲庶幾大有禆益昨歳因雨水過溢卽慮入春㣲旱則蝗蟲遺種必致為害隨命傳諭直𨽻山東河南等省地方官令曉示百姓卽將田畆亟行耕耨使覆土盡壓蝗種以除後患今時已入夏恐蝗有遺種在地日漸蕃生已播之穀難免損蝕或有草野愚民云蝗蟲不可傷害宜聽其自去者此等無知之言切宜禁絶捕蝗弭災全在人事應差户部司官一員前往直𨽻山東巡撫令申飭各州縣官親履隴畝如某處有蝗卽率小民設法耨土覆壓勿致成災其河南山西陜西等省亦行文該撫一體曉諭欽依尔等將此事交與户部遵行康熙三十三年四月十三日諭内閣盛京輓運原有船百艘乃實有用之具也存留預備凡遇緩急為益良多盛京工部無故奏而廢棄之今年從山東天津所運之米因乏轉運之船遂致遲悞盛京工部堂司官著該部嚴訊議罪具奏康熙三十三年閏五月初三日諭内閣保䕶中河堤岸之子堤總河于成龍前奏稱最為緊要請急行修築今又奏言水勢盛長難以興工俟水涸之時始行修治朕思河務所係甚重必待水涸始修儻夏秋水澤泛漲保無有沖決隄岸之事乎可速勅于成龍再加詳悉酌定具奏康熙三十三年閏五月初十日諭内閣問往湖灘河朔送船官員言今年黄河之水較每年甚大上流之地水勢旣盛至江南地方則黄河隄岸可危皆未可知也遣員外郎綽竒靳治豫馳驛往于成龍處今年水勢何如有無沖決詳悉詢問還奏康熙三十三年六月二十日諭領侍衞内大臣索額圖大學士伊桑阿阿蘭泰尚書馬竒索諾和尚書班第奏稱和托郭特之根敦代青遣二十人往偵探噶爾丹信息行十日遇厄魯特二人殺其一擒其一回詣根敦代青所五日而至根敦代青以所擒厄魯特之人皇上或有所詢問故奏聞遣來班第等遇之詢問具奏問所擒厄魯特色楞供云噶爾丹於去年春冬間二次遣人窺根敦代青所居處今年正月來於科革朔東杭㡬爾查克地方居住等語根敦代青聞噶爾丹移營近彼前進遂亦向内移營於土喇之西卜頽哈灘巴圖魯處觀噶爾丹之前進情形當是圖根敦代青而來不遇則隨其蹤跡而求之來至土喇一帶地方搶掠邊境之喀爾喀亦未可定今時會旣佳馬復肥壯可調寧夏歸化城及右衞之兵循黒魯倫河於土喇等處往尋西卜頺哈灘巴圖魯探彼情形消息若果噶爾丹來近土喇擾害喀爾喀我軍有可乘之機將軍等相度而行儻我師未至之先彼已過而前進則從後襲之趙良棟諳習軍務郎談前往時可與之偕行令趙良棟率寧夏火器營兵二百人寧夏兵卽携寧夏之米歸化城與右衞之兵卽攜湖灘河朔之米此時機㑹甚便斷不可失尔等與領侍衞大臣議政大臣㑹議奏聞擒來之厄魯特亦詳問之康熙三十三年七月初七日諭戸部盛京等處去歳禾稼不登粒食艱窘聞今年收穫亦未豐稔米穀仍貴儻價値日漸翔涌則兵民生計恐致匱乏盛京等處地方關係𦂳要朕心時切軫念宜豫加籌畫作何恩給俾各資生著遣部院堂上官一員前往自甲兵以及匠役當差人等有力不能餬口者將人户數目察明造冊具奏尔部卽遵諭行特諭康熙三十三年七月十六日諭内閣今歳雨水通州以南新築之堤完固無恙惟東北舊堤沖決數處此皆有關於民田迅速堅固修築為切要也侍郎常書向曽遣閱視今仍令常書往詳看奏聞侍衞亦令一二人偕往康熙三十三年九月十三日諭户部朕惟黎元率育全恃農桑每遇歳時豐穰比屋皆能自贍儻一經旱潦粒食無資卽有俯仰不給之虞非相時緩急而先事圖維則補助之恩難以徧沛頃巡歷邊外道經宻雲等䖏地方見田畆歉收米穀價貴閭閻匱乏衣食不充目前旣已艱難來歳何所倚頼冝豫為籌畫用俾資生著遣部院堂上官二員㑹同直𨽻巡撫親詣年歳不登之各州縣詳察明白應作何區處賙濟確議具奏其八旗披甲當差及孤寡無依年老有疾中傷退閒人等有實係貧寠窘於謀生者著各該都統詳察姓名報部應作何恩恤尔部議奏著卽遵諭行特諭康熙三十三年九月十九日諭大學士伊桑阿學士温保戴通沈圖宋柱陶岱侍郎席喇朕觀四十九旗札克薩所設哨兵甚屬疎虞頃者厄魯特來使數百人至而哨兵全未知之是但有蒙古廵哨之名而無其實矣斥堠所關至重今天下承平無事八旗大臣無可勉効馳驅惟噶爾丹苟延旦夕之命或各旗大臣或部院大臣酌量遣往每旗派䕶軍十人人各給官馬二匹兩人共給駱駝一隻由歸化城攜米偕四十九旗設立哨兵大臣等來往廵察凡有動静可以速逹無悞良有禆益且大臣等得以諳悉邊塞情形不亦善乎此安設廵哨之大臣及䕶軍以㡬月一次更代尔等及八旗都統副都統滿九卿官員會同議奏康熙三十三年九月二十日諭内閣朕聞奉㫖遣往各省大臣官員沿途文官朝服以迎之武官介胄以迎之此皆未當於理應行禁止尔等與九卿會議具奏康熙三十三年十月初六日諭内閣天下武舉會試者或其人材可用騎射亦優而以不合式之故遺而不録者有之朕意殊為憫惜令兵部宣示有願効力與再試者具呈候該部請㫖再行考試遴選隨火器營令其服習戎事於㑹試時照常考校旣晰知其人亦便於㧞取有超卓者卽與録用如此則人材不致遺棄於考試良有禆益矣尔等㑹同九卿詳議奏聞康熙三十三年十月初六日諭大學士伊桑阿阿蘭泰去歳發通州倉米每月以萬石平價糶賣大有濟於百姓今歳通州附近之地穀米稔收仍照去年每月以萬石令倉塲侍郎親自閱視平價糶賣康熙三十三年十一月初九日諭大學士伊桑阿阿蘭泰宻雲順義附近地方今年米穀未收出常平倉所貯米穀平價照常糶賣外朕所命轉運積貯之米每月發千石平價糶之此事遣户部賢能殷實司官各一員監視糶賣康熙三十三年十一月初九日諭内閣去歳於直𨽻山東河南山西陜西江南諸省下詔捕蝗諸郡國盡皆捕滅蝗不為災農田大獲惟鳯陽一郡未能盡捕去歳雨水連緜今歳春時若或稍旱蝗所遺種至復發生遂成災沴以困吾民未可知也凡事必豫防而備之斯克有濟其下户部速勅直𨽻山東河南山西陜西江南諸廵撫凖前制亟宜耕耨田畆令土瘞蝗種毋致成患若或田畆有不能盡耕者蝗始發生卽力為撲滅毋使滋蔓為災康熙三十四年正月二十六日諭内閣通州道路曽禁行車令於兩傍行今兩傍圮壞來徃維艱可弛其禁令於道中行車又京師大街之中亦令車行毋禁康熙三十四年二月二十四日諭内閣朕昨幸五龍亭因徃視火延燒處守巡官員兵丁盡皆曠誤凡諸守視之地以有關繫始設官員兵丁若此怠忽將來流弊其何底止可勅八旗滿洲蒙古漢軍都統副都統等此後各於本旗官員兵丁守視處身往不時廵察有曠誤者當叅奏則叅奏當笞責者則笞責之歩軍統領等巡察該管官員歩兵之便其馬兵守視處竝令廵察至於米倉所繫重要尤冝敬慎儻有踈虞守視官員兵丁必戮無赦其下八旗都統副都統等遵行毋怠康熙三十四年二月二十四日諭大學士伊桑阿阿蘭泰王熙張玉書學士温保戴通沈圖宋柱李柟顧藻陸葇徐嘉炎翰林官專委以文章之事撰擬文字外更無他務自是以後凡碑文祭文其撰擬之姓名倂奉有俞允之㫖及申飭之㫖者皆書於冊三奉俞允之㫖三奉申飭之㫖者具以聞康熙三十四年三月初二日聖祖仁皇帝御製文第二集巻十三
