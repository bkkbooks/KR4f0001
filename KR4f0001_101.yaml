body:
  text: 欽定四庫全書聖祖仁皇帝御製文第二集卷五敕諭諭吏部國家設官分職原以綏靖地方惠養黎庶督撫為封疆大吏表率屬員尤須才守兼優􅀈練政務方於吏治民生實有裨益巡撫于成龍自為縣令以至郡守素秉清操愛民盡職遂從臬司超擢巡撫簡任以來孤介自持清廉益著釐姦剔弊扶弱鋤強境內謐寧旗民允服殊為可嘉從優特加太子少保以為廉能稱職者勸爾部即遵諭行特諭康熙二十六年四月十二日諭刑部時已入夏天氣亢暘雨澤尚爾愆期農事似有可慮或因刑名案件內無知罹法審擬失當情罪不符致干天和亦未可定兹特遣勒德洪余國柱達哈塔科爾坤王日藻徐廷璽等會同三法司將已結重案現在監禁者逐一詳加審鞫如有罪可矜疑者即與查明事由開列具奏務期情法允協不致淹滯監斃以副朕欽恤刑獄感召休祥之至意特諭康熙二十六年四月十五日諭大學士勤德洪明珠汝等可傳旨於八旗滿洲蒙古都統等令於各旗中阿思哈尼哈番等官以下拖沙喇哈番等官以上或微末秩員又或初為部院官後襲父兄世職𨽻旗下者果有其人正直才具優長而敬謹小心為國勤勉素行端方者一旗之中或三四人或一二人以其真知灼見保舉奏聞引見於部院用之此保舉之人既用後與其所保奏乖違不符者其保舉之都統副都統等連坐重罪之必不姑恕如各旗無可舉之人則已或恐坐舉主心懷畏懼隱其真正才賢不肯保奏甚無謂也可令各該旗都統副都統於二十五日以所舉之人引見奏聞康熙二十六年四月二十三日諭大學士明珠王熙宋德宜余國柱學士禪布吳喇岱額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦聽政之時科道侍班言官自恐失儀心切畏懼以致條奏者甚少凡啓奏官員果有失儀朕自降旨或其人自為檢舉科道侍班罷之誠是且科道官多起自疏逺進退周旋未經嫺習朕欲以其建言為要務雖有小過朕亦不計也其宣旨於九卿詹事科道此後科道侍班其已之康熙二十六年四月二十六日諭大學士勒德洪明珠王熙宋德宜余國柱學士禪布額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦各項採買估計價值前浮冒欺飾者甚多是以數日令其核減今所減者太過恐致苦纍可令察訪時價量度估計康熙二十六年五月初二日諭大學士勒德洪明珠王熙宋德宜余國柱學士禪布額爾赫圖色稜格舜拜吳興祖徐廷璽盧琦凡諸修造工程其估計在前今照新例銷算又今所定例凡物料匠役工價核減太過至於苦纍皆未可必前此修造已完者其仍照原估計銷算凡各項物料所值之價俱訪時價量度估計銷算康熙二十六年五月初二日諭內閣八旗滿洲蒙古漢軍官員人等家僕開户於旗分及佐領並民籍已為官者捐納候缺者捐納俊秀以上無論已補官未補官者令各旗都統副都統參領佐領等逐一嚴察明晰開送吏部吏部具聞請旨康熙二十六年五月初四日諭大學士勤德洪明珠雅克薩地官兵中烏喇寧古塔兵可還至愛渾城盛京兵可還至墨爾根地並令屯駐息馬過冬其事宜議政王貝勒大臣會同詳議以聞康熙二十六年七月初六日諭大學士勒德洪明珠黑龍江官兵口糧關係至重屢次轉運米數并黑龍江墨爾根地方接續所種米數宜加察明自盛京等處廣運米石以為久逺裨益之計此皆當周詳區畫又發遣彼處遊手無事之人甚多其口糧作何酌給耶前至黑龍江一帶乃徑直通衢往來轉輸斷不致稍有阻滯如蔡育榮等巨冨之人並殷實之家槩豫口糧殊覺未當彼處漢軍皆著察出披甲當差遊手無事之人可分設官莊廣開田畝以為恆産令戶兵二部賢能司官迅往逐一察明到日確議具奏康熙二十六年十月初一日諭內閣今年各省鄉試正副主考朕所未識者頗多止據本內開列之人酌量點用今覽各省進呈題名録內所出題目未當者甚多如福建省試官所出第三場策內問臺灣一段並不知地方形勢事宜蒙昧出題悖謬已極此外各省亦有未當者漢大學士學士等將各省呈覽題目及題名録詳加檢閲若有悖謬最甚者察出參奏康熙二十六年十月初三日諭大學士明珠學士禪布額爾赫圖舜拜今當軍政之年聞斂取兵丁以為定規餽送兵部此等情事朕不傳旨指明然亟應禁絶又聞每年奏銷兵馬册亦稱定規斂取兵丁餽送該部此皆勒索於軍民者也其弊亦宜永行禁止可傳諭兵部康熙二十六年十月十八日諭尚書鄂爾圖郎中伊爾克圖溫保黑龍江至為要地兵丁勞苦朕罔不知曩者俄羅斯漸次入犯占踞我達呼里索倫等處擾害邉疆四十餘年無如之何後備足軍食永戍黑龍江以困逼之俄羅斯遂窘迫至極乃屢次求和今彼之使臣已來尚未曽至苟糧儲不足則如沙爾瑚達塔海等之往征而不能成功矣此事未經年逺朕親所聞知且亦衆所共悉也朕所委曲區畫自盛京等處轉輸糧食及令所種米榖積貯至裕彼地大臣官員皆不思撙節濫給於無用之人苟且草率希圖軍儲罄盡勢必將彼等撤回彼等誠能以身家性命力保俄羅斯斷不來犯朕自撤回之也我之官兵撤回俄羅斯大衆難以齊來彼地將軍官員固皆稔知然或一二人或十餘人陸續聚集於黑龍江松花江之間構造木城盤踞其地則我取之維艱是俄羅斯為主兵而我反為客兵也今我惟多貯糧食永戍官兵則我兵得逸而俄羅斯兵為勞矣如此則俄羅斯零星來犯斷所不能欲大隊侵入則彼糧食何能挽運耶若黑龍江我兵不行永戍自松花江黑龍江以外所居民人皆非吾有矣爾等皆係選擇差遣往至彼處殫心竭慮務期為久逺充裕之計詳加籌議惟此一舉也亦無事再遣矣康熙二十六年十月二十四日諭八旗都統三品以上官凡人之行莫先於孝近者漢軍居父母之喪親朋聚會演劇飲酒呼盧鬬牌儼如筵宴毫無守制之體至孝服鞍轡等類所用素帛皆異常華美喪禮止當服用粗惡豈宜華美耶居喪演劇滿洲所無漢人亦未有特漢軍為然耳百行以孝為大如此所行以為孝道其他又何足觀也又漢軍外官赴任每借京債整飾行裝務極奇麗且多攜僕從致債主抵任索逋復謀贍僕從衣食勢必苛斂於民以資用度且親朋債主疊往任所請託需索不可數計是官雖一人實數人為之以致朘削小民民何以堪又漢軍外官不能騎射乃自稱行獵多帶鷹犬歇宿村莊滋害於民禽獸本在山野豈在村莊耶又漢軍服用多僣越非分終日羣居以馬弔飲酒為樂此等物力從何而出有非苛取諸民者乎漢軍習尚之惡已至於極如原任總兵諾邁原任提督哈喇庫祖永烈等於任所多買良民帶歸原任總督張長庚原任巡撫張德地韓世琦等皆貪婪虐民居官甚劣今著漢軍都統副都統等凡有居喪演劇飲酒呼盧鬬牌者照賭博例嚴行禁止在外漢軍官員任所有親朋債主前往請託需索貽纍小民者亦令察訪指名題參朕此諭旨専為敦厚風俗陶淑人心而起使漢軍居官者皆似總督范承勳巡撫于成龍之善朕又何諭之有此旨令徐廷璽傳諭康熙二十六年十月二十六日諭滿洲管漢軍副都統參領等向因漢軍習俗不善故以爾等補授漢軍副都統參領欲訓練其騎射導率以矩範一如滿洲也近見並不教以騎射凡事不能使之效法滿洲反有不肖者恐嚇漢軍指摘其短希圖索詐此朕所深悉嗣後爾等務加悛改善為教訓漢軍可耳康熙二十六年十月二十六日諭內閣凡參劾貪官其受賄作弊之處因未曽親覩無所憑據畏縮而不行參劾者甚多今間有彈章亦止據風聞參劾耳豈有身與之通同受賄作弊而顧肯參劾之耶向者原有風聞糾彈之例世祖皇帝時及輔政大臣停止今再行此例貪官似有警懼若有挾讐參劾者審明果係挾讐自有反坐之典在可著九卿確議具奏康熙二十六年十一月二十日諭內閣近見支用修造等項奏銷錢糧時該部不準駮回者甚多此等奏銷屢行駮回官員未必捐橐補給亦止派取民間耳如此則百姓愈苦向因需用孔亟故奏銷者未即準行今公帑並非匱乏之時奏銷案件不必駮回應即完結此等事不行駮回在官員雖稍獲便利而於百姓乃大有裨益也可傳諭九卿詹事科道康熙二十六年十一月二十日諭大學士勒德洪眀珠學士齊穡額爾赫圖舜拜多奇凱音布趙山今聞外藩蒙古出喀倫哨地有侵害搶虜喀爾喀之巴爾呼等蒙古者甚多以後著嚴行禁止毋使妄行其下理藩院確議以聞康熙二十六年十一月二十一日諭戶部朕惟自古帝王統御萬方乂安九有單心懷保節愛攸先期於物力充裕爰以振業黎元俾膏澤旁流咸蒙美利朕自御極以來軫恤民依力圖休養惟理財為裕國之大經蠲貸為愛民之實政歷年敦崇節儉嚴核浮冒蓋欲為布德行惠之資頻年以來各省錢糧雖已次第蠲免但江蘇所屬各郡縣為財賦重地額徵錢糧甲於他省且纍嵗輸將供億效力維勤兹用大沛恩膏除漕項錢糧外所有康熙二十七年應徴地丁各項錢糧俱著蠲免二十六年未完錢糧亦悉與豁除又陜西省錢糧前雖已行蠲免但念該省人民用兵之際轉輸餽餉效力可念再宜加恩以𢎞樂利其康熙二十七年應徴地丁各項錢糧及二十六年未完錢糧亦著俱與蠲免爾部速行該地方官通行曉諭務使小民均霑實惠以副朕愛育蒼生至意如有不肖官吏借端朦混及私行重徴者該督撫指名題參從重治罪如該督撫徇隱不行糾舉或經參奏或被告發定行一併從重治罪爾部即遵諭行特諭康熙二十六年十一月二十六日諭刑部朕侍奉太皇太后朝夕承歡祇遵慈訓竭誠奉養今者聖躬偶爾違豫朕夙夜滋懼寢食靡寧仰冀上天眷顧俯垂默佑惟思好生以迓天庥寬大以延遐夀所有內外問刑衙門現監重辟人犯除十惡死罪及貪官光棍不赦外其餘已經奉旨監候死罪重犯槩行減等發落以昭朕祈天永佑至意爾部即遵諭行特諭康熙二十六年十一月二十七日諭大學士明珠太皇太后聖體違和以來醫治萬端罔克奏效未即安善甚為可慮朕靡朝靡夕不勝憂懼兹欲躬詣郊壇虔行禱祀保佑太皇太后慈躬和豫永獲康寧可將朕意傳示九卿康熙二十六年十一月二十九日諭大學士明珠自太皇太后違和以來朕在宫中無日不虔潔精誠默行祈禱乃太皇太后聖體大漸似無一分可以冀望矣如稍有可望之機亦不敢起躬禱天壇之念今竟毫無冀望何計可施惟有竭抒誠悃叩祈上天之眷佑耳並非沽取虛名徒事粉飾為也皇皇上天其可欺乎將此諭旨向諸臣傳示之康熙二十六年十一月二十九日諭內閣等衙門朕自太皇太后違豫以來心懷憂慮日侍左右檢方調藥親侍飲饌太皇太后寧憩之時朕惟隔幔靜俟席地危坐一聞太皇太后聲息即趨至榻前凡有所需手奉以進因此晝夜不能少離太皇太后屢有德音命朕回宫少宜自愛朕念幼蒙太皇太后撫養教訓三十餘年罔極深恩難以報答今見病體依然五內焦灼莫知所措朕躬寢處何暇顧計覽奏具見大小臣工愛君誠悃但當此時不竭心盡力少抒仰報之忱異日雖欲依戀慈闈竭朕心力豈易得耶所奏已知之康熙二十六年十二月十一日諭大學士勒德洪等朕忽遭大故五中潰糜非不知恪遵遺誥守身為重勉自節哀強進飲食但悲從中來情實痛切莫由自主以至昏迷即欲少餐饘粥亦不能下咽非故却不御覽奏具見誠悃朕當強支自愛卿等無須過慮康熙二十六年十二月二十七日諭大學士勒德洪等據奏元旦請朕還宫人主宫殿原多可以因時移蹕若在庶民遭此大故所居止於一室又遷避何所回宫斷不可行卿等念切愛君恐朕哀毁過甚諄懇再三勉從所請強節哀情康熙二十六年十二月三十日聖祖仁皇帝御製文第二集卷五
