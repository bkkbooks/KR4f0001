  text: 欽定四庫全書聖祖仁皇帝御製文第三集卷八目録敕諭諭江南總督阿山巡撫宋犖諭江南督撫諭內閣禮部諭扈從大學士張玉書陳廷敬翰林查升陳壯履錢名世蔣廷錫汪灝勵廷儀等諭扈從大學士馬齊張玉書陳廷敬諭扈從內閣吏部諭浙江福建總督金世榮浙江巡撫張泰交福建巡撫李斯義諭江南總督阿山江寧巡撫宋犖安徽巡撫劉光美諭扈從大學士馬齊張玉書陳廷敬等諭吏部諭河道總督張鵬翮諭扈從諸大臣及河臣等諭河道總督張鵬翮諭河道總督張鵬翮諭河道總督張鵬翮諭山東巡撫趙世顯諭河道總督張鵬翮諭河道總督張鵬翮諭河道總督張鵬翮諭內閣諭户部諭大學士馬齊席哈納張玉書陳廷敬等諭户部諭户部
